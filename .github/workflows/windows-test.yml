# Cross-platform compatibility tests (Windows, Linux, macOS)
name: Cross-Platform Test

on:
  push:
    paths:
      - 'common_ai_agent/**'
      - '.github/workflows/windows-test.yml'
  pull_request:
    paths:
      - 'common_ai_agent/**'

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Smoke test - main.py --check
        run: python common_ai_agent/src/main.py --check

      - name: Platform compat tests (22 tests)
        run: pytest common_ai_agent/tests/test_windows_compat.py -v

      - name: Deep compat tests (32 tests)
        run: pytest common_ai_agent/tests/test_deep_compat.py -v

      - name: Deep compat V2 tests (50 tests)
        run: pytest common_ai_agent/tests/test_deep_compat_v2.py -v

      - name: Session manager tests (27 tests)
        run: pytest common_ai_agent/tests/test_session_manager.py -v

      - name: Streaming display tests (58 tests)
        run: pytest common_ai_agent/tests/test_streaming_display.py -v

      - name: Multiline input tests (30 tests)
        run: pytest common_ai_agent/tests/test_multiline_input.py -v
