# Cross-platform compatibility tests (Windows, Linux, macOS)
name: Cross-Platform Test

on:
  push:
    paths:
      - 'brian_coder/**'
      - '.github/workflows/windows-test.yml'
  pull_request:
    paths:
      - 'brian_coder/**'

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run compatibility tests
        run: pytest brian_coder/tests/test_windows_compat.py -v

      - name: Verify main.py imports cleanly
        run: python -c "import sys; sys.path.insert(0,'brian_coder/src'); sys.path.insert(0,'brian_coder'); sys.path.insert(0,'brian_coder/core'); sys.path.insert(0,'brian_coder/lib'); from display import IS_WINDOWS; from slash_commands import get_registry; r=get_registry(); print(f'OK: IS_WINDOWS={IS_WINDOWS}, commands={len(r.commands)}')"
