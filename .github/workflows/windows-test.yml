# Runs on real Windows to validate cross-platform compatibility
name: Windows Compatibility Test

on:
  push:
    paths:
      - 'brian_coder/**'
      - '.github/workflows/windows-test.yml'
  pull_request:
    paths:
      - 'brian_coder/**'

jobs:
  windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run Windows compatibility tests
        run: pytest brian_coder/tests/test_windows_compat.py -v
