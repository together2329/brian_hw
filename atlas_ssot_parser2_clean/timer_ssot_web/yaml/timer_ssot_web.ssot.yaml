# =============================================================================
# SSOT — timer_ssot_web — APB4 32-bit Timer
# =============================================================================

# SECTION 0: Top Module Identity
top_module:
  name: "timer_ssot_web"
  version: "1.0"
  type: "peripheral"
  description: "APB4 32-bit timer with compare interrupt"
  reference_spec: "Custom APB4 timer specification"
  target:
    technology: "generic"
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null

# SECTION 1: Sub-Module List (Hierarchy)
sub_modules:
  - { name: "timer_ssot_web_regs",    file: "rtl/timer_ssot_web_regs.sv",    ownership: "manifest", ssot_gen: true,  description: "APB4 register block and decode" }
  - { name: "timer_ssot_web_core",    file: "rtl/timer_ssot_web_core.sv",    ownership: "manifest", ssot_gen: false, description: "Timer counter / compare / IRQ logic" }
  - { name: "timer_ssot_web_wrapper", file: "rtl/timer_ssot_web_wrapper.sv", ownership: "manifest", ssot_gen: true,  description: "Top-level integration wrapper" }

# SECTION 2: Parameters
parameters:
  - { name: "DBITS",        default: 32, type: int,   description: "Data width in bits",                           drives: ["timer_ssot_web_regs.sv", "timer_ssot_web_core.sv", "timer_ssot_web_wrapper.sv"] }
  - { name: "ABITS",        default: 4,  type: int,   description: "APB address width (16 byte window)",          drives: ["timer_ssot_web_regs.sv", "timer_ssot_web_wrapper.sv"] }
  - { name: "RESET_POLARITY", default: "active_low", type: enum, values: ["active_low", "active_high"],        description: "Reset polarity",                                 drives: ["ALL .sv files"] }

# SECTION 3: IO List (Ports)
io_list:
  clock_domains:
    - name: "clk"
      frequency_mhz: 100
      description: "Main clock"
      ports:
        - { name: "clk", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "rst_n"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Active-low asynchronous reset"
      ports:
        - { name: "rst_n", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      description: "Register access interface"
      ports:
        - { name: "paddr",   width: 4,  direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB byte strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }
    - name: "interrupt"
      type: "custom"
      description: "Interrupt output"
      ports:
        - { name: "irq", width: 1, direction: "output", description: "Timer compare interrupt (active-high)" }

# SECTION 4: Main Features
features:
  - name: "Free-running counter"
    trigger: "Enabled via CTRL[enable] = 1 while clock is toggling"
    datapath: "32-bit increment on each clock cycle"
    control: "CTRL[enable] gates counting; reset clears COUNT to 0"
    output: "32-bit COUNT register readable via APB"
  - name: "Compare match interrupt"
    trigger: "COUNT == COMPARE while CTRL[irq_enable] = 1"
    datapath: "Hardware comparator monitors COUNT vs. COMPARE"
    control: "Match raises irq output; STATUS[irq_status] set; cleared by W1C write"
    output: "irq output asserted (active-high level)"
  - name: "APB4 register access"
    trigger: "APB read/write transactions"
    datapath: "paddr decode → register file → prdata return"
    control: "Standard APB4 psel/penable/pwrite handshake"
    output: "pready/pslverr response"

# SECTION 5: Data Flow
dataflow:
  counter_path:
    source: "Hardware increment on clk"
    increment: 1
    width: 32
    wrap: "COUNT saturates at 0xFFFFFFFF"
  compare_path:
    operand_a: "COUNT (internal register)"
    operand_b: "COMPARE (APB-writable register)"
    match_condition: "COUNT == COMPARE"
    match_action: "Set STATUS[irq_status], assert irq (if irq_enable)"
  register_rw_path:
    sequence: "APB decode → write CTRL/COMPARE, read COUNT/STATUS"
    status_clear: "W1C — write 1 to STATUS[0] clears irq_status and de-asserts irq"

# SECTION 6: Clock & Reset Domain
clock_reset_domains:
  domains:
    - { name: "clk", frequency_mhz: 100, description: "Main clock" }
  reset_scheme:
    signal: "rst_n"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

# SECTION 7: CDC Requirements
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"

# SECTION 8: RDC Requirements
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"

# SECTION 9: Registers
registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
    num_registers: 4
  register_list:
    - name: "CTRL"
      offset: 0x0
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register"
      fields:
        - { name: "enable",      bits: [0, 0],  access: "rw", reset: 0x0, description: "Timer enable (1 = counting)" }
        - { name: "irq_enable",  bits: [1, 1],  access: "rw", reset: 0x0, description: "Interrupt enable (1 = enabled)" }
        - { name: "reserved",    bits: [31, 2], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "COUNT"
      offset: 0x4
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Current 32-bit counter value"
      fields:
        - { name: "count", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Counter value" }
    - name: "COMPARE"
      offset: 0x8
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Compare value for interrupt generation"
      fields:
        - { name: "compare", bits: [31, 0], access: "rw", reset: 0x00000000, description: "Compare threshold" }
    - name: "STATUS"
      offset: 0xC
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Status Register (W1C for irq_status)"
      fields:
        - { name: "irq_status", bits: [0, 0],  access: "rw", reset: 0x0, description: "Interrupt status — write 1 to clear" }
        - { name: "reserved",   bits: [31, 1], access: "ro", reset: 0x0, description: "Reserved" }

# SECTION 10: Memory Requirements
memory:
  instances:
    - { name: "count_reg", type: "register", depth: 1, width: 32, read_ports: 1, write_ports: 0, latency: 0, description: "Internal 32-bit counter" }
    - { name: "compare_reg", type: "register", depth: 1, width: 32, read_ports: 1, write_ports: 1, latency: 0, description: "Compare threshold register" }
    - { name: "ctrl_reg", type: "register", depth: 1, width: 2, read_ports: 1, write_ports: 1, latency: 0, description: "Control bits (enable, irq_enable)" }
    - { name: "status_reg", type: "register", depth: 1, width: 1, read_ports: 1, write_ports: 1, latency: 0, description: "IRQ status flag" }
  note: "Pure register-based — no SRAM/FIFO required"

# SECTION 11: Interrupt
interrupts:
  sources:
    - { name: "TIMER_CMP", bit: 0, type: "level", enable_reg: "CTRL[1]", status_reg: "STATUS[0]", clear: "W1C", description: "Timer compare match interrupt" }
  output:
    signal: "irq"
    polarity: "active_high"
    type: "level"

# SECTION 12: FSM
fsm:
  core_level:
    states:
      - "IDLE"
      - "COUNTING"
    transitions:
      - { from: "IDLE",     to: "COUNTING", condition: "CTRL[enable]=1" }
      - { from: "COUNTING", to: "IDLE",     condition: "CTRL[enable]=0" }
    note: "Counter operates in COUNTING state every clk. Compare match is combinational from COUNT==COMPARE."

# SECTION 13: Coding Rules
coding_rules:
  verilog_style: "verilog_2001"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk or negedge rst_n)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low asynchronous reset (rst_n)"
    - "Parameterize widths via DBITS, ABITS"
    - "BANNED: package / interface / modport"
  lint_waivers:
    - "UNUSEDSIGNAL: pstrb tie-off in regs module (all byte lanes used)"
    - "WIDTHEXPAND: parameter-based widths"

# SECTION 14: Reuse Modules
reuse_modules: []

# SECTION 15: Custom Extensions
custom:
  note: "No custom extensions"

# SECTION 16: Dir Structure
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

# SECTION 17: Filelist
filelist:
  rtl:
    - "rtl/timer_ssot_web_regs.sv"
    - "rtl/timer_ssot_web_core.sv"
    - "rtl/timer_ssot_web_wrapper.sv"
  sim:
    - "sim/tb_timer_ssot_web_top.sv"
    - "sim/tb_timer_ssot_web_program.sv"
  firmware:
    - "firmware/timer_ssot_web_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/fsm_diagram.md"
    - "docs/README.md"

# SECTION 18: Test Requirements
test_requirements:
  scenarios:
    - { id: "SC1", name: "Reset defaults",         expected: "All registers = reset value" }
    - { id: "SC2", name: "Write and read registers", expected: "APB read returns written value" }
    - { id: "SC3", name: "Counter increment",        expected: "COUNT increments when enable=1" }
    - { id: "SC4", name: "Counter halt",             expected: "COUNT stops when enable=0" }
    - { id: "SC5", name: "Compare match IRQ rise",   expected: "irq asserted when COUNT==COMPARE and irq_enable=1" }
    - { id: "SC6", name: "IRQ W1C clear",            expected: "irq de-asserted, STATUS cleared after W1C" }
    - { id: "SC7", name: "No IRQ without enable",    expected: "irq stays low when irq_enable=0 even on match" }
  scoreboard_checks: 5
  coverage_goals:
    functional: "All FSM states visited"
    code: "line >= 90%, branch >= 85%"

# SECTION 19: Traceability
traceability:
  yaml_to_output:
    - { yaml: "top_module.name",               output: "ALL .sv files (module name)" }
    - { yaml: "parameters",                    output: "timer_ssot_web_wrapper.sv (localparam)" }
    - { yaml: "io_list.interfaces.apb_slave",  output: "timer_ssot_web_wrapper.sv (port list)" }
    - { yaml: "io_list.interfaces.interrupt",  output: "timer_ssot_web_wrapper.sv (port list)" }
    - { yaml: "registers.register_list",       output: "timer_ssot_web_regs.sv + firmware + docs" }
    - { yaml: "fsm",                           output: "timer_ssot_web_core.sv + docs/fsm_diagram.md" }
    - { yaml: "test_requirements.scenarios",   output: "sim/tb_timer_ssot_web_program.sv" }

# SECTION 20: Generation Flow
generation_flow:
  steps:
    - { name: "validate_ssot", command: "python3 -c 'import yaml; yaml.safe_load(open(\"timer_ssot_web/yaml/timer_ssot_web.ssot.yaml\")); print(\"PASS\")'", description: "YAML parse and schema sanity check" }
    - { name: "handoff_rtl",   command: "rtl-gen workflow", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb",    command: "tb-gen workflow",  description: "Downstream testbench generation from validated SSOT" }
    - { name: "handoff_sim",   command: "sim workflow",     description: "Downstream simulation after RTL and TB exist" }
