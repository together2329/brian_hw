# =============================================================================
# SSOT — counter_web_ui — APB4 32-bit Readable/Writable Counter
# =============================================================================

# SECTION 0: Top Module Identity
top_module:
  name: "counter_web_ui"
  version: "1.0"
  type: "peripheral"
  description: "APB4 32-bit up-counter with presettable value and optional overflow interrupt"
  reference_spec: "Simple APB4 counter specification"
  target:
    technology: "generic"
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null

# SECTION 1: Sub-Module List (Hierarchy)
sub_modules:
  - { name: "counter_web_ui_regs",    file: "rtl/counter_web_ui_regs.sv",    ownership: "manifest", ssot_gen: true,  description: "APB4 register block and decode" }
  - { name: "counter_web_ui_core",    file: "rtl/counter_web_ui_core.sv",    ownership: "manifest", ssot_gen: false, description: "Counter increment and overflow logic" }
  - { name: "counter_web_ui_wrapper", file: "rtl/counter_web_ui_wrapper.sv", ownership: "manifest", ssot_gen: true,  description: "Top-level integration wrapper" }

# SECTION 2: Parameters
parameters:
  - { name: "DBITS",           default: 32, type: int,   description: "Data width in bits",                           drives: ["counter_web_ui_regs.sv", "counter_web_ui_core.sv", "counter_web_ui_wrapper.sv"] }
  - { name: "ABITS",           default: 4,  type: int,   description: "APB address width (16 byte window)",          drives: ["counter_web_ui_regs.sv", "counter_web_ui_wrapper.sv"] }
  - { name: "DEFAULT_ENABLE",  default: 0,  type: int,   description: "Power-on enable state (0=disabled, 1=enabled)", drives: ["counter_web_ui_core.sv"] }
  - { name: "RESET_POLARITY",  default: "active_low", type: enum, values: ["active_low", "active_high"],         description: "Reset polarity",                                 drives: ["ALL .sv files"] }

# SECTION 3: IO List (Ports)
io_list:
  clock_domains:
    - name: "clk"
      frequency_mhz: 100
      description: "Main clock"
      ports:
        - { name: "clk", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "rst_n"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Active-low asynchronous reset"
      ports:
        - { name: "rst_n", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      description: "Register access interface"
      ports:
        - { name: "paddr",   width: 4,  direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB byte strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }
    - name: "interrupt"
      type: "custom"
      description: "Optional overflow interrupt output"
      ports:
        - { name: "irq", width: 1, direction: "output", description: "Overflow interrupt (active-high level, optional — tie to 0 if unused)" }

# SECTION 4: Main Features
features:
  - name: "Presettable up-counter"
    trigger: "Enabled via CTRL[enable] = 1"
    datapath: "COUNT increments by 1 each clock cycle when enabled; wraps from 0xFFFFFFFF to 0x00000000"
    control: "CTRL[enable] gates counting; write to COUNT sets counter value directly"
    output: "32-bit COUNT readable via APB"
  - name: "Overflow detection"
    trigger: "COUNT wraps from 0xFFFFFFFF to 0x00000000"
    datapath: "Hardware detects overflow event"
    control: "Sets STATUS[overflow] on wrap; irq asserted if CTRL[irq_enable]=1"
    output: "irq output and STATUS register flag"
  - name: "APB4 register access"
    trigger: "APB read/write transactions to counter registers"
    datapath: "paddr decode → register file → prdata return"
    control: "Standard APB4 psel/penable/pwrite handshake with pready/pslverr"
    output: "pready asserted, prdata driven"

# SECTION 5: Data Flow
dataflow:
  counter_path:
    source: "COUNT register (internal 32-bit flip-flops)"
    increment: "+1 per clk when CTRL[enable]=1"
    preset: "Write via APB directly sets COUNT to pwdata[31:0]"
    wrap: "0xFFFFFFFF → 0x00000000"
  overflow_path:
    trigger: "COUNT transitions 0xFFFFFFFF → 0x00000000"
    action: "STATUS[overflow] ← 1; irq ← 1 if CTRL[irq_enable]=1"
    clear: "W1C — write 1 to STATUS[0] clears overflow flag and de-asserts irq"
  register_rw_path:
    sequence: "APB paddr decode → read/write CTRL, COUNT, STATUS"
    read_side_effects: "Reading COUNT returns current counter value (no clear)"

# SECTION 6: Clock & Reset Domain
clock_reset_domains:
  domains:
    - { name: "clk", frequency_mhz: 100, description: "Main clock" }
  reset_scheme:
    signal: "rst_n"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

# SECTION 7: CDC Requirements
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"

# SECTION 8: RDC Requirements
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"

# SECTION 9: Registers
registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
    num_registers: 3
  register_list:
    - name: "CTRL"
      offset: 0x0
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register"
      fields:
        - { name: "enable",     bits: [0, 0],  access: "rw", reset: 0x0, description: "Counter enable (1 = counting)" }
        - { name: "irq_enable", bits: [1, 1],  access: "rw", reset: 0x0, description: "Overflow interrupt enable (1 = enabled)" }
        - { name: "reserved",   bits: [31, 2], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "COUNT"
      offset: 0x4
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "data"
      description: "Counter value — write to preset, read to get current count"
      fields:
        - { name: "count", bits: [31, 0], access: "rw", reset: 0x00000000, description: "32-bit counter value" }
    - name: "STATUS"
      offset: 0x8
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Status Register (W1C for overflow flag)"
      fields:
        - { name: "overflow",  bits: [0, 0],  access: "rw", reset: 0x0, description: "Overflow status — write 1 to clear" }
        - { name: "reserved",  bits: [31, 1], access: "ro", reset: 0x0, description: "Reserved" }

# SECTION 10: Memory Requirements
memory:
  instances:
    - { name: "count_reg",    type: "register", depth: 1, width: 32, read_ports: 1, write_ports: 1, latency: 0, description: "32-bit counter register" }
    - { name: "ctrl_reg",     type: "register", depth: 1, width: 2,  read_ports: 1, write_ports: 1, latency: 0, description: "Control bits (enable, irq_enable)" }
    - { name: "status_reg",   type: "register", depth: 1, width: 1,  read_ports: 1, write_ports: 1, latency: 0, description: "Overflow status flag" }
  note: "Pure register-based — no SRAM/FIFO required"

# SECTION 11: Interrupt
interrupts:
  sources:
    - { name: "COUNT_OVF", bit: 0, type: "level", enable_reg: "CTRL[1]", status_reg: "STATUS[0]", clear: "W1C", description: "Counter overflow interrupt" }
  output:
    signal: "irq"
    polarity: "active_high"
    type: "level"
  note: "irq output may be left unconnected at SoC level if interrupt is not needed"

# SECTION 12: FSM
fsm:
  core_level:
    states:
      - "IDLE"
      - "COUNTING"
    transitions:
      - { from: "IDLE",     to: "COUNTING", condition: "CTRL[enable]=1" }
      - { from: "COUNTING", to: "IDLE",     condition: "CTRL[enable]=0" }
    note: "Counter increments each clk in COUNTING state. Overflow detection is combinational logic parallel to the FSM."

# SECTION 13: Coding Rules
coding_rules:
  verilog_style: "verilog_2001"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk or negedge rst_n)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low asynchronous reset (rst_n)"
    - "Parameterize widths via DBITS, ABITS"
    - "BANNED: package / interface / modport"
  lint_waivers:
    - "UNUSEDSIGNAL: pstrb tie-off in regs module (full-word access)"
    - "WIDTHEXPAND: parameter-based widths"

# SECTION 14: Reuse Modules
reuse_modules: []

# SECTION 15: Custom Extensions
custom:
  note: "No custom extensions"

# SECTION 16: Dir Structure
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

# SECTION 17: Filelist
filelist:
  rtl:
    - "rtl/counter_web_ui_regs.sv"
    - "rtl/counter_web_ui_core.sv"
    - "rtl/counter_web_ui_wrapper.sv"
  sim:
    - "sim/tb_counter_web_ui_top.sv"
    - "sim/tb_counter_web_ui_program.sv"
  firmware:
    - "firmware/counter_web_ui_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/fsm_diagram.md"
    - "docs/README.md"

# SECTION 18: Test Requirements
test_requirements:
  scenarios:
    - { id: "SC1", name: "Reset defaults",                  expected: "All registers at reset value; counter stopped" }
    - { id: "SC2", name: "APB write and read COUNT",         expected: "Written value read back on next APB read" }
    - { id: "SC3", name: "Counter increments when enabled",  expected: "COUNT increases by 1 per clock when CTRL[enable]=1" }
    - { id: "SC4", name: "Counter halts when disabled",      expected: "COUNT holds value when CTRL[enable]=0" }
    - { id: "SC5", name: "Overflow wrap",                    expected: "COUNT wraps 0xFFFFFFFF → 0x00000000" }
    - { id: "SC6", name: "Overflow IRQ asserted",            expected: "irq high on wrap when CTRL[irq_enable]=1" }
    - { id: "SC7", name: "No IRQ when irq_enable=0",         expected: "irq stays low on wrap when CTRL[irq_enable]=0" }
    - { id: "SC8", name: "W1C clear overflow",               expected: "irq de-asserted and STATUS[0] cleared after writing 1 to STATUS[0]" }
  scoreboard_checks: 5
  coverage_goals:
    functional: "All FSM states visited; overflow event triggered"
    code: "line >= 90%, branch >= 85%"

# SECTION 19: Traceability
traceability:
  yaml_to_output:
    - { yaml: "top_module.name",               output: "ALL .sv files (module name)" }
    - { yaml: "parameters",                    output: "counter_web_ui_wrapper.sv (localparam)" }
    - { yaml: "io_list.interfaces.apb_slave",  output: "counter_web_ui_wrapper.sv (port list)" }
    - { yaml: "io_list.interfaces.interrupt",  output: "counter_web_ui_wrapper.sv (irq port)" }
    - { yaml: "registers.register_list",       output: "counter_web_ui_regs.sv + firmware + docs" }
    - { yaml: "fsm",                           output: "counter_web_ui_core.sv + docs/fsm_diagram.md" }
    - { yaml: "test_requirements.scenarios",   output: "sim/tb_counter_web_ui_program.sv" }

# SECTION 20: Generation Flow
generation_flow:
  steps:
    - { name: "validate_ssot", command: "python3 -c 'import yaml; yaml.safe_load(open(\"counter_web_ui/yaml/counter_web_ui.ssot.yaml\")); print(\"PASS\")'", description: "YAML parse and schema sanity check" }
    - { name: "handoff_rtl",   command: "rtl-gen workflow", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb",    command: "tb-gen workflow",  description: "Downstream testbench generation from validated SSOT" }
    - { name: "handoff_sim",   command: "sim workflow",     description: "Downstream simulation after RTL and TB exist" }
