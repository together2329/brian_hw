# =============================================================================
# SSOT — qa_visible_09182 — APB4 GPIO Peripheral
# =============================================================================

# SECTION 0: Top Module Identity
top_module:
  name: "qa_visible_09182"
  version: "1.0"
  type: "peripheral"
  description: "APB4 GPIO peripheral with firmware-controlled input/output pins, direction control, edge detection, and interrupt generation"
  reference_spec: "Custom APB4 GPIO specification"
  target:
    technology: "generic"
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null

# SECTION 1: Sub-Module List (Hierarchy)
sub_modules:
  - { name: "qa_visible_09182_regs",  file: "rtl/qa_visible_09182_regs.sv",  ownership: "manifest", ssot_gen: true,  description: "APB4 register block and decode" }
  - { name: "qa_visible_09182_core",  file: "rtl/qa_visible_09182_core.sv",  ownership: "manifest", ssot_gen: false, description: "GPIO pin control, edge detection, and output logic" }
  - { name: "qa_visible_09182_irq",   file: "rtl/qa_visible_09182_irq.sv",   ownership: "manifest", ssot_gen: true,  description: "Interrupt synthesis and W1C clear" }
  - { name: "qa_visible_09182_wrapper", file: "rtl/qa_visible_09182_wrapper.sv", ownership: "manifest", ssot_gen: true, description: "Top-level integration wrapper" }

# SECTION 2: Parameters
parameters:
  - { name: "GPIO_WIDTH",      default: 16, type: int,   description: "Number of GPIO pins",                            drives: ["qa_visible_09182_core.sv", "qa_visible_09182_irq.sv", "qa_visible_09182_wrapper.sv"] }
  - { name: "DBITS",           default: 32, type: int,   description: "Data width in bits",                              drives: ["qa_visible_09182_regs.sv"] }
  - { name: "ABITS",           default: 6,  type: int,   description: "APB address width (64 byte window)",             drives: ["qa_visible_09182_regs.sv"] }
  - { name: "RESET_OUT",       default: 0,  type: int,   description: "Power-on reset value for DATA_OUT",              drives: ["qa_visible_09182_core.sv"] }
  - { name: "RESET_DIR",       default: 0,  type: int,   description: "Power-on reset value for DIR (0=all inputs)",   drives: ["qa_visible_09182_core.sv"] }
  - { name: "RESET_POLARITY",  default: "active_low", type: enum, values: ["active_low", "active_high"],               description: "Reset polarity",                        drives: ["ALL .sv files"] }

# SECTION 3: IO List (Ports)
io_list:
  clock_domains:
    - name: "clk"
      frequency_mhz: 100
      description: "Main clock"
      ports:
        - { name: "clk", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "rst_n"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Active-low asynchronous reset"
      ports:
        - { name: "rst_n", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      description: "Register access interface"
      ports:
        - { name: "paddr",   width: 6,  direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB byte strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }
    - name: "gpio"
      type: "GPIO"
      role: "bidirectional"
      description: "General-purpose I/O pins"
      ports:
        - { name: "gpio_i",  width: 16, direction: "input",  description: "GPIO input pins" }
        - { name: "gpio_o",  width: 16, direction: "output", description: "GPIO output pins" }
        - { name: "gpio_oe", width: 16, direction: "output", description: "GPIO output enable (1 = driven)" }
    - name: "interrupt"
      type: "custom"
      description: "Interrupt output"
      ports:
        - { name: "irq", width: 1, direction: "output", description: "Combined GPIO interrupt (active-high level)" }

# SECTION 4: Main Features
features:
  - name: "Configurable GPIO direction"
    trigger: "APB write to DIR register"
    datapath: "DIR[n] = 1 → gpio_oe[n] = 1, gpio_o[n] driven; DIR[n] = 0 → gpio_oe[n] = 0, pin acts as input"
    control: "DIR register bits gate output enables"
    output: "gpio_o, gpio_oe, gpio_i visible to firmware"
  - name: "Set, clear, toggle operations"
    trigger: "APB write to SET / CLR / TOGGLE registers"
    datapath: "SET[n]=1 → DATA_OUT[n]←1; CLR[n]=1 → DATA_OUT[n]←0; TOGGLE[n]=1 → DATA_OUT[n]←~DATA_OUT[n]"
    control: "Write-only strobe registers; reading them returns 0"
    output: "DATA_OUT modified per atomic bit operation"
  - name: "Input sampling and readback"
    trigger: "APB read from DATA_IN"
    datapath: "gpio_i pins synchronized to clk → DATA_IN register → prdata"
    control: "DATA_IN always reflects current pin state (read-only)"
    output: "32-bit read data on APB"
  - name: "Edge/level interrupt detection"
    trigger: "gpio_i transition or level per IRQ_TYPE setting"
    datapath: "per-pin edge detector monitors gpio_i; IRQ_TYPE[n] selects rising/falling/level; match sets IRQ_STATUS[n]"
    control: "IRQ_EN[n] gates per-pin interrupt contribution; combined irq = OR(IRQ_STATUS & IRQ_EN)"
    output: "irq output; IRQ_STATUS register"
  - name: "W1C interrupt clear"
    trigger: "APB write 1 to IRQ_STATUS[n]"
    datapath: "Each bit written 1 clears corresponding IRQ_STATUS[n]; irq de-asserted when all enabled bits cleared"
    control: "Firmware writes 1 to clear; writing 0 has no effect"
    output: "irq de-asserted"

# SECTION 5: Data Flow
dataflow:
  output_path:
    source: "DATA_OUT register (APB-writable)"
    direct_write: "APB write to DATA_OUT sets output value immediately"
    atomic_ops:
      set: "SET[n]=1 → DATA_OUT[n] ← 1"
      clr: "CLR[n]=1 → DATA_OUT[n] ← 0"
      toggle: "TOGGLE[n]=1 → DATA_OUT[n] ← ~DATA_OUT[n]"
    output_drive: "If DIR[n]=1, gpio_o[n] = DATA_OUT[n]; if DIR[n]=0, gpio_o[n] = 0"
  input_path:
    source: "gpio_i pins (external)"
    sync: "Double-flop synchronizer on each gpio_i bit"
    sample: "Synced value → DATA_IN register"
  interrupt_path:
    source: "gpio_i synchronized"
    edge_detect: "Rising/falling edge or level per IRQ_TYPE[n]"
    status_set: "IRQ_STATUS[n] ← 1 on detected event"
    irq_output: "irq = |(IRQ_STATUS & IRQ_EN & 1'b1)"
    clear: "W1C: writing 1 to IRQ_STATUS[n] clears that bit"

# SECTION 6: Clock & Reset Domain
clock_reset_domains:
  domains:
    - { name: "clk", frequency_mhz: 100, description: "Main clock" }
  reset_scheme:
    signal: "rst_n"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

# SECTION 7: CDC Requirements
cdc_requirements:
  crossings:
    - { source: "gpio_i pins", dest: "clk domain", description: "External GPIO inputs — double-flop synchronize each bit" }
  synchronizers:
    - { type: "double_flop", signal: "gpio_i[GPIO_WIDTH-1:0]", depth: 2, description: "2-FF synchronizer chain per pin" }
  note: "Single clock domain — only external GPIO inputs cross clock boundary"

# SECTION 8: RDC Requirements
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"

# SECTION 9: Registers
registers:
  config:
    register_width: 32
    addr_width: 6
    byte_addressable: true
    num_registers: 9
  register_list:
    - name: "DATA_IN"
      offset: 0x00
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "data"
      description: "Input Data Register — reflects synchronized gpio_i pins"
      fields:
        - { name: "data_in",   bits: [15, 0],  access: "ro", reset: 0x0, description: "GPIO input pin state" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "DATA_OUT"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "data"
      description: "Output Data Register — drives gpio_o when DIR[n]=1"
      fields:
        - { name: "data_out",  bits: [15, 0],  access: "rw", reset: 0x0, description: "GPIO output value" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "DIR"
      offset: 0x08
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Direction Register — 1 = output, 0 = input"
      fields:
        - { name: "dir",       bits: [15, 0],  access: "rw", reset: 0x0, description: "Per-pin direction: 1=output" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "SET"
      offset: 0x0C
      width: 32
      access: "wo"
      reset: 0x00000000
      category: "control"
      description: "Set Register — write 1 to set DATA_OUT bits"
      fields:
        - { name: "set",       bits: [15, 0],  access: "wo", reset: 0x0, description: "Set bits: 1=set corresponding DATA_OUT[n]" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "CLR"
      offset: 0x10
      width: 32
      access: "wo"
      reset: 0x00000000
      category: "control"
      description: "Clear Register — write 1 to clear DATA_OUT bits"
      fields:
        - { name: "clr",       bits: [15, 0],  access: "wo", reset: 0x0, description: "Clear bits: 1=clear corresponding DATA_OUT[n]" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "TOGGLE"
      offset: 0x14
      width: 32
      access: "wo"
      reset: 0x00000000
      category: "control"
      description: "Toggle Register — write 1 to toggle DATA_OUT bits"
      fields:
        - { name: "toggle",    bits: [15, 0],  access: "wo", reset: 0x0, description: "Toggle bits: 1=toggle corresponding DATA_OUT[n]" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "IRQ_EN"
      offset: 0x18
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Enable Register — per-pin interrupt mask"
      fields:
        - { name: "irq_en",    bits: [15, 0],  access: "rw", reset: 0x0, description: "Per-pin interrupt enable" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "IRQ_TYPE"
      offset: 0x1C
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Type Register — edge/level selection per pin"
      fields:
        - { name: "irq_type",  bits: [15, 0],  access: "rw", reset: 0x0, description: "0=level-high, 1=edge-rising per pin" }
        - { name: "reserved",  bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "IRQ_STATUS"
      offset: 0x20
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Status Register — W1C per pin"
      fields:
        - { name: "irq_status", bits: [15, 0],  access: "rw", reset: 0x0, description: "Per-pin interrupt status (W1C)" }
        - { name: "reserved",   bits: [31, 16], access: "ro", reset: 0x0, description: "Reserved" }

# SECTION 10: Memory Requirements
memory:
  instances:
    - { name: "data_out_reg",  type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 0, description: "Output data register" }
    - { name: "dir_reg",       type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 0, description: "Direction control register" }
    - { name: "irq_en_reg",    type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 0, description: "IRQ enable mask" }
    - { name: "irq_type_reg",  type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 0, description: "IRQ type config" }
    - { name: "irq_status_reg",type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 0, description: "IRQ status W1C flags" }
    - { name: "gpio_sync_ff1", type: "register", depth: 1, width: 16, read_ports: 0, write_ports: 1, latency: 1, description: "First stage GPIO input synchronizer" }
    - { name: "gpio_sync_ff2", type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 1, description: "Second stage GPIO input synchronizer → DATA_IN" }
  note: "Register-based GPIO with dual-FF synchronizers on inputs"

# SECTION 11: Interrupt
interrupts:
  sources:
    - { name: "GPIO_PIN_0",  bit: 0,  type: "level", enable_reg: "IRQ_EN[0]",  status_reg: "IRQ_STATUS[0]",  clear: "W1C", description: "GPIO pin 0 interrupt" }
    - { name: "GPIO_PIN_1",  bit: 1,  type: "level", enable_reg: "IRQ_EN[1]",  status_reg: "IRQ_STATUS[1]",  clear: "W1C", description: "GPIO pin 1 interrupt" }
    - { name: "GPIO_PIN_2",  bit: 2,  type: "level", enable_reg: "IRQ_EN[2]",  status_reg: "IRQ_STATUS[2]",  clear: "W1C", description: "GPIO pin 2 interrupt" }
    - { name: "GPIO_PIN_3",  bit: 3,  type: "level", enable_reg: "IRQ_EN[3]",  status_reg: "IRQ_STATUS[3]",  clear: "W1C", description: "GPIO pin 3 interrupt" }
    - { name: "GPIO_PIN_4",  bit: 4,  type: "level", enable_reg: "IRQ_EN[4]",  status_reg: "IRQ_STATUS[4]",  clear: "W1C", description: "GPIO pin 4 interrupt" }
    - { name: "GPIO_PIN_5",  bit: 5,  type: "level", enable_reg: "IRQ_EN[5]",  status_reg: "IRQ_STATUS[5]",  clear: "W1C", description: "GPIO pin 5 interrupt" }
    - { name: "GPIO_PIN_6",  bit: 6,  type: "level", enable_reg: "IRQ_EN[6]",  status_reg: "IRQ_STATUS[6]",  clear: "W1C", description: "GPIO pin 6 interrupt" }
    - { name: "GPIO_PIN_7",  bit: 7,  type: "level", enable_reg: "IRQ_EN[7]",  status_reg: "IRQ_STATUS[7]",  clear: "W1C", description: "GPIO pin 7 interrupt" }
    - { name: "GPIO_PIN_8",  bit: 8,  type: "level", enable_reg: "IRQ_EN[8]",  status_reg: "IRQ_STATUS[8]",  clear: "W1C", description: "GPIO pin 8 interrupt" }
    - { name: "GPIO_PIN_9",  bit: 9,  type: "level", enable_reg: "IRQ_EN[9]",  status_reg: "IRQ_STATUS[9]",  clear: "W1C", description: "GPIO pin 9 interrupt" }
    - { name: "GPIO_PIN_10", bit: 10, type: "level", enable_reg: "IRQ_EN[10]", status_reg: "IRQ_STATUS[10]", clear: "W1C", description: "GPIO pin 10 interrupt" }
    - { name: "GPIO_PIN_11", bit: 11, type: "level", enable_reg: "IRQ_EN[11]", status_reg: "IRQ_STATUS[11]", clear: "W1C", description: "GPIO pin 11 interrupt" }
    - { name: "GPIO_PIN_12", bit: 12, type: "level", enable_reg: "IRQ_EN[12]", status_reg: "IRQ_STATUS[12]", clear: "W1C", description: "GPIO pin 12 interrupt" }
    - { name: "GPIO_PIN_13", bit: 13, type: "level", enable_reg: "IRQ_EN[13]", status_reg: "IRQ_STATUS[13]", clear: "W1C", description: "GPIO pin 13 interrupt" }
    - { name: "GPIO_PIN_14", bit: 14, type: "level", enable_reg: "IRQ_EN[14]", status_reg: "IRQ_STATUS[14]", clear: "W1C", description: "GPIO pin 14 interrupt" }
    - { name: "GPIO_PIN_15", bit: 15, type: "level", enable_reg: "IRQ_EN[15]", status_reg: "IRQ_STATUS[15]", clear: "W1C", description: "GPIO pin 15 interrupt" }
  output:
    signal: "irq"
    polarity: "active_high"
    type: "level"

# SECTION 12: FSM
fsm:
  core_level:
    states: []
    note: "No FSM — purely combinational/register-based control. GPIO core is stateless apart from registers."

# SECTION 13: Coding Rules
coding_rules:
  verilog_style: "verilog_2001"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk or negedge rst_n)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low asynchronous reset (rst_n)"
    - "Parameterize widths via GPIO_WIDTH, DBITS, ABITS"
    - "BANNED: package / interface / modport"
  lint_waivers:
    - "UNUSEDSIGNAL: pstrb in regs module (32-bit access)"
    - "WIDTHEXPAND: parameter-based widths"

# SECTION 14: Reuse Modules
reuse_modules: []

# SECTION 15: Custom Extensions
custom:
  note: "No custom extensions"

# SECTION 16: Dir Structure
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

# SECTION 17: Filelist
filelist:
  rtl:
    - "rtl/qa_visible_09182_regs.sv"
    - "rtl/qa_visible_09182_core.sv"
    - "rtl/qa_visible_09182_irq.sv"
    - "rtl/qa_visible_09182_wrapper.sv"
  sim:
    - "sim/tb_qa_visible_09182_top.sv"
    - "sim/tb_qa_visible_09182_program.sv"
  firmware:
    - "firmware/qa_visible_09182_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"

# SECTION 18: Test Requirements
test_requirements:
  scenarios:
    - { id: "SC1",  name: "APB CSR read/write",            expected: "All registers read back written values; reserved bits return 0" }
    - { id: "SC2",  name: "Direction control",              expected: "gpio_oe follows DIR; output disabled when DIR[n]=0" }
    - { id: "SC3",  name: "DATA_OUT direct write",          expected: "DATA_OUT reflects APB write when DIR=output" }
    - { id: "SC4",  name: "SET operation",                  expected: "Writing 1 to SET[n] sets corresponding DATA_OUT[n]" }
    - { id: "SC5",  name: "CLR operation",                  expected: "Writing 1 to CLR[n] clears corresponding DATA_OUT[n]" }
    - { id: "SC6",  name: "TOGGLE operation",               expected: "Writing 1 to TOGGLE[n] toggles corresponding DATA_OUT[n]" }
    - { id: "SC7",  name: "Input sampling",                 expected: "gpio_i transitions appear in DATA_IN after 2 cycles" }
    - { id: "SC8",  name: "Edge interrupt — rising",        expected: "IRQ_STATUS[n] set on rising edge of gpio_i[n]; irq asserted" }
    - { id: "SC9",  name: "Level interrupt",                expected: "IRQ_STATUS[n] follows gpio_i[n] level when IRQ_TYPE[n]=0" }
    - { id: "SC10", name: "IRQ enable mask",                expected: "irq only asserted when IRQ_EN[n]=1 for active status bits" }
    - { id: "SC11", name: "W1C clear",                      expected: "Writing 1 to IRQ_STATUS[n] clears that bit; irq de-asserted" }
    - { id: "SC12", name: "Concurrent SET/CLR/TOGGLE",      expected: "SET takes priority over CLR; both over TOGGLE when multiple bits" }
  scoreboard_checks: 10
  coverage_goals:
    functional: "All GPIO pins exercised in input and output mode"
    code: "line >= 90%, branch >= 85%"

# SECTION 19: Traceability
traceability:
  yaml_to_output:
    - { yaml: "top_module.name",               output: "ALL .sv files (module name)" }
    - { yaml: "parameters",                    output: "qa_visible_09182_wrapper.sv (localparam)" }
    - { yaml: "io_list.interfaces.apb_slave",  output: "qa_visible_09182_regs.sv + wrapper (port list)" }
    - { yaml: "io_list.interfaces.gpio",       output: "qa_visible_09182_wrapper.sv (port list)" }
    - { yaml: "io_list.interfaces.interrupt",  output: "qa_visible_09182_wrapper.sv (irq port)" }
    - { yaml: "registers.register_list",       output: "qa_visible_09182_regs.sv + firmware + docs" }
    - { yaml: "features",                      output: "qa_visible_09182_core.sv" }
    - { yaml: "interrupts",                    output: "qa_visible_09182_irq.sv" }
    - { yaml: "test_requirements.scenarios",   output: "sim/tb_qa_visible_09182_program.sv" }

# SECTION 20: Generation Flow
generation_flow:
  steps:
    - { name: "validate_ssot", command: "python3 -c 'import yaml; yaml.safe_load(open(\"qa_visible_09182/yaml/qa_visible_09182.ssot.yaml\")); print(\"PASS\")'", description: "YAML parse and schema sanity check" }
    - { name: "handoff_rtl",   command: "rtl-gen workflow", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb",    command: "tb-gen workflow",  description: "Downstream testbench generation from validated SSOT" }
    - { name: "handoff_sim",   command: "sim workflow",     description: "Downstream simulation after RTL and TB exist" }
