# =============================================================================
# SSOT — demo_i2c_ui4 — APB4 I2C Master Controller
# =============================================================================

# SECTION 0: Top Module Identity
top_module:
  name: "demo_i2c_ui4"
  version: "1.0"
  type: "peripheral"
  description: "APB4-controlled I2C master controller for firmware-driven byte transfers on SCL/SDA"
  reference_spec: "I2C-bus specification v2.1 + custom APB4 integration"
  target:
    technology: "generic"
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null

# SECTION 1: Sub-Module List (Hierarchy)
sub_modules:
  - { name: "demo_i2c_ui4_regs",      file: "rtl/demo_i2c_ui4_regs.sv",      ownership: "manifest", ssot_gen: true,  description: "APB4 register block and decode" }
  - { name: "demo_i2c_ui4_bit_ctrl",   file: "rtl/demo_i2c_ui4_bit_ctrl.sv",   ownership: "manifest", ssot_gen: true,  description: "SCL/SDA bit-level timing and I/O" }
  - { name: "demo_i2c_ui4_byte_ctrl",  file: "rtl/demo_i2c_ui4_byte_ctrl.sv",  ownership: "manifest", ssot_gen: true,  description: "Byte-level I2C transaction FSM" }
  - { name: "demo_i2c_ui4_fifo",       file: "rtl/demo_i2c_ui4_fifo.sv",       ownership: "manifest", ssot_gen: true,  description: "TX/RX data FIFO" }
  - { name: "demo_i2c_ui4_core",       file: "rtl/demo_i2c_ui4_core.sv",       ownership: "manifest", ssot_gen: false, description: "Core I2C master control (LLM-written)" }
  - { name: "demo_i2c_ui4_wrapper",    file: "rtl/demo_i2c_ui4_wrapper.sv",    ownership: "manifest", ssot_gen: true,  description: "Top-level integration wrapper" }

# SECTION 2: Parameters
parameters:
  - { name: "DBITS",            default: 32, type: int, description: "Data width in bits",                           drives: ["demo_i2c_ui4_regs.sv", "demo_i2c_ui4_wrapper.sv"] }
  - { name: "ABITS",            default: 6,  type: int, description: "APB address width (64 byte window)",          drives: ["demo_i2c_ui4_regs.sv", "demo_i2c_ui4_wrapper.sv"] }
  - { name: "FIFO_DEPTH",       default: 8,  type: int, description: "TX/RX FIFO depth in entries",                 drives: ["demo_i2c_ui4_fifo.sv"] }
  - { name: "PRESCALE_WIDTH",   default: 16, type: int, description: "Width of clock prescaler",                    drives: ["demo_i2c_ui4_bit_ctrl.sv", "demo_i2c_ui4_core.sv"] }
  - { name: "DEFAULT_PRESCALE", default: 250, type: int, description: "Default prescaler value (100 MHz → 100 kHz SCL)", drives: ["demo_i2c_ui4_core.sv"] }
  - { name: "RESET_POLARITY",   default: "active_low", type: enum, values: ["active_low", "active_high"],         description: "Reset polarity",                                 drives: ["ALL .sv files"] }

# SECTION 3: IO List (Ports)
io_list:
  clock_domains:
    - name: "clk"
      frequency_mhz: 100
      description: "Main clock"
      ports:
        - { name: "clk", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "rst_n"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Active-low asynchronous reset"
      ports:
        - { name: "rst_n", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      description: "Register access interface"
      ports:
        - { name: "paddr",   width: 6,  direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB byte strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }
    - name: "i2c_bus"
      type: "I2C"
      role: "master"
      description: "I2C bus interface (open-drain capable)"
      ports:
        - { name: "scl",    width: 1, direction: "output", description: "Serial clock line" }
        - { name: "scl_i",  width: 1, direction: "input",  description: "SCL input sense (for clock stretching)" }
        - { name: "sda",    width: 1, direction: "output", description: "Serial data line" }
        - { name: "sda_i",  width: 1, direction: "input",  description: "SDA input sense" }
    - name: "interrupt"
      type: "custom"
      description: "Interrupt output"
      ports:
        - { name: "irq", width: 1, direction: "output", description: "Combined interrupt (active-high level)" }

# SECTION 4: Main Features
features:
  - name: "I2C master START/STOP generation"
    trigger: "CTRL[start]=1 or CTRL[stop]=1"
    datapath: "bit_ctrl generates SCL/SDA timing per I2C spec"
    control: "byte_ctrl FSM sequences start → address → data → stop"
    output: "START and STOP conditions on SCL/SDA bus"
  - name: "APB4 firmware-driven I2C byte transfer"
    trigger: "APB write to DATA register while CTRL[enable]=1"
    datapath: "DATA register → TX FIFO → byte_ctrl → bit_ctrl → SDA; RX: SDA → bit_ctrl → byte_ctrl → RX FIFO → DATA"
    control: "byte_ctrl handles ACK/NACK, bit_ctrl handles bit timing with prescaler"
    output: "Byte transmitted/received on I2C bus"
  - name: "Arbitration and ACK error detection"
    trigger: "ACK bit not driven low by slave, or SDA level mismatch"
    datapath: "sda_i input monitored during ACK bit; arbitration lost detected when sda_i != sda during master transmit"
    control: "STATUS[ack_err] or STATUS[arb_lost] set; irq asserted if CTRL[irq_en]=1"
    output: "STATUS register flags and irq"
  - name: "Interrupt generation and W1C clear"
    trigger: "Transfer done, ACK error, or arbitration lost"
    datapath: "STATUS bits set by hardware; irq combinatorial OR of STATUS[irq_enabled_bits]"
    control: "irq asserted; firmware writes 1 to IRQ_STATUS to clear"
    output: "irq output; STATUS and IRQ_STATUS registers"

# SECTION 5: Data Flow
dataflow:
  tx_path:
    source: "APB write to DATA[7:0]"
    buffer: "8-entry TX FIFO"
    sequence: "APB write → TX FIFO → byte_ctrl load → bit_ctrl shift out → SDA"
  rx_path:
    source: "SDA pin (via sda_i)"
    buffer: "8-entry RX FIFO"
    sequence: "SDA → bit_ctrl shift in → byte_ctrl store → RX FIFO → APB read from DATA[7:0]"
  tx_rx_handshake:
    ACK: "After 8 bits, master releases SDA; slave drives ACK (0) or NACK (1) on 9th bit"
    NACK: "byte_ctrl sets STATUS[ack_err], aborts transaction"
  prescaler:
    source: "PRESCALE register (16-bit)"
    divider: "clk / (PRESCALE × 4) = SCL frequency"
    example: "PRESCALE=250 → 100 MHz / 1000 = 100 kHz SCL"

# SECTION 6: Clock & Reset Domain
clock_reset_domains:
  domains:
    - { name: "clk", frequency_mhz: 100, description: "Main clock" }
  reset_scheme:
    signal: "rst_n"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

# SECTION 7: CDC Requirements
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"

# SECTION 8: RDC Requirements
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"

# SECTION 9: Registers
registers:
  config:
    register_width: 32
    addr_width: 6
    byte_addressable: true
    num_registers: 6
  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register"
      fields:
        - { name: "enable",   bits: [0, 0],  access: "rw", reset: 0x0, description: "I2C controller enable" }
        - { name: "start",    bits: [1, 1],  access: "wo", reset: 0x0, description: "Generate START condition" }
        - { name: "stop",     bits: [2, 2],  access: "wo", reset: 0x0, description: "Generate STOP condition" }
        - { name: "irq_en",   bits: [3, 3],  access: "rw", reset: 0x0, description: "Interrupt enable" }
        - { name: "reserved", bits: [31, 4], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "STATUS"
      offset: 0x04
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status Register (read-only; clear via IRQ_STATUS W1C)"
      fields:
        - { name: "busy",     bits: [0, 0],  access: "ro", reset: 0x0, description: "Transfer in progress" }
        - { name: "done",     bits: [1, 1],  access: "ro", reset: 0x0, description: "Transfer complete" }
        - { name: "ack_err",  bits: [2, 2],  access: "ro", reset: 0x0, description: "ACK error (no ACK received)" }
        - { name: "arb_lost", bits: [3, 3],  access: "ro", reset: 0x0, description: "Arbitration lost" }
        - { name: "reserved", bits: [31, 4], access: "ro", reset: 0x0, description: "Reserved" }
    - name: "DATA"
      offset: 0x08
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "data"
      description: "Data Register — write for TX, read for RX"
      fields:
        - { name: "data",     bits: [7, 0],  access: "rw", reset: 0x00, description: "TX/RX byte" }
        - { name: "reserved", bits: [31, 8], access: "ro", reset: 0x0,  description: "Reserved" }
    - name: "ADDR"
      offset: 0x0C
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Address Register — 7-bit I2C slave address"
      fields:
        - { name: "addr",     bits: [6, 0],  access: "rw", reset: 0x00, description: "7-bit slave address" }
        - { name: "reserved", bits: [31, 7], access: "ro", reset: 0x0,  description: "Reserved" }
    - name: "PRESCALE"
      offset: 0x10
      width: 32
      access: "rw"
      reset: 0x000000FA
      category: "control"
      description: "Prescale Register — SCL clock divider"
      fields:
        - { name: "prescale", bits: [15, 0],  access: "rw", reset: 250,   description: "Clock divider value" }
        - { name: "reserved", bits: [31, 16], access: "ro", reset: 0x0,    description: "Reserved" }
    - name: "IRQ_STATUS"
      offset: 0x14
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Interrupt Status Register — W1C to clear irq"
      fields:
        - { name: "irq_done",     bits: [0, 0],  access: "rw", reset: 0x0, description: "Transfer done IRQ (W1C)" }
        - { name: "irq_ack_err",  bits: [1, 1],  access: "rw", reset: 0x0, description: "ACK error IRQ (W1C)" }
        - { name: "irq_arb_lost", bits: [2, 2],  access: "rw", reset: 0x0, description: "Arbitration lost IRQ (W1C)" }
        - { name: "reserved",     bits: [31, 3], access: "ro", reset: 0x0, description: "Reserved" }

# SECTION 10: Memory Requirements
memory:
  instances:
    - { name: "tx_fifo",   type: "fifo",   depth: 8, width: 8, read_ports: 1, write_ports: 1, latency: 0, description: "TX data FIFO" }
    - { name: "rx_fifo",   type: "fifo",   depth: 8, width: 8, read_ports: 1, write_ports: 1, latency: 0, description: "RX data FIFO" }
    - { name: "ctrl_reg",  type: "register", depth: 1, width: 4,  read_ports: 1, write_ports: 1, latency: 0, description: "Control bits (enable, start, stop, irq_en)" }
    - { name: "status_reg",type: "register", depth: 1, width: 4,  read_ports: 1, write_ports: 0, latency: 0, description: "Status flags (busy, done, ack_err, arb_lost)" }
    - { name: "irq_status_reg", type: "register", depth: 1, width: 3, read_ports: 1, write_ports: 1, latency: 0, description: "IRQ status W1C bits" }
    - { name: "prescale_reg", type: "register", depth: 1, width: 16, read_ports: 1, write_ports: 1, latency: 0, description: "Prescale divider value" }
  note: "8-entry TX/RX FIFOs for data buffering; pure register otherwise"

# SECTION 11: Interrupt
interrupts:
  sources:
    - { name: "I2C_DONE",     bit: 0, type: "level", enable_reg: "CTRL[3]", status_reg: "IRQ_STATUS[0]", clear: "W1C", description: "Transfer done interrupt" }
    - { name: "I2C_ACK_ERR",  bit: 1, type: "level", enable_reg: "CTRL[3]", status_reg: "IRQ_STATUS[1]", clear: "W1C", description: "Acknowledge error interrupt" }
    - { name: "I2C_ARB_LOST", bit: 2, type: "level", enable_reg: "CTRL[3]", status_reg: "IRQ_STATUS[2]", clear: "W1C", description: "Arbitration lost interrupt" }
  output:
    signal: "irq"
    polarity: "active_high"
    type: "level"

# SECTION 12: FSM
fsm:
  byte_ctrl_fsm:
    states:
      - "IDLE"
      - "START"
      - "ADDR"
      - "DATA_TX"
      - "DATA_RX"
      - "ACK_CHECK"
      - "STOP"
    transitions:
      - { from: "IDLE",      to: "START",     condition: "CTRL[start]=1" }
      - { from: "START",     to: "ADDR",      condition: "START condition generated" }
      - { from: "ADDR",      to: "DATA_TX",   condition: "ADDR sent, ACK received, write transfer" }
      - { from: "ADDR",      to: "DATA_RX",   condition: "ADDR sent, ACK received, read transfer" }
      - { from: "DATA_TX",   to: "DATA_RX",   condition: "Byte sent, ACK received, more data" }
      - { from: "DATA_RX",   to: "DATA_TX",   condition: "Byte received, ACK sent, more data" }
      - { from: "DATA_TX",   to: "STOP",      condition: "Byte sent, last byte" }
      - { from: "DATA_RX",   to: "STOP",      condition: "Byte received, NACK sent" }
      - { from: "ADDR",      to: "STOP",      condition: "ACK error or arbitration lost" }
      - { from: "STOP",      to: "IDLE",      condition: "STOP generated or error abort" }
  bit_ctrl_fsm:
    states:
      - "IDLE"
      - "SCL_LOW"
      - "SCL_HIGH"
    note: "Controls SCL/SDA with prescaler-based timing. SCL_LOW/SDA drive, SCL_HIGH sample point."

# SECTION 13: Coding Rules
coding_rules:
  verilog_style: "verilog_2001"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk or negedge rst_n)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low asynchronous reset (rst_n)"
    - "Parameterize widths via DBITS, ABITS, FIFO_DEPTH, PRESCALE_WIDTH"
    - "BANNED: package / interface / modport"
  lint_waivers:
    - "UNUSEDSIGNAL: pstrb in regs module (32-bit access only)"
    - "WIDTHEXPAND: parameter-based widths"
    - "UNUSEDSIGNAL: pslverr tied to 0"

# SECTION 14: Reuse Modules
reuse_modules: []

# SECTION 15: Custom Extensions
custom:
  note: "No custom extensions"

# SECTION 16: Dir Structure
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

# SECTION 17: Filelist
filelist:
  rtl:
    - "rtl/demo_i2c_ui4_regs.sv"
    - "rtl/demo_i2c_ui4_bit_ctrl.sv"
    - "rtl/demo_i2c_ui4_byte_ctrl.sv"
    - "rtl/demo_i2c_ui4_fifo.sv"
    - "rtl/demo_i2c_ui4_core.sv"
    - "rtl/demo_i2c_ui4_wrapper.sv"
  sim:
    - "sim/tb_demo_i2c_ui4_top.sv"
    - "sim/tb_demo_i2c_ui4_program.sv"
    - "sim/tb_demo_i2c_ui4_i2c_mem.sv"
  firmware:
    - "firmware/demo_i2c_ui4_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/fsm_diagram.md"
    - "docs/README.md"

# SECTION 18: Test Requirements
test_requirements:
  scenarios:
    - { id: "SC1",  name: "APB CSR read/write",         expected: "All registers read back written values; reserved bits return 0" }
    - { id: "SC2",  name: "START condition generation",  expected: "START sequence on SCL/SDA when CTRL[start]=1" }
    - { id: "SC3",  name: "STOP condition generation",   expected: "STOP sequence on SCL/SDA when CTRL[stop]=1" }
    - { id: "SC4",  name: "Byte transmit with ACK",      expected: "8 data bits + ACK from slave; STATUS[done]=1" }
    - { id: "SC5",  name: "Byte receive with ACK",       expected: "8 data bits received; ACK sent to slave; DATA populated" }
    - { id: "SC6",  name: "NACK error detection",        expected: "STATUS[ack_err]=1 on NACK; irq asserted" }
    - { id: "SC7",  name: "Arbitration lost detection",  expected: "STATUS[arb_lost]=1; irq asserted" }
    - { id: "SC8",  name: "IRQ W1C clear",               expected: "irq de-asserted after writing 1 to IRQ_STATUS corresponding bits" }
    - { id: "SC9",  name: "Clock stretching handshake",  expected: "bit_ctrl holds SCL low until scl_i driven high by slave" }
    - { id: "SC10", name: "FIFO TX multiple bytes",      expected: "N bytes written to DATA transmitted in sequence without APB stalls" }
  scoreboard_checks: 8
  coverage_goals:
    functional: "All byte_ctrl FSM states visited; all interrupt conditions triggered"
    code: "line >= 90%, branch >= 85%"

# SECTION 19: Traceability
traceability:
  yaml_to_output:
    - { yaml: "top_module.name",               output: "ALL .sv files (module name)" }
    - { yaml: "parameters",                    output: "demo_i2c_ui4_wrapper.sv (localparam)" }
    - { yaml: "io_list.interfaces.apb_slave",  output: "demo_i2c_ui4_wrapper.sv (port list)" }
    - { yaml: "io_list.interfaces.i2c_bus",    output: "demo_i2c_ui4_wrapper.sv (port list)" }
    - { yaml: "io_list.interfaces.interrupt",  output: "demo_i2c_ui4_wrapper.sv (irq port)" }
    - { yaml: "registers.register_list",       output: "demo_i2c_ui4_regs.sv + firmware + docs" }
    - { yaml: "fsm.byte_ctrl_fsm",             output: "demo_i2c_ui4_core.sv + docs/fsm_diagram.md" }
    - { yaml: "test_requirements.scenarios",   output: "sim/tb_demo_i2c_ui4_program.sv" }

# SECTION 20: Generation Flow
generation_flow:
  steps:
    - { name: "validate_ssot", command: "python3 -c 'import yaml; yaml.safe_load(open(\"demo_i2c_ui4/yaml/demo_i2c_ui4.ssot.yaml\")); print(\"PASS\")'", description: "YAML parse and schema sanity check" }
    - { name: "handoff_rtl",   command: "rtl-gen workflow", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb",    command: "tb-gen workflow",  description: "Downstream testbench generation from validated SSOT" }
    - { name: "handoff_sim",   command: "sim workflow",     description: "Downstream simulation after RTL and TB exist" }
