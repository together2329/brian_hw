ssot_version: "0.2.0"
ip: dma_e2e_smoke

top_module:
  name: dma_e2e_smoke
  file: rtl/dma_e2e_smoke.sv
  version: "1.0.0"
  type: rtl
  description: >
    Minimal DMA engine for end-to-end smoke testing. Supports single-channel
    memory-to-memory copy with fixed-length burst transfers over AXI4-Lite
    control and AXI4 master data paths. Intended as a verification vehicle,
    not a production DMA controller.
  target:
    technology: generic
    freq_mhz: 100
    reset: synchronous_active_low

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
parameters:
  - name: ADDR_WIDTH
    type: integer
    default: 32
    description: "Bit-width of address buses (AXI AR/AW)"
    min: 16
    max: 64
  - name: DATA_WIDTH
    type: integer
    default: 32
    description: "Bit-width of data buses (AXI R/W)"
    min: 32
    max: 128
  - name: BURST_LEN
    type: integer
    default: 16
    description: "Maximum number of beats per AXI burst (1-256)"
    min: 1
    max: 256
  - name: MAX_TRANSFER_BYTES
    type: integer
    default: 4096
    description: "Maximum single DMA transfer size in bytes"

# ---------------------------------------------------------------------------
# IO List
# ---------------------------------------------------------------------------
io_list:
  # Clock & Reset
  - name: clk
    direction: input
    width: 1
    description: "System clock"
  - name: rst_n
    direction: input
    width: 1
    description: "Active-low synchronous reset"

  # AXI4-Lite Slave — CSR access
  - name: s_axil_awaddr
    direction: input
    width: ADDR_WIDTH
    protocol: axi4_lite
    role: slave
    handshake: valid/ready
    description: "AXI4-Lite write address"
  - name: s_axil_awvalid
    direction: input
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_awready
    direction: output
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_wdata
    direction: input
    width: DATA_WIDTH
    protocol: axi4_lite
    role: slave
  - name: s_axil_wstrb
    direction: input
    width: "{{ DATA_WIDTH / 8 }}"
    protocol: axi4_lite
    role: slave
  - name: s_axil_wvalid
    direction: input
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_wready
    direction: output
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_bresp
    direction: output
    width: 2
    protocol: axi4_lite
    role: slave
  - name: s_axil_bvalid
    direction: output
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_bready
    direction: input
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_araddr
    direction: input
    width: ADDR_WIDTH
    protocol: axi4_lite
    role: slave
    handshake: valid/ready
    description: "AXI4-Lite read address"
  - name: s_axil_arvalid
    direction: input
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_arready
    direction: output
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_rdata
    direction: output
    width: DATA_WIDTH
    protocol: axi4_lite
    role: slave
  - name: s_axil_rresp
    direction: output
    width: 2
    protocol: axi4_lite
    role: slave
  - name: s_axil_rvalid
    direction: output
    width: 1
    protocol: axi4_lite
    role: slave
  - name: s_axil_rready
    direction: input
    width: 1
    protocol: axi4_lite
    role: slave

  # AXI4 Master — DMA read (AR channel)
  - name: m_axi_araddr
    direction: output
    width: ADDR_WIDTH
    protocol: axi4
    role: master
    handshake: valid/ready
    description: "AXI4 read address for DMA source"
  - name: m_axi_arlen
    direction: output
    width: 8
    protocol: axi4
    role: master
    description: "AXI4 burst length minus 1"
  - name: m_axi_arsize
    direction: output
    width: 3
    protocol: axi4
    role: master
    description: "AXI4 transfer size encoding"
  - name: m_axi_arburst
    direction: output
    width: 2
    protocol: axi4
    role: master
    description: "AXI4 burst type (01=INCR)"
  - name: m_axi_arvalid
    direction: output
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_arready
    direction: input
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_rdata
    direction: input
    width: DATA_WIDTH
    protocol: axi4
    role: master
    description: "AXI4 read data from source"
  - name: m_axi_rlast
    direction: input
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_rvalid
    direction: input
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_rready
    direction: output
    width: 1
    protocol: axi4
    role: master

  # AXI4 Master — DMA write (AW + W channels)
  - name: m_axi_awaddr
    direction: output
    width: ADDR_WIDTH
    protocol: axi4
    role: master
    handshake: valid/ready
    description: "AXI4 write address for DMA destination"
  - name: m_axi_awlen
    direction: output
    width: 8
    protocol: axi4
    role: master
    description: "AXI4 burst length minus 1"
  - name: m_axi_awsize
    direction: output
    width: 3
    protocol: axi4
    role: master
    description: "AXI4 transfer size encoding"
  - name: m_axi_awburst
    direction: output
    width: 2
    protocol: axi4
    role: master
    description: "AXI4 burst type (01=INCR)"
  - name: m_axi_awvalid
    direction: output
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_awready
    direction: input
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_wdata
    direction: output
    width: DATA_WIDTH
    protocol: axi4
    role: master
    description: "AXI4 write data to destination"
  - name: m_axi_wstrb
    direction: output
    width: "{{ DATA_WIDTH / 8 }}"
    protocol: axi4
    role: master
  - name: m_axi_wlast
    direction: output
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_wvalid
    direction: output
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_wready
    direction: input
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_bresp
    direction: input
    width: 2
    protocol: axi4
    role: master
  - name: m_axi_bvalid
    direction: input
    width: 1
    protocol: axi4
    role: master
  - name: m_axi_bready
    direction: output
    width: 1
    protocol: axi4
    role: master

  # Interrupt
  - name: irq
    direction: output
    width: 1
    description: "Interrupt asserted on DMA completion or error"

# ---------------------------------------------------------------------------
# Features
# ---------------------------------------------------------------------------
features:
  - id: F_SINGLE_CHAN_COPY
    description: "Single-channel memory-to-memory copy"
    priority: high
  - id: F_AXI4_MASTER
    description: "AXI4 INCR burst master for read and write"
    priority: high
  - id: F_AXI4L_SLAVE
    description: "AXI4-Lite slave for CSR programming"
    priority: high
  - id: F_FIXED_BURST
    description: "Configurable fixed-length INCR bursts"
    priority: medium
  - id: F_IRQ_DONE
    description: "Interrupt on transfer done"
    priority: high
  - id: F_IRQ_ERROR
    description: "Interrupt on AXI slave error response"
    priority: high
  - id: F_STATUS_POLL
    description: "Status register polling for software-driven flow"
    priority: medium

# ---------------------------------------------------------------------------
# Sub-modules
# ---------------------------------------------------------------------------
sub_modules:
  - name: csr_block
    description: "AXI4-Lite CSR decode and register file"
    implements: F_AXI4L_SLAVE
    function_model_refs: [CSR_READ, CSR_WRITE]
    register_refs: [REG_SRC_ADDR, REG_DST_ADDR, REG_XFER_LEN, REG_CTRL, REG_STATUS, REG_INT_STATUS]
    file: rtl/dma_e2e_smoke.sv  # inline for smoke IP
    ownership: embedded

  - name: axi_rd_master
    description: "AXI4 read master FSM — issues AR bursts from source address"
    implements: F_AXI4_MASTER
    function_model_refs: [DMA_READ_BURST]
    dataflow_refs: [DF_READ_BURST]
    fsm_refs: [FSM_RD_MASTER]
    file: rtl/dma_e2e_smoke.sv
    ownership: embedded

  - name: axi_wr_master
    description: "AXI4 write master FSM — issues AW+W bursts to destination"
    implements: F_AXI4_MASTER
    function_model_refs: [DMA_WRITE_BURST]
    dataflow_refs: [DF_WRITE_BURST]
    fsm_refs: [FSM_WR_MASTER]
    file: rtl/dma_e2e_smoke.sv
    ownership: embedded

  - name: dma_ctrl_fsm
    description: "Top-level DMA control FSM — orchestrates read/write phases"
    implements: F_SINGLE_CHAN_COPY
    function_model_refs: [DMA_START, DMA_DONE, DMA_ERROR]
    fsm_refs: [FSM_DMA_CTRL]
    cycle_model_refs: [CYCLE_DMA_XFER]
    file: rtl/dma_e2e_smoke.sv
    ownership: embedded

# ---------------------------------------------------------------------------
# Dataflow
# ---------------------------------------------------------------------------
dataflow:
  - id: DF_READ_BURST
    description: "Data path from memory source through AXI read channel into internal FIFO/buffer"
    producer: axi_rd_master
    consumer: axi_wr_master
    width: DATA_WIDTH
    depth_beats: BURST_LEN
    backpressure: "m_axi_rready gated by internal buffer availability; m_axi_wready downstream"

  - id: DF_WRITE_BURST
    description: "Data path from internal buffer through AXI write channel to memory destination"
    producer: axi_rd_master
    consumer: axi_wr_master
    width: DATA_WIDTH
    depth_beats: BURST_LEN
    backpressure: "m_axi_wready from interconnect"

# ---------------------------------------------------------------------------
# Function Model — machine-readable transactions
# ---------------------------------------------------------------------------
function_model:
  reset_behavior:
    description: "All registers cleared, FSMs to IDLE, AXI valid signals deasserted, irq=0"
    state_updates:
      - state: fsm_dma_ctrl
        value: IDLE
        expr: "1'b1"
        width: 1
      - state: irq
        value: "0"
        expr: "1'b0"
        width: 1

  transactions:
    - id: CSR_READ
      description: "CPU reads a CSR register via AXI4-Lite"
      trigger: "s_axil_arvalid && s_axil_arready"
      output_rules:
        - port: s_axil_rdata
          expr: "csr_reg[s_axil_araddr[7:2]]"
          width: DATA_WIDTH
        - port: s_axil_rresp
          expr: "2'b00"
          width: 2
        - port: s_axil_rvalid
          expr: "1'b1"
          width: 1

    - id: CSR_WRITE
      description: "CPU writes a CSR register via AXI4-Lite"
      trigger: "s_axil_awvalid && s_axil_awready && s_axil_wvalid && s_axil_wready"
      state_updates:
        - port: csr_reg[s_axil_awaddr[7:2]]
          expr: "s_axil_wdata"
          width: DATA_WIDTH
      output_rules:
        - port: s_axil_bresp
          expr: "2'b00"
          width: 2
        - port: s_axil_bvalid
          expr: "1'b1"
          width: 1

    - id: DMA_START
      description: "Software writes CTRL.start=1 to kick off a DMA transfer"
      trigger: "csr_write_to_CTRL && wdata[0] == 1"
      precondition: "fsm_dma_ctrl == IDLE && status.busy == 0"
      state_updates:
        - state: fsm_dma_ctrl
          value: READ_PHASE
          expr: "fsm_dma_ctrl == IDLE"
          width: 3
        - state: status.busy
          value: "1"
          expr: "1'b1"
          width: 1

    - id: DMA_READ_BURST
      description: "AXI read master issues burst from src_addr, counts down remaining bytes"
      trigger: "fsm_dma_ctrl == READ_PHASE && m_axi_arready"
      state_updates:
        - state: bytes_remaining
          expr: "bytes_remaining - (BURST_LEN * DATA_WIDTH/8)"
          width: "{{ MAX_TRANSFER_BYTES > 255 ? $clog2(MAX_TRANSFER_BYTES+1) : 8 }}"
        - state: src_addr
          expr: "src_addr + (BURST_LEN * DATA_WIDTH/8)"
          width: ADDR_WIDTH
      output_rules:
        - port: m_axi_arvalid
          expr: "1'b1"
          width: 1
        - port: m_axi_araddr
          expr: "src_addr"
          width: ADDR_WIDTH
        - port: m_axi_arlen
          expr: "min(BURST_LEN-1, bytes_remaining/(DATA_WIDTH/8) - 1)"
          width: 8

    - id: DMA_WRITE_BURST
      description: "AXI write master pushes data to dst_addr, beats tracked by wlast"
      trigger: "fsm_dma_ctrl == WRITE_PHASE && m_axi_awready"
      state_updates:
        - state: dst_addr
          expr: "dst_addr + (BURST_LEN * DATA_WIDTH/8)"
          width: ADDR_WIDTH
      output_rules:
        - port: m_axi_awvalid
          expr: "1'b1"
          width: 1
        - port: m_axi_awaddr
          expr: "dst_addr"
          width: ADDR_WIDTH
        - port: m_axi_awlen
          expr: "min(BURST_LEN-1, bytes_remaining/(DATA_WIDTH/8) - 1)"
          width: 8

    - id: DMA_DONE
      description: "All bytes transferred successfully"
      trigger: "bytes_remaining == 0 && b_channel_complete"
      state_updates:
        - state: fsm_dma_ctrl
          value: IDLE
          expr: "bytes_remaining == 0"
          width: 3
        - state: status.busy
          value: "0"
          expr: "1'b0"
          width: 1
        - state: status.done
          value: "1"
          expr: "1'b1"
          width: 1
        - state: int_status.done
          value: "1"
          expr: "1'b1"
          width: 1
      output_rules:
        - port: irq
          expr: "int_enable.done ? 1'b1 : 1'b0"
          width: 1

    - id: DMA_ERROR
      description: "AXI slave error (RESP != OKAY) on read or write"
      trigger: "(m_axi_rvalid && m_axi_rresp[1]) || (m_axi_bvalid && m_axi_bresp[1])"
      state_updates:
        - state: fsm_dma_ctrl
          value: IDLE
          expr: "1'b1"
          width: 3
        - state: status.busy
          value: "0"
          expr: "1'b0"
          width: 1
        - state: status.error
          value: "1"
          expr: "1'b1"
          width: 1
        - state: int_status.error
          value: "1"
          expr: "1'b1"
          width: 1
      output_rules:
        - port: irq
          expr: "int_enable.error ? 1'b1 : 1'b0"
          width: 1

# ---------------------------------------------------------------------------
# Cycle Model
# ---------------------------------------------------------------------------
cycle_model:
  - id: CYCLE_DMA_XFER
    description: "Latency model for a single DMA transfer of N bytes"
    phases:
      - name: CSR_SETUP
        cycles: "3-5"
        description: "Software writes SRC_ADDR, DST_ADDR, XFER_LEN, CTRL"
      - name: READ_BURST
        cycles: "ceil(N / (BURST_LEN * DATA_WIDTH/8)) * (2 + BURST_LEN)"
        description: "Address phase + data phase per burst, pipelined"
      - name: WRITE_BURST
        cycles: "ceil(N / (BURST_LEN * DATA_WIDTH/8)) * (2 + BURST_LEN)"
        description: "Overlapped with read when buffer available; worst-case sequential"
      - name: COMPLETION
        cycles: 2
        description: "B-channel response + IRQ assertion"
    total_best_case: "3 + 2*ceil(N/BL/DW)*BL + 2"
    notes: "Read and write bursts can be pipelined for throughput; smoke model assumes sequential worst case."

# ---------------------------------------------------------------------------
# Registers
# ---------------------------------------------------------------------------
registers:
  - name: REG_SRC_ADDR
    offset: "0x00"
    width: DATA_WIDTH
    access: rw
    reset: "0"
    description: "Source address for DMA read"
    fields:
      - name: addr
        msb: ADDR_WIDTH-1
        lsb: 0
        description: "Source byte address"
  - name: REG_DST_ADDR
    offset: "0x04"
    width: DATA_WIDTH
    access: rw
    reset: "0"
    description: "Destination address for DMA write"
    fields:
      - name: addr
        msb: ADDR_WIDTH-1
        lsb: 0
        description: "Destination byte address"
  - name: REG_XFER_LEN
    offset: "0x08"
    width: DATA_WIDTH
    access: rw
    reset: "0"
    description: "Transfer length in bytes"
    fields:
      - name: len_bytes
        msb: DATA_WIDTH-1
        lsb: 0
        description: "Number of bytes to transfer"
  - name: REG_CTRL
    offset: "0x0C"
    width: DATA_WIDTH
    access: rw
    reset: "0"
    description: "Control register"
    fields:
      - name: start
        msb: 0
        lsb: 0
        description: "Write 1 to start transfer (auto-clear)"
      - name: int_enable_done
        msb: 1
        lsb: 1
        description: "Enable interrupt on transfer done"
      - name: int_enable_error
        msb: 2
        lsb: 2
        description: "Enable interrupt on error"
  - name: REG_STATUS
    offset: "0x10"
    width: DATA_WIDTH
    access: ro
    reset: "0"
    description: "Status register (read-only)"
    fields:
      - name: busy
        msb: 0
        lsb: 0
        description: "DMA transfer in progress"
      - name: done
        msb: 1
        lsb: 1
        description: "Last transfer completed successfully"
      - name: error
        msb: 2
        lsb: 2
        description: "Last transfer completed with error"
  - name: REG_INT_STATUS
    offset: "0x14"
    width: DATA_WIDTH
    access: rw1c
    reset: "0"
    description: "Interrupt status (write-1-to-clear)"
    fields:
      - name: done
        msb: 0
        lsb: 0
        description: "Transfer done interrupt pending"
      - name: error
        msb: 1
        lsb: 1
        description: "Transfer error interrupt pending"

# ---------------------------------------------------------------------------
# Interrupts
# ---------------------------------------------------------------------------
interrupts:
  - name: irq
    port: irq
    description: "Combined interrupt line for DMA completion or error"
    behavior: level
    active: high
    clear: "Write-1-to-clear REG_INT_STATUS"
    sources:
      - int_status.done
      - int_status.error

# ---------------------------------------------------------------------------
# FSM
# ---------------------------------------------------------------------------
fsm:
  - id: FSM_DMA_CTRL
    description: "Top-level DMA control FSM"
    states:
      - name: IDLE
        code: "3'b000"
        description: "Waiting for start command"
      - name: READ_PHASE
        code: "3'b001"
        description: "Issuing AXI read bursts from source"
      - name: WRITE_PHASE
        code: "3'b010"
        description: "Issuing AXI write bursts to destination"
      - name: WAIT_RESP
        code: "3'b011"
        description: "Waiting for final B-channel response"
      - name: DONE
        code: "3'b100"
        description: "Transfer complete, IRQ asserted"
    transitions:
      - from: IDLE
        to: READ_PHASE
        condition: "CTRL.start == 1 && status.busy == 0"
      - from: READ_PHASE
        to: WRITE_PHASE
        condition: "read_burst_complete"
      - from: WRITE_PHASE
        to: WAIT_RESP
        condition: "all_data_written && bytes_remaining == 0"
      - from: WRITE_PHASE
        to: READ_PHASE
        condition: "all_data_written && bytes_remaining > 0"
      - from: WAIT_RESP
        to: DONE
        condition: "m_axi_bvalid"
      - from: DONE
        to: IDLE
        condition: "1 (auto next cycle)"
      - from: READ_PHASE
        to: IDLE
        condition: "m_axi_rresp[1] (slave error)"
      - from: WRITE_PHASE
        to: IDLE
        condition: "m_axi_bresp[1] (slave error)"

  - id: FSM_RD_MASTER
    description: "AXI read master sub-FSM"
    states: [RD_IDLE, RD_ADDR, RD_DATA]
    transitions:
      - from: RD_IDLE
        to: RD_ADDR
        condition: "dma_ctrl_fsm == READ_PHASE"
      - from: RD_ADDR
        to: RD_DATA
        condition: "m_axi_arready"
      - from: RD_DATA
        to: RD_IDLE
        condition: "m_axi_rlast && m_axi_rvalid"

  - id: FSM_WR_MASTER
    description: "AXI write master sub-FSM"
    states: [WR_IDLE, WR_ADDR, WR_DATA, WR_RESP]
    transitions:
      - from: WR_IDLE
        to: WR_ADDR
        condition: "dma_ctrl_fsm == WRITE_PHASE && buffer_has_data"
      - from: WR_ADDR
        to: WR_DATA
        condition: "m_axi_awready"
      - from: WR_DATA
        to: WR_RESP
        condition: "m_axi_wlast && m_axi_wready"
      - from: WR_RESP
        to: WR_IDLE
        condition: "m_axi_bvalid"

# ---------------------------------------------------------------------------
# Custom / Assumptions
# ---------------------------------------------------------------------------
custom:
  assumptions:
    - "Single DMA channel only — no arbitration or multi-channel support needed."
    - "AXI4 INCR burst type only (burst == 2'b01)."
    - "No address alignment checking — software must provide aligned addresses."
    - "Data path is pass-through: read data forwarded directly to write data (simple buffer, no reorder)."
    - "Internal data buffer depth = BURST_LEN beats — sufficient for simple sequential read-then-write."
    - "No scatter-gather support."
    - "irq is level-triggered, cleared by writing REG_INT_STATUS (rw1c)."
    - "AXI4-Lite CSR interface uses byte addressing; register map is word-aligned (stride 4 bytes)."
    - "CTRL.start is auto-clearing (self-clears on the next clock edge after being set)."
  tbds:
    - "Exact AXI4 ID and CACHE signal values (defaulting to 0 for smoke)."
    - "Lock, QoS, Region signal tie-offs."
    - "Pipeline depth optimization between read and write masters."
    - "Error recovery policy beyond simple abort and IRQ."

# ---------------------------------------------------------------------------
# Test Requirements
# ---------------------------------------------------------------------------
test_requirements:
  - id: TR_BASIC_COPY
    description: "Single 16-byte DMA copy from address 0x1000 to 0x2000"
    stimulus:
      - "Write SRC_ADDR=0x1000, DST_ADDR=0x2000, XFER_LEN=16, CTRL=0x1"
    expected:
      - "16 bytes copied from source to destination"
      - "STATUS.done==1, STATUS.busy==0"
      - "IRQ asserted (if int_enable_done=1)"
    checkers:
      - "Memory content at 0x2000-0x200F matches 0x1000-0x100F"
      - "REG_STATUS[1] == 1 (done)"
      - "irq == 1 after transfer completes"
    coverage:
      - "All FSM states visited"
      - "All register fields exercised"

  - id: TR_BURST_BOUNDARY
    description: "Transfer spanning multiple bursts (64 bytes with BURST_LEN=16)"
    stimulus:
      - "Program 64-byte transfer"
      - "Write CTRL.start=1"
    expected:
      - "4 AXI read bursts + 4 AXI write bursts"
      - "Data integrity maintained across burst boundaries"
    checkers:
      - "Destination memory matches source memory for all 64 bytes"
      - "Burst lengths on AXI bus match BURST_LEN"
    coverage:
      - "Multiple burst iterations within one transfer"

  - id: TR_ZERO_LENGTH
    description: "Transfer with XFER_LEN=0 should be a no-op"
    stimulus:
      - "Write XFER_LEN=0, CTRL.start=1"
    expected:
      - "DMA stays IDLE or completes immediately"
      - "No AXI transactions issued"
    checkers:
      - "m_axi_arvalid never asserted"
      - "m_axi_awvalid never asserted"

  - id: TR_AXI_ERROR
    description: "Slave returns SLVERR on read or write"
    stimulus:
      - "Start a transfer; slave injects SLVERR on first read response"
    expected:
      - "DMA aborts, STATUS.error==1"
      - "IRQ asserted (if int_enable_error=1)"
    checkers:
      - "REG_STATUS[2] == 1 (error)"
      - "FSM returns to IDLE"

  - id: TR_IRQ_CLEAR
    description: "Write-1-to-clear on REG_INT_STATUS"
    stimulus:
      - "Complete a transfer, verify IRQ high"
      - "Write 0x1 to REG_INT_STATUS"
    expected:
      - "IRQ deasserted after clear"
    checkers:
      - "irq == 0 after clearing INT_STATUS"

  - id: TR_BACKPRESSURE
    description: "Apply backpressure on AXI read and write data channels"
    stimulus:
      - "Random ready delays on m_axi_rready and m_axi_wready"
    expected:
      - "Transfer completes correctly"
      - "No data loss or corruption"
    checkers:
      - "Destination memory matches source memory"
    coverage:
      - "Valid/ready handshake combinations"

# ---------------------------------------------------------------------------
# Quality Gates
# ---------------------------------------------------------------------------
quality_gates:
  - gate: lint_clean
    tool: verible-lint
    severity: error
    description: "No lint errors in RTL"
  - gate: sim_pass
    description: "All test requirements pass in RTL simulation"
    criteria:
      - "TR_BASIC_COPY: PASS"
      - "TR_BURST_BOUNDARY: PASS"
      - "TR_ZERO_LENGTH: PASS"
      - "TR_AXI_ERROR: PASS"
      - "TR_IRQ_CLEAR: PASS"
      - "TR_BACKPRESSURE: PASS"
  - gate: coverage
    description: "Functional coverage targets"
    criteria:
      - "FSM state coverage >= 100%"
      - "FSM transition coverage >= 90%"
      - "Register access coverage >= 100%"
      - "AXI handshake toggle coverage >= 80%"
  - gate: synthesis
    description: "Clean synthesis at target frequency"
    criteria:
      - "No timing violations at 100 MHz"
      - "No unresolved references"

