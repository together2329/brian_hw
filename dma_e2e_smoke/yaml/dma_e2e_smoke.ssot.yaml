workflow_todos:
  - stage: rtl-gen
    description: "Implement rtl/dma_e2e_smoke.sv with inline sub-modules per SSOT"
    depends_on: [ssot]
  - stage: tb-gen
    description: "Generate Cocotb testbench covering all test_requirements"
    depends_on: [rtl-gen]
  - stage: sim
