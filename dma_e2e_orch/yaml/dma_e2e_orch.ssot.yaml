ip: dma_e2e_orch
version: "0.1.0"
description: >
  Descriptor-driven DMA engine with end-to-end transfer orchestration.
  Supports memory-to-memory, memory-to-peripheral, and peripheral-to-memory
  transfers over AXI4. Includes a programmable descriptor queue, multi-channel
  arbitration, interrupt aggregation, and error handling.

# ── Top Module ───────────────────────────────────────────────────────────────
top_module:
  name: dma_e2e_orch
  file: rtl/dma_e2e_orch.sv
  version: "0.1.0"
  type: synthesizable
  description: >
    Top-level wrapper for the DMA end-to-end orchestrator. Instantiates
    the AXI4-lite slave (register file), descriptor fetch engine, data
    mover, channel arbiter, and interrupt controller.
  target:
    technology: generic
    clock_freq_mhz: 200
    reset: async_active_low

# ── Sub-Modules ──────────────────────────────────────────────────────────────
sub_modules:
  - name: dma_reg_file
    file: rtl/dma_reg_file.sv
    implements: register_map
    function_model_refs: [reg_read, reg_write]
    register_refs: [DMA_CTRL, DMA_STATUS, DMA_SRC_ADDR, DMA_DST_ADDR, DMA_XFER_LEN, DMA_DESC_PTR, DMA_INT_STATUS, DMA_INT_EN]
    description: AXI4-Lite slave register file with R/W semantics.

  - name: dma_desc_fetch
    file: rtl/dma_desc_fetch.sv
    implements: descriptor_fetch
    function_model_refs: [desc_fetch, desc_parse]
    cycle_model_refs: [fetch_latency]
    fsm_refs: [fetch_fsm]
    description: Fetches 128-bit descriptors from system memory via AXI4 read.

  - name: dma_data_mover
    file: rtl/dma_data_mover.sv
    implements: data_transfer
    function_model_refs: [mem_to_mem, mem_to_periph, periph_to_mem]
    cycle_model_refs: [burst_transfer]
    dataflow_refs: [axi_master_rw]
    description: AXI4 master that performs burst read/write for data payloads.

  - name: dma_channel_arb
    file: rtl/dma_channel_arb.sv
    implements: channel_arbitration
    function_model_refs: [arb_round_robin]
    fsm_refs: [arb_fsm]
    description: Round-robin arbiter for up to 4 concurrent DMA channels.

  - name: dma_int_ctrl
    file: rtl/dma_int_ctrl.sv
    implements: interrupt_aggregation
    function_model_refs: [int_assert, int_clear]
    register_refs: [DMA_INT_STATUS, DMA_INT_EN]
    description: Aggregates per-channel interrupts with enable/mask support.

# ── Parameters ───────────────────────────────────────────────────────────────
parameters:
  - name: ADDR_WIDTH
    type: integer
    default: 32
    description: System address bus width (bits).
  - name: DATA_WIDTH
    type: integer
    default: 32
    description: AXI data bus width (bits).
  - name: AXI_ID_WIDTH
    type: integer
    default: 4
    description: AXI ID width.
  - name: NUM_CHANNELS
    type: integer
    default: 4
    description: Number of independent DMA channels.
  - name: DESC_FIFO_DEPTH
    type: integer
    default: 8
    description: Depth of the descriptor FIFO per channel.
  - name: MAX_BURST_LEN
    type: integer
    default: 16
    description: Maximum AXI burst length (1-256 encoded as len-1 in AxLEN).
  - name: QUEUE_DEPTH
    type: integer
    default: 16
    description: Depth of the pending-transfer queue.

