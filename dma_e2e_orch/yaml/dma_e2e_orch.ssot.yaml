# ── Features ─────────────────────────────────────────────────────────────────
features:
  - id: F001
    name: descriptor_driven
    description: Transfers driven by 128-bit descriptors fetched from memory.
    status: required
  - id: F002
    name: multi_channel
    description: Up to NUM_CHANNELS concurrent DMA channels with round-robin arbitration.
    status: required
  - id: F003
    name: axi4_master
    description: Full AXI4 master interface with INCR burst support.
    status: required
  - id: F004
    name: axi4_lite_slave
    description: AXI4-Lite register programming interface.
    status: required
  - id: F005
    name: chained_descriptors
    description: Support for descriptor chaining via next-pointer in descriptor.
    status: required
  - id: F006
    name: interrupt_aggregation
    description: Per-channel interrupts with enable/mask and status registers.
    status: required
  - id: F007
    name: error_handling
    description: AXI decode/slave errors reported in status register with interrupt option.
    status: required

# ── Dataflow ─────────────────────────────────────────────────────────────────
dataflow:
  - name: descriptor_path
    description: >
      SW writes descriptor pointer → dma_desc_fetch reads descriptor via
      AXI4 master → parsed fields queued in per-channel FIFO.
    source: DMA_DESC_PTR register
    sink: dma_data_mover
    stages:
      - reg_write
      - axi_read_desc
      - desc_fifo
      - arb_schedule

  - name: data_path
    description: >
      dma_data_mover reads source data via AXI4 → buffers in internal FIFO
      → writes to destination via AXI4.
    source: DMA_SRC_ADDR register
    sink: DMA_DST_ADDR register
    stages:
      - axi_read_data
      - data_buffer
      - axi_write_data
      - completion

# ── Function Model ───────────────────────────────────────────────────────────
function_model:
  transactions:
    - name: reset
      description: Asynchronous reset clears all state.
      output_rules:
        - expr: "0"
          width: 1
          port: irq
          description: All interrupts deasserted.
        - expr: "IDLE"
          width: 3
          state: channel_state[*]
          description: All channels return to IDLE.
      state_updates:
        - state: dma_ctrl
          expr: "32'h0"
          width: 32
          description: Control register cleared.

    - name: reg_write
      description: AXI-Lite write to register file.
      output_rules:
        - expr: "awready && wready"
          width: 1
          port: s_axi_awready
          description: Handshake accepted.
        - expr: "bresp == 2'b00 ? OKAY : SLVERR"
          width: 2
          port: s_axi_bresp
          description: Write response.
      state_updates:
        - state: "regfile[awaddr[11:2]]"
          expr: "wdata"
          width: DATA_WIDTH
          description: Register updated at word-aligned address.

    - name: reg_read
      description: AXI-Lite read from register file.
      output_rules:
        - expr: "arready"
          width: 1
          port: s_axi_arready
          description: Read address accepted.
        - expr: "regfile[araddr[11:2]]"
          width: DATA_WIDTH
          port: s_axi_rdata
          description: Register value returned.
        - expr: "2'b00"
          width: 2
          port: s_axi_rresp
          description: OKAY response.

    - name: start_transfer
      description: SW sets DMA_CTRL.start bit; DMA begins descriptor fetch.
      trigger:
        expr: "dma_ctrl[0] == 1'b1"
        description: start bit set in DMA_CTRL.
      output_rules:
        - expr: "m_axi_arvalid"
          width: 1
          port: m_axi_arvalid
          description: Descriptor read address driven.
      state_updates:
        - state: channel_fsm[ch]
          expr: "FETCH_DESC"
          width: 3
          description: Channel enters descriptor-fetch state.

    - name: desc_fetch
      description: Fetch 128-bit descriptor from memory.
      output_rules:
        - expr: "desc_src_addr"
          width: ADDR_WIDTH
          port: m_axi_araddr
          description: Source address from descriptor.
        - expr: "desc_dst_addr"
          width: ADDR_WIDTH
          description: Destination address from descriptor (stored internally).
      state_updates:
        - state: remaining_len[ch]
          expr: "desc_xfer_len"
          width: 20
          description: Transfer length loaded from descriptor.
        - state: channel_fsm[ch]
          expr: "DATA_XFER"
          width: 3
          description: Channel enters data-transfer state.

    - name: data_read_burst
      description: AXI4 INCR burst read from source address.
      output_rules:
        - expr: "cur_src_addr"
          width: ADDR_WIDTH
          port: m_axi_araddr
          description: Current source address.
        - expr: "min(remaining_len, MAX_BURST_LEN) - 1"
          width: 8
          port: m_axi_arlen
          description: Burst length.
        - expr: "log2(DATA_WIDTH/8)"
          width: 3
          port: m_axi_arsize
          description: Bytes per beat.
        - expr: "2'b01"
          width: 2
          port: m_axi_arburst
          description: INCR burst.
      state_updates:
        - state: cur_src_addr[ch]
          expr: "cur_src_addr + (arlen+1) * (DATA_WIDTH/8)"
          width: ADDR_WIDTH
          description: Source address advances.

    - name: data_write_burst
      description: AXI4 INCR burst write to destination address.
      output_rules:
        - expr: "cur_dst_addr"
          width: ADDR_WIDTH
          port: m_axi_awaddr
          description: Current destination address.
        - expr: "min(remaining_len, MAX_BURST_LEN) - 1"
          width: 8
          port: m_axi_awlen
          description: Burst length.
        - expr: "wdata_fifo_out"
          width: DATA_WIDTH
          port: m_axi_wdata
          description: Data from internal buffer.
        - expr: "1'b1"
          width: 1
          port: m_axi_wlast
          condition: "beat_count == awlen"
          description: Last beat flag.
      state_updates:
        - state: cur_dst_addr[ch]
          expr: "cur_dst_addr + (awlen+1) * (DATA_WIDTH/8)"
          width: ADDR_WIDTH
          description: Destination address advances.
        - state: remaining_len[ch]
          expr: "remaining_len - (awlen+1) * (DATA_WIDTH/8)"
          width: 20
          description: Remaining length decremented.

    - name: transfer_complete
      description: Transfer finishes when remaining_len reaches zero.
      trigger:
        expr: "remaining_len[ch] == 0"
        description: All bytes transferred.
      output_rules:
        - expr: "1'b1"
          width: 1
          port: "irq[ch]"
          condition: "DMA_INT_EN[ch] == 1"
          description: Interrupt asserted if enabled.
      state_updates:
        - state: channel_fsm[ch]
          expr: "DONE"
          width: 3
          description: Channel enters DONE state.
        - state: dma_status[ch]
          expr: "1'b1"
          width: 1
          description: Done bit set in status register.

    - name: chained_next
      description: If descriptor.next_valid, load next descriptor pointer.
      trigger:
        expr: "desc_next_valid == 1'b1 && channel_fsm[ch] == DONE"
        description: Chained bit set and channel just completed.
      state_updates:
        - state: desc_ptr[ch]
          expr: "desc_next_ptr"
          width: ADDR_WIDTH
          description: Descriptor pointer updated to next in chain.
        - state: channel_fsm[ch]
          expr: "FETCH_DESC"
          width: 3
          description: Channel re-enters fetch state.

    - name: error_response
      description: AXI SLVERR or DECERR on any master channel.
      output_rules:
        - expr: "1'b1"
          width: 1
          port: "irq[ch]"
          condition: "DMA_INT_EN[ch] == 1"
          description: Error interrupt asserted.
      state_updates:
        - state: dma_status.err[ch]
          expr: "1'b1"
          width: 1
          description: Error flag set in status register.
        - state: channel_fsm[ch]
          expr: "ERROR"
          width: 3
          description: Channel halts in ERROR state.

    - name: int_clear
      description: SW writes to DMA_INT_STATUS to clear interrupts.
      trigger:
        expr: "reg_write && addr == DMA_INT_STATUS"
        description: Write to interrupt status register.
      output_rules:
        - expr: "irq & ~wdata[NUM_CHANNELS-1:0]"
          width: NUM_CHANNELS
          port: irq
          description: Cleared interrupts deasserted.
      state_updates:
        - state: dma_int_status
          expr: "dma_int_status & ~wdata"
          width: NUM_CHANNELS
          description: W1C bits cleared.

# ── Cycle Model ──────────────────────────────────────────────────────────────
cycle_model:
  - name: fetch_latency
    description: Descriptor fetch from address issue to descriptor available.
    cycles:
      best: 2
      typical: 4
      worst: 16
      notes: "Depends on interconnect latency; 2 cycles if in local cache."

  - name: burst_transfer
    description: Single AXI INCR burst read + write pipeline.
    cycles:
      best: "{{ MAX_BURST_LEN + 2 }}"
      typical: "{{ MAX_BURST_LEN + 4 }}"
      worst: "{{ 2 * MAX_BURST_LEN + 8 }}"
      notes: "Read+write pipelined; worst case with back-pressure."

  - name: channel_switch
    description: Round-robin arbitration context switch overhead.
    cycles:
      best: 1
      typical: 2
      worst: 4

# ── Registers ────────────────────────────────────────────────────────────────
registers:
  - name: DMA_CTRL
    offset: "0x00"
    width: 32
    access: rw
    reset: "0x0000_0000"
    fields:
      - name: start
        msb: 0
        lsb: 0
        description: "Write 1 to start DMA transfer (auto-clear)."
      - name: stop
        msb: 1
        lsb: 1
        description: "Write 1 to abort current transfer."
      - name: channel_sel
        msb: 5
        lsb: 2
        description: "Select target channel (0..NUM_CHANNELS-1)."
      - name: global_en
        msb: 31
        lsb: 31
        description: "Global DMA enable."

  - name: DMA_STATUS
    offset: "0x04"
    width: 32
    access: ro
    reset: "0x0000_0000"
    fields:
      - name: busy
        msb: 0
        lsb: 0
        description: "1 if any channel is active."
      - name: err
        msb: 1
        lsb: 1
        description: "1 if any channel encountered an AXI error."
      - name: ch_done
        msb: "{{ NUM_CHANNELS + 3 }}"
        lsb: 4
        description: "Per-channel done flag."
      - name: ch_active
        msb: "{{ 2*NUM_CHANNELS + 7 }}"
        lsb: "{{ NUM_CHANNELS + 4 }}"
        description: "Per-channel active flag."

  - name: DMA_SRC_ADDR
    offset: "0x08"
    width: 32
    access: rw
    reset: "0x0000_0000"
    fields:
      - name: addr
        msb: 31
        lsb: 0
        description: "Source address for immediate-mode transfer."

  - name: DMA_DST_ADDR
    offset: "0x0C"
    width: 32
    access: rw
    reset: "0x0000_0000"
    fields:
      - name: addr
        msb: 31
        lsb: 0
        description: "Destination address for immediate-mode transfer."

  - name: DMA_XFER_LEN
    offset: "0x10"
    width: 32
    access: rw
    reset: "0x0000_0000"
    fields:
      - name: length
        msb: 19
        lsb: 0
        description: "Transfer length in bytes."

  - name: DMA_DESC_PTR
    offset: "0x14"
    width: 32
    access: rw
    reset: "0x0000_0000"
    fields:
      - name: addr
        msb: 31
        lsb: 0
        description: "Pointer to first descriptor in memory."

  - name: DMA_INT_STATUS
    offset: "0x18"
    width: 32
    access: w1c
    reset: "0x0000_0000"
    fields:
      - name: ch_irq
        msb: "{{ NUM_CHANNELS - 1 }}"
        lsb: 0
        description: "Per-channel interrupt pending (write-1-to-clear)."

  - name: DMA_INT_EN
    offset: "0x1C"
    width: 32
    access: rw
    reset: "0x0000_0000"
    fields:
      - name: ch_en
        msb: "{{ NUM_CHANNELS - 1 }}"
        lsb: 0
        description: "Per-channel interrupt enable."

# ── Interrupts ───────────────────────────────────────────────────────────────
interrupts:
  - name: ch_done_irq
    id: IRQ0
    width: NUM_CHANNELS
    trigger: "transfer_complete"
    behavior: level
    active: high
    clear: w1c_via_DMA_INT_STATUS
    description: "Asserted when a channel transfer completes."

  - name: ch_err_irq
    id: IRQ1
    width: NUM_CHANNELS
    trigger: "error_response"
    behavior: level
    active: high
    clear: w1c_via_DMA_INT_STATUS
    description: "Asserted when a channel encounters an AXI error."

# ── FSM ──────────────────────────────────────────────────────────────────────
fsm:
  - name: channel_fsm
    owner: dma_channel_arb
    states:
      - name: IDLE
        encoding: "000"
        description: "Channel idle, waiting for start command."
      - name: FETCH_DESC
        encoding: "001"
        description: "Fetching descriptor from memory."
      - name: DATA_XFER
        encoding: "010"
        description: "Performing data transfer (read + write bursts)."
      - name: DONE
        encoding: "011"
        description: "Transfer completed, checking for chained descriptor."
      - name: ERROR
        encoding: "100"
        description: "AXI error encountered, channel halted."
    transitions:
      - from: IDLE
        to: FETCH_DESC
        condition: "dma_ctrl.start && dma_ctrl.global_en"
      - from: FETCH_DESC
        to: DATA_XFER
        condition: "desc_fetched && !desc_error"
      - from: FETCH_DESC
        to: ERROR
        condition: "desc_error"
      - from: DATA_XFER
        to: DONE
        condition: "remaining_len == 0"
      - from: DATA_XFER
        to: ERROR
        condition: "axi_bresp != OKAY || axi_rresp != OKAY"
      - from: DONE
        to: FETCH_DESC
        condition: "desc_next_valid"
      - from: DONE
        to: IDLE
        condition: "!desc_next_valid"
      - from: ERROR
        to: IDLE
        condition: "dma_ctrl.stop"

  - name: fetch_fsm
    owner: dma_desc_fetch
    states:
      - name: IDLE
        encoding: "0"
      - name: ADDR_PHASE
        encoding: "1"
        description: "Driving AR channel for descriptor read."
      - name: DATA_PHASE
        encoding: "2"
        description: "Receiving descriptor beats."
    transitions:
      - from: IDLE
        to: ADDR_PHASE
        condition: "fetch_req"
      - from: ADDR_PHASE
        to: DATA_PHASE
        condition: "m_axi_arready"
      - from: DATA_PHASE
        to: IDLE
        condition: "m_axi_rlast"

# ── Custom / Assumptions ────────────────────────────────────────────────────
custom:
  assumptions:
    - "No imported architect handoff or spec document; requirements bootstrapped from IP name and standard DMA controller patterns."
    - "AXI4 data width matches system bus width; no width-conversion bridge included."
    - "Descriptor format is 128 bits: {src_addr[31:0], dst_addr[31:0], xfer_len[19:0], next_valid, reserved[6:0], next_ptr[31:0]}."
    - "Single clock domain; no clock-domain crossing required."
    - "Interrupt lines are per-channel, active-high level, cleared by writing to DMA_INT_STATUS."
    - "No cache-coherency or staxi support in this revision."
  tbd:
    - "Exact descriptor bit field layout to be confirmed by architect."
    - "Endian-ness assumptions (default: little-endian)."
    - "Whether peripheral FIFO interfaces (stream ports) are needed beyond memory-mapped AXI."

# ── Test Requirements ────────────────────────────────────────────────────────
test_requirements:
  - id: TR001
    name: register_access
    description: Verify all registers read/write correctly via AXI4-Lite.
    stimulus: "Write all registers, read back, compare."
    expected: "Read data == written data for RW fields; reset values for RO."
    checkers:
      - "reg_readback_match"
    coverage:
      - "Toggle all register bits."
      - "Cross: address × read/write."

  - id: TR002
    name: single_transfer_mem_to_mem
    description: Single-channel memory-to-memory DMA transfer.
    stimulus: >
      Write src region with pattern, program DMA_SRC_ADDR, DMA_DST_ADDR,
      DMA_XFER_LEN, set DMA_CTRL.start.
    expected: "Destination region matches source pattern after irq[0] asserted."
    checkers:
      - "data_integrity: dst[i] == src[i] for all i"
      - "transfer_length_match"
      - "irq_asserted_on_done"
    coverage:
      - "Transfer sizes: 1B, 4B, 64B, 1KB, 4KB, max_len."
      - "Aligned and unaligned addresses."

  - id: TR003
    name: multi_channel_concurrent
    description: Concurrent transfers on all channels.
    stimulus: >
      Program 4 channels with different src/dst/len, start all.
    expected: "All transfers complete correctly; no data corruption."
    checkers:
      - "per_channel_data_integrity"
      - "no_interleave_corruption"
    coverage:
      - "All NUM_CHANNELS active simultaneously."

  - id: TR004
    name: descriptor_chaining
    description: Chained descriptor processing.
    stimulus: >
      Create 3 linked descriptors in memory, set DMA_DESC_PTR, start.
    expected: "All 3 transfers execute sequentially; final irq on last descriptor completion."
    checkers:
      - "chain_traversal_correct"
      - "intermediate_no_irq_unless_enabled"
    coverage:
      - "Chain lengths: 1, 2, 8."

  - id: TR005
    name: error_handling
    description: AXI error response handling.
    stimulus: >
      Program transfer targeting invalid address; observe error behavior.
    expected: "Channel enters ERROR state; err bit set; irq asserted if enabled."
    checkers:
      - "status_err_flag_set"
      - "channel_halted"
      - "irq_on_error"
    coverage:
      - "SLVERR and DECERR responses."

  - id: TR006
    name: interrupt_control
    description: Interrupt enable/mask/clear functionality.
    stimulus: >
      Enable interrupts on ch0, disable on ch1, start both, clear interrupts.
    expected: "irq[0] asserted, irq[1] not asserted; clear deasserts irq[0]."
    checkers:
      - "int_enable_mask_correct"
      - "w1c_clears_irq"
    coverage:
      - "All channels with int enabled/disabled."

# ── Quality Gates ────────────────────────────────────────────────────────────
quality_gates:
  - id: QG001
    name: lint_clean
    tool: spyglass
    criteria: "Zero WA-level lint warnings."
  - id: QG002
    name: sim_pass
    criteria: "All TR001-TR006 pass in RTL simulation."
  - id: QG003
    name: cov_90
    criteria: "≥90% line/branch/toggle coverage in simulation."
  - id: QG004
    name: synth_clean
    tool: generic_synth
    criteria: "Synthesizes at target 200 MHz with no timing violations."

