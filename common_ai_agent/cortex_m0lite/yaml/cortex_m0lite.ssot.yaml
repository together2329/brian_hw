top_module:
  name: cortex_m0lite
  file: rtl/cortex_m0lite.sv
  version: "1.0"
  type: cpu
  reference_spec: "user-defined Cortex-M0-lite subset SSOT"
  description: "Cortex-M0-lite style 3-stage microcontroller core (IF/ID/EX-WB) with AHB-Lite instruction/data master ports."
  owner: ssot-manual
  quality_profile: strict
  target:
    technology: sky130
    clock_freq_mhz: 300
    bus_freq_mhz: 150
    area_um2: null
    power_mw: null

sub_modules:
  - name: cortex_m0lite
    file: rtl/cortex_m0lite.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - integration.connections
      - io_list.interfaces
      - clock_reset_domains
      - cdc_requirements
    source_sections:
      - io_list
      - internal_interfaces
      - integration
      - clock_reset_domains
      - cdc_requirements
    wiring_only: true
    description: "Top-level integration wrapper that exposes SSOT top IO and instantiates core/stage modules."
  - name: cortex_m0lite_core
    file: rtl/cortex_m0lite_core.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - function_model.transactions.FM_CPU_STEP
      - cycle_model.pipeline
      - fsm.control
      - registers.register_list
    source_sections:
      - io_list
      - parameters
      - decomposition
      - registers
      - function_model
      - cycle_model
      - fsm
      - error_handling
      - dataflow
      - coverage_tap
      - workflow_todos
    dataflow_refs:
      - dataflow.sequence
      - dataflow.ordering
      - dataflow.state_flow
    description: "Top CPU integration block that owns fetch/decode/execute/writeback and AHB transactions."
  - name: if_stage
    file: rtl/cortex_m0lite_if_stage.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - cycle_model.pipeline
      - isa_spec.decode_contract
    source_sections:
      - io_list
      - parameters
      - cycle_model
      - isa_spec
      - dataflow
    dataflow_refs:
      - dataflow.sequence
      - dataflow.ordering
    description: "Instruction fetch stage with PC sequencing and I-bus request control."
  - name: id_stage
    file: rtl/cortex_m0lite_id_stage.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - isa_spec.decode_rule_set
      - function_model.transactions.FM_CPU_STEP
    source_sections:
      - parameters
      - isa_spec
      - function_model
      - coverage_tap
      - dataflow
    dataflow_refs:
      - dataflow.sequence
      - dataflow.ordering
    description: "Instruction decode stage with operand extraction, immediate generation, and hazard detect."
  - name: ex_stage
    file: rtl/cortex_m0lite_ex_stage.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - function_model.transactions.FM_CPU_STEP
      - error_handling
    source_sections:
      - parameters
      - function_model
      - error_handling
      - coverage_tap
      - dataflow
    dataflow_refs:
      - dataflow.sequence
      - dataflow.ordering
    description: "Execute stage for ALU operations, branch target generation, and memory address generation."
  - name: wb_stage
    file: rtl/cortex_m0lite_wb_stage.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - function_model.transactions.FM_CPU_STEP
      - registers.register_list
    source_sections:
      - registers
      - function_model
      - error_handling
      - dataflow
    dataflow_refs:
      - dataflow.sequence
      - dataflow.ordering
    description: "Writeback/commit stage for register file and architectural retire/trap visibility."
  - name: regfile
    file: rtl/cortex_m0lite_regfile.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - registers.register_list
      - function_model.state_variables
    source_sections:
      - parameters
      - registers
      - function_model
    description: "16x32 register file storage and read/write arbitration."
  - name: bus_if
    file: rtl/cortex_m0lite_bus_if.sv
    ownership: manifest
    rtl_emit: true
    implements:
      - io_list.interfaces
      - error_handling
    source_sections:
      - io_list
      - parameters
      - error_handling
      - cycle_model
    description: "AHB-Lite instruction/data interface adapter with ready/resp handling."

decomposition:
  modules:
    - name: if_stage
      role: instruction fetch and PC sequencing
      owns: [pc_q, if_valid_q]
    - name: id_stage
      role: decode, immediate generation, and hazard detect
      owns: [id_instr_q, id_pc_q]
    - name: ex_stage
      role: ALU, branch decision, address generation
      owns: [ex_valid_q, ex_result_q]
    - name: wb_stage
      role: register file writeback and architectural commit
      owns: [commit_q]
    - name: regfile
      role: 16x32 architectural register file (R0-R15)
      owns: [rf_mem]
    - name: bus_if
      role: AHB-Lite I/D request and response handling
      owns: [ihold_q, dhold_q]
  ownership:
    function_model: cortex_m0lite_core
    cycle_model: cortex_m0lite_core
    rtl_contract: cortex_m0lite_core

parameters:
  - name: XLEN
    type: int
    default: 32
    user_editable: true
    description: "Datapath width."
  - name: RESET_PC
    type: int
    default: 0
    user_editable: true
    description: "Program counter reset vector."
  - name: TRAP_VECTOR
    type: int
    default: 128
    user_editable: true
    description: "Exception/trap vector base address. Must be 4-byte aligned."
  - name: STACK_RESET
    type: int
    default: 0
    user_editable: true
    description: "Reset value for architectural R13/SP."
  - name: REG_COUNT
    type: int
    default: 16
    user_editable: true
    description: "Architectural register count."
  - name: AHB_ADDR_W
    type: int
    default: 32
    user_editable: true
    description: "AHB address width."
  - name: AHB_DATA_W
    type: int
    default: 32
    user_editable: true
    description: "AHB data width."
  - name: CORE_FREQ_MHZ
    type: int
    default: 300
    user_editable: true
    description: "Core clock target frequency in MHz."
  - name: BUS_FREQ_MHZ
    type: int
    default: 150
    user_editable: true
    description: "Bus clock target frequency in MHz."
  - name: AHB_HTRANS_IDLE
    type: int
    default: 0
    user_editable: false
    description: "AHB-Lite HTRANS IDLE encoding."
  - name: AHB_HTRANS_BUSY
    type: int
    default: 1
    user_editable: false
    description: "AHB-Lite HTRANS BUSY encoding; core does not generate BUSY in this revision."
  - name: AHB_HTRANS_NONSEQ
    type: int
    default: 2
    user_editable: false
    description: "AHB-Lite HTRANS NONSEQ encoding used for every single-beat transfer."
  - name: AHB_HTRANS_SEQ
    type: int
    default: 3
    user_editable: false
    description: "AHB-Lite HTRANS SEQ encoding; reserved for future bursts."
  - name: AHB_HSIZE_WORD
    type: int
    default: 2
    user_editable: false
    description: "AHB-Lite HSIZE value for 32-bit word transfers."
  - name: AHB_HBURST_SINGLE
    type: int
    default: 0
    user_editable: false
    description: "AHB-Lite HBURST SINGLE encoding."

io_list:
  clock_domains:
    - name: core_clk
      frequency_mhz: 300
      description: "Core clock at 300 MHz."
      ports:
        - { name: clk, direction: input, width: 1, description: "Core clock." }
    - name: bus_clk
      frequency_mhz: 150
      description: "AHB bus clock at 150 MHz, synchronous 2:1 divided from core clock source."
      ports:
        - { name: hclk, direction: input, width: 1, description: "AHB bus clock." }
  resets:
    - name: core_rst_n
      active: low
      polarity: active_low
      sync_async: async_assert_sync_deassert
      ports:
        - { name: rst_n, direction: input, width: 1, description: "Async active-low reset." }
    - name: bus_rst_n
      active: low
      polarity: active_low
      sync_async: async_assert_sync_deassert
      ports:
        - { name: hresetn, direction: input, width: 1, description: "AHB bus reset, active-low." }
  reset_strategy:
    mode: "async_assert_sync_deassert"
    policy:
      - "External rst_n/hresetn may assert asynchronously."
      - "Deassertion must pass through per-domain internal reset synchronizers."
    synchronized_resets:
      - name: core_rst_n_sync
        source: rst_n
        clock: clk
        stages: 2
        fanout_domains: [core_clk]
      - name: bus_rst_n_sync
        source: hresetn
        clock: hclk
        stages: 2
        fanout_domains: [bus_clk]
    constraints:
      - "No sequential element in core_clk domain may use raw rst_n deassert directly."
      - "No sequential element in bus_clk domain may use raw hresetn deassert directly."
      - "CDC wrappers must use synchronized reset of their local domain."
  interfaces:
    - name: instr_ahb_m
      type: ahb_lite_master
      clock_domain: bus_clk
      reset_domain: bus_rst_n
      protocol:
        transfer_size: word32
        hsize_value: AHB_HSIZE_WORD
        hburst_value: AHB_HBURST_SINGLE
        generated_htrans: [AHB_HTRANS_IDLE, AHB_HTRANS_NONSEQ]
        busy_policy: "BUSY is not generated by this core. If a future bridge inserts BUSY, it is not a completed transfer."
        idle_values:
          i_htrans: AHB_HTRANS_IDLE
          i_hwrite: 0
          i_hsize: AHB_HSIZE_WORD
          i_hburst: AHB_HBURST_SINGLE
          i_hwdata: 0
        active_values:
          i_htrans: AHB_HTRANS_NONSEQ
          i_hwrite: 0
          i_hsize: AHB_HSIZE_WORD
          i_hburst: AHB_HBURST_SINGLE
        hold_rules:
          - "When i_hready=0, hold i_haddr/i_htrans/i_hwrite/i_hsize/i_hburst stable."
          - "Instruction fetch address must be halfword aligned; i_haddr[0] is 0."
          - "For 32-bit AHB fetch beat, align i_haddr[1:0] to 2'b00 and select the requested halfword from i_hrdata."
        completion_rules:
          - "i_hready=1 and i_hresp=0 completes the fetch beat."
          - "i_hready=1 and i_hresp=1 raises instruction bus fault with trap_code=2."
      ports:
        - { name: i_haddr, direction: output, width: AHB_ADDR_W, parameter_ref: AHB_ADDR_W }
        - { name: i_htrans, direction: output, width: 2 }
        - { name: i_hwrite, direction: output, width: 1 }
        - { name: i_hsize, direction: output, width: 3 }
        - { name: i_hburst, direction: output, width: 3 }
        - { name: i_hwdata, direction: output, width: AHB_DATA_W, parameter_ref: AHB_DATA_W }
        - { name: i_hrdata, direction: input, width: AHB_DATA_W, parameter_ref: AHB_DATA_W }
        - { name: i_hready, direction: input, width: 1 }
        - { name: i_hresp, direction: input, width: 1 }
    - name: data_ahb_m
      type: ahb_lite_master
      clock_domain: bus_clk
      reset_domain: bus_rst_n
      protocol:
        transfer_size: word32
        hsize_value: AHB_HSIZE_WORD
        hburst_value: AHB_HBURST_SINGLE
        generated_htrans: [AHB_HTRANS_IDLE, AHB_HTRANS_NONSEQ]
        busy_policy: "BUSY is not generated by this core. SEQ is reserved for future burst extension."
        idle_values:
          d_htrans: AHB_HTRANS_IDLE
          d_hwrite: 0
          d_hsize: AHB_HSIZE_WORD
          d_hburst: AHB_HBURST_SINGLE
          d_hwdata: 0
        active_values:
          load:
            d_htrans: AHB_HTRANS_NONSEQ
            d_hwrite: 0
            d_hsize: AHB_HSIZE_WORD
            d_hburst: AHB_HBURST_SINGLE
          store:
            d_htrans: AHB_HTRANS_NONSEQ
            d_hwrite: 1
            d_hsize: AHB_HSIZE_WORD
            d_hburst: AHB_HBURST_SINGLE
        hold_rules:
          - "When d_hready=0, hold d_haddr/d_htrans/d_hwrite/d_hsize/d_hburst/d_hwdata stable."
          - "LDR/STR word access requires d_haddr[1:0] == 2'b00 before launching the bus transfer."
          - "If misalignment is detected, suppress d_htrans=NONSEQ and raise trap_code=3."
        completion_rules:
          - "d_hready=1 and d_hresp=0 completes the load/store beat."
          - "d_hready=1 and d_hresp=1 raises data bus fault with trap_code=2."
          - "LDR writeback occurs only after successful response; STR has no register writeback."
      ports:
        - { name: d_haddr, direction: output, width: AHB_ADDR_W, parameter_ref: AHB_ADDR_W }
        - { name: d_htrans, direction: output, width: 2 }
        - { name: d_hwrite, direction: output, width: 1 }
        - { name: d_hsize, direction: output, width: 3 }
        - { name: d_hburst, direction: output, width: 3 }
        - { name: d_hwdata, direction: output, width: AHB_DATA_W, parameter_ref: AHB_DATA_W }
        - { name: d_hrdata, direction: input, width: AHB_DATA_W, parameter_ref: AHB_DATA_W }
        - { name: d_hready, direction: input, width: 1 }
        - { name: d_hresp, direction: input, width: 1 }
    - name: irq_if
      type: custom_irq
      clock_domain: core_clk
      reset_domain: core_rst_n
      protocol:
        sampling: "irq is sampled on rising edge of clk when core_rst_n_sync is deasserted."
        active_level: high
        synchronization: "External irq must pass through a 2-flop synchronizer before decode/control consumption."
        hold_requirement: "irq must remain high for at least two core_clk cycles to guarantee capture."
        response: "Interrupt request is observed for debug/coverage only in this revision; architectural interrupt entry is a future SSOT extension."
      ports:
        - { name: irq, direction: input, width: 1, description: "Single external interrupt line." }
    - name: debug_status
      type: custom_debug
      clock_domain: core_clk
      reset_domain: core_rst_n
      protocol:
        update_edge: "pc_dbg/state_dbg/retire/trap update on rising edge of clk."
        reset_values:
          pc_dbg: RESET_PC
          state_dbg: 0
          retire: 0
          trap: 0
        pulse_rules:
          - "retire is a one-core_clk-cycle pulse for a successful commit."
          - "trap is a one-core_clk-cycle pulse when trap metadata is captured."
        stability: "pc_dbg and state_dbg hold their previous values while the pipeline is stalled."
      ports:
        - { name: pc_dbg, direction: output, width: XLEN, parameter_ref: XLEN }
        - { name: state_dbg, direction: output, width: 3 }
        - { name: retire, direction: output, width: 1, description: "One-cycle retire pulse." }
        - { name: trap, direction: output, width: 1, description: "Trap/exception indicator." }

internal_interfaces:
  - name: if_to_id
    from: if_stage
    to: id_stage
    handshake: valid_ready
    signals:
      - { name: if_id_valid, width: 1, direction: output }
      - { name: if_id_ready, width: 1, direction: input }
      - { name: if_id_pc, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: if_id_instr, width: 16, direction: output }
      - { name: if_id_fault, width: 1, direction: output }
    timing:
      - "Payload is sampled on cycle where valid && ready."
      - "flush/trap clears if_id_valid in same or next cycle per pipeline control."
  - name: id_to_ex
    from: id_stage
    to: ex_stage
    handshake: valid_ready
    signals:
      - { name: id_ex_valid, width: 1, direction: output }
      - { name: id_ex_ready, width: 1, direction: input }
      - { name: id_ex_op_class, width: 3, direction: output }
      - { name: id_ex_pc, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: id_ex_rd, width: 4, direction: output }
      - { name: id_ex_rn_val, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: id_ex_rm_val, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: id_ex_imm, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: id_ex_decode_fault, width: 1, direction: output }
    timing:
      - "Hazard stall deasserts id_ex_valid and holds decode state."
      - "Branch flush kills in-flight id_ex_valid before execution commit."
  - name: ex_to_wb
    from: ex_stage
    to: wb_stage
    handshake: valid_ready
    signals:
      - { name: ex_wb_valid, width: 1, direction: output }
      - { name: ex_wb_ready, width: 1, direction: input }
      - { name: ex_wb_rd, width: 4, direction: output }
      - { name: ex_wb_result, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: ex_wb_flags, width: 4, direction: output }
      - { name: ex_wb_regwrite, width: 1, direction: output }
      - { name: ex_wb_retire_ok, width: 1, direction: output }
      - { name: ex_wb_trap, width: 1, direction: output }
      - { name: ex_wb_trap_code, width: 7, direction: output }
    timing:
      - "Retire pulse is generated by WB stage only when ex_wb_valid && ex_wb_retire_ok && !ex_wb_trap."
  - name: id_to_regfile
    from: id_stage
    to: regfile
    handshake: combinational_read
    signals:
      - { name: id_rf_raddr_a, width: 4, direction: output }
      - { name: id_rf_raddr_b, width: 4, direction: output }
      - { name: rf_id_rdata_a, width: XLEN, parameter_ref: XLEN, direction: input }
      - { name: rf_id_rdata_b, width: XLEN, parameter_ref: XLEN, direction: input }
    timing:
      - "Read data must be stable within ID stage cycle budget."
  - name: wb_to_regfile
    from: wb_stage
    to: regfile
    handshake: write_enable
    signals:
      - { name: wb_rf_we, width: 1, direction: output }
      - { name: wb_rf_waddr, width: 4, direction: output }
      - { name: wb_rf_wdata, width: XLEN, parameter_ref: XLEN, direction: output }
    timing:
      - "Writeback occurs on commit boundary only."
      - "Trap commit suppresses wb_rf_we for offending instruction."
  - name: if_to_bus
    from: if_stage
    to: bus_if
    handshake: req_ack
    clock_domain: bus_clk
    signals:
      - { name: if_bus_req, width: 1, direction: output }
      - { name: if_bus_addr, width: AHB_ADDR_W, parameter_ref: AHB_ADDR_W, direction: output }
      - { name: bus_if_ack, width: 1, direction: input }
      - { name: bus_if_rdata, width: 16, direction: input }
      - { name: bus_if_fault, width: 1, direction: input }
    timing:
      - "IF request holds until ack or fault."
      - "Fault response propagates as if_id_fault."
  - name: ex_to_bus
    from: ex_stage
    to: bus_if
    handshake: req_ack
    clock_domain: bus_clk
    signals:
      - { name: ex_bus_req, width: 1, direction: output }
      - { name: ex_bus_we, width: 1, direction: output }
      - { name: ex_bus_addr, width: AHB_ADDR_W, parameter_ref: AHB_ADDR_W, direction: output }
      - { name: ex_bus_wdata, width: XLEN, parameter_ref: XLEN, direction: output }
      - { name: bus_ex_ack, width: 1, direction: input }
      - { name: bus_ex_rdata, width: XLEN, parameter_ref: XLEN, direction: input }
      - { name: bus_ex_fault, width: 1, direction: input }
    timing:
      - "Load/store request remains asserted until ack/fault."
      - "bus_ex_fault maps to trap_code=2 unless misalign precheck already asserted trap_code=3."
  - name: global_control
    from: cortex_m0lite_core
    to: [if_stage, id_stage, ex_stage, wb_stage, bus_if]
    handshake: level_control
    signals:
      - { name: pipe_flush, width: 1, direction: output }
      - { name: trap_enter, width: 1, direction: output }
      - { name: trap_code, width: 7, direction: output }
      - { name: stall_if, width: 1, direction: output }
      - { name: stall_id, width: 1, direction: output }
    timing:
      - "trap_enter has priority over stall and normal advance."
      - "pipe_flush clears IF/ID then resumes fetch from trap/branch target."
  - name: core_bus_cdc
    from: cortex_m0lite_core
    to: bus_if
    handshake: sync_2to1
    clock_domain: crossing_core_to_bus
    signals:
      - { name: cdc_req_valid, width: 1, direction: output }
      - { name: cdc_req_ready, width: 1, direction: input }
      - { name: cdc_rsp_valid, width: 1, direction: input }
      - { name: cdc_rsp_ready, width: 1, direction: output }
    timing:
      - "Synchronous divided clocks: core_clk:bus_clk = 2:1 (300MHz:150MHz nominal)."
      - "core requests are launched on core_clk and sampled on aligned bus_clk boundaries."
      - "No combinational timing path is allowed across clock-domain boundary wrappers."
      - "Reset release for CDC boundary logic uses domain-local synchronized resets (core_rst_n_sync, bus_rst_n_sync)."

registers:
  address_unit: byte
  data_width: XLEN
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  access_model: "Internal architectural/debug register map; this revision has no external CSR slave port."
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "Reserved fields must be tied to zero on readback and must not create storage."
  register_file:
    owner: regfile
    physical_storage: rf_mem[0:14]
    pc_alias: "Architectural R15 reads pc_q; R15 is not a writable physical rf_mem entry."
    retention_policy: none
    reset_policy:
      - "R0-R12 reset to 0 on core_rst_n_sync assertion."
      - "R13/SP resets to STACK_RESET."
      - "R14/LR resets to 0."
      - "R15/PC resets through pc_q to RESET_PC."
    write_policy:
      - "Only non-trapped committing ALU/MOV/LDR instructions may assert wb_rf_we."
      - "Writes to R0-R14 update rf_mem on the commit edge."
      - "Writes targeting R15 are not supported by this subset and must raise illegal opcode trap_code=1."
      - "Trap entry suppresses rf_mem writes for the offending instruction."
    read_policy:
      - "Reads of R0-R14 return rf_mem."
      - "Reads of R15 return aligned architectural PC view with bit[0]=0."
  register_list:
    - name: XPSR
      offset: 0x00
      width: XLEN
      access: ro
      hw_access: rw
      reset: 0x00000000
      owner: wb_stage
      description: "Architectural condition flags visible for debug/scoreboard."
      write_side_effects:
        - "ADD/SUB/CMP update N/Z/C/V according to function_model.flag_formulas."
        - "AND/ORR/EOR/MOV update N/Z only and preserve C/V."
        - "Trap entry does not update XPSR for the offending instruction."
      fields:
        - { name: n, bits: [31, 31], lsb: 31, width: 1, access: ro, hw_access: rw, reset: 0, description: "Negative flag; mirrors nzcv_q[3]." }
        - { name: z, bits: [30, 30], lsb: 30, width: 1, access: ro, hw_access: rw, reset: 0, description: "Zero flag; mirrors nzcv_q[2]." }
        - { name: c, bits: [29, 29], lsb: 29, width: 1, access: ro, hw_access: rw, reset: 0, description: "Carry/not-borrow flag; mirrors nzcv_q[1]." }
        - { name: v, bits: [28, 28], lsb: 28, width: 1, access: ro, hw_access: rw, reset: 0, description: "Signed overflow flag; mirrors nzcv_q[0]." }
        - { name: reserved_27_0, bits: [27, 0], lsb: 0, width: 28, access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved; reads zero." }
    - name: PC
      offset: 0x04
      width: XLEN
      access: ro
      hw_access: rw
      reset: RESET_PC
      owner: if_stage
      description: "Architectural program counter debug view."
      write_side_effects:
        - "Normal sequential commit sets pc_q to pc_q+2."
        - "Taken branch sets pc_q to branch target and flushes IF/ID."
        - "Trap entry captures EXC_EPC then sets pc_q to TRAP_VECTOR."
        - "Exception return is not architecturally supported in this revision; reset is the only trap recovery path."
      fields:
        - { name: pc, bits: [31, 0], lsb: 0, width: XLEN, parameter_ref: XLEN, access: ro, hw_access: rw, reset: RESET_PC, alignment: 2, description: "Aligned architectural PC; bit[0] is always 0." }
    - name: EXC_CAUSE
      offset: 0x08
      width: XLEN
      access: ro
      hw_access: rw
      reset: 0x00000000
      owner: wb_stage
      description: "Precise trap cause metadata captured at trap entry."
      write_side_effects:
        - "trap_valid sets in the same commit boundary that suppresses retire."
        - "trap_code stores highest-priority error_handling.priority code."
        - "trap_stage stores the pipeline stage that detected the fault."
        - "Fields clear on reset only; exception return is reserved for a future SSOT revision."
      fields:
        - { name: trap_valid, bits: [0, 0], lsb: 0, width: 1, access: ro, hw_access: rw, reset: 0, set_by: trap_enter, clear_by: [reset], description: "Sticky trap valid until reset." }
        - { name: trap_code, bits: [7, 1], lsb: 1, width: 7, access: ro, hw_access: rw, reset: 0, enum: { illegal_opcode: 1, bus_error: 2, misaligned_word_access: 3 }, description: "Trap reason code." }
        - { name: trap_stage, bits: [10, 8], lsb: 8, width: 3, access: ro, hw_access: rw, reset: 0, enum: { if_stage: 1, id_stage: 2, ex_stage: 3, wb_stage: 4 }, description: "Stage that raised the precise trap." }
        - { name: reserved_31_11, bits: [31, 11], lsb: 11, width: 21, access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved; reads zero." }
    - name: EXC_EPC
      offset: 0x0C
      width: XLEN
      access: ro
      hw_access: rw
      reset: RESET_PC
      owner: wb_stage
      description: "Exception program counter captured from the offending instruction PC."
      write_side_effects:
        - "On trap entry, captures fault_pc before pc_q redirects to TRAP_VECTOR."
        - "Bit[0] is forced to 0 because this core executes aligned 16-bit instructions."
      fields:
        - { name: epc, bits: [31, 0], lsb: 0, width: XLEN, parameter_ref: XLEN, access: ro, hw_access: rw, reset: RESET_PC, alignment: 2, description: "Faulting instruction PC." }

features:
  - name: thumb_subset_execute
    description: "Supports a constrained Thumb-like subset: ADD/SUB/AND/ORR/EOR/MOV/CMP/LDR/STR/B/BEQ/BNE."
  - name: 3stage_pipeline
    description: "Pipeline stages IF -> ID -> EX/WB with bubble insertion and branch flush."
  - name: load_use_hazard_handling
    description: "Single-cycle stall on load-use hazard; simple forwarding for ALU-ALU dependency."
  - name: precise_trap
    description: "Trap raised at commit boundary for illegal opcode, bus error, and misaligned access."

isa_spec:
  profile: "Thumb-like subset for Cortex-M0-lite bring-up"
  mode: "16-bit instruction encoding only"
  decode_style: "rule_based_no_fixed_table"
  policy:
    - "Do not use a fixed opcode lookup table in SSOT."
    - "Decoder must be derived from class rules + field constraints + priority."
  instruction_classes:
    - name: alu_reg_imm
      instructions: [ADD, SUB, AND, ORR, EOR, MOV, CMP]
      semantics:
        - "ADD/SUB/CMP update N,Z,C,V."
        - "AND/ORR/EOR update N,Z and keep C,V unchanged."
        - "MOV updates N,Z and does not modify C,V."
      writeback_rules:
        - "CMP writes flags only, no destination register write."
        - "Other ALU ops write rd in EX/WB commit."
    - name: load_store
      instructions: [LDR, STR]
      addressing:
        - "Base + imm5<<2 for word accesses."
        - "Word alignment required: addr[1:0] must be 2'b00."
      bus_mapping:
        - "LDR issues AHB read (HTRANS=NONSEQ, HWRITE=0)."
        - "STR issues AHB write (HTRANS=NONSEQ, HWRITE=1)."
    - name: branch
      instructions: [B, BEQ, BNE]
      conditions:
        - "BEQ taken when Z==1."
        - "BNE taken when Z==0."
      pc_rule:
        - "Target = align2(PC+2) + sign_extend(offset)<<1."
  decode_contract:
    - "Unsupported opcode must raise illegal-instruction trap."
    - "Decode priority is deterministic: exact opcode match before class fallback."
    - "Class priority order: branch > load_store > alu_reg_imm > illegal."
    - "When multiple class patterns match, select the highest-priority class and raise coverage event decode_overlap_resolved."
    - "Field constraints are mandatory: rd/rn/rm must be in [0, REG_COUNT-1], immediate width/sign must match class rule."
  decode_rule_set:
    - rule: alu_reg_imm
      discriminator: "instr_word[15:13] in implementation-defined ALU class window"
      required_constraints:
        - "rd/rn/rm indices valid"
        - "immediate form matches selected ALU op variant"
      resolve:
        - "if op modifies flags -> apply nzcv policy in same commit cycle"
    - rule: load_store
      discriminator: "instr_word[15:13] in implementation-defined MEM class window"
      required_constraints:
        - "base register valid"
        - "offset scaling applied for word access"
        - "effective address word-aligned"
      resolve:
        - "misalignment check happens before bus launch"
    - rule: branch
      discriminator: "instr_word[15:13] in implementation-defined BR class window"
      required_constraints:
        - "offset sign extension follows class rule"
        - "conditional branch checks current nzcv"
      resolve:
        - "taken branch flushes IF/ID"
        - "not-taken branch commits as control-flow no-op"
  excluded_instructions:
    - "BL, BX, PUSH, POP, LDM/STM, MUL, SVC, BKPT, CPS, WFI/WFE are out of scope in this revision."

dataflow:
  sequence:
    - "IF issues instruction fetch request and captures instruction when i_hready is high."
    - "ID decodes instruction, reads regfile, and computes immediate/control."
    - "EX executes ALU/branch/address generation and launches data AHB for LDR/STR."
    - "WB commits architectural state and emits retire pulse."
  ordering:
    - "Reset dominates all control."
    - "Trap dominates writeback and starts flush sequence."
    - "Branch taken flushes IF/ID before next fetch."
  state_flow:
    - "PC -> IF fetch addr -> ID instr -> EX result -> WB regfile/flags"
    - "EX mem request -> data bus response -> WB load data commit"

function_model:
  purpose: "Architectural CPU reference for RTL equivalence and scoreboard."
  state_variables:
    - { name: pc_q, width: XLEN, reset: RESET_PC, description: "Architectural program counter." }
    - { name: rf_q, width: 32, reset: 0, description: "R0-R15 register array abstraction." }
    - { name: nzcv_q, width: 4, reset: 0, description: "Condition flags N,Z,C,V." }
    - { name: trap_q, width: 1, reset: 0, description: "Trap sticky state until handler vectoring." }
  transactions:
    - id: FM_CPU_STEP
      name: cpu_cycle_step
      required_fields: [instr_word, instr_valid, i_hready, d_hready, d_hrdata, irq]
      preconditions:
        - "core_rst_n_sync and bus_rst_n_sync are deasserted."
        - "instr_valid indicates a 16-bit instruction word is available from the IF path."
        - "Any data access waits for the declared AHB-Lite ready/response contract."
      outputs: [pc_dbg, retire, trap]
      decode_rules:
        - "Decode instr_word into opcode/rd/rn/rm/imm fields per isa_spec."
        - "If decode miss occurs, set trap_code=1 and suppress retire."
        - "If decode class overlap occurs, resolve by decode_contract class priority and emit overlap telemetry."
      memory_rules:
        - "LDR retires only when d_hready=1 and d_hresp=0."
        - "STR retires only when d_hready=1 and d_hresp=0."
        - "Any d_hresp=1 raises trap_code=2."
        - "Word misalignment on LDR/STR raises trap_code=3 before bus launch."
      branch_rules:
        - "Taken branch flushes IF/ID and redirects pc_q to target."
        - "Not-taken branch advances to sequential pc."
      operand_rules:
        - "ADD/SUB/CMP use rn (+ rm or imm) and optional rd writeback."
        - "MOV writes rd from source operand and updates N/Z only."
        - "LDR writes rd on successful bus response only."
        - "STR has no register writeback."
      flag_formulas:
        - "N := result[XLEN-1]"
        - "Z := (result == 0)"
        - "C := carry_out for ADD, not_borrow for SUB/CMP, unchanged for logical ops unless explicitly defined"
        - "V := signed overflow for ADD/SUB/CMP, unchanged for logical ops unless explicitly defined"
      output_rules:
        - name: retire_pulse
          port: retire
          width: 1
          expr: "1 when one instruction commits without trap, else 0"
        - name: trap_flag
          port: trap
          width: 1
          expr: "1 when illegal opcode, bus error, or misalignment is detected at commit boundary"
      state_updates:
        - name: pc_q
          width: XLEN
          reset: RESET_PC
          expr: "pc+2 on normal flow; branch target on taken branch; trap vector on exception"
        - name: rf_q
          width: 32
          reset: 0
          expr: "register writeback on ALU/LDR/MOV commit only"
        - name: nzcv_q
          width: 4
          reset: 0
          expr: "updated by arithmetic/compare instructions per ARM-like semantics"
      error_cases:
        - "Illegal instruction encoding -> trap_code=1"
        - "Instruction/data bus error (HRESP=1) -> trap_code=2"
        - "Misaligned word access -> trap_code=3"
      side_effects:
        - "Successful ALU/MOV/LDR instructions update the destination architectural register at commit."
        - "Arithmetic and compare instructions update NZCV according to flag_formulas."
        - "Taken branches redirect pc_q and flush IF/ID before the next fetch."
        - "Trap conditions suppress retire of the offending instruction and update exception metadata only."
  invariants:
    - "R15 reflects architectural PC view at commit."
    - "No architectural state update on trapped instruction except exception metadata."
    - "At most one retire pulse per cycle."
    - "x0-like behavior is not used; all R0-R15 are normal ARM-style architectural registers."
    - "No instruction commits while trap_q is active until trap vectoring completes."

cycle_model:
  executable: pymtl3
  backend_policy: "Use PyMTL3 cycle shell; keep FunctionModel as golden architecture model."
  clock: clk
  reset: rst_n
  latency: 3
  pipeline:
    - { stage: IF, cycle: 0, action: "Fetch request/acceptance." }
    - { stage: ID, cycle: 1, action: "Decode + regfile read + hazard decision." }
    - { stage: EX_WB, cycle: 2, action: "Execute/memory response/writeback/retire." }
  handshake_rules:
    - name: if_wait
      description: "IF holds request when i_hready=0."
    - name: dmem_wait
      description: "Load/store completion waits for d_hready=1."
    - name: hazard_stall
      description: "Load-use dependency inserts one bubble."
  ordering:
    - "Reset dominates all pipeline movement and clears valid bits before instruction retirement."
    - "Trap entry has priority over branch redirect, writeback, and normal sequential PC update."
    - "Branch taken flushes IF/ID before the redirected fetch becomes visible."
    - "Load/store bus completion gates retire; no LDR/STR commits before d_hready && !d_hresp."
    - "core_clk:bus_clk is a synchronous 2:1 relationship; bus boundary logic samples requests only on aligned bus_clk cycles."
  performance:
    target_fmax_mhz: 300
    bus_fmax_mhz: 150
    clock_ratio_core_to_bus: "2:1"
    target_cpi_typical: 1.2
    outstanding_depth:
      instruction: 1
      data: 1

fsm:
  control:
    state_bits: 3
    states:
      - { name: RESET, code: 0 }
      - { name: FETCH, code: 1 }
      - { name: DECODE, code: 2 }
      - { name: EXECUTE, code: 3 }
      - { name: MEM_WAIT, code: 4 }
      - { name: TRAP, code: 5 }
    transitions:
      - "RESET -> FETCH when rst_n=1"
      - "FETCH -> DECODE when i_hready=1 and instr_valid=1"
      - "DECODE -> EXECUTE when no stall"
      - "EXECUTE -> MEM_WAIT for load/store with d_hready=0"
      - "MEM_WAIT -> FETCH when d_hready=1"
      - "EXECUTE -> TRAP on trap condition"
      - "TRAP -> FETCH after trap PC setup"
  submodule_fsms:
    - name: if_stage_fsm
      owner: if_stage
      state_bits: 2
      states:
        - { name: IF_IDLE, code: 0 }
        - { name: IF_REQ, code: 1 }
        - { name: IF_WAIT, code: 2 }
        - { name: IF_LATCH, code: 3 }
      transitions:
        - "IF_IDLE -> IF_REQ when fetch_enable=1"
        - "IF_REQ -> IF_LATCH when i_hready=1 and i_hresp=0"
        - "IF_REQ -> IF_WAIT when i_hready=0"
        - "IF_WAIT -> IF_LATCH when i_hready=1 and i_hresp=0"
        - "IF_REQ/IF_WAIT -> IF_IDLE on trap or flush"
        - "IF_LATCH -> IF_REQ for next fetch"
    - name: id_stage_fsm
      owner: id_stage
      state_bits: 2
      states:
        - { name: ID_IDLE, code: 0 }
        - { name: ID_DECODE, code: 1 }
        - { name: ID_STALL, code: 2 }
        - { name: ID_BUBBLE, code: 3 }
      transitions:
        - "ID_IDLE -> ID_DECODE when if_valid=1"
        - "ID_DECODE -> ID_STALL on load_use_hazard"
        - "ID_DECODE -> ID_BUBBLE on branch_flush"
        - "ID_STALL -> ID_DECODE when hazard_cleared=1"
        - "ID_BUBBLE -> ID_IDLE after one cycle bubble insert"
    - name: ex_stage_fsm
      owner: ex_stage
      state_bits: 2
      states:
        - { name: EX_IDLE, code: 0 }
        - { name: EX_ALU, code: 1 }
        - { name: EX_MEM, code: 2 }
        - { name: EX_TRAP, code: 3 }
      transitions:
        - "EX_IDLE -> EX_ALU when id_valid and op_class=alu_reg_imm"
        - "EX_IDLE -> EX_MEM when id_valid and op_class=load_store"
        - "EX_ALU -> EX_IDLE after alu_result_ready"
        - "EX_MEM -> EX_IDLE when d_hready=1 and d_hresp=0"
        - "EX_MEM -> EX_TRAP when d_hresp=1 or misalign=1"
        - "EX_ALU -> EX_TRAP when illegal_decode=1"
        - "EX_TRAP -> EX_IDLE after trap_latched"
    - name: wb_stage_fsm
      owner: wb_stage
      state_bits: 2
      states:
        - { name: WB_IDLE, code: 0 }
        - { name: WB_COMMIT, code: 1 }
        - { name: WB_TRAP_COMMIT, code: 2 }
        - { name: WB_HOLD, code: 3 }
      transitions:
        - "WB_IDLE -> WB_COMMIT when ex_valid and trap=0"
        - "WB_IDLE -> WB_TRAP_COMMIT when ex_valid and trap=1"
        - "WB_COMMIT -> WB_IDLE after retire pulse"
        - "WB_TRAP_COMMIT -> WB_IDLE after exception metadata write"
        - "WB_COMMIT -> WB_HOLD when commit_blocked=1"
        - "WB_HOLD -> WB_COMMIT when commit_blocked=0"
    - name: bus_if_fsm
      owner: bus_if
      state_bits: 3
      states:
        - { name: BUS_IDLE, code: 0 }
        - { name: I_REQ, code: 1 }
        - { name: I_WAIT, code: 2 }
        - { name: D_REQ, code: 3 }
        - { name: D_WAIT, code: 4 }
        - { name: BUS_ERR, code: 5 }
      transitions:
        - "BUS_IDLE -> I_REQ when if_stage requests fetch"
        - "I_REQ -> I_WAIT when i_hready=0"
        - "I_REQ/I_WAIT -> BUS_ERR when i_hresp=1"
        - "I_REQ/I_WAIT -> BUS_IDLE when i_hready=1 and i_hresp=0"
        - "BUS_IDLE -> D_REQ when ex_stage requests load_store"
        - "D_REQ -> D_WAIT when d_hready=0"
        - "D_REQ/D_WAIT -> BUS_ERR when d_hresp=1"
        - "D_REQ/D_WAIT -> BUS_IDLE when d_hready=1 and d_hresp=0"
        - "BUS_ERR -> BUS_IDLE after trap_ack"

rtl_contract:
  clock: clk
  reset: rst_n
  reset_active: low
  transaction: FM_CPU_STEP
  sample_condition: "if_id_valid && if_id_ready or id_ex_valid && id_ex_ready or ex_wb_valid && ex_wb_ready"
  input_map:
    instruction: if_id_instr
    data_response: bus_ex_rdata
  output_map:
    pc_visible: pc_dbg
    retire_pulse: retire
    trap_flag: trap
  state_updates:
    - name: pc_q
      width: XLEN
      reset: RESET_PC
      expr: "sequential pc, branch target, or trap vector per function_model.state_updates"
    - name: rf_mem
      width: XLEN
      reset: 0
      expr: "writeback on non-trapped committing instruction only"
    - name: nzcv_q
      width: 4
      reset: 0
      expr: "flag_formulas from function_model transactions"

clock_reset_domains:
  clock_domains:
    - name: core_clk
      port: clk
      frequency_mhz: 300
      generated: false
    - name: bus_clk
      port: hclk
      frequency_mhz: 150
      generated: true
      source: core_clk
      ratio_to_source: "1:2"
  resets:
    - name: core_rst_n
      port: rst_n
      polarity: active_low
      scheme: async_assert_sync_deassert
      synchronized_signal: core_rst_n_sync
      synchronizer_stages: 2
    - name: bus_rst_n
      port: hresetn
      polarity: active_low
      scheme: async_assert_sync_deassert
      synchronized_signal: bus_rst_n_sync
      synchronizer_stages: 2
  reset_scheme: "External resets assert asynchronously and deassert through per-domain 2-flop synchronizers."

cdc_requirements:
  required: true
  crossings:
    - name: core_to_bus_req
      from_clock: core_clk
      to_clock: bus_clk
      relationship: synchronous_2_to_1
      mechanism: sync_2to1_req_ack_wrapper
      signals: [cdc_req_valid, cdc_req_ready]
    - name: bus_to_core_rsp
      from_clock: bus_clk
      to_clock: core_clk
      relationship: synchronous_2_to_1
      mechanism: sync_2to1_rsp_ack_wrapper
      signals: [cdc_rsp_valid, cdc_rsp_ready]
  constraints:
    - "No direct combinational path crosses core_clk/bus_clk boundary."
    - "CDC boundary logic uses local synchronized resets."

rdc_requirements:
  required: true
  crossings:
    - name: reset_release_core
      reset: rst_n
      clock: clk
      mechanism: two_stage_sync_deassert
    - name: reset_release_bus
      reset: hresetn
      clock: hclk
      mechanism: two_stage_sync_deassert
  constraints:
    - "Raw reset deassertion cannot directly feed sequential logic."

memory:
  instances:
    - name: regfile_storage
      type: register_array
      depth: REG_COUNT
      width: XLEN
      owner: regfile
      reset: implementation_defined_zero_or_retained_by_architectural_rule
  external_memories:
    - name: instruction_memory
      interface: instr_ahb_m
      ownership: external
    - name: data_memory
      interface: data_ahb_m
      ownership: external

interrupts:
  inputs:
    - name: irq
      active: high
      clock_domain: core_clk
      behavior: "Sampled as an external interrupt request; exact exception priority is a future extension."
  outputs: []

error_handling:
  priority:
    - "trap_code=3 misaligned access"
    - "trap_code=2 bus error"
    - "trap_code=1 illegal opcode"
  error_sources:
    - name: illegal_opcode
      condition: "decode miss or unsupported instruction class"
      architectural_effect: "trap_code=1, retire suppressed"
    - name: bus_error
      condition: "i_hresp=1 or d_hresp=1"
      architectural_effect: "trap_code=2, retire suppressed"
    - name: misaligned_word_access
      condition: "LDR/STR effective_address[1:0] != 2'b00"
      architectural_effect: "trap_code=3, bus launch suppressed, retire suppressed"
  propagation:
    - "Trap metadata is committed through EXC_CAUSE."
    - "trap output pulses for observable debug/sim evidence."
  recovery:
    - "Reset clears trap sticky state."
    - "Trap vectoring clears pipeline valid bits before fetch resumes."
  policy:
    - "Fail-closed: any trap condition blocks retire of offending instruction."
    - "Bus error on instruction fetch or data access raises trap."
    - "Misalignment for word access raises trap."
  observability:
    - "trap output pulse"
    - "EXC_CAUSE register fields"
    - "sim/scoreboard_events.jsonl mismatch/trap annotations"

coverage_tap:
  functional:
    bins:
      - "alu_ops_all"
      - "alu_flag_update_matrix"
      - "decode_overlap_resolved"
      - "decode_illegal_path"
      - "branch_taken_not_taken"
      - "branch_offset_sign_pos_neg"
      - "load_store_word"
      - "load_store_alignment_fault"
      - "trap_illegal_opcode"
      - "trap_bus_error"
      - "trap_misaligned"
  cycle:
    models:
      - "pipeline_state_occupancy"
      - "if_wait_cycles"
      - "dmem_wait_cycles"
      - "hazard_stall_cycles"
      - "branch_flush_cycles"
      - "trap_entry_cycles"
    hazard_matrix:
      - "alu_to_alu_forward"
      - "load_to_use_single_stall"
      - "branch_depends_on_recent_flag"
    performance_checks:
      - "CPI under nominal random instruction stream <= target_cpi_typical + 0.3"

timing:
  clock_targets:
    - domain: core_clk
      target_freq_mhz: 300
      period_ns: 3.333
      uncertainty_ns: 0.08
    - domain: bus_clk
      target_freq_mhz: 150
      period_ns: 6.667
      uncertainty_ns: 0.08
  target_clocks:
    - name: core_clk
      port: clk
      frequency_mhz: 300
      period_ns: 3.333
      uncertainty_ns: 0.08
    - name: bus_clk
      port: hclk
      frequency_mhz: 150
      period_ns: 6.667
      uncertainty_ns: 0.08
  clock_relationships:
    - type: synchronous_ratio
      clocks: [core_clk, bus_clk]
      ratio: "2:1"
      generated_from: shared_pll_divider
  latency_budget:
    reset_release:
      min: 2
      max: 3
      measured_from: raw_reset_deassert
      measured_to: synchronized_reset_deassert
    branch_flush:
      min: 1
      max: 2
      measured_from: branch_resolved
      measured_to: redirected_fetch_valid
    load_use_stall:
      min: 1
      max: 1
      measured_from: load_use_detected
      measured_to: dependent_instruction_reissued
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
      - sta/sta_report_setup.rpt
      - sta/sta_report_hold.rpt
      - sta/clock_interaction.rpt
  io_delays:
    - interface: instr_ahb_m
      input_delay_ns: 0.60
      output_delay_ns: 0.60
    - interface: data_ahb_m
      input_delay_ns: 0.60
      output_delay_ns: 0.60
  path_exceptions:
    - "set_false_path through asynchronous assertion portion of reset tree"
    - "set_multicycle_path 2 for synchronized reset release flops if required by implementation"

power:
  domains:
    - name: PD_CORE
      voltage: nominal
      clock_domains: [core_clk]
      isolation: not_required
    - name: PD_BUS
      voltage: nominal
      clock_domains: [bus_clk]
      isolation: not_required_same_power_mode
  power_states:
    - name: ON
      entry: "core_rst_n_sync and bus_rst_n_sync deasserted"
      exit: "rst_n or hresetn asserted"
      guarantees:
        - "Core and bus logic active."
  clock_gating:
    required: false
    rationale: "Clock gating is allowed only with integrated cells and explicit synthesis support."
  upf_required: false

security:
  classification: non_secure_leaf_cpu_ip
  assets:
    - name: architectural_state
      protection: "Register file, PC, flags, and trap metadata must update only on legal commit boundaries."
    - name: bus_integrity
      protection: "AHB request/response errors must become precise traps."
  threat_model:
    - threat: illegal_instruction_execution
      mitigation: "Unsupported decode raises trap_code=1 and suppresses retire."
    - threat: silent_bus_corruption
      mitigation: "HRESP error raises trap_code=2 and blocks architectural commit."
    - threat: misaligned_memory_access
      mitigation: "Address precheck raises trap_code=3 before bus launch."

debug_observability:
  waveform_must_probe:
    - clk
    - hclk
    - core_rst_n_sync
    - bus_rst_n_sync
    - pc_dbg
    - state_dbg
    - retire
    - trap
    - if_id_valid
    - id_ex_valid
    - ex_wb_valid
    - cdc_req_valid
    - cdc_rsp_valid
  trace_events:
    - name: instruction_retire
      trigger: "retire == 1"
    - name: trap_enter
      trigger: "trap == 1"
    - name: branch_flush
      trigger: "pipe_flush due to taken branch"
    - name: load_use_stall
      trigger: "hazard_stall asserted"
  status_outputs:
    - pc_dbg
    - state_dbg
    - retire
    - trap

integration:
  bus_attachment:
    interfaces: [instr_ahb_m, data_ahb_m]
    address_ownership: "SoC owns memory map and AHB target responses."
  dependencies:
    external_modules: []
    external_clocks: [clk, hclk]
    external_resets: [rst_n, hresetn]
  connections:
    - module: cortex_m0lite_core
      instance: u_core
      ports:
        clk: clk
        rst_n: core_rst_n_sync
        hclk: hclk
        hresetn: bus_rst_n_sync
        irq: irq
        pc_dbg: pc_dbg
        state_dbg: state_dbg
        retire: retire
        trap: trap
    - module: if_stage
      instance: u_if_stage
      ports:
        clk: clk
        rst_n: core_rst_n_sync
        if_id_valid: if_id_valid
        if_id_ready: if_id_ready
        if_id_pc: if_id_pc
        if_id_instr: if_id_instr
    - module: id_stage
      instance: u_id_stage
      ports:
        clk: clk
        rst_n: core_rst_n_sync
        if_id_valid: if_id_valid
        id_ex_valid: id_ex_valid
        id_ex_ready: id_ex_ready
    - module: ex_stage
      instance: u_ex_stage
      ports:
        clk: clk
        rst_n: core_rst_n_sync
        id_ex_valid: id_ex_valid
        ex_wb_valid: ex_wb_valid
        ex_bus_req: ex_bus_req
    - module: wb_stage
      instance: u_wb_stage
      ports:
        clk: clk
        rst_n: core_rst_n_sync
        ex_wb_valid: ex_wb_valid
        wb_rf_we: wb_rf_we
    - module: regfile
      instance: u_regfile
      ports:
        clk: clk
        rst_n: core_rst_n_sync
        wb_rf_we: wb_rf_we
        wb_rf_waddr: wb_rf_waddr
        wb_rf_wdata: wb_rf_wdata
    - module: bus_if
      instance: u_bus_if
      ports:
        hclk: hclk
        hresetn: bus_rst_n_sync
        if_bus_req: if_bus_req
        ex_bus_req: ex_bus_req
        i_haddr: i_haddr
        d_haddr: d_haddr
  integration_notes:
    - "Top-level integration must instantiate every manifest-owned submodule with named port maps."
    - "Connection contracts are machine-readable module/port/signal records for rtl-gen gate checks."

dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "rst_n and hresetn must be controllable in test mode."
    clocks: [clk, hclk]
    primary_inputs: "All AHB, irq, and reset inputs controllable in TB."
  observability:
    required_internal_points: [state_dbg, pc_dbg, retire, trap]
    outputs: "All debug_status outputs and AHB responses observable."
  mbist_required: false

synthesis:
  dialect: systemverilog_2012
  top_module: cortex_m0lite
  hierarchy_policy: keep
  technology:
    pdk: sky130
    standard_cell_library: sky130_fd_sc_hd
    liberty_corner: ss_100C_1v40
    liberty_env: SKY130_LIB
    pdk_root_hint: pdk/
    library_sets:
      - { name: tt_0p80v_25c, purpose: default_compile }
      - { name: ss_0p72v_125c, purpose: setup_check }
      - { name: ff_0p88v_m40c, purpose: hold_check }
  constraints:
    - "No inferred latches."
    - "No unresolved black boxes."
    - "All sequential state uses synchronized local reset release."
    - "Generated RTL uses input logic/output logic ANSI ports by default."
    - "Multiplication/division are not used unless explicitly approved; prefer shifts/adds for simple scaling."
  compile_constraints:
    max_fanout: 16
    max_transition_ns: 0.20
    max_cap_pf: 0.10
    clock_gating: allow_integrated_cells
  optimization_goals:
    area_priority: medium
    timing_priority: high
    power_priority: medium
  ppa_targets:
    frequency_mhz_min: 300
    bus_frequency_mhz_min: 150
    area_um2_max: null
    power_mw_max: null
  required_outputs:
    - syn/netlist.v
    - syn/out/synth.v
    - syn/out/area.json
    - syn/out/syn.report.md
    - syn/timing_setup.rpt
    - syn/timing_hold.rpt

pnr:
  utilization_pct: 65
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    target_skew_ps: 120
    target_insertion_delay_ps: 900
    buf_list: [sky130_fd_sc_hd__clkbuf_4, sky130_fd_sc_hd__clkbuf_8]
  routing:
    signal_layers: { min: met1, max: met5 }
    clock_layers: { min: met3, max: met5 }
    drc_waivers: []
  power_plan:
    strategy: "core ring + stripes"
    ir_drop_max_percent: 5
  required_outputs:
    - pnr/pnr_report.json
    - pnr/drc.rpt
    - pnr/congestion.rpt
    - pnr/post_sta_setup.rpt
    - pnr/post_sta_hold.rpt

coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/cortex_m0lite_param.vh
  conventions:
    - "Use input logic/output logic ANSI ports."
    - "Use nonblocking assignments in sequential always blocks."
    - "Use blocking assignments with defaults in combinational always blocks."
    - "No inferred latches."
    - "Widths must be parameterized where user-editable parameters exist."
    - "Use shifts/adds instead of multiply/divide unless SSOT explicitly approves arithmetic operators."
    - "Comments must explain hardware intent, reset behavior, and non-obvious timing rules."
  lint_waivers: []
  lint_required_rules:
    - "no_implicit_net"
    - "no_latch_in_comb"
    - "full_case_or_default"
    - "reset_known_state"
    - "no_width_truncation_without_cast"
    - "no_unused_signal_in_interface_boundary"
  waiver_policy:
    file: lint/waivers.yaml
    format: "rule_id + object + justification + owner + expiry"
    constraints:
      - "waiver without justification is invalid"
      - "expired waiver is treated as lint failure"
  fail_policy:
    error: 0
    warning_max: 20

reuse_modules: []

custom:
  note: "CPU-lite bring-up SSOT normalized for common_ai_agent workflows."

dir_structure:
  output_dirs:
    rtl: rtl/
    tb: tb/
    sim: sim/
    cov: cov/
    syn: syn/
    sta: sta/
    pnr: pnr/
  yaml_dir: yaml/
  generators_dir: workflow/

filelist:
  headers:
    - rtl/cortex_m0lite_param.vh
  rtl:
    - rtl/cortex_m0lite.sv
    - rtl/cortex_m0lite_core.sv
    - rtl/cortex_m0lite_if_stage.sv
    - rtl/cortex_m0lite_id_stage.sv
    - rtl/cortex_m0lite_ex_stage.sv
    - rtl/cortex_m0lite_wb_stage.sv
    - rtl/cortex_m0lite_regfile.sv
    - rtl/cortex_m0lite_bus_if.sv
  tb:
    - tb/cocotb/test_cortex_m0lite.py
    - tb/cocotb/test_runner.py
    - tb/cocotb/scoreboard.py
  sim:
    - sim/results.xml
    - sim/cortex_m0lite.vcd
  coverage:
    - cov/coverage.json
    - cov/fcov_plan.json

test_requirements:
  scenarios:
    - id: SC_RESET_FETCH
      name: Reset vector fetch
      stimulus: "Assert/deassert rst_n/hresetn, then provide one valid instruction fetch response."
      expected: "pc_dbg starts at RESET_PC, IF issues instruction fetch, no retire before valid instruction commit."
      checker: "Scoreboard checks reset state, fetch address, and absence of false retire/trap."
      coverage: [pipeline_state_occupancy, if_wait_cycles]
    - id: SC_ALU_FLAGS
      name: ALU operation and NZCV update
      stimulus: "Execute ADD/SUB/AND/ORR/EOR/MOV/CMP representatives through rule-based decode."
      expected: "Register writeback and NZCV updates match function_model flag_formulas."
      checker: "FunctionalModel scoreboard compares rd result, NZCV, retire, and pc advance."
      coverage: [alu_ops_all, alu_flag_update_matrix]
    - id: SC_BRANCH_FLUSH
      name: Conditional branch flush
      stimulus: "Drive BEQ/BNE taken and not-taken cases after flag-producing instructions."
      expected: "Taken branch redirects PC and flushes IF/ID; not-taken branch advances sequentially."
      checker: "Cycle checker verifies branch_flush_cycles and FunctionalModel PC."
      coverage: [branch_taken_not_taken, branch_offset_sign_pos_neg, branch_flush_cycles]
    - id: SC_LOAD_STORE_AHB
      name: Load/store AHB access
      stimulus: "Execute aligned LDR/STR with d_hready wait states and OKAY response."
      expected: "Requests hold until d_hready; LDR writes rd; STR performs no register writeback."
      checker: "Scoreboard checks AHB request/response timing and writeback side effects."
      coverage: [load_store_word, dmem_wait_cycles]
    - id: SC_TRAP_PATHS
      name: Trap and precise exception paths
      stimulus: "Inject illegal decode, bus error, and misaligned word access."
      expected: "trap pulses, EXC_CAUSE captures trap code, offending instruction does not retire."
      checker: "Scoreboard validates trap_code priority, retire suppression, and pipeline flush."
      coverage: [trap_illegal_opcode, trap_bus_error, trap_misaligned, trap_entry_cycles]
    - id: SC_HAZARD_FORWARD
      name: RAW hazard and forwarding
      stimulus: "Execute ALU-to-ALU dependency, load-use dependency, and branch depending on recent flags."
      expected: "ALU dependency forwards, load-use inserts one bubble, branch observes correct flags."
      checker: "Cycle checker validates hazard matrix and FunctionalModel architectural state."
      coverage: [hazard_stall_cycles, alu_to_alu_forward, load_to_use_single_stall, branch_depends_on_recent_flag]
  scoreboard_checks: 6
  coverage_goals:
    function:
      target_pct: 95
      model: function_model
      description: "Cycle-independent architectural behavior coverage derived from function_model."
      bins:
        - { id: alu_ops_all, source_ref: function_model.transactions.FM_CPU_STEP.operand_rules, class: instruction_class, description: "All ALU/MOV/CMP operation families execute and match architectural writeback/flag behavior." }
        - { id: alu_flag_update_matrix, source_ref: function_model.transactions.FM_CPU_STEP.flag_formulas, class: flag_behavior, description: "N/Z/C/V formulas are observed for arithmetic, compare, logical, and move cases." }
        - { id: branch_taken_not_taken, source_ref: function_model.transactions.FM_CPU_STEP.branch_rules, class: control_flow, description: "Taken and not-taken branch paths update PC and flush behavior as specified." }
        - { id: load_store_word, source_ref: function_model.transactions.FM_CPU_STEP.memory_rules, class: memory_behavior, description: "Aligned LDR/STR word behavior updates registers or memory side effects correctly." }
        - { id: trap_illegal_opcode, source_ref: function_model.transactions.FM_CPU_STEP.error_cases, class: trap, description: "Illegal decode raises trap_code=1 and suppresses retire." }
        - { id: trap_bus_error, source_ref: function_model.transactions.FM_CPU_STEP.error_cases, class: trap, description: "Instruction/data HRESP error raises trap_code=2 and suppresses retire." }
        - { id: trap_misaligned, source_ref: function_model.transactions.FM_CPU_STEP.error_cases, class: trap, description: "Misaligned word access raises trap_code=3 before data bus launch." }
    cycle:
      target_pct: 90
      model: cycle_model
      description: "Cycle/latency/handshake/performance coverage derived from cycle_model."
      bins:
        - { id: pipeline_state_occupancy, source_ref: cycle_model.pipeline, class: pipeline, description: "IF, ID, and EX/WB pipeline stages all become active under directed tests." }
        - { id: if_wait_cycles, source_ref: cycle_model.handshake_rules.if_wait, class: handshake, description: "Instruction fetch wait-state hold behavior is observed." }
        - { id: dmem_wait_cycles, source_ref: cycle_model.handshake_rules.dmem_wait, class: handshake, description: "Data memory wait-state hold behavior is observed." }
        - { id: hazard_stall_cycles, source_ref: cycle_model.handshake_rules.hazard_stall, class: hazard, description: "Load-use one-bubble stall behavior is observed." }
        - { id: branch_flush_cycles, source_ref: cycle_model.ordering, class: flush, description: "Taken branch flush timing is observed." }
        - { id: trap_entry_cycles, source_ref: fsm.control.transitions, class: trap_timing, description: "Trap-entry FSM transition and flush timing are observed." }
        - { id: outstanding_instruction_depth, source_ref: cycle_model.performance.outstanding_depth.instruction, class: outstanding, description: "Instruction side single-outstanding request limit is exercised." }
        - { id: outstanding_data_depth, source_ref: cycle_model.performance.outstanding_depth.data, class: outstanding, description: "Data side single-outstanding request limit is exercised." }
        - { id: cpi_nominal_stream, source_ref: cycle_model.performance.target_cpi_typical, class: throughput, description: "Nominal instruction stream CPI target is measured or explicitly waived." }
        - { id: core_bus_frequency_ratio, source_ref: cycle_model.performance.clock_ratio_core_to_bus, class: frequency, description: "2:1 core_clk to bus_clk cycle relationship is represented in coverage evidence." }
    line: ">= 90% instrumented line coverage or explicit waiver"
    branch: ">= 85% instrumented branch coverage or explicit waiver"
    fsm: "100% declared FSM states and legal transitions covered"
    assertions: "All protocol/order/error assertions pass"

quality_gates:
  ssot:
    pass: "check_ssot_disk.sh exits 0 and canonical SSOT sections are substantive."
    evidence: [check_ssot_disk.sh PASS]
  rtl:
    pass: "RTL implements function_model/cycle_model, compiles, and lint has no unwaived failures."
    evidence: [rtl/rtl_compile.json, lint/dut_lint.json, list/cortex_m0lite.f]
  rtl_gen:
    profile: production
    target_scale:
      basis: "Human-authored Cortex-M0-lite architecture decomposition."
      source_files_min: 8
      modules_min: 8
      procedural_blocks_min: 12
      state_updates_min: 10
      depth_score_min: 120
      logic_modules_min: 7
      behavior_owner_logic_modules_min: 6
    target_scale_waiver:
      approved: false
      reason: ""
      owner: ""
    pass: "All rtl_todo_plan implementation and quality-gate TODOs close with fresh workflow evidence."
    evidence: [rtl/rtl_todo_plan.json, rtl/rtl_authoring_provenance.json, verify/equivalence_goals.json]
  dv:
    pass: "Every test_requirements scenario has executable cocotb/pyuvm stimulus, expected/got checker, scoreboard row, and waveform evidence."
    evidence: [tb/cocotb, sim/results.xml, sim/scoreboard_events.jsonl]
  coverage:
    pass: "Function coverage >=95%, cycle coverage >=90%, and no required bins/models uncovered without approved waiver."
    evidence: [cov/coverage.json, sim/coverage_report.md]
  eda:
    pass: "Synthesis, STA, PnR, and post-route STA meet timing/physical targets or explicit waiver exists."
    evidence: [syn/out/syn.report.md, sta/sta_report_setup.rpt, pnr/pnr_report.json]
  signoff:
    pass: "SSOT, RTL, lint, DV, sim, coverage, and EDA gates pass with fresh artifacts."
    evidence: [ATLAS progress signoff PASS]

traceability:
  yaml_to_output:
    - { yaml: top_module, output: "RTL top module, filelist, TB binding" }
    - { yaml: io_list, output: "RTL ports, TB drivers, waveform probes" }
    - { yaml: internal_interfaces, output: "Submodule port maps and cycle checkers" }
    - { yaml: function_model, output: "FunctionalModel and scoreboard expected values" }
    - { yaml: cycle_model, output: "CycleModel, protocol assertions, coverage bins" }
    - { yaml: fsm, output: "RTL FSMs and FSM coverage" }
    - { yaml: timing, output: "SDC/STA constraints" }
    - { yaml: synthesis, output: "Yosys synthesis script and reports" }
    - { yaml: test_requirements.scenarios, output: "cocotb tests and results.xml" }
    - { yaml: quality_gates, output: "ATLAS progress/signoff criteria" }

generation_flow:
  commands:
    - { name: rtl, command: "/rtl-gen cortex_m0lite", description: "Generate manifest-owned RTL from canonical SSOT." }
    - { name: tb, command: "/ssot-tb cortex_m0lite", description: "Generate layered cocotb/pyuvm TB from test_requirements." }
    - { name: sim, command: "/sim cortex_m0lite", description: "Run SSOT-derived simulation and scoreboard." }
    - { name: coverage, command: "/coverage cortex_m0lite", description: "Close function/cycle coverage goals separately." }
    - { name: eda, command: "/syn cortex_m0lite && /sta cortex_m0lite && /pnr cortex_m0lite", description: "Run EDA workflows from synthesis/timing/pnr sections." }

workflow_todos:
  rtl-gen:
    - id: todo_decode_rules
      content: "Implement rule-based instruction decode without fixed opcode lookup table."
      detail: "Decoder must derive op class from isa_spec.decode_rule_set, enforce field constraints, resolve class overlap by priority, and raise illegal trap on decode miss."
      criteria:
        - "No fixed opcode table is used as the implementation source."
        - "All supported op classes decode deterministically."
        - "decode_overlap_resolved and decode_illegal_path are observable coverage events."
      source_refs: [isa_spec.decode_style, isa_spec.decode_rule_set, function_model.transactions.FM_CPU_STEP.decode_rules]
      owner: [id_stage, rtl/cortex_m0lite_id_stage.sv]
    - id: todo_forwarding_matrix
      content: "Implement forwarding and load-use stall behavior."
      detail: "ALU-to-ALU dependencies forward, load-use dependency inserts exactly one bubble, and branch flag dependencies observe the latest committed/forwarded flags."
      criteria:
        - "No RAW hazard mismatch in directed hazard tests."
        - "hazard_stall_cycles and hazard_matrix bins are covered."
      source_refs: [cycle_model.handshake_rules, coverage_tap.cycle.hazard_matrix, test_requirements.scenarios.SC_HAZARD_FORWARD]
      owner: [id_stage, rtl/cortex_m0lite_id_stage.sv]
    - id: todo_trap_vectoring
      content: "Implement precise trap entry and pipeline flush."
      detail: "Illegal opcode, bus error, and misaligned access suppress offending retire, update EXC_CAUSE, pulse trap, and clear in-flight pipeline state before fetch resumes."
      criteria:
        - "Trap code priority follows error_handling.priority."
        - "SC_TRAP_PATHS passes with scoreboard evidence."
        - "trap_entry_cycles coverage closes."
      source_refs: [error_handling, fsm.control, test_requirements.scenarios.SC_TRAP_PATHS]
      owner: [ex_stage, rtl/cortex_m0lite_ex_stage.sv]
