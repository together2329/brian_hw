workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_TX_FIFO"
      content: "Implement TX FIFO with parameterized FIFO_DEPTH"
      detail: "Synchronous FIFO with wr_ptr/rd_ptr counters, empty/full combinatorial flags, write-push on APB TXDATA write, read-pop on TX FSM request. Width = DATA_WIDTH."
      criteria:
        - "FIFO depth matches FIFO_DEPTH parameter"
        - "Empty/full flags are combinatorial"
        - "Write to full FIFO is ignored"
        - "Read from empty FIFO returns 0"
      source_refs: ["memory.instances.tx_fifo", "dataflow.tx_path"]
      owner_module: "uart_lite_tx_fifo"
      owner_file: "rtl/uart_lite_tx_fifo.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_RX_FIFO"
      content: "Implement RX FIFO with parameterized FIFO_DEPTH"
      detail: "Synchronous FIFO with wr_ptr/rd_ptr counters, empty/full combinatorial flags, write-push on RX FSM byte ready, read-pop on APB RXDATA read. Width = DATA_WIDTH."
      criteria:
        - "FIFO depth matches FIFO_DEPTH parameter"
        - "Empty/full flags are combinatorial"
        - "Push to full FIFO discarded (rx_overrun set)"
        - "Read from empty FIFO returns 0"
      source_refs: ["memory.instances.rx_fifo", "dataflow.rx_path"]
      owner_module: "uart_lite_rx_fifo"
      owner_file: "rtl/uart_lite_rx_fifo.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_BAUD_GEN"
      content: "Implement baud-rate generator with OVERSAMPLE counter"
      detail: "Counter increments every PCLK. Baud tick pulse when oversample_counter==0 and baud_div_counter reaches (baud_div * OVERSAMPLE - 1). Separate oversample counter 0..15 for RX centre-sampling."
      criteria:
        - "Baud tick is single PCLK cycle wide"
        - "Baud tick period = baud_div * OVERSAMPLE PCLK cycles"
        - "RX oversample counter resets on each baud tick"
        - "Baud_div==0 disables baud tick generation"
      source_refs: ["cycle_model.baud_generation"]
      owner_module: "uart_lite_baud_gen"
      owner_file: "rtl/uart_lite_baud_gen.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_TX_FSM"
      content: "Implement TX FSM with shift register and parity generator"
      detail: "State machine per fsm.tx_fsm: IDLE/START/DATA/PARITY/STOP/BREAK. Pops byte from TX FIFO at START. Shifts LSB-first on baud ticks. Computes parity inline. Supports DATA_WIDTH (5-8), parity_en, parity_odd, stop_bits (1-2). Break state holds txd_o low for 13+ bit times."
      criteria:
        - "All declared FSM states and transitions implemented"
        - "Frame format matches dataflow.tx_path.framing"
        - "Parity computed as XOR of data bits + parity_odd toggle"
        - "break_send self-clears after break duration"
      source_refs: ["fsm.tx_fsm", "cycle_model.pipeline.tx_stages", "features.tx_byte_transmission"]
      owner_module: "uart_lite_tx_fsm"
      owner_file: "rtl/uart_lite_tx_fsm.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_RX_FSM"
      content: "Implement RX FSM with 2-FF synchronizer, shift register, and parity checker"
      detail: "State machine per fsm.rx_fsm: IDLE/START_DETECT/START_CONFIRM/DATA/PARITY/STOP/DONE. 2-FF synchronizer on rxd_i. Start-bit confirmed at oversample count 7/16. Data center-sampled at count 7 each period. Parity checked against computed value. Stop bit checked; frame error if low. Push assembled byte to RX FIFO on success."
      criteria:
        - "All declared FSM states and transitions implemented"
        - "2-FF synchronizer instantiated on rxd_i input"
        - "Start-bit mid-sample at oversample count 7"
        - "Data center-sample at oversample count 7 each baud period"
        - "Stop-bit check at mid-sample; frame error on low"
        - "False start (rxd high at confirm) returns to IDLE"
      source_refs: ["fsm.rx_fsm", "cycle_model.pipeline.rx_stages", "io_list.interfaces.uart_rx.protocol", "features.rx_byte_reception"]
      owner_module: "uart_lite_rx_fsm"
      owner_file: "rtl/uart_lite_rx_fsm.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS"
      content: "Implement APB-lite register block with decode, read-mux, W1C interrupt clear"
      detail: "APB-lite slave interface. Decodes PADDR to select register. Handles RW/RO/WO/W1C access policy per registers.register_list. Generates PREADY (0 or 1 wait state) and PSLVERR for unmapped addresses. Maintains sticky status flags and debug counters. W1C logic: write 1 clears; write 0 has no effect."
      criteria:
        - "All registers in register_list implemented with correct offset, width, access, reset"
        - "APB-lite protocol per io_list.interfaces.apb_slave.protocol"
        - "W1C clear logic: write 1 clears; write 0 no effect"
        - "Reserved fields read as zero"
        - "PSLVERR asserted for unmapped addresses"
      source_refs: ["registers.register_list", "interrupts", "io_list.interfaces.apb_slave"]
      owner_module: "uart_lite_regs"
      owner_file: "rtl/uart_lite_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_CORE"
      content: "Implement uart_lite_core integration module"
      detail: "Instantiate uart_lite_regs, uart_lite_tx_fifo, uart_lite_rx_fifo, uart_lite_baud_gen, uart_lite_tx_fsm, uart_lite_rx_fsm. Wire APB interface from top to regs. Wire FIFO interfaces between regs and FSMs. Implement loopback mux (txd_o to rxd synchronizer input when loopback=1). Wire interrupt aggregation (INT_PENDING & INT_MASK → irq_o). Wire debug counter increment signals from FSMs to regs."
      criteria:
        - "All sub-module instances connected per integration.connections"
        - "Loopback mux correctly selects txd_o vs rxd_i before synchronizer"
        - "irq_o = |(INT_PENDING & INT_MASK)"
        - "Debug counters increment on correct events"
      source_refs: ["function_model", "cycle_model", "dataflow", "features", "error_handling", "integration"]
      owner_module: "uart_lite_core"
      owner_file: "rtl/uart_lite_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_TOP"
      content: "Implement uart_lite top-level module"
      detail: "Top-level module instantiates uart_lite_core. Maps APB, UART, and interrupt ports. No additional logic — pure wiring wrapper."
      criteria:
        - "Port list matches io_list interfaces"
        - "Correctly instantiates uart_lite_core with named port connections"
        - "No logic in top-level module"
      source_refs: ["io_list", "integration"]
      owner_module: "uart_lite"
      owner_file: "rtl/uart_lite.sv"
      priority: "high"
      required: true
  tb-gen:
    - id: "TB_TODO_SCOREBOARD"
      content: "Implement Python/cocotb scoreboard from function_model"
