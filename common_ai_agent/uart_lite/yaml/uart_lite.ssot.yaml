# =============================================================================
# uart_lite.ssot.yaml — Single Source of Truth
# =============================================================================
top_module:
  name: "uart_lite"
  file: "rtl/uart_lite.sv"
  version: "1.0"
  type: "peripheral"
  description: "Simple parameterized UART transceiver with APB-lite CSR interface, configurable baud rate, parity, stop bits, TX/RX FIFOs, and interrupt support"
  reference_spec: "user-defined (standard UART protocol, 8N1/8E1/8O1/8N2/8E2/8O2 formats)"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "uart_lite_regs",     file: "rtl/uart_lite_regs.sv",     ownership: "manifest", ssot_gen: true,  implements: ["registers.register_list", "interrupts", "error_handling"], source_sections: ["registers", "interrupts", "error_handling"], register_refs: ["registers.register_list"], description: "APB-lite register decode, read/write, W1C clear, and interrupt pending/enable logic" }
  - { name: "uart_lite_tx",       file: "rtl/uart_lite_tx.sv",       ownership: "manifest", ssot_gen: false, implements: ["fsm.tx_fsm", "function_model.transactions", "cycle_model.handshake_rules"], source_sections: ["fsm", "function_model", "cycle_model"], fsm_refs: ["fsm.tx_fsm"], function_model_refs: ["function_model.transactions"], cycle_model_refs: ["cycle_model.pipeline"], description: "TX FSM: idle/start/data/parity/stop, shift register, parity computation" }
  - { name: "uart_lite_rx",       file: "rtl/uart_lite_rx.sv",       ownership: "manifest", ssot_gen: false, implements: ["fsm.rx_fsm", "function_model.transactions", "cycle_model.handshake_rules", "cdc_requirements"], source_sections: ["fsm", "function_model", "cycle_model", "cdc_requirements"], fsm_refs: ["fsm.rx_fsm"], function_model_refs: ["function_model.transactions"], cycle_model_refs: ["cycle_model.pipeline"], description: "RX FSM: 2-FF synchronizer, idle/start/data/parity/stop, shift register, parity check, error detection" }
  - { name: "uart_lite_baud_gen", file: "rtl/uart_lite_baud_gen.sv", ownership: "manifest", ssot_gen: true,  implements: ["fsm.baud_gen", "cycle_model.pipeline"], source_sections: ["fsm", "cycle_model"], fsm_refs: ["fsm.baud_gen"], cycle_model_refs: ["cycle_model.pipeline"], description: "Baud-rate generator: oversample counter, baud_tick, baud_tick_mid, start-bit mid-sample at 7/16" }
  - { name: "uart_lite_tx_fifo",  file: "rtl/uart_lite_tx_fifo.sv",  ownership: "manifest", ssot_gen: true,  implements: ["memory.instances", "dataflow", "cycle_model.backpressure"], source_sections: ["memory", "dataflow", "cycle_model"], dataflow_refs: ["dataflow.tx_path"], cycle_model_refs: ["cycle_model.backpressure"], description: "TX FIFO: 16-deep parameterized synchronous FIFO with write/read pointers" }
  - { name: "uart_lite_rx_fifo",  file: "rtl/uart_lite_rx_fifo.sv",  ownership: "manifest", ssot_gen: true,  implements: ["memory.instances", "dataflow", "cycle_model.backpressure"], source_sections: ["memory", "dataflow", "cycle_model"], dataflow_refs: ["dataflow.rx_path"], cycle_model_refs: ["cycle_model.backpressure"], description: "RX FIFO: 16-deep parameterized synchronous FIFO with write/read pointers" }
  - { name: "uart_lite_core",     file: "rtl/uart_lite_core.sv",     ownership: "manifest", ssot_gen: false, implements: ["function_model", "decomposition.units.execute", "cycle_model", "dataflow", "features"], source_sections: ["function_model", "decomposition", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], decomposition_refs: ["decomposition.units.execute"], cycle_model_refs: ["cycle_model.pipeline"], dataflow_refs: ["dataflow"], feature_refs: ["features"], description: "Core control: top-level orchestration, loopback MUX, break control, debug counter updates" }
  - { name: "uart_lite_wrapper",  file: "rtl/uart_lite_wrapper.sv",  ownership: "manifest", ssot_gen: true,  wiring_only: true, source_sections: ["io_list", "integration"], ports: ["pclk", "presetn", "paddr", "psel", "penable", "pwrite", "pwdata", "pstrb", "prdata", "pready", "pslverr", "tx", "rx", "uart_irq"], connections: "instance wiring from top-level ports to uart_lite_regs, uart_lite_tx, uart_lite_rx, uart_lite_baud_gen, uart_lite_core, uart_lite_tx_fifo, uart_lite_rx_fifo", description: "Integration wrapper" }

decomposition:
  units:
    - { id: "register_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["uart_lite_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "tx_serialize", kind: "datapath/control", source_refs: ["function_model.transactions.TX_WRITE", "fsm.tx_fsm", "cycle_model.pipeline"], rtl_candidates: ["uart_lite_tx"], verification_impact: ["coverage_plan.functional", "coverage_plan.cycle"] }
    - { id: "rx_deserialize", kind: "datapath/control", source_refs: ["function_model.transactions.RX_READ", "fsm.rx_fsm", "cycle_model.pipeline"], rtl_candidates: ["uart_lite_rx"], verification_impact: ["coverage_plan.functional", "coverage_plan.cycle"] }
    - { id: "baud_timing", kind: "control", source_refs: ["fsm.baud_gen", "cycle_model.pipeline"], rtl_candidates: ["uart_lite_baud_gen"], verification_impact: ["coverage_plan.cycle"] }
    - { id: "core_orchestrate", kind: "control", source_refs: ["function_model.transactions", "dataflow", "features"], rtl_candidates: ["uart_lite_core"], verification_impact: ["test_requirements.scenarios"] }
parameters:
  - name: "DATA_WIDTH"
    default: 8
    type: int
    range: [5, 8]
    description: "Number of data bits per UART frame (5 to 8)"
    drives: ["uart_lite_tx.sv", "uart_lite_rx.sv", "uart_lite_core.sv"]
  - name: "FIFO_DEPTH"
    default: 16
    type: int
    description: "TX and RX FIFO depth (power-of-two, minimum 2)"
    drives: ["uart_lite_tx_fifo.sv", "uart_lite_rx_fifo.sv", "uart_lite_regs.sv"]
  - name: "OVERSAMPLE"
    default: 16
    type: int
    description: "Oversampling factor (pclk cycles per UART bit period); must be even and >= 8"
    drives: ["uart_lite_baud_gen.sv", "uart_lite_rx.sv", "uart_lite_core.sv"]
  - name: "CLOCK_FREQ_HZ"
    default: 50000000
    type: int
    description: "pclk frequency in Hz; drives baud rate default calculation"
    drives: ["uart_lite_baud_gen.sv", "uart_lite_rx.sv", "uart_lite_core.sv"]
  - name: "CLOCK_FREQ_HZ"
    default: 50000000
    type: int
    description: "pclk frequency in Hz; drives baud rate default calculation"
    drives: ["tb_top.sv"]

io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "APB-lite peripheral clock"
      ports:
        - { name: "pclk", width: 1, direction: "input", description: "Peripheral clock" }

  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "APB-lite active-low reset"
      ports:
        - { name: "presetn", width: 1, direction: "input", description: "Active-low reset" }

  interfaces:
    - name: "apb_slave"
      type: "APB-lite"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "APB-lite register access interface"
      protocol:
        setup_phase: "psel=1, penable=0 captures address and control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata/pstrb are sampled in the completing access phase for writes."
        error_rule: "pslverr is asserted only with pready=1 for illegal or unsupported access."
        no_wait_state: "pready may be driven combinatorially (0-cycle access) for reads to read-only or register-readback paths; writes to FIFO or status-clear paths complete in 0-1 cycles."
      ports:
        - { name: "paddr",   width: 8,  direction: "input",  description: "APB address (byte offset, 32-bit aligned)" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB strobes (byte enables)" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error (asserted for unmapped addresses)" }

    - name: "uart_serial"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "UART serial TX and RX lines"
      protocol:
        baud: "Configurable via BAUD_DIV CSR; default 50e6/(16*(BDIV+1))."
        frame: "1 start bit (low), 5..8 LSB-first data bits, optional parity bit, 1 or 2 stop bits (high)."
        idle: "Line is high (mark) when idle."
        rx_sync: "rx input passes through a 2-FF synchronizer before sampling."
        loopback: "When LOOPBACK CSR bit is set, tx is looped to rx internally and rx pad is ignored."
      ports:
        - { name: "tx", width: 1, direction: "output", description: "UART serial transmit output" }
        - { name: "rx", width: 1, direction: "input",  description: "UART serial receive input" }

    - name: "interrupt"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Combined interrupt output"
      protocol:
        assertion: "uart_irq reflects OR of all enabled pending interrupt sources."
        deassertion: "uart_irq deasserts when all enabled pending sources are cleared (W1C)."
        reset_value: 0
      ports:
        - { name: "uart_irq", width: 1, direction: "output", description: "Combined active-high level interrupt" }

features:
  - name: "TX serialization"
    trigger: "TX FIFO not empty, tx_enable=1, and baud_tick"
    datapath: "Pop TX FIFO → load tx_shift_reg → shift LSB-first on baud_tick boundaries → optional parity computation → stop bit(s)"
    control: "TX FSM: TX_IDLE → TX_START → TX_DATA → (TX_PARITY) → TX_STOP → TX_IDLE"
    output: "Serial frame on tx line"
  - name: "RX deserialization"
    trigger: "rx_enable=1 and falling edge on rx (via 2-FF synchronizer)"
    datapath: "2-FF sync → start-bit verify at mid-sample → shift LSB-first on baud_tick centers → optional parity check → stop bit(s) verify → push to RX FIFO"
    control: "RX FSM: RX_IDLE → RX_START → RX_DATA → (RX_PARITY) → RX_STOP → RX_IDLE"
    output: "Byte in RX FIFO, readable via RX_DATA APB register"
  - name: "Loopback test"
    trigger: "CTRL.loopback=1"
    datapath: "tx output is internally connected to rx input; rx pad is ignored"
    control: "Normal TX/RX FSMs; error detection still active"
    output: "Transmitted data received internally"
  - name: "Software break"
    trigger: "CTRL.send_break=1"
    datapath: "Force tx line low unconditionally"
    control: "Any active TX frame is aborted; TX FSM returns to TX_IDLE"
    output: "tx line held low (break condition)"
  - name: "Baud generation"
    trigger: "Free-running on every pclk cycle"
    datapath: "Oversample counter 0..OVERSAMPLE-1; baud_div_counter 0..BAUD_DIV; baud_tick at (oversample==0 AND baud_div==BAUD_DIV)"
    control: "Baud tick and baud_tick_mid signals drive TX/RX FSMs"
    output: "baud_tick, baud_tick_mid (observable internally)"

dataflow:
  tx_path:
    source: "APB write to TX_DATA"
    buffer: "TX FIFO (depth FIFO_DEPTH, width DATA_WIDTH)"
    serializer: "tx_shift_reg (width DATA_WIDTH + parity + stop)"
    sequence: "APB TX_DATA write → TX FIFO push → TX FSM pop → tx_shift_reg → tx line serial output"
    backpressure: "APB write ignored when TX FIFO full"
  rx_path:
    source: "rx pad → 2-FF synchronizer → rx_synced"
    deserializer: "rx_shift_reg (width DATA_WIDTH + parity + stop)"
    buffer: "RX FIFO (depth FIFO_DEPTH, width DATA_WIDTH)"
    consumer: "APB read from RX_DATA"
    sequence: "rx pad → 2-FF sync → falling-edge detect → start verify → data/parity/stop shift → RX FIFO push → APB RX_DATA read"
    backpressure: "New frame discarded (overrun) when RX FIFO full"
  loopback_path:
    source: "tx line (internal, before pad)"
    destination: "rx_synced MUX input"
    condition: "CTRL.loopback == 1"

function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the UART computes independent of cycle timing."
  state_variables:
    - { name: "tx_fifo", source: "memory.instances.tx_fifo", reset: "empty", description: "TX FIFO contents (up to FIFO_DEPTH entries of DATA_WIDTH bits each)" }
    - { name: "rx_fifo", source: "memory.instances.rx_fifo", reset: "empty", description: "RX FIFO contents (up to FIFO_DEPTH entries of DATA_WIDTH bits each)" }
    - { name: "tx_busy", source: "registers.STATUS.tx_busy", reset: 0, description: "TX FSM is actively shifting a frame" }
    - { name: "rx_busy", source: "registers.STATUS.rx_busy", reset: 0, description: "RX FSM is actively receiving a frame" }
    - { name: "frame_error", source: "registers.STATUS.frame_error", reset: 0, description: "Sticky framing error flag" }
    - { name: "parity_error", source: "registers.STATUS.parity_error", reset: 0, description: "Sticky parity error flag" }
    - { name: "overrun_error", source: "registers.STATUS.overrun_error", reset: 0, description: "Sticky overrun error flag" }
    - { name: "underrun_error", source: "registers.STATUS.underrun_error", reset: 0, description: "Sticky underrun error flag" }
    - { name: "bytes_tx", source: "registers.DEBUG_BYTES_TX", reset: 0, description: "Total bytes transmitted counter" }
    - { name: "bytes_rx", source: "registers.DEBUG_BYTES_RX", reset: 0, description: "Total bytes received counter" }
    - { name: "frames_errored", source: "registers.DEBUG_FRAMES_ERR", reset: 0, description: "Framing error counter" }
    - { name: "parities_errored", source: "registers.DEBUG_PARITIES_ERR", reset: 0, description: "Parity error counter" }
  transactions:
    - id: "TX_WRITE"
      name: "transmit_byte"
      preconditions:
        - "tx_enable == 1"
        - "tx_fifo is not full"
        - "send_break == 0"
      inputs:
        - "APB write to TX_DATA with tx_data[DATA_WIDTH-1:0]"
      outputs:
        - "tx_data byte pushed into TX FIFO"
        - "STATUS.tx_empty clears if FIFO becomes non-empty"
      side_effects:
        - "tx_fifo write pointer advances by 1"
        - "if TX FSM was in TX_IDLE, it transitions to TX_START at next baud_tick"
      error_cases:
        - { condition: "APB write to TX_DATA when TX FIFO is full", result: "write is ignored; no side effects" }
    - id: "TX_SHIFT"
      name: "shift_out_frame"
      preconditions:
        - "tx_fifo is not empty"
        - "TX FSM is in TX_IDLE or just completed previous frame"
      inputs:
        - "tx_fifo read data (DATA_WIDTH bits)"
      outputs:
        - "Serial frame on tx line: start(0) + DATA_WIDTH data bits (LSB first) + optional parity + stop bit(s)(1)"
      side_effects:
        - "tx_fifo read pointer advances by 1"
        - "STATUS.tx_busy asserts during TX_START through TX_STOP"
        - "bytes_tx increments by 1 on successful TX_STOP completion"
        - "STATUS.tx_empty asserts if TX FIFO becomes empty after pop"
      error_cases:
        - { condition: "send_break asserted during TX", result: "TX FSM aborts to TX_IDLE; tx line forced low; frame truncated" }
        - { condition: "tx_fifo underrun (empty when START state should load data)", result: "STATUS.underrun_error set; TX FSM returns to TX_IDLE" }
    - id: "RX_READ"
      name: "receive_byte"
      preconditions:
        - "rx_enable == 1"
        - "STATUS.rx_empty == 0 (RX FIFO has data)"
      inputs:
        - "APB read from RX_DATA"
      outputs:
        - "rx_data[DATA_WIDTH-1:0] returned on prdata"
      side_effects:
        - "RX FIFO read pointer advances by 1"
        - "STATUS.rx_empty asserts if RX FIFO becomes empty after pop"
      error_cases:
        - { condition: "APB read from RX_DATA when RX FIFO is empty", result: "prdata returns 0x00000000; no side effects" }
    - id: "RX_SHIFT"
      name: "capture_frame"
      preconditions:
        - "rx_enable == 1"
        - "rx line falling edge detected (start bit)"
        - "rx_fifo is not full"
      inputs:
        - "rx line serial data"
      outputs:
        - "Deserialized byte pushed into RX FIFO"
      side_effects:
        - "STATUS.rx_busy asserts during RX_START through RX_STOP"
        - "bytes_rx increments by 1 on successful frame with no errors"
        - "STATUS.rx_empty clears when RX FIFO gains first entry"
      error_cases:
        - { condition: "false start (rx line high at start-bit mid-sample)", result: "RX FSM returns to RX_IDLE; no data captured" }
        - { condition: "framing error (stop bit sampled as 0)", result: "frame_error set sticky; frames_errored increments; rx_data still pushed to RX FIFO" }
        - { condition: "parity error (computed parity != received parity)", result: "parity_error set sticky; parities_errored increments; rx_data still pushed to RX FIFO" }
        - { condition: "overrun (RX FIFO full when new frame data ready)", result: "overrun_error set sticky; new frame data is discarded" }
        - { condition: "loopback mode AND tx_busy AND rx_enable", result: "rx receives the tx output internally; rx pad is ignored" }
  invariants:
    - "TX FIFO write is allowed only when not full."
    - "RX FIFO read is allowed only when not empty."
    - "Sticky error flags are only cleared by W1C write to STATUS_CLR."
    - "APB reads from RX_DATA always pop the FIFO (destructive read)."
    - "APB writes to TX_DATA always push the FIFO when not full."
    - "DEBUG counters are free-running 32-bit rollover counters; they are not cleared."
    - "INT_PEND bits assert when the corresponding event occurs AND the IE bit is set; they deassert only on W1C to INT_CLR."
    - "INT_PEND bits for level-type conditions (tx_empty, rx_not_empty) re-assert on the next cycle if the condition is still true after clear."
  reference_model_hint: "tb-gen should implement a Python scoreboard model. TX: queue bytes written via APB, compare against serial bitstream. RX: inject serial bitstream, compare bytes read via APB. Error injection via corrupting stop/parity bits or filling FIFOs."

cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, serial lines, status, and interrupts may change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle."
  clock: "pclk"
  reset:
    assertion: "presetn low asynchronously clears all architectural state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  oversample:
    factor: 16
    description: "Each bit period spans OVERSAMPLE pclk cycles. Oversample counter (0..15) increments every pclk. baud_tick asserts at count 0 of the baud-rate period."
  start_bit_mid_sample:
    cycle: 7
    description: "RX samples start bit at oversample count 7 (mid-point) to confirm it is still low. If high, false start."
  data_sampling:
    cycle: 8
    description: "RX samples data/parity/stop at oversample count 8 (center of bit period)."
  latency:
    apb_read: { min_cycles: 0, max_cycles: 1, description: "prdata/pready timing; 0-cycle combinational readback, 1-cycle FIFO pop paths" }
    apb_write: { min_cycles: 0, max_cycles: 1, description: "APB write acceptance; 0-cycle register writes, 1-cycle FIFO push paths" }
    tx_start_to_shift: { min_cycles: 1, max_cycles: "BAUD_DIV+1", description: "Time from TX_DATA write to first start-bit edge on tx" }
    rx_start_to_data: { min_cycles: "OVERSAMPLE + OVERSAMPLE/2", max_cycles: "OVERSAMPLE + OVERSAMPLE/2 + OVERSAMPLE-1", description: "Time from rx falling edge to first data bit sample" }
    full_tx_frame: { min_cycles: "(1 + DATA_WIDTH + parity_en + stop_bits) * OVERSAMPLE * (BAUD_DIV+1)", max_cycles: null, description: "Complete TX frame" }
    full_rx_frame: { min_cycles: "(1 + DATA_WIDTH + parity_en + stop_bits) * OVERSAMPLE * (BAUD_DIV+1)", max_cycles: null, description: "Complete RX frame" }
  handshake_rules:
    - { signal: "pready", rule: "Assert in the same cycle as psel and penable (0-cycle) or one cycle after (1-cycle). Must assert only for valid register addresses." }
    - { signal: "pslverr", rule: "Assert with pready for unmapped address ranges (outside 0x00-0x33)." }
    - { signal: "tx", rule: "Idle high. Driven by TX FSM per fsm.tx_fsm.outputs." }
    - { signal: "rx", rule: "Asynchronous input; passes 2-FF synchronizer. Sampled at start_bit_mid_sample and data_sampling cycles." }
    - { signal: "uart_irq", rule: "Combinatorial OR of (INT_EN[i] & INT_PEND[i]). Changes same rising edge as INT_PEND update." }
  pipeline:
    - { stage: "RX_SYNC", cycle: "0..1", action: "2-FF synchronizer captures rx to rx_synced" }
    - { stage: "START_DETECT", cycle: "1..N", action: "Detect falling edge on rx_synced; RX FSM to RX_START at next baud_tick_mid" }
    - { stage: "RX_START_VERIFY", cycle: "N+1", action: "Sample rx_synced at oversample count 7; confirm start bit or false start" }
    - { stage: "RX_SHIFT", cycle: "N+2..M", action: "Sample data/parity/stop at oversample count 8; shift into rx_shift_reg" }
    - { stage: "RX_PUSH", cycle: "M+1", action: "Push rx_shift_reg into RX FIFO; update STATUS and debug counters; clear rx_busy" }
    - { stage: "TX_POP", cycle: "0..1", action: "Pop TX FIFO; load tx_shift_reg; parity computed" }
    - { stage: "TX_START_DRIVE", cycle: "1", action: "Drive tx low (start bit) at baud_tick" }
    - { stage: "TX_SHIFT", cycle: "2..K", action: "Shift LSB-first data bits, parity, stop bits on successive baud_ticks" }
    - { stage: "TX_DONE", cycle: "K+1", action: "Return tx to idle high; clear tx_busy; update bytes_tx and STATUS" }
  ordering:
    - "RX data is pushed to RX FIFO only after the final stop bit is sampled correctly."
    - "Interrupt pending bits update on the same rising edge as the event condition becomes true."
    - "W1C clear takes effect on the rising edge after the APB write access phase completes."
    - "DEBUG counter increments occur on the same rising edge as the qualifying event."
  backpressure:
    - "TX FIFO backpressure: APB write to TX_DATA is ignored when TX FIFO is full."
    - "RX FIFO backpressure: RX frame data is discarded (overrun) when RX FIFO is full at RX_PUSH stage."
  performance:
    frequency_mhz: 50
    throughput:
      max_baud_rate: "PCLK / OVERSAMPLE = 3.125 Mbps at default 50 MHz"
      sustained_bytes_per_second: "max_baud_rate / (1 + DATA_WIDTH + parity_en + stop_bits) bytes/sec ≈ 312.5 kB/s for 8N1"
    profundity:
      pipeline_stages: 9
      queue_depth: 16
      description: "TX and RX each have 9 pipeline stages. TX and RX FIFOs each have depth 16."
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
    - "FSM states are observable via STATUS.tx_busy and STATUS.rx_busy."

clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "APB-lite peripheral clock; also drives UART bit timing via baud generator" }
  reset_scheme:
    signal: "presetn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

cdc_requirements:
  crossings:
    - { from_domain: "async_external", to_domain: "pclk", signal: "rx (UART serial input)", synchronizer: "2-FF (two back-to-back flops on pclk)" }
  notes: "rx is the only asynchronous input. 2-FF synchronizer mitigates metastability. Oversampling (16x) provides additional noise immunity."

rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain — no RDC required"

registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
    num_registers: 13
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."

  register_list:
    - name: "TX_DATA"
      offset: 0x00
      width: 32
      access: "wo"
      reset: 0x00000000
      category: "data"
      description: "Transmit Data Register"
      write_side_effects:
        - "Writing pushes DATA_WIDTH LSBs into TX FIFO; write ignored when TX FIFO is full."
      fields:
        - { name: "tx_data", bits: [7, 0], access: "wo", reset: 0x00, write_effect: "Push byte into TX FIFO", description: "Transmit data byte (DATA_WIDTH LSBs used)" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "RX_DATA"
      offset: 0x04
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "data"
      description: "Receive Data Register"
      read_side_effects:
        - "Reading pops one byte from RX FIFO; returns 0 when RX FIFO is empty."
      fields:
        - { name: "rx_data", bits: [7, 0], access: "ro", reset: 0x00, description: "Received data byte (DATA_WIDTH LSBs valid)" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "STATUS"
      offset: 0x08
      width: 32
      access: "ro"
      reset: 0x00000001
      category: "status"
      description: "Status Register (sticky error flags)"
      fields:
        - { name: "tx_empty", bits: [0, 0], access: "ro", reset: 0x1, description: "TX FIFO is empty" }
        - { name: "tx_full", bits: [1, 1], access: "ro", reset: 0x0, description: "TX FIFO is full" }
        - { name: "rx_empty", bits: [2, 2], access: "ro", reset: 0x1, description: "RX FIFO is empty" }
        - { name: "rx_full", bits: [3, 3], access: "ro", reset: 0x0, description: "RX FIFO is full" }
        - { name: "tx_busy", bits: [4, 4], access: "ro", reset: 0x0, description: "TX FSM is actively shifting a frame" }
        - { name: "rx_busy", bits: [5, 5], access: "ro", reset: 0x0, description: "RX FSM is actively receiving a frame" }
        - { name: "frame_error", bits: [8, 8], access: "ro", reset: 0x0, description: "Sticky: framing error; cleared by W1C in STATUS_CLR" }
        - { name: "parity_error", bits: [9, 9], access: "ro", reset: 0x0, description: "Sticky: parity error; cleared by W1C in STATUS_CLR" }
        - { name: "overrun_error", bits: [10, 10], access: "ro", reset: 0x0, description: "Sticky: RX FIFO overflow; cleared by W1C in STATUS_CLR" }
        - { name: "underrun_error", bits: [11, 11], access: "ro", reset: 0x0, description: "Sticky: TX FIFO underrun; cleared by W1C in STATUS_CLR" }
        - { name: "reserved_31_12", bits: [31, 12], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "STATUS_CLR"
      offset: 0x0C
      width: 32
      access: "w1c"
      reset: 0x00000000
      category: "status"
      description: "Status Clear Register (write-1-to-clear sticky flags)"
      write_side_effects:
        - "Writing 1 to a bit clears the corresponding sticky STATUS bit on the next cycle."
        - "Writing 0 has no effect."
      fields:
        - { name: "clr_frame_error", bits: [8, 8], access: "w1c", reset: 0x0, write_effect: "Clear frame_error", description: "W1C frame error" }
        - { name: "clr_parity_error", bits: [9, 9], access: "w1c", reset: 0x0, write_effect: "Clear parity_error", description: "W1C parity error" }
        - { name: "clr_overrun_error", bits: [10, 10], access: "w1c", reset: 0x0, write_effect: "Clear overrun_error", description: "W1C overrun error" }
        - { name: "clr_underrun_error", bits: [11, 11], access: "w1c", reset: 0x0, write_effect: "Clear underrun_error", description: "W1C underrun error" }
        - { name: "reserved_other", bits: [31, 12], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "CTRL"
      offset: 0x10
      width: 32
      access: "rw"
      reset: 0x00000060
      category: "control"
      description: "Control Register"
      fields:
        - { name: "parity_en", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "Enable parity generation/checking", description: "Parity enable: 0=no parity, 1=parity per parity_odd" }
        - { name: "parity_odd", bits: [1, 1], access: "rw", reset: 0x0, write_effect: "Select odd parity when parity_en=1", description: "Parity type (when parity_en=1): 0=even parity, 1=odd parity" }
        - { name: "stop_bits", bits: [2, 2], access: "rw", reset: 0x0, write_effect: "Set number of stop bits", description: "Stop bits: 0=1 stop bit, 1=2 stop bits" }
        - { name: "loopback", bits: [3, 3], access: "rw", reset: 0x0, write_effect: "Enable internal loopback", description: "Loopback test mode: 0=normal, 1=tx loops to rx internally" }
        - { name: "send_break", bits: [4, 4], access: "rw", reset: 0x0, write_effect: "Force tx line low", description: "Software break: 1=force tx line low; overrides normal TX" }
        - { name: "rx_enable", bits: [5, 5], access: "rw", reset: 0x1, write_effect: "Enable/disable receiver", description: "RX enable: 0=disable receiver, 1=enable receiver" }
        - { name: "tx_enable", bits: [6, 6], access: "rw", reset: 0x1, write_effect: "Enable/disable transmitter", description: "TX enable: 0=disable transmitter, 1=enable transmitter" }
        - { name: "reserved_31_7", bits: [31, 7], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "BAUD_DIV"
      offset: 0x14
      width: 32
      access: "rw"
      reset: 0x00000145
      category: "control"
      description: "Baud Rate Divisor Register"
      write_side_effects:
        - "Baud rate = pclk_freq / (OVERSAMPLE * (BAUD_DIV + 1))."
        - "Changing BAUD_DIV during active TX or RX frame may corrupt that frame."
      fields:
        - { name: "baud_div", bits: [15, 0], access: "rw", reset: 0x0145, description: "Baud divisor; baud = PCLK/(OVERSAMPLE*(DIV+1)). Default ~9600 baud at 50 MHz / OVERSAMPLE=16" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "INT_EN"
      offset: 0x18
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Enable Register"
      fields:
        - { name: "ie_tx_empty", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "Enable TX empty interrupt", description: "Enable interrupt when TX FIFO becomes empty" }
        - { name: "ie_rx_not_empty", bits: [1, 1], access: "rw", reset: 0x0, write_effect: "Enable RX not empty interrupt", description: "Enable interrupt when RX FIFO is not empty" }
        - { name: "ie_rx_overrun", bits: [2, 2], access: "rw", reset: 0x0, write_effect: "Enable RX overrun interrupt", description: "Enable interrupt on RX overrun" }
        - { name: "ie_frame_error", bits: [3, 3], access: "rw", reset: 0x0, write_effect: "Enable frame error interrupt", description: "Enable interrupt on frame error" }
        - { name: "ie_parity_error", bits: [4, 4], access: "rw", reset: 0x0, write_effect: "Enable parity error interrupt", description: "Enable interrupt on parity error" }
        - { name: "reserved_31_5", bits: [31, 5], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "INT_PEND"
      offset: 0x1C
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Pending Register (read-only; clear via INT_CLR)"
      fields:
        - { name: "ip_tx_empty", bits: [0, 0], access: "ro", reset: 0x0, description: "TX empty interrupt pending" }
        - { name: "ip_rx_not_empty", bits: [1, 1], access: "ro", reset: 0x0, description: "RX not empty interrupt pending" }
        - { name: "ip_rx_overrun", bits: [2, 2], access: "ro", reset: 0x0, description: "RX overrun interrupt pending" }
        - { name: "ip_frame_error", bits: [3, 3], access: "ro", reset: 0x0, description: "Frame error interrupt pending" }
        - { name: "ip_parity_error", bits: [4, 4], access: "ro", reset: 0x0, description: "Parity error interrupt pending" }
        - { name: "reserved_31_5", bits: [31, 5], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "INT_CLR"
      offset: 0x20
      width: 32
      access: "w1c"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Clear Register (write-1-to-clear pending bits)"
      write_side_effects:
        - "Writing 1 to a bit clears the corresponding INT_PEND bit on the next cycle."
        - "Writing 0 has no effect."
      fields:
        - { name: "ic_tx_empty", bits: [0, 0], access: "w1c", reset: 0x0, write_effect: "Clear tx_empty pending", description: "W1C TX empty interrupt" }
        - { name: "ic_rx_not_empty", bits: [1, 1], access: "w1c", reset: 0x0, write_effect: "Clear rx_not_empty pending", description: "W1C RX not empty interrupt" }
        - { name: "ic_rx_overrun", bits: [2, 2], access: "w1c", reset: 0x0, write_effect: "Clear rx_overrun pending", description: "W1C RX overrun interrupt" }
        - { name: "ic_frame_error", bits: [3, 3], access: "w1c", reset: 0x0, write_effect: "Clear frame_error pending", description: "W1C frame error interrupt" }
        - { name: "ic_parity_error", bits: [4, 4], access: "w1c", reset: 0x0, write_effect: "Clear parity_error pending", description: "W1C parity error interrupt" }
        - { name: "reserved_31_5", bits: [31, 5], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "DEBUG_BYTES_TX"
      offset: 0x24
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "debug"
      description: "Debug counter: total bytes transmitted"
      fields:
        - { name: "bytes_tx", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Rollover counter of bytes successfully transmitted" }

    - name: "DEBUG_BYTES_RX"
      offset: 0x28
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "debug"
      description: "Debug counter: total bytes received"
      fields:
        - { name: "bytes_rx", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Rollover counter of bytes successfully received" }

    - name: "DEBUG_FRAMES_ERR"
      offset: 0x2C
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "debug"
      description: "Debug counter: frames with framing errors"
      fields:
        - { name: "frames_errored", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Rollover counter of received frames with framing errors" }

    - name: "DEBUG_PARITIES_ERR"
      offset: 0x30
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "debug"
      description: "Debug counter: frames with parity errors"
      fields:
        - { name: "parities_errored", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Rollover counter of received frames with parity errors" }

memory:
  instances:
    - { name: "tx_fifo", type: "synchronous_fifo", depth: 16, width: 8, read_ports: 1, write_ports: 1, latency: 1, description: "TX FIFO: parameterized to FIFO_DEPTH x DATA_WIDTH" }
    - { name: "rx_fifo", type: "synchronous_fifo", depth: 16, width: 8, read_ports: 1, write_ports: 1, latency: 1, description: "RX FIFO: parameterized to FIFO_DEPTH x DATA_WIDTH" }
    - { name: "tx_shift_reg", type: "register", depth: 1, width: 11, read_ports: 1, write_ports: 1, latency: 0, description: "TX shift register: DATA_WIDTH + parity + stop (max 11 bits for 8+1+2)" }
    - { name: "rx_shift_reg", type: "register", depth: 1, width: 11, read_ports: 1, write_ports: 1, latency: 0, description: "RX shift register: DATA_WIDTH + parity + stop (max 11 bits)" }
    - { name: "rx_sync_ff", type: "register", depth: 2, width: 1, read_ports: 0, write_ports: 0, latency: 0, description: "2-FF synchronizer for rx input" }

interrupts:
  sources:
    - { name: "tx_empty", bit: 0, type: "level", enable_reg: "INT_EN.ie_tx_empty", status_reg: "INT_PEND.ip_tx_empty", pending_reg: "INT_PEND.ip_tx_empty", clear: "W1C via INT_CLR.ic_tx_empty", description: "TX FIFO becomes empty after having been non-empty" }
    - { name: "rx_not_empty", bit: 1, type: "level", enable_reg: "INT_EN.ie_rx_not_empty", status_reg: "INT_PEND.ip_rx_not_empty", pending_reg: "INT_PEND.ip_rx_not_empty", clear: "W1C via INT_CLR.ic_rx_not_empty", description: "RX FIFO becomes non-empty" }
    - { name: "rx_overrun", bit: 2, type: "edge", enable_reg: "INT_EN.ie_rx_overrun", status_reg: "INT_PEND.ip_rx_overrun", pending_reg: "INT_PEND.ip_rx_overrun", clear: "W1C via INT_CLR.ic_rx_overrun", description: "RX overrun event (data lost)" }
    - { name: "frame_error", bit: 3, type: "edge", enable_reg: "INT_EN.ie_frame_error", status_reg: "INT_PEND.ip_frame_error", pending_reg: "INT_PEND.ip_frame_error", clear: "W1C via INT_CLR.ic_frame_error", description: "Framing error detected on RX" }
    - { name: "parity_error", bit: 4, type: "edge", enable_reg: "INT_EN.ie_parity_error", status_reg: "INT_PEND.ip_parity_error", pending_reg: "INT_PEND.ip_parity_error", clear: "W1C via INT_CLR.ic_parity_error", description: "Parity error detected on RX" }
  output:
    signal: "uart_irq"
    polarity: "active_high"
    type: "level"
    note: "uart_irq = OR_{i} (INT_EN[i] & INT_PEND[i]). Level-type pending bits (tx_empty, rx_not_empty) re-assert on the next cycle if the condition persists after W1C clear."

fsm:
  tx_fsm:
    states:
      - "TX_IDLE"
      - "TX_START"
      - "TX_DATA"
      - "TX_PARITY"
      - "TX_STOP"
    transitions:
      - { from: "TX_IDLE", to: "TX_START",  condition: "tx_fifo_not_empty AND tx_enable AND NOT send_break AND baud_tick" }
      - { from: "TX_START", to: "TX_DATA",  condition: "baud_tick" }
      - { from: "TX_DATA", to: "TX_DATA",   condition: "baud_tick AND bit_count < DATA_WIDTH-1" }
      - { from: "TX_DATA", to: "TX_PARITY", condition: "baud_tick AND bit_count == DATA_WIDTH-1 AND parity_en" }
      - { from: "TX_DATA", to: "TX_STOP",   condition: "baud_tick AND bit_count == DATA_WIDTH-1 AND NOT parity_en" }
      - { from: "TX_PARITY", to: "TX_STOP", condition: "baud_tick" }
      - { from: "TX_STOP", to: "TX_STOP",   condition: "baud_tick AND stop_bit_count < total_stop_bits-1" }
      - { from: "TX_STOP", to: "TX_IDLE",   condition: "baud_tick AND stop_bit_count == total_stop_bits-1" }
      - { from: "*", to: "TX_IDLE",         condition: "send_break (force tx low, abort any frame)" }
    outputs:
      tx_line: "0 in TX_START, tx_shift_reg[0] in TX_DATA, computed_parity in TX_PARITY, 1 in TX_STOP, 1 in TX_IDLE, 0 in send_break"
    note: "total_stop_bits = (CTRL.stop_bits == 0) ? 1 : 2"

  rx_fsm:
    states:
      - "RX_IDLE"
      - "RX_START"
      - "RX_DATA"
      - "RX_PARITY"
      - "RX_STOP"
    transitions:
      - { from: "RX_IDLE",  to: "RX_START",  condition: "rx_enable AND falling_edge_detected(rx_synced) AND baud_tick_mid" }
      - { from: "RX_START", to: "RX_DATA",   condition: "baud_tick AND rx_synced == 0 (verify start bit at mid-sample)" }
      - { from: "RX_START", to: "RX_IDLE",   condition: "baud_tick AND rx_synced == 1 (false start)" }
      - { from: "RX_DATA",  to: "RX_DATA",   condition: "baud_tick AND bit_count < DATA_WIDTH-1" }
      - { from: "RX_DATA",  to: "RX_PARITY", condition: "baud_tick AND bit_count == DATA_WIDTH-1 AND parity_en" }
      - { from: "RX_DATA",  to: "RX_STOP",   condition: "baud_tick AND bit_count == DATA_WIDTH-1 AND NOT parity_en" }
      - { from: "RX_PARITY", to: "RX_STOP",  condition: "baud_tick" }
      - { from: "RX_STOP",  to: "RX_IDLE",   condition: "baud_tick (after final stop bit sample)" }
    error_detection:
      frame_error: "rx_synced == 0 during RX_STOP stop-bit sample -> set STATUS.frame_error, increment DEBUG_FRAMES_ERR"
      parity_error: "computed_parity != received_parity_bit during RX_PARITY -> set STATUS.parity_error, increment DEBUG_PARITIES_ERR"
      overrun_error: "new RX_DATA ready to push but RX FIFO is full -> set STATUS.overrun_error, discard newest"
    outputs:
      rx_data: "rx_shift_reg after RX_STOP with no errors -> push to RX FIFO, increment DEBUG_BYTES_RX"

  baud_gen:
    description: "Produces baud_tick once every (BAUD_DIV+1) oversample ticks from the 16x oversample counter. baud_tick_mid is asserted at oversample_count == OVERSAMPLE/2 for RX mid-sampling."
    oversample_counter: "0 to OVERSAMPLE-1, increments every pclk, resets on baud_tick"
    baud_tick: "asserted when oversample_counter == 0 AND baud_div_counter == BAUD_DIV"
    baud_tick_mid: "asserted when oversample_counter == OVERSAMPLE/2 AND baud_div_counter == BAUD_DIV"

rtl_contract:
  transaction: "TX_WRITE"
  sample_condition: "APB transactions complete on psel && penable && pready. UART serial sampling at baud_tick or baud_tick_mid aligned to oversample count."
  input_map:
    apb_write_data: "pwdata during APB write access phase"
    apb_address: "paddr during APB setup phase"
    rx_serial: "rx pad via 2-FF synchronizer"
  output_map:
    apb_read_data: "prdata during APB read access phase"
    tx_serial: "tx pad"
    interrupt: "uart_irq"
  state_updates:
    - { name: "tx_fifo_write_ptr", reset: 0, expr: "increment on valid TX_DATA write when not full" }
    - { name: "tx_fifo_read_ptr", reset: 0, expr: "increment on TX_SHIFT pop" }
    - { name: "rx_fifo_write_ptr", reset: 0, expr: "increment on RX_SHIFT push to FIFO" }
    - { name: "rx_fifo_read_ptr", reset: 0, expr: "increment on RX_DATA APB read" }
    - { name: "tx_busy", reset: 0, expr: "1 during TX_START through TX_STOP; 0 in TX_IDLE" }
    - { name: "rx_busy", reset: 0, expr: "1 during RX_START through RX_STOP; 0 in RX_IDLE" }

timing:
  target_clocks:
    - { name: "pclk", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.5 }
  latency_budget:
    apb_access_cycles: { min: 0, max: 1, measured_from: "psel && penable", measured_to: "pready" }
    irq_latency_cycles: { min: 1, max: 2, measured_from: "event condition true", measured_to: "uart_irq assertion" }
  throughput:
    max_baud_hz: 3125000
    conditions: "50 MHz pclk, OVERSAMPLE=16, baud = pclk / OVERSAMPLE max (BAUD_DIV=0 → 3.125 Mbps)"
    effective_throughput_bytes_per_sec: 284090
    note: "At 3.125 Mbps with 8N1 (10 bits/frame): 312.5 kB/s raw; ~284 kB/s sustained with FIFO flow control"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "paddr, psel, penable, pwrite, pwdata, pstrb, rx", clock: "pclk", delay_ns: 2.0, source: "system-level IO budget" }
    outputs:
      - { ports: "prdata, pready, pslverr, tx, uart_irq", clock: "pclk", delay_ns: 2.0, source: "system-level IO budget" }
  false_paths:
    - { from: "presetn", to: "all_registers", reason: "async reset assertion" }
    - { from: "rx", to: "rx_sync_ff[0]", reason: "asynchronous input; first FF in 2-FF synchronizer" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]

power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["pclk"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode in this UART revision; baud generator is free-running"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "presetn deasserted", exit: "presetn asserted", guarantees: ["All architectural behavior active"] }
  upf_required: false

security:
  classification: "non_secure_peripheral_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "serial_data_stream", protection: "No encryption; data visible on tx/rx lines" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO/W1C access policy in registers.register_list" }
    - { threat: "break condition abuse", mitigation: "send_break CSR bit is software-controlled; master must authorize" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "Error conditions (frame/parity/overrun/underrun) are always software-visible"
    - "Loopback mode does not drive rx pad externally"

error_handling:
  error_sources:
    - { id: "ERR_FRAME", condition: "stop bit sampled as 0 during RX_STOP", architectural_effect: "STATUS.frame_error=1, DEBUG_FRAMES_ERR++, INT_PEND.ip_frame_error if enabled" }
    - { id: "ERR_PARITY", condition: "computed parity != received parity bit during RX_PARITY", architectural_effect: "STATUS.parity_error=1, DEBUG_PARITIES_ERR++, INT_PEND.ip_parity_error if enabled" }
    - { id: "ERR_OVERRUN", condition: "RX_FIFO full when new frame data ready to push", architectural_effect: "STATUS.overrun_error=1, new data discarded, INT_PEND.ip_rx_overrun if enabled" }
    - { id: "ERR_UNDERRUN", condition: "TX FSM in TX_START but TX FIFO empty", architectural_effect: "STATUS.underrun_error=1, TX FSM → TX_IDLE, INT_PEND does NOT trigger for underrun directly (software polls STATUS)" }
  propagation:
    - "Sticky error flags accumulate until W1C clear."
    - "Multiple errors can be set simultaneously (e.g., parity error + framing error on same frame)."
    - "Error frames still deliver data to RX FIFO (framing and parity errors only; overrun discards)."
  recovery:
    - { action: "software W1C clear via STATUS_CLR", clears: ["frame_error", "parity_error", "overrun_error", "underrun_error"], preserves: ["configuration registers", "FIFO contents", "debug counters"] }

debug_observability:
  waveform_must_probe:
    - "tx_fifo_empty, tx_fifo_full, rx_fifo_empty, rx_fifo_full"
    - "tx_busy, rx_busy"
    - "tx_fsm_state, rx_fsm_state"
    - "oversample_count, baud_div_count, baud_tick, baud_tick_mid"
    - "tx, rx, rx_synced"
    - "uart_irq"
    - "STATUS bits (frame_error, parity_error, overrun_error, underrun_error)"
  status_outputs:
    - "STATUS register (live FIFO and busy status)"
  trace_events:
    - { name: "tx_frame_start", trigger: "TX FSM enters TX_START" }
    - { name: "tx_frame_done", trigger: "TX FSM returns to TX_IDLE after successful stop bit(s)" }
    - { name: "rx_frame_start", trigger: "RX FSM enters RX_START" }
    - { name: "rx_frame_done", trigger: "RX FSM returns to RX_IDLE after stop bit sample" }
    - { name: "rx_frame_error", trigger: "frame_error set" }
    - { name: "rx_parity_error", trigger: "parity_error set" }
    - { name: "rx_overrun", trigger: "overrun_error set" }
  debug_registers:
    - "DEBUG_BYTES_TX"
    - "DEBUG_BYTES_RX"
    - "DEBUG_FRAMES_ERR"
    - "DEBUG_PARITIES_ERR"

integration:
  bus_attachment:
    control: "APB-lite slave"
  connections:
    - { module: "uart_lite_regs", port: "pclk", signal: "pclk" }
    - { module: "uart_lite_regs", port: "presetn", signal: "presetn" }
    - { module: "uart_lite_regs", port: "irq_o", signal: "uart_irq" }
    - { module: "uart_lite_core", port: "pclk", signal: "pclk" }
    - { module: "uart_lite_core", port: "presetn", signal: "presetn" }
    - { module: "uart_lite_tx", port: "tx_o", signal: "tx" }
    - { module: "uart_lite_rx", port: "rx_i", signal: "rx" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    address_range: "0x00-0x33 (13 registers × 4 bytes)"
    illegal_access_response: "pslverr with pready for addresses outside 0x00-0x33"
  dependencies:
    external_modules: []
    external_clocks: ["pclk"]
    external_resets: ["presetn"]

dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "presetn must be controllable in test mode"
    clocks: ["pclk"]
  observability:
    required_internal_points: ["tx_fsm_state", "rx_fsm_state", "STATUS", "debug_counters"]
  mbist_required: false
  notes: "No SRAM macros; FIFOs are register-based. Loopback mode provides built-in self-test capability."

synthesis:
  dialect: "systemverilog_2012"
  top_module: "uart_lite"
  technology:
    pdk: "sky130"
    standard_cell_library: "sky130_fd_sc_hd"
    liberty_corner: "ss_100C_1v40"
    liberty_env: "SKY130_LIB"
    lef_env: "SKY130_LEF"
    tech_lef_env: "SKY130_TLEF"
    rcx_rules_env: "SKY130_RCX_RULES"
  constraints:
    - "No inferred latches"
    - "All flops reset according to clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs"
    - "Localparam state encoding for FSM states"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/uart_lite.json"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"

pnr:
  utilization_pct: 50
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.60
  io_layers:
    horizontal: "met3"
    vertical: "met2"
  placement:
    density_target: 0.60
    max_displacement_um: null
  cts:
    buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"]
    functional_mode_case_analysis: []
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { min: "met3", max: "met5" }
    drc_waivers: []
  required_outputs:
    - "pnr/out/floorplan.def"
    - "pnr/out/placed.def"
    - "pnr/out/cts.def"
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"

coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/uart_lite_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge pclk or negedge presetn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use a default)"
    - "Active-low async reset: always @(posedge pclk or negedge presetn) with if (!presetn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "Use rtl/uart_lite_param.vh for shared parameter declarations"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam state encoding with logic state/next_state signals"
    - "2-FF synchronizer: two flops in series for rx → rx_sync0 → rx_synced (no reset on first FF)"
  lint_waivers:
    - "UNUSEDSIGNAL: explicit approved tie-offs only"
    - "WIDTHEXPAND: DATA_WIDTH-dependent indexing"

reuse_modules: []

custom:
  assumptions:
    - "pclk frequency default 50 MHz; baud divider reset default 0x145 gives ~9600 baud at 50 MHz with OVERSAMPLE=16"
    - "OVERSAMPLE is even and >= 8; mid-sampling at OVERSAMPLE/2 is valid only for even values"
    - "DATA_WIDTH range 5..8; values outside this range are illegal and may cause synthesis errors"
    - "FIFO_DEPTH is power-of-two; minimum 2; non-power-of-two values are untested"
    - "2-FF synchronizer: first FF has no reset (to avoid metastability-propagation through reset); second FF is reset normally"
    - "RX FIFO overrun policy: discard newest frame (not oldest) — protects already-received data"
    - "TX underrun: does not generate interrupt; software must poll STATUS.underrun_error"
    - "APB pstrb is ignored for register writes (full 32-bit word writes assumed); byte-enable not implemented per pstrb"
    - "APB-lite does not implement PPROT/PSTRB fully; pstrb is input port but treated as 4'b1111 internally"
    - "Break condition: tx line held low as long as send_break=1; no automatic timed break"
    - "Debug counters: free-running 32-bit rollover; no saturation; no clear mechanism"
    - "loopback mode: rx pad is ignored but not tri-stated; external rx line may still toggle but is not sampled"
    - "All reserved register fields read zero and ignore writes"
    - "Parameter CLOCK_FREQ_HZ is for TB/doc only; not used in synthesizable RTL (BAUD_DIV CSR handles baud rate)"

dir_structure:
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"

filelist:
  headers:
    - "rtl/uart_lite_param.vh"
  rtl:
    - "rtl/uart_lite_regs.sv"
    - "rtl/uart_lite_tx_fifo.sv"
    - "rtl/uart_lite_rx_fifo.sv"
    - "rtl/uart_lite_baud_gen.sv"
    - "rtl/uart_lite_tx.sv"
    - "rtl/uart_lite_rx.sv"
    - "rtl/uart_lite_core.sv"
    - "rtl/uart_lite_wrapper.sv"
    - "rtl/uart_lite.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
    - "sim/uart_lite_model.sv"
  firmware:
    - "firmware/uart_lite_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/fsm_diagram.md"
    - "docs/README.md"

test_requirements:
  scenarios:
    - { id: "SC1", name: "TX single byte 8N1", stimulus: "Configure CTRL=0x60. Write 0x41 to TX_DATA.", expected: "tx: start(0), 0x41 LSB-first, stop(1). STATUS.tx_empty returns to 1. DEBUG_BYTES_TX increments by 1.", checker: "Scoreboard captures tx bitstream, verifies start/data/stop sequence.", coverage: ["TX_WRITE", "TX_SHIFT"] }
    - { id: "SC2", name: "RX single byte 8N1", stimulus: "Inject serial bitstream on rx: start(0), 0x55 LSB-first, stop(1). Read RX_DATA.", expected: "rx_data returns 0x55. DEBUG_BYTES_RX increments by 1.", checker: "Scoreboard monitors rx_data reads.", coverage: ["RX_SHIFT", "RX_READ"] }
    - { id: "SC3", name: "TX with parity (8E1)", stimulus: "Configure CTRL.parity_en=1, parity_odd=0. Write 0x03.", expected: "tx frame: start, 8 data bits, parity(0), stop.", checker: "Verify parity bit equals even parity.", coverage: ["TX_PARITY"] }
    - { id: "SC4", name: "RX with parity error (8O1)", stimulus: "Configure parity_en=1, parity_odd=1. Inject 0x00 with parity bit 0.", expected: "STATUS.parity_error set. DEBUG_PARITIES_ERR increments. Byte still readable.", checker: "Verify parity_error sticky flag and counter.", coverage: ["parity_error", "RX_PARITY"] }
    - { id: "SC5", name: "RX framing error", stimulus: "Inject complete frame but drive stop bit as 0.", expected: "STATUS.frame_error set. DEBUG_FRAMES_ERR increments. Byte still readable.", checker: "Check frame_error flag.", coverage: ["frame_error"] }
    - { id: "SC6", name: "RX overrun", stimulus: "Fill RX FIFO (16 bytes without reading). Inject 17th frame.", expected: "STATUS.overrun_error set. 17th byte discarded.", checker: "Verify overrun flag and FIFO contents unchanged.", coverage: ["overrun_error"] }
    - { id: "SC7", name: "TX underrun", stimulus: "Ensure TX FIFO empty. Attempt TX shift.", expected: "underrun_error set. TX FSM returns to idle.", checker: "Check underrun flag.", coverage: ["underrun_error"] }
    - { id: "SC8", name: "Loopback mode", stimulus: "Set CTRL.loopback=1. Write 0xA5 to TX_DATA. Read RX_DATA after frame.", expected: "Received byte equals 0xA5.", checker: "Compare TX written with RX read.", coverage: ["loopback"] }
    - { id: "SC9", name: "Software break", stimulus: "Set CTRL.send_break=1 while TX idle.", expected: "tx line forced low. TX FSM stays in TX_IDLE.", checker: "Verify tx line is 0.", coverage: ["send_break"] }
    - { id: "SC10", name: "2 stop bits (8N2)", stimulus: "Set CTRL.stop_bits=1. Write TX_DATA and capture tx.", expected: "Two stop bits after data.", checker: "Verify two high bits after data.", coverage: ["stop_bits"] }
    - { id: "SC11", name: "DATA_WIDTH=5", stimulus: "Parameterize DATA_WIDTH=5. Write 0x1F to TX_DATA.", expected: "tx frame: start, 5 data bits, stop. RX reads back 0x1F.", checker: "Verify 5-bit frame length.", coverage: ["DATA_WIDTH"] }
    - { id: "SC12", name: "Baud rate change", stimulus: "Write new BAUD_DIV while idle. Transmit and receive at new rate.", expected: "TX and RX operate at new baud rate. No corruption.", checker: "Measure bit periods on tx.", coverage: ["BAUD_DIV"] }
    - { id: "SC13", name: "False start rejection", stimulus: "Inject brief low pulse (<1/2 bit period) on rx.", expected: "RX FSM detects edge, enters RX_START, samples high at mid-sample, returns to RX_IDLE.", checker: "Verify no rx_data pushed.", coverage: ["false_start"] }
    - { id: "SC14", name: "Interrupt TX empty", stimulus: "Enable INT_EN.ie_tx_empty. Write TX_DATA, wait for TX complete.", expected: "INT_PEND.ip_tx_empty asserts. uart_irq asserts. W1C clears pending.", checker: "Verify interrupt flow.", coverage: ["ie_tx_empty"] }
    - { id: "SC15", name: "Interrupt RX not empty", stimulus: "Enable INT_EN.ie_rx_not_empty. Inject RX frame.", expected: "INT_PEND.ip_rx_not_empty asserts. Reading RX_DATA does not clear; W1C does.", checker: "Verify pending persists after data read.", coverage: ["ie_rx_not_empty"] }
    - { id: "SC16", name: "Interrupt parity error", stimulus: "Enable INT_EN.ie_parity_error. Inject frame with parity error.", expected: "INT_PEND.ip_parity_error asserts. uart_irq asserts.", checker: "Verify interrupt assertion.", coverage: ["ie_parity_error"] }
    - { id: "SC17", name: "Interrupt mask independence", stimulus: "Set INT_EN.ie_tx_empty=1, all others 0. Trigger rx_not_empty.", expected: "Only ip_tx_empty asserts; ip_rx_not_empty stays 0.", checker: "Verify each IE bit independently gates its pending bit.", coverage: ["INT_EN"] }
    - { id: "SC18", name: "W1C sticky clear", stimulus: "Inject frame error. Write STATUS_CLR.clr_frame_error=1. Read STATUS.", expected: "STATUS.frame_error cleared. Other STATUS bits unchanged.", checker: "Verify W1C clears only targeted bits.", coverage: ["STATUS_CLR"] }
    - { id: "SC19", name: "APB pslverr on unmapped", stimulus: "APB read from 0x34.", expected: "pslverr asserted with pready.", checker: "Verify pslverr timing.", coverage: ["pslverr"] }
    - { id: "SC20", name: "TX FIFO full backpressure", stimulus: "Write 17 bytes to TX_DATA without draining.", expected: "First 16 accepted. 17th ignored.", checker: "Verify TX FIFO depth enforcement.", coverage: ["tx_full"] }
  scoreboard_checks: 20
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage for what the UART computes or architecturally updates."
      bins:
        - { id: "FCOV_TX_WRITE", source_ref: "function_model.transactions.TX_WRITE", class: "transaction", description: "TX_WRITE transaction observed" }
        - { id: "FCOV_TX_SHIFT", source_ref: "function_model.transactions.TX_SHIFT", class: "transaction", description: "TX_SHIFT transaction observed" }
        - { id: "FCOV_RX_READ", source_ref: "function_model.transactions.RX_READ", class: "transaction", description: "RX_READ transaction observed" }
        - { id: "FCOV_RX_SHIFT", source_ref: "function_model.transactions.RX_SHIFT", class: "transaction", description: "RX_SHIFT transaction observed" }
        - { id: "FCOV_TX_UNDERRUN", source_ref: "function_model.transactions.TX_SHIFT.error_cases", class: "error_case", description: "TX underrun observed" }
        - { id: "FCOV_RX_OVERRUN", source_ref: "function_model.transactions.RX_SHIFT.error_cases", class: "error_case", description: "RX overrun observed" }
        - { id: "FCOV_RX_FRAME_ERR", source_ref: "function_model.transactions.RX_SHIFT.error_cases", class: "error_case", description: "RX frame error observed" }
        - { id: "FCOV_RX_PARITY_ERR", source_ref: "function_model.transactions.RX_SHIFT.error_cases", class: "error_case", description: "RX parity error observed" }
        - { id: "FCOV_LOOPBACK", source_ref: "function_model.transactions.RX_SHIFT.error_cases", class: "mode", description: "Loopback mode observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency/FSM coverage."
      bins:
        - { id: "CCOV_START_MID", source_ref: "cycle_model.start_bit_mid_sample", class: "sampling", description: "Start-bit mid-sample observed" }
        - { id: "CCOV_DATA_CENTER", source_ref: "cycle_model.data_sampling", class: "sampling", description: "Data center-sample observed" }
        - { id: "CCOV_FALSE_START", source_ref: "fsm.rx_fsm.transitions", class: "state_transition", description: "False start recovery observed" }
        - { id: "CCOV_BAUD_TICK", source_ref: "cycle_model.oversample", class: "baud_timing", description: "Baud tick generation correct" }
        - { id: "CCOV_TX_PIPELINE", source_ref: "cycle_model.pipeline", class: "pipeline_stage", description: "All TX pipeline stages observed" }
        - { id: "CCOV_RX_PIPELINE", source_ref: "cycle_model.pipeline", class: "pipeline_stage", description: "All RX pipeline stages observed" }
        - { id: "CCOV_PARITY_ODD", source_ref: "cycle_model.pipeline.TX_SHIFT", class: "configuration", description: "Odd parity exercised" }
        - { id: "CCOV_STOP_2", source_ref: "cycle_model.pipeline.TX_STOP", class: "configuration", description: "2 stop bits exercised" }
        - { id: "CCOV_DW5", source_ref: "cycle_model.pipeline.TX_SHIFT", class: "configuration", description: "DATA_WIDTH=5 exercised" }
        - { id: "CCOV_DW8", source_ref: "cycle_model.pipeline.TX_SHIFT", class: "configuration", description: "DATA_WIDTH=8 exercised" }
        - { id: "CCOV_IRQ_MASK", source_ref: "cycle_model.handshake_rules", class: "interrupt", description: "Independent interrupt mask observed" }
        - { id: "CCOV_W1C", source_ref: "cycle_model.ordering", class: "register", description: "W1C clear timing observed" }
    functional: "Legacy alias: function + cycle coverage must both close."
    code: "line >= 90%"
    branch: "branch >= 85%"
    fsm: "100% declared FSM states and legal transitions covered"
    assertions: "All protocol/order/error assertions pass"

quality_gates:
  ssot:
    pass: "All canonical sections are present, substantive, internally consistent, and have no live TBD placeholders."
    evidence: ["check_ssot_disk.sh PASS", "traceability covers function_model/cycle_model/test_requirements"]
  rtl_gen:
    profile: "production"
    target_scale:
      basis: "calibrated from uart_lite approved architecture — 8 modules, modest size peripheral"
      source_files_min: 9
      modules_min: 8
      procedural_blocks_min: 16
      state_updates_min: 12
      depth_score_min: 8
      logic_modules_min: 6
      behavior_owner_logic_modules_min: 4
    target_scale_waiver:
      approved: false
      reason: ""
      owner: ""
    pass: "SSOT-derived rtl_todo_plan has no blockers/orphans; all implementation TODOs close with fresh evidence."
    evidence: ["rtl/rtl_todo_plan.json", "rtl/rtl_authoring_provenance.json", "sim/fl_rtl_goal_audit.json", "cov/coverage.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, and has no unwaived lint warnings."
    evidence: ["rtl filelist", "compile log", "lint report"]
  dv:
    pass: "Every test_requirements scenario has an executable test, expected/got checker, and coverage bin."
    evidence: ["results.xml", "coverage.json", "VCD/FST waveform"]
  coverage:
    pass: "Functional coverage goals pass and code/FSM/assertion coverage meets thresholds or has approved waiver."
    evidence: ["instrumented coverage report", "coverage_report.md"]
  eda:
    pass: "Synthesis, pre-route STA, PnR, and post-route STA meet SSOT timing/area/power/physical targets or have explicit signed-off waivers."
    evidence: ["syn report", "sta setup/hold report", "wns.json", "pnr report", "routed.def", "routed.spef", "sta-post setup/hold report"]
  signoff:
    pass: "SSOT, RTL, lint, DV, simulation, coverage, and required EDA gates pass with fresh evidence."
    evidence: ["ATLAS progress signoff pass", "artifact timestamps newer than final source edits"]

traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name uart_lite)" }
    - { yaml: "parameters", output: "rtl/uart_lite_param.vh" }
    - { yaml: "io_list.interfaces", output: "rtl/uart_lite_wrapper.sv (port list)" }
    - { yaml: "registers.register_list", output: "rtl/uart_lite_regs.sv + firmware + docs" }
    - { yaml: "function_model", output: "rtl/uart_lite_core.sv + tb/cocotb scoreboard/reference model" }
    - { yaml: "cycle_model", output: "rtl/uart_lite_core.sv pipeline/handshake logic + waveform checks" }
    - { yaml: "fsm", output: "rtl/uart_lite_tx.sv + rtl/uart_lite_rx.sv + docs/fsm_diagram.md" }
    - { yaml: "timing", output: "STA constraints and timing pass/fail criteria" }
    - { yaml: "error_handling", output: "RTL error paths + DV fault scenarios" }
    - { yaml: "security", output: "security/safety mitigations and negative tests" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff criteria" }
    - { yaml: "test_requirements.scenarios", output: "sim/tb_program.sv" }

workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_TX_FSM"
      content: "Implement TX FSM with idle/start/data/parity/stop states"
      detail: "Translate fsm.tx_fsm states, transitions, and outputs into rtl/uart_lite_tx.sv. Include LSB-first shift, parity computation (even/odd per CTRL), and stop bit count per CTRL.stop_bits."
      criteria:
        - "RTL owner logic matches all fsm.tx_fsm transitions"
        - "tx line output matches fsm.tx_fsm.outputs for every state"
        - "Parity computation matches function_model.TX_SHIFT"
      source_refs: ["fsm.tx_fsm", "function_model.transactions.TX_SHIFT"]
      owner_module: "uart_lite_tx"
      owner_file: "rtl/uart_lite_tx.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_RX_FSM"
      content: "Implement RX FSM with 2-FF synchronizer, start/data/parity/stop states, and error detection"
      detail: "Translate fsm.rx_fsm states/transitions/error_detection into rtl/uart_lite_rx.sv. Include false-start recovery, framing/parity error detection, overrun handling."
      criteria:
        - "2-FF synchronizer for rx input"
        - "Start-bit verified at mid-sample (cycle_model.start_bit_mid_sample)"
        - "Data/parity/stop sampled at center (cycle_model.data_sampling)"
        - "Frame/parity/overrun errors set sticky flags per error_handling"
      source_refs: ["fsm.rx_fsm", "cycle_model.start_bit_mid_sample", "cycle_model.data_sampling", "error_handling"]
      owner_module: "uart_lite_rx"
      owner_file: "rtl/uart_lite_rx.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_BAUD_GEN"
      content: "Implement baud-rate generator"
      detail: "Build free-running oversample counter and baud_div_counter per fsm.baud_gen. Generate baud_tick and baud_tick_mid."
      criteria:
        - "Oversample counter 0..OVERSAMPLE-1"
        - "Baud divider counter 0..BAUD_DIV"
        - "baud_tick at oversample==0 AND baud_div==BAUD_DIV"
        - "baud_tick_mid at oversample==OVERSAMPLE/2 AND baud_div==BAUD_DIV"
      source_refs: ["fsm.baud_gen", "cycle_model.oversample"]
      owner_module: "uart_lite_baud_gen"
      owner_file: "rtl/uart_lite_baud_gen.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_FIFOS"
      content: "Implement TX and RX synchronous FIFOs"
      detail: "Parameterized synchronous FIFO (FIFO_DEPTH x DATA_WIDTH). Write/read pointers, empty/full flags. TX FIFO backpressure ignores writes when full. RX FIFO overrun discards newest data."
      criteria:
        - "FIFO depth parameterized by FIFO_DEPTH"
        - "Width parameterized by DATA_WIDTH"
        - "Full/empty flags match pointer positions"
        - "TX write ignored when full; RX overrun on full push"
      source_refs: ["memory.instances", "dataflow", "cycle_model.backpressure"]
      owner_module: "uart_lite_tx_fifo"
      owner_file: "rtl/uart_lite_tx_fifo.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS"
      content: "Implement APB-lite register block"
      detail: "APB-lite decode for 13 registers (0x00-0x33). Implement W1C for STATUS_CLR and INT_CLR. Combinatorial readback for RO registers. Interrupt pending/enable gating."
      criteria:
        - "APB-lite psel/penable/pready handshake per io_list.apb_slave.protocol"
        - "pslverr for unmapped addresses (≥0x34)"
        - "W1C clears on cycle after APB write access phase"
        - "INT_PEND gates by INT_EN before driving uart_irq"
      source_refs: ["registers.register_list", "io_list.apb_slave.protocol", "interrupts"]
      owner_module: "uart_lite_regs"
      owner_file: "rtl/uart_lite_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_CORE"
      content: "Implement core orchestration module"
      detail: "Instantiate all sub-modules. Wire loopback MUX, break control, debug counter updates. Route APB transactions from wrapper to regs block. Wire interrupt."
      criteria:
        - "All sub-modules instantiated with correct port mapping"
        - "Loopback MUX selects tx internal or rx pad per CTRL.loopback"
        - "Send_break overrides tx output"
        - "Debug counters increment on qualifying events"
      source_refs: ["function_model", "features", "dataflow", "integration.connections"]
      owner_module: "uart_lite_core"
      owner_file: "rtl/uart_lite_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_WRAPPER"
      content: "Implement integration wrapper"
      detail: "Top-level port list from io_list. Instantiate uart_lite_core. Connect APB, serial, and interrupt ports."
      criteria:
        - "All io_list ports present in module declaration"
        - "Single uart_lite_core instance"
        - "Direct port-to-port wiring for APB, serial, interrupt"
      source_refs: ["io_list", "integration"]
      owner_module: "uart_lite_wrapper"
      owner_file: "rtl/uart_lite_wrapper.sv"
      priority: "medium"
      required: true
  tb-gen:
    - id: "TB_TODO_SCOREBOARD"
      content: "Implement Python cocotb scoreboard for all 20 scenarios"
      detail: "Build a Python reference model from function_model. For each test_requirements scenario, write a cocotb test that programs registers, injects/monitors serial bitstream, and checks expected vs actual."
      criteria:
        - "All 20 scenarios have executable tests"
        - "Scoreboard compares TX written bytes against tx serial bitstream"
        - "Scoreboard compares RX read bytes against rx serial bitstream"
        - "Error injection tests verify sticky flags and counters"
        - "Coverage bins collected for every coverage_goals bin"
      source_refs: ["function_model", "test_requirements.scenarios", "test_requirements.coverage_goals"]
      priority: "high"
      required: true
  lint: []
  coverage: []
  syn: []
  sta: []
  pnr: []
  sta-post: []

generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh uart_lite", description: "Validate production SSOT structure, function_model, cycle_model, DV plan, and quality gates" }
    - { name: "handoff_fl_model", command: "/ssot-fl-model uart_lite", description: "fl-model-gen writes FunctionalModel, decomposition, and FCOV plan from SSOT" }
    - { name: "handoff_rtl", command: "/ssot-rtl uart_lite", description: "rtl-gen writes RTL directly from the SSOT and proves compile/lint gates" }
    - { name: "handoff_tb", command: "/ssot-tb uart_lite", description: "tb-gen writes cocotb tests, runs simulation, emits results XML, VCD, and functional coverage" }
    - { name: "handoff_sim_debug", command: "/wf sim_debug", description: "sim_debug inspects waveform, failures, coverage evidence, and escalation ownership" }
    - { name: "handoff_coverage", command: "/coverage uart_lite", description: "coverage workflow measures SSOT-declared functional/code/toggle/FSM/assertion goals" }
    - { name: "handoff_eda", command: "/syn uart_lite && /sta uart_lite && /pnr uart_lite && /sta-post uart_lite", description: "EDA workflows produce synthesis, STA, PnR, and post-route STA evidence" }
  atlas_workflows:
    - "ssot-gen"
    - "rtl-gen"
    - "tb-gen"
    - "sim_debug"
    - "coverage"
    - "syn"
    - "pnr"
    - "sta"
    - "sta-post"
