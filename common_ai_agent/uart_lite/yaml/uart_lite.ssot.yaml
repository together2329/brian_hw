top_module:
  name: uart_lite
  file: rtl/uart_lite.sv
  version: '1.0'
  type: peripheral
  description: Parameterized UART transceiver with APB-lite CSR interface, TX/RX FIFOs,
    configurable baud/parity/stop bits, and sticky status interrupts
  reference_spec: "user-defined \u2014 generic UART with oversampling, no hardware\
    \ flow control"
  target:
    technology: generic
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
- name: uart_lite_regs
  file: rtl/uart_lite_regs.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - registers.register_list
  - interrupts
  - error_handling
  source_sections:
  - registers
  - interrupts
  - error_handling
  register_refs:
  - registers.register_list
  description: APB register decode, status aggregation, interrupt combiner
- name: uart_lite_tx
  file: rtl/uart_lite_tx.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - fsm.tx_fsm
  - function_model.transactions.FM_TX_BYTE
  - cycle_model.pipeline
  source_sections:
  - fsm
  - function_model
  - cycle_model
  fsm_refs:
  - fsm.tx_fsm
  function_model_refs:
  - function_model.transactions.FM_TX_BYTE
  cycle_model_refs:
  - cycle_model.pipeline[TX_IDLE]
  - cycle_model.pipeline[TX_START]
  - cycle_model.pipeline[TX_DATA]
  - cycle_model.pipeline[TX_PARITY]
  - cycle_model.pipeline[TX_STOP1]
  - cycle_model.pipeline[TX_STOP2]
  description: TX FSM, shift register, parity generator
- name: uart_lite_rx
  file: rtl/uart_lite_rx.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - fsm.rx_fsm
  - function_model.transactions.FM_RX_BYTE
  - cycle_model.pipeline
  - cycle_model.handshake_rules
  source_sections:
  - fsm
  - function_model
  - cycle_model
  fsm_refs:
  - fsm.rx_fsm
  function_model_refs:
  - function_model.transactions.FM_RX_BYTE
  cycle_model_refs:
  - cycle_model.pipeline[RX_IDLE]
  - cycle_model.pipeline[RX_START_DETECT]
  - cycle_model.pipeline[RX_START_CONFIRM]
  - cycle_model.pipeline[RX_DATA]
  - cycle_model.pipeline[RX_PARITY]
  - cycle_model.pipeline[RX_STOP1]
  - cycle_model.pipeline[RX_STOP2]
  - cycle_model.handshake_rules
  description: RX FSM, 2-FF synchronizer, oversampler, shift register, parity checker
- name: uart_lite_baud_gen
  file: rtl/uart_lite_baud_gen.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - cycle_model.baud_generator
  source_sections:
  - cycle_model
  cycle_model_refs:
  - cycle_model.baud_generator
  description: Baud-rate tick generator from BAUD divisor and OVERSAMPLE
- name: uart_lite_tx_fifo
  file: rtl/uart_lite_tx_fifo.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances
  - dataflow.tx_path
  source_sections:
  - memory
  - dataflow
  memory_refs:
  - memory.instances
  dataflow_refs:
  - dataflow.tx_path
  description: TX FIFO, depth FIFO_DEPTH, width DATA_WIDTH
- name: uart_lite_rx_fifo
  file: rtl/uart_lite_rx_fifo.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances
  - dataflow.rx_path
  source_sections:
  - memory
  - dataflow
  memory_refs:
  - memory.instances
  dataflow_refs:
  - dataflow.rx_path
  description: RX FIFO, depth FIFO_DEPTH, width DATA_WIDTH
- name: uart_lite_core
  file: rtl/uart_lite_core.sv
  ownership: manifest
  ssot_gen: false
  implements:
  - function_model
  - decomposition.units.execute
  - cycle_model
  - dataflow
  - features
  source_sections:
  - function_model
  - decomposition
  - cycle_model
  - dataflow
  - features
  function_model_refs:
  - function_model.transactions
  - function_model.state_variables
  decomposition_refs:
  - decomposition.units.execute
  cycle_model_refs:
  - cycle_model.pipeline
  dataflow_refs:
  - dataflow.sequence
  feature_refs:
  - features
  description: "Top integration \u2014 instantiates all sub-modules and wires them\
    \ together"
decomposition:
  units:
  - id: decode
    kind: control
    source_refs:
    - registers.register_list
    rtl_candidates:
    - uart_lite_regs
    verification_impact:
    - test_requirements.scenarios
  - id: execute_tx
    kind: datapath/control
    source_refs:
    - function_model.transactions.FM_TX_BYTE
    - fsm.tx_fsm
    rtl_candidates:
    - uart_lite_tx
    verification_impact:
    - coverage_plan.functional
  - id: execute_rx
    kind: datapath/control
    source_refs:
    - function_model.transactions.FM_RX_BYTE
    - fsm.rx_fsm
    rtl_candidates:
    - uart_lite_rx
    verification_impact:
    - coverage_plan.functional
  - id: baud_tick
    kind: datapath
    source_refs:
    - cycle_model.baud_generator
    rtl_candidates:
    - uart_lite_baud_gen
    verification_impact:
    - coverage_plan.cycle
parameters:
- name: DATA_WIDTH
  default: 8
  type: int
  range:
  - 5
  - 8
  description: Number of data bits per UART frame
  drives:
  - uart_lite_tx.sv
  - uart_lite_rx.sv
  - uart_lite_tx_fifo.sv
  - uart_lite_rx_fifo.sv
  - uart_lite_regs.sv
- name: FIFO_DEPTH
  default: 16
  type: int
  constraint: power_of_two
  description: TX and RX FIFO depth in entries
  drives:
  - uart_lite_tx_fifo.sv
  - uart_lite_rx_fifo.sv
  - uart_lite_regs.sv
- name: OVERSAMPLE
  default: 16
  type: int
  description: RX oversampling factor (samples per bit)
  drives:
  - uart_lite_rx.sv
  - uart_lite_baud_gen.sv
- name: APB_ADDR_WIDTH
  default: 8
  type: int
  description: APB address width
  drives:
  - uart_lite_regs.sv
- name: APB_DATA_WIDTH
  default: 32
  type: int
  description: APB data width
  drives:
  - uart_lite_regs.sv
- name: CLOCK_FREQ_MHZ
  default: 50
  type: int
  description: Target clock frequency in MHz
  drives:
  - tb_top.sv
  - docs/README.md
- name: RESET_POLARITY
  default: active_low
  type: enum
  values:
  - active_low
  - active_high
  drives:
  - ALL .sv files
io_list:
  clock_domains:
  - name: PCLK
    frequency_mhz: 50
    description: APB and UART core clock
    ports:
    - name: PCLK
      width: 1
      direction: input
      description: System clock
  resets:
  - name: PRESETn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: APB and UART core reset
    ports:
    - name: PRESETn
      width: 1
      direction: input
      description: Active-low reset
  interfaces:
  - name: apb_slave
    type: APB4
    role: slave
    clock_domain: PCLK
    reset_domain: PRESETn
    description: Register access interface
    protocol:
      setup_phase: psel=1, penable=0 captures address/control.
      access_phase: psel=1, penable=1 completes when pready=1.
      read_rule: prdata is valid in the completing access phase for reads.
      write_rule: pwdata/pstrb are sampled in the completing access phase for writes.
      error_rule: pslverr is asserted only with pready=1 for illegal or unsupported
        access.
    ports:
    - name: PADDR
      width: 8
      direction: input
      description: APB address
    - name: PSEL
      width: 1
      direction: input
      description: APB select
    - name: PENABLE
      width: 1
      direction: input
      description: APB enable
    - name: PWRITE
      width: 1
      direction: input
      description: APB write
    - name: PWDATA
      width: 32
      direction: input
      description: APB write data
    - name: PSTRB
      width: 4
      direction: input
      description: APB strobes
    - name: PRDATA
      width: 32
      direction: output
      description: APB read data
    - name: PREADY
      width: 1
      direction: output
      description: APB ready
    - name: PSLVERR
      width: 1
      direction: output
      description: APB error
  - name: uart_serial
    type: custom
    clock_domain: PCLK
    reset_domain: PRESETn
    description: UART serial TX and RX lines
    protocol:
      tx_idle: TX line is high (mark) when idle.
      rx_sync: RX input passes through 2-FF synchronizer before sampling.
      baud_ref: Bit period = (BAUD_DIV + 1) * OVERSAMPLE PCLK cycles.
      oversample: RX samples at OVERSAMPLE rate; mid-bit detection at sample 7 (0-indexed)
        of 16.
    ports:
    - name: tx
      width: 1
      direction: output
      description: UART serial transmit
    - name: rx
      width: 1
      direction: input
      description: UART serial receive
  - name: interrupt
    type: custom
    clock_domain: PCLK
    reset_domain: PRESETn
    description: Interrupt output
    protocol:
      assertion: uart_irq reflects OR of all enabled pending interrupt sources.
      deassertion: uart_irq deasserts after all pending sources are cleared via W1C.
      reset_value: 0
    ports:
    - name: uart_irq
      width: 1
      direction: output
      description: Combined interrupt
features:
- name: TX serialization
  trigger: APB write to TXDATA register when TX FIFO not full
  datapath: "CPU \u2192 APB \u2192 TXDATA register \u2192 TX FIFO \u2192 TX shift\
    \ register \u2192 tx pin (LSB-first)"
  control: "TX FSM: TX_IDLE \u2192 TX_START \u2192 TX_DATA \u2192 TX_PARITY \u2192\
    \ TX_STOP1 \u2192 TX_STOP2 \u2192 TX_IDLE"
  output: Serial UART frame on tx pin
- name: RX deserialization
  trigger: Falling edge on rx pin after 2-FF synchronizer
  datapath: "rx pin \u2192 2-FF sync \u2192 oversampler \u2192 RX shift register \u2192\
    \ RX FIFO \u2192 RXDATA register \u2192 APB read"
  control: "RX FSM: RX_IDLE \u2192 RX_START_DETECT \u2192 RX_START_CONFIRM \u2192\
    \ RX_DATA \u2192 RX_PARITY \u2192 RX_STOP1 \u2192 RX_STOP2 \u2192 RX_IDLE"
  output: Received byte available in RXDATA register
- name: Parity generation/checking
  trigger: Enabled via CTRL.parity_en; CTRL.parity_odd selects even/odd
  datapath: 'TX: XOR of all data bits (optionally inverted for odd). RX: computed
    parity compared to received parity bit.'
  control: TX_PARITY and RX_PARITY FSM states
  output: parity_err sticky flag on mismatch
- name: Loopback test mode
  trigger: CTRL.loopback = 1
  datapath: tx output internally routed to rx synchronizer input after 2-FF stage
  control: Bypasses external rx pin
  output: Transmitted bytes appear in RX FIFO
- name: Break send
  trigger: CTRL.break_send = 1
  datapath: tx pin forced low
  control: Hardware timer for one full frame duration; self-clears break_send
  output: Break condition on tx line
dataflow:
  tx_path:
    source: APB write to TXDATA
    buffer: TX FIFO (depth FIFO_DEPTH, width DATA_WIDTH)
    serializer: TX shift register, LSB-first
    sequence: "APB write \u2192 TXDATA register \u2192 TX FIFO (if not full) \u2192\
      \ TX FSM pops byte \u2192 shift register \u2192 tx pin"
  rx_path:
    source: rx pin
    synchronizer: 2-FF synchronizer (2 PCLK stages)
    oversampler: 16x oversampling; mid-bit sample at count 7
    deserializer: RX shift register, LSB-first
    buffer: RX FIFO (depth FIFO_DEPTH, width DATA_WIDTH)
    destination: APB read from RXDATA
    sequence: "rx pin \u2192 2-FF sync \u2192 oversampler \u2192 start detect \u2192\
      \ shift register \u2192 RX FIFO (if not full) \u2192 RXDATA register \u2192\
      \ APB read"
  loopback_control:
    path: "tx pin \u2192 internal mux \u2192 rx synchronizer input (after 2-FF)"
    trigger: CTRL.loopback = 1
function_model:
  purpose: Executable behavioral contract for rtl-gen and tb-gen; describes what the
    UART computes independent of cycle timing.
  state_variables:
  - name: tx_fifo
    source: memory.instances.tx_fifo
    reset: empty
    description: TX FIFO queue of bytes to transmit
  - name: rx_fifo
    source: memory.instances.rx_fifo
    reset: empty
    description: RX FIFO queue of received bytes
  - name: tx_active
    source: internal
    reset: false
    description: True while TX FSM is not IDLE
  - name: rx_active
    source: internal
    reset: false
    description: True while RX FSM is not IDLE
  - name: baud_div
    source: registers.BAUD.baud_div
    reset: 324
    description: Baud divisor register value
  - name: parity_en
    source: registers.CTRL.parity_en
    reset: false
    description: Parity enable
  - name: parity_odd
    source: registers.CTRL.parity_odd
    reset: false
    description: Parity odd/even select
  - name: stop_bits
    source: registers.CTRL.stop_bits
    reset: false
    description: 0=1 stop, 1=2 stop
  - name: loopback
    source: registers.CTRL.loopback
    reset: false
    description: Loopback mode active
  - name: break_send
    source: registers.CTRL.break_send
    reset: false
    description: Break send active; self-clears
  transactions:
  - id: FM_TX_BYTE
    name: transmit_byte
    sample_stage: TX_START
    preconditions:
    - tx_enable == 1
    - tx_fifo not empty
    - tx_active == false
    - break_send == false
    inputs:
    - byte d popped from tx_fifo
    outputs:
    - 'tx line: start bit (0), d[0]..d[DATA_WIDTH-1] LSB-first, parity bit (if parity_en),
      1 or 2 stop bits (1)'
    - "tx_active transitions true \u2192 false across the frame"
    side_effects:
    - debug counter bytes_tx increments by 1
    - tx_fifo level decreases by 1
    - STAT.tx_empty updates when FIFO becomes empty
    error_cases:
    - condition: tx_fifo empty when TX FSM requests byte
      result: underrun_err sticky flag set; frame aborted with tx returning to idle
        (mark)
    output_rules:
    - name: tx_serial
      port: tx
      expr: '1'
    state_updates:
    - name: tx
      reset: 1
      expr: '1'
  - id: FM_RX_BYTE
    name: receive_byte
    preconditions:
    - rx_enable == 1
    - rx_active == false
    - rx_fifo not full
    inputs:
    - rx line serial stream after 2-FF synchronizer
    outputs:
    - byte d reconstructed from sampled bits pushed to rx_fifo
    - STAT.rx_not_empty set
    side_effects:
    - debug counter bytes_rx increments by 1
    - rx_fifo level increases by 1
    - 'If parity_en and parity mismatch: parity_err sticky set, parities_errored incremented'
    - 'If stop bit(s) not high: frame_err sticky set, frames_errored incremented'
    error_cases:
    - condition: rx_fifo full when new byte ready
      result: overrun_err sticky flag set; received byte discarded
    - condition: spurious start bit (mid-bit sample high)
      result: rx_active returns false; no byte pushed
    - condition: 'frame_err: stop bit sampled low'
      result: frame_err sticky set; byte still pushed to rx_fifo if space available
    - condition: 'parity_err: computed parity != received parity bit'
      result: parity_err sticky set; byte still pushed to rx_fifo if space available
    output_rules:
    - name: rx_irq
      port: uart_irq
      expr: '0'
    state_updates:
    - name: uart_irq
      reset: 0
      expr: '0'
  - id: FM_BREAK_SEND
    name: send_break
    preconditions:
    - break_send written to 1 via CTRL register
    inputs:
    - none
    outputs:
    - tx line forced low for duration of one full frame (start+data+parity+stop bits)
    side_effects:
    - break_send self-clears to 0 after break completes
    - TX FSM held in IDLE during break
    output_rules:
    - name: tx_serial
      port: tx
      expr: '1'
    state_updates:
    - name: tx
      reset: 1
      expr: '0'
  - id: FM_LOOPBACK
    name: loopback_mode
    preconditions:
    - loopback == 1
    inputs:
    - tx line output
    outputs:
    - rx synchronizer input connected to tx output (after 2-FF synchronizer stage)
    side_effects:
    - External rx pin ignored
    - All TX bytes appear as received bytes when rx_enable == 1
    output_rules:
    - name: loopback_tx
      port: tx
      expr: '1'
    state_updates:
    - name: tx
      reset: 1
      expr: '1'
  invariants:
  - "TX FIFO never underflows during a valid frame \u2014 underrun terminates frame\
    \ early."
  - RX FIFO never overflows without sticky overrun_err flag.
  - Register read side effects are exactly those listed in registers.register_list.
  - Sticky status flags remain set until explicitly cleared via CLR_STAT W1C.
  - Debug counters are free-running, read-only, and wrap at 0xFFFFFFFF.
  reference_model_hint: tb-gen should implement a Python scoreboard that feeds TX
    bytes and checks RX bytes match in loopback mode, and checks error flags trigger
    per scenario.
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen; describes when TX/RX state, baud
    ticks, sampling, and interrupts may change.
  executable: pymtl3
  backend_policy: Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel
    as the behavioral oracle and run direct Python smoke checks instead of relying
    on pytest-pymtl3.
  clock: PCLK
  reset:
    assertion: PRESETn low asynchronously clears all architectural state
    deassertion: state is usable on the first rising edge after synchronized deassertion
  baud_generator:
    oversample_factor: 16
    parameter: OVERSAMPLE
    tick_formula: baud_tick asserted when internal counter == (baud_div * OVERSAMPLE)
      - 1; counter resets to 0
    counter_width: ceil(log2(max_baud_div * OVERSAMPLE))
    mid_sample_point: 7
    description: RX samples data/parity/stop bits at the centre of each bit period
      (oversample count 7 of 16). Start-bit confirmation also at count 7.
  latency:
    register_read:
      min_cycles: 0
      max_cycles: 1
      description: APB read data and PREADY timing
    register_write:
      min_cycles: 0
      max_cycles: 1
      description: APB write acceptance timing
    tx_byte:
      min_cycles: baud_tick_period * (1 + DATA_WIDTH + parity_en + stop_bits)
      max_cycles: null
      description: TX frame duration; max unbounded if TX FIFO is empty and no new
        data
    rx_byte:
      min_cycles: baud_tick_period * (1 + DATA_WIDTH + parity_en + stop_bits)
      max_cycles: null
      description: RX frame duration; max unbounded waiting for start bit
  handshake_rules:
  - signal: tx
    rule: Driven synchronously to PCLK; changes only on baud_tick boundaries at TX
      FSM state transitions. Idle state is high (mark).
  - signal: rx
    rule: External async input. Passed through 2-FF synchronizer. Synchronizer output
      sampled on every PCLK edge by RX FSM start-bit detector.
  - signal: PREADY
    rule: Asserted in the access phase (PSEL=1, PENABLE=1) for all valid register
      addresses. Deasserted otherwise.
  - signal: PSLVERR
    rule: Asserted only with PREADY=1 for accesses to unimplemented address ranges.
  pipeline:
  - stage: TX_IDLE
    cycle: 0
    action: Wait for TX FIFO not empty; assert tx_active=false
    output_rules:
    - name: tx_serial
      port: tx
      expr: '1'
      width: 1
    - name: tx_active
      expr: '0'
      width: 1
  - stage: TX_START
    cycle: 1
    action: Drive tx=0 for one baud tick period; assert tx_active
    output_rules:
    - name: tx_serial
      port: tx
      expr: '0'
      width: 1
    - name: tx_active
      expr: '1'
      width: 1
  - stage: TX_DATA
    cycle: 2..1+DATA_WIDTH
    action: Shift LSB of tx_shift_reg to tx each baud tick; repeat DATA_WIDTH times.
      tx_shift_reg loaded from TX FIFO on entry.
    output_rules:
    - name: tx_serial
      port: tx
      expr: (tx_byte >> data_bit_index) & 1
      width: 1
    - name: tx_active
      expr: '1'
      width: 1
  - stage: TX_PARITY
    cycle: 2+DATA_WIDTH
    action: Drive computed parity bit to tx for one baud tick (present only if parity_en=1)
    output_rules:
    - name: tx_serial
      port: tx
      expr: tx_parity_bit
      width: 1
    - name: tx_active
      expr: '1'
      width: 1
  - stage: TX_STOP1
    cycle: 3+DATA_WIDTH
    action: Drive tx=1 for one baud tick
    output_rules:
    - name: tx_serial
      port: tx
      expr: '1'
      width: 1
    - name: tx_active
      expr: '1'
      width: 1
  - stage: TX_STOP2
    cycle: 4+DATA_WIDTH
    action: Drive tx=1 for one baud tick (present only if stop_bits=1)
    output_rules:
    - name: tx_serial
      port: tx
      expr: '1'
      width: 1
    - name: tx_active
      expr: '0'
      width: 1
  - stage: RX_IDLE
    cycle: 0
    action: Monitor synchronized rx for falling edge; assert rx_active=false
    output_rules:
    - name: rx_active
      expr: '0'
      width: 1
  - stage: RX_START_DETECT
    cycle: 1
    action: On falling edge, wait until oversample count 7
    output_rules:
    - name: rx_active
      expr: '1'
      width: 1
  - stage: RX_START_CONFIRM
    cycle: 2
    action: "At oversample count 7, sample synchronized rx. If low \u2192 confirmed\
      \ start, advance. If high \u2192 spurious, return to RX_IDLE."
    output_rules:
    - name: rx_active
      expr: '1'
      width: 1
  - stage: RX_DATA
    cycle: 3..2+DATA_WIDTH
    action: At oversample count 7 of each subsequent bit period, sample rx into rx_shift_reg
      LSB-first; repeat DATA_WIDTH times
    output_rules:
    - name: rx_active
      expr: '1'
      width: 1
  - stage: RX_PARITY
    cycle: 3+DATA_WIDTH
    action: At oversample count 7, sample parity bit; compute expected parity; compare.
      (present only if parity_en=1)
    output_rules:
    - name: rx_active
      expr: '1'
      width: 1
  - stage: RX_STOP1
    cycle: 4+DATA_WIDTH
    action: "At oversample count 7, sample stop bit. If high \u2192 valid. If low\
      \ \u2192 frame_err."
    output_rules:
    - name: rx_active
      expr: '1'
      width: 1
  - stage: RX_STOP2
    cycle: 5+DATA_WIDTH
    action: At oversample count 7, sample second stop bit. (present only if stop_bits=1)
    output_rules:
    - name: rx_active
      expr: '1'
      width: 1
  ordering:
  - TX FSM does not start a new frame until the current frame completes (no pipelining
    across bytes).
  - RX FSM does not start a new frame until the current frame completes.
  - Interrupt pending bits update on the same PCLK edge as the condition (FIFO threshold
    crossing, error detection, frame completion).
  backpressure:
  - 'TX backpressure: TX FSM waits in TX_IDLE when TX FIFO is empty.'
  - 'RX backpressure: If RX FIFO is full when a new byte would be pushed, overrun_err
    is set and the byte is discarded; RX FSM returns to RX_IDLE.'
  performance:
    frequency_mhz: 50
    throughput:
      max_baud: PCLK / (OVERSAMPLE * 1) = 3.125 Mbaud at baud_div=0
      sustained_bytes_per_second: baud_rate / (1 + DATA_WIDTH + parity_en + stop_bits)
    outstanding:
      tx_max: 16
      rx_max: 16
      description: FIFO depth bounds maximum queued TX/RX bytes
    depth:
      fifo_depth: 16
      oversample_stages: 16
      description: FIFO depth and oversample counter depth
  observability:
  - Every function_model transaction maps to at least one cycle_model TX or RX stage.
  - Baud tick, oversample counter, TX/RX shift registers, and FIFO pointers are observable
    in waveform.
  use_per_cycle_expected: true
clock_reset_domains:
  domains:
  - name: PCLK
    frequency_mhz: 50
    description: APB and UART core clock
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert
cdc_requirements:
  crossings:
  - from: rx (external)
    to: PCLK
    type: async_input
    synchronizer: 2-FF
    depth: 2
    description: RX pin is asynchronous to PCLK; synchronized with 2 back-to-back
      flops
  synchronizers:
  - name: rx_sync_ff1
    type: flop
    domain: PCLK
    description: First synchronizer stage for rx
  - name: rx_sync_ff2
    type: flop
    domain: PCLK
    description: Second synchronizer stage for rx
  note: Single clock domain design. Only rx pin crossing from external world.
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings \u2014 single reset PRESETn"
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
  bit_order: lsb0
  bits_format: '[msb, lsb]'
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved fields read as zero and do not allocate storage.
  register_list:
  - name: CTRL
    offset: 0
    width: 32
    access: rw
    reset: 0
    category: control
    description: Control Register
    write_side_effects:
    - Fields take effect immediately on APB write; TX/RX enable changes during active
      transfer follow error_handling rules.
    - loopback=1 internally connects tx to rx synchronizer input after the 2-FF stage.
    - break_send=1 forces tx low for at least one full frame duration (start+data+parity+stop)
      then self-clears.
    fields:
    - name: tx_enable
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: Enable transmitter
    - name: rx_enable
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: Enable receiver
    - name: loopback
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: "Loopback test mode: internal tx\u2192rx connection"
    - name: break_send
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      description: Send break (force tx=0); self-clears after one frame
    - name: parity_en
      bits:
      - 4
      - 4
      access: rw
      reset: 0
      description: Enable parity generation/checking
    - name: parity_odd
      bits:
      - 5
      - 5
      access: rw
      reset: 0
      description: 0=even parity, 1=odd parity (when parity_en=1)
    - name: stop_bits
      bits:
      - 6
      - 6
      access: rw
      reset: 0
      description: 0=1 stop bit, 1=2 stop bits
    - name: reserved_31_7
      bits:
      - 31
      - 7
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: STAT
    offset: 4
    width: 32
    access: ro
    reset: 0
    category: status
    description: "Status Register \u2014 live FIFO flags and sticky error flags"
    fields:
    - name: tx_full
      bits:
      - 0
      - 0
      access: ro
      reset: 0
      description: TX FIFO full (live)
    - name: tx_empty
      bits:
      - 1
      - 1
      access: ro
      reset: 1
      description: TX FIFO empty (live)
    - name: rx_empty
      bits:
      - 2
      - 2
      access: ro
      reset: 1
      description: RX FIFO empty (live)
    - name: rx_full
      bits:
      - 3
      - 3
      access: ro
      reset: 0
      description: RX FIFO full (live)
    - name: tx_busy
      bits:
      - 4
      - 4
      access: ro
      reset: 0
      description: Transmitter active (shift register busy)
    - name: rx_busy
      bits:
      - 5
      - 5
      access: ro
      reset: 0
      description: Receiver active (frame in progress)
    - name: frame_err
      bits:
      - 6
      - 6
      access: ro
      reset: 0
      description: Framing error detected (sticky, clear via CLR_STAT)
    - name: parity_err
      bits:
      - 7
      - 7
      access: ro
      reset: 0
      description: Parity error detected (sticky, clear via CLR_STAT)
    - name: overrun_err
      bits:
      - 8
      - 8
      access: ro
      reset: 0
      description: RX overrun (sticky, clear via CLR_STAT)
    - name: underrun_err
      bits:
      - 9
      - 9
      access: ro
      reset: 0
      description: TX underrun (sticky, clear via CLR_STAT)
    - name: reserved_31_10
      bits:
      - 31
      - 10
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: BAUD
    offset: 8
    width: 32
    access: rw
    reset: 324
    category: control
    description: Baud Rate Divisor
    write_side_effects:
    - Changing BAUD during an active TX or RX frame results in the current frame completing
      at the old rate; the new divisor takes effect for the next frame.
    fields:
    - name: baud_div
      bits:
      - 15
      - 0
      access: rw
      reset: 324
      description: "Baud divisor: bit_period = (baud_div+1) * OVERSAMPLE PCLK cycles.\
        \ Reset=324 \u2192 9600 baud at 50 MHz/16x."
    - name: reserved_31_16
      bits:
      - 31
      - 16
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: TXDATA
    offset: 12
    width: 32
    access: wo
    reset: 0
    category: data
    description: TX Data Write (pushes to TX FIFO)
    write_side_effects:
    - Writing when tx_full=1 discards data and sets underrun_err sticky flag.
    - On successful write, TX FSM is triggered if idle.
    fields:
    - name: tx_data
      bits:
      - 7
      - 0
      access: wo
      reset: 0
      description: Transmit data byte
    - name: reserved_31_8
      bits:
      - 31
      - 8
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: RXDATA
    offset: 16
    width: 32
    access: ro
    reset: 0
    category: data
    description: RX Data Read (pops from RX FIFO)
    read_side_effects:
    - Reading when rx_empty=1 returns last valid data or 0x00 and does not change
      FIFO state.
    - Successful read pops one byte from RX FIFO.
    fields:
    - name: rx_data
      bits:
      - 7
      - 0
      access: ro
      reset: 0
      description: Received data byte
    - name: reserved_31_8
      bits:
      - 31
      - 8
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: INTEN
    offset: 20
    width: 32
    access: rw
    reset: 0
    category: interrupt
    description: Interrupt Enable Register
    write_side_effects:
    - Changes take effect immediately.
    fields:
    - name: tx_empty_en
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: Enable TX empty interrupt
    - name: rx_not_empty_en
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: Enable RX not empty interrupt
    - name: rx_overrun_en
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: Enable RX overrun interrupt
    - name: frame_err_en
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      description: Enable framing error interrupt
    - name: parity_err_en
      bits:
      - 4
      - 4
      access: rw
      reset: 0
      description: Enable parity error interrupt
    - name: reserved_31_5
      bits:
      - 31
      - 5
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: INTPEND
    offset: 24
    width: 32
    access: rw
    reset: 0
    category: interrupt
    description: Interrupt Pending Register (W1C for set bits)
    write_side_effects:
    - Writing 1 to a bit clears that pending flag. Writing 0 has no effect.
    - Hardware sets pending bits when enabled interrupt conditions occur.
    fields:
    - name: tx_empty_pend
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: TX empty pending (W1C)
    - name: rx_not_empty_pend
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: RX not empty pending (W1C)
    - name: rx_overrun_pend
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: RX overrun pending (W1C)
    - name: frame_err_pend
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      description: Framing error pending (W1C)
    - name: parity_err_pend
      bits:
      - 4
      - 4
      access: rw
      reset: 0
      description: Parity error pending (W1C)
    - name: reserved_31_5
      bits:
      - 31
      - 5
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: CLR_STAT
    offset: 28
    width: 32
    access: rw
    reset: 0
    category: status
    description: Clear Sticky Status Flags (W1C)
    write_side_effects:
    - Writing 1 to a bit clears the corresponding sticky flag in STAT. Writing 0 has
      no effect.
    fields:
    - name: clr_frame_err
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: Clear frame_err (W1C)
    - name: clr_parity_err
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: Clear parity_err (W1C)
    - name: clr_overrun_err
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: Clear overrun_err (W1C)
    - name: clr_underrun_err
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      description: Clear underrun_err (W1C)
    - name: reserved_31_4
      bits:
      - 31
      - 4
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: DBG_BYTES_TX
    offset: 32
    width: 32
    access: ro
    reset: 0
    category: debug
    description: 'Debug Counter: Bytes Transmitted'
    read_side_effects:
    - Read returns current count. Counter wraps at 0xFFFFFFFF.
    fields:
    - name: bytes_tx
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Total bytes transmitted (wrapping)
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: DBG_BYTES_RX
    offset: 36
    width: 32
    access: ro
    reset: 0
    category: debug
    description: 'Debug Counter: Bytes Received'
    fields:
    - name: bytes_rx
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Total bytes received (wrapping)
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: DBG_FRAMES_ERR
    offset: 40
    width: 32
    access: ro
    reset: 0
    category: debug
    description: 'Debug Counter: Framing Errors'
    fields:
    - name: frames_errored
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Total framing errors (wrapping)
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
  - name: DBG_PARITIES_ERR
    offset: 44
    width: 32
    access: ro
    reset: 0
    category: debug
    description: 'Debug Counter: Parity Errors'
    fields:
    - name: parities_errored
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Total parity errors (wrapping)
    output_rules:
    - name: uart_irq
      port: uart_irq
      expr: '0'
memory:
  instances:
  - name: tx_fifo
    type: sram_fifo
    depth: 16
    width: DATA_WIDTH
    read_ports: 1
    write_ports: 1
    latency: 1
    description: "TX FIFO \u2014 parameterized to FIFO_DEPTH \xD7 DATA_WIDTH; write\
      \ on APB write to TXDATA, read on TX FSM pop"
  - name: rx_fifo
    type: sram_fifo
    depth: 16
    width: DATA_WIDTH
    read_ports: 1
    write_ports: 1
    latency: 1
    description: "RX FIFO \u2014 parameterized to FIFO_DEPTH \xD7 DATA_WIDTH; write\
      \ on RX frame complete, read on APB read from RXDATA"
  note: FIFOs implemented as SRAM-based circular buffers with read/write pointers.
    Depth parameter FIFO_DEPTH (default 16, power-of-two).
interrupts:
  sources:
  - name: tx_empty
    bit: 0
    type: level
    enable_reg: INTEN[0]
    status_reg: INTPEND
    clear: W1C
    description: TX FIFO empty
  - name: rx_not_empty
    bit: 1
    type: level
    enable_reg: INTEN[1]
    status_reg: INTPEND
    clear: W1C
    description: RX FIFO not empty
  - name: rx_overrun
    bit: 2
    type: level
    enable_reg: INTEN[2]
    status_reg: INTPEND
    clear: W1C
    description: RX FIFO overrun
  - name: frame_error
    bit: 3
    type: level
    enable_reg: INTEN[3]
    status_reg: INTPEND
    clear: W1C
    description: Framing error detected
  - name: parity_error
    bit: 4
    type: level
    enable_reg: INTEN[4]
    status_reg: INTPEND
    clear: W1C
    description: Parity error detected
  output:
    signal: uart_irq
    polarity: active_high
    type: level
fsm:
  tx_fsm:
    states:
    - TX_IDLE
    - TX_START
    - TX_DATA
    - TX_PARITY
    - TX_STOP1
    - TX_STOP2
    transitions:
    - from: TX_IDLE
      to: TX_START
      condition: TX FIFO not empty and baud tick
    - from: TX_START
      to: TX_DATA
      condition: baud tick (1 bit period elapsed)
    - from: TX_DATA
      to: TX_PARITY
      condition: DATA_WIDTH bits transmitted and parity_en=1 and baud tick
    - from: TX_DATA
      to: TX_STOP1
      condition: DATA_WIDTH bits transmitted and parity_en=0 and baud tick
    - from: TX_PARITY
      to: TX_STOP1
      condition: baud tick
    - from: TX_STOP1
      to: TX_IDLE
      condition: stop_bits=0 and baud tick
    - from: TX_STOP1
      to: TX_STOP2
      condition: stop_bits=1 and baud tick
    - from: TX_STOP2
      to: TX_IDLE
      condition: baud tick
  rx_fsm:
    states:
    - RX_IDLE
    - RX_START_DETECT
    - RX_START_CONFIRM
    - RX_DATA
    - RX_PARITY
    - RX_STOP1
    - RX_STOP2
    transitions:
    - from: RX_IDLE
      to: RX_START_DETECT
      condition: rx_synced falling edge detected
    - from: RX_START_DETECT
      to: RX_START_CONFIRM
      condition: mid-bit sample at oversample count 7 confirms low
    - from: RX_START_DETECT
      to: RX_IDLE
      condition: mid-bit sample at oversample count 7 is high (spurious edge)
    - from: RX_START_CONFIRM
      to: RX_DATA
      condition: full bit period from start confirm; oversample tick
    - from: RX_DATA
      to: RX_PARITY
      condition: DATA_WIDTH bits sampled at centre and parity_en=1 and oversample
        tick
    - from: RX_DATA
      to: RX_STOP1
      condition: DATA_WIDTH bits sampled at centre and parity_en=0 and oversample
        tick
    - from: RX_PARITY
      to: RX_STOP1
      condition: parity bit sampled at centre and oversample tick
    - from: RX_STOP1
      to: RX_IDLE
      condition: stop_bits=0; stop bit sampled high at centre and oversample tick
    - from: RX_STOP1
      to: RX_STOP2
      condition: stop_bits=1 and oversample tick
    - from: RX_STOP2
      to: RX_IDLE
      condition: oversample tick
    error_detection:
    - state: RX_STOP1
      condition: "stop bit sampled low \u2192 frame_err sticky flag set"
    - state: RX_STOP2
      condition: "stop bit sampled low \u2192 frame_err sticky flag set"
    - state: RX_DATA
      condition: "RX FIFO full when new byte ready \u2192 overrun_err sticky flag;\
        \ frame discarded"
rtl_contract:
  transaction: FM_TX_BYTE, FM_RX_BYTE
  input_map:
    tx_data: APB write to TXDATA register
    rx_serial: rx pin (after 2-FF synchronizer)
  output_map:
    tx_serial: tx pin
    rx_data: APB read from RXDATA register
    status: registers.STAT
    interrupt: uart_irq
  state_updates:
  - name: tx
    reset: 1
    expr: '1'
  - name: uart_irq
    reset: 0
    expr: '0'
  sample_condition: '1'
  clock: PCLK
  reset: PRESETn
  reset_active: low
timing:
  target_clocks:
  - name: PCLK
    frequency_mhz: 50
    duty_cycle: 0.5
    uncertainty_ns: 0.5
  latency_budget:
    register_access_cycles:
      min: 1
      max: 2
      measured_from: PSEL && PENABLE
      measured_to: PREADY
    interrupt_latency_cycles:
      min: 1
      max: 3
      measured_from: status condition
      measured_to: uart_irq assertion
    tx_byte_cycles:
      min: baud_tick * (1 + DATA_WIDTH + parity_en + stop_bits)
      max: null
      note: Max unbounded due to TX FIFO empty wait
    rx_byte_cycles:
      min: baud_tick * (1 + DATA_WIDTH + parity_en + stop_bits)
      max: null
      note: Max unbounded waiting for start bit
  throughput:
    max_baud: 3125000
    sustained_bytes_per_second_formula: baud_rate / (1 + DATA_WIDTH + parity_en +
      stop_bits)
    conditions: Continuous TX with FIFO kept non-empty; RX with back-to-back frames
  timing_exceptions: []
  io_delays:
    inputs:
    - ports:
      - rx
      clock: PCLK
      delay_ns: 2.0
      source: PCB trace + external device
    - ports:
      - PADDR
      - PSEL
      - PENABLE
      - PWRITE
      - PWDATA
      - PSTRB
      clock: PCLK
      delay_ns: 0.5
      source: SoC interconnect
    outputs:
    - ports:
      - tx
      clock: PCLK
      delay_ns: 2.0
      source: PCB trace to external device
    - ports:
      - PRDATA
      - PREADY
      - PSLVERR
      - uart_irq
      clock: PCLK
      delay_ns: 0.5
      source: SoC interconnect
  false_paths:
  - from: PRESETn
    to: all_registers
    reason: async reset assertion
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/setup.rpt
    - sta/out/hold.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_UART
    voltage: nominal
    clock_domains:
    - PCLK
    isolation: not_required_single_domain
  clock_gating:
    required: false
    rationale: Simple peripheral; clock always running. TX/RX FSMs idle in IDLE states.
  reset_retention:
    retention_required: false
    reset_value_source: registers and function_model state_variables
  power_states:
  - name: 'ON'
    entry: PRESETn deasserted
    exit: PRESETn asserted
    guarantees:
    - All UART behavior active
  upf_required: false
security:
  classification: non_secure_peripheral
  assets:
  - name: register_map
    protection: APB access control is external to this IP
  - name: uart_data_stream
    protection: No encryption; data visible on tx/rx pins
  threat_model:
  - threat: illegal register write
    mitigation: RO/WO/W1C access policy in registers.register_list; reserved fields
      ignore writes
  - threat: data corruption via noise
    mitigation: Parity detection; framing error detection; sticky error flags
  privilege_model: External bus fabric enforces privilege; this IP implements no internal
    privilege levels
  safety_goals:
  - "No silent data corruption \u2014 parity/framing errors are always flagged"
  - Error conditions are software-visible and interruptible
error_handling:
  error_sources:
  - id: ERR_FRAME
    condition: RX stop bit(s) sampled low
    architectural_effect: STAT.frame_err sticky set; DBG_FRAMES_ERR incremented; frame_error
      interrupt if enabled
  - id: ERR_PARITY
    condition: RX computed parity != received parity bit
    architectural_effect: STAT.parity_err sticky set; DBG_PARITIES_ERR incremented;
      parity_error interrupt if enabled
  - id: ERR_OVERRUN
    condition: RX FIFO full when new byte ready to push
    architectural_effect: STAT.overrun_err sticky set; received byte discarded; rx_overrun
      interrupt if enabled
  - id: ERR_UNDERRUN
    condition: TX FIFO empty when TX FSM requests next byte during active frame
    architectural_effect: STAT.underrun_err sticky set; frame aborted; tx returns
      to idle (mark)
  propagation:
  - Sticky error flags in STAT remain set until software clears them via CLR_STAT
    W1C.
  - Multiple errors may accumulate; each sticky flag is independent.
  - Error bytes (frame_err, parity_err) are still pushed to RX FIFO if space is available.
  recovery:
  - action: software W1C write to CLR_STAT
    clears:
    - STAT.frame_err
    - STAT.parity_err
    - STAT.overrun_err
    - STAT.underrun_err
    preserves:
    - configuration registers (CTRL, BAUD, INTEN)
  - action: software W1C write to INTPEND
    clears:
    - pending interrupt bits
    preserves:
    - sticky status flags (use CLR_STAT for those)
debug_observability:
  waveform_must_probe:
  - state (TX FSM state, RX FSM state)
  - function_model.state_variables (tx_fifo_level, rx_fifo_level, tx_active, rx_active)
  - cycle_model.handshake_rules signals (tx, rx_synced, baud_tick)
  - interrupt output (uart_irq)
  - oversample_counter
  - tx_shift_reg, rx_shift_reg
  status_outputs:
  - STAT register (all live FIFO flags and sticky error flags)
  trace_events:
  - name: tx_start
    trigger: TX FSM leaves TX_IDLE
  - name: tx_done
    trigger: TX FSM returns to TX_IDLE after frame
  - name: rx_start
    trigger: RX FSM leaves RX_IDLE
  - name: rx_done
    trigger: RX FSM returns to RX_IDLE after valid frame
  - name: rx_error
    trigger: Any sticky error flag asserted
  debug_registers:
  - DBG_BYTES_TX
  - DBG_BYTES_RX
  - DBG_FRAMES_ERR
  - DBG_PARITIES_ERR
integration:
  bus_attachment:
    control: APB4 slave
  connections:
  - module: uart_lite_core
    port: PCLK
    signal: PCLK
  - module: uart_lite_core
    port: PRESETn
    signal: PRESETn
  - module: uart_lite_regs
    port: uart_irq_o
    signal: uart_irq
  - module: uart_lite_core
    port: tx_o
    signal: tx
  - module: uart_lite_core
    port: rx_i
    signal: rx
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: SoC interconnect
    implemented_range: "0x00 - 0x2F (12 registers \xD7 4 bytes)"
    illegal_access_response: PSLVERR asserted with PREADY=1 for addresses >= 0x30
  dependencies:
    external_modules: []
    external_clocks:
    - PCLK
    external_resets:
    - PRESETn
  integration_notes:
  - "APB pstrb[3:0] byte strobes \u2014 writes use full 32-bit word; partial byte\
    \ writes to registers may be ignored per reserved_field_policy."
  - SoC interrupt controller samples uart_irq as active-high level.
  - External rx pin requires PCB-level pull-up to avoid spurious start bits when unconnected.
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: PRESETn must be controllable in test mode
    clocks:
    - PCLK
  observability:
    required_internal_points:
    - TX FSM state
    - RX FSM state
    - FIFO pointers
    - STAT register
    - INTPEND register
  mbist_required: false
  notes: No SRAM macro in this configuration; FIFOs are synthesizable flop-based or
    SRAM depending on implementation.
synthesis:
  dialect: systemverilog_2012
  top_module: uart_lite
  technology:
    pdk: sky130
    standard_cell_library: sky130_fd_sc_hd
    liberty_corner: ss_100C_1v40
    liberty_env: SKY130_LIB
    lef_env: SKY130_LEF
    tech_lef_env: SKY130_TLEF
    rcx_rules_env: SKY130_RCX_RULES
  constraints:
  - No inferred latches
  - All flops reset according to clock_reset_domains.reset_scheme
  - No package/interface/modport/function/task/for/while constructs in generated RTL
  - localparam for state encoding; logic for state/next_state
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
  - syn/out/uart_lite.json or syn/out/uart_lite.v
  - syn/out/area.rpt
  - syn/out/timing_summary.rpt
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    buf_list:
    - sky130_fd_sc_hd__clkbuf_4
    - sky130_fd_sc_hd__clkbuf_8
    functional_mode_case_analysis:
    - port: scan_en
      value: 0
      when_present: true
  routing:
    signal_layers:
      min: met1
      max: met5
    clock_layers:
      min: met3
      max: met5
    drc_waivers: []
  required_outputs:
  - pnr/out/floorplan.def
  - pnr/out/placed.def
  - pnr/out/cts.def
  - pnr/out/routed.def
  - pnr/out/routed.v
  - pnr/out/routed.spef
  - pnr/out/pnr.report.md
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/uart_lite_param.vh
  conventions:
  - nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)
  - blocking (=) in combinational always @(*)
  - 'No latches: every combinational branch assigns all outputs (use a default)'
  - 'Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)'
  - Parameterize widths (no hardcoded numbers)
  - Use rtl/uart_lite_param.vh for shared parameter declarations; include it inside
    consuming modules
  - 'ALLOW: input logic / output logic ANSI ports and internal single-driver logic'
  - 'BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage
    / import / interface / modport / function / endfunction / task / endtask / for
    / while / *_pkg.sv'
  - Use localparam state encoding with logic state/next_state signals
  - '2-FF synchronizer for rx pin: two back-to-back flops with ASYNC_REG attribute'
  lint_waivers:
  - 'UNUSEDSIGNAL: explicit approved tie-offs only'
  - 'WIDTHEXPAND: DATA_WIDTH parameter variations; FIFO index calculations'
reuse_modules: []
custom:
  note: No custom extensions
  assumptions:
  - PCLK frequency is 50 MHz; baud divisor reset value (324) targets 9600 baud at
    16x oversampling.
  - TX and RX FIFO depths are equal and set by the single FIFO_DEPTH parameter.
  - DATA_WIDTH range is 5 to 8; values outside this range are not validated.
  - FIFO_DEPTH must be a power of two; non-power-of-two values produce undefined FIFO
    behavior.
  - "APB writes to TXDATA when TX FIFO is full are silently discarded (underrun_err\
    \ only set for TX FSM underrun, not for APB write overflow \u2014 TXDATA write\
    \ to full FIFO is a no-op at the register interface level)."
  - APB reads from RXDATA when RX FIFO is empty return the last valid data (or 0x00
    if never written); no error flag is set.
  - loopback connects tx to rx synchronizer input AFTER the 2-FF stage, so loopback
    data passes through one synchronizer stage before being sampled.
  - "break_send self-clears after one full frame duration even if CPU writes 1 again\
    \ before completion; a new 0\u21921 transition is needed for another break."
  - Parity bit is computed across all DATA_WIDTH data bits (LSB to MSB).
  - Stop bit sampling on RX uses a single mid-bit sample at oversample count 7; no
    majority voting.
  - TX baud tick and RX oversample counter use independent counters clocked by PCLK.
  - Debug counters are free-running 32-bit counters that wrap silently at 0xFFFFFFFF.
dir_structure:
  template_dirs:
    rtl: templates/rtl/
    sim: templates/sim/
  output_dirs:
    rtl: rtl/
    sim: sim/
    firmware: firmware/
    docs: docs/
  yaml_dir: yaml/
  generators_dir: generators/
filelist:
  headers:
  - rtl/uart_lite_param.vh
  rtl:
  - rtl/uart_lite_regs.sv
  - rtl/uart_lite_tx.sv
  - rtl/uart_lite_rx.sv
  - rtl/uart_lite_baud_gen.sv
  - rtl/uart_lite_tx_fifo.sv
  - rtl/uart_lite_rx_fifo.sv
  - rtl/uart_lite_core.sv
  - rtl/uart_lite.sv
  sim:
  - sim/tb_top.sv
  - sim/tb_program.sv
  - sim/uart_lite_model.sv
  firmware:
  - firmware/uart_lite_regs.h
  docs:
  - docs/register_map.md
  - docs/fsm_diagram.md
  - docs/README.md
test_requirements:
  scenarios:
  - id: SC1
    name: TX single byte no parity 1 stop
    stimulus: 'Write one byte to TXDATA when TX FIFO empty. CTRL: tx_enable=1, parity_en=0,
      stop_bits=0.'
    stimulus_machine_spec:
      csr_writes:
        - { offset: 0,  data: 0x01 }     # CTRL.tx_enable=1
        - { offset: 12, data: 0xAB }     # TXDATA = 0xAB (writes byte to TX FIFO)
      timeline:
        - { csr_write: { offset: 0,  data: 0x01 } }
        - { csr_write: { offset: 12, data: 0xAB } }
        - { wait_until: { signal: tx_active, equals: 1, timeout: 32 } }
    expected: tx line shows start=0, DATA_WIDTH data bits LSB-first, 1 stop=1 bit.
      STAT.tx_empty=1 after frame. bytes_tx increments.
    checker: Scoreboard samples tx output and verifies bit pattern matches written
      byte.
    coverage:
    - FM_TX_BYTE
    - TX_IDLE
    - TX_START
    - TX_DATA
    - TX_STOP1
  - id: SC2
    name: RX single byte no parity 1 stop
    stimulus: 'Drive rx line with start=0, 8 data bits LSB-first, 1 stop=1. CTRL:
      rx_enable=1.'
    expected: Byte pushed to RX FIFO. RXDATA reads correct byte. bytes_rx increments.
      No error flags.
    checker: Scoreboard compares rx_data from register read vs driven bit pattern.
    coverage:
    - FM_RX_BYTE
    - RX_IDLE
    - RX_START_DETECT
    - RX_DATA
    - RX_STOP1
  - id: SC3
    name: TX with even parity
    stimulus: 'Write byte 0xA5 to TXDATA. CTRL: tx_enable=1, parity_en=1, parity_odd=0.
      DATA_WIDTH=8.'
    expected: 'Parity bit after data: 0 (even number of 1s: 4 in 0xA5). tx shows start,
      8 data, parity=0, 1 stop.'
    checker: Scoreboard computes expected even parity and verifies tx parity bit.
    coverage:
    - FM_TX_BYTE
    - TX_PARITY
  - id: SC4
    name: RX with odd parity match
    stimulus: 'Drive rx with start, 0xA5 data (4 ones), odd parity=1, stop. CTRL:
      rx_enable=1, parity_en=1, parity_odd=1.'
    expected: Byte 0xA5 pushed to RX FIFO. No parity_err. parities_errored unchanged.
    checker: Scoreboard verifies parity_err = 0 and correct rx_data.
    coverage:
    - FM_RX_BYTE
    - RX_PARITY
  - id: SC5
    name: RX parity error
    stimulus: 'Drive rx with start, 0xA5 data, wrong parity bit (even parity sent,
      but rx expects odd). CTRL: parity_en=1, parity_odd=1.'
    expected: parity_err sticky flag set. Byte still pushed to RX FIFO. parities_errored
      increments.
    checker: Scoreboard verifies STAT.parity_err=1 and rx_data still 0xA5.
    coverage:
    - FM_RX_BYTE.error_cases
    - parity_err
  - id: SC6
    name: RX framing error
    stimulus: 'Drive rx with start, data, stop=0 (invalid). CTRL: rx_enable=1.'
    expected: frame_err sticky flag set. Byte pushed to RX FIFO. frames_errored increments.
    checker: Scoreboard verifies STAT.frame_err=1.
    coverage:
    - FM_RX_BYTE.error_cases
    - frame_err
  - id: SC7
    name: RX overrun
    stimulus: Fill RX FIFO to full (16 bytes). Drive 17th byte on rx.
    expected: 17th byte discarded. overrun_err sticky flag set. RX FIFO still has
      16 bytes.
    checker: Scoreboard checks STAT.overrun_err=1 and RX FIFO count unchanged.
    coverage:
    - FM_RX_BYTE.error_cases
    - overrun_err
  - id: SC8
    name: TX underrun
    stimulus: Start TX FSM with one byte in TX FIFO, then prevent further writes.
      After frame completes, TX FSM goes idle with FIFO empty.
    expected: 'No underrun during normal operation. To trigger underrun: disable TX
      FIFO write while FSM mid-frame (not directly possible via CSR; tested via back-to-back
      framing where FIFO drains). STAT.underrun_err=0 if FIFO never underflows.'
    checker: Scoreboard verifies no spurious underrun_err.
    coverage:
    - FM_TX_BYTE.error_cases
    - underrun_err
  - id: SC9
    name: Loopback mode
    stimulus: 'Enable loopback=1. Write bytes to TXDATA. CTRL: tx_enable=1, rx_enable=1.'
    expected: Transmitted bytes appear in RX FIFO. External rx line ignored. TX and
      RX data match.
    checker: Scoreboard compares TXDATA written vs RXDATA read.
    coverage:
    - FM_LOOPBACK
  - id: SC10
    name: Break send
    stimulus: Write break_send=1 to CTRL.
    expected: tx line held low for at least one full frame duration. break_send self-clears
      to 0.
    checker: Scoreboard measures tx low duration and verifies self-clear.
    coverage:
    - FM_BREAK_SEND
  - id: SC11
    name: 2 stop bits TX/RX
    stimulus: 'Write byte to TXDATA. CTRL: stop_bits=1. Drive corresponding rx pattern
      with 2 stop bits.'
    expected: TX sends 2 stop bits. RX accepts 2 stop bits.
    checker: Scoreboard verifies 2 stop bits on tx and successful rx.
    coverage:
    - TX_STOP2
    - RX_STOP2
  - id: SC12
    name: "Interrupts \u2014 tx_empty"
    stimulus: Enable tx_empty interrupt (INTEN.tx_empty_en=1). Fill TX FIFO, let it
      drain completely.
    expected: INTPEND.tx_empty_pend asserts when TX FIFO goes empty. uart_irq asserts.
      Write 1 to INTPEND.tx_empty_pend clears it; uart_irq deasserts if no other pend.
    checker: Scoreboard checks INTPEND and uart_irq timing.
    coverage:
    - interrupts.tx_empty
  - id: SC13
    name: "Interrupts \u2014 rx_not_empty + clear via W1C"
    stimulus: Enable rx_not_empty interrupt. Drive byte on rx.
    expected: INTPEND.rx_not_empty_pend asserts. uart_irq asserts. Software W1C clears
      pend.
    checker: Scoreboard checks pend assertion and W1C clear.
    coverage:
    - interrupts.rx_not_empty
  - id: SC14
    name: DATA_WIDTH=5
    stimulus: Parameter DATA_WIDTH=5. Write/read 5-bit data.
    expected: TX sends 5 data bits. RX receives 5 data bits. Upper bits in TXDATA
      ignored, RXDATA zero-filled above bit 4.
    checker: Scoreboard verifies correct serialization for 5-bit width.
    coverage:
    - function_model.DATA_WIDTH_variation
  - id: SC15
    name: FIFO full/empty flags
    stimulus: Fill TX FIFO (16 writes), verify tx_full. Drain TX FIFO, verify tx_empty.
      Same for RX.
    expected: STAT.tx_full, tx_empty, rx_full, rx_empty track FIFO levels correctly.
    checker: Scoreboard checks STAT live flags vs FIFO level.
    coverage:
    - STAT FIFO flags
  - id: SC16
    name: Spurious start bit rejection
    stimulus: Drive rx low then high before mid-bit sample (glitch shorter than half
      bit).
    expected: RX FSM returns to RX_IDLE; no byte captured; no error flag.
    checker: Scoreboard verifies no spurious rx_data or error.
    coverage:
    - RX_START_DETECT
    - spurious_start
  - id: SC17
    name: Baud rate change mid-operation
    stimulus: Start TX frame at one baud rate, write new BAUD during frame.
    expected: Current frame completes at old rate. Next frame uses new rate.
    checker: Scoreboard measures bit periods on tx for frame N vs frame N+1.
    coverage:
    - baud_generator
    - cycle_model
  scoreboard_checks: 17
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: 'Behavioral coverage for what the UART computes: TX byte serialization,
        RX byte deserialization, parity, error detection, loopback, break.'
      bins:
      - id: FCOV_FM_TX_BYTE
        source_ref: function_model.transactions.FM_TX_BYTE
        class: transaction
        description: TX byte transaction observed by scoreboard
      - id: FCOV_FM_RX_BYTE
        source_ref: function_model.transactions.FM_RX_BYTE
        class: transaction
        description: RX byte transaction observed by scoreboard
      - id: FCOV_FM_BREAK
        source_ref: function_model.transactions.FM_BREAK_SEND
        class: transaction
        description: Break send observed
      - id: FCOV_FM_LOOPBACK
        source_ref: function_model.transactions.FM_LOOPBACK
        class: transaction
        description: Loopback mode verified
      - id: FCOV_ERR_PARITY
        source_ref: function_model.transactions.FM_RX_BYTE.error_cases.parity_err
        class: error_case
        description: Parity error detected
      - id: FCOV_ERR_FRAME
        source_ref: function_model.transactions.FM_RX_BYTE.error_cases.frame_err
        class: error_case
        description: Framing error detected
      - id: FCOV_ERR_OVERRUN
        source_ref: function_model.transactions.FM_RX_BYTE.error_cases.overrun_err
        class: error_case
        description: Overrun error detected
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle/handshake/FSM coverage for TX and RX pipelines.
      bins:
      - id: CCOV_TX_IDLE
        source_ref: cycle_model.pipeline[TX_IDLE]
        class: pipeline_stage
        description: TX IDLE stage observed
      - id: CCOV_TX_DATA
        source_ref: cycle_model.pipeline[TX_DATA]
        class: pipeline_stage
        description: TX DATA stage observed
      - id: CCOV_RX_START_CONFIRM
        source_ref: cycle_model.pipeline[RX_START_CONFIRM]
        class: pipeline_stage
        description: RX start confirm stage observed
      - id: CCOV_RX_DATA
        source_ref: cycle_model.pipeline[RX_DATA]
        class: pipeline_stage
        description: RX DATA stage observed
      - id: CCOV_BAUD_TICK
        source_ref: cycle_model.baud_generator
        class: handshake
        description: Baud tick observed at correct rate
      - id: CCOV_PERF_FIFO_DEPTH
        source_ref: cycle_model.performance.depth
        class: depth
        description: FIFO depth exercised
    functional: 'Legacy alias: function + cycle coverage must both close.'
    line: '>= 90% instrumented line coverage or explicit project waiver'
    branch: '>= 85% instrumented branch coverage or explicit project waiver'
    fsm: 100% declared TX and RX FSM states and legal transitions covered
    assertions: All protocol/handshake/error assertions pass
quality_gates:
  ssot:
    pass: All canonical sections are present, substantive, internally consistent,
      and have no live TBD placeholders.
    evidence:
    - check_ssot_disk.sh PASS
    - traceability covers function_model/cycle_model/test_requirements
  rtl_gen:
    profile: production
    target_scale:
      basis: UART peripheral with 7 sub-modules, 2 FIFOs, 2 FSMs, 12 registers
      source_files_min: 7
      modules_min: 7
      procedural_blocks_min: 20
      state_updates_min: 8
      depth_score_min: 10
      logic_modules_min: 4
      behavior_owner_logic_modules_min: 2
    target_scale_waiver:
      approved: false
      reason: ''
      owner: ''
    pass: All SSOT-derived RTL TODOs close; rtl-gen gates pass with fresh compile/lint
      evidence.
    evidence:
    - rtl/rtl_todo_plan.json
    - rtl/rtl_authoring_provenance.json
    - rtl/rtl_compile.json fresh vs listed RTL sources
    - lint/dut_lint.json fresh vs listed RTL sources
  rtl:
    pass: RTL implements function_model and cycle_model, compiles, and has no unwaived
      lint warnings.
    evidence:
    - rtl filelist
    - compile log
    - lint report
  dv:
    pass: Every test_requirements scenario (SC1-SC17) has an executable test, expected/got
      checker, and coverage bin.
    evidence:
    - results.xml
    - coverage.json
    - VCD/FST waveform
  coverage:
    pass: Functional and cycle coverage goals pass; code/FSM coverage meets thresholds.
    evidence:
    - cov/coverage.json
    - cov/coverage_report.md
  eda:
    pass: Synthesis and STA meet SSOT timing/area/power targets at 50 MHz PCLK.
    evidence:
    - syn report
    - sta setup/hold report
    - wns.json
  signoff:
    pass: SSOT, RTL, lint, DV, simulation, and coverage gates pass with fresh evidence.
    evidence:
    - ATLAS progress signoff pass
traceability:
  yaml_to_output:
  - yaml: top_module.name
    output: ALL files (module name)
  - yaml: parameters
    output: uart_lite_param.vh
  - yaml: io_list.interfaces
    output: uart_lite.sv (port list)
  - yaml: registers.register_list
    output: uart_lite_regs.sv + firmware + docs
  - yaml: function_model
    output: uart_lite_core.sv + tb/cocotb scoreboard
  - yaml: cycle_model
    output: uart_lite_core.sv + uart_lite_baud_gen.sv + waveform checks
  - yaml: fsm
    output: uart_lite_tx.sv + uart_lite_rx.sv + docs/fsm_diagram.md
  - yaml: timing
    output: STA constraints and timing pass/fail criteria
  - yaml: power
    output: Power intent (no UPF; single always-on domain)
  - yaml: security
    output: security/safety checks and threat mitigations
  - yaml: error_handling
    output: RTL error paths + DV fault scenarios
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
  - yaml: test_requirements.scenarios
    output: sim/tb_program.sv
  change_impact_example:
    change: parameters.DATA_WIDTH from 8 to 7
    affected_files:
    - uart_lite_param.vh (DATA_WIDTH=7)
    - uart_lite_tx.sv (shift register width)
    - uart_lite_rx.sv (shift register width)
    - uart_lite_tx_fifo.sv (FIFO width)
    - uart_lite_rx_fifo.sv (FIFO width)
    - uart_lite_regs.sv (TXDATA/RXDATA bit masking)
workflow_todos:
  fl-model-gen: []
  rtl-gen:
  - id: RTL_IMPL_UART_CORE
    content: Implement the SSOT-declared UART transceiver pipeline
    detail: Translate function_model transactions (FM_TX_BYTE, FM_RX_BYTE, FM_BREAK_SEND,
      FM_LOOPBACK), cycle_model TX/RX pipeline stages, FSM states/transitions, and
      ownership refs into RTL state/datapath/control logic across the 7 sub-modules.
    criteria:
    - RTL owner logic is present in each declared owner_file per sub_modules
    - DUT-only compile passes on all 8 RTL files
    - DUT lint passes with no unwaived errors
    - FunctionalModel expected result and RTL observed result can be compared for
      every function_model transaction
    - Every cycle_model pipeline stage and handshake rule is traceable to RTL logic
    source_refs:
    - function_model.transactions
    - cycle_model.pipeline
    - fsm
    owner_module: uart_lite_core
    owner_file: rtl/uart_lite_core.sv
    priority: high
    required: true
  - id: RTL_IMPL_TX_FSM
    content: Implement TX FSM with parity generation
    detail: "From fsm.tx_fsm states and transitions: implement TX_IDLE \u2192 TX_START\
      \ \u2192 TX_DATA \u2192 TX_PARITY (if parity_en) \u2192 TX_STOP1 \u2192 TX_STOP2\
      \ (if stop_bits=1). Compute even/odd parity across DATA_WIDTH bits."
    criteria:
    - TX FSM states and all declared transitions implemented
    - Parity computed per CTRL.parity_en and CTRL.parity_odd
    - Baud tick gating applied
    source_refs:
    - fsm.tx_fsm
    - cycle_model.pipeline.tx_stages
    owner_module: uart_lite_tx
    owner_file: rtl/uart_lite_tx.sv
    priority: high
    required: true
  - id: RTL_IMPL_RX_FSM
    content: Implement RX FSM with 2-FF synchronizer and oversampling
    detail: "From fsm.rx_fsm and cycle_model pipeline: implement RX_IDLE \u2192 RX_START_DETECT\
      \ \u2192 RX_START_CONFIRM \u2192 RX_DATA \u2192 RX_PARITY (if parity_en) \u2192\
      \ RX_STOP1 \u2192 RX_STOP2 (if stop_bits=1). Sample at oversample count 7 of\
      \ 16. Detect framing/parity errors."
    criteria:
    - RX FSM states and all declared transitions implemented
    - Mid-bit sampling at oversample count 7
    - 2-FF synchronizer on rx input
    - Spurious start bit rejection implemented
    source_refs:
    - fsm.rx_fsm
    - cycle_model.pipeline.rx_stages
    - cdc_requirements
    owner_module: uart_lite_rx
    owner_file: rtl/uart_lite_rx.sv
    priority: high
    required: true
  - id: RTL_IMPL_BAUD_GEN
    content: Implement baud rate generator
    detail: 'Counter-based baud tick generator: baud_tick = 1 when counter == (BAUD.baud_div
      * OVERSAMPLE) - 1. Separate counters for TX (baud tick) and RX (oversample counter
      0..OVERSAMPLE-1).'
    criteria:
    - Baud tick period = (baud_div + 1) * OVERSAMPLE PCLK cycles
    - RX mid-bit detection at oversample count 7
    - BAUD register change takes effect at next frame boundary
    source_refs:
    - cycle_model.baud_generator
    - registers.BAUD
    owner_module: uart_lite_baud_gen
    owner_file: rtl/uart_lite_baud_gen.sv
    priority: high
    required: true
  - id: RTL_IMPL_REGS_IRQ
    content: Implement APB register block and interrupt combiner
    detail: Full APB4 slave decode for 12 registers (CTRL through DBG_PARITIES_ERR).
      Implement W1C for INTPEND and CLR_STAT. OR all enabled pending interrupt sources
      to uart_irq.
    criteria:
    - All 12 registers accessible at declared offsets
    - Reserved fields read zero, ignore writes
    - W1C semantics for INTPEND and CLR_STAT
    - PSLVERR for accesses >= 0x30
    - PREADY asserted for all valid accesses
    source_refs:
    - registers.register_list
    - interrupts
    - io_list.interfaces.apb_slave
    owner_module: uart_lite_regs
    owner_file: rtl/uart_lite_regs.sv
    priority: high
    required: true
  tb-gen:
  - id: TB_SCENARIOS
    content: Implement cocotb/pyuvm testbench covering all 17 scenarios
    detail: 'From test_requirements.scenarios SC1-SC17: implement TX byte streaming,
      RX byte driving with timing, parity/framing/overrun/underrun error injection,
      loopback verification, break send, baud rate change, spurious start rejection,
      and interrupt handling.'
    criteria:
    - All 17 scenarios pass with scoreboard checks
    - Functional coverage bins all hit (7 function + 6 cycle bins)
    - Scoreboard compares TXDATA input to RXDATA output in loopback
    source_refs:
    - test_requirements.scenarios
    - function_model
    - cycle_model
    priority: high
    required: true
  sim_debug: []
  lint:
  - id: LINT_DUT
    content: Run lint on all RTL source files
    detail: Lint all 8 RTL files in filelist.rtl with the project SystemVerilog subset.
      Review and resolve or waive all warnings.
    criteria:
    - No unwaived lint errors
    - Lint waivers recorded in coding_rules.lint_waivers are the only active waivers
    source_refs:
    - filelist.rtl
    - coding_rules
    priority: medium
    required: true
  coverage:
  - id: COV_CLOSE
    content: Close all SSOT-declared coverage goals
    detail: Measure function_model coverage (7 bins), cycle_model coverage (6 bins),
      line >= 90%, branch >= 85%, FSM states/transitions 100%.
    criteria:
    - function coverage 100%
    - cycle coverage 100%
    - line >= 90%
    - branch >= 85%
    - FSM 100%
    source_refs:
    - test_requirements.coverage_goals
    priority: medium
    required: true
  syn:
  - id: SYN_UART
    content: Synthesize uart_lite at 50 MHz
    detail: Run synthesis with sky130_fd_sc_hd, target 50 MHz PCLK. Meet setup/hold
      timing.
    criteria:
    - No synthesis errors
    - No unwaived setup violations at 50 MHz
    - Area report generated
    source_refs:
    - synthesis
    - timing
    priority: low
    required: false
  sta:
  - id: STA_PRE_PNR
    content: Run pre-PnR static timing analysis
    detail: STA on synthesized netlist with IO delays and clock uncertainty. setup_wns
      >= 0, hold_wns >= 0.
    criteria:
    - setup_wns_ns >= 0.0
    - hold_wns_ns >= 0.0
    - sta/out/setup.rpt, sta/out/hold.rpt, sta/out/wns.json generated
    source_refs:
    - timing.sta_expectations
    - timing.io_delays
    priority: low
    required: false
  pnr: []
  sta-post: []
generation_flow:
  steps:
  - name: validate_ssot
    command: bash workflow/ssot-gen/scripts/check_ssot_disk.sh uart_lite
    description: Validate production SSOT structure, function_model, cycle_model,
      DV plan, and quality gates
  - name: handoff_fl_model
    command: /ssot-fl-model uart_lite
    description: fl-model-gen writes FunctionalModel, decomposition, and FCOV plan
      from SSOT
  - name: handoff_rtl
    command: /ssot-rtl uart_lite
    description: rtl-gen writes RTL directly from the SSOT and proves compile/lint
      gates
  - name: handoff_tb
    command: /ssot-tb uart_lite
    description: tb-gen writes cocotb/pyuvm tests, runs simulation, emits results
      XML, VCD, and functional coverage
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: sim_debug inspects waveform, failures, coverage evidence, and escalation
      ownership
  - name: handoff_coverage
    command: /coverage uart_lite
    description: coverage workflow measures SSOT-declared functional/code/FSM/assertion
      goals
  - name: handoff_eda
    command: /syn uart_lite && /sta uart_lite
    description: EDA workflows produce synthesis and STA evidence when quality_gates
      require it
  atlas_workflows:
  - ssot-gen
  - rtl-gen
  - tb-gen
  - sim_debug
  - coverage
  - syn
  - sta
