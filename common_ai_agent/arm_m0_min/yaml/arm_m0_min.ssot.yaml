  eda:
    pass: "Synthesis/STA/PnR reports meet SSOT timing intent or carry approved waivers"
    evidence: ["syn report", "sta report", "pnr report"]
  signoff:
    pass: "Project signoff requires ssot+rtl+dv+coverage+eda gates passing"
    evidence: ["quality_gates aggregate review"]

traceability:
