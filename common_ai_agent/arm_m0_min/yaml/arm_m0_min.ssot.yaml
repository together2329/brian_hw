isa_spec:
  decode_contract:
    instruction_set: ["ADD", "SUB", "AND", "ORR", "EOR", "MOV", "CMP", "LDR", "STR", "B", "BEQ", "BNE", "LSL", "LSR", "ASR"]
    encoding_scope: "Thumb-1 16-bit subset only"
    undefined_behavior: "Unsupported opcodes are treated as non-retiring NOP or fault per downstream design choice, but behavior must be deterministic and documented."

register_file:
  architecture:
    num_registers: 16
    width: 32
    read_ports: 2
    write_ports: 1
    special_roles:
      r15: "pc"
      r13: "general-purpose in this subset"
      r14: "general-purpose in this subset"
