top_module: simple_cpu
version: 0.1.0
type: cpu
description: Very small smoke-test CPU with a single memory master port.
ports:
  - {name: clk, direction: input, width: 1}
  - {name: rst_n, direction: input, width: 1}
  - {name: m_addr, direction: output, width: 16}
  - {name: m_wdata, direction: output, width: 32}
  - {name: m_rdata, direction: input, width: 32}
  - {name: m_valid, direction: output, width: 1}
  - {name: m_write, direction: output, width: 1}
  - {name: m_ready, direction: input, width: 1}
clocks:
  - {name: clk, period_ns: 10.0, source_port: clk}
resets:
  - {name: rst_n, polarity: active_low, source_port: rst_n}
busInterfaces:
  - {name: M_MEM, proto: SIMPLE, role: master, side: right, width: 32}
sub_modules:
  - {name: simple_cpu_fetch, file: rtl/simple_cpu_fetch.sv, ownership: manifest, ssot_gen: true, description: Program-counter and fetch sequencer}
  - {name: simple_cpu_decode, file: rtl/simple_cpu_decode.sv, ownership: manifest, ssot_gen: true, description: Tiny opcode decoder}
  - {name: simple_cpu_core, file: rtl/simple_cpu_core.sv, ownership: manifest, ssot_gen: false, description: Register and execute datapath}
parameters:
  - {name: ADDR_WIDTH, default: 16, type: int}
  - {name: DATA_WIDTH, default: 32, type: int}
features:
  - Sequential smoke-test address generation
  - Single outstanding memory transaction
filelist:
  rtl:
    - rtl/simple_cpu_fetch.sv
    - rtl/simple_cpu_decode.sv
    - rtl/simple_cpu_core.sv
    - rtl/simple_cpu.sv
