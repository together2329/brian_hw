# =============================================================================
# arbiter_rr.ssot.yaml — Single Source of Truth
# =============================================================================
ip: arbiter_rr
version: draft
# =============================================================================
# SECTION 0: Top Module Identity
# =============================================================================
top_module:
  name: "arbiter_rr"
  file: "rtl/arbiter_rr.sv"
  version: "1.0"
  type: "bus"
  description: "Parameterized round-robin arbiter — 4-input fair arbitration with 1-cycle grant latency, APB-lite CSR control/status, single PCLK domain with async PRESETn."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
# =============================================================================
# SECTION 1: Sub-Module List (Hierarchy)
# =============================================================================
sub_modules:
  - { name: "arbiter_rr_regs", file: "rtl/arbiter_rr_regs.sv", ownership: "manifest", ssot_gen: true,  implements: ["registers.register_list"], source_sections: ["registers"], register_refs: ["registers.register_list"], description: "APB-lite register block" }
  - { name: "arbiter_rr_core", file: "rtl/arbiter_rr_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "features"], source_sections: ["function_model", "cycle_model", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline"], feature_refs: ["features"], description: "Core round-robin arbitration logic" }

decomposition:
  units:
    - { id: "arbitrate", kind: "datapath/control", source_refs: ["function_model.transactions", "cycle_model.pipeline"], rtl_candidates: ["arbiter_rr_core"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "register_if", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["arbiter_rr_regs"], verification_impact: ["test_requirements.scenarios"] }
# =============================================================================
# SECTION 2: Parameters
# =============================================================================
parameters:
  - name: "NUM_INPUTS"
    default: 4
    type: int
    description: "Number of request/grant inputs"
    drives: ["arbiter_rr_core.sv", "arbiter_rr_regs.sv", "arbiter_rr.sv"]
  - name: "APB_ADDR_WIDTH"
    default: 8
    type: int
    description: "APB address width in bits"
    drives: ["arbiter_rr_regs.sv", "arbiter_rr.sv"]
  - name: "APB_DATA_WIDTH"
    default: 32
    type: int
    description: "APB data width in bits"
    drives: ["arbiter_rr_regs.sv", "arbiter_rr.sv"]
  - name: "CLOCK_FREQ_MHZ"
    default: 50
    type: int
    description: "Target clock frequency in MHz"
    drives: ["tb_top.sv", "docs/README.md"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
# =============================================================================
# SECTION 3: IO List (Ports)
# =============================================================================
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Peripheral clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock, 50 MHz" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Peripheral reset"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset, sync deassert" }
  interfaces:
    - name: "apb_slave"
      type: "APB-lite"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "APB-lite register access interface"
      protocol:
        setup_phase: "psel=1, penable=0 captures address/control on PCLK rising edge."
        access_phase: "psel=1, penable=1 completes when pready=1. No wait states (pready=1 always)."
        read_rule: "prdata is valid in the access phase for reads. Reads have no side effects."
        write_rule: "pwdata/pstrb sampled in access phase for writes. Write effects apply on the PCLK edge where penable && pwrite && pready."
        error_rule: "pslverr is tied to 0 — no error responses for this IP."
      ports:
        - { name: "PADDR",   width: 8,  direction: "input",  description: "APB address" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PSTRB",   width: 4,  direction: "input",  description: "APB strobes" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready (tied high)" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB error (tied low)" }
    - name: "arbiter_request"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Request inputs from 4 requesters"
      protocol:
        sampling: "req_i sampled on every PCLK rising edge."
        stability: "req_i must be stable for at least one PCLK cycle to guarantee detection."
      ports:
        - { name: "req_i", width: 4, direction: "input", description: "Request inputs [3:0], bit i corresponds to requester i" }
    - name: "arbiter_grant"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Grant outputs to 4 requesters"
      protocol:
        assertion: "gnt_o is registered; valid on PCLK rising edge after req_i sampled."
        deassertion: "gnt_o deasserts when the granted requester deasserts req_i or when priority rotates to another requester."
        reset_value: "4'b0000"
      ports:
        - { name: "gnt_o", width: 4, direction: "output", description: "Grant outputs [3:0], one-hot, bit i grants requester i" }
# =============================================================================
# SECTION 4: Main Features
# =============================================================================
features:
  - name: "Round-Robin Arbitration"
    trigger: "One or more req_i bits asserted and corresponding enable_mask bit set"
    datapath: "Priority encoder selects the next requesting input starting from current priority pointer, wrapping around; grant registered and output next cycle; priority pointer advances to (granted_index + 1) mod NUM_INPUTS"
    control: "Combinational priority search with registered grant output and priority update"
    output: "gnt_o one-hot grant and updated internal priority pointer"
  - name: "Input Enable Mask"
    trigger: "APB write to ENABLE register"
    datapath: "Software writes per-input enable bits; disabled inputs are excluded from arbitration regardless of req_i"
    control: "Register write updates enable_mask; combinational arbitration path gates req_i with enable_mask"
    output: "Updated enable_mask reflected in next arbitration decision"
  - name: "Status Observation"
    trigger: "APB read to STATUS or PRIORITY register"
    datapath: "Current grant value and priority pointer readable via APB for debug/status"
    control: "Register read returns live internal state"
    output: "PRDATA with STATUS or PRIORITY value"

# =============================================================================
# SECTION 5: Data Flow
# =============================================================================
dataflow:
  arbitration_path:
    source: "req_i (external requesters) AND enable_mask (APB-writable)"
    priority: "priority_ptr register (internal state, wraps 0..NUM_INPUTS-1)"
    selection: "Priority encoder: starting from priority_ptr, find first index i where (req_i[i] & enable_mask[i]) == 1"
    output: "gnt_o_reg ← one-hot encoding of selected index (0 if no request)"
  priority_update:
    trigger: "On any PCLK edge where gnt_o != 0"
    rule: "priority_ptr ← (selected_index + 1) mod NUM_INPUTS"
    idle_rule: "When gnt_o == 0, priority_ptr is unchanged"
  register_path:
    source: "APB-lite PWDATA"
    destination: "ENABLE register (internal enable_mask)"
    read_path: "STATUS and PRIORITY registers read current gnt_o and priority_ptr to PRDATA"
# =============================================================================
# SECTION 6: Function Model
# =============================================================================
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes the round-robin arbitration algorithm independent of cycle timing."
  state_variables:
    - { name: "priority_ptr", source: "internal register", reset: 0, description: "Current priority pointer index (0..NUM_INPUTS-1), wraps after grant" }
    - { name: "enable_mask", source: "registers.ENABLE", reset: "4'b1111", description: "Per-input enable bits from APB ENABLE register" }
    - { name: "grant_reg", source: "internal register (drives gnt_o)", reset: "4'b0000", description: "Registered one-hot grant output" }
  transactions:
    - id: "FM1"
      name: "arbitration_decision"
      preconditions:
        - "PRESETn deasserted (normal operation)"
        - "PCLK rising edge occurs"
      inputs:
        - "req_i[3:0] — external request signals"
        - "enable_mask — internal enable state"
        - "priority_ptr — current priority pointer"
      outputs:
        - "gnt_o: one-hot grant selecting the highest-priority requesting enabled input, or 4'b0000 if none"
      output_rules:
        - { name: "gnt_o", expr: "onehot(priority_search(req_i & enable_mask, priority_ptr))", width: 4, port: "gnt_o", description: "One-hot grant; bit i set if requester i wins arbitration. 4'b0000 if no requesting enabled input." }
      state_updates:
        - { name: "grant_reg", reset: "4'b0000", expr: "onehot(priority_search(req_i & enable_mask, priority_ptr))", description: "Updated every PCLK edge with new grant decision" }
        - { name: "priority_ptr", reset: 0, expr: "(grant_reg != 0) ? ((sel_index(grant_reg) + 1) % NUM_INPUTS) : priority_ptr", description: "Advances to next input after a non-zero grant; remains unchanged when no grant" }
      side_effects:
        - "gnt_o is the registered (cycle-delayed) version of the current arbitration decision"
        - "priority_ptr increments only when a valid (non-zero) grant is asserted"
      invariants:
        - "gnt_o is one-hot (0 or 1 bit set) at all times"
        - "A granted input i must have req_i[i]==1 and enable_mask[i]==1"
        - "Between two consecutive grants, every other requesting enabled input gets priority before the same input is granted again (round-robin fairness)"
    - id: "FM2"
      name: "apb_register_access"
      preconditions:
        - "PSEL==1 and PENABLE transitions 0→1 on PCLK rising edge"
      inputs:
        - "PADDR, PWRITE, PWDATA, PSTRB from APB bus"
      outputs:
        - "PRDATA: register read data on APB reads, 0 for unmapped addresses"
        - "PREADY: always 1 (no wait states)"
        - "PSLVERR: always 0 (no error responses)"
      output_rules:
        - { name: "PRDATA", expr: "read_mux(PADDR, STATUS, PRIORITY, ENABLE)", width: 32, port: "PRDATA", description: "Read data from addressed register; 0 for unmapped addresses" }
        - { name: "PREADY", expr: "1'b1", width: 1, port: "PREADY", description: "Always ready; no wait states" }
        - { name: "PSLVERR", expr: "1'b0", width: 1, port: "PSLVERR", description: "No error responses" }
      state_updates:
        - { name: "enable_mask", reset: "4'b1111", expr: "PWRITE && addr==ENABLE_OFFSET ? PWDATA[3:0] : enable_mask", description: "Updated on APB write to ENABLE register offset" }
      side_effects:
        - "STATUS and PRIORITY registers are read-only views of internal grant_reg and priority_ptr"
        - "ENABLE register is read-write; writes update enable_mask immediately on the PCLK edge where the access completes"
  invariants:
    - "gnt_o is always one-hot (popcount ≤ 1)"
    - "A granted input must be both requested and enabled"
    - "Round-robin fairness: between grants to input i, all other requesting enabled inputs must be served at most once each"
    - "APB reads have no side effects"
  reference_model_hint: "tb-gen should implement a Python scoreboard that models priority_search() and compares expected gnt_o and priority_ptr evolution against RTL observed values for every cycle."
# =============================================================================
# SECTION 7: Cycle Model
# =============================================================================
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when grant, priority, and APB responses change relative to PCLK edges."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears grant_reg to 4'b0000, priority_ptr to 0, enable_mask to 4'b1111"
    deassertion: "State is usable on the first PCLK rising edge after synchronous deassertion of PRESETn"
  latency:
    arbitration_decision: { min_cycles: 1, max_cycles: 1, description: "req_i sampled on PCLK edge N, gnt_o valid on PCLK edge N+1" }
    apb_read: { min_cycles: 1, max_cycles: 1, description: "PRDATA/PREADY valid in access phase (PSEL && PENABLE rising edge); PREADY always 1" }
    apb_write: { min_cycles: 1, max_cycles: 1, description: "PWDATA sampled in access phase; enable_mask updates on same edge" }
  handshake_rules:
    - { signal: "req_i", rule: "Sampled on every PCLK rising edge. Must meet setup/hold relative to PCLK." }
    - { signal: "gnt_o", rule: "Registered output; changes on PCLK rising edge after the req_i that produced the decision. One-hot at all times." }
    - { signal: "PSEL/PENABLE", rule: "APB-lite setup phase (PSEL=1,PENABLE=0) followed by access phase (PSEL=1,PENABLE=1). PREADY=1 always." }
  pipeline:
    - { stage: "S0_SAMPLE_REQ", cycle: 0, action: "Sample req_i and enable_mask. Combinational priority search produces next_grant and next_priority." }
    - { stage: "S1_DRIVE_GRANT", cycle: 1, action: "Register next_grant to grant_reg → gnt_o. Register next_priority to priority_ptr. APB read returns current values." }
  ordering:
    - "gnt_o changes occur strictly on PCLK rising edges, never combinationally from req_i"
    - "priority_ptr update and grant_reg update occur on the same PCLK edge"
    - "APB reads of STATUS/PRIORITY reflect the state after the register update on that edge"
  backpressure:
    - "No backpressure mechanism; arbiter produces a new decision every cycle regardless of whether the previous grant was consumed"
  performance:
    frequency_mhz: 50
    throughput: { decisions_per_cycle: 1, condition: "Always one decision per cycle" }
    outstanding: { read_max: 0, write_max: 0, description: "No outstanding transactions; pure combinational/registered datapath" }
    depth: { pipeline_stages: 2, queue_depth: 0, description: "Sample stage + drive stage" }
  observability:
    - "Every function_model transaction maps to a cycle_model pipeline stage"
    - "req_i, gnt_o, priority_ptr, enable_mask must be visible in waveform dumps"
# =============================================================================
# SECTION 8: Clock & Reset Domain
# =============================================================================
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Peripheral clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

# =============================================================================
# SECTION 9: CDC Requirements
# =============================================================================
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain (PCLK) — no CDC required"

# =============================================================================
# SECTION 10: RDC Requirements
# =============================================================================
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain (PRESETn) — no RDC required"
# =============================================================================
# SECTION 11: Registers
# =============================================================================
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
    num_registers: 3
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "ENABLE"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x0000000F
      category: "control"
      description: "Input Enable Mask Register — bit i enables requester i"
      write_side_effects:
        - "Writing enable_mask bits takes effect on the PCLK edge where the APB access completes."
        - "Disabling an input while it is granted does not retract the current grant; the grant remains until the next PCLK edge."
      fields:
        - { name: "enable", bits: [3, 0], access: "rw", reset: 0xF, write_effect: "Per-input enable: 1=enabled, 0=disabled (excluded from arbitration)", description: "Input enable mask [NUM_INPUTS-1:0]" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "PRIORITY"
      offset: 0x04
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Priority Pointer Register — indicates which input currently has highest priority"
      fields:
        - { name: "priority_ptr", bits: [1, 0], access: "ro", reset: 0x0, description: "Current priority pointer (0..NUM_INPUTS-1)" }
        - { name: "reserved_31_2", bits: [31, 2], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x08
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status Register — shows current grant output"
      fields:
        - { name: "grant", bits: [3, 0], access: "ro", reset: 0x0, description: "Current grant (one-hot); 0=idle" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
# =============================================================================
# SECTION 12: Memory Requirements
# =============================================================================
memory:
  instances:
    - { name: "grant_reg", type: "register", depth: 1, width: 4, read_ports: 1, write_ports: 1, latency: 0, description: "Registered grant output (drives gnt_o)" }
    - { name: "priority_ptr_reg", type: "register", depth: 1, width: 2, read_ports: 1, write_ports: 1, latency: 0, description: "Registered priority pointer" }
    - { name: "enable_mask_reg", type: "register", depth: 1, width: 4, read_ports: 1, write_ports: 1, latency: 0, description: "Registered enable mask from APB" }
  note: "No SRAM/FIFO; pure register-based storage."

# =============================================================================
# SECTION 13: Interrupt
# =============================================================================
interrupts:
  sources: []
  output:
    signal: "none"
    polarity: "none"
    type: "none"
  note: "No interrupts in this IP; status observable via APB STATUS/PRIORITY registers."

# =============================================================================
# SECTION 14: FSM
# =============================================================================
fsm:
  note: "No explicit FSM; round-robin arbitration is a pipelined datapath — combinational priority encoder with registered grant/priority output. The two pipeline stages (S0_SAMPLE_REQ, S1_DRIVE_GRANT) form the complete behavior."

# =============================================================================
# SECTION 15: RTL Contract
# =============================================================================
rtl_contract:
  transaction: "FM1"
  sample_condition: "Every PCLK rising edge"
  input_map:
    request: "req_i"
    enable_mask: "enable_mask_reg"
    priority_ptr: "priority_ptr_reg"
  output_map:
    grant: "gnt_o ← grant_reg"
    apb_read_data: "PRDATA"
    apb_ready: "PREADY = 1'b1"
    apb_error: "PSLVERR = 1'b0"
  state_updates:
    - { name: "grant_reg", reset: "4'b0000", expr: "onehot(priority_search(req_i & enable_mask_reg, priority_ptr_reg))" }
    - { name: "priority_ptr_reg", reset: 0, expr: "(grant_reg != 0) ? ((sel_index(grant_reg) + 1) % NUM_INPUTS) : priority_ptr_reg" }
    - { name: "enable_mask_reg", reset: "4'b1111", expr: "APB write to ENABLE offset ? PWDATA[3:0] : enable_mask_reg" }
# =============================================================================
# SECTION 16: Timing & Performance
# =============================================================================
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.5 }
  latency_budget:
    arbitration_latency_cycles: { min: 1, max: 1, measured_from: "req_i sampled at PCLK edge", measured_to: "gnt_o valid at next PCLK edge" }
    apb_access_cycles: { min: 1, max: 1, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
  throughput:
    decisions_per_cycle: 1
    conditions: "One new arbitration decision every PCLK cycle"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "all_inputs_except_clocks_resets", clock: "PCLK", delay_ns: 1.0, source: "system-level timing budget at 50MHz" }
    outputs:
      - { ports: "all_outputs", clock: "PCLK", delay_ns: 1.0, source: "system-level timing budget at 50MHz" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]

# =============================================================================
# SECTION 17: Power Intent
# =============================================================================
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode; continuous arbitration at 50MHz"
  reset_retention:
    retention_required: false
    reset_value_source: "function_model.state_variables"
  power_states:
    - { name: "ON", entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["All architectural behavior active"] }
  upf_required: false

# =============================================================================
# SECTION 18: Security & Safety
# =============================================================================
security:
  classification: "non_secure_control_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "arbitration_state", protection: "No confidentiality requirement; integrity ensured by internal register logic" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO access policy on PRIORITY and STATUS; reserved fields ignore writes" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "grant output must remain one-hot (popcount ≤ 1) in all operating conditions"

# =============================================================================
# SECTION 19: Error Handling
# =============================================================================
error_handling:
  error_sources:
    - { id: "ERR_NONE", condition: "No internal error conditions exist for this IP", architectural_effect: "Not applicable — all error conditions are handled externally (e.g., APB protocol errors are outside IP scope; req_i/gnt_o interface has no error protocol)" }
  propagation:
    - "No internal errors to propagate; externally visible behavior is limited to one-hot gnt_o invariant"
  recovery:
    - { action: "reset", clears: ["all internal state"], preserves: ["configuration defaults set at reset"] }
  note: "Round-robin arbiter has no internal error conditions; upstream/downstream errors are handled externally"

# =============================================================================
# SECTION 20: Debug & Observability
# =============================================================================
debug_observability:
  waveform_must_probe:
    - "req_i"
    - "gnt_o"
    - "priority_ptr_reg"
    - "enable_mask_reg"
    - "grant_reg"
    - "PCLK"
    - "PRESETn"
  status_outputs:
    - "STATUS.grant (APB-readable)"
    - "PRIORITY.priority_ptr (APB-readable)"
  trace_events:
    - { name: "grant_asserted", trigger: "gnt_o transitions from 4'b0000 to non-zero" }
    - { name: "grant_deasserted", trigger: "gnt_o transitions from non-zero to 4'b0000" }
    - { name: "priority_wrap", trigger: "priority_ptr wraps from NUM_INPUTS-1 to 0" }
  debug_registers:
    - "STATUS"
    - "PRIORITY"
# =============================================================================
# SECTION 21: Integration Contract
# =============================================================================
integration:
  bus_attachment:
    control: "APB-lite slave"
    data: "none (no AXI data interface)"
  connections:
    - { module: "arbiter_rr_core", port: "clk_i", signal: "PCLK" }
    - { module: "arbiter_rr_core", port: "rst_ni", signal: "PRESETn" }
    - { module: "arbiter_rr_core", port: "req_i", signal: "req_i (top-level)" }
    - { module: "arbiter_rr_core", port: "gnt_o", signal: "gnt_o (top-level)" }
    - { module: "arbiter_rr_regs", port: "clk_i", signal: "PCLK" }
    - { module: "arbiter_rr_regs", port: "rst_ni", signal: "PRESETn" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "PSLVERR tied to 0 (no error reporting)"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC must provide APB-lite compliant PSEL/PENABLE sequencing."
    - "req_i signals must be driven by external logic meeting setup/hold at 50MHz."

# =============================================================================
# SECTION 22: DFT / DFD
# =============================================================================
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
  observability:
    required_internal_points: ["grant_reg", "priority_ptr_reg", "enable_mask_reg"]
  mbist_required: false
  notes: "No SRAM; pure register design. Register state observable via APB."

# =============================================================================
# SECTION 23: Synthesis / Implementation Constraints
# =============================================================================
synthesis:
  dialect: "systemverilog_2012"
  top_module: "arbiter_rr"
  technology:
    pdk: "sky130"
    standard_cell_library: "sky130_fd_sc_hd"
    liberty_corner: "ss_100C_1v40"
    liberty_env: "SKY130_LIB"
    lef_env: "SKY130_LEF"
    tech_lef_env: "SKY130_TLEF"
    rcx_rules_env: "SKY130_RCX_RULES"
  constraints:
    - "No inferred latches"
    - "All flops reset according to clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs in generated RTL"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/arbiter_rr.json or syn/out/arbiter_rr.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"

# =============================================================================
# SECTION 24: Physical Implementation / PnR
# =============================================================================
pnr:
  utilization_pct: 40
  aspect_ratio: 1.0
  core_space_um: 1.0
  global_density: 0.60
  io_layers:
    horizontal: "met3"
    vertical: "met2"
  placement:
    density_target: 0.60
    max_displacement_um: null
  cts:
    buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"]
    functional_mode_case_analysis:
      - { port: "scan_en", value: 0, when_present: true }
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { min: "met3", max: "met5" }
    drc_waivers: []
  required_outputs:
    - "pnr/out/floorplan.def"
    - "pnr/out/placed.def"
    - "pnr/out/cts.def"
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"
# =============================================================================
# SECTION 25: Coding Rules
# =============================================================================
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/arbiter_rr_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use default assignments)"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)"
    - "Parameterize widths using NUM_INPUTS"
    - "ALLOW: input logic / output logic ANSI ports"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam for state encoding where needed"
  lint_waivers:
    - "UNUSEDSIGNAL: PSTRB tie-offs (unused in simple register logic)"

# =============================================================================
# SECTION 26: Reuse Modules
# =============================================================================
reuse_modules: []

# =============================================================================
# SECTION 27: Custom Extensions
# =============================================================================
custom:
  assumptions:
    - { id: "ASM_NUM_INPUTS_DEFAULT", field: "parameters.NUM_INPUTS.default", value: 4, rationale: "User specified 4-input arbiter; parameter default matches. Parameterizable at elaboration time." }
    - { id: "ASM_PREADY_ALWAYS_1", field: "io_list.apb_slave.protocol.access_phase", value: "PREADY=1 always, no wait states", rationale: "Simplest APB-lite implementation; no backpressure on register accesses." }
    - { id: "ASM_PSLVERR_TIED_LOW", field: "io_list.apb_slave.protocol.error_rule", value: "PSLVERR=0 always", rationale: "All register offsets are valid; no error cases at the IP level." }
    - { id: "ASM_NO_INTERRUPTS", field: "interrupts", value: "No interrupt output", rationale: "Status observable via APB polling; interrupt not required for this IP." }
    - { id: "ASM_1CYCLE_LATENCY", field: "cycle_model.latency.arbitration_decision", value: "1 cycle", rationale: "User specified 1-cycle latency unless noted; implemented as single pipeline register stage." }
    - { id: "ASM_ALL_ENABLED_AT_RESET", field: "registers.ENABLE.reset", value: "0xF (all inputs enabled)", rationale: "Sensible default: all inputs enabled at reset so basic arbitration works without SW configuration." }
    - { id: "ASM_NO_ERROR_SOURCES", field: "error_handling", value: "No internal errors", rationale: "Simple arbiter has no error conditions internally; external APB errors are outside IP scope." }
  note: "All assumptions above are recorded for downstream traceability. No pending human decisions block SSOT completion."

# =============================================================================
# SECTION 28: Dir Structure
# =============================================================================
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

# =============================================================================
# SECTION 29: Filelist
# =============================================================================
filelist:
  headers:
    - "rtl/arbiter_rr_param.vh"
  rtl:
    - "rtl/arbiter_rr_regs.sv"
    - "rtl/arbiter_rr_core.sv"
    - "rtl/arbiter_rr.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
    - "sim/arbiter_rr_model.sv"
  firmware:
    - "firmware/arbiter_rr_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"
# =============================================================================
# SECTION 30: Test Requirements / DV Plan
# =============================================================================
test_requirements:
  scenarios:
    - { id: "SC1", name: "Basic arbitration — single request", stimulus: "Assert req_i[0]=1 (all others 0), enable_mask=4'b1111", expected: "gnt_o = 4'b0001 after 1 cycle; priority_ptr increments to 1", checker: "Scoreboard checks gnt_o one-hot and priority_ptr update", coverage: ["FM1", "S0_SAMPLE_REQ", "S1_DRIVE_GRANT"] }
    - { id: "SC2", name: "Round-robin fairness — all requesting", stimulus: "Assert req_i=4'b1111 continuously, enable_mask=4'b1111", expected: "gnt_o sequences through 0001, 0010, 0100, 1000, wrapping back; one grant per cycle", checker: "Scoreboard verifies round-robin order over 8+ cycles", coverage: ["FM1", "round_robin_fairness"] }
    - { id: "SC3", name: "Priority wrap-around", stimulus: "Assert req_i=4'b1111, set priority_ptr=3 (via reset/sequence)", expected: "Grant to input 3 then wraps to input 0", checker: "Scoreboard checks wrap from NUM_INPUTS-1 to 0", coverage: ["FM1", "priority_wrap"] }
    - { id: "SC4", name: "No request — idle", stimulus: "Assert req_i=4'b0000 after a grant", expected: "gnt_o = 4'b0000; priority_ptr unchanged from last grant", checker: "Scoreboard checks gnt_o=0 and priority_ptr stability", coverage: ["FM1", "idle"] }
    - { id: "SC5", name: "Enable mask — disable input", stimulus: "Write ENABLE=4'b1110 (disable input 0), req_i=4'b1111", expected: "Input 0 never granted; round-robin among inputs 1,2,3 only", checker: "Scoreboard verifies input 0 excluded and fairness among others", coverage: ["FM2", "enable_mask"] }
    - { id: "SC6", name: "APB readback", stimulus: "Read STATUS, PRIORITY registers while arbiter is running", expected: "PRDATA matches current gnt_o and priority_ptr values", checker: "Scoreboard compares APB reads against internal state", coverage: ["FM2", "apb_read"] }
    - { id: "SC7", name: "Reset behavior", stimulus: "Assert PRESETn during active arbitration, then deassert", expected: "gnt_o=4'b0000, priority_ptr=0, enable_mask=4'b1111 after reset deassertion", checker: "Scoreboard checks reset values of all state", coverage: ["reset"] }
    - { id: "SC8", name: "Back-to-back requests — same input", stimulus: "Only req_i[2]=1 continuously", expected: "gnt_o=4'b0100 every cycle; priority_ptr=2 always (only input 2 requesting)", checker: "Scoreboard verifies repeated grant to sole requester", coverage: ["FM1", "single_active"] }
  scoreboard_checks: 24
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Arbitration decision correctness and register side-effect coverage."
      bins:
        - { id: "FCOV_FM1_ARBITRATION_DECISION", source_ref: "function_model.transactions.FM1", class: "transaction", description: "Every legal FM1 arbitration path observed" }
        - { id: "FCOV_FM2_APB_ACCESS", source_ref: "function_model.transactions.FM2", class: "transaction", description: "APB read and write to all registers observed" }
        - { id: "FCOV_ROUND_ROBIN_ORDER", source_ref: "function_model.transactions.FM1.invariants", class: "invariant", description: "Round-robin fairness invariant holds across all scenarios" }
        - { id: "FCOV_ONEHOT_GRANT", source_ref: "function_model.invariants", class: "invariant", description: "gnt_o one-hot invariant holds in all cycles" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Pipeline stage, handshake, and performance coverage."
      bins:
        - { id: "CCOV_SAMPLE_REQ", source_ref: "cycle_model.pipeline.S0_SAMPLE_REQ", class: "pipeline_stage", description: "Request sample stage observed" }
        - { id: "CCOV_DRIVE_GRANT", source_ref: "cycle_model.pipeline.S1_DRIVE_GRANT", class: "pipeline_stage", description: "Grant drive stage observed" }
        - { id: "CCOV_LATENCY_1CYCLE", source_ref: "cycle_model.latency.arbitration_decision", class: "latency", description: "1-cycle grant latency verified" }
        - { id: "CCOV_PREADY_ALWAYS", source_ref: "cycle_model.handshake_rules.PSEL/PENABLE", class: "handshake", description: "PREADY always 1 verified" }
    functional: "Legacy alias: function + cycle coverage must both close."
    line: ">= 90% line coverage"
    branch: ">= 85% branch coverage"
    fsm: "Not applicable (datapath, no FSM)"
    assertions: "onehot(gnt_o) assertion must pass in all scenarios"

# =============================================================================
# SECTION 31: Quality Gates / Pass Criteria
# =============================================================================
quality_gates:
  ssot:
    pass: "All canonical sections present, internally consistent, no live TBD markers."
    evidence: ["check_ssot_disk.sh PASS"]
  rtl_gen:
    profile: "standard"
    target_scale:
      basis: "Small IP — 3 modules, ~100 lines each; no structural depth target enforced"
      source_files_min: 0
      modules_min: 0
      procedural_blocks_min: 0
      state_updates_min: 0
      depth_score_min: 0
      logic_modules_min: 0
      behavior_owner_logic_modules_min: 0
    pass: "RTL compiles, lints, and passes basic IO contract checks."
    evidence: ["rtl/rtl_compile.json", "lint/dut_lint.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles and lints."
    evidence: ["rtl compile report", "dut lint report"]
  coverage:
    pass: "All SSOT-declared function/cycle coverage bins close."
    evidence: ["cov/coverage.json"]
  dv:
    pass: "All SSOT-declared test scenarios pass with scoreboard assertions enabled."
    evidence: ["sim/results.json", "sim/coverage_report.md"]
  eda:
    pass: "Synthesis meets 50MHz timing."
    evidence: ["syn report"]

# =============================================================================
# SECTION 32: Traceability
# =============================================================================
traceability:
  yaml_to_output:
    - { yaml: "top_module", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "arbiter_rr_param.vh" }
    - { yaml: "io_list.interfaces", output: "arbiter_rr.sv (port list)" }
    - { yaml: "registers.register_list", output: "arbiter_rr_regs.sv + firmware header" }
    - { yaml: "function_model", output: "arbiter_rr_core.sv + tb scoreboard" }
    - { yaml: "cycle_model", output: "arbiter_rr_core.sv pipeline" }
    - { yaml: "test_requirements.scenarios", output: "tb/tb_program.sv" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff criteria" }

# =============================================================================
# SECTION 33: Workflow TODOs / Downstream Task Contract
# =============================================================================
workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - { id: "RTL_TODO_ARBITRATION_CORE", content: "Implement round-robin arbitration core", detail: "Translate function_model.transactions.FM1 into combinational priority_search() + registered grant/priority update. Use cycle_model.pipeline stages S0_SAMPLE_REQ and S1_DRIVE_GRANT. One-hot grant invariant must hold.", criteria: ["priority_search() finds first requesting enabled input from priority_ptr", "grant_reg and priority_ptr_reg update on PCLK edge per state_updates", "gnt_o is always one-hot"], source_refs: ["function_model.transactions.FM1", "cycle_model.pipeline"], owner_module: "arbiter_rr_core", owner_file: "rtl/arbiter_rr_core.sv", priority: "high", required: true }
    - { id: "RTL_TODO_APB_REGS", content: "Implement APB-lite register block", detail: "Translate registers.register_list into APB-lite read/write logic: ENABLE (rw), PRIORITY (ro), STATUS (ro). PREADY tied high, PSLVERR tied low.", criteria: ["ENABLE write updates enable_mask", "PRIORITY read returns priority_ptr_reg", "STATUS read returns grant_reg", "Reserved fields read zero", "No APB side effects on reads"], source_refs: ["registers.register_list", "function_model.transactions.FM2"], owner_module: "arbiter_rr_regs", owner_file: "rtl/arbiter_rr_regs.sv", priority: "high", required: true }
  tb-gen:
    - { id: "TB_TODO_SCOREBOARD", content: "Build Python scoreboard model from function_model", detail: "Implement priority_search() and state update expressions in Python. Compare expected vs observed gnt_o and priority_ptr on every cycle. Cover all 8 scenarios.", criteria: ["All 8 SSOT scenarios pass", "One-hot invariant checked", "Round-robin fairness verified over 2*NUM_INPUTS cycles"], source_refs: ["function_model", "test_requirements.scenarios"], priority: "high", required: true }
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []

# =============================================================================
# SECTION 34: Generation Flow
# =============================================================================
generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh arbiter_rr", description: "Validate production SSOT structure and quality gates" }
    - { name: "handoff_rtl", command: "/ssot-rtl arbiter_rr", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb", command: "/ssot-tb arbiter_rr", description: "Downstream cocotb verification from validated SSOT" }
    - { name: "handoff_coverage", command: "/coverage arbiter_rr", description: "Measure SSOT-declared coverage goals" }
    - { name: "handoff_eda", command: "/syn arbiter_rr", description: "Synthesis to prove 50MHz timing" }
