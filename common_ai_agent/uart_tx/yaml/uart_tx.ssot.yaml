# =============================================================================
# uart_tx.ssot.yaml — APB-accessed 8N1 UART transmitter
# Pattern: APB CSR + multi-cycle serial datapath (adapted from apb_xor_demo).
# Locked truth: req/uart_tx_requirements.md
# =============================================================================
top_module:
  name: uart_tx
  file: rtl/uart_tx.sv
  version: "1.0"
  type: peripheral
  description: "APB-Lite UART transmitter. Writing TXDATA while enabled and idle serialises one 8N1 frame on tx (start, 8 data LSB-first, stop) at DIV clocks-per-bit."
  reference_spec: "user-defined (req/uart_tx_requirements.md)"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: csr_decode, kind: control,  source_refs: [registers.register_list], rtl_candidates: [uart_tx], verification_impact: [test_requirements.scenarios] }
    - { id: tx_serialize, kind: datapath, source_refs: [function_model.transactions, cycle_model.pipeline], rtl_candidates: [uart_tx], verification_impact: [test_requirements.scenarios, coverage_plan.functional] }

sub_modules:
  - name: uart_tx
    file: rtl/uart_tx.sv
    ownership: manifest
    ssot_gen: true
    source_sections: [io_list, registers, function_model, cycle_model]
    implements: [io_list.interfaces.apb_slave, registers.register_list, function_model.transactions, cycle_model.pipeline]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM_TX_LOAD, function_model.transactions.FM_TX_IGNORE, function_model.transactions.FM_IDLE]
    cycle_model_refs: [cycle_model.pipeline]
    description: "APB decode + CTRL/DIV/TXDATA/STATUS registers + 8N1 serialiser."

parameters:
  - { name: APB_ADDR_WIDTH, default: 4,  type: int, description: "APB address width" }
  - { name: APB_DATA_WIDTH, default: 32, type: int, description: "APB data width" }
  - { name: DIV_WIDTH,      default: 16, type: int, description: "Baud divisor width" }

io_list:
  clock_domains:
    - name: pclk
      frequency_mhz: 50
      description: "APB clock"
      ports:
        - { name: PCLK, width: 1, direction: input }
  resets:
    - name: presetn
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "APB reset"
      ports:
        - { name: PRESETn, width: 1, direction: input }
  interfaces:
    - name: apb_slave
      type: APB-Lite
      role: slave
      clock_domain: pclk
      reset_domain: presetn
      description: "APB-Lite CSR"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0"
        access_phase: "PSEL=1, PENABLE=1, PREADY=1"
        read_rule: "PRDATA valid in completing access phase for reads."
        write_rule: "PWDATA sampled in completing access phase for writes."
        error_rule: "PSLVERR always 0 (all in-range addresses legal)."
      ports:
        - { name: PADDR,   width: 4,  direction: input  }
        - { name: PSEL,    width: 1,  direction: input  }
        - { name: PENABLE, width: 1,  direction: input  }
        - { name: PWRITE,  width: 1,  direction: input  }
        - { name: PWDATA,  width: 32, direction: input  }
        - { name: PRDATA,  width: 32, direction: output }
        - { name: PREADY,  width: 1,  direction: output }
        - { name: PSLVERR, width: 1,  direction: output }
    - name: serial_output
      type: custom
      clock_domain: pclk
      reset_domain: presetn
      description: "UART serial line and status"
      ports:
        - { name: tx,      width: 1, direction: output, description: "Serial output, idle=1, 8N1 LSB-first" }
        - { name: tx_busy, width: 1, direction: output, description: "1 while a frame is shifting out" }

features:
  - name: APB CSR access
    trigger: "APB read/write to CTRL/DIV/TXDATA/STATUS"
    datapath: "Address decode selects register"
    control: "0-wait-state PREADY"
    output: "Register update / read-back"
  - name: 8N1 serialise
    trigger: "TXDATA write while ENABLE=1 and idle"
    datapath: "frame = ((data<<1)|0x200)&0x3FF, shifted LSB-first at DIV clocks/bit"
    control: "bit counter + baud counter FSM"
    output: "tx, tx_busy"

registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "Reserved bits read zero"
  register_list:
    - name: CTRL
      offset: 0x0
      width: 32
      access: rw
      reset: 0x00000000
      category: config
      description: "Control register"
      write_side_effects:
        - "PWDATA[0] latched into enable_q on write access phase."
      fields:
        - { name: enable, bits: [0, 0], access: rw, reset: 0, write_effect: "Update enable_q", description: "Transmitter enable" }
    - name: DIV
      offset: 0x4
      width: 32
      access: rw
      reset: 0x00000004
      category: config
      description: "Baud divisor (clocks per bit), min 2"
      write_side_effects:
        - "PWDATA[15:0] latched into div_q on write access phase."
      fields:
        - { name: div, bits: [15, 0], access: rw, reset: 4, write_effect: "Update div_q", description: "Clocks per bit" }
    - name: TXDATA
      offset: 0x8
      width: 32
      access: wo
      reset: 0x00000000
      category: data
      description: "Write a byte to start a frame"
      write_side_effects:
        - "When enable_q=1 and busy_q=0, latch frame_q and start transmission."
      fields:
        - { name: data, bits: [7, 0], access: wo, reset: 0, write_effect: "Start frame with this byte", description: "Transmit byte" }
    - name: STATUS
      offset: 0xC
      width: 32
      access: ro
      reset: 0x00000000
      category: status
      description: "Status register"
      fields:
        - { name: busy, bits: [0, 0], access: ro, reset: 0, description: "Mirrors tx_busy" }
        - { name: done, bits: [1, 1], access: ro, reset: 0, description: "Set when a frame completes, cleared when a new frame starts" }

memory:
  instances: []
  note: "No FIFO/SRAM."

interrupts:
  sources: []
  output: null
  note: "No interrupts."

fsm:
  tx_control:
    states: [IDLE, START, DATA, STOP]
    transitions:
      - { from: IDLE,  to: START, condition: "txdata_write and enable_q and not busy_q" }
      - { from: START, to: DATA,  condition: "baud_tick" }
      - { from: DATA,  to: DATA,  condition: "baud_tick and bit_index < 7" }
      - { from: DATA,  to: STOP,  condition: "baud_tick and bit_index == 7" }
      - { from: STOP,  to: IDLE,  condition: "baud_tick" }
  apb_phase:
    states: [APB_IDLE, APB_ACCESS]
    transitions:
      - { from: APB_IDLE,   to: APB_ACCESS, condition: "psel == 1 and penable == 1" }
      - { from: APB_ACCESS, to: APB_IDLE,   condition: "psel == 0" }

rtl_contract:
  transaction: FM_TX_LOAD
  clock: PCLK
  reset: PRESETn
  reset_active: low
  sample_condition: "PRESETn == 1"
  input_map:
    psel: PSEL
    penable: PENABLE
    pwrite: PWRITE
    paddr: PADDR
    pwdata: PWDATA
  output_map:
    prdata: PRDATA
    pready: PREADY
    pslverr: PSLVERR
    tx: tx
    tx_busy: tx_busy
  state_updates:
    - { name: enable_q, reset: 0, expr: "PWDATA[0] on CTRL write else hold" }
    - { name: div_q,    reset: 4, expr: "PWDATA[15:0] on DIV write else hold" }
    - { name: busy_q,   reset: 0, expr: "1 on qualifying TXDATA write, 0 when stop bit completes" }
    - { name: frame_q,  reset: 0, expr: "((data<<1)|0x200)&0x3FF on qualifying TXDATA write" }

function_model:
  purpose: "Executable FL contract — byte-to-frame oracle (untimed)"
  state_variables:
    - { name: enable_q, source: registers.CTRL.enable, reset: 0, description: "Transmitter enable" }
    - { name: div_q,    source: registers.DIV.div,     reset: 4, description: "Clocks per bit" }
    - { name: busy_q,   source: function_model,        reset: 0, description: "Frame in flight" }
    - { name: frame_q,  source: function_model,        reset: 0, description: "Latched 10-bit frame (start,data LSB-first,stop)" }
    - { name: done_q,   source: registers.STATUS.done, reset: 0, description: "Frame completed flag" }
  transactions:
    - id: FM_TX_LOAD
      name: txdata_write_accepted
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1", "paddr == 8", "enable_q == 1", "busy_q == 0"]
      inputs: [pwdata]
      outputs: ["frame latched, tx_busy=1"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1 }
        - { name: busy_rule,    port: tx_busy, expr: 1, width: 1 }
        - { name: frame_rule,   port: tx_frame, width: 10, description: "10-bit frame, start(0)+data LSB-first+stop(1)",
            expr: "((pwdata << 1) | 0x200) & 0x3FF" }
      state_updates:
        - { name: frame_q, expr: "((pwdata << 1) | 0x200) & 0x3FF", width: 10 }
        - { name: busy_q,  expr: "1", width: 1 }
        - { name: done_q,  expr: "0", width: 1 }
      side_effects: ["Frame transmission begins"]
      error_cases: []
    - id: FM_TX_IGNORE
      name: txdata_write_ignored
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1", "paddr == 8", "(enable_q == 0) or (busy_q == 1)"]
      inputs: [pwdata]
      outputs: ["no new frame; in-flight frame and busy unchanged"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1 }
        - { name: busy_rule,    port: tx_busy, expr: "busy_q", width: 1 }
        - { name: frame_rule,   port: tx_frame, expr: "frame_q", width: 10 }
      state_updates:
        - { name: frame_q, expr: "frame_q", width: 10 }
        - { name: busy_q,  expr: "busy_q", width: 1 }
      side_effects: []
      error_cases: []
    - id: FM_IDLE
      name: idle_or_csr
      preconditions: ["pwrite == 0 or psel == 0 or penable == 0 or paddr != 8"]
      inputs: [paddr]
      outputs: ["CSR read-back; tx_busy reflects state"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1 }
        - { name: busy_rule,    port: tx_busy, expr: "busy_q", width: 1 }
        - { name: prdata_rule,  port: PRDATA,  width: 32,
            expr: "(enable_q & 1) if (psel==1 and penable==1 and pwrite==0 and paddr==0) else ((div_q & 0xffff) if (psel==1 and penable==1 and pwrite==0 and paddr==4) else (((busy_q & 1) | ((done_q & 1) << 1)) if (psel==1 and penable==1 and pwrite==0 and paddr==12) else 0))" }
      state_updates:
        - { name: enable_q, expr: "pwdata & 1 if (pwrite==1 and paddr==0 and psel==1 and penable==1) else enable_q", width: 1 }
        - { name: div_q,    expr: "pwdata & 0xffff if (pwrite==1 and paddr==4 and psel==1 and penable==1) else div_q", width: 16 }
      side_effects: []
      error_cases: []
  invariants:
    - "Idle line is 1; tx_busy=0 when no frame in flight."
    - "frame = ((data<<1)|0x200)&0x3FF: bit0 is the start bit (0) sent first, bit9 the stop bit (1) sent last."
    - "PREADY=1 always, PSLVERR=0 always."
    - "A TXDATA write while busy_q=1 or enable_q=0 does not change frame_q or busy_q."

cycle_model:
  purpose: "Cycle contract for the serialiser"
  executable: python
  cosim: true
  clock: PCLK
  reset:
    assertion: "PRESETn low forces tx=1, tx_busy=0, registers to reset."
    deassertion: "First rising PCLK after deassert enables operation."
  latency:
    apb_write: { min_cycles: 1, max_cycles: 1 }
    apb_read:  { min_cycles: 0, max_cycles: 0 }
    frame_duration_cycles: { expr: "10 * div_q", description: "start+8 data+stop, each div_q cycles" }
  handshake_rules:
    - { signal: PREADY,  rule: "Always 1 (0-wait-state)" }
    - { signal: tx,      rule: "Holds current frame bit for div_q cycles, LSB-first" }
  pipeline:
    - { stage: S_LOAD,  cycle: 0, action: "TXDATA write latches frame_q, busy_q=1, drive start bit" }
    - { stage: S_SHIFT, cycle: 1, action: "Shift one bit every div_q cycles, LSB-first" }
    - { stage: S_DONE,  cycle: 2, action: "After stop bit, busy_q=0, done_q=1, tx=1" }
  ordering:
    - "Start bit precedes data bits; data LSB transmitted first; stop bit last."
  backpressure: ["No backpressure; single byte in flight."]
  performance:
    frequency_mhz: 50
    throughput: { bytes_per_frame: 1, frame_cycles: "10 * div_q" }
  observability:
    - "tx and tx_busy observable each cycle; frame recoverable by sampling tx at bit centres."

clock_reset_domains:
  domains:
    - { name: PCLK, frequency_mhz: 50 }
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: pwdata, sink: frame_q, path: "PWDATA[7:0] -> frame_q on qualifying TXDATA write" }
    - { id: sequence_1, source: frame_q, sink: tx,     path: "frame_q shifted LSB-first -> tx" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]

security:
  classifications: []

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources (all addresses legal)", architectural_effect: "PSLVERR always 0" }

debug_observability:
  signals:
    - { name: enable_q, source: function_model.state_variables.enable_q, description: "Enable" }
    - { name: div_q,    source: function_model.state_variables.div_q,    description: "Baud divisor" }
    - { name: busy_q,   source: function_model.state_variables.busy_q,   description: "Busy" }
    - { name: frame_q,  source: function_model.state_variables.frame_q,  description: "Latched frame" }

dft:
  scan: { enabled: false }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [PCLK, PRESETn, PADDR, PSEL, PENABLE, PWRITE, PWDATA, PRDATA, PREADY, PSLVERR, tx, tx_busy]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file."

test_requirements:
  scenarios:
    - id: SC1
      name: "Reset — tx idle high, not busy"
      stimulus: "After reset, tx=1, tx_busy=0, STATUS=0"
      expected: "tx=1, tx_busy=0"
      checker: "Scoreboard checks idle line and busy after reset."
      coverage: [reset, IDLE]
      stimulus_machine_spec:
        assign: { pwdata: 0 }
    - id: SC2
      name: "Enable then transmit 0xA5 — frame matches"
      stimulus: "Write CTRL.enable=1, set DIV=4, write TXDATA=0xA5"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x1 } }
          - { csr_write: { offset: 0x4, data: 0x4 } }
          - { csr_write: { offset: 0x8, data: 0xA5 } }
      expected: "frame=((0xA5<<1)|0x200)&0x3FF=0x34B, tx_busy=1 after write"
      checker: "Scoreboard deserialises tx and compares full frame to FL."
      coverage: [FM_TX_LOAD, tx_serialize]
    - id: SC3
      name: "Transmit 0x00 — boundary all-zero data"
      stimulus: "Enable, write TXDATA=0x00"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x1 } }
          - { csr_write: { offset: 0x8, data: 0x00 } }
      expected: "frame=0x200 (start 0, data 0, stop 1)"
      checker: "Scoreboard verifies frame=0x200."
      coverage: [FM_TX_LOAD, tx_serialize]
    - id: SC4
      name: "Transmit 0xFF — boundary all-one data"
      stimulus: "Enable, write TXDATA=0xFF"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x1 } }
          - { csr_write: { offset: 0x8, data: 0xFF } }
      expected: "frame=0x3FE (start 0, data 0xFF, stop 1)"
      checker: "Scoreboard verifies frame=0x3FE."
      coverage: [FM_TX_LOAD, tx_serialize]
    - id: SC5
      name: "Write while busy is ignored"
      stimulus: "Enable, write TXDATA=0xA5, then write TXDATA=0x3C before frame ends"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x1 } }
          - { csr_write: { offset: 0x8, data: 0xA5 } }
          - { csr_write: { offset: 0x8, data: 0x3C } }
      expected: "second write ignored; transmitted frame is 0x34B not 0x279"
      checker: "Scoreboard verifies the in-flight frame is unchanged."
      coverage: [FM_TX_IGNORE]
    - id: SC6
      name: "Write while disabled is ignored"
      stimulus: "ENABLE=0, write TXDATA=0xA5"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x8, data: 0xA5 } }
      expected: "no frame; tx_busy stays 0, tx stays 1"
      checker: "Scoreboard verifies no transmission started."
      coverage: [FM_TX_IGNORE, disabled]
  scoreboard_checks:
    - "Serial frame on tx equals ((data<<1)|0x200)&0x3FF, sampled bit-by-bit"
    - "tx_busy=1 after accepted write, returns to 0 after stop bit"
    - "PREADY=1 always; PSLVERR=0 always"
    - "Write while busy or disabled does not corrupt the in-flight frame"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: UART_TX_BRINGUP, description: "End-to-end direct-agent build of uart_tx through FL/goals/RTL/TB/sim/audit", status: planned }
