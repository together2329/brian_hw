# =============================================================================
# SSOT: shift_reg — Configurable Shift Register
# =============================================================================
top_module:
  name: "shift_reg"
  file: "rtl/shift_reg.sv"
  version: "1.0"
  type: "peripheral"
  description: "Configurable shift register with parameterized width/depth, APB-lite CSR interface, and 1-cycle shift latency."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "shift_reg_regs",  file: "rtl/shift_reg_regs.sv",  ownership: "manifest", ssot_gen: true,  wiring_only: false, implements: ["registers.register_list", "interrupts", "error_handling"], source_sections: ["registers", "interrupts", "error_handling"], register_refs: ["registers.register_list"], description: "APB-lite CSR decode and register storage" }
  - { name: "shift_reg_core",  file: "rtl/shift_reg_core.sv",  ownership: "manifest", ssot_gen: false, wiring_only: false, implements: ["function_model", "cycle_model", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow.shift_path"], feature_refs: ["features"], description: "Shift datapath and control logic" }
  connections:
    - { module: "shift_reg_core", port: "clk_i",        signal: "PCLK" }
    - { module: "shift_reg_core", port: "rst_ni",       signal: "PRESETn" }
    - { module: "shift_reg_core", port: "sdi_i",        signal: "sdi" }
    - { module: "shift_reg_core", port: "pdata_in_i",   signal: "pdata_in" }
    - { module: "shift_reg_core", port: "ctrl_i",       signal: "shift_reg_regs.ctrl_out" }
    - { module: "shift_reg_core", port: "data_in_i",    signal: "shift_reg_regs.data_in_out" }
    - { module: "shift_reg_core", port: "sdo_o",        signal: "sdo" }
    - { module: "shift_reg_core", port: "pdata_out_o",  signal: "pdata_out" }
    - { module: "shift_reg_core", port: "status_o",     signal: "shift_reg_regs.status_in" }
    - { module: "shift_reg_regs", port: "clk_i",        signal: "PCLK" }
    - { module: "shift_reg_regs", port: "rst_ni",       signal: "PRESETn" }
    - { module: "shift_reg_regs", port: "irq_o",        signal: "shift_irq" }
decomposition:
  units:
    - { id: "decode", kind: "control", source_refs: ["function_model.transactions", "registers.register_list"], rtl_candidates: ["shift_reg_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "execute", kind: "datapath", source_refs: ["function_model.transactions", "cycle_model.pipeline"], rtl_candidates: ["shift_reg_core"], verification_impact: ["coverage_goals.function"] }
rtl_contract:
  transaction: "FM1"
  sample_condition: "shift enable asserted and shift_reg_core updates shreg on rising PCLK"
  input_map:
    shift_enable: "CTRL.enable"
    shift_direction: "CTRL.direction"
    shift_mode: "CTRL.mode"
    serial_in: "sdi"
    parallel_in: "DATA_IN.pdata"
  output_map:
    serial_out: "sdo"
    parallel_out: "pdata_out"
    shift_count: "STATUS.shift_count"
  state_updates:
    - { name: "shreg", reset: 0, expr: "shreg << 1 | sdi when direction=left; shreg >> 1 | (sdi << (DATA_WIDTH-1)) when direction=right" }
    - { name: "shift_count", reset: 0, expr: "shift_count + 1 when enable=1 and shift occurs" }
    - { name: "done_flag", reset: 0, expr: "1 when shift_count reaches DEPTH*DATA_WIDTH, else 0" }
parameters:
  - { name: "DATA_WIDTH", default: 8, type: int, description: "Shift register data width in bits (1..256)", drives: ["shift_reg_core.sv", "shift_reg_regs.sv"] }
  - { name: "DEPTH", default: 1, type: int, description: "Number of shift register stages (1..16)", drives: ["shift_reg_core.sv"] }
  - { name: "CLOCK_FREQ_MHZ", default: 50, type: int, description: "Target clock frequency in MHz", drives: ["sim/tb_top.sv"] }
  - { name: "RESET_POLARITY", default: "active_low", type: enum, values: ["active_low", "active_high"], drives: ["ALL .sv files"] }
  - { name: "HAS_PARALLEL_LOAD", default: 1, type: int, description: "Enable parallel load capability (0=disable, 1=enable)", drives: ["shift_reg_core.sv", "shift_reg_regs.sv"] }
  - { name: "HAS_INTERRUPT", default: 1, type: int, description: "Enable done-interrupt output (0=disable, 1=enable)", drives: ["shift_reg_regs.sv", "shift_reg.sv"] }
io_list:
  clock_domains:
    - name: "PCLK_domain"
      frequency_mhz: 50
      description: "Single system clock domain"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "PRESETn_domain"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "System reset, async assert with sync deassert"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB-lite"
      role: "slave"
      clock_domain: "PCLK_domain"
      reset_domain: "PRESETn_domain"
      description: "APB-lite CSR interface for runtime configuration and status readback"
      protocol:
        setup_phase: "psel=1, penable=0 captures address and control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata is sampled in the completing access phase for writes."
        error_rule: "pslverr is asserted only with pready=1 for illegal access."
      ports:
        - { name: "paddr",   width: 12, direction: "input",  description: "APB address bus" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write (1=write, 0=read)" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB transfer ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB slave error" }
    - name: "serial_io"
      type: "custom"
      clock_domain: "PCLK_domain"
      reset_domain: "PRESETn_domain"
      description: "Serial data input and output pins for shift operations"
      protocol:
        input_sampling: "sdi is sampled on the rising edge of PCLK when enabled."
        output_update: "sdo updates on the rising edge of PCLK after each shift."
        reset_value: "sdo is 0 during reset."
      ports:
        - { name: "sdi", width: 1, direction: "input",  description: "Serial data input" }
        - { name: "sdo", width: 1, direction: "output", description: "Serial data output" }
    - name: "parallel_io"
      type: "custom"
      clock_domain: "PCLK_domain"
      reset_domain: "PRESETn_domain"
      description: "Parallel data input and output for load/capture operations"
      protocol:
        load_rule: "pdata_in is captured into the shift register when mode=PISO and a parallel load is triggered via APB."
        capture_rule: "pdata_out reflects the current shift register value with 0-cycle read latency."
        reset_value: "pdata_out is 0 during reset."
      ports:
        - { name: "pdata_in",  width: 8, direction: "input",  description: "Parallel data input (width = DATA_WIDTH parameter)" }
        - { name: "pdata_out", width: 8, direction: "output", description: "Parallel data output (width = DATA_WIDTH parameter)" }
    - name: "interrupt_out"
      type: "custom"
      clock_domain: "PCLK_domain"
      reset_domain: "PRESETn_domain"
      description: "Shift-complete interrupt output"
      protocol:
        assertion: "shift_irq asserts when shift_count reaches DEPTH*DATA_WIDTH and interrupt is enabled."
        deassertion: "shift_irq deasserts after STATUS.done is cleared by W1C write."
        reset_value: 0
      ports:
        - { name: "shift_irq", width: 1, direction: "output", description: "Shift-complete interrupt (active high level)" }
features:
  - name: "Serial Shift Left"
    trigger: "CTRL.enable=1, CTRL.direction=0 (left)"
    datapath: "sdi -> shreg[0], shreg shifts left by 1 bit per PCLK cycle"
    control: "IDLE -> SHIFTING -> (done check) -> IDLE"
    output: "sdo = shreg[DATA_WIDTH-1], pdata_out = shreg"
  - name: "Serial Shift Right"
    trigger: "CTRL.enable=1, CTRL.direction=1 (right)"
    datapath: "sdi -> shreg[DATA_WIDTH-1], shreg shifts right by 1 bit per PCLK cycle"
    control: "IDLE -> SHIFTING -> (done check) -> IDLE"
    output: "sdo = shreg[0], pdata_out = shreg"
  - name: "Parallel Load"
    trigger: "CTRL.mode=PISO and software writes DATA_IN register"
    datapath: "pdata_in -> shreg loaded in one cycle"
    control: "IDLE -> LOADING -> IDLE"
    output: "shreg = pdata_in, pdata_out updated immediately"
  - name: "Shift-Complete Interrupt"
    trigger: "shift_count reaches DEPTH*DATA_WIDTH with CTRL.ie=1"
    datapath: "done_flag set, shift_irq asserted"
    control: "Shift counter compared against threshold each cycle"
    output: "shift_irq = done_flag & CTRL.ie"
dataflow:
  shift_path:
    serial_input: "sdi"
    register_chain: "shreg (DATA_WIDTH-bit shift register, DEPTH stages)"
    serial_output: "sdo"
    sequence: "sdi -> shreg (shift by direction) -> sdo, pdata_out"
  load_path:
    parallel_input: "pdata_in (via APB DATA_IN register)"
    sequence: "DATA_IN write -> shreg loaded -> pdata_out reflects new value"
  count_path:
    counter: "shift_count (accumulates per shift)"
    threshold: "DEPTH * DATA_WIDTH"
    done: "done_flag = (shift_count == threshold)"
    sequence: "enable=1 -> shift_count++ -> compare -> done_flag -> irq if enabled"
function_model:
  purpose: "Cycle-independent behavioral contract for shift_reg; describes what the IP computes regardless of cycle timing."
  state_variables:
    - { name: "shreg",         source: "registers.DATA_IN", reset: 0,       description: "Shift register content (DATA_WIDTH bits)" }
    - { name: "shift_count",   source: "registers.STATUS.shift_count", reset: 0, description: "Accumulated shift count" }
    - { name: "done_flag",     source: "registers.STATUS.done",         reset: 0, description: "Shift-complete flag" }
    - { name: "ctrl_enable",   source: "registers.CTRL.enable",   reset: 0, description: "Shift enable from CSR" }
    - { name: "ctrl_direction", source: "registers.CTRL.direction", reset: 0, description: "0=left, 1=right" }
    - { name: "ctrl_mode",     source: "registers.CTRL.mode",     reset: 0, description: "0=SISO, 1=PISO, 2=SIPO, 3=PIPO" }
  transactions:
    - id: "FM1"
      name: "serial_shift_left"
      preconditions:
        - "ctrl_enable == 1"
        - "ctrl_direction == 0 (left)"
        - "done_flag == 0 or shift_count has been cleared"
      inputs:
        - "sdi (1-bit serial input)"
      outputs:
        - "shreg shifted left by 1; shreg[0] = sdi"
        - "sdo = shreg[DATA_WIDTH-1]"
      output_rules:
        - { name: "sdo",          expr: "shreg[DATA_WIDTH-1]", width: 1,          port: "sdo" }
        - { name: "pdata_out",    expr: "shreg",               width: "DATA_WIDTH", port: "pdata_out" }
      side_effects:
        - "shift_count increments by 1"
        - "done_flag = (shift_count == DEPTH*DATA_WIDTH) after increment"
      error_cases:
        - { condition: "ctrl_enable asserted while done_flag is still set and not cleared", result: "Shifts continue; done_flag remains set, interrupt re-asserted if ie=1" }
    - id: "FM2"
      name: "serial_shift_right"
      preconditions:
        - "ctrl_enable == 1"
        - "ctrl_direction == 1 (right)"
        - "done_flag == 0 or shift_count has been cleared"
      inputs:
        - "sdi (1-bit serial input)"
      outputs:
        - "shreg shifted right by 1; shreg[DATA_WIDTH-1] = sdi"
        - "sdo = shreg[0]"
      output_rules:
        - { name: "sdo",          expr: "shreg[0]",             width: 1,            port: "sdo" }
        - { name: "pdata_out",    expr: "shreg",               width: "DATA_WIDTH",  port: "pdata_out" }
      side_effects:
        - "shift_count increments by 1"
        - "done_flag = (shift_count == DEPTH*DATA_WIDTH) after increment"
      error_cases: []
    - id: "FM3"
      name: "parallel_load"
      preconditions:
        - "HAS_PARALLEL_LOAD == 1"
        - "APB write to DATA_IN register completes"
      inputs:
        - "DATA_IN.pdata (DATA_WIDTH bits from APB)"
      outputs:
        - "shreg = pdata_in"
      output_rules:
        - { name: "pdata_out",    expr: "pdata_in",             width: "DATA_WIDTH",  port: "pdata_out" }
        - { name: "sdo",          expr: "pdata_in[0] or pdata_in[DATA_WIDTH-1] depending on direction", width: 1, port: "sdo" }
      side_effects:
        - "shift_count resets to 0"
        - "done_flag resets to 0"
      error_cases: []
  invariants:
    - "No shift occurs when ctrl_enable == 0."
    - "pdata_out always reflects the current shreg value."
    - "done_flag only transitions to 1 when shift_count equals DEPTH*DATA_WIDTH."
    - "Register read side effects are exactly those listed in registers.register_list."
  reference_model_hint: "tb-gen should implement a Python model tracking shreg, shift_count, done_flag and compare expected/got for every scenario."
cycle_model:
  purpose: "Cycle/handshake contract for shift_reg; describes when state and outputs change on PCLK edges."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears shreg, shift_count, done_flag, and all internal state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    register_read: { min_cycles: 0, max_cycles: 1, description: "APB read data and pready timing" }
    register_write: { min_cycles: 0, max_cycles: 1, description: "APB write acceptance timing" }
    single_shift: { min_cycles: 1, max_cycles: 1, description: "Each shift operation completes in exactly 1 PCLK cycle" }
    parallel_load: { min_cycles: 1, max_cycles: 1, description: "Parallel load completes in 1 PCLK cycle after APB write" }
  handshake_rules:
    - { signal: "pready", rule: "Always 1 (zero wait-state APB-lite); no backpressure on CSR access." }
    - { signal: "pslverr", rule: "Asserted only for illegal addresses (paddr not matching any register offset)." }
    - { signal: "sdo", rule: "Updated on every rising PCLK edge when ctrl_enable=1; holds previous value when disabled." }
    - { signal: "shift_irq", rule: "Asserted the same cycle done_flag transitions to 1 and ctrl.ie=1; deasserted after W1C clear of STATUS.done." }
  pipeline:
    - { stage: "S0_IDLE",       cycle: 0,     action: "Wait for ctrl_enable=1 or APB register access" }
    - { stage: "S1_SHIFT",      cycle: 1,     action: "Shift shreg by direction, sample sdi, update sdo, increment shift_count" }
    - { stage: "S2_DONE_CHECK", cycle: 1,     action: "Compare shift_count against DEPTH*DATA_WIDTH, set done_flag if equal" }
    - { stage: "S3_IRQ_UPDATE", cycle: 1,     action: "Update shift_irq = done_flag & ctrl.ie on same edge as done_flag" }
  ordering:
    - "Shift and done_check happen on the same rising edge."
    - "shift_irq updates on the same edge as done_flag."
    - "APB register writes are accepted only in the access phase (psel=1, penable=1, pready=1)."
  backpressure:
    - "No backpressure in this IP; APB-lite CSR is zero wait-state, shift operations are always 1 cycle."
  performance:
    frequency_mhz: 50
    throughput: { sustained_shifts_per_cycle: 1, condition: "ctrl_enable held at 1" }
    outstanding: { read_max: 1, write_max: 1, description: "Single APB transfer at a time" }
    depth: { pipeline_stages: 1, queue_depth: 0, description: "No pipeline buffering; single-cycle operation" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "PCLK_domain", frequency_mhz: 50, description: "Single system clock domain" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"
registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
    channel_stride: 0
    channel_base: 0
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x000
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register — enable, direction, mode, interrupt enable"
      fields:
        - { name: "enable",    bits: [0, 0],   access: "rw", reset: 0x0, write_effect: "0=disable shifts, 1=enable shifts", description: "Shift enable" }
        - { name: "direction", bits: [1, 1],   access: "rw", reset: 0x0, write_effect: "0=shift left, 1=shift right", description: "Shift direction" }
        - { name: "mode",      bits: [3, 2],   access: "rw", reset: 0x0, write_effect: "0=SISO, 1=PISO, 2=SIPO, 3=PIPO", description: "Shift mode" }
        - { name: "ie",        bits: [4, 4],   access: "rw", reset: 0x0, write_effect: "0=interrupt masked, 1=interrupt enabled", description: "Interrupt enable" }
        - { name: "reserved_31_5", bits: [31, 5], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "DATA_IN"
      offset: 0x004
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "data"
      description: "Data Input Register — parallel load value (lower DATA_WIDTH bits used)"
      write_side_effects:
        - "Writing DATA_IN loads pdata into the shift register when mode=PISO or mode=PIPO."
        - "shift_count resets to 0 on parallel load."
      fields:
        - { name: "pdata", bits: [7, 0],  access: "rw", reset: 0x00, write_effect: "Parallel load data (width parameterized by DATA_WIDTH)", description: "Parallel data input" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "DATA_OUT"
      offset: 0x008
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "data"
      description: "Data Output Register — current shift register value (lower DATA_WIDTH bits valid)"
      fields:
        - { name: "pdata", bits: [7, 0],  access: "ro", reset: 0x00, description: "Current shift register content (width parameterized by DATA_WIDTH)" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x00C
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Status Register — shift count, done flag, interrupt status"
      fields:
        - { name: "done",        bits: [0, 0],    access: "rw", reset: 0x0, write_effect: "W1C: writing 1 clears done_flag and shift_count", description: "Shift-complete flag (W1C)" }
        - { name: "shift_count", bits: [12, 1],   access: "ro", reset: 0x000, description: "Current shift count (up to 12 bits for DEPTH*DATA_WIDTH)" }
        - { name: "reserved_31_13", bits: [31, 13], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances:
    - { name: "shreg", type: "register", depth: 1, width: 8, read_ports: 1, write_ports: 1, latency: 0, description: "Shift register storage (width parameterized by DATA_WIDTH)" }
  note: "No SRAM/FIFO in this peripheral. Storage is purely flip-flop based."
interrupts:
  sources:
    - { name: "SHIFT_DONE", bit: 0, type: "level", enable_reg: "CTRL.ie", status_reg: "STATUS.done", clear: "W1C", description: "Shift complete (shift_count == DEPTH*DATA_WIDTH)" }
  output:
    signal: "shift_irq"
    polarity: "active_high"
    type: "level"
fsm:
  shift_control:
    states:
      - "IDLE"
      - "SHIFTING"
    transitions:
      - { from: "IDLE",     to: "SHIFTING", condition: "CTRL.enable rising edge" }
      - { from: "SHIFTING", to: "IDLE",     condition: "CTRL.enable falling edge or done_flag cleared by W1C" }
    note: "Simple 2-state FSM in shift_reg_core.sv; most control is combinational decode of CTRL register fields."
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.2 }
  latency_budget:
    register_access_cycles: { min: 1, max: 2, measured_from: "psel && penable", measured_to: "pready" }
    shift_latency_cycles: { min: 1, max: 1, measured_from: "CTRL.enable rising edge", measured_to: "sdo/pdata_out update" }
    interrupt_latency_cycles: { min: 1, max: 1, measured_from: "done_flag transition", measured_to: "shift_irq assertion" }
  throughput:
    sustained_shifts_per_cycle: 1
    conditions: "CTRL.enable held at 1"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "sdi, pdata_in", clock: "PCLK", delay_ns: 0.5, source: "system-level timing budget" }
    outputs:
      - { ports: "sdo, pdata_out, shift_irq", clock: "PCLK", delay_ns: 0.5, source: "system-level timing budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK_domain"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode in this IP revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "reset deasserted", exit: "reset asserted", guarantees: ["All shift and CSR behavior active"] }
  upf_required: false
security:
  classification: "non_secure_control_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "shift_data", protection: "Data integrity is register-level; no AXI data path" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO/W1C access policy in registers.register_list" }
    - { threat: "unintended shift", mitigation: "CTRL.enable defaults to 0; explicit enable required" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "No silent data corruption on shift overflow"
    - "done_flag and interrupt status are software-visible"
error_handling:
  error_sources:
    - { id: "ERR_ILLEGAL_ADDR", condition: "APB access to unmapped address offset", architectural_effect: "pslverr=1, pready=1" }
    - { id: "ERR_SHIFT_OVERFLOW", condition: "shift_count exceeds DEPTH*DATA_WIDTH without W1C clear", architectural_effect: "done_flag stays set, shift_count wraps or saturates" }
  propagation:
    - "First error wins until software clear unless otherwise specified."
    - "pslverr is only driven by illegal address decode."
  recovery:
    - { action: "software W1C clear of STATUS.done", clears: ["done_flag", "shift_count"], preserves: ["CTRL configuration", "shreg content"] }
debug_observability:
  waveform_must_probe:
    - "shreg"
    - "shift_count"
    - "done_flag"
