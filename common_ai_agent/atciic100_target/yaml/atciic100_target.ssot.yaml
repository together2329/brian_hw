# ATCIIC100 target — workflow stress-test against Andes ATCIIC100 reference RTL.
# Reference: /Users/brian/Desktop/andes/atciic100/hdl  (5 modules, 1409 LoC)
# Goal: measure how much of Andes-quality RTL skeleton our workflow can drive.

ip: atciic100_target
description: |
  I2C bus controller (master + slave), APB slave register interface,
  byte-oriented FIFO, glitch-suppression filter, DMA request, IRQ.

top_module:
  name: atciic100_target
  file: rtl/atciic100_target.sv

parameters:
  - { name: DATA_WIDTH,   default: 8,  description: "I2C byte data width" }
  - { name: FIFO_DEPTH,   default: 4,  description: "FIFO depth: 2/4/8/16" }
  - { name: INDEX_WIDTH,  default: 2,  description: "FIFO index width log2(FIFO_DEPTH)" }
  - { name: ID,           default: "16'h0202", description: "ID register value" }
  - { name: REV_MAJOR,    default: "12'h100",  description: "Major revision" }
  - { name: REV_MINOR,    default: "4'h2",     description: "Minor revision" }

clocks:
  - { name: pclk, frequency_mhz_min: 50, description: "APB clock" }

resets:
  - { name: presetn, type: async_low, sync_clock: pclk }

io_list:
  interfaces:
    - { name: apb,
        type: amba_apb3, role: slave,
        signals: [paddr, psel, penable, pwrite, pwdata, prdata],
        addr_width: 6, data_width: 32 }
    - { name: i2c,
        type: i2c_open_drain, role: master_slave,
        signals: [scl_i, sda_i, scl_o, sda_o] }
    - { name: dma,
        type: req_ack, role: source,
        signals: [dma_req, dma_ack] }
    - { name: interrupt,
        type: output, signals: [i2c_int], width: 1 }

sub_modules:
  - { name: atciic100_target_apbslv, file: rtl/atciic100_target_apbslv.sv,
      ownership: manifest,
      implements: [registers.register_list, function_model.transactions.csr_write,
                   function_model.transactions.csr_read, cycle_model.handshake_rules.apb_setup,
                   cycle_model.handshake_rules.apb_access, function_model.state_variables.cmd,
                   function_model.state_variables.cfg, function_model.state_variables.int_en,
                   function_model.state_variables.int_st] }
  - { name: atciic100_target_ctrl, file: rtl/atciic100_target_ctrl.sv,
      ownership: manifest,
      implements: [function_model.transactions.master_send, function_model.transactions.master_recv,
                   function_model.transactions.slave_send, function_model.transactions.slave_recv,
                   fsm.iic_phase, cycle_model.handshake_rules.i2c_start_stop,
                   cycle_model.handshake_rules.i2c_byte, cycle_model.ordering.start_addr_data_stop] }
  - { name: atciic100_target_fifo, file: rtl/atciic100_target_fifo.sv,
      ownership: manifest,
      implements: [memory.instances.tx_rx_fifo, function_model.state_variables.fifo_count,
                   cycle_model.backpressure.fifo_full] }
  - { name: atciic100_target_gsf, file: rtl/atciic100_target_gsf.sv,
      ownership: manifest,
      implements: [cycle_model.handshake_rules.glitch_suppress] }

features:
  - "I2C master operation: START/REPEAT-START/byte transfer/STOP"
  - "I2C slave operation: address recognition, ACK/NACK, byte recv/send"
  - "Multi-master arbitration with arb-lose detection"
  - "Configurable timing: t_high, t_low, t_hddat, t_sudat, t_sp"
  - "Internal FIFO (2/4/8/16 depth) with half-full / half-empty signals"
  - "DMA request gated by FIFO empty/full state"
  - "Glitch suppression filter on scl_i / sda_i"
  - "General-call address recognition"
  - "Interrupt sources: cmpl, byterecv, bytetrans, arblose, addrhit, fifo_half_*, gencall"

dataflow:
  paths:
    - { name: apb_to_csr,    source: apb.pwdata, sink: csr_regs, via: [atciic100_target_apbslv] }
    - { name: csr_to_ctrl,   source: csr_regs,   sink: atciic100_target_ctrl, via: [] }
    - { name: tx_path,       source: csr_regs.data_reg, sink: i2c.sda_o, via: [atciic100_target_fifo, atciic100_target_ctrl] }
    - { name: rx_path,       source: i2c.sda_i,         sink: csr_regs.data_reg, via: [atciic100_target_gsf, atciic100_target_ctrl, atciic100_target_fifo] }
    - { name: dma_request,   source: atciic100_target_fifo, sink: dma.dma_req, via: [atciic100_target_apbslv] }
    - { name: irq_emit,      source: atciic100_target_apbslv.int_st, sink: interrupt.i2c_int, via: [] }

function_model:
  state_variables:
    - { name: cmd,         width: 32, reset: 0,  description: "Command register (read/write/start/stop/cont)" }
    - { name: cfg,         width: 32, reset: 0,  description: "Configuration register (timing/role/dma_en)" }
    - { name: int_en,      width: 32, reset: 0,  description: "Interrupt enable mask" }
    - { name: int_st,      width: 32, reset: 0,  description: "Interrupt status (write-1-clear)" }
    - { name: setup,       width: 32, reset: 0,  description: "Setup register (addr/datacnt)" }
    - { name: addr_reg,    width: 10, reset: 0,  description: "I2C target address" }
    - { name: datacnt,     width: 9,  reset: 0,  description: "Remaining byte count" }
    - { name: phase,       width: 4,  reset: 0,  description: "I2C phase: IDLE/START/ADDR/DAT/STOP" }
    - { name: fifo_count,  width: 5,  reset: 0,  description: "FIFO occupancy" }
    - { name: master,      width: 1,  reset: 0,  description: "Master-mode currently active" }
    - { name: trans,       width: 1,  reset: 0,  description: "Transaction in progress" }
    - { name: arb_lost,    width: 1,  reset: 0,  description: "Arbitration lost flag" }

  transactions:
    - { id: FM_RESET, name: reset,
        outputs: ["all state -> reset values"],
        side_effects: ["clear FIFO", "release SDA/SCL"], error_cases: [] }
    - { id: FM_CSR_WRITE, name: csr_write,
        preconditions: ["psel && penable && pwrite"],
        outputs: ["register at paddr updated with pwdata"],
        side_effects: ["clear-on-write fields applied (int_st)"],
        error_cases: [{condition: "reserved address", result: "no-op"}] }
    - { id: FM_CSR_READ, name: csr_read,
        preconditions: ["psel && penable && !pwrite"],
        outputs: ["prdata := register at paddr"],
        side_effects: [],
        error_cases: [{condition: "reserved address", result: "prdata=0"}] }
    - { id: FM_MASTER_SEND, name: master_send,
        preconditions: ["cmd.start && cfg.master_mode && fifo_count > 0"],
        outputs: ["sda_o pulled per byte from fifo", "scl_o toggled per timing"],
        side_effects: ["phase walks IDLE->START->ADDR->DAT->STOP",
                       "datacnt decrements per byte", "trans=1"],
        error_cases: [
          {condition: "ACK not received", result: "int_st.ack_neg=1; phase->STOP"},
          {condition: "arbitration lost mid-byte", result: "arb_lost=1; int_st.arblose=1"}
        ] }
    - { id: FM_MASTER_RECV, name: master_recv,
        preconditions: ["cmd.start && cmd.read && cfg.master_mode"],
        outputs: ["sda_i sampled per byte and pushed to fifo"],
        side_effects: ["phase walks IDLE->START->ADDR->DAT->STOP",
                       "datacnt decrements per byte"],
        error_cases: [{condition: "fifo full mid-byte", result: "stall scl until drained"}] }
    - { id: FM_SLAVE_RECV, name: slave_recv,
        preconditions: ["!cfg.master_mode", "addr matches addr_reg or general-call enabled"],
        outputs: ["sda_o ACK after addr match", "byte from sda_i pushed to fifo"],
        side_effects: ["int_st.byterecv=1 per byte"],
        error_cases: [{condition: "fifo full", result: "NACK"}] }
    - { id: FM_SLAVE_SEND, name: slave_send,
        preconditions: ["!cfg.master_mode", "addr matches and master is reading"],
        outputs: ["sda_o driven from fifo per byte"],
        side_effects: ["int_st.bytetrans=1 per byte"],
        error_cases: [] }
    - { id: FM_GEN_CALL, name: general_call,
        preconditions: ["incoming addr=0x00, gen_call enabled"],
        outputs: ["int_st.gencall=1"],
        side_effects: ["accept first byte and pass to ctrl"],
        error_cases: [] }
    - { id: FM_DMA_REQ, name: dma_request,
        preconditions: ["cfg.dma_en && fifo edge crosses threshold"],
        outputs: ["dma_req asserted until dma_ack"],
        side_effects: [],
        error_cases: [{condition: "dma_ack not received within timeout", result: "dma_req held"}] }

  invariants:
    - "fifo_count <= FIFO_DEPTH"
    - "phase != IDLE -> trans == 1"
    - "trans == 1 -> presetn == 1"
    - "arb_lost == 1 -> phase->STOP within 4 cycles"
    - "int_st write-1-clear: only set bits in pwdata clear int_st"

cycle_model:
  clock: pclk
  reset: { polarity: active_low_async, deassertion: synchronous_to_pclk }
  latency:
    apb_register_read:  { min_cycles: 0, max_cycles: 1 }
    apb_register_write: { min_cycles: 0, max_cycles: 1 }
    i2c_byte:           { min_cycles: 9, max_cycles: null }
    fifo_push_pop:      { min_cycles: 0, max_cycles: 1 }
    glitch_suppress:    { min_cycles: 1, max_cycles: 3 }

  outstanding: 1

  handshake_rules:
    - { name: apb_setup,  signal: "psel && !penable", rule: "1-cycle APB setup" }
    - { name: apb_access, signal: "psel && penable",  rule: "Access completes when slave drives prdata or accepts pwdata" }
    - { name: i2c_start_stop, signal: "sda falling while scl high (start) / sda rising while scl high (stop)",
        rule: "START opens transaction; STOP closes" }
    - { name: i2c_byte,   signal: "9 SCL pulses (8 data + 1 ACK)", rule: "MSB-first; ACK by receiver" }
    - { name: glitch_suppress, signal: "filter sda/scl glitches < t_sp", rule: "Suppress glitches shorter than t_sp" }
    - { name: dma_req_ack, signal: "dma_req && dma_ack", rule: "Hold dma_req until dma_ack" }

  ordering:
    - { name: start_addr_data_stop, rule: "Each transaction: START -> ADDR(7-bit + R/W) -> DATA(N bytes) -> STOP" }
    - { name: arb_lose_terminates,  rule: "On arbitration loss, immediately release SDA and abort phase" }

  arbitration:
    - { name: i2c_multimaster, algorithm: "open-drain; loser detects mismatch on sampled sda_i", winners: "master that drives 0 while bus is 0" }

  backpressure:
    - { name: fifo_full,  rule: "FIFO full causes scl to stretch (clock stretching) until drained" }
    - { name: fifo_empty, rule: "FIFO empty in master_send causes phase->STOP after current byte" }

  observability:
    - "int_st bits visible via APB"
    - "fifo half_full/half_empty signals"
    - "phase visible in DBGSTATUS"

registers:
  register_list:
    - { name: ID,        offset: 0x00, access: RO, reset: "16'h0202" }
    - { name: REV,       offset: 0x10, access: RO, reset: 0 }
    - { name: HWCFG,     offset: 0x14, access: RO, reset: 0 }
    - { name: CFG,       offset: 0x20, access: RW, reset: 0,  description: "master/slave, gen_call, dma_en, role" }
    - { name: INT_EN,    offset: 0x24, access: RW, reset: 0 }
    - { name: INT_ST,    offset: 0x28, access: W1C, reset: 0 }
    - { name: ADDR,      offset: 0x2C, access: RW, reset: 0,  description: "Slave address" }
    - { name: DATA,      offset: 0x30, access: RW, reset: 0,  description: "TX/RX FIFO data port" }
    - { name: CMD,       offset: 0x34, access: RW, reset: 0,  description: "start/stop/read/write/datacnt" }
    - { name: SETUP,     offset: 0x38, access: RW, reset: 0,  description: "addr_mode, gen_call_en, dma_en" }
    - { name: TPM,       offset: 0x40, access: RW, reset: 0,  description: "t_high, t_low" }
    - { name: TSP,       offset: 0x44, access: RW, reset: 0,  description: "t_sp glitch period" }

memory:
  instances:
    - { name: tx_rx_fifo, type: ram_1r1w, depth: FIFO_DEPTH, width: DATA_WIDTH,
        description: "Bidirectional byte FIFO" }

interrupts:
  outputs:
    - { name: i2c_int, count: 1, source: int_st any-bit-set & int_en }

fsm:
  iic_phase:
    states: [IDLE, START, ADDR, DAT, STOP, ARBLOST]
    initial: IDLE
    transitions:
      - { from: IDLE, to: START, condition: "cmd.start" }
      - { from: START, to: ADDR, condition: "scl falls after start_cond" }
      - { from: ADDR, to: DAT,   condition: "address byte completes && ack received" }
      - { from: ADDR, to: STOP,  condition: "address byte completes && nack" }
      - { from: DAT,  to: DAT,   condition: "more bytes && datacnt > 0" }
      - { from: DAT,  to: STOP,  condition: "datacnt == 0 || cmd.stop" }
      - { from: STOP, to: IDLE,  condition: "stop_cond observed" }
      - { from: any,  to: ARBLOST, condition: "arbitration lost" }
      - { from: ARBLOST, to: IDLE, condition: "bus released" }

error_handling:
  error_sources:
    - { name: ack_neg,        source: "no ACK from addressed slave",          effect: "int_st.ack_neg=1; phase->STOP" }
    - { name: arb_lose,       source: "another master wins bus",              effect: "arb_lost=1; int_st.arblose=1; phase->ARBLOST" }
    - { name: fifo_overrun,   source: "slave_recv when fifo full",            effect: "NACK reply; int_st.fifo_full=1" }
    - { name: dma_timeout,    source: "dma_req held without dma_ack",         effect: "stall; int_st.dma_to=1" }
    - { name: glitch_inject,  source: "spurious sda/scl edges",               effect: "absorbed by gsf; no functional impact" }
  propagation: "error_status surfaces in INT_ST; software clears via W1C"

debug_observability:
  waveform_must_probe:
    - pclk
    - presetn
    - paddr; pwdata; prdata; psel; penable; pwrite
    - scl_i; sda_i; scl_o; sda_o
    - dma_req; dma_ack
    - i2c_int
    - phase
    - datacnt
    - fifo_count

security:
  assets: []
  threats: []

test_requirements:
  scenarios:
    - { id: SC_RESET,        name: "reset behavior",    stimulus: "deassert presetn", expected: "phase=IDLE; fifo_count=0; ints=0", checker: "scoreboard against FunctionalModel" }
    - { id: SC_APB_RW,       name: "APB read/write",    stimulus: "write CFG then read", expected: "readback equals written", checker: "register monitor" }
    - { id: SC_MASTER_TX,    name: "master 1-byte send", stimulus: "DMA empty CFG=master, fill DATA, set CMD=start+write, observe SDA",
        expected: "9 SCL pulses; ACK after byte", checker: "I2C monitor + FunctionalModel" }
    - { id: SC_MASTER_RX,    name: "master 1-byte recv", stimulus: "CFG=master, set CMD=start+read", expected: "byte appears in DATA; cmpl_trig", checker: "I2C monitor" }
    - { id: SC_SLAVE_RX,     name: "slave addr-match recv", stimulus: "external master addresses ADDR, sends byte", expected: "byterecv_trig; FIFO has byte", checker: "FIFO monitor" }
    - { id: SC_SLAVE_TX,     name: "slave addr-match send", stimulus: "external master addresses ADDR with R, slave drives DATA", expected: "bytetrans_trig", checker: "I2C monitor" }
    - { id: SC_GEN_CALL,     name: "general call",       stimulus: "external addr=0x00 with gen_call enabled", expected: "gencall_trig", checker: "INT_ST" }
    - { id: SC_ARB_LOSE,     name: "arb-lose mid-byte",  stimulus: "two masters drive simultaneously", expected: "arblose_trig; phase=ARBLOST", checker: "FSM trace" }
    - { id: SC_FIFO_FULL,    name: "fifo full backpressure", stimulus: "slave_recv burst with no software drain", expected: "scl stretching observed; eventually NACK", checker: "I2C timing monitor" }
    - { id: SC_DMA_FLOW,     name: "DMA hand-shake",      stimulus: "CFG.dma_en, fifo crosses threshold", expected: "dma_req asserted; dma_ack within window", checker: "DMA monitor" }
    - { id: SC_GLITCH,       name: "glitch suppression",  stimulus: "sda/scl glitches < t_sp", expected: "filtered, no FSM transition", checker: "scope on internal sda/scl" }

  coverage_goals:
    planned_bins:
      - { id: cov_master_modes,       class: planned_functional, description: "master_send + master_recv both exercised" }
      - { id: cov_slave_modes,        class: planned_functional, description: "slave_send + slave_recv both exercised" }
      - { id: cov_arb_lose_in_dat,    class: error,             description: "arblose during DAT phase observed" }
      - { id: cov_fifo_full_block,    class: planned_functional, description: "fifo full causes scl stretching" }
      - { id: cov_gen_call_seen,      class: planned_functional, description: "general call recognized" }
      - { id: cov_dma_req_ack,        class: planned_functional, description: "dma_req/ack handshake exercised" }
      - { id: cov_int_all_sources,    class: error,             description: "every error_source fires int_st once" }

synthesis:
  ppa_targets:
    area_um2_max:        null
    power_mw_max:        null
    frequency_mhz_min:   100
    technology:          "openpdk45"

quality_gates:
  ppa:
    fmax_target_mhz: 100
  coverage:
    fl_bin_hit_min:  100
    cl_bin_hit_min:  90

generation_flow:
  golden_emit_order: ["/ssot-fl-model","/ssot-cycle-model","/ssot-dual-fcov","/ssot-equiv-goals","/ssot-verification-rtl","/ssot-golden-todos","/ssot-protocol-assertions","/ssot-authority","/ssot-loop-map","/ssot-submodule-fl","/ssot-module-harness"]

traceability:
  reference_rtl: "/Users/brian/Desktop/andes/atciic100/hdl"
  reference_modules: [atciic100, atciic100_apbslv, atciic100_ctrl, atciic100_fifo, atciic100_gsf]
  reference_loc: 1409
