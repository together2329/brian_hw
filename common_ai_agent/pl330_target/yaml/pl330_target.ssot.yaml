security:
  assets:
  - Secure APB register space (sprdata/spwdata)
  - Manager non-secure indicator (boot_manager_ns)
  - Per-IRQ non-secure mapping (boot_irq_ns)
  - Per-peripheral non-secure mapping (boot_periph_ns)
  threats:
  - NS-issued instruction targeting Secure peripheral
  - Replay or skipping of DMAFLUSHP between contexts
  - Bus error injection causing FSM exposure
  classification: mixed_secure_non_secure_dma
  privilege_rules:
  - id: SEC_APB_NS_VISIBLE
    subject: apb_ns
    condition: psel && penable
    allow: Non-secure register reads/writes only for architecturally NS-visible status, interrupt, and debug command fields.
    deny: Secure-only debug/control writes and secure-channel state mutation.
    effect_on_deny: Ignore write side effects and set secure_violation when status reporting is enabled.
  - id: SEC_APB_SECURE_FULL
    subject: apb_secure
    condition: spsel && spenable
    allow: Full register map access including secure debug command execution.
    deny: none
    effect_on_deny: none
  - id: SEC_DMAGO
    subject: DMAGO/DMAGO_NS
    condition: debug command launches a channel
    allow: Secure manager may launch secure or non-secure channels; non-secure manager may launch only non-secure channels.
    deny: Launch that would let non-secure context access secure-only peripheral, IRQ, or instruction region.
    effect_on_deny: Do not modify channel_state/channel_pc; set secure_violation and irq_abort.
  - id: SEC_PERIPH
    subject: DMALDP/DMASTP/DMAFLUSHP
    condition: peripheral_id decoded
    allow: Channel security attribute must be compatible with boot_periph_ns[peripheral_id].
    deny: Non-secure channel targeting secure peripheral request.
    effect_on_deny: Suppress drready/daready, set secure_violation, enter FAULTING.
  - id: SEC_IRQ
    subject: DMASEV
    condition: event_id decoded
    allow: Channel security attribute must be compatible with boot_irq_ns[event_id].
    deny: Non-secure channel setting secure event IRQ.
    effect_on_deny: Do not set irq_status[event_id]; set secure_violation.
  - id: SEC_AXI_PROT
    subject: axi_read_master/axi_write_master
    condition: AR/AW issued for instruction/data transfer
    allow: ARPROT/AWPROT security bit reflects channel_ns and boot_manager_ns source context.
    deny: none inside leaf; external firewall owns address acceptance.
    effect_on_deny: AXI error responses are handled by error_handling.
  threat_model:
  - threat: invalid configuration or address
    mitigation: security.privilege_rules plus error_handling declare detection, architectural effect, and recovery.
  - threat: silent data/control corruption
    mitigation: test_requirements scoreboard checks every declared functional transaction and every secure-deny scenario.
  - threat: non-secure debug instruction injection
    mitigation: apb_ns debug writes are filtered by SEC_APB_NS_VISIBLE and DBGCMD cannot mutate secure channel state.
  privilege_model: Leaf IP enforces boot_irq_ns/boot_periph_ns/boot_manager_ns and APB secure-vs-non-secure separation; SoC firewall owns address-range legality.
error_handling:
  error_sources:
  - id: instr_fetch_err
    condition: AXI instruction fetch returns RRESP not OKAY, fetch alignment is invalid, or instruction cache reports fill_resp_error.
    architectural_effect: Current manager/channel enters FAULTING, FSRD/FTRD capture fetch error type, irq_abort pulses.
    observable_evidence:
    - arvalid/arready request classified as instruction fetch
    - rresp != OKAY or fill_resp_error
  - id: data_read_err
    condition: DMALD/DMALDP AXI read returns RRESP not OKAY before final R beat retirement.
    architectural_effect: Channel enters FAULTING, outstanding_reads retires the failing slot, fault_status records DATA_READ_ERR, irq_abort pulses.
    observable_evidence:
    - rvalid && rready && rresp != OKAY
  - id: data_write_err
    condition: DMAST/DMASTP/DMASTZ AXI write returns BRESP not OKAY.
    architectural_effect: Channel enters FAULTING after matching write outstanding slot retires; fault_status records DATA_WRITE_ERR.
    observable_evidence:
    - bvalid && bready && bresp != OKAY
  - id: undef_instr
    condition: Decoded opcode is absent from function_model.instruction_set, operand selector is unsupported, or loop/event/peripheral operand is out of range.
    architectural_effect: Suppress external side effects for that instruction, enter FAULTING, report decode fault in FTRD/FSRC.
    observable_evidence:
    - decoder valid with no matching instruction_set row
  - id: secure_violation
    condition: security.privilege_rules deny a channel launch, peripheral transaction, event interrupt, APB write, or debug command.
    architectural_effect: Denied action has no external side effect; channel/manager enters FAULTING when architecturally visible; irq_abort pulses.
    observable_evidence:
    - denied rule id recorded in sim scoreboard event
  - id: unaligned_access
    condition: SAR/DAR alignment is incompatible with CCR burst size and implementation cannot split/merge the access through merge_buffer.
    architectural_effect: Suppress AXI issue when detected pre-issue; otherwise report DATA_READ_ERR/DATA_WRITE_ERR on failing response.
    observable_evidence:
    - address low bits violate CCR size before AR/AW handshake
  - id: mfifo_overflow
    condition: DMALD/DMALDP attempts to reserve more beats than MFIFO_DEPTH has available.
    architectural_effect: Stall before AR issue; if implementation overflows, enter FAULTING and set fault_status.
    observable_evidence:
    - mfifo_count == MFIFO_DEPTH and load instruction is ready to issue
  - id: decode_fault
    condition: Instruction byte stream ends before required operands or contains unsupported DMALPEND variant/target.
    architectural_effect: Enter FAULTING before issuing AXI/peripheral side effects.
    observable_evidence:
    - decoder operand_valid is false at execute entry
  propagation: "FAULTING channel -> FAULTING_COMPLETING -> STOPPED, irq_abort pulses on entry"
  recovery:
  - action: reset or software clear
    clears:
    - error/status indicators
    preserves:
    - configuration unless reset policy states otherwise
