coding_rules:
  verilog_style: verilog_2001_syntax_in_sv_files
  conventions:
  - RTL files keep .sv extension, but emitted syntax must stay Verilog-2001 compatible.
  - Use module parameters and `include "pl330_target_param.vh"` / `include "pl330_target_ip.vh"` for shared constants.
  - Do not emit package, import, interface, modport, typedef, enum, struct, union, logic, always_ff, always_comb, always_latch, unique, priority, final, or bind constructs.
  - Do not emit function/endfunction or task/endtask; duplicate simple expressions with wires or local combinational logic instead.
  - Do not emit procedural for/while/repeat/forever loops; expand fixed lanes explicitly or generate them in the generator before writing RTL text.
  - Use wire/reg declarations and always @(*) / always @(posedge clk or negedge rst_n) blocks.
  - No inferred latches; every combinational branch assigns all outputs
  - No parameterized part-selects inside procedural blocks; use helper wires/continuous assigns
  - No ad-hoc lint suppressions without SSOT waiver and DUT-only lint evidence
  lint_waivers: []
reuse_modules: []
custom:
  assumptions:
  - Integration-owned address, routing, privilege, and clock/reset policies must be captured explicitly before signoff
  - Repair does not imply IP-kind behavior; rtl-gen must implement only SSOT-owned function_model, cycle_model, and interface contracts
  - Line/branch coverage is required when tool-supported; otherwise a waiver must be explicit in coverage evidence
