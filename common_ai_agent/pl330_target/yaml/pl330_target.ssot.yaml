test_requirements:
  scenarios:
  - id: SC_RESET
    name: reset and boot configuration
    stimulus: Assert and release the declared reset while all external interfaces remain idle.
    expected: Architectural state resets, boot_config is sampled, APB read-only configuration registers reflect parameters.
    checker: Reset checker compares function_model reset outputs, boot_config latches, and CR0 fields.
    coverage:
    - function_model.reset
    - cycle_model.reset
    - registers.register_list.CR0
  - id: SC_DMAGO_DMAMOV
    name: DMAGO launches a channel and DMAMOV programs SAR/DAR/CCR
    stimulus: Use secure APB DBGINST0/1 and DBGCMD to issue DMAGO, then feed DMAMOV SAR, DMAMOV DAR, and DMAMOV CCR instruction bytes.
    expected: Target channel enters EXECUTING, channel_pc starts at operand PC, SAR/DAR/CCR update exactly from immediate operands.
    checker: Python FL model decodes instruction_set rows and compares CSR/CPC/SAR/DAR/CCR observations against RTL.
    coverage:
    - function_model.transactions.FM_DMAGO
    - function_model.transactions.FM_DMAMOV
    - registers.register_list.DBGCMD
  - id: SC_DMALD_DMAST_COPY
    name: memory-to-memory copy through MFIFO
    stimulus: Program SAR/DAR/CCR, execute DMALD followed by DMAST with AXI read/write backpressure permutations.
    expected: AR/R pushes data into mfifo, AW/W/B drains matching data, SAR/DAR/outstanding counters update under cycle_model ordering.
    checker: AXI monitor plus FL-vs-RTL scoreboard checks data, ID, address, burst, and outstanding slot retirement.
    coverage:
    - function_model.transactions.FM_DMALD
    - function_model.transactions.FM_DMAST
    - cycle_model.handshake_rules.CM_AXI_AR
    - cycle_model.handshake_rules.CM_AXI_AW
  - id: SC_DMASTZ
    name: zero-fill store
    stimulus: Execute DMASTZ with several CCR burst sizes while mfifo is empty.
    expected: AXI WDATA is zero for every accepted beat, mfifo_count is unchanged, DAR advances according to CCR dst_inc.
    checker: AXI write monitor checks WDATA, WSTRB, WLAST, BRESP, and DAR update.
    coverage:
    - function_model.transactions.FM_DMASTZ
    - memory.merge_buffer
  - id: SC_LOOP
    name: DMALP and DMALPEND branch loop
    stimulus: Execute nested DMALP_0/DMALP_1 loops around DMALD/DMAST instructions with finite loop counts.
    expected: loop_counter0/1 decrement, PC branches by backward_offset until zero, data movement count equals loop iteration count.
    checker: FL instruction interpreter compares retired PC sequence and loop counter state against RTL traces.
    coverage:
    - function_model.transactions.FM_DMALP
    - function_model.transactions.FM_DMALPEND
  - id: SC_EVENT
    name: DMAWFE and DMASEV event flow
    stimulus: Channel A executes DMAWFE for event n while channel B executes DMASEV for the same event, then INTCLR clears it.
    expected: Channel A stalls in WAITING_FOR_EVENT, resumes after event_latch[n] is set, irq[n] follows INTEN and INTCLR.
    checker: Event scoreboard checks event_latch, irq_status, INTMIS, channel_state, and invalidate_flag behavior.
    coverage:
    - function_model.transactions.FM_DMAWFE
    - function_model.transactions.FM_DMASEV
    - registers.register_list.INTCLR
  - id: SC_PERIPH
    name: peripheral request load/store and flush
    stimulus: Execute DMALDP_S, DMASTP_S, DMALDP_B, DMASTP_B, and DMAFLUSHP against enabled peripheral request lanes.
    expected: drready/daready pulse only on selected lanes, pending masks clear on DMAFLUSHP, AXI traffic follows peripheral acceptance.
    checker: Peripheral monitor checks vector lane, type, last, pending/active masks, and AXI side effects.
    coverage:
    - function_model.transactions.FM_DMALDP
    - function_model.transactions.FM_DMASTP
    - function_model.transactions.FM_DMAFLUSHP
  - id: SC_BARRIER
    name: read and write memory barriers
    stimulus: Issue outstanding reads/writes, then execute DMARMB and DMAWMB before later transfer instructions.
    expected: Later AR/AW issue is blocked until matching outstanding counter reaches zero.
    checker: AXI temporal checker verifies no post-barrier request is accepted before the required drain point.
    coverage:
    - function_model.transactions.FM_DMARMB
    - function_model.transactions.FM_DMAWMB
  - id: SC_AXI_ERROR
    name: AXI error response faults
    stimulus: Return SLVERR/DECERR on instruction fetch, data read, and data write responses.
    expected: instr_fetch_err, data_read_err, or data_write_err is reported, channel enters FAULTING then FAULTING_COMPLETING, irq_abort pulses.
    checker: Negative scoreboard correlates request class, RRESP/BRESP, fault_status, FSRD/FSRC/FTRD, and irq_abort.
    coverage:
    - error_handling.instr_fetch_err
    - error_handling.data_read_err
    - error_handling.data_write_err
  - id: SC_SECURITY
    name: secure and non-secure denial
    stimulus: Attempt non-secure DMAGO_NS/peripheral/event/debug actions against secure boot_periph_ns, boot_irq_ns, and APB-secure-owned fields.
    expected: Denied action has no external side effect, secure_violation is reported, secure state is not modified.
    checker: Security scoreboard validates each security.privilege_rules row and verifies denied side effects are absent.
    coverage:
    - security.privilege_rules
    - error_handling.secure_violation
  - id: SC_DEBUG_KILL
    name: debug DMAKILL drains and stops a channel
    stimulus: Launch a channel with outstanding AXI operations, then issue DBGCMD DMAKILL.
    expected: Channel enters KILLING, suppresses new issue, drains accepted responses, and reaches STOPPED without corrupting unrelated channels.
    checker: Debug checker tracks DBGCMD, channel_state, outstanding counters, and final CSR/CPC state.
    coverage:
    - function_model.transactions.FM_DMAKILL
    - registers.register_list.DBGSTATUS
  - id: SC_DECODE_NEGATIVE
    name: undefined opcode and malformed operand faults
    stimulus: Feed an opcode absent from instruction_set and malformed operand streams for loop/event/peripheral instructions.
    expected: No AXI/peripheral side effect occurs, undef_instr/decode_fault is reported, channel enters FAULTING.
    checker: Decoder negative checker proves side-effect suppression and exact fault classification.
    coverage:
    - error_handling.undef_instr
    - error_handling.decode_fault
  - id: SC_MARKDOWN_TRACE
    name: SSOT-to-output trace evidence
    stimulus: Run the cocotb/pyuvm scenario set and export scoreboard_events.jsonl plus traceability map.
    expected: Every function_model transaction, cycle_model handshake, security rule, and error source has at least one passing evidence row.
    checker: Coverage closure script checks traceability.yaml_to_output and coverage_goals planned bins.
    coverage:
    - traceability
    - quality_gates.dv
  coverage_goals:
    planned_bins:
    - id: cov_all_channels
      class: scenario
      description: every channel exercised at least once
    - id: cov_dmaldp_seen
      class: transaction_type
      description: DMALDP fired at least once
    - id: cov_burst_64beat
      class: transaction_type
      description: AXI burst of 64 beats observed
    - id: cov_fault_recovery
      class: error
      description: FAULTING_COMPLETING reached
    - id: cov_axi_outstanding_max
      class: planned_functional
      description: 16 outstanding reads simultaneously
    - id: cov_apb_secure_block
      class: planned_functional
      description: NS access to secure register correctly blocked
    - id: cov_instruction_rows
      class: instruction_set
      description: every function_model.instruction_set row with a locked opcode executed or explicitly waived
    - id: cov_event_wait_resume
      class: scenario
      description: DMAWFE wait and DMASEV resume observed for at least two event IDs
    - id: cov_barrier_drain
      class: ordering
      description: DMARMB and DMAWMB both block younger issue until outstanding drain
    - id: cov_secure_deny_no_side_effect
      class: security
      description: each security.privilege_rules deny path proves no external side effect
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
  scoreboard_checks: 14
quality_gates:
  ssot:
    pass: check_ssot_disk.sh exits 0 and ATLAS SSOT progress is fully approved
    evidence:
    - check_ssot_disk.sh PASS
    - ATLAS /api/progress ssot all sections approved
  rtl:
    pass: All expected RTL files exist, are production-ready, compile, and lint within warning budget
    evidence:
    - list/<ip>.f
    - compile log
    - lint log
  rtl_gen:
    profile: production
    pass: rtl-gen execution_policy.pass_allowed is true, every required SSOT-derived RTL TODO is closed, and provenance proves common_ai_agent
      rtl-gen authored the RTL without fixed-template fallback behavior
    evidence:
    - rtl/rtl_authoring_plan.json
    - logs/rtl-gen/rtl_todo_plan.json
    - rtl/provenance.json
    - rtl_compile.json
    - lint/dut_lint.json
  dv:
    pass: Every SSOT test_requirements scenario has an executable checker and FL-vs-RTL equivalence goal
    evidence:
    - verify/equivalence_goals.json
    - sim/scoreboard_events.jsonl
    - tb/cocotb tests
    - scenario implementation map
  coverage:
    pass: Functional coverage passes and any explicitly requested structural metrics have matching evidence or approved waivers
    evidence:
    - coverage report
    - coverage waiver list if any
    fl_bin_hit_min: 100
    cl_bin_hit_min: 90
  eda:
    pass: Synthesis/STA/DFT expectations have reports or approved waivers
    evidence:
    - syn/sta/dft reports
  signoff:
    pass: SSOT, FL/equivalence, RTL, lint, DV, sim, coverage, and EDA gates pass with fresh artifacts
    evidence:
    - ATLAS progress signoff PASS
  ppa:
    fmax_target_mhz: 200
    area_target_um2: null
    power_target_mw: null
  dft:
    scan_coverage_min: 95
