top_module:
  name: pl330_target
  file: rtl/pl330_target.sv
  type: peripheral
  description: PL330-style AXI DMA controller target generated from approved ATLAS Web SSOT requirements
  version: '1.0'
  reference_spec: ARM PL330 DMA-330 local reference package plus project SSOT deltas
  target:
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
sub_modules:
- name: pl330_target_engine
  file: rtl/pl330_target_engine.sv
  ownership: manifest
  implements:
  - function_model.instruction_set
  - function_model.transactions.FM_DMAGO
  - function_model.transactions.FM_DMAMOV
  - function_model.transactions.FM_DMALP
  - function_model.transactions.FM_DMALPEND
  - function_model.transactions.FM_DMAWFE
  - function_model.transactions.FM_DMASEV
  - function_model.transactions.FM_DMAADDH
  - function_model.transactions.FM_DMAEND
  - function_model.transactions.FM_DMAKILL
  - fsm.engine
  - cycle_model.pipeline
- name: pl330_target_pipeline
  file: rtl/pl330_target_pipeline.sv
  ownership: manifest
  implements:
  - cycle_model.pipeline
  - cycle_model.handshake_rules.engine_pipeline
  cycle_model_refs:
  - cycle_model
  source_sections:
  - cycle_model
- name: pl330_target_lsq
  file: rtl/pl330_target_lsq.sv
  ownership: manifest
  implements:
  - function_model.transactions.FM_DMALD
  - function_model.transactions.FM_DMAST
  - function_model.transactions.FM_DMASTZ
  - function_model.transactions.FM_DMARMB
  - function_model.transactions.FM_DMAWMB
  - cycle_model.ordering.lsq_order
- name: pl330_target_mfifo
  file: rtl/pl330_target_mfifo.sv
  ownership: manifest
  implements:
  - function_model.state_variables.mfifo
  - function_model.invariants
  - cycle_model.backpressure.mfifo_full
  function_model_refs:
  - function_model.transactions.FM_RESET
  - function_model.transactions.FM_DMAGO
  - function_model.transactions.FM_DMALD
  - function_model.transactions.FM_DMAST
  - function_model.transactions.FM_DMALDP
  - function_model.transactions.FM_DMASTP
  - function_model.transactions.FM_DMASEV
  - function_model.transactions.FM_DMAEND
  - function_model.transactions.FM_FAULT
  - function_model.state_variables
  feature_refs:
  - features
  source_sections:
  - features
  - dataflow
  - fsm
  - test_requirements
  - registers
  dataflow_refs:
  - dataflow
  fsm_refs:
  - fsm
  test_refs:
  - test_requirements
  register_refs:
  - registers.register_list
- name: pl330_target_merge_buffer
  file: rtl/pl330_target_merge_buffer.sv
  ownership: manifest
  implements:
  - function_model.transactions.merge
  - cycle_model.handshake_rules.merge
- name: pl330_target_icache
  file: rtl/pl330_target_icache.sv
  ownership: manifest
  implements:
  - cycle_model.handshake_rules.icache_fill
- name: pl330_target_axi
  file: rtl/pl330_target_axi.sv
  ownership: manifest
  implements:
  - cycle_model.handshake_rules.axi_aw
  - .axi_w
  - .axi_b
  - .axi_ar
  - .axi_r
  - cycle_model.ordering.axi_outstanding
- name: pl330_target_periph
  file: rtl/pl330_target_periph.sv
  ownership: manifest
  implements:
  - function_model.transactions.FM_DMALDP
  - function_model.transactions.FM_DMASTP
  - function_model.transactions.FM_DMAFLUSHP
  - cycle_model.handshake_rules.periph_dr_da
- name: pl330_target_apb_regs
  file: rtl/pl330_target_apb_regs.sv
  ownership: manifest
  implements:
  - registers.register_list
  - cycle_model.handshake_rules.apb
  - security.privilege_rules
- name: pl330_target
  file: rtl/pl330_target.sv
  ownership: manifest
  ssot_gen: true
  description: Top-level integration module matching SSOT top_module
decomposition:
  strategy: production_multi_module
  top_owner: pl330_target
  module_contracts:
  - module: pl330_target_engine
    owns:
    - instruction fetch/decode/execute sequencing
    - channel FSM transitions
    - DMAGO/DMAMOV/DMALP/DMALPEND/DMAWFE/DMASEV/DMAADDH/DMAEND/DMAKILL transactions
    inputs:
    - APB debug command stream
    - icache response
    - LSQ/peripheral completion responses
    outputs:
    - fetch request
    - load/store request
    - event/IRQ updates
    - fault requests
  - module: pl330_target_lsq
    owns:
    - DMALD/DMALDP read issue
    - DMAST/DMASTP/DMASTZ write issue
    - DMARMB/DMAWMB ordering barriers
    inputs:
    - engine load/store requests
    - mfifo status/data
    - AXI response status
    outputs:
    - AXI read/write request packets
    - mfifo push/pop controls
    - data_read_err/data_write_err
  - module: pl330_target_mfifo
    owns:
    - manager FIFO storage
    - mfifo_count/full/empty observability
    inputs:
    - AXI read data push
    - store data pop
    outputs:
    - store payload
    - full/empty/backpressure
  - module: pl330_target_merge_buffer
    owns:
    - byte-lane merge and unaligned write support
    - write strobe generation
    inputs:
    - LSQ store payload
    outputs:
    - AXI WDATA/WSTRB/WLAST payload
  - module: pl330_target_icache
    owns:
    - instruction cache lookup/fill/invalidate
    - instruction fetch fault forwarding
    inputs:
    - engine fetch request
    - AXI read fill response
    outputs:
    - instruction bundle
    - fill request
  - module: pl330_target_axi
    owns:
    - external AXI read/write channel protocol
    - outstanding read/write response matching
    inputs:
    - LSQ/cache request packets
    - external AXI responses
    outputs:
    - external AXI AR/AW/W/B/R signals
    - response/fault packets
  - module: pl330_target_periph
    owns:
    - peripheral request/acknowledge lane selection
    - pending/active masks
    inputs:
    - drvalid/drlast/drtype
    - davalid/datype
    - engine peripheral transaction request
    outputs:
    - drready/daready
    - engine peripheral accepted/completed events
  - module: pl330_target_apb_regs
    owns:
    - APB register decode/read/write side effects
    - debug command capture
    - security-visible APB filtering
    inputs:
    - apb_ns/apb_secure buses
    - status/fault/interrupt state
    outputs:
    - DBGCMD/DBGINST command packets
    - INTEN/INTCLR side effects
    - APB read data and ready
  integration_rule: pl330_target top wires only declared integration.connections unless a waiver is recorded in quality_gates.rtl_gen evidence.
parameters:
- name: NUM_CHANNELS
  default: 8
  description: DMA channel count
- name: NUM_PERIPH_REQS
  default: 32
  description: Peripheral request interfaces
- name: NUM_IRQS
  default: 32
  description: IRQ output count
- name: AXI_DATA_WIDTH
  default: 64
  description: AXI data bus width
- name: AXI_STRB_WIDTH
  default: AXI_DATA_WIDTH/8
  description: AXI byte strobe width derived from AXI data width
- name: AXI_ID_WIDTH
  default: 4
  description: AXI ID width
- name: AXI_ADDR_WIDTH
  default: 32
  description: AXI address width
- name: APB_DATA_WIDTH
  default: 32
  description: APB data width
- name: APB_ADDR_WIDTH
  default: 12
  description: APB address width
- name: ICACHE_LINE_SIZE
  default: 4
  description: Instruction cache line size in beats
- name: MFIFO_DEPTH
  default: 16
  description: Manager FIFO depth
- name: MERGE_BUFFER_DEPTH
  default: 4
  description: Merge buffer depth
- name: SUPPORT_TZ
  default: 1
  description: TrustZone (NS/S) support
- name: CHANNEL_ID_WIDTH
  default: 3
  description: Encodes NUM_CHANNELS=8 channel IDs
- name: PERIPH_ID_WIDTH
  default: 5
  description: Encodes NUM_PERIPH_REQS=32 peripheral IDs
io_list:
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock
    ports:
    - name: clk
      width: 1
      direction: input
      description: Primary clock
  resets:
  - name: rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset, asynchronous assert and synchronous release
    ports:
    - name: rst_n
      width: 1
      direction: input
      description: Primary reset
  interfaces:
  - name: boot_config
    type: static_boot
    role: input
    description: Reset-sampled PL330 boot configuration and security defaults.
    ports:
    - name: boot_from_pc
      width: 1
      direction: input
      description: Start manager thread from boot_addr after reset when asserted.
    - name: boot_addr
      width: AXI_ADDR_WIDTH
      direction: input
      description: Initial manager PC / instruction fetch address.
    - name: boot_manager_ns
      width: 1
      direction: input
      description: Manager thread non-secure attribute.
    - name: boot_irq_ns
      width: NUM_IRQS
      direction: input
      description: Per-event non-secure mapping sampled for IRQ security checks.
    - name: boot_periph_ns
      width: NUM_PERIPH_REQS
      direction: input
      description: Per-peripheral non-secure mapping sampled for peripheral request security checks.
  - name: peripheral_request
    type: pl330_dr_da
    role: target
    description: PL330 peripheral request and acknowledge interface, vectorized across NUM_PERIPH_REQS.
    ports:
    - name: drvalid
      width: NUM_PERIPH_REQS
      direction: input
      description: Peripheral request valid, one bit per peripheral.
    - name: drready
      width: NUM_PERIPH_REQS
      direction: output
      description: DMA accepted the matching drvalid request.
    - name: drtype
      width: NUM_PERIPH_REQS*2
      direction: input
      description: Two-bit request type for each peripheral request.
    - name: drlast
      width: NUM_PERIPH_REQS
      direction: input
      description: Last request marker from the peripheral.
    - name: davalid
      width: NUM_PERIPH_REQS
      direction: input
      description: Peripheral acknowledge valid.
    - name: daready
      width: NUM_PERIPH_REQS
      direction: output
      description: DMA accepted the matching davalid acknowledge.
    - name: datype
      width: NUM_PERIPH_REQS*2
      direction: input
      description: Two-bit acknowledge type for each peripheral.
  - name: irq_outputs
    type: interrupt
    role: source
    description: PL330 event and abort interrupt outputs.
    ports:
    - name: irq
      width: NUM_IRQS
      direction: output
      description: Event IRQ vector driven from irq_status masked by INTEN.
    - name: irq_abort
      width: 1
      direction: output
      description: Abort/fault interrupt pulse on FAULTING entry.
  - name: axi_write_master
    type: AXI3
    role: master
    description: AXI write address/data/response master channel used by DMAST, DMASTP, DMASTZ, and merge-buffer drains.
    ports:
    - name: awid
      width: AXI_ID_WIDTH
      direction: output
    - name: awaddr
      width: AXI_ADDR_WIDTH
      direction: output
    - name: awlen
      width: 4
      direction: output
    - name: awsize
      width: 3
      direction: output
    - name: awburst
      width: 2
      direction: output
    - name: awlock
      width: 2
      direction: output
    - name: awcache
      width: 4
      direction: output
    - name: awprot
      width: 3
      direction: output
    - name: awvalid
      width: 1
      direction: output
    - name: awready
      width: 1
      direction: input
    - name: wid
      width: AXI_ID_WIDTH
      direction: output
    - name: wdata
      width: AXI_DATA_WIDTH
      direction: output
    - name: wstrb
      width: AXI_DATA_WIDTH/8
      direction: output
    - name: wlast
      width: 1
      direction: output
    - name: wvalid
      width: 1
      direction: output
    - name: wready
      width: 1
      direction: input
    - name: bid
      width: AXI_ID_WIDTH
      direction: input
    - name: bresp
      width: 2
      direction: input
    - name: bvalid
      width: 1
      direction: input
    - name: bready
      width: 1
      direction: output
  - name: axi_read_master
    type: AXI3
    role: master
    description: AXI read address/data master channel used by instruction fetch, DMALD, DMALDP, and cache fill.
    ports:
    - name: arid
      width: AXI_ID_WIDTH
      direction: output
    - name: araddr
      width: AXI_ADDR_WIDTH
      direction: output
    - name: arlen
      width: 4
      direction: output
    - name: arsize
      width: 3
      direction: output
    - name: arburst
      width: 2
      direction: output
    - name: arlock
      width: 2
      direction: output
    - name: arcache
      width: 4
      direction: output
    - name: arprot
      width: 3
      direction: output
    - name: arvalid
      width: 1
      direction: output
    - name: arready
      width: 1
      direction: input
    - name: rid
      width: AXI_ID_WIDTH
      direction: input
    - name: rdata
      width: AXI_DATA_WIDTH
      direction: input
    - name: rresp
      width: 2
      direction: input
    - name: rlast
      width: 1
      direction: input
    - name: rvalid
      width: 1
      direction: input
    - name: rready
      width: 1
      direction: output
  - name: apb_ns
    type: APB3
    role: target
    description: Non-secure APB register target.
    ports:
    - name: pclken
      width: 1
      direction: input
    - name: paddr
      width: 32
      direction: input
    - name: psel
      width: 1
      direction: input
    - name: penable
      width: 1
      direction: input
    - name: pwrite
      width: 1
      direction: input
    - name: pwdata
      width: 32
      direction: input
    - name: prdata
      width: 32
      direction: output
    - name: pready
      width: 1
      direction: output
  - name: apb_secure
    type: APB3
    role: target
    description: Secure APB register target with separate address, write data, and read data buses.
    ports:
    - name: spaddr
      width: 32
      direction: input
    - name: spsel
      width: 1
      direction: input
    - name: spenable
      width: 1
      direction: input
    - name: spwrite
      width: 1
      direction: input
    - name: spwdata
      width: 32
      direction: input
    - name: sprdata
      width: 32
      direction: output
    - name: spready
      width: 1
      direction: output
features:
- 'Instruction-driven DMA engine: DMAGO/DMALD/DMAST/DMALDP/DMASTP/DMAMOV/DMASTZ/DMALP/DMALPEND/DMAFLUSHP/DMASEV/DMAWFE/DMAADDH/DMARMB/DMAWMB/DMAEND'
- Per-channel scheduler with priority + round-robin
- Multi-outstanding AXI3 read/write
- TrustZone NS/S separation on APB
- Configurable peripheral request interface count
- Manager FIFO buffering
- Merge buffer for byte-lane / unaligned write
- Debug command execution path with DMAKILL drain behavior
- Event/IRQ wakeup model tied to INTEN, INTCLR, boot_irq_ns, and event_latch
dataflow:
  paths:
  - name: dma_read
    source: axi_master.r
    sink: mfifo
    via:
    - pl330_target_axi
    - pl330_target_lsq
  - name: dma_write
    source: mfifo
    sink: axi_master.w
    via:
    - pl330_target_lsq
    - pl330_target_merge_buffer
    - pl330_target_axi
  - name: cmd_fetch
    source: axi_master.r
    sink: engine
    via:
    - pl330_target_icache
    - pl330_target_engine
  - name: csr_write
    source: apb_ns.pwdata
    sink: pl330_target_apb_regs.config
    via:
    - pl330_target_apb_regs
  - name: periph_load
    source: peripheral_request.drvalid
    sink: mfifo
    via:
    - pl330_target_periph
    - pl330_target_lsq
    - pl330_target_axi
  - name: periph_store
    source: mfifo
    sink: peripheral_request.daready
    via:
    - pl330_target_lsq
    - pl330_target_axi
    - pl330_target_periph
  - name: event_irq
    source: function_model.event_latch
    sink: irq_outputs.irq
    via:
    - pl330_target_engine
    - pl330_target_apb_regs
function_model:
  state_variables:
  - name: channel_state
    width: 4
    reset: 0
    description: Per-channel FSM state (0=stopped, 1=executing, 2=cache_miss, 3=updating_pc, 4=waiting_for_event, 5=at_barrier, 6=killing, 7=completing,
      8=faulting, 9=faulting_completing)
  - name: channel_pc
    width: 32
    reset: 0
  - name: outstanding_reads
    width: 4
    reset: 0
  - name: outstanding_writes
    width: 4
    reset: 0
  - name: mfifo_count
    width: 5
    reset: 0
  - name: irq_status
    width: 32
    reset: 0
  - name: fault_status
    width: 32
    reset: 0
  - name: channel_sar
    width: 32
    reset: 0
    description: Per-channel source address register used by DMAMOV, DMAADDH, DMALD, and DMALDP.
  - name: channel_dar
    width: 32
    reset: 0
    description: Per-channel destination address register used by DMAMOV, DMAADDH, DMAST, DMASTP, and DMASTZ.
  - name: channel_ccr
    width: 32
    reset: 0
    description: Per-channel control register carrying burst size, burst length, cache, prot, endian, increment, and peripheral flow attributes.
  - name: loop_counter0
    width: 8
    reset: 0
    description: DMALP loop counter 0.
  - name: loop_counter1
    width: 8
    reset: 0
    description: DMALP loop counter 1.
  - name: event_latch
    width: NUM_IRQS
    reset: 0
    description: Sticky event state consumed by DMAWFE and reported through INT_EVENT_RIS.
  - name: channel_ns
    width: NUM_CHANNELS
    reset: 0
    description: Per-channel non-secure attribute latched at DMAGO.
  instruction_set:
  - mnemonic: DMAEND
    opcode: 0x00
    bytes: 1
    operands: []
    transaction_ref: FM_DMAEND
    owner_module: pl330_target_engine
    state_updates:
    - channel_state -> COMPLETING when outstanding_reads==0 and outstanding_writes==0
    interface_effects: []
    error_cases:
    - outstanding_write_or_read_present delays STOPPED until drain completes
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALD
    opcode: 0x04
    bytes: 1
    operands:
    - ccr-derived burst attributes
    transaction_ref: FM_DMALD
    owner_module: pl330_target_lsq
    state_updates:
    - channel_sar increments when CCR src_inc is set
    - outstanding_reads increments on AR accept and decrements on final R beat
    interface_effects:
    - axi_read_master.AR issued
    - read data pushed into mfifo
    error_cases:
    - AXI RRESP not OKAY sets data_read_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALDS
    opcode: 0x05
    bytes: 1
    operands:
    - single request qualifier
    transaction_ref: FM_DMALD
    owner_module: pl330_target_lsq
    state_updates:
    - same as DMALD with single-request qualifier
    interface_effects:
    - axi_read_master.AR issued
    error_cases:
    - AXI RRESP not OKAY sets data_read_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALDB
    opcode: 0x07
    bytes: 1
    operands:
    - burst request qualifier
    transaction_ref: FM_DMALD
    owner_module: pl330_target_lsq
    state_updates:
    - same as DMALD with burst-request qualifier
    interface_effects:
    - axi_read_master.AR issued
    error_cases:
    - AXI RRESP not OKAY sets data_read_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAST
    opcode: 0x08
    bytes: 1
    operands:
    - ccr-derived burst attributes
    transaction_ref: FM_DMAST
    owner_module: pl330_target_lsq
    state_updates:
    - channel_dar increments when CCR dst_inc is set
    - outstanding_writes increments on AW accept and decrements on B response
    interface_effects:
    - mfifo data consumed
    - axi_write_master.AW/W issued
    error_cases:
    - AXI BRESP not OKAY sets data_write_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMASTS
    opcode: 0x09
    bytes: 1
    operands:
    - single request qualifier
    transaction_ref: FM_DMAST
    owner_module: pl330_target_lsq
    state_updates:
    - same as DMAST with single-request qualifier
    interface_effects:
    - axi_write_master.AW/W issued
    error_cases:
    - AXI BRESP not OKAY sets data_write_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMASTB
    opcode: 0x0B
    bytes: 1
    operands:
    - burst request qualifier
    transaction_ref: FM_DMAST
    owner_module: pl330_target_lsq
    state_updates:
    - same as DMAST with burst-request qualifier
    interface_effects:
    - axi_write_master.AW/W issued
    error_cases:
    - AXI BRESP not OKAY sets data_write_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMASTZ
    opcode: 0x0C
    bytes: 1
    operands:
    - ccr-derived burst attributes
    transaction_ref: FM_DMASTZ
    owner_module: pl330_target_lsq
    state_updates:
    - channel_dar increments when CCR dst_inc is set
    - outstanding_writes follows AW/B lifetime
    interface_effects:
    - zero data beats written without consuming mfifo
    error_cases:
    - AXI BRESP not OKAY sets data_write_err
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALP_0
    opcode: 0x20
    bytes: 2
    operands:
    - loop_count
    transaction_ref: FM_DMALP
    owner_module: pl330_target_engine
    state_updates:
    - loop_counter0 loads loop_count
    interface_effects: []
    error_cases:
    - illegal loop nesting sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALP_1
    opcode: 0x22
    bytes: 2
    operands:
    - loop_count
    transaction_ref: FM_DMALP
    owner_module: pl330_target_engine
    state_updates:
    - loop_counter1 loads loop_count
    interface_effects: []
    error_cases:
    - illegal loop nesting sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALDP_S
    opcode: 0x25
    bytes: 2
    operands:
    - peripheral_id
    transaction_ref: FM_DMALDP
    owner_module: pl330_target_periph
    state_updates:
    - peripheral request accepted before AXI read issue
    interface_effects:
    - drready pulse on selected peripheral
    - axi_read_master.AR issued
    error_cases:
    - disabled peripheral sets secure_violation or undef_instr per security policy
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALDP_B
    opcode: 0x27
    bytes: 2
    operands:
    - peripheral_id
    transaction_ref: FM_DMALDP
    owner_module: pl330_target_periph
    state_updates:
    - same as DMALDP_S with burst request qualifier
    interface_effects:
    - drready pulse on selected peripheral
    - axi_read_master.AR issued
    error_cases:
    - disabled peripheral sets secure_violation or undef_instr per security policy
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMASTP_S
    opcode: 0x29
    bytes: 2
    operands:
    - peripheral_id
    transaction_ref: FM_DMASTP
    owner_module: pl330_target_periph
    state_updates:
    - peripheral acknowledge accepted before AXI write issue
    interface_effects:
    - daready pulse on selected peripheral
    - axi_write_master.AW/W issued
    error_cases:
    - disabled peripheral sets secure_violation or undef_instr per security policy
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMASTP_B
    opcode: 0x2B
    bytes: 2
    operands:
    - peripheral_id
    transaction_ref: FM_DMASTP
    owner_module: pl330_target_periph
    state_updates:
    - same as DMASTP_S with burst request qualifier
    interface_effects:
    - daready pulse on selected peripheral
    - axi_write_master.AW/W issued
    error_cases:
    - disabled peripheral sets secure_violation or undef_instr per security policy
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMALPEND
    opcode: 0x2C
    bytes: 2
    operands:
    - loop_index
    - backward_offset
    transaction_ref: FM_DMALPEND
    owner_module: pl330_target_engine
    state_updates:
    - selected loop counter decrements until zero
    - channel_pc branches by backward_offset when loop counter remains nonzero
    interface_effects: []
    error_cases:
    - malformed loop target sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMASEV
    opcode: 0x34
    bytes: 2
    operands:
    - event_id
    transaction_ref: FM_DMASEV
    owner_module: pl330_target_engine
    state_updates:
    - event_latch[event_id] set
    - irq_status[event_id] set when INTEN[event_id] is enabled
    interface_effects:
    - irq[event_id] asserts when enabled and allowed by security mapping
    error_cases:
    - event_id >= NUM_IRQS sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAFLUSHP
    opcode: 0x35
    bytes: 2
    operands:
    - peripheral_id
    transaction_ref: FM_DMAFLUSHP
    owner_module: pl330_target_periph
    state_updates:
    - pending peripheral request for peripheral_id clears
    interface_effects:
    - periph pending/active masks update without AXI transfer
    error_cases:
    - peripheral_id >= NUM_PERIPH_REQS sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAWFE
    opcode: 0x36
    bytes: 2
    operands:
    - event_id
    - invalidate_flag
    transaction_ref: FM_DMAWFE
    owner_module: pl330_target_engine
    state_updates:
    - channel_state -> WAITING_FOR_EVENT until event_latch[event_id] is set
    - event_latch[event_id] clears when invalidate_flag is set and event is consumed
    interface_effects: []
    error_cases:
    - event_id >= NUM_IRQS sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAADDH_SAR
    opcode: 0x54
    bytes: 3
    operands:
    - halfword_immediate
    transaction_ref: FM_DMAADDH
    owner_module: pl330_target_engine
    state_updates:
    - channel_sar += halfword_immediate << 16
    interface_effects: []
    error_cases: []
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAADDH_DAR
    opcode: 0x56
    bytes: 3
    operands:
    - halfword_immediate
    transaction_ref: FM_DMAADDH
    owner_module: pl330_target_engine
    state_updates:
    - channel_dar += halfword_immediate << 16
    interface_effects: []
    error_cases: []
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAGO
    opcode: 0xA0
    bytes: 6
    operands:
    - channel_id
    - start_pc
    transaction_ref: FM_DMAGO
    owner_module: pl330_target_engine
    state_updates:
    - channel_state[channel_id] -> EXECUTING
    - channel_pc[channel_id] = start_pc
    - channel_ns[channel_id] = 0
    interface_effects:
    - instruction fetch starts through axi_read_master
    error_cases:
    - target channel not STOPPED sets undef_instr
    - secure violation sets secure_violation
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAGO_NS
    opcode: 0xA2
    bytes: 6
    operands:
    - channel_id
    - start_pc
    transaction_ref: FM_DMAGO
    owner_module: pl330_target_engine
    state_updates:
    - channel_state[channel_id] -> EXECUTING
    - channel_pc[channel_id] = start_pc
    - channel_ns[channel_id] = 1
    interface_effects:
    - instruction fetch starts through axi_read_master with non-secure attribute
    error_cases:
    - target channel not STOPPED sets undef_instr
    - secure violation sets secure_violation
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMAMOV
    opcode: 0xBC
    bytes: 6
    operands:
    - register_selector
    - immediate32
    transaction_ref: FM_DMAMOV
    owner_module: pl330_target_engine
    state_updates:
    - selected SAR/DAR/CCR register gets immediate32
    interface_effects: []
    error_cases:
    - unsupported register_selector sets undef_instr
    reference_status: extracted_from_pl330_wave_alias
  - mnemonic: DMARMB
    opcode: null
    bytes: 1
    operands: []
    transaction_ref: FM_DMARMB
    owner_module: pl330_target_lsq
    state_updates:
    - read pipeline waits until prior reads are architecturally ordered
    interface_effects:
    - no new AR issue until read barrier clears
    error_cases: []
    reference_status: needs_trm_opcode_lock
  - mnemonic: DMAWMB
    opcode: null
    bytes: 1
    operands: []
    transaction_ref: FM_DMAWMB
    owner_module: pl330_target_lsq
    state_updates:
    - write pipeline waits until prior writes are architecturally ordered
    interface_effects:
    - no new AW/W issue until write barrier clears
    error_cases: []
    reference_status: needs_trm_opcode_lock
  transactions:
  - id: FM_RESET
    name: reset
    outputs:
    - all state -> reset values
    side_effects:
    - outstanding_reads=0
    - outstanding_writes=0
    - mfifo_count=0
    - irq_status=0
    error_cases: []
    preconditions:
    - transaction is accepted under cycle_model rules
  - id: FM_DMAGO
    name: dmago_command
    preconditions:
    - channel_state==0
    - manager APB write to DBGINST
    outputs:
    - channel_state=1
    - channel_pc=arg_addr
    side_effects: []
    error_cases:
    - condition: secure violation
      result: fault_status |= INSTR_FETCH_ERR
  - id: FM_DMAMOV
    name: dmamov_program_channel_register
    instruction_ref: function_model.instruction_set.DMAMOV
    preconditions:
    - channel_state==1
    - register_selector in {SAR,DAR,CCR}
    outputs:
    - selected channel_sar/channel_dar/channel_ccr = immediate32
    side_effects:
    - subsequent DMALD/DMAST transactions use updated address/control attributes
    error_cases:
    - condition: unsupported register_selector
      result: fault_status |= UNDEF_INSTR
  - id: FM_DMALD
    name: dmald_load
    preconditions:
    - channel_state==1
    - mfifo has space
    outputs:
    - outstanding_reads += 1
    - mfifo entries reserved
    side_effects:
    - issue AXI AR
    error_cases:
    - condition: AXI rresp != OKAY
      result: fault_status |= DATA_READ_ERR
  - id: FM_DMAST
    name: dmast_store
    preconditions:
    - channel_state==1
    - mfifo has data
    outputs:
    - outstanding_writes += 1
    - mfifo entries consumed
    side_effects:
    - issue AXI AW + W
    error_cases:
    - condition: AXI bresp != OKAY
      result: fault_status |= DATA_WRITE_ERR
  - id: FM_DMALDP
    name: dmaldp_periph_load
    preconditions:
    - channel_state==1
    - periph drvalid asserted
    outputs:
    - outstanding_reads += 1
    side_effects:
    - drready asserted
    - AXI AR issued
    error_cases: []
  - id: FM_DMASTP
    name: dmastp_periph_store
    preconditions:
    - channel_state==1
    - periph davalid acknowledged
    outputs:
    - outstanding_writes += 1
    side_effects:
    - daready asserted
    - AXI AW+W issued
    error_cases: []
  - id: FM_DMASTZ
    name: dmastz_store_zero
    instruction_ref: function_model.instruction_set.DMASTZ
    preconditions:
    - channel_state==1
    - AXI write channel can accept at least one burst
    outputs:
    - outstanding_writes += 1
    - zero write data issued with CCR-derived strobes
    side_effects:
    - issue AXI AW + W with all WDATA bits zero
    - channel_dar advances when CCR dst_inc is set
    error_cases:
    - condition: AXI bresp != OKAY
      result: fault_status |= DATA_WRITE_ERR
  - id: FM_DMALP
    name: dmalp_load_loop_counter
    instruction_ref: function_model.instruction_set.DMALP_0
    preconditions:
    - channel_state==1
    - selected loop counter is not already active for an illegal nesting level
    outputs:
    - loop_counter0 or loop_counter1 loaded from loop_count operand
    side_effects:
    - loop start PC is captured for matching DMALPEND
    error_cases:
    - condition: illegal loop nesting or malformed operand
      result: fault_status |= UNDEF_INSTR
  - id: FM_DMALPEND
    name: dmalpend_branch_or_exit
    instruction_ref: function_model.instruction_set.DMALPEND
    preconditions:
    - channel_state==1
    - selected loop counter has active context
    outputs:
    - loop_counter decrements when nonzero
    - channel_pc branches by backward_offset when decremented counter remains nonzero
    side_effects:
    - loop context clears when counter reaches zero
    error_cases:
    - condition: malformed target or inactive loop counter
      result: fault_status |= UNDEF_INSTR
  - id: FM_DMASEV
    name: dmasev_event_signal
    preconditions:
    - channel_state==1
    - event index < NUM_IRQS
    outputs:
    - irq_status |= 1<<event_idx
    side_effects:
    - irq[event_idx] pulse
    error_cases: []
  - id: FM_DMAWFE
    name: dmawfe_wait_for_event
    instruction_ref: function_model.instruction_set.DMAWFE
    preconditions:
    - channel_state==1
    - event index < NUM_IRQS
    outputs:
    - channel_state=WAITING_FOR_EVENT when event_latch[event_idx]==0
    - channel_state=EXECUTING when event_latch[event_idx]==1
    side_effects:
    - event_latch[event_idx] clears on consume when invalidate_flag is set
    error_cases:
    - condition: event index >= NUM_IRQS
      result: fault_status |= UNDEF_INSTR
  - id: FM_DMAFLUSHP
    name: dmaflushp_flush_peripheral_request
    instruction_ref: function_model.instruction_set.DMAFLUSHP
    preconditions:
    - channel_state==1
    - peripheral_id < NUM_PERIPH_REQS
    outputs:
    - pending peripheral request bit clears
    side_effects:
    - no AXI read or write is issued
    error_cases:
    - condition: peripheral_id >= NUM_PERIPH_REQS
      result: fault_status |= UNDEF_INSTR
  - id: FM_DMAADDH
    name: dmaaddh_add_high_halfword
    instruction_ref: function_model.instruction_set.DMAADDH_SAR
    preconditions:
    - channel_state==1
    - target register is SAR or DAR
    outputs:
    - selected address register += halfword_immediate << 16
    side_effects:
    - subsequent load/store address uses the updated register
    error_cases: []
  - id: FM_DMARMB
    name: dmarmb_read_memory_barrier
    instruction_ref: function_model.instruction_set.DMARMB
    preconditions:
    - channel_state==1
    outputs:
    - channel_state=AT_BARRIER until outstanding_reads==0
    side_effects:
    - no new AXI AR issued while the read barrier is active
    error_cases: []
  - id: FM_DMAWMB
    name: dmawmb_write_memory_barrier
    instruction_ref: function_model.instruction_set.DMAWMB
    preconditions:
    - channel_state==1
    outputs:
    - channel_state=AT_BARRIER until outstanding_writes==0
    side_effects:
    - no new AXI AW/W issued while the write barrier is active
    error_cases: []
  - id: FM_DMAEND
    name: dmaend_terminate
    preconditions:
    - channel_state==1
    - no outstanding
    outputs:
    - channel_state=0
    side_effects: []
    error_cases:
    - condition: outstanding > 0
      result: wait until drained
  - id: FM_DMAKILL
    name: dmakill_debug_abort
    preconditions:
    - DBGCMD requests DMAKILL for a valid channel
    outputs:
    - channel_state=KILLING
    - outstanding issue stops immediately
    side_effects:
    - channel drains accepted AXI transactions before STOPPED
    - fault_status records debug kill completion only when implementation exposes it
    error_cases:
    - condition: invalid channel id
      result: fault_status |= UNDEF_INSTR
  - id: FM_FAULT
    name: fault_propagate
    preconditions:
    - any error_case fired
    outputs:
    - channel_state=8
    - irq_abort pulse
    side_effects:
    - fault_status updated
    error_cases: []
  invariants:
  - outstanding_reads >= 0 && outstanding_reads <= 2*NUM_CHANNELS
  - outstanding_writes >= 0 && outstanding_writes <= 2*NUM_CHANNELS
  - mfifo_count <= MFIFO_DEPTH
  - channel_state != 1 -> outstanding_reads == 0 && outstanding_writes == 0
  - fault triggers irq_abort within 4 cycles
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n assertion returns architectural state to declared reset values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on clk at nominal 100 MHz; max depends on declared backpressure and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - id: CM_APB_NS
    interface: apb_ns
    signal: psel/penable/pready
    rule: APB transfer commits on psel && penable && pready; paddr, pwrite, and pwdata remain stable from setup through access.
    maps_to:
    - registers
    - function_model.transactions.FM_DMAGO
  - id: CM_APB_SECURE
    interface: apb_secure
    signal: spsel/spenable/spready
    rule: Secure APB transfer commits on spsel && spenable && spready; secure space can access all registers that NS APB can access plus secure-only debug/control fields.
    maps_to:
    - registers
    - security.privilege_rules
  - id: CM_AXI_AW
    interface: axi_write_master
    signal: awvalid/awready
    rule: AW payload remains stable until awvalid && awready; accepted AW allocates one write outstanding slot and records ID/address/len/prot.
    maps_to:
    - function_model.transactions.FM_DMAST
    - function_model.transactions.FM_DMASTP
    - function_model.transactions.FM_DMASTZ
  - id: CM_AXI_W
    interface: axi_write_master
    signal: wvalid/wready/wlast
    rule: W payload remains stable until wvalid && wready; wlast must match the final beat of the accepted AW burst.
    maps_to:
    - dataflow.dma_write
    - memory.merge_buffer
  - id: CM_AXI_B
    interface: axi_write_master
    signal: bvalid/bready
    rule: B response is accepted when bvalid && bready; BRESP other than OKAY updates data_write_err and retires the matching write outstanding slot.
    maps_to:
    - error_handling.data_write_err
    - function_model.state_variables.outstanding_writes
  - id: CM_AXI_AR
    interface: axi_read_master
    signal: arvalid/arready
    rule: AR payload remains stable until arvalid && arready; accepted AR allocates one read outstanding slot and records ID/address/len/prot.
    maps_to:
    - function_model.transactions.FM_DMALD
    - function_model.transactions.FM_DMALDP
    - dataflow.cmd_fetch
  - id: CM_AXI_R
    interface: axi_read_master
    signal: rvalid/rready/rlast
    rule: R payload is consumed when rvalid && rready; RRESP other than OKAY updates data_read_err or instr_fetch_err based on request class.
    maps_to:
    - error_handling.data_read_err
    - error_handling.instr_fetch_err
    - memory.mfifo
  - id: CM_PERIPH_DR
    interface: peripheral_request
    signal: drvalid/drready/drtype/drlast
    rule: Selected peripheral request is accepted on drvalid[n] && drready[n]; drtype and drlast for n remain stable until accepted.
    maps_to:
    - function_model.transactions.FM_DMALDP
    - function_model.transactions.FM_DMAFLUSHP
  - id: CM_PERIPH_DA
    interface: peripheral_request
    signal: davalid/daready/datype
    rule: Selected peripheral acknowledge is accepted on davalid[n] && daready[n]; datype for n remains stable until accepted.
    maps_to:
    - function_model.transactions.FM_DMASTP
  pipeline:
  - stage: S0_FETCH
    cycle: 0..N
    action: Fetch instruction bytes through icache or AXI read master, then present a stable opcode bundle to decode.
  - stage: S1_DECODE
    cycle: N..M
    action: Decode instruction_set mnemonic, operands, security attributes, and owning transaction.
  - stage: S2_EXECUTE
    cycle: M..K
    action: Execute one function_model transaction or stall on loop/event/barrier/AXI/peripheral backpressure.
  - stage: S3_RETIRE
    cycle: K..L
    action: Commit PC, register, interrupt, outstanding counter, and fault-status changes after the transaction reaches a legal terminal point.
  ordering:
  - Accepted APB writes update architectural state only on clock edges and cannot partially commit.
  - Instruction retirement is in channel program order except documented wait/barrier states that intentionally stall retirement.
  - AXI read responses can return after later read requests, but each RID must retire into the matching outstanding slot before mfifo visibility.
  - AXI writes retire only after BRESP for the matching BID, and write errors cannot be masked by later successful writes.
  - DMAWFE, DMARMB, and DMAWMB block subsequent instruction retirement until their event or outstanding-drain condition is true.
  - Security faults take precedence over AXI issue for the same instruction.
  backpressure:
  - AXI AW, W, AR, R, and B stalls hold their payload/control state stable and do not modify SAR/DAR until the relevant beat is accepted.
  - mfifo full stalls DMALD/DMALDP issue before AR; mfifo empty stalls DMAST/DMASTP before AW/W.
  - APB pready can deassert for register side effects, but paddr/pwrite/pwdata decode remains stable until completion.
  - Peripheral drready/daready can deassert independently per peripheral; unrelated channels can continue if arbitration permits.
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - Handshake/control state resets to idle
  - Observable outputs reset to function_model reset values
cdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
rdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
registers:
  access_policy:
  - interface: apb_ns
    allowed: non-secure visible registers and debug commands permitted by security.privilege_rules
    denied_effect: read returns zero or safe status for secure-only fields; write is ignored and secure_violation is reported when architecturally visible
  - interface: apb_secure
    allowed: complete register map including secure debug/control/status
    denied_effect: none
  register_list:
  - name: DSR
    offset: 0
    access: RO
    reset: 0
    description: DMA Manager Status Register
    fields:
    - name: manager_state
      bits: 3:0
      reset: 0
      description: Manager FSM state encoded from channel_state manager context.
    - name: manager_fault
      bits: 8
      reset: 0
      description: Set when manager context enters FAULTING.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.transactions.FM_FAULT
  - name: DPC
    offset: 4
    access: RO
    reset: 0
    description: DMA Manager PC
    fields:
    - name: pc
      bits: 31:0
      reset: 0
      description: Current manager program counter.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.state_variables.channel_pc
  - name: INTEN
    offset: 32
    access: RW
    reset: 0
    description: Interrupt Enable
    fields:
    - name: enable
      bits: NUM_IRQS-1:0
      reset: 0
      description: One enable bit per event interrupt.
    read_effects: []
    write_effects:
    - APB write replaces irq enable mask.
    function_refs:
    - function_model.transactions.FM_DMASEV
  - name: INT_EVENT_RIS
    offset: 36
    access: RO
    reset: 0
    description: Event-Interrupt Raw Status
    fields:
    - name: raw_event
      bits: NUM_IRQS-1:0
      reset: 0
      description: Raw event latch before INTEN masking.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.state_variables.event_latch
  - name: INTMIS
    offset: 40
    access: RO
    reset: 0
    description: Interrupt Status (masked)
    fields:
    - name: masked_event
      bits: NUM_IRQS-1:0
      reset: 0
      description: event_latch & INTEN, after security mapping permits visibility.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.transactions.FM_DMASEV
  - name: INTCLR
    offset: 44
    access: WO
    reset: 0
    description: Interrupt Clear
    fields:
    - name: clear_event
      bits: NUM_IRQS-1:0
      reset: 0
      description: Write-one-to-clear event_latch and irq_status bits.
    read_effects:
    - reads return zero
    write_effects:
    - event_latch &= ~clear_event
    - irq_status &= ~clear_event
    function_refs:
    - function_model.transactions.FM_DMAWFE
  - name: FSRD
    offset: 48
    access: RO
    reset: 0
    description: Fault Status DMA Manager
    fields:
    - name: manager_fault
      bits: 0
      reset: 0
      description: Manager fault pending.
    - name: decode_fault
      bits: 1
      reset: 0
      description: Undefined instruction or malformed operand detected by manager.
    read_effects: []
    write_effects: []
    function_refs:
    - error_handling.undef_instr
    - error_handling.instr_fetch_err
  - name: FSRC
    offset: 52
    access: RO
    reset: 0
    description: Fault Status DMA Channels
    fields:
    - name: channel_fault
      bits: NUM_CHANNELS-1:0
      reset: 0
      description: One fault bit per channel.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.transactions.FM_FAULT
  - name: FTRD
    offset: 56
    access: RO
    reset: 0
    description: Fault Type DMA Manager
    fields:
    - name: fault_type
      bits: 7:0
      reset: 0
      description: Encoded latest manager fault source.
    - name: fault_pc_valid
      bits: 8
      reset: 0
      description: Fault PC is valid for debug/status correlation.
    read_effects: []
    write_effects: []
    function_refs:
    - error_handling.error_sources
  - name: CSR_chan_n
    offset: 256
    access: RO
    reset: 0
    count: NUM_CHANNELS
    stride: 8
    description: Channel Status
    fields:
    - name: channel_state
      bits: 3:0
      reset: 0
      description: STOPPED/EXECUTING/WAITING/BARRIER/KILLING/FAULTING encoding for channel n.
    - name: channel_ns
      bits: 8
      reset: 0
      description: Non-secure attribute latched by DMAGO_NS.
    - name: wake_pending
      bits: 9
      reset: 0
      description: Channel is blocked in DMAWFE.
    read_effects: []
    write_effects: []
    function_refs:
    - fsm.channel_state
  - name: CPC_chan_n
    offset: 260
    access: RO
    reset: 0
    count: NUM_CHANNELS
    stride: 8
    description: Channel PC
    fields:
    - name: pc
      bits: 31:0
      reset: 0
      description: Current channel program counter.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.state_variables.channel_pc
  - name: SAR_chan_n
    offset: 1024
    access: RW
    reset: 0
    count: NUM_CHANNELS
    stride: 32
    description: Source Address
    fields:
    - name: sar
      bits: 31:0
      reset: 0
      description: Source address for channel n.
    read_effects: []
    write_effects:
    - Secure APB debug write or DMAMOV updates channel_sar when channel is not executing unless debug execution explicitly permits it.
    function_refs:
    - function_model.transactions.FM_DMAMOV
    - function_model.transactions.FM_DMAADDH
  - name: DAR_chan_n
    offset: 1028
    access: RW
    reset: 0
    count: NUM_CHANNELS
    stride: 32
    description: Destination Address
    fields:
    - name: dar
      bits: 31:0
      reset: 0
      description: Destination address for channel n.
    read_effects: []
    write_effects:
    - Secure APB debug write or DMAMOV updates channel_dar when channel is not executing unless debug execution explicitly permits it.
    function_refs:
    - function_model.transactions.FM_DMAMOV
    - function_model.transactions.FM_DMAADDH
  - name: CCR_chan_n
    offset: 1032
    access: RW
    reset: 0
    count: NUM_CHANNELS
    stride: 32
    description: Channel Control
    fields:
    - name: src_inc
      bits: 0
      reset: 0
      description: Increment SAR after accepted read beats.
    - name: dst_inc
      bits: 1
      reset: 0
      description: Increment DAR after accepted write beats.
    - name: src_burst_size
      bits: 4:2
      reset: 0
      description: Source burst size encoding.
    - name: dst_burst_size
      bits: 7:5
      reset: 0
      description: Destination burst size encoding.
    - name: src_burst_len
      bits: 11:8
      reset: 0
      description: Source burst length minus one.
    - name: dst_burst_len
      bits: 15:12
      reset: 0
      description: Destination burst length minus one.
    - name: cache_ctrl
      bits: 23:16
      reset: 0
      description: AXI cache/prot/control attributes generated for AR/AW.
    read_effects: []
    write_effects:
    - Secure APB debug write or DMAMOV updates channel_ccr when channel is not executing unless debug execution explicitly permits it.
    function_refs:
    - function_model.transactions.FM_DMAMOV
    - cycle_model.handshake_rules.CM_AXI_AR
    - cycle_model.handshake_rules.CM_AXI_AW
  - name: DBGSTATUS
    offset: 3328
    access: RO
    reset: 0
    description: Debug Status
    fields:
    - name: busy
      bits: 0
      reset: 0
      description: Debug interface is executing a command.
    - name: cmd_error
      bits: 1
      reset: 0
      description: Last debug command was rejected or faulted.
    read_effects: []
    write_effects: []
    function_refs:
    - function_model.transactions.FM_DMAKILL
  - name: DBGCMD
    offset: 3332
    access: WO
    reset: 0
    description: Debug Command
    fields:
    - name: cmd
      bits: 1:0
      reset: 0
      description: Encoded debug command, including execute instruction and DMAKILL.
    - name: channel
      bits: 10:8
      reset: 0
      description: Target channel for channel debug command.
    read_effects:
    - reads return zero
    write_effects:
    - Launch debug instruction in DBGINST0/1 or request FM_DMAKILL based on cmd.
    function_refs:
    - function_model.transactions.FM_DMAGO
    - function_model.transactions.FM_DMAKILL
  - name: DBGINST0
    offset: 3336
    access: WO
    reset: 0
    description: Debug Instruction-0
    fields:
    - name: opcode_and_operands_low
      bits: 31:0
      reset: 0
      description: Low word of debug instruction payload.
    read_effects:
    - reads return zero
    write_effects:
    - Captures debug instruction low word until DBGCMD execute.
    function_refs:
    - function_model.instruction_set
  - name: DBGINST1
    offset: 3340
    access: WO
    reset: 0
    description: Debug Instruction-1
    fields:
    - name: operands_high
      bits: 31:0
      reset: 0
      description: High word of debug instruction payload.
    read_effects:
    - reads return zero
    write_effects:
    - Captures debug instruction high word until DBGCMD execute.
    function_refs:
    - function_model.instruction_set
  - name: CR0
    offset: 3584
    access: RO
    reset: 0
    description: Configuration Register 0
    fields:
    - name: num_channels_m1
      bits: 2:0
      reset: NUM_CHANNELS-1
      description: Encoded implemented channel count minus one.
    - name: num_periph_m1
      bits: 8:4
      reset: NUM_PERIPH_REQS-1
      description: Encoded implemented peripheral request count minus one.
    - name: num_irq_m1
      bits: 15:10
      reset: NUM_IRQS-1
      description: Encoded implemented event IRQ count minus one.
    - name: data_width_code
      bits: 18:16
      reset: implementation_defined
      description: Encoded AXI data width capability.
    read_effects: []
    write_effects: []
    function_refs:
    - parameters
