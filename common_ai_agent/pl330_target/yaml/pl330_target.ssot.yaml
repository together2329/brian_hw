generation_flow:
  steps:
  - name: validate_ssot
    command: bash workflow/ssot-gen/scripts/check_ssot_disk.sh pl330_target
    description: Validate production SSOT structure and quality gates
  - name: handoff_fl_model
    command: /ssot-fl-model pl330_target
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals pl330_target
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl pl330_target
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb pl330_target
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
ip: pl330_target
description: "AXI DMA controller \u2014 single-master AXI3, dual APB (NS+S) slave, parameterized\nperipheral request interfaces, IRQ outputs,\
  \ instruction-driven engine,\nmulti-channel scheduler, internal MFIFO + merge buffer.\n"
clocks:
- name: aclk
  frequency_mhz_min: 200
  description: System AXI/APB clock
resets:
- name: aresetn
  type: async_low
  sync_clock: aclk
