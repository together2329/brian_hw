fsm:
  channel_state:
    states:
    - STOPPED
    - EXECUTING
    - CACHE_MISS
    - UPDATING_PC
    - WAITING_FOR_EVENT
    - AT_BARRIER
    - KILLING
    - COMPLETING
    - FAULTING
    - FAULTING_COMPLETING
    initial: STOPPED
    transitions:
    - from: STOPPED
      to: EXECUTING
      condition: DMAGO + secure check pass
    - from: EXECUTING
      to: CACHE_MISS
      condition: icache miss
    - from: CACHE_MISS
      to: EXECUTING
      condition: fill complete
    - from: EXECUTING
      to: WAITING_FOR_EVENT
      condition: DMAWFE
    - from: WAITING_FOR_EVENT
      to: EXECUTING
      condition: event signaled
    - from: EXECUTING
      to: AT_BARRIER
      condition: DMAWFP barrier
    - from: AT_BARRIER
      to: EXECUTING
      condition: barrier cleared
    - from: EXECUTING
      to: COMPLETING
      condition: DMAEND issued
    - from: COMPLETING
      to: STOPPED
      condition: all outstanding drained
    - from: any
      to: KILLING
      condition: DMAKILL via DBGCMD
    - from: KILLING
      to: STOPPED
      condition: kill drained
    - from: any
      to: FAULTING
      condition: any error_case
    - from: FAULTING
      to: FAULTING_COMPLETING
      condition: fault recovery initiated
    - from: FAULTING_COMPLETING
      to: STOPPED
      condition: drain complete
