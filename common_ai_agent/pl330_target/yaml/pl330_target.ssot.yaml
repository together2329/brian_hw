    content: Resolve production multi-module connection contracts before top integration signoff
    detail: The SSOT is production-profile and declares manifest child modules, but it has no machine-readable integration.connections or sub_modules[].connections
      records. Child module drafts may proceed from their owner packets; top wiring, PASS, and signoff must remain blocked until SSOT authors
      module/port/signal contracts.
    criteria:
    - integration.connections or sub_modules[].connections lists every active child module connection as module/port/signal data
    - rtl_authoring_plan.execution_policy.connection_contract_gap.status becomes ok
