top_module:
  name: pl330_target
  file: rtl/pl330_target.sv
  type: peripheral
  description: pl330_target leaf IP generated from approved ATLAS Web SSOT requirements
  version: '1.0'
  reference_spec: user-defined
  target:
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
sub_modules:
- name: pl330_target_engine
  file: rtl/pl330_target_engine.sv
  ownership: manifest
  implements:
  - function_model.transactions.fetch
  - .decode
  - .execute
  - fsm.engine
  - cycle_model.pipeline
- name: pl330_target_pipeline
  file: rtl/pl330_target_pipeline.sv
  ownership: manifest
  implements:
  - cycle_model.pipeline
  - cycle_model.handshake_rules.engine_pipeline
  cycle_model_refs:
  - cycle_model
  source_sections:
  - cycle_model
- name: pl330_target_lsq
  file: rtl/pl330_target_lsq.sv
  ownership: manifest
  implements:
  - function_model.transactions.load
  - .store
  - cycle_model.ordering.lsq_order
- name: pl330_target_mfifo
  file: rtl/pl330_target_mfifo.sv
  ownership: manifest
  implements:
  - function_model.state_variables.mfifo
  - cycle_model.backpressure.mfifo_full
  function_model_refs:
  - function_model.transactions.FM_RESET
  - function_model.transactions.FM_DMAGO
  - function_model.transactions.FM_DMALD
  - function_model.transactions.FM_DMAST
  - function_model.transactions.FM_DMALDP
  - function_model.transactions.FM_DMASTP
  - function_model.transactions.FM_DMASEV
  - function_model.transactions.FM_DMAEND
  - function_model.transactions.FM_FAULT
  - function_model.state_variables
  feature_refs:
  - features
  source_sections:
  - features
  - dataflow
  - fsm
  - test_requirements
  - registers
  dataflow_refs:
  - dataflow
  fsm_refs:
  - fsm
  test_refs:
  - test_requirements
  register_refs:
  - registers.register_list
- name: pl330_target_merge_buffer
  file: rtl/pl330_target_merge_buffer.sv
  ownership: manifest
  implements:
  - function_model.transactions.merge
  - cycle_model.handshake_rules.merge
- name: pl330_target_icache
  file: rtl/pl330_target_icache.sv
  ownership: manifest
  implements:
  - cycle_model.handshake_rules.icache_fill
- name: pl330_target_axi
  file: rtl/pl330_target_axi.sv
  ownership: manifest
  implements:
  - cycle_model.handshake_rules.axi_aw
  - .axi_w
  - .axi_b
  - .axi_ar
  - .axi_r
  - cycle_model.ordering.axi_outstanding
- name: pl330_target_periph
  file: rtl/pl330_target_periph.sv
  ownership: manifest
  implements:
  - function_model.transactions.peripheral_request
  - cycle_model.handshake_rules.periph_dr_da
- name: pl330_target_apb_regs
  file: rtl/pl330_target_apb_regs.sv
  ownership: manifest
  implements:
  - registers.register_list
  - cycle_model.handshake_rules.apb
- name: pl330_target
  file: rtl/pl330_target.sv
  ownership: manifest
  ssot_gen: true
  description: Top-level integration module matching SSOT top_module
parameters:
- name: NUM_CHANNELS
  default: 8
  description: DMA channel count
- name: NUM_PERIPH_REQS
  default: 32
  description: Peripheral request interfaces
- name: NUM_IRQS
  default: 32
  description: IRQ output count
- name: AXI_DATA_WIDTH
  default: 64
  description: AXI data bus width
- name: AXI_ID_WIDTH
  default: 4
  description: AXI ID width
- name: AXI_ADDR_WIDTH
  default: 32
  description: AXI address width
- name: APB_DATA_WIDTH
  default: 32
  description: APB data width
- name: APB_ADDR_WIDTH
  default: 12
  description: APB address width
- name: ICACHE_LINE_SIZE
  default: 4
  description: Instruction cache line size in beats
- name: MFIFO_DEPTH
  default: 16
  description: Manager FIFO depth
- name: MERGE_BUFFER_DEPTH
  default: 4
  description: Merge buffer depth
- name: SUPPORT_TZ
  default: 1
  description: TrustZone (NS/S) support
io_list:
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock
    ports:
    - name: clk
      width: 1
      direction: input
      description: Primary clock
  resets:
  - name: rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset, asynchronous assert and synchronous release
    ports:
    - name: rst_n
      width: 1
      direction: input
      description: Primary reset
  interfaces:
  - name: control_data
    type: native_valid_ready
    role: target
    description: Generic request/response interface synthesized only as a repair fallback; replace with approved protocol ports before production
      signoff.
    ports:
    - name: req_valid
      width: 1
      direction: input
      description: Request/control payload valid
    - name: req_ready
      width: 1
      direction: output
      description: Request/control payload accepted when high with req_valid
    - name: req_data
      width: DATA_WIDTH
      direction: input
      description: Generic request/control payload
    - name: rsp_valid
      width: 1
      direction: output
      description: Response/result payload valid
    - name: rsp_ready
      width: 1
      direction: input
      description: Response/result accepted when high with rsp_valid
    - name: rsp_data
      width: DATA_WIDTH
      direction: output
      description: Generic response/result payload
    - name: error
      width: 1
      direction: output
      description: Generic architectural error indication
features:
- 'Instruction-driven DMA engine: DMAGO/DMALD/DMAST/DMALDP/DMASTP/DMAMOV/DMAFLUSHP/DMASEV/DMAWFE/DMAEND'
- Per-channel scheduler with priority + round-robin
- Multi-outstanding AXI3 read/write
- TrustZone NS/S separation on APB
- Configurable peripheral request interface count
- Manager FIFO buffering
- Merge buffer for byte-lane / unaligned write
dataflow:
  paths:
  - name: dma_read
    source: axi_master.r
    sink: mfifo
    via:
    - pl330_target_axi
    - pl330_target_lsq
  - name: dma_write
    source: mfifo
    sink: axi_master.w
    via:
    - pl330_target_lsq
    - pl330_target_merge_buffer
    - pl330_target_axi
  - name: cmd_fetch
    source: axi_master.r
    sink: engine
    via:
    - pl330_target_icache
    - pl330_target_engine
  - name: csr_write
    source: apb_ns.pwdata
    sink: pl330_target_apb_regs.config
    via:
    - pl330_target_apb_regs
function_model:
  state_variables:
  - name: channel_state
    width: 4
    reset: 0
    description: Per-channel FSM state (0=stopped, 1=executing, 2=cache_miss, 3=updating_pc, 4=waiting_for_event, 5=at_barrier, 6=killing, 7=completing,
      8=faulting, 9=faulting_completing)
  - name: channel_pc
    width: 32
    reset: 0
  - name: outstanding_reads
    width: 4
    reset: 0
  - name: outstanding_writes
    width: 4
    reset: 0
  - name: mfifo_count
    width: 5
    reset: 0
  - name: irq_status
    width: 32
    reset: 0
  - name: fault_status
    width: 32
    reset: 0
  transactions:
  - id: FM_RESET
    name: reset
    outputs:
    - all state -> reset values
    side_effects:
    - outstanding_reads=0
    - outstanding_writes=0
    - mfifo_count=0
    - irq_status=0
    error_cases: []
    preconditions:
    - transaction is accepted under cycle_model rules
  - id: FM_DMAGO
    name: dmago_command
    preconditions:
    - channel_state==0
    - manager APB write to DBGINST
    outputs:
    - channel_state=1
    - channel_pc=arg_addr
    side_effects: []
    error_cases:
    - condition: secure violation
      result: fault_status |= INSTR_FETCH_ERR
  - id: FM_DMALD
    name: dmald_load
    preconditions:
    - channel_state==1
    - mfifo has space
    outputs:
    - outstanding_reads += 1
    - mfifo entries reserved
    side_effects:
    - issue AXI AR
    error_cases:
    - condition: AXI rresp != OKAY
      result: fault_status |= DATA_READ_ERR
  - id: FM_DMAST
    name: dmast_store
    preconditions:
    - channel_state==1
    - mfifo has data
    outputs:
    - outstanding_writes += 1
    - mfifo entries consumed
    side_effects:
    - issue AXI AW + W
    error_cases:
    - condition: AXI bresp != OKAY
      result: fault_status |= DATA_WRITE_ERR
  - id: FM_DMALDP
    name: dmaldp_periph_load
    preconditions:
    - channel_state==1
    - periph drvalid asserted
    outputs:
    - outstanding_reads += 1
    side_effects:
    - drready asserted
    - AXI AR issued
    error_cases: []
  - id: FM_DMASTP
    name: dmastp_periph_store
    preconditions:
    - channel_state==1
    - periph davalid acknowledged
    outputs:
    - outstanding_writes += 1
    side_effects:
    - daready asserted
    - AXI AW+W issued
    error_cases: []
  - id: FM_DMASEV
    name: dmasev_event_signal
    preconditions:
    - channel_state==1
    - event index < NUM_IRQS
    outputs:
    - irq_status |= 1<<event_idx
    side_effects:
    - irq[event_idx] pulse
    error_cases: []
  - id: FM_DMAEND
    name: dmaend_terminate
    preconditions:
    - channel_state==1
    - no outstanding
    outputs:
    - channel_state=0
    side_effects: []
    error_cases:
    - condition: outstanding > 0
      result: wait until drained
  - id: FM_FAULT
    name: fault_propagate
    preconditions:
    - any error_case fired
    outputs:
    - channel_state=8
    - irq_abort pulse
    side_effects:
    - fault_status updated
    error_cases: []
  invariants:
  - outstanding_reads >= 0 && outstanding_reads <= 2*NUM_CHANNELS
  - outstanding_writes >= 0 && outstanding_writes <= 2*NUM_CHANNELS
  - mfifo_count <= MFIFO_DEPTH
  - channel_state != 1 -> outstanding_reads == 0 && outstanding_writes == 0
  - fault triggers irq_abort within 4 cycles
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n assertion returns architectural state to declared reset values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on clk at nominal 100 MHz; max depends on declared backpressure and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - signal: req_valid/req_ready
    rule: req_valid payload remains stable until req_ready is sampled asserted on control_data.
  - signal: rsp_valid/rsp_ready
    rule: rsp_valid payload remains stable until rsp_ready is sampled asserted on control_data.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0..N
    action: Accept legal request/command/packet/control work under declared handshake rules.
  - stage: S1_EVALUATE
    cycle: N..M
    action: Evaluate function_model transaction and update only declared state.
  - stage: S2_OBSERVE
    cycle: M..K
    action: Publish response/status/output/debug event and hold it stable until accepted.
  ordering:
  - Accepted requests update architectural state only on clock edges.
  - Completion/status/interrupt updates occur after the operation reaches its terminal FSM state.
  - Backpressure stalls the active handshake stage without corrupting stored state.
  - Read/dataflow stages must precede dependent write/output stages where declared in dataflow.
  backpressure:
  - Ready/valid deassertion stalls only the affected interface stage; payload and route/control state remain stable.
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - Handshake/control state resets to idle
  - Observable outputs reset to function_model reset values
cdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
rdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
registers:
  register_list:
  - name: DSR
    offset: 0
    access: RO
    reset: 0
    description: DMA Manager Status Register
  - name: DPC
    offset: 4
    access: RO
    reset: 0
    description: DMA Manager PC
  - name: INTEN
    offset: 32
    access: RW
    reset: 0
    description: Interrupt Enable
  - name: INT_EVENT_RIS
    offset: 36
    access: RO
    reset: 0
    description: Event-Interrupt Raw Status
  - name: INTMIS
    offset: 40
    access: RO
    reset: 0
    description: Interrupt Status (masked)
  - name: INTCLR
    offset: 44
    access: WO
    reset: 0
    description: Interrupt Clear
  - name: FSRD
    offset: 48
    access: RO
    reset: 0
    description: Fault Status DMA Manager
  - name: FSRC
    offset: 52
    access: RO
    reset: 0
    description: Fault Status DMA Channels
  - name: FTRD
    offset: 56
    access: RO
    reset: 0
    description: Fault Type DMA Manager
  - name: CSR_chan_n
    offset: 256
    access: RO
    reset: 0
    count: NUM_CHANNELS
    stride: 8
    description: Channel Status
  - name: CPC_chan_n
    offset: 260
    access: RO
    reset: 0
    count: NUM_CHANNELS
    stride: 8
    description: Channel PC
  - name: SAR_chan_n
    offset: 1024
    access: RW
    reset: 0
    count: NUM_CHANNELS
    stride: 32
    description: Source Address
  - name: DAR_chan_n
    offset: 1028
    access: RW
    reset: 0
    count: NUM_CHANNELS
    stride: 32
    description: Destination Address
  - name: CCR_chan_n
    offset: 1032
    access: RW
    reset: 0
    count: NUM_CHANNELS
    stride: 32
    description: Channel Control
  - name: DBGSTATUS
    offset: 3328
    access: RO
    reset: 0
    description: Debug Status
  - name: DBGCMD
    offset: 3332
    access: WO
    reset: 0
    description: Debug Command
  - name: DBGINST0
    offset: 3336
    access: WO
    reset: 0
    description: Debug Instruction-0
  - name: DBGINST1
    offset: 3340
    access: WO
    reset: 0
    description: Debug Instruction-1
  - name: CR0
    offset: 3584
    access: RO
    reset: 0
    description: Configuration Register 0
memory:
  instances:
  - name: mfifo
    type: ram_1r1w
    depth: MFIFO_DEPTH
    width: AXI_DATA_WIDTH
    description: Manager FIFO
  - name: merge_buffer
    type: register_array
    depth: MERGE_BUFFER_DEPTH
    width: AXI_DATA_WIDTH
    description: Byte-lane merge buffer
  - name: icache
    type: ram_1r1w
    depth: 32
    width: 32
    description: Instruction cache
interrupts:
  outputs:
  - name: irq
    count: NUM_IRQS
    source: irq_status
  - name: irq_abort
    count: 1
    source: fault propagation
fsm:
  channel_state:
    states:
    - STOPPED
    - EXECUTING
    - CACHE_MISS
    - UPDATING_PC
    - WAITING_FOR_EVENT
    - AT_BARRIER
    - KILLING
    - COMPLETING
    - FAULTING
    - FAULTING_COMPLETING
    initial: STOPPED
    transitions:
    - from: STOPPED
      to: EXECUTING
      condition: DMAGO + secure check pass
    - from: EXECUTING
      to: CACHE_MISS
      condition: icache miss
    - from: CACHE_MISS
      to: EXECUTING
      condition: fill complete
    - from: EXECUTING
      to: WAITING_FOR_EVENT
      condition: DMAWFE
    - from: WAITING_FOR_EVENT
      to: EXECUTING
      condition: event signaled
    - from: EXECUTING
      to: AT_BARRIER
      condition: DMAWFP barrier
    - from: AT_BARRIER
      to: EXECUTING
      condition: barrier cleared
    - from: EXECUTING
      to: COMPLETING
      condition: DMAEND issued
    - from: COMPLETING
      to: STOPPED
      condition: all outstanding drained
    - from: any
      to: KILLING
      condition: DMAKILL via DBGCMD
    - from: KILLING
      to: STOPPED
      condition: kill drained
    - from: any
      to: FAULTING
      condition: any error_case
    - from: FAULTING
      to: FAULTING_COMPLETING
      condition: fault recovery initiated
    - from: FAULTING_COMPLETING
      to: STOPPED
      condition: drain complete
timing:
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    register_access:
      min: 0
      max: null
      measured_from: valid && ready
      measured_to: response valid && ready
    primary_operation:
      min: 1
      max: null
      measured_from: start/request accepted
      measured_to: done/response accepted
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - clk
    isolation: not_required_single_domain
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
    - All declared IP functionality active
  clock_gating:
    required: false
    rationale: No explicit integrated clock-gating requirement in approved SSOT
  upf_required: false
security:
  assets:
  - Secure APB register space (sprdata/spwdata)
  - Manager non-secure indicator (boot_manager_ns)
  - Per-IRQ non-secure mapping (boot_irq_ns)
  - Per-peripheral non-secure mapping (boot_periph_ns)
  threats:
  - NS-issued instruction targeting Secure peripheral
  - Replay or skipping of DMAFLUSHP between contexts
  - Bus error injection causing FSM exposure
  classification: non_secure_leaf_ip
  threat_model:
  - threat: invalid configuration or address
    mitigation: error_handling declares detection, architectural effect, and recovery
  - threat: silent data/control corruption
    mitigation: test_requirements scoreboard checks every declared functional transaction
  privilege_model: System-level access control is owned by the integrating bus/firewall unless explicitly declared here.
error_handling:
  error_sources:
  - id: instr_fetch_err
    condition: Declared error condition is observed
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: data_read_err
    condition: Declared error condition is observed
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: data_write_err
    condition: Declared error condition is observed
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: undef_instr
    condition: Declared error condition is observed
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: secure_violation
    condition: Declared error condition is observed
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: unaligned_access
    condition: Declared error condition is observed
    architectural_effect: Status/error reporting follows the SSOT error policy
  propagation: "FAULTING channel \u2192 COMPLETING_FAULT \u2192 STOPPED, irq_abort pulses on entry"
  recovery:
  - action: reset or software clear
    clears:
    - error/status indicators
    preserves:
    - configuration unless reset policy states otherwise
debug_observability:
  waveform_must_probe:
  - aclk
  - aresetn
  - channel_state[*]
  - channel_pc[*]
  - mfifo_count
  - outstanding_reads
  - outstanding_writes
  - irq
  - irq_abort
  - fault_status
  - awvalid; awready; awaddr; awlen
  - wvalid;  wready;  wdata;  wlast
  - bvalid;  bready;  bresp
  - arvalid; arready; araddr; arlen
  - rvalid;  rready;  rdata;  rresp; rlast
  trace_events:
  - name: operation_start
    trigger: start/request accepted
  - name: operation_complete
    trigger: done/response accepted
  - name: error_detected
    trigger: any error_handling.error_sources condition
  status_outputs:
  - status/debug signals declared in io_list or registers
integration:
  bus_attachment:
    interfaces:
    - control_data
    address_ownership: SoC assigns base addresses and external routing not owned by this leaf IP
  dependencies:
    external_modules: []
    external_clocks:
    - clk
    external_resets:
    - rst_n
  connections: []
  connection_contract_status: missing machine-readable module wiring; child RTL drafts may proceed from owner packets, but top integration/signoff
    must stay blocked until SSOT authors integration.connections or sub_modules[].connections with module/port/signal records
  integration_notes:
  - Integrator must connect every declared io_list port and honor timing/reset assumptions.
dft:
  scan_required: false
  controllability:
    reset: rst_n
    clocks:
    - clk
    primary_inputs: all io_list inputs controllable in testbench
  observability:
    required_internal_points:
    - fsm_state
    - status
    - error_status
    outputs: all io_list outputs observable
  mbist_required: true
synthesis:
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 200
    technology: openpdk45
  dialect: systemverilog_2012
  top_module: pl330_target
  constraints:
  - No inferred latches
  - No unresolved black boxes
  - All sequential state reset or intentionally initialized
  required_outputs:
  - syn/out/area.rpt
  - syn/out/timing_summary.rpt
  - sta/out/wns.json
coding_rules:
  verilog_style: systemverilog_2012
  conventions:
  - Use always_ff/always_comb or equivalent synthesis-safe style consistently
  - No inferred latches; every combinational branch assigns all outputs
  - No parameterized part-selects inside procedural blocks; use helper wires/continuous assigns
  - No ad-hoc lint suppressions without SSOT waiver and DUT-only lint evidence
  lint_waivers: []
reuse_modules: []
custom:
  assumptions:
  - Integration-owned address, routing, privilege, and clock/reset policies must be captured explicitly before signoff
  - Repair does not imply IP-kind behavior; rtl-gen must implement only SSOT-owned function_model, cycle_model, and interface contracts
  - Line/branch coverage is required when tool-supported; otherwise a waiver must be explicit in coverage evidence
dir_structure:
  yaml_dir: yaml/
  output_dirs:
    rtl: rtl/
    list: list/
    tb: tb/cocotb/
    sim: sim/
    lint: lint/
    cov: cov/
    doc: doc/
  generators_dir: generators/
filelist:
  rtl:
  - rtl/pl330_target_engine.sv
  - rtl/pl330_target_pipeline.sv
  - rtl/pl330_target_lsq.sv
  - rtl/pl330_target_mfifo.sv
  - rtl/pl330_target_merge_buffer.sv
  - rtl/pl330_target_icache.sv
  - rtl/pl330_target_axi.sv
  - rtl/pl330_target_periph.sv
  - rtl/pl330_target_apb_regs.sv
  - rtl/pl330_target.sv
  tb:
  - tb/cocotb/test_pl330_target.py
  - tb/cocotb/test_runner.py
  - tb/cocotb/scoreboard.py
  sim:
  - sim/results.xml
  - sim/waves.fst
  coverage:
  - cov/coverage.json
test_requirements:
  scenarios:
  - id: SC01
    name: reset contract
    stimulus: Assert and release the declared reset while all external interfaces remain idle.
    expected: Architectural state, status, outputs, and debug observability match function_model reset outputs.
    checker: Reset checker compares all declared reset-visible state against function_model and cycle_model reset rules.
    coverage:
    - function_model.reset
    - cycle_model.reset
  - id: SC02
    name: primary approved behavior
