ip: fifo_sync
version: '1.0'
purpose: Parameterized synchronous FIFO with APB-lite CSR interface for status/config, single PCLK clock domain, active-low async assert sync deassert reset, 1-cycle latency push/pop, full/empty flags,
  overflow/underflow error detection.
type: memory
top_module:
  name: fifo_sync
  file: rtl/fifo_sync.sv
  version: '1.0'
  type: memory
  description: Parameterized synchronous FIFO with optional APB-lite CSR, single-clock domain, 1-cycle latency
  reference_spec: user-defined
  target:
    technology: generic
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
- name: fifo_sync_mem
  file: rtl/fifo_sync_mem.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances
  - dataflow.write_path
  - dataflow.read_path
  source_sections:
  - memory
  - dataflow
  memory_refs:
  - memory.instances.fifo_ram
  dataflow_refs:
  - dataflow.write_path
  - dataflow.read_path
  decomposition_refs:
  - decomposition.units.storage
  description: Dual-port SRAM array and pointer-based storage
- name: fifo_sync_ptrs
  file: rtl/fifo_sync_ptrs.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.state_variables
  - cycle_model.pipeline
  source_sections:
  - function_model
  - cycle_model
  function_model_refs:
  - function_model.state_variables.wr_ptr
  - function_model.state_variables.rd_ptr
  - function_model.state_variables.count
  decomposition_refs:
  - decomposition.units.pointer_control
  cycle_model_refs:
  - cycle_model.pipeline
  - cycle_model.handshake_rules
  fsm_refs:
  - fsm.ptr_fsm
  description: Read/write pointer management and fill counter
- name: fifo_sync_flags
  file: rtl/fifo_sync_flags.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.transactions.output_rules
  - cycle_model.latency
  source_sections:
  - function_model
  - cycle_model
  function_model_refs:
  - function_model.transactions.output_rules
  decomposition_refs:
  - decomposition.units.flag_generation
  cycle_model_refs:
  - cycle_model.latency
  description: 'Combinational flag generation: full, empty, almost_full, almost_empty, count'
- name: fifo_sync_regs
  file: rtl/fifo_sync_regs.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - registers.register_list
  - io_list.interfaces.apb_csr
  source_sections:
  - registers
  - io_list
  register_refs:
  - registers.register_list
  decomposition_refs:
  - decomposition.units.csr_access
  description: APB-lite CSR decode for status/config/control registers (parameterized by USE_APB)
- name: fifo_sync_output_reg
  file: rtl/fifo_sync_output_reg.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - cycle_model.latency.registered_read
  - parameters.USE_OUTPUT_REGISTER
  source_sections:
  - cycle_model
  - parameters
  cycle_model_refs:
  - cycle_model.latency
  description: Optional output register stage for 1-cycle pipelined read latency (parameterized)
decomposition:
  units:
  - id: storage
    kind: datapath
    source_refs:
    - memory.instances.fifo_ram
    rtl_candidates:
    - fifo_sync_mem
    verification_impact:
    - test_requirements.scenarios
  - id: pointer_control
    kind: control
    source_refs:
    - function_model.state_variables
    - cycle_model.pipeline
    rtl_candidates:
    - fifo_sync_ptrs
    verification_impact:
    - test_requirements.scenarios
    - coverage_goals.function
  - id: flag_generation
    kind: datapath
    source_refs:
    - function_model.transactions.output_rules
    rtl_candidates:
    - fifo_sync_flags
    verification_impact:
    - test_requirements.scenarios
    - coverage_goals.function
  - id: csr_access
    kind: control
    source_refs:
    - registers.register_list
    rtl_candidates:
    - fifo_sync_regs
    verification_impact:
    - test_requirements.scenarios
parameters:
- name: DATA_WIDTH
  default: 32
  type: int
  description: Width of each FIFO entry in bits
  drives:
  - fifo_sync_mem.sv
  - fifo_sync_flags.sv
  - fifo_sync_output_reg.sv
- name: DEPTH
  default: 16
  type: int
  description: Number of FIFO entries (must be power-of-2 for binary-pointer optimization)
  drives:
  - fifo_sync_mem.sv
  - fifo_sync_ptrs.sv
  - fifo_sync_flags.sv
- name: ALMOST_FULL_THRESHOLD
  default: 15
  type: int
  description: Fill level at which almost_full asserts; default DEPTH-1
  drives:
  - fifo_sync_flags.sv
  - fifo_sync_regs.sv
- name: ALMOST_EMPTY_THRESHOLD
  default: 1
  type: int
  description: Fill level at which almost_empty asserts; default 1
  drives:
  - fifo_sync_flags.sv
  - fifo_sync_regs.sv
- name: COUNT_WIDTH
  default: $clog2(DEPTH+1)
  type: int
  description: Width of count_o and internal fill counter; derived from DEPTH.
  drives:
  - fifo_sync.sv
  - fifo_sync_ptrs.sv
  - fifo_sync_flags.sv
  - fifo_sync_regs.sv
- name: USE_OUTPUT_REGISTER
  default: 0
  type: int
  description: 0=combinational read (0-cycle latency), 1=registered read (1-cycle latency)
  drives:
  - fifo_sync_output_reg.sv
  - fifo_sync.sv
- name: USE_APB
  default: 1
  type: int
  description: 0=no CSR interface, 1=instantiate APB-lite CSR block
  drives:
  - fifo_sync_regs.sv
  - fifo_sync.sv
- name: USE_ECC
  default: 0
  type: int
  description: 0=no ECC, 1=generate parity per entry for single-bit error detection
  drives:
  - fifo_sync_mem.sv
- name: CLOCK_FREQ_MHZ
  default: 50
  type: int
  description: Target clock frequency in MHz for timing analysis
  drives:
  - sdc/fifo_sync.sdc
  - timing
io_list:
  clock_domains:
  - name: pclk
    frequency_mhz: 50
    description: Single synchronous clock domain
    ports:
    - name: PCLK
      width: 1
      direction: input
      description: System clock
  resets:
  - name: PRESETn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Asynchronous assert, synchronous deassert reset
    ports:
    - name: PRESETn
      width: 1
      direction: input
      description: Active-low async reset
  interfaces:
  - name: fifo_write
    clock_domain: pclk
    reset_domain: PRESETn
    type: valid-ready
    role: slave
    description: Push/write data interface
    protocol:
      valid_rule: wr_en_i is sampled on rising PCLK edge when PRESETn is high.
      full_rule: full_o deasserts when count < DEPTH; writes when full_o=1 are silently ignored.
      almost_full_rule: almost_full_o asserts when count >= ALMOST_FULL_THRESHOLD.
    ports:
    - name: wr_en_i
      width: 1
      direction: input
      description: Write/push enable
    - name: wr_data_i
      width: DATA_WIDTH
      direction: input
      description: Write data input
    - name: full_o
      width: 1
      direction: output
      description: FIFO full flag
    - name: almost_full_o
      width: 1
      direction: output
      description: FIFO almost-full flag
  - name: fifo_read
    clock_domain: pclk
    reset_domain: PRESETn
    type: valid-ready
    role: master
    description: Pop/read data interface
    protocol:
      valid_rule: rd_en_i is sampled on rising PCLK edge when PRESETn is high.
      empty_rule: empty_o asserts when count == 0; reads when empty_o=1 return undefined data and are silently ignored.
      almost_empty_rule: almost_empty_o asserts when count <= ALMOST_EMPTY_THRESHOLD.
      latency_rule: When USE_OUTPUT_REGISTER=0, rd_data_o is combinational from memory. When USE_OUTPUT_REGISTER=1, rd_data_o is registered with 1-cycle latency.
    ports:
    - name: rd_en_i
      width: 1
      direction: input
      description: Read/pop enable
    - name: rd_data_o
      width: DATA_WIDTH
      direction: output
      description: Read data output
    - name: empty_o
      width: 1
      direction: output
      description: FIFO empty flag
    - name: almost_empty_o
      width: 1
      direction: output
      description: FIFO almost-empty flag
  - name: fifo_status
    clock_domain: pclk
    reset_domain: PRESETn
    type: custom
    description: Fill-level status outputs
    ports:
    - name: count_o
      width: COUNT_WIDTH
      direction: output
      description: Current fill count (0..DEPTH); COUNT_WIDTH is the RTL parameter equal to $clog2(DEPTH+1).
    protocol:
      sampling: count_o updated every rising PCLK edge to reflect current fill count.
      stability: count_o holds stable value between clock edges.
      side_effect: Reading count_o has no side effects.
  - name: fifo_control
    clock_domain: pclk
    reset_domain: PRESETn
    type: custom
    description: Optional flush/reset control
    ports:
    - name: flush_i
      width: 1
      direction: input
      description: 'Synchronous flush: clears all pointers and count to zero'
    protocol:
      sampling: flush_i is sampled on rising PCLK edge.
      pulse_rule: flush_i must be asserted for exactly 1 cycle. Flush takes priority over concurrent push/pop.
      reset_value: 0
  - name: apb_csr
    clock_domain: pclk
    reset_domain: PRESETn
    type: APB-lite
    role: slave
    description: APB-lite CSR interface for status/config/control (active when USE_APB=1)
    protocol:
      setup_phase: psel=1, penable=0 captures address.
      access_phase: psel=1, penable=1 completes when pready=1.
      read_rule: prdata valid in completing access phase.
      write_rule: pwdata sampled in completing access phase.
      error_rule: pslverr=1 for unsupported offset access.
    ports:
    - name: paddr
      width: 4
      direction: input
      description: APB address (word-aligned, 4-bit decode)
    - name: psel
      width: 1
      direction: input
      description: APB select
    - name: penable
      width: 1
      direction: input
      description: APB enable
    - name: pwrite
      width: 1
      direction: input
      description: APB write (1=write, 0=read)
    - name: pwdata
      width: 32
      direction: input
      description: APB write data
    - name: prdata
      width: 32
      direction: output
      description: APB read data
    - name: pready
      width: 1
      direction: output
      description: APB ready (always 1, no wait states)
    - name: pslverr
      width: 1
      direction: output
      description: APB slave error
features:
- name: Synchronous Push
  trigger: wr_en_i asserted while full_o==0
  datapath: wr_data_i captured into mem[wr_ptr], wr_ptr increments, count increments
  control: Pointer FSM in fifo_sync_ptrs; combinational flag decode
  output: full_o and almost_full_o update combinationally after pointer advance
- name: Synchronous Pop
  trigger: rd_en_i asserted while empty_o==0
  datapath: rd_data_o driven from mem[rd_ptr] (combinational) or output register, rd_ptr increments, count decrements
  control: Pointer FSM in fifo_sync_ptrs; USE_OUTPUT_REGISTER selects registered vs combinational path
  output: empty_o and almost_empty_o update combinationally after pointer advance
- name: Simultaneous Push/Pop
  trigger: wr_en_i && !full_o && rd_en_i && !empty_o in the same cycle
  datapath: Write to mem[wr_ptr] and read from mem[rd_ptr] occur in parallel; count unchanged (net zero change)
  control: Both pointers advance; count stays constant
  output: All flags remain stable when simultaneous push/pop maintains the same fill level
- name: Overflow Protection
  trigger: wr_en_i asserted while full_o==1
  datapath: Write ignored; wr_data_i not captured; wr_ptr unchanged
  control: full_o gates write acceptance
  output: No state change; count unchanged
- name: Underflow Protection
  trigger: rd_en_i asserted while empty_o==1
  datapath: Read ignored; rd_data_o holds previous or reset value; rd_ptr unchanged
  control: empty_o gates read acceptance
  output: No state change; count unchanged
- name: Synchronous Flush
  trigger: flush_i pulse (or CSR flush bit written)
  datapath: wr_ptr, rd_ptr, count all reset to 0; memory contents undefined after flush
  control: Takes precedence over concurrent push/pop in the same cycle
  output: empty_o=1, full_o=0, almost_full_o=0, almost_empty_o=1 immediately after flush
- name: APB CSR Access
  trigger: psel && penable with valid address
  datapath: Read returns FIFO_STATUS/FIFO_CONFIG; write updates FIFO_CONFIG or triggers FIFO_CONTROL actions
  control: 0-cycle wait state (pready always 1 when USE_APB=1)
  output: prdata/pslverr driven per register decode
dataflow:
  write_path:
    source: wr_data_i input port
    acceptance: Accepted when wr_en_i=1 and full_o=0 on rising PCLK edge
    buffer: mem[wr_ptr] (DATA_WIDTH-wide SRAM entry)
    sequence: wr_data_i -> mem[wr_ptr] -> wr_ptr increments -> count_o increments
  read_path:
    source: mem[rd_ptr] or output register
    acceptance: Accepted when rd_en_i=1 and empty_o=0 on rising PCLK edge
    output: rd_data_o (combinational from mem when USE_OUTPUT_REGISTER=0; registered when USE_OUTPUT_REGISTER=1)
    sequence: mem[rd_ptr] -> rd_data_o -> rd_ptr increments -> count_o decrements
  simultaneous_path:
    sequence: wr_data_i -> mem[wr_ptr] AND mem[rd_ptr] -> rd_data_o in the same cycle; count_o unchanged
  flush_path:
    sequence: flush_i asserted -> wr_ptr=0, rd_ptr=0, count=0; memory contents invalidated
function_model:
  purpose: Executable behavioral contract for rtl-gen and tb-gen; describes what the synchronous FIFO computes independent of cycle timing.
  state_variables:
  - name: wr_ptr
    source: fifo_sync_ptrs
    reset: 0
    description: Binary write pointer; wraps at DEPTH
  - name: rd_ptr
    source: fifo_sync_ptrs
    reset: 0
    description: Binary read pointer; wraps at DEPTH
  - name: count
    source: fifo_sync_ptrs
    reset: 0
    description: Current number of valid entries (0..DEPTH)
  - name: mem
    source: fifo_sync_mem
    reset: 0x0 per entry
    description: Storage array [0..DEPTH-1] each DATA_WIDTH wide
  transactions:
  - id: FM1
    name: push
    preconditions:
    - wr_en_i == 1
    - full_o == 0 (count < DEPTH)
    - flush_i == 0
    inputs:
    - wr_data_i[DATA_WIDTH-1:0]
    output_rules:
    - name: full_o
      expr: (count + 1 - pop_accepted) == DEPTH
      width: 1
      port: full_o
    - name: almost_full_o
      expr: (count + 1 - pop_accepted) >= ALMOST_FULL_THRESHOLD
      width: 1
      port: almost_full_o
    - name: count_o
      expr: count + 1 - pop_accepted
      width: $clog2(DEPTH+1)
      port: count_o
    state_updates:
    - name: mem[wr_ptr]
      reset: 0
      expr: wr_data_i
    - name: wr_ptr
      reset: 0
      expr: (wr_ptr + 1) % DEPTH
    - name: count
      reset: 0
      expr: count + 1 - pop_accepted
    side_effects:
    - Architectural state updated per output_rules
    error_cases: []
    outputs:
    - full_o = (count + 1 - pop_accepted) == DEPTH
    - almost_full_o = (count + 1 - pop_accepted) >= ALMOST_FULL_THRESHOLD
    - count_o = count + 1 - pop_accepted
  - id: FM2
    name: pop
    preconditions:
    - rd_en_i == 1
    - empty_o == 0 (count > 0)
    - flush_i == 0
    inputs:
    - mem[rd_ptr]
    output_rules:
    - name: rd_data_o
      expr: mem[rd_ptr]
      width: DATA_WIDTH
      port: rd_data_o
    - name: empty_o
      expr: (count - 1 + push_accepted) == 0
      width: 1
      port: empty_o
    - name: almost_empty_o
      expr: (count - 1 + push_accepted) <= ALMOST_EMPTY_THRESHOLD
      width: 1
      port: almost_empty_o
    - name: count_o
      expr: count - 1 + push_accepted
      width: $clog2(DEPTH+1)
      port: count_o
    state_updates:
    - name: rd_ptr
      reset: 0
      expr: (rd_ptr + 1) % DEPTH
    - name: count
      reset: 0
      expr: count - 1 + push_accepted
    side_effects:
    - Popped entry storage is invalidated (no read-again guarantee)
    error_cases: []
    outputs:
    - rd_data_o = mem[rd_ptr]
    - empty_o = (count - 1 + push_accepted) == 0
    - almost_empty_o = (count - 1 + push_accepted) <= ALMOST_EMPTY_THRESHOLD
    - count_o = count - 1 + push_accepted
  - id: FM3
    name: simultaneous_push_pop
    preconditions:
    - wr_en_i == 1 and rd_en_i == 1
    - full_o == 0 and empty_o == 0
    - flush_i == 0
    inputs:
    - wr_data_i[DATA_WIDTH-1:0]
    - mem[rd_ptr]
    output_rules:
    - name: rd_data_o
      expr: mem[rd_ptr]
      width: DATA_WIDTH
      port: rd_data_o
    - name: full_o
      expr: count == DEPTH - 1
      width: 1
      port: full_o
    - name: empty_o
      expr: count == 1
      width: 1
      port: empty_o
    - name: count_o
      expr: count
      width: $clog2(DEPTH+1)
      port: count_o
    state_updates:
    - name: mem[wr_ptr]
      reset: 0
      expr: wr_data_i
    - name: wr_ptr
      reset: 0
      expr: (wr_ptr + 1) % DEPTH
    - name: rd_ptr
      reset: 0
      expr: (rd_ptr + 1) % DEPTH
    - name: count
      reset: 0
      expr: count
    side_effects:
    - count is unchanged because push and pop cancel
    error_cases: []
    outputs:
    - rd_data_o = mem[rd_ptr]
    - full_o = count == DEPTH - 1
    - empty_o = count == 1
    - count_o = count
  - id: FM4
    name: overflow_reject
    preconditions:
    - wr_en_i == 1
    - full_o == 1 (count == DEPTH)
    inputs: []
    output_rules:
    - name: full_o
      expr: '1'
      width: 1
      port: full_o
    - name: count_o
      expr: DEPTH
      width: $clog2(DEPTH+1)
      port: count_o
    state_updates: []
    side_effects:
    - Write rejected silently; no data corruption
    error_cases: []
    outputs:
    - full_o = 1
    - count_o = DEPTH
  - id: FM5
    name: underflow_reject
    preconditions:
    - rd_en_i == 1
    - empty_o == 1 (count == 0)
    inputs: []
    output_rules:
    - name: empty_o
      expr: '1'
      width: 1
      port: empty_o
    - name: rd_data_o
      expr: previous_value_or_zero
      width: DATA_WIDTH
      port: rd_data_o
    - name: count_o
      expr: '0'
      width: $clog2(DEPTH+1)
      port: count_o
    state_updates: []
    side_effects:
    - Read rejected silently; rd_data_o holds previous value (not guaranteed)
    error_cases: []
    outputs:
    - empty_o = 1
    - rd_data_o = previous_value_or_zero
    - count_o = 0
  - id: FM6
    name: flush
    preconditions:
    - flush_i == 1
    inputs: []
    output_rules:
    - name: empty_o
      expr: '1'
      width: 1
      port: empty_o
    - name: full_o
      expr: '0'
      width: 1
      port: full_o
    - name: almost_full_o
      expr: '0'
      width: 1
      port: almost_full_o
    - name: almost_empty_o
      expr: '1'
      width: 1
      port: almost_empty_o
    - name: count_o
      expr: '0'
      width: $clog2(DEPTH+1)
      port: count_o
    state_updates:
    - name: wr_ptr
      reset: 0
      expr: '0'
    - name: rd_ptr
      reset: 0
      expr: '0'
    - name: count
      reset: 0
      expr: '0'
    side_effects:
    - All FIFO entries invalidated; memory contents become undefined
    - Flush takes precedence over concurrent push/pop
    error_cases: []
    outputs:
    - empty_o = 1
    - full_o = 0
    - almost_full_o = 0
    - almost_empty_o = 1
    - count_o = 0
  invariants:
  - count is always in range [0, DEPTH].
  - full_o == 1 if and only if count == DEPTH.
  - empty_o == 1 if and only if count == 0.
  - wr_ptr and rd_ptr are always in range [0, DEPTH-1].
  - No read data changes unless rd_en_i is accepted or flush occurs.
  - Simultaneous push/pop leaves count unchanged.
  - Overflow and underflow are silently rejected with no state corruption.
  reference_model_hint: tb-gen should implement a Python deque-based scoreboard model; push/pop/flush map directly to deque.append()/popleft()/clear().
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen; describes when FIFO state, flags, and data outputs may change relative to PCLK edges.
  executable: pymtl3
  backend_policy: Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle.
  clock: PCLK
  reset:
    assertion: PRESETn low asynchronously clears wr_ptr, rd_ptr, count to 0; all flags reflect empty state.
    deassertion: State is usable on the first rising PCLK edge after synchronized deassertion.
  latency:
    push_accept:
      min_cycles: 1
      max_cycles: 1
      description: Data written on the rising edge when wr_en_i && !full_o; flags update on the same edge.
    pop_combinational:
      min_cycles: 0
      max_cycles: 0
      description: When USE_OUTPUT_REGISTER=0, rd_data_o is combinational from mem[rd_ptr]; flags update 1 cycle after rd_en_i acceptance.
    pop_registered:
      min_cycles: 1
      max_cycles: 1
      description: When USE_OUTPUT_REGISTER=1, rd_data_o appears 1 cycle after rd_en_i acceptance; flags update on the acceptance edge.
    flush:
      min_cycles: 1
      max_cycles: 1
      description: All pointers and count cleared on the rising edge when flush_i=1; flags update on the same edge.
    register_read:
      min_cycles: 0
      max_cycles: 1
      description: 'APB CSR read: pready always 1 (0 wait states).'
    register_write:
      min_cycles: 0
      max_cycles: 1
      description: 'APB CSR write: pready always 1 (0 wait states).'
  handshake_rules:
  - signal: wr_en_i
    rule: Sampled on rising PCLK; data accepted only when full_o=0. Full flag gates write acceptance.
  - signal: rd_en_i
    rule: Sampled on rising PCLK; data consumed only when empty_o=0. Empty flag gates read acceptance.
  - signal: full_o
    rule: Combinational function of count and push/pop acceptance in the current cycle. Updates after each clock edge.
  - signal: empty_o
    rule: Combinational function of count and push/pop acceptance in the current cycle. Updates after each clock edge.
  - signal: flush_i
    rule: Synchronous; takes precedence over push/pop. Clears all pointers and count on the rising edge.
  pipeline:
  - stage: S0_SAMPLE_INPUTS
    cycle: 0
    action: Sample wr_en_i, rd_en_i, flush_i, wr_data_i on rising PCLK edge
  - stage: S1_EVAL_ACCEPT
    cycle: 0
    action: 'Combinational: determine push_accepted = wr_en_i && !full_o && !flush_i; pop_accepted = rd_en_i && !empty_o && !flush_i'
  - stage: S2_UPDATE_PTRS
    cycle: 0
    action: Update wr_ptr, rd_ptr, count registers based on push/pop acceptance
  - stage: S3_WRITE_MEM
    cycle: 0
    action: Write wr_data_i to mem[wr_ptr] when push_accepted
  - stage: S4_UPDATE_FLAGS
    cycle: 1
    action: Flags (full, empty, almost_full, almost_empty, count) reflect new pointer state
  ordering:
  - Push data is captured into memory in the same cycle as pointer update.
  - Pop data is available combinationally from memory (USE_OUTPUT_REGISTER=0) or one cycle later (USE_OUTPUT_REGISTER=1).
  - Flush clears all state in the cycle it is sampled; concurrent push/pop are ignored.
  - Flag updates are visible on the cycle after pointer/count changes.
  backpressure:
  - full_o provides natural backpressure to the writer; the writer must deassert wr_en_i or accept rejection.
  - empty_o provides natural backpressure to the reader; the reader must deassert rd_en_i or accept undefined data.
  performance:
    frequency_mhz: 50
    throughput:
      sustained_ops_per_cycle: 1
      condition: At least one of push or pop accepted per cycle; simultaneous push/pop sustains 2 ops/cycle
    outstanding:
      read_max: 1
      write_max: 1
      description: Single-port push and single-port pop per cycle
    depth:
      pipeline_stages: 1
      queue_depth: DEPTH parameter
      description: Single pipeline stage; storage depth equals DEPTH parameter
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - name: pclk
    frequency_mhz: 50
    description: Single synchronous clock domain
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert
cdc_requirements:
  crossings: []
  synchronizers: []
  note: Single clock domain (PCLK) — no CDC required
rdc_requirements:
  crossings: []
  synchronizers: []
  note: Single reset domain (PRESETn) — no RDC crossings
registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
    num_channels: 1
  bit_order: lsb0
  bits_format: '[msb, lsb]'
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved fields read as zero and do not allocate storage.
  register_list:
  - name: FIFO_STATUS
    offset: 0
    width: 32
    access: ro
    reset: 5
    category: status
    description: FIFO status flags and fill count
    fields:
    - name: empty
      bits:
      - 0
      - 0
      access: ro
      reset: 1
      description: 1=FIFO empty
    - name: full
      bits:
      - 1
      - 1
      access: ro
      reset: 0
      description: 1=FIFO full
    - name: almost_empty
      bits:
      - 2
      - 2
      access: ro
      reset: 1
      description: 1=FIFO at or below almost-empty threshold
    - name: almost_full
      bits:
      - 3
      - 3
      access: ro
      reset: 0
      description: 1=FIFO at or above almost-full threshold
    - name: count
      bits:
      - 11
      - 4
      access: ro
      reset: 0
      description: Current fill count (0..DEPTH)
    - name: reserved_31_12
      bits:
      - 31
      - 12
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: FIFO_CONFIG
    offset: 4
    width: 32
    access: rw
    reset: 0
    category: config
    description: FIFO threshold configuration
    write_side_effects:
    - Writing almost_full_thresh updates ALMOST_FULL_THRESHOLD comparison value.
    - Writing almost_empty_thresh updates ALMOST_EMPTY_THRESHOLD comparison value.
    - Thresholds take effect on the next clock edge after write acceptance.
    fields:
    - name: almost_full_thresh
      bits:
      - 7
      - 0
      access: rw
      reset: 0
      write_effect: Update almost-full threshold
      description: Almost-full threshold (default set by parameter ALMOST_FULL_THRESHOLD)
    - name: almost_empty_thresh
      bits:
      - 15
      - 8
      access: rw
      reset: 0
      write_effect: Update almost-empty threshold
      description: Almost-empty threshold (default set by parameter ALMOST_EMPTY_THRESHOLD)
    - name: reserved_31_16
      bits:
      - 31
      - 16
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: FIFO_CONTROL
    offset: 8
    width: 32
    access: wo
    reset: 0
    category: control
    description: FIFO control actions
    write_side_effects:
    - Writing flush=1 triggers a synchronous flush; self-clearing after one cycle.
    fields:
    - name: flush
      bits:
      - 0
      - 0
      access: wo
      reset: 0
      write_effect: Pulse flush; clears all pointers and count
      description: Flush command (write 1 to trigger, auto-clears)
    - name: reserved_31_1
      bits:
      - 31
      - 1
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
memory:
  instances:
  - name: fifo_ram
    type: register_array
    depth: DEPTH
    width: DATA_WIDTH
    read_ports: 1
    write_ports: 1
    latency: 0
    description: Simple dual-port register array for FIFO storage; implemented as behavioral reg array
  note: Memory is implemented as a behavioral register array (not SRAM macro) for portability and parameterization.
interrupts:
  sources: []
  output:
    signal: null
    polarity: null
    type: null
  note: No interrupt outputs in this FIFO IP. Status is available via direct flag outputs (full_o, empty_o, etc.) and optional APB CSR reads.
fsm:
  ptr_fsm:
    description: Not a traditional state machine; operational behavior is determined by pointer arithmetic and count comparisons. Conceptual states correspond to fill-level regions.
    states:
    - EMPTY
    - ALMOST_EMPTY
    - NORMAL
    - ALMOST_FULL
    - FULL
    transitions:
    - from: EMPTY
      to: NORMAL
      condition: push_accepted && count becomes > ALMOST_EMPTY_THRESHOLD
    - from: EMPTY
      to: ALMOST_EMPTY
      condition: push_accepted && count becomes <= ALMOST_EMPTY_THRESHOLD && count > 0
    - from: ALMOST_EMPTY
      to: EMPTY
      condition: pop_accepted && count becomes 0
    - from: ALMOST_EMPTY
      to: NORMAL
      condition: push_accepted && count > ALMOST_EMPTY_THRESHOLD
    - from: NORMAL
      to: ALMOST_FULL
      condition: push_accepted && count >= ALMOST_FULL_THRESHOLD
    - from: NORMAL
      to: ALMOST_EMPTY
      condition: pop_accepted && count <= ALMOST_EMPTY_THRESHOLD
    - from: ALMOST_FULL
      to: FULL
      condition: push_accepted && count == DEPTH
    - from: ALMOST_FULL
      to: NORMAL
      condition: pop_accepted && count < ALMOST_FULL_THRESHOLD
    - from: FULL
      to: ALMOST_FULL
      condition: pop_accepted && count == DEPTH-1
    note: FSM is implicit via count comparisons; no explicit state register. RTL uses wr_ptr/rd_ptr/count directly.
rtl_contract:
  transaction: FM1, FM2, FM3, FM4, FM5, FM6
  sample_condition: Rising PCLK edge when PRESETn is high
  input_map:
    push_enable: wr_en_i
    push_data: wr_data_i
    pop_enable: rd_en_i
    flush: flush_i
  output_map:
    pop_data: rd_data_o
    full_flag: full_o
    empty_flag: empty_o
    almost_full_flag: almost_full_o
    almost_empty_flag: almost_empty_o
    fill_count: count_o
  state_updates:
  - name: wr_ptr
    reset: 0
    expr: (wr_ptr + 1) % DEPTH when push_accepted, else wr_ptr
  - name: rd_ptr
    reset: 0
    expr: (rd_ptr + 1) % DEPTH when pop_accepted, else rd_ptr
  - name: count
    reset: 0
    expr: count + push_accepted - pop_accepted (clamped 0..DEPTH)
  - name: mem[wr_ptr]
    reset: 0
    expr: wr_data_i when push_accepted
timing:
  target_clocks:
  - name: PCLK
    frequency_mhz: 50
    duty_cycle: 0.5
    uncertainty_ns: 0.2
  latency_budget:
    push_acceptance:
      min: 1
      max: 1
      measured_from: wr_en_i rising PCLK edge
      measured_to: data stored in mem and flags updated
    pop_combinational:
      min: 0
      max: 0
      measured_from: rd_en_i rising PCLK edge
      measured_to: rd_data_o valid (USE_OUTPUT_REGISTER=0)
      note: Combinational read from memory array
    pop_registered:
      min: 1
      max: 1
      measured_from: rd_en_i rising PCLK edge
      measured_to: rd_data_o valid (USE_OUTPUT_REGISTER=1)
      note: Registered read output
    flush_latency:
      min: 1
      max: 1
      measured_from: flush_i rising PCLK edge
      measured_to: all pointers cleared and flags reflect empty
    csr_access:
      min: 1
      max: 2
      measured_from: psel && penable
      measured_to: pready && prdata/pslverr valid
  throughput:
    sustained_ops_per_cycle: 1
    conditions: At least one of push or pop accepted per cycle; simultaneous push/pop achieves 2 ops/cycle
  timing_exceptions: []
  io_delays:
    inputs:
    - ports: wr_en_i, rd_en_i, wr_data_i, flush_i
      clock: PCLK
      delay_ns: 2.0
      source: system-level timing budget at 50MHz
    outputs:
    - ports: rd_data_o, full_o, empty_o, almost_full_o, almost_empty_o, count_o
      clock: PCLK
      delay_ns: 2.0
      source: system-level timing budget at 50MHz
  false_paths:
  - from: PRESETn
    to: all_registers
    reason: async reset assertion path
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/setup.rpt
    - sta/out/hold.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_CORE
    voltage: nominal
    clock_domains:
    - pclk
    isolation: not_required_single_domain
  clock_gating:
    required: false
    rationale: Simple FIFO; no explicit low-power mode in this revision
  reset_retention:
    retention_required: false
    reset_value_source: registers and function_model state_variables
  power_states:
  - name: ACTIVE
    entry: PRESETn deasserted
    exit: PRESETn asserted
    guarantees:
    - All FIFO behavior active
  upf_required: false
security:
  classification: non_secure_data_buffer
  assets:
  - name: fifo_data
    protection: No internal access control; external bus fabric enforces privilege
  - name: fifo_config
    protection: APB CSR writes are gated by external psel; no internal privilege check
  threat_model:
  - threat: unauthorized flush
    mitigation: External APB fabric controls psel/penable; flush_i is a direct port controlled by surrounding logic
  - threat: data read from uninitialized memory
    mitigation: empty_o deasserts only after valid push; pop when empty is rejected (FM5)
  privilege_model: No internal privilege levels; access control is external
  safety_goals:
  - Overflow and underflow are silently rejected with no data corruption
  - Flush is deterministic and completes in exactly 1 cycle
error_handling:
  error_sources:
  - id: ERR_OVERFLOW
    condition: wr_en_i=1 while full_o=1
    architectural_effect: Write rejected silently; no state change
    propagation: full_o remains 1; no error flag or interrupt
  - id: ERR_UNDERFLOW
    condition: rd_en_i=1 while empty_o=1
    architectural_effect: Read rejected silently; rd_data_o holds previous value (undefined)
    propagation: empty_o remains 1; no error flag or interrupt
  - id: ERR_APB_UNSUPPORTED
    condition: APB access to unmapped offset
    architectural_effect: pslverr=1, prdata=0
    propagation: Single-cycle error response on APB
  propagation:
  - Overflow and underflow are silently rejected; no error status is latched.
  - APB error is a single-cycle pslverr response.
  recovery:
  - action: none required for overflow/underflow
    clears: []
    preserves:
    - all FIFO state
  - action: APB master must retry or handle pslverr
    clears:
    - pslverr deasserts next cycle
    preserves:
    - all FIFO state
debug_observability:
  waveform_must_probe:
  - wr_ptr, rd_ptr, count
  - wr_en_i, rd_en_i, flush_i
  - full_o, empty_o, almost_full_o, almost_empty_o
  - rd_data_o, wr_data_i
  - push_accepted, pop_accepted (internal)
  status_outputs:
  - count_o (fill level)
  - full_o, empty_o, almost_full_o, almost_empty_o
  trace_events:
  - name: push_accepted
    trigger: wr_en_i && !full_o on rising PCLK
  - name: pop_accepted
    trigger: rd_en_i && !empty_o on rising PCLK
  - name: overflow_reject
    trigger: wr_en_i && full_o on rising PCLK
  - name: underflow_reject
    trigger: rd_en_i && empty_o on rising PCLK
  - name: flush_executed
    trigger: flush_i on rising PCLK
  debug_registers:
  - FIFO_STATUS
  - FIFO_CONTROL
integration:
  bus_attachment:
    data: Direct push/pop ports (valid-ready style)
    control: APB-lite CSR (when USE_APB=1)
  connections:
  - module: fifo_sync_ptrs
    port: clk_i
    signal: PCLK
  - module: fifo_sync_ptrs
    port: rst_ni
    signal: PRESETn
  - module: fifo_sync_mem
    port: clk_i
    signal: PCLK
  - module: fifo_sync_mem
    port: wr_en_i
    signal: push_accepted
  - module: fifo_sync_mem
    port: wr_addr_i
    signal: wr_ptr
  - module: fifo_sync_mem
    port: wr_data_i
    signal: wr_data_i
  - module: fifo_sync_mem
    port: rd_addr_i
    signal: rd_ptr
  - module: fifo_sync_mem
    port: rd_data_o
    signal: mem_rd_data
  - module: fifo_sync_flags
    port: count_i
    signal: count
  - module: fifo_sync_flags
    port: full_o
    signal: full_o
  - module: fifo_sync_flags
    port: empty_o
    signal: empty_o
  - module: fifo_sync_flags
    port: almost_full_o
    signal: almost_full_o
  - module: fifo_sync_flags
    port: almost_empty_o
    signal: almost_empty_o
  - module: fifo_sync_output_reg
    port: din_i
    signal: mem_rd_data
  - module: fifo_sync_output_reg
    port: load_i
    signal: pop_accepted
  - module: fifo_sync_output_reg
    port: dout_o
    signal: rd_data_o
  - module: fifo_sync_regs
    port: clk_i
    signal: PCLK
  - module: fifo_sync_regs
    port: rst_ni
    signal: PRESETn
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: SoC interconnect
    illegal_access_response: pslverr for unsupported APB offset
  dependencies:
    external_modules: []
    external_clocks:
    - PCLK
    external_resets:
    - PRESETn
  integration_notes:
  - Writer must sample full_o and deassert wr_en_i or accept silent rejection.
  - Reader must sample empty_o and deassert rd_en_i or accept undefined data.
  - flush_i can be driven from external logic or APB CSR FIFO_CONTROL.flush bit.
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: PRESETn must be controllable in test mode
    clocks:
    - PCLK
    flush: flush_i provides full state reset for test initialization
  observability:
    required_internal_points:
    - wr_ptr
    - rd_ptr
    - count
    status_flags:
    - full_o
    - empty_o
    - almost_full_o
    - almost_empty_o
    - count_o
  mbist_required: false
  notes: No SRAM macro; behavioral register array only. Update if macro replacement is needed.
synthesis:
  dialect: systemverilog_2012
  top_module: fifo_sync
  technology:
    pdk: generic
    standard_cell_library: generic
    liberty_corner: default
    liberty_env: GENERIC_LIB
    lef_env: GENERIC_LEF
    tech_lef_env: GENERIC_TLEF
    rcx_rules_env: GENERIC_RCX_RULES
  constraints:
  - No inferred latches
  - All flops reset according to clock_reset_domains.reset_scheme
  - No package/interface/modport/function/task/for/while constructs in generated RTL
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
  - syn/out/fifo_sync.json or syn/out/fifo_sync.v
  - syn/out/area.rpt
  - syn/out/timing_summary.rpt
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    buf_list:
    - CLKBUF_4
    - CLKBUF_8
    functional_mode_case_analysis: []
  routing:
    signal_layers:
      min: met1
      max: met5
    clock_layers:
      min: met3
      max: met5
    drc_waivers: []
  required_outputs:
  - pnr/out/floorplan.def
  - pnr/out/placed.def
  - pnr/out/cts.def
  - pnr/out/routed.def
  - pnr/out/routed.v
  - pnr/out/routed.spef
  - pnr/out/pnr.report.md
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/fifo_sync_param.vh
  conventions:
  - nonblocking (<=) in sequential always @(posedge clk …)
  - blocking (=) in combinational always @(*)
  - 'No latches: every combinational branch assigns all outputs (use a default)'
  - 'Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)'
  - Parameterize widths (no hardcoded numbers except in localparam declarations for pointer width calculation)
  - Use rtl/fifo_sync_param.vh for shared parameter declarations when needed; include it inside consuming modules
  - 'ALLOW: input logic / output logic ANSI ports and internal single-driver logic'
  - 'BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv'
  - Use localparam for $clog2-derived constants
  lint_waivers:
  - 'UNUSEDSIGNAL: explicit approved tie-offs only'
  - 'WIDTHEXPAND: count_o wider than minimum when DEPTH+1 is not a power of 2'
reuse_modules: []
custom:
  optional_behavior_policy:
    resolution: Parameterized optional behavior is explicit in SSOT parameters; USE_APB controls APB CSR behavior with reset/default 1, USE_OUTPUT_REGISTER controls read-data register behavior with reset/default 0, and USE_ECC is disabled for this revision with default 0 until ECC encode/decode semantics are specified.
    controlled_features:
    - feature: APB CSR Access
      parameter: USE_APB
      default: 1
      policy: implemented_when_1_disabled_when_0
    - feature: output register read path
      parameter: USE_OUTPUT_REGISTER
      default: 0
      policy: registered_path_when_1_bypass_when_0
    - feature: ECC storage protection
      parameter: USE_ECC
      default: 0
      policy: disabled_in_this_revision_until_semantics_are_specified
    source: rtl_blocked.json OPTIONAL_BEHAVIOR_POLICY
  rtl_blocker_resolutions:
  - id: OPTIONAL_BEHAVIOR_POLICY
    answer: 'Optional prose is resolved into explicit parameter-controlled policy: USE_APB default 1 implements APB CSR behavior, USE_OUTPUT_REGISTER default 0 selects read-data bypass versus register, and USE_ECC default 0 is disabled for this revision because ECC behavior is not specified.'
    source: rtl-gen repair
  assumptions:
  - id: ASM_DEPTH_POWER2
    description: DEPTH is assumed to be a power of 2 for binary wrap-around optimization. Non-power-of-2 DEPTH requires explicit modular arithmetic and is not yet modeled.
    impact: wr_ptr and rd_ptr use binary wrapping; count clamping logic may differ for non-power-of-2
    resolved: false
  - id: ASM_SINGLE_CLOCK
    description: All interfaces are synchronous to PCLK. No CDC is required. Writer and reader are in the same clock domain.
    impact: No synchronizers or gray-code pointers needed
    resolved: true
  - id: ASM_ECC_OPTIONAL
    description: USE_ECC parameter is declared but the ECC encoding/decoding logic is not fully specified. Default USE_ECC=0 disables ECC.
    impact: When USE_ECC=1, parity bits per entry and error detection logic must be defined
    resolved: false
  - id: ASM_APB_OPTIONAL
    description: APB CSR interface is parameterized via USE_APB. When USE_APB=0, the CSR block is not instantiated and APB ports are absent.
    impact: Top-level port list varies by USE_APB parameter; rtl-gen must handle conditional port presence
    resolved: true
  - id: ASM_NO_INTERRUPT
    description: No interrupt outputs. Status is provided via direct flag ports and optional APB CSR.
    impact: No interrupt controller connection required
    resolved: true
  - id: ASM_BEHAVIORAL_MEM
    description: FIFO storage uses a behavioral register array, not an SRAM macro.
    impact: No MBIST, no SRAM compiler integration
    resolved: true
  - id: ASM_UNDERFLOW_READ_VALUE
    description: When pop is attempted on empty FIFO, rd_data_o holds its previous value which is undefined after reset.
    impact: Testbench must not check rd_data_o during underflow
    resolved: true
  - id: ASM_FLUSH_PRIORITY
    description: Flush takes precedence over concurrent push and pop in the same cycle.
    impact: FM6 flush preempts FM1/FM2/FM3
    resolved: true
dir_structure:
  template_dirs:
    rtl: templates/rtl/
    sim: templates/sim/
  output_dirs:
    rtl: rtl/
    sim: sim/
    firmware: firmware/
    docs: docs/
  yaml_dir: yaml/
  generators_dir: generators/
filelist:
  headers:
