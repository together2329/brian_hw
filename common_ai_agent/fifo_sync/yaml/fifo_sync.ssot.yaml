test_requirements:
  scenarios:
  - id: SC1
    name: Push single entry
    stimulus: Assert wr_en_i with wr_data_i=pattern_A while empty (count=0, full_o=0)
    expected: Data stored; count=1; full_o=0; empty_o=0
    checker: Scoreboard verifies count_o increments and readback returns pattern_A
    coverage:
    - FM1
    - S0_SAMPLE_INPUTS
    - S3_WRITE_MEM
  - id: SC2
    name: Pop single entry
    stimulus: Assert rd_en_i when count=1, rd_ptr=0, mem[0]=pattern_A
    expected: rd_data_o=pattern_A; count=0; empty_o=1
    checker: Scoreboard verifies rd_data_o matches pushed pattern and count_o decrements
    coverage:
    - FM2
    - S4_UPDATE_FLAGS
  - id: SC3
    name: Fill to full
    stimulus: Push DEPTH entries sequentially with incrementing data patterns
    expected: full_o=1 after DEPTH pushes; count_o=DEPTH; all entries stored correctly
    checker: Scoreboard verifies full_o assertion timing and FIFO integrity via sequential pop
    coverage:
    - FM1
    - FULL state
  - id: SC4
    name: Overflow rejection
    stimulus: Assert wr_en_i when full_o=1
    expected: No state change; count unchanged; previously stored data intact
    checker: Scoreboard verifies count stability and post-overflow pop integrity
    coverage:
    - FM4
  - id: SC5
    name: Underflow rejection
    stimulus: Assert rd_en_i when empty_o=1
    expected: No state change; count remains 0; rd_data_o holds previous value
    checker: Scoreboard verifies count stability and empty_o persistence
    coverage:
    - FM5
  - id: SC6
    name: Simultaneous push and pop
    stimulus: Assert wr_en_i and rd_en_i simultaneously when 0 < count < DEPTH
    expected: Both accepted; count unchanged; new data pushed; old data popped correctly
    checker: Scoreboard verifies count stability and data integrity for both operations
    coverage:
    - FM3
  - id: SC7
    name: Simultaneous push and pop at boundary
    stimulus: Assert wr_en_i and rd_en_i simultaneously when count=DEPTH (full)
    expected: Push rejected (full), pop accepted; count decrements to DEPTH-1
    checker: Scoreboard verifies count decrement and full_o deassertion
    coverage:
    - FM3
    - FM4
    - boundary
  - id: SC8
    name: Flush when partially full
    stimulus: Push N entries (0 < N < DEPTH), then assert flush_i
    expected: wr_ptr=0; rd_ptr=0; count=0; empty_o=1; full_o=0; all entries invalidated
    checker: Scoreboard verifies complete state reset and flag correctness
    coverage:
    - FM6
  - id: SC9
    name: Flush when full
    stimulus: Fill FIFO to DEPTH, then assert flush_i
    expected: All pointers and count cleared; full_o deasserts; empty_o asserts
    checker: Scoreboard verifies flush-from-full transitions
    coverage:
    - FM6
    - FULL state
  - id: SC10
    name: Flush during simultaneous push/pop
    stimulus: Assert wr_en_i, rd_en_i, and flush_i simultaneously
    expected: Flush takes precedence; push and pop ignored; state reset to empty
    checker: Scoreboard verifies flush priority over concurrent operations
    coverage:
    - FM6
    - priority
  - id: SC11
    name: Almost full threshold
    stimulus: Push entries until count reaches ALMOST_FULL_THRESHOLD
    expected: almost_full_o asserts at threshold; full_o not yet asserted
    checker: Scoreboard verifies almost_full_o assertion timing
    coverage:
    - almost_full
  - id: SC12
    name: Almost empty threshold
    stimulus: Pop entries until count reaches ALMOST_EMPTY_THRESHOLD
    expected: almost_empty_o asserts at threshold; empty_o not yet asserted
    checker: Scoreboard verifies almost_empty_o assertion timing
    coverage:
    - almost_empty
  - id: SC13
    name: APB CSR read status
    stimulus: Push 3 entries, then read FIFO_STATUS register via APB
    expected: FIFO_STATUS.count=3, full=0, empty=0, almost flags per threshold config
    checker: Scoreboard verifies CSR read matches flag/count outputs
    coverage:
    - FM1
    - CSR access
  - id: SC14
    name: APB CSR write config
    stimulus: Write new thresholds via FIFO_CONFIG, push entries to new threshold
    expected: almost_full_o and almost_empty_o reflect updated thresholds
    checker: Scoreboard verifies dynamic threshold update
    coverage:
    - FIFO_CONFIG write
  - id: SC15
    name: APB CSR flush
    stimulus: Push entries, then write FIFO_CONTROL.flush=1 via APB
    expected: FIFO flushed; pointers cleared; FIFO_STATUS reflects empty state
    checker: Scoreboard verifies CSR-triggered flush matches flush_i behavior
    coverage:
    - FM6
    - CSR control
  - id: SC16
    name: APB error response
    stimulus: APB read/write to unmapped offset
    expected: pslverr=1; prdata=0 for reads; no FIFO state change
    checker: Scoreboard verifies error response and state preservation
    coverage:
    - ERR_APB_UNSUPPORTED
  - id: SC17
    name: Wrap-around pointer
    stimulus: Push DEPTH entries, pop DEPTH entries, push again (wr_ptr wraps)
    expected: Pointers wrap correctly; data integrity maintained; count accurate
    checker: Scoreboard verifies pointer wrap-around and data correctness
    coverage:
    - wr_ptr wrap
    - rd_ptr wrap
  - id: SC18
    name: Output register mode
    stimulus: Configure USE_OUTPUT_REGISTER=1; push entry, pop entry
    expected: rd_data_o valid 1 cycle after rd_en_i acceptance; not combinationally
    checker: Scoreboard verifies 1-cycle read latency vs combinational timing
    coverage:
    - USE_OUTPUT_REGISTER=1
  - id: SC19
    name: Reset behavior
    stimulus: Push entries, then assert PRESETn low asynchronously
    expected: All pointers/count cleared; flags reflect empty; rd_data_o undefined
    checker: Scoreboard verifies async reset clears all architectural state
    coverage:
    - reset assertion
  - id: SC20
    name: Reset deassertion
    stimulus: Deassert PRESETn (sync deassert); immediate push on first valid edge
    expected: Push accepted normally; count=1; no glitch on flags
    checker: Scoreboard verifies clean behavior after reset deassertion
    coverage:
    - reset deassertion
  scoreboard_checks: 20
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Cycle-independent behavioral coverage for FIFO push/pop/flush/reject operations.
      bins:
      - id: FCOV_FM1_PUSH
        source_ref: function_model.transactions.FM1
        class: transaction
        description: Legal push (FM1) observed by scoreboard with correct output_rules
      - id: FCOV_FM2_POP
        source_ref: function_model.transactions.FM2
        class: transaction
        description: Legal pop (FM2) observed by scoreboard with correct rd_data_o
      - id: FCOV_FM3_SIMUL
        source_ref: function_model.transactions.FM3
        class: transaction
        description: Simultaneous push/pop (FM3) with count unchanged
      - id: FCOV_FM4_OVERFLOW
        source_ref: function_model.transactions.FM4
        class: error_case
        description: Overflow rejection (FM4) observed
      - id: FCOV_FM5_UNDERFLOW
        source_ref: function_model.transactions.FM5
        class: error_case
        description: Underflow rejection (FM5) observed
      - id: FCOV_FM6_FLUSH
        source_ref: function_model.transactions.FM6
        class: transaction
        description: Flush (FM6) clears all state
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle/handshake/latency/pipeline coverage for FIFO timing behavior.
      bins:
      - id: CCOV_PUSH_1CYCLE
        source_ref: cycle_model.latency.push_accept
        class: latency
        description: Push acceptance completes in exactly 1 cycle
      - id: CCOV_POP_COMB
        source_ref: cycle_model.latency.pop_combinational
        class: latency
        description: Combinational pop read (USE_OUTPUT_REGISTER=0) observed
      - id: CCOV_POP_REG
        source_ref: cycle_model.latency.pop_registered
        class: latency
        description: Registered pop read (USE_OUTPUT_REGISTER=1) observed
      - id: CCOV_FLUSH_1CYCLE
        source_ref: cycle_model.latency.flush
        class: latency
        description: Flush completes in exactly 1 cycle
      - id: CCOV_CSR_0WAIT
        source_ref: cycle_model.latency.register_read
        class: latency
        description: APB CSR read with 0 wait states observed
      - id: CCOV_SIMUL_SAME_CYCLE
        source_ref: cycle_model.pipeline
        class: pipeline_stage
        description: Simultaneous push/pop completes in same cycle
      - id: CCOV_FLUSH_PRIORITY
        source_ref: cycle_model.handshake_rules.flush_i
        class: handshake
        description: Flush priority over concurrent push/pop observed
      - id: CCOV_PTR_WRAP
        source_ref: cycle_model.pipeline.S2_UPDATE_PTRS
        class: boundary
        description: Pointer wrap-around observed at S2_UPDATE_PTRS stage (wr_ptr and rd_ptr)
    functional: 'Legacy alias: function + cycle coverage must both close.'
    line: '>= 90% instrumented line coverage or explicit project waiver'
    branch: '>= 85% instrumented branch coverage or explicit project waiver'
    fsm: 100% declared FSM conceptual states and transitions covered
    assertions: All protocol/order/error assertions pass
quality_gates:
  ssot:
    pass: All canonical sections are present, substantive, internally consistent, and have no live TBD placeholders.
    evidence:
    - check_ssot_disk.sh PASS
    - traceability covers function_model/cycle_model/test_requirements
  rtl_gen:
    profile: production
    target_scale:
      basis: calibrated from approved architecture; small IP with ~5 RTL source files
      source_files_min: 0
      modules_min: 0
      procedural_blocks_min: 0
      state_updates_min: 0
      depth_score_min: 0
      logic_modules_min: 0
      behavior_owner_logic_modules_min: 0
    target_scale_waiver:
      approved: false
      reason: ''
      owner: ''
    pass: SSOT-derived rtl_todo_plan has no blockers/orphans; all implementation TODOs close with fresh compile/lint evidence.
    evidence:
    - rtl/rtl_todo_plan.json
    - rtl/rtl_authoring_provenance.json
    - rtl/rtl_compile.json
    - lint/dut_lint.json
  rtl:
    pass: RTL implements function_model and cycle_model, compiles, and has no unwaived lint warnings.
    evidence:
    - rtl filelist
    - compile log
    - lint report
  dv:
    pass: Every test_requirements scenario has an executable test, expected/got checker, and coverage bin.
    evidence:
    - results.xml
    - coverage.json
    - VCD/FST waveform
  coverage:
    pass: Functional coverage goals pass and code/FSM/assertion coverage meets thresholds or has approved waiver.
    evidence:
    - instrumented coverage report
    - coverage_report.md
  eda:
    pass: Synthesis and STA meet SSOT timing/area/power targets or have explicit signed-off waivers.
    evidence:
    - syn report
    - sta setup/hold report
    - wns.json
  signoff:
    pass: SSOT, RTL, lint, DV, simulation, coverage, and required EDA gates pass with fresh evidence.
    evidence:
    - ATLAS progress signoff pass
    - artifact timestamps newer than final source edits
traceability:
  yaml_to_output:
  - yaml: top_module.name
    output: ALL files (module name)
  - yaml: parameters
    output: rtl/fifo_sync_param.vh (shared parameter include)
  - yaml: io_list.interfaces
    output: rtl/fifo_sync.sv (port list)
  - yaml: registers.register_list
    output: rtl/fifo_sync_regs.sv + firmware/fifo_sync_regs.h + docs/register_map.md
  - yaml: function_model
    output: rtl/fifo_sync_ptrs.sv + tb/cocotb scoreboard/reference model
  - yaml: cycle_model
    output: rtl/fifo_sync_ptrs.sv pointer/handshake logic + waveform checks
  - yaml: timing
    output: sdc/fifo_sync.sdc STA constraints
  - yaml: pnr
    output: floorplan/place/CTS/route TCL and reports
  - yaml: power
    output: UPF/power-state assumptions (none required for this IP)
  - yaml: security
    output: overflow/underflow protection verification
  - yaml: error_handling
    output: RTL silent-reject paths + DV rejection scenarios
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
  - yaml: fsm
    output: rtl/fifo_sync_ptrs.sv pointer/count logic + docs/README.md
  - yaml: test_requirements.scenarios
    output: sim/tb_program.sv
  change_impact_example:
    change: parameters.DATA_WIDTH from 32 to 64
    affected_files:
    - rtl/fifo_sync_param.vh (DATA_WIDTH=64)
    - rtl/fifo_sync_mem.sv (mem array width)
    - rtl/fifo_sync_output_reg.sv (register width)
    - rtl/fifo_sync.sv (port widths)
    - sim/tb_top.sv (signal widths)
workflow_todos:
  fl-model-gen: []
  rtl-gen:
  - id: RTL_TODO_FIFO_PTRS
    content: Implement pointer management and fill counter
    detail: Translate function_model state_variables (wr_ptr, rd_ptr, count) and cycle_model pipeline stages into sequential always block with push/pop acceptance logic. Wrapping is modular at DEPTH. Count
      increments on push, decrements on pop, clamped to [0..DEPTH].
    criteria:
    - wr_ptr and rd_ptr are declared with correct width ($clog2(DEPTH))
    - count is declared with width $clog2(DEPTH+1)
    - Push increments wr_ptr and count when wr_en_i && !full_o && !flush_i
    - Pop increments rd_ptr and decrements count when rd_en_i && !empty_o && !flush_i
    - 'Simultaneous push/pop: both pointers advance, count unchanged'
    - 'Flush: all three reset to 0, priority over push/pop'
    source_refs:
    - function_model.state_variables
    - cycle_model.pipeline
    - fsm.ptr_fsm
    owner_module: fifo_sync_ptrs
    owner_file: rtl/fifo_sync_ptrs.sv
    priority: high
    required: true
  - id: RTL_TODO_FIFO_MEM
    content: Implement dual-port register array storage
    detail: 'Behavioral reg array of DEPTH entries x DATA_WIDTH bits. Write port: mem[wr_ptr] <= wr_data_i on push acceptance. Read port: combinational rd_data_o = mem[rd_ptr] (or routed through output
      register).'
    criteria:
    - Memory array declared as reg [DATA_WIDTH-1:0] mem [0:DEPTH-1]
    - Write occurs when push_accepted
    - Read port drives mem[rd_ptr] combinationally or to output register
    - Memory resets to 0 on async reset
    source_refs:
    - memory.instances.fifo_ram
    - dataflow.write_path
    - dataflow.read_path
    owner_module: fifo_sync_mem
    owner_file: rtl/fifo_sync_mem.sv
    priority: high
    required: true
  - id: RTL_TODO_FIFO_FLAGS
    content: Implement combinational flag generation
    detail: full_o = (count == DEPTH), empty_o = (count == 0), almost_full_o = (count >= ALMOST_FULL_THRESHOLD), almost_empty_o = (count <= ALMOST_EMPTY_THRESHOLD), count_o = count. Flags are combinational
      functions of registered count.
    criteria:
    - All 5 flags/count outputs match function_model output_rules expressions
    - Flags are combinational functions of count
    - Threshold comparisons use parameterized thresholds (runtime-writable via APB when USE_APB=1)
    source_refs:
    - function_model.transactions.FM1.output_rules
    - function_model.transactions.FM2.output_rules
    owner_module: fifo_sync_flags
    owner_file: rtl/fifo_sync_flags.sv
    priority: high
    required: true
  - id: RTL_TODO_FIFO_OUTPUT_REG
    content: Implement optional output register stage
    detail: When USE_OUTPUT_REGISTER=1, insert a pipeline register between mem[rd_ptr] and rd_data_o. Register loads on pop_accepted. When USE_OUTPUT_REGISTER=0, bypass directly.
    criteria:
    - Output register is conditionally instantiated based on USE_OUTPUT_REGISTER parameter
    - 'Registered path: rd_data_o updated 1 cycle after pop_accepted'
    - 'Bypass path: rd_data_o = mem[rd_ptr] combinationally'
    source_refs:
    - parameters.USE_OUTPUT_REGISTER
    - cycle_model.latency.pop_registered
    - cycle_model.latency.pop_combinational
    owner_module: fifo_sync_output_reg
    owner_file: rtl/fifo_sync_output_reg.sv
    priority: medium
    required: true
  - id: RTL_TODO_FIFO_REGS_APB
    content: Implement APB-lite CSR decode block
    detail: Decode paddr into FIFO_STATUS (RO), FIFO_CONFIG (RW), and FIFO_CONTROL (WO). pready always 1. pslverr asserted for unmapped offsets. Flush pulse generated on FIFO_CONTROL.flush write. Threshold
      registers feed into flag comparison.
    criteria:
    - 3 registers decoded per registers.register_list
    - FIFO_STATUS reflects live flags and count
    - FIFO_CONFIG allows dynamic threshold update
    - FIFO_CONTROL.flush generates a 1-cycle flush pulse
    - pready always 1; pslverr for unmapped addresses
    - Conditionally instantiated based on USE_APB parameter
    source_refs:
    - registers.register_list
    - io_list.interfaces.apb_csr
    owner_module: fifo_sync_regs
    owner_file: rtl/fifo_sync_regs.sv
    priority: medium
    required: true
  - id: RTL_TODO_FIFO_TOP
    content: Implement top-level integration and wiring
    detail: Instantiate fifo_sync_mem, fifo_sync_ptrs, fifo_sync_flags, fifo_sync_output_reg, and fifo_sync_regs (conditional) with named port connections matching integration.connections. Wire top-level
      ports to sub-module ports.
    criteria:
    - All sub_modules instantiated with correct port maps per integration.connections
    - USE_APB controls whether fifo_sync_regs is instantiated
    - USE_OUTPUT_REGISTER controls output register path
    - Top-level ports match io_list exactly
    source_refs:
    - integration.connections
    - io_list.interfaces
    - sub_modules
    owner_module: fifo_sync
    owner_file: rtl/fifo_sync.sv
    priority: high
    required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
  - name: validate_ssot
    command: bash workflow/ssot-gen/scripts/check_ssot_disk.sh fifo_sync
    description: Validate production SSOT structure, function_model, cycle_model, DV plan, and quality gates
  - name: handoff_fl_model
    command: /ssot-fl-model fifo_sync
    description: fl-model-gen writes FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals fifo_sync
    description: fl-model-gen derives FL-vs-RTL equivalence goals for TB scoreboards and sim_debug
  - name: handoff_rtl
    command: /ssot-rtl fifo_sync
    description: rtl-gen writes RTL directly from the SSOT and proves compile/lint gates
  - name: handoff_tb
    command: /ssot-tb fifo_sync
    description: tb-gen writes pyuvm/cocotb tests, runs simulation, emits results XML, VCD, and functional coverage
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: sim_debug inspects waveform, failures, coverage evidence, and escalation ownership
  - name: handoff_coverage
    command: /coverage fifo_sync
    description: coverage workflow measures SSOT-declared functional/code/toggle/FSM/assertion goals
  - name: handoff_eda
    command: /syn fifo_sync && /sta fifo_sync && /pnr fifo_sync && /sta-post fifo_sync
    description: EDA workflows produce SSOT-declared synthesis, STA, PnR, and post-route STA evidence when quality_gates require it
  atlas_workflows:
  - ssot-gen
  - rtl-gen
  - tb-gen
  - sim_debug
  - coverage
  - syn
  - pnr
  - sta
  - sta-post
