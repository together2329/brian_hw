top_module: simple_bus
version: 0.1.0
type: bus
description: Tiny one-master one-slave interconnect for smoke testing.
ports:
  - {name: clk, direction: input, width: 1}
  - {name: rst_n, direction: input, width: 1}
  - {name: s_addr, direction: input, width: 16}
  - {name: s_wdata, direction: input, width: 32}
  - {name: s_rdata, direction: output, width: 32}
  - {name: s_valid, direction: input, width: 1}
  - {name: s_write, direction: input, width: 1}
  - {name: s_ready, direction: output, width: 1}
  - {name: m_addr, direction: output, width: 16}
  - {name: m_wdata, direction: output, width: 32}
  - {name: m_rdata, direction: input, width: 32}
  - {name: m_valid, direction: output, width: 1}
  - {name: m_write, direction: output, width: 1}
  - {name: m_ready, direction: input, width: 1}
clocks:
  - {name: clk, period_ns: 10.0, source_port: clk}
resets:
  - {name: rst_n, polarity: active_low, source_port: rst_n}
busInterfaces:
  - {name: S_CPU, proto: SIMPLE, role: slave, side: left, width: 32}
  - {name: M_MEM, proto: SIMPLE, role: master, side: right, width: 32}
sub_modules:
  - {name: simple_bus_route, file: rtl/simple_bus_route.sv, ownership: manifest, ssot_gen: true, description: Pass-through route stage}
parameters:
  - {name: ADDR_WIDTH, default: 16, type: int}
  - {name: DATA_WIDTH, default: 32, type: int}
features:
  - Direct pass-through bus path
filelist:
  rtl:
    - rtl/simple_bus_route.sv
    - rtl/simple_bus.sv
