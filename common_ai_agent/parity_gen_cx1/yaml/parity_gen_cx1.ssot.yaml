# =============================================================================
# parity_gen_cx1.ssot.yaml — 8-bit even/odd parity generator (combinational + registered)
# =============================================================================
top_module:
  name: parity_gen_cx1
  file: rtl/parity_gen_cx1.sv
  version: "1.0"
  type: peripheral
  description: "8-bit even/odd parity generator. even_par = XOR of all 8 data bits (combinational). odd_par = ~even_par. par_reg latches even_par on each rising clock edge."
  reference_spec: "user-defined"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: parity_comb, kind: datapath, source_refs: [function_model.transactions], rtl_candidates: [parity_gen_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: parity_reg,  kind: control,  source_refs: [function_model.transactions], rtl_candidates: [parity_gen_cx1], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: parity_gen_cx1
    file: rtl/parity_gen_cx1.sv
    ownership: manifest
    ssot_gen: true
    source_sections: [io_list, function_model]
    implements: [io_list.interfaces.data_input, function_model.transactions]
    register_refs: []
    function_model_refs: [function_model.transactions.FM_PARITY]
    description: "8-bit parity generator. even_par is combinational XOR. par_reg is registered even_par."

parameters: []

io_list:
  clock_domains:
    - name: clk_domain
      frequency_mhz: 50
      description: "System clock"
      ports:
        - { name: clk, width: 1, direction: input, timing: { kind: clock } }
  resets:
    - name: rst_n
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "Active-low async assert / sync deassert reset"
      ports:
        - { name: rst_n, width: 1, direction: input, timing: { kind: sync, clock_domain: clk_domain } }
  interfaces:
    - name: data_input
      type: custom
      clock_domain: clk_domain
      reset_domain: rst_n
      description: "8-bit data input and parity outputs"
      ports:
        - { name: data_in,  width: 8, direction: input,  timing: { kind: sync, clock_domain: clk_domain }, description: "8-bit input data" }
        - { name: even_par, width: 1, direction: output, timing: { kind: sync, clock_domain: clk_domain }, description: "Even parity (XOR of all bits, combinational)" }
        - { name: odd_par,  width: 1, direction: output, timing: { kind: sync, clock_domain: clk_domain }, description: "Odd parity (~even_par, combinational)" }
        - { name: par_reg,  width: 1, direction: output, timing: { kind: sync, clock_domain: clk_domain }, description: "Registered even parity (latched on rising clk)" }

features:
  - name: Even parity (combinational)
    trigger: "data_in changes"
    datapath: "even_par = ^data_in"
    control: "Combinational"
    output: "even_par"
  - name: Odd parity (combinational)
    trigger: "data_in changes"
    datapath: "odd_par = ~even_par"
    control: "Combinational"
    output: "odd_par"
  - name: Registered parity
    trigger: "Rising clk edge"
    datapath: "par_reg <= even_par"
    control: "Clocked; reset clears to 0"
    output: "par_reg"

registers:
  config:
    register_width: 1
    addr_width: 0
    byte_addressable: false
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "No CSR registers"
  register_list: []

memory:
  instances: []
  note: "No FIFO/SRAM."

interrupts:
  sources: []
  output: null
  note: "No interrupts."

fsm:
  parity_ff:
    states: [IDLE]
    transitions: []

rtl_contract:
  transaction: FM_PARITY
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: "rst_n == 1"
  input_map:
    data_in: data_in
  output_map:
    even_par: even_par
    odd_par: odd_par
    par_reg: par_reg

function_model:
  purpose: "Executable FL contract"
  state_variables:
    - { name: par_reg_q, source: io_list.interfaces.data_input, reset: 0, description: "Registered parity state" }
  transactions:
    - id: FM_PARITY
      name: parity_compute
      behavioral_contract_refs: [BC_PAR_FUNC]
      preconditions: ["rst_n == 1"]
      inputs: [data_in]
      outputs: ["even_par = ^data_in, odd_par = ~even_par, par_reg = par_reg_q (next cycle = even_par)"]
      output_rules:
        - { name: even_rule, port: even_par, expr: "data_in & 1 ^ (data_in >> 1 & 1) ^ (data_in >> 2 & 1) ^ (data_in >> 3 & 1) ^ (data_in >> 4 & 1) ^ (data_in >> 5 & 1) ^ (data_in >> 6 & 1) ^ (data_in >> 7 & 1)", width: 1, description: "XOR of all 8 input bits" }
        - { name: odd_rule,  port: odd_par,  expr: "1 - (data_in & 1 ^ (data_in >> 1 & 1) ^ (data_in >> 2 & 1) ^ (data_in >> 3 & 1) ^ (data_in >> 4 & 1) ^ (data_in >> 5 & 1) ^ (data_in >> 6 & 1) ^ (data_in >> 7 & 1))", width: 1, description: "Inversion of even_par" }
        - { name: par_reg_rule, port: par_reg, expr: "par_reg_q", width: 1, description: "Registered parity (previous cycle even_par)" }
      state_updates:
        - { name: par_reg_q, expr: "data_in & 1 ^ (data_in >> 1 & 1) ^ (data_in >> 2 & 1) ^ (data_in >> 3 & 1) ^ (data_in >> 4 & 1) ^ (data_in >> 5 & 1) ^ (data_in >> 6 & 1) ^ (data_in >> 7 & 1)", width: 1 }
      side_effects: ["par_reg_q updated each clock"]
      error_cases: []
    - id: FM_RESET
      name: reset
      behavioral_contract_refs: [BC_PAR_RESET]
      preconditions: ["rst_n == 0"]
      inputs: [data_in]
      outputs: ["par_reg=0"]
      output_rules:
        - { name: par_reg_rule, port: par_reg, expr: "0", width: 1 }
      state_updates:
        - { name: par_reg_q, expr: "0", width: 1 }
      side_effects: ["par_reg cleared to 0"]
      error_cases: []
  invariants:
    - "even_par = ^data_in (combinational XOR reduction)"
    - "odd_par = ~even_par (combinational)"
    - "par_reg is even_par delayed by 1 clock cycle"

cycle_model:
  purpose: "Cycle contract"
  executable: python
  cosim: true
  clock: clk
  reset:
    assertion: "rst_n low clears par_reg_q=0 -> par_reg=0."
    deassertion: "First rising clk enables par_reg updates."
  latency:
    even_odd_par: { min_cycles: 0, max_cycles: 0 }
    par_reg:       { min_cycles: 1, max_cycles: 1 }
  handshake_rules:
    - { signal: even_par, rule: "Combinational — reflects data_in immediately", behavioral_contract_refs: [BC_PAR_FUNC] }
    - { signal: par_reg,  rule: "Registered — reflects even_par from previous cycle", behavioral_contract_refs: [BC_PAR_FUNC] }
    - { signal: par_reg,  rule: "Cleared to 0 when rst_n=0", behavioral_contract_refs: [BC_PAR_RESET] }
  pipeline:
    - { stage: S0_COMB, cycle: 0, action: "even_par = ^data_in, odd_par = ~even_par (combinational)", behavioral_contract_refs: [BC_PAR_FUNC] }
    - { stage: S1_REG,  cycle: 1, action: "par_reg <= even_par on rising clk", behavioral_contract_refs: [BC_PAR_FUNC] }
    - { stage: S0_RESET, cycle: 0, action: "par_reg <= 0 when rst_n=0 (async reset)", behavioral_contract_refs: [BC_PAR_RESET] }
  ordering:
    - "even_par/odd_par update combinationally when data_in changes."
    - "par_reg updates on clock edge."
  backpressure: ["No backpressure."]
  performance:
    frequency_mhz: 50
    throughput: { computes_per_cycle: 1 }
  observability:
    - "even_par/odd_par/par_reg observable each cycle."

clock_reset_domains:
  domains:
    - { name: clk, frequency_mhz: 50 }
  reset_scheme:
    signal: rst_n
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: data_in,  sink: even_par,  path: "^data_in -> even_par (combinational)" }
    - { id: sequence_1, source: even_par, sink: odd_par,   path: "~even_par -> odd_par (combinational)" }
    - { id: sequence_2, source: even_par, sink: par_reg,   path: "even_par -> par_reg_q on clk edge" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]

security:
  classifications: []

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources", architectural_effect: "No error outputs" }

debug_observability:
  signals:
    - { name: par_reg_q, source: function_model.state_variables.par_reg_q, description: "Registered parity state" }

dft:
  scan: { enabled: false }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [clk, rst_n, data_in, even_par, odd_par, par_reg]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file."

test_requirements:
  scenarios:
    - id: SC1
      name: "Reset — par_reg=0"
      stimulus: "Assert rst_n=0"
      expected: "par_reg=0"
      checker: "Scoreboard checks par_reg=0 after reset."
      coverage: [reset, FM_RESET]
      stimulus_machine_spec:
        assign: { data_in: 0 }
    - id: SC2
      name: "All zeros — even parity 0"
      stimulus: "data_in=0x00"
      expected: "even_par=0, odd_par=1"
      checker: "Scoreboard verifies even_par=0, odd_par=1."
      coverage: [FM_PARITY]
      stimulus_machine_spec:
        timeline:
          - { assign: { data_in: 0 } }
    - id: SC3
      name: "0x01 — even parity 1"
      stimulus: "data_in=0x01 (one bit set)"
      expected: "even_par=1, odd_par=0"
      checker: "Scoreboard verifies even_par=1, odd_par=0."
      coverage: [FM_PARITY]
      stimulus_machine_spec:
        timeline:
          - { assign: { data_in: 1 } }
    - id: SC4
      name: "0xFF — even parity 0 (8 bits set)"
      stimulus: "data_in=0xFF"
      expected: "even_par=0, odd_par=1"
      checker: "Scoreboard verifies even_par=0, odd_par=1."
      coverage: [FM_PARITY]
      stimulus_machine_spec:
        timeline:
          - { assign: { data_in: 255 } }
    - id: SC5
      name: "Registered parity latches after clock"
      stimulus: "data_in=0x01; wait 1 cycle"
      expected: "par_reg=1 one cycle after data_in=0x01"
      checker: "Scoreboard verifies par_reg=even_par delayed by 1 clk."
      coverage: [FM_PARITY]
      stimulus_machine_spec:
        timeline:
          - { assign: { data_in: 1 } }
  scoreboard_checks:
    - "even_par = ^data_in (combinational)"
    - "odd_par = ~even_par (combinational)"
    - "par_reg equals even_par from the previous clock cycle"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: PARITY_GEN_CX1_BRINGUP, description: "Full ROCEV flow for parity_gen_cx1 (ssot/fl/rtl/tb/sim)", status: planned }
