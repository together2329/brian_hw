  top_y: 560.0
- id: counter_0
  ssot: counter/yaml/counter.ssot.yaml
  top_x: 170.0
  top_y: 560.0
- id: simple_uart3
  ssot: simple_uart3/yaml/simple_uart3.ssot.yaml
  addr: '0x4000_4000'
  top_x: 560.0
  top_y: 760.0
- id: simple_gpio3
  ssot: simple_gpio3/yaml/simple_gpio3.ssot.yaml
  addr: '0x4000_5000'
