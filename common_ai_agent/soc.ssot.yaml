  top_y: 1280.0
connections:
- from: cortexa15_0/M_ACE
  to: cci550/S0_ACE
  proto: ACE
- from: cci550/M_AXI
  to: ddr_phy/S_AXI
  proto: AXI4
- from: spi_master/IRQ
  to: gic_400/IRQ_M
  proto: IRQ
- from: cci550/M_APB
  to: simple_uart3/S_APB
  proto: APB
- from: cci550/M_APB
  to: simple_gpio3/S_APB
  proto: APB
- from: cci550/M_APB
  to: simple_pwm3/S_APB
  proto: APB
- from: simple_uart3/IRQ
  to: gic_400/IRQ_M
  proto: IRQ
- from: simple_gpio3/IRQ
  to: gic_400/IRQ_M
  proto: IRQ
- from: simple_pwm3/IRQ
  to: gic_400/IRQ_M
  proto: IRQ
addrMap:
- name: gic_400
  base: '0x0800_0000'
  range: '0x0000_1000'
- name: spi_master
  base: '0x4000_2000'
  range: '0x0000_1000'
- name: ddr_phy
  base: '0x8000_0000'
  range: '0x4000_0000'
- name: simple_uart3
  base: '0x4000_4000'
  range: '0x0000_1000'
- name: simple_gpio3
  base: '0x4000_5000'
  range: '0x0000_1000'
- name: simple_pwm3
  base: '0x4000_6000'
  range: '0x0000_1000'
