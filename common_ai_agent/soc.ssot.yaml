name: aurora_soc
version: 0.2.0
top_ssot: aurora_soc/yaml/aurora_soc.ssot.yaml
clusters:
- id: cpu_ss
  role: CPU
  members:
  - cortexa15_0
  - cortexa15_0_0
- id: noc
  role: BUS
  members:
  - cci550
- id: mem_ss
  role: MEM
  members:
  - ddr_phy
  - ddr_phy_0
- id: periph_ss
  role: PERIPH
  members:
  - spi_master
  - gic_400
  - counter
  - counter_0
  - simple_uart3
  - simple_gpio3
  - simple_pwm3
- id: uncategorized
  role: PERIPH
  label: Uncategorized (auto-imported)
  members:
  - uart_lite
instances:
- id: cortexa15_0
  ssot: cortexa15_0/yaml/cortexa15_0.ssot.yaml
- id: cci550
  ssot: cci550/yaml/cci550.ssot.yaml
- id: ddr_phy
