- id: spi_master
  ssot: spi_master/yaml/spi_master.ssot.yaml
  addr: '0x4000_2000'
  x: 100.0
  y: 200.0
- id: gic_400
  ssot: gic_400/yaml/gic_400.ssot.yaml
  addr: '0x0800_0000'
- id: uart_lite
  ssot: uart_lite/yaml/uart_lite.ssot.yaml
- id: counter
  ssot: counter/yaml/counter.ssot.yaml
  top_x: 620.0
  top_y: 600.0
- id: cortexa15_0_0
  ssot: cortexa15_0/yaml/cortexa15_0.ssot.yaml
