workflow_todos:
  fl-model-gen:
  - id: FL_GPIO_REF_001
    content: Author executable GPIO functional model
    detail: Implement Python reference model for FM1..FM4 with per-bit direction masking and reset dominance
    criteria:
    - Model produces expected dir_q/dout_q/din_q/oe_o/pad_o per cycle
    - Model API consumable by cocotb/pyuvm scoreboard
    source_refs:
    - function_model
    - cycle_model
    priority: high
    required: true
  rtl-gen:
  - id: RTL_GPIO_001
    content: Implement sequential register block for direction/output
    detail: Create gpio_regs.sv with async active-low reset, latching dir_in->dir_q and dout_in->dout_q on each rising edge
    criteria:
    - Reset clears both vectors to zero
    - One-cycle sampling latency from inputs to q-state
    source_refs:
    - function_model.transactions.FM1_LATCH_CONTROL
    - cycle_model.pipeline.S1_LATCH_CONTROL
    - rtl_contract.sequential_contract
    owner_module: gpio_regs
    owner_file: rtl/gpio_regs.sv
    priority: high
    required: true
  - id: RTL_GPIO_002
    content: Implement input sampler with hold-on-output semantics
    detail: Create gpio_input_sampler.sv so din_q updates only where dir_q bit is 0; output bits hold previous value
    criteria:
    - Per-bit masked sampling matches FM2
    - No unintended updates for output-configured bits
    source_refs:
    - function_model.transactions.FM2_SAMPLE_INPUTS
    - cycle_model.handshake_rules.HR_INPUT_MASK_SAMPLE
    - rtl_contract.sequential_contract
    owner_module: gpio_input_sampler
    owner_file: rtl/gpio_input_sampler.sv
    priority: high
    required: true
  - id: RTL_GPIO_003
    content: Implement combinational pad drive logic
    detail: Create gpio_pad_logic.sv to derive oe_o and pad_o from dir_q/dout_q with pad_o zero when configured input
    criteria:
    - oe_o bitwise-equals dir_q
    - pad_o masked to zero for input bits
    source_refs:
    - function_model.transactions.FM3_DRIVE_PAD_OUTPUTS
    - cycle_model.pipeline.S3_DRIVE_OUTPUTS
    - rtl_contract.combinational_contract
    owner_module: gpio_pad_logic
    owner_file: rtl/gpio_pad_logic.sv
    priority: high
    required: true
  - id: RTL_GPIO_004
    content: Integrate submodules in top
    detail: Wire gpio.sv ports and internal signals per integration.connections, preserving single clock/reset domain
    criteria:
    - Port-level connectivity exactly matches io_list
    - No combinational loops and clean lint
    source_refs:
    - integration.connections
    - io_list
    - sub_modules
    owner_module: gpio
    owner_file: rtl/gpio.sv
    priority: medium
    required: true
  tb-gen:
  - id: TB_GPIO_001
    content: Build directed and randomized tests from scenarios
    detail: Create cocotb/pyuvm tests for SC1..SC6 with scoreboard linked to FL model
    criteria:
    - All scenarios execute and pass
    - Coverage bins FCOV/CCOV are sampled
    source_refs:
    - test_requirements.scenarios
    - test_requirements.coverage_goals
    priority: high
    required: true
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
  - name: validate_ssot
    command: bash workflow/ssot-gen/scripts/check_ssot_disk.sh gpio
    description: Validate production SSOT structure and quality gates
  - name: handoff_fl_model
    command: /ssot-fl-model gpio
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals gpio
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl gpio
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb gpio
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
rtl_contract:
  top: gpio
  reset_behavior:
  - rst_n low asynchronously clears dir_q, dout_q, din_q to zero
  - oe_o and pad_o resolve to zero when state is zero
  combinational_contract:
  - oe_o equals dir_q bitwise
  - 'pad_o[i] = (dir_q[i]) ? dout_q[i] : 1''b0'
  sequential_contract:
  - On each rising edge, dir_q<=dir_in and dout_q<=dout_in
  - On each rising edge, din_q[i]<=pad_in[i] when dir_q[i]==0 else hold previous
  forbidden_behaviors:
  - Driving pad_o high when dir_q bit is 0
  - Updating din_q output-configured bits without reset
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM1_LATCH_CONTROL
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: legal transaction accepted under cycle_model.handshake_rules
  input_map:
    dir_in: dir_in
    dout_in: dout_in
    pad_in: pad_in
  output_map:
    oe_o: oe_o
    pad_o: pad_o
    dir_q: dir_q
    dout_q: dout_q
    din_q: din_q
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transaction.
  - Input sampling and output observation follow cycle_model handshake and latency rules.
