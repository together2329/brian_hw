# ============================================================================
# smbus.ssot.yaml — Single Source of Truth for SMBus Controller
# ============================================================================
top_module:
  name: smbus
  type: "peripheral"
  description: "SMBus 2.0 controller with APB4 slave interface, 7-bit addressing, Standard (100kHz) mode"
  dialect: "verilog_2001"
  author: "AI Agent"
  version: "1.0.0"

parameters:
  - name: CLK_FREQ_HZ
    default: 100000000
  - name: SMB_FREQ_HZ
    default: 100000

function_model:
  state_variables:
    - { name: state,       width: 4,  reset: 0,   description: "Main FSM state" }
    - { name: shift_reg,   width: 8,  reset: 0,   description: "Shift register for TX/RX" }
    - { name: bit_cnt,     width: 4,  reset: 0,   description: "Bit counter" }
    - { name: addr_reg,    width: 7,  reset: 0,   description: "Target slave address" }
    - { name: data_reg,    width: 8,  reset: 0,   description: "Data register" }
    - { name: busy,        width: 1,  reset: 0,   description: "Bus busy flag" }
    - { name: nack_flag,   width: 1,  reset: 0,   description: "NACK received flag" }

  transactions:
    - id: write_byte
      name: write_byte
      description: "Send one data byte to slave after START + address phase"
      sample_condition: "cmd_write && !busy"
      inputs:
        - { name: addr,  width: 7 }
        - { name: data,  width: 8 }
      output_rules:
        - { name: sda_out, expr: "shift_reg[7]" }
        - { name: scl_out, expr: "clk_div_tick" }
      state_updates:
        - { name: state,     value: "STATE_ADDR" }
        - { name: shift_reg, value: "addr << 1" }
        - { name: busy,      value: "1" }

    - id: read_byte
      name: read_byte
      description: "Receive one data byte from slave"
      sample_condition: "cmd_read && !busy"
      inputs:
        - { name: addr, width: 7 }
      output_rules:
        - { name: sda_out, expr: "1" }
        - { name: scl_out, expr: "clk_div_tick" }
      state_updates:
        - { name: state,     value: "STATE_ADDR" }
        - { name: shift_reg, value: "(addr << 1) | 1" }
        - { name: busy,      value: "1" }

    - id: send_stop
      name: send_stop
      description: "Generate STOP condition on bus"
      sample_condition: "state == STATE_STOP"
      inputs: []
      output_rules:
        - { name: sda_out, expr: "1" }
        - { name: scl_out, expr: "1" }
      state_updates:
        - { name: state, value: "STATE_IDLE" }
        - { name: busy,  value: "0" }

  invariants:
    - { name: busy_mutex,   expression: "!(cmd_write && cmd_read)",           description: "Write and read commands are mutually exclusive" }
    - { name: addr_7bit,    expression: "addr_reg < 128",                     description: "Address is always 7-bit" }
    - { name: idle_on_rst,  expression: "rst_n == 0 -> state == STATE_IDLE",  description: "Reset drives state to IDLE" }

cycle_model:
  clock: clk
  reset: rst_n
  latency:
    write_byte:
      min_cycles: 9
      max_cycles: 9
    read_byte:
      min_cycles: 9
      max_cycles: 9
    send_stop:
      min_cycles: 1
      max_cycles: 1
    default:
      min_cycles: 1
      max_cycles: 1
  outstanding: 1
  handshake_rules:
    - name: valid_ready
      description: "Transaction accepted when cmd_valid && !busy"
      predicate: "cmd_valid && !busy"
    - name: ack_check
      description: "ACK received from slave after address phase"
      predicate: "ack_received"
    - name: stop_after_nack
      description: "STOP condition issued after NACK"
      predicate: "nack_flag -> stop_issued"
  ordering:
    - name: start_before_data
      description: "START condition must precede data transfer"
    - name: address_before_data
      description: "Address phase must complete before data phase"
  arbitration:
    - name: bus_arbitration
      description: "Lost arbitration detected when SDA driven high but reads low"
