top_module: simple_gpio3
parameters:
  - name: WIDTH
    value: 16
  - name: HAS_IRQ
    value: 1
clocks:
  - name: clk
    period_ns: 10.0
    source_port: clk
resets:
  - name: rst_n
    polarity: active_low
    source_port: rst_n
ports:
  - name: clk
    dir: input
    width: 1
    kind: clock
  - name: rst_n
    dir: input
    width: 1
    kind: reset
  - name: psel
    dir: input
    width: 1
    bus: S_APB
  - name: penable
    dir: input
    width: 1
    bus: S_APB
  - name: pwrite
    dir: input
    width: 1
    bus: S_APB
  - name: paddr
    dir: input
    width: 12
    bus: S_APB
  - name: pwdata
    dir: input
    width: 32
    bus: S_APB
  - name: prdata
    dir: output
    width: 32
    bus: S_APB
  - name: pready
    dir: output
    width: 1
    bus: S_APB
  - name: pslverr
    dir: output
    width: 1
    bus: S_APB
  - name: gpio_i
    dir: input
    width: 16
    bus: GPIO
  - name: gpio_o
    dir: output
    width: 16
    bus: GPIO
  - name: gpio_oe
    dir: output
    width: 16
    bus: GPIO
  - name: irq
    dir: output
    width: 1
    bus: IRQ
busInterfaces:
  - name: S_APB
    proto: APB
    role: slave
    side: left
    width: 32
  - name: IRQ
    proto: IRQ
    role: master
    side: right
    width: 1
  - name: GPIO
    proto: GPIO
    role: master
    side: right
    width: 16
memoryMap:
  - name: regs
    base: 0x4000_5000
    range: 0x1000
sub_modules:
  - name: simple_gpio3_regs
    file: rtl/simple_gpio3_regs.sv
    ownership: manifest
    role: apb_register_bank
  - name: simple_gpio3_pins
    file: rtl/simple_gpio3_pins.sv
    ownership: manifest
    role: pin_direction_data_path
  - name: simple_gpio3_irq
    file: rtl/simple_gpio3_irq.sv
    ownership: manifest
    role: edge_interrupt_controller
