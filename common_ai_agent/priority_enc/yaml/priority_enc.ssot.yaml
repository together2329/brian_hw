# =============================================================================
# SSOT: priority_enc — 8-Input Priority Encoder with APB-Lite CSR
# =============================================================================
top_module:
  name: "priority_enc"
  file: "rtl/priority_enc.sv"
  version: "1.0"
  type: "peripheral"
  description: "Parameterized N-input priority encoder with registered output, APB-Lite CSR for runtime configuration, and interrupt on valid detection."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "priority_enc_core", file: "rtl/priority_enc_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model.transactions", "cycle_model.pipeline", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions.PRI_ENCODE", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow.encode_path"], feature_refs: ["features.priority_encode", "features.input_masking", "features.valid_generation"], description: "Core priority encoding datapath and registered output" }
  - { name: "priority_enc_regs", file: "rtl/priority_enc_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "io_list.interfaces.apb_slave", "error_handling"], source_sections: ["registers", "io_list", "error_handling"], register_refs: ["registers.register_list"], description: "APB-Lite CSR register decode and read/write logic" }
decomposition:
  units:
    - { id: "encode", kind: "datapath", source_refs: ["function_model.transactions.PRI_ENCODE"], rtl_candidates: ["priority_enc_core"], verification_impact: ["test_requirements.scenarios.SC1", "test_requirements.scenarios.SC2"] }
    - { id: "register_access", kind: "control", source_refs: ["io_list.interfaces.apb_slave", "registers.register_list"], rtl_candidates: ["priority_enc_regs"], verification_impact: ["test_requirements.scenarios.SC3", "test_requirements.scenarios.SC4"] }
parameters:
  - { name: "NUM_INPUTS", default: 8, type: int, description: "Number of priority request inputs (must be power of 2, 2..256)", drives: ["priority_enc_core.sv", "priority_enc_regs.sv"] }
  - { name: "OUTPUT_WIDTH", default: 3, type: int, description: "Width of encoded output port = $clog2(NUM_INPUTS)", drives: ["priority_enc_core.sv", "priority_enc.sv"] }
  - { name: "MASK_WIDTH", default: 8, type: int, description: "Per-input mask width = NUM_INPUTS", drives: ["priority_enc_regs.sv", "priority_enc_core.sv"] }
  - { name: "APB_ADDR_WIDTH", default: 8, type: int, description: "APB address bus width", drives: ["priority_enc_regs.sv"] }
  - { name: "APB_DATA_WIDTH", default: 32, type: int, description: "APB data bus width", drives: ["priority_enc_regs.sv"] }
  - { name: "LATENCY_CYCLES", default: 1, type: int, description: "Output registration latency (1=registered, 0=combinational)", drives: ["priority_enc_core.sv"] }
  - { name: "RESET_POLARITY", default: "active_low", type: enum, values: ["active_low", "active_high"], drives: ["ALL .sv files"] }
  - { name: "CLOCK_FREQ_MHZ", default: 50, type: int, description: "Target clock frequency in MHz for timing closure", drives: ["sdc/priority_enc.sdc", "tb/tb_top.sv"] }
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "Main system clock"
      ports:
        - { name: "pclk", width: 1, direction: "input", description: "System clock" }

  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Main system reset"
      ports:
        - { name: "presetn", width: 1, direction: "input", description: "Active-low asynchronous reset, synchronous deassert" }

  interfaces:
    - name: "apb_slave"
      type: "APB-Lite"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "APB-Lite register access interface for CSR read/write"
      protocol:
        setup_phase: "psel=1, penable=0 captures address/control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata is sampled in the completing access phase for writes."
        error_rule: "pslverr=1 for unsupported address or illegal access; always completes with pready=1."
      ports:
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write (1=write, 0=read)" }
        - { name: "paddr",   width: 8,  direction: "input",  description: "APB address bus" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready (always 1 for no-wait)" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB slave error" }

    - name: "request_inputs"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Priority request inputs — bit N corresponds to input N"
      protocol:
        sampling: "Sampled on every rising pclk edge when presetn is high."
        stability: "Must be stable around the rising clock edge for correct registered capture."
        priority_order: "Bit NUM_INPUTS-1 has highest priority; bit 0 has lowest."
      ports:
        - { name: "req_i", width: 8, direction: "input", description: "Priority request inputs (parameterized width, default 8-bit)" }

    - name: "encoded_output"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Encoded priority output and valid flag"
      protocol:
        valid_rule: "valid_o is high when at least one unmasked request is active."
        encoding_rule: "enc_o encodes the index of the highest-priority active unmasked request."
        registration: "When LATENCY_CYCLES=1, outputs are registered; when 0, outputs are combinational."
      ports:
        - { name: "enc_o",   width: 3, direction: "output", description: "Encoded index of highest-priority active request (parameterized width = $clog2(NUM_INPUTS))" }
        - { name: "valid_o", width: 1, direction: "output", description: "At least one unmasked request is active" }

    - name: "interrupt"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Interrupt output — asserts on valid detection when enabled"
      protocol:
        assertion: "irq_o reflects enabled pending interrupt status (level-triggered)."
        deassertion: "irq_o deasserts after W1C clear of corresponding status bit."
        reset_value: 0
      ports:
        - { name: "irq_o", width: 1, direction: "output", description: "Level-triggered interrupt output" }
features:
  - name: "Priority Encode"
    trigger: "req_i input changes on any rising PCLK edge"
    datapath: "req_i masked by REQ_MASK register -> priority tree resolves highest-index active bit -> result registered in output flop -> driven on enc_o/valid_o"
    control: "No FSM; pure combinational priority resolve followed by optional output register (LATENCY_CYCLES parameter)"
    output: "enc_o = index of highest-priority unmasked active request; valid_o = 1 if any unmasked request is active"

  - name: "Input Masking"
    trigger: "Software writes REQ_MASK register via APB"
    datapath: "REQ_MASK[N]=0 blocks input N from priority resolution; REQ_MASK[N]=1 enables input N"
    control: "Mask applied combinationally before priority tree"
    output: "Masked requests are invisible to priority resolution and valid_o"

  - name: "Interrupt Generation"
    trigger: "valid_o rising edge when IRQ_EN.enable=1"
    datapath: "Valid detection -> IRQ_STATUS.pending set -> if IRQ_EN.enable then irq_o driven high"
    control: "Level-triggered; cleared by W1C write to IRQ_STATUS.pending"
    output: "irq_o = IRQ_EN.enable & IRQ_STATUS.pending"

  - name: "Threshold Detection"
    trigger: "Software configures THRESH_CMP register with threshold value"
    datapath: "Comparator checks if count of active unmasked requests >= threshold -> threshold_status in CSR"
    control: "Configurable threshold via APB; comparison is combinational within the registered path"
    output: "CSR.thresh_met status bit reflects threshold crossing"

  - name: "APB CSR Access"
    trigger: "APB slave access (psel & penable)"
    datapath: "Address decoded -> register read/write with 0-wait-state (pready=1 always)"
    control: "Write-side-effects as declared per register; read-side-effects are none"
    output: "prdata for reads; pslverr for unsupported addresses"
dataflow:
  encode_path:
    source: "req_i[NUM_INPUTS-1:0] (input port, sampled each clock edge)"
    mask: "Bitwise AND with REQ_MASK[NUM_INPUTS-1:0] from register"
    resolve: "Priority tree: scan from bit NUM_INPUTS-1 down to bit 0; first active masked bit wins"
    register: "Result captured in output register (enc_o, valid_o) when LATENCY_CYCLES=1"
    sequence: "req_i -> mask -> priority_resolve -> output_register -> enc_o/valid_o"
  interrupt_path:
    source: "valid_o edge detection"
    status: "IRQ_STATUS.pending set on valid_o rising when IRQ_EN.enable=1"
    output: "irq_o = IRQ_EN.enable & IRQ_STATUS.pending"
    clear: "W1C write to IRQ_STATUS.pending clears the pending bit and deasserts irq_o"
  apb_path:
    source: "APB slave interface (psel, penable, pwrite, paddr, pwdata)"
    decode: "Address decoded to target register"
    read: "prdata driven from selected register; pready=1; pslverr=1 for unmapped address"
    write: "pwdata written to selected register with declared side effects; pready=1"
    sequence: "APB_setup(psel=1,penable=0) -> APB_access(psel=1,penable=1,pready=1)"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the priority encoder computes independent of cycle timing."
  state_variables:
    - { name: "enc_out",     source: "registers.CSR.enc_out",    reset: 0,              description: "Current registered encoded output index" }
    - { name: "valid_out",   source: "registers.CSR.valid",      reset: 0,              description: "Current registered valid flag" }
    - { name: "req_mask",    source: "registers.REQ_MASK",       reset: "all_ones",     description: "Per-input enable mask (1=enabled, 0=masked); default all enabled" }
    - { name: "irq_pending", source: "registers.IRQ_STATUS.pending", reset: 0,          description: "Interrupt pending status" }
    - { name: "irq_enabled", source: "registers.IRQ_EN.enable",  reset: 0,              description: "Interrupt enable" }
    - { name: "thresh_val",  source: "registers.THRESH_CMP.threshold", reset: 0,        description: "Threshold value for active-count comparison" }
  transactions:
    - id: "PRI_ENCODE"
      name: "priority_encode"
      preconditions:
        - "presetn is deasserted (high)"
        - "req_i is sampled on the rising pclk edge"
        - "req_mask enables at least one input with an active request, or valid_out will be 0"
      inputs:
        - "req_i[NUM_INPUTS-1:0] — raw request vector"
        - "req_mask[NUM_INPUTS-1:0] — mask from REQ_MASK register"
      outputs:
        - "enc_o = encoded index of highest-priority active unmasked request"
        - "valid_o = 1 if any unmasked request is active, else 0"
        - "irq_o = irq_enabled & irq_pending (level interrupt)"
        - "CSR.active_count = popcount(masked_req)"
        - "CSR.thresh_met = popcount(masked_req) >= threshold"
      output_rules:
        - { name: "enc_o",       expr: "index of highest-order 1 in (req_i & req_mask)",          width: "OUTPUT_WIDTH", port: "enc_o",      description: "Encoded index of highest-priority active unmasked request" }
        - { name: "valid_o",     expr: "((req_i & req_mask) != 0) ? 1 : 0",                      width: 1,             port: "valid_o",     description: "At least one unmasked request is active" }
        - { name: "irq_o",       expr: "irq_enabled & irq_pending",                              width: 1,             port: "irq_o",       description: "Level interrupt output" }
      state_updates:
        - { name: "enc_out",     reset: 0,          expr: "enc_o from current cycle priority resolve" }
        - { name: "valid_out",   reset: 0,          expr: "valid_o from current cycle mask+resolve" }
        - { name: "irq_pending", reset: 0,          expr: "irq_pending | (valid_out_rising & irq_enabled)" }
        - { name: "thresh_met",  reset: 0,          expr: "thresh_met from current popcount comparison" }
      side_effects:
        - "irq_pending is set on rising edge of valid_out when irq_enabled=1"
        - "irq_pending is cleared only by W1C write to IRQ_STATUS.pending"
      error_cases:
        - { condition: "All inputs masked (req_mask == 0) while req_i has active bits", result: "valid_o = 0, enc_o = 0 (reset value); no interrupt generated" }
    - id: "APB_READ"
      name: "apb_register_read"
      preconditions:
        - "psel=1, penable=1, pwrite=0"
        - "paddr maps to a valid register offset"
      inputs:
        - "paddr[APB_ADDR_WIDTH-1:0]"
      outputs:
        - "prdata = register value at paddr"
        - "pready = 1 (always)"
        - "pslverr = 1 if unsupported address"
      output_rules:
        - { name: "prdata",  expr: "register_value_at(paddr)",  width: "APB_DATA_WIDTH", port: "prdata",   description: "Register read data" }
        - { name: "pready",  expr: "1",                         width: 1,                port: "pready",   description: "Always ready (0 wait states)" }
        - { name: "pslverr", expr: "paddr_valid ? 0 : 1",       width: 1,                port: "pslverr",  description: "Error for unsupported address" }
      state_updates: []
      side_effects: []
      error_cases:
        - { condition: "paddr does not map to any register", result: "prdata=0, pslverr=1" }
    - id: "APB_WRITE"
      name: "apb_register_write"
      preconditions:
        - "psel=1, penable=1, pwrite=1"
        - "paddr maps to a valid writable register"
      inputs:
        - "paddr[APB_ADDR_WIDTH-1:0]"
        - "pwdata[APB_DATA_WIDTH-1:0]"
      outputs:
        - "pready = 1 (always)"
        - "pslverr = 0 if writable valid addr, else 1"
      output_rules:
        - { name: "pready",  expr: "1",   width: 1, port: "pready",  description: "Always ready" }
        - { name: "pslverr", expr: "(writable && valid_addr) ? 0 : 1", width: 1, port: "pslverr", description: "Error for RO or unmapped register" }
      state_updates:
        - { name: "target_register", reset: "per register", expr: "pwdata" }
      side_effects:
        - "Writing IRQ_STATUS.pending with W1C semantics: bits with value 1 are cleared, bits with 0 are unaffected"
        - "Writing REQ_MASK updates the mask used in the next encode cycle"
        - "Writing IRQ_EN.enable gates interrupt output immediately"
        - "Writing THRESH_CMP.threshold updates the threshold comparison immediately"
      error_cases:
        - { condition: "APB write to read-only register (e.g. CSR)", result: "pslverr=1, register unchanged" }
        - { condition: "APB write to unsupported address", result: "pslverr=1, no register update" }
  invariants:
    - "enc_o is undefined when valid_o=0 (consumer must check valid_o before using enc_o)."
    - "Priority order is fixed: bit N-1 (MSB) has highest priority, bit 0 has lowest."
    - "Masked inputs never contribute to enc_o or valid_o."
    - "irq_o is a combinational function of irq_enabled and irq_pending; no additional latency."
    - "APB reads to the CSR register are non-destructive and have no side effects."
  reference_model_hint: "tb-gen should implement a Python reference model: masked = req_i & mask; valid = (masked != 0); enc = index of MSB set in masked; compare with DUT outputs every cycle."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, outputs, and interrupts change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for cycle-accurate shell; FunctionalModel as behavioral oracle."
  clock: "pclk"
  reset:
    assertion: "presetn low asynchronously clears all registered outputs and internal state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    encode_output: { min_cycles: 1, max_cycles: 1, description: "req_i sampled on rising edge -> enc_o/valid_o updated on next rising edge (when LATENCY_CYCLES=1)" }
    apb_read: { min_cycles: 0, max_cycles: 1, description: "APB read completes in the access phase (1 APB transfer = 2 clock cycles: setup + access); pready=1 always" }
    apb_write: { min_cycles: 0, max_cycles: 1, description: "APB write completes in the access phase; pready=1 always" }
    interrupt_assertion: { min_cycles: 1, max_cycles: 1, description: "irq_o assertion occurs 1 cycle after valid_out rising edge when irq_enabled=1" }
  handshake_rules:
    - { signal: "pready", rule: "Always driven high — no wait states on APB accesses." }
    - { signal: "pslverr", rule: "Asserted during the access phase only for unsupported addresses or write to RO register." }
    - { signal: "valid_o", rule: "Registered output; transitions only on rising pclk edges. Reflects masked_req != 0 from the previous cycle." }
    - { signal: "enc_o", rule: "Registered output; transitions only on rising pclk edges. Meaningful only when valid_o=1." }
    - { signal: "irq_o", rule: "Combinational function of irq_enabled and irq_pending; updates in the same cycle as irq_pending changes." }
  pipeline:
    - { stage: "S0_SAMPLE_INPUTS", cycle: 0, action: "Sample req_i and apply req_mask -> compute masked_req combinationally" }
    - { stage: "S1_PRIORITY_RESOLVE", cycle: 0, action: "Priority tree resolves highest active bit in masked_req (combinational)" }
    - { stage: "S2_REGISTER_OUTPUT", cycle: 1, action: "Capture enc_o, valid_o, thresh_met in output registers on rising edge" }
    - { stage: "S3_INTERRUPT_UPDATE", cycle: 1, action: "Update irq_pending if valid rising edge detected and irq_enabled" }
  ordering:
    - "S0 and S1 are combinational within the same cycle; S2 and S3 occur on the next rising edge."
    - "APB register writes to REQ_MASK or THRESH_CMP take effect starting from the next encode cycle."
    - "irq_pending set occurs on the same rising edge as valid_out transition."
  backpressure:
    - "No backpressure mechanism; this is a pure input-sampled, output-driven peripheral."
  performance:
    frequency_mhz: 50
    throughput: { sustained_encodes_per_cycle: 1, condition: "Continuous input changes produce continuous output updates at 1 encode/clock" }
    outstanding: { read_max: 1, write_max: 1, description: "APB is a single-access-at-a-time bus" }
    depth: { pipeline_stages: 1, queue_depth: 0, description: "Single registration stage, no buffering" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "Main system clock" }
  reset_scheme:
    signal: "presetn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain (pclk) — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain (presetn) — no RDC required"
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
    channel_stride: 0
    channel_base: 0
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."

  register_list:
    - name: "CSR"
      offset: 0x00
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Control/Status Register — read-only mirror of encoder output and status"
      fields:
        - { name: "enc_out",     bits: [2, 0], access: "ro", reset: 0x0, description: "Current encoded output index (mirrors enc_o port)" }
        - { name: "valid",       bits: [3, 3], access: "ro", reset: 0x0, description: "Current valid flag (mirrors valid_o port)" }
        - { name: "thresh_met",  bits: [4, 4], access: "ro", reset: 0x0, description: "Threshold comparison result: 1=active count >= threshold" }
        - { name: "active_count", bits: [7, 5], access: "ro", reset: 0x0, description: "Count of active unmasked requests (popcount of masked_req)" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "REQ_MASK"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x000000FF
      category: "control"
      description: "Per-input request enable mask — bit N=1 enables input N, bit N=0 masks it"
      write_side_effects:
        - "Updated mask takes effect starting from the next encode cycle (next rising pclk after APB write completes)."
      fields:
        - { name: "mask", bits: [7, 0], access: "rw", reset: 0xFF, write_effect: "Enable(1)/disable(0) per-input request", description: "Bit mask for inputs [7:0]; default all enabled" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "IRQ_EN"
      offset: 0x08
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Interrupt enable register"
      write_side_effects:
        - "Enabling the interrupt immediately gates irq_o; if irq_pending is already set, irq_o asserts on the same cycle."
      fields:
        - { name: "enable", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "Enable(1)/disable(0) interrupt generation", description: "Global interrupt enable" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "IRQ_STATUS"
      offset: 0x0C
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Interrupt status register — pending bit is W1C"
      write_side_effects:
        - "Writing 1 to pending bit clears it (W1C); writing 0 has no effect."
        - "Clearing pending deasserts irq_o if enable remains set but no new pending condition exists."
      fields:
        - { name: "pending", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "W1C: write 1 to clear pending interrupt", description: "Interrupt pending status" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "THRESH_CMP"
      offset: 0x10
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Threshold comparison register — active_count >= threshold sets CSR.thresh_met"
      write_side_effects:
        - "Updated threshold takes effect starting from the next encode cycle."
      fields:
        - { name: "threshold", bits: [3, 0], access: "rw", reset: 0x0, write_effect: "Set active-count comparison threshold", description: "Threshold value (0..NUM_INPUTS); 0=always met when any request active" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances: []
  note: "No internal SRAM/FIFO/Register-file storage; all state held in individual flip-flops."
interrupts:
  sources:
    - { name: "VALID_DETECT", bit: 0, type: "level", enable_reg: "IRQ_EN[0]", status_reg: "IRQ_STATUS[0]", clear: "W1C", description: "Priority encoder valid detection — set on valid_out rising edge when enabled" }
  output:
    signal: "irq_o"
    polarity: "active_high"
    type: "level"
fsm:
  note: "No FSM — priority encoder is a purely combinational datapath with registered output. No state machine required."
  states: []
  transitions: []
rtl_contract:
  transaction: "PRI_ENCODE"
  sample_condition: "output registered on rising pclk edge after combinational priority resolve"
  input_map:
    request_vector: "req_i[NUM_INPUTS-1:0]"
    mask_value: "REQ_MASK register"
    threshold_value: "THRESH_CMP register"
    irq_enable: "IRQ_EN.enable"
  output_map:
    encoded_index: "enc_o[OUTPUT_WIDTH-1:0]"
    valid_flag: "valid_o"
    interrupt: "irq_o"
    threshold_status: "CSR.thresh_met"
    active_count: "CSR.active_count"
  output_rules:
    - { name: "enc_o",      expr: "index of MSB set in (req_i & req_mask)", width: "OUTPUT_WIDTH", port: "enc_o",    description: "Encoded output" }
    - { name: "valid_o",    expr: "(req_i & req_mask) != 0",                width: 1,              port: "valid_o",  description: "Valid output" }
    - { name: "irq_o",      expr: "irq_enabled & irq_pending",              width: 1,              port: "irq_o",    description: "Interrupt output" }
  state_updates:
    - { name: "enc_out",     reset: 0,          expr: "enc_o (registered)" }
    - { name: "valid_out",   reset: 0,          expr: "valid_o (registered)" }
    - { name: "irq_pending", reset: 0,          expr: "irq_pending | (valid_rising & irq_enabled); cleared by W1C" }
    - { name: "thresh_met",  reset: 0,          expr: "popcount(masked_req) >= thresh_val" }
timing:
  target_clocks:
    - { name: "pclk", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.2 }
  latency_budget:
    encode_latency_cycles: { min: 1, max: 1, measured_from: "req_i stable on rising edge", measured_to: "enc_o/valid_o stable on next rising edge" }
    register_access_cycles: { min: 2, max: 2, measured_from: "psel rise", measured_to: "pready rise", note: "2 APB phases (setup + access) = 2 pclk cycles" }
    interrupt_latency_cycles: { min: 1, max: 1, measured_from: "valid_out rising edge", measured_to: "irq_o assertion" }
  throughput:
    sustained_encodes_per_cycle: 1
    conditions: "Continuous input changes produce output every clock cycle"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "req_i", clock: "pclk", delay_ns: 2.0, source: "conservative for 50 MHz / 20 ns period" }
      - { ports: "paddr, pwdata, psel, penable, pwrite", clock: "pclk", delay_ns: 2.0, source: "APB timing budget" }
    outputs:
      - { ports: "enc_o, valid_o", clock: "pclk", delay_ns: 2.0, source: "conservative for 50 MHz / 20 ns period" }
      - { ports: "prdata, pready, pslverr", clock: "pclk", delay_ns: 2.0, source: "APB timing budget" }
      - { ports: "irq_o", clock: "pclk", delay_ns: 2.0, source: "interrupt path" }
  false_paths:
    - { from: "presetn", to: "all_registers", reason: "async reset assertion path" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["pclk"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "Simple combinational peripheral; no explicit low-power mode in this revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "presetn deasserted", exit: "presetn asserted", guarantees: ["All encoding behavior active"] }
    - { name: "RESET", entry: "presetn asserted", exit: "presetn deasserted", guarantees: ["Outputs driven to reset values"] }
  upf_required: false
security:
  classification: "non_secure_control_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "encoded_output", protection: "No special protection; output integrity depends on correct mask configuration" }
  threat_model:
    - { threat: "illegal register write to RO register", mitigation: "pslverr response and no state change" }
    - { threat: "unintended mask disabling all inputs", mitigation: "Software configuration error only; no hardware protection assumed" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "No spurious irq_o assertion when irq_enabled=0"
    - "Output enc_o is deterministic for any given req_i and req_mask combination"
error_handling:
  error_sources:
    - { id: "ERR_APB_UNSUPPORTED_ADDR", condition: "APB access to unmapped address offset", architectural_effect: "pslverr=1, prdata=0 (read) or no update (write)" }
    - { id: "ERR_APB_WRITE_RO", condition: "APB write to read-only register (CSR)", architectural_effect: "pslverr=1, register unchanged" }
  propagation:
    - "pslverr is driven high during the APB access phase for the error condition duration."
    - "No internal error state is latched; errors are transient per APB transaction."
  recovery:
    - { action: "software correct access", clears: ["pslverr on next valid access"], preserves: ["all register state"] }
debug_observability:
  waveform_must_probe:
    - "req_i"
    - "enc_o"
    - "valid_o"
    - "irq_o"
    - "irq_pending (internal)"
    - "masked_req (internal)"
  status_outputs:
    - { name: "CSR", description: "Read-only mirror of enc_out, valid, thresh_met, active_count — accessible via APB" }
  trace_events:
    - { name: "valid_rising", trigger: "valid_o transitions 0->1" }
    - { name: "valid_falling", trigger: "valid_o transitions 1->0" }
    - { name: "irq_assert", trigger: "irq_o transitions 0->1" }
  debug_registers:
    - "CSR (read-only status mirror)"
integration:
  bus_attachment:
    control: "APB-Lite slave"
  connections:
    - { module: "priority_enc_core", port: "clk_i", signal: "pclk" }
    - { module: "priority_enc_core", port: "rst_ni", signal: "presetn" }
    - { module: "priority_enc_core", port: "req_i", signal: "req_i" }
    - { module: "priority_enc_core", port: "enc_o", signal: "enc_o" }
    - { module: "priority_enc_core", port: "valid_o", signal: "valid_o" }
    - { module: "priority_enc_core", port: "irq_o", signal: "irq_o" }
    - { module: "priority_enc_regs", port: "clk_i", signal: "pclk" }
    - { module: "priority_enc_regs", port: "rst_ni", signal: "presetn" }
    - { module: "priority_enc_regs", port: "psel_i", signal: "psel" }
    - { module: "priority_enc_regs", port: "penable_i", signal: "penable" }
    - { module: "priority_enc_regs", port: "pwrite_i", signal: "pwrite" }
    - { module: "priority_enc_regs", port: "paddr_i", signal: "paddr" }
    - { module: "priority_enc_regs", port: "pwdata_i", signal: "pwdata" }
    - { module: "priority_enc_regs", port: "prdata_o", signal: "prdata" }
    - { module: "priority_enc_regs", port: "pready_o", signal: "pready" }
    - { module: "priority_enc_regs", port: "pslverr_o", signal: "pslverr" }
    - { module: "priority_enc_core", port: "req_mask_i", signal: "priority_enc_regs.req_mask_o" }
    - { module: "priority_enc_core", port: "irq_en_i", signal: "priority_enc_regs.irq_en_o" }
    - { module: "priority_enc_core", port: "irq_status_i", signal: "priority_enc_regs.irq_status_o" }
    - { module: "priority_enc_core", port: "thresh_i", signal: "priority_enc_regs.thresh_o" }
    - { module: "priority_enc_regs", port: "csr_enc_i", signal: "priority_enc_core.csr_enc_o" }
    - { module: "priority_enc_regs", port: "csr_valid_i", signal: "priority_enc_core.csr_valid_o" }
    - { module: "priority_enc_regs", port: "csr_thresh_met_i", signal: "priority_enc_core.csr_thresh_met_o" }
    - { module: "priority_enc_regs", port: "csr_active_count_i", signal: "priority_enc_core.csr_active_count_o" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "pslverr=1 for unsupported APB address"
  dependencies:
    external_modules: []
    external_clocks: ["pclk"]
    external_resets: ["presetn"]
  integration_notes:
    - "SoC APB bus must provide compliant APB-Lite protocol (setup + access phases)."
    - "req_i must be stable around rising pclk edge for correct sampling."
    - "irq_o is active-high level; SoC interrupt controller should sample as level."
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "presetn must be controllable in test mode"
    clocks: ["pclk"]
    registers: "All registers accessible via APB in test mode"
  observability:
    required_internal_points: ["enc_out", "valid_out", "irq_pending", "masked_req"]
  mbist_required: false
  notes: "No SRAM macro in this design; no MBIST needed."
synthesis:
  dialect: "systemverilog_2012"
  top_module: "priority_enc"
  technology:
    pdk: "generic"
    standard_cell_library: "generic"
    liberty_corner: "typical"
    liberty_env: ""
    tech_lef_env: ""
  constraints:
    - "No inferred latches"
    - "All flops reset according to clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs in generated RTL"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/priority_enc.json or syn/out/priority_enc.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers: { horizontal: "met3", vertical: "met2" }
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    buf_list: []
    functional_mode_case_analysis: []
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { min: "met3", max: "met5" }
    drc_waivers: []
  required_outputs:
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/pnr.report.md"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/priority_enc_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk …)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use a default)"
    - "Active-low async reset: always @(posedge pclk or negedge presetn) with if (!presetn)"
    - "Parameterize widths (no hardcoded numbers) — use NUM_INPUTS, OUTPUT_WIDTH, MASK_WIDTH"
    - "Use rtl/priority_enc_param.vh for shared parameter declarations when needed; include it inside consuming modules"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam for constants; localparam state encoding with logic signals when FSM present"
  lint_waivers:
    - "UNUSEDSIGNAL: reserved register fields that tie to zero"
    - "WIDTHEXPAND: popcount result width padding"
reuse_modules: []
custom:
  assumptions:
    - { id: "ASM_01", field: "parameters.NUM_INPUTS", assumption: "NUM_INPUTS defaults to 8; parameter is runtime-static (not dynamically changeable). Must be power of 2 for clean encoding width." }
    - { id: "ASM_02", field: "parameters.OUTPUT_WIDTH", assumption: "OUTPUT_WIDTH = $clog2(NUM_INPUTS); default 3 for 8 inputs. Derived parameter — not independently settable." }
    - { id: "ASM_03", field: "parameters.LATENCY_CYCLES", assumption: "LATENCY_CYCLES=1 means registered output. Setting to 0 would produce combinational output — not explicitly tested in this revision. Default is 1." }
    - { id: "ASM_04", field: "io_list.interfaces.encoded_output.enc_o", assumption: "enc_o value is architecturally undefined when valid_o=0. Consumer must sample valid_o first. RTL will drive a deterministic value (typically 0) but software must not rely on it." }
    - { id: "ASM_05", field: "registers.REQ_MASK.reset", assumption: "REQ_MASK resets to all-ones (0xFF for 8 inputs) — all inputs enabled by default. This is a reasonable power-on default for a priority encoder." }
    - { id: "ASM_06", field: "timing.io_delays", assumption: "IO delay values (2.0 ns) are conservative placeholders for 50 MHz operation. Real values depend on SoC integration and pad library." }
    - { id: "ASM_07", field: "function_model.transactions.PRI_ENCODE.output_rules.thresh_met", assumption: "popcount(masked_req) counts the number of active unmasked requests. For NUM_INPUTS=8, active_count fits in 3 bits (max value 8). Threshold comparison uses unsigned arithmetic." }
    - { id: "ASM_08", field: "io_list.interfaces.apb_slave", assumption: "APB-Lite means no pstrb port in the minimal variant. All writes are full 32-bit. If byte-lane strobes are needed, upgrade to APB4 in a future revision." }
    - { id: "ASM_09", field: "function_model.transactions.PRI_ENCODE.error_cases", assumption: "No encoding error cases beyond all-masked; pstrb/partial-write is an APB concern not a priority-encode concern." }
  note: "Pipeline mode: assumptions recorded instead of blocking on ask_user. Review and adjust as needed."
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"
filelist:
  headers:
    - "rtl/priority_enc_param.vh"
  rtl:
    - "rtl/priority_enc_regs.sv"
    - "rtl/priority_enc_core.sv"
    - "rtl/priority_enc.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
    - "sim/priority_enc_model.sv"
  firmware:
    - "firmware/priority_enc_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"
test_requirements:
  scenarios:
    - id: "SC1"
      name: "Single highest-priority encode"
      stimulus: "Drive req_i with exactly one bit set (e.g. 0b00100000) and all masks enabled"
      expected: "enc_o = 5 (index of the set bit), valid_o = 1"
      checker: "Scoreboard: expected_enc = index of MSB set in (req_i & mask); compare enc_o, valid_o"
      coverage: ["FCOV_PRI_ENCODE_SINGLE", "CCOV_STAGE_REGISTER_OUTPUT"]

    - id: "SC2"
      name: "Multi-input priority resolution"
      stimulus: "Drive req_i with multiple bits set (e.g. 0b11010110)"
      expected: "enc_o = 7 (MSB set), valid_o = 1"
      checker: "Scoreboard: expected_enc = index of MSB set in (req_i & mask); compare enc_o, valid_o"
      coverage: ["FCOV_PRI_ENCODE_MULTI", "FCOV_PRIORITY_RESOLVE"]

    - id: "SC3"
      name: "All inputs masked"
      stimulus: "Drive req_i with active bits, set REQ_MASK = 0x00"
      expected: "valid_o = 0, enc_o = 0 (reset value), irq_o = 0"
      checker: "Scoreboard: valid_o must be 0 when masked_req == 0"
      coverage: ["FCOV_MASK_ALL_DISABLED"]

    - id: "SC4"
      name: "No request active"
      stimulus: "Drive req_i = 0x00 with any mask"
      expected: "valid_o = 0, enc_o = 0"
      checker: "Scoreboard: valid_o = 0 when no request active"
      coverage: ["FCOV_NO_REQUEST"]

    - id: "SC5"
      name: "Mask selectively disables inputs"
      stimulus: "Drive req_i = 0xFF, mask = 0x04 (only bit 2 enabled)"
      expected: "enc_o = 2, valid_o = 1"
      checker: "Scoreboard: expected_enc from MSB of (req_i & mask)"
      coverage: ["FCOV_MASK_PARTIAL"]

    - id: "SC6"
      name: "Interrupt lifecycle"
      stimulus: "Enable IRQ_EN, drive req_i active then inactive, clear IRQ_STATUS"
      expected: "irq_o asserts on valid rising, remains until W1C clear"
      checker: "Scoreboard: irq_o = irq_en & irq_pending at every cycle"
      coverage: ["FCOV_IRQ_LIFECYCLE", "CCOV_INTERRUPT_UPDATE"]

    - id: "SC7"
      name: "Interrupt disabled — no assertion"
      stimulus: "Drive req_i active with IRQ_EN.enable=0"
      expected: "irq_o remains 0; IRQ_STATUS.pending may be set but irq_o stays low"
      checker: "Scoreboard: irq_o must be 0 when irq_enabled=0"
      coverage: ["FCOV_IRQ_DISABLED"]

    - id: "SC8"
      name: "Threshold detection"
      stimulus: "Set THRESH_CMP.threshold=3, drive req_i with 4 active bits"
      expected: "CSR.thresh_met = 1 (4 >= 3)"
      checker: "Scoreboard: thresh_met = (popcount(masked_req) >= threshold)"
      coverage: ["FCOV_THRESHOLD_MET", "FCOV_THRESHOLD_NOT_MET"]

    - id: "SC9"
      name: "APB register read/write"
      stimulus: "APB write REQ_MASK=0xAA, then APB read REQ_MASK"
      expected: "Read returns 0xAA; pslverr=0"
      checker: "Scoreboard: read value matches last written value"
      coverage: ["FCOV_APB_RW"]

    - id: "SC10"
      name: "APB error — unsupported address"
      stimulus: "APB read at offset 0xFF (unmapped)"
      expected: "pslverr=1, prdata=0"
      checker: "Scoreboard: pslverr asserted for unmapped address"
      coverage: ["FCOV_APB_ERROR"]

    - id: "SC11"
      name: "APB write to read-only CSR"
      stimulus: "APB write to CSR offset 0x00"
      expected: "pslverr=1, CSR unchanged"
      checker: "Scoreboard: pslverr=1, CSR fields match expected (not written)"
      coverage: ["FCOV_APB_WRITE_RO_ERR"]

    - id: "SC12"
      name: "Reset clears all state"
      stimulus: "Drive active requests, assert presetn low, deassert"
      expected: "All outputs (enc_o, valid_o, irq_o) at reset values; registers at reset values"
      checker: "Scoreboard: all outputs and registers match declared reset values after deassert"
      coverage: ["FCOV_RESET_CLEAR"]

    - id: "SC13"
      name: "W1C clear behavior"
      stimulus: "Set irq_pending=1 via valid rising, then APB write IRQ_STATUS=0x1 (W1C)"
      expected: "irq_pending cleared to 0, irq_o deasserts"
      checker: "Scoreboard: irq_pending transitions 1->0 on W1C write; irq_o follows"
      coverage: ["FCOV_W1C_CLEAR"]

    - id: "SC14"
      name: "Continuous input toggling"
      stimulus: "Random req_i patterns over 100 cycles with random mask changes"
      expected: "Every cycle output matches reference model (masked_req MSB index)"
      checker: "Scoreboard: cycle-accurate comparison with Python reference model"
      coverage: ["FCOV_CONTINUOUS_TOGGLE", "CCOV_PIPELINE_STAGE"]

    - id: "SC15"
      name: "All inputs active — highest priority wins"
      stimulus: "Drive req_i = 0xFF, mask = 0xFF"
      expected: "enc_o = 7 (bit 7 is highest priority), valid_o = 1"
      checker: "Scoreboard: expected_enc = NUM_INPUTS-1"
      coverage: ["FCOV_ALL_INPUTS_ACTIVE"]

    - id: "SC16"
      name: "Active count accuracy"
      stimulus: "Drive various req_i patterns, read CSR.active_count"
      expected: "CSR.active_count = popcount(req_i & mask)"
      checker: "Scoreboard: active_count matches popcount of masked_req"
      coverage: ["FCOV_ACTIVE_COUNT"]

  scoreboard_checks: 32
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage — proves the encoder computes correct output for every input/mask/error combination."
      bins:
        - { id: "FCOV_PRI_ENCODE_SINGLE", source_ref: "function_model.transactions.PRI_ENCODE", class: "transaction", description: "Single-bit priority encode observed" }
        - { id: "FCOV_PRI_ENCODE_MULTI", source_ref: "function_model.transactions.PRI_ENCODE", class: "transaction", description: "Multi-bit priority encode observed" }
        - { id: "FCOV_PRIORITY_RESOLVE", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.enc_o", class: "output_rule", description: "Priority resolution produces correct MSB index" }
        - { id: "FCOV_MASK_PARTIAL", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.masked_req", class: "output_rule", description: "Partial mask applied and observed" }
        - { id: "FCOV_MASK_ALL_DISABLED", source_ref: "function_model.transactions.PRI_ENCODE", class: "transaction", description: "All-mask-disabled corner case observed" }
        - { id: "FCOV_NO_REQUEST", source_ref: "function_model.transactions.PRI_ENCODE", class: "transaction", description: "No request active corner case observed" }
        - { id: "FCOV_ALL_INPUTS_ACTIVE", source_ref: "function_model.transactions.PRI_ENCODE", class: "transaction", description: "All inputs active (max count) observed" }
        - { id: "FCOV_IRQ_LIFECYCLE", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.irq_o", class: "output_rule", description: "Full interrupt set-hold-clear lifecycle observed" }
        - { id: "FCOV_IRQ_DISABLED", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.irq_o", class: "output_rule", description: "Interrupt disabled path observed" }
        - { id: "FCOV_THRESHOLD_MET", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.thresh_met", class: "output_rule", description: "Threshold met condition observed" }
        - { id: "FCOV_THRESHOLD_NOT_MET", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.thresh_met", class: "output_rule", description: "Threshold not met condition observed" }
        - { id: "FCOV_ACTIVE_COUNT", source_ref: "function_model.transactions.PRI_ENCODE.output_rules.thresh_met", class: "output_rule", description: "Active count value correctness observed" }
        - { id: "FCOV_APB_RW", source_ref: "function_model.transactions.APB_READ", class: "transaction", description: "APB read and write transactions observed" }
        - { id: "FCOV_APB_ERROR", source_ref: "function_model.transactions.APB_READ.error_cases", class: "error_case", description: "APB error response for unsupported address" }
        - { id: "FCOV_APB_WRITE_RO_ERR", source_ref: "function_model.transactions.APB_WRITE.error_cases", class: "error_case", description: "APB write to RO register error observed" }
        - { id: "FCOV_RESET_CLEAR", source_ref: "cycle_model.reset.assertion", class: "reset", description: "Reset clears all state observed" }
        - { id: "FCOV_W1C_CLEAR", source_ref: "function_model.transactions.APB_WRITE.side_effects", class: "side_effect", description: "W1C clear mechanism observed" }
        - { id: "FCOV_CONTINUOUS_TOGGLE", source_ref: "function_model.transactions.PRI_ENCODE", class: "transaction", description: "Continuous random input toggling observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency coverage — proves outputs update at the correct clock edge."
      bins:
        - { id: "CCOV_STAGE_SAMPLE_INPUTS", source_ref: "cycle_model.pipeline.S0_SAMPLE_INPUTS", class: "pipeline_stage", description: "Input sampling stage observed" }
        - { id: "CCOV_STAGE_PRIORITY_RESOLVE", source_ref: "cycle_model.pipeline.S1_PRIORITY_RESOLVE", class: "pipeline_stage", description: "Priority resolve stage observed" }
        - { id: "CCOV_STAGE_REGISTER_OUTPUT", source_ref: "cycle_model.pipeline.S2_REGISTER_OUTPUT", class: "pipeline_stage", description: "Output registration stage observed" }
        - { id: "CCOV_STAGE_INTERRUPT_UPDATE", source_ref: "cycle_model.pipeline.S3_INTERRUPT_UPDATE", class: "pipeline_stage", description: "Interrupt update stage observed" }
        - { id: "CCOV_APB_PREADY_ALWAYS", source_ref: "cycle_model.handshake_rules.pready", class: "handshake", description: "pready=1 always on APB access observed" }
        - { id: "CCOV_APB_PSLVERR_ASSERT", source_ref: "cycle_model.handshake_rules.pslverr", class: "handshake", description: "pslverr assertion on error observed" }
        - { id: "CCOV_PIPELINE_STAGE", source_ref: "cycle_model.pipeline", class: "pipeline_stage", description: "All pipeline stages exercised" }
        - { id: "CCOV_INTERRUPT_UPDATE", source_ref: "cycle_model.pipeline.S3_INTERRUPT_UPDATE", class: "pipeline_stage", description: "Interrupt pending set on valid rising edge" }
        - { id: "CCOV_PERF_THROUGHPUT", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "Sustained 1 encode/cycle throughput observed" }
        - { id: "CCOV_PERF_FREQUENCY", source_ref: "cycle_model.performance.frequency_mhz", class: "frequency", description: "50 MHz target frequency exercised in simulation" }
    functional: "Legacy alias: function + cycle coverage must both close."
    line: ">= 95% instrumented line coverage"
    branch: ">= 90% instrumented branch coverage"
    fsm: "N/A — no FSM in this design"
    assertions: "All protocol (APB pslverr, valid_o/enc_o consistency, irq_o gating) assertions pass"
quality_gates:
  ssot:
    pass: "All canonical sections present, substantive, internally consistent, no live TBD placeholders."
    evidence: ["check_ssot_disk.sh PASS", "traceability covers function_model/cycle_model/test_requirements"]
  rtl_gen:
    profile: "standard"
    pass: "SSOT-derived RTL compiles and lints with no unwaived errors."
    evidence: ["rtl compile report", "dut lint report"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, lints cleanly."
    evidence: ["rtl filelist", "compile log", "lint report"]
  dv:
    pass: "Every test_requirements scenario has an executable test, expected/got checker, and coverage bin."
    evidence: ["results.xml", "coverage.json", "VCD/FST waveform"]
  coverage:
    pass: "Functional coverage goals pass and code/branch/assertion coverage meets thresholds or has approved waiver."
    evidence: ["instrumented coverage report", "coverage_report.md"]
  eda:
    pass: "Synthesis and STA meet SSOT timing targets or have explicit waivers."
    evidence: ["syn report", "sta setup/hold report", "wns.json"]
  signoff:
    pass: "SSOT, RTL, lint, DV, simulation, coverage, and required EDA gates pass with fresh evidence."
    evidence: ["ATLAS progress signoff pass", "artifact timestamps newer than final source edits"]
traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "priority_enc_param.vh (shared parameter include)" }
    - { yaml: "io_list.interfaces", output: "priority_enc.sv (top-level port list)" }
    - { yaml: "registers.register_list", output: "priority_enc_regs.sv + firmware/priority_enc_regs.h + docs/register_map.md" }
    - { yaml: "function_model", output: "priority_enc_core.sv + tb reference model/scoreboard" }
    - { yaml: "cycle_model", output: "priority_enc_core.sv output registration + waveform checks" }
    - { yaml: "timing", output: "sdc/priority_enc.sdc (STA constraints)" }
    - { yaml: "error_handling", output: "priority_enc_regs.sv pslverr paths + DV error scenarios" }
    - { yaml: "integration", output: "priority_enc.sv top-level wiring" }
    - { yaml: "test_requirements.scenarios", output: "sim/tb_program.sv" }
  change_impact_example:
    change: "parameters.NUM_INPUTS from 8 to 16"
    affected_files:
      - "priority_enc_param.vh (NUM_INPUTS=16, OUTPUT_WIDTH=4)"
      - "priority_enc_core.sv (req_i width, enc_o width, priority tree width)"
      - "priority_enc_regs.sv (REQ_MASK field width)"
      - "priority_enc.sv (port widths)"
      - "tb_top.sv (signal widths)"
