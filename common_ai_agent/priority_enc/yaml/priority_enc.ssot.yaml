top_module:
  name: "priority_enc"
  file: "rtl/priority_enc.sv"
  version: "1.0"
  type: "peripheral"
  description: "8-input parameterized priority encoder with APB-lite CSR interface; highest-indexed asserted input wins; 1-cycle latency from input change to output update"
  reference_spec: "user-defined priority encoder requirements"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - name: "priority_enc_structure"
    file: "rtl/priority_enc_structure.sv"
    ownership: "manifest"
    ssot_gen: true
    implements:
      - "io_list.interfaces.apb_slave"
      - "io_list.interfaces.encoder_input"
      - "io_list.interfaces.encoder_output"
      - "function_model"
      - "cycle_model"
      - "registers.register_list"
      - "dataflow"
      - "features"
      - "fsm"
      - "error_handling"
    source_sections:
      - "io_list"
      - "features"
      - "dataflow"
      - "function_model"
      - "cycle_model"
      - "registers"
      - "fsm"
      - "error_handling"
    function_model_refs:
      - "function_model"
      - "function_model.state_variables"
      - "function_model.transactions"
      - "function_model.invariants"
    cycle_model_refs:
      - "cycle_model"
      - "cycle_model.handshake_rules"
      - "cycle_model.pipeline"
      - "cycle_model.ordering"
      - "cycle_model.latency"
    register_refs:
      - "registers.register_list"
      - "registers.register_list.CTRL"
      - "registers.register_list.CTRL.fields.enable"
      - "registers.register_list.CTRL.fields.priority_dir"
      - "registers.register_list.MASK"
      - "registers.register_list.MASK.fields.mask_bits"
      - "registers.register_list.STATUS"
      - "registers.register_list.STATUS.fields.enc_out"
      - "registers.register_list.STATUS.fields.enc_valid"
    dataflow_refs:
      - "dataflow"
      - "dataflow.sequence"
    feature_refs:
      - "features"
    fsm_refs:
      - "fsm"
      - "fsm.control"
    test_refs:
      - "test_requirements.scenarios"
    trace_refs:
      - "traceability.yaml_to_output"
    description: "APB register decode, priority evaluation datapath, mask/control application, and output register stage"
  - name: "priority_enc"
    file: "rtl/priority_enc.sv"
    ownership: "manifest"
    ssot_gen: true
    wiring_only: true
    kind: "top_wrapper"
    implements:
      - "top_module"
      - "io_list"
      - "integration.connections"
      - "filelist"
    source_sections:
      - "top_module"
      - "io_list"
      - "integration"
      - "filelist"
    ssot_refs:
      - "top_module"
      - "io_list.interfaces"
      - "integration.connections"
      - "filelist.rtl"
    ports:
      - "pclk"
      - "presetn"
      - "paddr"
      - "psel"
      - "penable"
      - "pwrite"
      - "pwdata"
      - "pstrb"
      - "prdata"
      - "pready"
      - "pslverr"
      - "enc_in"
      - "enc_out"
      - "enc_valid"
    connections:
      - { module: "priority_enc_structure", port: "pclk",     signal: "pclk" }
      - { module: "priority_enc_structure", port: "presetn",  signal: "presetn" }
      - { module: "priority_enc_structure", port: "paddr",    signal: "paddr" }
      - { module: "priority_enc_structure", port: "psel",     signal: "psel" }
      - { module: "priority_enc_structure", port: "penable",  signal: "penable" }
      - { module: "priority_enc_structure", port: "pwrite",   signal: "pwrite" }
      - { module: "priority_enc_structure", port: "pwdata",   signal: "pwdata" }
      - { module: "priority_enc_structure", port: "pstrb",    signal: "pstrb" }
      - { module: "priority_enc_structure", port: "prdata",   signal: "prdata" }
      - { module: "priority_enc_structure", port: "pready",   signal: "pready" }
      - { module: "priority_enc_structure", port: "pslverr",  signal: "pslverr" }
      - { module: "priority_enc_structure", port: "enc_in",   signal: "enc_in" }
      - { module: "priority_enc_structure", port: "enc_out",  signal: "enc_out" }
      - { module: "priority_enc_structure", port: "enc_valid",signal: "enc_valid" }
    description: "Top-level wrapper exposing SSOT port contract and instantiating priority_enc_structure"

decomposition:
  units:
    - { id: "apb_register_decode", kind: "control", source_refs: ["io_list.interfaces.apb_slave", "registers.register_list", "error_handling.unsupported_address"], rtl_candidates: ["priority_enc_structure"], verification_impact: ["test_requirements.scenarios.register_access", "test_requirements.scenarios.unsupported_address"], description: "Decode one-cycle APB accesses for supported register offsets" }
    - { id: "priority_evaluate", kind: "datapath", source_refs: ["function_model.transactions.TX_PRIORITY_EVALUATE", "registers.register_list.CTRL", "registers.register_list.MASK"], rtl_candidates: ["priority_enc_structure"], verification_impact: ["test_requirements.scenarios.priority_eval", "test_requirements.scenarios.mask_gating"], description: "Combinational priority encoder: apply mask, evaluate highest-priority asserted bit per priority_dir" }
    - { id: "output_register", kind: "datapath", source_refs: ["cycle_model.pipeline.S1_REGISTER", "function_model.transactions.TX_PRIORITY_EVALUATE"], rtl_candidates: ["priority_enc_structure"], verification_impact: ["test_requirements.scenarios.latency"], description: "Register stage capturing priority evaluation result for top-level output" }
    - { id: "top_integration", kind: "wiring", source_refs: ["top_module", "io_list", "integration.connections"], rtl_candidates: ["priority_enc"], verification_impact: ["quality_gates.rtl"], description: "Expose top ports and connect by name to manifest-owned structure module" }
rtl_contract:
  top_module: "priority_enc"
  clock: "pclk"
  reset: "presetn"
  transaction: "TX_PRIORITY_EVALUATE"
  sample_condition: "enc_in sampled every pclk rising edge; APB writes sampled in access phase"
  input_map:
    enc_in: "encoder_input.enc_in"
    apb_write: "apb_slave.pwdata"
  output_map:
    enc_out: "encoder_output.enc_out"
    enc_valid: "encoder_output.enc_valid"
    prdata: "apb_slave.prdata"
    pready: "apb_slave.pready"
    pslverr: "apb_slave.pslverr"
  state_updates:
    - { name: "enable_q",       reset: 0,    expr: "CTRL.enable from APB write" }
    - { name: "priority_dir_q", reset: 0,    expr: "CTRL.priority_dir from APB write" }
    - { name: "mask_q",         reset: 0xFF, expr: "MASK.mask_bits from APB write" }
    - { name: "enc_out_q",      reset: 0,    expr: "priority-encoded index of highest-priority asserted enabled input" }
    - { name: "enc_valid_q",    reset: 0,    expr: "enable_q AND (OR of masked inputs)" }
  observable_outputs:
    - "enc_out"
    - "enc_valid"
    - "prdata"
    - "pready"
    - "pslverr"

parameters:
  - name: "ENC_WIDTH"
    default: 8
    type: int
    description: "Number of encoder input bits"
    drives: ["rtl/priority_enc_structure.sv", "rtl/priority_enc.sv"]
  - name: "OUT_WIDTH"
    default: 3
    type: int
    description: "Encoded output width = ceil(log2(ENC_WIDTH))"
    drives: ["rtl/priority_enc_structure.sv", "rtl/priority_enc.sv"]
  - name: "DATA_WIDTH"
    default: 32
    type: int
    description: "APB data width in bits"
    drives: ["rtl/priority_enc_structure.sv", "rtl/priority_enc.sv"]
  - name: "APB_ADDR_WIDTH"
    default: 8
    type: int
    description: "APB local address width in bits"
    drives: ["rtl/priority_enc_structure.sv", "rtl/priority_enc.sv"]
  - name: "CLOCK_FREQ_MHZ"
    default: 50
    type: int
    description: "Target clock frequency in MHz"
    drives: ["sim/tb_top.sv", "docs/README.md"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "APB peripheral clock"
      ports:
        - { name: "pclk", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "APB reset"
      ports:
        - { name: "presetn", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "APB-lite register access interface"
      protocol:
        setup_phase: "psel=1, penable=0 captures address/control"
        access_phase: "psel=1, penable=1 completes when pready=1"
        read_rule: "prdata is valid in the access phase for reads"
        write_rule: "pwdata/pstrb are sampled in the access phase for writes"
        error_rule: "pslverr is asserted only with pready=1 for unsupported access"
      ports:
        - { name: "paddr",   width: 8,  direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }
    - name: "encoder_input"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "8-bit encoder input vector; bit 7 has highest priority"
      protocol:
        sampling: "enc_in is sampled on every pclk rising edge when presetn is deasserted"
        stability: "enc_in may change asynchronously; outputs update synchronously one cycle later"
      ports:
        - { name: "enc_in", width: 8, direction: "input", description: "Priority encoder input vector" }
    - name: "encoder_output"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Priority encoder result outputs"
      protocol:
        update: "enc_out and enc_valid update one pclk cycle after enc_in changes (or mask/enable change)"
        reset_value: "enc_out=0, enc_valid=0"
      ports:
        - { name: "enc_out",   width: 3, direction: "output", description: "Encoded index of highest-priority asserted input" }
        - { name: "enc_valid", width: 1, direction: "output", description: "Asserted when at least one enabled input is high" }
  top_ports:
    - { name: "pclk",     width: 1,  direction: "input",  description: "APB clock" }
    - { name: "presetn",  width: 1,  direction: "input",  description: "Active-low reset" }
    - { name: "paddr",    width: 8,  direction: "input",  description: "APB address" }
    - { name: "psel",     width: 1,  direction: "input",  description: "APB select" }
    - { name: "penable",  width: 1,  direction: "input",  description: "APB enable" }
    - { name: "pwrite",   width: 1,  direction: "input",  description: "APB write" }
    - { name: "pwdata",   width: 32, direction: "input",  description: "APB write data" }
    - { name: "pstrb",    width: 4,  direction: "input",  description: "APB strobes" }
    - { name: "prdata",   width: 32, direction: "output", description: "APB read data" }
    - { name: "pready",   width: 1,  direction: "output", description: "APB ready" }
    - { name: "pslverr",  width: 1,  direction: "output", description: "APB error" }
    - { name: "enc_in",   width: 8,  direction: "input",  description: "Priority encoder input vector" }
    - { name: "enc_out",  width: 3,  direction: "output", description: "Encoded index of highest-priority asserted input" }
    - { name: "enc_valid",width: 1,  direction: "output", description: "Asserted when at least one enabled input is high" }
features:
  - id: "priority_encode"
    name: "Priority encoding"
    trigger: "enc_in changes or CTRL/MASK writes on any pclk rising edge"
    datapath: "enc_in & MASK.mask_bits → priority_dir mux → leading-one detector → 3-bit encoded index + valid flag"
    control: "CTRL.enable gates output; CTRL.priority_dir selects highest-to-lowest or lowest-to-highest priority"
    output: "enc_out = 3-bit index of highest-priority asserted enabled input; enc_valid = OR of all masked inputs when enabled"
  - id: "apb_csr_access"
    name: "APB-lite CSR access"
    trigger: "APB read or write transaction to supported offsets"
    datapath: "paddr decode → register read mux or write update"
    control: "Standard APB4-lite setup/access phases; pready always 1"
    output: "prdata for reads; register update for writes; pslverr for unsupported offsets"
  - id: "mask_gating"
    name: "Per-bit input masking"
    trigger: "MASK register write"
    datapath: "enc_in bitwise AND with MASK.mask_bits before priority evaluation"
    control: "MASK.mask_bits default 0xFF (all enabled)"
    output: "Masked input vector drives priority encoder"

dataflow:
  sources:
    - "APB write channel (pwdata, pstrb)"
    - "enc_in input vector"
  sinks:
    - "APB read channel (prdata)"
    - "enc_out"
    - "enc_valid"
  sequence:
    - { id: "DF_APB_WRITE", from: "pwdata/pstrb", through: "apb_register_decode", to: "CTRL MASK" }
    - { id: "DF_APB_READ",  from: "register bank", through: "read mux", to: "prdata" }
    - { id: "DF_PRIORITY",  from: "enc_in and MASK.mask_bits", through: "priority_evaluate combinational logic", to: "enc_out enc_valid STATUS" }
  backpressure: "None. pready is permanently high."
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the priority encoder computes independent of cycle timing."
  state_variables:
    - { name: "enable_q",       width: 1,  reset: 0,    source: "registers.CTRL.enable",       description: "Master enable" }
    - { name: "priority_dir_q", width: 1,  reset: 0,    source: "registers.CTRL.priority_dir",  description: "Priority direction: 0=bit7 highest, 1=bit0 highest" }
    - { name: "mask_q",         width: 8,  reset: 0xFF, source: "registers.MASK.mask_bits",     description: "Per-bit input mask" }
    - { name: "enc_out_q",      width: 3,  reset: 0,    source: "registers.STATUS.enc_out",    description: "Registered encoded output index" }
    - { name: "enc_valid_q",    width: 1,  reset: 0,    source: "registers.STATUS.enc_valid",  description: "Registered valid flag" }
  transactions:
    - id: "TX_APB_WRITE"
      name: "APB write register"
      preconditions:
        - "psel && penable && pwrite on a rising pclk edge"
        - "paddr matches CTRL (0x00) or MASK (0x04)"
      inputs:
        - "paddr"
        - "pwdata"
        - "pstrb"
      outputs:
        - "pready = 1"
        - "pslverr = 0"
      side_effects:
        - "CTRL.enable updated from pwdata[0] when paddr=0x00"
        - "CTRL.priority_dir updated from pwdata[1] when paddr=0x00"
        - "MASK.mask_bits updated from pwdata[7:0] when paddr=0x04"
      error_cases:
        - { condition: "paddr is not 0x00, 0x04, or 0x08", result: "pslverr=1, prdata=0, no state change" }
    - id: "TX_APB_READ"
      name: "APB read register"
      preconditions:
        - "psel && penable && !pwrite on a rising pclk edge"
        - "paddr matches CTRL (0x00), MASK (0x04), or STATUS (0x08)"
      inputs:
        - "paddr"
      outputs:
        - "pready = 1"
        - "pslverr = 0"
        - "prdata returns selected register value"
      side_effects:
        - "No writable state is modified by reads"
      error_cases:
        - { condition: "paddr is not 0x00, 0x04, or 0x08", result: "pslverr=1, prdata=0, no state change" }
    - id: "TX_PRIORITY_EVALUATE"
      name: "Priority evaluate and register"
      preconditions:
        - "presetn is deasserted"
      inputs:
        - "enc_in"
        - "mask_q"
        - "enable_q"
        - "priority_dir_q"
      outputs:
        - "enc_out_q updated per priority encoding"
        - "enc_valid_q updated per validity check"
      output_rules:
        - { name: "masked",     expr: "enc_in & mask_q",                                                                              width: 8, port: "internal" }
        - { name: "enc_out",    expr: "if enable_q and |masked: if priority_dir_q==0 then leading_one_index(masked, hi_to_lo) else leading_one_index(masked, lo_to_hi); else 0", width: 3, port: "enc_out" }
        - { name: "enc_valid",  expr: "enable_q && (|masked)",                                                                         width: 1, port: "enc_valid" }
      side_effects:
        - "enc_out_q registers the evaluated index"
        - "enc_valid_q registers the valid flag"
        - "STATUS.enc_out mirrors enc_out_q"
        - "STATUS.enc_valid mirrors enc_valid_q"
      error_cases:
        - { condition: "presetn asserted (low)", result: "enc_out_q=0, enc_valid_q=0" }
    - id: "TX_RESET"
      name: "Reset behavior"
      preconditions:
        - "presetn is asserted (low)"
      inputs: []
      outputs:
        - "enc_out = 0"
        - "enc_valid = 0"
        - "prdata = 0"
        - "pready = 1"
      side_effects:
        - "All register state cleared to reset values"
        - "CTRL.enable = 0, CTRL.priority_dir = 0"
        - "MASK.mask_bits = 0xFF"
        - "enc_out_q = 0, enc_valid_q = 0"
      error_cases: []
  invariants:
    - "enc_out and enc_valid reflect the evaluation of masked inputs one cycle after input/register change"
    - "Register reads have no side effects on writable state"
    - "Unsupported APB offsets return pslverr and do not modify any register"
    - "When enable_q=0, enc_out=0 and enc_valid=0 regardless of enc_in or mask"
  reference_model_hint: "tb-gen should implement a Python scoreboard model that applies mask, evaluates priority per priority_dir, and compares expected vs observed enc_out/enc_valid one cycle later."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when valid/ready, outputs, and state may change."
  clock: "pclk"
  reset:
    assertion: "presetn low asynchronously clears all architectural state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    - { id: "apb_access_latency", cycles: 1, description: "Each APB access completes in the access phase; pready is always 1" }
    - { id: "priority_eval_latency", cycles: 1, description: "enc_out/enc_valid update one pclk cycle after enc_in or register change" }
  handshake_rules:
    - { id: "apb_setup",  rule: "psel=1, penable=0 is setup phase; address/control sampled" }
    - { id: "apb_access", rule: "psel=1, penable=1 completes access; pwdata/pstrb sampled for writes, prdata valid for reads" }
    - { id: "apb_ready",  rule: "pready remains 1; no wait states inserted" }
  pipeline:
    - { id: "S0_EVALUATE", cycle: 0, action: "Combinational priority evaluation: apply mask, detect leading one per priority_dir" }
    - { id: "S1_REGISTER", cycle: 1, action: "Capture evaluation result into enc_out_q/enc_valid_q; drive top-level outputs" }
  ordering:
    - { id: "apb_read_after_write", rule: "A register read in the access phase after a write observes the newly written value" }
    - { id: "output_one_cycle_latency", rule: "enc_out/enc_valid update on the cycle after enc_in or CTRL/MASK change" }
  backpressure:
    - "No backpressure; pready is always 1; enc_out/enc_valid update every cycle"
  performance:
    frequency_mhz: 50
    throughput: { sustained_beats_per_cycle: 1, condition: "New result available every cycle; combinational priority eval + registered output" }
    outstanding: { read_max: 1, write_max: 1, description: "Single APB access per cycle" }
    depth: { pipeline_stages: 2, queue_depth: 1, description: "Evaluate + register stages" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "APB peripheral clock" }
  reset_scheme:
    signal: "presetn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

cdc_requirements:
  crossings:
    - { name: "enc_in_to_pclk", source: "enc_in", destination: "pclk", mitigation: "none required — enc_in is a synchronous input sampled directly; no metastability protection needed for combinational path to registered output", note: "enc_in assumed synchronous to pclk; if asynchronous, add two-flop synchronizer in a future revision" }
  waivers: []

rdc_requirements:
  resets:
    - { name: "presetn", domain: "pclk", style: "async_assert_sync_deassert" }
  waivers: []
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register"
      write_side_effects:
        - "enable gates enc_valid and enc_out; when disabled, enc_valid=0 and enc_out=0"
        - "priority_dir selects highest-to-lowest (0) or lowest-to-highest (1) priority scheme"
      fields:
        - { name: "enable",        bits: [0, 0],  access: "rw", reset: 0x0, write_effect: "Enable priority encoder operation", description: "Master enable" }
        - { name: "priority_dir",  bits: [1, 1],  access: "rw", reset: 0x0, write_effect: "0=bit7 highest priority, 1=bit0 highest priority", description: "Priority direction" }
        - { name: "reserved_31_2", bits: [31, 2], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "MASK"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x000000FF
      category: "control"
      description: "Input Mask Register"
      write_side_effects:
        - "Mask bits gate corresponding enc_in bits before priority evaluation; masked inputs treated as 0"
      fields:
        - { name: "mask_bits",    bits: [7, 0],  access: "rw", reset: 0xFF, write_effect: "Per-bit input mask: 1=enabled, 0=masked", description: "Input enable mask" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x08
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status Register — current encoder output snapshot"
      fields:
        - { name: "enc_out",      bits: [2, 0],  access: "ro", reset: 0x0, description: "Current encoded output index" }
        - { name: "enc_valid",    bits: [3, 3],  access: "ro", reset: 0x0, description: "Valid flag: 1 when at least one enabled input is high" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances: []
  note: "No SRAM, FIFO, or internal buffer memory required; all state held in registers"

interrupts:
  outputs: []
  events: []
  note: "No interrupt output in this IP revision; enc_valid serves as a status flag readable via STATUS register"
fsm:
  control:
    states:
      - { name: "IDLE", description: "Waiting for input change or register access; outputs reflect current priority evaluation" }
    transitions:
      - { from: "IDLE", to: "IDLE", condition: "every pclk cycle" }
    note: "Single-state combinational priority encoder with registered outputs; no multi-cycle FSM required"
timing:
  target_clocks:
    - { name: "pclk", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.2 }
  latency_budget:
    - { path: "APB access to response", cycles: 1, measured_from: "psel && penable", measured_to: "pready && prdata" }
    - { path: "enc_in change to enc_out/enc_valid update", cycles: 1, measured_from: "enc_in sampled at pclk edge", measured_to: "enc_out/enc_valid at next pclk edge" }
  false_paths:
    - { from: "presetn", to: "all_registers", reason: "async reset assertion" }
  io_delays:
    inputs:
      - { ports: "all_inputs_except_clocks_resets", clock: "pclk", delay_ns: 0.2, source: "system-level timing budget" }
    outputs:
      - { ports: "all_outputs", clock: "pclk", delay_ns: 0.2, source: "system-level timing budget" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]

power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["pclk"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode in this IP revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "presetn deasserted", exit: "presetn asserted", guarantees: ["All architectural behavior active"] }
  upf_required: false

security:
  classification: "non_secure_peripheral"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "encoder_input_data", protection: "Data observable via STATUS register; no confidentiality requirement" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO access policy on STATUS; reserved fields ignore writes" }
    - { threat: "unsupported address probe", mitigation: "pslverr response for unsupported offsets" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "enc_out and enc_valid always reflect deterministic evaluation of masked inputs and control state"
error_handling:
  error_sources:
    - { id: "unsupported_address", condition: "APB access offset is not 0x00, 0x04, or 0x08", response: "pslverr=1, prdata=0 for reads, writable state unchanged for writes" }
  propagation:
    - "pslverr is asserted only during the access phase of an unsupported APB transaction"
    - "No sticky error state; next valid access proceeds normally"
  recovery:
    - "Next valid APB access to a supported offset completes normally with pready=1, pslverr=0"

debug_observability:
  waveform_must_probe:
    - "paddr"
    - "psel"
    - "penable"
    - "pwrite"
    - "prdata"
    - "pslverr"
    - "enc_in"
    - "enc_out"
    - "enc_valid"
    - "enable_q"
    - "priority_dir_q"
    - "mask_q"
    - "enc_out_q"
    - "enc_valid_q"
  trace_events:
    - { id: "apb_access", signals: ["paddr", "pwrite", "pslverr"] }
    - { id: "priority_eval", signals: ["enc_in", "enc_out", "enc_valid"] }
  status_outputs:
    - "enc_valid"
  debug_registers:
    - "STATUS"

integration:
  bus_attachment:
    type: "APB4 slave"
    base_address: "SoC-assigned"
    address_window: "0x00-0x08"
  dependencies:
    - { name: "none", type: "external_ip", description: "No external reusable IP dependencies" }
  connections:
    - { module: "priority_enc_structure", port: "pclk",     signal: "pclk" }
    - { module: "priority_enc_structure", port: "presetn",  signal: "presetn" }
    - { module: "priority_enc_structure", port: "paddr",    signal: "paddr" }
    - { module: "priority_enc_structure", port: "psel",     signal: "psel" }
    - { module: "priority_enc_structure", port: "penable",  signal: "penable" }
    - { module: "priority_enc_structure", port: "pwrite",   signal: "pwrite" }
    - { module: "priority_enc_structure", port: "pwdata",   signal: "pwdata" }
    - { module: "priority_enc_structure", port: "pstrb",    signal: "pstrb" }
    - { module: "priority_enc_structure", port: "prdata",   signal: "prdata" }
    - { module: "priority_enc_structure", port: "pready",   signal: "pready" }
    - { module: "priority_enc_structure", port: "pslverr",  signal: "pslverr" }
    - { module: "priority_enc_structure", port: "enc_in",   signal: "enc_in" }
    - { module: "priority_enc_structure", port: "enc_out",  signal: "enc_out" }
    - { module: "priority_enc_structure", port: "enc_valid",signal: "enc_valid" }
  wrapper: "priority_enc"
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "presetn must be controllable in test mode"
    clocks: ["pclk"]
  observability:
    required_internal_points: ["enable_q", "priority_dir_q", "mask_q", "enc_out_q", "enc_valid_q"]
  mbist_required: false
  notes: "No SRAM macro in this configuration"

synthesis:
  dialect: "systemverilog_2012"
  top_module: "priority_enc"
  technology:
    pdk: "sky130"
    standard_cell_library: "sky130_fd_sc_hd"
    liberty_corner: "ss_100C_1v40"
    liberty_env: "SKY130_LIB"
    lef_env: "SKY130_LEF"
    tech_lef_env: "SKY130_TLEF"
    rcx_rules_env: "SKY130_RCX_RULES"
  constraints:
    - "No inferred latches"
    - "All flops reset per clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/priority_enc.json"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"

pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: "met3"
    vertical: "met2"
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"]
    functional_mode_case_analysis:
      - { port: "scan_en", value: 0, when_present: true }
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { min: "met3", max: "met5" }
    drc_waivers: []
  required_outputs:
    - "pnr/out/floorplan.def"
    - "pnr/out/placed.def"
    - "pnr/out/cts.def"
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"

coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/priority_enc_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge pclk or negedge presetn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low async reset: always @(posedge pclk or negedge presetn) with if (!presetn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "Use rtl/priority_enc_param.vh for shared parameter declarations; include inside consuming modules"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
  lint_waivers:
    - "UNUSEDSIGNAL: explicit approved tie-offs only"
reuse_modules: []

custom:
  assumptions:
    - "enc_in is synchronous to pclk; no input synchronizer chain is included"
    - "ENC_WIDTH defaults to 8; OUT_WIDTH must equal ceil(log2(ENC_WIDTH))"
    - "APB-lite interface assumes pready=1 (no wait states); downstream must handle this"
    - "No interrupt output; status is polled via STATUS register"
    - "priority_dir: 0 selects bit7-highest (default); 1 selects bit0-highest"
    - "MASK default 0xFF enables all inputs; write 0x00 to mask all"
    - "CTRL.enable default 0 disables outputs; software must set enable=1 after configuration"
  notes:
    - "Simple priority encoder IP intentionally keeps APB, encoder logic, and output registers in one structure module under a thin top wrapper"

dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

filelist:
  headers:
    - "rtl/priority_enc_param.vh"
  rtl:
    - "rtl/priority_enc_structure.sv"
    - "rtl/priority_enc.sv"
  list:
    - "list/priority_enc.f"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"
test_requirements:
  scenarios:
    - { id: "SC1", name: "Reset defaults", stimulus: "Assert presetn low then release", expected: "All registers at reset values; enc_out=0, enc_valid=0; pready=1", checker: "APB readback and output assertions", coverage: ["TX_RESET"] }
    - { id: "SC2", name: "Register access", stimulus: "Write and read CTRL, MASK, and STATUS registers via APB", expected: "Supported offsets update or return defined values with pready=1, pslverr=0", checker: "APB scoreboard", coverage: ["TX_APB_WRITE", "TX_APB_READ"] }
    - { id: "SC3", name: "Priority evaluation — highest-to-lowest", stimulus: "Set CTRL.enable=1, CTRL.priority_dir=0, MASK=0xFF, drive enc_in patterns", expected: "enc_out = index of highest set bit (bit7 highest); enc_valid=1 when any input high", checker: "Scoreboard compares expected priority-encoded index vs observed enc_out/enc_valid", coverage: ["TX_PRIORITY_EVALUATE", "S0_EVALUATE", "S1_REGISTER"] }
    - { id: "SC4", name: "Priority evaluation — lowest-to-highest", stimulus: "Set CTRL.enable=1, CTRL.priority_dir=1, MASK=0xFF, drive enc_in patterns", expected: "enc_out = index of lowest set bit (bit0 highest); enc_valid=1 when any input high", checker: "Scoreboard verifies direction reversal", coverage: ["TX_PRIORITY_EVALUATE", "priority_dir"] }
    - { id: "SC5", name: "Mask gating", stimulus: "Set CTRL.enable=1, write various MASK patterns, drive enc_in=0xFF", expected: "Only unmasked inputs participate in priority evaluation; enc_out/enc_valid reflect masked result", checker: "Scoreboard verifies per-bit AND with mask", coverage: ["mask_gating"] }
    - { id: "SC6", name: "Enable gate", stimulus: "Set CTRL.enable=0, drive enc_in with various patterns", expected: "enc_out=0, enc_valid=0 regardless of enc_in and MASK", checker: "Output assertion", coverage: ["enable"] }
    - { id: "SC7", name: "1-cycle latency", stimulus: "Change enc_in from 0x00 to 0x01", expected: "enc_out=0 for one cycle, then enc_out=0, enc_valid=1 on next cycle", checker: "Cycle checker verifies latency", coverage: ["S1_REGISTER"] }
    - { id: "SC8", name: "Unsupported APB address", stimulus: "Access offset outside 0x00-0x08 via APB", expected: "pslverr=1, prdata=0 on reads, writable state unchanged on writes", checker: "Error response assertion", coverage: ["unsupported_address"] }
    - { id: "SC9", name: "All-inputs-zero", stimulus: "Set CTRL.enable=1, MASK=0xFF, drive enc_in=0x00", expected: "enc_out=0, enc_valid=0", checker: "Output assertion", coverage: ["TX_PRIORITY_EVALUATE", "zero_inputs"] }
    - { id: "SC10", name: "Consecutive evaluations", stimulus: "Drive rapid enc_in changes on consecutive cycles", expected: "enc_out/enc_valid track with 1-cycle latency for each change", checker: "Scoreboard checks every cycle", coverage: ["S0_EVALUATE", "S1_REGISTER", "throughput"] }
  scoreboard_checks: 10
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Cycle-independent behavioral intent coverage; proves correct priority encoding and register behavior."
      bins:
        - { id: "FCOV_TX_PRIORITY_EVALUATE", source_ref: "function_model.transactions.TX_PRIORITY_EVALUATE", class: "transaction", description: "Priority evaluate transaction observed by scoreboard" }
        - { id: "FCOV_TX_APB_WRITE", source_ref: "function_model.transactions.TX_APB_WRITE", class: "transaction", description: "APB write transaction observed" }
        - { id: "FCOV_TX_APB_READ", source_ref: "function_model.transactions.TX_APB_READ", class: "transaction", description: "APB read transaction observed" }
        - { id: "FCOV_TX_RESET", source_ref: "function_model.transactions.TX_RESET", class: "transaction", description: "Reset behavior observed" }
        - { id: "FCOV_UNSUPPORTED", source_ref: "function_model.transactions.TX_APB_WRITE.error_cases", class: "error_case", description: "Unsupported address error case observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency coverage; proves when behavior occurs."
      bins:
        - { id: "CCOV_STAGE_EVALUATE", source_ref: "cycle_model.pipeline.S0_EVALUATE", class: "pipeline_stage", description: "Combinational evaluate stage observed" }
        - { id: "CCOV_STAGE_REGISTER", source_ref: "cycle_model.pipeline.S1_REGISTER", class: "pipeline_stage", description: "Output register stage observed" }
        - { id: "CCOV_APB_SETUP", source_ref: "cycle_model.handshake_rules.apb_setup", class: "handshake", description: "APB setup phase observed" }
        - { id: "CCOV_APB_ACCESS", source_ref: "cycle_model.handshake_rules.apb_access", class: "handshake", description: "APB access phase observed" }
        - { id: "CCOV_APB_READY", source_ref: "cycle_model.handshake_rules.apb_ready", class: "handshake", description: "pready always-1 rule observed" }
        - { id: "CCOV_LATENCY_1CYCLE", source_ref: "cycle_model.latency.priority_eval_latency", class: "latency", description: "1-cycle output latency verified" }
        - { id: "CCOV_PERF_THROUGHPUT", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "Sustained 1 result per cycle verified" }
    functional: "Legacy alias: function + cycle coverage must both close; new flows read coverage_goals.function and coverage_goals.cycle separately."
    line: ">= 90% instrumented line coverage or explicit project waiver"
    branch: ">= 85% instrumented branch coverage or explicit project waiver"
    fsm: "Single IDLE state with registered outputs; all combinational paths exercised"
    assertions: "All protocol/order/error assertions pass"
quality_gates:
  ssot:
    pass: "All canonical sections are present, substantive, internally consistent, and have no live TBD placeholders."
    evidence: ["check_ssot_disk.sh PASS", "traceability covers function_model/cycle_model/test_requirements"]
  rtl_gen:
    profile: "standard"
    target_scale:
      basis: "optional human-locked structural depth; not enforced for small peripheral IP"
      source_files_min: 0
      modules_min: 0
      procedural_blocks_min: 0
      state_updates_min: 0
      depth_score_min: 0
      logic_modules_min: 0
      behavior_owner_logic_modules_min: 0
    target_scale_waiver:
      approved: false
      reason: ""
      owner: ""
    pass: "SSOT-derived rtl_todo_plan has no blockers/orphans; all implementation TODOs close with fresh evidence including owner-file static analysis, top IO contract, top output drive, top input consumption, manifest hierarchy reachability, named port connections, compile, and lint."
    evidence: ["rtl/rtl_todo_plan.json", "rtl/rtl_authoring_provenance.json", "rtl/rtl_compile.json", "lint/dut_lint.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, lints, and matches SSOT IO contract."
    evidence: ["rtl/rtl_compile.json", "lint/dut_lint.json"]
  dv:
    pass: "cocotb or pyuvm testbench implements all test_requirements.scenarios."
    evidence: ["tb/cocotb/test_priority_enc.py"]
  coverage:
    pass: "SSOT-declared function/cycle/line/branch/FSM/assertion coverage goals pass or have approved waivers."
    evidence: ["cov/coverage.json"]
  eda:
    pass: "Synthesis, STA, PnR, and post-route STA meet SSOT timing/area/power/physical targets or have approved waivers."
    evidence: ["syn/out/area.rpt", "syn/out/timing_summary.rpt", "sta/out/setup.rpt", "sta/out/hold.rpt"]
  signoff:
    pass: "SSOT, RTL compile, lint, DV, coverage, and EDA gates all pass with fresh evidence."
    evidence: ["ATLAS stage engine signoff.json"]
traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "rtl/priority_enc_param.vh" }
    - { yaml: "io_list.interfaces", output: "rtl/priority_enc.sv (top wrapper) + rtl/priority_enc_structure.sv" }
    - { yaml: "registers.register_list", output: "rtl/priority_enc_structure.sv + docs/register_map.md" }
    - { yaml: "function_model", output: "rtl/priority_enc_structure.sv + tb/cocotb scoreboard" }
    - { yaml: "cycle_model", output: "rtl/priority_enc_structure.sv pipeline + waveform checks" }
    - { yaml: "timing", output: "STA constraints and latency pass/fail criteria" }
    - { yaml: "pnr", output: "floorplan/place/CTS/route TCL and routed DEF/Verilog/SPEF" }
    - { yaml: "security", output: "security negative tests" }
    - { yaml: "error_handling", output: "rtl/priority_enc_structure.sv pslverr path + DV unsupported-address scenarios" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff criteria" }
    - { yaml: "fsm", output: "rtl/priority_enc_structure.sv control logic" }
    - { yaml: "test_requirements.scenarios", output: "tb/cocotb/test_priority_enc.py" }
workflow_todos:
  rtl-gen:
    - { id: "RTL_APB_REGFILE", content: "Implement APB register decode and register file", detail: "RTL must decode supported offsets 0x00/0x04/0x08, implement rw CTRL and MASK, ro STATUS, return pslverr for unsupported offsets, and handle reserved fields per reserved_field_policy.", criteria: ["CTRL/MASK writable fields update on APB write", "STATUS mirrors enc_out_q/enc_valid_q", "Unsupported offsets assert pslverr", "Reserved fields read zero and ignore writes", "pready always 1"], source_refs: ["registers.register_list", "io_list.interfaces.apb_slave", "error_handling"], owner_module: "priority_enc_structure", owner_file: "rtl/priority_enc_structure.sv", priority: "high", required: true }
    - { id: "RTL_PRIORITY_EVAL", content: "Implement priority encoder datapath with mask and direction control", detail: "Combinational block: apply MASK to enc_in, detect highest-priority asserted bit per priority_dir, produce 3-bit encoded output and valid flag. Use function_model.transactions.TX_PRIORITY_EVALUATE.output_rules as behavioral reference.", criteria: ["Mask gating: enc_in & mask_q before evaluation", "priority_dir=0: bit7-highest priority encoding", "priority_dir=1: bit0-highest priority encoding", "enable_q=0 gates enc_out=0 enc_valid=0", "All-zero masked input produces enc_valid=0 enc_out=0"], source_refs: ["function_model.transactions.TX_PRIORITY_EVALUATE", "function_model.state_variables", "registers.register_list.CTRL", "registers.register_list.MASK"], owner_module: "priority_enc_structure", owner_file: "rtl/priority_enc_structure.sv", priority: "high", required: true }
    - { id: "RTL_OUTPUT_REGISTER", content: "Register the priority evaluation result and drive top-level outputs", detail: "Capture combinational evaluation into enc_out_q/enc_valid_q on pclk edge; drive enc_out/enc_valid ports; update STATUS.enc_out/STATUS.enc_valid for APB readback. 1-cycle latency from input to output.", criteria: ["enc_out/enc_valid registered on pclk posedge", "enc_out/enc_valid reset to 0 on presetn assertion", "STATUS read returns current registered values", "1-cycle latency from enc_in change to output update"], source_refs: ["cycle_model.pipeline.S1_REGISTER", "cycle_model.latency.priority_eval_latency", "function_model.transactions.TX_PRIORITY_EVALUATE"], owner_module: "priority_enc_structure", owner_file: "rtl/priority_enc_structure.sv", priority: "high", required: true }
    - { id: "RTL_TOP_WRAPPER", content: "Implement top wrapper and filelist", detail: "Top module priority_enc exposes all SSOT top ports, instantiates priority_enc_structure with named connections, and includes parameter header.", criteria: ["priority_enc module exists with full port list", "priority_enc_structure instantiated with named port connections", "list/priority_enc.f lists both RTL files", "rtl/priority_enc_param.vh included"], source_refs: ["top_module", "io_list.top_ports", "integration.connections", "filelist.rtl", "parameters"], owner_module: "priority_enc", owner_file: "rtl/priority_enc.sv", priority: "high", required: true }

generation_flow:
  current_stage: "ssot-gen to rtl-gen"
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh priority_enc", description: "Validate production SSOT structure and quality gates" }
    - { name: "handoff_rtl", command: "/ssot-rtl priority_enc", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb", command: "/ssot-tb priority_enc", description: "Downstream testbench generation from validated SSOT" }
    - { name: "handoff_coverage", command: "/coverage priority_enc", description: "Measure SSOT-declared coverage goals" }
    - { name: "handoff_eda", command: "/syn priority_enc && /sta priority_enc", description: "Produce SSOT-declared synthesis and STA evidence" }
  handoff:
    next: "rtl-gen"
    ssot: "priority_enc/yaml/priority_enc.ssot.yaml"
    top_module: "priority_enc"
