<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>timing compare — SSOT vs VCD</title>
<style>
  :root{--bg:#0d1117;--fg:#e6edf3;--mute:#8b949e;--accent:#58a6ff;--ok:#3fb950;--warn:#d29922;--bad:#f85149;--line:#30363d;--panel:#161b22;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,"Cascadia Mono",Consolas,monospace;font-size:13px;line-height:1.5;}
  .bar{padding:10px 14px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .bar .ttl{font-weight:700;}
  button{background:var(--accent);color:#000;border:0;padding:6px 13px;border-radius:5px;font-family:inherit;font-weight:700;cursor:pointer;}
  button.ghost{background:transparent;color:var(--accent);border:1px solid var(--line);}
  .verdict{font-weight:700;padding:3px 10px;border-radius:5px;}
  .verdict.ok{background:rgba(63,185,80,.15);color:var(--ok);border:1px solid var(--ok);}
  .verdict.bad{background:rgba(248,81,73,.15);color:var(--bad);border:1px solid var(--bad);}
  .lane{padding:6px 14px 0;}
  .lane h3{margin:10px 0 2px;font-size:12px;font-weight:700;display:flex;gap:8px;align-items:center;}
  .lane h3 .src{font-size:10px;color:var(--mute);font-weight:400;}
  .lane.exp h3 .dot{color:var(--accent);} .lane.act h3 .dot{color:var(--warn);}
  .stage{overflow-x:auto;}
  svg{display:block;font-family:inherit;}
  .grid{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4;}
  .wave{fill:none;stroke:var(--accent);stroke-width:1.6;stroke-linejoin:round;}
  .wave.act{stroke:var(--warn);}
  .hatch{stroke:var(--mute);stroke-width:1;opacity:.5;}
  .lbl{fill:var(--mute);font-size:12px;}
  .cyc{fill:var(--mute);font-size:10px;text-anchor:middle;}
  .busText{fill:var(--fg);font-size:11px;text-anchor:middle;}
  .miss{fill:var(--bad);opacity:.16;}
  .missMark{fill:var(--bad);font-size:11px;text-anchor:middle;font-weight:700;}
  .diff{padding:8px 14px 14px;border-top:1px solid var(--line);background:var(--panel);margin-top:8px;}
  .diff .none{color:var(--ok);}
  .drow{font-size:12px;margin:2px 0;}
  .drow .sig{color:var(--accent);} .drow b.e{color:var(--mute);} .drow b.a{color:var(--bad);}
  .legend{font-size:10px;color:var(--mute);}
  .legend code{color:var(--accent);}
</style></head>
<body>
<div class="bar">
  <span class="ttl">⟷ timing compare</span>
  <span id="verdict" class="verdict ok">…</span>
  <button class="ghost" onclick="toggleInject()" id="injbtn">⚠ 위반 주입</button>
  <span class="legend">위: SSOT 계약이 요구하는 <b>기대</b> 파형 · 아래: VCD에서 추출한 <b>실제</b> RTL 파형 · <code>x</code>=don't-care(위반 아님)</span>
</div>

<div class="lane exp"><h3><span class="dot">●</span>EXPECTED<span class="src" id="expSrc"></span></h3><div class="stage"><svg id="svgExp"></svg></div></div>
<div class="lane act"><h3><span class="dot">●</span>ACTUAL<span class="src" id="actSrc"></span></h3><div class="stage"><svg id="svgAct"></svg></div></div>
<div class="diff" id="diff"></div>

<script>
const SVGNS='http://www.w3.org/2000/svg';
const LABELW=92,CW=64,ROWH=44,HDR=22,AMP=22,PAD=8;

// ── REAL data: EXPECTED produced by scripts/wavespec/ssot_to_wavespec.py ──
const EXPECTED = {"title":"EXPECTED · atlas_flow_gpio_demo · APB write 0x55→DATA@0x0 (from SSOT contract)","signals":[
  {"name":"PCLK","wave":"ppppp"},
  {"name":"PSEL","wave":"01.0."},
  {"name":"PENABLE","wave":"0.10."},
  {"name":"PWRITE","wave":"x1.x."},
  {"name":"PADDR","wave":"x=.x.","data":["0x0"]},
  {"name":"PWDATA","wave":"x=.x.","data":["0x55"]},
  {"name":"PREADY","wave":"1...."},
  {"name":"gpio_out","wave":"=.=..","data":["0x0","0x55"]}
]};
// A deliberately wrong contract variant — toggled by "위반 주입" to show detection.
// (spec claims gpio_out updates one cycle LATER than the RTL actually drives it)
const EXPECTED_BUGGY = JSON.parse(JSON.stringify(EXPECTED));
EXPECTED_BUGGY.title="EXPECTED (injected violation) · gpio_out contracted one cycle late";
EXPECTED_BUGGY.signals.find(s=>s.name==="gpio_out").wave="=..=.";   // 0x0,0x0,0x0,0x55,0x55
EXPECTED_BUGGY.signals.find(s=>s.name==="PENABLE").wave="001.0";    // access asserted a cycle late

// ── REAL data: ACTUAL produced by scripts/wavespec/vcd_to_wavespec.py ──
const ACTUAL = {"title":"ACTUAL · atlas_flow_gpio_demo.vcd · @posedge PCLK (0x55 write window)","signals":[
  {"name":"PCLK","wave":"ppppp"},
  {"name":"PSEL","wave":"01.0."},
  {"name":"PENABLE","wave":"0.10."},
  {"name":"PWRITE","wave":"1..01"},
  {"name":"PADDR","wave":"=....","data":["0x0"]},
  {"name":"PWDATA","wave":"==..=","data":["0xD","0x55","0xF"]},
  {"name":"PREADY","wave":"1...."},
  {"name":"gpio_out","wave":"=.=..","data":["0x0","0x55"]}
]};

let inject=false;

function parseWave(wave,data){
  const cells=[];let prev=null,di=0;
  for(const ch of wave){
    if(ch==='.'){cells.push(prev?{...prev,edge:false}:{kind:'level',v:0,edge:false});continue;}
    let c;
    if(ch==='p'||ch==='n')c={kind:'clock'};
    else if(ch==='1')c={kind:'level',v:1};
    else if(ch==='0')c={kind:'level',v:0};
    else if(ch==='=')c={kind:'bus',label:(data&&data[di++])||'='};
    else if(ch==='x')c={kind:'x'};
    else if(ch==='z')c={kind:'z'};
    else c={kind:'level',v:0};
    c.edge=true;cells.push(c);prev=c;
  }
  return cells;
}
function cellVal(c){
  if(!c)return undefined;
  switch(c.kind){case 'clock':return 'p';case 'level':return c.v?'1':'0';case 'bus':return c.label;case 'x':return 'x';case 'z':return 'z';}
}
function isClock(sig){return sig.wave[0]==='p';}

// cell-by-cell contract diff: a mismatch only when EXPECTED is concrete (not x/z) and differs.
function computeDiff(exp,act){
  const mism={};const rows=[];
  const actMap={};act.signals.forEach(s=>actMap[s.name]=parseWave(s.wave,s.data));
  exp.signals.forEach(s=>{
    if(isClock(s))return;
    const ec=parseWave(s.wave,s.data),ac=actMap[s.name];if(!ac)return;
    for(let i=0;i<ec.length;i++){
      const ev=cellVal(ec[i]),av=cellVal(ac[i]);
      if(ev==='x'||ev==='z'||ev===undefined||av===undefined)continue;
      if(ev!==av){(mism[s.name]=mism[s.name]||new Set()).add(i);rows.push({sig:s.name,cell:i,exp:ev,act:av});}
    }
  });
  return {mism,rows};
}

function svgEl(t,a){const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}

function render(svgId,model,actClass,mism){
  const svg=document.getElementById(svgId);
  const n=Math.max(...model.signals.map(s=>s.wave.length),1);
  const W=LABELW+n*CW,H=HDR+model.signals.length*ROWH+8;
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML='';
  for(let i=0;i<n;i++){
    const x=LABELW+i*CW;
    svg.appendChild(svgEl('line',{class:'grid',x1:x,y1:HDR,x2:x,y2:H-8}));
    const t=svgEl('text',{class:'cyc',x:x+CW/2,y:14});t.textContent=i;svg.appendChild(t);
  }
  model.signals.forEach((sig,ri)=>{
    const cells=parseWave(sig.wave,sig.data);
    const top=HDR+ri*ROWH,hiY=top+PAD,lowY=hiY+AMP,midY=(hiY+lowY)/2;
    const missSet=mism&&mism[sig.name];
    if(missSet)missSet.forEach(ci=>{
      const x=LABELW+ci*CW;
      svg.appendChild(svgEl('rect',{class:'miss',x:x,y:top,width:CW,height:ROWH}));
      const m=svgEl('text',{class:'missMark',x:x+CW/2,y:top+ROWH-3});m.textContent='✗';svg.appendChild(m);
    });
    const nm=svgEl('text',{class:'lbl',x:8,y:midY+4});nm.textContent=sig.name;svg.appendChild(nm);
    const parts=[],hatch=[],texts=[];let prevY=lowY;
    cells.forEach((c,ci)=>{
      const x0=LABELW+ci*CW,x1=x0+CW,mid=(x0+x1)/2;
      if(c.kind==='clock'){parts.push(`M${x0},${lowY} L${x0},${hiY} L${mid},${hiY} L${mid},${lowY} L${x1},${lowY}`);prevY=lowY;}
      else if(c.kind==='level'){const y=c.v?hiY:lowY;if(c.edge&&prevY!==y)parts.push(`M${x0},${prevY} L${x0},${y}`);parts.push(`M${x0},${y} L${x1},${y}`);prevY=y;}
      else if(c.kind==='bus'){
        if(c.edge){let j=ci+1;while(j<cells.length&&cells[j].kind==='bus'&&!cells[j].edge)j++;const rx=LABELW+j*CW;
          parts.push(`M${x0},${midY} L${x0+5},${hiY}`);parts.push(`M${x0},${midY} L${x0+5},${lowY}`);
          parts.push(`M${x0+5},${hiY} L${rx},${hiY}`);parts.push(`M${x0+5},${lowY} L${rx},${lowY}`);
          texts.push({x:(x0+rx)/2,y:midY+4,t:c.label});}
        prevY=midY;}
      else if(c.kind==='x'){parts.push(`M${x0},${hiY} L${x1},${hiY}`);parts.push(`M${x0},${lowY} L${x1},${lowY}`);for(let hx=x0;hx<x1;hx+=6)hatch.push(`M${hx},${hiY} L${Math.min(hx+AMP,x1)},${lowY}`);prevY=midY;}
      else if(c.kind==='z'){parts.push(`M${x0},${midY} L${x1},${midY}`);prevY=midY;}
    });
    if(hatch.length)svg.appendChild(svgEl('path',{class:'hatch',d:hatch.join(' ')}));
    svg.appendChild(svgEl('path',{class:'wave'+(actClass?' act':''),d:parts.join(' ')}));
    texts.forEach(tx=>{const t=svgEl('text',{class:'busText',x:tx.x,y:tx.y});t.textContent=tx.t;svg.appendChild(t);});
  });
}

function run(){
  const exp=inject?EXPECTED_BUGGY:EXPECTED;
  document.getElementById('expSrc').textContent='— '+exp.title.replace(/^EXPECTED · /,'');
  document.getElementById('actSrc').textContent='— '+ACTUAL.title.replace(/^ACTUAL · /,'');
  const {mism,rows}=computeDiff(exp,ACTUAL);
  render('svgExp',exp,false,null);
  render('svgAct',ACTUAL,true,mism);
  const v=document.getElementById('verdict');
  if(rows.length===0){v.className='verdict ok';v.textContent='✓ 계약 만족 — 불일치 0';}
  else{v.className='verdict bad';v.textContent='✗ '+rows.length+' 불일치';}
  const d=document.getElementById('diff');
  if(rows.length===0){d.innerHTML='<span class="none">✓ 모든 concrete 계약 셀이 실제 RTL 파형과 일치합니다. (don’t-care 셀은 비교 제외)</span>';}
  else{d.innerHTML='<b>불일치 (기대 ≠ 실제):</b>'+rows.map(r=>
    `<div class="drow"><span class="sig">${r.sig}</span> @cyc ${r.cell} — 기대 <b class="e">${r.exp}</b> / 실제 <b class="a">${r.act}</b></div>`).join('');}
}
function toggleInject(){inject=!inject;document.getElementById('injbtn').textContent=inject?'↩ 정상 계약 복원':'⚠ 위반 주입';run();}
run();
</script>

<script>
/* ── self-contained SVG/PNG export (zero-tooling, class-agnostic) ── */
(function(){
  const NS='http://www.w3.org/2000/svg';
  const PROPS=['fill','fill-opacity','fill-rule','stroke','stroke-width','stroke-dasharray','stroke-linejoin','stroke-linecap','stroke-opacity','opacity','font-family','font-size','font-weight','font-style','text-anchor','dominant-baseline','visibility'];
  function inlineInto(src,dst){const cs=getComputedStyle(src);let st='';for(const p of PROPS){const v=cs.getPropertyValue(p);if(v&&v!=='none'||p==='fill'||p==='stroke')st+=p+':'+v+';';}dst.setAttribute('style',st);}
  function inlined(src){const c=src.cloneNode(true);inlineInto(src,c);const s=src.querySelectorAll('*'),d=c.querySelectorAll('*');for(let i=0;i<s.length;i++)inlineInto(s[i],d[i]);c.removeAttribute('id');return c;}
  function dims(src){const vb=src.viewBox&&src.viewBox.baseVal;const r=src.getBoundingClientRect();return{w:(vb&&vb.width)||r.width,h:(vb&&vb.height)||r.height};}
  function bgRect(w,h){const bg=getComputedStyle(document.body).backgroundColor||'#0d1117';const r=document.createElementNS(NS,'rect');r.setAttribute('x',0);r.setAttribute('y',0);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('fill',bg);return r;}
  function build(){
    const svgs=[...document.querySelectorAll('svg')].filter(s=>s.id!=='__expbar');
    if(!svgs.length)return null;
    if(svgs.length===1){const c=inlined(svgs[0]),{w,h}=dims(svgs[0]);c.setAttribute('xmlns',NS);c.setAttribute('width',w);c.setAttribute('height',h);c.insertBefore(bgRect(w,h),c.firstChild);return wrap(c,w,h);}
    const parts=svgs.map(s=>({c:inlined(s),...dims(s)}));
    const W=Math.max(...parts.map(p=>p.w)),gap=18,H=parts.reduce((a,p)=>a+p.h,0)+gap*(parts.length-1);
    const root=document.createElementNS(NS,'svg');root.setAttribute('xmlns',NS);root.setAttribute('width',W);root.setAttribute('height',H);root.appendChild(bgRect(W,H));
    let y=0;for(const p of parts){p.c.setAttribute('x',0);p.c.setAttribute('y',y);p.c.setAttribute('width',p.w);p.c.setAttribute('height',p.h);root.appendChild(p.c);y+=p.h+gap;}
    return wrap(root,W,H);
  }
  function wrap(node,w,h){return{xml:'<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(node),w,h};}
  function dl(name,blob){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}
  function base(){return (document.title||'diagram').replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'').toLowerCase();}
  function saveSVG(){const o=build();if(o)dl(base()+'.svg',new Blob([o.xml],{type:'image/svg+xml'}));}
  function savePNG(){const o=build();if(!o)return;const s=2,img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=o.w*s;c.height=o.h*s;const x=c.getContext('2d');x.scale(s,s);x.drawImage(img,0,0);c.toBlob(b=>dl(base()+'.png',b),'image/png');};img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(o.xml);}
  function mk(t,fn){const b=document.createElement('button');b.textContent=t;b.style.cssText='background:#161b22;color:#58a6ff;border:1px solid #30363d;border-radius:5px;padding:5px 9px;font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace;cursor:pointer;';b.onclick=fn;return b;}
  const bar=document.createElement('div');bar.style.cssText='position:fixed;top:8px;right:10px;z-index:99999;display:flex;gap:6px;';
  bar.appendChild(mk('⬇ SVG',saveSVG));bar.appendChild(mk('⬇ PNG',savePNG));
  (document.body||document.documentElement).appendChild(bar);
})();
</script>





<script>
/* ── light/dark theme toggle v2 — re-themes var() CSS, hardcoded CSS-rule hex, and inline/SVG hex; survives re-render ── */
(function(){
  const L = {
    '#0d1117':'#ffffff','#161b22':'#f6f8fa','#16161b':'#f6f8fa','#30363d':'#d1d9e0',
    '#8b949e':'#59636e','#e6edf3':'#1f2328','#adadc0':'#57606a','#4a4a52':'#afb8c1',
    '#58a6ff':'#0969da','#56d4d4':'#0c969b','#bc8cff':'#8250df','#f0883e':'#bc4c00',
    '#3fb950':'#1a7f37','#d29922':'#9a6700','#f85149':'#cf222e',
    '#0b1827':'#ddf4ff','#10243b':'#cae8ff','#10243e':'#c9e6ff','#1d3a5f':'#80b3e6','#3a5170':'#6e9fd4',
    '#0c1c11':'#dafbe1','#1d4326':'#9ae0ad','#3a5a3f':'#8bd6a0',
    '#1c1708':'#fff8c5','#5a4a18':'#d4a72c','#1f0f0a':'#ffe7d6','#6b3320':'#ffb780',
    '#190f1f':'#fbefff','#5b2a6b':'#d2a8ff','#0a1c1c':'#d4f5f5','#1d4a4a':'#7ad1d1'
  };
  const D = Object.fromEntries(Object.entries(L).map(([k,v])=>[v,k]));
  const reFor = m => new RegExp(Object.keys(m).join('|'),'gi');
  const swap = (s,m,re) => (s && re.test(s)) ? s.replace(re,x=>m[x.toLowerCase()]||x) : s;

  const ov = document.createElement('style'); ov.id='__themeOverride';
  ov.textContent='html[data-theme="light"]{--bg:#fff;--fg:#1f2328;--mute:#59636e;--accent:#0969da;'+
    '--ok:#1a7f37;--warn:#9a6700;--bad:#cf222e;--line:#d1d9e0;--panel:#f6f8fa;}'+
    'html[data-theme="light"] body{background:#fff;color:#1f2328;}';
  document.head.appendChild(ov);

  function sweepNode(el,m,re){
    if(el.nodeType!==1) return;
    for(const a of ['fill','stroke','color','stop-color']){
      const v=el.getAttribute&&el.getAttribute(a); if(v&&v[0]==='#'){const n=swap(v,m,re); if(n!==v)el.setAttribute(a,n);}
    }
    const s=el.getAttribute&&el.getAttribute('style');
    if(s&&s.indexOf('#')>=0){const n=swap(s,m,re); if(n!==s)el.setAttribute('style',n);}
  }
  function sweepEls(root,m,re){ sweepNode(root,m,re); const a=root.querySelectorAll?root.querySelectorAll('*'):[]; for(const el of a) sweepNode(el,m,re); }
  function sweepStyles(m,re){ for(const s of document.querySelectorAll('style')){ if(s.id==='__themeOverride')continue; const t=s.textContent; if(t&&t.indexOf('#')>=0){const n=swap(t,m,re); if(n!==t)s.textContent=n;} } }

  let light = localStorage.getItem('iui-theme')==='light', obs=null;
  function apply(){
    const m=light?L:D, re=reFor(m);
    document.documentElement.dataset.theme = light?'light':'dark';
    sweepStyles(m,re); sweepEls(document.body,m,re);
    btn.textContent = light?'◑ Dark':'◐ Light';
    localStorage.setItem('iui-theme', light?'light':'dark');
    if(obs){obs.disconnect();obs=null;}
    if(light){ const fre=reFor(L); obs=new MutationObserver(ms=>{for(const mu of ms)for(const n of mu.addedNodes)if(n.nodeType===1)sweepEls(n,L,fre);}); obs.observe(document.body,{childList:true,subtree:true}); }
  }
  const btn=document.createElement('button');
  btn.style.cssText='position:fixed;bottom:10px;right:10px;z-index:99999;background:var(--panel,#161b22);color:var(--accent,#58a6ff);border:1px solid var(--line,#30363d);border-radius:5px;padding:6px 11px;font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace;cursor:pointer;';
  btn.onclick=()=>{ light=!light; apply(); };
  (document.body||document.documentElement).appendChild(btn);
  if(light) apply(); else btn.textContent='◐ Light';
})();
</script>
</body></html>
