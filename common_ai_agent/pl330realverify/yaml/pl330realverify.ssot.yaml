    - { yaml: "dataflow", output: "datapath RTL, AXI sequence checkers, and beat-by-beat scoreboard" }
    - { yaml: "function_model.transactions", output: "FunctionalModel, scoreboard reference model, transaction tests, and equivalence goals" }
    - { yaml: "function_model.invariants", output: "assertions and negative tests" }
    - { yaml: "cycle_model.handshake_rules", output: "cycle model, APB/AXI/IRQ assertions, and backpressure tests" }
    - { yaml: "cycle_model.pipeline", output: "channel FSM sequencing and cycle coverage bins" }
    - { yaml: "registers.register_list", output: "register decode RTL, register scoreboard, firmware header, and register map documentation" }
    - { yaml: "memory.instances", output: "rd_buf/channel state storage RTL and reset tests" }
    - { yaml: "interrupts", output: "event_irq RTL, interrupt scoreboard, W1C tests, and IRQ coverage" }
    - { yaml: "fsm.channel_fsm", output: "channel FSM RTL and FSM transition coverage" }
    - { yaml: "timing", output: "sdc/pl330realverify.sdc, STA pass/fail criteria, and latency tests" }
    - { yaml: "power", output: "power-state assumptions, reset retention checks, and EDA constraints" }
    - { yaml: "security", output: "negative/security tests and integration security notes" }
    - { yaml: "error_handling", output: "fault RTL paths, fault injection tests, and error coverage" }
    - { yaml: "debug_observability", output: "wave dump probe list, sim_debug checklist, and trace event coverage" }
    - { yaml: "integration.connections", output: "top-level module instantiation wiring and integration audit" }
    - { yaml: "dft", output: "DFT review checklist and signoff-mode scan/MBIST gap tracking" }
    - { yaml: "synthesis", output: "synthesis constraints, required outputs, and QoR report requirements" }
    - { yaml: "pnr", output: "floorplan/placement/routing/CTS report expectations" }
    - { yaml: "coding_rules", output: "RTL style/lint rules and allowed SystemVerilog subset" }
    - { yaml: "test_requirements.scenarios", output: "TB testcases, regression plan, and scenario coverage" }
    - { yaml: "quality_gates", output: "ATLAS stage pass/fail criteria and evidence collection" }
    - { yaml: "workflow_todos", output: "Downstream worker task creation and blocker tracking" }
  requirement_to_yaml:
    - { requirement: "PL330-like DMA engineering subset", yaml: "top_module, features, function_model, cycle_model, registers" }
    - { requirement: "APB4 control interface", yaml: "io_list.interfaces.apb_slave, registers, cycle_model.handshake_rules.APB_ACCESS" }
    - { requirement: "AXI4 read/write memory master", yaml: "io_list.interfaces.axi_rd_master, io_list.interfaces.axi_wr_master, dataflow.read_path, dataflow.write_path" }
    - { requirement: "Eight channels and 32 events", yaml: "parameters.NUM_CHANNELS, parameters.NUM_EVENTS, registers.config, io_list.interfaces.event_inputs" }
    - { requirement: "64-bit datapath", yaml: "parameters.DATA_WIDTH, io_list AXI data ports, memory.instances.rd_buf" }
    - { requirement: "Open assumptions captured", yaml: "custom.assumptions, custom.open_questions" }
workflow_todos:
  fl-model-gen:
    - id: "FL_TODO_BUILD_EXECUTABLE_REFERENCE"
      content: "Build the executable FunctionalModel from SSOT transactions"
      detail: "Translate function_model.state_variables, constants, transactions, output_rules, state_updates, and invariants into the downstream functional reference model without changing SSOT semantics. Keep PL330-like subset assumptions visible from custom.assumptions."
      criteria:
        - "FunctionalModel implements FM_RESET, FM_APB_WRITE, FM_APB_READ, FM_TRANSFER, FM_WFP, FM_FAULT, and FM_IRQ_CLEAR"
        - "Every non-reset transaction has executable state_update or output_rule coverage in the model"
        - "Model smoke checks exercise reset, APB read/write, transfer, WFP, fault, and W1C interrupt behavior"
      source_refs: ["function_model", "rtl_contract", "custom.assumptions"]
      owner_module: "pl330realverify_functional_model"
      owner_file: "sim/pl330realverify_functional_model.py"
      priority: "high"
      required: true
    - id: "FL_TODO_BUILD_CYCLE_REFERENCE"
      content: "Build the cycle/handshake reference model"
      detail: "Use cycle_model.clock/reset/latency/handshake_rules/pipeline/ordering/backpressure/performance to create a clocked timing oracle for APB, AXI, WFP, terminal status, and interrupt update timing."
      criteria:
        - "Cycle model represents all declared pipeline stages S0_APB_ACCEPT through S7_TERMINAL"
        - "Cycle model checks APB_ACCESS, AXI_AR, AXI_R, AXI_AW, AXI_W, AXI_B, and IRQ_LEVEL sample conditions"
        - "Cycle model exposes coverage hooks for all cycle coverage bins"
      source_refs: ["cycle_model", "fsm.channel_fsm", "test_requirements.coverage_goals.cycle"]
      owner_module: "pl330realverify_cycle_model"
      owner_file: "sim/pl330realverify_cycle_model.py"
      priority: "high"
      required: true
  rtl-gen:
    - id: "RTL_TODO_TOP_AND_PARAMS"
      content: "Implement top module, parameter header, and manifest-owned hierarchy"
      detail: "Create rtl/pl330realverify.sv as the top module named pl330realverify plus rtl/pl330realverify_param.vh. Instantiate or directly implement the declared manifest submodules exactly as listed in sub_modules and integration.connections. Do not introduce undeclared external modules."
      criteria:
        - "rtl/pl330realverify.sv contains module pl330realverify with ports matching io_list"
        - "rtl/pl330realverify_param.vh defines DATA_WIDTH, ADDR_WIDTH, ID_WIDTH, NUM_CHANNELS, NUM_EVENTS, REG_ADDR_WIDTH, MAX_BURST_LEN, CLOCK_FREQ_MHZ, RESET_POLARITY, and SUPPORT_UNALIGNED"
        - "All declared manifest submodules are present or intentionally folded with provenance to their source refs"
        - "Integration wiring matches integration.connections or an SSOT TBD report is returned"
      source_refs: ["top_module", "parameters", "io_list", "sub_modules", "integration.connections"]
      owner_module: "pl330realverify"
      owner_file: "rtl/pl330realverify.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_APB_REGISTERS"
      content: "Implement APB4 register decode and register side effects"
      detail: "Implement pl330realverify_regs from registers.register_list, APB protocol rules, reserved-field policy, illegal access behavior, W1C INTSTATUS, INTEN, CSR status visibility, DBGCMD pulses, and CONTROL start/halt/fault/WFP fields."
      criteria:
        - "APB read/write timing follows cycle_model.handshake_rules.APB_ACCESS and APB_READ_DATA"
        - "Every register field has declared access/reset/read/write behavior implemented"
        - "Reserved fields read zero and ignore writes without allocating storage"
        - "Illegal APB access asserts pslverr with pready and does not mutate DMA architectural state"
      source_refs: ["registers.register_list", "io_list.interfaces.apb_slave", "function_model.transactions.FM_APB_WRITE", "function_model.transactions.FM_APB_READ", "rtl_contract.illegal_access_behavior"]
      owner_module: "pl330realverify_regs"
      owner_file: "rtl/pl330realverify_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_CHANNEL_FSM"
      content: "Implement channel FSM and command sequencing"
      detail: "Implement pl330realverify_channel_fsm legal states and transitions, command accept, WFP hold/release, AXI stage sequencing, completion/fault terminal states, and halt/fault-clear behavior according to fsm.channel_fsm and cycle_model.pipeline/order/backpressure."
      criteria:
        - "Reset state is STOPPED and state transitions match fsm.channel_fsm.transitions"
        - "No AXI traffic is issued while WAITING_FOR_PERIPHERAL and selected_event is zero"
        - "Completion is posted only after final successful B response"
        - "First fault transitions through FAULT_COMPLETING to FAULTED and suppresses same-transfer completion"
      source_refs: ["fsm.channel_fsm", "cycle_model.pipeline", "cycle_model.ordering", "function_model.transactions.FM_WFP", "function_model.transactions.FM_FAULT"]
      owner_module: "pl330realverify_channel_fsm"
      owner_file: "rtl/pl330realverify_channel_fsm.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_AXI_ADAPTERS"
      content: "Implement AXI read/write single-outstanding protocol adapters"
      detail: "Implement pl330realverify_axi_rd and pl330realverify_axi_wr with stable payload hold-until-ready behavior, response classification, single-outstanding policy, and ready/valid timing from cycle_model.handshake_rules."
      criteria:
        - "AR/AW/W payloads remain stable while valid is asserted and ready is low"
        - "R data captures only on rvalid and rready with rresp OKAY"
        - "B response consumes only on bvalid and bready"
        - "Non-OKAY rresp and bresp produce the declared ERR_AXI_RD/ERR_AXI_WR fault indications"
      source_refs: ["io_list.interfaces.axi_rd_master", "io_list.interfaces.axi_wr_master", "cycle_model.handshake_rules.AXI_AR", "cycle_model.handshake_rules.AXI_R", "cycle_model.handshake_rules.AXI_AW", "cycle_model.handshake_rules.AXI_W", "cycle_model.handshake_rules.AXI_B", "error_handling.error_sources"]
      owner_module: "pl330realverify_axi_rd/pl330realverify_axi_wr"
      owner_file: "rtl/pl330realverify_axi_rd.sv, rtl/pl330realverify_axi_wr.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_DATAPATH_AND_INTERRUPTS"
      content: "Implement address/count datapath, rd_buf, event selection, interrupt pending/enable, and fault classification"
      detail: "Implement pl330realverify_datapath and pl330realverify_event_irq using function_model state updates/output rules, dataflow read/write/loop/event/interrupt paths, memory.instances, interrupts.clear_policy, and error_handling propagation/recovery rules."
      criteria:
        - "rd_buf captures read data and wdata/wstrb output rules match rtl_contract/function_model"
        - "SAR/DAR increment by DATA_WIDTH/8 only after successful write responses"
        - "loop_remaining decrements and terminal status/interrupts follow FM_TRANSFER"
        - "INTSTATUS W1C and dmac_irq OR-reduction of INTSTATUS & INTEN follow FM_IRQ_CLEAR and interrupts.output.expression"
        - "ERR_UNALIGNED, ERR_DEBUG_REJECT, ERR_AXI_RD, ERR_AXI_WR, and ERR_EVENT_TIMEOUT follow error_handling"
      source_refs: ["function_model.transactions.FM_TRANSFER", "function_model.transactions.FM_IRQ_CLEAR", "function_model.state_variables", "dataflow", "memory.instances", "interrupts", "error_handling"]
      owner_module: "pl330realverify_datapath/pl330realverify_event_irq"
      owner_file: "rtl/pl330realverify_datapath.sv, rtl/pl330realverify_event_irq.sv"
      priority: "high"
      required: true
  tb-gen:
    - id: "TB_TODO_SCENARIOS_AND_SCOREBOARD"
      content: "Implement SSOT-derived verification scenarios and scoreboard"
      detail: "Create the downstream TB, agents/BFMs, tests, assertions, and scoreboard from test_requirements, function_model, cycle_model, registers, io_list, interrupts, and debug_observability."
      criteria:
        - "All nine test_requirements.scenarios execute or carry approved SSOT waivers"
        - "Scoreboard checks APB, AXI, WFP, interrupt, debug, reset, and error behavior against function_model and cycle_model"
        - "Coverage bins under coverage_goals.function and coverage_goals.cycle are sampled"
      source_refs: ["test_requirements.scenarios", "test_requirements.coverage_goals", "function_model", "cycle_model", "debug_observability"]
      owner_module: "tb_top"
      owner_file: "tb/tb_top.sv"
      priority: "high"
      required: true
  sim_debug:
    - id: "SIMDBG_TODO_PROBE_AND_FAILURE_TRIAGE"
      content: "Use declared waveform probes and trace events for debug triage"
      detail: "When simulations exist, inspect debug_observability.waveform_must_probe and trace_events to correlate failures to SSOT function/cycle source refs."
      criteria:
        - "Waveforms include every debug_observability.waveform_must_probe item or a documented equivalent"
        - "Failures are mapped to function_model transaction, cycle_model rule, register, or integration source refs"
      source_refs: ["debug_observability", "traceability.yaml_to_output"]
      owner_module: "sim_debug"
      owner_file: "sim/coverage_report.md"
      priority: "medium"
      required: false
  coverage:
    - id: "COV_TODO_CLOSE_SSOT_BINS"
      content: "Close SSOT-declared function and cycle coverage"
      detail: "Measure all bins in test_requirements.coverage_goals.function and cycle, plus line/branch/FSM/assertion targets. Add only approved SSOT waivers for gaps."
      criteria:
        - "100% function coverage bins are hit or waived"
        - "100% cycle coverage bins are hit or waived"
        - "Line, branch, FSM, and assertion targets meet declared thresholds or carry approved waivers"
      source_refs: ["test_requirements.coverage_goals", "quality_gates.coverage"]
      owner_module: "coverage"
      owner_file: "cov/coverage.json"
      priority: "medium"
      required: true
  syn:
    - id: "SYN_TODO_RUN_DECLARED_SYNTHESIS"
      content: "Run synthesis against SSOT timing/synthesis contract"
      detail: "Use synthesis.constraints and timing.target_clocks to produce required synthesis outputs/reports after RTL exists."
      criteria:
        - "Synthesis top is pl330realverify"
        - "Required outputs and reports listed under synthesis are generated"
        - "Timing and PPA results are captured for quality_gates.eda evidence"
      source_refs: ["synthesis", "timing", "quality_gates.eda"]
      owner_module: "synthesis"
      owner_file: "syn/out/pl330realverify_timing.rpt"
      priority: "medium"
      required: false
  pnr:
    - id: "PNR_TODO_RUN_DECLARED_PHYSICAL_FLOW"
      content: "Run PnR against declared generic physical constraints"
      detail: "Use pnr utilization/aspect/CTS/routing requirements after synthesized netlist exists; preserve no-hard-macro and single-clock assumptions."
      criteria:
        - "PnR outputs and reports listed under pnr.required_outputs and pnr.required_reports are generated"
        - "Utilization, congestion, DRC, and antenna reports satisfy quality_gates.eda or carry approved waivers"
      source_refs: ["pnr", "quality_gates.eda", "custom.assumptions.ASM_GENERIC_PHYSICAL_TARGETS"]
      owner_module: "pnr"
      owner_file: "pnr/out/pl330realverify.def"
      priority: "low"
      required: false
  sta:
    - id: "STA_TODO_RUN_SETUP_HOLD"
      content: "Run STA against declared timing contract"
      detail: "Use timing.target_clocks, timing.io_delays, timing.false_paths, and synthesis constraints to check setup and hold after synthesis/PnR artifacts exist."
      criteria:
        - "Setup and hold reports exist"
        - "WNS meets timing.sta_expectations or carries approved SSOT waiver"
      source_refs: ["timing", "synthesis.constraints", "quality_gates.eda"]
      owner_module: "sta"
      owner_file: "sta/out/setup.rpt"
      priority: "medium"
      required: false
  sta-post:
    - id: "STAPOST_TODO_RUN_POST_ROUTE_STA"
      content: "Run post-route STA with routed parasitics"
      detail: "Use routed DEF/Verilog/SPEF and timing.sta_expectations to produce final post-route setup/hold evidence when PnR artifacts exist."
      criteria:
        - "Post-route setup and hold reports exist"
        - "Post-route WNS meets expectations or carries approved waiver"
      source_refs: ["timing.sta_expectations", "pnr.required_outputs", "quality_gates.signoff"]
      owner_module: "sta-post"
      owner_file: "sta-post/out/setup.rpt"
      priority: "low"
      required: false
generation_flow:
  steps:
    - name: "validate_ssot_engineering"
      command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh --mode engineering pl330realverify"
      description: "Validate the engineering SSOT structure, non-empty sections, executable function/cycle contracts, coverage goals, quality gates, traceability, workflow_todos, and generation_flow."
      owner: "ssot-gen"
      expected_evidence: "validator_rc=0 and PASS output from check_ssot_disk"
    - name: "handoff_fl_model"
      command: "/ssot-fl-model pl330realverify"
      description: "Downstream FL/CL model generation from validated SSOT; ssot-gen does not generate these artifacts."
      owner: "fl-model-gen"
      inputs: ["pl330realverify/yaml/pl330realverify.ssot.yaml"]
      outputs: ["sim/pl330realverify_functional_model.py", "sim/pl330realverify_cycle_model.py"]
    - name: "handoff_rtl"
      command: "/ssot-rtl pl330realverify"
      description: "Downstream RTL implementation from validated SSOT, manifest submodule ownership refs, integration connections, and workflow_todos.rtl-gen."
      owner: "rtl-gen"
      inputs: ["pl330realverify/yaml/pl330realverify.ssot.yaml"]
      outputs: ["rtl/pl330realverify.sv", "rtl/pl330realverify_regs.sv", "rtl/pl330realverify_channel_fsm.sv", "rtl/pl330realverify_axi_rd.sv", "rtl/pl330realverify_axi_wr.sv", "rtl/pl330realverify_datapath.sv", "rtl/pl330realverify_event_irq.sv", "rtl/pl330realverify_param.vh"]
    - name: "handoff_tb"
      command: "/ssot-tb pl330realverify"
      description: "Downstream testbench, BFM, scoreboard, assertions, and testcase generation from test_requirements and executable SSOT contracts."
      owner: "tb-gen"
      inputs: ["pl330realverify/yaml/pl330realverify.ssot.yaml"]
      outputs: ["tb/tb_top.sv", "tb/tb_scoreboard.sv", "tb/tb_apb_driver.sv", "tb/tb_axi_memory_bfm.sv"]
    - name: "handoff_sim_debug"
      command: "/wf sim_debug pl330realverify"
      description: "Downstream waveform/debug triage after RTL/TB simulations exist; use debug_observability and traceability sections."
      owner: "sim_debug"
      inputs: ["debug_observability", "sim waveforms", "sim regression outputs"]
      outputs: ["sim/coverage_report.md", "sim/debug_triage.md"]
    - name: "handoff_coverage"
      command: "/coverage pl330realverify"
      description: "Measure SSOT-declared function, cycle, line, branch, FSM, and assertion coverage."
      owner: "coverage"
      inputs: ["test_requirements.coverage_goals", "sim regression outputs"]
      outputs: ["cov/coverage.json", "cov/functional_coverage.rpt", "cov/cycle_coverage.rpt"]
    - name: "handoff_eda"
      command: "/syn pl330realverify && /sta pl330realverify && /pnr pl330realverify && /sta-post pl330realverify"
      description: "Downstream synthesis, timing, physical implementation, and post-route timing evidence from SSOT constraints; not run by ssot-gen."
      owner: "syn/sta/pnr/sta-post"
      inputs: ["rtl implementation", "timing", "synthesis", "pnr"]
      outputs: ["syn/out/pl330realverify_timing.rpt", "sta/out/setup.rpt", "pnr/out/pl330realverify.def", "sta-post/out/setup.rpt"]
  handoff_policy:
    ssot_is_authority: true
    ssot_gen_outputs_only: ["pl330realverify/yaml/pl330realverify.ssot.yaml"]
    downstream_must_not_modify_ssot_without_tbd_report: true
    rtl_tbd_feedback_format: "Use [SSOT TBD REPORT] -> ssot-gen for missing behavioral facts."
  validation:
    run_mode: "engineering"
    required_command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh --mode engineering pl330realverify"
    required_result: "validator_rc=0"
    required_pass_text: "[check_ssot_disk] PASS"
