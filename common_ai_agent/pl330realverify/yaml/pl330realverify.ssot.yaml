ip: pl330realverify
version: draft
purpose: "Production-oriented SSOT contract for a PL330/DMA-330-like multi-channel DMA verification target with APB4 control, AXI4 memory master interfaces, event wait, interrupt, debug, and fault behavior."
type: "dma"
top_module:
  name: "pl330realverify"
  file: "rtl/pl330realverify.sv"
  version: "1.0"
  type: "dma"
  quality_profile: "production"
  description: "PL330/DMA-330-like DMA controller verification target with APB4 register access, AXI4 memory transfer channels, wait-for-peripheral events, interrupts, debug command, and fault reporting."
  reference_spec: "ARM PL330/DMA-330 behavior class; user-defined engineering verification subset"
  target:
    technology: "generic"
    clock_freq_mhz: 500
    area_um2: null
    power_mw: null
sub_modules:
  - name: "pl330realverify_regs"
    file: "rtl/pl330realverify_regs.sv"
    ownership: "manifest"
    ssot_gen: true
    description: "APB register decode, CSR storage, W1C interrupt/status behavior, and register-driven command pulses."
    implements: ["registers.register_list", "io_list.interfaces.apb_slave", "interrupts.sources", "error_handling.error_sources", "rtl_contract.input_map"]
    source_sections: ["registers", "io_list", "interrupts", "error_handling", "rtl_contract"]
    function_model_refs: ["function_model.transactions.FM_APB_WRITE", "function_model.transactions.FM_APB_READ", "function_model.transactions.FM_IRQ_CLEAR", "function_model.transactions.FM_RESET"]
    decomposition_refs: ["decomposition.units.apb_registers"]
    register_refs: ["registers.register_list"]
    ssot_refs: ["io_list.interfaces.apb_slave"]
    cycle_model_refs: ["cycle_model.handshake_rules.APB_ACCESS"]
    connections:
      - { port: "clk_i", signal: "dmaclk" }
      - { port: "rst_ni", signal: "dmacresetn" }
      - { port: "paddr_i", signal: "paddr" }
      - { port: "psel_i", signal: "psel" }
      - { port: "penable_i", signal: "penable" }
      - { port: "pwrite_i", signal: "pwrite" }
      - { port: "pwdata_i", signal: "pwdata" }
      - { port: "pstrb_i", signal: "pstrb" }
      - { port: "prdata_o", signal: "prdata" }
      - { port: "pready_o", signal: "pready" }
      - { port: "pslverr_o", signal: "pslverr" }
      - { port: "irq_o", signal: "dmac_irq" }
  - name: "pl330realverify_channel_fsm"
    file: "rtl/pl330realverify_channel_fsm.sv"
    ownership: "manifest"
    ssot_gen: false
    description: "Per-channel control FSM for start, WFP, AXI read/write sequencing, completion, and fault transitions."
    implements: ["fsm.channel_fsm", "cycle_model.pipeline", "function_model.transactions.FM_TRANSFER", "function_model.transactions.FM_WFP"]
    source_sections: ["fsm", "cycle_model", "function_model"]
    fsm_refs: ["fsm.channel_fsm"]
    decomposition_refs: ["decomposition.units.channel_control"]
    cycle_model_refs: ["cycle_model.pipeline", "cycle_model.ordering", "cycle_model.backpressure"]
    function_model_refs: ["function_model.transactions.FM_TRANSFER", "function_model.transactions.FM_WFP", "function_model.transactions.FM_FAULT"]
    connections:
      - { port: "clk_i", signal: "dmaclk" }
      - { port: "rst_ni", signal: "dmacresetn" }
      - { port: "start_cmd_i", signal: "start_cmd" }
      - { port: "halt_cmd_i", signal: "halt_cmd" }
      - { port: "selected_event_i", signal: "selected_event" }
      - { port: "state_o", signal: "channel_state" }
  - name: "pl330realverify_axi_rd"
    file: "rtl/pl330realverify_axi_rd.sv"
    ownership: "manifest"
    ssot_gen: true
    description: "AXI read address/data protocol adapter and read response classifier."
    implements: ["io_list.interfaces.axi_rd_master", "cycle_model.handshake_rules.AXI_AR", "cycle_model.handshake_rules.AXI_R", "error_handling.error_sources.ERR_AXI_RD"]
    source_sections: ["io_list", "cycle_model", "error_handling"]
    ssot_refs: ["io_list.interfaces.axi_rd_master"]
    function_model_refs: ["function_model.transactions.FM_TRANSFER", "function_model.transactions.FM_TRANSFER.error_cases.ERR_AXI_RD"]
    decomposition_refs: ["decomposition.units.axi_read_adapter"]
    cycle_model_refs: ["cycle_model.handshake_rules.AXI_AR", "cycle_model.handshake_rules.AXI_R"]
    connections:
      - { port: "clk_i", signal: "dmaclk" }
      - { port: "rst_ni", signal: "dmacresetn" }
      - { port: "arvalid_o", signal: "arvalid" }
      - { port: "arready_i", signal: "arready" }
      - { port: "rvalid_i", signal: "rvalid" }
      - { port: "rready_o", signal: "rready" }
      - { port: "rdata_i", signal: "rdata" }
      - { port: "rresp_i", signal: "rresp" }
  - name: "pl330realverify_axi_wr"
    file: "rtl/pl330realverify_axi_wr.sv"
    ownership: "manifest"
    ssot_gen: true
    description: "AXI write address/data/response protocol adapter and write response classifier."
    implements: ["io_list.interfaces.axi_wr_master", "cycle_model.handshake_rules.AXI_AW", "cycle_model.handshake_rules.AXI_W", "cycle_model.handshake_rules.AXI_B", "error_handling.error_sources.ERR_AXI_WR"]
    source_sections: ["io_list", "cycle_model", "error_handling"]
    ssot_refs: ["io_list.interfaces.axi_wr_master"]
    function_model_refs: ["function_model.transactions.FM_TRANSFER", "function_model.transactions.FM_TRANSFER.error_cases.ERR_AXI_WR"]
    decomposition_refs: ["decomposition.units.axi_write_adapter"]
    cycle_model_refs: ["cycle_model.handshake_rules.AXI_AW", "cycle_model.handshake_rules.AXI_W", "cycle_model.handshake_rules.AXI_B"]
    connections:
      - { port: "clk_i", signal: "dmaclk" }
      - { port: "rst_ni", signal: "dmacresetn" }
      - { port: "awvalid_o", signal: "awvalid" }
      - { port: "awready_i", signal: "awready" }
      - { port: "wvalid_o", signal: "wvalid" }
      - { port: "wready_i", signal: "wready" }
      - { port: "bvalid_i", signal: "bvalid" }
      - { port: "bready_o", signal: "bready" }
      - { port: "bresp_i", signal: "bresp" }
  - name: "pl330realverify_datapath"
    file: "rtl/pl330realverify_datapath.sv"
    ownership: "manifest"
    ssot_gen: false
    description: "Address counters, loop counters, read data buffer, write payload/strobe generation, and status updates."
    implements: ["function_model.state_variables", "function_model.transactions.FM_TRANSFER.state_updates", "dataflow.read_path", "dataflow.write_path", "memory.instances.rd_buf"]
    source_sections: ["function_model", "dataflow", "memory"]
    function_model_refs: ["function_model.state_variables", "function_model.transactions.FM_TRANSFER"]
    decomposition_refs: ["decomposition.units.datapath"]
    dataflow_refs: ["dataflow.read_path", "dataflow.write_path", "dataflow.loop_control"]
    connections:
      - { port: "clk_i", signal: "dmaclk" }
      - { port: "rst_ni", signal: "dmacresetn" }
      - { port: "src_addr_o", signal: "araddr" }
      - { port: "dst_addr_o", signal: "awaddr" }
      - { port: "rd_data_i", signal: "rdata" }
      - { port: "wr_data_o", signal: "wdata" }
  - name: "pl330realverify_event_irq"
    file: "rtl/pl330realverify_event_irq.sv"
    ownership: "manifest"
    ssot_gen: true
    description: "Peripheral event selection, interrupt pending/enable combine, W1C clear, and dmac_irq generation."
    implements: ["io_list.interfaces.event_inputs", "io_list.interfaces.interrupt_output", "interrupts", "function_model.transactions.FM_WFP", "function_model.transactions.FM_IRQ_CLEAR"]
    source_sections: ["io_list", "interrupts", "function_model", "registers"]
    ssot_refs: ["io_list.interfaces.event_inputs", "io_list.interfaces.interrupt_output"]
    function_model_refs: ["function_model.transactions.FM_WFP", "function_model.transactions.FM_IRQ_CLEAR"]
    decomposition_refs: ["decomposition.units.event_interrupt"]
    register_refs: ["registers.register_list.INTEN", "registers.register_list.INTSTATUS", "registers.register_list.CONTROL"]
    connections:
      - { port: "clk_i", signal: "dmaclk" }
      - { port: "rst_ni", signal: "dmacresetn" }
      - { port: "peripheral_events_i", signal: "peripheral_events" }
      - { port: "irq_o", signal: "dmac_irq" }
decomposition:
  units:
    - id: "apb_registers"
      kind: "control/status"
      source_refs: ["registers.register_list", "io_list.interfaces.apb_slave", "function_model.transactions.FM_APB_READ", "function_model.transactions.FM_APB_WRITE"]
      rtl_candidates: ["pl330realverify_regs"]
      verification_impact: ["test_requirements.scenarios.SC_RESET_APB", "test_requirements.scenarios.SC_W1C_IRQ_CLEAR"]
    - id: "channel_control"
      kind: "fsm/control"
      source_refs: ["fsm.channel_fsm", "cycle_model.pipeline", "function_model.transactions.FM_TRANSFER", "function_model.transactions.FM_WFP"]
      rtl_candidates: ["pl330realverify_channel_fsm"]
      verification_impact: ["test_requirements.scenarios.SC_SINGLE_BEAT_COPY", "test_requirements.scenarios.SC_WFP_EVENT"]
    - id: "axi_read_adapter"
      kind: "protocol_adapter"
      source_refs: ["io_list.interfaces.axi_rd_master", "cycle_model.handshake_rules.AXI_AR", "cycle_model.handshake_rules.AXI_R"]
      rtl_candidates: ["pl330realverify_axi_rd"]
      verification_impact: ["test_requirements.scenarios.SC_AXI_BACKPRESSURE", "test_requirements.scenarios.SC_AXI_READ_FAULT"]
    - id: "axi_write_adapter"
      kind: "protocol_adapter"
      source_refs: ["io_list.interfaces.axi_wr_master", "cycle_model.handshake_rules.AXI_AW", "cycle_model.handshake_rules.AXI_W", "cycle_model.handshake_rules.AXI_B"]
      rtl_candidates: ["pl330realverify_axi_wr"]
      verification_impact: ["test_requirements.scenarios.SC_AXI_BACKPRESSURE", "test_requirements.scenarios.SC_AXI_WRITE_FAULT"]
    - id: "datapath"
      kind: "datapath/state"
      source_refs: ["function_model.state_variables", "dataflow.read_path", "dataflow.write_path", "memory.instances.rd_buf"]
      rtl_candidates: ["pl330realverify_datapath"]
      verification_impact: ["test_requirements.scenarios.SC_SINGLE_BEAT_COPY", "test_requirements.scenarios.SC_MULTI_BEAT_COPY"]
    - id: "event_interrupt"
      kind: "event/interrupt"
      source_refs: ["io_list.interfaces.event_inputs", "interrupts.sources", "function_model.transactions.FM_IRQ_CLEAR"]
      rtl_candidates: ["pl330realverify_event_irq"]
      verification_impact: ["test_requirements.scenarios.SC_WFP_EVENT", "test_requirements.scenarios.SC_W1C_IRQ_CLEAR"]
rtl_contract:
  transaction: "FM_TRANSFER"
  clock: "dmaclk"
  reset: "dmacresetn"
  reset_active: "low"
  sample_condition: "dmacresetn == 1 and psel == 1 and penable == 1 and pwrite == 1 and paddr == 276 and (pwdata & 1) != 0"
  reset_contract:
    reset_signal: "dmacresetn"
    reset_active_expr: "dmacresetn == 0"
    post_reset_expr: "status == 0 and error_code == 0 and intstatus == 0"
  input_map:
    command_start: "CONTROL.start or accepted DBGCMD command"
    command_halt: "CONTROL.halt"
    source_addr: "registers.SAR.src_addr"
    destination_addr: "registers.DAR.dst_addr"
    transfer_count: "registers.LOOP_CFG.loop_count + 1"
    read_data: "axi_rd_master.rdata"
    read_response: "axi_rd_master.rresp"
    write_response: "axi_wr_master.bresp"
    event_vector: "peripheral_events"
    interrupt_enable: "registers.INTEN"
  output_map:
    read_request: "arvalid/araddr/arlen/arsize/arburst/arid"
    read_accept: "rready"
    write_request: "awvalid/awaddr/awlen/awsize/awburst/awid"
    write_data: "wvalid/wdata/wstrb/wlast"
    write_response_accept: "bready"
    status: "registers.CSR.ch_status"
    error_code: "registers.CSR.error_code"
    interrupt: "dmac_irq"
    apb_read_data: "prdata"
    apb_ready: "pready"
    apb_error: "pslverr"
  state_updates:
    - { name: "sar", reset: 0, width: 32, expr: "sar + (DATA_WIDTH // 8) if (bvalid == 1 and bready == 1 and bresp == 0) else sar" }
    - { name: "dar", reset: 0, width: 32, expr: "dar + (DATA_WIDTH // 8) if (bvalid == 1 and bready == 1 and bresp == 0) else dar" }
    - { name: "loop_remaining", reset: 0, width: 8, expr: "(loop_remaining - 1) if (bvalid == 1 and bready == 1 and bresp == 0 and loop_remaining > 0) else loop_remaining" }
    - { name: "status", reset: 0, width: 4, expr: "8 if ((rvalid == 1 and rready == 1 and rresp != 0) or (bvalid == 1 and bready == 1 and bresp != 0)) else (6 if (bvalid == 1 and bready == 1 and bresp == 0 and loop_remaining <= 1) else status)" }
    - { name: "error_code", reset: 0, width: 4, expr: "3 if (rvalid == 1 and rready == 1 and rresp != 0) else (4 if (bvalid == 1 and bready == 1 and bresp != 0) else error_code)" }
    - { name: "intstatus", reset: 0, width: 32, expr: "(intstatus | (1 if (bvalid == 1 and bready == 1 and bresp == 0 and loop_remaining <= 1) else 0) | (256 if ((rvalid == 1 and rready == 1 and rresp != 0) or (bvalid == 1 and bready == 1 and bresp != 0)) else 0)) & (~(pwdata if (psel == 1 and penable == 1 and pwrite == 1 and paddr == 36) else 0))" }
  output_rules:
    - { name: "dmac_irq_rule", port: "dmac_irq", width: 1, expr: "1 if (intstatus & inten) != 0 else 0" }
    - { name: "wdata_rule", port: "wdata", width: 64, expr: "rd_buf" }
    - { name: "wstrb_rule", port: "wstrb", width: 8, expr: "(1 << (DATA_WIDTH // 8)) - 1" }
  reserved_behavior: "Reserved register fields read zero, ignore writes, and are not implemented as storage."
  illegal_access_behavior: "Illegal APB accesses complete with pready=1 and pslverr=1 without changing DMA architectural state."
parameters:
  - name: "DATA_WIDTH"
    default: 64
    type: int
    description: "AXI data width in bits; baseline PL330-like engineering subset uses 64-bit memory beats."
    allowed_values: [32, 64, 128]
    drives: ["rtl/pl330realverify_axi_rd.sv", "rtl/pl330realverify_axi_wr.sv", "rtl/pl330realverify_datapath.sv"]
  - name: "ADDR_WIDTH"
    default: 32
    type: int
    description: "AXI/APB-visible address width in bits for SAR/DAR/PC fields."
    drives: ["rtl/pl330realverify_axi_rd.sv", "rtl/pl330realverify_axi_wr.sv", "rtl/pl330realverify_datapath.sv"]
  - name: "ID_WIDTH"
    default: 6
    type: int
    description: "AXI ID width for read/write master channels."
    drives: ["rtl/pl330realverify_axi_rd.sv", "rtl/pl330realverify_axi_wr.sv"]
  - name: "NUM_CHANNELS"
    default: 8
    type: int
    description: "Number of DMA channels implemented in this verification target."
    drives: ["rtl/pl330realverify_regs.sv", "rtl/pl330realverify_channel_fsm.sv", "rtl/pl330realverify_datapath.sv"]
  - name: "NUM_EVENTS"
    default: 32
    type: int
    description: "Number of peripheral event inputs."
    drives: ["rtl/pl330realverify_event_irq.sv"]
  - name: "REG_ADDR_WIDTH"
    default: 12
    type: int
    description: "APB register window address width."
    drives: ["rtl/pl330realverify_regs.sv"]
  - name: "MAX_BURST_LEN"
    default: 16
    type: int
    description: "Maximum AXI burst length in beats for the baseline contract."
    drives: ["rtl/pl330realverify_datapath.sv", "rtl/pl330realverify_axi_rd.sv", "rtl/pl330realverify_axi_wr.sv"]
  - name: "CLOCK_FREQ_MHZ"
    default: 500
    type: int
    description: "Target clock frequency for timing and cycle-model assumptions."
    drives: ["timing.target_clocks", "synthesis.ppa_targets", "test_requirements"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low"]
    description: "Reset polarity fixed by dmacresetn naming and reset scheme."
    drives: ["clock_reset_domains", "coding_rules"]
  - name: "SUPPORT_UNALIGNED"
    default: 0
    type: int
    allowed_values: [0, 1]
    description: "When zero, unaligned SAR/DAR on start raises ERR_UNALIGNED instead of issuing AXI traffic."
    drives: ["function_model.transactions.FM_FAULT", "error_handling.error_sources.ERR_UNALIGNED"]
io_list:
  clock_domains:
    - name: "dmaclk"
      frequency_mhz: 500
      description: "Primary DMA clock domain for APB, AXI, channel FSMs, and interrupt logic."
      ports:
        - { name: "dmaclk", width: 1, direction: "input", description: "Primary free-running DMA clock." }
  resets:
    - name: "dmacresetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Active-low reset asynchronously asserted and synchronously released into dmaclk."
      ports:
        - { name: "dmacresetn", width: 1, direction: "input", description: "Active-low DMA reset." }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      clock_domain: "dmaclk"
      reset_domain: "dmacresetn"
      description: "Register programming and status access interface."
      protocol:
        setup_phase: "psel=1 and penable=0 captures paddr, pwrite, pwdata, and pstrb."
        access_phase: "psel=1 and penable=1 completes when pready=1."
        write_rule: "Writable fields sample pwdata bits enabled by pstrb on a completing write access."
        read_rule: "prdata is valid during the completing read access and reserved bits read as zero."
        error_rule: "pslverr is asserted with pready for illegal address, illegal write access, or unsupported byte strobe."
      ports:
        - { name: "paddr", width: 12, direction: "input", description: "Byte address within the DMA register window." }
        - { name: "psel", width: 1, direction: "input", description: "APB select." }
        - { name: "penable", width: 1, direction: "input", description: "APB access phase indicator." }
        - { name: "pwrite", width: 1, direction: "input", description: "APB write indicator." }
        - { name: "pwdata", width: 32, direction: "input", description: "APB write data." }
        - { name: "pstrb", width: 4, direction: "input", description: "APB byte write strobes." }
        - { name: "prdata", width: 32, direction: "output", description: "APB read data." }
        - { name: "pready", width: 1, direction: "output", description: "APB ready; zero wait-state in the baseline contract." }
        - { name: "pslverr", width: 1, direction: "output", description: "APB slave error for illegal accesses." }
    - name: "axi_rd_master"
      type: "AXI4"
      role: "master"
      clock_domain: "dmaclk"
      reset_domain: "dmacresetn"
      description: "AXI4 read master used to fetch source data for DMA transfers."
      protocol:
        ar_rule: "Hold arvalid and all AR payload signals stable until arvalid and arready are both one on a rising dmaclk edge."
        r_rule: "Capture rdata only when rvalid and rready are both one; rlast must match the final beat of the issued burst."
        response_rule: "rresp value zero is OKAY; any nonzero response transitions the channel to FAULTED and raises ERR_AXI_RD."
        ordering_rule: "For this engineering subset, at most one read burst is outstanding per channel."
      ports:
        - { name: "arid", width: 6, direction: "output", description: "Read transaction ID." }
        - { name: "araddr", width: 32, direction: "output", description: "Read byte address." }
        - { name: "arlen", width: 8, direction: "output", description: "AXI burst length minus one." }
        - { name: "arsize", width: 3, direction: "output", description: "AXI beat size encoding; 3 for 64-bit transfers." }
        - { name: "arburst", width: 2, direction: "output", description: "AXI burst type; INCR for sequential beats." }
        - { name: "arcache", width: 4, direction: "output", description: "AXI cache attributes." }
        - { name: "arprot", width: 3, direction: "output", description: "AXI protection attributes." }
        - { name: "arvalid", width: 1, direction: "output", description: "Read address valid." }
        - { name: "arready", width: 1, direction: "input", description: "Read address ready." }
        - { name: "rid", width: 6, direction: "input", description: "Read data ID." }
        - { name: "rdata", width: 64, direction: "input", description: "Read data beat." }
        - { name: "rresp", width: 2, direction: "input", description: "Read response." }
        - { name: "rlast", width: 1, direction: "input", description: "Read final beat." }
        - { name: "rvalid", width: 1, direction: "input", description: "Read data valid." }
        - { name: "rready", width: 1, direction: "output", description: "Read data ready." }
    - name: "axi_wr_master"
      type: "AXI4"
      role: "master"
      clock_domain: "dmaclk"
      reset_domain: "dmacresetn"
      description: "AXI4 write master used to write destination data for DMA transfers."
      protocol:
        aw_rule: "Hold awvalid and all AW payload signals stable until awvalid and awready are both one on a rising dmaclk edge."
        w_rule: "Hold wvalid, wdata, wstrb, and wlast stable until wvalid and wready are both one."
        b_rule: "Assert bready while waiting for a write response and consume bresp on bvalid and bready."
        response_rule: "bresp value zero is OKAY; any nonzero response transitions the channel to FAULTED and raises ERR_AXI_WR."
        ordering_rule: "For this engineering subset, at most one write burst is outstanding per channel."
      ports:
        - { name: "awid", width: 6, direction: "output", description: "Write transaction ID." }
        - { name: "awaddr", width: 32, direction: "output", description: "Write byte address." }
        - { name: "awlen", width: 8, direction: "output", description: "AXI burst length minus one." }
        - { name: "awsize", width: 3, direction: "output", description: "AXI beat size encoding; 3 for 64-bit transfers." }
        - { name: "awburst", width: 2, direction: "output", description: "AXI burst type; INCR for sequential beats." }
        - { name: "awcache", width: 4, direction: "output", description: "AXI cache attributes." }
        - { name: "awprot", width: 3, direction: "output", description: "AXI protection attributes." }
        - { name: "awvalid", width: 1, direction: "output", description: "Write address valid." }
        - { name: "awready", width: 1, direction: "input", description: "Write address ready." }
        - { name: "wdata", width: 64, direction: "output", description: "Write data beat." }
        - { name: "wstrb", width: 8, direction: "output", description: "Write byte strobes." }
        - { name: "wlast", width: 1, direction: "output", description: "Write final beat." }
        - { name: "wvalid", width: 1, direction: "output", description: "Write data valid." }
        - { name: "wready", width: 1, direction: "input", description: "Write data ready." }
        - { name: "bid", width: 6, direction: "input", description: "Write response ID." }
        - { name: "bresp", width: 2, direction: "input", description: "Write response." }
        - { name: "bvalid", width: 1, direction: "input", description: "Write response valid." }
        - { name: "bready", width: 1, direction: "output", description: "Write response ready." }
    - name: "event_inputs"
      type: "custom"
      role: "input"
      clock_domain: "dmaclk"
      reset_domain: "dmacresetn"
      description: "Peripheral event lines used by wait-for-peripheral behavior."
      protocol:
        sampling: "peripheral_events is sampled on rising dmaclk while dmacresetn is high."
        stability: "The selected event bit must be high for at least one dmaclk sample to release WFP."
        synchronization: "External integration must synchronize asynchronous events before driving this port."
      ports:
        - { name: "peripheral_events", width: 32, direction: "input", description: "One-hot or bit-vector event indications." }
    - name: "interrupt_output"
      type: "custom"
      role: "output"
      clock_domain: "dmaclk"
      reset_domain: "dmacresetn"
      description: "Combined DMA interrupt request."
      protocol:
        assertion: "dmac_irq is one when any enabled pending interrupt source is set."
        deassertion: "dmac_irq returns to zero when all enabled pending sources are cleared by W1C or reset."
        reset_value: 0
      ports:
        - { name: "dmac_irq", width: 1, direction: "output", description: "Active-high combined interrupt output." }
features:
  - name: "APB programmable DMA channels"
    trigger: "APB writes to per-channel SAR, DAR, LOOP_CFG, CONTROL.start, and related configuration registers."
    datapath: "Registers feed channel FSM and datapath state variables; start captures a command snapshot and blocks illegal writes while active."
    control: "register_fsm plus channel_fsm STOPPED/EXECUTING/COMPLETED/FAULTED states."
    output: "APB read data, pslverr, channel status, and command pulses."
  - name: "AXI memory-to-memory transfer"
    trigger: "Accepted start command for an aligned channel with fault_inject deasserted and WFP either disabled or satisfied."
    datapath: "SAR -> AXI AR -> AXI R -> rd_buf -> AXI AW/W -> AXI B -> SAR/DAR/count update."
    control: "channel_fsm ISSUE_READ, WAIT_READ, ISSUE_WRITE, WAIT_WRITE_RESP, COMPLETING."
    output: "AXI read/write master transactions and completion status/interrupt."
  - name: "Wait-for-peripheral event release"
    trigger: "CONTROL.wfp_enable=1 for a started channel."
    datapath: "CONTROL.wfp_event selects one peripheral_events bit, sampled in dmaclk."
    control: "channel_fsm WAITING_FOR_PERIPHERAL holds until selected_event=1."
    output: "No AXI traffic while waiting; normal transfer resumes after event."
  - name: "Interrupt pending/enable/W1C"
    trigger: "Transfer completion, transfer fault, debug done, or APB W1C clear."
    datapath: "Raw INTSTATUS bits combine with INTEN to drive dmac_irq."
    control: "event_irq block updates pending bits on terminal channel events and APB W1C."
    output: "Active-high level dmac_irq and software-readable pending status."
  - name: "Debug command subset"
    trigger: "APB write to DBGCMD."
    datapath: "DBGCMD.channel selects the target channel for a debug command pulse; PC is observable but external microcode fetch is out of scope."
    control: "register block emits debug_execute only when manager_busy is low; busy rejection maps to ERR_DEBUG_REJECT."
    output: "Debug pulse/status and parameterized debug-done interrupt controlled by INTEN.dbg_done_en."
  - name: "Fault classification and first-error-wins"
    trigger: "Non-OKAY AXI responses, unaligned start when SUPPORT_UNALIGNED=0, debug reject, or fault_inject."
    datapath: "Fault classifier writes CSR.error_code and INTSTATUS.ch_fault."
    control: "channel_fsm FAULT_COMPLETING then FAULTED."
    output: "FAULTED status, CH_FAULT pending bit, and dmac_irq when enabled."
dataflow:
  command_path:
    source: "APB writes to CONTROL.start or DBGCMD"
    sequence: "APB_ACCESS -> start/debug pulse -> channel_fsm command accept -> command snapshot"
    guards: ["channel_idle", "addresses_aligned", "fault_inject == 0", "manager_busy == 0 for debug"]
  read_path:
    source: "SAR register snapshot"
    burst: "INCR burst, arlen from LOOP_CFG.burst_len capped by MAX_BURST_LEN, arsize=clog2(DATA_WIDTH/8)"
    buffer: "rd_buf single-beat register"
    sequence: "SAR -> AR payload -> R handshake -> rd_buf"
    error_exit: "Nonzero rresp raises ERR_AXI_RD and blocks the corresponding write."
  write_path:
    source: "rd_buf"
    destination: "DAR register snapshot"
    burst: "INCR burst with AW/W payload generated after read data capture; wstrb all ones for DATA_WIDTH bytes."
    sequence: "rd_buf -> AW/W payload -> B response -> SAR/DAR/loop update"
    error_exit: "Nonzero bresp raises ERR_AXI_WR and suppresses completion interrupt."
  loop_control:
    load: "loop_remaining = LOOP_CFG.loop_count + 1 at start acceptance."
    decrement: "After each successful write response."
    terminal: "Completion is posted when the successful write response consumes the final beat."
    auto_increment: "SAR += DATA_WIDTH/8 and DAR += DATA_WIDTH/8 per successful beat."
  event_path:
    source: "peripheral_events[CONTROL.wfp_event]"
    sequence: "sample selected event -> release WAITING_FOR_PERIPHERAL -> issue read"
    integration_requirement: "External event sources must be synchronous to dmaclk or held for one dmaclk sample."
  interrupt_path:
    source: "terminal channel events, fault classifier, debug done, APB W1C clear"
    sequence: "event -> INTSTATUS bit set/clear -> AND with INTEN -> OR-reduce to dmac_irq"
  debug_path:
    source: "DBGCMD and PC registers"
    sequence: "APB write DBGCMD -> debug_execute pulse if manager idle -> parameterized status/IRQ update through INTEN.dbg_done_en"
    scope: "Instruction RAM/fetch/decode is not modeled in this engineering subset; PC is observable configuration state."
function_model:
  purpose: "Executable cycle-independent behavioral contract for PL330-like DMA transfer, wait-for-peripheral, debug command, APB register side effects, interrupt clear, and fault behavior."
  constants:
    STATUS_STOPPED: 0
    STATUS_EXECUTING: 1
    STATUS_WAITING_FOR_PERIPHERAL: 2
    STATUS_COMPLETED: 6
    STATUS_FAULTED: 8
    RESP_OKAY: 0
    ERR_NONE: 0
    ERR_DEBUG_REJECT: 1
    ERR_UNALIGNED: 2
    ERR_AXI_RD: 3
    ERR_AXI_WR: 4
    ERR_EVENT_TIMEOUT: 5
  state_variables:
    - { name: "sar", source: "registers.SAR.src_addr", reset: 0, width: 32, description: "Current source byte address for the selected channel." }
    - { name: "dar", source: "registers.DAR.dst_addr", reset: 0, width: 32, description: "Current destination byte address for the selected channel." }
    - { name: "loop_remaining", source: "registers.LOOP_CFG.loop_count", reset: 0, width: 8, description: "Number of transfer beats remaining, where encoded loop_count N loads N+1 beats." }
    - { name: "status", source: "registers.CSR.ch_status", reset: 0, width: 4, description: "Architectural channel status code." }
    - { name: "error_code", source: "registers.CSR.error_code", reset: 0, width: 4, description: "Architectural channel error code." }
    - { name: "rd_buf", source: "memory.rd_buf", reset: 0, width: 64, description: "Last accepted AXI read data beat." }
    - { name: "intstatus", source: "registers.INTSTATUS", reset: 0, width: 32, description: "Raw interrupt pending bits." }
    - { name: "inten", source: "registers.INTEN", reset: 0, width: 32, description: "Interrupt enable bits." }
    - { name: "pc", source: "registers.PC.pc_addr", reset: 0, width: 32, description: "Observable PL330-like program/debug address; no external microcode fetch in this subset." }
  transactions:
    - id: "FM_RESET"
      name: "reset_architecture"
      preconditions:
        - "dmacresetn == 0"
      inputs:
        - "dmacresetn"
      outputs:
        - "All externally visible output valids and interrupt are deasserted during reset."
      output_rules:
        - { name: "irq_reset", port: "dmac_irq", width: 1, expr: "0" }
        - { name: "pready_reset", port: "pready", width: 1, expr: "0" }
        - { name: "pslverr_reset", port: "pslverr", width: 1, expr: "0" }
      state_updates:
        - { name: "sar", width: 32, expr: "0" }
        - { name: "dar", width: 32, expr: "0" }
        - { name: "loop_remaining", width: 8, expr: "0" }
        - { name: "status", width: 4, expr: "0" }
        - { name: "error_code", width: 4, expr: "0" }
        - { name: "rd_buf", width: 64, expr: "0" }
        - { name: "intstatus", width: 32, expr: "0" }
        - { name: "inten", width: 32, expr: "0" }
      side_effects:
        - "All architectural state returns to declared reset values."
    - id: "FM_APB_WRITE"
      name: "apb_register_write"
      preconditions:
        - "dmacresetn == 1"
        - "psel == 1 and penable == 1 and pwrite == 1 and pready == 1"
      inputs:
        - "paddr"
        - "pwdata"
        - "pstrb"
      outputs:
        - "pready acknowledges the access; pslverr reports illegal address/access/strobe."
      output_rules:
        - { name: "apb_write_ready", port: "pready", width: 1, expr: "1" }
        - { name: "apb_write_error", port: "pslverr", width: 1, expr: "1 if illegal_apb_access == 1 else 0" }
      state_updates:
        - { name: "inten", width: 32, expr: "((inten & (~write_mask_32)) | (pwdata & write_mask_32)) if (apb_addr_inten == 1 and illegal_apb_access == 0) else inten" }
        - { name: "intstatus", width: 32, expr: "(intstatus & (~pwdata)) if (apb_addr_intstatus == 1 and illegal_apb_access == 0) else intstatus" }
        - { name: "sar", width: 32, expr: "pwdata if (apb_addr_sar == 1 and channel_idle == 1 and illegal_apb_access == 0) else sar" }
        - { name: "dar", width: 32, expr: "pwdata if (apb_addr_dar == 1 and channel_idle == 1 and illegal_apb_access == 0) else dar" }
      side_effects:
        - "Writable register fields update only through declared write_effect rules; reserved fields ignore writes."
      error_cases:
        - { id: "ERR_APB_ILLEGAL", condition: "illegal_apb_access == 1", result: "pslverr asserted for the completing access; architectural DMA transfer state is not modified." }
    - id: "FM_APB_READ"
      name: "apb_register_read"
      preconditions:
        - "dmacresetn == 1"
        - "psel == 1 and penable == 1 and pwrite == 0 and pready == 1"
      inputs:
        - "paddr"
      outputs:
        - "prdata returns the decoded register value with reserved bits forced to zero."
      output_rules:
        - { name: "apb_read_ready", port: "pready", width: 1, expr: "1" }
        - { name: "apb_read_error", port: "pslverr", width: 1, expr: "1 if illegal_apb_access == 1 else 0" }
        - { name: "apb_read_data", port: "prdata", width: 32, expr: "0 if illegal_apb_access == 1 else (register_read_value & 0xFFFFFFFF)" }
      state_updates:
        - { name: "status", width: 4, expr: "status" }
      side_effects:
        - "APB reads do not alter architectural state."
    - id: "FM_TRANSFER"
      name: "single_or_multi_beat_memory_copy"
      preconditions:
        - "dmacresetn == 1"
        - "start_cmd == 1"
        - "fault_inject == 0"
        - "(sar % (DATA_WIDTH // 8)) == 0"
        - "(dar % (DATA_WIDTH // 8)) == 0"
      inputs:
        - "rdata"
        - "rresp"
        - "bresp"
        - "loop_count"
      outputs:
        - "Each successful beat writes the captured read data to the destination address."
        - "Final successful beat sets status COMPLETED and raises the channel-complete pending bit."
      output_rules:
        - { name: "write_payload", port: "wdata", width: 64, expr: "rd_buf" }
        - { name: "write_strobes", port: "wstrb", width: 8, expr: "(1 << (DATA_WIDTH // 8)) - 1" }
        - { name: "irq_after_transfer", port: "dmac_irq", width: 1, expr: "1 if ((intstatus | complete_irq_mask) & inten) != 0 else 0" }
      state_updates:
        - { name: "rd_buf", width: 64, expr: "rdata if (rvalid == 1 and rready == 1 and rresp == 0) else rd_buf" }
        - { name: "sar", width: 32, expr: "sar + (DATA_WIDTH // 8)" }
        - { name: "dar", width: 32, expr: "dar + (DATA_WIDTH // 8)" }
        - { name: "loop_remaining", width: 8, expr: "max(loop_remaining - 1, 0)" }
        - { name: "status", width: 4, expr: "6 if loop_remaining <= 1 else 1" }
        - { name: "error_code", width: 4, expr: "0" }
        - { name: "intstatus", width: 32, expr: "intstatus | complete_irq_mask if loop_remaining <= 1 else intstatus" }
      side_effects:
        - "SAR and DAR increment by DATA_WIDTH/8 bytes after each successful write response."
        - "loop_remaining decrements after each successful write response."
      error_cases:
        - { id: "ERR_AXI_RD", condition: "rvalid == 1 and rready == 1 and rresp != 0", result: "status=FAULTED, error_code=ERR_AXI_RD, CH_FAULT pending set, no write for the failed beat." }
        - { id: "ERR_AXI_WR", condition: "bvalid == 1 and bready == 1 and bresp != 0", result: "status=FAULTED, error_code=ERR_AXI_WR, CH_FAULT pending set." }
    - id: "FM_WFP"
      name: "wait_for_peripheral_event"
      preconditions:
        - "dmacresetn == 1"
        - "start_cmd == 1"
        - "wfp_enable == 1"
      inputs:
        - "peripheral_events"
        - "wfp_event"
      outputs:
        - "Channel remains WAITING_FOR_PERIPHERAL until the selected event bit is sampled high."
      output_rules:
        - { name: "irq_during_wfp", port: "dmac_irq", width: 1, expr: "1 if (intstatus & inten) != 0 else 0" }
      state_updates:
        - { name: "status", width: 4, expr: "1 if selected_event == 1 else 2" }
        - { name: "loop_remaining", width: 8, expr: "loop_remaining" }
      side_effects:
        - "No AXI transaction is issued while selected_event is zero."
    - id: "FM_FAULT"
      name: "fault_completion"
      preconditions:
        - "dmacresetn == 1"
        - "fault_condition == 1"
      inputs:
        - "fault_condition"
        - "fault_code"
      outputs:
        - "Fault status is latched and a channel-fault pending interrupt is set."
      output_rules:
        - { name: "irq_after_fault", port: "dmac_irq", width: 1, expr: "1 if ((intstatus | fault_irq_mask) & inten) != 0 else 0" }
      state_updates:
        - { name: "status", width: 4, expr: "8" }
        - { name: "error_code", width: 4, expr: "fault_code" }
        - { name: "intstatus", width: 32, expr: "intstatus | fault_irq_mask" }
      side_effects:
        - "First fault wins until software clears INTSTATUS and restarts the channel."
      error_cases:
        - { id: "ERR_UNALIGNED", condition: "addresses_aligned == 0", result: "status=FAULTED and error_code=ERR_UNALIGNED." }
        - { id: "ERR_DEBUG_REJECT", condition: "debug_execute == 1 and manager_busy == 1", result: "debug command rejected without transfer side effects." }
    - id: "FM_IRQ_CLEAR"
      name: "interrupt_write_one_to_clear"
      preconditions:
        - "dmacresetn == 1"
        - "apb_addr_intstatus == 1"
        - "psel == 1 and penable == 1 and pwrite == 1 and pready == 1"
      inputs:
        - "pwdata"
      outputs:
        - "dmac_irq reflects the enabled pending status after the W1C clear."
      output_rules:
        - { name: "irq_after_w1c", port: "dmac_irq", width: 1, expr: "1 if ((intstatus & (~pwdata)) & inten) != 0 else 0" }
      state_updates:
        - { name: "intstatus", width: 32, expr: "intstatus & (~pwdata)" }
      side_effects:
        - "Only bits written as one are cleared; bits written as zero retain their prior value."
  invariants:
    - "not (write_beat_done == 1 and read_buffer_valid == 0)"
    - "not (status == 6 and error_code != 0)"
    - "not (status == 8 and error_code == 0)"
    - "(intstatus & (~0x1FFFF)) == 0"
    - "loop_remaining >= 0"
  reference_model_hint: "tb-gen should build a Python scoreboard from transactions, output_rules, state_updates, and invariants; prose outputs are explanatory only."
cycle_model:
  purpose: "Cycle/handshake contract defining when PL330-like architectural state, AXI/APB valid-ready signals, interrupt outputs, and error status may change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 or direct Python cycle model as a timing oracle; FunctionalModel remains the behavioral oracle."
  clock: "dmaclk"
  reset:
    assertion: "dmacresetn low asynchronously clears architectural state and deasserts valid/ready output valids and dmac_irq."
    deassertion: "State is usable on the first rising dmaclk edge after synchronized deassertion."
  latency:
    register_read: { min_cycles: 1, max_cycles: 1, description: "pready/prdata/pslverr complete in APB access phase." }
    register_write: { min_cycles: 1, max_cycles: 1, description: "Writable side effects occur on the completing APB access cycle." }
    event_release: { min_cycles: 1, max_cycles: 2, description: "Selected peripheral event sampled then WFP state can advance." }
    single_beat_transfer: { min_cycles: 5, max_cycles: null, description: "Command accept, AR, R, AW/W, and B stages; max is unbounded under AXI backpressure." }
    interrupt_assertion: { min_cycles: 1, max_cycles: 2, description: "Pending enabled interrupt reflects terminal status or W1C clear within two cycles." }
  handshake_rules:
    - id: "APB_ACCESS"
      signal: "pready"
      rule: "pready asserts only for psel==1 and penable==1 and completes exactly one APB transfer."
      sample_condition: "psel == 1 and penable == 1"
    - id: "APB_READ_DATA"
      signal: "prdata"
      rule: "prdata is stable for the completing read access and reserved bits read zero."
      sample_condition: "psel == 1 and penable == 1 and pwrite == 0 and pready == 1"
    - id: "AXI_AR"
      signal: "arvalid"
      rule: "Hold arvalid and AR payload stable until arvalid and arready are sampled high."
      sample_condition: "arvalid == 1 and arready == 1"
    - id: "AXI_R"
      signal: "rready"
      rule: "Assert rready only when rd_buf can accept rdata; capture exactly one beat on rvalid and rready."
      sample_condition: "rvalid == 1 and rready == 1"
    - id: "AXI_AW"
      signal: "awvalid"
      rule: "Hold awvalid and AW payload stable until awvalid and awready are sampled high."
      sample_condition: "awvalid == 1 and awready == 1"
    - id: "AXI_W"
      signal: "wvalid"
      rule: "Hold wvalid, wdata, wstrb, and wlast stable until wvalid and wready are sampled high."
      sample_condition: "wvalid == 1 and wready == 1"
    - id: "AXI_B"
      signal: "bready"
      rule: "Assert bready while waiting for write response; consume bresp on bvalid and bready."
      sample_condition: "bvalid == 1 and bready == 1"
    - id: "IRQ_LEVEL"
      signal: "dmac_irq"
      rule: "dmac_irq equals the OR-reduction of intstatus & inten after reset, terminal updates, and W1C clears settle."
      sample_condition: "dmacresetn == 1"
  pipeline:
    - { stage: "S0_APB_ACCEPT", cycle: 0, action: "Decode APB access, update configuration or emit start/halt/debug pulses." }
    - { stage: "S1_CMD_ACCEPT", cycle: 1, action: "Latch channel command, SAR, DAR, count, WFP configuration, and error precheck results." }
    - { stage: "S2_WFP", cycle: "1..N", action: "If WFP is enabled, hold state until selected peripheral event samples high." }
    - { stage: "S3_ISSUE_READ", cycle: "N..M", action: "Drive AXI AR payload and hold until AR handshake." }
    - { stage: "S4_CAPTURE_READ", cycle: "M..P", action: "Accept AXI R beat, classify rresp, and capture rdata into rd_buf." }
    - { stage: "S5_ISSUE_WRITE", cycle: "P..Q", action: "Drive AXI AW and W payloads; each channel may complete independently but both must handshake before B wait." }
    - { stage: "S6_WRITE_RESP", cycle: "Q..R", action: "Consume AXI B response, update address/count/status/interrupts." }
    - { stage: "S7_TERMINAL", cycle: "R+1", action: "Post COMPLETED or FAULTED status and level interrupt state." }
  ordering:
    - "A write data beat must not be issued before the corresponding read data beat has been accepted into rd_buf."
    - "A channel-complete interrupt pending bit is set only after the final successful B response."
    - "A channel-fault interrupt pending bit is set on the first detected fault before any later completion status."
    - "APB W1C clear does not clear configuration registers or address counters."
    - "For each channel, at most one read burst and one write burst are outstanding in this engineering subset."
  backpressure:
    - "If arready is zero, AR payload remains stable and no read transaction is counted."
    - "If rvalid is zero, rd_buf and downstream write stage remain stable."
    - "If awready or wready is zero, write payload/address/control remain stable until handshakes occur."
    - "If bvalid is zero, architectural completion/fault for that write is delayed."
    - "APB accesses are not backpressured in the baseline beyond the single access phase."
  performance:
    frequency_mhz: 500
    throughput: { sustained_beats_per_cycle: 1, condition: "No APB command gap, WFP disabled or already satisfied, no AXI backpressure, no AXI errors, aligned addresses." }
    outstanding: { read_max: 1, write_max: 1, per_channel: true, description: "Single outstanding read/write in the engineering subset." }
    depth: { pipeline_stages: 8, queue_depth: 1, rd_buffer_depth: 1, description: "Visible cycle-model pipeline and buffering depth." }
  observability:
    - "Every function_model transaction maps to one or more cycle_model stages and at least one coverage bin."
    - "Waveform debug must show state, start_cmd, selected_event, AXI handshakes, rd_buf, status, error_code, intstatus, inten, and dmac_irq."
clock_reset_domains:
  domains:
    - name: "dmaclk"
      frequency_mhz: 500
      description: "Single synchronous domain for APB slave, AXI masters, channel FSMs, datapath, event sampling, and interrupts."
      driven_by_port: "dmaclk"
  reset_scheme:
    signal: "dmacresetn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
    reset_domain: "dmaclk"
    affected_state: ["registers", "function_model.state_variables", "fsm.channel_fsm", "interrupt pending bits", "AXI valid outputs"]
cdc_requirements:
  crossings: []
  synchronizers: []
  assumptions:
    - "All top-level input signals are synchronous to dmaclk except dmacresetn asynchronous assertion."
    - "peripheral_events must be synchronized externally or held stable for at least one dmaclk cycle before observation."
  note: "Single clock domain design; no internal CDC paths are declared in this engineering draft."
rdc_requirements:
  crossings: []
  synchronizers: []
  reset_sequence:
    - "dmacresetn may assert asynchronously to dmaclk."
    - "dmacresetn deassertion is synchronized before functional state leaves reset."
  note: "One reset domain only; no reset-domain crossings beyond reset synchronizer policy."
registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
    channel_stride: 0x40
    channel_base: 0x100
    num_channels: 8
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero, ignore writes, and do not allocate storage."
  register_list:
    - name: "DBGSTATUS"
      offset: 0x000
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "debug"
      description: "Global debug and reset-observable status."
      fields:
        - { name: "manager_busy", bits: [0, 0], access: "ro", reset: 0x0, description: "Manager/control path is executing." }
        - { name: "num_channels_minus1", bits: [7, 4], access: "ro", reset: 0x7, description: "NUM_CHANNELS minus one for software discovery." }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "DBGCMD"
      offset: 0x00C
      width: 32
      access: "wo"
      reset: 0x00000000
      category: "debug"
      description: "Debug command launch register."
      write_side_effects:
        - "A completing APB write with dbgcmd=0 emits one debug_execute pulse when the manager is not busy."
      fields:
        - { name: "dbgcmd", bits: [1, 0], access: "wo", reset: 0x0, write_effect: "0=execute debug command pulse; other values are ignored in this subset", description: "Debug command selector." }
        - { name: "channel", bits: [6, 4], access: "wo", reset: 0x0, write_effect: "Select target channel for debug execution when implemented", description: "Target channel index." }
        - { name: "reserved_31_7", bits: [31, 7], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "INTEN"
      offset: 0x020
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt enable register."
      write_side_effects:
        - "Software writes update interrupt enable bits immediately; enabling an already-pending source may assert dmac_irq on the next cycle."
      fields:
        - { name: "ch_complete_en", bits: [7, 0], access: "rw", reset: 0x00, write_effect: "Enable per-channel completion interrupt", description: "Completion interrupt enables." }
        - { name: "ch_fault_en", bits: [15, 8], access: "rw", reset: 0x00, write_effect: "Enable per-channel fault interrupt", description: "Fault interrupt enables." }
        - { name: "dbg_done_en", bits: [16, 16], access: "rw", reset: 0x0, write_effect: "Enable debug-done interrupt", description: "Debug completion interrupt enable." }
        - { name: "reserved_31_17", bits: [31, 17], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "INTSTATUS"
      offset: 0x024
      width: 32
      access: "w1c"
      reset: 0x00000000
      category: "interrupt"
      description: "Raw interrupt status register with write-one-to-clear behavior."
      write_side_effects:
        - "Writing one clears the corresponding pending interrupt bit; writing zero preserves the bit."
      fields:
        - { name: "ch_complete", bits: [7, 0], access: "w1c", reset: 0x00, write_effect: "1 clears matching channel-complete pending bit", description: "Per-channel completion pending status." }
        - { name: "ch_fault", bits: [15, 8], access: "w1c", reset: 0x00, write_effect: "1 clears matching channel-fault pending bit", description: "Per-channel fault pending status." }
        - { name: "dbg_done", bits: [16, 16], access: "w1c", reset: 0x0, write_effect: "1 clears debug-done pending bit", description: "Debug command completion pending status." }
        - { name: "reserved_31_17", bits: [31, 17], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "CSR"
      offset: 0x100
      width: 32
      access: "ro"
      reset: 0x00000000
      repeat: 8
      stride: 0x40
      category: "channel"
      description: "Per-channel status register."
      fields:
        - { name: "ch_status", bits: [3, 0], access: "ro", reset: 0x0, description: "0=STOPPED, 1=EXECUTING, 2=WAITING_FOR_PERIPHERAL, 6=COMPLETED, 8=FAULTED." }
        - { name: "error_code", bits: [7, 4], access: "ro", reset: 0x0, description: "0=no error, 1=debug reject, 2=unaligned, 3=AXI read error, 4=AXI write error, 5=event timeout." }
        - { name: "loop_remaining", bits: [15, 8], access: "ro", reset: 0x0, description: "Remaining beats in the active transfer, saturated to eight status bits." }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "SAR"
      offset: 0x108
      width: 32
      access: "rw"
      reset: 0x00000000
      repeat: 8
      stride: 0x40
      category: "channel"
      description: "Per-channel source address register."
      write_side_effects:
        - "Software writes update the source address only while the channel is STOPPED or COMPLETED."
      fields:
        - { name: "src_addr", bits: [31, 0], access: "rw", reset: 0x00000000, write_effect: "Update source byte address when channel is not EXECUTING or WAITING_FOR_PERIPHERAL", description: "Source byte address." }
    - name: "DAR"
      offset: 0x10C
      width: 32
      access: "rw"
      reset: 0x00000000
      repeat: 8
      stride: 0x40
      category: "channel"
      description: "Per-channel destination address register."
      write_side_effects:
        - "Software writes update the destination address only while the channel is STOPPED or COMPLETED."
      fields:
        - { name: "dst_addr", bits: [31, 0], access: "rw", reset: 0x00000000, write_effect: "Update destination byte address when channel is not EXECUTING or WAITING_FOR_PERIPHERAL", description: "Destination byte address." }
    - name: "LOOP_CFG"
      offset: 0x110
      width: 32
      access: "rw"
      reset: 0x00000000
      repeat: 8
      stride: 0x40
      category: "channel"
      description: "Per-channel transfer loop and burst configuration."
      write_side_effects:
        - "Software writes update transfer count and burst shape while the channel is idle."
      fields:
        - { name: "loop_count", bits: [7, 0], access: "rw", reset: 0x00, write_effect: "Encoded transfer count: zero means one beat, N means N+1 beats", description: "Transfer count encoding." }
        - { name: "burst_len", bits: [11, 8], access: "rw", reset: 0x0, write_effect: "Encoded AXI burst length: zero means one beat, N means N+1 beats", description: "AXI burst length encoding." }
        - { name: "reserved_31_12", bits: [31, 12], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "CONTROL"
      offset: 0x114
      width: 32
      access: "rw"
      reset: 0x00000000
      repeat: 8
      stride: 0x40
      category: "channel"
      description: "Per-channel control and start register."
      write_side_effects:
        - "Writing start=1 while channel is STOPPED or COMPLETED accepts a transfer command and self-clears start."
        - "Writing halt=1 while EXECUTING requests a graceful transition to STOPPED after the active beat."
        - "fault_inject forces the declared fault path for verification."
      fields:
        - { name: "start", bits: [0, 0], access: "rw1p", reset: 0x0, write_effect: "1 launches a transfer command and the stored bit self-clears", description: "Start pulse." }
        - { name: "halt", bits: [1, 1], access: "rw1p", reset: 0x0, write_effect: "1 requests graceful halt and the stored bit self-clears", description: "Halt pulse." }
        - { name: "wfp_enable", bits: [4, 4], access: "rw", reset: 0x0, write_effect: "Enable wait-for-peripheral gating before read issue", description: "Wait-for-peripheral enable." }
        - { name: "wfp_event", bits: [12, 8], access: "rw", reset: 0x00, write_effect: "Select peripheral_events index used by WFP", description: "Peripheral event index." }
        - { name: "fault_inject", bits: [16, 16], access: "rw", reset: 0x0, write_effect: "Force channel fault on accepted start for verification", description: "Fault injection enable." }
        - { name: "reserved_31_17", bits: [31, 17], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero." }
    - name: "PC"
      offset: 0x118
      width: 32
      access: "rw"
      reset: 0x00000000
      repeat: 8
      stride: 0x40
      category: "channel"
      description: "Instruction/program counter placeholder for PL330-like program-flow observability."
      write_side_effects:
        - "Software writes update PC while the channel is STOPPED; this engineering subset does not fetch external microcode."
      fields:
        - { name: "pc_addr", bits: [31, 0], access: "rw", reset: 0x00000000, write_effect: "Update observable program counter when idle", description: "Program-counter/debug address." }
memory:
  instances:
    - name: "rd_buf"
      type: "register"
      depth: 1
      width: 64
      read_ports: 1
      write_ports: 1
      latency: 0
      reset: 0
      description: "Single-beat read-data buffer between AXI R capture and AXI W payload generation."
    - name: "channel_state_bank"
      type: "register_file"
      depth: 8
      width: 96
      read_ports: 2
      write_ports: 2
      latency: 0
      reset: 0
      description: "Abstract storage for per-channel SAR/DAR/count/status/error in the engineering model."
  no_sram_macros: true
  note: "No SRAM macro or FIFO is required in the baseline single-outstanding subset; future burst/multichannel issue queues require SSOT update."
interrupts:
  sources:
    - { name: "CH0_COMPLETE", bit: 0, type: "level", enable_reg: "INTEN[0]", status_reg: "INTSTATUS[0]", clear: "W1C", description: "Channel 0 transfer complete." }
    - { name: "CH1_COMPLETE", bit: 1, type: "level", enable_reg: "INTEN[1]", status_reg: "INTSTATUS[1]", clear: "W1C", description: "Channel 1 transfer complete." }
    - { name: "CH2_COMPLETE", bit: 2, type: "level", enable_reg: "INTEN[2]", status_reg: "INTSTATUS[2]", clear: "W1C", description: "Channel 2 transfer complete." }
    - { name: "CH3_COMPLETE", bit: 3, type: "level", enable_reg: "INTEN[3]", status_reg: "INTSTATUS[3]", clear: "W1C", description: "Channel 3 transfer complete." }
    - { name: "CH4_COMPLETE", bit: 4, type: "level", enable_reg: "INTEN[4]", status_reg: "INTSTATUS[4]", clear: "W1C", description: "Channel 4 transfer complete." }
    - { name: "CH5_COMPLETE", bit: 5, type: "level", enable_reg: "INTEN[5]", status_reg: "INTSTATUS[5]", clear: "W1C", description: "Channel 5 transfer complete." }
    - { name: "CH6_COMPLETE", bit: 6, type: "level", enable_reg: "INTEN[6]", status_reg: "INTSTATUS[6]", clear: "W1C", description: "Channel 6 transfer complete." }
    - { name: "CH7_COMPLETE", bit: 7, type: "level", enable_reg: "INTEN[7]", status_reg: "INTSTATUS[7]", clear: "W1C", description: "Channel 7 transfer complete." }
    - { name: "CH0_FAULT", bit: 8, type: "level", enable_reg: "INTEN[8]", status_reg: "INTSTATUS[8]", clear: "W1C", description: "Channel 0 fault." }
    - { name: "CH1_FAULT", bit: 9, type: "level", enable_reg: "INTEN[9]", status_reg: "INTSTATUS[9]", clear: "W1C", description: "Channel 1 fault." }
    - { name: "CH2_FAULT", bit: 10, type: "level", enable_reg: "INTEN[10]", status_reg: "INTSTATUS[10]", clear: "W1C", description: "Channel 2 fault." }
    - { name: "CH3_FAULT", bit: 11, type: "level", enable_reg: "INTEN[11]", status_reg: "INTSTATUS[11]", clear: "W1C", description: "Channel 3 fault." }
    - { name: "CH4_FAULT", bit: 12, type: "level", enable_reg: "INTEN[12]", status_reg: "INTSTATUS[12]", clear: "W1C", description: "Channel 4 fault." }
    - { name: "CH5_FAULT", bit: 13, type: "level", enable_reg: "INTEN[13]", status_reg: "INTSTATUS[13]", clear: "W1C", description: "Channel 5 fault." }
    - { name: "CH6_FAULT", bit: 14, type: "level", enable_reg: "INTEN[14]", status_reg: "INTSTATUS[14]", clear: "W1C", description: "Channel 6 fault." }
    - { name: "CH7_FAULT", bit: 15, type: "level", enable_reg: "INTEN[15]", status_reg: "INTSTATUS[15]", clear: "W1C", description: "Channel 7 fault." }
    - { name: "DBG_DONE", bit: 16, type: "level", enable_reg: "INTEN[16]", status_reg: "INTSTATUS[16]", clear: "W1C", description: "Debug command done or rejected status." }
  output:
    signal: "dmac_irq"
    polarity: "active_high"
    type: "level"
    expression: "dmac_irq = OR(INTSTATUS & INTEN)"
  clear_policy: "Write one to INTSTATUS clears the selected raw pending bit; write zero preserves it."
  completion_policy: "Completion and fault are mutually exclusive for a channel terminal event; first fault suppresses completion interrupt for that transfer."
fsm:
  channel_fsm:
    states:
      - "STOPPED"
      - "EXECUTING"
      - "WAITING_FOR_PERIPHERAL"
      - "ISSUE_READ"
      - "WAIT_READ"
      - "ISSUE_WRITE"
      - "WAIT_WRITE_RESP"
      - "COMPLETING"
      - "FAULT_COMPLETING"
      - "COMPLETED"
      - "FAULTED"
    reset_state: "STOPPED"
    transitions:
      - { from: "STOPPED", to: "EXECUTING", condition: "start_cmd == 1 and fault_inject == 0 and addresses_aligned == 1", description: "Accept legal software/debug start." }
      - { from: "STOPPED", to: "FAULT_COMPLETING", condition: "start_cmd == 1 and (fault_inject == 1 or addresses_aligned == 0)", description: "Reject or fault invalid start." }
      - { from: "EXECUTING", to: "WAITING_FOR_PERIPHERAL", condition: "wfp_enable == 1 and selected_event == 0", description: "Wait for selected peripheral event before issuing memory traffic." }
      - { from: "WAITING_FOR_PERIPHERAL", to: "ISSUE_READ", condition: "selected_event == 1", description: "Resume when peripheral event arrives." }
      - { from: "EXECUTING", to: "ISSUE_READ", condition: "wfp_enable == 0 or selected_event == 1", description: "Start memory copy path." }
      - { from: "ISSUE_READ", to: "WAIT_READ", condition: "arvalid == 1 and arready == 1", description: "Read address accepted." }
      - { from: "WAIT_READ", to: "ISSUE_WRITE", condition: "rvalid == 1 and rready == 1 and rresp == 0", description: "Read data accepted." }
      - { from: "WAIT_READ", to: "FAULT_COMPLETING", condition: "rvalid == 1 and rready == 1 and rresp != 0", description: "AXI read error." }
      - { from: "ISSUE_WRITE", to: "WAIT_WRITE_RESP", condition: "aw_handshake == 1 and w_handshake == 1", description: "Write address and data accepted." }
      - { from: "WAIT_WRITE_RESP", to: "COMPLETING", condition: "bvalid == 1 and bready == 1 and bresp == 0 and loop_remaining == 1", description: "Final beat completed." }
      - { from: "WAIT_WRITE_RESP", to: "ISSUE_READ", condition: "bvalid == 1 and bready == 1 and bresp == 0 and loop_remaining > 1", description: "Continue with next beat." }
      - { from: "WAIT_WRITE_RESP", to: "FAULT_COMPLETING", condition: "bvalid == 1 and bready == 1 and bresp != 0", description: "AXI write error." }
      - { from: "COMPLETING", to: "COMPLETED", condition: "complete_status_posted == 1", description: "Post completion status/IRQ." }
      - { from: "FAULT_COMPLETING", to: "FAULTED", condition: "fault_status_posted == 1", description: "Post fault status/IRQ." }
      - { from: "COMPLETED", to: "STOPPED", condition: "start_cmd == 0 and halt_cmd == 0", description: "Return to idle-visible stopped state after software observes completion or starts a new command." }
      - { from: "FAULTED", to: "STOPPED", condition: "fault_clear == 1", description: "Software clears fault status." }
  register_fsm:
    states: ["APB_IDLE", "APB_SETUP", "APB_ACCESS"]
    reset_state: "APB_IDLE"
    transitions:
      - { from: "APB_IDLE", to: "APB_SETUP", condition: "psel == 1 and penable == 0" }
      - { from: "APB_SETUP", to: "APB_ACCESS", condition: "psel == 1 and penable == 1" }
      - { from: "APB_ACCESS", to: "APB_IDLE", condition: "pready == 1" }
timing:
  target_clocks:
    - { name: "dmaclk", frequency_mhz: 500, period_ns: 2.0, duty_cycle: 0.5, uncertainty_ns: 0.1 }
  latency_budget:
    register_access_cycles: { min: 1, max: 1, measured_from: "psel and penable", measured_to: "pready" }
    command_accept_cycles: { min: 1, max: 2, measured_from: "CONTROL.start write completion", measured_to: "channel status EXECUTING or WAITING_FOR_PERIPHERAL" }
    event_release_cycles: { min: 1, max: 2, measured_from: "selected peripheral event sampled high", measured_to: "AXI AR issue permitted" }
    interrupt_latency_cycles: { min: 1, max: 2, measured_from: "terminal status update or W1C clear", measured_to: "dmac_irq update" }
    transfer_latency_cycles: { min: 5, max: null, note: "Unbounded max when AXI ready/valid backpressure or WFP wait is present." }
  throughput:
    sustained_beats_per_cycle: 1
    conditions: "No WFP wait, no AXI backpressure, no AXI errors, aligned addresses, and a non-empty transfer."
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "all_inputs_except_clocks_resets", clock: "dmaclk", delay_ns: 0.2, source: "engineering integration timing budget" }
    outputs:
      - { ports: "all_outputs", clock: "dmaclk", delay_ns: 0.2, source: "engineering integration timing budget" }
  false_paths:
    - { from: "dmacresetn", to: "all_registers", reason: "Asynchronous reset assertion." }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["dmaclk"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power or clock-gated mode is specified for this engineering verification target."
  reset_retention:
    retention_required: false
    reset_value_source: "registers.reset fields and function_model.state_variables reset values"
  power_states:
    - { name: "ON", entry: "dmacresetn deasserted", exit: "dmacresetn asserted", guarantees: ["APB/AXI/event/interrupt behavior active"] }
    - { name: "RESET", entry: "dmacresetn asserted", exit: "synchronized reset release", guarantees: ["Outputs and architectural state at reset values"] }
  upf_required: false
  notes: "Power intent is limited to a single always-on domain; any future power gating requires SSOT update and new CDC/RDC review."
security:
  classification: "non_secure_dma_control_ip_with_external_privilege"
  assets:
    - { name: "register_map", protection: "APB access control and privilege enforcement are external integration responsibilities." }
    - { name: "memory_transfer_data", protection: "This IP transfers data without encryption; integrity relies on AXI responses and fault reporting." }
    - { name: "interrupt_status", protection: "Pending fault/completion status remains visible until software W1C clear." }
  threat_model:
    - { threat: "illegal register write", mitigation: "Register access policy, pstrb checking, pslverr, and reserved-field write-ignore behavior." }
    - { threat: "silent AXI data corruption after error response", mitigation: "Non-OKAY responses force FAULTED status and CH_FAULT interrupt instead of completion." }
    - { threat: "event spoofing or metastability", mitigation: "Integration must synchronize peripheral_events; WFP behavior only samples declared event bits." }
    - { threat: "debug command while busy", mitigation: "manager_busy reject path and ERR_DEBUG_REJECT status." }
  privilege_model: "No internal privilege levels; SoC APB fabric is responsible for secure/non-secure and privilege filtering."
  safety_goals:
    - "No destination write is issued after an AXI read error for the failed beat."
    - "Completion and fault terminal interrupts are not both raised for the same terminal event."
    - "Reserved register fields cannot store attacker-controlled state."
error_handling:
  error_sources:
    - { id: "ERR_DEBUG_REJECT", condition: "debug_execute == 1 and manager_busy == 1", architectural_effect: "error_code=1, debug command rejected, DBG_DONE pending set when INTEN.dbg_done_en is enabled" }
    - { id: "ERR_UNALIGNED", condition: "((sar % (DATA_WIDTH // 8)) != 0 or (dar % (DATA_WIDTH // 8)) != 0) and SUPPORT_UNALIGNED == 0", architectural_effect: "status=FAULTED, error_code=2, CH_FAULT pending set, no AXI issue" }
    - { id: "ERR_AXI_RD", condition: "rvalid == 1 and rready == 1 and rresp != 0", architectural_effect: "status=FAULTED, error_code=3, CH_FAULT pending set, no destination write for failed beat" }
    - { id: "ERR_AXI_WR", condition: "bvalid == 1 and bready == 1 and bresp != 0", architectural_effect: "status=FAULTED, error_code=4, CH_FAULT pending set, completion suppressed" }
    - { id: "ERR_EVENT_TIMEOUT", condition: "event_timeout_enabled == 1 and event_wait_counter_expired == 1", architectural_effect: "status=FAULTED, error_code=5, CH_FAULT pending set" }
    - { id: "ERR_APB_ILLEGAL", condition: "psel == 1 and penable == 1 and illegal_apb_access == 1", architectural_effect: "pslverr=1 for that access; DMA channel architectural state unchanged" }
  propagation:
    - "First channel fault wins until software clears INTSTATUS and restarts/reinitializes the channel."
    - "A fault terminal event sets CH_FAULT and suppresses CH_COMPLETE for the same transfer."
    - "AXI read error prevents the corresponding write beat from being issued."
    - "APB illegal access error is reported on pslverr but does not mutate transfer state."
  recovery:
    - { action: "W1C INTSTATUS fault bit", clears: ["INTSTATUS.CHx_FAULT", "dmac_irq when no enabled pending bits remain"], preserves: ["SAR", "DAR", "LOOP_CFG", "CONTROL configuration"] }
    - { action: "software reprograms idle/faulted channel", clears: ["CSR.error_code on accepted new legal start"], preserves: ["global interrupt enables unless explicitly written"] }
  debug_visibility:
    status_register: "CSR.error_code"
    interrupt_register: "INTSTATUS"
    waveform_signals: ["fault_condition", "fault_code", "rresp", "bresp", "pslverr", "dmac_irq"]
debug_observability:
  waveform_must_probe:
    - "dmaclk"
    - "dmacresetn"
    - "channel_state"
    - "start_cmd"
    - "halt_cmd"
    - "selected_event"
    - "arvalid/arready/araddr/arlen"
    - "rvalid/rready/rdata/rresp/rlast"
    - "awvalid/awready/awaddr/awlen"
    - "wvalid/wready/wdata/wstrb/wlast"
    - "bvalid/bready/bresp"
    - "rd_buf"
    - "sar"
    - "dar"
    - "loop_remaining"
    - "status"
    - "error_code"
    - "intstatus"
    - "inten"
    - "dmac_irq"
  status_outputs:
    - "DBGSTATUS.manager_busy"
    - "CSR.ch_status"
    - "CSR.error_code"
    - "CSR.loop_remaining"
    - "INTSTATUS"
  trace_events:
    - { name: "apb_access", trigger: "psel == 1 and penable == 1 and pready == 1" }
    - { name: "transfer_start", trigger: "start_cmd == 1 and channel_idle == 1" }
    - { name: "wfp_enter", trigger: "status == 2" }
    - { name: "read_beat", trigger: "rvalid == 1 and rready == 1" }
    - { name: "write_beat", trigger: "wvalid == 1 and wready == 1" }
    - { name: "transfer_done", trigger: "status == 6" }
    - { name: "transfer_fault", trigger: "status == 8" }
    - { name: "irq_assert", trigger: "dmac_irq == 1" }
  debug_registers: ["DBGSTATUS", "DBGCMD", "CSR", "PC", "INTSTATUS"]
  minimum_waveform_window: "From APB start write through terminal status and one APB status read."
  notes: "Downstream TB and sim_debug should use these probes to correlate function_model transactions with cycle_model stages."
integration:
  bus_attachment:
    control: "APB4 slave named apb_slave"
    data: "AXI4 read master axi_rd_master plus AXI4 write master axi_wr_master"
    events: "peripheral_events custom input vector"
    interrupt: "dmac_irq active-high level output"
  connections:
    - { module: "pl330realverify_regs", port: "clk_i", signal: "dmaclk" }
    - { module: "pl330realverify_regs", port: "rst_ni", signal: "dmacresetn" }
    - { module: "pl330realverify_regs", port: "paddr_i", signal: "paddr" }
    - { module: "pl330realverify_regs", port: "psel_i", signal: "psel" }
    - { module: "pl330realverify_regs", port: "penable_i", signal: "penable" }
    - { module: "pl330realverify_regs", port: "pwrite_i", signal: "pwrite" }
    - { module: "pl330realverify_regs", port: "pwdata_i", signal: "pwdata" }
    - { module: "pl330realverify_regs", port: "pstrb_i", signal: "pstrb" }
    - { module: "pl330realverify_regs", port: "prdata_o", signal: "prdata" }
    - { module: "pl330realverify_regs", port: "pready_o", signal: "pready" }
    - { module: "pl330realverify_regs", port: "pslverr_o", signal: "pslverr" }
    - { module: "pl330realverify_channel_fsm", port: "state_o", signal: "channel_state" }
    - { module: "pl330realverify_axi_rd", port: "arvalid_o", signal: "arvalid" }
    - { module: "pl330realverify_axi_rd", port: "arready_i", signal: "arready" }
    - { module: "pl330realverify_axi_rd", port: "rvalid_i", signal: "rvalid" }
    - { module: "pl330realverify_axi_rd", port: "rready_o", signal: "rready" }
    - { module: "pl330realverify_axi_wr", port: "awvalid_o", signal: "awvalid" }
    - { module: "pl330realverify_axi_wr", port: "wvalid_o", signal: "wvalid" }
    - { module: "pl330realverify_axi_wr", port: "bready_o", signal: "bready" }
    - { module: "pl330realverify_datapath", port: "rd_data_i", signal: "rdata" }
    - { module: "pl330realverify_datapath", port: "wr_data_o", signal: "wdata" }
    - { module: "pl330realverify_event_irq", port: "peripheral_events_i", signal: "peripheral_events" }
    - { module: "pl330realverify_event_irq", port: "irq_o", signal: "dmac_irq" }
  address_map_requirements:
    base_address: "SoC assigned"
    alignment_bytes: 4
    decode_owner: "SoC interconnect outside this leaf IP"
    illegal_access_response: "pslverr=1 with pready=1 for unsupported APB register address or illegal write policy"
  dependencies:
    external_modules: []
    external_clocks: ["dmaclk"]
    external_resets: ["dmacresetn"]
    external_protocols: ["APB4", "AXI4"]
  integration_notes:
    - "AXI subordinate must obey AXI4 ready/valid and return stable payloads while valid waits for ready."
    - "SoC interrupt controller samples dmac_irq as active-high level."
    - "peripheral_events must be synchronous to dmaclk or externally synchronized/held for sampling."
    - "The top module rtl/pl330realverify.sv owns named wiring between declared manifest submodules and top-level ports."
dft:
  scan_required: false
  test_mode:
    enable_signal: "external_test_mode_cfg"
    reset_behavior: "dmacresetn remains the only functional reset; scan/test reset insertion is downstream DFT-owned if enabled."
  controllability:
    - { item: "dmaclk", method: "Top-level clock port is directly controllable by testbench/ATE." }
    - { item: "dmacresetn", method: "Top-level active-low reset port is directly controllable." }
    - { item: "APB inputs", method: "paddr, psel, penable, pwrite, pwdata, and pstrb are primary inputs and controllable in test mode." }
    - { item: "AXI ready/valid response inputs", method: "arready, rvalid, rdata, rresp, rlast, awready, wready, bid, bresp, and bvalid are primary inputs and controllable by memory/BFM." }
    - { item: "peripheral_events", method: "Event vector is a primary input and controllable for WFP tests." }
  observability:
    - { item: "APB outputs", method: "prdata, pready, and pslverr are primary outputs." }
    - { item: "AXI master outputs", method: "AR/AW/W control, address, data, strobe, and ready outputs are primary outputs." }
    - { item: "dmac_irq", method: "Combined interrupt is a primary output." }
    - { item: "architectural state", method: "CSR, INTSTATUS, DBGSTATUS, and waveform probes listed in debug_observability expose status and fault state." }
  mbist_required: false
  boundary_scan_required: false
  dft_assumptions:
    - "Engineering SSOT does not require inserted scan chains before RTL generation."
    - "If signoff DFT is requested later, scan enable, scan clocks, and chain counts must be added by a locked SSOT update."
  required_reports:
    - "dft/controllability_observability_review.md"
synthesis:
  dialect: "systemverilog_2012_project_subset"
  top: "pl330realverify"
  constraints:
    clock: { name: "dmaclk", period_ns: 2.0, frequency_mhz: 500 }
    reset: { name: "dmacresetn", polarity: "active_low", async_assert: true, sync_deassert: true }
    io_delay_ns: 0.2
    max_fanout: 32
    max_transition_ns: 0.25
    false_paths:
      - { from: "dmacresetn", to: "all_registers", reason: "Asynchronous reset assertion path." }
    multicycle_paths: []
  ppa_targets:
    technology: "generic"
    target_frequency_mhz: 500
    area_um2: null
    power_mw: null
    utilization_pct: 60
  implementation_constraints:
    - "Do not infer latches; every combinational path must have complete assignments."
    - "All architectural state must reset to registers/function_model reset values."
    - "AXI and APB payloads must remain stable while valid/ready handshakes are pending."
    - "No generated clock, multi-clock, or internal CDC structure is declared for this engineering subset."
  required_outputs:
    - "syn/out/pl330realverify_netlist.v"
    - "syn/out/pl330realverify_area.rpt"
    - "syn/out/pl330realverify_timing.rpt"
    - "syn/out/pl330realverify_power.rpt"
  required_reports:
    - "synthesis/elaboration_report.md"
    - "synthesis/qor_summary.json"
  waivers: []
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  placement_strategy:
    - "Keep APB register/status logic near control-side pins."
    - "Keep AXI read/write adapters and datapath close enough to minimize high-fanout address/control routing."
    - "Keep event/interrupt logic near peripheral_events and dmac_irq pins when floorplanning permits."
  io_layers:
    horizontal: "met3"
    vertical: "met2"
  cts:
    target_skew_ns: 0.1
    max_insertion_delay_ns: 0.5
    buf_list: ["generic_clkbuf_x4", "generic_clkbuf_x8"]
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { preferred: "met4" }
    congestion_policy: "Route AXI data buses with shielding/spacing if target technology requires it."
    drc_waivers: []
  physical_constraints:
    - "No hard macros are declared in the baseline engineering subset."
    - "No SRAM macro placement is required because memory.instances use registers/register_file abstractions."
    - "Reset tree must meet async assertion and synchronized release policy."
  required_outputs:
    - "pnr/out/pl330realverify.def"
    - "pnr/out/pl330realverify_routed.v"
    - "pnr/out/pl330realverify.spef"
  required_reports:
    - "pnr/out/utilization.rpt"
    - "pnr/out/congestion.rpt"
    - "pnr/out/drc.rpt"
    - "pnr/out/antenna.rpt"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/pl330realverify_param.vh"
  reset_style: "active_low_async_assert_sync_deassert"
  clocking_style: "single_posedge_dmaclk"
  conventions:
    - "Use ANSI-style input logic/output logic ports and internal single-driver logic."
    - "Use nonblocking assignments for sequential state updates clocked by dmaclk."
    - "Use blocking assignments in combinational next-state/decode logic."
    - "No latches: every combinational block assigns defaults for all outputs and next-state signals."
    - "Reserved register fields read zero, ignore writes, and do not allocate storage."
    - "APB and AXI payload signals must remain stable while valid/ready handshake waits."
    - "Shared parameters come from rtl/pl330realverify_param.vh included inside consuming modules; no package file is generated."
    - "BANNED in generated RTL subset: typedef, enum, always_ff, always_comb, always_latch, package, endpackage, import, interface, modport, task, function, for, while, initial blocks in synthesizable RTL."
  lint_waivers:
    - { id: "UNUSEDSIGNAL", scope: "parameterized debug/status observability nets", justification: "Some debug probes may be retained only for waveform/coverage visibility." }
    - { id: "WIDTHEXPAND", scope: "parameterized DATA_WIDTH expressions", justification: "Width expansion is acceptable only where expression width is explicitly bounded by output port width." }
  rtl_gen_constraints:
    - "Top module must be rtl/pl330realverify.sv and module name pl330realverify."
    - "Manifest submodules must implement only their declared source_sections and ownership refs."
    - "No RTL TODO placeholders may remain for declared function_model or cycle_model behavior."
  reset_requirements:
    - "All state_variables reset to function_model.state_variables reset values."
    - "AXI valid outputs and dmac_irq are deasserted during reset."
  assertion_guidance:
    - "Assert APB access completion, AXI hold-until-ready, no-write-after-read-error, W1C semantics, and one-hot/known channel-state behavior."
reuse_modules:
  external: []
  common_blocks: []
  vendor_ip: []
  policy: "No reusable child SSOT or external RTL dependency is required for the baseline engineering contract; all internal implementation blocks are manifest-owned under this SSOT."
  future_candidates:
    - { name: "generic_apb_reg_slice", promotion_condition: "Promote only if reused by another IP and assigned its own child SSOT." }
    - { name: "generic_axi_single_outstanding_adapter", promotion_condition: "Promote only if independently verified outside pl330realverify." }
  integration_requirement: "Downstream rtl-gen must not instantiate undeclared external modules without updating reuse_modules and integration.dependencies."
custom:
  ssot_authoring:
    run_mode: "engineering"
    pipeline_id: "36afbc8abb27"
    session_namespace: ".session/pl330realverify/pipeline/36afbc8abb27/01-ssot-gen"
    evidence_sources:
      - "pl330realverify/req/pl330realverify_requirements.md"
      - "pipeline repair request identifying incomplete sections"
      - "workflow/ssot-gen/scripts/check_ssot_disk.sh engineering-mode validation contract"
  assumptions:
    - id: "ASM_PL330_SUBSET"
      status: "pending_human_review"
      safe_for_rtl: true
      source_refs: ["pl330realverify/req/pl330realverify_requirements.md"]
      statement: "This SSOT models a PL330/DMA-330-like engineering verification subset, not a verbatim ARM TRM implementation."
      rtl_semantic_impact: "Limits behavior to APB configuration, AXI memory copy, WFP event gating, debug pulse, interrupts, and declared faults."
    - id: "ASM_SINGLE_CLOCK"
      status: "pending_human_review"
      safe_for_rtl: true
      source_refs: ["pl330realverify/req/pl330realverify_requirements.md", "clock_reset_domains", "cdc_requirements"]
      statement: "APB, AXI, event sampling, channel FSMs, and interrupt logic share dmaclk."
      rtl_semantic_impact: "No internal CDC synchronizers are generated except reset deassertion policy; peripheral_events must be synchronized externally."
    - id: "ASM_DFT_ENGINEERING_NO_SCAN"
      status: "pending_human_review"
      safe_for_rtl: true
      source_refs: ["dft", "synthesis"]
      statement: "Engineering mode does not require scan insertion, MBIST, or boundary scan before RTL generation."
      rtl_semantic_impact: "No extra scan ports are added to the top module unless a future signoff SSOT update approves them."
    - id: "ASM_GENERIC_PHYSICAL_TARGETS"
      status: "pending_human_review"
      safe_for_rtl: true
      source_refs: ["timing", "synthesis", "pnr"]
      statement: "Physical implementation targets are generic placeholders tied to the declared 500 MHz clock and no hard macros."
      rtl_semantic_impact: "RTL should be timing-conscious but not technology-specific."
  qa_evidence:
    deferred_cards_expected: true
    qa_status: "Non-blocking QA cards are recorded for human audit of subset/DFT/physical assumptions; engineering validation can proceed because assumptions are explicit and safe for RTL semantics."
  open_questions:
    - id: "Q_SPEC_SUBSET_LOCK"
      field_path: "custom.assumptions.ASM_PL330_SUBSET"
      question: "Should pl330realverify remain the declared PL330-like engineering subset, or should a verbatim ARM PL330/TRM-compatible contract be imported and locked?"
      suggested_default: "Keep engineering subset for this pipeline run."
      blocking_for_engineering_validation: false
    - id: "Q_DFT_SIGNOFF_PORTS"
      field_path: "dft"
      question: "If this IP later enters signoff mode, which scan/test ports and scan-chain requirements should be added?"
      suggested_default: "No scan/test ports in engineering mode."
      blocking_for_engineering_validation: false
  notes:
    - "No production RTL, testbench, firmware, documentation, or generator artifacts were authored by ssot-gen."
    - "Any future change from engineering subset to full PL330 compatibility requires imported specification evidence and SSOT QA approval."
