test_requirements:
  scenarios:
    - id: "SC_RESET_APB"
      name: "Reset and APB discovery"
      stimulus: "Assert/deassert dmacresetn, read DBGSTATUS/CSR/INTSTATUS, and attempt reserved address accesses."
      expected: "Reset values match registers/function_model; reserved fields read zero; illegal APB access asserts pslverr only for the access."
      checker: "APB monitor and register scoreboard compare prdata, pready, pslverr, and reset state."
      coverage: ["FM_RESET", "FM_APB_READ", "APB_ACCESS"]
    - id: "SC_SINGLE_BEAT_COPY"
      name: "Single-beat DMA memory copy"
      stimulus: "Program SAR/DAR/LOOP_CFG with loop_count=0, enable completion interrupt, start channel, and return OKAY read/write responses without backpressure."
      expected: "One read beat is written unchanged to DAR, SAR/DAR increment by 8, status reaches COMPLETED, CH_COMPLETE pending is set, and dmac_irq asserts if enabled."
      checker: "Scoreboard compares read data to AXI write payload and final CSR/INTSTATUS/dmac_irq."
      coverage: ["FM_TRANSFER", "S3_ISSUE_READ", "S7_TERMINAL"]
    - id: "SC_MULTI_BEAT_COPY"
      name: "Multi-beat address and loop progression"
      stimulus: "Configure loop_count greater than zero and provide multiple OKAY read/write responses."
      expected: "Every beat writes matching data, SAR/DAR increment by DATA_WIDTH/8 per beat, loop_remaining decreases, and completion occurs only after final B response."
      checker: "Beat-by-beat scoreboard tracks expected addresses, data, counters, and terminal status."
      coverage: ["FM_TRANSFER", "loop_remaining", "CCOV_MULTI_BEAT"]
    - id: "SC_AXI_BACKPRESSURE"
      name: "AXI ready/valid hold behavior under backpressure"
      stimulus: "Randomly deassert arready, rvalid, awready, wready, and bvalid during an active transfer."
      expected: "Payload signals remain stable while valid waits for ready; architectural state updates only on completed handshakes."
      checker: "Cycle checker verifies handshake_rules AXI_AR/AXI_R/AXI_AW/AXI_W/AXI_B and state stability."
      coverage: ["AXI_AR", "AXI_R", "AXI_AW", "AXI_W", "AXI_B"]
    - id: "SC_WFP_EVENT"
      name: "Wait-for-peripheral event gating"
      stimulus: "Set CONTROL.wfp_enable and wfp_event, start a channel while selected event is low, then assert the selected event."
      expected: "Channel remains WAITING_FOR_PERIPHERAL with no AXI issue until event is sampled, then resumes transfer."
      checker: "FSM/cycle checker verifies WFP hold/resume and no premature AR/AW/W valid."
      coverage: ["FM_WFP", "WAITING_FOR_PERIPHERAL", "CCOV_EVENT_RELEASE"]
    - id: "SC_AXI_READ_FAULT"
      name: "AXI read fault propagation"
      stimulus: "Start a transfer and return non-OKAY rresp on the read data channel."
      expected: "Channel transitions to FAULTED, error_code=ERR_AXI_RD, CH_FAULT pending set, no destination write for the failed beat."
      checker: "Scoreboard and assertions check no write side effect, CSR error status, INTSTATUS, and dmac_irq behavior."
      coverage: ["FM_FAULT", "ERR_AXI_RD", "CH_FAULT"]
    - id: "SC_AXI_WRITE_FAULT"
      name: "AXI write fault propagation"
      stimulus: "Start a transfer and return non-OKAY bresp after AW/W handshakes."
      expected: "Channel transitions to FAULTED, error_code=ERR_AXI_WR, CH_FAULT pending set, and completion interrupt is not raised."
      checker: "Scoreboard checks first-error-wins and terminal status/interrupt policy."
      coverage: ["FM_FAULT", "ERR_AXI_WR", "CH_FAULT"]
    - id: "SC_W1C_IRQ_CLEAR"
      name: "Interrupt enable and W1C clear"
      stimulus: "Enable interrupts, create completion and fault pending bits, then write one to selected INTSTATUS bits."
      expected: "Only bits written as one clear; dmac_irq reflects enabled pending bits after clear."
      checker: "Register/interrupt scoreboard evaluates INTEN, INTSTATUS, and dmac_irq across write-one-to-clear operations."
      coverage: ["FM_IRQ_CLEAR", "IRQ_LEVEL", "INTSTATUS_W1C"]
    - id: "SC_DEBUG_COMMAND"
      name: "Debug command pulse and rejection"
      stimulus: "Write DBGCMD for an idle and busy manager/channel configuration."
      expected: "Idle debug command emits a bounded pulse; busy manager rejects with declared ERR_DEBUG_REJECT behavior when applicable."
      checker: "Debug monitor and CSR scoreboard check pulse, status, and error_code."
      coverage: ["DBGCMD", "ERR_DEBUG_REJECT"]
  scoreboard_checks: 24
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage for architectural transactions, state updates, outputs, side effects, and error cases."
      bins:
        - { id: "FCOV_RESET", source_ref: "function_model.transactions.FM_RESET", class: "transaction", description: "Reset architectural behavior observed." }
        - { id: "FCOV_APB_READ", source_ref: "function_model.transactions.FM_APB_READ", class: "transaction", description: "APB read transaction observed." }
        - { id: "FCOV_APB_WRITE", source_ref: "function_model.transactions.FM_APB_WRITE", class: "transaction", description: "APB write and side effects observed." }
        - { id: "FCOV_TRANSFER", source_ref: "function_model.transactions.FM_TRANSFER", class: "transaction", description: "Legal DMA copy behavior observed." }
        - { id: "FCOV_WFP", source_ref: "function_model.transactions.FM_WFP", class: "transaction", description: "Wait-for-peripheral behavior observed." }
        - { id: "FCOV_FAULT_RD", source_ref: "function_model.transactions.FM_TRANSFER.error_cases.ERR_AXI_RD", class: "error_case", description: "Read error behavior observed." }
        - { id: "FCOV_FAULT_WR", source_ref: "function_model.transactions.FM_TRANSFER.error_cases.ERR_AXI_WR", class: "error_case", description: "Write error behavior observed." }
        - { id: "FCOV_IRQ_CLEAR", source_ref: "function_model.transactions.FM_IRQ_CLEAR", class: "side_effect", description: "Interrupt W1C clear behavior observed." }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/FSM/timing coverage for when valid/ready, state, and interrupts change."
      bins:
        - { id: "CCOV_APB_ACCESS", source_ref: "cycle_model.handshake_rules.APB_ACCESS", class: "handshake", description: "APB completing access observed." }
        - { id: "CCOV_AXI_AR_HOLD", source_ref: "cycle_model.handshake_rules.AXI_AR", class: "handshake", description: "AR hold-until-ready behavior observed." }
        - { id: "CCOV_AXI_R_CAPTURE", source_ref: "cycle_model.handshake_rules.AXI_R", class: "handshake", description: "R channel capture observed." }
        - { id: "CCOV_AXI_AW_W", source_ref: "cycle_model.handshake_rules.AXI_AW", class: "handshake", description: "AW/W independent handshake behavior observed." }
        - { id: "CCOV_AXI_B", source_ref: "cycle_model.handshake_rules.AXI_B", class: "handshake", description: "B response consumption observed." }
        - { id: "CCOV_IRQ_LEVEL", source_ref: "cycle_model.handshake_rules.IRQ_LEVEL", class: "interrupt", description: "Level interrupt combine observed." }
        - { id: "CCOV_PIPELINE_ALL_STAGES", source_ref: "cycle_model.pipeline", class: "pipeline_stage", description: "Each declared pipeline stage observed." }
        - { id: "CCOV_CHANNEL_FSM", source_ref: "fsm.channel_fsm.transitions", class: "state_transition", description: "Declared legal channel FSM transitions observed." }
        - { id: "CCOV_PERFORMANCE_OUTSTANDING", source_ref: "cycle_model.performance.outstanding", class: "outstanding", description: "Single-outstanding limit exercised." }
        - { id: "CCOV_PERFORMANCE_DEPTH", source_ref: "cycle_model.performance.depth", class: "depth", description: "Declared pipeline/buffer depth exercised." }
        - { id: "CCOV_PERFORMANCE_THROUGHPUT", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "No-backpressure throughput condition exercised." }
    functional: "Legacy alias: function + cycle coverage must both close; new flows read coverage_goals.function and coverage_goals.cycle separately."
    line: ">= 90% instrumented line coverage or explicit approved waiver."
    branch: ">= 85% instrumented branch coverage or explicit approved waiver."
    fsm: "100% declared FSM states and legal transitions covered or explicitly waived."
    assertions: "All APB/AXI/order/error assertions pass without unwaived failures."
