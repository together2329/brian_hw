# =============================================================================
# watchdog_cx1.ssot.yaml — Watchdog timer with kick register and timeout pulse
# Simple synchronous watchdog: a down-counter is preloaded from a CSR;
# writing any value to the KICK register restarts the counter; when the
# counter reaches zero a one-cycle timeout pulse is emitted and the counter
# auto-reloads from PERIOD.
# =============================================================================
ip: watchdog_cx1
version: '1.0'
purpose: "Watchdog timer: counter decrements each clock; write to KICK restarts; counter=0 emits one-cycle timeout_pulse then auto-reloads."
type: peripheral

top_module:
  name: watchdog_cx1
  file: rtl/watchdog_cx1.sv
  version: '1.0'
  type: peripheral
  description: "Watchdog timer with kick register and timeout pulse. Counter decrements every PCLK; APB KICK write restarts; timeout_pulse emitted for 1 cycle when counter hits zero."
  reference_spec: "Internal - common_ai_agent demo"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: csr_decode, kind: control, source_refs: [registers.register_list], rtl_candidates: [watchdog_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: counter,    kind: datapath, source_refs: [function_model.transactions], rtl_candidates: [watchdog_cx1], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: watchdog_cx1_top
    file: rtl/watchdog_cx1.sv
    ownership: manifest
    ssot_gen: true
    wiring_only: false
    source_sections: [io_list, registers, function_model, fsm]
    implements: [io_list.interfaces.apb_slave, io_list.interfaces.wdt_io, registers.register_list, function_model.transactions]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM_KICK, function_model.transactions.FM_TICK, function_model.transactions.FM_IDLE]
    description: "APB decode + watchdog counter + timeout pulse."

parameters:
  - { name: APB_ADDR_WIDTH, default: 4,  type: int, description: "APB address width" }
  - { name: APB_DATA_WIDTH, default: 32, type: int, description: "APB data width" }
  - { name: COUNTER_WIDTH,  default: 8,  type: int, description: "Counter width in bits" }

io_list:
  clock_domains:
    - name: pclk
      frequency_mhz: 50
      description: "APB/system clock"
      ports:
        - { name: PCLK, width: 1, direction: input, description: "System clock" }
  resets:
    - name: presetn
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "APB reset (active-low)"
      ports:
        - { name: PRESETn, width: 1, direction: input, description: "Active-low reset" }
  interfaces:
    - name: apb_slave
      type: APB-Lite
      role: slave
      clock_domain: pclk
      reset_domain: presetn
      description: "APB-Lite CSR interface"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0"
        access_phase: "PSEL=1, PENABLE=1, PREADY=1"
      ports:
        - { name: PADDR,   width: 4,  direction: input  }
        - { name: PSEL,    width: 1,  direction: input  }
        - { name: PENABLE, width: 1,  direction: input  }
        - { name: PWRITE,  width: 1,  direction: input  }
        - { name: PWDATA,  width: 32, direction: input  }
        - { name: PRDATA,  width: 32, direction: output }
        - { name: PREADY,  width: 1,  direction: output }
        - { name: PSLVERR, width: 1,  direction: output }
    - name: wdt_io
      type: custom
      clock_domain: pclk
      reset_domain: presetn
      description: "Watchdog outputs"
      ports:
        - { name: timeout_pulse, width: 1, direction: output, description: "High for exactly 1 cycle when counter reaches zero" }

features:
  - name: "Counter decrement"
    trigger: "Every rising PCLK edge when enabled"
    datapath: "count_q decrements by 1 each cycle"
    control: "CTRL.enable gating"
    output: "count_q decrements toward zero"
  - name: "Kick (restart)"
    trigger: "APB write to KICK register (offset 4)"
    datapath: "count_q <= PERIOD.period value"
    control: "APB access-phase write handshake"
    output: "Counter reloaded; timeout_pulse stays 0"
  - name: "Timeout pulse"
    trigger: "count_q transitions to 0"
    datapath: "timeout_pulse asserted for 1 cycle; count_q auto-reloads from PERIOD.period"
    control: "Synchronous to PCLK"
    output: "timeout_pulse = 1 for exactly 1 cycle, then count_q = PERIOD.period"

registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "Reserved bits read zero"
  register_list:
    - name: CTRL
      offset: 0x0
      width: 32
      access: rw
      reset: 0x00000001
      category: control
      description: "Control register. Bit[0]=enable"
      fields:
        - { name: enable, bits: [0, 0], access: rw, reset: 1, write_effect: "Enable/disable counter decrement", description: "1=counter enabled, 0=frozen" }
        - { name: reserved_31_1, bits: [31, 1], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved" }
    - name: KICK
      offset: 0x4
      width: 32
      access: rw
      reset: 0x00000000
      category: command
      description: "Write any value to restart the watchdog counter from PERIOD"
      write_side_effects:
        - "On access-phase write, counter reloads to PERIOD.period; timeout_pulse stays 0."
      fields:
        - { name: kick, bits: [0, 0], access: rw, reset: 0, write_effect: "Reload counter", description: "Any write restarts counter" }
        - { name: reserved_31_1, bits: [31, 1], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved" }
    - name: PERIOD
      offset: 0x8
      width: 32
      access: rw
      reset: 0x000000FF
      category: control
      description: "Timeout period value loaded into counter on kick or timeout"
      fields:
        - { name: period, bits: [7, 0], access: rw, reset: 255, description: "Counter reload value (8-bit)" }
        - { name: reserved_31_8, bits: [31, 8], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved" }
    - name: STATUS
      offset: 0xC
      width: 32
      access: ro
      reset: 0x00000000
      category: status
      description: "Current counter value (read-only)"
      fields:
        - { name: count, bits: [7, 0], access: ro, reset: 255, description: "Current counter value" }
        - { name: reserved_31_8, bits: [31, 8], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved" }

memory:
  instances: []
  note: "No FIFO/SRAM."

interrupts:
  sources: []
  output: null
  note: "No interrupts; timeout_pulse is the external observable."

fsm:
  watchdog_counter:
    states: [RUNNING, TIMEOUT]
    transitions:
      - { from: RUNNING, to: TIMEOUT, condition: "count_q == 1 and enable == 1" }
      - { from: TIMEOUT, to: RUNNING, condition: "always (auto-reload after 1 cycle)" }
      - { from: RUNNING, to: RUNNING, condition: "kick write detected" }
    note: "TIMEOUT is a single-cycle state (timeout_pulse=1). Auto-reloads to PERIOD.period."

rtl_contract:
  transaction: FM_TICK
  clock: PCLK
  reset: PRESETn
  reset_active: low
  sample_condition: "PRESETn == 1"
  input_map:
    psel: PSEL
    penable: PENABLE
    pwrite: PWRITE
    paddr: PADDR
    pwdata: PWDATA
  output_map:
    prdata: PRDATA
    pready: PREADY
    pslverr: PSLVERR
    timeout_pulse: timeout_pulse

function_model:
  purpose: "Executable FL contract for rtl-gen and tb-gen"
  state_variables:
    - { name: count_q,  source: registers.STATUS.count,  reset: 255, description: "Down-counter state (COUNTER_WIDTH bits)" }
    - { name: period_q, source: registers.PERIOD.period, reset: 255, description: "Reload period register" }
    - { name: enable_q, source: registers.CTRL.enable,   reset: 1,   description: "Enable bit" }
  transactions:
    - id: FM_KICK
      name: watchdog_kick
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1", "paddr == 4"]
      inputs: [pwdata]
      outputs: ["count_q -> period_q; timeout_pulse -> 0"]
      output_rules:
        - { name: pready_rule,       port: PREADY,        expr: 1,  width: 1 }
        - { name: pslverr_rule,      port: PSLVERR,       expr: 0,  width: 1 }
        - { name: timeout_rule,      port: timeout_pulse, expr: 0,  width: 1 }
      state_updates:
        - { name: count_q, expr: "period_q", width: 8 }
      side_effects: ["Counter reloaded to PERIOD.period"]
      error_cases: []
    - id: FM_TICK
      name: counter_tick
      preconditions: ["enable_q == 1", "(psel == 0 or penable == 0 or pwrite == 0 or paddr != 4)"]
      inputs: []
      outputs: ["count_q decrements; timeout_pulse asserted when count_q was 1"]
      output_rules:
        - { name: pready_rule,       port: PREADY,        expr: 1,                          width: 1 }
        - { name: pslverr_rule,      port: PSLVERR,       expr: 0,                          width: 1 }
        - { name: timeout_rule,      port: timeout_pulse, expr: "1 if count_q == 1 else 0", width: 1 }
      state_updates:
        - { name: count_q, expr: "period_q if count_q == 1 else (count_q - 1) & 0xff", width: 8 }
      side_effects: ["timeout_pulse=1 for 1 cycle when count_q==1"]
      error_cases: []
    - id: FM_IDLE
      name: watchdog_idle
      preconditions: ["enable_q == 0", "(psel == 0 or penable == 0 or pwrite == 0 or paddr != 4)"]
      inputs: [paddr]
      outputs: ["count_q holds; timeout_pulse=0; PRDATA returns count_q on read of offset 0xC"]
      output_rules:
        - { name: pready_rule,       port: PREADY,        expr: 1,       width: 1 }
        - { name: pslverr_rule,      port: PSLVERR,       expr: 0,       width: 1 }
        - { name: timeout_rule,      port: timeout_pulse, expr: 0,       width: 1 }
        - { name: prdata_rule,       port: PRDATA, width: 32,
            expr: "count_q if (psel == 1 and penable == 1 and pwrite == 0 and paddr == 0xC) else 0" }
      state_updates:
        - { name: count_q, expr: "count_q", width: 8 }
      side_effects: []
      error_cases: []
  invariants:
    - "PREADY=1 always, PSLVERR=0 always."
    - "timeout_pulse is high for exactly 1 clock cycle when counter hits zero."
    - "KICK write has priority over tick in the same cycle."
    - "When enable_q=0, counter is frozen and timeout_pulse=0."

cycle_model:
  purpose: "Cycle/handshake contract"
  executable: python
  cosim: true
  clock: PCLK
  reset:
    assertion: "PRESETn low clears count_q=PERIOD.period (255 default); timeout_pulse=0."
    deassertion: "First rising PCLK enables counter."
  latency:
    apb_write: { min_cycles: 1, max_cycles: 1 }
    apb_read:  { min_cycles: 0, max_cycles: 0 }
    kick_to_reload: { min_cycles: 1, max_cycles: 1, description: "count_q updates on the PCLK after KICK access phase" }
    tick: { min_cycles: 1, max_cycles: 1, description: "count_q decrements 1 per PCLK" }
  handshake_rules:
    - { signal: PREADY,   rule: "Always 1 (0-wait-state)" }
    - { signal: timeout_pulse, rule: "Asserted for exactly 1 PCLK cycle when counter hits zero" }
  pipeline:
    - { stage: S0_SAMPLE,  cycle: 0, action: "Sample APB access phase and count_q" }
    - { stage: S1_UPDATE,  cycle: 1, action: "Update count_q: kick reload or decrement" }
  ordering:
    - "KICK write takes priority over decrement in the same cycle."
    - "timeout_pulse is combinational mirror of (count_q==0) after update."
  backpressure: ["No backpressure."]
  performance:
    frequency_mhz: 50
    throughput: { decrements_per_cycle: 1, condition: "enable=1" }
  observability:
    - "timeout_pulse and STATUS.count observable each cycle."

clock_reset_domains:
  domains:
    - { name: PCLK, frequency_mhz: 50 }
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: df0, source: PWDATA, sink: count_q, path: "KICK write -> count_q=period_q" }
    - { id: df1, source: count_q, sink: count_q, path: "count_q = count_q - 1 per cycle" }
    - { id: df2, source: count_q, sink: timeout_pulse, path: "timeout_pulse = (count_q==0)" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]

security:
  classifications: []

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources", architectural_effect: "PSLVERR always 0" }

debug_observability:
  signals:
    - { name: count_q,  source: function_model.state_variables.count_q,  description: "Counter state" }
    - { name: period_q, source: function_model.state_variables.period_q, description: "Period register" }

dft:
  scan: { enabled: false }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [PCLK, PRESETn, PADDR, PSEL, PENABLE, PWRITE, PWDATA, PRDATA, PREADY, PSLVERR, timeout_pulse]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file."

test_requirements:
  scenarios:
    - id: SC1
      name: "Reset state — counter at PERIOD default"
      stimulus: "After reset, check count, timeout_pulse=0"
      expected: "count_q=255, timeout_pulse=0"
      checker: "Verifies reset value."
      coverage: [reset]
    - id: SC2
      name: "Counter decrements each cycle"
      stimulus: "Enable=1, no kick; observe count for 3 cycles"
      stimulus_machine_spec:
        assign: { enable: 1 }
      expected: "count_q decrements by 1 per cycle"
      checker: "Verifies tick."
      coverage: [FM_TICK]
    - id: SC3
      name: "Kick reloads counter"
      stimulus: "Write to KICK (offset 4) after some decrements"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x4, data: 0x1 } }
      expected: "count_q returns to period_q value"
      checker: "Verifies kick."
      coverage: [FM_KICK]
    - id: SC4
      name: "Timeout pulse fires for exactly 1 cycle"
      stimulus: "Set PERIOD=3, kick, wait for counter to reach 1 then 0"
      expected: "timeout_pulse=1 for exactly 1 cycle, then count_q=3"
      checker: "Verifies timeout_pulse width and auto-reload."
      coverage: [FM_TICK]
    - id: SC5
      name: "Disabled counter does not decrement"
      stimulus: "Write enable=0, observe count for 3 cycles"
      expected: "count_q unchanged, timeout_pulse=0"
      checker: "Verifies enable gating."
      coverage: [FM_IDLE]
  scoreboard_checks:
    - "count_q decrements by 1 each enabled cycle"
    - "KICK write reloads count_q to period_q"
    - "timeout_pulse=1 for exactly 1 cycle when count_q hits zero"
    - "PREADY=1 always, PSLVERR=0 always"
    - "Disabled counter holds count_q"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: WDT_CX1_DONE, description: "watchdog_cx1 ROCEV chain complete", status: planned }
