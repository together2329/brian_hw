workflow_todos:
  ssot-gen:
  - id: SSOT_VALIDATE
    content: Validate the SSOT YAML
    detail: Run verify_ssot.py in engineering mode to confirm no blockers.
    command: /validate-yaml fresh_web_timer_ip
    script: $ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py
    run_command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" fresh_web_timer_ip --root "$ATLAS_PROJECT_ROOT" --mode engineering
    instructions:
    - Run verify_ssot.py after the final SSOT write.
    - Fix any blockers before handoff.
    criteria:
    - verify_ssot.py returns zero blockers.
    source_refs:
    - fresh_web_timer_ip/yaml/fresh_web_timer_ip.ssot.yaml
    priority: high
    required: true
  fl-model-gen: []
  rtl-gen:
  - id: RTL_TIMER_CORE
    content: Implement timer counter, prescaler, and match logic
    detail: Translate function_model (TM_TICK, TM_MATCH, TM_IDLE) and cycle_model pipeline into rtl/fresh_web_timer_ip.sv.
    command: /ssot-rtl fresh_web_timer_ip
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    run_command: python3 "$ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py" fresh_web_timer_ip --root "$ATLAS_PROJECT_ROOT" --audit-rtl
    instructions:
    - Implement APB4 register decode for CTRL, LOAD, VALUE, CMP, PRESCALE, INTSTAT, INTEN.
    - Implement prescaler counter that gates main counter ticks.
    - Implement match compare and one-cycle timer_match pulse.
    - Implement timer_irq as level output gated by INTEN.match_en and INTSTAT.match.
    - Implement ONE_SHOT auto-clear of enable on match.
    - Implement PERIODIC reload from LOAD on match.
    criteria:
    - RTL compiles without errors.
    - All function_model transactions observable in RTL behavior.
    - All registers readable/writable via APB.
    source_refs:
    - function_model.transactions
    - cycle_model.pipeline
    - registers.register_list
    owner_module: fresh_web_timer_ip
    owner_file: rtl/fresh_web_timer_ip.sv
    priority: high
    required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
