rtl_contract:
  owner: ssot-gen
  type: generic_structured_rule_contract
  transaction: FM_PRIMARY
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: (valid) and ready
  input_map:
    valid: valid
    data_in: data_in
  output_map:
    busy: busy
    error: error
    accepted_count: accepted_count
    ready: ready
    result: result
    result_valid: result_valid
  ready_output: ready
  output_valid: ''
  output_rules:
  - &id005
    name: busy
    expr: busy
    width: 1
    port: busy
    description: Scoreboard-observable busy output mirrors function_model busy state.
  - &id006
    name: error
    expr: error
    width: 1
    port: error
    description: Scoreboard-observable error output mirrors function_model error state.
  - name: accepted_count
    port: accepted_count
    expr: accepted_count
    width: 16
    description: Externally observable function_model state is driven from the RTL state register.
  state_updates: &id007
  - name: busy
    expr: '1'
    width: 1
    reset: 0
    description: Primary accepted transaction marks the IP busy until the cycle_model response point.
  contract_invariants:
  - ready is asserted whenever reset is deasserted and the SSOT does not define backpressure.
  - result and result_valid update only when sample_condition is true.
  - accepted_count increments once per accepted transaction.
