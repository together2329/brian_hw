workflow_todos:
  rtl-gen:
  - id: RTL_IMPLEMENT_APPROVED_BEHAVIOR
    content: Implement every approved SSOT behavior in RTL-owned manifest modules
    detail: Use function_model transactions, cycle_model timing, interfaces, registers, error handling, debug observability, and sub_modules ownership to implement the DUT without placeholder tie-offs or fixed IP templates.
    criteria:
    - Every required rtl_todo_plan task reaches todo_completion.status=pass after audit
    - DUT-only compile/lint reports are fresh and clean after the final RTL edit
    - 'RTL preserves SSOT authority: SSOT, FunctionalModel, coverage goals, interface rules, and performance targets are not edited to make RTL pass'
    source_refs:
    - function_model
    - cycle_model
    - sub_modules
    - quality_gates.rtl
    - quality_gates.rtl_gen
    owner_module: ssot_screenshot_smoke_20260524_083011_core
    owner_file: rtl/ssot_screenshot_smoke_20260524_083011.sv
    priority: high
    required: true
  - id: RTL_RESOLVE_CONNECTION_CONTRACTS
    content: Resolve production multi-module connection contracts before top integration signoff
    detail: The SSOT may declare manifest child modules before machine-readable wiring is approved. Child module drafts may proceed from owner packets; top wiring, PASS, and signoff must remain blocked until SSOT authors integration.connections or sub_modules[].connections records.
    criteria:
    - integration.connections or sub_modules[].connections lists every active child module connection as module/port/signal data
    - rtl_authoring_plan.execution_policy.connection_contract_gap.status becomes ok
    - Top/gate authoring packet integration_signoff_allowed is true after rerunning rtl-gen TODO derivation
    source_refs:
    - integration.connections
    - sub_modules[].connections
    - quality_gates.rtl_gen
    owner_module: ssot_screenshot_smoke_20260524_083011
    owner_file: rtl/ssot_screenshot_smoke_20260524_083011.sv
    priority: high
    required: true
    answer_schema:
      format: YAML or JSON
      root_key: connection_contracts
      item_required_fields:
      - module
      - port
      - signal
      item_optional_fields:
      - instance
      - direction
      - source_ref
      - allow_constant
      - allow_unused
      - tieoff
      - reason
      rule: Only approved rows become SSOT wiring contracts; do not infer missing wiring from RTL.
    example_answer:
      connection_contracts:
      - module: ssot_screenshot_smoke_20260524_083011_engine
        instance: u_engine
        port: done_o
        signal: done
        source_ref: integration.connections.done_o
