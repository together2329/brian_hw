    reset_domain: rst_n
  - name: debug_status
    type: custom
    role: output
    description: Minimal waveform and status observability required by SSOT quality gates
    protocol:
      sampling: busy and error are sampled in the primary clock domain.
      reset: debug status returns to function_model reset values on reset.
      visibility: Signals are waveform-observable for debug and scoreboard triage.
    ports:
    - name: busy
      width: 1
      direction: output
      description: IP is processing an accepted transaction or packet
    - name: error
      width: 1
      direction: output
      description: Sticky or current error indication
    clock_domain: primary_clk
    reset_domain: rst_n
features:
- name: approved_primary_behavior
  trigger: A valid protocol transaction, packet, or command is accepted on the external interface.
  datapath: Accept one byte-oriented valid-ready transaction when valid and ready are high; output result equals data_in XOR command and assert result_valid on the accepted transaction.
  control: Control state follows the approved function_model and cycle_model sections.
  output: Externally observable outputs, status, counters, interrupts, and/or responses match the approved behavior.
dataflow:
  source: approved external input/control interfaces
  sequence:
  - accept transaction or packet using cycle_model handshake
  - apply function_model transaction and update internal state
  - publish response/status/interrupt/debug outputs
  sinks:
  - external outputs
  - register reads
  - interrupt/status/debug observability
  notes: Accept one byte-oriented valid-ready transaction when valid and ready are high; output result equals data_in XOR command and assert result_valid on the accepted transaction.
function_model:
  purpose: Cycle-independent reference model that rtl-gen and tb-gen must implement and compare against.
  state_variables:
  - name: busy
    source: accepted transaction or packet in progress
    reset: 0
    description: Processing state
  - name: error
    source: approved error/malformed condition
    reset: 0
    description: Error indication
  - name: accepted_count
    source: valid_ready_transaction
    width: 16
    reset: 0
    description: Number of accepted valid/ready transactions.
    output: true
  transactions:
  - id: FM_RESET
    name: reset
    preconditions:
    - reset asserted
    inputs:
    - clock
    - reset
    outputs:
    - busy == 0
    - error == 0
    - registers and counters equal approved reset defaults
    - name: accepted_count
      port: accepted_count
      expr: '0'
      description: 'Auto-injected placeholder rule for observable state ''accepted_count'' (repair_ssot_schema rule_expr_completeness pass; advisory: downstream TB/scoreboard treats this as 0 unless overridden).'
    side_effects:
    - clears transient protocol state
    - clears pending non-retained status
    error_cases: []
    output_rules:
    - name: accepted_count
      port: accepted_count
      expr: '0'
      width: 16
      description: 'Auto-injected placeholder rule for observable state ''accepted_count'' (repair_ssot_schema rule_expr_completeness pass; advisory: downstream TB/scoreboard treats this as 0 unless overridden).'
  - id: FM_PRIMARY
    name: primary_behavior
    preconditions:
    - valid input transaction or packet is accepted
    inputs:
    - external interface signals
    - configuration/register state
    outputs:
    - Accept one byte-oriented valid-ready transaction when valid and ready are high; output result equals data_in XOR command and assert result_valid on the accepted transaction.
    - name: busy
      port: busy
      expr: busy
      description: Scoreboard-observable busy output mirrors function_model busy state.
    - name: error
      port: error
      expr: error
      description: Scoreboard-observable error output mirrors function_model error state.
    side_effects:
    - updates status, counters, events, and observable outputs according to approved Q&A
    error_cases:
    - condition: malformed input or invalid control policy
      result: error status follows error_handling section
    output_rules:
    - *id005
    - *id006
    state_updates: *id007
  - id: FM_CSR
    name: control_status_access
    preconditions:
    - firmware/control bus access is accepted
    inputs:
    - address
    - write data
    - write enable
    - byte strobes
    outputs:
    - read data and side effects match registers.register_list
    - name: error
      port: error
      expr: error
      description: CSR illegal access or malformed transaction status is visible on error.
    side_effects:
    - RW and W1C fields update exactly as specified
    error_cases:
    - condition: unsupported address or illegal access
      result: bus error/status error according to error_handling
    output_rules:
    - name: error
      expr: error
      width: 1
      port: error
      description: CSR illegal access or malformed transaction status is visible on error.
    state_updates:
    - name: error
      expr: error
      width: 1
      reset: 0
      description: CSR transaction preserves or updates error according to register/error policy.
  invariants:
  - No output, counter, status bit, or interrupt may change except as a consequence of an approved transaction, event, reset, or CSR side effect.
  - The function_model is the scoreboard source of truth for tb-gen.
  - Any behavior not represented here must be escalated to ssot-gen before RTL signoff.
  reference_model_hint: Generate a Python FunctionalModel.apply(txn) from state_variables and transactions, then compare every RTL-observable result against it.
cycle_model:
  purpose: Cycle-accurate protocol, reset, latency, and observability contract for rtl-gen.
  executable: python
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel remains the behavioral oracle.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: async_assert_sync_deassert
    deassertion: State may accept new work after reset deassertion and any required synchronization.
  latency:
    control_access:
      min_cycles: 1
      max_cycles: protocol_backpressure_bound
      description: CSR/control latency is bounded by protocol ready/valid phases.
    primary_transaction:
      min_cycles: 1
      max_cycles: implementation_defined_by_function_model
      description: Primary behavior completes when output/status event is observed.
  handshake_rules:
  - signal: valid_ready
    rule: A transfer is accepted only on valid && ready or the equivalent approved protocol phase.
  - signal: outputs
    rule: Outputs remain stable while downstream backpressure prevents acceptance.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0
    action: Accept protocol transaction/beat/command under approved handshake.
  - stage: S1_UPDATE
    cycle: 0..N
    action: Update function_model state and datapath/control state.
  - stage: S2_OBSERVE
    cycle: N..M
    action: Publish output response, status, interrupt, counter, or debug event.
  ordering:
  - Accepted transactions preserve externally visible ordering unless an explicit reordering feature is listed.
  - CSR side effects occur in program order at the accepted control transaction boundary.
  backpressure:
  - Input data and control state remain stable while the selected protocol applies backpressure.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: No downstream or internal backpressure
    outstanding:
      max: 1
      description: Default one accepted operation until Q&A declares deeper buffering
    depth:
      pipeline_stages: 3
      queue_depth: 1
      description: Accept/update/observe default cycle structure
  observability:
  - busy
  - error
  - all protocol valid/ready signals
  - all CSR side-effect points
