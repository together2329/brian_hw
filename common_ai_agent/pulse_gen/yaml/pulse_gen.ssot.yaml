# IP: pulse_gen (One-Shot Pulse Generator)
# Flow: User Input -> Requirements -> Production SSOT(YAML) -> Validation -> SSOT HANDOFF
# =============================================================================

ip: pulse_gen
version: draft
purpose: "Generate a single, parameterized-width output pulse on trigger with 1-cycle latency, controllable via APB-lite CSR."
type: "peripheral"
description: "One-shot pulse generator with software-triggered single pulse output, programmable pulse width and polarity, APB-lite register interface, single 50 MHz PCLK domain."
top_module:
  name: "pulse_gen"
  file: "rtl/pulse_gen.sv"
  version: "1.0"
  type: "peripheral"
  description: "One-shot pulse generator with APB-lite CSR"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules: TBD
parameters: TBD
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "Main peripheral clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "Peripheral clock" }
  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Main active-low reset, async assert, sync deassert"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_csr"
      type: "APB4-lite"
      role: "slave"
      description: "APB-lite register access interface"
      ports:
        - { name: "PADDR",   width: 12, direction: "input",  description: "APB address" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB slave error" }
    - name: "pulse_out"
      type: "custom"
      description: "Pulse output"
      ports:
        - { name: "pulse_out", width: "PULSE_WIDTH", direction: "output", description: "Generated pulse output" }
