workflow_todos:
  rtl-gen:
    - id: "RTL_PULSE_CORE_BEHAVIOR"
      content: "Implement pulse generation core behavior from SSOT."
      detail: "Translate function_model.FM_TICK into registered state machine: IDLE→PULSE_ACTIVE→IDLE. Trigger loads counter, counter decrements, pulse_out mirrors active_q, done_q pulses on expiration. Trigger while active is ignored. WIDTH changes do not affect current pulse."
      criteria:
        - "Trigger (CTRL.START or trigger_in↑) while idle loads counter_q from WIDTH, sets active_q=1."
        - "counter_q decrements each PCLK while active_q=1 and counter_q > 0."
        - "When counter_q reaches 0: active_q=0, done_q=1 (one cycle), pulse_out deasserts."
        - "pulse_out asserts 1 PCLK cycle after trigger (1-cycle latency)."
        - "Re-trigger while active_q=1 is ignored."
        - "WIDTH register changes during active pulse do not affect current pulse."
        - "WIDTH.PULSE_WIDTH=0 behaves as a 1-cycle pulse."
      source_refs:
        - "function_model.transactions.FM_TICK"
        - "function_model.state_variables"
        - "cycle_model.pipeline"
        - "fsm.control.transitions"
        - "dataflow.ordering"
      owner_module: "pulse_gen_core"
      owner_file: "rtl/pulse_gen_core.sv"
      priority: "high"
      required: true
    - id: "RTL_PULSE_REGISTER_BLOCK"
      content: "Implement APB-lite register file and interrupt aggregation."
      detail: "Decode APB addresses for CTRL(0x00), WIDTH(0x04), STATUS(0x08), INTEN(0x0C), INTSTAT(0x10). Implement read/write access rules, reserved field policy, PREADY, PSLVERR for out-of-range. W1C clear for INTSTAT. Self-clearing START bit."
      criteria:
        - "PREADY=1 in access phase for valid addresses."
        - "PSLVERR=1 with PREADY for addresses outside 0x00-0x10."
        - "CTRL.START self-clears (write 1 triggers, read returns 0)."
        - "WIDTH defaults to 0x00000001."
        - "STATUS.ACTIVE is read-only, mirrors active_q from core."
        - "INTSTAT.PULSE_DONE set by HW, cleared by W1C write."
        - "Reserved fields read as 0, writes ignored."
        - "pulse_irq = INTSTAT.PULSE_DONE && INTEN.PULSE_DONE."
      source_refs:
        - "registers.register_list"
        - "registers.reserved_field_policy"
        - "interrupts"
        - "error_handling"
      owner_module: "pulse_gen_regs"
      owner_file: "rtl/pulse_gen_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_PULSE_TOP_INTEGRATION"
      content: "Wire top-level ports to sub-module instances."
      detail: "Instantiate pulse_gen_regs and pulse_gen_core. Wire PCLK, PRESETn, APB ports to regs. Wire trigger_in, pulse_out, internal trigger/width/active/done signals between regs and core."
      criteria:
        - "All io_list ports appear on pulse_gen top module."
        - "Named port connections match integration.connections."
        - "No unconnected sub-module ports."
        - "Compiles with all sub-modules."
      source_refs:
        - "io_list"
        - "integration.connections"
        - "filelist.rtl"
      owner_module: "pulse_gen"
      owner_file: "rtl/pulse_gen.sv"
      priority: "high"
      required: true
    - id: "RTL_PULSE_PARAMETERIZATION"
      content: "Keep counter and register widths user-editable via parameters."
      detail: "Use PULSE_WIDTH_BITS for counter_q, WIDTH.PULSE_WIDTH field, and related datapath. Use APB_ADDR_WIDTH/APB_DATA_WIDTH for register interface sizing."
      criteria:
        - "PULSE_WIDTH_BITS parameter controls counter_q width."
        - "APB_ADDR_WIDTH/APB_DATA_WIDTH parameterize the register interface."
        - "No hard-coded datapath widths outside parameter declarations."
      source_refs:
        - "parameters"
        - "io_list.interfaces.apb_slave"
        - "coding_rules"
      owner_module: "pulse_gen_core"
      owner_file: "rtl/pulse_gen_core.sv"
      priority: "medium"
      required: true
  tb-gen:
    - id: "TB_PULSE_SCENARIOS"
      content: "Generate reset, single-pulse APB, single-pulse external trigger, re-trigger blocked, WIDTH change, interrupt, zero-width, APB error, and back-to-back tests."
      detail: "Cocotb test list must mirror test_requirements.scenarios."
      criteria:
        - "SC_RESET_IDLE is implemented."
        - "SC_SINGLE_PULSE_APB is implemented."
        - "SC_SINGLE_PULSE_EXT_TRIG is implemented."
        - "SC_RETRIGGER_BLOCKED is implemented."
        - "SC_WIDTH_CHANGE_DURING_PULSE is implemented."
        - "SC_INTERRUPT_ON_COMPLETE is implemented."
        - "SC_INTERRUPT_DISABLED is implemented."
        - "SC_ZERO_WIDTH_PULSE is implemented."
        - "SC_APB_ERROR_RANGE is implemented."
        - "SC_BACK_TO_BACK is implemented."
      source_refs:
        - "test_requirements.scenarios"
  sim_debug:
    - id: "DEBUG_PULSE_WAVES"
      content: "Correlate pulse_gen waveform, source, and scoreboard events."
      detail: "Sim debug should show PCLK, PRESETn, pulse_out, trigger_in, pulse_irq, counter_q, active_q, done_q, APB signals."
      criteria:
        - "Waveform includes all debug_observability.waveform_must_probe entries."
        - "Source view opens rtl/pulse_gen_core.sv."
        - "Hierarchy contains pulse_gen / pulse_gen_core / pulse_gen_regs."
      source_refs:
        - "debug_observability"

generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh pulse_gen", description: "Validate the pulse_gen SSOT structure on disk." }
    - { name: "handoff_rtl", command: "/ssot-rtl pulse_gen", description: "Downstream RTL generation from validated SSOT." }
    - { name: "handoff_tb", command: "/ssot-tb pulse_gen", description: "Downstream pyuvm/cocotb verification from validated SSOT." }
    - { name: "handoff_sim_debug", command: "/wf sim_debug", description: "Downstream waveform, failure, and coverage inspection after sim exists." }
    - { name: "handoff_coverage", command: "/coverage pulse_gen", description: "Measure SSOT-declared coverage goals." }
    - { name: "handoff_eda", command: "/syn pulse_gen && /sta pulse_gen && /pnr pulse_gen && /sta-post pulse_gen", description: "Produce SSOT-declared synthesis, STA, PnR, and post-route STA evidence." }
