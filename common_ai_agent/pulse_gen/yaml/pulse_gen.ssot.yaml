test_requirements:
  scenarios:
    - id: "SC_RESET_IDLE"
      name: "Reset clears all state"
      stimulus: "Assert PRESETn, deassert, verify outputs"
      expected: "counter_q=0, active_q=0, done_q=0, pulse_out=0, pulse_irq=0, all registers at reset values"
      checker: "Scoreboard reads STATUS, CTRL, WIDTH, INTEN, INTSTAT; asserts outputs low"
      coverage: ["fcov_reset_idle", "ccov_reset_recovery"]
    - id: "SC_SINGLE_PULSE_APB"
      name: "Single pulse via APB trigger"
      stimulus: "Write WIDTH=5, write CTRL.START=1, observe pulse_out"
      expected: "pulse_out asserts 1 cycle after START write, stays high 5 cycles, deasserts. STATUS.ACTIVE mirrors."
      checker: "Scoreboard compares pulse_out timing against function_model. Counts pulse cycles."
      coverage: ["fcov_apb_trigger", "ccov_pulse_width", "ccov_trigger_latency"]
    - id: "SC_SINGLE_PULSE_EXT_TRIG"
      name: "Single pulse via external trigger_in"
      stimulus: "Write WIDTH=3, drive trigger_in 0→1, observe pulse_out"
      expected: "pulse_out asserts 1 cycle after trigger_in rising edge, stays high 3 cycles, deasserts."
      checker: "Scoreboard verifies edge-sensitive trigger, pulse width, and internal state transitions."
      coverage: ["fcov_ext_trigger", "ccov_edge_detect"]
    - id: "SC_RETRIGGER_BLOCKED"
      name: "Re-trigger while active is ignored"
      stimulus: "Write WIDTH=5, trigger pulse, write CTRL.START=1 again during active pulse"
      expected: "Second trigger ignored. Pulse width unchanged. No queuing."
      checker: "Scoreboard verifies second trigger is no-op, pulse_out still 5 cycles."
      coverage: ["fcov_retrigger_blocked"]
    - id: "SC_WIDTH_CHANGE_DURING_PULSE"
      name: "WIDTH change during active pulse does not affect current pulse"
      stimulus: "Write WIDTH=10, trigger pulse. After 2 cycles, write WIDTH=3."
      expected: "pulse_out remains high for 10 cycles total (original width). STATUS.ACTIVE clear after 10."
      checker: "Scoreboard verifies width sampled at trigger time."
      coverage: ["fcov_width_snapshot"]
    - id: "SC_INTERRUPT_ON_COMPLETE"
      name: "Interrupt asserts on pulse completion"
      stimulus: "Write INTEN=1, WIDTH=3, trigger pulse. Wait for completion."
      expected: "pulse_irq asserts on same rising edge as pulse_out deasserts. INTSTAT.PULSE_DONE set."
      checker: "Scoreboard checks pulse_irq timing, INTSTAT readback, then W1C clear."
      coverage: ["fcov_interrupt", "ccov_interrupt_timing"]
    - id: "SC_INTERRUPT_DISABLED"
      name: "No interrupt when INTEN=0"
      stimulus: "Write INTEN=0, WIDTH=3, trigger pulse. Wait for completion."
      expected: "pulse_irq remains low. INTSTAT.PULSE_DONE still set but masked."
      checker: "Scoreboard verifies pulse_irq=0 despite INTSTAT set."
      coverage: ["fcov_int_masked"]
    - id: "SC_ZERO_WIDTH_PULSE"
      name: "Zero-width pulse degenerates to 1-cycle"
      stimulus: "Write WIDTH=0, trigger pulse."
      expected: "pulse_out asserts 1 cycle after trigger, stays high 1 cycle, deasserts."
      checker: "Scoreboard verifies degenerate 1-cycle pulse."
      coverage: ["fcov_zero_width"]
    - id: "SC_APB_ERROR_RANGE"
      name: "Out-of-range APB access asserts PSLVERR"
      stimulus: "Read from address 0x20 (out of range)."
      expected: "PREADY=1, PSLVERR=1, PRDATA=0. Internal state unchanged."
      checker: "Scoreboard checks PSLVERR timing and internal state stability."
      coverage: ["fcov_apb_error", "ccov_pslverr"]
    - id: "SC_BACK_TO_BACK"
      name: "Back-to-back pulses with minimum spacing"
      stimulus: "Write WIDTH=5, trigger. Wait for completion, trigger again immediately."
      expected: "Two independent 5-cycle pulses. No overlap. STATUS.ACTIVE clean between."
      checker: "Scoreboard counts pulse width for both, checks gap."
      coverage: ["fcov_back_to_back", "ccov_min_spacing"]
  scoreboard_checks: 10
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Functional coverage for trigger, pulse width, re-trigger blocking, interrupt, zero-width, back-to-back."
      bins:
        - { id: "fcov_reset_idle", source_ref: "function_model.invariants.reset", class: "state", description: "Reset clears all state" }
        - { id: "fcov_apb_trigger", source_ref: "function_model.transactions.FM_TICK.preconditions", class: "transaction", description: "APB CTRL.START trigger accepted" }
        - { id: "fcov_ext_trigger", source_ref: "function_model.transactions.FM_TICK.inputs.trigger", class: "transaction", description: "External trigger_in edge accepted" }
        - { id: "fcov_retrigger_blocked", source_ref: "function_model.transactions.FM_TICK.side_effects", class: "state", description: "Re-trigger while active blocked" }
        - { id: "fcov_width_snapshot", source_ref: "function_model.transactions.FM_TICK.side_effects", class: "state", description: "WIDTH sampled at trigger time" }
        - { id: "fcov_interrupt", source_ref: "function_model.transactions.FM_TICK.output_rules.pulse_irq", class: "event", description: "Interrupt asserts on completion" }
        - { id: "fcov_int_masked", source_ref: "function_model.transactions.FM_TICK.output_rules.pulse_irq", class: "event", description: "Interrupt masked when INTEN=0" }
        - { id: "fcov_zero_width", source_ref: "function_model.transactions.FM_TICK.error_cases", class: "edge_case", description: "Zero-width degenerates to 1-cycle" }
        - { id: "fcov_apb_error", source_ref: "function_model.invariants.register_side_effects", class: "error", description: "APB out-of-range PSLVERR — register access contract" }
        - { id: "fcov_back_to_back", source_ref: "function_model.transactions.FM_TICK", class: "transaction", description: "Back-to-back pulse triggers" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle coverage for trigger latency, pulse width timing, counter countdown, interrupt edge timing, PSLVERR handshake."
      bins:
        - { id: "ccov_reset_recovery", source_ref: "cycle_model.reset", class: "reset", description: "Reset deassertion to usable state" }
        - { id: "ccov_pulse_width", source_ref: "cycle_model.latency.pulse_out_width", class: "timing", description: "pulse_out width equals WIDTH.PULSE_WIDTH cycles" }
        - { id: "ccov_trigger_latency", source_ref: "cycle_model.latency.trigger_to_pulse_out", class: "latency", description: "1-cycle latency from trigger to pulse_out assertion" }
        - { id: "ccov_edge_detect", source_ref: "cycle_model.handshake_rules.trigger_in", class: "handshake", description: "trigger_in rising-edge detect" }
        - { id: "ccov_interrupt_timing", source_ref: "cycle_model.handshake_rules.pulse_irq", class: "timing", description: "pulse_irq asserts same edge as pulse_out deasserts" }
        - { id: "ccov_pslverr", source_ref: "cycle_model.handshake_rules.PSLVERR", class: "handshake", description: "PSLVERR assertion with PREADY" }
        - { id: "ccov_min_spacing", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "Back-to-back minimum inter-pulse spacing" }
        - { id: "ccov_fsm_transition", source_ref: "fsm.control.transitions", class: "state_transition", description: "IDLE→PULSE_ACTIVE→IDLE transition" }
    functional: "Legacy alias: function + cycle coverage must both close."
    line: ">= 90% instrumented line coverage or explicit project waiver"
    branch: ">= 85% instrumented branch coverage or explicit project waiver"
    fsm: "100% declared FSM states and legal transitions covered"
    assertions: "All protocol/order/error assertions pass"
quality_gates:
  ssot:
    pass: "All canonical sections are present, substantive, internally consistent, and have no live TBD placeholders."
    evidence: ["check_ssot_disk.sh PASS", "traceability covers function_model/cycle_model/test_requirements/registers"]
  rtl_gen:
    profile: "standard"
    pass: "SSOT-derived rtl_todo_plan has no blockers/orphans; RTL implements function_model and cycle_model with compile and lint evidence."
