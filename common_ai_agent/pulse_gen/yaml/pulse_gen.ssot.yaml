    evidence: ["pulse_gen/lint/lint_report.json", "pulse_gen/reports/syn/syn_report.json", "pulse_gen/reports/sta/sta_report.json", "pulse_gen/reports/pnr/pnr_report.json"]
  signoff:
    pass: "Goal audit shows SSOT, model, RTL, lint, simulation, coverage, and EDA gates have evidence."
    evidence: ["pulse_gen/reports/goal_audit.json"]

