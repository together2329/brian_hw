top_module:
  name: "pulse_gen"
  file: "rtl/pulse_gen.sv"
  version: "1.0"
  type: "peripheral"
  description: "One-shot pulse generator — configurable pulse width, APB-lite CSR interface, single PCLK domain"
  reference_spec: "user-defined"
  owner: "ssot-gen"
  quality_profile: "standard"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "pulse_gen_regs", file: "rtl/pulse_gen_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "interrupts", "error_handling"], source_sections: ["registers", "interrupts", "error_handling"], register_refs: ["registers.register_list"], description: "APB-lite register file, read/write decode, status, and interrupt aggregation" }
  - { name: "pulse_gen_core", file: "rtl/pulse_gen_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "fsm", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "fsm", "dataflow", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow.sequence"], feature_refs: ["features"], fsm_refs: ["fsm.control"], description: "Core behavior — FSM, counter, and pulse generation datapath" }
  - { name: "pulse_gen", file: "rtl/pulse_gen.sv", ownership: "manifest", ssot_gen: true, wiring_only: true, source_sections: ["io_list", "integration"], ports: ["top-level io_list ports"], connections: "instance wiring from top-level ports to pulse_gen_regs and pulse_gen_core", description: "Integration top — wires PCLK/PRESETn/APB/pulse_out/trigger_in to internal modules" }

decomposition:
  units:
    - { id: "reg_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["pulse_gen_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "pulse_datapath", kind: "datapath/control", source_refs: ["function_model.transactions", "cycle_model.pipeline"], rtl_candidates: ["pulse_gen_core"], verification_impact: ["coverage_plan.functional", "coverage_plan.cycle"] }
parameters:
  - name: "PULSE_WIDTH_BITS"
    default: 16
    type: int
    description: "Width of the pulse-width counter in bits. Controls maximum configurable pulse duration (2^PULSE_WIDTH_BITS - 1 PCLK cycles)."
    drives: ["pulse_gen_core.sv", "pulse_gen_regs.sv"]
  - name: "APB_ADDR_WIDTH"
    default: 12
    type: int
    description: "APB address width in bits"
    drives: ["pulse_gen_regs.sv"]
  - name: "APB_DATA_WIDTH"
    default: 32
    type: int
    description: "APB data width in bits"
    drives: ["pulse_gen_regs.sv"]
  - name: "CLOCK_FREQ_MHZ"
    default: 50
    type: int
    description: "Target clock frequency in MHz"
    drives: ["tb_top.sv", "docs/README.md"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Main peripheral clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "APB clock (50 MHz)" }

  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "APB reset"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset, sync deassert" }

  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "APB-lite register access interface"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0 captures address/control."
        access_phase: "PSEL=1, PENABLE=1 completes when PREADY=1."
        read_rule: "PRDATA is valid in the completing access phase for reads."
        write_rule: "PWDATA/PSTRB are sampled in the completing access phase for writes."
        error_rule: "PSLVERR is asserted only with PREADY=1 for out-of-range access."
      ports:
        - { name: "PADDR",   width: 12, direction: "input",  description: "APB address" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PSTRB",   width: 4,  direction: "input",  description: "APB strobes" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB error — asserted for out-of-range address access" }

    - name: "pulse_output"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Generated pulse output"
      protocol:
        assertion: "pulse_out asserts 1 PCLK cycle after trigger is accepted."
        hold: "pulse_out remains high for WIDTH register value PCLK cycles."
        deassertion: "pulse_out deasserts after counter reaches 0."
        reset_value: 0
      ports:
        - { name: "pulse_out", width: 1, direction: "output", description: "Generated pulse — one-shot, width = WIDTH.PULSE_WIDTH cycles" }

    - name: "trigger_input"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "External hardware trigger input"
      protocol:
        sampling: "trigger_in is sampled on each PCLK rising edge."
        edge_sensitivity: "A rising edge (0→1) triggers the pulse if active is low."
        hold: "trigger_in held high while active=1 does not re-trigger."
      ports:
        - { name: "trigger_in", width: 1, direction: "input", description: "External trigger — rising-edge sensitive" }

    - name: "interrupt"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Interrupt output"
      protocol:
        assertion: "pulse_irq asserts when pulse completes and interrupt is enabled."
        deassertion: "pulse_irq deasserts after software clears the interrupt status."
        reset_value: 0
      ports:
        - { name: "pulse_irq", width: 1, direction: "output", description: "Pulse-complete interrupt, active-high level" }
features:
  - name: "one_shot_pulse_generation"
    description: "Generates a single pulse of configurable width on trigger. No re-trigger during active pulse."
    trigger: "APB write CTRL.START=1 or rising edge on trigger_in while STATUS.ACTIVE=0"
    datapath: "WIDTH.PULSE_WIDTH → counter load → countdown each PCLK → pulse_out=1 while counter>0"
    control: "FSM: IDLE → PULSE_ACTIVE → IDLE"
    output: "pulse_out asserted for exactly WIDTH.PULSE_WIDTH PCLK cycles"
  - name: "parameterized_pulse_width"
    description: "Maximum pulse duration is controlled by PULSE_WIDTH_BITS, allowing compile-time resize without changing control logic."
    requirement_trace: "req/pulse_gen_requirements.md#functional-behavior"
  - name: "apb_register_access"
    description: "APB-lite CSR interface provides read/write access to config/status registers with 1-cycle response."
    requirement_trace: "req/pulse_gen_requirements.md"
  - name: "interrupt_on_completion"
    description: "Optional interrupt fires when pulse completes. Enabled via INTEN register, cleared via W1C INTSTAT."
    requirement_trace: "req/pulse_gen_requirements.md"
  - name: "dual_trigger_source"
    description: "Pulse may be triggered either by APB CTRL.START write or by external trigger_in rising edge."
    requirement_trace: "req/pulse_gen_requirements.md"
dataflow:
  trigger_path:
    sources:
      - "CTRL.START write via APB (PWDATA[0]=1 on rising PCLK during completing APB access)"
      - "trigger_in rising edge (0→1 sampled on PCLK)"
    gating: "Either source accepted only when STATUS.ACTIVE=0"
  pulse_path:
    source: "WIDTH.PULSE_WIDTH (APB-writable)"
    load: "counter_q ← WIDTH.PULSE_WIDTH on trigger acceptance"
    active: "pulse_out ← 1, STATUS.ACTIVE ← 1"
    countdown: "counter_q ← counter_q - 1 each PCLK while counter_q > 0"
    terminal: "When counter_q reaches 0: pulse_out ← 0, STATUS.ACTIVE ← 0"
  sequence:
    - "Reset clears all state (counter_q=0, active=0, pulse_out=0)."
    - "Software writes WIDTH register to configure pulse duration."
    - "Software optionally writes INTEN to enable interrupt."
    - "Trigger event (CTRL.START=1 or trigger_in↑) while active=0 loads counter_q from WIDTH, sets active=1, asserts pulse_out."
    - "counter_q decrements each PCLK cycle."
    - "When counter_q reaches 0: pulse_out deasserts, active clears. If INTEN enabled, INTSTAT.PULSE_DONE sets and pulse_irq asserts."
  ordering:
    - "CTRL.START and trigger_in are OR'd for trigger — first to arrive while inactive initiates the pulse."
    - "CTRL.START self-clears — writing 1 triggers, subsequent reads return 0."
    - "New trigger while active=1 is ignored (no queuing)."
    - "WIDTH changes during active pulse do not affect the current pulse."
  state_flow:
    - "WIDTH.PULSE_WIDTH → counter_q → counter decrement → pulse_out"
    - "trigger → active_q → STATUS.ACTIVE → pulse_out gating"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the pulse generator computes independent of cycle timing."
  state_variables:
    - { name: "counter_q", width: "PULSE_WIDTH_BITS", reset: 0, description: "Current countdown value — decrements each PCLK while pulse is active" }
    - { name: "active_q", width: 1, reset: 0, description: "Pulse in progress — 1 while pulse_out is asserted (registered, so 1-cycle lag behind trigger decision)" }
    - { name: "done_q", width: 1, reset: 0, description: "One-cycle completion pulse — asserted on the cycle counter reaches 0" }
  transactions:
    - id: "FM_TICK"
      name: "pulse_generator_tick"
      required_fields:
        - "trigger"
        - "width"
      preconditions:
        - "PRESETn is deasserted"
        - "width is in range 1 to 2**PULSE_WIDTH_BITS - 1"
      inputs:
        - "trigger: APB write CTRL.START=1 or trigger_in rising edge"
        - "width: WIDTH.PULSE_WIDTH register value"
      outputs:
        - "pulse_out"
        - "pulse_irq"
      output_rules:
        - { name: "pulse_out", port: "pulse_out", width: 1, expr: "active_q", description: "Registered pulse output — asserts 1 cycle after trigger, deasserts when counter expires" }
        - { name: "pulse_irq", port: "pulse_irq", width: 1, expr: "done_q && INTEN", description: "Interrupt — asserts on completion when enabled" }
      state_updates:
        - { name: "counter_q", width: "PULSE_WIDTH_BITS", reset: 0, expr: "(trigger && !active_q) ? width : ((active_q && counter_q > 0) ? counter_q - 1 : counter_q)", description: "Load width on trigger while idle; count down while active and not expired" }
        - { name: "active_q", width: 1, reset: 0, expr: "(trigger && !active_q) ? 1 : ((active_q && counter_q == 0) ? 0 : active_q)", description: "Set on trigger while idle; clear when counter reaches 0" }
        - { name: "done_q", width: 1, reset: 0, expr: "(active_q && counter_q == 0) ? 1 : 0", description: "One-cycle pulse when counter expires — drives interrupt" }
      side_effects:
        - "counter_q decrements by 1 each PCLK while active_q=1 and counter_q > 0."
        - "CTRL.START self-clears — write 1 triggers, read returns 0."
        - "STATUS.ACTIVE mirrors active_q."
        - "Changing WIDTH during an active pulse does not affect the current pulse."
        - "Trigger while active_q=1 is ignored — no queuing."
      error_cases:
        - { condition: "WIDTH.PULSE_WIDTH == 0", result: "Pulse width of 0 behaves as a 1-cycle pulse (counter_q loaded with 1). Treated as degenerate legal case, not an error." }
  invariants:
    - "Reset leaves counter_q=0, active_q=0, done_q=0, pulse_out=0, pulse_irq=0."
    - "pulse_out is the registered value of active_q — 1-cycle latency from trigger decision to assertion."
    - "pulse_out remains high for exactly WIDTH.PULSE_WIDTH PCLK cycles."
    - "counter_q never underflows below 0 because the decrement rule is gated by counter_q > 0."
    - "done_q is a true one-cycle pulse — it asserts only on the terminal countdown tick and deasserts the following cycle."
    - "Register read side effects are exactly those listed in registers.register_list."
  reference_model_hint: "tb-gen should implement a Python scoreboard model from this section. FunctionalModel.apply(trigger, width, inten) returns (pulse_out, pulse_irq) after one control tick."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, outputs, and interrupts may change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle and run direct Python smoke checks."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all architectural state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    trigger_to_pulse_out: { min_cycles: 1, max_cycles: 1, description: "pulse_out asserts exactly 1 PCLK cycle after trigger is sampled" }
    pulse_out_width: { min_cycles: "WIDTH.PULSE_WIDTH", max_cycles: "WIDTH.PULSE_WIDTH", description: "pulse_out remains high for exactly the configured width" }
    register_read: { min_cycles: 1, max_cycles: 1, description: "APB read completes in the access phase (PREADY immediately in PENABLE phase)" }
    register_write: { min_cycles: 1, max_cycles: 1, description: "APB write completes in the access phase" }
  handshake_rules:
    - { signal: "PREADY", rule: "Assert PREADY in the APB access phase (PSEL && PENABLE) for all valid register addresses. Deassert PREADY when not selected." }
    - { signal: "PSLVERR", rule: "Assert PSLVERR with PREADY for out-of-range address access (address not matching CTRL/WIDTH/STATUS/INTEN/INTSTAT)." }
    - { signal: "pulse_out", rule: "Assert on the PCLK rising edge 1 cycle after trigger acceptance. Hold for WIDTH.PULSE_WIDTH PCLK cycles. Deassert on the rising edge after counter expires." }
    - { signal: "trigger_in", rule: "Rising-edge sensitive. Sampled each PCLK. A 0→1 transition while active_q=0 triggers the pulse." }
    - { signal: "pulse_irq", rule: "Assert on the same rising edge that done_q=1 and INTEN is set. Remain asserted until software clears INTSTAT via W1C." }
  pipeline:
    - { stage: "S0_SAMPLE_INPUTS", cycle: 0, action: "Sample trigger (CTRL.START write or trigger_in rising edge), width, INTEN." }
    - { stage: "S1_LOAD_COUNTER", cycle: 1, action: "Load counter_q from width, set active_q=1, assert pulse_out." }
    - { stage: "S2_COUNTDOWN", cycle: "2..WIDTH+1", action: "Decrement counter_q each PCLK; pulse_out remains asserted." }
    - { stage: "S3_EXPIRE", cycle: "WIDTH+2", action: "counter_q reaches 0; clear active_q, set done_q=1, deassert pulse_out, evaluate interrupt." }
  ordering:
    - "CTR.START write and trigger_in rising edge are OR-equivalent — first to arrive while idle initiates the pulse."
    - "Trigger while active_q=1 is ignored."
    - "done_q and pulse_irq are evaluated after counter expiration."
    - "APB reads of STATUS.ACTIVE return the registered active_q value."
  backpressure:
    - "No ready/valid backpressure on pulse_out. Pulse timing is purely counter-driven."
    - "APB PREADY always completes in 1 access-phase cycle for valid addresses."
  performance:
    frequency_mhz: 50
    throughput:
      max_pulses_per_second: "CLOCK_FREQ_HZ / (WIDTH.PULSE_WIDTH + 2)"
      condition: "Trigger issued as soon as previous pulse completes; WIDTH.PULSE_WIDTH + 2 is the minimum inter-pulse spacing"
    outstanding:
      max: 1
      description: "Exactly one pulse at a time; no queuing."
    depth:
      pipeline_stages: 1
      queue_depth: 0
      description: "Single registered state update from trigger sample to pulse assertion; counter is a simple countdown register."
    pipelining:
      style: "single_stage_registered_control"
      overlap: "none"
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Main peripheral clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"

rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"
registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
    decode_range: "0x000 - 0x010"
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."

  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register — write START=1 to trigger a pulse"
      write_side_effects:
        - "Writing bit 0 = 1 triggers pulse generation if STATUS.ACTIVE=0."
        - "Writing bit 0 = 0 has no effect."
        - "CTRL.START self-clears — reads always return 0."
      fields:
        - { name: "START", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "1 = trigger pulse (self-clearing)", description: "Pulse trigger — write 1 to start" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "WIDTH"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x00000001
      category: "config"
      description: "Pulse Width Register — configures pulse duration in PCLK cycles"
      write_side_effects:
        - "Software write updates pulse width. Changes during active pulse do not affect the current pulse."
        - "Value of 0 is treated as a 1-cycle pulse."
      fields:
        - { name: "PULSE_WIDTH", bits: ["PULSE_WIDTH_BITS-1", 0], access: "rw", reset: 0x1, write_effect: "Set pulse duration", description: "Pulse width in PCLK cycles (1 to 2**PULSE_WIDTH_BITS - 1)" }
        - { name: "reserved_31_width", bits: [31, "PULSE_WIDTH_BITS"], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "STATUS"
      offset: 0x08
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status Register — pulse activity indicator"
      fields:
        - { name: "ACTIVE", bits: [0, 0], access: "ro", reset: 0x0, description: "1 = pulse in progress, 0 = idle" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "INTEN"
      offset: 0x0C
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Enable Register"
      write_side_effects:
        - "Write enables or disables the pulse-complete interrupt."
      fields:
        - { name: "PULSE_DONE", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "1 = enable interrupt on pulse completion", description: "Pulse-done interrupt enable" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "INTSTAT"
      offset: 0x10
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Status Register — W1C clear"
      write_side_effects:
        - "Writing 1 to bit 0 clears the interrupt status."
        - "Writing 0 has no effect."
      fields:
        - { name: "PULSE_DONE", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "1 = clear interrupt (W1C)", description: "Set by HW when pulse completes; write 1 to clear" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances: []
  note: "No SRAM/FIFO required. counter_q is a simple register."

interrupts:
  sources:
    - { name: "PULSE_DONE", bit: 0, type: "level", enable_reg: "INTEN.PULSE_DONE", status_reg: "INTSTAT", clear: "W1C", description: "Pulse generation complete" }
  output:
    signal: "pulse_irq"
    polarity: "active_high"
    type: "level"
    derivation: "INTSTAT.PULSE_DONE && INTEN.PULSE_DONE"

fsm:
  control:
    diagram_kind: "state_transition"
    reset_state: "IDLE"
    states:
      - { name: "IDLE", description: "Waiting for trigger; pulse_out=0, active=0" }
      - { name: "PULSE_ACTIVE", description: "Pulse in progress; pulse_out=1, counter counting down from WIDTH.PULSE_WIDTH" }
    transitions:
      - { from: "IDLE", to: "PULSE_ACTIVE", condition: "trigger && !active_q", action: "Load counter_q from WIDTH.PULSE_WIDTH, set active_q=1" }
      - { from: "PULSE_ACTIVE", to: "PULSE_ACTIVE", condition: "counter_q > 0", action: "Decrement counter_q, hold pulse_out=1" }
      - { from: "PULSE_ACTIVE", to: "IDLE", condition: "counter_q == 0", action: "Clear active_q, set done_q=1, assert interrupt if enabled" }
rtl_contract:
  clock: "PCLK"
  reset: "PRESETn"
  reset_active: "low"
  transaction: "FM_TICK"
  sample_condition: "Every PCLK rising edge while PRESETn is deasserted"
  input_map:
    trigger: "CTRL.START write or trigger_in rising edge"
    width: "WIDTH.PULSE_WIDTH"
    inten: "INTEN.PULSE_DONE"
  output_map:
    pulse: "pulse_out"
    interrupt: "pulse_irq"
    status_active: "STATUS.ACTIVE"
  output_rules:
    - { name: "pulse_out", port: "pulse_out", width: 1, expr: "active_q" }
    - { name: "pulse_irq", port: "pulse_irq", width: 1, expr: "done_q && INTEN.PULSE_DONE" }
  state_updates:
    - { name: "counter_q", width: "PULSE_WIDTH_BITS", reset: 0, expr: "(trigger && !active_q) ? WIDTH.PULSE_WIDTH : ((active_q && counter_q > 0) ? counter_q - 1 : counter_q)" }
    - { name: "active_q", width: 1, reset: 0, expr: "(trigger && !active_q) ? 1 : ((active_q && counter_q == 0) ? 0 : active_q)" }
    - { name: "done_q", width: 1, reset: 0, expr: "(active_q && counter_q == 0) ? 1 : 0" }

timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, period_ns: 20.0, duty_cycle: 0.5, uncertainty_ns: 0.1 }
  latency_budget:
    trigger_to_pulse_assertion_cycles: { min: 1, max: 1, measured_from: "trigger sampled on PCLK rising edge", measured_to: "pulse_out driven on next PCLK rising edge" }
    pulse_duration_cycles: { min: "WIDTH.PULSE_WIDTH", max: "WIDTH.PULSE_WIDTH", measured_from: "pulse_out assertion", measured_to: "pulse_out deassertion" }
    register_access_cycles: { min: 1, max: 2, measured_from: "APB setup phase (PSEL=1, PENABLE=0)", measured_to: "APB access phase PREADY=1" }
    interrupt_latency_cycles: { min: 0, max: 0, measured_from: "counter expiration edge", measured_to: "pulse_irq assertion (same edge)" }
  throughput:
    max_pulse_rate_hz: "50000000 / (WIDTH.PULSE_WIDTH + 2)"
    conditions: "Trigger as soon as previous pulse completes"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "all_inputs_except_clocks_resets", clock: "PCLK", delay_ns: 0.5, source: "system-level timing budget" }
    outputs:
      - { ports: "all_outputs", clock: "PCLK", delay_ns: 0.5, source: "system-level timing budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode in this IP revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["All architectural behavior active"] }
  upf_required: false

security:
  classification: "non_secure_leaf_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "pulse_timing_integrity", protection: "pulse_out and interrupt timing must match function_model and cycle_model" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO and reserved field policy in registers.register_list" }
    - { threat: "spurious trigger", mitigation: "trigger only accepted when STATUS.ACTIVE=0; CTRL.START self-clearing" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "pulse_out width is exactly WIDTH.PULSE_WIDTH PCLK cycles"
    - "Pulse completion interrupt is not lost if enabled"

error_handling:
  error_sources:
    - { id: "ERR_APB_OUT_OF_RANGE", condition: "APB access outside 0x00-0x10 range", architectural_effect: "PSLVERR asserted with PREADY; no internal state change" }
    - { id: "ERR_WIDTH_ZERO", condition: "WIDTH.PULSE_WIDTH == 0", architectural_effect: "Treated as degenerate case: 1-cycle pulse. No error flag set." }
  propagation:
    - "PSLVERR is asserted only for out-of-range APB address access."
    - "No internal error status bits beyond the interrupt pathway."
  recovery:
    - { action: "reset", clears: ["counter_q", "active_q", "done_q", "all registers"], preserves: [] }
    - { action: "W1C write to INTSTAT", clears: ["INTSTAT.PULSE_DONE", "pulse_irq"], preserves: ["INTEN", "WIDTH", "STATUS"] }

debug_observability:
  waveform_must_probe:
    - "PCLK"
    - "PRESETn"
    - "pulse_out"
    - "trigger_in"
    - "pulse_irq"
    - "counter_q"
    - "active_q"
    - "done_q"
    - "PSEL"
    - "PENABLE"
    - "PWRITE"
    - "PADDR"
    - "PWDATA"
    - "PRDATA"
    - "PREADY"
    - "PSLVERR"
  trace_events:
    - { name: "pulse_trigger", trigger: "trigger accepted (CTRL.START or trigger_in↑ while idle)" }
    - { name: "pulse_start", trigger: "pulse_out asserted (active_q transition 0→1)" }
    - { name: "pulse_expire", trigger: "counter_q reaches 0; pulse_out deasserts" }
    - { name: "interrupt_assert", trigger: "pulse_irq asserted on completion" }
  debug_registers:
    - "STATUS (ACTIVE read)"
integration:
  bus_attachment:
    control: "APB4 slave"
    data: "none (no AXI data interface)"
  connections:
    - { module: "pulse_gen_regs", port: "PCLK", signal: "PCLK" }
    - { module: "pulse_gen_regs", port: "PRESETn", signal: "PRESETn" }
    - { module: "pulse_gen_core", port: "PCLK", signal: "PCLK" }
    - { module: "pulse_gen_core", port: "PRESETn", signal: "PRESETn" }
    - { module: "pulse_gen_core", port: "trigger_in", signal: "trigger_in" }
    - { module: "pulse_gen_core", port: "pulse_out", signal: "pulse_out" }
    - { module: "pulse_gen_regs", port: "pulse_irq", signal: "pulse_irq" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "PSLVERR for APB access outside 0x00-0x10 range"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC must provide APB-compliant PCLK, PRESETn, PSEL, PENABLE, PWRITE, PWDATA, PSTRB, PADDR."
    - "SoC interrupt controller samples pulse_irq as active-high level."
    - "trigger_in edge detection is internal to pulse_gen_core."

dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
    inputs: ["PSEL", "PENABLE", "PWRITE", "PADDR", "PWDATA", "PSTRB", "trigger_in"]
  observability:
    required_internal_points: ["counter_q", "active_q", "done_q", "state"]
    outputs: ["pulse_out", "pulse_irq", "PRDATA", "PREADY", "PSLVERR"]
  mbist_required: false
  notes: "No SRAM macro; counter_q and state registers are the only state."

synthesis:
  dialect: "systemverilog_2012"
  top_module: "pulse_gen"
  technology:
    pdk: "sky130"
    standard_cell_library: "sky130_fd_sc_hd"
    liberty_corner: "ss_100C_1v40"
    liberty_env: "SKY130_LIB"
    lef_env: "SKY130_LEF"
    tech_lef_env: "SKY130_TLEF"
    rcx_rules_env: "SKY130_RCX_RULES"
  constraints:
    - "No inferred latches"
    - "All flops reset according to clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs in generated RTL"
    - "PULSE_WIDTH_BITS default 16 yields a 16-bit counter — must meet 20 ns period"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/pulse_gen.json or syn/out/pulse_gen.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"

pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: "met3"
    vertical: "met2"
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"]
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { min: "met3", max: "met5" }
    drc_waivers: []
  required_outputs:
    - "pnr/out/floorplan.def"
    - "pnr/out/placed.def"
    - "pnr/out/cts.def"
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/pulse_gen_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use a default)"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "Use rtl/pulse_gen_param.vh for shared parameter declarations; include it inside consuming modules"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam state encoding for FSM: localparam IDLE=1'b0, PULSE_ACTIVE=1'b1"
  lint_waivers:
    - "UNUSEDSIGNAL: explicit approved tie-offs only"

reuse_modules: []

custom:
  assumptions:
    - "PULSE_WIDTH_BITS default is 16, yielding a maximum pulse width of 65535 PCLK cycles (~1.31 ms at 50 MHz)."
    - "CTRL.START self-clears — writing 1 triggers the pulse, subsequent reads return 0."
    - "Trigger while active_q=1 is silently ignored (no queuing, no error)."
    - "WIDTH.PULSE_WIDTH value of 0 is treated as 1-cycle pulse (counter loaded with 1)."
    - "trigger_in is rising-edge sensitive; a 0→1 transition while idle triggers the pulse."
    - "trigger_in held high while active=1 does not cause re-triggering when the pulse completes (edge detection requires a 0→1 transition after idle)."
    - "APB PREADY is always 1 in the access phase for valid addresses (no wait states)."
    - "APB PSLVERR is asserted for addresses outside 0x00-0x10 range."
    - "No clock gating or power management in this revision."
    - "Interrupt pulse_irq is level-sensitive, driven by INTSTAT.PULSE_DONE && INTEN.PULSE_DONE."
  optional_behavior_policy:
    resolution: "No optional modes enabled. All behavior is mandatory per function_model."
    downstream_rule: "rtl-gen and tb-gen must implement only the explicit function_model and cycle_model rules."

