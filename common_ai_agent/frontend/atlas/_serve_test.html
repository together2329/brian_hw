<!DOCTYPE html>
<html>
<head><title>serve-test</title></head>
<body>
<pre id="out">probing...</pre>
<script>
(async () => {
  const out = document.getElementById('out');
  const lines = [];
  for (const p of ['styles.css','static-shim.js','backend.js','vcd-parser.js','app.jsx']) {
    try {
      const r = await fetch(p, { cache: 'no-store' });
      const txt = await r.text();
      lines.push(p + ' → status=' + r.status + ' bytes=' + txt.length + ' ct=' + r.headers.get('content-type'));
    } catch (e) { lines.push(p + ' → ERR ' + e.message); }
  }
  out.textContent = lines.join('\n');
})();
</script>
</body>
</html>
