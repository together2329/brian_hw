<!DOCTYPE html>
<html data-dir="B" data-theme="dark" data-screen-label="ATLAS Lobby">
<head>
<meta charset="utf-8" />
<meta name="atlas-backend" content="live">
<title>ATLAS Lobby</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000; color: #e6edf3;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  #scaler {
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    position: absolute;
    left: 0;
    top: 0;
  }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <script src="vendor/react.development.js?v=18.3.1"></script>
  <script src="vendor/react-dom.development.js?v=18.3.1"></script>
  <script src="vendor/babel.min.js?v=7.29.0"></script>

  <script type="text/babel" data-presets="react" src="lobby.jsx?v=atlas-multiuser"></script>

  <script>
    function scale() {
      const s = document.getElementById('scaler');
      const sx = window.innerWidth  / 1920;
      const sy = window.innerHeight / 1080;
      s.style.transform = 'scale(' + sx + ',' + sy + ')';
    }
    window.addEventListener('resize', scale);
    setTimeout(scale, 30);
    setTimeout(scale, 200);
  </script>
</body>
</html>
