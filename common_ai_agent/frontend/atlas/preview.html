<!DOCTYPE html>
<html data-dir="A" data-theme="dark" data-screen-label="ATLAS">
<head>
<meta charset="utf-8" />
<meta name="atlas-backend" content="live">
<title>ATLAS</title>
<link rel="stylesheet" href="styles.css">
<style>
  html, body {
    margin: 0; padding: 0;
    /* Theme tokens — literal is first-paint fallback before styles.css loads. */
    background: var(--bg, #000);
    color: var(--fg, #e6edf3);
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  /* Full-screen, no letterbox: scale uniformly so the 1920x1080 design
     covers the whole viewport. Anything taller/wider than the design's
     aspect ratio just stretches uniformly to fill. */
  #scaler {
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    position: absolute;
    left: 0;
    top: 0;
  }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <!-- Global error banner. Without this, a Babel-transpile failure /
       broken CDN / 404 on a .jsx asset leaves the user looking at a
       black screen with errors only visible inside browser devtools.
       Captures uncaught errors, unhandled promise rejections, and
       script-element load failures and renders them on a fixed banner
       at the top so the operator can act on Windows / locked-down
       environments where the devtools console isn't immediately open. -->
  <script>
    (function () {
      var lines = [];
      var box = null;
      function ensureBox() {
        if (box) return box;
        box = document.createElement('div');
        box.id = 'atlas-error-banner';
        box.setAttribute('role', 'alert');
        box.style.cssText = [
          'position:fixed','top:0','left:0','right:0','z-index:99999',
          'max-height:35vh','overflow:auto',
          'background:#3a1414','color:#fde7e7',
          'border-bottom:1px solid #f87171',
          'font:12px/1.45 ui-monospace,Consolas,Menlo,monospace',
          'padding:8px 14px 32px','white-space:pre-wrap','word-break:break-word',
          'box-shadow:0 6px 18px rgba(0,0,0,0.6)'
        ].join(';');
        var close = document.createElement('button');
        close.textContent = '× dismiss';
        close.style.cssText = 'position:absolute;right:10px;top:6px;background:transparent;color:#fde7e7;border:1px solid #f87171;border-radius:3px;padding:2px 8px;cursor:pointer;font:inherit';
        close.onclick = function () { box.remove(); box = null; lines.length = 0; };
        box.appendChild(close);
        document.body.appendChild(box);
        return box;
      }
      function append(label, detail) {
        var b = ensureBox();
        var line = document.createElement('div');
        line.style.marginRight = '120px';
        var ts = new Date().toLocaleTimeString();
        line.textContent = '[' + ts + '] ' + label + ': ' + detail;
        b.appendChild(line);
        lines.push(label + ': ' + detail);
      }
      window.addEventListener('error', function (ev) {
        // Element load failure: ev.target is the failing script/link/img/etc.
        if (ev.target && (ev.target.src || ev.target.href) && ev.target !== window) {
          var tag = String(ev.target.tagName || '').toLowerCase();
          var url = ev.target.src || ev.target.href;
          if (tag === 'img' && /^data:image\//i.test(String(url || ''))) return;
          // Prism autoloader best-effort grammar fetches are non-fatal — a
          // missing language grammar just renders that block unhighlighted.
          if (tag === 'script' && /\/vendor\/prism-components\/prism-[\w-]+\.min\.js/i.test(String(url || ''))) return;
          if (tag === 'script') append('script load failed', url);
          else if (tag === 'link') append('stylesheet load failed', url);
          else if (tag === 'img') append('image load failed', url);
          else append('asset load failed', url);
          return;
        }
        var msg = (ev.error && (ev.error.stack || ev.error.message)) || ev.message || 'unknown';
        append('uncaught', msg);
      }, true);
      window.addEventListener('unhandledrejection', function (ev) {
        var r = ev.reason;
        append('unhandled promise', (r && (r.stack || r.message)) || String(r));
      });
      // Mirror console.error so non-throwing failures still surface.
      var origErr = console.error.bind(console);
      console.error = function () {
        try {
          var parts = Array.prototype.map.call(arguments, function (a) {
            if (a instanceof Error) return a.stack || a.message;
            if (typeof a === 'object') return JSON.stringify(a);
            return String(a);
          });
          append('console.error', parts.join(' '));
        } catch (_) {}
        origErr.apply(null, arguments);
      };
      // Expose so future scripts can call from anywhere.
      window.__atlasReportError = append;
    })();
  </script>

  <!-- Vendored locally (frontend/atlas/vendor/) so preview mode works
       when unpkg.com is blocked or unavailable. -->
  <script src="vendor/react.development.js?v=18.3.1"></script>
  <script src="vendor/react-dom.development.js?v=18.3.1"></script>
  <script src="vendor/babel.min.js?v=7.29.0"></script>
  <!-- Markdown renderer for agent replies (code fences, lists, links…). -->
  <script src="vendor/marked.min.js?v=9.1.6"></script>

  <!-- DOMPurify — strips <script>, on*-handlers, javascript: URIs, etc.
       Without it, agent text containing raw HTML (relayed from a
       malicious file read, web fetch, or grep result) would inject via
       dangerouslySetInnerHTML and execute. -->
  <script src="vendor/purify.min.js?v=3.1.6"></script>

  <!-- Syntax highlighting for the file preview pane (Prism core +
       autoloader → loads language grammars on demand from CDN). -->
  <link rel="stylesheet" href="vendor/prism-tomorrow.css?v=1.29.0">
  <script src="vendor/prism-core.min.js?v=1.29.0"></script>
  <script src="vendor/prism-autoloader.min.js?v=1.29.0"></script>
  <script>
    // Map file extension → Prism language id. Covers what Atlas
    // actually opens (RTL/SV, YAML, Python, MD, JSON, shell, etc.).
    window.PRISM_LANG_MAP = {
      sv: 'verilog', v: 'verilog', svh: 'verilog', vh: 'verilog',
      py: 'python', js: 'javascript', jsx: 'jsx', ts: 'typescript', tsx: 'tsx',
      yaml: 'yaml', yml: 'yaml', json: 'json', md: 'markdown', txt: 'none',
      sh: 'bash', bash: 'bash', zsh: 'bash', f: 'tcl',
      c: 'c', h: 'c', cpp: 'cpp', hpp: 'cpp',
      sdc: 'tcl', tcl: 'tcl', ini: 'ini', toml: 'toml', html: 'html', css: 'css',
    };
    // Tell autoloader where to find grammars.
    if (window.Prism && window.Prism.plugins && window.Prism.plugins.autoloader) {
      window.Prism.plugins.autoloader.languages_path =
        'vendor/prism-components/';
    }
  </script>

  <!-- Static preview shim — fakes /api/* + WebSocket so the UI renders
       without atlas_ui.py. Loaded BEFORE backend.js so the WS the
       backend opens hits the FakeWS class instead of a real socket.
       Remove this <script> tag (or open index.html) to talk to live. -->
  <script src="static-shim.js"></script>

  <!-- Backend adapter: window.backend (live WebSocket) -->
  <script src="backend.js"></script>

  <!-- VCD parser (pure JS, no Babel — ships as plain script). -->
  <script src="vcd-parser.js"></script>

  <!-- App modules (Babel-transpiled in-browser) -->
  <!-- LoginScreen — registers window.LoginScreen, consumed by app.jsx
       when /api/users/me returns 401. -->
  <script type="text/babel" data-presets="react" src="login.jsx?v=atlas-20260511-login"></script>
  <script type="text/babel" data-presets="react" src="data.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="shared.jsx?v=atlas-20260503-strict-status"></script>
  <!-- sim_debug components (loaded BEFORE workspace.jsx so the
       conditional render in workspace.jsx can reference them). -->
  <script type="text/babel" data-presets="react" src="debug-shared.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="debug-inline-cards.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="sim-debug.jsx?v=atlas-20260503-strict-status"></script>
  <!-- Debug tab pane — registers window.DebugTab consumed by the
       conditional render in workspace.jsx (mainTab === 'debug'). -->
  <script type="text/babel" data-presets="react" src="debug-tab.jsx?v=atlas-20260510-debugtab"></script>
  <!-- Git tab — per-IP commit history graph + revert UI. Registers
       window.GitTab consumed when mainTab === 'git'. -->
  <script type="text/babel" data-presets="react" src="git-tab.jsx?v=atlas-20260511-gittab"></script>
  <!-- coverage workflow panel — same loading rule as sim_debug -->
  <script type="text/babel" data-presets="react" src="coverage.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="workspace.jsx?v=atlas-20260521-md-data-images"></script>
  <!-- SoC Architect (mock data; loaded before app.jsx so the screen
       toggle in app.jsx can mount <SocArchitect />). -->
  <script type="text/babel" data-presets="react" src="soc-data.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="soc-shared.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="soc-architect.jsx?v=atlas-20260503-strict-status"></script>
  <script type="text/babel" data-presets="react" src="app.jsx?v=atlas-20260503-strict-status"></script>

  <script>
    // Full-screen scaling: stretch the 1920x1080 design to fill the whole
    // viewport on each axis (no letterbox bars). The design uses flex
    // layouts internally so reflow stays sane up to ~3x scale.
    function scale() {
      const s = document.getElementById('scaler');
      const sx = window.innerWidth  / 1920;
      const sy = window.innerHeight / 1080;
      // Use scaleX/scaleY independently so both dimensions hit the edges.
      s.style.transform = `scale(${sx}, ${sy})`;
    }
    window.addEventListener('resize', scale);
    setTimeout(scale, 30);
    setTimeout(scale, 200);

    // Auto-reload on frontend file change OR backend restart.
    // Polls /api/version every 3s; reloads when mtime or `started` bumps.
    (function () {
      let baseline = null;
      let baselineStarted = null;
      async function tick() {
        try {
          const r = await fetch('/api/version', { cache: 'no-store' });
          if (!r.ok) return;
          const { mtime, started } = await r.json();
          if (baseline === null) {
            baseline = mtime;
            baselineStarted = Number(started) || 0;
            return;
          }
          if (mtime && mtime > baseline + 0.5) {
            console.info('[atlas] frontend changed → reloading');
            location.reload();
            return;
          }
          const newStarted = Number(started) || 0;
          if (newStarted > 0 && newStarted > baselineStarted + 0.5) {
            console.info('[atlas] backend restarted → reloading');
            location.reload();
          }
        } catch (_) { /* offline; retry */ }
      }
      setInterval(tick, 3000);
      tick();
    })();
  </script>
</body>
</html>
