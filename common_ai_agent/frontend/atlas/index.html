<!DOCTYPE html>
<html data-dir="A" data-theme="dark" data-screen-label="ATLAS · common_ai_agent UI">
<head>
<meta charset="utf-8" />
<meta name="atlas-backend" content="live">
<title>common_ai_agent · UI</title>
<link rel="stylesheet" href="styles.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000; color: #e6edf3;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  /* Full-screen, no letterbox: scale uniformly so the 1920x1080 design
     covers the whole viewport. Anything taller/wider than the design's
     aspect ratio just stretches uniformly to fill. */
  #scaler {
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    position: absolute;
    left: 0;
    top: 0;
  }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- Markdown renderer for agent replies (code fences, lists, links…). -->
  <script src="https://unpkg.com/marked@9/marked.min.js"></script>

  <!-- Backend adapter: window.backend (live WebSocket) -->
  <script src="backend.js"></script>

  <!-- App modules (Babel-transpiled in-browser) -->
  <script type="text/babel" data-presets="react" src="data.jsx"></script>
  <script type="text/babel" data-presets="react" src="shared.jsx"></script>
  <script type="text/babel" data-presets="react" src="workspace.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    // Full-screen scaling: stretch the 1920x1080 design to fill the whole
    // viewport on each axis (no letterbox bars). The design uses flex
    // layouts internally so reflow stays sane up to ~3x scale.
    function scale() {
      const s = document.getElementById('scaler');
      const sx = window.innerWidth  / 1920;
      const sy = window.innerHeight / 1080;
      // Use scaleX/scaleY independently so both dimensions hit the edges.
      s.style.transform = `scale(${sx}, ${sy})`;
    }
    window.addEventListener('resize', scale);
    setTimeout(scale, 30);
    setTimeout(scale, 200);

    // ── Auto-reload on frontend file change ──────────────────────
    // Polls /api/version every 3 s. If the latest mtime across the
    // frontend bundle bumps, reload the page. So whenever the source
    // gets edited (data.jsx, workspace.jsx, styles.css, …) you see
    // the change without a manual refresh.
    (function () {
      let baseline = null;
      async function tick() {
        try {
          const r = await fetch('/api/version', { cache: 'no-store' });
          if (!r.ok) return;
          const { mtime } = await r.json();
          if (baseline === null) { baseline = mtime; return; }
          if (mtime && mtime > baseline + 0.5) {
            console.info('[atlas] frontend changed → reloading');
            location.reload();
          }
        } catch (_) { /* offline; try again */ }
      }
      setInterval(tick, 3000);
      tick();
    })();
  </script>
</body>
</html>
