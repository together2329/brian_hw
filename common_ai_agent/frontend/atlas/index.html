<!DOCTYPE html>
<html data-dir="A" data-theme="dark" data-screen-label="ATLAS · common_ai_agent UI">
<head>
<meta charset="utf-8" />
<meta name="atlas-backend" content="live">
<title>common_ai_agent · UI</title>
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; padding: 0; background: #000; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; }
  #scaler { width: 1920px; height: 1080px; transform-origin: top left; }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Backend adapter: window.backend (mock | live ws) -->
  <script src="backend.js"></script>

  <!-- App modules (Babel-transpiled in-browser) -->
  <script type="text/babel" data-presets="react" src="data.jsx"></script>
  <script type="text/babel" data-presets="react" src="shared.jsx"></script>
  <script type="text/babel" data-presets="react" src="workspace.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    // letterbox scale to fit viewport
    function scale() {
      const s = document.getElementById('scaler');
      const sx = window.innerWidth / 1920;
      const sy = window.innerHeight / 1080;
      const k = Math.min(sx, sy);
      s.style.transform = `scale(${k})`;
      s.style.position = 'absolute';
      s.style.left = ((window.innerWidth - 1920 * k) / 2) + 'px';
      s.style.top = ((window.innerHeight - 1080 * k) / 2) + 'px';
    }
    window.addEventListener('resize', scale);
    setTimeout(scale, 30);
    setTimeout(scale, 200);
  </script>
</body>
</html>
