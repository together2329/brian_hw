<!DOCTYPE html>
<html data-dir="B" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>ATLAS Lobby — Test</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000; color: #e6edf3;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  #scaler {
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    position: absolute;
    left: 0;
    top: 0;
  }
</style>
</head>
<body>
  <div id="scaler"><div id="root"></div></div>

  <script src="vendor/react.development.js?v=18.3.1"></script>
  <script src="vendor/react-dom.development.js?v=18.3.1"></script>
  <script src="vendor/babel.min.js?v=7.29.0"></script>

  <script type="text/babel" data-presets="react">
const MOCK_SESSIONS = [
  { id: 'sess-1', title: 'GPIO Controller', project: 'gpio', lastActive: '2 hours ago', status: 'active', progress: 75 },
  { id: 'sess-2', title: 'UART Debug', project: 'uart', lastActive: '1 day ago', status: 'active', progress: 30 },
  { id: 'sess-3', title: 'SoC Integration', project: 'soc', lastActive: '3 days ago', status: 'archived', progress: 100 },
];

const PROJECT_OPTIONS = [
  { value: 'gpio', label: 'GPIO' },
  { value: 'uart', label: 'UART' },
  { value: 'soc', label: 'SoC' },
  { value: 'i2c', label: 'I2C' },
  { value: 'spi', label: 'SPI' },
];

const STATUS_META = {
  active:   { label: 'Active',   dot: '#7dc9a0' },
  archived: { label: 'Archived', dot: '#8893a3' },
};

function LobbyPage() {
  const [username, setUsername] = React.useState('');
  const [searchQuery, setSearchQuery] = React.useState('');
  const [activeTab, setActiveTab] = React.useState('active');
  const [showModal, setShowModal] = React.useState(false);
  const [newTitle, setNewTitle] = React.useState('');
  const [newProject, setNewProject] = React.useState(PROJECT_OPTIONS[0].value);
  const [sessions] = React.useState(MOCK_SESSIONS);

  const filteredSessions = React.useMemo(() => {
    return sessions.filter((s) => {
      const matchesTab = s.status === activeTab;
      const matchesSearch = s.title.toLowerCase().includes(searchQuery.trim().toLowerCase());
      return matchesTab && matchesSearch;
    });
  }, [sessions, activeTab, searchQuery]);

  const onOpenSession = (session) => {
    alert('Would navigate to workspace?session=' + session.id);
  };

  const onCreateSession = () => {
    if (!newTitle.trim()) return;
    alert('Would create session: ' + newTitle.trim());
    setNewTitle('');
    setNewProject(PROJECT_OPTIONS[0].value);
    setShowModal(false);
  };

  const onContinueGuest = () => {
    const name = username.trim() || 'guest';
    alert('Continuing as: ' + name);
  };

  const onLogin = () => {
    alert('Login flow not wired yet.');
  };

  const pageStyle = {
    width: '100%',
    height: '100%',
    background: '#11161c',
    color: '#d6dde6',
    fontFamily: "var(--mono, 'Inter', 'Noto Sans KR', system-ui, sans-serif)",
    fontSize: 14,
    lineHeight: 1.5,
    overflow: 'auto',
    display: 'flex',
    flexDirection: 'column',
  };

  const headerStyle = {
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
    padding: '20px 32px',
    borderBottom: '1px solid #2a3540',
    background: '#141a21',
  };

  const logoStyle = {
    display: 'flex',
    alignItems: 'center',
    gap: 12,
    fontSize: 22,
    fontWeight: 700,
    letterSpacing: '0.04em',
    color: '#f0c674',
  };

  const badgeStyle = {
    fontSize: 10,
    fontWeight: 600,
    textTransform: 'uppercase',
    letterSpacing: '0.08em',
    padding: '3px 8px',
    borderRadius: 4,
    background: '#2a3a4a',
    color: '#f0c674',
    border: '1px solid #3a4756',
  };

  const mainStyle = {
    flex: 1,
    padding: '24px 32px 40px',
    display: 'flex',
    flexDirection: 'column',
    gap: 28,
    maxWidth: 1200,
    margin: '0 auto',
    width: '100%',
  };

  const loginWrapStyle = {
    background: '#161d25',
    border: '1px solid #2a3540',
    borderRadius: 10,
    padding: '24px 28px',
    display: 'flex',
    flexWrap: 'wrap',
    alignItems: 'center',
    gap: 16,
  };

  const inputStyle = {
    background: '#11161c',
    color: '#d6dde6',
    border: '1px solid #2a3540',
    borderRadius: 6,
    padding: '9px 14px',
    fontSize: 13,
    fontFamily: "inherit",
    outline: 'none',
    minWidth: 260,
    flex: 1,
  };

  const btnPrimaryStyle = {
    background: '#f0c674',
    color: '#171108',
    border: 'none',
    borderRadius: 6,
    padding: '9px 18px',
    fontSize: 13,
    fontWeight: 600,
    fontFamily: "inherit",
    cursor: 'pointer',
    transition: 'filter 0.2s ease, transform 0.2s ease',
  };

  const btnSecondaryStyle = {
    background: 'transparent',
    color: '#a3aebb',
    border: '1px solid #3a4756',
    borderRadius: 6,
    padding: '9px 18px',
    fontSize: 13,
    fontWeight: 500,
    fontFamily: "inherit",
    cursor: 'pointer',
    transition: 'background 0.2s ease, color 0.2s ease, border-color 0.2s ease',
  };

  const sectionTitleStyle = {
    fontSize: 16,
    fontWeight: 700,
    color: '#d6dde6',
    margin: 0,
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
  };

  const toolbarStyle = {
    display: 'flex',
    alignItems: 'center',
    gap: 12,
    flexWrap: 'wrap',
  };

  const searchStyle = {
    background: '#161d25',
    color: '#d6dde6',
    border: '1px solid #2a3540',
    borderRadius: 6,
    padding: '8px 12px',
    fontSize: 13,
    fontFamily: "inherit",
    outline: 'none',
    width: 240,
  };

  const tabRowStyle = {
    display: 'flex',
    gap: 4,
    background: '#161d25',
    borderRadius: 6,
    padding: 3,
    border: '1px solid #2a3540',
  };

  const tabStyle = (active) => ({
    padding: '6px 14px',
    fontSize: 12,
    fontWeight: 600,
    borderRadius: 4,
    border: 'none',
    cursor: 'pointer',
    fontFamily: "inherit",
    background: active ? '#2a3a4a' : 'transparent',
    color: active ? '#f0c674' : '#8893a3',
    transition: 'background 0.2s ease, color 0.2s ease',
  });

  const gridStyle = {
    display: 'grid',
    gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
    gap: 16,
  };

  const cardStyle = {
    background: '#161d25',
    border: '1px solid #2a3540',
    borderRadius: 10,
    padding: '18px 20px',
    cursor: 'pointer',
    display: 'flex',
    flexDirection: 'column',
    gap: 10,
    transition: 'transform 0.2s ease, box-shadow 0.2s ease',
    position: 'relative',
    overflow: 'hidden',
  };

  const cardTitleStyle = {
    fontSize: 15,
    fontWeight: 700,
    color: '#d6dde6',
    margin: 0,
  };

  const cardMetaStyle = {
    fontSize: 12,
    color: '#8893a3',
    display: 'flex',
    alignItems: 'center',
    gap: 8,
    flexWrap: 'wrap',
  };

  const statusBadgeStyle = () => ({
    display: 'inline-flex',
    alignItems: 'center',
    gap: 6,
    fontSize: 11,
    fontWeight: 600,
    padding: '2px 8px',
    borderRadius: 4,
    background: '#1c252f',
    color: '#a3aebb',
    border: '1px solid #2a3540',
  });

  const progressTrackStyle = {
    height: 6,
    background: '#2a3540',
    borderRadius: 3,
    overflow: 'hidden',
    marginTop: 4,
  };

  const progressFillStyle = (pct, color) => ({
    width: pct + '%',
    height: '100%',
    background: color || '#f0c674',
    borderRadius: 3,
    transition: 'width 0.4s ease',
  });

  const fabStyle = {
    position: 'fixed',
    bottom: 28,
    right: 32,
    width: 52,
    height: 52,
    borderRadius: '50%',
    background: '#f0c674',
    color: '#171108',
    border: 'none',
    fontSize: 24,
    fontWeight: 600,
    cursor: 'pointer',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
    transition: 'transform 0.2s ease, box-shadow 0.2s ease',
    zIndex: 50,
  };

  const overlayStyle = {
    position: 'fixed',
    inset: 0,
    background: 'rgba(0,0,0,0.55)',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    zIndex: 100,
    backdropFilter: 'blur(2px)',
  };

  const modalStyle = {
    background: '#161d25',
    border: '1px solid #2a3540',
    borderRadius: 12,
    padding: '24px 28px',
    width: 'min(90vw, 420px)',
    display: 'flex',
    flexDirection: 'column',
    gap: 16,
    boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
  };

  const modalTitleStyle = {
    fontSize: 16,
    fontWeight: 700,
    color: '#d6dde6',
    margin: 0,
  };

  const labelStyle = {
    fontSize: 11,
    fontWeight: 600,
    textTransform: 'uppercase',
    letterSpacing: '0.06em',
    color: '#8893a3',
    marginBottom: 4,
  };

  const selectStyle = {
    background: '#11161c',
    color: '#d6dde6',
    border: '1px solid #2a3540',
    borderRadius: 6,
    padding: '9px 12px',
    fontSize: 13,
    fontFamily: "inherit",
    outline: 'none',
    width: '100%',
  };

  const emptyStateStyle = {
    color: '#8893a3',
    fontSize: 13,
    textAlign: 'center',
    padding: '32px 0',
    border: '1px dashed #2a3540',
    borderRadius: 10,
    background: '#141a21',
  };

  return (
    <div style={pageStyle}>
      <style>{`
        .lobby-card:hover {
          transform: translateY(-3px);
          box-shadow: 0 12px 36px rgba(0,0,0,0.35);
          border-color: #3a4756;
        }
        .lobby-fab:hover {
          transform: scale(1.06);
          box-shadow: 0 12px 40px rgba(0,0,0,0.55);
        }
        .lobby-btn-primary:hover {
          filter: brightness(1.08);
        }
        .lobby-btn-secondary:hover {
          background: rgba(214, 221, 230, 0.06);
          color: #d6dde6;
          border-color: #4a5868;
        }
        .lobby-input:focus {
          border-color: #f0c674;
          box-shadow: 0 0 0 2px rgba(240, 198, 116, 0.15);
        }
        .lobby-search:focus {
          border-color: #f0c674;
          box-shadow: 0 0 0 2px rgba(240, 198, 116, 0.15);
        }
        @media (max-width: 640px) {
          .lobby-main { padding: 16px !important; }
          .lobby-header { padding: 14px 16px !important; }
          .lobby-grid { grid-template-columns: 1fr !important; }
          .lobby-login-wrap { flex-direction: column; align-items: stretch !important; }
        }
      `}</style>

      <header className="lobby-header" style={headerStyle}>
        <div style={logoStyle}>
          <span style={{ fontSize: 26 }}>◈</span>
          <span>ATLAS</span>
        </div>
        <span style={badgeStyle}>Multi-User</span>
      </header>

      <main className="lobby-main" style={mainStyle}>
        <section className="lobby-login-wrap" style={loginWrapStyle}>
          <input
            className="lobby-input"
            style={inputStyle}
            placeholder="Enter username or continue as guest"
            value={username}
            onChange={(e) => setUsername(e.target.value)}
          />
          <div style={{ display: 'flex', gap: 10 }}>
            <button
              className="lobby-btn-primary"
              style={btnPrimaryStyle}
              onClick={onContinueGuest}
            >
              Continue as Guest
            </button>
            <button
              className="lobby-btn-secondary"
              style={btnSecondaryStyle}
              onClick={onLogin}
            >
              Login
            </button>
          </div>
        </section>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
          <h2 style={sectionTitleStyle}>
            Your Sessions
            <span style={{ fontSize: 12, fontWeight: 500, color: '#8893a3', marginLeft: 10 }}>
              {filteredSessions.length}
            </span>
          </h2>
          <div style={toolbarStyle}>
            <input
              className="lobby-search"
              style={searchStyle}
              placeholder="Search sessions…"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
            />
            <div style={tabRowStyle}>
              <button style={tabStyle(activeTab === 'active')} onClick={() => setActiveTab('active')}>
                Active
              </button>
              <button style={tabStyle(activeTab === 'archived')} onClick={() => setActiveTab('archived')}>
                Archived
              </button>
            </div>
          </div>
        </div>

        {filteredSessions.length === 0 ? (
          <div style={emptyStateStyle}>
            No {activeTab} sessions match your search.
          </div>
        ) : (
          <div className="lobby-grid" style={gridStyle}>
            {filteredSessions.map((s) => {
              const meta = STATUS_META[s.status] || STATUS_META.active;
              const progressColor = s.progress === 100 ? '#7dc9a0' : s.progress > 50 ? '#f0c674' : '#d9a94a';
              return (
                <div
                  key={s.id}
                  className="lobby-card"
                  style={cardStyle}
                  onClick={() => onOpenSession(s)}
                  role="button"
                  tabIndex={0}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                      e.preventDefault();
                      onOpenSession(s);
                    }
                  }}
                >
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
                    <h3 style={cardTitleStyle}>{s.title}</h3>
                    <span style={statusBadgeStyle()}>
                      <span style={{ width: 7, height: 7, borderRadius: '50%', background: meta.dot, display: 'inline-block' }} />
                      {meta.label}
                    </span>
                  </div>
                  <div style={cardMetaStyle}>
                    <span style={{ fontWeight: 500, color: '#a3aebb' }}>{s.project}</span>
                    <span style={{ color: '#3a4756' }}>·</span>
                    <span>Last active: {s.lastActive}</span>
                  </div>
                  <div style={{ marginTop: 'auto', paddingTop: 6 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: '#8893a3', marginBottom: 4 }}>
                      <span>{s.progress}% complete</span>
                      <span>{Math.round((s.progress / 100) * 12)}/12 tasks</span>
                    </div>
                    <div style={progressTrackStyle}>
                      <div style={progressFillStyle(s.progress, progressColor)} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </main>

      <button
        className="lobby-fab"
        style={fabStyle}
        onClick={() => setShowModal(true)}
        title="New Session"
        aria-label="New Session"
      >
        +
      </button>

      {showModal && (
        <div
          style={overlayStyle}
          onClick={(e) => {
            if (e.target === e.currentTarget) setShowModal(false);
          }}
          role="dialog"
          aria-modal="true"
        >
          <div style={modalStyle}>
            <h3 style={modalTitleStyle}>New Session</h3>
            <div>
              <div style={labelStyle}>Session Title</div>
              <input
                className="lobby-input"
                style={{ ...inputStyle, width: '100%', minWidth: 'unset' }}
                placeholder="e.g., AXI DMA Controller"
                value={newTitle}
                onChange={(e) => setNewTitle(e.target.value)}
                autoFocus
              />
            </div>
            <div>
              <div style={labelStyle}>Project</div>
              <select
                className="lobby-input"
                style={selectStyle}
                value={newProject}
                onChange={(e) => setNewProject(e.target.value)}
              >
                {PROJECT_OPTIONS.map((p) => (
                  <option key={p.value} value={p.value}>
                    {p.label}
                  </option>
                ))}
              </select>
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 4 }}>
              <button
                className="lobby-btn-secondary"
                style={btnSecondaryStyle}
                onClick={() => setShowModal(false)}
              >
                Cancel
              </button>
              <button
                className="lobby-btn-primary"
                style={btnPrimaryStyle}
                onClick={onCreateSession}
              >
                Create
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LobbyPage />);
  </script>

  <script>
    function scale() {
      const s = document.getElementById('scaler');
      const sx = window.innerWidth  / 1920;
      const sy = window.innerHeight / 1080;
      s.style.transform = 'scale(' + sx + ',' + sy + ')';
    }
    window.addEventListener('resize', scale);
    setTimeout(scale, 30);
    setTimeout(scale, 200);
  </script>
</body>
</html>
