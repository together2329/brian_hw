      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen should replace with IP-specific architectural state/output equations before signoff.
    side_effects:
    - Architectural state updates according to FSM/control policy
    error_cases:
    - condition: Downstream protocol response is non-OKAY or invalid
      result: Set error status and block signoff until handled
    output_rules: []
