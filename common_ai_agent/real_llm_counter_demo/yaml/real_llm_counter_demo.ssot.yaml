    - io_list
    - decomposition
    - integration
  integration_policy: Top-level wiring must be backed by integration.connections or sub_modules[].connections before signoff.
  source_refs:
  - sub_modules
  - function_model
  - cycle_model
  - integration
rtl_contract:
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM_INC
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: cmd_valid == 1 and cmd_ready == 1
  input_map:
    cmd: cmd
    load_value: load_value
  output_map:
    count: count
    zero: zero
    max: max
    accepted_count: accepted_count
    status: status
    cmd_ready: cmd_ready
  ready_output: cmd_ready
  contract_invariants:
  - count is always the registered 8-bit saturating counter value.
  - zero is 1 iff count == 0.
  - max is 1 iff count == 255.
  - cmd_ready is always 1.
  - accepted_count increments on every accepted command (cmd_valid && cmd_ready).
  - status encodes the last accepted command category.
  output_rules:
  - name: zero
    port: zero
    expr: 1 if min(count + 1, 255) == 0 else 0
    width: 1
    description: zero flag after increment
  - name: max
    port: max
    expr: 1 if min(count + 1, 255) == 255 else 0
    width: 1
    description: max flag after increment (set when saturating)
  - name: count
    port: count
    expr: count
    width: 8
    description: Externally observable function_model state is driven from the RTL state register.
  - name: accepted_count
    port: accepted_count
    expr: accepted_count
    width: 32
    description: Externally observable function_model state is driven from the RTL state register.
parameters:
- name: WIDTH
  type: integer
  default: 8
  description: Counter width in bits. Fixed at 8 for this IP.
  min: 8
  max: 8
- name: SAT_MAX
  type: integer
  default: 255
  description: Saturation ceiling (2**WIDTH - 1).
- name: SAT_MIN
  type: integer
  default: 0
  description: Saturation floor.
io_list:
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock
    ports:
    - name: clk
      width: 1
      direction: input
      description: Primary clock
  resets:
  - name: rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low async assert, sync deassert reset
    ports:
    - name: rst_n
      width: 1
      direction: input
      description: Primary reset
  interfaces:
  - name: command_if
    type: native_valid_ready
    role: sink
    clock_domain: clk
    reset_domain: rst_n
    description: "Command input interface \u2014 cmd_valid/cmd_ready handshake with cmd[2:0] and load_value[7:0]."
    protocol:
      acceptance: cmd_valid == 1 && cmd_ready == 1 accepts one command per clock edge.
      response: "No response channel \u2014 results appear on dedicated output ports."
      stability: cmd and load_value remain stable while cmd_valid is high and cmd_ready is low.
      always_ready: cmd_ready is tied to 1'b1; the sink never applies backpressure.
    ports:
    - name: cmd_valid
      width: 1
      direction: input
      description: Command valid strobe
    - name: cmd_ready
      width: 1
      direction: output
      description: "Command ready \u2014 always 1'b1 (no backpressure)"
    - name: cmd
      width: 3
      direction: input
      description: 'Command encoding: 000=CLEAR, 001=LOAD, 010=INC, 011=DEC, 100=HOLD, 101-111=reserved (treated as HOLD)'
    - name: load_value
      width: 8
      direction: input
      description: Load value sampled when cmd==001 (LOAD) and cmd_valid==1
  - name: status_out
    type: native_output
    role: source
    clock_domain: clk
    reset_domain: rst_n
    description: "Counter state outputs \u2014 count, flags, accepted_count, and status."
    ports:
    - name: count
      width: 8
      direction: output
      description: Current 8-bit counter value
    - name: zero
      width: 1
      direction: output
      description: Asserted when count == 0
    - name: max
      width: 1
      direction: output
      description: Asserted when count == 255
    - name: accepted_count
      width: 32
      direction: output
      description: Total accepted commands (wraps at 2^32-1)
    - name: status
      width: 3
      direction: output
      description: 'Last accepted command category: 000=CLEAR, 001=LOAD, 010=INC, 011=DEC, 100=HOLD, 101=reserved(=HOLD)'
    protocol:
      acceptance: Transfer acceptance follows the declared valid/ready or protocol phase rule.
      stability: Payload/control fields remain stable until accepted.
      response: Observable response timing follows cycle_model latency and ordering.
features:
- id: F001
  description: "Saturating increment \u2014 count stays at 8'hFF on INC at max."
  trigger: cmd == 3'b010 and cmd_valid == 1
  datapath: count_next = min(count + 1, 255)
  control: Combinational decode, registered update
  output: count updated, zero/max flags recomputed
  priority: high
- id: F002
  description: "Saturating decrement \u2014 count stays at 8'h00 on DEC at min."
  trigger: cmd == 3'b011 and cmd_valid == 1
  datapath: count_next = max(count - 1, 0)
  control: Combinational decode, registered update
  output: count updated, zero/max flags recomputed
  priority: high
- id: F003
  description: CLEAR command forces count to 8'h00.
  trigger: cmd == 3'b000 and cmd_valid == 1
  datapath: count_next = 0
  control: Combinational decode, registered update
  output: count == 0, zero == 1, max == 0
  priority: high
- id: F004
  description: LOAD command sets count to load_value[7:0].
  trigger: cmd == 3'b001 and cmd_valid == 1
  datapath: count_next = load_value
  control: Combinational decode, registered update
  output: count == load_value, zero/max recomputed
  priority: high
- id: F005
  description: HOLD command leaves count unchanged.
  trigger: cmd == 3'b100 and cmd_valid == 1
  datapath: count_next = count
  control: No update
  output: count unchanged
  priority: medium
- id: F006
  description: Invalid/reserved command encodings (101-111) treated as HOLD.
  trigger: cmd >= 3'b101 and cmd_valid == 1
  datapath: count_next = count (same as HOLD)
  control: No update
  output: count unchanged, status reflects the actual cmd value
  priority: low
- id: F007
  description: Zero/max flags are combinational functions of count register.
  trigger: Every clock edge
  datapath: zero = (count == 0), max = (count == 255)
  control: Combinational
  output: zero and max outputs track count in real time
  priority: medium
- id: F008
  description: accepted_count tracks total accepted transactions, wraps at 32-bit boundary.
  trigger: cmd_valid == 1 and cmd_ready == 1
  datapath: accepted_count_next = accepted_count + 1
  control: Registered 32-bit wrap counter
  output: accepted_count output port
  priority: medium
- id: F009
  description: status output reflects last accepted command category.
  trigger: cmd_valid == 1 and cmd_ready == 1
  datapath: status_next = cmd
  control: Registered 3-bit latch
  output: status output port
  priority: low
dataflow:
  description: 'Single-path dataflow: command input -> decode -> next-count logic -> count register -> output flags. No pipelining; all combinational decode and next-state logic resolves in one clock cycle.'
  paths:
  - name: command_path
    source: cmd_valid
    sink: count
    latency_cycles: 1
    throughput: 1
  - name: flag_path
    source: count
    sink:
    - zero
    - max
    latency_cycles: 0
    throughput: 1
    note: "Combinational \u2014 flags update same cycle as count register."
  - name: accepted_path
    source: cmd_valid
    sink: accepted_count
    latency_cycles: 1
    throughput: 1
  - name: status_path
    source: cmd
    sink: status
    latency_cycles: 1
    throughput: 1
function_model:
  purpose: Cycle-independent behavioral contract for rtl-gen and tb-gen. Describes what the 8-bit saturating counter computes for each command.
  state_variables:
  - name: count
    width: 8
    reset: 0
    description: Current 8-bit counter value.
  - name: accepted_count
    width: 32
    reset: 0
    description: Total accepted commands (wraps at 2^32-1).
  - name: last_cmd
    width: 3
    reset: 0
    description: Last accepted command encoding (mirrored to status output).
  transactions:
  - id: FM_CLEAR
    name: clear_counter
    preconditions:
    - cmd_valid == 1
    - cmd == 0
    inputs:
    - 'cmd_valid: 1'
    - 'cmd: 0 (CLEAR)'
    outputs:
    - count == 0 on next cycle
    - zero == 1, max == 0
    - name: zero
      port: zero
      expr: '1'
      description: count is 0 after clear
    - name: max
      port: max
      expr: '0'
      description: count is not 255 after clear
    - name: count
      port: count
      expr: count
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      description: Externally observable function_model state is driven from the RTL state register.
    - state: last_cmd
      expr: '0'
      description: Record CLEAR as last command
    output_rules:
    - name: zero
      port: zero
      expr: '1'
      width: 1
      description: count is 0 after clear
    - name: max
      port: max
      expr: '0'
      width: 1
      description: count is not 255 after clear
    - name: count
      port: count
      expr: count
      width: 8
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      width: 32
      description: Externally observable function_model state is driven from the RTL state register.
    state_updates:
    - name: count
      expr: '0'
      width: 8
      description: Reset counter to zero
    - name: last_cmd
      expr: '0'
      width: 3
      description: Record CLEAR as last command
    - name: accepted_count
      expr: (accepted_count + 1) & 0xFFFFFFFF
      width: 32
      description: Increment accepted command counter
    error_cases: []
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff state
  - id: FM_LOAD
    name: load_counter
    preconditions:
    - cmd_valid == 1
    - cmd == 1
    inputs:
    - 'cmd_valid: 1'
    - 'cmd: 1 (LOAD)'
    - 'load_value: 8-bit value'
    outputs:
    - count == load_value on next cycle
    - zero == (load_value == 0)
    - max == (load_value == 255)
    - name: zero
      port: zero
      expr: 1 if load_value == 0 else 0
      description: zero flag reflects loaded value
    - name: max
      port: max
      expr: 1 if load_value == 255 else 0
      description: max flag reflects loaded value
    - name: count
      port: count
      expr: count
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      description: Externally observable function_model state is driven from the RTL state register.
    - state: last_cmd
      expr: '1'
      description: Record LOAD as last command
    output_rules:
    - name: zero
      port: zero
      expr: 1 if load_value == 0 else 0
      width: 1
      description: zero flag reflects loaded value
    - name: max
      port: max
      expr: 1 if load_value == 255 else 0
      width: 1
      description: max flag reflects loaded value
    - name: count
      port: count
      expr: count
      width: 8
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      width: 32
      description: Externally observable function_model state is driven from the RTL state register.
    state_updates:
    - name: count
      expr: load_value
      width: 8
      description: Set counter to load_value
    - name: last_cmd
      expr: '1'
      width: 3
      description: Record LOAD as last command
    - name: accepted_count
      expr: (accepted_count + 1) & 0xFFFFFFFF
      width: 32
      description: Increment accepted command counter
    error_cases: []
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff state
  - id: FM_INC
    name: increment_counter
    preconditions:
    - cmd_valid == 1
    - cmd == 2
    inputs:
    - 'cmd_valid: 1'
    - 'cmd: 2 (INC)'
    outputs:
    - count == min(count + 1, 255) on next cycle
    - zero == (min(count + 1, 255) == 0)
    - max == (min(count + 1, 255) == 255)
    - name: zero
      port: zero
      expr: 1 if min(count + 1, 255) == 0 else 0
      description: zero flag after increment
    - name: max
      port: max
      expr: 1 if min(count + 1, 255) == 255 else 0
      description: max flag after increment (set when saturating)
    - name: count
      port: count
      expr: count
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      description: Externally observable function_model state is driven from the RTL state register.
    - state: last_cmd
      expr: '2'
      description: Record INC as last command
    output_rules:
    - name: zero
      port: zero
      expr: 1 if min(count + 1, 255) == 0 else 0
      width: 1
      description: zero flag after increment
    - name: max
      port: max
      expr: 1 if min(count + 1, 255) == 255 else 0
      width: 1
      description: max flag after increment (set when saturating)
    - name: count
      port: count
      expr: count
      width: 8
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      width: 32
      description: Externally observable function_model state is driven from the RTL state register.
    state_updates:
    - name: count
      expr: min(count + 1, 255)
      width: 8
      description: Increment with saturation at 255
    - name: last_cmd
      expr: '2'
      width: 3
      description: Record INC as last command
    - name: accepted_count
      expr: (accepted_count + 1) & 0xFFFFFFFF
      width: 32
      description: Increment accepted command counter
    error_cases: []
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff state
  - id: FM_DEC
    name: decrement_counter
    preconditions:
    - cmd_valid == 1
    - cmd == 3
    inputs:
    - 'cmd_valid: 1'
    - 'cmd: 3 (DEC)'
    outputs:
    - count == max(count - 1, 0) on next cycle
    - zero == (max(count - 1, 0) == 0)
    - max == (max(count - 1, 0) == 255)
    - name: zero
      port: zero
      expr: 1 if max(count - 1, 0) == 0 else 0
      description: zero flag after decrement
    - name: max
      port: max
      expr: 1 if max(count - 1, 0) == 255 else 0
      description: max flag after decrement
    - name: count
      port: count
      expr: count
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      description: Externally observable function_model state is driven from the RTL state register.
    - state: last_cmd
      expr: '3'
      description: Record DEC as last command
    output_rules:
    - name: zero
      port: zero
      expr: 1 if max(count - 1, 0) == 0 else 0
      width: 1
      description: zero flag after decrement
    - name: max
      port: max
      expr: 1 if max(count - 1, 0) == 255 else 0
      width: 1
      description: max flag after decrement
    - name: count
      port: count
      expr: count
      width: 8
      description: Externally observable function_model state is driven from the RTL state register.
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      width: 32
      description: Externally observable function_model state is driven from the RTL state register.
    state_updates:
    - name: count
      expr: max(count - 1, 0)
      width: 8
      description: Decrement with saturation at 0
    - name: last_cmd
      expr: '3'
      width: 3
      description: Record DEC as last command
    - name: accepted_count
      expr: (accepted_count + 1) & 0xFFFFFFFF
      width: 32
      description: Increment accepted command counter
    error_cases: []
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff state
  - id: FM_HOLD
    name: hold_counter
    preconditions:
    - cmd_valid == 1
    - cmd == 4
    inputs:
    - 'cmd_valid: 1'
    - 'cmd: 4 (HOLD)'
    outputs:
    - count unchanged
    - zero == (count == 0)
    - max == (count == 255)
    - name: zero
      port: zero
      expr: 1 if count == 0 else 0
      description: zero flag unchanged
    - name: max
      port: max
      expr: 1 if count == 255 else 0
      description: max flag unchanged
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      description: Externally observable function_model state is driven from the RTL state register.
    - state: last_cmd
      expr: '4'
      description: Record HOLD as last command
    output_rules:
    - name: zero
      port: zero
      expr: 1 if count == 0 else 0
      width: 1
      description: zero flag unchanged
    - name: max
      port: max
      expr: 1 if count == 255 else 0
      width: 1
      description: max flag unchanged
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      width: 32
      description: Externally observable function_model state is driven from the RTL state register.
    state_updates:
    - name: last_cmd
      expr: '4'
      width: 3
      description: Record HOLD as last command
    - name: accepted_count
      expr: (accepted_count + 1) & 0xFFFFFFFF
      width: 32
      description: Increment accepted command counter
    error_cases: []
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff state
  - id: FM_INVALID
    name: invalid_command_as_hold
    preconditions:
    - cmd_valid == 1
    - cmd >= 5
    inputs:
    - 'cmd_valid: 1'
    - 'cmd: 5, 6, or 7 (reserved)'
    outputs:
    - count unchanged (same as HOLD)
    - zero == (count == 0)
    - max == (count == 255)
    - name: zero
      port: zero
      expr: 1 if count == 0 else 0
      description: zero flag unchanged
    - name: max
      port: max
      expr: 1 if count == 255 else 0
      description: max flag unchanged
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      description: Externally observable function_model state is driven from the RTL state register.
    - state: last_cmd
      expr: cmd
      description: Record actual cmd value (5-7) in status
    output_rules:
    - name: zero
      port: zero
      expr: 1 if count == 0 else 0
      width: 1
      description: zero flag unchanged
    - name: max
      port: max
      expr: 1 if count == 255 else 0
      width: 1
      description: max flag unchanged
    - name: accepted_count
      port: accepted_count
      expr: accepted_count
      width: 32
      description: Externally observable function_model state is driven from the RTL state register.
    state_updates:
    - name: last_cmd
      expr: cmd
      width: 3
      description: Record actual cmd value (5-7) in status
    - name: accepted_count
      expr: (accepted_count + 1) & 0xFFFFFFFF
      width: 32
      description: Increment accepted command counter (invalid commands are still accepted)
    error_cases: []
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff state
  invariants:
  - count is always in [0, 255].
  - zero == 1 if and only if count == 0.
  - max == 1 if and only if count == 255.
  - cmd_ready is always 1.
  - accepted_count increments on every cmd_valid && cmd_ready edge.
  - status == last_cmd after each accepted command.
  - No bus, no CSR, no memory, no interrupt, no CDC, no multi-clock behavior.
  reference_model_hint: tb-gen must build a scoreboard/reference model from function_model transactions and compare expected count/zero/max/accepted_count/status versus RTL observed after each accepted command.
cycle_model:
  purpose: "Cycle/handshake contract \u2014 single-cycle command acceptance with combinational decode and registered update."
  executable: python
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel remains the behavioral oracle.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n == 0 asynchronously clears count to 0, accepted_count to 0, last_cmd to 0
    deassertion: Logic may accept commands on the first rising edge after synchronized deassertion
  latency:
    command_accept:
      min_cycles: 0
      max_cycles: 0
      description: "cmd_ready is always 1 \u2014 command is accepted on the same edge cmd_valid is asserted."
    command_effect:
      min_cycles: 1
      max_cycles: 1
      description: Count/status/accepted_count update on the clock edge after acceptance.
    flag_update:
      min_cycles: 0
      max_cycles: 0
      description: "zero and max are combinational \u2014 they reflect the new count value in the same cycle."
  handshake_rules:
  - signal: cmd_valid/cmd_ready
    rule: cmd_valid asserts the command; cmd_ready is always 1 so the command is always accepted on the same rising edge. cmd and load_value must be stable when cmd_valid is high.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0
    action: Sample cmd, load_value when cmd_valid == 1. Command is accepted unconditionally (cmd_ready == 1).
  - stage: S1_UPDATE
    cycle: 1
    action: Register new count, last_cmd, accepted_count on the rising clock edge after acceptance.
  - stage: S2_FLAGS
    cycle: 1
    action: Combinational zero/max flags reflect the new count value immediately.
  ordering:
  - Accepted commands update architectural state (count, last_cmd, accepted_count) only on clock edges.
  - zero and max are combinational functions of count and reflect updates in the same cycle.
  - "No backpressure \u2014 cmd_ready is always 1."
  backpressure:
  - "No backpressure exists \u2014 cmd_ready is hardwired to 1. This is documented as a design decision."
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: One command per clock cycle when cmd_valid is high.
    outstanding:
      max: 1
      description: Single-cycle acceptance, single-cycle effect.
    depth:
      pipeline_stages: 2
      queue_depth: 0
      description: Accept then update; no buffering.
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - count resets to 0
  - accepted_count resets to 0
  - last_cmd resets to 0
  - zero is 1 after reset (count == 0)
  - max is 0 after reset
  - cmd_ready is 1 during and after reset
cdc_requirements:
  required: false
  rationale: "Single clock/reset domain \u2014 no CDC required."
  checks:
  - No crossing paths expected.
rdc_requirements:
  required: false
  rationale: "Single clock/reset domain \u2014 no RDC required."
  checks:
  - No crossing paths expected.
registers:
  no_registers: true
  policy: No firmware-visible registers. Counter state is accessed only through the native command interface and output ports.
  register_list: []
memory:
  instances: []
  addressing:
    policy: No internal memory instances.
  storage_policy: No storage behavior beyond the count/accepted_count/last_cmd registers.
interrupts:
  present: false
  sources: []
  rationale: "No interrupt output \u2014 all state visible through output ports."
fsm:
  no_fsm: true
  reason: "The counter uses purely combinational next-state decode from the command input. There is no sequential FSM \u2014 count is updated directly each cycle based on cmd. status/last_cmd is a simple registered latch of the last accepted cmd value."
  style: none
  description: "No explicit FSM \u2014 combinational command decode drives registered counter update."
timing:
  clock_domains:
  - name: clk
    period_ns: 10.0
    description: Single 100 MHz clock domain.
  critical_paths: []
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    command_accept_to_count_update:
      min: 1
      max: 1
      measured_from: cmd_valid && cmd_ready rising edge
      measured_to: count register updated
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: VDD
    voltage: 1.0
    rails:
    - core
  gating: disabled
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
    - All declared IP functionality active
  clock_gating:
    required: false
    rationale: No explicit integrated clock-gating requirement.
  upf_required: false
security:
  classification: non_secure_leaf_ip
  assets:
  - name: counter_state
    protection: "Counter value is deterministic from command sequence \u2014 no secret state."
  threat_model:
  - threat: Invalid command injection via cmd[2:0]
    mitigation: "Reserved encodings (5-7) are treated as HOLD \u2014 no state corruption possible."
  privilege_model: "No privilege model \u2014 open command interface."
error_handling:
  description: "Invalid command encodings (5-7) are treated as HOLD \u2014 count remains unchanged and accepted_count still increments. No error output signal is provided."
  invalid_cmd_action: treat_as_hold
  error_sources:
  - id: ERR_PROTOCOL
    condition: Downstream protocol response is non-OKAY or invalid
    architectural_effect: Set error status and block signoff until handled
  propagation:
  - Errors update status/debug observability and propagate through declared response/interrupt mechanisms.
  recovery:
  - action: reset
    clears:
    - count, accepted_count, last_cmd
    preserves: []
debug_observability:
  description: All internal state is observable through output ports (count, zero, max, accepted_count, status).
  waveform_must_probe:
  - clk
  - rst_n
  - cmd_valid
  - cmd_ready
  - cmd
  - load_value
  - count
  - zero
  - max
  - accepted_count
  - status
  trace_events:
  - name: command_accepted
    trigger: cmd_valid && cmd_ready rising edge
  - name: counter_updated
    trigger: count register changes on clk edge
  status_outputs:
  - "count[7:0] \u2014 current counter value"
  - "zero \u2014 count == 0"
  - "max \u2014 count == 255"
  - "accepted_count[31:0] \u2014 total accepted commands"
  - "status[2:0] \u2014 last accepted command category"
integration:
  bus_interfaces: []
  sideband_signals: []
  bus_attachment:
    interfaces:
    - command_if
    - status_out
    address_ownership: "No bus \u2014 native port-level integration."
  dependencies:
    external_modules: []
    external_clocks:
    - clk
    external_resets:
    - rst_n
  connections:
  - module: real_llm_counter_demo
    port: clk
    signal: system_clk
    direction: input
  - module: real_llm_counter_demo
    port: rst_n
    signal: system_rst_n
    direction: input
  - module: real_llm_counter_demo
    port: cmd_valid
    signal: producer_cmd_valid
    direction: input
  - module: real_llm_counter_demo
    port: cmd
    signal: producer_cmd
    direction: input
  - module: real_llm_counter_demo
    port: load_value
    signal: producer_load_value
    direction: input
  - module: real_llm_counter_demo
    port: count
    signal: counter_count
    direction: output
  - module: real_llm_counter_demo
    port: zero
    signal: counter_zero
    direction: output
  - module: real_llm_counter_demo
    port: max
    signal: counter_max
    direction: output
  - module: real_llm_counter_demo
    port: accepted_count
    signal: counter_accepted_count
    direction: output
  - module: real_llm_counter_demo
    port: status
    signal: counter_status
    direction: output
  connection_contract_status: "Complete \u2014 all ports mapped to integration signals."
  integration_notes:
  - Connect cmd_valid/cmd/cmd_ready/load_value to the command producer.
  - Connect count/zero/max/accepted_count/status to downstream consumers.
  - "cmd_ready is always 1 \u2014 no backpressure handling needed."
dft:
  scan_style: none
  scan_required: false
  controllability:
    reset: rst_n
    clocks:
    - clk
    primary_inputs: All io_list inputs controllable in testbench.
  observability:
    required_internal_points: []
    outputs: All io_list outputs observable.
  mbist_required: false
synthesis:
  target_library: generic
  constraints:
  - type: clock
    name: clk
    period_ns: 10.0
    description: Primary clock constraint at 100 MHz
  - type: input_delay
    port: cmd_valid
    delay_ns: 2.0
    clock: clk
    description: Input delay for command valid
  - type: output_delay
    port: count
    delay_ns: 2.0
    clock: clk
    description: Output delay for counter value
  dialect: systemverilog_2012
  top_module: real_llm_counter_demo
  tool_flow: yosys
  target_technology: sky130_fd_sc_hd
  liberty_env_var: SKY130_LIB
  corner:
    name: sky130_fd_sc_hd__ss_100C_1v40
    process: ss
    temperature_c: 100
    voltage_v: 1.4
  library_policy: Use SKY130_LIB env var for SS corner Liberty.
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 100
  required_outputs:
  - syn/out/synth.v
  - syn/out/area.json
  - syn/out/syn.report.md
  - sta/out/wns.json
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  cts_buf_list:
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
  routing:
    signal_layers:
      min: met1
      max: met5
    drc_waivers: []
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/real_llm_counter_demo_param.vh
  conventions:
  - Use .sv filenames with the project SystemVerilog subset.
  - Use input logic / output logic ANSI ports and internal single-driver logic.
  - Put shared parameter declarations in rtl/<ip>_param.vh when needed; include it inside consuming modules.
  - 'BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv'
  - No inferred latches; every combinational branch assigns all outputs.
  - 'Active-low async reset pattern: always @(posedge clk or negedge rst_n).'
  - Parameterize widths (no hardcoded numbers except default parameter values).
  lint_waivers: []
reuse_modules: []
custom:
  assumptions:
  - cmd encoding values 5-7 are treated as HOLD (no-op).
  - "cmd_ready is always 1'b1 \u2014 the sink never applies backpressure."
  - No CDC, no multi-clock, no bus/CSR, no memory arrays, no interrupts.
  - load_value is only sampled when cmd==LOAD and cmd_valid==1.
  - accepted_count wraps naturally at 2^32-1; no overflow flag.
  - Reset is asynchronous active-low; deassertion is synchronous to clk.
  future_considerations:
  - Parameterizable WIDTH for reuse.
  - Backpressure support via cmd_ready gating.
  - Overflow/underflow error output flags.
  optional_behavior_policy:
    resolution: non_required_optional_items_disabled_unless_ssot_marks_required_or_parameterized
    owner: ssot-gen deterministic repair
    rule: Rows marked required:false or prose-only optional verification aids do not add RTL behavior.
dir_structure:
  yaml_dir: yaml/
  output_dirs:
    rtl: rtl/
    list: list/
    tb: tb/cocotb/
    sim: sim/
    lint: lint/
    cov: cov/
    doc: doc/
  generators_dir: generators/
filelist:
  rtl:
  - rtl/real_llm_counter_demo.sv
  headers:
  - rtl/real_llm_counter_demo_param.vh
  tb:
  - tb/cocotb/test_real_llm_counter_demo.py
  - tb/cocotb/test_runner.py
  - tb/cocotb/scoreboard.py
  sim:
  - sim/results.xml
  - sim/waves.fst
  coverage:
  - cov/coverage.json
test_requirements:
  scenarios:
  - id: SC01
    name: reset_contract
    stimulus: Assert rst_n low, then release. Keep cmd_valid low during reset.
    expected: count == 0, accepted_count == 0, status == 0, zero == 1, max == 0, cmd_ready == 1 after reset deasserts.
    checker: Reset checker compares all outputs against function_model reset values.
    coverage:
    - function_model.reset
    - cycle_model.reset
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          rst_n: 0
      - cycle: 5
        assign:
          rst_n: 1
      - cycle: 6
        wait: 1
  - id: SC02
    name: clear_command
    stimulus: After reset, drive cmd_valid=1, cmd=000 (CLEAR) for one cycle.
    expected: count == 0 on next cycle, zero == 1, max == 0, accepted_count == 1, status == 000.
    checker: Scoreboard compares count/zero/max/accepted_count/status against FM_CLEAR transaction.
    coverage:
    - function_model.transactions.FM_CLEAR
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 0
      - cycle: 1
        assign:
          cmd_valid: 0
  - id: SC03
    name: load_command
    stimulus: Drive cmd_valid=1, cmd=001 (LOAD), load_value=0x42 for one cycle.
    expected: count == 0x42 on next cycle, zero == 0, max == 0, accepted_count increments, status == 001.
    checker: Scoreboard compares against FM_LOAD transaction.
    coverage:
    - function_model.transactions.FM_LOAD
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 66
      - cycle: 1
        assign:
          cmd_valid: 0
  - id: SC04
    name: increment_command
    stimulus: After loading count=10, drive cmd_valid=1, cmd=010 (INC).
    expected: count == 11, zero == 0, max == 0, accepted_count increments, status == 010.
    checker: Scoreboard compares against FM_INC transaction.
    coverage:
    - function_model.transactions.FM_INC
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 10
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 2
      - cycle: 2
        assign:
          cmd_valid: 0
  - id: SC05
    name: increment_saturation
    stimulus: Load count=255, then drive cmd_valid=1, cmd=010 (INC).
    expected: count stays 255 (saturates), max == 1, zero == 0.
    checker: 'Scoreboard verifies saturation: count_next == min(255+1, 255) == 255.'
    coverage:
    - function_model.transactions.FM_INC
    - features.F001
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 255
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 2
      - cycle: 2
        assign:
          cmd_valid: 0
  - id: SC06
    name: decrement_command
    stimulus: After loading count=10, drive cmd_valid=1, cmd=011 (DEC).
    expected: count == 9, zero == 0, max == 0, accepted_count increments, status == 011.
    checker: Scoreboard compares against FM_DEC transaction.
    coverage:
    - function_model.transactions.FM_DEC
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 10
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 3
      - cycle: 2
        assign:
          cmd_valid: 0
  - id: SC07
    name: decrement_saturation
    stimulus: With count=0, drive cmd_valid=1, cmd=011 (DEC).
    expected: count stays 0 (saturates), zero == 1, max == 0.
    checker: 'Scoreboard verifies saturation: count_next == max(0-1, 0) == 0.'
    coverage:
    - function_model.transactions.FM_DEC
    - features.F002
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 0
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 3
      - cycle: 2
        assign:
          cmd_valid: 0
  - id: SC08
    name: hold_command
    stimulus: Load count=0x55, then drive cmd_valid=1, cmd=100 (HOLD).
    expected: count unchanged at 0x55, accepted_count increments, status == 100.
    checker: Scoreboard compares against FM_HOLD transaction.
    coverage:
    - function_model.transactions.FM_HOLD
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 85
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 4
      - cycle: 2
        assign:
          cmd_valid: 0
  - id: SC09
    name: invalid_command_as_hold
    stimulus: Drive cmd_valid=1, cmd=101 (reserved/invalid).
    expected: count unchanged, accepted_count increments, status == 101.
    checker: Scoreboard compares against FM_INVALID transaction.
    coverage:
    - function_model.transactions.FM_INVALID
    - error_handling.invalid_cmd_action
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 5
      - cycle: 1
        assign:
          cmd_valid: 0
  - id: SC10
    name: accepted_count_wrap
    stimulus: Drive 2^32 commands, verify accepted_count wraps to 0.
    expected: accepted_count wraps from 0xFFFFFFFF to 0x00000000.
    checker: Scoreboard tracks expected accepted_count with modular arithmetic.
    coverage:
    - features.F008
    stimulus_machine_spec:
      assign:
        cmd_valid: 1
        cmd: 4
  - id: SC11
    name: back_to_back_commands
    stimulus: Drive cmd_valid=1 continuously with alternating INC/DEC commands.
    expected: Count updates every cycle, accepted_count increments every cycle.
    checker: Scoreboard verifies per-cycle count evolution.
    coverage:
    - cycle_model.throughput
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 2
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 3
      - cycle: 2
        assign:
          cmd_valid: 1
          cmd: 2
      - cycle: 3
        assign:
          cmd_valid: 0
  - id: SC12
    name: zero_max_flags_corner_cases
    stimulus: LOAD 0, check zero=1,max=0. LOAD 255, check zero=0,max=1. LOAD 128, check zero=0,max=0.
    expected: Flags correctly track count value at all corner cases.
    checker: Flag checker verifies zero == (count==0) and max == (count==255).
    coverage:
    - features.F007
    stimulus_machine_spec:
      timeline:
      - cycle: 0
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 0
      - cycle: 1
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 255
      - cycle: 2
        assign:
          cmd_valid: 1
          cmd: 1
          load_value: 128
      - cycle: 3
        assign:
          cmd_valid: 0
  scoreboard_checks: 12
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Behavioral coverage for all counter commands and saturation.
      bins:
      - id: FCOV_CLEAR
        source_ref: function_model.transactions.FM_CLEAR
        class: transaction
        description: CLEAR command executed and count == 0 observed
      - id: FCOV_LOAD
        source_ref: function_model.transactions.FM_LOAD
        class: transaction
        description: LOAD command executed and count == load_value observed
      - id: FCOV_INC
        source_ref: function_model.transactions.FM_INC
        class: transaction
        description: INC command executed and count incremented observed
      - id: FCOV_INC_SATURATE
        source_ref: function_model.transactions.FM_INC
        class: transaction
        description: "INC at max (255) \u2014 saturation holds count at 255"
      - id: FCOV_DEC
        source_ref: function_model.transactions.FM_DEC
        class: transaction
        description: DEC command executed and count decremented observed
      - id: FCOV_DEC_SATURATE
        source_ref: function_model.transactions.FM_DEC
        class: transaction
        description: "DEC at min (0) \u2014 saturation holds count at 0"
      - id: FCOV_HOLD
        source_ref: function_model.transactions.FM_HOLD
        class: transaction
        description: HOLD command executed and count unchanged observed
      - id: FCOV_INVALID
        source_ref: function_model.transactions.FM_INVALID
        class: transaction
        description: Invalid command (5-7) treated as HOLD
      - id: FCOV_ZERO_FLAG
        source_ref: function_model.transactions
        class: flag
        description: zero flag asserted when count == 0
      - id: FCOV_MAX_FLAG
        source_ref: function_model.transactions
        class: flag
        description: max flag asserted when count == 255
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle coverage for command acceptance, state update, and flag timing.
      bins:
      - id: CCOV_CMD_ACCEPT
        source_ref: cycle_model.pipeline.S0_ACCEPT
        class: pipeline_stage
        description: Command accepted on cmd_valid/cmd_ready handshake
      - id: CCOV_STATE_UPDATE
        source_ref: cycle_model.pipeline.S1_UPDATE
        class: pipeline_stage
        description: State update observed on clock edge after acceptance
      - id: CCOV_FLAG_COMBINATIONAL
        source_ref: cycle_model.pipeline.S2_FLAGS
        class: pipeline_stage
        description: zero/max flags update combinationally with count
      - id: CCOV_BACK_TO_BACK
        source_ref: cycle_model.performance.throughput
        class: throughput
        description: Back-to-back commands at full throughput
    functional: 'Legacy alias: coverage_goals.function and coverage_goals.cycle must both close.'
    code: line >= 90%, branch >= 85%, toggle >= 80%
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
quality_gates:
  ssot:
    pass: check_ssot_disk.sh exits 0 and verify_ssot.py --mode engineering returns zero blockers.
    evidence:
    - check_ssot_disk.sh PASS
    - verify_ssot.py PASS
