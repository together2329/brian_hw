workflow_todos:
  ssot-gen:
  - id: SSOT_WRITE_VALIDATE_FROM_EVIDENCE
    content: Write and validate the canonical SSOT YAML from approved evidence
    detail: Repair SSOT with explicit counter ports, transactions, and behavior. Remove all generic repair markers.
    command: /to-ssot real_llm_counter_demo
    script: $ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py
    run_command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/repair_ssot_schema.py" real_llm_counter_demo --root "$ATLAS_PROJECT_ROOT" --mode engineering && python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" real_llm_counter_demo --root "$ATLAS_PROJECT_ROOT" --mode engineering
    instructions:
    - Verify all interface ports match the native command interface spec.
    - Verify all transactions have machine-readable output_rules and state_updates.
    - Run repair_ssot_schema.py and verify_ssot.py after the YAML edit.
    criteria:
    - 'SSOT YAML exists with correct ports: cmd_valid, cmd_ready, cmd[2:0], load_value[7:0], count[7:0], zero, max, accepted_count[31:0], status[2:0].'
    - Transactions FM_CLEAR, FM_LOAD, FM_INC, FM_DEC, FM_HOLD, FM_INVALID all have output_rules and state_updates.
    - verify_ssot.py --mode engineering returns zero blockers.
    source_refs:
    - req/
    - yaml/real_llm_counter_demo.ssot.yaml
    priority: high
    required: true
  rtl-gen:
  - id: RTL_IMPLEMENT_COUNTER
    content: Implement the 8-bit saturating counter from SSOT
    detail: Translate function_model transactions (CLEAR, LOAD, INC, DEC, HOLD, INVALID) into RTL with saturating arithmetic, accepted_count wrap counter, and combinational zero/max flags.
    command: /ssot-rtl real_llm_counter_demo
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    run_command: python3 "$ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py" real_llm_counter_demo --root "$ATLAS_PROJECT_ROOT" --audit-rtl
    instructions:
    - Implement only behavior traced to function_model transactions.
    - Use active-low async reset pattern.
    - cmd_ready is hardwired to 1.
    - count_next = 0 for CLEAR, load_value for LOAD, min(count+1,255) for INC, max(count-1,0) for DEC, count for HOLD/INVALID.
    criteria:
    - RTL ports match io_list exactly.
    - Count saturates at 0 and 255.
    - accepted_count wraps at 2^32.
    - zero == (count == 0), max == (count == 255) combinationally.
    source_refs:
    - function_model.transactions
    - io_list.interfaces
    - cycle_model
    owner_module: real_llm_counter_demo
    owner_file: rtl/real_llm_counter_demo.sv
    priority: high
    required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
  - name: verify_ssot
    command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" real_llm_counter_demo --root "$ATLAS_PROJECT_ROOT" --mode ${ATLAS_RUN_MODE:-signoff}
    description: Validate SSOT structure, Preview fields, and quality gates at the selected Run Mode
  - name: handoff_fl_model
    command: /ssot-fl-model real_llm_counter_demo
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals real_llm_counter_demo
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl real_llm_counter_demo
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb real_llm_counter_demo
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
