top_module:
  name: real_llm_counter_demo
  file: rtl/real_llm_counter_demo.sv
  version: 1.0.0
  type: peripheral
  description: '8-bit saturating up/down counter with valid-ready command input. Commands: CLEAR (000), LOAD (001), INC (010), DEC (011), HOLD (100). INC saturates at 8''hFF; DEC saturates at 8''h00. Single clock domain, active-low async reset. No bus/CSR/interrupt/CDC/memory.'
  target:
    process: generic
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
  reference_spec: user-defined
sub_modules:
- name: real_llm_counter_demo_behavior_contract
  ownership: conceptual
  ssot_gen: false
  rtl_emit: false
  description: Conceptual owner for SSOT function-model behavior implemented by the generated RTL.
  source_sections:
  - function_model
  - cycle_model
  - features
  - test_requirements
  - dataflow
  - fsm
  - decomposition
  function_model_refs:
  - function_model.transactions.FM_CLEAR
  - function_model.transactions.FM_LOAD
  - function_model.transactions.FM_INC
  - function_model.transactions.FM_DEC
  - function_model.transactions.FM_HOLD
  - function_model.transactions.FM_INVALID
  - function_model.state_variables
  cycle_model_refs:
  - cycle_model
  feature_refs:
  - features
  dataflow_refs:
  - dataflow
  fsm_refs:
  - fsm
  decomposition_refs:
  - decomposition
  test_refs:
  - test_requirements
- name: real_llm_counter_demo
  file: rtl/real_llm_counter_demo.sv
  ownership: manifest
  ssot_gen: true
  wiring_only: true
  description: Top-level integration module matching SSOT top_module
  implements:
  - top_module
  - integration
  source_sections:
  - top_module
  - io_list
  - decomposition
  - integration
  decomposition_refs:
  - decomposition
  dataflow_refs:
  - dataflow
decomposition:
  strategy: manifest_owned_leaf
  units:
  - id: command_decode
    kind: combinational
    source_refs:
    - function_model.transactions
    rtl_candidates:
    - real_llm_counter_demo
    verification_impact:
    - test_requirements.scenarios
  - id: counter_datapath
    kind: sequential
    source_refs:
    - function_model.state_variables
    - function_model.transactions
    rtl_candidates:
    - real_llm_counter_demo
    verification_impact:
    - test_requirements.scenarios
  owners:
  - module: real_llm_counter_demo
    file: rtl/real_llm_counter_demo.sv
    responsibility: Top-level integration module matching SSOT top_module
    source_sections:
