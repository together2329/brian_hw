    output: rtl/real_llm_counter_demo.sv timing logic + waveform checks
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: error_handling
    output: RTL invalid-cmd handling and DV invalid-cmd scenarios
  - yaml: test_requirements.scenarios
    output: tb/cocotb/test_real_llm_counter_demo.py
