      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen should replace with IP-specific architectural state/output equations before signoff.
  invariants:
  - No externally visible output changes except through declared interfaces, registers, interrupts, or debug signals.
  - All state updates are synchronous to the declared clock and return to reset values under the declared reset policy.
  - Every declared error source has a defined architectural effect and recovery path.
  - Data movement and ordering follow the dataflow section without bypassing declared buffers or counters.
  reference_model_hint: tb-gen must build a scoreboard/reference model from function_model transactions and compare expected versus observed results.
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  executable: python
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel remains the behavioral oracle.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n assertion returns architectural state to declared reset values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on clk at nominal 100 MHz; max depends on declared backpressure and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - signal: req_valid/req_ready
    rule: req_valid payload remains stable until req_ready is sampled asserted on control_data.
  - signal: rsp_valid/rsp_ready
    rule: rsp_valid payload remains stable until rsp_ready is sampled asserted on control_data.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0..N
    action: Accept legal request/command/packet/control work under declared handshake rules.
  - stage: S1_EVALUATE
    cycle: N..M
    action: Evaluate function_model transaction and update only declared state.
  - stage: S2_OBSERVE
    cycle: M..K
    action: Publish response/status/output/debug event and hold it stable until accepted.
  ordering:
  - Accepted requests update architectural state only on clock edges.
  - Completion/status/interrupt updates occur after the operation reaches its terminal FSM state.
  - Backpressure stalls the active handshake stage without corrupting stored state.
  - Read/dataflow stages must precede dependent write/output stages where declared in dataflow.
  backpressure:
  - Ready/valid deassertion stalls only the affected interface stage; payload and route/control state remain stable.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: No backpressure on the active interface
    outstanding:
      max: 1
      description: Default one accepted operation until the SSOT declares deeper buffering
    depth:
      pipeline_stages: 3
      queue_depth: 1
      description: Default accept/evaluate/observe cycle model depth
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - Handshake/control state resets to idle
  - Observable outputs reset to function_model reset values
cdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
rdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
registers:
  no_registers: true
  policy: No firmware-visible registers are implied by repair; add explicit register_list entries before rtl-gen implements CSR behavior.
  register_list: []
memory:
  instances: []
  addressing:
    policy: No SSOT-approved internal memory instances; add explicit memories before rtl-gen may implement storage behavior.
  storage_policy: No storage behavior is implied by repair. rtl-gen may only implement memory described by SSOT facts.
interrupts:
  present: false
  sources: []
  rationale: No interrupt output is implied by repair; add interrupt sources explicitly before rtl-gen implements IRQ behavior
fsm:
  no_fsm: true
  reason: This IP uses combinational next-state decode from the command input with no sequential FSM. The status output encodes a soft command-category but there are no FSM states or transitions.
  policy: No FSM is required; command decode is purely combinational on cmd[2:0] and count_reg. status output is a registered category of the last accepted command, not a true FSM state.
  style: none
  description: "No explicit FSM \u2014 the counter uses combinational next-state decode from the command input directly. The status output encodes a soft state category but there is no sequential FSM.\n"
timing:
  clock_domains:
  - name: clk
    period_ns: 10.0
    description: Single 100 MHz clock domain.
  critical_paths: []
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    register_access:
      min: 0
      max: null
      measured_from: valid && ready
      measured_to: response valid && ready
    primary_operation:
      min: 1
      max: null
      measured_from: start/request accepted
      measured_to: done/response accepted
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: VDD
    voltage: 1.0
    rails:
    - core
  gating: disabled
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
    - All declared IP functionality active
  clock_gating:
    required: false
    rationale: No explicit integrated clock-gating requirement in approved SSOT
  upf_required: false
security:
  classification: non_secure_leaf_ip
  assets:
  - name: configuration_state
    protection: CSR/configuration updates must be deterministic and reset-safe
  - name: data_integrity
    protection: Data/control outputs must match function_model transactions
  threat_model:
  - threat: invalid configuration or address
    mitigation: error_handling declares detection, architectural effect, and recovery
  - threat: silent data/control corruption
    mitigation: test_requirements scoreboard checks every declared functional transaction
  privilege_model: System-level access control is owned by the integrating bus/firewall unless explicitly declared here.
error_handling:
  description: "Invalid command encodings (5-7) are treated as HOLD \u2014 count remains unchanged and accepted_count still increments. No error output is provided.\n"
  invalid_cmd_action: treat_as_hold
  error_sources:
  - id: ERR_PROTOCOL
    condition: Downstream protocol response is non-OKAY or invalid
    architectural_effect: Set error status and block signoff until handled
  propagation:
  - Errors update status/debug observability and propagate through declared response/interrupt mechanisms.
  recovery:
  - action: reset or software clear
    clears:
    - error/status indicators
    preserves:
    - configuration unless reset policy states otherwise
debug_observability:
  description: All internal state is observable through output ports (count, zero, max, accepted_count, status).
  waveform_must_probe:
  - clk
  - rst_n
  - fsm_state
  - start_or_request
  - done_or_response
  - error_status
  - irq_or_status_outputs
  trace_events:
  - name: operation_start
    trigger: start/request accepted
  - name: operation_complete
    trigger: done/response accepted
  - name: error_detected
    trigger: any error_handling.error_sources condition
  status_outputs:
  - status/debug signals declared in io_list or registers
integration:
  bus_interfaces: []
  sideband_signals: []
  bus_attachment:
    interfaces:
    - control_data
    address_ownership: SoC assigns base addresses and external routing not owned by this leaf IP
  dependencies:
    external_modules: []
    external_clocks:
    - clk
    external_resets:
    - rst_n
  connections: []
  connection_contract_status: missing machine-readable module wiring; child RTL drafts may proceed from owner packets, but top integration/signoff must stay blocked until SSOT authors integration.connections or sub_modules[].connections with module/port/signal records
  integration_notes:
  - Integrator must connect every declared io_list port and honor timing/reset assumptions.
dft:
  scan_style: none
  scan_required: false
  controllability:
    reset: rst_n
    clocks:
    - clk
    primary_inputs: all io_list inputs controllable in testbench
  observability:
    required_internal_points:
    - fsm_state
    - status
    - error_status
    outputs: all io_list outputs observable
  mbist_required: false
synthesis:
  target_library: generic
  constraints:
  - type: clock
    name: clk
    period_ns: 10.0
    description: Primary clock constraint at 100 MHz
  - type: input_delay
    port: cmd_valid
    delay_ns: 2.0
    clock: clk
    description: Input delay for command valid
  - type: output_delay
    port: count
    delay_ns: 2.0
    clock: clk
    description: Output delay for counter value
  dialect: systemverilog_2012
  top_module: real_llm_counter_demo
  tool_flow: yosys
  target_technology: sky130_fd_sc_hd
  liberty_env_var: SKY130_LIB
  corner:
    name: sky130_fd_sc_hd__ss_100C_1v40
    process: ss
    temperature_c: 100
    voltage_v: 1.4
  library_policy: Use the SKY130_LIB environment variable to locate the SS corner Liberty file for the declared sky130_fd_sc_hd target library; synthesis and STA must stop if the file is unreadable or does not match the declared corner.
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 100
  required_outputs:
  - syn/out/synth.v
  - syn/out/area.json
  - syn/out/syn.report.md
  - sta/out/wns.json
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  cts_buf_list:
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
  routing:
    signal_layers:
      min: met1
      max: met5
    drc_waivers: []
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/real_llm_counter_demo_param.vh
  conventions:
  - Use .sv filenames with the project SystemVerilog subset
  - Use input logic/output logic ANSI ports and internal single-driver logic
  - Put shared parameter declarations in rtl/<ip>_param.vh when needed; include it inside consuming modules
  - Do not create *_pkg.sv or use typedef/enum/always_ff/always_comb/package/import/interface/modport/function/task/for/while constructs
  - No inferred latches; every combinational branch assigns all outputs
  - No parameterized part-selects inside procedural blocks; use helper wires/continuous assigns
  - No ad-hoc lint suppressions without SSOT waiver and DUT-only lint evidence
  lint_waivers: []
reuse_modules: []
custom:
  assumptions:
  - cmd encoding values 5-7 are treated as HOLD (no-op).
  - "cmd_ready is always 1'b1 \u2014 the sink never applies backpressure."
  - No CDC, no multi-clock, no bus/CSR, no memory arrays.
  - load_value is only sampled when cmd==LOAD and cmd_valid==1.
  - accepted_count wraps naturally at 2^32-1; no overflow flag.
  - Reset is asynchronous active-low; deassertion is synchronous to clk.
  future_considerations:
  - Parameterizable WIDTH for reuse.
  - Backpressure support via cmd_ready gating.
  - Overflow/underflow error output flags.
  optional_behavior_policy:
    resolution: non_required_optional_items_disabled_unless_ssot_marks_required_or_parameterized
    owner: ssot-gen deterministic repair
    rule: Rows marked required:false or prose-only optional verification aids do not add RTL behavior. Any optional functional behavior must be converted by ssot-gen into required behavior or an explicit parameter/register policy before rtl-gen signoff.
dir_structure:
  yaml_dir: yaml/
  output_dirs:
    rtl: rtl/
    list: list/
    tb: tb/cocotb/
    sim: sim/
    lint: lint/
    cov: cov/
    doc: doc/
  generators_dir: generators/
