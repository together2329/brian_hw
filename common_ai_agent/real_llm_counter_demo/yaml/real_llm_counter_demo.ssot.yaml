top_module:
  name: real_llm_counter_demo
  file: rtl/real_llm_counter_demo.sv
  version: 1.0.0
  type: leaf
  description: '8-bit saturating up/down counter with valid-ready command input. Supports CLEAR, LOAD, INC, DEC, and HOLD commands. INC saturates at 8''hFF; DEC saturates at 8''h00. Single clock domain, active-low async reset, no bus/CSR/interrupt/CDC/memory interfaces.

    '
  target:
    process: generic
    frequency_hz: 100000000
    reset: active_low_async
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
  reference_spec: user-defined
sub_modules:
- name: real_llm_counter_demo_behavior_contract
  ownership: conceptual
  ssot_gen: false
  rtl_emit: false
  description: Conceptual owner for SSOT function-model behavior implemented by the generated RTL.
  source_sections:
  - function_model
  - cycle_model
  - features
  - test_requirements
  - dataflow
  - fsm
  - decomposition
  function_model_refs:
  - function_model.transactions.FM1
  - function_model.transactions.FM2
  - function_model.transactions.FM3
  - function_model.transactions.FM4
  - function_model.state_variables
  cycle_model_refs:
  - cycle_model
  feature_refs:
  - features
  dataflow_refs:
  - dataflow
  fsm_refs:
  - fsm
  decomposition_refs:
  - decomposition
  test_refs:
  - test_requirements
- name: real_llm_counter_demo
  file: rtl/real_llm_counter_demo.sv
  ownership: manifest
  ssot_gen: true
  wiring_only: true
  description: Top-level integration module matching SSOT top_module
  implements:
  - top_module
  - integration
  source_sections:
  - top_module
  - io_list
  - decomposition
  - integration
  decomposition_refs:
  - decomposition
  dataflow_refs:
  - dataflow
decomposition:
  strategy: manifest_owned_leaf_decomposition
  owners:
  - module: real_llm_counter_demo
    file: rtl/real_llm_counter_demo.sv
    responsibility: Top-level integration module matching SSOT top_module
    source_sections:
    - top_module
    - io_list
    - decomposition
    - integration
  integration_policy: Top-level wiring must be backed by integration.connections or sub_modules[].connections before signoff.
  source_refs:
  - sub_modules
  - function_model
  - cycle_model
  - integration
rtl_contract:
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM1
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: req_valid && req_ready
  input_map:
    req_data: req_data
    rsp_ready: rsp_ready
  output_map:
    req_ready: req_ready
    rsp_valid: rsp_valid
    rsp_data: rsp_data
    error: error
  ready_output: req_ready
  output_valid: rsp_valid
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transaction.
  - Input sampling and output observation follow cycle_model handshake and latency rules.
  output_rules:
  - name: error
    port: error
    expr: error
    width: 1
    description: Externally observable function_model state is driven from the RTL state register.
parameters:
- name: WIDTH
  type: integer
  default: 8
  description: Counter width in bits. Fixed at 8 for this IP.
  min: 8
  max: 8
- name: SAT_MAX
  type: integer
  default: 255
  description: Saturation ceiling (2**WIDTH - 1).
- name: SAT_MIN
  type: integer
  default: 0
  description: Saturation floor.
io_list:
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock
    ports:
    - name: clk
      width: 1
      direction: input
      description: Primary clock
  resets:
  - name: rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset, asynchronous assert and synchronous release
    ports:
    - name: rst_n
      width: 1
      direction: input
      description: Primary reset
  interfaces:
  - name: control_data
    type: native_valid_ready
    role: target
    clock_domain: clk
    reset_domain: rst_n
    description: Generic request/response interface synthesized only as a repair fallback; replace with approved protocol ports before production signoff.
    protocol:
      acceptance: req_valid && req_ready accepts one request payload.
      response: rsp_valid marks a response payload, accepted with rsp_ready.
      stability: Payload/control fields remain stable while valid is high and ready is low.
    ports:
    - name: req_valid
      width: 1
      direction: input
      description: Request/control payload valid
    - name: req_ready
      width: 1
      direction: output
      description: Request/control payload accepted when high with req_valid
    - name: req_data
      width: DATA_WIDTH
      direction: input
      description: Generic request/control payload
    - name: rsp_valid
      width: 1
      direction: output
      description: Response/result payload valid
    - name: rsp_ready
      width: 1
      direction: input
      description: Response/result accepted when high with rsp_valid
    - name: rsp_data
      width: DATA_WIDTH
      direction: output
      description: Generic response/result payload
    - name: error
      width: 1
      direction: output
      description: Generic architectural error indication
features:
- id: F001
  description: "Saturating increment \u2014 count stays at 8'hFF on INC at max."
  priority: high
- id: F002
  description: "Saturating decrement \u2014 count stays at 8'h00 on DEC at min."
  priority: high
- id: F003
  description: Valid-ready command interface with always-ready sink.
  priority: high
- id: F004
  description: CLEAR command forces count to 8'h00 regardless of current value.
  priority: high
- id: F005
  description: LOAD command sets count to load_value[7:0] unconditionally.
  priority: high
- id: F006
  description: HOLD command leaves count unchanged.
  priority: medium
- id: F007
  description: Zero/max flags are combinational functions of count register.
  priority: medium
- id: F008
  description: accepted_count tracks total accepted transactions, wraps at 32-bit boundary.
  priority: medium
- id: F009
  description: status output reflects last accepted command category.
  priority: low
dataflow:
  description: "Single-path dataflow: command input \u2192 decode \u2192 next-count logic \u2192 count register \u2192 output flags. No pipelining; all combinational decode and next-state logic resolves in one clock cycle.\n"
  paths:
  - name: command_path
    source: cmd_valid
    sink: count
    latency_cycles: 1
    throughput: 1
  - name: flag_path
    source: count
    sink:
    - zero
    - max
    latency_cycles: 0
    throughput: 1
    note: "Combinational \u2014 flags update same cycle as count register."
