quality_gates:
  ssot:
    pass: check_ssot_disk.sh exits 0 and ATLAS SSOT progress is fully approved
    evidence:
    - check_ssot_disk.sh PASS
    - ATLAS /api/progress ssot all sections approved
  rtl:
    pass: All expected RTL files exist, are production-ready, compile, and lint within warning budget
    evidence:
    - list/<ip>.f
    - compile log
    - lint log
  rtl_gen:
    profile: standard
    pass: rtl-gen execution_policy.pass_allowed is true, every required SSOT-derived RTL TODO is closed, and provenance proves common_ai_agent rtl-gen authored the RTL without fixed-template fallback behavior
    evidence:
    - rtl/rtl_authoring_plan.json
    - logs/rtl-gen/rtl_todo_plan.json
    - rtl/provenance.json
    - rtl_compile.json
    - lint/dut_lint.json
  dv:
    pass: Every SSOT test_requirements scenario has an executable checker and FL-vs-RTL equivalence goal
    evidence:
    - verify/equivalence_goals.json
    - sim/scoreboard_events.jsonl
    - tb/cocotb tests
    - scenario implementation map
  coverage:
    pass: Functional coverage passes and any explicitly requested structural metrics have matching evidence or approved waivers
    evidence:
    - coverage report
    - coverage waiver list if any
  eda:
    pass: Synthesis/STA/DFT expectations have reports or approved waivers
    evidence:
    - syn/sta/dft reports
  signoff:
    pass: SSOT, FL/equivalence, RTL, lint, DV, sim, coverage, and EDA gates pass with fresh artifacts
    evidence:
    - ATLAS progress signoff PASS
traceability:
  yaml_to_output:
