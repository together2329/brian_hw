# ============================================================================
# i2c.ssot.yaml — Single Source of Truth for I2C Master Controller
# ============================================================================
# Section 01: Top Module Identity
top_module:
  name: i2c
  type: "peripheral"
  description: "I2C master-only controller with APB4 slave interface, 8-byte TX/RX FIFOs, 7-bit addressing, Standard (100kHz) and Fast (400kHz) modes"
  dialect: "verilog_2001"
  author: "AI Agent"
  version: "1.0.0"

# ============================================================================
# Section 02: Clock and Reset
clock_reset:
  clk:
    name: clk
    frequency_hz: 100_000_000
    description: "System clock — all logic synchronous to rising edge"
  reset:
    name: rst_n
    polarity: "active-low"
    type: "asynchronous assert, synchronous deassert"
    description: "Asynchronous active-low reset; deassertion synchronized to clk internally"

# ============================================================================
# Section 03: APB4 Slave Interface
apb4_interface:
  signals:
    - { name: pclk,     dir: in,  width: 1,  description: "APB clock (tied to clk)" }
    - { name: presetn,  dir: in,  width: 1,  description: "APB reset (tied to rst_n)" }
    - { name: paddr,    dir: in,  width: 8,  description: "APB address (8-bit, byte-aligned)" }
    - { name: psel,     dir: in,  width: 1,  description: "APB select" }
    - { name: penable,  dir: in,  width: 1,  description: "APB enable" }
    - { name: pwrite,   dir: in,  width: 1,  description: "APB write (1=write, 0=read)" }
    - { name: pwdata,   dir: in,  width: 32, description: "APB write data" }
    - { name: prdata,   dir: out, width: 32, description: "APB read data" }
    - { name: pready,   dir: out, width: 1,  description: "APB ready — no wait states" }
    - { name: pslverr,  dir: out, width: 1,  description: "APB slave error — asserted on bad address" }

# ============================================================================
# Section 04: I2C External Interface
i2c_interface:
  signals:
    - { name: scl, dir: inout, width: 1, description: "I2C serial clock — open-drain, pulled up externally" }
    - { name: sda, dir: inout, width: 1, description: "I2C serial data  — open-drain, pulled up externally" }
  open_drain: true
  external_pullup: true

# ============================================================================
# Section 05: Interrupt Outputs
interrupts:
  signals:
    - { name: intr_tx_empty,       dir: out, width: 1, description: "TX FIFO empty interrupt" }
    - { name: intr_rx_full,        dir: out, width: 1, description: "RX FIFO full interrupt" }
    - { name: intr_arbitration_lost, dir: out, width: 1, description: "Arbitration lost interrupt" }
    - { name: intr_nack_received,  dir: out, width: 1, description: "NACK received interrupt" }
  aggregate:
    name: intr
    width: 4
    description: "OR of all four interrupt sources; also readable in STATUS register"

# ============================================================================
# Section 06: Register Map
registers:
  address_width: 8
  data_width: 32
  map:
    - name: DATA
      offset: "8'h00"
      access: "RW"
      description: "TX/RX FIFO data port. Write pushes to TX FIFO; read pops from RX FIFO."
      reset: "32'h0000_0000"
      fields:
        - { name: data, bits: "7:0", access: "RW", description: "8-bit I2C data byte" }
    - name: ADDR
      offset: "8'h04"
      access: "RW"
      description: "Slave address register. Holds 7-bit target slave address."
      reset: "32'h0000_0000"
      fields:
        - { name: addr, bits: "6:0", access: "RW", description: "7-bit I2C slave address" }
        - { name: rw_bit, bits: "7", access: "RW", description: "R/W direction bit: 0=write, 1=read" }
    - name: STATUS
      offset: "8'h08"
      access: "RO"
      description: "Status register — read-only. Bit-clear on read for latched flags."
      reset: "32'h0000_0000"
      fields:
        - { name: tx_empty,        bits: "0", access: "RO", description: "TX FIFO empty" }
        - { name: tx_full,         bits: "1", access: "RO", description: "TX FIFO full" }
        - { name: rx_empty,        bits: "2", access: "RO", description: "RX FIFO empty" }
        - { name: rx_full,         bits: "3", access: "RO", description: "RX FIFO full" }
        - { name: busy,            bits: "4", access: "RO", description: "Transaction in progress" }
        - { name: arbitration_lost, bits: "5", access: "RO", description: "Arbitration lost flag" }
        - { name: nack_received,   bits: "6", access: "RO", description: "NACK received flag" }
        - { name: bus_error,       bits: "7", access: "RO", description: "Bus error flag" }
    - name: CTRL
      offset: "8'h0C"
      access: "RW"
      description: "Control register."
      reset: "32'h0000_0000"
      fields:
        - { name: enable,       bits: "0", access: "RW", description: "I2C core enable" }
        - { name: start,        bits: "1", access: "RW", description: "Generate START condition. Self-clearing." }
        - { name: stop,         bits: "2", access: "RW", description: "Generate STOP condition. Self-clearing." }
        - { name: ack_en,       bits: "3", access: "RW", description: "ACK enable: 1=send ACK, 0=send NACK after RX" }
        - { name: speed,        bits: "4", access: "RW", description: "Speed: 0=Standard(100kHz), 1=Fast(400kHz)" }
        - { name: int_tx_empty_en, bits: "8", access: "RW", description: "TX empty interrupt enable" }
        - { name: int_rx_full_en,  bits: "9", access: "RW", description: "RX full interrupt enable" }
        - { name: int_arb_lost_en, bits: "10", access: "RW", description: "Arbitration lost interrupt enable" }
        - { name: int_nack_en,     bits: "11", access: "RW", description: "NACK received interrupt enable" }
    - name: CLOCK_DIV
      offset: "8'h10"
      access: "RW"
      description: "Clock divider for SCL generation. SCL = clk / (2 * (div+1))."
      reset: "32'h0000_01F3"
      fields:
        - { name: div, bits: "15:0", access: "RW", description: "Clock divisor value. Reset=499 for 100kHz at 100MHz." }

# ============================================================================
# Section 07: TX FIFO
tx_fifo:
  depth: 8
  width: 8
  description: "8-byte transmit FIFO. Written via DATA register. Read by I2C FSM for serialization."
  flags:
    - { name: tx_empty, description: "FIFO contains zero valid entries" }
    - { name: tx_full,  description: "FIFO contains 8 valid entries" }
  overflow_policy: "drop — writes ignored when full"
  reset_clear: true

# ============================================================================
# Section 08: RX FIFO
rx_fifo:
  depth: 8
  width: 8
  description: "8-byte receive FIFO. Written by I2C FSM from deserialized data. Read via DATA register."
  flags:
    - { name: rx_empty, description: "FIFO contains zero valid entries" }
    - { name: rx_full,  description: "FIFO contains 8 valid entries" }
  overflow_policy: "drop — new RX data discarded when full"
  reset_clear: true

# ============================================================================
# Section 09: I2C Master FSM States
fsm_states:
  description: "Mealy-style FSM for byte-level I2C master protocol"
  states:
    - IDLE:       "Bus idle; waiting for START command or enable"
    - START:      "Drive SDA low while SCL high → START condition"
    - ADDR:       "Shift out 7-bit address + R/W bit, MSB first"
    - ADDR_ACK:   "Sample ACK from slave on 9th SCL"
    - TX_DATA:    "Shift out 8 data bits, MSB first"
    - TX_ACK:     "Sample ACK from slave on 9th SCL"
    - RX_DATA:    "Shift in 8 data bits, MSB first"
    - RX_ACK:     "Drive ACK/NACK on 9th SCL per CTRL.ack_en"
    - STOP:       "SDA low→high while SCL high → STOP condition"
    - ARB_LOST:   "Arbitration lost — release bus, flag interrupt"
    - WAIT:       "Wait state between bytes when FIFO empty on TX"

# ============================================================================
# Section 10: SCL Generation
scl_generation:
  source: "Internal divider from clk"
  formula: "scl_period = 2 * (div + 1) * clk_period"
  standard_mode:
    target_freq: 100_000
    div_value: 499     # 100MHz / (2*500) = 100kHz
  fast_mode:
    target_freq: 400_000
    div_value: 124     # 100MHz / (2*125) = 400kHz
  scl_stretching: false  # Master does not support clock stretching

# ============================================================================
# Section 11: BIT Counter and Byte Shifting
bit_control:
  bit_counter:
    width: 4
    range: "0-8"
    description: "Counts bits 0-8 per byte. Bit 8 is ACK/NACK phase."
  shift_register:
    width: 8
    description: "8-bit shift register for serialization (TX) and deserialization (RX)"
    direction: "MSB first"

# ============================================================================
# Section 12: START/STOP Generation
start_stop:
  start_condition:
    sequence: "SDA high→low while SCL high"
    timing: "t_SU;STA ≥ 4.7us (Std) / 0.6us (Fast)"
  stop_condition:
    sequence: "SDA low→high while SCL high"
    timing: "t_SU;STO ≥ 4.0us (Std) / 0.6us (Fast)"
  implementation: "Bit-level FSM controls sda_out, scl_out; open-drain drivers with sda_oe, scl_oe"

# ============================================================================
# Section 13: Arbitration Detection
arbitration:
  description: "Master monitors SDA while driving. If it drives 1 but samples 0, arbitration is lost."
  detection: "Compare driven vs sampled SDA during address and data phases"
  response: "Immediately release bus (sda_oe=0, scl_oe=0), set arbitration_lost flag, generate interrupt"

# ============================================================================
# Section 14: ACK/NACK Handling
ack_handling:
  tx_mode:
    description: "After transmitting 8 data bits, master releases SDA and samples SDA on 9th SCL."
    ack: "Slave pulls SDA low → continue"
    nack: "Slave leaves SDA high → set nack_received flag, optional STOP"
  rx_mode:
    description: "After receiving 8 data bits, master drives ACK (SDA=0) or NACK (SDA=1) per CTRL.ack_en."
    ack: "Master drives SDA=0 → continue receiving"
    nack: "Master drives SDA=1 → signal end of read, followed by STOP"

# ============================================================================
# Section 15: Interrupt Generation Logic
interrupt_logic:
  tx_empty:
    condition: "TX FIFO transitions from non-empty to empty AND CTRL.int_tx_empty_en=1"
    latch: "edge-sensitive — pulse on transition"
  rx_full:
    condition: "RX FIFO transitions to full AND CTRL.int_rx_full_en=1"
    latch: "level-sensitive — asserted while full"
  arbitration_lost:
    condition: "Arbitration lost detected AND CTRL.int_arb_lost_en=1"
    latch: "latched until STATUS read"
  nack_received:
    condition: "NACK received on 9th SCL in TX mode AND CTRL.int_nack_en=1"
    latch: "latched until STATUS read"

# ============================================================================
# Section 16: APB Register Access Logic
apb_access:
  read:
    timing: "Combinational — prdata valid in same cycle as psel & penable & !pwrite"
    pready: "Always asserted (no wait states)"
    pslverr: "Asserted on address >= 8'h14 (undefined register space)"
  write:
    timing: "Registered on rising edge of pclk when psel & penable & pwrite"
    byte_enable: "Not supported — full 32-bit writes only"

# ============================================================================
# Section 17: Open-Drain I/O Control
open_drain:
  scl_output:
    scl_out: "Internal SCL driver value"
    scl_oe:  "Output enable: 1=drive low, 0=high-Z (pulled high externally)"
    logic: "scl = scl_oe ? 1'b0 : 1'bz"
  sda_output:
    sda_out: "Internal SDA driver value"
    sda_oe:  "Output enable: 1=drive low, 0=high-Z (pulled high externally)"
    logic: "sda = sda_oe ? 1'b0 : 1'bz"
  sda_input:
    sda_in: "Sampled value of SDA for arbitration and RX"

# ============================================================================
# Section 18: Timing Parameters
timing_parameters:
  clk_frequency: 100_000_000
  t_clk_ns: 10
  standard_mode:
    scl_freq: 100_000
    t_low_min_ns: 4700
    t_high_min_ns: 4000
    div_target: 499
  fast_mode:
    scl_freq: 400_000
    t_low_min_ns: 1300
    t_high_min_ns: 600
    div_target: 124
  internal:
    t_start_hold_ns: 4000
    t_stop_setup_ns: 4000
    t_data_setup_ns: 250
    t_data_hold_ns: 0

# ============================================================================
# Section 19: Reset Behavior
reset_behavior:
  async_assert: "All registers reset to default values when rst_n=0"
  sync_deassert: "Internal reset synchronizer releases cleanly after rst_n rises"
  default_state:
    fsm: "IDLE"
    sda_oe: 0
    scl_oe: 0
    tx_fifo: "empty"
    rx_fifo: "empty"
    ctrl_reg: "32'h0000_0000"
    clock_div_reg: "32'h0000_01F3"

# ============================================================================
# Section 20: File List and Build
build:
  filelist: "i2c/list/i2c.f"
  rtl_files:
    - "i2c/rtl/i2c.v"
  tb_files:
    - "i2c/tb/tb_i2c.v"
  lint:
    tool: "iverilog"
    flags: "-g2012 -Wall -o /dev/null"
    target: "i2c/rtl/i2c.v"
  synthesis:
    tool: "yosys"
    target: "i2c/rtl/i2c.v"
