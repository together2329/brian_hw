workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_CORE_FILTER"
      content: "Implement the synchronizer, per-bit stability counter, debounce filter, and edge-detect logic in debouncer_core.sv"
      detail: "Translate function_model FM1/FM2/FM3 transactions, cycle_model pipeline stages, and rtl_contract state_updates into RTL: SYNC_DEPTH-stage synchronizer, per-bit counter that increments when sync_reg[i] != debounce_out_reg[i], threshold comparison that triggers debounce_out_reg update, and edge-detect logic (rise_det/fall_det) comparing current vs previous output."
      criteria:
        - "debouncer_core.sv implements SYNC_DEPTH synchronizer chain with async reset"
        - "Per-bit counter increments/clears per function_model FM1/FM2 specification"
        - "debounce_out_reg updates when counter reaches threshold (FM1) with 1-cycle latency"
        - "rise_det and fall_det are exactly 1-cycle pulses per cycle_model handshake_rules"
        - "Passthrough mode (enable=0) follows FM3: debounce_out = sync_reg delayed 1 cycle"
        - "RTL compiles without errors and passes lint with only declared waivers"
      source_refs: ["function_model.transactions", "cycle_model.pipeline", "cycle_model.handshake_rules", "rtl_contract.state_updates", "features"]
      owner_module: "debouncer_core"
      owner_file: "rtl/debouncer_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS"
      content: "Implement APB-lite register decode, read data mux, write logic, and pslverr for debouncer_regs.sv"
      detail: "Implement APB4 slave interface with zero-wait-state (pready=1 always): decode CTRL/THRESHOLD/STATUS/EDGE_STAT/EDGE_CLR at offsets 0x00-0x10, drive prdata from register fields, handle W1C for EDGE_CLR, generate pslverr for unmapped addresses, output threshold/enable to debouncer_core, capture dbg_out/ctr_msb/rise_latch/fall_latch from debouncer_core."
      criteria:
        - "APB slave interface matches io_list.interfaces.apb_slave protocol rules"
        - "All 5 registers decode correctly at declared offsets"
