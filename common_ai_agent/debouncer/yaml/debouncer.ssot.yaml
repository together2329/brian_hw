test_requirements:
  scenarios:
    - id: "SC1"
      name: "Stable level change (enabled)"
      stimulus: "Set CTRL.enable=1, THRESHOLD=5, drive debounce_in[0] high for >5 cycles"
      expected: "debounce_out[0] transitions 0→1 after threshold; rise_det[0] pulses for 1 cycle; EDGE_STAT.rise_latch[0] set"
      checker: "Scoreboard verifies debounce_out timing, rise_det pulse width, and EDGE_STAT latch"
      coverage: ["FM1", "S3_UPDATE", "FCOV_FM1_STABLE_CHANGE"]
    - id: "SC2"
      name: "Bounce rejection"
      stimulus: "Set CTRL.enable=1, THRESHOLD=10, drive debounce_in[0] high for 5 cycles then low (below threshold)"
      expected: "debounce_out[0] remains 0; no edge detect pulses"
      checker: "Scoreboard verifies debounce_out stability and absence of edge pulses"
      coverage: ["FM2", "FCOV_FM2_BOUNCE_REJECTION"]
    - id: "SC3"
      name: "Passthrough mode"
      stimulus: "Set CTRL.enable=0, toggle debounce_in[0]"
      expected: "debounce_out[0] follows sync_reg[0] with 1-cycle latency; edge detection still active"
      checker: "Scoreboard verifies debounce_out matches sync_reg delayed by 1 cycle"
      coverage: ["FM3", "FCOV_FM3_PASSTHROUGH"]
    - id: "SC4"
      name: "Falling edge detect"
      stimulus: "debounce_out[0] is high; drive debounce_in[0] low for >threshold cycles"
      expected: "debounce_out[0] transitions 1→0; fall_det[0] pulses for 1 cycle; EDGE_STAT.fall_latch[0] set"
      checker: "Scoreboard verifies falling-edge pulse and EDGE_STAT latch"
      coverage: ["FM1", "CCOV_FALL_EDGE"]
    - id: "SC5"
      name: "APB register read/write"
      stimulus: "Write CTRL, THRESHOLD, EDGE_CLR via APB; read STATUS, EDGE_STAT"
      expected: "Register values match writes; STATUS reflects debounce_out; EDGE_CLR clears latches"
      checker: "APB scoreboard verifies read data matches expected register state"
      coverage: ["registers", "ERR_APB_UNMAPPED"]
    - id: "SC6"
      name: "APB error response"
      stimulus: "APB access to unmapped offset (e.g., 0x14)"
      expected: "pslverr=1 during access phase; prdata=0; no register state change"
      checker: "APB error monitor verifies pslverr assertion and register stability"
      coverage: ["ERR_APB_UNMAPPED"]
    - id: "SC7"
      name: "Reset behavior"
      stimulus: "Assert PRESETn while debounce_out is active; deassert and verify state"
      expected: "All state (sync_reg, counter, debounce_out, registers) resets to defined values"
      checker: "Reset monitor verifies all outputs and register state after deassertion"
      coverage: ["reset"]
    - id: "SC8"
      name: "Runtime threshold change"
      stimulus: "Change THRESHOLD while debounce_out_reg differs from sync_reg and counter is counting"
      expected: "New threshold applies immediately to the running counter comparison; counter is NOT reset"
      checker: "Scoreboard verifies counter continues with new threshold value"
      coverage: ["THRESHOLD_dynamic"]
    - id: "SC9"
      name: "Multi-bit independent debounce"
      stimulus: "Drive debounce_in[0] and debounce_in[1] with different timing; DEBOUNCE_WIDTH=2"
      expected: "Each bit debounces independently; edge detects are per-bit"
      checker: "Per-bit scoreboard verifies independent counter and output behavior"
      coverage: ["multi_bit"]
    - id: "SC10"
      name: "Threshold zero behavior"
      stimulus: "Set THRESHOLD=0, CTRL.enable=1, toggle debounce_in"
      expected: "debounce_out follows sync_reg with only synchronizer + 1 cycle latency (effectively passthrough with sync)"
      checker: "Scoreboard verifies output latency matches SYNC_DEPTH + 1"
      coverage: ["threshold_zero"]
  scoreboard_checks: 24
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Cycle-independent behavioral coverage for debounce filter and edge detection."
      bins:
        - { id: "FCOV_FM1_STABLE_CHANGE", source_ref: "function_model.transactions.FM1", class: "transaction", description: "FM1 stable level change observed by scoreboard" }
        - { id: "FCOV_FM2_BOUNCE_REJECTION", source_ref: "function_model.transactions.FM2", class: "transaction", description: "FM2 bounce rejection observed — output unchanged" }
        - { id: "FCOV_FM3_PASSTHROUGH", source_ref: "function_model.transactions.FM3", class: "transaction", description: "FM3 passthrough mode observed" }
        - { id: "FCOV_ERR_APB_UNMAPPED", source_ref: "function_model.transactions.FM1.error_cases.ERR_APB_UNMAPPED", class: "error_case", description: "APB unmapped access error observed with pslverr" }
        - { id: "FCOV_RISE_EDGE", source_ref: "function_model.transactions.FM1.output_rules.rise_det_i", class: "output_rule", description: "Rising-edge detect pulse observed" }
        - { id: "FCOV_FALL_EDGE", source_ref: "function_model.transactions.FM1.output_rules.fall_det_i", class: "output_rule", description: "Falling-edge detect pulse observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency coverage for when debounce state changes."
      bins:
        - { id: "CCOV_SYNC_STAGE", source_ref: "cycle_model.pipeline.S0_SYNC", class: "pipeline_stage", description: "Synchronizer pipeline stage exercised" }
        - { id: "CCOV_COMPARE_STAGE", source_ref: "cycle_model.pipeline.S1_COMPARE", class: "pipeline_stage", description: "Compare stage exercised" }
        - { id: "CCOV_FILTER_STAGE", source_ref: "cycle_model.pipeline.S2_FILTER", class: "pipeline_stage", description: "Filter counting stage exercised" }
        - { id: "CCOV_UPDATE_STAGE", source_ref: "cycle_model.pipeline.S3_UPDATE", class: "pipeline_stage", description: "Output update stage exercised" }
        - { id: "CCOV_RISE_EDGE", source_ref: "cycle_model.handshake_rules", class: "handshake", description: "rise_det 1-cycle pulse rule observed" }
        - { id: "CCOV_FALL_EDGE", source_ref: "cycle_model.handshake_rules", class: "handshake", description: "fall_det 1-cycle pulse rule observed" }
        - { id: "CCOV_PREADY_ALWAYS1", source_ref: "cycle_model.handshake_rules.pready", class: "handshake", description: "Zero-wait-state APB pready rule observed" }
        - { id: "CCOV_PERF_THROUGHPUT", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "Sustained throughput condition exercised" }
        - { id: "CCOV_PERF_DEPTH", source_ref: "cycle_model.performance.depth", class: "depth", description: "Pipeline depth exercised" }
        - { id: "CCOV_PERF_FREQUENCY", source_ref: "cycle_model.performance.frequency_mhz", class: "frequency", description: "50 MHz frequency assumption recorded in coverage evidence" }
    functional: "Legacy alias: function + cycle coverage must both close."
    code: "line >= 90%, branch >= 85%"
    fsm: "N/A — no explicit FSM; counter-based filter"
    assertions: "All APB protocol and debounce timing assertions pass"
quality_gates:
  ssot:
    pass: "All canonical sections present, substantive, internally consistent, no live TBD placeholders."
    evidence: ["check_ssot_disk.sh PASS", "traceability covers function_model/cycle_model/test_requirements"]
