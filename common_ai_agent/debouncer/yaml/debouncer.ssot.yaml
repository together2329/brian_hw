    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/debouncer_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use a default)"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)"
    - "Parameterize widths (no hardcoded numbers except SYNC_DEPTH minimum check)"
    - "Use rtl/debouncer_param.vh for shared parameter declarations when needed; include it inside consuming modules"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam state encoding with logic state/next_state signals"
    - "Synchronizer flops must use async reset and must NOT be optimized away by synthesis (use syn_keep or equivalent attribute)"
  lint_waivers:
    - "UNUSEDSIGNAL: EDGE_CLR write-only register read path tied to zero"
    - "WIDTHEXPAND: counter-to-threshold comparison when COUNTER_WIDTH > thresh_val width"
reuse_modules: []
custom:
  assumptions:
    - { id: "ASM_CLK", description: "PCLK is 50 MHz with 50% duty cycle; jitter is within STA uncertainty budget." }
    - { id: "ASM_RESET", description: "PRESETn is asynchronously asserted and synchronously deasserted relative to PCLK." }
    - { id: "ASM_INPUT_ASYNC", description: "debounce_in is asynchronous to PCLK; it is synchronized inside the IP. No setup/hold requirement on the input." }
    - { id: "ASM_THRESHOLD_RANGE", description: "Software programs THRESHOLD.thresh_val within [1, 2^COUNTER_WIDTH - 1]. A value of 0 results in immediate output update (effectively passthrough with sync latency only)." }
    - { id: "ASM_SINGLE_BIT_DEFAULT", description: "Default DEBOUNCE_WIDTH=1; multi-bit operation is per-bit independent — no cross-bit correlation is assumed." }
    - { id: "ASM_APB_TRUSTED", description: "APB bus master is trusted; no privilege or authentication checks inside the IP." }
    - { id: "ASM_NO_INTERRUPT", description: "No interrupt output in this revision. Edge status is available via EDGE_STAT register polling." }
    - { id: "ASM_EDGE_PULSE_CONSUMER", description: "Consumer of rise_det/fall_det must sample on the same PCLK cycle or use EDGE_STAT latches; pulses are exactly 1 cycle wide." }
    - { id: "ASM_SYNC_DEPTH_MIN", description: "SYNC_DEPTH parameter must be >= 2 for reliable metastability resolution. RTL must assert (generate error) if SYNC_DEPTH < 2." }
  note: "Pipeline-mode assumptions recorded per user directive; not yet confirmed via ask_user."
dir_structure:
