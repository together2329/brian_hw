# =============================================================================
# SSOT — debouncer  (incremental skeleton)
# =============================================================================
ip: debouncer
version: draft
purpose: "Digital input debouncer with configurable stability threshold and per-bit edge detection"
type: peripheral
top_module:
  name: "debouncer"
  file: "rtl/debouncer.sv"
  version: "1.0"
  type: "peripheral"
  description: "Synchronizes and filters noisy digital inputs using a per-bit configurable stability counter; outputs clean debounced signals and rising/falling-edge detect pulses."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "debouncer_regs", file: "rtl/debouncer_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "error_handling"], source_sections: ["registers", "error_handling"], register_refs: ["registers.register_list"], description: "APB-lite register decode, read data mux, write logic, and pslverr generation" }
  - { name: "debouncer_core", file: "rtl/debouncer_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow.sequence"], feature_refs: ["features"], description: "Synchronizer, stability counter, debounce filter, and edge-detect logic per bit" }
decomposition:
  units:
    - { id: "sync", kind: "datapath", source_refs: ["function_model.state_variables.sync_reg"], rtl_candidates: ["debouncer_core"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "filter", kind: "datapath", source_refs: ["function_model.transactions.FM1", "cycle_model.pipeline"], rtl_candidates: ["debouncer_core"], verification_impact: ["coverage_goals.function"] }
    - { id: "edge_detect", kind: "datapath", source_refs: ["function_model.transactions.FM1.output_rules"], rtl_candidates: ["debouncer_core"], verification_impact: ["coverage_goals.function"] }
    - { id: "regs", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["debouncer_regs"], verification_impact: ["test_requirements.scenarios"] }
rtl_contract:
  transaction: "FM1"
  sample_condition: "debounce_out updates on the rising edge after counter reaches threshold"
  input_map:
    raw_input: "debounce_in[DEBOUNCE_WIDTH-1:0]"
    threshold: "registers.THRESHOLD.thresh_val"
    enable: "registers.CTRL.enable"
  output_map:
    debounced_output: "debounce_out[DEBOUNCE_WIDTH-1:0]"
    rise_detect: "rise_det[DEBOUNCE_WIDTH-1:0]"
    fall_detect: "fall_det[DEBOUNCE_WIDTH-1:0]"
    status_state: "registers.STATUS.dbg_out"
  state_updates:
    - { name: "sync_reg", reset: 0, expr: "Synchronized copy of debounce_in after SYNC_DEPTH flop stages; resets to 0" }
    - { name: "counter", reset: 0, expr: "Per-bit stability counter: increments while sync_reg[i] differs from debounce_out_reg[i]; clears to 0 when they match" }
    - { name: "debounce_out_reg", reset: 0, expr: "Holds current debounced output per bit; updates to sync_reg[i] when counter[i] reaches threshold" }
    - { name: "rise_det", reset: 0, expr: "One-cycle pulse when debounce_out_reg[i] transitions 0→1" }
    - { name: "fall_det", reset: 0, expr: "One-cycle pulse when debounce_out_reg[i] transitions 1→0" }
parameters:
  - name: "DEBOUNCE_WIDTH"
    default: 1
    type: int
    description: "Number of independent input bits to debounce"
    drives: ["debouncer_core.sv", "debouncer.sv"]
  - name: "COUNTER_WIDTH"
    default: 16
    type: int
    description: "Bit-width of the per-bit stability counter; determines maximum debounce threshold"
    drives: ["debouncer_core.sv"]
  - name: "SYNC_DEPTH"
    default: 2
    type: int
    description: "Number of synchronizer flop stages for async input (minimum 2)"
    drives: ["debouncer_core.sv"]
  - name: "APB_ADDR_WIDTH"
    default: 8
    type: int
    description: "APB address bus width in bits"
    drives: ["debouncer_regs.sv", "debouncer.sv"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "Single system clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "System reset; asynchronously asserted, synchronously deasserted"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "PRESETn"
      description: "APB-lite CSR interface for runtime configuration"
      protocol:
        setup_phase: "psel=1, penable=0 captures paddr/pwrite/pwdata."
        access_phase: "psel=1, penable=1 completes transfer when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata is sampled in the completing access phase for writes."
        error_rule: "pslverr is asserted with pready=1 for unmapped addresses or unsupported byte-lane accesses."
      ports:
        - { name: "paddr",   width: 8,  direction: "input",  description: "APB address bus" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write/read direction" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB write strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready; always 1 (zero-wait-state)" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB slave error" }
    - name: "debounce_input"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "PRESETn"
      description: "Raw asynchronous digital inputs to be debounced"
      protocol:
        sampling: "Sampled through SYNC_DEPTH synchronizer stages inside debouncer_core."
        stability: "External signal must be stable for at least 2×PCLK periods for reliable capture after synchronization."
        side_effect: "None; read-only input port."
      ports:
        - { name: "debounce_in", width: "DEBOUNCE_WIDTH", direction: "input", description: "Raw input bits to debounce" }
    - name: "debounce_output"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "PRESETn"
      description: "Clean debounced output signals"
      protocol:
        assertion: "debounce_out[i] updates exactly 1 PCLK cycle after the stability counter reaches the programmed threshold for bit i."
        deassertion: "debounce_out[i] remains stable until a new stable opposite-level input satisfies the threshold."
        reset_value: 0
      ports:
        - { name: "debounce_out", width: "DEBOUNCE_WIDTH", direction: "output", description: "Debounced output bits" }
    - name: "edge_detect"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "PRESETn"
      description: "Per-bit rising/falling edge detect pulses"
      protocol:
        pulse_width: "Exactly 1 PCLK cycle."
        timing: "Coincident with the debounce_out transition cycle."
        reset_value: 0
      ports:
        - { name: "rise_det", width: "DEBOUNCE_WIDTH", direction: "output", description: "Rising-edge detect pulse per bit" }
        - { name: "fall_det", width: "DEBOUNCE_WIDTH", direction: "output", description: "Falling-edge detect pulse per bit" }
features:
  - name: "Input synchronization"
    trigger: "Asynchronous debounce_in signal arrives at the PCLK domain boundary."
    datapath: "debounce_in → SYNC_DEPTH stage shift register → sync_reg"
    control: "Continuous; always active regardless of enable"
    output: "sync_reg holds the synchronized version of debounce_in"
  - name: "Stability filtering"
    trigger: "sync_reg[i] differs from debounce_out_reg[i] while enable=1."
    datapath: "counter[i] increments each PCLK cycle while the difference persists; clears to 0 when bits match."
    control: "Counter saturates at threshold value; debounce_out_reg[i] updates on the cycle after counter reaches threshold."
    output: "debounce_out[i] transitions to match sync_reg[i] after threshold consecutive stable samples."
  - name: "Edge detection"
    trigger: "debounce_out_reg[i] value changes on a rising PCLK edge."
    datapath: "Previous debounce_out_reg compared with new value; rise_det asserted for 0→1, fall_det for 1→0."
    control: "Single-cycle pulse; cleared automatically the next cycle."
    output: "rise_det[i] and fall_det[i] one-cycle pulses"
dataflow:
  input_path:
    source: "debounce_in (asynchronous external input)"
    synchronization: "SYNC_DEPTH-stage flop chain clocked by PCLK"
    buffer: "sync_reg (synchronized per-bit value)"
    sequence: "debounce_in → sync_flops[0] → … → sync_flops[SYNC_DEPTH-1] = sync_reg"
  filter_path:
    source: "sync_reg (synchronized input)"
    counter: "Per-bit up-counter; increments while sync_reg[i] != debounce_out_reg[i]"
    threshold: "Programmable via THRESHOLD register"
    sequence: "sync_reg[i] → compare → counter[i] → threshold compare → debounce_out_reg[i] update"
  output_path:
    source: "debounce_out_reg"
    edge_logic: "Previous vs current debounce_out_reg comparison"
    sequence: "debounce_out_reg → compare with prev → rise_det / fall_det pulses"
  sequence:
    - "Synchronize: debounce_in → sync_reg (SYNC_DEPTH cycles latency)"
    - "Compare: sync_reg[i] vs debounce_out_reg[i] per bit"
    - "Count: counter[i] increments when different, clears when same"
    - "Update: debounce_out_reg[i] ← sync_reg[i] when counter[i] == threshold"
    - "Detect: rise_det/fall_det pulse on debounce_out_reg transition"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the debouncer computes independent of cycle timing."
  state_variables:
    - { name: "sync_reg", source: "internal synchronizer output", reset: 0, description: "Synchronized copy of debounce_in after SYNC_DEPTH flop stages" }
    - { name: "counter", source: "internal per-bit counter array", reset: 0, description: "Per-bit stability counter; counts consecutive cycles where sync_reg[i] differs from debounce_out_reg[i]" }
    - { name: "debounce_out_reg", source: "registers.STATUS.dbg_out", reset: 0, description: "Current debounced output per bit" }
    - { name: "prev_out", source: "internal", reset: 0, description: "Previous-cycle debounce_out_reg for edge detection" }
    - { name: "threshold", source: "registers.THRESHOLD.thresh_val", reset: 500, description: "Programmable stability threshold in PCLK cycles" }
    - { name: "enable", source: "registers.CTRL.enable", reset: 0, description: "Global debounce enable; 0 = pass-through of sync_reg, 1 = filtered" }
  transactions:
    - id: "FM1"
      name: "stable_level_change"
      preconditions:
        - "enable == 1"
        - "sync_reg[i] != debounce_out_reg[i]"
        - "counter[i] has incremented to threshold"
      inputs:
        - "sync_reg[i] — the new stable input level after synchronization"
      outputs:
        - "debounce_out_reg[i] becomes sync_reg[i]"
      output_rules:
        - { name: "debounce_out_i", expr: "sync_reg[i]", width: 1, port: "debounce_out", description: "Debounced output bit updates to synchronized input after threshold" }
        - { name: "rise_det_i", expr: "sync_reg[i] && !prev_out[i]", width: 1, port: "rise_det", description: "Rising-edge detect pulse for bit i" }
        - { name: "fall_det_i", expr: "!sync_reg[i] && prev_out[i]", width: 1, port: "fall_det", description: "Falling-edge detect pulse for bit i" }
      side_effects:
        - "counter[i] resets to 0 on the cycle after debounce_out_reg[i] updates"
        - "rise_det[i] pulses for exactly 1 cycle on a 0→1 transition"
        - "fall_det[i] pulses for exactly 1 cycle on a 1→0 transition"
      error_cases:
        - { condition: "APB write to unmapped offset", result: "pslverr asserted for 1 APB access phase; no register state change" }
    - id: "FM2"
      name: "bounce_rejection"
      preconditions:
        - "enable == 1"
        - "sync_reg[i] != debounce_out_reg[i]"
        - "sync_reg[i] reverts to match debounce_out_reg[i] before counter[i] reaches threshold"
      inputs:
        - "sync_reg[i] — transient input level that reverts"
      outputs:
        - "debounce_out_reg[i] unchanged"
      output_rules:
        - { name: "debounce_out_i", expr: "debounce_out_reg[i] (unchanged)", width: 1, port: "debounce_out", description: "Output bit remains at its previous stable value" }
        - { name: "rise_det_i", expr: "0", width: 1, port: "rise_det", description: "No edge detect pulse" }
        - { name: "fall_det_i", expr: "0", width: 1, port: "fall_det", description: "No edge detect pulse" }
      side_effects:
        - "counter[i] resets to 0 when sync_reg[i] reverts to match debounce_out_reg[i]"
      error_cases: []
    - id: "FM3"
      name: "passthrough_mode"
      preconditions:
        - "enable == 0"
      inputs:
        - "sync_reg — synchronized input"
      outputs:
        - "debounce_out_reg[i] equals sync_reg[i] with 1-cycle latency"
      output_rules:
        - { name: "debounce_out_i", expr: "sync_reg[i]", width: 1, port: "debounce_out", description: "Output directly follows synchronized input when debounce is disabled" }
        - { name: "rise_det_i", expr: "sync_reg[i] && !prev_out[i]", width: 1, port: "rise_det", description: "Edge detection remains active in passthrough" }
        - { name: "fall_det_i", expr: "!sync_reg[i] && prev_out[i]", width: 1, port: "fall_det", description: "Edge detection remains active in passthrough" }
      side_effects:
        - "counter held at 0"
        - "Edge detection still active (no debounce filtering)"
      error_cases: []
  invariants:
    - "debounce_out[i] never changes unless counter[i] has reached threshold (when enable=1) or enable transitions from 1 to 0."
    - "rise_det[i] and fall_det[i] are mutually exclusive in the same cycle for the same bit."
    - "After reset, debounce_out is all-zero until the first stable input qualifies."
    - "Synchronizer flops are always active regardless of the enable bit."
  reference_model_hint: "tb-gen should implement a Python model that tracks per-bit counter state and compares debounce_out/edge pulses against expected values for every scenario."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state and outputs change relative to PCLK edges."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for cycle-accurate shell; FunctionalModel as behavioral oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all flip-flops (sync_reg, counter, debounce_out_reg, prev_out, register state)."
    deassertion: "Architectural state is usable on the first rising PCLK edge after synchronized deassertion."
  latency:
    synchronizer: { min_cycles: 2, max_cycles: 2, description: "SYNC_DEPTH=2 flop stages; input appears at sync_reg after exactly 2 PCLK edges" }
    debounce_filter: { min_cycles: 1, max_cycles: 1, description: "debounce_out_reg updates 1 PCLK cycle after counter reaches threshold" }
    edge_detect: { min_cycles: 1, max_cycles: 1, description: "rise_det/fall_det pulse is coincident with debounce_out_reg update cycle" }
    register_read: { min_cycles: 0, max_cycles: 0, description: "Zero-wait-state APB: pready=1 in the same access phase" }
    register_write: { min_cycles: 0, max_cycles: 0, description: "Zero-wait-state APB: pready=1 in the same access phase" }
    total_stable_change: { min_cycles: "SYNC_DEPTH + threshold + 1", max_cycles: "SYNC_DEPTH + threshold + 1", description: "From input transition to debounce_out update: 2 sync + threshold count + 1 register update" }
  handshake_rules:
    - { signal: "PCLK", rule: "All state updates occur on the rising edge of PCLK." }
    - { signal: "PRESETn", rule: "Async assert clears all state; sync deassert allows normal operation." }
    - { signal: "pready", rule: "Always driven 1; zero-wait-state APB — no backpressure on register accesses." }
    - { signal: "debounce_out", rule: "Updates only on the PCLK edge after counter reaches threshold; held stable otherwise." }
    - { signal: "rise_det/fall_det", rule: "Exactly 1 PCLK cycle wide; auto-clears the next cycle." }
  pipeline:
    - { stage: "S0_SYNC", cycle: "0..SYNC_DEPTH-1", action: "Shift debounce_in through SYNC_DEPTH synchronizer flops" }
    - { stage: "S1_COMPARE", cycle: "SYNC_DEPTH", action: "Compare sync_reg with debounce_out_reg; increment or clear per-bit counter" }
    - { stage: "S2_FILTER", cycle: "SYNC_DEPTH+1..SYNC_DEPTH+threshold", action: "Counter increments toward threshold while input remains stable and different from current output" }
    - { stage: "S3_UPDATE", cycle: "SYNC_DEPTH+threshold+1", action: "Latch sync_reg into debounce_out_reg; generate edge pulses" }
  ordering:
    - "Synchronizer output (sync_reg) settles before the compare stage in the same cycle."
    - "Counter update and debounce_out_reg update are mutually exclusive in the same cycle — counter either increments or the output updates."
    - "Edge detect pulse width is exactly 1 cycle; the pulse is generated in the same cycle as the debounce_out update."
  backpressure:
    - "No backpressure in this IP — outputs are purely combinational of registered state. Downstream must sample rise_det/fall_det in the same cycle."
  performance:
    frequency_mhz: 50
    throughput: { sustained_outputs_per_cycle: 1, condition: "At most one bit can complete debounce in a given cycle per bit; multi-bit outputs are independent" }
    outstanding: { read_max: 0, write_max: 0, description: "No outstanding bus transactions; APB is zero-wait-state" }
    depth: { pipeline_stages: 3, queue_depth: 0, description: "Sync(2) + Compare(1) + Update(1) visible stages; no buffering" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "Single system clock domain" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings:
    - { source_domain: "external_async", destination_domain: "pclk", signals: ["debounce_in"], synchronizer: "SYNC_DEPTH-stage flop chain in debouncer_core", notes: "Input is asynchronous; synchronized internally before any logic." }
  synchronizers:
    - { name: "input_sync", type: "flop_chain", stages: "SYNC_DEPTH", signals: ["debounce_in"], location: "debouncer_core" }
  note: "debounce_in is the only async input; it is synchronized inside debouncer_core. All other signals are synchronous to PCLK."
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain (PRESETn); no reset domain crossings."
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Debouncer control register"
      write_side_effects:
        - "Setting enable=1 activates the debounce filter; clearing it causes passthrough of sync_reg to debounce_out."
      fields:
        - { name: "enable", bits: [0, 0], access: "rw", reset: 0, write_effect: "0=passthrough mode, 1=debounce filter active", description: "Global debounce enable" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "THRESHOLD"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x000001F4
      category: "control"
      description: "Stability threshold in PCLK cycles (default 500 = 10 ms at 50 MHz)"
      write_side_effects:
        - "New threshold value takes effect on the next counter cycle; running counters are NOT reset by a threshold change."
      fields:
        - { name: "thresh_val", bits: [15, 0], access: "rw", reset: 500, write_effect: "Updates stability threshold; counters continue with new value on next comparison", description: "Debounce threshold in PCLK cycles" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x08
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Current debounced output state and counter status"
      fields:
        - { name: "dbg_out", bits: [7, 0], access: "ro", reset: 0, description: "Current debounce_out value (lower DEBOUNCE_WIDTH bits are valid)" }
        - { name: "ctr_msb", bits: [23, 8], access: "ro", reset: 0, description: "Counter[0] value debug — MSB portion for observability" }
        - { name: "reserved_31_24", bits: [31, 24], access: "reserved", reset: 0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "EDGE_STAT"
      offset: 0x0C
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Latched edge-detect status (sticky until cleared via EDGE_CLR)"
      fields:
        - { name: "rise_latch", bits: [7, 0], access: "ro", reset: 0, description: "Latched rising-edge detect per bit (sticky)" }
        - { name: "fall_latch", bits: [15, 8], access: "ro", reset: 0, description: "Latched falling-edge detect per bit (sticky)" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "EDGE_CLR"
      offset: 0x10
      width: 32
      access: "wo"
      reset: 0x00000000
      category: "control"
      description: "Write-1-to-clear edge latches"
      write_side_effects:
        - "Writing 1 to rise_clr[i] clears EDGE_STAT.rise_latch[i]."
        - "Writing 1 to fall_clr[i] clears EDGE_STAT.fall_latch[i]."
        - "Writing 0 has no effect. Read returns 0."
      fields:
        - { name: "rise_clr", bits: [7, 0], access: "wo", reset: 0, write_effect: "W1C: clears corresponding EDGE_STAT.rise_latch bits", description: "Rising-edge latch clear" }
        - { name: "fall_clr", bits: [15, 8], access: "wo", reset: 0, write_effect: "W1C: clears corresponding EDGE_STAT.fall_latch bits", description: "Falling-edge latch clear" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances: []
  note: "No SRAM/FIFO/register-file instances. All storage is in individual flip-flop registers (sync_reg, counter, debounce_out_reg, prev_out)."
interrupts:
  sources: []
  output:
    signal: null
    polarity: null
    type: null
    note: "No interrupt output in this revision. Edge detect pulses (rise_det/fall_det) and latched status (EDGE_STAT) are available for polling or external interrupt controller connection."
fsm:
  per_bit_counter_fsm:
    note: "The debounce filter is counter-based, not FSM-based. Each bit has an independent up-counter that increments toward threshold. No explicit FSM states are required — the behavior is described by function_model transactions and cycle_model pipeline stages."
    implicit_states:
      - "MATCHED: sync_reg[i] == debounce_out_reg[i] — counter[i] == 0"
      - "COUNTING: sync_reg[i] != debounce_out_reg[i] — counter[i] incrementing"
      - "SATURATED: counter[i] == threshold — debounce_out_reg[i] updates next cycle"
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.5 }
  latency_budget:
    synchronizer_cycles: { min: 2, max: 2, measured_from: "debounce_in transition", measured_to: "sync_reg stable", note: "SYNC_DEPTH=2 fixed" }
    debounce_filter_cycles: { min: 1, max: 1, measured_from: "counter == threshold", measured_to: "debounce_out update", note: "1-cycle registered output" }
    total_debounce_cycles: { min: 3, max: 65538, measured_from: "debounce_in transition", measured_to: "debounce_out update", note: "SYNC_DEPTH + threshold + 1" }
    register_access_cycles: { min: 1, max: 2, measured_from: "psel && !penable", measured_to: "pready", note: "Zero-wait-state: pready=1 during access phase" }
  throughput:
    sustained_outputs_per_cycle: 1
    conditions: "At most one debounce completion per bit per cycle; multi-bit outputs are independent"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "debounce_in", clock: "PCLK", delay_ns: null, source: "async input — no setup/hold requirement relative to PCLK; synchronized internally" }
      - { ports: "apb_slave_inputs", clock: "PCLK", delay_ns: 2.0, source: "system-level APB timing budget" }
    outputs:
      - { ports: "debounce_out rise_det fall_det", clock: "PCLK", delay_ns: 2.0, source: "system-level output timing budget" }
      - { ports: "prdata pready pslverr", clock: "PCLK", delay_ns: 2.0, source: "system-level APB timing budget" }
  false_paths:
    - { from: "debounce_in", to: "sync_flops", reason: "asynchronous input captured through synchronizer" }
    - { from: "PRESETn", to: "all_flops", reason: "async reset assertion path" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["pclk"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "Small peripheral; no explicit low-power mode in this revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["All debounce and register behavior active"] }
    - { name: "RESET", entry: "PRESETn asserted", exit: "PRESETn deasserted", guarantees: ["All state cleared; outputs driven to reset values"] }
  upf_required: false
security:
  classification: "non_secure_control_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "debounce_threshold", protection: "RW register; no hardware protection — assumes trusted APB bus master" }
  threat_model:
    - { threat: "illegal APB write to unmapped address", mitigation: "pslverr asserted; no state change" }
    - { threat: "glitch on debounce_in", mitigation: "Synchronizer + debounce filter inherently rejects sub-threshold glitches" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels."
  safety_goals:
    - "No metastable value propagates past the synchronizer chain."
    - "Edge detect pulses are never lost due to output update collisions."
error_handling:
  error_sources:
    - { id: "ERR_APB_UNMAPPED", condition: "APB access to address not in register_map offsets (0x00-0x10)", architectural_effect: "pslverr=1 for 1 access phase; prdata=0; no register state change" }
    - { id: "ERR_APB_WIDTH", condition: "APB write to THRESHOLD with thresh_val exceeding COUNTER_WIDTH range", architectural_effect: "Value is stored as-is; counter saturates at maximum COUNTER_WIDTH value — no overflow error" }
  propagation:
    - "pslverr is driven for exactly 1 APB access phase; it is a combinatorial output gated by psel && penable."
    - "No sticky error state is maintained; each error is per-transaction."
  recovery:
    - { action: "none required", clears: [], preserves: ["all register state"] }
debug_observability:
  waveform_must_probe:
    - "debounce_in"
    - "sync_reg"
    - "counter[0]"
    - "debounce_out_reg"
    - "debounce_out"
    - "rise_det"
    - "fall_det"
    - "PRESETn"
    - "CTRL.enable"
    - "THRESHOLD.thresh_val"
  status_outputs:
    - { name: "STATUS.dbg_out", description: "Current debounce_out state visible via APB read" }
    - { name: "STATUS.ctr_msb", description: "Counter[0] MSB for debug observability" }
  trace_events:
    - { name: "debounce_complete", trigger: "debounce_out_reg[i] updates for any bit i" }
    - { name: "edge_rise", trigger: "rise_det[i] pulse for any bit i" }
    - { name: "edge_fall", trigger: "fall_det[i] pulse for any bit i" }
  debug_registers:
    - "STATUS"
    - "EDGE_STAT"
integration:
  bus_attachment:
    control: "APB4 slave (zero-wait-state)"
    data: "None — debounce signals are direct top-level ports"
  connections:
    - { module: "debouncer_core", port: "clk_i", signal: "PCLK" }
    - { module: "debouncer_core", port: "rst_ni", signal: "PRESETn" }
    - { module: "debouncer_core", port: "debounce_in_i", signal: "debounce_in" }
    - { module: "debouncer_core", port: "debounce_out_o", signal: "debounce_out" }
    - { module: "debouncer_core", port: "rise_det_o", signal: "rise_det" }
    - { module: "debouncer_core", port: "fall_det_o", signal: "fall_det" }
    - { module: "debouncer_core", port: "threshold_i", signal: "thresh_val (from debouncer_regs)" }
    - { module: "debouncer_core", port: "enable_i", signal: "enable (from debouncer_regs)" }
    - { module: "debouncer_core", port: "dbg_out_o", signal: "STATUS.dbg_out (to debouncer_regs)" }
    - { module: "debouncer_core", port: "ctr_msb_o", signal: "STATUS.ctr_msb (to debouncer_regs)" }
    - { module: "debouncer_core", port: "rise_latch_o", signal: "rise_latch (to debouncer_regs)" }
    - { module: "debouncer_core", port: "fall_latch_o", signal: "fall_latch (to debouncer_regs)" }
    - { module: "debouncer_core", port: "edge_clr_i", signal: "edge_clr (from debouncer_regs)" }
    - { module: "debouncer_regs", port: "clk_i", signal: "PCLK" }
    - { module: "debouncer_regs", port: "rst_ni", signal: "PRESETn" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "pslverr for unmapped APB offset"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC must connect debounce_in to the external pin/pad with appropriate I/O cell."
    - "rise_det and fall_det are single-cycle pulses; connect to edge-sensitive capture logic or latch externally."
    - "EDGE_STAT provides sticky latched versions of edge events for polling."
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
    registers: "All registers accessible via APB in functional mode"
  observability:
    required_internal_points: ["sync_reg", "counter[0]", "debounce_out_reg"]
  mbist_required: false
  notes: "No SRAM macro; all storage in flip-flops."
synthesis:
  dialect: "systemverilog_2012"
  top_module: "debouncer"
  technology:
    pdk: "sky130"
    standard_cell_library: "sky130_fd_sc_hd"
    liberty_corner: "ss_100C_1v40"
    liberty_env: "SKY130_LIB"
    lef_env: "SKY130_LEF"
    tech_lef_env: "SKY130_TLEF"
    rcx_rules_env: "SKY130_RCX_RULES"
  constraints:
    - "No inferred latches"
    - "All flops reset according to clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs in generated RTL"
    - "SYNC_DEPTH >= 2 enforced by parameter assertion"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
