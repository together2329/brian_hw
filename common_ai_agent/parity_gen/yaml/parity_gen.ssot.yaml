# =============================================================================
# SSOT — parity_gen (Parity Generator / Checker)
# =============================================================================
ip: parity_gen
version: "1.0"
purpose: "Configurable parity generator and checker with APB-lite CSR, parameterized data width, and 1-cycle registered latency."
type: "peripheral"
top_module:
  name: "parity_gen"
  file: "rtl/parity_gen.sv"
  version: "1.0"
  type: "peripheral"
  description: "Configurable parity generator and checker with APB-lite CSR, parameterized data width, and 1-cycle registered pipeline latency."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "parity_gen_regs", file: "rtl/parity_gen_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "interrupts", "error_handling"], source_sections: ["registers", "interrupts", "error_handling"], register_refs: ["registers.register_list"], description: "APB-lite register decode, storage, and interrupt status" }
  - { name: "parity_gen_core", file: "rtl/parity_gen_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow.generate_path", "dataflow.check_path"], feature_refs: ["features"], description: "Parity XOR-tree datapath, streaming handshake, and mode control" }
decomposition:
  units:
    - { id: "csr_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["parity_gen_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "parity_compute", kind: "datapath", source_refs: ["function_model.transactions.FM1", "function_model.transactions.FM2", "cycle_model.pipeline"], rtl_candidates: ["parity_gen_core"], verification_impact: ["coverage_goals.function", "coverage_goals.cycle"] }
parameters:
  - name: "DATA_WIDTH"
    default: 32
    type: int
    description: "Data bus width in bits; parity is computed over this many bits"
    drives: ["parity_gen_core.sv", "parity_gen.sv"]
  - name: "PARITY_TYPE"
    default: 0
    type: int
    description: "Default parity polarity: 0=even, 1=odd. Overridable at runtime via CTRL.parity_sel"
    drives: ["parity_gen_core.sv"]
  - name: "APB_ADDR_WIDTH"
    default: 8
    type: int
    description: "APB address width in bits"
    drives: ["parity_gen_regs.sv"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Single system clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "System reset, async assert, sync deassert"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB-lite"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "APB-lite CSR interface for runtime configuration"
      protocol:
        setup_phase: "psel=1, penable=0 captures address and control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata is sampled in the completing access phase for writes."
        error_rule: "pslverr asserted only with pready=1 for unsupported addresses."
      ports:
        - { name: "PADDR",   width: 8,  direction: "input",  description: "APB address bus" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write direction" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PSTRB",   width: 4,  direction: "input",  description: "APB write strobes" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB transfer ready" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB slave error" }
    - name: "data_in"
      type: "valid-ready"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Streaming data input for parity generation"
      protocol:
        valid_rule: "data_valid_i held high until data_ready_o is sampled high on a rising edge."
        data_rule: "data_i must be stable while data_valid_i is asserted and not yet accepted."
      ports:
        - { name: "data_i",       width: "DATA_WIDTH", direction: "input",  description: "Input data word for parity generation" }
        - { name: "data_valid_i", width: 1,            direction: "input",  description: "Input data valid" }
        - { name: "data_ready_o", width: 1,            direction: "output", description: "Input data ready (backpressure)" }
    - name: "data_out"
      type: "valid-ready"
      role: "master"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Streaming data+parity output from generation path"
      protocol:
        valid_rule: "data_valid_o held high until data_ready_i is sampled high on a rising edge."
        data_rule: "data_o and parity_o must be stable while data_valid_o is asserted and not yet accepted."
      ports:
        - { name: "data_o",       width: "DATA_WIDTH", direction: "output", description: "Output data word (same as input, 1-cycle delayed)" }
        - { name: "parity_o",     width: 1,            direction: "output", description: "Computed parity bit for data_o" }
        - { name: "data_valid_o", width: 1,            direction: "output", description: "Output data+parity valid" }
        - { name: "data_ready_i", width: 1,            direction: "input",  description: "Downstream ready (backpressure)" }
    - name: "check_in"
      type: "valid-ready"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Streaming data+parity input for parity checking"
      protocol:
        valid_rule: "chk_valid_i held high until chk_ready_o is sampled high on a rising edge."
        data_rule: "chk_data_i and chk_par_i must be stable while chk_valid_i is asserted and not yet accepted."
      ports:
        - { name: "chk_data_i",   width: "DATA_WIDTH", direction: "input",  description: "Input data word for parity check" }
        - { name: "chk_par_i",    width: 1,            direction: "input",  description: "Input parity bit to verify" }
        - { name: "chk_valid_i",  width: 1,            direction: "input",  description: "Check input valid" }
        - { name: "chk_ready_o",  width: 1,            direction: "output", description: "Check input ready (backpressure)" }
    - name: "check_result"
      type: "valid-ready"
      role: "master"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Parity check result output"
      protocol:
        valid_rule: "chk_err_valid_o held high until chk_err_ready_i is sampled high on a rising edge."
        data_rule: "chk_err_o must be stable while chk_err_valid_o is asserted and not yet accepted."
      ports:
        - { name: "chk_err_o",        width: 1, direction: "output", description: "Parity error flag: 1=mismatch detected" }
        - { name: "chk_err_valid_o",  width: 1, direction: "output", description: "Check error valid" }
        - { name: "chk_err_ready_i",  width: 1, direction: "input",  description: "Downstream ready for check error" }
    - name: "interrupt"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Parity error interrupt output"
      protocol:
        assertion: "parity_irq reflects enabled pending parity error status."
        deassertion: "parity_irq deasserts after the corresponding W1C status clear."
        reset_value: 0
      ports:
        - { name: "parity_irq", width: 1, direction: "output", description: "Parity error interrupt (active-high level)" }
features:
  - name: "Parity Generation"
    trigger: "data_valid_i && data_ready_o handshake on data_in interface when CTRL.enable=1 and CTRL.mode=0 (generate)"
    datapath: "data_i → XOR-reduce tree → registered parity_o; data_o = data_i delayed 1 cycle"
    control: "Pipeline passes through one register stage; output presented on data_out interface"
    output: "data_o (DATA_WIDTH bits, same as input), parity_o (1 bit), via data_out valid-ready interface"
  - name: "Parity Check"
    trigger: "chk_valid_i && chk_ready_o handshake on check_in interface when CTRL.enable=1 and CTRL.mode=1 (check)"
    datapath: "chk_data_i → XOR-reduce tree → compare with chk_par_i → chk_err_o"
    control: "Single registered stage; compare result on check_result interface"
    output: "chk_err_o (1=parity mismatch, 0=match) via check_result valid-ready interface"
  - name: "Runtime Configuration"
    trigger: "APB write to CTRL register"
    datapath: "CTRL.enable, CTRL.mode, CTRL.parity_sel, CTRL.irq_en updated immediately on APB write completion"
    control: "Configuration takes effect on the next data/check handshake cycle after APB write completes"
    output: "Internal config signals routed to parity_gen_core"
  - name: "Error Counter and Interrupt"
    trigger: "chk_err_o assertion on a check-mode handshake"
    datapath: "ERR_COUNT increments (saturating at 0xFFFF); STATUS.par_err_sticky latched; parity_irq raised if CTRL.irq_en=1"
    control: "Sticky status cleared by APB W1C write to STATUS; counter cleared by APB write of 0 to ERR_COUNT"
    output: "parity_irq (level, active-high)"
dataflow:
  generate_path:
    source: "data_i (streaming input via data_in interface)"
    operation: "XOR-reduce all DATA_WIDTH bits; invert if parity_sel=odd"
    buffer: "Output pipeline register (1-cycle latency)"
    sequence: "data_i + data_valid_i → XOR tree → register → data_o + parity_o + data_valid_o"
  check_path:
    source: "chk_data_i + chk_par_i (streaming input via check_in interface)"
    operation: "XOR-reduce chk_data_i; compare result with chk_par_i via XOR; invert if parity_sel=odd"
    buffer: "Output pipeline register (1-cycle latency)"
    sequence: "chk_data_i + chk_par_i + chk_valid_i → XOR tree + compare → register → chk_err_o + chk_err_valid_o"
  config_path:
    source: "APB write to CTRL register"
    operation: "Update enable, mode, parity_sel, irq_en signals"
    sequence: "APB write → register storage → config outputs to parity_gen_core on next cycle"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what parity_gen computes independent of cycle timing."
  state_variables:
    - { name: "ctrl_enable", source: "registers.CTRL.enable", reset: 0, description: "Global enable; data/check paths active only when 1" }
    - { name: "ctrl_mode", source: "registers.CTRL.mode", reset: 0, description: "0=generate parity, 1=check parity" }
    - { name: "ctrl_parity_sel", source: "registers.CTRL.parity_sel", reset: "PARITY_TYPE parameter", description: "0=even parity, 1=odd parity" }
    - { name: "ctrl_irq_en", source: "registers.CTRL.irq_en", reset: 0, description: "Interrupt enable for parity errors" }
    - { name: "status_par_err_sticky", source: "registers.STATUS.par_err_sticky", reset: 0, description: "Latched parity error flag (W1C clear)" }
    - { name: "err_count", source: "registers.ERR_COUNT.err_count", reset: 0, description: "Saturating parity error counter" }
    - { name: "last_parity", source: "registers.PARITY_OUT.par_bit", reset: 0, description: "Last generated parity bit (RO)" }
  transactions:
    - id: "FM1"
      name: "parity_generate"
      preconditions:
        - "ctrl_enable == 1"
        - "ctrl_mode == 0 (generate mode)"
        - "data_valid_i && data_ready_o handshake completes"
      inputs:
        - "data_i[DATA_WIDTH-1:0]"
      outputs:
        - "data_o = data_i (1-cycle delayed)"
        - "parity_o = ^data_i when parity_sel=even, ~(^data_i) when parity_sel=odd"
        - "data_valid_o asserted 1 cycle after input handshake"
      output_rules:
        - { name: "data_out", expr: "data_i (registered passthrough)", width: "DATA_WIDTH", port: "data_o" }
        - { name: "parity_bit", expr: "^data_i ^ parity_sel (XOR-reduce of data_i, inverted when parity_sel=1)", width: 1, port: "parity_o" }
        - { name: "valid_out", expr: "1'b1 on cycle N+1 if handshake on cycle N and ctrl_enable=1", width: 1, port: "data_valid_o" }
      state_updates:
        - { name: "last_parity", reset: 0, expr: "parity_o (XOR-reduce result stored to PARITY_OUT register)" }
      side_effects:
        - "PARITY_OUT register updated with new parity bit"
      error_cases:
        - { condition: "ctrl_enable == 0 when data_valid_i asserted", result: "data_ready_o deasserted (backpressure); no output produced" }
    - id: "FM2"
      name: "parity_check"
      preconditions:
        - "ctrl_enable == 1"
        - "ctrl_mode == 1 (check mode)"
        - "chk_valid_i && chk_ready_o handshake completes"
      inputs:
        - "chk_data_i[DATA_WIDTH-1:0]"
        - "chk_par_i (input parity bit)"
      outputs:
        - "chk_err_o = (^chk_data_i ^ parity_sel) != chk_par_i ? 1 : 0"
        - "chk_err_valid_o asserted 1 cycle after input handshake"
      output_rules:
        - { name: "parity_error", expr: "(^chk_data_i ^ parity_sel) ^ chk_par_i (1=mismatch)", width: 1, port: "chk_err_o" }
        - { name: "err_valid", expr: "1'b1 on cycle N+1 if handshake on cycle N and ctrl_enable=1", width: 1, port: "chk_err_valid_o" }
      state_updates:
        - { name: "status_par_err_sticky", reset: 0, expr: "status_par_err_sticky | chk_err_o (latched, W1C clear)" }
        - { name: "err_count", reset: 0, expr: "err_count + chk_err_o (saturating at 0xFFFF)" }
      side_effects:
        - "If chk_err_o == 1 and ctrl_irq_en == 1, parity_irq is asserted"
        - "ERR_COUNT increments on every error"
        - "STATUS.par_err_sticky latches and holds until W1C clear"
      error_cases:
        - { condition: "chk_err_o == 1", result: "ERR_COUNT incremented, STATUS.par_err_sticky latched, parity_irq asserted if enabled" }
        - { condition: "ctrl_enable == 0 when chk_valid_i asserted", result: "chk_ready_o deasserted (backpressure); no check performed" }
    - id: "FM3"
      name: "csr_config"
      preconditions:
        - "APB write with PSEL=1, PENABLE=1, PWRITE=1, PREADY=1"
      inputs:
        - "PWDATA written to CTRL register"
      outputs:
        - "ctrl_enable, ctrl_mode, ctrl_parity_sel, ctrl_irq_en updated"
      state_updates:
        - { name: "ctrl_enable", reset: 0, expr: "PWDATA[0]" }
        - { name: "ctrl_mode", reset: 0, expr: "PWDATA[1]" }
        - { name: "ctrl_parity_sel", reset: "PARITY_TYPE parameter", expr: "PWDATA[2]" }
        - { name: "ctrl_irq_en", reset: 0, expr: "PWDATA[3]" }
      side_effects:
        - "Config change takes effect on next data/check handshake cycle"
      error_cases:
        - { condition: "APB write to unsupported address", result: "PSLVERR asserted with PREADY=1; no side effects" }
  invariants:
    - "data_o always equals the input data_i delayed by exactly 1 clock cycle when enabled."
    - "parity_o reflects the XOR-reduce of data_o (not data_i) when parity_sel=even."
    - "ERR_COUNT never wraps around; it saturates at 0xFFFF."
    - "parity_irq reflects (status_par_err_sticky && ctrl_irq_en); it deasserts only after W1C clear."
    - "When ctrl_enable=0, both generate and check paths apply backpressure (ready_o deasserted) and produce no output."
  reference_model_hint: "tb-gen should implement a Python scoreboard that XOR-reduces input data, compares with parity bit for check mode, and verifies every output_rules expression, state_update transition, and invariant for each scenario."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, valid/ready, outputs, and interrupts may change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all architectural state (registers, pipeline flops, error counter, sticky status)"
    deassertion: "State is usable on the first rising edge after synchronized deassertion"
  latency:
    apb_read: { min_cycles: 0, max_cycles: 1, description: "Zero-wait-state APB read: pready=1 on access phase" }
    apb_write: { min_cycles: 0, max_cycles: 1, description: "Zero-wait-state APB write: pready=1 on access phase" }
    parity_generate: { min_cycles: 1, max_cycles: null, description: "Fixed 1-cycle compute latency; output duration depends on downstream backpressure" }
    parity_check: { min_cycles: 1, max_cycles: null, description: "Fixed 1-cycle compute latency; output duration depends on downstream backpressure" }
  handshake_rules:
    - { signal: "data_valid_i", rule: "Hold high until data_ready_o is sampled high on a rising PCLK edge." }
    - { signal: "data_ready_o", rule: "Assert when pipeline can accept a new word; deassert when pipeline is full or disabled." }
    - { signal: "data_valid_o", rule: "Hold high until data_ready_i is sampled high on a rising PCLK edge." }
    - { signal: "chk_valid_i", rule: "Hold high until chk_ready_o is sampled high on a rising PCLK edge." }
    - { signal: "chk_err_valid_o", rule: "Hold high until chk_err_ready_i is sampled high on a rising PCLK edge." }
  pipeline:
    - { stage: "S0_SAMPLE", cycle: "N", action: "Sample data_i/chk_data_i+chk_par_i on input handshake; compute XOR-reduce combinational" }
    - { stage: "S1_OUTPUT", cycle: "N+1", action: "Register and drive data_o+parity_o or chk_err_o on output interface; update status/counter/IRQ" }
  ordering:
    - "Output data/parity/check-error is available exactly 1 cycle after the input handshake."
    - "ERR_COUNT and STATUS updates occur on the same rising edge as the output register stage."
    - "parity_irq assertion occurs on the same rising edge as the status update."
  backpressure:
    - "If downstream ready (data_ready_i or chk_err_ready_i) is deasserted, the output stage holds valid high and pipeline stalls; no new input handshake accepted until stall clears."
  performance:
    frequency_mhz: 50
    throughput: { sustained_words_per_cycle: 1, condition: "No downstream backpressure on output interfaces" }
    outstanding: { read_max: 1, write_max: 1, description: "Single pipeline stage; one word in flight" }
    depth: { pipeline_stages: 1, queue_depth: 0, description: "Single registered stage; no internal FIFO" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Single system clock domain" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control register — mode, parity select, enable, interrupt enable"
      write_side_effects:
        - "Writing CTRL fields takes effect on the next streaming handshake after the APB write completes."
      fields:
        - { name: "enable", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "Enable/disable data and check paths", description: "Global enable: 0=disabled (backpressure applied), 1=enabled" }
        - { name: "mode", bits: [1, 1], access: "rw", reset: 0x0, write_effect: "Select generate vs check mode", description: "Mode select: 0=parity generate, 1=parity check" }
        - { name: "parity_sel", bits: [2, 2], access: "rw", reset: 0x0, write_effect: "Select even vs odd parity polarity", description: "Parity polarity: 0=even, 1=odd" }
        - { name: "irq_en", bits: [3, 3], access: "rw", reset: 0x0, write_effect: "Enable/disable parity error interrupt", description: "Interrupt enable for parity errors" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Status register — parity error sticky flag"
      write_side_effects:
        - "Writing 1 to par_err_sticky clears it (W1C). Writing 0 has no effect."
      fields:
        - { name: "par_err_sticky", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "W1C: write 1 to clear", description: "Sticky parity error flag (latched on any check error, cleared by W1C)" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "ERR_COUNT"
      offset: 0x08
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Parity error counter — saturating at 0xFFFF"
      write_side_effects:
        - "Writing 0 clears the error counter. Writing any non-zero value is ignored."
      fields:
        - { name: "err_count", bits: [15, 0], access: "rw", reset: 0x0000, write_effect: "Write 0 to clear", description: "Number of parity errors detected (saturating at 0xFFFF)" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "PARITY_OUT"
      offset: 0x0C
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Last generated parity bit (read-only)"
      fields:
        - { name: "par_bit", bits: [0, 0], access: "ro", reset: 0x0, description: "Last computed parity bit from generate path" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances:
    - { name: "data_reg", type: "register", depth: 1, width: "DATA_WIDTH", read_ports: 1, write_ports: 1, latency: 0, description: "Output pipeline data register" }
    - { name: "parity_reg", type: "register", depth: 1, width: 1, read_ports: 1, write_ports: 1, latency: 0, description: "Output pipeline parity/error register" }
  note: "No SRAM or FIFO; only pipeline registers."
interrupts:
  sources:
    - { name: "PARITY_ERR", bit: 0, type: "level", enable_reg: "CTRL.irq_en", status_reg: "STATUS.par_err_sticky", clear: "W1C", description: "Parity error detected in check mode" }
  output:
    signal: "parity_irq"
    polarity: "active_high"
    type: "level"
fsm:
  parity_pipeline:
    states:
      - "IDLE"
      - "SAMPLED"
    transitions:
      - { from: "IDLE", to: "SAMPLED", condition: "input handshake (data_valid_i&&data_ready_o or chk_valid_i&&chk_ready_o) with ctrl_enable=1" }
      - { from: "SAMPLED", to: "IDLE", condition: "output handshake completes (downstream ready) or no input pending" }
    note: "Simple 2-state pipeline FSM; not a complex controller — parity compute is combinational between sample and output registers"

rtl_contract:
  transaction: "FM1 and FM2"
  sample_condition: "input valid/ready handshake completes when enabled"
  input_map:
    generate_data: "data_i[DATA_WIDTH-1:0]"
    check_data: "chk_data_i[DATA_WIDTH-1:0]"
    check_parity: "chk_par_i"
    config: "CTRL register fields"
  output_map:
    generate_data_out: "data_o[DATA_WIDTH-1:0]"
    generate_parity: "parity_o"
    check_error: "chk_err_o"
    interrupt: "parity_irq"
  state_updates:
    - { name: "last_parity", reset: 0, expr: "^data_i ^ parity_sel (generate path)" }
    - { name: "status_par_err_sticky", reset: 0, expr: "status_par_err_sticky | chk_err_o (W1C clear)" }
    - { name: "err_count", reset: 0, expr: "err_count + chk_err_o (saturating at 0xFFFF)" }

timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 1.0 }
  latency_budget:
    register_access_cycles: { min: 1, max: 2, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
    parity_compute_cycles: { min: 1, max: 1, measured_from: "input handshake", measured_to: "output data/parity valid" }
    interrupt_latency_cycles: { min: 1, max: 2, measured_from: "parity error detection", measured_to: "parity_irq assertion" }
  throughput:
    sustained_words_per_cycle: 1
    conditions: "No downstream backpressure"
  io_delays:
    inputs:
      - { ports: "all_inputs_except_PCLK_PRESETn", clock: "PCLK", delay_ns: 2.0, source: "50MHz timing budget" }
    outputs:
      - { ports: "all_outputs", clock: "PCLK", delay_ns: 2.0, source: "50MHz timing budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt"]

power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "Simple combinational parity; no explicit low-power mode"
  reset_retention:
    retention_required: false
  power_states:
    - { name: "ON", entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["All paths active"] }
  upf_required: false

security:
  classification: "non_secure_control_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO/W1C access policy in registers.register_list" }
    - { threat: "silent parity error", mitigation: "error_handling and interrupt status retain error until software clear" }
  privilege_model: "External bus fabric enforces privilege"
  safety_goals:
    - "No silent data corruption on parity mismatch"
    - "Parity error state is software-visible and interruptible"

error_handling:
  error_sources:
    - { id: "ERR_PARITY_MISMATCH", condition: "XOR-reduce of chk_data_i (adjusted for parity_sel) != chk_par_i", architectural_effect: "chk_err_o=1, STATUS.par_err_sticky latched, ERR_COUNT incremented, parity_irq raised if CTRL.irq_en=1" }
    - { id: "ERR_DISABLED_ACCESS", condition: "data_valid_i or chk_valid_i asserted when CTRL.enable=0", architectural_effect: "ready_o deasserted (backpressure); no data consumed" }
    - { id: "ERR_APB_UNSUPPORTED", condition: "APB access to unmapped address", architectural_effect: "PSLVERR asserted with PREADY=1" }
  propagation:
    - "First parity error wins until software W1C clear."
    - "ERR_COUNT saturates at 0xFFFF and does not wrap."
  recovery:
    - { action: "software W1C to STATUS.par_err_sticky", clears: ["STATUS.par_err_sticky", "parity_irq if no other errors"], preserves: ["CTRL", "ERR_COUNT (separate clear)"] }
    - { action: "software write 0 to ERR_COUNT", clears: ["ERR_COUNT"], preserves: ["all other registers"] }

debug_observability:
  waveform_must_probe:
    - "data_i, data_o, parity_o, data_valid_i, data_ready_o, data_valid_o, data_ready_i"
    - "chk_data_i, chk_par_i, chk_err_o, chk_valid_i, chk_ready_o, chk_err_valid_o"
    - "parity_irq"
  status_outputs:
    - "STATUS.par_err_sticky (readable via APB)"
    - "ERR_COUNT.err_count (readable via APB)"
    - "PARITY_OUT.par_bit (readable via APB)"
  trace_events:
    - { name: "generate_handshake", trigger: "data_valid_i && data_ready_o" }
    - { name: "check_error", trigger: "chk_err_o == 1" }
    - { name: "irq_assert", trigger: "parity_irq rising edge" }
  debug_registers:
    - "PARITY_OUT"
    - "ERR_COUNT"
    - "STATUS"

integration:
  bus_attachment:
    control: "APB-lite slave (CSR access)"
    data: "Streaming valid-ready interfaces (data_in, data_out, check_in, check_result)"
  connections:
    - { module: "parity_gen_regs", port: "clk_i", signal: "PCLK" }
    - { module: "parity_gen_regs", port: "rst_ni", signal: "PRESETn" }
    - { module: "parity_gen_core", port: "clk_i", signal: "PCLK" }
    - { module: "parity_gen_core", port: "rst_ni", signal: "PRESETn" }
    - { module: "parity_gen_regs", port: "irq_o", signal: "parity_irq" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "PSLVERR for unsupported APB addresses"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC interconnect must drive APB-lite protocol correctly."
    - "Streaming interfaces use standard valid-ready handshake."

dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
  observability:
    required_internal_points: ["pipeline registers", "error counter", "sticky status"]
  mbist_required: false
  notes: "No SRAM macro; DFT limited to scan insertion if required by SoC flow."

synthesis:
  dialect: "systemverilog_2012"
  top_module: "parity_gen"
  technology:
    pdk: "generic"
    standard_cell_library: "generic"
  constraints:
    - "No inferred latches"
    - "All flops reset per clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/parity_gen.json or syn/out/parity_gen.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"

pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers: { horizontal: "met3", vertical: "met2" }
  cts: { buf_list: [] }
  routing: { signal_layers: { min: "met1", max: "met5" }, drc_waivers: [] }
  required_outputs:
    - "pnr/out/placed.def"
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"

coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/parity_gen_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk …)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
  lint_waivers:
    - "UNUSEDSIGNAL: explicit tie-offs only"
    - "WIDTHEXPAND: DATA_WIDTH parameterized indexing"

reuse_modules: []

custom:
  assumptions:
    - "DATA_WIDTH must be a positive power of 2 or multiple of 8 for practical parity computation."
    - "Default PARITY_TYPE parameter (0=even) is assumed unless overridden by runtime CTRL.parity_sel."
    - "APB-lite interface does not include PPROT or PWAKEUP signals."
    - "Streaming interfaces use independent valid/ready per direction; no shared bus assumed."
    - "Error counter saturation at 0xFFFF is sufficient for typical use cases; no overflow interrupt is provided."
    - "Single pipeline stage means 1 word in-flight maximum; simultaneous generate and check paths are mutually exclusive (selected by CTRL.mode)."
    - "PCLK frequency of 50MHz is the default target; the XOR tree combinational path must close timing at this frequency."
  note: "Assumptions recorded in pipeline mode; deferred to human review for validation."

dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

filelist:
  headers:
    - "rtl/parity_gen_param.vh"
  rtl:
    - "rtl/parity_gen_regs.sv"
    - "rtl/parity_gen_core.sv"
    - "rtl/parity_gen.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/parity_gen_model.sv"
  firmware:
    - "firmware/parity_gen_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"

test_requirements:
  scenarios:
    - id: "SC1"
      name: "Even parity generate"
      stimulus: "Configure CTRL: enable=1, mode=0 (generate), parity_sel=0 (even); drive data_i=0xA5A5A5A5 with valid/ready handshake"
      expected: "parity_o = ^0xA5A5A5A5 = 1 (even parity for 16 ones); data_o = 0xA5A5A5A5 1 cycle later"
      checker: "Scoreboard XOR-reduces input data and compares parity_o"
      coverage: ["FM1", "FCOV_PARITY_EVEN"]
    - id: "SC2"
      name: "Odd parity generate"
      stimulus: "Configure CTRL: enable=1, mode=0, parity_sel=1 (odd); drive data_i=0xA5A5A5A5"
      expected: "parity_o = ~(^0xA5A5A5A5) = 0 (odd parity); data_o = 0xA5A5A5A5 1 cycle later"
      checker: "Scoreboard verifies inverted parity"
      coverage: ["FM1", "FCOV_PARITY_ODD"]
    - id: "SC3"
      name: "Parity check pass"
      stimulus: "Configure CTRL: enable=1, mode=1 (check), parity_sel=0 (even); drive chk_data_i=0xA5A5A5A5, chk_par_i=1 (correct even parity)"
      expected: "chk_err_o = 0 (no error); ERR_COUNT unchanged; parity_irq not asserted"
      checker: "Scoreboard checks chk_err_o and verifies ERR_COUNT via APB read"
      coverage: ["FM2", "FCOV_CHECK_PASS"]
    - id: "SC4"
      name: "Parity check fail"
      stimulus: "Configure CTRL: enable=1, mode=1, parity_sel=0; drive chk_data_i=0xA5A5A5A5, chk_par_i=0 (wrong parity)"
      expected: "chk_err_o = 1; STATUS.par_err_sticky latched; ERR_COUNT incremented; parity_irq asserted if irq_en=1"
      checker: "Scoreboard verifies error flag, counter, sticky status, and interrupt"
      coverage: ["FM2", "FCOV_CHECK_FAIL", "FCOV_ERR_COUNTER"]
    - id: "SC5"
      name: "Disabled backpressure"
      stimulus: "Set CTRL.enable=0; assert data_valid_i"
      expected: "data_ready_o deasserted; no output produced"
      checker: "Cycle checker verifies ready_o stays low"
      coverage: ["FM1 error case", "FCOV_DISABLED"]
    - id: "SC6"
      name: "CSR configuration"
      stimulus: "APB write to CTRL changing mode and parity_sel; verify readback and functional effect"
      expected: "Register values match written data; next data/check operation uses new config"
      checker: "APB readback + functional verification"
      coverage: ["FM3", "FCOV_CSR_CONFIG"]
    - id: "SC7"
      name: "W1C status clear"
      stimulus: "Inject parity error to set STATUS.par_err_sticky; write 1 to STATUS via APB; verify cleared"
      expected: "STATUS.par_err_sticky clears to 0; parity_irq deasserts"
      checker: "APB readback of STATUS and IRQ signal check"
      coverage: ["FCOV_W1C_CLEAR"]
    - id: "SC8"
      name: "Error counter saturation"
      stimulus: "Inject 0x10001 parity errors with irq_en=1"
      expected: "ERR_COUNT saturates at 0xFFFF; no wrap-around"
      checker: "APB readback of ERR_COUNT after 0x10001 errors"
      coverage: ["FCOV_ERR_SATURATION"]
    - id: "SC9"
      name: "Output backpressure"
      stimulus: "Generate parity with data_ready_i held low for multiple cycles"
      expected: "data_valid_o held high; pipeline stalls; no new input accepted"
      checker: "Cycle checker validates stall behavior"
      coverage: ["CCOV_BACKPRESSURE"]
    - id: "SC10"
      name: "APB unsupported address"
      stimulus: "APB read/write to offset 0x10 (unmapped)"
      expected: "PSLVERR=1 with PREADY=1; no side effects"
      checker: "PSLVERR assertion check"
      coverage: ["FCOV_APB_ERROR"]
  scoreboard_checks: 10
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage for parity computation and error handling"
      bins:
        - { id: "FCOV_PARITY_EVEN", source_ref: "function_model.transactions.FM1", class: "transaction", description: "Even parity generation observed" }
        - { id: "FCOV_PARITY_ODD", source_ref: "function_model.transactions.FM1", class: "transaction", description: "Odd parity generation observed" }
        - { id: "FCOV_CHECK_PASS", source_ref: "function_model.transactions.FM2", class: "transaction", description: "Parity check pass (no error)" }
        - { id: "FCOV_CHECK_FAIL", source_ref: "function_model.transactions.FM2", class: "error_case", description: "Parity check fail detected" }
        - { id: "FCOV_ERR_COUNTER", source_ref: "function_model.transactions.FM2.state_updates.err_count", class: "state_update", description: "Error counter incremented" }
        - { id: "FCOV_ERR_SATURATION", source_ref: "function_model.transactions.FM2.state_updates.err_count", class: "boundary", description: "Error counter saturates at 0xFFFF" }
        - { id: "FCOV_DISABLED", source_ref: "function_model.transactions.FM1.error_cases", class: "error_case", description: "Disabled (enable=0) backpressure observed" }
        - { id: "FCOV_CSR_CONFIG", source_ref: "function_model.transactions.FM3", class: "transaction", description: "CSR configuration via APB" }
        - { id: "FCOV_W1C_CLEAR", source_ref: "function_model.transactions.FM2.state_updates.status_par_err_sticky", class: "state_update", description: "W1C status clear observed" }
        - { id: "FCOV_APB_ERROR", source_ref: "function_model.transactions.FM3.error_cases", class: "error_case", description: "APB unsupported address error" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency coverage"
      bins:
        - { id: "CCOV_GENERATE_LATENCY", source_ref: "cycle_model.latency.parity_generate", class: "latency", description: "Generate path 1-cycle latency observed" }
        - { id: "CCOV_CHECK_LATENCY", source_ref: "cycle_model.latency.parity_check", class: "latency", description: "Check path 1-cycle latency observed" }
        - { id: "CCOV_INPUT_HANDSHAKE", source_ref: "cycle_model.handshake_rules", class: "handshake", description: "Input valid/ready handshake rule observed" }
        - { id: "CCOV_OUTPUT_HANDSHAKE", source_ref: "cycle_model.handshake_rules", class: "handshake", description: "Output valid/ready handshake rule observed" }
        - { id: "CCOV_BACKPRESSURE", source_ref: "cycle_model.backpressure", class: "backpressure", description: "Downstream backpressure stall observed" }
        - { id: "CCOV_PIPELINE_S0", source_ref: "cycle_model.pipeline[0]", class: "pipeline_stage", description: "S0_SAMPLE stage observed" }
        - { id: "CCOV_PIPELINE_S1", source_ref: "cycle_model.pipeline[1]", class: "pipeline_stage", description: "S1_OUTPUT stage observed" }
        - { id: "CCOV_PERF_THROUGHPUT", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "Sustained 1 word/cycle throughput observed" }
    functional: "function + cycle coverage both close"
    code: "line >= 90%, branch >= 85%"

quality_gates:
  ssot:
    pass: "All canonical sections present, substantive, internally consistent, no live TBD placeholders"
    evidence: ["check_ssot_disk.sh PASS"]
  rtl_gen:
    profile: "standard"
    pass: "RTL compiles, lints clean, and implements function_model and cycle_model contracts"
    evidence: ["rtl compile report", "lint report"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, and lints"
    evidence: ["rtl compile report", "dut lint report"]
  coverage:
    pass: "SSOT-declared function/cycle/code coverage goals pass"
    evidence: ["cov/coverage.json"]
  dv:
    pass: "All test_requirements scenarios pass; function and cycle coverage goals met"
    evidence: ["sim/test_report.md", "cov/coverage.json"]
  eda:
    pass: "Synthesis meets 50MHz timing target"
    evidence: ["syn report", "sta reports"]
  signoff:
    pass: "All quality gates (ssot, rtl, dv, coverage, eda) pass with evidence"
    evidence: ["check_ssot_disk.sh PASS", "cov/coverage.json", "syn report", "sta reports", "sim/test_report.md"]

traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "parity_gen_param.vh" }
    - { yaml: "io_list.interfaces", output: "parity_gen.sv (port list)" }
    - { yaml: "registers.register_list", output: "parity_gen_regs.sv + firmware + docs" }
    - { yaml: "function_model", output: "parity_gen_core.sv + scoreboard" }
    - { yaml: "cycle_model", output: "parity_gen_core.sv pipeline/handshake logic" }
    - { yaml: "timing", output: "SDC constraints and STA pass/fail" }
    - { yaml: "error_handling", output: "RTL error paths and DV fault scenarios" }
    - { yaml: "test_requirements.scenarios", output: "sim/tb_top.sv and test programs" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff" }

workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_PARITY_CORE"
      content: "Implement parity XOR-tree datapath with registered output in parity_gen_core.sv"
      detail: "Implement generate path (data_i → XOR-reduce → register → data_o/parity_o) and check path (chk_data_i → XOR-reduce → compare with chk_par_i → register → chk_err_o). Use parity_sel to invert for odd parity. Update PARITY_OUT, ERR_COUNT, STATUS on output stage."
      criteria:
        - "XOR-reduce computes correct even/odd parity"
        - "1-cycle registered latency"
        - "Valid/ready handshake follows cycle_model rules"
        - "Error counter increments on check mismatch"
      source_refs: ["function_model.transactions.FM1", "function_model.transactions.FM2", "cycle_model.pipeline"]
      owner_module: "parity_gen_core"
      owner_file: "rtl/parity_gen_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS"
      content: "Implement APB-lite register decode and storage in parity_gen_regs.sv"
      detail: "Implement CTRL, STATUS (W1C), ERR_COUNT (clear-on-write-0), PARITY_OUT (RO). Zero-wait-state APB (pready=1 on access phase). PSLVERR for unsupported addresses."
      criteria:
        - "APB read/write to all declared register offsets"
        - "W1C clear on STATUS.par_err_sticky"
        - "ERR_COUNT clear on write of 0"
        - "PSLVERR for unmapped addresses"
      source_refs: ["registers.register_list", "function_model.transactions.FM3"]
      owner_module: "parity_gen_regs"
      owner_file: "rtl/parity_gen_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_TOP"
      content: "Wire parity_gen top-level instantiation connecting regs and core"
      detail: "Instantiate parity_gen_regs and parity_gen_core in parity_gen.sv. Connect APB signals to regs, config outputs to core, streaming ports to core, and IRQ output from regs."
      criteria:
        - "All io_list ports connected"
        - "Config signals from regs to core"
        - "Streaming ports pass-through to core"
      source_refs: ["io_list", "integration.connections"]
      owner_module: "parity_gen"
      owner_file: "rtl/parity_gen.sv"
      priority: "high"
      required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []

generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh parity_gen", description: "Validate production SSOT structure" }
    - { name: "handoff_rtl", command: "/ssot-rtl parity_gen", description: "Downstream RTL generation" }
    - { name: "handoff_tb", command: "/ssot-tb parity_gen", description: "Downstream testbench generation" }
    - { name: "handoff_coverage", command: "/coverage parity_gen", description: "Coverage measurement" }
    - { name: "handoff_eda", command: "/syn parity_gen && /sta parity_gen", description: "Synthesis and STA" }
