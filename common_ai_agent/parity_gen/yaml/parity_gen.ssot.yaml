ip: parity_gen
version: "1.0"
status: draft
top_module:
  name: "parity_gen"
  file: "rtl/parity_gen.sv"
  version: "1.0"
  type: "peripheral"
  description: "Parameterized parity generator and checker with APB-lite CSR interface"
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "parity_gen_regs", file: "rtl/parity_gen_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "io_list.interfaces.apb_slave"], source_sections: ["registers", "io_list"], register_refs: ["registers.register_list"], description: "APB-lite register decode and CSR storage" }
  - { name: "parity_gen_core", file: "rtl/parity_gen_core.sv", ownership: "manifest", ssot_gen: true, implements: ["function_model.transactions", "cycle_model.latency", "features"], source_sections: ["function_model", "cycle_model", "features"], function_model_refs: ["function_model.transactions"], cycle_model_refs: ["cycle_model.latency"], feature_refs: ["features"], description: "Parity generation and checking datapath" }

decomposition:
  units:
    - { id: "register_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["parity_gen_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "parity_datapath", kind: "datapath", source_refs: ["function_model.transactions"], rtl_candidates: ["parity_gen_core"], verification_impact: ["coverage_goals.function"] }

parameters:
  - name: "DATA_WIDTH"
    default: 32
    type: int
    description: "Width of the data input bus in bits"
    drives: ["rtl/parity_gen.sv", "rtl/parity_gen_core.sv"]
  - name: "ADDR_WIDTH"
    default: 12
    type: int
    description: "APB address width in bits"
    drives: ["rtl/parity_gen_regs.sv"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    description: "Reset polarity for PRESETn"
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Main peripheral clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Main reset"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async assert, sync deassert reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4-lite"
      role: "slave"
      description: "Register access interface"
      ports:
        - { name: "PADDR",   width: 12, direction: "input",  description: "APB address" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB error" }
    - name: "data_input"
      type: "custom"
      description: "Data input for parity generation/checking"
      ports:
        - { name: "data_in", width: 32, direction: "input", description: "Input data bus (parameterized width)" }
    - name: "parity_output"
      type: "custom"
      description: "Parity result outputs"
      ports:
        - { name: "parity_out",    width: 1, direction: "output", description: "Generated parity bit" }
        - { name: "parity_error",  width: 1, direction: "output", description: "Parity mismatch flag" }
features:
  - name: "Parity Generation"
    trigger: "data_in valid and enable set in CONTROL register"
    datapath: "data_in → XOR-tree → parity_out"
    control: "None (combinational/1-cycle registered)"
    output: "parity_out single bit"
  - name: "Parity Checking"
    trigger: "data_in valid and check_enable set"
    datapath: "data_in → XOR-tree → compare with expected_parity bit → parity_error"
    control: "None (combinational/1-cycle registered)"
    output: "parity_error single bit"
  - name: "APB-lite Configuration"
    trigger: "PSEL && PENABLE && PWRITE on APB interface"
    datapath: "PWDATA → register decode → CONTROL/STATUS"
    control: "APB slave state machine"
    output: "Updated configuration registers"

dataflow:
  read_path:
    source: "data_in port"
    sequence: "data_in → parity_core → parity_out"
    latency: "1 PCLK cycle (registered output)"
  check_path:
    source: "data_in port + expected_parity field"
    sequence: "data_in → parity_core → compare with expected_parity → parity_error"
    latency: "1 PCLK cycle (registered output)"
  config_path:
    source: "APB write"
    sequence: "PWDATA → register decoder → CONTROL/STATUS"
    latency: "0-cycle comb (APB PREADY asserted immediately)")

function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the IP computes independent of cycle timing."
  state_variables:
    - { name: "control", source: "registers.CONTROL", reset: 0, description: "Control register value" }
    - { name: "status", source: "registers.STATUS", reset: 0, description: "Status register value" }
  transactions:
    - id: "FM_GEN"
      name: "parity_generate"
      preconditions:
        - "control.enable == 1"
      inputs:
        - "data_in[DATA_WIDTH-1:0]"
      outputs:
        - "parity_out == XOR reduction of data_in"
      side_effects: []
      error_cases: []
    - id: "FM_CHK"
      name: "parity_check"
      preconditions:
        - "control.check_enable == 1"
      inputs:
        - "data_in[DATA_WIDTH-1:0]"
        - "control.expected_parity"
      outputs:
        - "parity_error == (XOR reduction of data_in) XOR control.expected_parity"
      side_effects:
        - "status.parity_err_sticky set if parity_error == 1"
      error_cases: []
  output_rules:
    - { name: "parity_out", expr: "^data_in", width: 1, port: "parity_out" }
    - { name: "parity_error", expr: "(^data_in) ^ expected_parity", width: 1, port: "parity_error" }
  state_updates:
    - { name: "control_reg", reset: 0, expr: "APB write to CONTROL register latches PWDATA into control_reg" }
    - { name: "status_reg", reset: 0, expr: "status_reg[0] <= status_reg[0] | parity_error when check_enable; cleared by APB write 1 clear" }
  invariants:
    - "parity_out is strictly a function of data_in and control.enable"
    - "parity_error is strictly a function of data_in, control.expected_parity, and control.check_enable"
  reference_model_hint: "tb-gen should implement a Python scoreboard model from this section and compare expected/got for every scenario."

cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, valid/ready, outputs, and interrupts may change."
  executable: "python"
  backend_policy: "Use direct Python smoke checks for cycle behavior."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all architectural state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    parity_compute: { min_cycles: 1, max_cycles: 1, description: "Registered parity_out and parity_error update one cycle after data_in/control stable" }
    register_access: { min_cycles: 0, max_cycles: 1, description: "APB-lite: PREADY asserted immediately (0 wait states)" }
  handshake_rules:
    - { signal: "PSEL/PENABLE", rule: "Standard APB-lite: setup phase (PSEL=1, PENABLE=0), access phase (PSEL=1, PENABLE=1). PREADY must be high in access phase to complete." }
    - { signal: "data_in", rule: "Sampled on rising PCLK when enable is asserted; no ready/valid handshake." }
  pipeline:
    - { stage: "S0_SAMPLE", cycle: 0, action: "Sample data_in and control register state" }
    - { stage: "S1_OUTPUT", cycle: 1, action: "Drive parity_out and parity_error registered outputs" }
  ordering:
    - "Registered outputs parity_out and parity_error reflect data_in sampled in the previous cycle."
  backpressure:
    - "None for data_in (always-on sampling). APB slave accepts every transfer with zero wait states."
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."

clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Main peripheral clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"

cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain (PCLK) — no CDC required"

rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain (PRESETn) — no RDC required"

registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
  register_list:
    - name: "CONTROL"
      offset: 0x000
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register"
      fields:
        - { name: "enable",         bits: [0, 0], access: "rw", reset: 0, description: "1=Enable parity generation" }
        - { name: "check_enable",   bits: [1, 1], access: "rw", reset: 0, description: "1=Enable parity checking" }
        - { name: "expected_parity", bits: [2, 2], access: "rw", reset: 0, description: "Expected parity bit for checking mode" }
        - { name: "reserved",       bits: [31, 3], access: "ro", reset: 0, description: "Reserved, read as 0" }
    - name: "STATUS"
      offset: 0x004
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Status Register"
      fields:
        - { name: "parity_err_sticky", bits: [0, 0], access: "rw", reset: 0, description: "1=Parity error detected since last clear; write 1 to clear" }
        - { name: "reserved",          bits: [31, 1], access: "ro", reset: 0, description: "Reserved, read as 0" }

memory:
  instances: []
  note: "No internal SRAM/FIFO. Registers only."

interrupts:
  sources: []
  output: {}
  note: "No interrupt output in this minimal peripheral; parity_error is a status flag only."

fsm:
  note: "No complex FSM. APB-lite slave is a simple two-phase stateless decode. Parity core is combinational/registered datapath only."

rtl_contract:
  top_module_file: "rtl/parity_gen.sv"
  parameter_header: "rtl/parity_gen_param.vh"
  reset_polarity: "active_low"
  reset_type: "async_assert_sync_deassert"
  clock_gating: false
  note: "Simple peripheral; no clock gating."

timing:
  clock_targets:
    - { name: "PCLK", freq_mhz: 50, description: "Single clock domain" }
  latency_targets:
    - { path: "data_in → parity_out", cycles: 1, description: "1-cycle registered parity generation" }
    - { path: "data_in → parity_error", cycles: 1, description: "1-cycle registered parity checking" }
  setup_hold: "Standard STA against PCLK and PRESETn constraints in parity_gen.sdc"
  note: "Simple combinational XOR-tree with registered output; timing is dominated by data_in width."

power:
  domains:
    - { name: "PCLK", description: "Single power domain" }
  clock_gating: false
  retention: false
  note: "No explicit low-power features. Add clock gating if parity_gen is instantiated in a power-managed subsystem."

security:
  assets:
    - { name: "parity configuration", description: "CONTROL/STATUS registers" }
  threat_model: "Minimal — this is a utility peripheral with no secret key or privilege interface."
  privilege_assumptions: "APB-lite interface accessible to any bus master with address decode hit."
  safety_goals: []
  note: "No security-specific mitigations required for this parity utility block."

error_handling:
  error_sources:
    - { name: "parity_mismatch", source: "function_model.transactions.FM_CHK", effect: "parity_error asserted; parity_err_sticky set in STATUS", propagation: "parity_error output pin + APB-readable STATUS register", recovery: "Write 1 to STATUS[0] to clear sticky; update expected_parity in CONTROL if desired" }
  apb_error_response:
    - "Reserved register addresses return PSLVERR=1 on APB access."
    - "Byte-wise writes to CONTROL/STATUS are accepted; software must use full 32-bit values for predictable behavior."

debug_observability:
  waveform_probes:
    - "data_in, parity_out, parity_error"
    - "CONTROL, STATUS register values"
    - "APB PSEL/PENABLE/PREADY handshake"
  trace_events: []
  note: "Minimal debug requirements; parity_error is the primary observable signal."

integration:
  bus_attachment:
    - { interface: "apb_slave", bus: "APB4-lite", address_range: "0x000-0xFFF", description: "Register decode occupies 4KB APB address space" }
  external_dependencies: []
  note: "Standalone peripheral; no external IP dependencies beyond standard APB bus infrastructure."

dft:
  scan_mode: "Not specified — add scan chain insertion if required by SoC DFT policy."
  mbist: false
  bist: false
  note: "Simple combinational logic; scan insertion is straightforward if needed."

synthesis:
  dialect: "systemverilog_2012"
  constraints: "sdc/parity_gen.sdc"
  ppa_targets:
    area_um2: null
    power_mw: null
    clock_mhz: 50
  required_reports: ["syn_area", "syn_timing", "syn_power"]
  note: "Target generic technology; no hard macro instantiations."

pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers: { horizontal: "met3", vertical: "met2" }
  cts: { buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"] }
  routing: { signal_layers: { min: "met1", max: "met5" }, drc_waivers: [] }
  note: "Default PnR targets; adjust for target technology node."

coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/parity_gen_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low async reset (PRESETn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "Use rtl/parity_gen_param.vh for shared parameter declarations; include it inside consuming modules"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
  lint_waivers:
    - "UNUSEDSIGNAL: reserved register field tie-offs"
    - "WIDTHEXPAND: data_in parameter width variations"

reuse_modules: []

custom:
  assumptions:
    - "Parity algorithm is even parity (XOR reduction of all data bits)."
    - "data_in is sampled on every rising PCLK edge when enable is set; no handshake."
    - "APB-lite interface uses zero wait states (PREADY always high in access phase)."
    - "Byte-wise APB writes are accepted but software should use 32-bit aligned accesses."
    - "Reserved register bits read as 0 and writes are ignored."
    - "No interrupt line; parity_error is a continuously driven status flag."
    - "No security privilege levels; any APB master can access registers."
  note: "Assumptions recorded per user instruction (pipeline mode, no ask_user blocking)."

dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"

filelist:
  headers:
    - "rtl/parity_gen_param.vh"
  rtl:
    - "rtl/parity_gen.sv"
    - "rtl/parity_gen_regs.sv"
    - "rtl/parity_gen_core.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
    - "sim/parity_gen_model.sv"
  firmware:
    - "firmware/parity_gen_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"

test_requirements:
  scenarios:
    - { id: "SC1", name: "Basic parity generation", stimulus: "Set CONTROL.enable=1, drive data_in with known pattern", expected: "parity_out == XOR(data_in) after 1 cycle", checker: "Scoreboard expected/got assertion", coverage: ["function_model.FM_GEN", "cycle_model.S1_OUTPUT"] }
    - { id: "SC2", name: "Parity check match", stimulus: "Set CONTROL.check_enable=1 and expected_parity to match computed parity", expected: "parity_error == 0", checker: "Scoreboard checks parity_error", coverage: ["function_model.FM_CHK", "cycle_model.S1_OUTPUT"] }
    - { id: "SC3", name: "Parity check mismatch", stimulus: "Set CONTROL.check_enable=1 and expected_parity to opposite of computed parity", expected: "parity_error == 1 and STATUS.parity_err_sticky set", checker: "Scoreboard checks parity_error and sticky bit", coverage: ["function_model.FM_CHK", "error_handling.parity_mismatch"] }
    - { id: "SC4", name: "APB register access", stimulus: "Write/read CONTROL and STATUS via APB-lite", expected: "Register values read back correctly", checker: "APB bus monitor assertion", coverage: ["registers.CONTROL", "registers.STATUS"] }
    - { id: "SC5", name: "Reset behavior", stimulus: "Assert PRESETn, then release", expected: "All registers reset to 0, outputs cleared", checker: "Reset checker assertion", coverage: ["clock_reset_domains", "registers.reset_values"] }
  scoreboard_checks: 10
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage for parity generation and checking transactions."
      bins:
        - { id: "FCOV_GEN", source_ref: "function_model.transactions.FM_GEN", class: "transaction", description: "Parity generation transaction observed" }
        - { id: "FCOV_CHK_MATCH", source_ref: "function_model.transactions.FM_CHK", class: "transaction", description: "Parity check match observed" }
        - { id: "FCOV_CHK_MISMATCH", source_ref: "function_model.transactions.FM_CHK", class: "transaction", description: "Parity check mismatch observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency coverage for registered output timing."
      bins:
        - { id: "CCOV_SAMPLE", source_ref: "cycle_model.pipeline.S0_SAMPLE", class: "pipeline_stage", description: "Sample stage observed" }
        - { id: "CCOV_OUTPUT", source_ref: "cycle_model.pipeline.S1_OUTPUT", class: "pipeline_stage", description: "Output stage observed" }
        - { id: "CCOV_APB_HANDSHAKE", source_ref: "cycle_model.handshake_rules", class: "handshake", description: "APB-lite handshake observed" }
    functional: "Legacy alias: function + cycle coverage must both close; new flows read coverage_goals.function and coverage_goals.cycle separately."
    code: "line >= 90%, branch >= 85%"

quality_gates:
  rtl_gen:
    profile: "production"
    target_scale:
      basis: "minimal peripheral with 2 sub-modules and APB interface"
      source_files_min: 3
      modules_min: 3
      procedural_blocks_min: 4
      state_updates_min: 2
      depth_score_min: 0
      logic_modules_min: 2
      behavior_owner_logic_modules_min: 2
    target_scale_waiver:
      approved: false
      reason: ""
      owner: ""
    pass: "Every SSOT-derived RTL TODO and rtl_gate.rtl_gen gate closes with fresh evidence."
    evidence: ["rtl/rtl_todo_plan.json", "rtl/rtl_authoring_provenance.json", "sim/fl_rtl_goal_audit.json", "cov/coverage.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, lints, and matches locked FL/CL authority."
    evidence: ["rtl compile report", "dut lint report", "FL-vs-RTL scoreboard/audit"]
  coverage:
    pass: "SSOT-declared functional/code/toggle/FSM/assertion coverage goals pass or have approved SSOT waivers."
    evidence: ["cov/coverage.json", "sim/coverage_report.md"]
  eda:
    pass: "Synthesis, STA, PnR, and post-route STA meet SSOT timing/area/power/physical targets or have approved SSOT waivers."
    evidence: ["syn report", "sta reports", "pnr report", "routed.spef", "sta-post reports"]

traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "parity_gen_param.vh (shared parameter include, no package)" }
    - { yaml: "io_list.interfaces", output: "parity_gen.sv (port list)" }
    - { yaml: "registers.register_list", output: "parity_gen_regs.sv + firmware + docs" }
    - { yaml: "function_model", output: "parity_gen_core.sv + tb/cocotb scoreboard/reference model" }
    - { yaml: "cycle_model", output: "parity_gen_core.sv pipeline/handshake logic + waveform checks" }
    - { yaml: "timing", output: "STA constraints and latency pass/fail criteria" }
    - { yaml: "pnr", output: "floorplan/place/CTS/route TCL and routed DEF/Verilog/SPEF" }
    - { yaml: "security", output: "security/safety mitigations and negative tests" }
    - { yaml: "error_handling", output: "RTL fault paths and DV fault scenarios" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff criteria" }
    - { yaml: "test_requirements.scenarios", output: "sim/tb_program.sv" }

workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_CORE"
      content: "Implement parity generation and checking datapath"
      detail: "Translate function_model transactions FM_GEN and FM_CHK, cycle_model timing, and ownership refs into RTL state/datapath/control logic in parity_gen_core.sv."
      criteria:
        - "RTL owner logic is present in parity_gen_core.sv"
        - "FunctionalModel expected result and RTL observed result can be compared for FM_GEN and FM_CHK"
      source_refs: ["function_model.transactions", "cycle_model.pipeline"]
      owner_module: "parity_gen_core"
      owner_file: "rtl/parity_gen_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS"
      content: "Implement APB-lite register decode"
      detail: "Implement CONTROL and STATUS register decode with APB-lite slave interface in parity_gen_regs.sv."
      criteria:
        - "APB read/write to CONTROL and STATUS works with zero wait states"
        - "Reserved addresses return PSLVERR=1"
      source_refs: ["registers.register_list", "io_list.interfaces.apb_slave"]
      owner_module: "parity_gen_regs"
      owner_file: "rtl/parity_gen_regs.sv"
      priority: "high"
      required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []

generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh parity_gen", description: "Validate production SSOT structure and quality gates" }
    - { name: "handoff_fl_model", command: "/ssot-fl-model parity_gen", description: "FunctionalModel, decomposition, coverage plan, and equivalence goals from validated SSOT" }
    - { name: "handoff_rtl", command: "/ssot-rtl parity_gen", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb", command: "/ssot-tb parity_gen", description: "Downstream pyuvm/cocotb verification from validated SSOT" }
    - { name: "handoff_sim_debug", command: "/wf sim_debug", description: "Downstream waveform, failure, and coverage inspection after sim exists" }
    - { name: "handoff_coverage", command: "/coverage parity_gen", description: "Measure SSOT-declared coverage goals" }
    - { name: "handoff_eda", command: "/syn parity_gen && /sta parity_gen && /pnr parity_gen && /sta-post parity_gen", description: "Produce SSOT-declared synthesis, STA, PnR, and post-route STA evidence" }

