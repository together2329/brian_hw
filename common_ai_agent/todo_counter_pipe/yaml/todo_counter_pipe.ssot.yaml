coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/todo_counter_pipe_param.vh
  conventions:
  - "nonblocking (<=) in sequential always @(posedge clk \u2026)"
  - blocking (=) in combinational always @(*)
  - 'No latches: every combinational branch assigns all outputs (use a default)'
  - 'Active-low async reset: always @(posedge clk or negedge rst_n) with if (!rst_n)'
  - Parameterize widths using WIDTH parameter (no hardcoded numbers)
  - Use rtl/todo_counter_pipe_param.vh for shared parameter declarations when needed; include it inside consuming modules
  - 'ALLOW: input logic / output logic ANSI ports and internal single-driver logic'
  - 'BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport
    / function / endfunction / task / endtask / for / while / *_pkg.sv'
  - Use localparam for state encoding with logic state/next_state signals
  - 'CDC synchronizers: use explicit 2-stage FF chains with ASYNC_REG attribute/P&R constraint'
  lint_waivers:
  - 'UNUSEDSIGNAL: reserved register bitfields'
  - 'WIDTHEXPAND: WIDTH-parameterized counter arithmetic'
  - 'CDC_META: synchronizer flops (intentional metastability resolvers)'
reuse_modules: []
custom:
  assumptions:
  - id: ASM1
    text: 'APB-lite zero-wait-state: pready is combinational (psel & penable). No pslverr output.'
    rationale: Simplifies integration; most counter IPs use zero-wait-state APB. If backpressure is needed, upgrade to full
      APB4 with pslverr.
    impact: rtl-gen must implement combinational pready; testbench must not inject APB wait states.
  - id: ASM2
    text: bus_clk and core_clk are integer-ratio related (2:1) and derived from same PLL source. Phase relationship is bounded
      but not necessarily aligned.
    rationale: Conservative assumption for CDC latency bounds. If clocks are fully asynchronous, latency bounds become unbounded.
    impact: CDC latency bounds assume synchronous/mesochronous relationship. rtl-gen CDC must still be robust to phase drift.
  - id: ASM3
    text: clear and load CDC pulses use toggle synchronizer (not pulse-extend) for reliable crossing at 2:1 ratio.
    rationale: At 2:1 frequency ratio with integer relationship, a toggle synchronizer reliably captures every bus-domain
      pulse in core domain without missing events.
    impact: rtl-gen must implement toggle synchronizer for clear_pulse and load_pulse CDC paths.
  - id: ASM4
    text: event_i is synchronous to core_clk or externally synchronized before entering this IP. No internal synchronizer
      on event_i.
    rationale: Counter IP is a leaf module; the system integrator must manage event_i timing. Adding internal sync would add
      latency and mask edge events.
    impact: Testbench must drive event_i with core_clk-synchronous timing. STA must treat event_i as a core_clk-synchronous
      input.
  - id: ASM5
    text: Counter width WIDTH defaults to 32; all register fields (CNT, LOAD, TERM, DBGCNT) share the same WIDTH parameter.
    rationale: Uniform parameter simplifies RTL and verification. If variable-width fields are needed, the SSOT can be patched.
    impact: rtl-gen uses single WIDTH parameter; all counter-related registers are WIDTH bits wide.
  - id: ASM6
    text: Terminal count for down-counting fires when cnt==0 (not configurable to TERM value). TERM register only affects
      up-counting.
    rationale: Simplifies function model; terminal at zero for down-count is the most common use case.
    impact: function_model FM4 uses cnt==0 as the down-count terminal condition. If symmetric TERM is needed, this assumption
      should be revisited.
  note: All assumptions recorded above are conservative engineering defaults. Revise via ask_user or change_request if the
    target application requires different behavior.
  rtl_blocker_resolutions:
  - id: RTL_MODULE_CONTRACTS
    decision_needed: Define per-module implementation contracts for manifest-owned RTL files.
    answer: Engineer selected the recommended option; see rtl_blocker_resolutions.
    evidence: 'These manifest modules have only names/descriptions, so rtl-gen cannot know which function_model, cycle_model,
      dataflow, register, FSM, error, or debug behavior each file owns: todo_counter_pipe_cdc:rtl/todo_counter_pipe_cdc.sv'
    source: rtl_blocked.json -> ATLAS ask_user
    resolved_at: '2026-05-14T02:43:53Z'
  - id: SSOT_BEHAVIOR_OWNERSHIP
    decision_needed: Assign every SSOT function/decomposition behavior to an RTL module contract.
    answer: Engineer selected the recommended option; see rtl_blocker_resolutions.
    evidence: 'These SSOT refs have no owning RTL module contract: decomposition.units.apb_decode, decomposition.units.counter_datapath'
    source: rtl_blocked.json -> ATLAS ask_user
    resolved_at: '2026-05-14T02:44:50Z'
  rtl_module_contract_resolution_history:
  - source: rtl_blocked.json -> ATLAS ask_user
    blocker_id: RTL_MODULE_CONTRACTS
    applied:
    - name: todo_counter_pipe_cdc
      file: rtl/todo_counter_pipe_cdc.sv
      fields:
      - implements
      - responsibility
      - source_sections
      - ssot_refs
      - decomposition_refs
      - cycle_model_refs
      - feature_refs
      - dataflow_refs
      - register_refs
      - fsm_refs
      - ports
      - connections
      - wiring_only
    unresolved: []
    required_fields:
    - implements
    - source_sections
    - function_model_refs
    - decomposition_refs
    - cycle_model_refs
    - feature_refs
    - dataflow_refs
    - register_refs
    - fsm_refs
    - ports
    - connections
    - wiring_only
    timestamp: '2026-05-14T02:43:53Z'
  - source: rtl_blocked.json -> ATLAS ask_user
    blocker_id: SSOT_BEHAVIOR_OWNERSHIP
    applied:
    - name: todo_counter_pipe_regs
      file: rtl/todo_counter_pipe_regs.sv
      fields:
      - decomposition_refs
      - cycle_model_refs
      - register_refs
    - name: todo_counter_pipe_core
      file: rtl/todo_counter_pipe_core.sv
      fields:
      - decomposition_refs
      - cycle_model_refs
      - feature_refs
      - fsm_refs
    unresolved: []
    required_fields:
