        source_ref: function_model.transactions.FM6
        class: transaction
        description: Underflow (both saturate and wrap) observed
      - id: FCOV_CLEAR
        source_ref: function_model.transactions.FM7
        class: transaction
        description: Clear operation observed
      - id: FCOV_LOAD
        source_ref: function_model.transactions.FM8
        class: transaction
        description: Load operation observed
      - id: FCOV_DISABLED
        source_ref: function_model.transactions.FM9
        class: transaction
        description: Disabled counter preserves value
      - id: FCOV_INT_CLEAR
        source_ref: function_model.transactions.FM10
        class: transaction
        description: Interrupt clear via W1C observed
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle/handshake/latency/FSM coverage for dual-clock CDC pipeline.
      bins:
      - id: CCOV_APB_ACCESS
        source_ref: cycle_model.pipeline.S0_APB_ACCESS
        class: pipeline_stage
        description: APB access stage observed
      - id: CCOV_CDC_CTRL
        source_ref: cycle_model.pipeline.S1_CDC_CTRL
        class: pipeline_stage
        description: Control CDC crossing observed within latency bounds
      - id: CCOV_COUNT_EVAL
        source_ref: cycle_model.pipeline.S2_COUNT_EVAL
        class: pipeline_stage
        description: Count evaluation stage observed
      - id: CCOV_CDC_STATUS
        source_ref: cycle_model.pipeline.S3_CDC_STATUS
        class: pipeline_stage
        description: Status CDC crossing observed within latency bounds
      - id: CCOV_STATUS_UPDATE
        source_ref: cycle_model.pipeline.S4_STATUS_UPDATE
        class: pipeline_stage
        description: Status update and interrupt stage observed
      - id: CCOV_READY_HANDSHAKE
        source_ref: cycle_model.handshake_rules.pready
        class: handshake
        description: APB pready zero-wait-state handshake observed
      - id: CCOV_PERF_FREQUENCY
        source_ref: cycle_model.performance.frequency_mhz
        class: frequency
        description: Declared frequency recorded in coverage evidence
    functional: 'Legacy alias: function + cycle coverage must both close.'
    line: '>= 90% instrumented line coverage or explicit project waiver'
