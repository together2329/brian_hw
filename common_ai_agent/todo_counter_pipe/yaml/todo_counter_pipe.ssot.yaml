test_requirements:
  scenarios:
  - id: SC1
    name: Basic up-count
    stimulus: Reset, program CTRL.enable=1/up_down=0/mode=0, LOAD=0, TERM=0xFF, pulse event_i 5 times
    expected: "cnt increments 0\u21921\u21922\u21923\u21924\u21925; STATUS=0; no interrupts"
    checker: Scoreboard expected/got assertion per event
    coverage:
    - FM1
    - S2_COUNT_EVAL
  - id: SC2
    name: Basic down-count
    stimulus: Reset, set cnt=10 via load, CTRL.enable=1/up_down=1/mode=0, pulse event_i 4 times
    expected: "cnt decrements 10\u21929\u21928\u21927\u21926"
    checker: Scoreboard checks each decrement
    coverage:
    - FM3
  - id: SC3
    name: Terminal count up
    stimulus: Set TERM=4, cnt=3 via load, enable up-count, pulse event_i
    expected: cnt=4, tc_pending=1, counter_irq asserted (if INTEN.tc_en=1)
    checker: Check INTSTAT.tc_pending and irq assertion
    coverage:
    - FM2
    - S4_STATUS_UPDATE
  - id: SC4
    name: Terminal count down
    stimulus: Set cnt=1 via load, enable down-count, pulse event_i
    expected: cnt=0, tc_pending=1, counter_irq asserted (if enabled)
    checker: Check INTSTAT and irq
    coverage:
    - FM4
  - id: SC5
    name: Overflow saturate up
    stimulus: Set cnt=MAX via load, enable up-count saturate mode, pulse event_i
    expected: cnt stays at MAX, overflow=1, ovf_pending=1
    checker: Check STATUS.overflow and INTSTAT.ovf_pending
    coverage:
    - FM5
  - id: SC6
    name: Overflow wrap up
    stimulus: Set cnt=MAX, enable up-count wrap mode, pulse event_i
    expected: cnt=0, overflow=1, ovf_pending=1
    checker: Check wrap-around value and sticky flags
    coverage:
    - FM5
  - id: SC7
    name: Underflow saturate down
    stimulus: Set cnt=0, enable down-count saturate mode, pulse event_i
    expected: cnt stays at 0, underflow=1, unf_pending=1
    checker: Check STATUS.underflow and INTSTAT.unf_pending
    coverage:
    - FM6
  - id: SC8
    name: Underflow wrap down
    stimulus: Set cnt=0, enable down-count wrap mode, pulse event_i
    expected: cnt=MAX, underflow=1, unf_pending=1
    checker: Check wrap-around and sticky flags
    coverage:
    - FM6
  - id: SC9
    name: Clear counter
    stimulus: Set cnt=42, write CTRL.clear=1
    expected: "cnt\u21920 after CDC; STATUS/int flags unchanged"
    checker: Check cnt reads 0; sticky flags preserved
    coverage:
    - FM7
  - id: SC10
    name: Load counter
    stimulus: Set LOAD=0xDEAD, write CTRL.load=1
    expected: "cnt\u21920xDEAD after CDC convergence"
    checker: Check cnt equals 0xDEAD
    coverage:
    - FM8
  - id: SC11
    name: Disabled no-count
    stimulus: Set enable=0, cnt=5, pulse event_i many times
    expected: cnt stays 5 regardless of event_i
    checker: Scoreboard checks cnt unchanged
    coverage:
    - FM9
  - id: SC12
    name: Interrupt clear W1C
    stimulus: Assert terminal count, then write INTCLR.tc_clr=1
    expected: "tc_pending\u21920, counter_irq deasserts"
    checker: Check INTSTAT and irq after W1C
    coverage:
    - FM10
  - id: SC13
    name: Interrupt masking
    stimulus: Enable tc interrupt, assert terminal count, then clear INTEN.tc_en
    expected: counter_irq deasserts; INTSTAT.tc_pending remains 1
    checker: Check irq follows enable mask
    coverage:
    - FM10
  - id: SC14
    name: Clear priority over count
    stimulus: enable=1, event_i=1 continuously, write CTRL.clear=1
    expected: "cnt\u21920 on clear pulse edge; subsequent edges count from 0"
    checker: Scoreboard checks clear takes priority
    coverage:
    - FM7
    - S2_COUNT_EVAL
  - id: SC15
    name: Load priority over count
    stimulus: enable=1, event_i=1 continuously, write CTRL.load=1 with LOAD=0x55
    expected: "cnt\u21920x55; subsequent counts from 0x55"
    checker: Check load priority over ongoing count
    coverage:
    - FM8
  - id: SC16
    name: CDC convergence
    stimulus: Write CTRL.enable=1 on bus_clk, observe core-domain behavior after CDC delay
    expected: Counter starts incrementing 2-4 core_clk cycles after bus write; cnt reads back on bus 2-5 bus_clk cycles after
      core update
    checker: Latency monitor verifies CDC delay bounds
    coverage:
    - S1_CDC_CTRL
    - S3_CDC_STATUS
  - id: SC17
    name: Debug cycle counter
    stimulus: Let core_clk run for N cycles, read DBGCNT
    expected: dbg_cycle_count increments on every core_clk regardless of enable/event_i
    checker: Check DBGCNT advances monotonically
    coverage:
    - FM9
  scoreboard_checks: 17
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Cycle-independent behavioral intent coverage for counter operations.
      bins:
      - id: FCOV_COUNT_UP_NORMAL
        source_ref: function_model.transactions.FM1
        class: transaction
        description: Normal up-count observed by scoreboard
      - id: FCOV_COUNT_UP_TERM
