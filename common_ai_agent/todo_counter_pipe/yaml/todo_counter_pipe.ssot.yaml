rtl_contract:
  transaction: FM1
  clock: core_clk
  reset: core_rst_n
  reset_active: low
  sample_condition: event_i and enable
  input_map:
    event_i: event_i
    clear_command: "CTRL.clear CDC pulse (bus\u2192core)"
    load_command: "CTRL.load CDC pulse + LOAD.load_value (bus\u2192core)"
    control_fields: "CTRL.enable, CTRL.up_down, CTRL.mode (CDC bus\u2192core)"
    terminal_threshold: "TERM.term_value (CDC bus\u2192core)"
    interrupt_clear: INTCLR.tc_clr, INTCLR.ovf_clr, INTCLR.unf_clr (bus domain W1C)
  output_map:
    counter_value: "CNT.cnt_value (CDC core\u2192bus)"
    status_flags: "STATUS.overflow, STATUS.underflow (CDC core\u2192bus)"
    pending_flags: "INTSTAT.tc_pending, INTSTAT.ovf_pending, INTSTAT.unf_pending (CDC core\u2192bus)"
    interrupt: counter_irq
    debug_counter: "DBGCNT.dbg_cycle_count (CDC core\u2192bus)"
  output_rules:
  - name: interrupt
    port: counter_irq
    width: 1
    expr: (tc_pending and inten_tc) or (ovf_pending and inten_ovf) or (unf_pending and inten_unf)
    description: Combined interrupt output is the OR of enabled pending interrupt sources.
  state_updates:
  - name: cnt
    reset: 0
    width: 32
    expr: "((0 if mode == 1 else term) if ((not up_down) and cnt >= term) else (cnt + 1)) if (event_i and enable and (not up_down)) else (((((1 << WIDTH) - 1) if mode == 1 else 0) if (up_down and cnt == 0) else (cnt - 1)) if (event_i and enable and up_down) else cnt)"
  - name: overflow
    reset: 0
    width: 1
    expr: "1 if (event_i and enable and (not up_down) and cnt == ((1 << WIDTH) - 1)) else overflow"
  - name: underflow
    reset: 0
    width: 1
    expr: "1 if (event_i and enable and up_down and cnt == 0) else underflow"
  - name: tc_pending
    reset: 0
    width: 1
    expr: "1 if (event_i and enable and (((not up_down) and cnt >= term) or (up_down and cnt == 0))) else tc_pending"
  - name: ovf_pending
    reset: 0
    width: 1
    expr: "1 if (event_i and enable and (not up_down) and cnt == ((1 << WIDTH) - 1)) else ovf_pending"
  - name: unf_pending
    reset: 0
    width: 1
    expr: "1 if (event_i and enable and up_down and cnt == 0) else unf_pending"
  - name: dbg_cycle_count
    reset: 0
    width: 32
    expr: dbg_cycle_count + 1
parameters:
- name: WIDTH
  default: 32
  type: int
  description: Counter width in bits; determines MAX = 2^WIDTH - 1
  drives:
  - rtl/todo_counter_pipe_core.sv
  - rtl/todo_counter_pipe_regs.sv
  - rtl/todo_counter_pipe_cdc.sv
- name: BUS_CLK_FREQ_MHZ
  default: 150
  type: int
  description: Bus clock frequency in MHz
  drives:
  - rtl/todo_counter_pipe.sv
  - sdc/todo_counter_pipe.sdc
- name: CORE_CLK_FREQ_MHZ
  default: 300
  type: int
  description: Core clock frequency in MHz
  drives:
  - rtl/todo_counter_pipe.sv
  - sdc/todo_counter_pipe.sdc
- name: CDC_SYNC_STAGES
  default: 2
  type: int
  description: Number of CDC synchronizer stages
  drives:
  - rtl/todo_counter_pipe_cdc.sv
- name: RESET_POLARITY
  default: active_low
  type: enum
  values:
  - active_low
  - active_high
  drives:
  - ALL .sv files
io_list:
  clock_domains:
  - name: bus_clk
    frequency_mhz: 150
    description: APB register access clock
    ports:
    - name: bus_clk
      width: 1
      direction: input
      description: Bus-domain clock (150 MHz)
  - name: core_clk
    frequency_mhz: 300
    description: Counter core clock
    ports:
    - name: core_clk
      width: 1
      direction: input
      description: Core-domain clock (300 MHz)
  resets:
  - name: bus_rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Bus-domain reset
    ports:
    - name: bus_rst_n
      width: 1
      direction: input
      description: Active-low bus-domain reset
  - name: core_rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Core-domain reset
    ports:
    - name: core_rst_n
      width: 1
      direction: input
      description: Active-low core-domain reset
  interfaces:
  - name: apb_slave
    type: APB-lite
    role: slave
    clock_domain: bus_clk
    reset_domain: bus_rst_n
    description: Register access interface (no pslverr)
    protocol:
      setup_phase: psel=1, penable=0 captures paddr, pwrite, pwdata, pstrb.
      access_phase: psel=1, penable=1 completes when pready=1.
      read_rule: prdata is valid in the completing access phase for reads; zero-wait-state response (pready=1 combinational
        from psel && penable).
      write_rule: pwdata/pstrb are sampled in the completing access phase for writes; zero-wait-state response.
      error_rule: No pslverr; unsupported addresses are ignored (read returns 0, writes discarded).
    ports:
    - name: paddr
      width: 8
      direction: input
      description: APB address
    - name: psel
      width: 1
      direction: input
      description: APB select
    - name: penable
      width: 1
      direction: input
      description: APB enable
    - name: pwrite
      width: 1
      direction: input
      description: APB write
    - name: pwdata
      width: 32
      direction: input
      description: APB write data
    - name: pstrb
      width: 4
      direction: input
      description: APB strobes
    - name: prdata
      width: 32
      direction: output
      description: APB read data
    - name: pready
      width: 1
      direction: output
      description: APB ready
  - name: event_input
    type: custom
    clock_domain: core_clk
    reset_domain: core_rst_n
    description: External event trigger for counter increment/decrement
    protocol:
      sampling: event_i is sampled on core_clk rising edge.
      edge_sense: Each assertion (level=1) on a core_clk edge counts as one event when counter is enabled.
      minimum_pulse: event_i must be stable for at least one core_clk period to be reliably sampled.
    ports:
    - name: event_i
      width: 1
      direction: input
      description: Event trigger input
  - name: interrupt
    type: custom
    clock_domain: bus_clk
    reset_domain: bus_rst_n
    description: Interrupt output
    protocol:
      assertion: counter_irq reflects enabled pending interrupt status (tc, overflow, underflow).
      deassertion: counter_irq deasserts after all pending sources are cleared via W1C.
      reset_value: 0
    ports:
    - name: counter_irq
      width: 1
      direction: output
      description: Combined interrupt (active-high, level)
features:
- name: Up/Down Counting
  trigger: event_i rising edge while CTRL.enable=1
  datapath: "cnt \u2190 cnt+1 (up) or cnt\u2190cnt-1 (down) per event"
  control: "CTRL.up_down selects direction; core FSM transitions IDLE\u2194COUNT"
  output: Updated cnt value reflected in CNT register
- name: Saturating Mode
  trigger: 'cnt reaches limit: MAX when counting up, 0 when counting down'
  datapath: cnt clamps at limit; overflow/underflow sticky flags set
  control: CTRL.mode=0 enables saturate; core FSM evaluates after arithmetic
  output: cnt held at limit; STATUS.overflow/underflow asserted
- name: Wrap Mode
  trigger: 'cnt reaches limit: MAX when counting up, 0 when counting down'
  datapath: "cnt wraps: MAX\u21920 (up), 0\u2192MAX (down); overflow/underflow flags set"
  control: CTRL.mode=1 enables wrap; core FSM evaluates after arithmetic
  output: cnt wraps to opposite extreme; STATUS flags asserted
- name: Clear/Load Control
  trigger: Software write to CTRL.clear=1 or CTRL.load=1
  datapath: "clear: cnt\u21920; load: cnt\u2192LOAD.load_value"
  control: CDC-synced pulse; priority clear>load>count
  output: cnt updated on next core_clk edge after CDC convergence
- name: Terminal Count Interrupt
  trigger: cnt==TERM.term_value when counting up, or cnt==0 when counting down
  datapath: tc_pending set sticky; counter_irq asserted if INTEN.tc_en=1
  control: FSM evaluates terminal condition after each count operation
  output: INTSTAT.tc_pending; counter_irq
- name: Debug Cycle Counter
  trigger: Every core_clk rising edge
  datapath: "dbg_cycle_count \u2190 dbg_cycle_count + 1 free-running"
  control: Independent of CTRL.enable or event_i
  output: DBGCNT.dbg_cycle_count readable via APB after CDC
dataflow:
  control_path:
    source: APB write to CTRL/LOAD/TERM registers (bus_clk domain)
    cdc: "2-stage synchronizer bus\u2192core (enable, up_down, mode, clear_pulse, load_pulse, load_value)"
    destination: Core-domain control signals consumed by counter FSM
    sequence: "APB write \u2192 bus-domain register \u2192 CDC sync stages \u2192 core-domain register \u2192 FSM eval"
  count_path:
    source: event_i input pin (core_clk domain)
    trigger: "0\u21921 transition on core_clk rising edge"
    arithmetic: "cnt \u2190 cnt \xB1 1 (direction per up_down)"
    limit_logic: Saturate or wrap per CTRL.mode after arithmetic
    update: cnt updated in core-domain register
  status_path:
    source: cnt, overflow, underflow, tc_pending, ovf_pending, unf_pending (core_clk domain)
    cdc: "2-stage synchronizer core\u2192bus (all status and counter value)"
    destination: CNT, STATUS, INTSTAT registers visible on APB (bus_clk domain)
    sequence: "core-domain flops \u2192 CDC sync stages \u2192 bus-domain shadow registers \u2192 APB read mux"
  interrupt_path:
    source: INTSTAT pending bits (bus_clk domain)
    mask: INTEN enable bits
    output: counter_irq = (tc_pending & tc_en) | (ovf_pending & ovf_en) | (unf_pending & unf_en)
    clear: W1C via INTCLR clears pending bits and associated sticky STATUS flags
  debug_path:
    source: Free-running cycle counter on core_clk
    cdc: "2-stage synchronizer core\u2192bus"
    destination: DBGCNT register on APB
function_model:
  purpose: 'Executable behavioral contract for rtl-gen and tb-gen: describes what the counter computes independent of cycle
    timing and CDC delays.'
  state_variables:
  - name: cnt
    source: registers.CNT.cnt_value
    reset: 0
    description: Current counter value
  - name: enable
    source: registers.CTRL.enable
    reset: 0
    description: Count enable flag (CDC-synced to core)
  - name: up_down
    source: registers.CTRL.up_down
    reset: 0
    description: 0=up, 1=down (CDC-synced to core)
  - name: mode
    source: registers.CTRL.mode
    reset: 0
    description: 0=saturate, 1=wrap (CDC-synced to core)
  - name: load_value
    source: registers.LOAD.load_value
    reset: 0
    description: Load value (CDC-synced to core)
  - name: term
    source: registers.TERM.term_value
    reset: all-ones (2^WIDTH-1)
    description: Terminal count threshold
  - name: overflow
    source: registers.STATUS.overflow
    reset: 0
    description: Sticky overflow flag
  - name: underflow
    source: registers.STATUS.underflow
    reset: 0
    description: Sticky underflow flag
  - name: tc_pending
    source: registers.INTSTAT.tc_pending
    reset: 0
    description: Terminal count pending
  - name: ovf_pending
    source: registers.INTSTAT.ovf_pending
    reset: 0
    description: Overflow pending
  - name: unf_pending
    source: registers.INTSTAT.unf_pending
    reset: 0
    description: Underflow pending
  - name: inten_tc
    source: registers.INTEN.tc_en
    reset: 0
    width: 1
    description: Terminal-count interrupt enable mask bit
  - name: inten_ovf
    source: registers.INTEN.ovf_en
    reset: 0
    width: 1
    description: Overflow interrupt enable mask bit
  - name: inten_unf
    source: registers.INTEN.unf_en
    reset: 0
    width: 1
    description: Underflow interrupt enable mask bit
  - name: dbg_cycle_count
    source: registers.DBGCNT.dbg_cycle_count
    reset: 0
    description: Free-running core_clk cycle counter
  transactions:
  - id: FM1
    name: count_up_normal
    preconditions:
    - enable == 1
    - up_down == 0
    - 0 <= cnt < term
    - event_i asserted (rising edge)
    inputs:
    - event_i rising edge
    outputs:
    - cnt_new = cnt + 1
    output_rules:
    - name: interrupt
      port: counter_irq
      width: 1
      expr: (tc_pending and inten_tc) or (ovf_pending and inten_ovf) or (unf_pending and inten_unf)
      description: Counter IRQ reflects enabled pending interrupt sources.
    side_effects:
    - "cnt \u2190 cnt + 1"
    - "dbg_cycle_count \u2190 dbg_cycle_count + 1 (on every core_clk, not per event)"
    error_cases: []
  - id: FM2
    name: count_up_terminal
    preconditions:
    - enable == 1
    - up_down == 0
    - cnt == term
    - event_i asserted
    inputs:
    - event_i rising edge
    outputs:
    - "tc_pending \u2190 1"
    - 'If mode==0 (saturate): cnt stays at term'
    - "If mode==1 (wrap): cnt \u2190 0"
    side_effects:
    - tc_pending set to 1 (sticky until W1C clear)
    - "cnt updated per mode: saturate \u2192 term, wrap \u2192 0"
    - 'If wrap: any further up-count from 0 proceeds normally'
    error_cases: []
  - id: FM3
    name: count_down_normal
    preconditions:
    - enable == 1
    - up_down == 1
    - 0 < cnt <= 2^WIDTH - 1
    - event_i asserted
    inputs:
    - event_i rising edge
    outputs:
    - cnt_new = cnt - 1
    side_effects:
    - "cnt \u2190 cnt - 1"
    error_cases: []
  - id: FM4
    name: count_down_terminal
    preconditions:
    - enable == 1
    - up_down == 1
    - cnt == 0
    - event_i asserted
    inputs:
    - event_i rising edge
    outputs:
    - "tc_pending \u2190 1"
    - 'If mode==0 (saturate): cnt stays at 0'
    - "If mode==1 (wrap): cnt \u2190 2^WIDTH - 1"
    side_effects:
    - tc_pending set to 1
    - cnt updated per mode
    - 'If wrap: further down-count from MAX proceeds normally'
    error_cases: []
  - id: FM5
    name: overflow_up
    preconditions:
    - enable == 1
    - up_down == 0
    - cnt == 2^WIDTH - 1
    - event_i asserted
    inputs:
    - event_i rising edge
    outputs:
    - "ovf_pending \u2190 1, overflow \u2190 1"
    - 'If mode==0 (saturate): cnt stays at MAX'
    - "If mode==1 (wrap): cnt \u2190 0"
    side_effects:
    - overflow sticky flag set
    - ovf_pending set
    - cnt updated per mode
    error_cases: []
  - id: FM6
    name: underflow_down
    preconditions:
    - enable == 1
    - up_down == 1
    - cnt == 0
    - event_i asserted
    inputs:
    - event_i rising edge
    outputs:
    - "unf_pending \u2190 1, underflow \u2190 1"
    - 'If mode==0 (saturate): cnt stays at 0'
    - "If mode==1 (wrap): cnt \u2190 2^WIDTH - 1"
    side_effects:
    - underflow sticky flag set
    - unf_pending set
    - cnt updated per mode
    error_cases: []
  - id: FM7
    name: clear_counter
    preconditions:
    - CTRL.clear written 1 (CDC-synced pulse to core)
    inputs:
    - clear pulse
    outputs:
    - "cnt \u2190 0"
    side_effects:
    - cnt is set to 0 regardless of enable/mode/direction
    - Does not affect overflow/underflow sticky flags
    - Does not affect tc_pending status
    error_cases: []
  - id: FM8
    name: load_counter
    preconditions:
    - CTRL.load written 1 (CDC-synced pulse to core)
    inputs:
    - load pulse, load_value from LOAD register
    outputs:
    - "cnt \u2190 load_value"
    side_effects:
    - cnt is set to load_value regardless of enable/mode/direction
    - Does not affect overflow/underflow sticky flags
    - Does not affect tc_pending status
    - If new cnt exceeds term while up-counting, terminal count comparison uses new value
    error_cases: []
  - id: FM9
    name: no_count_disabled
    preconditions:
    - enable == 0
    inputs:
    - event_i may toggle
    outputs:
    - cnt unchanged
    side_effects:
    - cnt is preserved
    - dbg_cycle_count continues incrementing
    error_cases: []
  - id: FM10
    name: interrupt_clear
    preconditions:
    - INTCLR.tc_clr, .ovf_clr, or .unf_clr written 1
    inputs:
    - W1C write
    outputs:
    - Corresponding INTSTAT bit cleared
    - 'For ovf_clr: STATUS.overflow cleared'
    - 'For unf_clr: STATUS.underflow cleared'
    side_effects:
    - counter_irq deasserts if no other enabled pending sources remain
    error_cases: []
  invariants:
  - cnt never exceeds 2^WIDTH - 1 in saturate mode.
  - cnt never goes below 0 in saturate mode.
  - overflow is set only when cnt transitions through MAX while counting up.
  - underflow is set only when cnt transitions through 0 while counting down.
  - tc_pending is set when cnt reaches term (up) or 0 (down) on a count event.
  - clear and load take priority over normal count/terminal/overflow/underflow logic.
  - Register read side effects are exactly those listed in registers.register_list.
  - dbg_cycle_count increments on every core_clk edge, independent of enable or event_i.
  reference_model_hint: tb-gen should implement a Python FunctionalModel from this section as the scoreboard oracle, comparing
    expected vs observed counter value, status flags, and interrupt state for every scenario.
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen describing when counter state, status, and interrupts change across the dual-clock
    CDC pipeline.
  executable: pymtl3
  backend_policy: Use PyMTL3 for clocked cycle model; FunctionalModel is the behavioral oracle. Run direct Python smoke checks
    instead of relying on pytest-pymtl3.
  clock: core_clk (primary behavioral clock)
  clocks:
  - name: bus_clk
    frequency_mhz: 150
    role: register access and interrupt output
  - name: core_clk
    frequency_mhz: 300
    role: counter evaluation and event sampling
  clock_relationship: "core_clk = 2 \xD7 bus_clk (integer ratio, synchronous or mesochronous)"
  reset:
    bus_domain:
      signal: bus_rst_n
      assertion: bus_rst_n low asynchronously clears all bus-domain registers
      deassertion: bus-domain registers are usable on the first bus_clk rising edge after synchronized deassertion
    core_domain:
      signal: core_rst_n
      assertion: core_rst_n low asynchronously clears all core-domain registers (cnt, dbg_cycle_count, and control CDC output
        flops)
      deassertion: core-domain registers are usable on the first core_clk rising edge after synchronized deassertion
  latency:
    register_read:
      min_cycles: 1
      max_cycles: 1
      description: APB read completes in one bus_clk cycle (combinational pready)
    register_write:
      min_cycles: 1
      max_cycles: 1
      description: APB write completes in one bus_clk cycle (combinational pready)
    control_cdc_bus_to_core:
      min_cycles: 2
      max_cycles: 4
      description: 2-stage synchronizer latency from bus_clk write to core_clk visibility; max 4 core_clk cycles due to phase
        uncertainty
    status_cdc_core_to_bus:
      min_cycles: 2
      max_cycles: 5
      description: 2-stage synchronizer latency from core_clk update to bus_clk visibility; max 5 bus_clk cycles due to phase
        uncertainty and integer ratio
    interrupt_latency:
      min_cycles: 3
      max_cycles: 8
      description: "From core-domain event to counter_irq assertion on bus_clk; includes CDC core\u2192bus + INTEN mask +\
        \ output register"
  handshake_rules:
  - signal: pready
    domain: bus_clk
    rule: Asserted combinationally when psel && penable; no wait states.
  - signal: prdata
    domain: bus_clk
    rule: Valid in the same bus_clk cycle as pready=1 for reads; driven to 0 for unused address space.
  - signal: event_i
    domain: core_clk
    rule: "Sampled on core_clk rising edge; a 0\u21921 transition triggers one count. Must be stable for \u22651 core_clk\
      \ period."
  - signal: counter_irq
    domain: bus_clk
    rule: Asserted when any enabled INTSTAT bit is 1. Deasserted when all enabled INTSTAT bits are 0.
  pipeline:
  - stage: S0_APB_ACCESS
    clock: bus_clk
    cycle: 0
    action: "APB decode: paddr\u2192register select, pwrite\u2192read/write, pwdata\u2192write data captured on psel&&penable"
  - stage: S1_CDC_CTRL
    clock: core_clk
    cycle: 0..4
    action: "2-stage synchronizer: CTRL fields (enable, up_down, mode, clear pulse, load pulse), LOAD value cross bus\u2192\
      core"
  - stage: S2_COUNT_EVAL
    clock: core_clk
    cycle: 0..N
    action: Sample event_i; if enable && event_i rising edge, evaluate prio (clear>load>count), arithmetic, saturate/wrap,
      terminal/overflow/underflow detection; update cnt, dbg_cycle_count increments every core_clk
  - stage: S3_CDC_STATUS
    clock: bus_clk
    cycle: 0..5
    action: "2-stage synchronizer: cnt_value, overflow, underflow, tc_pending, ovf_pending, unf_pending, dbg_cycle_count cross\
      \ core\u2192bus"
  - stage: S4_STATUS_UPDATE
    clock: bus_clk
    cycle: 0..1
    action: Latched status reflected in CNT/STATUS/INTSTAT registers; W1C clear logic evaluated; counter_irq updated
  ordering:
  - clear and load CDC pulses must be edge-detected in core domain (single-cycle pulse after synchronization).
  - A write to CTRL.clear or CTRL.load followed by a write to CTRL.enable in the same or subsequent bus_clk cycle must guarantee
    that clear/load takes effect before the first count event after enable.
  - Interrupt status updates (INTSTAT, STATUS) occur in bus_clk domain after CDC convergence; counter_irq follows in the same
    bus_clk cycle.
  - dbg_cycle_count is free-running on core_clk and visible through CDC on bus_clk; no synchronization to event_i.
  backpressure:
  - 'No backpressure on APB: zero-wait-state response always.'
  - 'No backpressure on event_i: every rising edge while enable=1 produces a count; no flow control.'
  - CDC pipeline is fixed-depth; no credit-based or ready/valid flow control between domains.
  performance:
    frequency_mhz: 300
    throughput:
      max_events_per_sec: 300000000
      condition: event_i toggles every core_clk cycle; cnt increments at 300 MHz
    outstanding:
      read_max: 1
      write_max: 1
      description: Single APB transaction per bus_clk cycle
    depth:
      pipeline_stages: 5
      queue_depth: 0
      description: CDC pipeline depth; no internal queuing
  observability:
  - Every function_model transaction maps to at least one cycle_model stage.
  - S2_COUNT_EVAL covers FM1-FM9 count/clear/load/terminal/overflow/underflow logic.
  - S4_STATUS_UPDATE covers FM10 interrupt clear logic.
  - dbg_cycle_count provides cycle-level observability independent of event activity.
clock_reset_domains:
  domains:
  - name: bus_clk
    frequency_mhz: 150
    description: APB register access and interrupt output domain
  - name: core_clk
    frequency_mhz: 300
    description: Counter core and event sampling domain
  clock_relationship: "core_clk = 2 \xD7 bus_clk (integer ratio; synchronous or mesochronous with bounded phase drift)"
  reset_scheme:
    bus_domain:
      signal: bus_rst_n
      polarity: active_low
      type: async_assert_sync_deassert
      description: Bus-domain reset; internal synchronizer on deassertion
    core_domain:
      signal: core_rst_n
      polarity: active_low
      type: async_assert_sync_deassert
      description: Core-domain reset; internal synchronizer on deassertion
cdc_requirements:
  crossings:
  - name: control_bus_to_core
    from_domain: bus_clk
    to_domain: core_clk
    signals:
    - enable
    - up_down
    - mode
    - clear_pulse
    - load_pulse
    - load_value[WIDTH-1:0]
    width: WIDTH + 5 bits
    description: Control signals from APB register writes to counter core
  - name: status_core_to_bus
    from_domain: core_clk
    to_domain: bus_clk
    signals:
    - cnt_value[WIDTH-1:0]
    - overflow
    - underflow
    - tc_pending
    - ovf_pending
    - unf_pending
    - dbg_cycle_count[WIDTH-1:0]
    width: 2*WIDTH + 5 bits
    description: Counter value, status flags, interrupt pending, and debug counter to APB read registers
  synchronizers:
  - name: sync_ctrl
    type: 2-stage FF
    stages: CDC_SYNC_STAGES (default 2)
    signals: all control_bus_to_core
    constraint: Launch on bus_clk, capture on core_clk; metastability resolved in 2 stages
  - name: sync_status
    type: 2-stage FF
    stages: CDC_SYNC_STAGES (default 2)
    signals: all status_core_to_bus
    constraint: Launch on core_clk, capture on bus_clk; metastability resolved in 2 stages
  - name: sync_pulse_clear
    type: 2-stage + edge detect
    stages: CDC_SYNC_STAGES + toggle or pulse-extend
    signals:
    - clear_pulse
    - load_pulse
    constraint: Single-cycle bus-domain pulse must be reliably captured in core domain; use toggle synchronizer or pulse-extend
      to guarantee detection at 2:1 frequency ratio
  constraints:
  - All CDC paths must be timed with set_max_delay -datapath_only in SDC between launch and capture clock domains.
  - CDC synchronizer cells must not be optimized away or retimed by synthesis.
  - 'MTBF target: > 1e9 hours at 300 MHz for all synchronizer chains.'
rdc_requirements:
  crossings:
  - name: bus_to_core_reset
    from_reset: bus_rst_n
    to_reset: core_rst_n
    signals: CDC synchronizer internal flops
    description: Reset domain boundary at CDC synchronizers; each domain's flops reset by their own reset signal
  synchronizers: []
  constraint: "bus_rst_n and core_rst_n may assert asynchronously to each other. CDC synchronizer flops in the bus\u2192core\
    \ direction are reset by core_rst_n (capture domain). CDC synchronizer flops in the core\u2192bus direction are reset\
    \ by bus_rst_n (capture domain)."
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
  bit_order: lsb0
  bits_format: '[msb, lsb]'
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved fields read as zero and do not allocate storage.
  register_list:
  - name: CTRL
    offset: 0
    width: 32
    access: rw
    reset: 0
    category: control
    description: Control Register
    write_side_effects:
    - Writing enable=1 starts the counter; enable=0 holds count value.
    - Writing clear=1 resets cnt to 0 (self-clearing, reads 0).
    - Writing load=1 loads cnt from LOAD register (self-clearing, reads 0).
    - Writing up_down/mode takes effect on next count event.
    fields:
    - name: enable
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      write_effect: Enable counting on event_i
      description: Counter enable
    - name: up_down
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      write_effect: 0=up count, 1=down count
      description: Count direction
    - name: mode
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      write_effect: 0=saturate at limits, 1=wrap at limits
      description: Overflow/underflow mode
    - name: clear
      bits:
      - 3
      - 3
      access: wo
      reset: 0
      write_effect: Write 1 to clear counter to 0; self-clearing, always reads 0
      description: Clear counter
    - name: load
      bits:
      - 4
      - 4
      access: wo
      reset: 0
      write_effect: Write 1 to load cnt from LOAD register; self-clearing, always reads 0
      description: Load counter
    - name: reserved_31_5
      bits:
      - 31
      - 5
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: CNT
    offset: 4
    width: 32
    access: ro
    reset: 0
    category: status
    description: Counter Value Register (CDC-synced from core domain)
    fields:
    - name: cnt_value
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      write_effect: N/A (read-only)
      description: Current counter value (synchronized to bus_clk)
  - name: LOAD
    offset: 8
    width: 32
    access: rw
    reset: 0
    category: control
    description: Load Value Register
    write_side_effects:
    - Software may write any time; used when CTRL.load=1.
    fields:
    - name: load_value
      bits:
      - 31
      - 0
      access: rw
      reset: 0
      write_effect: Value loaded into cnt on CTRL.load pulse
      description: Counter load value
  - name: TERM
    offset: 12
    width: 32
    access: rw
    reset: 4294967295
    category: control
    description: Terminal Count Register
    write_side_effects:
    - Writing TERM changes the terminal-count comparison threshold immediately.
    - If cnt already matches new TERM while enabled and counting up, tc_pending asserts on next core_clk edge.
    fields:
    - name: term_value
      bits:
      - 31
      - 0
      access: rw
      reset: 4294967295
      write_effect: Terminal count threshold for up-count comparison
      description: Terminal count value
  - name: STATUS
    offset: 16
    width: 32
    access: ro
    reset: 0
    category: status
    description: Status Register (sticky overflow/underflow flags, CDC-synced)
    fields:
    - name: overflow
      bits:
      - 0
      - 0
      access: ro
      reset: 0
      write_effect: N/A (cleared via INTCLR)
      description: Sticky overflow flag (set when cnt saturates/wraps at MAX while counting up)
    - name: underflow
      bits:
      - 1
      - 1
      access: ro
      reset: 0
      write_effect: N/A (cleared via INTCLR)
      description: Sticky underflow flag (set when cnt saturates/wraps at 0 while counting down)
    - name: reserved_31_2
      bits:
      - 31
      - 2
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: INTEN
    offset: 20
    width: 32
    access: rw
    reset: 0
    category: interrupt
    description: Interrupt Enable Register
    write_side_effects:
    - Setting a bit enables the corresponding interrupt source to assert counter_irq.
    - Clearing a bit masks the source; pending status is preserved in INTSTAT.
    fields:
    - name: tc_en
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      write_effect: Enable terminal-count interrupt
      description: Terminal count interrupt enable
    - name: ovf_en
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      write_effect: Enable overflow interrupt
      description: Overflow interrupt enable
    - name: unf_en
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      write_effect: Enable underflow interrupt
      description: Underflow interrupt enable
    - name: reserved_31_3
      bits:
      - 31
      - 3
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: INTSTAT
    offset: 24
    width: 32
    access: ro
    reset: 0
    category: interrupt
    description: Interrupt Status Register (pending sources before masking)
    fields:
    - name: tc_pending
      bits:
      - 0
      - 0
      access: ro
      reset: 0
      write_effect: N/A (cleared via INTCLR)
      description: Terminal count pending
    - name: ovf_pending
      bits:
      - 1
      - 1
      access: ro
      reset: 0
      write_effect: N/A (cleared via INTCLR)
      description: Overflow pending
    - name: unf_pending
      bits:
      - 2
      - 2
      access: ro
      reset: 0
      write_effect: N/A (cleared via INTCLR)
      description: Underflow pending
    - name: reserved_31_3
      bits:
      - 31
      - 3
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: INTCLR
    offset: 28
    width: 32
    access: rw
    reset: 0
    category: interrupt
    description: Interrupt Clear Register (W1C)
    write_side_effects:
    - Writing 1 to a bit clears the corresponding pending status in INTSTAT and sticky flag in STATUS.
    - Writing 0 has no effect.
    - Read returns current INTSTAT value.
    fields:
    - name: tc_clr
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      write_effect: Write 1 to clear tc_pending
      description: Clear terminal-count pending
    - name: ovf_clr
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      write_effect: Write 1 to clear ovf_pending and STATUS.overflow
      description: Clear overflow pending and sticky flag
    - name: unf_clr
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      write_effect: Write 1 to clear unf_pending and STATUS.underflow
      description: Clear underflow pending and sticky flag
    - name: reserved_31_3
      bits:
      - 31
      - 3
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved; reads zero
  - name: DBGCNT
    offset: 32
    width: 32
    access: ro
    reset: 0
    category: debug
    description: Debug Cycle Counter Register (CDC-synced from core domain)
    fields:
    - name: dbg_cycle_count
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      write_effect: N/A (read-only)
      description: Free-running cycle counter on core_clk for debug observability
memory:
  instances:
  - name: cnt_reg
    type: register
    depth: 1
    width: WIDTH
    read_ports: 1
    write_ports: 1
    latency: 0
    description: Counter value register (core domain)
  - name: dbg_cycle_reg
    type: register
    depth: 1
    width: WIDTH
    read_ports: 1
    write_ports: 1
    latency: 0
    description: Debug cycle counter register (core domain, free-running)
  note: All storage is register-based; no SRAM or FIFO instances. CDC shadow registers in bus domain for read-back are implementation
    detail.
interrupts:
  sources:
  - name: TC
    bit: 0
    type: level
    enable_reg: INTEN.tc_en (bit 0)
    status_reg: INTSTAT.tc_pending (bit 0)
    clear: W1C via INTCLR.tc_clr (bit 0)
    description: Terminal count reached (cnt==TERM when up, cnt==0 when down)
  - name: OVF
    bit: 1
    type: level
    enable_reg: INTEN.ovf_en (bit 1)
    status_reg: INTSTAT.ovf_pending (bit 1)
    clear: W1C via INTCLR.ovf_clr (bit 1); also clears STATUS.overflow
    description: Overflow (cnt wrapped or saturated at MAX while counting up)
  - name: UNF
    bit: 2
    type: level
    enable_reg: INTEN.unf_en (bit 2)
    status_reg: INTSTAT.unf_pending (bit 2)
    clear: W1C via INTCLR.unf_clr (bit 2); also clears STATUS.underflow
    description: Underflow (cnt wrapped or saturated at 0 while counting down)
  output:
    signal: counter_irq
    polarity: active_high
    type: level
    formula: counter_irq = (tc_pending & tc_en) | (ovf_pending & ovf_en) | (unf_pending & unf_en)
fsm:
  core_fsm:
    states:
    - IDLE
    - COUNT
    transitions:
    - from: IDLE
      to: COUNT
      condition: enable=1 and event_i=1
    - from: COUNT
      to: IDLE
      condition: enable=0
    - from: COUNT
      to: COUNT
      condition: enable=1 and event_i=1 (next count)
    note: "clear and load are decoded combinatorially and take priority over normal counting. clear: cnt\u21920; load: cnt\u2192\
      load_value. Both are single-cycle pulses synchronized from bus domain."
  internal_control:
    priority:
    - clear > load > normal_count
    - Saturate/wrap logic is evaluated after the arithmetic operation
    event_gating:
    - "Event is edge-sensitive per core_clk: a 0\u21921 transition on event_i while enable=1 triggers one count operation."
    - If event_i is high for multiple core_clk cycles, only the first rising edge counts; subsequent edges require event_i
      to return to 0 first.
timing:
  target_clocks:
  - name: bus_clk
    frequency_mhz: 150
    duty_cycle: 0.5
    uncertainty_ns: 0.2
  - name: core_clk
    frequency_mhz: 300
    duty_cycle: 0.5
    uncertainty_ns: 0.15
  latency_budget:
    register_access_cycles:
      min: 1
      max: 1
      measured_from: psel && penable
      measured_to: pready && prdata valid
    interrupt_latency_cycles:
      min: 3
      max: 8
      measured_from: core-domain count event
      measured_to: counter_irq assertion on bus_clk
    cdc_control_latency_core_cycles:
      min: 2
      max: 4
      measured_from: bus_clk register write
      measured_to: control visible in core domain
    cdc_status_latency_bus_cycles:
      min: 2
      max: 5
      measured_from: core-domain status update
      measured_to: status readable on APB
  throughput:
    max_events_per_sec: 300000000
    conditions: event_i can toggle every core_clk cycle; no backpressure
  io_delays:
    inputs:
    - ports: event_i
      clock: core_clk
      delay_ns: 0.3
      source: external pin budget
    - ports: paddr, psel, penable, pwrite, pwdata, pstrb
      clock: bus_clk
      delay_ns: 0.3
      source: APB interconnect budget
    outputs:
    - ports: prdata, pready
      clock: bus_clk
      delay_ns: 0.3
      source: APB interconnect budget
    - ports: counter_irq
      clock: bus_clk
      delay_ns: 0.3
      source: interrupt controller budget
  false_paths:
  - from: bus_rst_n
    to: all_bus_domain_registers
    reason: async reset assertion
  - from: core_rst_n
    to: all_core_domain_registers
    reason: async reset assertion
  multicycle_paths: []
  cdc_constraints:
  - from: bus_clk
    to: core_clk
    type: set_max_delay -datapath_only
    value_ns: 5.0
    signals: all control_bus_to_core
  - from: core_clk
    to: bus_clk
    type: set_max_delay -datapath_only
    value_ns: 5.0
    signals: all status_core_to_bus
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/setup.rpt
    - sta/out/hold.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_BUS
    voltage: nominal
    clock_domains:
    - bus_clk
    isolation: not_required
  - name: PD_CORE
    voltage: nominal
    clock_domains:
    - core_clk
    isolation: not_required
  clock_gating:
    required: false
    rationale: No low-power mode in this IP revision; counter is always active when core_clk is present
  reset_retention:
    retention_required: false
    reset_value_source: registers and function_model state_variables
  power_states:
  - name: 'ON'
    entry: both resets deasserted
    exit: either reset asserted
    guarantees:
    - All architectural behavior active
    - Both clock domains running
  upf_required: false
security:
  classification: non_secure_peripheral_ip
  assets:
  - name: counter_value
    protection: Read-only via CNT register; writeable only via clear/load CDC path
  - name: control_registers
    protection: APB access control is external to this IP (SoC interconnect determines privilege)
  threat_model:
  - threat: unexpected counter reset via glitch on clear/load CDC
    mitigation: CDC pulse synchronizer rejects glitches shorter than bus_clk period; requires sustained bus-domain write
  - threat: stale counter value due to CDC convergence delay
    mitigation: Bounded CDC latency documented in cycle_model; software must poll STATUS or wait for interrupt
  privilege_model: External bus fabric enforces privilege; this IP implements no internal privilege levels or secure/non-secure
    partitioning
  safety_goals:
  - No silent counter corruption across CDC boundaries
  - Sticky overflow/underflow flags are preserved until explicit W1C clear
error_handling:
  error_sources:
  - id: ERR_OVERFLOW
    condition: cnt transitions through MAX (2^WIDTH-1) while counting up
    architectural_effect: STATUS.overflow=1, INTSTAT.ovf_pending=1; counter_irq if INTEN.ovf_en=1
    severity: info
  - id: ERR_UNDERFLOW
    condition: cnt transitions through 0 while counting down
    architectural_effect: STATUS.underflow=1, INTSTAT.unf_pending=1; counter_irq if INTEN.unf_en=1
    severity: info
  propagation:
  - Overflow and underflow are sticky until explicit W1C clear via INTCLR.
  - Multiple overflow events between clears do not toggle the sticky flag (already set).
  - Counter continues normal operation after overflow/underflow (saturate holds; wrap continues).
  recovery:
  - action: software W1C write to INTCLR.ovf_clr
    clears:
    - INTSTAT.ovf_pending
    - STATUS.overflow
    preserves:
    - cnt
    - all control registers
  - action: software W1C write to INTCLR.unf_clr
    clears:
    - INTSTAT.unf_pending
    - STATUS.underflow
    preserves:
    - cnt
    - all control registers
  - action: software W1C write to INTCLR.tc_clr
    clears:
    - INTSTAT.tc_pending
    preserves:
    - cnt
    - all control registers
  note: Overflow/underflow are expected operational conditions, not hardware faults. They signal counter limit events to software.
