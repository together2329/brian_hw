# =============================================================================
# uart_tx_lite_cx1.ssot.yaml — Minimal UART TX (8N1, fixed divisor)
# A minimal UART transmitter: 8 data bits, no parity, 1 stop bit (8N1).
# Baud divisor is fixed at parameter BAUD_DIV. Writing a byte to the TX_DATA
# CSR starts transmission. tx_busy is high while transmitting.
# =============================================================================
ip: uart_tx_lite_cx1
version: '1.0'
purpose: "Minimal UART TX (8N1, fixed baud divisor): write byte to TX_DATA CSR to transmit; tx_busy high during transmission; tx_out serial output."
type: peripheral

top_module:
  name: uart_tx_lite_cx1
  file: rtl/uart_tx_lite_cx1.sv
  version: '1.0'
  type: peripheral
  description: "Minimal UART TX — 8N1 format, fixed baud divisor via parameter BAUD_DIV. APB CSR: write byte to TX_DATA (offset 0) starts transmit; STATUS (offset 4) shows tx_busy. tx_out is the serial line."
  reference_spec: "Internal - common_ai_agent demo"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: csr_decode,  kind: control,  source_refs: [registers.register_list], rtl_candidates: [uart_tx_lite_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: baud_gen,    kind: datapath, source_refs: [cycle_model.baud_generator], rtl_candidates: [uart_tx_lite_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: tx_shift,    kind: datapath, source_refs: [function_model.transactions.FM_TX_BYTE], rtl_candidates: [uart_tx_lite_cx1], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: uart_tx_lite_cx1_top
    file: rtl/uart_tx_lite_cx1.sv
    ownership: manifest
    ssot_gen: true
    wiring_only: false
    source_sections: [io_list, registers, function_model, fsm, cycle_model]
    implements: [io_list.interfaces.apb_slave, io_list.interfaces.uart_io, registers.register_list, function_model.transactions]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM_TX_BYTE, function_model.transactions.FM_IDLE]
    description: "APB decode + baud generator + TX shift register state machine."

parameters:
  - { name: APB_ADDR_WIDTH, default: 4,   type: int, description: "APB address width" }
  - { name: APB_DATA_WIDTH, default: 32,  type: int, description: "APB data width" }
  - { name: BAUD_DIV,       default: 434, type: int, description: "Baud divisor: CLK_FREQ/BAUD_RATE (50MHz/115200 ~ 434)" }

io_list:
  clock_domains:
    - name: pclk
      frequency_mhz: 50
      description: "System clock"
      ports:
        - { name: PCLK, width: 1, direction: input, description: "System clock" }
  resets:
    - name: presetn
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "Active-low reset"
      ports:
        - { name: PRESETn, width: 1, direction: input, description: "Active-low reset" }
  interfaces:
    - name: apb_slave
      type: APB-Lite
      role: slave
      clock_domain: pclk
      reset_domain: presetn
      description: "APB-Lite CSR"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0"
        access_phase: "PSEL=1, PENABLE=1, PREADY=1"
      ports:
        - { name: PADDR,   width: 4,  direction: input  }
        - { name: PSEL,    width: 1,  direction: input  }
        - { name: PENABLE, width: 1,  direction: input  }
        - { name: PWRITE,  width: 1,  direction: input  }
        - { name: PWDATA,  width: 32, direction: input  }
        - { name: PRDATA,  width: 32, direction: output }
        - { name: PREADY,  width: 1,  direction: output }
        - { name: PSLVERR, width: 1,  direction: output }
    - name: uart_io
      type: custom
      clock_domain: pclk
      reset_domain: presetn
      description: "UART serial output and busy signal"
      ports:
        - { name: tx_out,  width: 1, direction: output, description: "UART serial output (idle=1, start=0, 8 data bits LSB first, stop=1)" }
        - { name: tx_busy, width: 1, direction: output, description: "High while transmitting a byte" }

features:
  - name: "UART TX 8N1 Byte Transmit"
    trigger: "APB write to TX_DATA (offset 0) when not busy"
    datapath: "Shift register loads byte; baud counter gates bit transitions"
    control: "APB access-phase write handshake; TX FSM"
    output: "Serial 8N1 frame on tx_out; tx_busy stays high until stop bit done"
  - name: "Busy status read"
    trigger: "APB read of STATUS register (offset 4)"
    datapath: "PRDATA[0] = tx_busy"
    control: "PSEL/PENABLE/~PWRITE/PADDR=4"
    output: "PRDATA returns tx_busy state"

registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "Reserved bits read zero"
  register_list:
    - name: TX_DATA
      offset: 0x0
      width: 32
      access: rw
      reset: 0x00000000
      category: command
      description: "Write byte to start UART TX. Writes while tx_busy are ignored."
      write_side_effects:
        - "On access-phase write when NOT tx_busy: load shift register with PWDATA[7:0]; assert tx_busy; begin frame."
        - "On access-phase write when tx_busy: write ignored."
      fields:
        - { name: data, bits: [7, 0], access: rw, reset: 0, write_effect: "Load TX shift register", description: "Byte to transmit (8-bit)" }
        - { name: reserved_31_8, bits: [31, 8], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved" }
    - name: STATUS
      offset: 0x4
      width: 32
      access: ro
      reset: 0x00000000
      category: status
      description: "TX status register"
      fields:
        - { name: tx_busy, bits: [0, 0], access: ro, reset: 0, description: "1=transmitting, 0=idle" }
        - { name: reserved_31_1, bits: [31, 1], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: "Reserved" }

memory:
  instances: []
  note: "No FIFO. Single byte TX only."

interrupts:
  sources: []
  output: null
  note: "No interrupts."

fsm:
  tx_fsm:
    states: [TX_IDLE, TX_START, TX_DATA, TX_STOP]
    transitions:
      - { from: TX_IDLE,  to: TX_START, condition: "tx_write detected (APB write to TX_DATA, not busy)" }
      - { from: TX_START, to: TX_DATA,  condition: "baud tick (one baud period elapsed)" }
      - { from: TX_DATA,  to: TX_DATA,  condition: "baud tick and bit_cnt < 7" }
      - { from: TX_DATA,  to: TX_STOP,  condition: "baud tick and bit_cnt == 7" }
      - { from: TX_STOP,  to: TX_IDLE,  condition: "baud tick (stop bit complete)" }
    note: "tx_out=0 in TX_START, data bit [bit_cnt] in TX_DATA, tx_out=1 in TX_STOP/TX_IDLE. tx_busy=1 in TX_START/TX_DATA/TX_STOP."

rtl_contract:
  transaction: FM_TX_BYTE
  clock: PCLK
  reset: PRESETn
  reset_active: low
  sample_condition: "PRESETn == 1"
  input_map:
    psel: PSEL
    penable: PENABLE
    pwrite: PWRITE
    paddr: PADDR
    pwdata: PWDATA
  output_map:
    prdata: PRDATA
    pready: PREADY
    pslverr: PSLVERR
    tx_out: tx_out
    tx_busy: tx_busy

function_model:
  purpose: "Executable FL contract for rtl-gen and tb-gen"
  state_variables:
    - { name: tx_busy_q, source: registers.STATUS.tx_busy, reset: 0, description: "TX busy flag" }
    - { name: shift_reg, source: internal, reset: 0, description: "8-bit TX shift register" }
    - { name: bit_cnt,   source: internal, reset: 0, description: "Bit index 0..7 during TX_DATA" }
    - { name: baud_cnt,  source: internal, reset: 0, description: "Baud clock divider counter" }
    - { name: tx_state,  source: fsm.tx_fsm, reset: 0, description: "FSM state: 0=IDLE,1=START,2=DATA,3=STOP" }
  transactions:
    - id: FM_TX_BYTE
      name: uart_tx_byte
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1", "paddr == 0", "tx_busy_q == 0"]
      inputs: [pwdata]
      outputs: ["shift_reg=pwdata[7:0]; tx_busy_q=1; tx_state->TX_START"]
      output_rules:
        - { name: pready_rule,   port: PREADY,   expr: 1, width: 1 }
        - { name: pslverr_rule,  port: PSLVERR,  expr: 0, width: 1 }
        - { name: tx_busy_rule,  port: tx_busy,  expr: 1, width: 1 }
        - { name: tx_out_rule,   port: tx_out,   expr: 1, width: 1, description: "tx_out stays idle(1) until start bit issued on next baud tick" }
      state_updates:
        - { name: tx_busy_q, expr: 1, width: 1 }
        - { name: shift_reg, expr: "pwdata & 0xFF", width: 8 }
        - { name: tx_state,  expr: 1, width: 2 }
      side_effects: ["TX transmission begins"]
      error_cases:
        - { condition: "Write while tx_busy_q==1", result: "Write ignored; PREADY=1, PSLVERR=0" }
    - id: FM_IDLE
      name: uart_tx_idle
      preconditions: ["tx_busy_q == 0"]
      inputs: [paddr]
      outputs: ["tx_out=1 (idle mark); tx_busy=0; PRDATA returns STATUS on read"]
      output_rules:
        - { name: pready_rule,   port: PREADY,   expr: 1, width: 1 }
        - { name: pslverr_rule,  port: PSLVERR,  expr: 0, width: 1 }
        - { name: tx_busy_rule,  port: tx_busy,  expr: 0, width: 1 }
        - { name: tx_out_rule,   port: tx_out,   expr: 1, width: 1 }
        - { name: prdata_rule,   port: PRDATA, width: 32,
            expr: "0 if (psel == 1 and penable == 1 and pwrite == 0 and paddr == 4) else 0" }
      state_updates:
        - { name: tx_busy_q, expr: 0, width: 1 }
      side_effects: []
      error_cases: []
  invariants:
    - "PREADY=1 always, PSLVERR=0 always."
    - "tx_out=1 (mark/idle) when not transmitting."
    - "tx_out=0 for exactly one baud period as start bit."
    - "8 data bits transmitted LSB first."
    - "tx_out=1 for one baud period as stop bit."
    - "tx_busy=1 from start-bit begin until stop-bit complete."

cycle_model:
  purpose: "Cycle/baud contract"
  executable: python
  cosim: true
  clock: PCLK
  reset:
    assertion: "PRESETn low: tx_busy=0, tx_out=1 (idle), FSM=TX_IDLE."
    deassertion: "First rising PCLK enables CSR access and baud generator."
  baud_generator:
    parameter: BAUD_DIV
    description: "Counter from 0 to BAUD_DIV-1; baud_tick asserted on wrap"
    reset: 0
  latency:
    apb_write: { min_cycles: 1, max_cycles: 1 }
    apb_read:  { min_cycles: 0, max_cycles: 0 }
    frame_length_baud_periods: { value: 10, description: "1 start + 8 data + 1 stop = 10 baud periods" }
    frame_length_cycles: { expr: "10 * BAUD_DIV", description: "Frame takes 10*BAUD_DIV PCLK cycles" }
  handshake_rules:
    - { signal: PREADY,   rule: "Always 1 (0-wait-state)" }
    - { signal: tx_busy,  rule: "High from TX_DATA write until stop-bit complete" }
    - { signal: tx_out,   rule: "Idle=1; start=0; data[0..7] LSB first; stop=1" }
  pipeline:
    - { stage: TX_IDLE,  cycle: "N/A",   action: "Awaiting APB write to TX_DATA" }
    - { stage: TX_START, cycle: "0..BD-1", action: "Start bit: tx_out=0 for BAUD_DIV cycles" }
    - { stage: TX_DATA,  cycle: "BD*1..BD*9-1", action: "8 data bits LSB-first, each for BAUD_DIV cycles" }
    - { stage: TX_STOP,  cycle: "BD*9..BD*10-1", action: "Stop bit: tx_out=1 for BAUD_DIV cycles; tx_busy clears" }
  ordering:
    - "TX_DATA write while busy is ignored (no overrun in this lite design)."
    - "baud_tick fires every BAUD_DIV cycles starting from TX_START entry."
  backpressure: ["No backpressure. Writes while busy are dropped silently."]
  performance:
    frequency_mhz: 50
    baud_rate_approx: "50MHz / BAUD_DIV"
  observability:
    - "tx_out, tx_busy, FSM state observable each cycle."

clock_reset_domains:
  domains:
    - { name: PCLK, frequency_mhz: 50 }
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: df0, source: PWDATA, sink: shift_reg, path: "APB TX_DATA write -> shift_reg" }
    - { id: df1, source: shift_reg, sink: tx_out,  path: "shift_reg[bit_cnt] -> tx_out during TX_DATA" }
    - { id: df2, source: tx_state,  sink: tx_busy, path: "tx_state != TX_IDLE -> tx_busy=1" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]

security:
  classifications: []

error_handling:
  error_sources:
    - { id: ERR_BUSY_DROP, condition: "Write to TX_DATA while tx_busy", architectural_effect: "Write silently ignored; PREADY=1, PSLVERR=0" }

debug_observability:
  signals:
    - { name: tx_busy_q, source: function_model.state_variables.tx_busy_q, description: "TX busy flag" }
    - { name: bit_cnt,   source: function_model.state_variables.bit_cnt,   description: "Current data bit index" }
    - { name: baud_cnt,  source: function_model.state_variables.baud_cnt,  description: "Baud divider counter" }

dft:
  scan: { enabled: false }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [PCLK, PRESETn, PADDR, PSEL, PENABLE, PWRITE, PWDATA, PRDATA, PREADY, PSLVERR, tx_out, tx_busy]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file."

test_requirements:
  scenarios:
    - id: SC1
      name: "Reset state — tx_busy=0, tx_out=1"
      stimulus: "After reset, check outputs"
      expected: "tx_busy=0, tx_out=1"
      checker: "Verifies reset."
      coverage: [reset]
    - id: SC2
      name: "TX byte frame shape (start/data/stop)"
      stimulus: "Write 0xA5 to TX_DATA; observe tx_out for full frame"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xA5 } }
      expected: "tx_out: 0(start), A5 LSB-first, 1(stop); tx_busy=1 during frame"
      checker: "Verifies 8N1 frame format."
      coverage: [FM_TX_BYTE]
    - id: SC3
      name: "tx_busy clears after frame"
      stimulus: "Write byte, wait for frame completion"
      expected: "tx_busy=0 after stop bit; tx_out=1"
      checker: "Verifies busy deassertion."
      coverage: [FM_TX_BYTE]
    - id: SC4
      name: "Busy write ignored"
      stimulus: "Write byte while tx_busy=1"
      expected: "Second write ignored; current frame unaffected"
      checker: "Verifies overrun protection."
      coverage: [FM_TX_BYTE]
    - id: SC5
      name: "STATUS read returns tx_busy"
      stimulus: "Read STATUS (offset 4) during transmit"
      expected: "PRDATA[0]=1 while busy, 0 when idle"
      checker: "Verifies status register."
      coverage: [FM_IDLE]
  scoreboard_checks:
    - "tx_out=0 for exactly BAUD_DIV cycles as start bit"
    - "8 data bits transmitted LSB-first, each for BAUD_DIV cycles"
    - "tx_out=1 for BAUD_DIV cycles as stop bit"
    - "tx_busy=1 during frame, tx_busy=0 after stop bit"
    - "PREADY=1 always, PSLVERR=0 always"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: UART_CX1_DONE, description: "uart_tx_lite_cx1 ROCEV chain complete", status: planned }
