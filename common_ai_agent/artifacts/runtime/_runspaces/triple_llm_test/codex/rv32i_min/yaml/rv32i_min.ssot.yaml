  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
workflow_todos:
  fl-model-gen:
  - id: FL_RV32I_REF_MODEL
    content: Implement RV32I functional reference trajectory model
    detail: Build executable model from function_model transactions and invariants for all 37 opcodes
    criteria:
    - Model predicts pc and regfile state per committed instruction
    - Error cases match function_model error_cases
    source_refs:
    - function_model
    - error_handling
    owner_module: rv32i_min_core
    owner_file: rtl/rv32i_min_core.sv
    priority: high
    required: true
  rtl-gen:
  - id: RTL_IF_STAGE
    content: Implement IF stage request and pc sequencing
    detail: Drive i_addr and i_valid and IF register updates according to cycle_model IF stage and FM_FETCH
    criteria:
    - i_valid and i_addr comply with handshake_rules
    - next_pc logic matches FM_FETCH FM_BRANCH FM_JUMP
    source_refs:
    - function_model.transactions.FM_FETCH
    - function_model.transactions.FM_BRANCH
    - function_model.transactions.FM_JUMP
    - cycle_model.pipeline
    - cycle_model.handshake_rules
    owner_module: rv32i_min_if
    owner_file: rtl/rv32i_min_if.sv
    priority: high
    required: true
  - id: RTL_IDEX_STAGE
    content: Implement decode execute and system instruction control
    detail: Decode RV32I subset and produce ALU compare jump target and system behavior including FENCE bubble and illegal shamt detect
    criteria:
    - All 37 opcodes decode to declared function_model transaction classes
    - Illegal shamt triggers exception path with no retirement
    source_refs:
    - function_model.transactions.FM_ALU
    - function_model.transactions.FM_BRANCH
    - function_model.transactions.FM_JUMP
    - function_model.transactions.FM_SYSTEM
    - fsm.control
    owner_module: rv32i_min_idex
    owner_file: rtl/rv32i_min_idex.sv
    priority: high
    required: true
  - id: RTL_MEMWB_STAGE
    content: Implement load store formatting and writeback commit gates
    detail: Generate d_addr d_we d_be d_wdata and load extension paths and retirement gating on faults
    criteria:
    - Store byte enables align with SB SH SW rules
    - LB LH LBU LHU LW results match extension policy
    - Misaligned access blocks retirement
    source_refs:
    - function_model.transactions.FM_LOAD
    - function_model.transactions.FM_STORE
    - error_handling.error_sources
    - cycle_model.pipeline
    owner_module: rv32i_min_memwb
    owner_file: rtl/rv32i_min_memwb.sv
    priority: high
    required: true
  - id: RTL_REGFILE_X0
    content: Enforce x0 immutable behavior
    detail: Mask writes to x0 and force reads of x0 to zero
    criteria:
    - Invariant regfile_x0 equals 0 always
    source_refs:
    - function_model.invariants
    owner_module: rv32i_min_regfile
    owner_file: rtl/rv32i_min_regfile.sv
    priority: high
    required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
  - name: validate_ssot
    command: bash workflow/ssot-gen/scripts/check_ssot_disk.sh rv32i_min
    description: Validate production SSOT structure and quality gates
  - name: handoff_fl_model
    command: /ssot-fl-model rv32i_min
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals rv32i_min
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl rv32i_min
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb rv32i_min
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
rtl_contract:
  top_level_ports_ref: io_list
  reset_policy:
    signal: rst_n
    polarity: active_low
    type: async_assert_sync_deassert
    reset_state:
      pc: 0
      regfile: 0
      excpt_o: 0
  bus_contract:
    instruction_bus: Registered synchronous request/response by cycle (no ready handshake)
    data_bus: Registered synchronous load/store signaling by cycle (no ready handshake)
  architectural_rules:
  - x0 is hardwired to zero; writes to rd=0 are ignored
  - Misaligned data accesses pulse excpt_o for one cycle and do not retire
  - ECALL and EBREAK pulse excpt_o for one cycle and advance pc by 4
  - FENCE introduces one bubble cycle with no architectural register modification
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM_STORE
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: '1'
  input_map:
    i_rdata: i_rdata
    d_rdata: d_rdata
    alu_result: alu_result
    branch_imm: branch_imm
    branch_taken: branch_taken
    illegal_shamt: illegal_shamt
    imm: imm
    is_ebreak: is_ebreak
    is_ecall: is_ecall
    is_jalr: is_jalr
    is_store: is_store
    load_data_ext: load_data_ext
    misaligned_access: misaligned_access
    rs1: rs1
  output_map:
    i_addr: i_addr
    i_valid: i_valid
    d_addr: d_addr
    d_wdata: d_wdata
    d_we: d_we
    d_be: d_be
    d_valid: d_valid
    excpt_o: excpt_o
  output_valid: i_valid
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transaction.
  - Input sampling and output observation follow cycle_model handshake and latency rules.
  output_rules:
  - name: store_valid
    port: d_valid
    expr: 1 if (is_store and (not misaligned_access)) else 0
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: exception_pulse
    port: excpt_o
    expr: 1 if (is_ecall or is_ebreak or illegal_shamt or misaligned_access) else 0
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
