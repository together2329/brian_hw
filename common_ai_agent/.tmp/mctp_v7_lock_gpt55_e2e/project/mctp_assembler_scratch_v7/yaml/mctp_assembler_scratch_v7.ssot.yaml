top_module:
  name: mctp_assembler_scratch_v7
  file: rtl/mctp_assembler_scratch_v7.sv
  version: 0.1.0
  type: axi4_apb_packet_assembler
  description: AXI4 256-bit PCIe VDM MCTP receiver/assembler with APB CSR, interleaved
    contexts, payload-only SRAM writes, descriptor/header queue, AXI read payload
    access, and interrupt/status reporting.
  target:
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
  reference_spec: user-defined
sub_modules:
- name: axi_write_tlp_collector
  implements:
  - f_axi_tlp_ingress
  dataflow_refs:
  - df_ingress_to_descriptor
  - dataflow
  function_model_refs:
  - txn_axi_write_tlp
  - function_model.transactions.FM1
  - function_model.transactions.FM2
  - function_model.transactions.FM3
  - function_model.transactions.FM4
  cycle_model_refs:
  - cm_axi_write
  - cycle_model
  fsm_refs:
  - axi_write_fsm
  - fsm
  ownership: manifest
  ssot_gen: true
  file: rtl/axi_write_tlp_collector.sv
  source_sections:
  - cycle_model
  - features
  - dataflow
  - fsm
  - decomposition
  feature_refs:
  - features
  decomposition_refs:
  - decomposition
- name: pcie_mctp_packet_decoder
  implements:
  - f_pcie_vdm_decode
  dataflow_refs:
  - df_ingress_to_descriptor
  function_model_refs: &id001
  - txn_decode_packet
  cycle_model_refs:
  - cm_parser
  ownership: manifest
  ssot_gen: true
  file: rtl/pcie_mctp_packet_decoder.sv
- name: assembly_context_table
  implements:
  - f_mctp_assembly
  function_model_refs: &id002
  - txn_context_append
  - txn_drop
  cycle_model_refs:
  - cm_context
  fsm_refs:
  - context_slot_fsm
  register_refs:
  - context_registers
  ownership: manifest
  ssot_gen: true
  file: rtl/assembly_context_table.sv
- name: sram_payload_packer
  implements:
  - f_payload_sram_axi_read
  function_model_refs: &id003
  - txn_payload_write
  - txn_axi_read_payload
  cycle_model_refs:
  - cm_sram
  ownership: manifest
  ssot_gen: true
  file: rtl/sram_payload_packer.sv
- name: apb_register_file
  implements:
  - f_apb_csr_irq
  function_model_refs:
  - txn_apb_csr
  - function_model.state_variables
  register_refs:
  - control_status_interrupt_counter_descriptor_debug
  ownership: manifest
  ssot_gen: true
  file: rtl/apb_register_file.sv
- name: mctp_assembler_scratch_v7
  file: rtl/mctp_assembler_scratch_v7.sv
  ownership: manifest
  ssot_gen: true
  wiring_only: true
  description: Top-level integration module matching SSOT top_module
  implements:
  - top_module
  - integration
  source_sections: &id004
  - top_module
  - io_list
  - decomposition
  - integration
  decomposition_refs:
  - decomposition
  dataflow_refs:
  - dataflow
decomposition:
  strategy: manifest_owned_leaf_decomposition
  owners:
  - module: axi_write_tlp_collector
    file: rtl/axi_write_tlp_collector.sv
    responsibility: Implements the SSOT-owned behavior and interface contract assigned
      to this module.
    source_sections:
    - txn_axi_write_tlp
  - module: pcie_mctp_packet_decoder
    file: rtl/pcie_mctp_packet_decoder.sv
    responsibility: Implements the SSOT-owned behavior and interface contract assigned
      to this module.
    source_sections: *id001
  - module: assembly_context_table
    file: rtl/assembly_context_table.sv
    responsibility: Implements the SSOT-owned behavior and interface contract assigned
      to this module.
    source_sections: *id002
  - module: sram_payload_packer
    file: rtl/sram_payload_packer.sv
    responsibility: Implements the SSOT-owned behavior and interface contract assigned
      to this module.
    source_sections: *id003
  - module: apb_register_file
    file: rtl/apb_register_file.sv
    responsibility: Implements the SSOT-owned behavior and interface contract assigned
      to this module.
    source_sections:
    - txn_apb_csr
  - module: mctp_assembler_scratch_v7
    file: rtl/mctp_assembler_scratch_v7.sv
    responsibility: Top-level integration module matching SSOT top_module
    source_sections: *id004
  integration_policy: Top-level wiring must be backed by integration.connections or
    sub_modules[].connections before signoff.
  source_refs:
  - sub_modules
  - function_model
  - cycle_model
  - integration
rtl_contract:
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM1
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: '1'
  input_map:
    request: declared input ports
  output_map:
    response: declared output ports
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transaction.
  - Input sampling and output observation follow cycle_model handshake and latency
    rules.
parameters:
- name: AXI_ADDR_WIDTH
  type: int
  default: 16
  constraints: '>=12'
- name: AXI_DATA_WIDTH
  type: int
  default: 256
  constraints: ==256
- name: AXI_STRB_WIDTH
  type: int
  default: 32
  constraints: ==AXI_DATA_WIDTH/8
- name: SRAM_ADDR_WIDTH
  type: int
  default: 16
  constraints: '>=16'
- name: SRAM_DATA_WIDTH
  type: int
  default: 256
  constraints: ==256
- name: CONTEXT_COUNT
  type: int
  default: 15
  constraints: '>=1'
- name: TLP_HEADER_SNAPSHOT_BYTES
  type: int
  default: 16
  constraints: ==16
- name: MIN_TRANSMISSION_UNIT_BYTES
  type: int
  default: 64
  constraints: ==64
- name: MAX_TRANSMISSION_UNIT_BYTES
  type: int
  default: 4096
  constraints: ==4096
- name: TRANSMISSION_UNIT_ALIGN_BYTES
  type: int
  default: 4
  constraints: ==4
- name: MAX_TLP_BYTES
  type: int
  default: 4112
  constraints: ==16+4096
- name: MAX_TLP_BEATS
  type: int
  default: 129
  constraints: ceil(MAX_TLP_BYTES/32)
- name: MAX_MESSAGE_BYTES
  type: int
  default: 4096
  constraints: <=4096
- name: BASELINE_MTU_BYTES
  type: int
  default: 64
  constraints: ==64
- name: DESCRIPTOR_FIFO_DEPTH
  type: int
  default: 8
  constraints: '>=1'
- name: TIMEOUT_COUNTER_WIDTH
  type: int
  default: 24
  constraints: '>=1'
io_list:
  interfaces:
  - name: clock_reset_axi
    protocol: clock_reset
    role: sink
    signals:
    - name: axi_aclk
      direction: input
      width: 1
    - name: axi_aresetn
      direction: input
      width: 1
      reset_active: low
    handshake: axi_aresetn synchronously resets AXI/parser/context/SRAM/AXI-read logic
      in axi_aclk domain.
    type: custom
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    ports:
    - name: axi_aclk
      direction: input
      width: 1
      description: clock_reset_axi input port axi_aclk width 1
    - name: axi_aresetn
      direction: input
      width: 1
      description: clock_reset_axi input port axi_aresetn width 1; reset active low
  - name: clock_reset_apb
    protocol: clock_reset
    role: sink
    signals:
    - name: pclk
      direction: input
      width: 1
    - name: presetn
      direction: input
      width: 1
      reset_active: low
    handshake: presetn resets APB CSR logic in pclk domain; CDC required for axi_aclk
      status/events.
    type: custom
    clock_domain: pclk
    reset_domain: presetn
    ports:
    - name: pclk
      direction: input
      width: 1
      description: clock_reset_apb input port pclk width 1
    - name: presetn
      direction: input
      width: 1
      description: clock_reset_apb input port presetn width 1; reset active low
  - name: s_axi_write_ingress
    protocol: AXI4_write_no_id
    role: slave
    signals:
    - name: s_axi_awaddr
      direction: input
      width: AXI_ADDR_WIDTH
    - name: s_axi_awlen
      direction: input
      width: 8
    - name: s_axi_awsize
      direction: input
      width: 3
    - name: s_axi_awburst
      direction: input
      width: 2
    - name: s_axi_awvalid
      direction: input
      width: 1
    - name: s_axi_awready
      direction: output
      width: 1
    - name: s_axi_wdata
      direction: input
      width: AXI_DATA_WIDTH
    - name: s_axi_wstrb
      direction: input
      width: AXI_STRB_WIDTH
    - name: s_axi_wlast
      direction: input
      width: 1
    - name: s_axi_wvalid
      direction: input
      width: 1
    - name: s_axi_wready
      direction: output
      width: 1
    - name: s_axi_bresp
      direction: output
      width: 2
    - name: s_axi_bvalid
      direction: output
      width: 1
    - name: s_axi_bready
      direction: input
      width: 1
    handshake: AW and W use valid/ready; one outstanding write; one transaction equals
      one TLP; WLAST must match AWLEN final beat; AWSIZE=5, AWBURST=INCR; B OKAY after
      consumed, protocol errors via status/drop counters.
    backpressure: s_axi_awready/s_axi_wready deassert when disabled without drop mode,
      busy, buffering full, or downstream unavailable.
    type: custom
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    ports:
    - name: s_axi_awaddr
      direction: input
      width: AXI_ADDR_WIDTH
      description: s_axi_write_ingress input port s_axi_awaddr width AXI_ADDR_WIDTH
    - name: s_axi_awlen
      direction: input
      width: 8
      description: s_axi_write_ingress input port s_axi_awlen width 8
    - name: s_axi_awsize
      direction: input
      width: 3
      description: s_axi_write_ingress input port s_axi_awsize width 3
    - name: s_axi_awburst
      direction: input
      width: 2
      description: s_axi_write_ingress input port s_axi_awburst width 2
    - name: s_axi_awvalid
      direction: input
      width: 1
      description: s_axi_write_ingress input port s_axi_awvalid width 1
    - name: s_axi_awready
      direction: output
      width: 1
      description: s_axi_write_ingress output port s_axi_awready width 1
    - name: s_axi_wdata
      direction: input
      width: AXI_DATA_WIDTH
      description: s_axi_write_ingress input port s_axi_wdata width AXI_DATA_WIDTH
    - name: s_axi_wstrb
      direction: input
      width: AXI_STRB_WIDTH
      description: s_axi_write_ingress input port s_axi_wstrb width AXI_STRB_WIDTH
    - name: s_axi_wlast
      direction: input
      width: 1
      description: s_axi_write_ingress input port s_axi_wlast width 1
    - name: s_axi_wvalid
      direction: input
      width: 1
      description: s_axi_write_ingress input port s_axi_wvalid width 1
    - name: s_axi_wready
      direction: output
      width: 1
      description: s_axi_write_ingress output port s_axi_wready width 1
    - name: s_axi_bresp
      direction: output
      width: 2
      description: s_axi_write_ingress output port s_axi_bresp width 2
    - name: s_axi_bvalid
      direction: output
      width: 1
      description: s_axi_write_ingress output port s_axi_bvalid width 1
    - name: s_axi_bready
      direction: input
      width: 1
      description: s_axi_write_ingress input port s_axi_bready width 1
  - name: s_axi_read_payload
    protocol: AXI4_read_no_id
    role: slave
    signals:
    - name: s_axi_araddr
      direction: input
      width: AXI_ADDR_WIDTH
    - name: s_axi_arlen
      direction: input
      width: 8
    - name: s_axi_arsize
      direction: input
      width: 3
    - name: s_axi_arburst
      direction: input
      width: 2
    - name: s_axi_arvalid
      direction: input
      width: 1
    - name: s_axi_arready
      direction: output
      width: 1
    - name: s_axi_rdata
      direction: output
      width: AXI_DATA_WIDTH
    - name: s_axi_rresp
      direction: output
      width: 2
    - name: s_axi_rlast
      direction: output
      width: 1
    - name: s_axi_rvalid
      direction: output
      width: 1
    - name: s_axi_rready
      direction: input
      width: 1
    handshake: AR/R valid-ready; one outstanding read; ARSIZE=5, ARBURST=INCR; RLAST
      on ARLEN final beat; invalid payload range returns zero with SLVERR unless raw_sram_debug_read_enable.
    backpressure: read requests may stall behind assembly SRAM writes; responses wait
      for SRAM response and RREADY.
    type: custom
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    ports:
    - name: s_axi_araddr
      direction: input
      width: AXI_ADDR_WIDTH
      description: s_axi_read_payload input port s_axi_araddr width AXI_ADDR_WIDTH
    - name: s_axi_arlen
      direction: input
      width: 8
      description: s_axi_read_payload input port s_axi_arlen width 8
    - name: s_axi_arsize
      direction: input
      width: 3
      description: s_axi_read_payload input port s_axi_arsize width 3
    - name: s_axi_arburst
      direction: input
      width: 2
      description: s_axi_read_payload input port s_axi_arburst width 2
    - name: s_axi_arvalid
      direction: input
      width: 1
      description: s_axi_read_payload input port s_axi_arvalid width 1
    - name: s_axi_arready
      direction: output
      width: 1
      description: s_axi_read_payload output port s_axi_arready width 1
    - name: s_axi_rdata
      direction: output
      width: AXI_DATA_WIDTH
      description: s_axi_read_payload output port s_axi_rdata width AXI_DATA_WIDTH
    - name: s_axi_rresp
      direction: output
      width: 2
      description: s_axi_read_payload output port s_axi_rresp width 2
    - name: s_axi_rlast
      direction: output
      width: 1
      description: s_axi_read_payload output port s_axi_rlast width 1
    - name: s_axi_rvalid
      direction: output
      width: 1
      description: s_axi_read_payload output port s_axi_rvalid width 1
    - name: s_axi_rready
      direction: input
      width: 1
      description: s_axi_read_payload input port s_axi_rready width 1
  - name: apb_csr
    protocol: APB
    role: slave
    signals:
    - name: paddr
      direction: input
      width: 16
    - name: psel
      direction: input
      width: 1
    - name: penable
      direction: input
      width: 1
    - name: pwrite
      direction: input
      width: 1
    - name: pwdata
      direction: input
      width: 32
    - name: prdata
      direction: output
      width: 32
    - name: pready
      direction: output
      width: 1
    - name: pslverr
      direction: output
      width: 1
    handshake: APB two-phase setup/access; CSR side effects on psel&penable&pready;
      status/events CDC synchronized.
    type: custom
    clock_domain: pclk
    reset_domain: presetn
    ports:
    - name: paddr
      direction: input
      width: 16
      description: apb_csr input port paddr width 16
    - name: psel
      direction: input
      width: 1
      description: apb_csr input port psel width 1
    - name: penable
      direction: input
      width: 1
      description: apb_csr input port penable width 1
    - name: pwrite
      direction: input
      width: 1
      description: apb_csr input port pwrite width 1
    - name: pwdata
      direction: input
      width: 32
      description: apb_csr input port pwdata width 32
    - name: prdata
      direction: output
      width: 32
      description: apb_csr output port prdata width 32
    - name: pready
      direction: output
      width: 1
      description: apb_csr output port pready width 1
    - name: pslverr
      direction: output
      width: 1
      description: apb_csr output port pslverr width 1
  - name: payload_sram
    protocol: ready_valid_sram_256
    role: master
    signals:
    - name: sram_wr_valid
      direction: output
      width: 1
    - name: sram_wr_ready
      direction: input
      width: 1
    - name: sram_wr_addr
      direction: output
      width: SRAM_ADDR_WIDTH
    - name: sram_wr_data
      direction: output
      width: SRAM_DATA_WIDTH
    - name: sram_wr_strb
      direction: output
      width: AXI_STRB_WIDTH
    - name: sram_rd_req_valid
      direction: output
      width: 1
    - name: sram_rd_req_ready
      direction: input
      width: 1
    - name: sram_rd_req_addr
      direction: output
      width: SRAM_ADDR_WIDTH
    - name: sram_rd_rsp_valid
      direction: input
      width: 1
    - name: sram_rd_rsp_ready
      direction: output
      width: 1
    - name: sram_rd_rsp_data
      direction: input
      width: SRAM_DATA_WIDTH
    - name: sram_rd_rsp_error
      direction: input
      width: 1
    handshake: ready/valid write and read channels in axi_aclk; assembly writes have
      priority over firmware reads; strb marks payload lanes only.
    type: custom
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    ports:
    - name: sram_wr_valid
      direction: output
      width: 1
      description: payload_sram output port sram_wr_valid width 1
    - name: sram_wr_ready
      direction: input
      width: 1
      description: payload_sram input port sram_wr_ready width 1
    - name: sram_wr_addr
      direction: output
      width: SRAM_ADDR_WIDTH
      description: payload_sram output port sram_wr_addr width SRAM_ADDR_WIDTH
    - name: sram_wr_data
      direction: output
      width: SRAM_DATA_WIDTH
      description: payload_sram output port sram_wr_data width SRAM_DATA_WIDTH
    - name: sram_wr_strb
      direction: output
      width: AXI_STRB_WIDTH
      description: payload_sram output port sram_wr_strb width AXI_STRB_WIDTH
    - name: sram_rd_req_valid
      direction: output
      width: 1
      description: payload_sram output port sram_rd_req_valid width 1
    - name: sram_rd_req_ready
      direction: input
      width: 1
      description: payload_sram input port sram_rd_req_ready width 1
    - name: sram_rd_req_addr
      direction: output
      width: SRAM_ADDR_WIDTH
      description: payload_sram output port sram_rd_req_addr width SRAM_ADDR_WIDTH
    - name: sram_rd_rsp_valid
      direction: input
      width: 1
      description: payload_sram input port sram_rd_rsp_valid width 1
    - name: sram_rd_rsp_ready
      direction: output
      width: 1
      description: payload_sram output port sram_rd_rsp_ready width 1
    - name: sram_rd_rsp_data
      direction: input
      width: SRAM_DATA_WIDTH
      description: payload_sram input port sram_rd_rsp_data width SRAM_DATA_WIDTH
    - name: sram_rd_rsp_error
      direction: input
      width: 1
      description: payload_sram input port sram_rd_rsp_error width 1
  - name: interrupt
    protocol: level_interrupt
    role: source
    signals:
    - name: intr
      direction: output
      width: 1
    handshake: active-high level equals masked pending interrupt status.
    type: custom
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    ports:
    - name: intr
      direction: output
      width: 1
      description: interrupt output port intr width 1
  clock_domains:
  - name: axi_aclk
    frequency_mhz: 100
    description: AXI ingress/parser/assembly/SRAM/AXI-read clock
    ports:
    - name: axi_aclk
      width: 1
      direction: input
      description: AXI domain clock
  - name: pclk
    frequency_mhz: 100
    description: APB CSR clock asynchronous to axi_aclk
    ports:
    - name: pclk
      width: 1
      direction: input
      description: APB clock
  resets:
  - name: axi_aresetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: AXI domain active-low reset
    ports:
    - name: axi_aresetn
      width: 1
      direction: input
      description: AXI reset
  - name: presetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: APB domain active-low reset
    ports:
    - name: presetn
      width: 1
      direction: input
      description: APB reset
features:
- id: f_axi_tlp_ingress
  description: Convert 256-bit AXI4 write transaction bytes into one raw Non-Flit
    PCIe VDM TLP; validate AWLEN/WLAST/WSTRB/AWSIZE/AWBURST and byte count.
- id: f_pcie_vdm_decode
  description: Decode supported MCTP-over-PCIe VDM fields; accept Message Code 0x7F,
    DMTF Vendor ID 0x1AB4, MCTP VDM Code 0, header version 1, Non-Flit 16-byte header.
- id: f_mctp_assembly
  description: Assemble payload-only MCTP message bodies across interleaved contexts
    keyed by {source_eid,tag_owner,message_tag}; preserve per-context partial SRAM
    word state and first/last TLP snapshots.
- id: f_payload_sram_axi_read
  description: Linear bump allocator writes contiguous payload bytes to 256-bit SRAM;
    AXI read path returns completed descriptor payload ranges.
- id: f_apb_csr_irq
  description: APB registers expose control/status/interrupt/counters/descriptors/debug
    and every context/Q register bank.
dataflow:
  source: declared io_list request/control interfaces
  sequence:
  - accept legal work under cycle_model handshake or command rules
  - evaluate function_model transaction and declared feature behavior
  - update only declared architectural state/status/events
  - publish response, output, interrupt, or debug observability event
  sinks:
  - declared outputs
  - status/debug observability
  - register reads if registers exist
  ordering: Externally visible ordering follows cycle_model.ordering unless the SSOT
    explicitly approves reordering.
function_model:
  purpose: Cycle-independent behavioral contract for rtl-gen and tb-gen.
  state_variables:
  - name: enabled
    width: 1
    reset: 0
    description: Ingress enable control
  - name: contexts_active
    width: CONTEXT_COUNT
    reset: 0
    description: One active bit per assembly context
  - name: descriptor_count
    width: 4
    reset: 0
    description: Completed descriptor/header queue occupancy
  - name: packet_drop_count
    width: 32
    reset: 0
    description: Saturating packet drop counter
  - name: assembly_drop_count
    width: 32
    reset: 0
    description: Saturating assembly drop counter
  - name: sram_alloc_next
    width: SRAM_ADDR_WIDTH
    reset: sram_base
    description: Linear bump allocator next byte address
  transactions:
  - id: txn_axi_write_tlp
    name: AXI write transaction to TLP bytes
    preconditions:
    - s_axi_awvalid && s_axi_awready then AWLEN+1 W handshakes
    inputs:
    - AWADDR/AWLEN/AWSIZE/AWBURST
    - WDATA/WSTRB/WLAST
    outputs:
    - B response and collected TLP event
    output_rules:
    - port: s_axi_awready
      width: 1
      expr: enabled || drop_when_disabled
    - port: s_axi_wready
      width: 1
      expr: write_txn_active && downstream_can_accept
    - port: s_axi_bresp
      width: 2
      expr: 2'b00
    - port: s_axi_bvalid
      width: 1
      expr: write_txn_done
    state_updates:
    - name: tlp_seen_count
      width: 32
      expr: tlp_seen_count + write_txn_done
    error_cases:
    - condition: bad AWSIZE/AWBURST/WLAST/WSTRB/length
      result: packet_drop_event with PD_MALFORMED_TLP
  - id: txn_decode_packet
    name: PCIe VDM and MCTP header decode
    preconditions:
    - complete TLP byte array available
    inputs:
    - tlp_bytes
    outputs:
    - decoded packet fields or packet drop
    output_rules:
    - port: decoded_valid
      width: 1
      expr: tlp_len>=16 && msg_code==8'h7f && vendor_id==16'h1ab4 && mctp_vdm_code==4'h0
        && hdr_version==4'h1
    - port: packet_payload_len
      width: 13
      expr: pcie_data_bytes - 4 - pad_len - digest_bytes
    state_updates:
    - name: packet_drop_count
      width: 32
      expr: packet_drop_count + packet_drop_event
    error_cases:
    - condition: unsupported VDM, bad MCTP header, bad pad/alignment, dest EID reject
      result: packet_drop_event with priority-ordered PD reason
  - id: txn_context_append
    name: Context allocation/append/complete
    preconditions:
    - decoded packet passes packet-level checks
    inputs:
    - source_eid tag_owner message_tag som eom seq payload_bytes header_snapshot
    outputs:
    - context update and optional descriptor push
    output_rules:
    - port: descriptor_push_valid
      width: 1
      expr: accepted_packet && eom && !descriptor_full && !assembly_drop_event
    - port: intr
      width: 1
      expr: '|(intr_raw_status & intr_enable)'
    state_updates:
    - name: contexts_active
      width: CONTEXT_COUNT
      expr: allocate_or_update_context(source_eid,tag_owner,message_tag,som,eom)
    - name: expected_seq[key]
      width: 2
      expr: (packet_seq + 2) & 3
    - name: payload_byte_count[key]
      width: 13
      expr: payload_byte_count[key] + packet_payload_len
    - name: first_tlp_header[key]
      width: 128
      expr: 'som ? tlp_header_127_0 : first_tlp_header[key]'
    - name: last_tlp_header[key]
      width: 128
      expr: tlp_header_127_0
    error_cases:
    - condition: duplicate SOM, sequence mismatch, overflow, SRAM overflow, descriptor
        full, timeout
      result: assembly_drop_event aborts affected context
  - id: txn_payload_write
    name: Payload byte packing to 256-bit SRAM
    preconditions:
    - accepted payload bytes for active context
    inputs:
    - payload_bytes context partial word state
    outputs:
    - sram write ready/valid transfers
    output_rules:
    - port: sram_wr_valid
      width: 1
      expr: partial_word_full || (eom && partial_word_valid)
    - port: sram_wr_addr
      width: SRAM_ADDR_WIDTH
      expr: ctx_partial_word_addr
    - port: sram_wr_strb
      width: 32
      expr: ctx_partial_word_strobe
    - port: sram_wr_data
      width: 256
      expr: ctx_partial_word_data
    state_updates:
    - name: sram_alloc_next
      width: SRAM_ADDR_WIDTH
      expr: 'allocate_new_context ? next_alloc_after_reservation : sram_alloc_next'
    error_cases:
    - condition: SRAM backpressure
      result: stall without corrupting accepted bytes unless timeout/overflow occurs
  - id: txn_axi_read_payload
    name: Firmware AXI read of completed payload
    preconditions:
    - AR valid for payload read path
    inputs:
    - ARADDR ARLEN ARSIZE ARBURST descriptor ranges raw_sram_debug_read_enable
    outputs:
    - SRAM read requests and AXI R channel beats
    output_rules:
    - port: s_axi_arready
      width: 1
      expr: '!axi_read_busy'
    - port: sram_rd_req_valid
      width: 1
      expr: axi_read_busy && need_next_read_beat
    - port: s_axi_rdata
      width: 256
      expr: 'range_valid ? sram_rd_rsp_data : 256''d0'
    - port: s_axi_rresp
      width: 2
      expr: 'range_valid && !sram_rd_rsp_error ? 2''b00 : 2''b10'
    - port: s_axi_rlast
      width: 1
      expr: read_beat_index == arlen_latched
    state_updates:
    - name: fw_axi_read_beat_count
      width: 32
      expr: fw_axi_read_beat_count + (s_axi_rvalid && s_axi_rready && range_valid)
    - name: fw_axi_read_error_count
      width: 32
      expr: fw_axi_read_error_count + (s_axi_rvalid && s_axi_rready && (s_axi_rresp
        != 0))
    error_cases:
    - condition: outside SRAM window or no descriptor range
      result: zero data with SLVERR unless raw_sram_debug_read_enable
  invariants:
  - No externally visible output changes except through declared interfaces, registers,
    interrupts, or debug signals.
  - All state updates are synchronous to the declared clock and return to reset values
    under the declared reset policy.
  - Every declared error source has a defined architectural effect and recovery path.
  - Data movement and ordering follow the dataflow section without bypassing declared
    buffers or counters.
  reference_model_hint: tb-gen must build a scoreboard/reference model from function_model
    transactions and compare expected versus observed results.
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  executable: python
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel
    remains the behavioral oracle.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n assertion returns architectural state to declared reset values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion
      completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on clk at nominal 100 MHz; max depends on declared backpressure
        and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - signal: valid/ready
    rule: All valid payloads remain stable until the matching ready handshake completes.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0..N
    action: Accept legal request/command/packet/control work under declared handshake
      rules.
  - stage: S1_EVALUATE
    cycle: N..M
    action: Evaluate function_model transaction and update only declared state.
  - stage: S2_OBSERVE
    cycle: M..K
    action: Publish response/status/output/debug event and hold it stable until accepted.
  ordering:
  - Accepted requests update architectural state only on clock edges.
  - Completion/status/interrupt updates occur after the operation reaches its terminal
    FSM state.
  - Backpressure stalls the active handshake stage without corrupting stored state.
  - Read/dataflow stages must precede dependent write/output stages where declared
    in dataflow.
  backpressure:
  - Ready/valid deassertion stalls only the affected interface stage; payload and
    route/control state remain stable.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: No backpressure on the active interface
    outstanding:
      max: 1
      description: Default one accepted operation until the SSOT declares deeper buffering
    depth:
      pipeline_stages: 3
      queue_depth: 1
      description: Default accept/evaluate/observe cycle model depth
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one
    test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - Handshake/control state resets to idle
  - Observable outputs reset to function_model reset values
cdc_requirements:
  required: true
  rationale: AXI domain axi_aclk and APB domain pclk may be asynchronous; status/control/interrupt
    events require explicit CDC.
  checks:
  - Synchronize APB control commands into axi_aclk
  - Synchronize AXI status/counter/interrupt events into pclk
  - No unsynchronized multi-bit CDC without handshake or gray/event protocol
rdc_requirements:
  required: true
  rationale: axi_aresetn and presetn are distinct reset domains.
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
registers:
  blocks:
  - name: control
    fields:
