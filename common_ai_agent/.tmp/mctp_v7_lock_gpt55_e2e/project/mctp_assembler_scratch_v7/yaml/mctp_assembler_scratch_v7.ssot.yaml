    - payload_base_addr
    - payload_len
    - final_packet_sequence
    - context_id
    - completion_status
    - first_tlp_header
    - last_tlp_header
  - name: context_registers
    repeat: CONTEXT_COUNT
    fields:
    - ctx_state
    - ctx_valid
    - ctx_error
    - ctx_source_eid
    - ctx_destination_eid
    - ctx_tag_owner
    - ctx_message_tag
    - ctx_message_type
    - ctx_expected_seq
    - ctx_last_seq
    - ctx_payload_base_addr
    - ctx_payload_next_addr
    - ctx_payload_byte_count
    - ctx_transmission_unit_bytes
    - ctx_timeout_age
    - ctx_last_drop_reason
    - ctx_first_tlp_header
    - ctx_last_tlp_header
    - ctx_partial_word_addr
    - ctx_partial_word_strobe
    - ctx_partial_word_valid
    - ctx_partial_next_lane
  register_list: []
  no_registers: false
  policy: APB firmware-visible registers are required by locked requirements; register_list
    may be expanded by repair/signoff tooling from blocks.
memory:
  instances:
  - name: payload_sram_external
    type: external_sram
    data_width: 256
    addr_width: SRAM_ADDR_WIDTH
    byte_addressed: true
    description: External payload SRAM stores assembled MCTP payload bytes only; accessed
      through ready/valid SRAM ports.
  addressing:
    policy: No SSOT-approved internal memory instances; add explicit memories before
      rtl-gen may implement storage behavior.
  storage_policy: External SRAM stores only payload byte ranges described by completed
    descriptors; no PCIe/MCTP transport headers or pad/digest bytes are stored.
interrupts:
  style: active_high_level
  bits:
  - descriptor_ready
  - packet_drop
  - assembly_drop
  - context_timeout
  - sram_overflow
  - descriptor_queue_full
  - axi_write_malformed
  - axi_read_error
  - fatal_internal_error
fsm:
  control:
    states:
    - IDLE
    - ACCEPT
    - EXEC_FEATURE_1
    - EXEC_FEATURE_2
    - EXEC_FEATURE_3
    - EXEC_FEATURE_4
    - EXEC_FEATURE_5
    - COMPLETE
    - ERROR
    transitions:
    - from: IDLE
      to: ACCEPT
      when: A legal transaction, packet, command, or CSR operation is accepted
    - from: ACCEPT
      to: EXEC_FEATURE_1
      when: Inputs and configuration match function_model preconditions
    - from: EXEC_FEATURE_1
      to: EXEC_FEATURE_2
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_2
      to: EXEC_FEATURE_3
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_3
      to: EXEC_FEATURE_4
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_4
      to: EXEC_FEATURE_5
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_5
      to: COMPLETE
      when: The current SSOT-owned behavior slice completes
    - from: COMPLETE
      to: IDLE
      when: Observable result/status handoff completes
    - from: '*'
      to: ERROR
      when: error_handling.error_sources condition is detected
    - from: ERROR
      to: IDLE
      when: Reset or approved recovery action clears the error
    source: repair synthesized only generic control structure from existing SSOT facts;
      no IP-kind fixed FSM is implied
timing:
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    register_access:
      min: 0
      max: null
      measured_from: valid && ready
      measured_to: response valid && ready
    primary_operation:
      min: 1
      max: null
      measured_from: start/request accepted
      measured_to: done/response accepted
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
