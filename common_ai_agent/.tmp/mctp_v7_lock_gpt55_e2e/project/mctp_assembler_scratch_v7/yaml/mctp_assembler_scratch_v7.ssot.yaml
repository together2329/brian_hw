test_requirements:
  directed:
  - stimulus: Valid single-packet SOM=1,EOM=1 TLP on AXI write.
    expected: Payload-only bytes written contiguously to SRAM, descriptor valid, first
      and last header equal same 16-byte TLP header, descriptor_ready interrupt.
    checkers:
    - axi_write_monitor
    - pcie_vdm_monitor
    - mctp_monitor
    - sram_payload_scoreboard
    - descriptor_header_monitor
    coverage:
    - single_packet
    - descriptor_publish
    - irq_descriptor_ready
  - stimulus: Interleaved fragmented messages A and B with B completing before A.
    expected: Independent contexts preserve sequence, headers, SRAM base/next address,
      partial 32-byte pack state; payloads have no gaps/corruption.
    checkers:
    - context_scoreboard
    - sram_payload_scoreboard
    - descriptor_header_monitor
    coverage:
    - interleaving
    - per_context_partial_word
    - out_of_order_completion
  - stimulus: Malformed AXI/TLP cases including early WLAST, late WLAST, bad AWSIZE/AWBURST,
      non-contiguous WSTRB, short TLP, length mismatch.
    expected: Packet drop reason follows priority, no context/header/SRAM/descriptor
      side effects, counters increment.
    checkers:
    - axi_write_monitor
    - drop_reason_checker
    - no_side_effect_checker
    coverage:
    - all_PD_reasons
    - drop_priority
  - stimulus: Assembly error cases including duplicate SOM, sequence mismatch, message
      overflow, SRAM overflow, descriptor full, timeout.
    expected: Exactly affected context aborted, no success descriptor, assembly counters/reasons/interrupts
      set.
    checkers:
    - context_scoreboard
    - drop_reason_checker
    - descriptor_monitor
    coverage:
    - all_AD_reasons
  - stimulus: Firmware AXI reads completed and invalid payload ranges.
    expected: Completed range returns SRAM data with RLAST on final beat; invalid/no-descriptor
      range returns zero SLVERR unless raw debug enabled; reads stall safely behind
      writes.
    checkers:
    - axi_read_monitor
    - sram_read_monitor
    - csr_monitor
    coverage:
    - axi_read_valid
    - axi_read_slverr
    - read_write_arbitration
  reusable_monitors:
  - axi_write_transaction_monitor
  - axi_read_transaction_monitor
  - apb_register_monitor
  - pcie_vdm_monitor
  - mctp_packet_monitor
  - sram_write_monitor
  - descriptor_header_monitor
  mutation_categories:
  - axi_wstrb_packing
  - axi_read_routing
  - wlast_awlen_boundary
  - pcie_constants
  - length_pad_trim
  - mtu_validation
  - mctp_header_version
  - som_eom_sequence
  - assembly_key
  - header_snapshot
  - context_full
  - sram_packing
  - csr_irq_counter_decode
  - per_q_registers
  - descriptor_full
  scenarios:
  - id: SC01
    name: reset contract
    stimulus: Assert and release the declared reset while all external interfaces
      remain idle.
    expected: Architectural state, status, outputs, and debug observability match
      function_model reset outputs.
    checker: Reset checker compares all declared reset-visible state against function_model
      and cycle_model reset rules.
    coverage:
    - function_model.reset
    - cycle_model.reset
  - id: SC02
    name: primary approved behavior
    stimulus: Drive a legal request, transaction, command, packet, or CSR operation
      from function_model primary preconditions.
    expected: Externally observable result/status/side effects match the function_model
      primary transaction.
    checker: FL-vs-RTL scoreboard compares observable outputs and state updates from
      the locked function_model.
    coverage:
    - function_model.primary
    - features
    - dataflow
  - id: SC03
    name: cycle handshake and backpressure
    stimulus: Apply legal stalls or delayed handshakes on every declared cycle_model
      interface phase.
    expected: Payloads remain stable, ordering is preserved, and completion timing
      respects cycle_model latency/backpressure rules.
    checker: Protocol monitor and scoreboard check cycle_model.handshake_rules, ordering,
      and latency budget.
    coverage:
    - cycle_model.handshake_rules
    - cycle_model.ordering
    - backpressure
  - id: SC04
    name: error and recovery policy
    stimulus: Inject each declared error_handling.error_sources condition where the
      interface can represent it.
    expected: Error/status/response/recovery behavior follows error_handling without
      corrupting unrelated architectural state.
    checker: Negative checker compares error result and recovery state against function_model
      error_cases.
    coverage:
    - error_handling.error_sources
    - function_model.error_cases
  - id: SC05
    name: debug and trace observability
    stimulus: Run nominal and error flows while sampling every debug_observability
      waveform/status/trace point.
    expected: Debug/status/trace events reflect committed SSOT-visible state without
      exposing unsupported behavior.
    checker: Waveform/trace checker validates debug_observability entries and traceability.yaml_to_output
      rows.
    coverage:
    - debug_observability
    - traceability
  - id: SC06
    name: function_model transaction FM1
    stimulus: Drive preconditions for function_model transaction `FM1`.
    expected: Outputs and side effects match `FM1` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model
      transaction.
