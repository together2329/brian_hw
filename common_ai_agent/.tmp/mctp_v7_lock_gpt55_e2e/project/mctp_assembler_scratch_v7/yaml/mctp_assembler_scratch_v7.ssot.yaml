power:
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - clk
    isolation: not_required_single_domain
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
