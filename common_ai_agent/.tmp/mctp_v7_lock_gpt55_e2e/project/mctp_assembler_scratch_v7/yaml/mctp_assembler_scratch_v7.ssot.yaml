  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Behavioral coverage for function_model transactions, state updates,
        outputs, errors, and debug/status observability.
      bins:
      - id: FCOV_PRIMARY_TRANSACTION
        source_ref: function_model.transactions
        class: transaction
        description: Primary function_model transaction observed with RTL scoreboard
          evidence
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle coverage for cycle_model latency, pipeline stages, ordering,
        handshake rules, backpressure, and FSM transitions.
      bins:
      - id: CCOV_PRIMARY_CYCLE_RULE
        source_ref: cycle_model
        class: cycle_rule
        description: Primary cycle_model rule observed with RTL waveform/checker evidence
    functional: 'Legacy alias: coverage_goals.function and coverage_goals.cycle must
      both close.'
    evidence: Tool-instrumented structural metrics are optional unless an explicit
      SSOT metric goal with matching tool evidence is added.
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL
      scoreboard evidence
quality_gates:
  ssot:
    pass: check_ssot_disk.sh exits 0 and ATLAS SSOT progress is fully approved
    evidence:
    - check_ssot_disk.sh PASS
    - ATLAS /api/progress ssot all sections approved
  rtl:
    pass: All expected RTL files exist, are production-ready, compile, and lint within
      warning budget
    evidence:
    - list/<ip>.f
    - compile log
    - lint log
  rtl_gen:
    profile: standard
    pass: rtl-gen execution_policy.pass_allowed is true, every required SSOT-derived
      RTL TODO is closed, and provenance proves common_ai_agent rtl-gen authored the
      RTL without fixed-template fallback behavior
    evidence:
    - rtl/rtl_authoring_plan.json
    - logs/rtl-gen/rtl_todo_plan.json
    - rtl/provenance.json
    - rtl_compile.json
    - lint/dut_lint.json
  dv:
    pass: Every SSOT test_requirements scenario has an executable checker and FL-vs-RTL
      equivalence goal
    evidence:
    - verify/equivalence_goals.json
    - sim/scoreboard_events.jsonl
    - tb/cocotb tests
    - scenario implementation map
  coverage:
    pass: Functional coverage passes and any explicitly requested structural metrics
      have matching evidence or approved waivers
    evidence:
    - coverage report
    - coverage waiver list if any
  eda:
    pass: Synthesis/STA/DFT expectations have reports or approved waivers
    evidence:
    - syn/sta/dft reports
  signoff:
    pass: SSOT, FL/equivalence, RTL, lint, DV, sim, coverage, and EDA gates pass with
      fresh artifacts
    evidence:
    - ATLAS progress signoff PASS
traceability:
  yaml_to_output:
  - yaml: function_model
