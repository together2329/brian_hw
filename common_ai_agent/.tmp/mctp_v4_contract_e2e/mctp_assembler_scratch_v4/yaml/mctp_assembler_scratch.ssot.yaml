top_module:
  name: mctp_assembler_scratch
  file: rtl/mctp_assembler_scratch.sv
  version: 0.1.0
  type: peripheral
  description: AXI4 write-slave ingress block that accepts one PCIe VDM TLP per write transaction, assembles interleaved MCTP payload bytes into a 256-bit external SRAM interface with no packing holes, and exposes APB control plus AXI4 readback for firmware.
  reference_spec: req/mctp_assembler_scratch_requirements.md; DMTF DSP0236 MCTP Base Specification; DMTF DSP0238 MCTP PCIe VDM Transport Binding
  target:
    technology: generic
    clock_freq_mhz: 250
    area_um2: null
    power_mw: null
sub_modules:
- name: mctp_assembler_scratch_axi_write_ingress
  file: rtl/mctp_assembler_scratch_axi_write_ingress.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.axi_write_slave
  - function_model.transactions.FM_ACCEPT_AXI_TLP
  - cycle_model.handshake_rules.axi_write_channels
  source_sections:
  - io_list
  - function_model
  - cycle_model
  - dataflow
  - test_requirements
  function_model_refs:
  - function_model.transactions.FM_ACCEPT_AXI_TLP
  cycle_model_refs:
  - cycle_model.handshake_rules.axi_write_channels
  - cycle_model
  description: Collects exactly one AXI4 write burst as one raw PCIe VDM TLP and forwards byte-valid beat data.
  dataflow_refs:
  - dataflow
  test_refs:
  - test_requirements
- name: mctp_assembler_scratch_pcie_vdm_parser
  file: rtl/mctp_assembler_scratch_pcie_vdm_parser.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - custom.pcie_vdm_fields
  - function_model.transactions.FM_FILTER_VDM
  - error_handling.packet_drop_ids
  source_sections: &id001
  - custom
  - function_model
  - error_handling
  function_model_refs:
  - function_model.transactions.FM_FILTER_VDM
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
  description: Validates PCIe VDM envelope fields needed by MCTP-over-PCIe-VDM and emits packet drop reasons for unsupported packets.
- name: mctp_assembler_scratch_mctp_parser
  file: rtl/mctp_assembler_scratch_mctp_parser.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - custom.mctp_transport_fields
  - function_model.transactions.FM_PARSE_MCTP
  source_sections: &id002
  - custom
  - function_model
  function_model_refs:
  - function_model.transactions.FM_PARSE_MCTP
  description: Extracts source EID, destination EID, SOM, EOM, packet sequence, tag owner, message tag, and message type.
- name: mctp_assembler_scratch_context_table
  file: rtl/mctp_assembler_scratch_context_table.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances.context_table
  - fsm.context_fsm
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
  source_sections: &id003
  - memory
  - fsm
  - function_model
  - registers
  function_model_refs:
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
  - function_model.transactions.FM_COMPLETE_MESSAGE
  fsm_refs:
  - fsm.context_fsm
  description: Maintains 15 per-Q assembly contexts keyed by source EID, tag owner, and message tag.
- name: mctp_assembler_scratch_sram_packer
  file: rtl/mctp_assembler_scratch_sram_packer.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances.payload_sram_window
  - function_model.transactions.FM_SRAM_PACK_WRITE
  - dataflow.sram_pack
  source_sections: &id004
  - memory
  - function_model
  - dataflow
  - io_list
  function_model_refs:
  - function_model.transactions.FM_SRAM_PACK_WRITE
  description: Packs MCTP payload bytes into 32-byte SRAM beats without holes across fragment boundaries.
- name: mctp_assembler_scratch_axi_read_egress
  file: rtl/mctp_assembler_scratch_axi_read_egress.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.axi_read_slave
  - function_model.transactions.FM_AXI_READBACK
  - cycle_model.handshake_rules.axi_read_channels
  source_sections: &id005
  - io_list
  - function_model
  - cycle_model
  - memory
  function_model_refs:
  - function_model.transactions.FM_AXI_READBACK
  cycle_model_refs:
  - cycle_model.handshake_rules.axi_read_channels
  description: Services firmware AXI4 reads from completed descriptors through the SRAM read interface.
- name: mctp_assembler_scratch_sram_arbiter
  file: rtl/mctp_assembler_scratch_sram_arbiter.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.sram_write_port
  - io_list.interfaces.sram_read_port
  - cycle_model.arbitration
  source_sections: &id006
  - io_list
  - cycle_model
  - memory
  cycle_model_refs:
  - cycle_model.arbitration
  description: Gives assembly writes priority over firmware read requests while preserving read response ordering.
- name: mctp_assembler_scratch_descriptor_queue
  file: rtl/mctp_assembler_scratch_descriptor_queue.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances.descriptor_fifo
  - function_model.transactions.FM_COMPLETE_MESSAGE
  - registers.descriptor_window
  source_sections: &id007
  - memory
  - function_model
  - registers
  - interrupts
  function_model_refs:
  - function_model.transactions.FM_COMPLETE_MESSAGE
  - function_model.transactions.FM_PACKET_DROP
  description: Publishes completed message descriptors containing Q id, SRAM base, byte count, and first or last TLP header snapshots.
- name: mctp_assembler_scratch_apb_regfile
  file: rtl/mctp_assembler_scratch_apb_regfile.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.apb_slave
  - registers.register_list
  - interrupts.sources
  - debug_observability
  source_sections:
  - io_list
  - registers
  - interrupts
  - debug_observability
  - error_handling
  - features
  - fsm
  - decomposition
  register_refs:
  - registers.register_list
  description: Implements control, status, interrupt, counter, descriptor, debug, and per-Q APB-visible state registers.
  function_model_refs:
  - function_model.transactions.FM_COMPLETE_MESSAGE
  - function_model.transactions.FM_ASSEMBLY_DROP
  - function_model.transactions.FM_APB_ACCESS
  - function_model.transactions.FM_AXI_READBACK
  - function_model.state_variables
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
  - function_model.transactions.FM_PACKET_DROP
  feature_refs:
  - features
  fsm_refs:
  - fsm
  decomposition_refs:
  - decomposition
- name: mctp_assembler_scratch_cdc
  file: rtl/mctp_assembler_scratch_cdc.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - clock_reset_domains
  - cdc_requirements
  - interrupts
  source_sections: &id008
  - clock_reset_domains
  - cdc_requirements
  - interrupts
  description: Synchronizes APB-domain control into AXI domain and status/interrupt events back to APB domain.
- name: mctp_assembler_scratch_param
  file: rtl/mctp_assembler_scratch_param.vh
  ownership: manifest
  ssot_gen: true
  implements:
  - parameters
  source_sections: &id009
  - parameters
  description: Shared parameter and localparam include generated from SSOT parameters.
- name: mctp_assembler_scratch
  file: rtl/mctp_assembler_scratch.sv
  ownership: manifest
  ssot_gen: true
  wiring_only: true
  description: Top-level integration module matching SSOT top_module
  implements:
  - top_module
  - integration
  source_sections:
  - top_module
  - io_list
  - decomposition
  - integration
  decomposition_refs:
  - decomposition
  dataflow_refs:
  - dataflow
decomposition:
  strategy: manifest_owned_leaf_decomposition
  units:
  - id: axi_write_ingress
    kind: protocol_adapter
    source_refs:
    - io_list.interfaces.axi_write_slave
    - function_model.transactions.FM_ACCEPT_AXI_TLP
    rtl_candidates:
    - mctp_assembler_scratch_axi_write_ingress
    verification_impact:
    - test_requirements.scenarios.SC_VALID_SINGLE_PACKET
    - test_requirements.scenarios.SC_MAX_TU_4096_129_BEATS
  - id: vdm_and_mctp_parse
    kind: parser_filter
    source_refs:
    - custom.pcie_vdm_fields
    - custom.mctp_transport_fields
    - function_model.transactions.FM_FILTER_VDM
    - function_model.transactions.FM_PARSE_MCTP
    rtl_candidates:
    - mctp_assembler_scratch_pcie_vdm_parser
    - mctp_assembler_scratch_mctp_parser
    verification_impact:
    - test_requirements.scenarios.PD_MALFORMED_TLP
    - test_requirements.scenarios.PD_UNSUPPORTED_VDM
    - test_requirements.scenarios.PD_BAD_MCTP_HEADER
  - id: context_assembly
    kind: stateful_datapath
    source_refs:
    - function_model.transactions.FM_ASSEMBLE_FRAGMENT
    - fsm.context_fsm
    - memory.instances.context_table
    rtl_candidates:
    - mctp_assembler_scratch_context_table
    verification_impact:
    - test_requirements.scenarios.SC_INTERLEAVE_TWO_KEYS
    - test_requirements.scenarios.AD_SEQUENCE_MISMATCH
  - id: sram_pack_and_arb
    kind: memory_datapath
    source_refs:
    - function_model.transactions.FM_SRAM_PACK_WRITE
    - memory.instances.payload_sram_window
    - cycle_model.arbitration
    rtl_candidates:
    - mctp_assembler_scratch_sram_packer
    - mctp_assembler_scratch_sram_arbiter
    verification_impact:
    - test_requirements.scenarios.SC_UNALIGNED_SRAM_PACK_NO_HOLES
  - id: firmware_readback
    kind: protocol_adapter
    source_refs:
    - function_model.transactions.FM_AXI_READBACK
    - io_list.interfaces.axi_read_slave
    - io_list.interfaces.sram_read_port
    rtl_candidates:
    - mctp_assembler_scratch_axi_read_egress
    verification_impact:
    - test_requirements.scenarios.SC_AXI_READBACK_TRIM
  - id: register_debug
    kind: register_control
    source_refs:
    - registers.register_list
    - interrupts.sources
    - debug_observability
    rtl_candidates:
    - mctp_assembler_scratch_apb_regfile
    - mctp_assembler_scratch_cdc
    verification_impact:
    - test_requirements.scenarios.SC_APB_REGS_PER_Q
  owners:
  - module: mctp_assembler_scratch_axi_write_ingress
    file: rtl/mctp_assembler_scratch_axi_write_ingress.sv
    responsibility: Collects exactly one AXI4 write burst as one raw PCIe VDM TLP and forwards byte-valid beat data.
    source_sections:
    - io_list
    - function_model
    - cycle_model
    - dataflow
  - module: mctp_assembler_scratch_pcie_vdm_parser
    file: rtl/mctp_assembler_scratch_pcie_vdm_parser.sv
    responsibility: Validates PCIe VDM envelope fields needed by MCTP-over-PCIe-VDM and emits packet drop reasons for unsupported packets.
    source_sections: *id001
  - module: mctp_assembler_scratch_mctp_parser
    file: rtl/mctp_assembler_scratch_mctp_parser.sv
    responsibility: Extracts source EID, destination EID, SOM, EOM, packet sequence, tag owner, message tag, and message type.
    source_sections: *id002
  - module: mctp_assembler_scratch_context_table
    file: rtl/mctp_assembler_scratch_context_table.sv
    responsibility: Maintains 15 per-Q assembly contexts keyed by source EID, tag owner, and message tag.
    source_sections: *id003
  - module: mctp_assembler_scratch_sram_packer
    file: rtl/mctp_assembler_scratch_sram_packer.sv
    responsibility: Packs MCTP payload bytes into 32-byte SRAM beats without holes across fragment boundaries.
    source_sections: *id004
  - module: mctp_assembler_scratch_axi_read_egress
    file: rtl/mctp_assembler_scratch_axi_read_egress.sv
    responsibility: Services firmware AXI4 reads from completed descriptors through the SRAM read interface.
    source_sections: *id005
  - module: mctp_assembler_scratch_sram_arbiter
    file: rtl/mctp_assembler_scratch_sram_arbiter.sv
    responsibility: Gives assembly writes priority over firmware read requests while preserving read response ordering.
    source_sections: *id006
  - module: mctp_assembler_scratch_descriptor_queue
    file: rtl/mctp_assembler_scratch_descriptor_queue.sv
    responsibility: Publishes completed message descriptors containing Q id, SRAM base, byte count, and first or last TLP header snapshots.
    source_sections: *id007
  - module: mctp_assembler_scratch_apb_regfile
    file: rtl/mctp_assembler_scratch_apb_regfile.sv
    responsibility: Implements control, status, interrupt, counter, descriptor, debug, and per-Q APB-visible state registers.
    source_sections:
    - io_list
    - registers
    - interrupts
    - debug_observability
    - error_handling
  - module: mctp_assembler_scratch_cdc
    file: rtl/mctp_assembler_scratch_cdc.sv
    responsibility: Synchronizes APB-domain control into AXI domain and status/interrupt events back to APB domain.
    source_sections: *id008
  - module: mctp_assembler_scratch_param
    file: rtl/mctp_assembler_scratch_param.vh
    responsibility: Shared parameter and localparam include generated from SSOT parameters.
    source_sections: *id009
  - module: mctp_assembler_scratch
    file: rtl/mctp_assembler_scratch.sv
    responsibility: Top-level integration module matching SSOT top_module
    source_sections:
    - top_module
    - io_list
    - decomposition
    - integration
  integration_policy: Top-level wiring must be backed by integration.connections or sub_modules[].connections before signoff.
  source_refs:
  - sub_modules
  - function_model
  - cycle_model
  - integration
rtl_contract:
  owner: ssot-gen
  transaction: FM_ACCEPT_AXI_TLP
  clock: axi_aclk
  reset: axi_aresetn
  reset_active: low
  sample_condition: axi_aw_accept and axi_wlast_seen
  input_map:
    axi_aw_accept: m_axi_awready
    axi_wlast_seen: m_axi_wlast
    tlp_valid: decoded PCIe VDM TLP accepted by parser
    payload_len: decoded MCTP payload byte count after transport header removal
    source_eid: decoded MCTP source endpoint ID
    tag_owner: decoded MCTP tag owner bit
    message_tag: decoded MCTP message tag
    m_axi_awaddr: m_axi_awaddr
    m_axi_awlen: m_axi_awlen
    m_axi_awsize: m_axi_awsize
    m_axi_awburst: m_axi_awburst
    m_axi_awvalid: m_axi_awvalid
    m_axi_wdata: m_axi_wdata
    m_axi_wstrb: m_axi_wstrb
    m_axi_wlast: m_axi_wlast
    m_axi_wvalid: m_axi_wvalid
    m_axi_bready: m_axi_bready
    m_axi_araddr: m_axi_araddr
    m_axi_arlen: m_axi_arlen
    m_axi_arsize: m_axi_arsize
    m_axi_arburst: m_axi_arburst
    m_axi_arvalid: m_axi_arvalid
    m_axi_rready: m_axi_rready
    paddr: paddr
    psel: psel
    penable: penable
    pwrite: pwrite
    pwdata: pwdata
    pstrb: pstrb
    sram_wr_ready: sram_wr_ready
    sram_rd_req_ready: sram_rd_req_ready
    sram_rd_rsp_data: sram_rd_rsp_data
    sram_rd_rsp_error: sram_rd_rsp_error
  output_map:
    bvalid_next: m_axi_bvalid
    bresp_next: m_axi_bresp
    sram_write_valid: sram_wr_valid
    readback_valid: m_axi_rvalid
    apb_ready: pready
    interrupt: irq
    debug_drop: debug_drop_pulse
    m_axi_awready: m_axi_awready
    m_axi_wready: m_axi_wready
    m_axi_bresp: m_axi_bresp
    m_axi_bvalid: m_axi_bvalid
    m_axi_arready: m_axi_arready
    m_axi_rdata: m_axi_rdata
    m_axi_rresp: m_axi_rresp
    m_axi_rlast: m_axi_rlast
    m_axi_rvalid: m_axi_rvalid
    prdata: prdata
    pready: pready
    pslverr: pslverr
    sram_wr_valid: sram_wr_valid
    sram_wr_addr: sram_wr_addr
    sram_wr_data: sram_wr_data
    sram_wr_strb: sram_wr_strb
    sram_rd_req_valid: sram_rd_req_valid
    sram_rd_req_addr: sram_rd_req_addr
    sram_rd_rsp_ready: sram_rd_rsp_ready
    irq: irq
    debug_context_id: debug_context_id
    debug_context_key: debug_context_key
    debug_drop_pulse: debug_drop_pulse
    debug_vdm_valid: debug_vdm_valid
  state_updates:
  - name: collected_tlp_count
    reset: 0
    expr: collected_tlp_count + axi_wlast_seen
  - name: payload_byte_count
    reset: 0
    expr: payload_byte_count + payload_len
  - name: active_context_count
    reset: 0
    expr: active_context_count + context_alloc
  contract_invariants:
  - AXI write has no ID signals and only one outstanding write transaction is accepted.
  - AXI read has no ID signals and only one outstanding read transaction is accepted.
  - SRAM stores MCTP payload bytes only; PCIe TLP headers are retained in context metadata and descriptors.
  - Descriptor pop does not reclaim SRAM space in the first target.
  type: ssot_derived_rule_contract
  ready_output: sram_rd_rsp_ready
  output_valid: sram_wr_valid
  output_rules:
  - name: bvalid_next
    port: m_axi_bvalid
    expr: axi_aw_accept and axi_wlast_seen
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: bresp_next
    port: m_axi_bresp
    expr: BRESP_OKAY
    width: 2
    description: FunctionalModel output observable mapped to DUT output port.
  - name: debug_vdm_valid
    port: debug_vdm_valid
    expr: vdm_supported
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: debug_drop_pulse
    port: debug_drop_pulse
    expr: packet_drop_reason != DROP_NONE
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: debug_context_key
    port: debug_context_key
    expr: context_key
    width: 18
    description: FunctionalModel output observable mapped to DUT output port.
  - name: debug_context_id
    port: debug_context_id
    expr: context_id
    width: 4
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_write_valid
    port: sram_wr_valid
    expr: payload_valid and (word_full or eom)
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_write_addr
    port: sram_wr_addr
    expr: current_word_addr
    width: SRAM_ADDR_WIDTH
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_write_data
    port: sram_wr_data
    expr: payload_data_word
    width: 256
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_write_strb
    port: sram_wr_strb
    expr: payload_byte_strobe
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: interrupt
    port: irq
    expr: descriptor_publish
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: apb_ready
    port: pready
    expr: apb_access
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: apb_error
    port: pslverr
    expr: illegal_apb_access
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: readback_valid
    port: m_axi_rvalid
    expr: axi_ar_accept
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: readback_data_out
    port: m_axi_rdata
    expr: readback_data if read_has_descriptor else ZERO_256
    width: 256
    description: FunctionalModel output observable mapped to DUT output port.
  - name: readback_resp
    port: m_axi_rresp
    expr: RESP_OKAY if read_has_descriptor else RESP_SLVERR
    width: 2
    description: FunctionalModel output observable mapped to DUT output port.
  - name: readback_last
    port: m_axi_rlast
    expr: read_last
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  unresolved_expression_refs:
  - BRESP_OKAY
  - DROP_NONE
  - RESP_OKAY
  - RESP_SLVERR
  - STATE_ASSEMBLING
  - STATE_DONE_WAIT_DESCRIPTOR_POP
  - STATE_ERROR
  - ZERO_256
  - apb_wdata
  - apb_write
  - assembly_drop_reason
  - axi_ar_accept
  - context_accept
  - context_alloc
  - context_id
  - current_word_addr
  - descriptor_publish
  - destination_eid
  - eom
  - illegal_apb_access
  - lane_advance
  - message_type
  - next_seq
  - packet_drop_reason
  - packet_seq
  - payload_byte_strobe
  - payload_data_word
  - payload_valid
  - read_has_descriptor
  - read_last
  - readback_data
  - vdm_supported
  - word_full
parameters:
- name: AXI_ADDR_WIDTH
  default: 16
  type: int
  description: AXI4 address width in bits
  drives:
  - io_list.interfaces.axi_write_slave
  - io_list.interfaces.axi_read_slave
- name: AXI_DATA_WIDTH
  default: 256
  type: int
  description: AXI4 data width in bits
  drives:
  - io_list.interfaces.axi_write_slave
  - io_list.interfaces.axi_read_slave
- name: AXI_STRB_WIDTH
  default: 32
  type: int
  description: AXI4 byte strobe width
  drives:
  - io_list.interfaces.axi_write_slave
- name: SRAM_ADDR_WIDTH
  default: 16
  type: int
  description: Byte address width for external SRAM payload window
  drives:
  - io_list.interfaces.sram_write_port
  - io_list.interfaces.sram_read_port
- name: SRAM_DATA_WIDTH
  default: 256
  type: int
  description: External SRAM data width in bits
  drives:
  - io_list.interfaces.sram_write_port
  - io_list.interfaces.sram_read_port
- name: CONTEXT_COUNT
  default: 15
  type: int
  description: Number of interleavable assembly contexts
  drives:
  - mctp_assembler_scratch_context_table
- name: TLP_HEADER_SNAPSHOT_BYTES
  default: 16
  type: int
  description: First and last TLP header snapshot bytes per context
  drives:
  - registers.per_q_bank
- name: MIN_TRANSMISSION_UNIT_BYTES
  default: 64
  type: int
  description: Minimum programmed MCTP transmission unit
  drives:
  - function_model.transactions.FM_PARSE_MCTP
- name: MAX_TRANSMISSION_UNIT_BYTES
  default: 4096
  type: int
  description: Maximum programmed MCTP transmission unit
  drives:
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
- name: TRANSMISSION_UNIT_ALIGN_BYTES
  default: 4
  type: int
  description: Transmission unit alignment requirement
  drives:
  - error_handling.error_sources.PD_BAD_PAD_OR_ALIGNMENT
- name: MAX_TLP_BYTES
  default: 4112
  type: int
  description: Maximum supported raw TLP bytes for one transaction
  drives:
  - mctp_assembler_scratch_axi_write_ingress
- name: MAX_TLP_BEATS
  default: 129
  type: int
  description: Maximum 256-bit AXI write beats for one TLP
  drives:
  - mctp_assembler_scratch_axi_write_ingress
- name: MAX_MESSAGE_BYTES
  default: 4096
  type: int
  description: Maximum assembled MCTP message payload bytes
  drives:
  - mctp_assembler_scratch_context_table
- name: BASELINE_MTU_BYTES
  default: 64
  type: int
  description: Default programmed transmission unit after reset
  drives:
  - registers.GLOBAL_CFG
- name: DESCRIPTOR_FIFO_DEPTH
  default: 8
  type: int
  description: Completed descriptor queue depth
  drives:
  - mctp_assembler_scratch_descriptor_queue
- name: TIMEOUT_COUNTER_WIDTH
  default: 24
  type: int
  description: Per-Q timeout age counter width
  drives:
  - mctp_assembler_scratch_context_table
- name: STATE_IDLE
  default: 0
  type: int
  description: Context is idle
  drives:
  - fsm.context_fsm
- name: STATE_ASSEMBLING
  default: 1
  type: int
  description: Context is assembling a message
  drives:
  - fsm.context_fsm
- name: STATE_ERROR
  default: 2
  type: int
  description: Context holds an assembly error
  drives:
  - fsm.context_fsm
- name: STATE_DONE_WAIT_DESCRIPTOR_POP
  default: 3
  type: int
  description: Context is complete and waits for descriptor pop
  drives:
  - fsm.context_fsm
- name: RESP_OKAY
  default: 0
  type: int
  description: AXI OKAY response encoding
  drives:
  - function_model.transactions.FM_AXI_READBACK
- name: RESP_SLVERR
  default: 2
  type: int
  description: AXI SLVERR response encoding
  drives:
  - function_model.transactions.FM_AXI_READBACK
- name: BRESP_OKAY
  default: 0
  type: int
  description: AXI write OKAY response encoding
  drives:
  - function_model.transactions.FM_ACCEPT_AXI_TLP
- name: DROP_NONE
  default: 0
  type: int
  description: No drop reason
  drives:
  - error_handling
- name: ZERO_256
  default: 0
  type: int
  description: Zero-valued 256-bit read data
  drives:
  - function_model.transactions.FM_AXI_READBACK
io_list:
  clock_domains:
  - name: axi_aclk
    frequency_mhz: 250
    description: AXI write/read and assembly datapath clock.
    ports:
    - name: axi_aclk
      width: 1
      direction: input
      description: AXI and assembly clock
  - name: pclk
    frequency_mhz: 125
    description: APB register clock.
    ports:
    - name: pclk
      width: 1
      direction: input
      description: APB clock
  resets:
  - name: axi_aresetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset for AXI and assembly datapath.
    ports:
    - name: axi_aresetn
      width: 1
      direction: input
      description: AXI active-low reset
  - name: presetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset for APB register block.
    ports:
    - name: presetn
      width: 1
      direction: input
      description: APB active-low reset
  interfaces:
  - name: axi_write_slave
    type: AXI4_WRITE_SLAVE
    role: slave
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: One AXI4 write transaction carries exactly one PCIe VDM TLP. No AXI ID signals are implemented.
    protocol:
      aw_rule: AW is accepted only when no write transaction is outstanding.
      w_rule: WDATA and WSTRB beats are captured until WLAST; AWSIZE must be 5 and AWBURST must be INCR.
      b_rule: BVALID reports OKAY for accepted TLP write completion and is held until BREADY.
      outstanding_rule: Only one write transaction may be outstanding.
    ports:
    - name: m_axi_awaddr
      width: AXI_ADDR_WIDTH
      direction: input
      description: AXI write address
    - name: m_axi_awlen
      width: 8
      direction: input
      description: AXI write burst length
    - name: m_axi_awsize
      width: 3
      direction: input
      description: AXI write burst size; legal value is 5
    - name: m_axi_awburst
      width: 2
      direction: input
      description: AXI burst type; legal value is INCR
    - name: m_axi_awvalid
      width: 1
      direction: input
      description: AXI write address valid
    - name: m_axi_awready
      width: 1
      direction: output
      description: AXI write address ready
    - name: m_axi_wdata
      width: AXI_DATA_WIDTH
      direction: input
      description: AXI write data carrying raw TLP bytes
    - name: m_axi_wstrb
      width: AXI_STRB_WIDTH
      direction: input
      description: AXI write byte strobes
    - name: m_axi_wlast
      width: 1
      direction: input
      description: Final beat of one TLP transaction
    - name: m_axi_wvalid
      width: 1
      direction: input
      description: AXI write data valid
    - name: m_axi_wready
      width: 1
      direction: output
      description: AXI write data ready
    - name: m_axi_bresp
      width: 2
      direction: output
      description: AXI write response
    - name: m_axi_bvalid
      width: 1
      direction: output
      description: AXI write response valid
    - name: m_axi_bready
      width: 1
      direction: input
      description: AXI write response ready
  - name: axi_read_slave
    type: AXI4_READ_SLAVE
    role: slave
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: Firmware reads completed payload data through descriptor-selected SRAM reads. No AXI ID signals are implemented.
    protocol:
      ar_rule: AR is accepted only when no read transaction is outstanding.
      r_rule: RVALID returns SRAM data beats in order; RLAST marks the final requested beat.
      no_descriptor_rule: A read with no completed descriptor returns zero RDATA and RRESP SLVERR unless raw debug read is enabled.
      outstanding_rule: Only one read transaction may be outstanding.
    ports:
    - name: m_axi_araddr
      width: AXI_ADDR_WIDTH
      direction: input
      description: AXI read address
    - name: m_axi_arlen
      width: 8
      direction: input
      description: AXI read burst length
    - name: m_axi_arsize
      width: 3
      direction: input
      description: AXI read size; legal value is 5
    - name: m_axi_arburst
      width: 2
      direction: input
      description: AXI read burst type; legal value is INCR
    - name: m_axi_arvalid
      width: 1
      direction: input
      description: AXI read address valid
    - name: m_axi_arready
      width: 1
      direction: output
      description: AXI read address ready
    - name: m_axi_rdata
      width: AXI_DATA_WIDTH
      direction: output
      description: AXI read data from SRAM or zero on no descriptor
    - name: m_axi_rresp
      width: 2
      direction: output
      description: AXI read response
    - name: m_axi_rlast
      width: 1
      direction: output
      description: AXI read last beat
    - name: m_axi_rvalid
      width: 1
      direction: output
      description: AXI read valid
    - name: m_axi_rready
      width: 1
      direction: input
      description: AXI read ready
  - name: apb_slave
    type: APB4
    role: slave
    clock_domain: pclk
    reset_domain: presetn
    description: APB control, status, interrupt, counter, descriptor, debug, and per-Q register access.
    protocol:
      setup_rule: PSEL high and PENABLE low captures address and direction.
      access_rule: PSEL and PENABLE high completes when PREADY is asserted.
      read_rule: PRDATA is stable when PREADY is asserted for a read access.
      write_rule: PWDATA and PSTRB are sampled when PREADY is asserted for a write access.
      error_rule: PSLVERR is asserted only on completing illegal accesses.
    ports:
    - name: paddr
      width: 16
      direction: input
      description: APB byte address
    - name: psel
      width: 1
      direction: input
      description: APB select
    - name: penable
      width: 1
      direction: input
      description: APB enable
    - name: pwrite
      width: 1
      direction: input
      description: APB write control
    - name: pwdata
      width: 32
      direction: input
      description: APB write data
    - name: pstrb
      width: 4
      direction: input
      description: APB byte strobes
    - name: prdata
      width: 32
      direction: output
      description: APB read data
    - name: pready
      width: 1
      direction: output
      description: APB ready
    - name: pslverr
      width: 1
      direction: output
      description: APB error
  - name: sram_write_port
    type: SRAM_WRITE_256
    role: master
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: External SRAM write interface for packed MCTP payload bytes only.
    protocol:
      write_rule: Address is byte-based and 32-byte aligned for each valid beat.
      strobe_rule: WSTRB equivalent marks valid lanes; no holes are allowed in the logical payload stream.
      priority_rule: SRAM writes have priority over firmware read requests.
    ports:
    - name: sram_wr_valid
      width: 1
      direction: output
      description: SRAM write request valid
    - name: sram_wr_ready
      width: 1
      direction: input
      description: SRAM write request ready
    - name: sram_wr_addr
      width: SRAM_ADDR_WIDTH
      direction: output
      description: SRAM write byte address
    - name: sram_wr_data
      width: SRAM_DATA_WIDTH
      direction: output
      description: SRAM write data
    - name: sram_wr_strb
      width: 32
      direction: output
      description: SRAM write byte strobes
  - name: sram_read_port
    type: SRAM_READ_256
    role: master
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: External SRAM read interface used by firmware AXI readback path.
    protocol:
      request_rule: Read request address is byte-based and 32-byte aligned.
      response_rule: Response data is consumed when sram_rd_rsp_valid and sram_rd_rsp_ready are true.
      error_rule: SRAM read error maps to AXI RRESP SLVERR and increments read error counters.
    ports:
    - name: sram_rd_req_valid
      width: 1
      direction: output
      description: SRAM read request valid
    - name: sram_rd_req_ready
      width: 1
      direction: input
      description: SRAM read request ready
    - name: sram_rd_req_addr
      width: SRAM_ADDR_WIDTH
      direction: output
      description: SRAM read byte address
    - name: sram_rd_rsp_valid
      width: 1
      direction: input
      description: SRAM read response valid
    - name: sram_rd_rsp_ready
      width: 1
      direction: output
      description: SRAM read response ready
    - name: sram_rd_rsp_data
      width: SRAM_DATA_WIDTH
      direction: input
      description: SRAM read response data
    - name: sram_rd_rsp_error
      width: 1
      direction: input
      description: SRAM read response error
  - name: interrupt_and_debug
    type: native_status
    role: source
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: Interrupt and selected debug/status observability outputs.
    protocol:
      irq_rule: IRQ is asserted when enabled event bits are pending.
      debug_rule: Debug outputs are sampled by testbench monitors and do not change functional behavior.
    ports:
    - name: irq
      width: 1
      direction: output
      description: Interrupt request
    - name: debug_context_id
      width: 4
      direction: output
      description: Context id associated with current debug event
    - name: debug_context_key
      width: 18
      direction: output
      description: Source EID
      tag owner: null
      and message tag key: null
    - name: debug_drop_pulse
      width: 1
      direction: output
      description: One-cycle packet or assembly drop debug pulse
    - name: debug_vdm_valid
      width: 1
      direction: output
      description: Parsed PCIe VDM packet accepted by filter
features:
- name: primary_approved_behavior
  trigger: A legal request, transaction, packet, command, or CSR operation is accepted
  datapath: Inputs are transformed only according to function_model transactions and declared state
  control: Control advances through cycle_model pipeline and fsm transitions
  output: Observable outputs/status/events match function_model outputs and side effects
- name: backpressure_stability
  trigger: Any declared ready/acceptance signal is deasserted while valid/work is pending
  datapath: Payload and state remain stable until the matching handshake or acceptance condition
  control: FSM stalls only the affected phase
  output: No duplicated, dropped, or reordered transaction unless explicitly allowed
- name: error_policy
  trigger: A declared error_handling.error_sources condition is observed
  datapath: No unrelated state is corrupted by the error path
  control: Recovery follows error_handling.recovery
  output: Error/status/response/debug behavior follows error_handling.propagation
dataflow:
  ingress:
  - AXI write AW accepted only when write engine idle.
  - AXI W beats are concatenated according to WSTRB until WLAST terminates one TLP.
  parse:
  - PCIe VDM fields are checked before MCTP transport fields.
  - Packet drop prevents SRAM writes and context mutation except drop counters.
  assemble:
  - SOM allocates or reinitializes one Q only when no active matching context exists.
  - Middle and EOM fragments append to the matching key and check sequence order.
  - First TLP header snapshot is stored on SOM; last TLP header snapshot is updated on every accepted fragment and retained at completion.
  sram_pack:
  - SRAM stores only MCTP payload bytes.
  - Each Q has a partial 32-byte pack state so unaligned payload fragments leave no holes.
  - Final/EOM fragment may be shorter than configured TU size and trims readback byte count.
  readback:
  - Firmware reads completed descriptor payload through AXI read slave and SRAM read port.
  - Raw debug reads require explicit control enable; otherwise no-descriptor reads return zero plus SLVERR.
  sequence:
  - axi_write_ingress
  - pcie_vdm_parse
  - mctp_parse
  - context_assembly
  - sram_pack
  - descriptor_publish
  - axi_readback
function_model:
  description: Byte-accurate transaction model from AXI write TLP ingress to MCTP payload assembly, SRAM packing, descriptor publish, APB control, and AXI readback.
  constants:
    packet_drop_ids:
    - PD_DISABLED_DROP_MODE
    - PD_MALFORMED_TLP
    - PD_UNSUPPORTED_VDM
    - PD_BAD_MCTP_HEADER
    - PD_BAD_PAD_OR_ALIGNMENT
    - PD_DEST_EID_REJECT
    - PD_UNEXPECTED_MIDDLE_END
    - PD_BAD_OR_EXPIRED_TAG
    assembly_drop_ids:
    - AD_DUPLICATE_SOM
    - AD_SEQUENCE_MISMATCH
    - AD_MESSAGE_OVERFLOW
    - AD_SRAM_OVERFLOW
    - AD_DESCRIPTOR_FULL
    - AD_TIMEOUT
  state_variables:
  - name: enable_reg
    reset: 0
    width: 1
    source: registers.GLOBAL_CTRL.enable
    description: Global assembly enable
  - name: drop_mode_reg
    reset: 0
    width: 1
    source: registers.GLOBAL_CTRL.drop_mode
    description: Drop mode control bit
  - name: raw_debug_read_enable
    reset: 0
    width: 1
    source: registers.DEBUG_CTRL.raw_read_enable
    description: Allows raw SRAM debug reads without descriptor
  - name: active_context_count
    reset: 0
    width: 5
    description: Number of non-idle Q contexts
  - name: descriptor_count
    reset: 0
    width: 4
    description: Completed descriptor FIFO occupancy
  - name: payload_byte_count
    reset: 0
    width: 13
    description: Current assembled payload bytes for selected context
  - name: collected_tlp_count
    reset: 0
    width: 16
    description: Accepted raw TLP counter
  - name: packet_drop_count
    reset: 0
    width: 32
    description: Packet drop counter
  - name: assembly_drop_count
    reset: 0
    width: 32
    description: Assembly drop counter
  - name: read_error_count
    reset: 0
    width: 32
    description: AXI readback error counter
  - name: ctx_state
    reset: STATE_IDLE
    width: 2
    description: Current Q FSM state for selected context
  - name: ctx_valid
    reset: 0
    width: 1
    description: Selected context valid bit
  - name: ctx_error
    reset: 0
    width: 1
    description: Selected context error bit
  - name: ctx_source_eid
    reset: 0
    width: 8
    description: Selected context source EID
  - name: ctx_destination_eid
    reset: 0
    width: 8
    description: Selected context destination EID
  - name: ctx_tag_owner
    reset: 0
    width: 1
    description: Selected context tag owner
  - name: ctx_message_tag
    reset: 0
    width: 3
    description: Selected context message tag
  - name: ctx_message_type
    reset: 0
    width: 8
    description: Selected context MCTP message type
  - name: ctx_expected_seq
    reset: 0
    width: 2
    description: Next expected MCTP packet sequence
  - name: ctx_last_seq
    reset: 0
    width: 2
    description: Last accepted MCTP packet sequence
  - name: ctx_payload_base_addr
    reset: 0
    width: SRAM_ADDR_WIDTH
    description: Linear allocator base address for selected context
  - name: ctx_payload_next_addr
    reset: 0
    width: SRAM_ADDR_WIDTH
    description: Next payload byte address for selected context
  - name: ctx_payload_byte_count
    reset: 0
    width: 13
    description: Payload byte count for selected context
  - name: ctx_transmission_unit_bytes
    reset: BASELINE_MTU_BYTES
    width: 13
    description: Programmed TU size for selected context
  - name: ctx_timeout_age
    reset: 0
    width: TIMEOUT_COUNTER_WIDTH
    description: Timeout age for selected context
  - name: ctx_last_drop_reason
    reset: DROP_NONE
    width: 8
    description: Last drop reason visible per Q
  - name: ctx_partial_word_addr
    reset: 0
    width: SRAM_ADDR_WIDTH
    description: Address of current partial 32-byte SRAM word
  - name: ctx_partial_word_strobe
    reset: 0
    width: 32
    description: Valid bytes currently accumulated in partial word
  - name: ctx_partial_word_valid
    reset: 0
    width: 1
    description: Partial word has pending payload bytes
  - name: ctx_partial_next_lane
    reset: 0
    width: 5
    description: Next byte lane inside current 32-byte SRAM word
  derived_signals:
  - name: context_key
    expr: (source_eid << 10) | (tag_owner << 9) | message_tag
    width: 18
  - name: packet_drop_pulse
    expr: packet_drop_reason != DROP_NONE
    width: 1
  - name: assembly_drop_pulse
    expr: assembly_drop_reason != DROP_NONE
    width: 1
  - name: apb_access
    expr: psel and penable
    width: 1
    description: APB access phase helper derived from psel and penable.
    source: repair_ssot_schema.apb_helper
  - name: apb_valid_write
    expr: psel and penable and pwrite
    width: 1
    description: APB write access helper derived from psel, penable, and pwrite.
    source: repair_ssot_schema.apb_helper
  - name: apb_valid_read
    expr: psel and penable and not pwrite
    width: 1
    description: APB read access helper derived from psel, penable, and pwrite.
    source: repair_ssot_schema.apb_helper
  - name: addr
    expr: paddr
    width: 16
    description: Register address helper derived from the APB paddr input.
    source: repair_ssot_schema.apb_helper
  - name: wmask
    expr: ((0x000000FF if (pstrb & 0x1) != 0 else 0) | (0x0000FF00 if (pstrb & 0x2) != 0 else 0) | (0x00FF0000 if (pstrb & 0x4) != 0 else 0) | (0xFF000000 if (pstrb & 0x8) != 0 else 0))
    width: 32
    description: APB byte-lane write mask expanded from pstrb.
    source: repair_ssot_schema.apb_helper
  - name: legal_addr
    expr: (addr == 0) or (addr == 4) or (addr == 16) or (addr == 20) or (addr == 32) or (addr == 36) or (addr == 48) or (addr == 52) or (addr == 256) or (addr == 260) or (addr == 264) or (addr == 268)
    width: 1
    description: APB legal address decode derived from registers.register_list offsets.
    source: repair_ssot_schema.apb_helper
  - name: wr_global_ctrl
    expr: apb_valid_write and (addr == 0)
    width: 1
    description: APB write decode helper for register GLOBAL_CTRL.
    source: repair_ssot_schema.apb_helper
  - name: rd_global_ctrl
    expr: apb_valid_read and (addr == 0)
    width: 1
    description: APB read decode helper for register GLOBAL_CTRL.
    source: repair_ssot_schema.apb_helper
  - name: wr_global_status
    expr: apb_valid_write and (addr == 4)
    width: 1
    description: APB write decode helper for register GLOBAL_STATUS.
    source: repair_ssot_schema.apb_helper
  - name: rd_global_status
    expr: apb_valid_read and (addr == 4)
    width: 1
    description: APB read decode helper for register GLOBAL_STATUS.
    source: repair_ssot_schema.apb_helper
  - name: wr_irq_status
    expr: apb_valid_write and (addr == 16)
    width: 1
    description: APB write decode helper for register IRQ_STATUS.
    source: repair_ssot_schema.apb_helper
  - name: rd_irq_status
    expr: apb_valid_read and (addr == 16)
    width: 1
    description: APB read decode helper for register IRQ_STATUS.
    source: repair_ssot_schema.apb_helper
  - name: irq_status_w1c
    expr: ((pwdata & gpio_mask) if wr_irq_status else 0)
    width: 32
    description: W1C write mask helper for register IRQ_STATUS.
    source: repair_ssot_schema.apb_helper
  - name: wr_irq_enable
    expr: apb_valid_write and (addr == 20)
    width: 1
    description: APB write decode helper for register IRQ_ENABLE.
    source: repair_ssot_schema.apb_helper
  - name: rd_irq_enable
    expr: apb_valid_read and (addr == 20)
    width: 1
    description: APB read decode helper for register IRQ_ENABLE.
    source: repair_ssot_schema.apb_helper
  - name: wr_packet_drop_count
    expr: apb_valid_write and (addr == 32)
    width: 1
    description: APB write decode helper for register PACKET_DROP_COUNT.
    source: repair_ssot_schema.apb_helper
  - name: rd_packet_drop_count
    expr: apb_valid_read and (addr == 32)
    width: 1
    description: APB read decode helper for register PACKET_DROP_COUNT.
    source: repair_ssot_schema.apb_helper
  - name: wr_assembly_drop_count
    expr: apb_valid_write and (addr == 36)
    width: 1
    description: APB write decode helper for register ASSEMBLY_DROP_COUNT.
    source: repair_ssot_schema.apb_helper
  - name: rd_assembly_drop_count
    expr: apb_valid_read and (addr == 36)
    width: 1
    description: APB read decode helper for register ASSEMBLY_DROP_COUNT.
    source: repair_ssot_schema.apb_helper
  - name: wr_sram_base
    expr: apb_valid_write and (addr == 48)
    width: 1
    description: APB write decode helper for register SRAM_BASE.
    source: repair_ssot_schema.apb_helper
  - name: rd_sram_base
    expr: apb_valid_read and (addr == 48)
    width: 1
    description: APB read decode helper for register SRAM_BASE.
    source: repair_ssot_schema.apb_helper
  - name: wr_sram_limit
    expr: apb_valid_write and (addr == 52)
    width: 1
    description: APB write decode helper for register SRAM_LIMIT.
    source: repair_ssot_schema.apb_helper
  - name: rd_sram_limit
    expr: apb_valid_read and (addr == 52)
    width: 1
    description: APB read decode helper for register SRAM_LIMIT.
    source: repair_ssot_schema.apb_helper
  - name: wr_q_state
    expr: apb_valid_write and (addr == 256)
    width: 1
    description: APB write decode helper for register Q_STATE.
    source: repair_ssot_schema.apb_helper
  - name: rd_q_state
    expr: apb_valid_read and (addr == 256)
    width: 1
    description: APB read decode helper for register Q_STATE.
    source: repair_ssot_schema.apb_helper
  - name: wr_q_key
    expr: apb_valid_write and (addr == 260)
    width: 1
    description: APB write decode helper for register Q_KEY.
    source: repair_ssot_schema.apb_helper
  - name: rd_q_key
    expr: apb_valid_read and (addr == 260)
    width: 1
    description: APB read decode helper for register Q_KEY.
    source: repair_ssot_schema.apb_helper
  - name: wr_q_payload_base
    expr: apb_valid_write and (addr == 264)
    width: 1
    description: APB write decode helper for register Q_PAYLOAD_BASE.
    source: repair_ssot_schema.apb_helper
  - name: rd_q_payload_base
    expr: apb_valid_read and (addr == 264)
    width: 1
    description: APB read decode helper for register Q_PAYLOAD_BASE.
    source: repair_ssot_schema.apb_helper
  - name: wr_q_payload_count
    expr: apb_valid_write and (addr == 268)
    width: 1
    description: APB write decode helper for register Q_PAYLOAD_COUNT.
    source: repair_ssot_schema.apb_helper
  - name: rd_q_payload_count
    expr: apb_valid_read and (addr == 268)
    width: 1
    description: APB read decode helper for register Q_PAYLOAD_COUNT.
    source: repair_ssot_schema.apb_helper
  - name: read_mux
    expr: (0 if addr == 0 else (0 if addr == 4 else (0 if addr == 16 else (0 if addr == 20 else (packet_drop_count if addr == 32 else (assembly_drop_count if addr == 36 else (0 if addr == 48 else (0 if addr == 52 else (0 if addr == 256 else (0 if addr == 260 else (0 if addr == 264 else (0 if addr == 268 else 0))))))))))))
    width: 32
    description: APB read data mux derived from registers.register_list offsets and function_model state variables.
    source: repair_ssot_schema.apb_helper
  invariants:
  - name: context_bound
    expr: CONTEXT_COUNT >= active_context_count
  - name: payload_bound
    expr: MAX_MESSAGE_BYTES >= payload_byte_count
  - name: descriptor_bound
    expr: DESCRIPTOR_FIFO_DEPTH >= descriptor_count
  transactions:
  - id: FM_ACCEPT_AXI_TLP
    name: Accept one AXI4 write burst as one PCIe VDM TLP
    required_fields:
    - axi_aw_accept
    - axi_wlast_seen
    - tlp_byte_count
    preconditions:
    - axi_aw_accept and axi_wlast_seen
    outputs:
    - bvalid_next
    - bresp_next
    - name: bvalid_next
      port: m_axi_bvalid
      expr: axi_aw_accept and axi_wlast_seen
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: bresp_next
      port: m_axi_bresp
      expr: BRESP_OKAY
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: collected_tlp_count
      expr: collected_tlp_count + axi_wlast_seen
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: bvalid_next
      expr: axi_aw_accept and axi_wlast_seen
      width: 1
      port: m_axi_bvalid
    - name: bresp_next
      expr: BRESP_OKAY
      width: 2
      port: m_axi_bresp
    state_updates:
    - name: collected_tlp_count
      expr: collected_tlp_count + axi_wlast_seen
      width: 16
    side_effects:
    - raw TLP bytes captured until WLAST
    - write response emitted after packet classification
  - id: FM_FILTER_VDM
    name: Validate PCIe VDM envelope for MCTP transport
    required_fields:
    - vdm_supported
    - packet_drop_reason
    preconditions:
    - tlp_valid
    outputs:
    - debug_vdm_valid
    - debug_drop_pulse
    - state: packet_drop_count
      expr: packet_drop_count + packet_drop_pulse
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_last_drop_reason
      expr: packet_drop_reason
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: debug_vdm_valid
      expr: vdm_supported
      width: 1
      port: debug_vdm_valid
    - name: debug_drop_pulse
      expr: packet_drop_reason != DROP_NONE
      width: 1
      port: debug_drop_pulse
    state_updates:
    - name: packet_drop_count
      expr: packet_drop_count + packet_drop_pulse
      width: 32
    - name: ctx_last_drop_reason
      expr: packet_drop_reason
      width: 8
    error_cases:
    - id: PD_MALFORMED_TLP
      condition: packet_drop_reason == 2
      action: no_sram_write_and_increment_packet_drop_count
    - id: PD_UNSUPPORTED_VDM
      condition: packet_drop_reason == 3
      action: no_sram_write_and_increment_packet_drop_count
  - id: FM_PARSE_MCTP
    name: Decode MCTP transport header and context key
    required_fields:
    - source_eid
    - destination_eid
    - tag_owner
    - message_tag
    - message_type
    - packet_seq
    - som
    - eom
    preconditions:
    - vdm_supported
    outputs:
    - debug_context_key
    - state: ctx_source_eid
      expr: source_eid
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_destination_eid
      expr: destination_eid
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_tag_owner
      expr: tag_owner
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_message_tag
      expr: message_tag
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_message_type
      expr: message_type
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_last_seq
      expr: packet_seq
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: debug_context_key
      expr: context_key
      width: 18
      port: debug_context_key
    state_updates:
    - name: ctx_source_eid
      expr: source_eid
      width: 8
    - name: ctx_destination_eid
      expr: destination_eid
      width: 8
    - name: ctx_tag_owner
      expr: tag_owner
      width: 1
    - name: ctx_message_tag
      expr: message_tag
      width: 3
    - name: ctx_message_type
      expr: message_type
      width: 8
    - name: ctx_last_seq
      expr: packet_seq
      width: 2
    side_effects:
    - context key prepared before allocation or lookup
  - id: FM_ASSEMBLE_FRAGMENT
    name: Allocate or update a Q context for one MCTP fragment
    required_fields:
    - context_accept
    - context_alloc
    - context_id
    - payload_len
    - packet_seq
    - next_seq
    preconditions:
    - enable_reg and context_accept
    outputs:
    - debug_context_id
    - state: active_context_count
      expr: active_context_count + context_alloc
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_state
      expr: STATE_ASSEMBLING
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_valid
      expr: context_accept
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_expected_seq
      expr: next_seq
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: payload_byte_count
      expr: payload_byte_count + payload_len
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_payload_byte_count
      expr: ctx_payload_byte_count + payload_len
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: debug_context_id
      expr: context_id
      width: 4
      port: debug_context_id
    state_updates:
    - name: active_context_count
      expr: active_context_count + context_alloc
      width: 5
    - name: ctx_state
      expr: STATE_ASSEMBLING
      width: 2
    - name: ctx_valid
      expr: context_accept
      width: 1
    - name: ctx_expected_seq
      expr: next_seq
      width: 2
    - name: payload_byte_count
      expr: payload_byte_count + payload_len
      width: 13
    - name: ctx_payload_byte_count
      expr: ctx_payload_byte_count + payload_len
      width: 13
    error_cases:
    - id: AD_DUPLICATE_SOM
      condition: assembly_drop_reason == 20
      action: no_sram_write_and_increment_assembly_drop_count
    - id: AD_SEQUENCE_MISMATCH
      condition: assembly_drop_reason == 21
      action: no_sram_write_and_enter_error_state
  - id: FM_SRAM_PACK_WRITE
    name: Pack payload bytes into 32-byte SRAM beats with no holes
    required_fields:
    - payload_valid
    - payload_len
    - lane_advance
    - word_full
    - eom
    - current_word_addr
    - payload_data_word
    - payload_byte_strobe
    - context_accept
    preconditions:
    - payload_valid and context_accept
    outputs:
    - sram_write_valid
    - sram_write_addr
    - sram_write_data
    - sram_write_strb
    - name: sram_write_valid
      port: sram_wr_valid
      expr: payload_valid and (word_full or eom)
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: sram_write_addr
      port: sram_wr_addr
      expr: current_word_addr
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: sram_write_data
      port: sram_wr_data
      expr: payload_data_word
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: sram_write_strb
      port: sram_wr_strb
      expr: payload_byte_strobe
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: ctx_partial_word_addr
      expr: current_word_addr
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_partial_next_lane
      expr: ctx_partial_next_lane + lane_advance
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_partial_word_valid
      expr: payload_valid and not word_full
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_partial_word_strobe
      expr: payload_byte_strobe
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_payload_next_addr
      expr: ctx_payload_next_addr + payload_len
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: sram_write_valid
      expr: payload_valid and (word_full or eom)
      width: 1
      port: sram_wr_valid
    - name: sram_write_addr
      expr: current_word_addr
      width: SRAM_ADDR_WIDTH
      port: sram_wr_addr
    - name: sram_write_data
      expr: payload_data_word
      width: 256
      port: sram_wr_data
    - name: sram_write_strb
      expr: payload_byte_strobe
      width: 32
      port: sram_wr_strb
    state_updates:
    - name: ctx_partial_word_addr
      expr: current_word_addr
      width: SRAM_ADDR_WIDTH
    - name: ctx_partial_next_lane
      expr: ctx_partial_next_lane + lane_advance
      width: 5
    - name: ctx_partial_word_valid
      expr: payload_valid and not word_full
      width: 1
    - name: ctx_partial_word_strobe
      expr: payload_byte_strobe
      width: 32
    - name: ctx_payload_next_addr
      expr: ctx_payload_next_addr + payload_len
      width: SRAM_ADDR_WIDTH
    side_effects:
    - sram_write_beat_emitted_only_when_32B_word_full_or_final_fragment_flushes
  - id: FM_COMPLETE_MESSAGE
    name: Complete EOM message and publish descriptor
    required_fields:
    - eom
    - descriptor_ready
    - descriptor_publish
    preconditions:
    - eom and descriptor_ready
    outputs:
    - interrupt
    - name: interrupt
      port: irq
      expr: descriptor_publish
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: descriptor_count
      expr: descriptor_count + descriptor_publish
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_state
      expr: STATE_DONE_WAIT_DESCRIPTOR_POP
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: active_context_count
      expr: active_context_count - descriptor_publish
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: interrupt
      expr: descriptor_publish
      width: 1
      port: irq
    state_updates:
    - name: descriptor_count
      expr: descriptor_count + descriptor_publish
      width: 4
    - name: ctx_state
      expr: STATE_DONE_WAIT_DESCRIPTOR_POP
      width: 2
    - name: active_context_count
      expr: active_context_count - descriptor_publish
      width: 5
    error_cases:
    - id: AD_DESCRIPTOR_FULL
      condition: assembly_drop_reason == 24
      action: no_descriptor_publish_and_increment_assembly_drop_count
  - id: FM_PACKET_DROP
    name: Packet drop without SRAM payload write
    required_fields:
    - packet_drop_reason
    preconditions:
    - packet_drop_reason != DROP_NONE
    outputs:
    - debug_drop_pulse
    - state: packet_drop_count
      expr: packet_drop_count + (packet_drop_reason != DROP_NONE)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_last_drop_reason
      expr: packet_drop_reason
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: debug_drop_pulse
      expr: packet_drop_reason != DROP_NONE
      width: 1
      port: debug_drop_pulse
    state_updates:
    - name: packet_drop_count
      expr: packet_drop_count + (packet_drop_reason != DROP_NONE)
      width: 32
    - name: ctx_last_drop_reason
      expr: packet_drop_reason
      width: 8
    error_cases:
    - id: PD_DISABLED_DROP_MODE
      condition: packet_drop_reason == 1
      action: no_sram_write_and_count_packet_drop
    - id: PD_BAD_PAD_OR_ALIGNMENT
      condition: packet_drop_reason == 5
      action: no_sram_write_and_count_packet_drop
    - id: PD_DEST_EID_REJECT
      condition: packet_drop_reason == 6
      action: no_sram_write_and_count_packet_drop
    - id: PD_UNEXPECTED_MIDDLE_END
      condition: packet_drop_reason == 7
      action: no_sram_write_and_count_packet_drop
    - id: PD_BAD_OR_EXPIRED_TAG
      condition: packet_drop_reason == 8
      action: no_sram_write_and_count_packet_drop
  - id: FM_ASSEMBLY_DROP
    name: Assembly drop without descriptor publish
    required_fields:
    - assembly_drop_reason
    preconditions:
    - assembly_drop_reason != DROP_NONE
    outputs:
    - debug_drop_pulse
    - interrupt
    - name: interrupt
      port: irq
      expr: assembly_drop_reason != DROP_NONE
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: assembly_drop_count
      expr: assembly_drop_count + (assembly_drop_reason != DROP_NONE)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_error
      expr: assembly_drop_reason != DROP_NONE
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_state
      expr: STATE_ERROR
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_last_drop_reason
      expr: assembly_drop_reason
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: debug_drop_pulse
      expr: assembly_drop_reason != DROP_NONE
      width: 1
      port: debug_drop_pulse
    - name: interrupt
      expr: assembly_drop_reason != DROP_NONE
      width: 1
      port: irq
    state_updates:
    - name: assembly_drop_count
      expr: assembly_drop_count + (assembly_drop_reason != DROP_NONE)
      width: 32
    - name: ctx_error
      expr: assembly_drop_reason != DROP_NONE
      width: 1
    - name: ctx_state
      expr: STATE_ERROR
      width: 2
    - name: ctx_last_drop_reason
      expr: assembly_drop_reason
      width: 8
    error_cases:
    - id: AD_MESSAGE_OVERFLOW
      condition: assembly_drop_reason == 22
      action: no_sram_write_and_enter_error_state
    - id: AD_SRAM_OVERFLOW
      condition: assembly_drop_reason == 23
      action: no_sram_write_and_enter_error_state
    - id: AD_TIMEOUT
      condition: assembly_drop_reason == 25
      action: clear_context_after_counting_drop
  - id: FM_APB_ACCESS
    name: APB register access
    required_fields:
    - apb_access
    - apb_write
    - apb_wdata
    - illegal_apb_access
    preconditions:
    - apb_access
    outputs:
    - apb_ready
    - apb_error
    - name: apb_ready
      port: pready
      expr: apb_access
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: apb_error
      port: pslverr
      expr: illegal_apb_access
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: enable_reg
      expr: apb_wdata & apb_write
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: drop_mode_reg
      expr: (apb_wdata >> 1) & apb_write
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: apb_ready
      expr: apb_access
      width: 1
      port: pready
    - name: apb_error
      expr: illegal_apb_access
      width: 1
      port: pslverr
    state_updates:
    - name: enable_reg
      expr: apb_wdata & apb_write
      width: 1
    - name: drop_mode_reg
      expr: (apb_wdata >> 1) & apb_write
      width: 1
    side_effects:
    - control_status_interrupt_counter_descriptor_debug_register_visible
  - id: FM_AXI_READBACK
    name: AXI readback from descriptor-backed SRAM payload
    required_fields:
    - axi_ar_accept
    - read_has_descriptor
    - readback_data
    - read_last
    preconditions:
    - axi_ar_accept
    outputs:
    - readback_valid
    - readback_data_out
    - readback_resp
    - readback_last
    - name: readback_valid
      port: m_axi_rvalid
      expr: axi_ar_accept
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: readback_data_out
      port: m_axi_rdata
      expr: readback_data if read_has_descriptor else ZERO_256
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: readback_resp
      port: m_axi_rresp
      expr: RESP_OKAY if read_has_descriptor else RESP_SLVERR
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: readback_last
      port: m_axi_rlast
      expr: read_last
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: read_error_count
      expr: read_error_count + (not read_has_descriptor)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    output_rules:
    - name: readback_valid
      expr: axi_ar_accept
      width: 1
      port: m_axi_rvalid
    - name: readback_data_out
      expr: readback_data if read_has_descriptor else ZERO_256
      width: 256
      port: m_axi_rdata
    - name: readback_resp
      expr: RESP_OKAY if read_has_descriptor else RESP_SLVERR
      width: 2
      port: m_axi_rresp
    - name: readback_last
      expr: read_last
      width: 1
      port: m_axi_rlast
    state_updates:
    - name: read_error_count
      expr: read_error_count + (not read_has_descriptor)
      width: 32
    side_effects:
    - no_descriptor_read_returns_zero_data_and_slverr_unless_raw_debug_enabled
cycle_model:
  executable: python
  clock: axi_aclk
  reset: axi_aresetn
  latency:
    FM_ACCEPT_AXI_TLP:
      min_cycles: 1
      max_cycles: 129
      description: One beat through MAX_TLP_BEATS write beats
    FM_FILTER_VDM:
      min_cycles: 1
      max_cycles: 2
      description: Header filter and drop classification
    FM_PARSE_MCTP:
      min_cycles: 1
      max_cycles: 2
      description: MCTP transport header decode
    FM_ASSEMBLE_FRAGMENT:
      min_cycles: 1
      max_cycles: 4
      description: Context lookup and update
    FM_SRAM_PACK_WRITE:
      min_cycles: 1
      max_cycles: 32
      description: Pack up to one SRAM word with final flush
    FM_COMPLETE_MESSAGE:
      min_cycles: 1
      max_cycles: 3
      description: Descriptor publish and IRQ update
    FM_AXI_READBACK:
      min_cycles: 1
      max_cycles: 8
      description: AR accept through SRAM response and R beat
    default:
      min_cycles: 1
      max_cycles: 1
      description: Default bounded transaction latency
  handshake_rules:
  - name: axi_write_channels
    signal: m_axi_awvalid/m_axi_awready/m_axi_wvalid/m_axi_wready
    predicate: aw_w_handshake_stable_until_ready
    description: AXI write address and data payload remain stable while valid and not ready.
  - name: axi_read_channels
    signal: m_axi_arvalid/m_axi_arready/m_axi_rvalid/m_axi_rready
    predicate: ar_r_handshake_stable_until_ready
    description: AXI read address and data payload remain stable while valid and not ready.
  - name: apb_access
    signal: psel/penable/pready
    predicate: apb_two_phase_access
    description: APB completes only in access phase when PREADY is asserted.
  - name: sram_ready_valid
    signal: sram_wr_valid/sram_wr_ready/sram_rd_req_valid/sram_rd_req_ready
    predicate: sram_payload_stable_until_ready
    description: SRAM request payload remains stable until accepted.
  pipeline:
  - stage: axi_write_collect
    cycle: variable_1_to_129
    action: Collect one raw TLP write transaction through WLAST.
  - stage: pcie_vdm_filter
    cycle: 1
    action: Decode required PCIe VDM fields and classify packet drops.
  - stage: mctp_parse
    cycle: 1
    action: Decode MCTP transport fields and form context key.
  - stage: context_lookup_update
    cycle: 1_to_4
    action: Allocate
    append: null
    complete: null
    or drop per-Q state.: null
  - stage: sram_pack_write
    cycle: 0_to_32
    action: Emit packed 256-bit SRAM writes without holes.
  - stage: descriptor_irq
    cycle: 1_to_3
    action: Publish descriptor
    update counters: null
    and assert IRQ.: null
  - stage: axi_readback
    cycle: 1_to_8
    action: Read SRAM payload and return AXI R beats.
  ordering:
  - name: one_tlp_per_axi_write_transaction
    description: WLAST terminates one TLP and no next AW is accepted while the current TLP is open.
  - name: per_key_fragment_order
    description: Fragments for one context key must follow packet sequence order.
  - name: descriptor_after_sram_flush
    description: Descriptor publish occurs after final partial SRAM word is flushed.
  - name: readback_after_descriptor
    description: Firmware readback uses completed descriptors unless raw debug read is enabled.
  backpressure:
  - AXI write backpressure is applied when context table, descriptor FIFO, or SRAM pack resources cannot accept more data.
  - AXI read backpressure is applied while waiting for SRAM read responses.
  - SRAM read requests yield to SRAM write requests in the first-target arbiter.
  arbitration:
    name: sram_write_priority
    policy: assembly SRAM writes win over firmware SRAM reads; reads are retried after write acceptance.
  outstanding: 1
  performance:
    frequency_mhz: 250
    throughput:
      ingress: one 256-bit AXI beat per cycle while resources are available
      readback: one 256-bit AXI R beat per SRAM response
    outstanding:
      write_max: 1
      read_max: 1
      total_max: 2
    depth:
      queue_depth: DESCRIPTOR_FIFO_DEPTH
      pipeline_stages: 7
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel remains the behavioral oracle.
clock_reset_domains:
  domains:
  - name: axi_domain
    clock: axi_aclk
    reset: axi_aresetn
    reset_polarity: active_low
    contains:
    - axi_write_ingress
    - parser
    - context_table
    - sram_packer
    - axi_read_egress
    - sram_arbiter
  - name: apb_domain
    clock: pclk
    reset: presetn
    reset_polarity: active_low
    contains:
    - apb_regfile
cdc_requirements:
  crossings:
  - name: apb_to_axi_control
    source_domain: apb_domain
    dest_domain: axi_domain
    mechanism: two_flop_sync_for_bits_and_toggle_handshake_for_multibit_updates
  - name: axi_to_apb_status
    source_domain: axi_domain
    dest_domain: apb_domain
    mechanism: event_toggle_sync_and_shadow_register_capture
  assertions:
  - Multi-bit control values are captured only when update toggle is stable in destination domain.
  - IRQ pending bits remain set until APB clear reaches the AXI event source.
rdc_requirements:
  reset_pairs:
  - source_reset: presetn
    dest_reset: axi_aresetn
    rule: CDC synchronizers tolerate independent reset release.
  assertions:
  - No context state leaves reset until axi_aresetn is deasserted and control enable is synchronized.
registers:
  address_unit: byte
  apb_data_width: 32
  global_window:
    base: 0
    description: Control, status, interrupt, counter, descriptor, and debug registers.
  per_q_bank:
    base: 256
    stride: 64
    count: CONTEXT_COUNT
    description: Each Q exposes state, key, SRAM base, byte count, first TLP header snapshot, last TLP header snapshot, partial pack state, timeout, and last drop reason.
  descriptor_window:
    base: 2048
    depth: DESCRIPTOR_FIFO_DEPTH
    pop_rule: Descriptor pop does not reclaim SRAM space in the first target.
  register_list:
  - name: GLOBAL_CTRL
    offset: 0
    width: 32
    access: rw
    reset: 0
    description: Global control register.
    fields:
    - name: enable
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: Enable packet assembly
      write_effect: Updates enable_reg through APB CDC.
    - name: drop_mode
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: Drop all accepted ingress packets when set
      write_effect: Causes PD_DISABLED_DROP_MODE.
    - name: raw_debug_read_enable
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: Allows raw debug AXI read without descriptor
      write_effect: Enables raw SRAM read path for debug.
    - name: reserved
      bits:
      - 31
      - 3
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
  - name: GLOBAL_STATUS
    offset: 4
    width: 32
    access: ro
    reset: 0
    description: Global status summary.
    fields:
    - name: active_context_count
      bits:
      - 4
      - 0
      access: ro
      reset: 0
      description: Number of active contexts.
    - name: descriptor_count
      bits:
      - 8
      - 5
      access: ro
      reset: 0
      description: Completed descriptor FIFO occupancy.
    - name: any_error
      bits:
      - 9
      - 9
      access: ro
      reset: 0
      description: Any Q is in error state.
    - name: reserved
      bits:
      - 31
      - 10
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
  - name: IRQ_STATUS
    offset: 16
    width: 32
    access: rw1c
    reset: 0
    description: Interrupt pending bits.
    fields:
    - name: desc_pending
      bits:
      - 0
      - 0
      access: rw1c
      reset: 0
      description: Descriptor available interrupt
      write_effect: Write one clears pending bit.
    - name: packet_drop_pending
      bits:
      - 1
      - 1
      access: rw1c
      reset: 0
      description: Packet drop interrupt
      write_effect: Write one clears pending bit.
    - name: assembly_drop_pending
      bits:
      - 2
      - 2
      access: rw1c
      reset: 0
      description: Assembly drop interrupt
      write_effect: Write one clears pending bit.
    - name: read_error_pending
      bits:
      - 3
      - 3
      access: rw1c
      reset: 0
      description: AXI read error interrupt
      write_effect: Write one clears pending bit.
    - name: reserved
      bits:
      - 31
      - 4
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
  - name: IRQ_ENABLE
    offset: 20
    width: 32
    access: rw
    reset: 0
    description: Interrupt enable bits.
    fields:
    - name: desc_enable
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: Enable descriptor IRQ
      write_effect: Controls IRQ mask.
    - name: packet_drop_enable
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: Enable packet drop IRQ
      write_effect: Controls IRQ mask.
    - name: assembly_drop_enable
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: Enable assembly drop IRQ
      write_effect: Controls IRQ mask.
    - name: read_error_enable
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      description: Enable read error IRQ
      write_effect: Controls IRQ mask.
    - name: reserved
      bits:
      - 31
      - 4
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
  - name: PACKET_DROP_COUNT
    offset: 32
    width: 32
    access: ro
    reset: 0
    description: Total packet drops across all reasons.
    fields:
    - name: value
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Packet drop counter.
  - name: ASSEMBLY_DROP_COUNT
    offset: 36
    width: 32
    access: ro
    reset: 0
    description: Total assembly drops across all reasons.
    fields:
    - name: value
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Assembly drop counter.
  - name: SRAM_BASE
    offset: 48
    width: 32
    access: rw
    reset: 0
    description: Linear bump allocator base address.
    fields:
    - name: base_addr
      bits:
      - 31
      - 0
      access: rw
      reset: 0
      description: SRAM allocation base byte address
      write_effect: Sets allocator base when idle.
  - name: SRAM_LIMIT
    offset: 52
    width: 32
    access: rw
    reset: 65536
    description: Linear bump allocator limit address.
    fields:
    - name: limit_addr
      bits:
      - 31
      - 0
      access: rw
      reset: 65536
      description: SRAM allocation exclusive limit byte address
      write_effect: Sets allocator limit when idle.
  - name: Q_STATE
    offset: 256
    width: 32
    access: ro
    reset: 0
    bank: per_q
    description: Per-Q state and error summary at base plus q stride.
    fields:
    - name: ctx_state
      bits:
      - 1
      - 0
      access: ro
      reset: 0
      description: IDLE
      ASSEMBLING: null
      ERROR: null
      or DONE_WAIT_DESCRIPTOR_POP.: null
    - name: ctx_valid
      bits:
      - 2
      - 2
      access: ro
      reset: 0
      description: Context valid bit.
    - name: ctx_error
      bits:
      - 3
      - 3
      access: ro
      reset: 0
      description: Context error bit.
    - name: ctx_last_drop_reason
      bits:
      - 15
      - 8
      access: ro
      reset: 0
      description: Last packet or assembly drop reason for this Q.
    - name: reserved
      bits:
      - 31
      - 16
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
  - name: Q_KEY
    offset: 260
    width: 32
    access: ro
    reset: 0
    bank: per_q
    description: Per-Q context key fields.
    fields:
    - name: source_eid
      bits:
      - 7
      - 0
      access: ro
      reset: 0
      description: Source EID.
    - name: destination_eid
      bits:
      - 15
      - 8
      access: ro
      reset: 0
      description: Destination EID.
    - name: tag_owner
      bits:
      - 16
      - 16
      access: ro
      reset: 0
      description: Tag owner bit.
    - name: message_tag
      bits:
      - 19
      - 17
      access: ro
      reset: 0
      description: Message tag.
    - name: message_type
      bits:
      - 27
      - 20
      access: ro
      reset: 0
      description: MCTP message type.
    - name: reserved
      bits:
      - 31
      - 28
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
  - name: Q_PAYLOAD_BASE
    offset: 264
    width: 32
    access: ro
    reset: 0
    bank: per_q
    description: Per-Q payload base address.
    fields:
    - name: payload_base_addr
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: SRAM base byte address for this assembled message.
  - name: Q_PAYLOAD_COUNT
    offset: 268
    width: 32
    access: ro
    reset: 0
    bank: per_q
    description: Per-Q payload byte count and partial word lane.
    fields:
    - name: payload_byte_count
      bits:
      - 12
      - 0
      access: ro
      reset: 0
      description: Assembled payload byte count.
    - name: partial_next_lane
      bits:
      - 20
      - 16
      access: ro
      reset: 0
      description: Next byte lane in partial 32-byte SRAM word.
    - name: partial_word_valid
      bits:
      - 21
      - 21
      access: ro
      reset: 0
      description: Partial word valid bit.
    - name: reserved
      bits:
      - 31
      - 22
      access: reserved
      reset: 0
      description: Reserved
      read_value: 0
      write_effect: Writes ignored.
memory:
  allocator:
    policy: linear_bump
    base_register: SRAM_BASE
    limit_register: SRAM_LIMIT
    reclaim_policy: descriptor_pop_does_not_reclaim_first_target
  instances:
  - name: context_table
    kind: register_array
    entries: CONTEXT_COUNT
    width_bits: 256
    description: Per-Q context state and metadata.
  - name: descriptor_fifo
    kind: fifo
    depth: DESCRIPTOR_FIFO_DEPTH
    width_bits: 192
    description: Completed message descriptor queue.
  - name: partial_word_buffer
    kind: register_array
    entries: CONTEXT_COUNT
    width_bits: 288
    description: Per-Q 256-bit data
    32-bit strobe: null
    and lane tracking.: null
  - name: payload_sram_window
    kind: external_sram
    width_bits: SRAM_DATA_WIDTH
    addr_width: SRAM_ADDR_WIDTH
    description: External SRAM payload storage accessed through declared SRAM ports.
interrupts:
  output: irq
  clear_policy: write_one_to_clear_irq_status
  sources:
  - id: IRQ_DESCRIPTOR
    bit: 0
    cause: descriptor_count_nonzero
    enable: IRQ_ENABLE.desc_enable
  - id: IRQ_PACKET_DROP
    bit: 1
    cause: packet_drop_count_increment
    enable: IRQ_ENABLE.packet_drop_enable
  - id: IRQ_ASSEMBLY_DROP
    bit: 2
    cause: assembly_drop_count_increment
    enable: IRQ_ENABLE.assembly_drop_enable
  - id: IRQ_READ_ERROR
    bit: 3
    cause: read_error_count_increment
    enable: IRQ_ENABLE.read_error_enable
fsm:
  context_fsm:
    states:
    - IDLE
    - ASSEMBLING
    - ERROR
    - DONE_WAIT_DESCRIPTOR_POP
    reset_state: IDLE
    transitions:
    - from: IDLE
      to: ASSEMBLING
      when: valid_som_and_context_available
      action: allocate_q_and_store_first_tlp_header
    - from: ASSEMBLING
      to: ASSEMBLING
      when: valid_middle_fragment
      action: append_payload_and_update_last_tlp_header
    - from: ASSEMBLING
      to: DONE_WAIT_DESCRIPTOR_POP
      when: valid_eom_and_descriptor_available
      action: flush_partial_word_and_publish_descriptor
    - from: IDLE
      to: ERROR
      when: unexpected_middle_or_eom
      action: raise_PD_UNEXPECTED_MIDDLE_END
    - from: ASSEMBLING
      to: ERROR
      when: sequence_or_overflow_or_timeout
      action: raise_AD_drop_reason
    - from: DONE_WAIT_DESCRIPTOR_POP
      to: IDLE
      when: descriptor_pop
      action: release_context_without_reclaiming_sram_space
    - from: ERROR
      to: IDLE
      when: software_clear_or_timeout_cleanup
      action: clear_context_visible_error_state
timing:
  target_clocks:
  - name: axi_aclk
    frequency_mhz: 250
    period_ns: 4.0
    uncertainty_ns: 0.2
  - name: pclk
    frequency_mhz: 125
    period_ns: 8.0
    uncertainty_ns: 0.4
  latency_budget:
    ingress_to_descriptor_max_cycles: 180
    read_ar_to_first_rvalid_max_cycles: 16
    apb_access_max_cycles: 2
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - axi_aclk
    - pclk
    isolation: not_required_single_power_domain
  power_states:
  - name: ACTIVE
    description: Clocks running and assembly enabled.
  - name: IDLE
    description: Clocks running but no active contexts or outstanding AXI transactions.
  clock_gating:
    required: false
    rationale: First target uses explicit clock enables on context, FIFO, and pack registers rather than integrated clock gates.
  upf_required: false
security:
  classification: non_secure_leaf_ip
  assets:
  - assembled_mctp_payload_in_external_sram
  - firmware_visible_descriptor_metadata
  - packet_and_assembly_drop_counters
  threat_model:
  - Malformed PCIe VDM or MCTP packets must not write SRAM payload bytes.
  - Firmware reads without descriptors must not leak stale SRAM data unless raw debug read is enabled.
  - APB writes to reserved fields must not alter hidden state.
  privilege_model: SoC-level firewall owns access control; this IP enforces only local register semantics.
error_handling:
  packet_drop_ids:
  - PD_DISABLED_DROP_MODE
  - PD_MALFORMED_TLP
  - PD_UNSUPPORTED_VDM
  - PD_BAD_MCTP_HEADER
  - PD_BAD_PAD_OR_ALIGNMENT
  - PD_DEST_EID_REJECT
  - PD_UNEXPECTED_MIDDLE_END
  - PD_BAD_OR_EXPIRED_TAG
  assembly_drop_ids:
  - AD_DUPLICATE_SOM
  - AD_SEQUENCE_MISMATCH
  - AD_MESSAGE_OVERFLOW
  - AD_SRAM_OVERFLOW
  - AD_DESCRIPTOR_FULL
  - AD_TIMEOUT
  error_sources:
  - id: PD_DISABLED_DROP_MODE
    condition: drop_mode_reg
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_MALFORMED_TLP
    condition: malformed_tlp_header_or_length
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_UNSUPPORTED_VDM
    condition: vendor_or_message_code_not_mctp_vdm
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_BAD_MCTP_HEADER
    condition: invalid_mctp_transport_header
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_BAD_PAD_OR_ALIGNMENT
    condition: nonfinal_payload_not_tu_sized_or_not_4B_aligned
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_DEST_EID_REJECT
    condition: destination_eid_filter_miss
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_UNEXPECTED_MIDDLE_END
    condition: middle_or_eom_without_matching_context
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: PD_BAD_OR_EXPIRED_TAG
    condition: tag_owner_message_tag_key_invalid_or_expired
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: AD_DUPLICATE_SOM
    condition: som_matches_active_context
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: AD_SEQUENCE_MISMATCH
    condition: packet_seq_not_expected
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: AD_MESSAGE_OVERFLOW
    condition: payload_count_exceeds_MAX_MESSAGE_BYTES
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: AD_SRAM_OVERFLOW
    condition: linear_allocator_exceeds_sram_limit
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: AD_DESCRIPTOR_FULL
    condition: descriptor_fifo_full_at_eom
    architectural_effect: Status/error reporting follows the SSOT error policy
  - id: AD_TIMEOUT
    condition: ctx_timeout_age_exceeds_timeout_limit
    architectural_effect: Status/error reporting follows the SSOT error policy
  propagation:
    packet_drop: counter_irq_debug_no_sram_write
    assembly_drop: counter_irq_debug_context_error_no_descriptor
    read_error: axi_rresp_slverr_irq_counter
  recovery:
    packet_drop: next_packet_can_be_accepted_when_resources_available
    assembly_drop: software_clear_or_timeout_cleanup_returns_q_to_IDLE
    read_error: next_read_can_retry_after_response_completion
debug_observability:
  waveform_must_probe:
  - axi_aclk
  - axi_aresetn
  - pclk
  - presetn
  - m_axi_awvalid
  - m_axi_awready
  - m_axi_wvalid
  - m_axi_wready
  - m_axi_wlast
  - sram_wr_valid
  - sram_wr_strb
  - m_axi_arvalid
  - m_axi_rvalid
  - ctx_state
  - ctx_last_drop_reason
  - irq
  trace_events:
  - id: EVT_TLP_ACCEPT
    fields:
    - tlp_byte_count
    - awlen
    - wstrb_final
  - id: EVT_PACKET_DROP
    fields:
    - packet_drop_reason
    - source_eid
    - message_tag
  - id: EVT_ASSEMBLY_DROP
    fields:
    - assembly_drop_reason
    - context_id
    - ctx_expected_seq
    - packet_seq
  - id: EVT_DESCRIPTOR_PUBLISH
    fields:
    - context_id
    - payload_base_addr
    - payload_byte_count
  - id: EVT_AXI_READBACK
    fields:
    - araddr
    - arlen
    - rresp
    - rlast
  signals:
  - debug_context_id
  - debug_context_key
  - debug_drop_pulse
  - debug_vdm_valid
  status_outputs:
  - irq
  - prdata
  - m_axi_bresp
  - m_axi_rresp
integration:
  bus_attachment:
    interfaces:
    - axi_write_slave
    - axi_read_slave
    - apb_slave
    - sram_write_port
    - sram_read_port
    address_ownership: SoC assigns AXI write aperture, AXI read aperture, APB base, and external SRAM window.
  dependencies:
    external_modules:
    - external_256b_sram
    external_clocks:
    - axi_aclk
    - pclk
    external_resets:
    - axi_aresetn
    - presetn
  connections:
  - module: mctp_assembler_scratch_axi_write_ingress
    port: m_axi_awvalid
    signal: m_axi_awvalid
  - module: mctp_assembler_scratch_axi_write_ingress
    port: m_axi_wvalid
    signal: m_axi_wvalid
  - module: mctp_assembler_scratch_sram_packer
    port: sram_wr_valid
    signal: pack_wr_valid
  - module: mctp_assembler_scratch_axi_read_egress
    port: m_axi_rvalid
    signal: m_axi_rvalid
  - module: mctp_assembler_scratch_apb_regfile
    port: pready
    signal: pready
  integration_notes:
  - Top module must expose exactly the ports declared in io_list.
  - No AXI ID ports are present or tied off because first target forbids IDs.
  - External SRAM is not inferred internally; SRAM request and response ports are top-level integration ports.
  connection_contract_status: missing machine-readable module wiring; child RTL drafts may proceed from owner packets, but top integration/signoff must stay blocked until SSOT authors integration.connections or sub_modules[].connections with module/port/signal records
dft:
  scan_required: false
  controllability:
    reset: axi_aresetn
    clocks:
    - axi_aclk
    - pclk
    primary_inputs: all io_list input ports controllable in testbench
  observability:
    required_internal_points:
    - ctx_state
    - ctx_last_drop_reason
    - packet_drop_count
    - assembly_drop_count
    - descriptor_count
    outputs: all io_list output ports observable in testbench
  mbist_required: false
  note: Formal proof and DFT closure are optional future work for this scratch signoff.
synthesis:
  dialect: systemverilog_2012
  top_module: mctp_assembler_scratch
  tool_flow: yosys
  target_technology: generic
  constraints:
  - No inferred latches.
  - No unresolved black boxes except external SRAM model in integration testbench.
  - All sequential state has reset or documented initialization.
  - No AXI ID ports are generated.
  ppa_targets:
    frequency_mhz_min: 250
    area_um2_max: null
    power_mw_max: null
  required_outputs:
  - syn/out/synth.v
  - syn/out/area.json
  - syn/out/syn.report.md
  - sta/out/wns.json
  target_library: sky130_fd_sc_hd
  liberty_env_var: SKY130_LIB
  corner:
    name: sky130_fd_sc_hd__ss_100C_1v40
    process: ss
    temperature_c: 100
    voltage_v: 1.4
  library_policy: Use the SKY130_LIB environment variable to locate the SS corner Liberty file for the declared sky130_fd_sc_hd target library; synthesis and STA must stop if the file is unreadable or does not match the declared corner.
pnr:
  required: false
  utilization_pct: 60
  aspect_ratio: 1.0
  routing:
    signal_layers:
      min: met1
      max: met5
    drc_waivers: []
  note: PnR is not required for first scratch local signoff.
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  cts_buf_list:
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
coding_rules:
  language: SystemVerilog
  style:
  - Use always_ff for sequential logic and always_comb for combinational logic.
  - Use explicit ready/valid state holding rules.
  - Avoid inferred latches and multiple drivers.
  - Parameter header mctp_assembler_scratch_param.vh is included by consumers.
  reset_policy: Active-low reset clears all visible counters and per-Q state.
reuse_modules: []
custom:
  standards_decode:
    pcie_vdm:
      accepted_container: PCIe Vendor Defined Message TLP carrying MCTP payload.
      first_tlp_header_snapshot_bytes: TLP_HEADER_SNAPSHOT_BYTES
      last_tlp_header_snapshot_bytes: TLP_HEADER_SNAPSHOT_BYTES
      ecrc_check: excluded_first_target
      flit_mode: excluded_first_target
    mctp_transport:
      key_fields:
      - source_eid
      - tag_owner
      - message_tag
      state_fields:
      - destination_eid
      - message_type
      - packet_seq
      - som
      - eom
      transmission_unit_bytes: 64_to_4096_4B_aligned
      last_packet_may_be_shorter: true
  sram_packing:
    word_bytes: 32
    no_holes_rule: logical payload byte stream is packed contiguously into SRAM byte lanes across fragments.
    final_flush_rule: EOM flushes a partially filled word using byte strobes.
  optional_behavior_policy:
    resolution: optional items disabled unless SSOT marks required or parameterized.
