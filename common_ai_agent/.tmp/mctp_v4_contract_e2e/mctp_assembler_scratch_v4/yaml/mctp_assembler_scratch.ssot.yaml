quality_gates:
  ssot:
    pass: python3 workflow/ssot-gen/scripts/verify_ssot.py mctp_assembler_scratch --root . --mode signoff
    evidence:
    - mctp_assembler_scratch/req/ssot_validation.json
  rtl:
    pass: python3 workflow/rtl-gen/scripts/rtl_compile_report.py mctp_assembler_scratch --root .
    evidence:
    - mctp_assembler_scratch/rtl/rtl_compile.json
    - mctp_assembler_scratch/lint/dut_lint.json
  rtl_gen:
    profile: standard
    pass: rtl-gen execution_policy.pass_allowed is true, every required SSOT-derived RTL TODO is closed, and provenance proves common_ai_agent rtl-gen authored the RTL without fixed-template fallback behavior
    evidence:
    - rtl/rtl_authoring_plan.json
    - logs/rtl-gen/rtl_todo_plan.json
    - rtl/provenance.json
    - rtl_compile.json
    - lint/dut_lint.json
  dv:
    pass: python3 mctp_assembler_scratch/tb/cocotb/test_runner.py
    evidence:
    - mctp_assembler_scratch/sim/results.xml
    - mctp_assembler_scratch/sim/scoreboard_events.jsonl
  coverage:
    pass: python3 workflow/coverage/scripts/ssot_coverage_summary.py mctp_assembler_scratch --root .
    evidence:
    - mctp_assembler_scratch/cov/coverage.json
  eda:
    pass: local_synthesis_optional_first_target
    evidence:
    - mctp_assembler_scratch/rtl/rtl_compile.json
  signoff:
    pass: python3 workflow/signoff/scripts/check_ip_signoff.py mctp_assembler_scratch --root .
    evidence:
    - mctp_assembler_scratch/signoff/ip_signoff.json
    - mctp_assembler_scratch/signoff/ip_signoff.md
traceability:
  requirement_authority:
  - req/mctp_assembler_scratch_requirements.md
  - req/source_references.md
  - req/approval_manifest.json
  yaml_to_output:
  - source: top_module
    outputs:
    - rtl/mctp_assembler_scratch.sv
    - list/mctp_assembler_scratch.f
  - source: parameters
    outputs:
    - rtl/mctp_assembler_scratch_param.vh
  - source: io_list
    outputs:
    - rtl/*.sv
    - tb/cocotb/monitors.py
    - verify/ip_contract.json
  - source: function_model
    outputs:
    - model/functional_model.py
    - verify/equivalence_goals.json
    - cov/fcov_plan.json
  - source: cycle_model
    outputs:
    - model/cycle_model.py
    - model/cl_model_check.json
  - source: test_requirements
    outputs:
    - verify/equivalence_goals.json
    - tb/cocotb/test_runner.py
    - cov/coverage.json
  - yaml: function_model
    output: RTL behavior and TB reference model
  - yaml: cycle_model
    output: RTL handshake/pipeline timing and waveform checks
  - yaml: function_model/cycle_model/test_requirements
    output: verify/equivalence_goals.json and FL-vs-RTL scoreboard contracts
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: security
    output: Threat mitigations and negative tests
  - yaml: error_handling
    output: Fault RTL paths and DV error scenarios
  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
workflow_todos:
  ssot-gen:
  - content: Keep locked defaults in req and SSOT synchronized.
    detail: Any change to AXI IDs, outstanding counts, allocator reclaim, formal scope, or no-descriptor read response requires a new approval manifest.
    criteria:
    - approval_manifest_hash_refreshed
    - verify_ssot_signoff_passes
    source_refs:
    - req/mctp_assembler_scratch_requirements.md
    - features.locked_defaults
  fl-model-gen:
  - content: Generate byte-accurate FunctionalModel from function_model transactions.
    detail: FL must model packet drops, assembly drops, SRAM no-hole packing, descriptor publish, APB visibility, and AXI readback.
    criteria:
    - model/fl_model_check.json_passed
    - cov/fcov_plan.json_created
    source_refs:
    - function_model
    - test_requirements.coverage_goals
  rtl-gen:
  - content: Implement AXI write ingress and no-ID one-outstanding write behavior.
    detail: AW/W/B channels must follow io_list and cycle_model handshake rules.
    criteria:
    - rtl_compile_passes
    - lint_passes
    - axi_write_module_present
    source_refs:
    - io_list.interfaces.axi_write_slave
    - cycle_model.handshake_rules.axi_write_channels
  - content: Implement parser, context table, SRAM packer, descriptor queue, read egress, APB regfile, SRAM arbiter, CDC, and parameter header.
    detail: Required modules from sub_modules and filelist must exist exactly once and satisfy function_model/state/register ownership.
    criteria:
    - all_required_modules_in_filelist
    - no_missing_declared_module
    - per_q_state_visible
    source_refs:
    - sub_modules
    - function_model.transactions
    - registers.per_q_bank
    - memory.instances
  - content: Implement no-hole 256-bit SRAM payload packing.
    detail: Each Q keeps partial_word_addr, partial_word_strobe, partial_word_valid, and partial_next_lane so fragments pack contiguously.
    criteria:
    - SC_UNALIGNED_SRAM_PACK_NO_HOLES_passes
    - sram_write_monitor_observes_no_holes
    source_refs:
    - dataflow.sram_pack
    - function_model.transactions.FM_SRAM_PACK_WRITE
    - custom.sram_packing
  - content: Implement packet and assembly drop handling.
    detail: Every PD_* and AD_* reason must increment the correct counter, expose last reason, and suppress illegal SRAM writes or descriptors.
    criteria:
    - all_drop_scenarios_pass
    - no_sram_write_on_drop
    source_refs:
    - error_handling.error_sources
    - test_requirements.scenarios
  tb-gen:
  - content: Build contract-driven monitors for AXI write, AXI read, APB, SRAM, descriptor, per-Q register, interrupt, and counter observations.
    detail: Monitors derive from io_list, cycle_model, function_model, and ip_contract rather than a static profile.
    criteria:
    - check_tb_python_compile_passes
    - scoreboard_events_have_goal_ids
    - rtl_observed_keys_cover_expected_contract
    source_refs:
    - io_list
    - cycle_model
    - function_model
    - test_requirements.scoreboard_checks
  sim_debug: []
generation_flow:
  steps:
  - name: verify_ssot
    command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" mctp_assembler_scratch --root "$ATLAS_PROJECT_ROOT" --mode ${ATLAS_RUN_MODE:-signoff}
    description: Validate SSOT structure, Preview fields, and quality gates at the selected Run Mode
  - name: handoff_fl_model
    command: /ssot-fl-model mctp_assembler_scratch
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals mctp_assembler_scratch
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl mctp_assembler_scratch
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb mctp_assembler_scratch
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
