# =============================================================================
# SSOT: mux_4to1 — 4-to-1 Parameterized Multiplexer with APB-Lite CSR
# =============================================================================
top_module:
  name: "mux_4to1"
  file: "rtl/mux_4to1.sv"
  version: "1.0"
  type: "bus"
  description: "Parameterized 4-to-1 multiplexer with registered output (1-cycle latency), APB-Lite CSR for runtime select-source control, and optional enable gating."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "mux_4to1_regs", file: "rtl/mux_4to1_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "io_list.interfaces.apb_lite_slave"], source_sections: ["registers", "io_list"], register_refs: ["registers.register_list"], description: "APB-Lite CSR decode + register storage for CTRL and STATUS" }
  - { name: "mux_4to1_core", file: "rtl/mux_4to1_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model.transactions.FM_SELECT", "function_model.transactions.FM_HOLD", "function_model.output_rules", "function_model.state_updates", "cycle_model.pipeline"], source_sections: ["function_model", "cycle_model"], function_model_refs: ["function_model.transactions.FM_SELECT", "function_model.transactions.FM_HOLD"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], description: "Mux select logic + output register — core datapath" }
decomposition:
  units:
    - { id: "csr_decode", kind: "control", source_refs: ["registers.register_list", "function_model.transactions.FM_SELECT"], rtl_candidates: ["mux_4to1_regs"], verification_impact: ["test_requirements.scenarios.SC1", "test_requirements.scenarios.SC2"] }
    - { id: "mux_forward", kind: "datapath", source_refs: ["function_model.transactions.FM_SELECT", "function_model.output_rules", "cycle_model.pipeline"], rtl_candidates: ["mux_4to1_core"], verification_impact: ["test_requirements.scenarios.SC1", "test_requirements.scenarios.SC3"] }
parameters:
  - name: "DATA_WIDTH"
    default: 32
    type: int
    description: "Bit-width of each data input and the data output"
    drives: ["mux_4to1.sv", "mux_4to1_core.sv", "mux_4to1_regs.sv"]
  - name: "NUM_INPUTS"
    default: 4
    type: int
    description: "Number of data inputs; must be a power of 2 for clean select encoding"
    drives: ["mux_4to1.sv", "mux_4to1_core.sv"]
    constraints: "power_of_2, min 2, max 16"
  - name: "SEL_WIDTH"
    default: 2
    type: int
    description: "clog2(NUM_INPUTS) — select port width, derived not overridden"
    drives: ["mux_4to1.sv", "mux_4to1_core.sv"]
    constraints: "Must equal $clog2(NUM_INPUTS)"
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Single system clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "System reset — async assert, sync deassert"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_lite_slave"
      type: "APB-Lite"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "APB-Lite CSR interface for runtime select-source control and status readback"
      protocol:
        setup_phase: "psel=1, penable=0 captures address and control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata is sampled in the completing access phase for writes."
        error_rule: "pslverr is asserted for illegal or unsupported access."
      ports:
        - { name: "PADDR",   width: 4,  direction: "input",  description: "APB address (word-aligned, 4-bit decode)" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready (always 1 — zero-wait-state)" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB error (asserted for reserved/unmapped addresses)" }
    - name: "data_inputs"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "4 parameterized-width data input buses"
      protocol:
        sampling: "Sampled on every rising PCLK edge when PRESETn is deasserted."
      ports:
        - { name: "data_in_0", width: "DATA_WIDTH", direction: "input", description: "Data input 0" }
        - { name: "data_in_1", width: "DATA_WIDTH", direction: "input", description: "Data input 1" }
        - { name: "data_in_2", width: "DATA_WIDTH", direction: "input", description: "Data input 2" }
        - { name: "data_in_3", width: "DATA_WIDTH", direction: "input", description: "Data input 3" }
    - name: "select_input"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Hardware select input; used when CTRL.sel_src = 0"
      protocol:
        sampling: "Sampled on every rising PCLK edge."
      ports:
        - { name: "sel_i", width: "SEL_WIDTH", direction: "input", description: "Hardware select (2-bit for NUM_INPUTS=4)" }
    - name: "data_output"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Registered data output — 1-cycle latency from input sample to output"
      protocol:
        output_timing: "data_out is the registered value of the selected input, updated every clock cycle when enabled."
        reset_value: "All zeros on reset deassertion."
      ports:
        - { name: "data_out", width: "DATA_WIDTH", direction: "output", description: "Selected data output (registered)" }
        - { name: "data_out_valid", width: 1, direction: "output", description: "Indicates data_out holds a valid selected value (deasserted during reset)" }
features:
  - name: "Hardware Select Muxing"
    trigger: "CTRL.sel_src == 0 and sel_i is sampled on rising PCLK"
    datapath: "sel_i selects one of data_in[0..3]; the selected value is registered into data_out on the next rising edge."
    control: "No FSM — pure combinational select followed by output register."
    output: "data_out = registered(data_in[sel_i])"
  - name: "Software Select Muxing"
    trigger: "CTRL.sel_src == 1; APB write to CTRL.sw_sel updates the select value"
    datapath: "CTRL.sw_sel selects one of data_in[0..3]; the selected value is registered into data_out on the next rising edge."
    control: "Select source latched from CTRL.sel_src register bit."
    output: "data_out = registered(data_in[CTRL.sw_sel])"
  - name: "Enable Gating"
    trigger: "CTRL.en == 0"
    datapath: "data_out holds its last value; data_out_valid is deasserted."
    control: "CTRL.en bit controls whether the mux output register updates."
    output: "data_out frozen, data_out_valid = 0"
  - name: "APB-Lite CSR Access"
    trigger: "APB transfer with PSEL=1"
    datapath: "Read/write CTRL and STATUS registers through APB-Lite interface."
    control: "Zero-wait-state (PREADY=1 always); PSLVERR for reserved addresses."
    output: "PRDATA for reads; register update for writes."
dataflow:
  data_path:
    source: "data_in[0..3] (DATA_WIDTH-bit input buses)"
    select: "sel_i (hardware) or CTRL.sw_sel (software), muxed by CTRL.sel_src"
    register: "data_out_reg (DATA_WIDTH-bit output register)"
    sequence: "data_in[*] → combinational select → output register → data_out"
  control_path:
    source: "APB-Lite writes to CTRL register"
    select_source: "CTRL.sel_src chooses between hardware sel_i and software CTRL.sw_sel"
    enable: "CTRL.en gates the output register update"
    sequence: "APB write → CTRL register update → sel_src/sw_sel/en take effect next cycle"
  status_path:
    source: "Output register and select logic"
    readback: "STATUS.cur_sel reflects the active select index; STATUS.en reflects CTRL.en"
    sequence: "output register update → STATUS register readable via APB"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the mux computes independent of cycle timing."
  state_variables:
    - { name: "data_out_reg", source: "output register", reset: 0, description: "Registered data output — holds the selected input value from the previous cycle" }
    - { name: "cur_sel", source: "CTRL.sel_src ? CTRL.sw_sel : sel_i", reset: 0, description: "Currently active select index (resolved from hardware or software source)" }
    - { name: "ctrl_en", source: "registers.CTRL.en", reset: 0, description: "Enable bit — when 0 the output register holds its last value" }
    - { name: "ctrl_sel_src", source: "registers.CTRL.sel_src", reset: 0, description: "Select source: 0=hardware sel_i, 1=software CTRL.sw_sel" }
    - { name: "ctrl_sw_sel", source: "registers.CTRL.sw_sel", reset: 0, description: "Software select value, used when sel_src=1" }
    - { name: "valid_reg", source: "derived from ctrl_en", reset: 0, description: "Registered valid flag — asserts when ctrl_en=1 after first clock" }
  transactions:
    - id: "FM_SELECT"
      name: "select_and_forward"
      preconditions:
        - "ctrl_en == 1"
        - "cur_sel < NUM_INPUTS"
      inputs:
        - "data_in[0..NUM_INPUTS-1] (DATA_WIDTH-bit each)"
        - "sel_i (SEL_WIDTH-bit hardware select) or ctrl_sw_sel (software select)"
      output_rules:
        - { name: "data_out",   expr: "data_in[cur_sel]", width: "DATA_WIDTH", port: "data_out",   description: "Selected input value registered to output" }
        - { name: "data_out_valid", expr: "ctrl_en",       width: 1,           port: "data_out_valid", description: "Valid indicator — mirrors enable after register" }
      state_updates:
        - { name: "data_out_reg", reset: 0,  expr: "data_in[cur_sel]" }
        - { name: "cur_sel",      reset: 0,  expr: "ctrl_sel_src ? ctrl_sw_sel : sel_i" }
        - { name: "valid_reg",    reset: 0,  expr: "ctrl_en" }
      side_effects: []
      error_cases:
        - { condition: "cur_sel >= NUM_INPUTS", result: "data_out is driven from data_in[0] as safe default (assumption: sel is always within range; see custom.assumptions)" }
    - id: "FM_HOLD"
      name: "hold_output"
      preconditions:
        - "ctrl_en == 0"
      inputs: []
      output_rules:
        - { name: "data_out",   expr: "data_out_reg (previous value)", width: "DATA_WIDTH", port: "data_out",   description: "Output register holds last value" }
        - { name: "data_out_valid", expr: "0",                         width: 1,            port: "data_out_valid", description: "Valid deasserted" }
      state_updates:
        - { name: "data_out_reg", reset: 0, expr: "data_out_reg (no change)" }
        - { name: "valid_reg",    reset: 0, expr: "0" }
      side_effects: []
      error_cases: []
  invariants:
    - "data_out is always registered — it never glitches within a clock cycle."
    - "data_out_valid is 0 during and immediately after reset."
    - "When ctrl_en transitions from 0 to 1, data_out updates on the next clock edge."
    - "cur_sel is always in the range [0, NUM_INPUTS-1] when ctrl_en=1 (see custom.assumptions for out-of-range policy)."
  reference_model_hint: "tb-gen should implement a Python reference model: given data_in array, sel_i, ctrl_en, ctrl_sel_src, ctrl_sw_sel → compute expected data_out and data_out_valid each cycle. Compare with RTL output on every rising edge."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state and outputs change relative to PCLK edges."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears data_out_reg, cur_sel, valid_reg, and all control registers."
    deassertion: "State is usable on the first rising PCLK edge after synchronized deassertion; data_out=0, data_out_valid=0."
  latency:
    data_path: { min_cycles: 1, max_cycles: 1, description: "Exactly 1-cycle latency from data_in/sel_i sample to data_out update (registered output)" }
    register_read: { min_cycles: 0, max_cycles: 1, description: "APB read: PREADY=1 always, PRDATA available in same access phase" }
    register_write: { min_cycles: 0, max_cycles: 1, description: "APB write: PREADY=1 always, register updated at end of access phase" }
    ctrl_to_output: { min_cycles: 1, max_cycles: 1, description: "CTRL register write takes effect on the next rising edge (registered control path)" }
  handshake_rules:
    - { signal: "PREADY", rule: "Always driven high — zero-wait-state APB-Lite slave." }
    - { signal: "PSLVERR", rule: "Asserted only during the access phase when PADDR targets a reserved/unmapped offset." }
    - { signal: "data_out", rule: "Updates on every rising PCLK edge when ctrl_en=1; holds previous value when ctrl_en=0." }
    - { signal: "data_out_valid", rule: "Asserted on the rising edge after ctrl_en=1 and deasserted one cycle after ctrl_en=0." }
  pipeline:
    - { stage: "S0_SAMPLE", cycle: "N", action: "Sample data_in[0..3], sel_i, and CTRL register state on rising PCLK edge" }
    - { stage: "S1_RESOLVE_SEL", cycle: "N (combinational)", action: "Resolve active select: cur_sel = ctrl_sel_src ? ctrl_sw_sel : sel_i" }
    - { stage: "S2_MUX", cycle: "N (combinational)", action: "Compute mux_next = data_in[cur_sel]" }
    - { stage: "S3_REGISTER", cycle: "N+1", action: "If ctrl_en=1, data_out_reg <= mux_next; valid_reg <= 1. If ctrl_en=0, hold data_out_reg; valid_reg <= 0." }
  ordering:
    - "Register writes from APB complete at the end of the access phase (same cycle)."
    - "Updated CTRL values affect the data path starting the next rising edge after the write completes."
    - "data_out reflects the selected input value from the previous cycle — never the current cycle."
  backpressure: []
  performance:
    frequency_mhz: 50
    throughput: { sustained_beats_per_cycle: 1, condition: "ctrl_en=1 — one new output value every clock cycle" }
    outstanding: { read_max: 0, write_max: 0, description: "No outstanding AXI transactions; simple registered datapath" }
    depth: { pipeline_stages: 1, queue_depth: 1, description: "Single output register stage" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Single system clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings"
registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register — select source, software select, and enable"
      write_side_effects:
        - "Writing sel_src switches between hardware and software select on the next clock edge."
        - "Writing sw_sel updates the software select value used when sel_src=1."
        - "Writing en gates/ungates the output register update."
      fields:
        - { name: "en",      bits: [0, 0],  access: "rw", reset: 0x0, write_effect: "0=hold output, 1=update output", description: "Mux enable" }
        - { name: "sel_src", bits: [1, 1],  access: "rw", reset: 0x0, write_effect: "0=hardware sel_i, 1=software sw_sel", description: "Select source" }
        - { name: "sw_sel",  bits: [3, 2],  access: "rw", reset: 0x0, write_effect: "Software select index (0..3)", description: "Software select value" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x04
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status Register — readback of active select and enable state"
      fields:
        - { name: "en",      bits: [0, 0],  access: "ro", reset: 0x0, description: "Current enable state (mirrors CTRL.en)" }
        - { name: "cur_sel", bits: [3, 2],  access: "ro", reset: 0x0, description: "Current active select index (0..3)" }
        - { name: "valid",   bits: [4, 4],  access: "ro", reset: 0x0, description: "data_out_valid status (0=output held, 1=output tracking)" }
        - { name: "reserved_31_5", bits: [31, 5], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances:
    - { name: "data_out_reg", type: "register", depth: 1, width: "DATA_WIDTH", read_ports: 1, write_ports: 1, latency: 0, description: "Output register for selected data" }
  note: "No SRAM/FIFO — simple register-based output."
interrupts:
  sources: []
  output: null
  note: "No interrupts — mux_4to1 is a purely combinational+registered datapath with CSR. No interrupt generation needed."
fsm:
  note: "No FSM required — pure combinational select with registered output. Control is register-based (no state machine)."
rtl_contract:
  transaction: "FM_SELECT"
  sample_condition: "Rising PCLK edge when ctrl_en=1"
  input_map:
    data_inputs: "data_in_0..data_in_3"
    hw_select: "sel_i"
    sw_select: "CTRL.sw_sel"
    select_source: "CTRL.sel_src"
    enable: "CTRL.en"
  output_map:
    data_out: "data_out (registered selected input)"
    data_out_valid: "data_out_valid (registered enable)"
  state_updates:
    - { name: "data_out_reg", reset: 0, expr: "data_in[cur_sel] when ctrl_en=1; hold when ctrl_en=0" }
    - { name: "valid_reg", reset: 0, expr: "ctrl_en (registered)" }
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.5 }
  latency_budget:
    data_path_cycles: { min: 1, max: 1, measured_from: "data_in/sel_i sample", measured_to: "data_out update", note: "Single register stage" }
    register_access_cycles: { min: 1, max: 2, measured_from: "psel && penable", measured_to: "pready" }
  throughput:
    sustained_beats_per_cycle: 1
    conditions: "ctrl_en=1 — one new output per clock cycle"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "all_inputs_except_PCLK_PRESETn", clock: "PCLK", delay_ns: 2.0, source: "50 MHz timing budget" }
    outputs:
      - { ports: "all_outputs", clock: "PCLK", delay_ns: 2.0, source: "50 MHz timing budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "Simple mux — no low-power mode in this revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "reset deasserted", exit: "reset asserted", guarantees: ["All datapath and CSR active"] }
  upf_required: false
security:
  classification: "non_secure_mux_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "data_path", protection: "No data protection beyond AXI/APB protocol correctness" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO/WO access policy in registers.register_list" }
    - { threat: "select glitch", mitigation: "Registered output prevents combinational glitches from propagating" }
  privilege_model: "No internal privilege levels — external bus fabric enforces access policy"
  safety_goals:
    - "Output is always the selected input value or held previous value — no undefined states"
    - "Reset clears all state to known values"
error_handling:
  error_sources:
    - { id: "ERR_APB_RESERVED", condition: "APB access to unmapped offset (PADDR >= 0x08)", architectural_effect: "PSLVERR asserted, PRDATA=0" }
    - { id: "ERR_SEL_OOR", condition: "cur_sel >= NUM_INPUTS (should not happen with 2-bit sel)", architectural_effect: "Safe default: data_in[0] selected (see custom.assumptions)" }
  propagation:
    - "PSLVERR is asserted only during the APB access phase for unmapped addresses."
    - "No error interrupt — mux is a passthrough datapath."
  recovery:
    - { action: "Correct register programming", clears: ["select misconfiguration"], preserves: ["all register state"] }
debug_observability:
  waveform_must_probe:
    - "data_out_reg"
    - "cur_sel"
    - "ctrl_en"
    - "data_out_valid"
    - "CTRL register fields (en, sel_src, sw_sel)"
  status_outputs:
    - { name: "data_out_valid", description: "Indicates valid output when 1" }
  trace_events:
    - { name: "output_update", trigger: "data_out_reg changes value (ctrl_en=1)" }
    - { name: "output_hold", trigger: "ctrl_en transitions from 1 to 0" }
  debug_registers:
    - "STATUS"
integration:
  bus_attachment:
    control: "APB-Lite slave for CSR"
    data: "Direct data input/output ports (no bus for data)"
  connections:
    - { module: "mux_4to1", port: "PCLK", signal: "system.PCLK" }
    - { module: "mux_4to1", port: "PRESETn", signal: "system.PRESETn" }
    - { module: "mux_4to1_regs", port: "clk_i", signal: "PCLK" }
    - { module: "mux_4to1_regs", port: "rst_ni", signal: "PRESETn" }
    - { module: "mux_4to1_core", port: "clk_i", signal: "PCLK" }
    - { module: "mux_4to1_core", port: "rst_ni", signal: "PRESETn" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "PSLVERR for PADDR >= 0x08"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC must provide APB-Lite compliant signals (PADDR, PSEL, PENABLE, PWRITE, PWDATA)."
    - "data_in inputs must be driven by upstream logic; data_out connects to downstream consumer."
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
  observability:
    required_internal_points: ["data_out_reg", "cur_sel", "ctrl_en"]
  mbist_required: false
  notes: "No SRAM macro — simple register-based design; DFT via scan insertion during synthesis if needed."
synthesis:
  dialect: "systemverilog_2012"
  top_module: "mux_4to1"
  technology:
    pdk: "generic"
    standard_cell_library: "generic"
    liberty_corner: "typical"
  constraints:
    - "No inferred latches"
    - "All flops reset via PRESETn (active-low async)"
    - "No package/interface/modport/function/task/for/while constructs"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/mux_4to1.json or syn/out/mux_4to1.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/mux_4to1_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk …)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use a default)"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
  lint_waivers:
    - "UNUSEDSIGNAL: explicit approved tie-offs only"
    - "WIDTHEXPAND: sel_i width expansion"
reuse_modules: []
custom:
  assumptions:
    - "sel_i is always within [0, NUM_INPUTS-1]. Out-of-range select values are a programming error; safe default routes to data_in[0]."
    - "CTRL.sw_sel is always within [0, NUM_INPUTS-1]. APB writes with out-of-range values are a software bug; hardware does not mask."
    - "DATA_WIDTH is a power of 2 and >= 8. Sub-byte widths are not supported."
    - "Upstream data sources hold data_in stable for at least 1 PCLK cycle before sampling."
    - "APB-Lite bus operates in single-cycle access mode (PREADY=1 always)."
    - "No interrupt generation needed — mux is a purely datapath IP."
    - "50 MHz default frequency; higher frequencies achievable with standard synthesis constraints."
  note: "Pipeline mode — assumptions recorded without blocking on ask_user."
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"
filelist:
