# =============================================================================
# adder_kogge_stone.ssot.yaml — Kogge-Stone Parallel Prefix Adder
# =============================================================================
top_module:
  name: "adder_kogge_stone"
  file: "rtl/adder_kogge_stone.sv"
  version: "1.0"
  type: "accelerator"
  description: "Parameterized Kogge-Stone parallel prefix adder with 1-cycle registered latency, valid/ready streaming data interface, APB-lite CSR for runtime configuration, and interrupt-on-completion."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "adder_kogge_stone_core", file: "rtl/adder_kogge_stone_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model.transactions", "cycle_model.pipeline", "cycle_model.handshake_rules", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions.FM1", "function_model.transactions.FM2"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow"], description: "Kogge-Stone prefix tree, output registration, and valid/ready handshake datapath/control" }
  - { name: "adder_kogge_stone_regs", file: "rtl/adder_kogge_stone_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "interrupts"], source_sections: ["registers", "interrupts"], register_refs: ["registers.register_list"], description: "APB-lite CSR register decode, status accumulation, and interrupt generation" }
decomposition:
  units:
    - { id: "prefix_compute", kind: "datapath", source_refs: ["function_model.transactions.FM1", "function_model.transactions.FM2"], rtl_candidates: ["adder_kogge_stone_core"], verification_impact: ["test_requirements.scenarios.SC1", "test_requirements.scenarios.SC2", "test_requirements.scenarios.SC7"] }
    - { id: "csr_control", kind: "control", source_refs: ["registers.register_list", "interrupts"], rtl_candidates: ["adder_kogge_stone_regs"], verification_impact: ["test_requirements.scenarios.SC5", "test_requirements.scenarios.SC6"] }
parameters:
  - { name: "N", default: 32, type: int, description: "Operand and result width in bits (power-of-2 recommended for balanced prefix tree)", drives: ["adder_kogge_stone_core.sv", "adder_kogge_stone_regs.sv"] }
  - { name: "CLOCK_FREQ_MHZ", default: 50, type: int, description: "Target clock frequency in MHz", drives: ["tb_top.sv"] }
  - { name: "RESET_POLARITY", default: "active_low", type: enum, values: ["active_low", "active_high"], drives: ["ALL .sv files"] }
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "Single system clock domain"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "System reset — async assert, sync deassert"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_csr"
      type: "APB-Lite"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "APB-lite CSR for runtime configuration, status readback, and interrupt control"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0 captures address/control."
        access_phase: "PSEL=1, PENABLE=1 completes when PREADY=1."
        read_rule: "PRDATA valid in the completing access phase for reads."
        write_rule: "PWDATA/PSTRB sampled in the completing access phase for writes."
        error_rule: "PSLVERR asserted with PREADY=1 for unsupported or reserved-offset access."
      ports:
        - { name: "PADDR",   width: 12, direction: "input",  description: "APB address bus" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write (1=write, 0=read)" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PSTRB",   width: 4,  direction: "input",  description: "APB write strobes" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready — zero-wait-state (always 1)" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB slave error for reserved/unsupported access" }

    - name: "operand_stream"
      type: "valid/ready"
      role: "sink"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Streaming operand input with valid/ready handshake"
      protocol:
        valid_rule: "Source asserts valid_i when operands are stable; holds until ready_o is sampled high on a rising edge."
        ready_rule: "ready_o=1 indicates adder can accept new operands; deasserted when a result is pending and downstream is backpressured."
        backpressure: "Source must hold valid_i and data stable when ready_o=0."
      ports:
        - { name: "data_a_i", width: 32, direction: "input", description: "Operand A (parameterized via N, default 32)" }
        - { name: "data_b_i", width: 32, direction: "input", description: "Operand B (parameterized via N, default 32)" }
        - { name: "cin_i",    width: 1,  direction: "input", description: "Carry-in from port (active when CTRL.cin_mode=0)" }
        - { name: "valid_i",  width: 1,  direction: "input", description: "Operands valid handshake" }

    - name: "result_stream"
      type: "valid/ready"
      role: "source"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Streaming result output with valid/ready handshake"
      protocol:
        valid_rule: "Asserted for exactly one cycle, 1 clock after operand acceptance, unless held by downstream backpressure."
        ready_rule: "ready_i=1 indicates downstream can accept the result; deasserted causes result to be held."
      ports:
        - { name: "sum_o",      width: 32, direction: "output", description: "Addition result (parameterized via N)" }
        - { name: "cout_o",     width: 1,  direction: "output", description: "Carry-out from last computation" }
        - { name: "overflow_o", width: 1,  direction: "output", description: "Signed overflow flag from last computation" }
        - { name: "valid_o",    width: 1,  direction: "output", description: "Result valid pulse" }
        - { name: "ready_i",    width: 1,  direction: "input",  description: "Downstream ready to accept result" }

    - name: "interrupt"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Completion/error interrupt output"
      protocol:
        assertion: "irq_o reflects enabled pending interrupt status (level-sensitive)."
        deassertion: "irq_o deasserts after corresponding W1C status clear in INTSTATUS."
        reset_value: 0
      ports:
        - { name: "irq_o", width: 1, direction: "output", description: "Level-sensitive interrupt output" }
features:
  - name: "Kogge-Stone Parallel Prefix Addition"
    trigger: "valid_i assertion (stream) or CTRL.enable write (register mode)"
    datapath: "data_a_i, data_b_i → generate/propagate pre-computation → log₂(N)-level parallel prefix tree → group generate/propagate → final sum XOR → output registration"
    control: "IDLE → COMPUTING (2-state FSM); valid/ready handshake gates operand acceptance; output backpressure gates result delivery"
    output: "N-bit sum, 1-bit carry-out, 1-bit signed overflow, valid_o pulse"

  - name: "Dual Input Mode"
    trigger: "CTRL.cin_mode selects carry-in source"
    datapath: "cin_mode=0 uses cin_i port directly; cin_mode=1 uses CTRL.cin_reg value"
    control: "Static mux selected at operand acceptance time"
    output: "Carry-in routed into prefix tree LSB generate stage"

  - name: "APB-lite CSR Access"
    trigger: "APB PSEL/PENABLE/PWRITE protocol"
    datapath: "PADDR decodes to register map; read data on PRDATA, write data from PWDATA"
    control: "Zero-wait-state (PREADY=1 always); PSLVERR for reserved offsets"
    output: "Register read/write completes in single access phase"
dataflow:
  stream_path:
    source: "data_a_i, data_b_i, cin_i (or cin_reg) — latched on valid_i && ready_o"
    prefix_tree: "log₂(N) levels of parallel generate/propagate — purely combinational within the registered cycle"
    output_registration: "sum, cout, overflow registered in S1_COMPUTE stage"
    sequence: "valid_i∧ready_o → latch operands → prefix tree → register result → valid_o"
  register_path:
    source: "OP_A register, OP_B register, CTRL.cin_reg or cin_i per CTRL.cin_mode"
    trigger: "APB write to CTRL with enable=1 while STATUS.ready=1"
    output: "Result written to SUM register; STATUS.cout/overflow/valid updated; interrupt if enabled"
    sequence: "Write OP_A → Write OP_B → Write CTRL.enable=1 → prefix tree → register result → update SUM/STATUS/INTSTATUS"
  carry_in_mux:
    source_0: "cin_i port (CTRL.cin_mode=0)"
    source_1: "CTRL.cin_reg bit (CTRL.cin_mode=1)"
    selection: "CTRL.cin_mode sampled at operand acceptance time"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the Kogge-Stone adder computes independent of cycle timing."
  state_variables:
    - { name: "sum_reg", source: "registers.SUM", reset: 0, description: "Most recent addition result" }
    - { name: "cout_reg", source: "registers.STATUS.cout", reset: 0, description: "Carry-out from most recent computation" }
    - { name: "overflow_reg", source: "registers.STATUS.overflow", reset: 0, description: "Signed overflow from most recent computation" }
    - { name: "result_valid", source: "registers.STATUS.valid", reset: 0, description: "Result is available but not yet consumed" }
    - { name: "ready", source: "registers.STATUS.ready", reset: 1, description: "Adder can accept new operands" }
    - { name: "cin_mode", source: "registers.CTRL.cin_mode", reset: 0, description: "Carry-in source: 0=port cin_i, 1=register cin_reg" }
    - { name: "cin_reg", source: "registers.CTRL.cin_reg", reset: 0, description: "Register-based carry-in value" }
  transactions:
    - id: "FM1"
      name: "stream_add"
      preconditions:
        - "valid_i == 1"
        - "ready_o == 1 (adder is not stalled)"
      inputs:
        - "data_a_i: N-bit operand A"
        - "data_b_i: N-bit operand B"
        - "cin_i: 1-bit carry-in from port (active when cin_mode=0)"
        - "cin_selected: cin_i when cin_mode=0, cin_reg when cin_mode=1"
      output_rules:
        - { name: "sum",       expr: "(data_a_i + data_b_i + cin_selected) & ((1<<N)-1)", width: "N", port: "sum_o" }
        - { name: "carry_out", expr: "(data_a_i + data_b_i + cin_selected) >= (1<<N) ? 1 : 0", width: 1, port: "cout_o" }
        - { name: "overflow",  expr: "~(data_a_i[N-1] ^ data_b_i[N-1]) & (data_a_i[N-1] ^ ((data_a_i + data_b_i + cin_selected) & ((1<<N)-1))[N-1])", width: 1, port: "overflow_o" }
      state_updates:
        - { name: "sum_reg",      reset: 0, expr: "(data_a_i + data_b_i + cin_selected) & ((1<<N)-1)" }
        - { name: "cout_reg",     reset: 0, expr: "(data_a_i + data_b_i + cin_selected) >= (1<<N) ? 1 : 0" }
        - { name: "overflow_reg", reset: 0, expr: "~(data_a_i[N-1] ^ data_b_i[N-1]) & (data_a_i[N-1] ^ sum_reg[N-1])" }
        - { name: "result_valid", reset: 0, expr: "1" }
        - { name: "ready",        reset: 1, expr: "0 (until result consumed)" }
      side_effects:
        - "STATUS.cout reflects cout_reg"
        - "STATUS.overflow reflects overflow_reg"
        - "STATUS.valid is set"
        - "STATUS.ready is cleared"
        - "If INTEN.completion == 1, INTSTATUS.completion is set and irq_o asserts"
      error_cases: []

    - id: "FM2"
      name: "register_add"
      preconditions:
        - "CTRL.enable is written with bit[0]=1"
        - "STATUS.ready == 1"
      inputs:
        - "OP_A register value"
        - "OP_B register value"
        - "CTRL.cin_reg or cin_i per CTRL.cin_mode"
      output_rules:
        - { name: "sum",       expr: "(OP_A + OP_B + cin_selected) & ((1<<N)-1)", width: "N", port: "registers.SUM (via APB read)" }
        - { name: "carry_out", expr: "(OP_A + OP_B + cin_selected) >= (1<<N) ? 1 : 0", width: 1, port: "STATUS.cout" }
        - { name: "overflow",  expr: "~(OP_A[N-1] ^ OP_B[N-1]) & (OP_A[N-1] ^ sum[N-1])", width: 1, port: "STATUS.overflow" }
      state_updates:
        - { name: "sum_reg",      reset: 0, expr: "(OP_A + OP_B + cin_selected) & ((1<<N)-1)" }
        - { name: "cout_reg",     reset: 0, expr: "(OP_A + OP_B + cin_selected) >= (1<<N) ? 1 : 0" }
        - { name: "overflow_reg", reset: 0, expr: "~(OP_A[N-1] ^ OP_B[N-1]) & (OP_A[N-1] ^ sum_reg[N-1])" }
        - { name: "result_valid", reset: 0, expr: "1" }
        - { name: "ready",        reset: 1, expr: "0 (until result consumed)" }
      side_effects:
        - "SUM register updated with computation result"
        - "STATUS.valid is set"
        - "STATUS.ready is cleared"
        - "STATUS.cout reflects carry_out"
        - "STATUS.overflow reflects overflow"
        - "If INTEN.completion == 1, INTSTATUS.completion is set and irq_o asserts"
        - "CTRL.enable is self-clearing (auto-clears to 0 after triggering)"
      error_cases: []
  invariants:
    - "sum = (A + B + cin_selected) mod 2^N (unsigned two's complement arithmetic)"
    - "carry_out = 1 if and only if the unsigned sum A + B + cin_selected >= 2^N"
    - "overflow = 1 if and only if signed overflow occurs: ~(A[N-1] ^ B[N-1]) & (A[N-1] ^ sum[N-1])"
    - "No result is produced unless valid input is accepted (stream) or CTRL.enable triggers (register)"
    - "APB reads of SUM return the most recent computation result"
    - "result_valid remains 1 until the result is consumed (stream accepted by downstream or STATUS read)"
  reference_model_hint: "tb-gen should implement a Python reference model: result = (A + B + cin) & mask; cout = 1 if (A + B + cin) > mask; overflow = sign analysis of A, B, result. Compare expected/got for every scenario."
cycle_model:
  purpose: "Cycle/handshake contract for the 1-cycle latency Kogge-Stone adder."
  executable: "pymtl3"
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all registers, output ports, and handshake state"
    deassertion: "State is usable on the first rising edge after synchronized deassertion; ready_o=1, valid_o=0"
  latency:
    stream_add: { min_cycles: 1, max_cycles: 1, description: "Fixed 1-cycle latency from operand acceptance (valid_i∧ready_o) to result (valid_o)" }
    register_add: { min_cycles: 1, max_cycles: 1, description: "1-cycle from CTRL.enable write to result available in SUM register and STATUS update" }
    register_read: { min_cycles: 0, max_cycles: 0, description: "Zero-wait-state APB read; PREADY=1 on access phase" }
    register_write: { min_cycles: 0, max_cycles: 0, description: "Zero-wait-state APB write; PREADY=1 on access phase" }
  handshake_rules:
    - { signal: "valid_i", rule: "Source holds valid_i and data stable until ready_o is sampled high on a rising edge." }
    - { signal: "ready_o", rule: "Deasserted when a result is pending and downstream has not accepted it (output backpressure)." }
    - { signal: "valid_o", rule: "Asserted for exactly one cycle, 1 clock after operand acceptance, unless held by downstream backpressure." }
    - { signal: "ready_i", rule: "If deasserted when valid_o is high, result is held stable until ready_i is asserted." }
  pipeline:
    - { stage: "S0_ACCEPT", cycle: 0, action: "Latch data_a_i, data_b_i, cin_selected into input registers when valid_i && ready_o; transition FSM to COMPUTING" }
    - { stage: "S1_COMPUTE", cycle: 1, action: "Kogge-Stone prefix tree computes sum/cout/overflow combinationally from latched inputs; register results; assert valid_o; update STATUS/SUM/INTSTATUS; transition FSM back to IDLE" }
  ordering:
    - "Result valid_o for computation N+1 does not assert before computation N result is accepted (valid_o ∧ ready_i) or held."
    - "APB register reads reflect state as of the completing access phase cycle."
    - "STATUS updates (cout, overflow, valid, ready) occur on the same rising edge as valid_o assertion."
  backpressure:
    - "If ready_i is deasserted when valid_o would be asserted, valid_o stays high and result registers hold until downstream accepts (valid_o ∧ ready_i)."
    - "While backpressured, ready_o is deasserted to prevent new operand acceptance."
    - "Once downstream accepts (valid_o ∧ ready_i), result_valid clears, ready_o reasserts on the next cycle."
  performance:
    frequency_mhz: 50
    throughput: { sustained_beats_per_cycle: 1, condition: "No downstream backpressure; continuous valid_i assertion with 1-cycle result consumption" }
    outstanding: { read_max: 1, write_max: 1, description: "Single in-flight addition at a time" }
    depth: { pipeline_stages: 2, queue_depth: 1, description: "Accept → Compute pipeline, no internal buffering" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "Single system clock domain" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings — single PRESETn domain"
registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
    channel_stride: 0
    channel_base: 0
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x000
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control Register — carry-in mode, register carry-in value, and add trigger"
      write_side_effects:
        - "Writing enable=1 when STATUS.ready=1 triggers register_add (FM2)."
        - "CTRL.enable auto-clears to 0 after triggering."
        - "cin_mode selects between port cin_i (0) and register cin_reg (1)."
      fields:
        - { name: "enable",   bits: [0, 0], access: "rw", reset: 0x0, write_effect: "Trigger register_add; auto-clears after use", description: "Start register-based addition" }
        - { name: "cin_mode", bits: [1, 1], access: "rw", reset: 0x0, write_effect: "0=use cin_i port, 1=use CTRL.cin_reg", description: "Carry-in source select" }
        - { name: "cin_reg",  bits: [2, 2], access: "rw", reset: 0x0, write_effect: "Carry-in value when cin_mode=1", description: "Register-based carry-in" }
        - { name: "reserved_31_3", bits: [31, 3], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved" }

    - name: "STATUS"
      offset: 0x004
      width: 32
      access: "ro"
      reset: 0x00000001
      category: "status"
      description: "Status Register — reflects adder state and result flags"
      fields:
        - { name: "ready",    bits: [0, 0], access: "ro", reset: 0x1, description: "1=adder ready for new operands" }
        - { name: "valid",    bits: [1, 1], access: "ro", reset: 0x0, description: "1=result available in SUM register" }
        - { name: "cout",     bits: [2, 2], access: "ro", reset: 0x0, description: "Carry-out from last computation" }
        - { name: "overflow", bits: [3, 3], access: "ro", reset: 0x0, description: "Signed overflow from last computation" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved" }

    - name: "OP_A"
      offset: 0x008
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "data"
      description: "Operand A Register — for register-based addition (FM2)"
      fields:
        - { name: "operand_a", bits: [31, 0], access: "rw", reset: 0x00000000, write_effect: "Update operand A for next register_add", description: "Operand A value" }

    - name: "OP_B"
      offset: 0x00C
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "data"
      description: "Operand B Register — for register-based addition (FM2)"
      fields:
        - { name: "operand_b", bits: [31, 0], access: "rw", reset: 0x00000000, write_effect: "Update operand B for next register_add", description: "Operand B value" }

    - name: "SUM"
      offset: 0x010
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "data"
      description: "Sum Result Register — reflects most recent computation result"
      fields:
        - { name: "sum", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Result of last addition" }

    - name: "INTEN"
      offset: 0x014
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Enable Register"
      fields:
        - { name: "completion", bits: [0, 0], access: "rw", reset: 0x0, description: "Enable interrupt on computation complete" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved" }

    - name: "INTSTATUS"
      offset: 0x018
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Interrupt Status Register — W1C clear"
      write_side_effects:
        - "Writing 1 to a bit clears that interrupt status bit."
      fields:
        - { name: "completion", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "W1C: writing 1 clears this bit", description: "Completion interrupt pending" }
        - { name: "reserved_31_1", bits: [31, 1], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved" }
memory:
  instances:
    - { name: "input_regs", type: "register", depth: 1, width: "2*N+1", read_ports: 1, write_ports: 1, latency: 0, description: "Latched operands A, B, and carry-in" }
    - { name: "result_regs", type: "register", depth: 1, width: "N+2", read_ports: 1, write_ports: 1, latency: 0, description: "Registered sum, carry-out, overflow" }
  note: "No SRAM/FIFO. All storage is simple registers for the 2-stage pipeline."
interrupts:
  sources:
    - { name: "COMPLETION", bit: 0, type: "level", enable_reg: "INTEN[0]", status_reg: "INTSTATUS", clear: "W1C", description: "Addition computation complete" }
  output:
    signal: "irq_o"
    polarity: "active_high"
    type: "level"
fsm:
  compute_fsm:
    states:
      - "IDLE"
      - "COMPUTING"
    transitions:
      - { from: "IDLE", to: "COMPUTING", condition: "valid_i && ready_o (stream) or CTRL.enable write (register)" }
      - { from: "COMPUTING", to: "IDLE", condition: "Result registered and valid_o asserted; if backpressured, stays until downstream accepts" }
    note: "2-state FSM for the Kogge-Stone adder pipeline; IDLE accepts operands, COMPUTING produces registered result"
rtl_contract:
  transaction: "FM1, FM2"
  sample_condition: "Computation completes on S1_COMPUTE rising edge"
  input_map:
    stream_operands: "data_a_i, data_b_i, cin_i"
    register_operands: "OP_A, OP_B, CTRL.cin_reg"
    control: "valid_i/ready_o or CTRL.enable"
  output_map:
    sum: "sum_o / registers.SUM"
    carry_out: "cout_o / registers.STATUS.cout"
    overflow: "overflow_o / registers.STATUS.overflow"
    valid: "valid_o / registers.STATUS.valid"
    interrupt: "irq_o"
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.5 }
  latency_budget:
    register_access_cycles: { min: 1, max: 2, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
