security:
  classification: "non_secure_datapath_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "computed_result", protection: "Data visible on sum_o/cout_o and APB RESULT/COUT; no internal confidentiality measures" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO registers (STATUS, RESULT, COUT) ignore writes; pslverr asserted for write to read-only offset" }
    - { threat: "unimplemented address access", mitigation: "pslverr asserted for unimplemented APB offsets" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "valid_o deasserted when CTRL.enable=0"
    - "RESULT/COUT registers read zero after reset"
error_handling:
  error_sources:
    - { id: "ERR_APB_BAD_ADDR", condition: "APB access to unimplemented register offset", architectural_effect: "PSLVERR=1, PREADY=1, no register update, PRDATA=0" }
    - { id: "ERR_APB_RO_WRITE", condition: "APB write to read-only register (STATUS, RESULT, COUT)", architectural_effect: "PSLVERR=1, PREADY=1, register unchanged" }
    - { id: "ERR_DISABLED_COMPUTE", condition: "CTRL.enable == 0 when operands presented", architectural_effect: "valid_o=0, STATUS unchanged, sum_o/cout_o hold last value" }
  propagation:
    - "PSLVERR is asserted combinatorially during the access phase and deasserted when PSEL=0."
    - "No latching of error state across APB transactions."
  recovery:
    - { action: "APB master deasserts PSEL after observing PSLVERR", clears: ["PSLVERR"], preserves: ["internal register state"] }
    - { action: "Set CTRL.enable=1", clears: ["ERR_DISABLED_COMPUTE condition"], preserves: ["CSR configuration"] }
