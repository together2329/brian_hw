  cycle_model_refs:
  - csr_access
  - cycle_model
  dataflow_refs:
  - df_config
  - df_status
  - dataflow
  fsm_refs:
  - control
  description: CSR decode, register storage, status clear, start pulse, and illegal-access reporting.
  source_sections:
  - cycle_model
  - features
  - dataflow
  - decomposition
  - test_requirements
  - registers
  feature_refs:
  - features
  decomposition_refs:
  - decomposition
  test_refs:
  - test_requirements
- name: dma_engine
  file: rtl/dma_engine.sv
  type: rtl_submodule_or_inline_block
  implements:
  - single_outstanding_copy_engine
  - reset_abort_policy
  function_model_refs:
  - FM_START_TRANSFER
  - FM_READ_REQUEST
  - FM_CAPTURE_READ_DATA
  - FM_WRITE_REQUEST
  - FM_WRITE_ACCEPT
  - FM_RESET
  - function_model.transactions.FM_RESET
  - function_model.transactions.FM_START_TRANSFER
  - function_model.transactions.FM_CSR_READ_STATUS
  - function_model.transactions.FM_READ_REQUEST
  - function_model.transactions.FM_CAPTURE_READ_DATA
  - function_model.transactions.FM_WRITE_REQUEST
  - function_model.transactions.FM_WRITE_ACCEPT
  - function_model.transactions.FM_CLEAR_ABORT
  cycle_model_refs:
  - READ_ADDR
  - CAPTURE_READ_DATA
  - WRITE_BEAT
