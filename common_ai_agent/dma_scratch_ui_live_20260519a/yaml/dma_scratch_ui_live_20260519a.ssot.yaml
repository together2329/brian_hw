test_requirements:
  scenarios:
  - id: SC01
    name: reset_defaults
    stimulus: Assert rst_n low, deassert it, keep all valid inputs low, and sample outputs/CSR state.
    expected: Memory valids and IRQs are low; busy/done/error/progress/write_buffer_full/fsm_state are reset; csr_ready is legal after reset release.
    checker: Reset checker compares visible outputs and CSR readback against function_model reset state.
    coverage:
    - function_model.FM_RESET
    - cycle_model.reset
  - id: SC02
    name: csr_programming_readback
    stimulus: Write SRC_ADDR, DST_ADDR, LENGTH, CTRL interrupt enables, then read all defined registers.
    expected: Legal reads return programmed values and status fields; csr_error remains low.
    checker: CSR register-model checker validates readback and field write effects.
    coverage:
    - registers.CTRL
    - registers.SRC_ADDR
    - registers.DST_ADDR
    - registers.LENGTH
  - id: SC03
    name: illegal_csr_access
    stimulus: Read and write unmapped CSR offsets, and attempt CTRL.start while busy.
    expected: csr_error pulses, STATUS.error sets, irq_error follows enable, and unrelated configuration is preserved.
    checker: Negative CSR checker validates error handling and recovery.
    coverage:
    - error_handling.ERR_ILLEGAL_CSR
    - error_handling.ERR_START_WHILE_BUSY
  - id: SC04
    name: zero_length_transfer
    stimulus: Program LENGTH=0, enable done IRQ, and write CTRL.start.
    expected: done sets in the start cycle, irq_done asserts when enabled, busy stays low, progress remains zero, and no memory valid asserts.
    checker: Zero-length checker monitors no memory request and status/IRQ behavior.
    coverage:
    - function_model.FM_START_TRANSFER
    - fsm.control.DONE
  - id: SC05
    name: single_beat_copy
    stimulus: Program one full DATA_WIDTH beat, provide read data, and keep memory ready high.
    expected: One read address and one write with matching data occur; progress equals beat_bytes and done sets.
    checker: Memory scoreboard compares source read data to destination write data and progress.
    coverage:
    - dataflow.df_read
    - dataflow.df_write
    - function_model.FM_WRITE_ACCEPT
  - id: SC06
    name: multi_beat_copy
    stimulus: Program a length of at least three beats with deterministic read data and ready memory.
    expected: Read and write addresses increment by beat_bytes, write data matches read sequence, and done occurs after final beat.
    checker: Address sequence and data integrity scoreboard.
    coverage:
    - cycle_model.pipeline.READ_ADDR
    - cycle_model.pipeline.WRITE_BEAT
  - id: SC07
    name: partial_final_beat
    stimulus: Program a length that is not a multiple of DATA_WIDTH/8.
    expected: All full beats use all byte strobes and final beat uses write_strobe derived from remaining_bytes.
    checker: Byte-strobe checker compares mem_wr_strb against transfer_bytes.
    coverage:
    - function_model.derived_signals.write_strobe
  - id: SC08
    name: read_backpressure
    stimulus: Randomly deassert mem_rd_ready and mem_rd_data_valid during transfer.
    expected: Read address and ready protocol remain stable; no duplicated or lost beats.
    checker: Valid/ready stability assertions and scoreboard.
    coverage:
    - cycle_model.handshake_rules.mem_rd_valid
    - cycle_model.backpressure
  - id: SC09
    name: write_backpressure
    stimulus: Randomly deassert mem_wr_ready while a buffered write is pending.
    expected: mem_wr_addr, mem_wr_data, and mem_wr_strb remain stable until acceptance; transfer completes after stalls.
    checker: Write-channel stability monitor and scoreboard.
    coverage:
    - cycle_model.handshake_rules.mem_wr_valid
    - function_model.FM_WRITE_REQUEST
  - id: SC10
    name: soft_reset_abort
    stimulus: Start a multi-beat transfer and write CTRL.soft_reset while read or write backpressure is active.
    expected: busy, done, error, progress, buffer state, and memory valids clear; no new memory request is issued until a new start.
    checker: Abort checker monitors immediate valid deassertion and reset of transient state.
    coverage:
    - function_model.FM_CLEAR_ABORT
    - fsm.control.IDLE
  - id: SC11
    name: status_w1c_irq_clear
    stimulus: Complete a transfer and create an error, then clear STATUS.done and STATUS.error using W1C writes.
    expected: done/error and irq levels deassert only for bits written with 1; configuration registers are preserved.
    checker: Status/IRQ W1C checker.
    coverage:
    - registers.STATUS.done
    - registers.STATUS.error
    - interrupts
  scoreboard_checks: 11
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Cover every function_model transaction, state update class, output rule class, and error path.
      bins:
      - id: FCOV_TX_ALL
        source_ref: function_model.transactions
        class: transaction
        description: Each named transaction sampled at least once.
      - id: FCOV_ERROR
        source_ref: function_model.transactions.FM_ILLEGAL_CSR_OR_START
        class: error_path
        description: Illegal CSR and start-while-busy errors observed.
      - id: FCOV_STROBE
        source_ref: function_model.derived_signals.write_strobe
        class: datapath
        description: Full and partial write strobes observed.
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cover each valid/ready channel, pipeline stage, ordering rule, and backpressure mode.
      bins:
      - id: CCOV_HANDSHAKES
        source_ref: cycle_model.handshake_rules
        class: handshake
        description: CSR, read address, read data, and write handshakes observed.
      - id: CCOV_PIPELINE
        source_ref: cycle_model.pipeline
        class: cycle_rule
        description: All declared pipeline stages observed.
      - id: CCOV_BACKPRESSURE
        source_ref: cycle_model.backpressure
        class: stall
        description: Read and write stall cases observed.
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
