features:
- id: csr_programming
  description: AXI4-Lite registers program src, dst, length, control, status, and IRQ enable.
- id: scratch_dma_copy
  description: Start bit launches word copy from src_addr to dst_addr for len words.
- id: error_reporting
  description: Non-OKAY read or write response latches error, stops transfer, and reports status.
- id: irq_generation
  description: Done/error status drives level irq when corresponding enable bit is set.
- id: synthesis_policy_ready
  description: SSOT contains clock/reset, top, constraints, and EDA-policy fields required by syn-auto preflight.
dataflow:
  source: declared io_list request/control interfaces
  sequence:
  - accept legal work under cycle_model handshake or command rules
  - evaluate function_model transaction and declared feature behavior
  - update only declared architectural state/status/events
  - publish response, output, interrupt, or debug observability event
  sinks:
  - declared outputs
  - status/debug observability
  - register reads if registers exist
  ordering: Externally visible ordering follows cycle_model.ordering unless the SSOT explicitly approves reordering.
