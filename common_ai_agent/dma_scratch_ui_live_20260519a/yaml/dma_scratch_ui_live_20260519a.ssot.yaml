decomposition:
  strategy: manifest_owned_leaf_decomposition
  owners:
  - module: csr_registers
    file: rtl/csr_registers.sv
    responsibility: Implement CSR register map, decode, readback, write effects, status clear, start pulse, csr_ready, and csr_error.
    source_sections:
    - registers
    - interfaces.csr_if
    - function_model.FM_CSR_WRITE_CONFIG
    - function_model.FM_CSR_READ_STATUS
  - module: dma_engine
    file: rtl/dma_engine.sv
    responsibility: Implement DMA FSM, valid/ready memory protocol, read buffer, address/progress counters, byte strobes, zero-length and abort flows.
    source_sections:
    - fsm
    - dataflow
    - cycle_model
    - function_model.FM_START_TRANSFER
    - function_model.FM_WRITE_ACCEPT
  - module: irq_status
    file: rtl/irq_status.sv
    responsibility: Implement sticky done/error status visibility and interrupt levels.
    source_sections:
    - interrupts
    - registers.STATUS
    - function_model.FM_WRITE_ACCEPT
    - function_model.FM_ILLEGAL_CSR_OR_START
  - module: dma_scratch_ui_live_20260519a
    file: rtl/dma_scratch_ui_live_20260519a.sv
    responsibility: Synthesizable top module integrating or inlining the declared module slices without changing top ports.
    source_sections:
    - top_module
    - io_list
    - integration
  integration_policy: Engineering RTL may inline slices in rtl/dma_scratch_ui_live_20260519a.sv; if separate child modules are emitted, integration.connections or equivalent port maps must be supplied before signoff.
  source_refs:
  - sub_modules
  - function_model
  - cycle_model
  - integration
parameters:
- name: ADDR_WIDTH
  type: int
  default: 32
  min: 8
  description: Address width for CSR byte addresses and external memory addresses.
- name: DATA_WIDTH
  type: int
  default: 32
  legal_values:
  - 32
  description: CSR and memory data width for the engineering draft; byte strobes use DATA_WIDTH/8 lanes.
- name: LEN_WIDTH
  type: int
  default: 16
  min: 1
  description: Transfer length/progress counter width in bytes.
io_list:
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock domain.
    ports:
    - name: clk
      width: 1
      direction: input
      description: Rising-edge system clock.
  resets:
  - name: rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset that returns all architectural state and outputs to idle values.
    ports:
    - name: rst_n
      width: 1
      direction: input
      description: Active-low reset input.
  interfaces:
  - name: csr_if
    type: simple_csr_valid_ready
    role: target
    clock_domain: clk
    reset_domain: rst_n
    description: One-cycle valid/ready CSR slave used to program and observe the DMA.
    protocol:
      acceptance: csr_valid && csr_ready accepts one CSR request.
      read_response: For reads, csr_rdata and csr_error are valid in the accepted request cycle.
      write_response: For writes, side effects occur on the accepting clock edge and csr_error reports illegal addresses or operations.
      stability: csr_addr, csr_write, and csr_wdata remain stable while csr_valid is high and csr_ready is low.
    ports:
    - name: csr_valid
      direction: input
      width: 1
      description: CSR request valid.
    - name: csr_ready
      direction: output
      width: 1
      description: CSR request ready; intended always high outside reset.
    - name: csr_write
      direction: input
      width: 1
      description: 1 for write, 0 for read.
    - name: csr_addr
      direction: input
      width: ADDR_WIDTH
      description: Byte address for CSR decode.
    - name: csr_wdata
      direction: input
      width: DATA_WIDTH
      description: CSR write payload.
    - name: csr_rdata
      direction: output
      width: DATA_WIDTH
      description: CSR read payload; zero for unmapped addresses.
    - name: csr_error
      direction: output
      width: 1
      description: Pulses on illegal CSR address or unsupported operation.
  - name: mem_read_addr_if
    type: native_valid_ready
    role: initiator
    clock_domain: clk
    reset_domain: rst_n
    description: DMA source read address channel; one outstanding read in this draft.
    protocol:
      acceptance: mem_rd_valid && mem_rd_ready accepts mem_rd_addr.
      stability: mem_rd_addr remains stable while mem_rd_valid is high and mem_rd_ready is low.
      ordering: Read requests are issued in increasing source address order with no reordering.
    ports:
    - name: mem_rd_valid
      direction: output
      width: 1
      description: Read address valid.
    - name: mem_rd_ready
      direction: input
      width: 1
      description: Read address ready.
    - name: mem_rd_addr
      direction: output
      width: ADDR_WIDTH
      description: Source byte address for the accepted read.
  - name: mem_read_data_if
    type: native_valid_ready
    role: target
    clock_domain: clk
    reset_domain: rst_n
    description: DMA source read data channel from memory fabric.
    protocol:
      acceptance: mem_rd_data_valid && mem_rd_data_ready transfers mem_rd_data into the DMA buffer.
      stability: mem_rd_data remains stable while mem_rd_data_valid is high and mem_rd_data_ready is low.
      ordering: Data responses correspond in order to accepted read addresses.
    ports:
    - name: mem_rd_data_valid
      direction: input
      width: 1
      description: Read data valid.
    - name: mem_rd_data_ready
      direction: output
      width: 1
      description: Read data ready from DMA.
    - name: mem_rd_data
      direction: input
      width: DATA_WIDTH
      description: Read data payload.
  - name: mem_write_if
    type: native_valid_ready
    role: initiator
    clock_domain: clk
    reset_domain: rst_n
    description: DMA destination write request channel.
    protocol:
      acceptance: mem_wr_valid && mem_wr_ready accepts address, data, and byte strobe.
      stability: mem_wr_addr, mem_wr_data, and mem_wr_strb remain stable while mem_wr_valid is high and mem_wr_ready is low.
      ordering: Writes are issued in increasing destination address order after corresponding read data is captured.
    ports:
    - name: mem_wr_valid
      direction: output
      width: 1
      description: Write request valid.
    - name: mem_wr_ready
      direction: input
      width: 1
      description: Write request ready.
    - name: mem_wr_addr
      direction: output
      width: ADDR_WIDTH
      description: Destination byte address.
    - name: mem_wr_data
      direction: output
      width: DATA_WIDTH
      description: Write data payload copied from the read buffer.
    - name: mem_wr_strb
      direction: output
      width: DATA_WIDTH/8
      description: Byte enables for full or partial final beat.
  - name: interrupt_if
    type: level_interrupt
    role: source
    clock_domain: clk
    reset_domain: rst_n
    description: Level-high interrupt outputs derived from sticky status and enables.
    protocol:
      assertion: irq_done follows done && irq_done_en; irq_error follows error && irq_error_en.
      clearing: Interrupt levels deassert when software clears the corresponding sticky status bit or reset is asserted.
      stability: Interrupts are synchronous level outputs.
    ports:
    - name: irq_done
      direction: output
      width: 1
      description: Done interrupt level.
    - name: irq_error
      direction: output
      width: 1
      description: Error interrupt level.
features:
- id: csr_programming_model
  name: csr_programming_model
  trigger: A host accepts a CSR read or write on csr_if.
  datapath: csr_addr selects CTRL, STATUS, SRC_ADDR, DST_ADDR, LENGTH, or PROGRESS.
  control: Writes update only declared register state; read-only fields ignore writes except W1C status clears.
  output: csr_rdata returns the selected register image and csr_error reports illegal addresses.
  description: Host programs source, destination, byte length, interrupt enables, start, clear, and abort through simple CSRs.
- id: single_outstanding_copy_engine
  name: single_outstanding_copy_engine
  trigger: CTRL.start is accepted while the engine is idle.
  datapath: Read source beat, capture data, write destination beat, and update byte counters.
  control: FSM sequences IDLE, READ_REQ, WAIT_RDATA, WRITE_REQ, DONE, and ERROR.
  output: Memory read/write requests use valid/ready, addresses increment by DATA_WIDTH/8 bytes, and final byte strobes mask partial beats.
  description: One outstanding read is converted to one write before issuing the next beat.
- id: status_interrupts
  name: status_interrupts
  trigger: Transfer completion, illegal access, or software clear event occurs.
  datapath: busy/done/error/progress state is exposed through CSRs and interrupt outputs.
  control: done and error are sticky until cleared or reset; busy reflects active transfer.
  output: irq_done and irq_error are level outputs gated by CTRL enables.
  description: Sticky status and level-high interrupts for firmware polling or interrupt-driven use.
- id: reset_abort_policy
  name: reset_abort_policy
  trigger: rst_n assertion or CTRL.soft_reset is observed.
  datapath: Transient DMA buffers, valid outputs, busy state, and counters return to idle.
  control: Reset dominates all transfers; soft_reset aborts in-flight work without issuing new memory requests.
  output: All memory valid outputs deassert and status/progress return to reset values after reset or software abort.
  description: Deterministic reset and software abort behavior.
dataflow:
  source: csr_if programs configuration and starts the DMA copy.
  sequence:
  - id: df_config
    from: csr_if
    to: csr_registers
    rule: CSR writes update SRC_ADDR, DST_ADDR, LENGTH, interrupt enables, start pulse, and clear/abort controls.
  - id: df_start
    from: csr_registers
    to: dma_engine
    rule: A legal start when idle snapshots configuration into active DMA state and sets busy unless length is zero.
  - id: df_read
    from: dma_engine
    to: mem_read_addr_if
    rule: Source read addresses are src_addr + progress_bytes for each pending beat.
  - id: df_capture
    from: mem_read_data_if
    to: dma_engine
    rule: Accepted read data is captured in read_data_buffer before a matching destination write.
  - id: df_write
    from: dma_engine
    to: mem_write_if
    rule: Destination writes use dst_addr + progress_bytes and write_data from read_data_buffer.
  - id: df_status
    from: dma_engine
    to: csr_if_and_interrupt_if
    rule: busy, done, error, progress, irq_done, and irq_error expose transfer state.
  sinks:
  - csr_rdata
  - csr_error
  - mem_rd_valid
  - mem_rd_addr
  - mem_wr_valid
  - mem_wr_addr
  - mem_wr_data
  - mem_wr_strb
  - irq_done
  - irq_error
  ordering: For each beat, read-address acceptance precedes read-data capture, which precedes the dependent write acceptance.
function_model:
  purpose: Cycle-independent executable behavior contract for the DMA scratch UI.
  state_variables:
  - name: fsm_state
    width: 3
    reset: 0
    description: 0=IDLE, 1=READ_REQ, 2=WRITE_REQ, 3=DONE, 4=ERROR; WAIT_RDATA may share READ_REQ wait subphase in simple RTL.
  - name: src_addr
    width: ADDR_WIDTH
    reset: 0
    description: Source base address.
  - name: dst_addr
    width: ADDR_WIDTH
    reset: 0
    description: Destination base address.
  - name: length_bytes
    width: LEN_WIDTH
    reset: 0
    description: Requested byte count.
  - name: remaining_bytes
    width: LEN_WIDTH
    reset: 0
    description: Bytes not yet committed to destination.
  - name: progress_bytes
    width: LEN_WIDTH
    reset: 0
    description: Bytes committed to destination.
  - name: read_data_buffer
    width: DATA_WIDTH
    reset: 0
    description: Captured source read data for next destination write.
  - name: write_buffer_full
    width: 1
    reset: 0
    description: Read data buffer contains an unwritten beat.
  - name: busy
    width: 1
    reset: 0
    description: Transfer active.
  - name: done
    width: 1
    reset: 0
    description: Sticky completion status.
  - name: error
    width: 1
    reset: 0
    description: Sticky error status.
  - name: irq_done_en
    width: 1
    reset: 0
    description: Done interrupt enable.
  - name: irq_error_en
    width: 1
    reset: 0
    description: Error interrupt enable.
  derived_signals:
  - name: beat_bytes
    expr: DATA_WIDTH / 8
    width: LEN_WIDTH
    description: Number of bytes transferred by a full data beat.
  - name: transfer_bytes
    expr: min(remaining_bytes, beat_bytes)
    width: LEN_WIDTH
    description: Bytes committed by the current write beat.
  - name: write_strobe
    expr: (1 << transfer_bytes) - 1
    width: DATA_WIDTH/8
    description: Final-beat-aware byte strobe; all ones for full beats.
  - name: status_word
    expr: busy | (done << 1) | (error << 2)
    width: DATA_WIDTH
    description: STATUS register read image.
  - name: progress_word
    expr: progress_bytes
    width: DATA_WIDTH
    description: PROGRESS register read image.
  - name: write_buffer_ready
    expr: write_buffer_full == 0
    width: 1
    description: DMA can accept read data when no buffered write is pending.
  transactions:
  - id: FM_RESET
    name: reset
    sample_condition: rst_n == 0
    preconditions:
    - Reset is asserted low.
    inputs:
    - rst_n
    outputs:
    - All valid outputs and interrupts are deasserted; CSR ready is low during reset.
    - name: csr_ready_reset
      port: csr_ready
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_rd_valid_reset
      port: mem_rd_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_wr_valid_reset
      port: mem_wr_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: irq_done_reset
      port: irq_done
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: irq_error_reset
      port: irq_error
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: fsm_state
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: busy
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: error
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: remaining_bytes
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: progress_bytes
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: write_buffer_full
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - All state variables return to reset values.
    state_updates:
    - name: fsm_state
      expr: '0'
      width: 3
    - name: busy
      expr: '0'
      width: 1
    - name: done
      expr: '0'
      width: 1
    - name: error
      expr: '0'
      width: 1
    - name: remaining_bytes
      expr: '0'
      width: LEN_WIDTH
    - name: progress_bytes
      expr: '0'
      width: LEN_WIDTH
    - name: write_buffer_full
      expr: '0'
      width: 1
    output_rules:
    - name: csr_ready_reset
      port: csr_ready
      expr: '0'
      width: 1
    - name: mem_rd_valid_reset
      port: mem_rd_valid
      expr: '0'
      width: 1
    - name: mem_wr_valid_reset
      port: mem_wr_valid
      expr: '0'
      width: 1
    - name: irq_done_reset
      port: irq_done
      expr: '0'
      width: 1
    - name: irq_error_reset
      port: irq_error
      expr: '0'
      width: 1
  - id: FM_CSR_WRITE_CONFIG
    name: csr_write_config
    sample_condition: csr_valid && csr_ready && csr_write && !busy
    preconditions:
    - A legal CSR write to CTRL, SRC_ADDR, DST_ADDR, LENGTH, or STATUS is accepted while idle or clearing status.
    inputs:
    - csr_addr
    - csr_wdata
    - current CSR state
    outputs:
    - csr_error remains low for legal writable addresses.
    - name: csr_ready_idle_write
      port: csr_ready
      expr: '1'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: csr_error_legal_write
      port: csr_error
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: src_addr
      expr: csr_wdata if csr_addr == 8 else src_addr
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: dst_addr
      expr: csr_wdata if csr_addr == 12 else dst_addr
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: length_bytes
      expr: csr_wdata if csr_addr == 16 else length_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: irq_done_en
      expr: ((csr_wdata >> 1) & 1) if csr_addr == 0 else irq_done_en
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: irq_error_en
      expr: ((csr_wdata >> 2) & 1) if csr_addr == 0 else irq_error_en
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: 0 if (csr_addr == 4 and ((csr_wdata >> 1) & 1) != 0) else done
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: error
      expr: 0 if (csr_addr == 4 and ((csr_wdata >> 2) & 1) != 0) else error
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - Writable register fields update or sticky STATUS bits clear according to field write_effect definitions.
    output_rules:
    - name: csr_ready_idle_write
      port: csr_ready
      expr: '1'
      width: 1
    - name: csr_error_legal_write
      port: csr_error
      expr: '0'
      width: 1
    state_updates:
    - name: src_addr
      expr: csr_wdata if csr_addr == 8 else src_addr
      width: ADDR_WIDTH
    - name: dst_addr
      expr: csr_wdata if csr_addr == 12 else dst_addr
      width: ADDR_WIDTH
    - name: length_bytes
      expr: csr_wdata if csr_addr == 16 else length_bytes
      width: LEN_WIDTH
    - name: irq_done_en
      expr: ((csr_wdata >> 1) & 1) if csr_addr == 0 else irq_done_en
      width: 1
    - name: irq_error_en
      expr: ((csr_wdata >> 2) & 1) if csr_addr == 0 else irq_error_en
      width: 1
    - name: done
      expr: 0 if (csr_addr == 4 and ((csr_wdata >> 1) & 1) != 0) else done
      width: 1
    - name: error
      expr: 0 if (csr_addr == 4 and ((csr_wdata >> 2) & 1) != 0) else error
      width: 1
  - id: FM_START_TRANSFER
    name: start_transfer
    sample_condition: csr_valid && csr_ready && csr_write && csr_addr == 0 && ((csr_wdata & 1) != 0) && !busy
    preconditions:
    - CTRL.start write is accepted while busy is 0.
    inputs:
    - src_addr
    - dst_addr
    - length_bytes
    outputs:
    - No memory request is generated for zero length; nonzero length transitions to read request flow.
    - name: mem_rd_valid_start
      port: mem_rd_valid
      expr: 1 if length_bytes != 0 else 0
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: irq_done_zero_length
      port: irq_done
      expr: irq_done_en if length_bytes == 0 else 0
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: busy
      expr: 1 if length_bytes != 0 else 0
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: 1 if length_bytes == 0 else 0
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: error
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: remaining_bytes
      expr: length_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: progress_bytes
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: fsm_state
      expr: 1 if length_bytes != 0 else 3
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - busy, done, remaining_bytes, progress_bytes, and fsm_state update for a new transfer.
    output_rules:
    - name: mem_rd_valid_start
      port: mem_rd_valid
      expr: 1 if length_bytes != 0 else 0
      width: 1
    - name: irq_done_zero_length
      port: irq_done
      expr: irq_done_en if length_bytes == 0 else 0
      width: 1
    state_updates:
    - name: busy
      expr: 1 if length_bytes != 0 else 0
      width: 1
    - name: done
      expr: 1 if length_bytes == 0 else 0
      width: 1
    - name: error
      expr: '0'
      width: 1
    - name: remaining_bytes
      expr: length_bytes
      width: LEN_WIDTH
    - name: progress_bytes
      expr: '0'
      width: LEN_WIDTH
    - name: fsm_state
      expr: 1 if length_bytes != 0 else 3
      width: 3
  - id: FM_CSR_READ_STATUS
    name: csr_read_status
    sample_condition: csr_valid && csr_ready && !csr_write
    preconditions:
    - A CSR read is accepted for a defined CSR offset.
    inputs:
    - csr_addr
    - current CSR state
    outputs:
    - csr_rdata returns selected register image and csr_error is 0 for legal offsets.
    - name: csr_ready_read
      port: csr_ready
      expr: '1'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: csr_rdata_status
      port: csr_rdata
      expr: status_word if csr_addr == 4 else progress_word
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: csr_error_read
      port: csr_error
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    side_effects:
    - CSR reads do not change architectural state.
    output_rules:
    - name: csr_ready_read
      port: csr_ready
      expr: '1'
      width: 1
    - name: csr_rdata_status
      port: csr_rdata
      expr: status_word if csr_addr == 4 else progress_word
      width: DATA_WIDTH
    - name: csr_error_read
      port: csr_error
      expr: '0'
      width: 1
  - id: FM_READ_REQUEST
    name: memory_read_request
    sample_condition: busy && fsm_state == 1
    preconditions:
    - DMA is busy, remaining_bytes is nonzero, and no write buffer is pending.
    inputs:
    - mem_rd_ready
    - src_addr
    - progress_bytes
    outputs:
    - Read request valid and address point to the next source beat.
    - name: mem_rd_valid_rule
      port: mem_rd_valid
      expr: '1'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_rd_addr_rule
      port: mem_rd_addr
      expr: src_addr + progress_bytes
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_rd_data_ready_rule
      port: mem_rd_data_ready
      expr: write_buffer_ready
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: fsm_state
      expr: 2 if mem_rd_data_valid and mem_rd_data_ready else fsm_state
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - If accepted, the engine waits for matching read data before writing.
    output_rules:
    - name: mem_rd_valid_rule
      port: mem_rd_valid
      expr: '1'
      width: 1
    - name: mem_rd_addr_rule
      port: mem_rd_addr
      expr: src_addr + progress_bytes
      width: ADDR_WIDTH
    - name: mem_rd_data_ready_rule
      port: mem_rd_data_ready
      expr: write_buffer_ready
      width: 1
    state_updates:
    - name: fsm_state
      expr: 2 if mem_rd_data_valid and mem_rd_data_ready else fsm_state
      width: 3
  - id: FM_CAPTURE_READ_DATA
    name: capture_read_data
    sample_condition: busy && mem_rd_data_valid && mem_rd_data_ready
    preconditions:
    - A read data beat is accepted while a transfer is active.
    inputs:
    - mem_rd_data
    outputs:
    - The write request path can present the captured data on mem_wr_data.
    - name: mem_rd_data_ready_capture
      port: mem_rd_data_ready
      expr: write_buffer_ready
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: read_data_buffer
      expr: mem_rd_data
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: write_buffer_full
      expr: '1'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: fsm_state
      expr: '2'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - read_data_buffer captures mem_rd_data and write_buffer_full becomes 1.
    output_rules:
    - name: mem_rd_data_ready_capture
      port: mem_rd_data_ready
      expr: write_buffer_ready
      width: 1
    state_updates:
    - name: read_data_buffer
      expr: mem_rd_data
      width: DATA_WIDTH
    - name: write_buffer_full
      expr: '1'
      width: 1
    - name: fsm_state
      expr: '2'
      width: 3
  - id: FM_WRITE_REQUEST
    name: memory_write_request
    sample_condition: busy && fsm_state == 2 && write_buffer_full
    preconditions:
    - Read data buffer holds an unwritten beat.
    inputs:
    - dst_addr
    - progress_bytes
    - read_data_buffer
    - remaining_bytes
    - mem_wr_ready
    outputs:
    - Write request valid, address, data, and byte strobes describe the next destination beat.
    - name: mem_wr_valid_rule
      port: mem_wr_valid
      expr: write_buffer_full
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_wr_addr_rule
      port: mem_wr_addr
      expr: dst_addr + progress_bytes
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_wr_data_rule
      port: mem_wr_data
      expr: read_data_buffer
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_wr_strb_rule
      port: mem_wr_strb
      expr: write_strobe
      description: Mirrored from executable output_rules for SSOT validator completeness.
    side_effects:
    - State advances only when mem_wr_ready accepts the write beat.
    output_rules:
    - name: mem_wr_valid_rule
      port: mem_wr_valid
      expr: write_buffer_full
      width: 1
    - name: mem_wr_addr_rule
      port: mem_wr_addr
      expr: dst_addr + progress_bytes
      width: ADDR_WIDTH
    - name: mem_wr_data_rule
      port: mem_wr_data
      expr: read_data_buffer
      width: DATA_WIDTH
    - name: mem_wr_strb_rule
      port: mem_wr_strb
      expr: write_strobe
      width: DATA_WIDTH/8
  - id: FM_WRITE_ACCEPT
    name: memory_write_accept
    sample_condition: busy && mem_wr_valid && mem_wr_ready
    preconditions:
    - Destination memory accepts the current write beat.
    inputs:
    - remaining_bytes
    - progress_bytes
    - beat_bytes
    outputs:
    - Completion status and irq_done are asserted when the accepted write is the final beat.
    - name: irq_done_on_final_write
      port: irq_done
      expr: irq_done_en and (remaining_bytes <= beat_bytes)
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_wr_valid_after_accept
      port: mem_wr_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: remaining_bytes
      expr: remaining_bytes - transfer_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: progress_bytes
      expr: progress_bytes + transfer_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: write_buffer_full
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: busy
      expr: 0 if remaining_bytes <= beat_bytes else 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: 1 if remaining_bytes <= beat_bytes else done
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: fsm_state
      expr: 3 if remaining_bytes <= beat_bytes else 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - remaining_bytes decrements, progress_bytes increments, buffer clears, and the FSM either completes or returns to READ_REQ.
    output_rules:
    - name: irq_done_on_final_write
      port: irq_done
      expr: irq_done_en and (remaining_bytes <= beat_bytes)
      width: 1
    - name: mem_wr_valid_after_accept
      port: mem_wr_valid
      expr: '0'
      width: 1
    state_updates:
    - name: remaining_bytes
      expr: remaining_bytes - transfer_bytes
      width: LEN_WIDTH
    - name: progress_bytes
      expr: progress_bytes + transfer_bytes
      width: LEN_WIDTH
    - name: write_buffer_full
      expr: '0'
      width: 1
    - name: busy
      expr: 0 if remaining_bytes <= beat_bytes else 1
      width: 1
    - name: done
      expr: 1 if remaining_bytes <= beat_bytes else done
      width: 1
    - name: fsm_state
      expr: 3 if remaining_bytes <= beat_bytes else 1
      width: 3
  - id: FM_CLEAR_ABORT
    name: clear_or_abort
    sample_condition: csr_valid && csr_ready && csr_write && ((csr_addr == 4) || (csr_addr == 0 && ((csr_wdata >> 3) & 1) != 0))
    preconditions:
    - STATUS W1C clear or CTRL.soft_reset write is accepted.
    inputs:
    - csr_addr
    - csr_wdata
    - current status
    outputs:
    - Memory request valids deassert on soft_reset; interrupts follow cleared sticky status.
    - name: mem_rd_valid_abort
      port: mem_rd_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: mem_wr_valid_abort
      port: mem_wr_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: busy
      expr: 0 if (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0)) else busy
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: 0 if ((csr_addr == 4 and (((csr_wdata >> 1) & 1) != 0)) or (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0))) else done
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: error
      expr: 0 if ((csr_addr == 4 and (((csr_wdata >> 2) & 1) != 0)) or (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0))) else error
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: fsm_state
      expr: 0 if (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0)) else fsm_state
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: write_buffer_full
      expr: 0 if (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0)) else write_buffer_full
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - W1C clears done/error; soft_reset aborts active transfer and clears transient state.
    output_rules:
    - name: mem_rd_valid_abort
      port: mem_rd_valid
      expr: '0'
      width: 1
      repair_note: Removed self-referential output fallback; transaction precondition/sample_condition owns rule applicability.
    - name: mem_wr_valid_abort
      port: mem_wr_valid
      expr: '0'
      width: 1
      repair_note: Removed self-referential output fallback; transaction precondition/sample_condition owns rule applicability.
    state_updates:
    - name: busy
      expr: 0 if (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0)) else busy
      width: 1
    - name: done
      expr: 0 if ((csr_addr == 4 and (((csr_wdata >> 1) & 1) != 0)) or (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0))) else done
      width: 1
    - name: error
      expr: 0 if ((csr_addr == 4 and (((csr_wdata >> 2) & 1) != 0)) or (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0))) else error
      width: 1
    - name: fsm_state
      expr: 0 if (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0)) else fsm_state
      width: 3
    - name: write_buffer_full
      expr: 0 if (csr_addr == 0 and (((csr_wdata >> 3) & 1) != 0)) else write_buffer_full
      width: 1
  - id: FM_ILLEGAL_CSR_OR_START
    name: illegal_csr_or_start
    sample_condition: csr_valid && csr_ready && ((csr_addr > 20) || (csr_write && csr_addr == 0 && ((csr_wdata & 1) != 0) && busy))
    preconditions:
    - An unmapped CSR access or start-while-busy command is accepted.
    inputs:
    - csr_addr
    - csr_write
    - csr_wdata
    - busy
    outputs:
    - csr_error and optionally irq_error report the illegal operation.
    - name: csr_error_illegal
      port: csr_error
      expr: '1'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: irq_error_illegal
      port: irq_error
      expr: irq_error_en
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: error
      expr: '1'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: fsm_state
      expr: 4 if (csr_write and csr_addr == 0 and ((csr_wdata & 1) != 0) and busy) else fsm_state
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - Sticky error is set without corrupting source/destination/length configuration.
    output_rules:
    - name: csr_error_illegal
      port: csr_error
      expr: '1'
      width: 1
    - name: irq_error_illegal
      port: irq_error
      expr: irq_error_en
      width: 1
    state_updates:
    - name: error
      expr: '1'
      width: 1
    - name: fsm_state
      expr: 4 if (csr_write and csr_addr == 0 and ((csr_wdata & 1) != 0) and busy) else fsm_state
      width: 3
  invariants:
  - All architectural state updates are synchronous to clk and reset to declared values when rst_n is asserted low.
  - Memory write data for a beat equals the previously accepted read data for that beat.
  - A new read request is not issued while write_buffer_full is 1.
  - busy is 1 only during an active nonzero-length transfer and deasserts on final write acceptance, reset, or soft_reset.
  - done and error are sticky until reset, soft_reset, or W1C clear.
  reference_model_hint: tb-gen should build a byte-counting reference DMA scoreboard from function_model transactions and compare CSR, memory, and IRQ observations.
cycle_model:
  purpose: Cycle and handshake contract for rtl-gen and waveform-based verification.
  executable: pymtl3
  backend_policy: Use a simple clocked PyMTL3 shell or cocotb scoreboard driven by this SSOT; FunctionalModel is the behavioral oracle.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n low asynchronously drives architectural state to reset values and deasserts memory valids.
    deassertion: Logic accepts transactions after reset deassertion is sampled by clk.
  latency:
    csr_access:
      min_cycles: 0
      max_cycles: 1
      description: CSR read/write completes in the accepted cycle for ready-high operation.
    zero_length_transfer:
      min_cycles: 1
      max_cycles: 1
      description: A start with LENGTH=0 sets done without memory requests on the start accepting clock edge.
    per_beat_transfer:
      min_cycles: 2
      max_cycles: null
      description: At least read data capture plus write acceptance per beat; unbounded with external backpressure.
  handshake_rules:
  - signal: csr_valid/csr_ready
    rule: CSR request fields remain stable while csr_valid is high and csr_ready is low.
  - signal: mem_rd_valid/mem_rd_ready
    rule: mem_rd_addr remains stable until the read address handshake completes.
  - signal: mem_rd_data_valid/mem_rd_data_ready
    rule: mem_rd_data is sampled only on valid/ready and is not consumed when ready is low.
  - signal: mem_wr_valid/mem_wr_ready
    rule: mem_wr_addr, mem_wr_data, and mem_wr_strb remain stable until write acceptance.
  pipeline:
  - stage: CSR_ACCEPT
    cycle: 0..N
    action: Accept configuration, status clear, abort, or start command.
  - stage: READ_ADDR
    cycle: N..M
    action: Issue source read address when active transfer has no pending buffered write.
  - stage: CAPTURE_READ_DATA
    cycle: M..K
    action: Capture source read payload on read-data valid/ready.
  - stage: WRITE_BEAT
    cycle: K..L
    action: Issue destination write and update progress when accepted.
  - stage: COMPLETE_OR_LOOP
    cycle: L..L+1
    action: Set done on final beat or return to READ_ADDR for additional bytes.
  ordering:
  - Accepted CSR writes update state on clk edges.
  - Read-address acceptance precedes dependent read-data capture.
  - Read-data capture precedes dependent write request acceptance.
  - Progress increments only after the corresponding write handshake.
  - Backpressure stalls only the affected handshake stage and preserves payload stability.
  backpressure:
  - Any ready-low condition holds the corresponding valid and payload stable.
  - The engine supports at most one uncommitted read data beat.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 0.5
      condition: No memory backpressure and single outstanding read/write sequencing.
    outstanding:
      max: 1
      description: One read response/write beat in flight.
    depth:
      pipeline_stages: 5
      queue_depth: 1
      description: CSR accept, read request, read capture, write request, complete/loop.
  observability:
  - Each function_model transaction maps to a named pipeline stage and a test scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - Memory valid outputs deassert on reset.
  - CSR ready is low during reset and may be high immediately after reset release.
  - busy, done, error, progress, buffer-valid, and FSM state reset to zero/IDLE.
cdc_requirements:
  required: false
  rationale: All declared ports are synchronous to clk in this engineering draft.
  checks:
  - No clock-domain crossings are expected unless future SSOT revisions add clocks.
rdc_requirements:
  required: false
  rationale: Only rst_n is declared and all state is in the clk domain.
  checks:
  - No reset-domain crossings are expected unless future SSOT revisions add resets.
registers:
  config:
    base_offset: 0
    register_width: 32
    access_policy: CSR offsets are byte addresses; unmapped accesses set csr_error and reads return zero.
  register_list:
  - name: CTRL
    offset: 0
    width: 32
    access: rw
    reset: 0
    description: Control register for start, interrupt enables, and software abort.
    fields:
    - name: start
      bits:
      - 0
      - 0
      access: w1p
      reset: 0
      description: Writing 1 starts one transfer when idle; reads as 0.
      write_effect: Writing 1 while !busy creates start_pulse; writing 1 while busy sets error.
    - name: irq_done_en
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      description: Enable irq_done level output.
      write_effect: CSR write updates irq_done_en from csr_wdata[1].
    - name: irq_error_en
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      description: Enable irq_error level output.
      write_effect: CSR write updates irq_error_en from csr_wdata[2].
    - name: soft_reset
      bits:
      - 3
      - 3
      access: w1p
      reset: 0
      description: Writing 1 aborts the active transfer and clears transient state.
      write_effect: Writing 1 clears busy, done, error, progress, remaining byte count, and buffered data state.
    - name: reserved
      bits:
      - 31
      - 4
      access: reserved
      reset: 0
      description: Reserved bits read as zero and ignore writes.
      read_value: 0
      write_effect: Writes ignored.
  - name: STATUS
    offset: 4
    width: 32
    access: rw1c
    reset: 0
    description: Sticky and live transfer status.
    fields:
    - name: busy
      bits:
      - 0
      - 0
      access: ro
      reset: 0
      description: High while a nonzero-length transfer is active.
    - name: done
      bits:
      - 1
      - 1
      access: rw1c
      reset: 0
      description: Sticky transfer completion bit.
      write_effect: Writing 1 clears done; writing 0 leaves done unchanged.
    - name: error
      bits:
      - 2
      - 2
      access: rw1c
      reset: 0
      description: Sticky error bit for illegal CSR or illegal start while busy.
      write_effect: Writing 1 clears error; writing 0 leaves error unchanged.
    - name: reserved
      bits:
      - 31
      - 3
      access: reserved
      reset: 0
      description: Reserved bits read as zero and ignore writes.
      read_value: 0
      write_effect: Writes ignored.
  - name: SRC_ADDR
    offset: 8
    width: 32
    access: rw
    reset: 0
    description: Source base byte address.
    fields:
    - name: src_addr
      bits:
      - 31
      - 0
      access: rw
      reset: 0
      description: Source base byte address captured for the next transfer.
      write_effect: CSR write updates src_addr when the engine is idle.
  - name: DST_ADDR
    offset: 12
    width: 32
    access: rw
    reset: 0
    description: Destination base byte address.
    fields:
    - name: dst_addr
      bits:
      - 31
      - 0
      access: rw
      reset: 0
      description: Destination base byte address captured for the next transfer.
      write_effect: CSR write updates dst_addr when the engine is idle.
  - name: LENGTH
    offset: 16
    width: 32
    access: rw
    reset: 0
    description: Requested transfer length in bytes.
    fields:
    - name: length_bytes
      bits:
      - 31
      - 0
      access: rw
      reset: 0
      description: Requested byte length for the next transfer; zero length completes immediately with no memory request.
      write_effect: CSR write updates length_bytes when the engine is idle.
  - name: PROGRESS
    offset: 20
    width: 32
    access: ro
    reset: 0
    description: Number of bytes completed in the current or most recent transfer.
    fields:
    - name: progress_bytes
      bits:
      - 31
      - 0
      access: ro
      reset: 0
      description: Completed byte count.
memory:
  instances: []
  addressing:
    policy: External memory address channels use byte addresses and in-order completion.
    byte_strobe_policy: mem_wr_strb masks the final beat when LENGTH is not a multiple of DATA_WIDTH/8.
  storage_policy: Only control/status registers and one read-data buffer may be implemented internally.
interrupts:
  present: true
  sources:
  - name: irq_done
    output: irq_done
    source: done
    enable: irq_done_en
    polarity: active_high
    behavior: level_until_status_clear
  - name: irq_error
    output: irq_error
    source: error
    enable: irq_error_en
    polarity: active_high
    behavior: level_until_status_clear
  clear_policy: Clear STATUS.done or STATUS.error with W1C writes or assert reset/soft_reset.
fsm:
  control:
    reset_state: IDLE
    encoding_width: 3
    states:
    - IDLE
    - READ_REQ
    - WAIT_RDATA
    - WRITE_REQ
    - DONE
    - ERROR
    transitions:
    - from: IDLE
      to: DONE
      when: start_pulse && length_bytes == 0
    - from: IDLE
      to: READ_REQ
      when: start_pulse && length_bytes != 0
    - from: IDLE
      to: ERROR
      when: start_pulse && busy
    - from: READ_REQ
      to: WAIT_RDATA
      when: mem_rd_valid && mem_rd_ready
    - from: WAIT_RDATA
      to: WRITE_REQ
      when: mem_rd_data_valid && mem_rd_data_ready
    - from: WRITE_REQ
      to: DONE
      when: mem_wr_valid && mem_wr_ready && remaining_bytes <= beat_bytes
    - from: WRITE_REQ
      to: READ_REQ
      when: mem_wr_valid && mem_wr_ready && remaining_bytes > beat_bytes
    - from:
      - READ_REQ
      - WAIT_RDATA
      - WRITE_REQ
      to: IDLE
      when: soft_reset_pulse
    - from: DONE
      to: IDLE
      when: done is cleared and no new start is pending
    - from: ERROR
      to: IDLE
      when: error is cleared and no new start is pending
timing:
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    csr_access:
      min: 0
      max: 1
      measured_from: csr_valid && csr_ready
      measured_to: csr_rdata/csr_error valid
    first_memory_request:
      min: 0
      max: 1
      measured_from: CTRL.start accepted
      measured_to: mem_rd_valid asserted for nonzero length
    completion:
      min: 1
      max: null
      measured_from: CTRL.start accepted
      measured_to: STATUS.done set
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - clk
    isolation: not_required_single_domain
  power_states:
  - name: 'ON'
    entry: rst_n deasserted
    exit: rst_n asserted
    guarantees:
    - All declared DMA and CSR functionality active.
  clock_gating:
    required: false
    rationale: No integrated clock gating required for this small scratch controller.
  upf_required: false
security:
  classification: non_secure_leaf_ip
  assets:
  - name: configuration_state
    protection: CSR writes are deterministic and cannot update unrelated registers.
  - name: data_integrity
    protection: Each write beat must equal the corresponding accepted read beat.
  - name: transfer_bounds
    protection: DMA transfers exactly LENGTH bytes rounded to byte strobes and never progresses without write acceptance.
  threat_model:
  - threat: invalid_or_unmapped_csr_access
    mitigation: ERR_ILLEGAL_CSR sets error and returns zero data for invalid reads.
  - threat: lost_or_duplicated_memory_beat
    mitigation: Valid/ready stability assertions and scoreboard enforce one read-data beat per write beat.
  - threat: stale_irq_status
    mitigation: W1C and soft_reset paths clear sticky status under test.
  privilege_model: System-level access control is owned by the integrating SoC; this leaf IP assumes only authorized CSR masters are connected.
error_handling:
  error_sources:
  - id: ERR_ILLEGAL_CSR
    condition: CSR address is not one of 0, 4, 8, 12, 16, or 20.
    architectural_effect: Assert csr_error for the accepted access, set sticky error, and assert irq_error if enabled.
  - id: ERR_START_WHILE_BUSY
    condition: CTRL.start is written with 1 while busy is already 1.
    architectural_effect: Assert csr_error, set sticky error, keep the active transfer state intact, and assert irq_error if enabled.
  propagation:
  - csr_error reports illegal CSR/start errors on the accepting CSR cycle.
  - STATUS.error remains set until W1C clear, soft_reset, or reset.
  - irq_error is level-high while STATUS.error and irq_error_en are 1.
  recovery:
  - action: status_w1c
    clears:
    - error
    preserves:
    - src_addr
    - dst_addr
    - length_bytes
    - progress_bytes
  - action: soft_reset_or_rst_n
    clears:
    - busy
    - done
    - error
    - remaining_bytes
    - progress_bytes
    - write_buffer_full
    - fsm_state
    preserves:
    - src_addr
    - dst_addr
    - length_bytes
    - irq_done_en
    - irq_error_en
