  parameter_header: rtl/dma_scratch_ui_live_20260519a_param.vh
  conventions:
  - Use input logic/output logic ANSI ports and internal single-driver logic.
  - Keep shared parameter declarations in rtl/dma_scratch_ui_live_20260519a_param.vh only if needed.
  - Avoid packages, interfaces, modports, tasks, and unsupported project constructs unless a later SSOT revision approves them.
