custom:
  assumptions:
  - No imported architect handoff file was visible to this worker; the SSOT is an engineering draft from the orchestrator inline DMA scratch UI goal.
  - CSR UI is a simple valid/ready slave, not AXI-Lite/APB, because no bus-standard requirement was visible in the worker prompt.
  - Memory fabric is modeled as simple in-order valid/ready read-address/read-data/write channels with one outstanding read.
  - DATA_WIDTH is constrained to 32 for the first RTL target while ADDR_WIDTH and LEN_WIDTH remain parameters.
  - Partial final transfers are represented with byte strobes; byte-lane alignment policy remains integration-owned beyond this leaf IP.
  - Separate child modules are optional in engineering mode; rtl-gen may inline csr_registers, dma_engine, and irq_status in the top file.
  open_questions:
  - Confirm whether future revisions must replace simple_csr_valid_ready with AXI-Lite or APB.
  - Confirm whether unaligned multi-byte transfers require address-lane rotation beyond the final-byte strobe mask.
  - Confirm whether external memory error response ports should be added.
  optional_behavior_policy:
    resolution: non_required_optional_items_disabled_unless_ssot_marks_required_or_parameterized
    owner: ssot-gen deterministic repair
    rule: Rows marked required:false or prose-only optional verification aids do not add RTL behavior. Any optional functional behavior must be converted by ssot-gen into required behavior or an explicit parameter/register policy before rtl-gen signoff.
