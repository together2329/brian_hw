  rtl-gen:
  - id: RTL_IMPLEMENT_DMA_TOP
    content: Implement rtl/dma_scratch_ui_live_20260519a.sv with the exact SSOT top module, parameters, and ports.
    detail: Implement CSR register map, DMA copy FSM, memory valid/ready channels, byte strobes, sticky status, interrupts, reset, abort, and illegal CSR handling from this SSOT.
    criteria:
    - Top module name and port directions/widths match io_list exactly.
    - All function_model transactions have RTL behavior or a precise SSOT blocker question.
    - No placeholder, heartbeat-only, or tie-off-only implementation is used.
    source_refs:
    - top_module
    - io_list
    - function_model
    - cycle_model
    - registers
    owner_module: dma_scratch_ui_live_20260519a
    owner_file: rtl/dma_scratch_ui_live_20260519a.sv
    priority: high
    required: true
  - id: RTL_IMPLEMENT_CSR_REGISTERS
    content: Implement CSR register decode, readback, write effects, and csr_error.
    detail: CTRL, STATUS, SRC_ADDR, DST_ADDR, LENGTH, and PROGRESS offsets and fields must match registers.register_list.
    criteria:
    - Legal CSR accesses match field reset/access/write_effect rules.
    - Unmapped access and start-while-busy set error and drive csr_error.
    - CSR reads are same-cycle with accepted csr_valid/csr_ready.
    source_refs:
    - registers
    - function_model.FM_CSR_WRITE_CONFIG
    - function_model.FM_CSR_READ_STATUS
    - error_handling
    owner_module: csr_registers
    owner_file: rtl/csr_registers.sv
    priority: high
    required: true
  - id: RTL_IMPLEMENT_DMA_ENGINE
    content: Implement single-outstanding source-to-destination DMA transfer engine.
    detail: Issue ordered source reads, capture read data, issue destination writes, update progress after write acceptance, and support partial final strobes.
    criteria:
    - Read/write valid and payload stability under backpressure follows cycle_model.handshake_rules.
    - Write data equals corresponding accepted read data.
    - Zero-length, final-beat, and soft_reset behaviors match function_model.
    source_refs:
    - dataflow
    - fsm
    - function_model.FM_START_TRANSFER
    - function_model.FM_READ_REQUEST
    - function_model.FM_WRITE_ACCEPT
    owner_module: dma_engine
    owner_file: rtl/dma_engine.sv
    priority: high
    required: true
  - id: RTL_IMPLEMENT_IRQ_STATUS
    content: Implement sticky done/error status and irq_done/irq_error level outputs.
    detail: Interrupts are gated by CTRL enables and remain asserted until status W1C, soft_reset, or reset clears the corresponding sticky bit.
    criteria:
    - irq_done equals done && irq_done_en after completion.
    - irq_error equals error && irq_error_en after declared error sources.
    - W1C clear does not corrupt configuration registers.
    source_refs:
    - interrupts
    - registers.STATUS
    - function_model.FM_WRITE_ACCEPT
    - function_model.FM_ILLEGAL_CSR_OR_START
    owner_module: irq_status
    owner_file: rtl/irq_status.sv
    priority: high
    required: true
