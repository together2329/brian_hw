    content: Create cocotb scoreboard and protocol monitors for the DMA scratch UI.
    detail: Use test_requirements scenarios and function_model transactions to validate CSR, memory, IRQ, backpressure, and error behavior.
    criteria:
    - All SC01-SC11 scenarios have executable tests.
    - Memory scoreboard checks address order, data integrity, progress, and byte strobes.
    - Protocol monitors assert valid/ready stability on all channels.
    source_refs:
    - test_requirements
    - function_model
    - cycle_model
    owner_module: tb_dma_scratch_ui_live_20260519a
    owner_file: tb/cocotb/test_dma_scratch_ui_live_20260519a.py
    priority: high
    required: true
