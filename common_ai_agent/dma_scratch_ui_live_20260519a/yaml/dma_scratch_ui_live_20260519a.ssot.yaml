top_module:
  name: dma_scratch_ui_live_20260519a
  file: rtl/dma_scratch_ui_live_20260519a.sv
  version: 0.1.0
  type: synthesizable_rtl
  description: Small AXI4-Lite controlled scratch DMA engine that copies a programmable number of 32-bit words from a source address to a destination address using a single outstanding AXI4 master read/write datapath, with status, interrupt, and deterministic done/error behavior for full-flow RTL, simulation, and synthesis evidence.
  target:
    language: systemverilog
    reset: active_low_async_assert_sync_release
    clock: single_clock
    synthesis: generic_asic_or_fpga
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
  reference_spec: user-defined
