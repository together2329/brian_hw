parameters:
- name: ADDR_WIDTH
  type: int
  value: 32
  min: 16
  max: 64
  description: AXI address width in bits.
- name: DATA_WIDTH
  type: int
  value: 32
  allowed:
  - 32
  description: Scratch DMA data width in bits; byte strobes are DATA_WIDTH/8.
- name: LEN_WIDTH
  type: int
  value: 16
  min: 1
  max: 32
  description: Transfer length register width in 32-bit words.
- name: FIFO_DEPTH
  type: int
  value: 2
  min: 2
  description: Internal read-data skid depth for decoupling read and write channels.
