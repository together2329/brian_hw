cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  executable: pymtl3
  backend_policy: Use PyMTL3 for the clocked cycle model shell; FunctionalModel remains the behavioral oracle.
  clock: clk
  reset:
    signal: rst_n
    polarity: active_low
    assertion: rst_n assertion returns architectural state to declared reset values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on clk at nominal 100 MHz; max depends on declared backpressure and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - signal: s_axil_arvalid/s_axil_arready
    rule: s_axil_arvalid payload remains stable until s_axil_arready is sampled asserted on axil_ctrl.
  - signal: s_axil_awvalid/s_axil_awready
    rule: s_axil_awvalid payload remains stable until s_axil_awready is sampled asserted on axil_ctrl.
  - signal: s_axil_bvalid/s_axil_bready
    rule: s_axil_bvalid payload remains stable until s_axil_bready is sampled asserted on axil_ctrl.
  - signal: s_axil_rvalid/s_axil_rready
    rule: s_axil_rvalid payload remains stable until s_axil_rready is sampled asserted on axil_ctrl.
  - signal: s_axil_wvalid/s_axil_wready
    rule: s_axil_wvalid payload remains stable until s_axil_wready is sampled asserted on axil_ctrl.
  - signal: m_axi_arvalid/m_axi_arready
    rule: m_axi_arvalid payload remains stable until m_axi_arready is sampled asserted on axi_mem.
  - signal: m_axi_awvalid/m_axi_awready
    rule: m_axi_awvalid payload remains stable until m_axi_awready is sampled asserted on axi_mem.
  - signal: m_axi_bvalid/m_axi_bready
    rule: m_axi_bvalid payload remains stable until m_axi_bready is sampled asserted on axi_mem.
  - signal: m_axi_rvalid/m_axi_rready
    rule: m_axi_rvalid payload remains stable until m_axi_rready is sampled asserted on axi_mem.
  - signal: m_axi_wvalid/m_axi_wready
    rule: m_axi_wvalid payload remains stable until m_axi_wready is sampled asserted on axi_mem.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0..N
    action: Accept legal request/command/packet/control work under declared handshake rules.
  - stage: S1_EVALUATE
    cycle: N..M
    action: Evaluate function_model transaction and update only declared state.
  - stage: S2_OBSERVE
    cycle: M..K
    action: Publish response/status/output/debug event and hold it stable until accepted.
  ordering:
  - Accepted requests update architectural state only on clock edges.
  - Completion/status/interrupt updates occur after the operation reaches its terminal FSM state.
  - Backpressure stalls the active handshake stage without corrupting stored state.
  - Read/dataflow stages must precede dependent write/output stages where declared in dataflow.
  backpressure:
  - Ready/valid deassertion stalls only the affected interface stage; payload and route/control state remain stable.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: No backpressure on the active interface
    outstanding:
      max: 1
      description: Default one accepted operation until the SSOT declares deeper buffering
    depth:
      pipeline_stages: 3
      queue_depth: 1
      description: Default accept/evaluate/observe cycle model depth
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rst_n
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - Handshake/control state resets to idle
  - Observable outputs reset to function_model reset values
cdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
rdc_requirements:
  required: false
  rationale: Single clock/reset domain in the repaired draft; update SSOT if additional clocks or resets are introduced
  checks:
  - No crossing paths expected; update SSOT if additional clocks or resets are introduced
registers:
  no_registers: true
  policy: No firmware-visible registers are implied by repair; add explicit register_list entries before rtl-gen implements CSR behavior.
  register_list: []
memory:
  instances: []
  addressing:
    policy: No SSOT-approved internal memory instances; add explicit memories before rtl-gen may implement storage behavior.
  storage_policy: No storage behavior is implied by repair. rtl-gen may only implement memory described by SSOT facts.
interrupts:
  present: false
  sources: []
  rationale: No interrupt output is implied by repair; add interrupt sources explicitly before rtl-gen implements IRQ behavior
fsm:
  control:
    states:
    - IDLE
    - ACCEPT
    - EXEC_FEATURE_1
    - EXEC_FEATURE_2
    - EXEC_FEATURE_3
    - EXEC_FEATURE_4
    - EXEC_FEATURE_5
    - COMPLETE
    - ERROR
    transitions:
    - from: IDLE
      to: ACCEPT
      when: A legal transaction, packet, command, or CSR operation is accepted
    - from: ACCEPT
      to: EXEC_FEATURE_1
      when: Inputs and configuration match function_model preconditions
    - from: EXEC_FEATURE_1
      to: EXEC_FEATURE_2
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_2
      to: EXEC_FEATURE_3
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_3
      to: EXEC_FEATURE_4
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_4
      to: EXEC_FEATURE_5
      when: The current SSOT-owned behavior slice completes
    - from: EXEC_FEATURE_5
      to: COMPLETE
      when: The current SSOT-owned behavior slice completes
    - from: COMPLETE
      to: IDLE
      when: Observable result/status handoff completes
    - from: '*'
      to: ERROR
      when: error_handling.error_sources condition is detected
    - from: ERROR
      to: IDLE
      when: Reset or approved recovery action clears the error
    source: repair synthesized only generic control structure from existing SSOT facts; no IP-kind fixed FSM is implied
timing:
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    register_access:
      min: 0
      max: null
      measured_from: valid && ready
      measured_to: response valid && ready
    primary_operation:
      min: 1
      max: null
      measured_from: start/request accepted
      measured_to: done/response accepted
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - clk
    isolation: not_required_single_domain
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
    - All declared IP functionality active
  clock_gating:
    required: false
    rationale: No explicit integrated clock-gating requirement in approved SSOT
  upf_required: false
security:
  classification: non_secure_leaf_ip
  assets:
  - name: configuration_state
    protection: CSR/configuration updates must be deterministic and reset-safe
  - name: data_integrity
    protection: Data/control outputs must match function_model transactions
  threat_model:
  - threat: invalid configuration or address
    mitigation: error_handling declares detection, architectural effect, and recovery
  - threat: silent data/control corruption
    mitigation: test_requirements scoreboard checks every declared functional transaction
  privilege_model: System-level access control is owned by the integrating bus/firewall unless explicitly declared here.
error_handling:
  error_sources:
  - id: ERR_PROTOCOL
    condition: Downstream protocol response is non-OKAY or invalid
    architectural_effect: Set error status and block signoff until handled
  propagation:
  - Errors update status/debug observability and propagate through declared response/interrupt mechanisms.
  recovery:
  - action: reset or software clear
    clears:
    - error/status indicators
    preserves:
    - configuration unless reset policy states otherwise
debug_observability:
  waveform_must_probe:
  - clk
  - rst_n
  - fsm_state
  - start_or_request
  - done_or_response
  - error_status
  - irq_or_status_outputs
  trace_events:
  - name: operation_start
    trigger: start/request accepted
  - name: operation_complete
    trigger: done/response accepted
  - name: error_detected
    trigger: any error_handling.error_sources condition
  status_outputs:
  - status/debug signals declared in io_list or registers
integration:
  bus_attachment:
    interfaces:
    - axil_ctrl
    - axi_mem
    address_ownership: SoC assigns base addresses and external routing not owned by this leaf IP
  dependencies:
    external_modules: []
    external_clocks:
    - clk
    external_resets:
    - rst_n
  connections: []
  connection_contract_status: missing machine-readable module wiring; child RTL drafts may proceed from owner packets, but top integration/signoff must stay blocked until SSOT authors integration.connections or sub_modules[].connections with module/port/signal records
  integration_notes:
  - Integrator must connect every declared io_list port and honor timing/reset assumptions.
dft:
  scan_required: false
  controllability:
    reset: rst_n
    clocks:
    - clk
    primary_inputs: all io_list inputs controllable in testbench
  observability:
    required_internal_points:
    - fsm_state
    - status
