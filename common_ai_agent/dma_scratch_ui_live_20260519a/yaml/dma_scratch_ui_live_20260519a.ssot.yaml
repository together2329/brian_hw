top_module:
  name: dma_scratch_ui_live_20260519a
  file: rtl/dma_scratch_ui_live_20260519a.sv
  version: 0.1.0
  type: synthesizable_rtl
  description: Single-clock scratch DMA controller with a simple CSR valid/ready UI, source-to-destination copy engine, progress tracking, sticky status, and done/error IRQ outputs.
  target:
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null
  quality_profile: standard
  reference_spec: user-defined
sub_modules:
- name: csr_registers
  file: rtl/csr_registers.sv
  type: rtl_submodule_or_inline_block
  implements:
  - csr_programming_model
  register_refs:
  - CTRL
  - STATUS
  - SRC_ADDR
  - DST_ADDR
  - LENGTH
  - PROGRESS
