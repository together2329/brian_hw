ip: dma_scratch_ui_live_20260519a
schema_version: ssot-draft-v1
run_mode: engineering
source_requirement: ATLAS orchestrator inline DMA scratch UI goal; no imported external spec visible to ssot-gen.
metadata:
  owner: ssot-gen
  status: engineering_draft
  generated_by: ssot-gen
  source_refs:
  - orchestrator_context.cada7b15caa8
  notes:
  - Engineering draft refreshed from visible pipeline goal and prior inline DMA intent.
interfaces:
- name: csr_if
  protocol: simple_csr_valid_ready
  role: target
  ports:
  - csr_valid
  - csr_ready
  - csr_write
  - csr_addr
  - csr_wdata
  - csr_rdata
  - csr_error
  handshake: csr_valid && csr_ready accepts a CSR request; read data is same-cycle with acceptance.
  backpressure: csr_ready may be held low only during reset or implementation-defined one-cycle internal stalls.
- name: mem_read_addr_if
  protocol: native_valid_ready
  role: initiator
  ports:
  - mem_rd_valid
  - mem_rd_ready
  - mem_rd_addr
  handshake: mem_rd_valid && mem_rd_ready accepts a read address.
  backpressure: Hold mem_rd_valid and mem_rd_addr stable until ready.
- name: mem_read_data_if
  protocol: native_valid_ready
  role: target
  ports:
  - mem_rd_data_valid
  - mem_rd_data_ready
  - mem_rd_data
  handshake: mem_rd_data_valid && mem_rd_data_ready transfers data into read_data_buffer.
  backpressure: Assert mem_rd_data_ready only when the write buffer can capture data.
- name: mem_write_if
  protocol: native_valid_ready
  role: initiator
  ports:
  - mem_wr_valid
  - mem_wr_ready
  - mem_wr_addr
  - mem_wr_data
  - mem_wr_strb
  handshake: mem_wr_valid && mem_wr_ready accepts the destination write beat.
  backpressure: Hold write payload stable until ready.
rtl_contract:
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM_CSR_READ_STATUS
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: csr_valid && csr_ready
  input_map:
    csr_valid: csr_valid
    csr_write: csr_write
    csr_addr: csr_addr
    csr_wdata: csr_wdata
    mem_rd_ready: mem_rd_ready
    mem_rd_data_valid: mem_rd_data_valid
    mem_rd_data: mem_rd_data
    mem_wr_ready: mem_wr_ready
  output_map:
    csr_ready: csr_ready
    csr_rdata: csr_rdata
    csr_error: csr_error
    mem_rd_valid: mem_rd_valid
    mem_rd_addr: mem_rd_addr
    mem_rd_data_ready: mem_rd_data_ready
    mem_wr_valid: mem_wr_valid
    mem_wr_addr: mem_wr_addr
    mem_wr_data: mem_wr_data
    mem_wr_strb: mem_wr_strb
    irq_done: irq_done
    irq_error: irq_error
  ready_output: csr_ready
  output_valid: mem_wr_valid
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transactions.
  - Input sampling and output observation follow cycle_model handshake and latency rules.
  output_rules:
  - name: csr_ready_contract
    port: csr_ready
    expr: '1'
    width: 1
    description: CSR slave is ready outside reset unless implementation chooses a legal stall.
  - name: irq_done_contract
    port: irq_done
    expr: done and irq_done_en
    width: 1
    description: Level done interrupt derived from sticky done and enable.
  - name: irq_error_contract
    port: irq_error
    expr: error and irq_error_en
    width: 1
    description: Level error interrupt derived from sticky error and enable.
  - name: csr_rdata_status
    port: csr_rdata
    expr: status_word if csr_addr == 4 else progress_word
    width: DATA_WIDTH
    description: FunctionalModel output observable mapped to DUT output port.
  - name: csr_error_read
    port: csr_error
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_rd_valid_reset
    port: mem_rd_valid
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_wr_valid_reset
    port: mem_wr_valid
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_rd_addr_rule
    port: mem_rd_addr
    expr: src_addr + progress_bytes
    width: ADDR_WIDTH
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_rd_data_ready_rule
    port: mem_rd_data_ready
    expr: write_buffer_ready
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_wr_addr_rule
    port: mem_wr_addr
    expr: dst_addr + progress_bytes
    width: ADDR_WIDTH
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_wr_data_rule
    port: mem_wr_data
    expr: read_data_buffer
    width: DATA_WIDTH
    description: FunctionalModel output observable mapped to DUT output port.
  - name: mem_wr_strb_rule
    port: mem_wr_strb
    expr: write_strobe
    width: DATA_WIDTH/8
    description: FunctionalModel output observable mapped to DUT output port.
  unresolved_expression_refs:
  - rst_n
