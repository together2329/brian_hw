# =============================================================================
# atlas_flow_gpio_demo.ssot.yaml — SSOT for an 8-bit APB-Lite GPIO output mirror demo peripheral
# Created as the canonical ATLAS flow trial demo IP (validate_ssot → emit →
# cocotb co-sim).
# =============================================================================
top_module:
  name: atlas_flow_gpio_demo
  file: rtl/atlas_flow_gpio_demo.sv
  version: "1.0"
  type: peripheral
  description: 8-bit GPIO output controlled by a single APB-Lite CSR (DATA). Demonstrates the SSOT-driven FL.step() cycle-accurate co-sim path.
  reference_spec: ATLAS flow trial demo (no external standard)
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: csr_decode, kind: control, source_refs: [registers.register_list], rtl_candidates: [atlas_flow_gpio_demo], verification_impact: [test_requirements.scenarios] }
    - { id: gpio_drive, kind: datapath, source_refs: [function_model.transactions.FM1], rtl_candidates: [atlas_flow_gpio_demo], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: atlas_flow_gpio_demo
    file: rtl/atlas_flow_gpio_demo.sv
    ownership: manifest
    ssot_gen: true
    wiring_only: true
    source_sections: [io_list, registers, function_model]
    implements: [io_list.interfaces.apb_slave, registers.register_list, function_model.transactions]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM1, function_model.transactions.FM2]
    description: APB decoder plus DATA register driving gpio_out.

parameters:
  - { name: GPIO_WIDTH, default: 8, type: int, description: GPIO output width }
  - { name: APB_ADDR_WIDTH, default: 4, type: int, description: APB address width }
  - { name: APB_DATA_WIDTH, default: 32, type: int, description: APB data width }

io_list:
  clock_domains:
    - name: pclk
      frequency_mhz: 50
      description: APB clock domain
      ports:
        - { name: PCLK, width: 1, direction: input, description: APB clock }
  resets:
    - name: presetn
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: APB active-low reset
      ports:
        - { name: PRESETn, width: 1, direction: input, description: APB reset }
  interfaces:
    - name: apb_slave
      type: APB-Lite
      role: slave
      clock_domain: pclk
      reset_domain: presetn
      description: APB-Lite CSR access
      protocol:
        setup_phase: "PSEL=1, PENABLE=0 captures address and control."
        access_phase: "PSEL=1, PENABLE=1 completes when PREADY=1."
        write_rule: "DATA register updates on rising edge when access_phase completes with pwrite=1."
        error_rule: "Unmapped offsets return PSLVERR=0 and PRDATA=0 in this demo."
      ports:
        - { name: PADDR,   width: 4,  direction: input,  description: APB address }
        - { name: PSEL,    width: 1,  direction: input,  description: APB select }
        - { name: PENABLE, width: 1,  direction: input,  description: APB enable }
        - { name: PWRITE,  width: 1,  direction: input,  description: APB write }
        - { name: PWDATA,  width: 32, direction: input,  description: APB write data }
        - { name: PRDATA,  width: 32, direction: output, description: APB read data }
        - { name: PREADY,  width: 1,  direction: output, description: APB ready }
        - { name: PSLVERR, width: 1,  direction: output, description: APB slave error }
    - name: gpio_output
      type: custom
      clock_domain: pclk
      reset_domain: presetn
      description: 8-bit GPIO output pins driven by DATA register
      protocol:
        drive_rule: "gpio_out is continuously driven from DATA[7:0]."
        timing_rule: "gpio_out updates combinationally after DATA_q changes on the write access rising edge."
        handshake_rule: "No ready/valid handshake; output is always valid after reset deassertion."
      ports:
        - { name: gpio_out, width: 8, direction: output, description: GPIO output (mirrors DATA register) }

features:
  - name: APB CSR access
    trigger: APB master initiates read/write on PSEL/PENABLE phases.
    datapath: Address decode selects DATA register; PWDATA latches into DATA on write access phase; PRDATA returns DATA on read access phase.
    control: PREADY immediate (0-wait-state).
    output: DATA register update + PRDATA readback.
  - name: GPIO drive
    trigger: DATA register changes via APB write.
    datapath: gpio_out always reflects DATA[GPIO_WIDTH-1:0].
    control: Combinational drive from registered DATA.
    output: gpio_out tracks DATA.

registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved bits read zero, writes ignored.
  register_list:
    - name: DATA
      offset: 0x0
      width: 32
      access: rw
      reset: 0x00000000
      category: data
      description: GPIO output data register (low GPIO_WIDTH bits drive gpio_out)
      write_side_effects:
        - "Lower 8 bits update gpio_out on the next rising PCLK after access phase completes."
      fields:
        - { name: data, bits: [7, 0], access: rw, reset: 0, write_effect: Drives gpio_out, description: GPIO output value }
        - { name: reserved_31_8, bits: [31, 8], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: Reserved }

memory:
  instances: []
  note: No internal FIFO/SRAM — single register.

interrupts:
  sources: []
  output: null
  note: No interrupts.

fsm:
  apb_phase:
    states: [IDLE, SETUP, ACCESS]
    transitions:
      - { from: IDLE,   to: SETUP,  condition: "psel == 1 and penable == 0" }
      - { from: SETUP,  to: ACCESS, condition: "psel == 1 and penable == 1" }
      - { from: ACCESS, to: IDLE,   condition: "psel == 0" }
      - { from: IDLE,   to: IDLE,   condition: "psel == 0" }
    note: Standard APB-Lite slave handshake. Always-ready (PREADY=1 in ACCESS).

rtl_contract:
  transaction: FM1
  clock: PCLK
  reset: PRESETn
  reset_active: low
  sample_condition: "PRESETn == 1"
  input_map:
    psel: PSEL
    penable: PENABLE
    pwrite: PWRITE
    paddr: PADDR
    pwdata: PWDATA
  output_map:
    prdata: PRDATA
    pready: PREADY
    pslverr: PSLVERR
    gpio_out: gpio_out

function_model:
  purpose: Executable behavioral contract for FL/CL co-sim
  state_variables:
    - { name: gpio_data, source: registers.DATA.data, reset: 0, description: "Backing storage for DATA register's data field; drives gpio_out" }
  transactions:
    - id: FM1
      name: apb_write_data
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1", "paddr == 0"]
      inputs: [pwdata]
      outputs: ["DATA register updates to pwdata & 0xff; gpio_out tracks DATA"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1, description: APB always-ready slave }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1, description: No slave error in this demo }
        - { name: gpio_out_rule, port: gpio_out, expr: "pwdata & 0xff", width: 8, description: gpio_out reflects new DATA value }
      state_updates:
        - { name: gpio_data, expr: "pwdata & 0xff", width: 8 }
      side_effects: ["DATA register updated"]
      error_cases: []
    - id: FM2
      name: idle_or_read
      preconditions: ["pwrite == 0 or psel == 0 or penable == 0"]
      inputs: [paddr]
      outputs: ["gpio_out holds previous DATA; PRDATA returns DATA on read; PREADY=1; PSLVERR=0"]
      output_rules:
        - { name: pready_rule,   port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule,  port: PSLVERR, expr: 0, width: 1 }
        - { name: gpio_out_rule, port: gpio_out, expr: "gpio_data & 0xff", width: 8 }
        - { name: prdata_rule,   port: PRDATA,  expr: "gpio_data if (psel == 1 and penable == 1 and pwrite == 0 and paddr == 0) else 0", width: 32 }
      state_updates:
        - { name: gpio_data, expr: gpio_data, width: 8 }
      side_effects: ["No architectural state changes; DATA/gpio_data holds previous value."]
      error_cases: []
  invariants:
    - gpio_out always equals DATA register low 8 bits.
    - PREADY is always 1 (zero-wait-state slave).
    - PSLVERR is always 0 in this demo.

cycle_model:
  purpose: Cycle contract — APB always-ready 0-wait-state slave.
  executable: python
  cosim: true
  clock: PCLK
  reset:
    assertion: PRESETn low clears DATA to 0 and drives gpio_out=0.
    deassertion: First rising PCLK after deassertion enables register updates.
  latency:
    apb_write: { min_cycles: 1, max_cycles: 1, description: DATA updates one cycle after access phase rising edge }
    apb_read:  { min_cycles: 0, max_cycles: 0, description: PRDATA is combinational from DATA in access phase }
  handshake_rules:
    - { signal: PREADY, rule: Always asserted (1). 0-wait-state slave. }
    - { signal: PRDATA, rule: Valid in access phase for reads. Mirrors DATA when paddr==0. }
  pipeline:
    - { stage: S0_DECODE, cycle: 0, action: "Address decode and access-phase capture (psel & penable)." }
    - { stage: S1_UPDATE, cycle: 1, action: "On write, latch pwdata into DATA. gpio_out tracks DATA." }
  ordering:
    - "DATA update occurs on the rising edge that completes the ACCESS phase (PSEL=1, PENABLE=1, PWRITE=1)."
    - "gpio_out follows DATA combinationally — same cycle as DATA update."
  backpressure:
    - "No backpressure — PREADY=1 always."
  performance:
    frequency_mhz: 50
    throughput: { writes_per_cycle: 1, condition: APB master keeps PSEL/PENABLE asserted }
  observability:
    - Every transaction maps to APB phase + gpio_out drive.

clock_reset_domains:
  domains:
    - { name: PCLK, frequency_mhz: 50, description: APB clock }
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: pwdata, sink: gpio_out, path: "PWDATA → DATA register (registered) → gpio_out (combinational)" }

power:
  domains:
    - { name: PD_MAIN, voltage: nominal, clock_domains: [PCLK], isolation: not_required_single_domain }
  modes: ["ON"]
  power_states:
    - { name: ON, entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["APB slave and gpio_out active"] }
  clock_gating:
    required: false
    rationale: "Demo IP has no low-power mode."
  reset_retention:
    retention_required: false
    reset_value_source: "registers.DATA.reset"
  upf_required: false
  note: Single domain, always on.

security:
  classification: non_secure_demo_peripheral
  classifications: []
  assets:
    - { name: DATA_register, protection: "External APB fabric controls access; IP has no internal privilege model." }
  threat_model:
    - { threat: "Unprivileged write", mitigation: "Handled by external APB fabric; IP records no secret state." }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels."
  safety_goals:
    - "No hidden state; reset clears gpio_out and DATA."
  note: No protected registers in this demo.

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources in this minimal demo", architectural_effect: "PSLVERR always 0" }
  propagation:
    - "No errors are generated; PSLVERR remains 0 for all accesses."
  recovery:
    - { action: reset, clears: [DATA], preserves: [], description: "PRESETn clears DATA and gpio_out." }

debug_observability:
  waveform_must_probe:
    - PCLK
    - PRESETn
    - PSEL
    - PENABLE
    - PWRITE
    - PADDR
    - PWDATA
    - PRDATA
    - gpio_out
    - DATA_q
  status_outputs:
    - gpio_out
  trace_events:
    - { name: data_write, trigger: "PSEL && PENABLE && PWRITE && PADDR==0" }
    - { name: data_read, trigger: "PSEL && PENABLE && !PWRITE && PADDR==0" }
  debug_registers:
    - DATA
  signals:
    - { name: DATA, source: registers.DATA, description: GPIO data register }

dft:
  scan: { enabled: false, note: "Demo IP — DFT not applied." }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }
  dialect: systemverilog_2012
  top_module: atlas_flow_gpio_demo
  technology:
    pdk: generic
    standard_cell_library: generic
  constraints:
    - "No inferred latches."
    - "All architectural flops reset by PRESETn."
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - syn/out/atlas_flow_gpio_demo.v
    - syn/out/area.rpt
    - syn/out/timing_summary.rpt

integration:
  top_ports: [PCLK, PRESETn, PADDR, PSEL, PENABLE, PWRITE, PWDATA, PRDATA, PREADY, PSLVERR, gpio_out]
  bus_attachment:
    control: "APB-Lite slave"
    data: "gpio_out custom output"
  connections: []
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect or APB master"
    illegal_access_response: "Benign zero read and PSLVERR=0 for this demo."
  dependencies:
    external_modules: []
    external_clocks: [PCLK]
    external_resets: [PRESETn]
  integration_notes:
    - "Connect PCLK/PRESETn to the APB clock/reset domain."
    - "gpio_out is always valid after reset deassertion."

quality_gates:
  ssot:
    pass: "All required engineering SSOT sections are present, substantive, and free of live TBD placeholders."
    evidence: ["verify_ssot engineering PASS", "check_ssot_disk.sh PASS"]
  rtl:
    pass: "RTL implements the DATA register, APB zero-wait behavior, readback, and gpio_out mirror contract."
    evidence: ["rtl/atlas_flow_gpio_demo.sv", "rtl/rtl_contract.json", "list/atlas_flow_gpio_demo.f"]
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file under atlas_flow_gpio_demo/rtl/."
    pass: "RTL-gen owns and verifies the RTL implementation against the SSOT contract."
    evidence: ["rtl/atlas_flow_gpio_demo.sv", "rtl/rtl_contract.json", "list/atlas_flow_gpio_demo.f"]
  dv:
    pass: "DV scenarios cover reset, DATA writes, readback, and gpio_out mirror behavior."
    evidence: ["test_requirements.scenarios", "verify/equivalence_goals.json", "sim/scoreboard_events.jsonl"]
  tb_gen:
    pass: "Generated TB drives declared scenarios and compares RTL outputs against FunctionalModel."
    evidence: ["tb/cocotb/test_atlas_flow_gpio_demo.py", "sim/scoreboard_events.jsonl"]
  sim:
    pass: "Simulation completes with TESTS=1 PASS=1 FAIL=0 and zero scoreboard failures."
    evidence: ["tb/cocotb/results.xml", "sim/scoreboard_events.jsonl"]
  coverage:
    pass: "Function and cycle coverage bins declared in test_requirements.coverage_goals are hit by passing sim evidence."
    evidence: ["cov/fcov_plan.json", "cov/coverage.json", "sim/scoreboard_events.jsonl"]

test_requirements:
  scenarios:
    - id: SC1
      name: APB write 0x55 to DATA
      stimulus: "APB write 0x55 to offset 0; observe gpio_out=0x55 next cycle."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x55 } }
      expected: "DATA=0x55, gpio_out=0x55, PREADY=1, PSLVERR=0"
      checker: "Scoreboard compares gpio_out and DATA register state."
      coverage: [FM1, gpio_drive]
    - id: SC2
      name: APB write 0xAA
      stimulus: "APB write 0xAA; observe gpio_out=0xAA."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xAA } }
      expected: "DATA=0xAA, gpio_out=0xAA"
      checker: "Same as SC1 with different data."
      coverage: [FM1, gpio_drive]
    - id: SC3
      name: Reset behaviour
      stimulus: "Assert PRESETn low; observe DATA=0, gpio_out=0."
      expected: "DATA=0, gpio_out=0 after reset deassertion."
      checker: "Scoreboard verifies reset values."
      coverage: [reset]
    - id: SC4
      name: APB write all-zeros
      stimulus: "APB write 0x00 to DATA."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x00 } }
      expected: "DATA=0, gpio_out=0"
      checker: "Scoreboard verifies all-zero output."
      coverage: [FM1]
    - id: SC5
      name: APB write maximum
      stimulus: "APB write 0xFF; observe gpio_out=0xFF (all bits set)."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xFF } }
      expected: "DATA=0xFF, gpio_out=0xFF"
      checker: "Verifies full-range output."
      coverage: [FM1, gpio_drive]
  scoreboard_checks:
    - DATA register write-then-read parity
    - gpio_out follows DATA
    - PREADY=1 always
    - PSLVERR=0 always
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      bins:
        - { id: FCOV_FM1_WRITE, source_ref: function_model.transactions.FM1, class: transaction, description: "APB DATA write observed" }
        - { id: FCOV_FM2_READ_IDLE, source_ref: function_model.transactions.FM2, class: transaction, description: "Read/idle hold behavior observed" }
    cycle:
      target_pct: 100
      model: cycle_model
      bins:
        - { id: CCOV_WRITE_LATENCY, source_ref: cycle_model.latency.apb_write, class: latency, description: "Write latency observed" }
        - { id: CCOV_PREADY_ALWAYS, source_ref: cycle_model.handshake_rules.PREADY, class: handshake, description: "PREADY always asserted" }
        - { id: CCOV_RESET, source_ref: cycle_model.reset, class: reset, description: "Reset clears DATA/gpio_out" }

workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: RTL_IMPLEMENT_GPIO_MIRROR
      content: "Implement APB DATA register and gpio_out mirror"
      detail: "Implement atlas_flow_gpio_demo.sv with PCLK/PRESETn APB-Lite slave, DATA register at offset 0, zero-wait PREADY, PSLVERR=0, PRDATA readback, and gpio_out=DATA[7:0]."
      criteria:
        - "RTL top ports match io_list."
        - "APB write to offset 0 updates DATA/gpio_out."
        - "APB read from offset 0 returns DATA."
        - "Reset clears DATA and gpio_out."
      source_refs: [io_list, registers.DATA, function_model.transactions.FM1, function_model.transactions.FM2]
  tb-gen:
    - id: TB_COVER_GPIO_SCENARIOS
      content: "Generate cocotb scoreboard for reset and DATA write/read scenarios"
      detail: "Drive SC1-SC5 and compare PREADY, PSLVERR, PRDATA, and gpio_out against the FunctionalModel."
      criteria:
        - "All declared scenarios are exercised."
        - "Scoreboard reports zero mismatches."
      source_refs: [test_requirements.scenarios, function_model]

cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single PCLK domain - no CDC required."

rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single active-low PRESETn reset domain - no RDC required."

timing:
  target_clocks:
    - { name: PCLK, frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.1 }
  latency_budget:
    register_access_cycles: { min: 1, max: 1, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
    gpio_update_cycles: { min: 1, max: 1, measured_from: "APB write access", measured_to: "gpio_out update" }
  throughput:
    sustained_writes_per_cycle: 1
    conditions: "APB master presents one access phase per cycle."
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "PADDR PSEL PENABLE PWRITE PWDATA", clock: PCLK, delay_ns: 0.2, source: "demo timing budget" }
    outputs:
      - { ports: "PRDATA PREADY PSLVERR gpio_out", clock: PCLK, delay_ns: 0.2, source: "demo timing budget" }
  false_paths:
    - { from: PRESETn, to: all_registers, reason: "async reset assertion" }
  multicycle_paths: []

coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  conventions:
    - "Use ANSI SystemVerilog ports."
    - "Use nonblocking assignments in sequential logic."
    - "No inferred latches."
    - "Reset architectural state from PRESETn."
  lint_waivers: []

reuse_modules: []

custom:
  assumptions:
    - "This is a minimal demo IP; APB privilege and address decode above offset 0 are handled externally or return benign values."
  notes:
    - "Created for ATLAS flow smoke testing."

dir_structure:
  output_dirs:
    req: req/
    yaml: yaml/
    rtl: rtl/
    list: list/
    model: model/
    verify: verify/
    tb: tb/
    sim: sim/
  yaml_dir: yaml/

filelist:
  headers: []
  rtl:
    - rtl/atlas_flow_gpio_demo.sv
  sim:
    - tb/test_atlas_flow_gpio_demo.py
  docs:
    - req/atlas_flow_gpio_demo_requirements.md

traceability:
  yaml_to_output:
    - { yaml: top_module.name, output: rtl/atlas_flow_gpio_demo.sv }
    - { yaml: function_model.transactions.FM1, output: model/functional_model.py }
    - { yaml: test_requirements.scenarios, output: tb/test_atlas_flow_gpio_demo.py }
  requirement_to_yaml:
    - { requirement: REQ1_APB_INTERFACE, yaml: io_list.interfaces.apb_slave }
    - { requirement: REQ2_DATA_REGISTER, yaml: registers.register_list.DATA }
    - { requirement: REQ3_GPIO_OUTPUT, yaml: function_model.state_variables.gpio_data }

generation_flow:
  steps:
    - { name: verify_ssot, command: "verify_ssot atlas_flow_gpio_demo --mode engineering", description: "Validate engineering SSOT." }
    - { name: emit_fl_model, command: "python3 workflow/fl-model-gen/scripts/emit_fl_model.py atlas_flow_gpio_demo --root .", description: "Generate FunctionalModel." }
    - { name: emit_equivalence_goals, command: "python3 workflow/fl-model-gen/scripts/emit_equivalence_goals.py atlas_flow_gpio_demo --root .", description: "Generate equivalence goals." }
    - { name: emit_tb, command: "python3 workflow/tb-gen/scripts/emit_goal_scoreboard_cocotb.py atlas_flow_gpio_demo --root .", description: "Generate goal-driven TB scoreboard." }
    - { name: sim, command: "cd atlas_flow_gpio_demo/tb/cocotb && COCOTB_TESTCASE=test_reset_defaults python3 test_runner.py", description: "Run bounded reset/default scenario first." }
