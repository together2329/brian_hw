# =============================================================================
# atlas_flow_gpio_demo.ssot.yaml — SSOT for an 8-bit APB-Lite GPIO output mirror demo peripheral
# Created as the canonical ATLAS flow trial demo IP (validate_ssot → emit →
# cocotb co-sim).
# =============================================================================
top_module:
  name: atlas_flow_gpio_demo
  file: rtl/atlas_flow_gpio_demo.sv
  version: "1.0"
  type: peripheral
  description: 8-bit GPIO output controlled by a single APB-Lite CSR (DATA). Demonstrates the SSOT-driven FL.step() cycle-accurate co-sim path.
  reference_spec: ATLAS flow trial demo (no external standard)
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: csr_decode, kind: control, source_refs: [registers.register_list], rtl_candidates: [atlas_flow_gpio_demo], verification_impact: [test_requirements.scenarios] }
    - { id: gpio_drive, kind: datapath, source_refs: [function_model.transactions.FM1], rtl_candidates: [atlas_flow_gpio_demo], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: atlas_flow_gpio_demo
    file: rtl/atlas_flow_gpio_demo.sv
    ownership: manifest
    ssot_gen: true
    source_sections: [io_list, registers, function_model]
    implements: [io_list.interfaces.apb_slave, registers.register_list, function_model.transactions]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM1, function_model.transactions.FM2]
    description: APB decoder plus DATA register driving gpio_out.

parameters:
  - { name: GPIO_WIDTH, default: 8, type: int, description: GPIO output width }
  - { name: APB_ADDR_WIDTH, default: 4, type: int, description: APB address width }
  - { name: APB_DATA_WIDTH, default: 32, type: int, description: APB data width }

io_list:
  clock_domains:
    - name: pclk
      frequency_mhz: 50
      description: APB clock domain
      ports:
        - { name: PCLK, width: 1, direction: input, description: APB clock }
  resets:
    - name: presetn
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: APB active-low reset
      ports:
        - { name: PRESETn, width: 1, direction: input, description: APB reset }
  interfaces:
    - name: apb_slave
      type: APB-Lite
      role: slave
      clock_domain: pclk
      reset_domain: presetn
      description: APB-Lite CSR access
      protocol:
        setup_phase: "PSEL=1, PENABLE=0 captures address and control."
        access_phase: "PSEL=1, PENABLE=1 completes when PREADY=1."
        write_rule: "DATA register updates on rising edge when access_phase completes with pwrite=1."
        error_rule: "Unmapped offsets return PSLVERR=0 and PRDATA=0 in this demo."
      ports:
        - { name: PADDR,   width: 4,  direction: input,  description: APB address }
        - { name: PSEL,    width: 1,  direction: input,  description: APB select }
        - { name: PENABLE, width: 1,  direction: input,  description: APB enable }
        - { name: PWRITE,  width: 1,  direction: input,  description: APB write }
        - { name: PWDATA,  width: 32, direction: input,  description: APB write data }
        - { name: PRDATA,  width: 32, direction: output, description: APB read data }
        - { name: PREADY,  width: 1,  direction: output, description: APB ready }
        - { name: PSLVERR, width: 1,  direction: output, description: APB slave error }
    - name: gpio_output
      type: custom
      clock_domain: pclk
      reset_domain: presetn
      description: 8-bit GPIO output pins driven by DATA register
      ports:
        - { name: gpio_out, width: 8, direction: output, description: GPIO output (mirrors DATA register) }

features:
  - name: APB CSR access
    trigger: APB master initiates read/write on PSEL/PENABLE phases.
    datapath: Address decode selects DATA register; PWDATA latches into DATA on write access phase; PRDATA returns DATA on read access phase.
    control: PREADY immediate (0-wait-state).
    output: DATA register update + PRDATA readback.
  - name: GPIO drive
    trigger: DATA register changes via APB write.
    datapath: gpio_out always reflects DATA[GPIO_WIDTH-1:0].
    control: Combinational drive from registered DATA.
    output: gpio_out tracks DATA.

registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved bits read zero, writes ignored.
  register_list:
    - name: DATA
      offset: 0x0
      width: 32
      access: rw
      reset: 0x00000000
      category: data
      description: GPIO output data register (low GPIO_WIDTH bits drive gpio_out)
      write_side_effects:
        - "Lower 8 bits update gpio_out on the next rising PCLK after access phase completes."
      fields:
        - { name: data, bits: [7, 0], access: rw, reset: 0, write_effect: Drives gpio_out, description: GPIO output value }
        - { name: reserved_31_8, bits: [31, 8], access: reserved, reset: 0, read_value: 0, write_effect: ignore, description: Reserved }

memory:
  instances: []
  note: No internal FIFO/SRAM — single register.

interrupts:
  sources: []
  output: null
  note: No interrupts.

fsm:
  apb_phase:
    states: [IDLE, SETUP, ACCESS]
    transitions:
      - { from: IDLE,   to: SETUP,  condition: "psel == 1 and penable == 0" }
      - { from: SETUP,  to: ACCESS, condition: "psel == 1 and penable == 1" }
      - { from: ACCESS, to: IDLE,   condition: "psel == 0" }
      - { from: IDLE,   to: IDLE,   condition: "psel == 0" }
    note: Standard APB-Lite slave handshake. Always-ready (PREADY=1 in ACCESS).

rtl_contract:
  transaction: FM1
  clock: PCLK
  reset: PRESETn
  reset_active: low
  sample_condition: "PRESETn == 1"
  input_map:
    psel: PSEL
    penable: PENABLE
    pwrite: PWRITE
    paddr: PADDR
    pwdata: PWDATA
  output_map:
    prdata: PRDATA
    pready: PREADY
    pslverr: PSLVERR
    gpio_out: gpio_out

function_model:
  purpose: Executable behavioral contract for FL/CL co-sim
  state_variables:
    - { name: gpio_data, source: registers.DATA.data, reset: 0, description: "Backing storage for DATA register's data field; drives gpio_out" }
  transactions:
    - id: FM1
      name: apb_write_data
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1", "paddr == 0"]
      inputs: [pwdata]
      outputs: ["DATA register updates to pwdata & 0xff; gpio_out tracks DATA"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1, description: APB always-ready slave }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1, description: No slave error in this demo }
        - { name: gpio_out_rule, port: gpio_out, expr: "pwdata & 0xff", width: 8, description: gpio_out reflects new DATA value }
      state_updates:
        - { name: gpio_data, expr: "pwdata & 0xff", width: 8 }
      side_effects: ["DATA register updated"]
      error_cases: []
    - id: FM2
      name: idle_or_read
      preconditions: ["pwrite == 0 or psel == 0 or penable == 0"]
      inputs: [paddr]
      outputs: ["gpio_out holds previous DATA; PRDATA returns DATA on read; PREADY=1; PSLVERR=0"]
      output_rules:
        - { name: pready_rule,   port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule,  port: PSLVERR, expr: 0, width: 1 }
        - { name: gpio_out_rule, port: gpio_out, expr: "gpio_data & 0xff", width: 8 }
        - { name: prdata_rule,   port: PRDATA,  expr: "gpio_data if (psel == 1 and penable == 1 and pwrite == 0 and paddr == 0) else 0", width: 32 }
      state_updates:
        - { name: gpio_data, expr: gpio_data, width: 8 }
      side_effects: []
      error_cases: []
  invariants:
    - gpio_out always equals DATA register low 8 bits.
    - PREADY is always 1 (zero-wait-state slave).
    - PSLVERR is always 0 in this demo.

cycle_model:
  purpose: Cycle contract — APB always-ready 0-wait-state slave.
  executable: python
  cosim: true
  clock: PCLK
  reset:
    assertion: PRESETn low clears DATA to 0 and drives gpio_out=0.
    deassertion: First rising PCLK after deassertion enables register updates.
  latency:
    apb_write: { min_cycles: 1, max_cycles: 1, description: DATA updates one cycle after access phase rising edge }
    apb_read:  { min_cycles: 0, max_cycles: 0, description: PRDATA is combinational from DATA in access phase }
  handshake_rules:
    - { signal: PREADY, rule: Always asserted (1). 0-wait-state slave. }
    - { signal: PRDATA, rule: Valid in access phase for reads. Mirrors DATA when paddr==0. }
  pipeline:
    - { stage: S0_DECODE, cycle: 0, action: "Address decode and access-phase capture (psel & penable)." }
    - { stage: S1_UPDATE, cycle: 1, action: "On write, latch pwdata into DATA. gpio_out tracks DATA." }
  ordering:
    - "DATA update occurs on the rising edge that completes the ACCESS phase (PSEL=1, PENABLE=1, PWRITE=1)."
    - "gpio_out follows DATA combinationally — same cycle as DATA update."
  backpressure:
    - "No backpressure — PREADY=1 always."
  performance:
    frequency_mhz: 50
    throughput: { writes_per_cycle: 1, condition: APB master keeps PSEL/PENABLE asserted }
  observability:
    - Every transaction maps to APB phase + gpio_out drive.

clock_reset_domains:
  domains:
    - { name: PCLK, frequency_mhz: 50, description: APB clock }
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: pwdata, sink: gpio_out, path: "PWDATA → DATA register (registered) → gpio_out (combinational)" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]
  note: Single domain, always on.

security:
  classifications: []
  note: No protected registers in this demo.

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources in this minimal demo", architectural_effect: "PSLVERR always 0" }

debug_observability:
  signals:
    - { name: DATA, source: registers.DATA, description: GPIO data register }

dft:
  scan: { enabled: false, note: "Demo IP — DFT not applied." }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [PCLK, PRESETn, PADDR, PSEL, PENABLE, PWRITE, PWDATA, PRDATA, PREADY, PSLVERR, gpio_out]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file under atlas_flow_gpio_demo/rtl/."

test_requirements:
  scenarios:
    - id: SC1
      name: APB write 0x55 to DATA
      stimulus: "APB write 0x55 to offset 0; observe gpio_out=0x55 next cycle."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x55 } }
      expected: "DATA=0x55, gpio_out=0x55, PREADY=1, PSLVERR=0"
      checker: "Scoreboard compares gpio_out and DATA register state."
      coverage: [FM1, gpio_drive]
    - id: SC2
      name: APB write 0xAA
      stimulus: "APB write 0xAA; observe gpio_out=0xAA."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xAA } }
      expected: "DATA=0xAA, gpio_out=0xAA"
      checker: "Same as SC1 with different data."
      coverage: [FM1, gpio_drive]
    - id: SC3
      name: Reset behaviour
      stimulus: "Assert PRESETn low; observe DATA=0, gpio_out=0."
      expected: "DATA=0, gpio_out=0 after reset deassertion."
      checker: "Scoreboard verifies reset values."
      coverage: [reset]
    - id: SC4
      name: APB write all-zeros
      stimulus: "APB write 0x00 to DATA."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x00 } }
      expected: "DATA=0, gpio_out=0"
      checker: "Scoreboard verifies all-zero output."
      coverage: [FM1]
    - id: SC5
      name: APB write maximum
      stimulus: "APB write 0xFF; observe gpio_out=0xFF (all bits set)."
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xFF } }
      expected: "DATA=0xFF, gpio_out=0xFF"
      checker: "Verifies full-range output."
      coverage: [FM1, gpio_drive]
  scoreboard_checks:
    - DATA register write-then-read parity
    - gpio_out follows DATA
    - PREADY=1 always
    - PSLVERR=0 always
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: DEMO_DONE, description: "Created via the ATLAS flow trial demo flow", status: planned }
