# =============================================================================
# pwm_gen_cx1.ssot.yaml — 8-bit PWM generator with duty-cycle register
# Simple 8-bit counter, compare against DUTY register, output pwm_out.
# =============================================================================
top_module:
  name: pwm_gen_cx1
  file: rtl/pwm_gen_cx1.sv
  version: "1.0"
  type: peripheral
  description: "8-bit PWM generator. Counter counts 0-255 per period. pwm_out=1 when counter < DUTY register."
  reference_spec: "user-defined"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: counter, kind: datapath, source_refs: [function_model.transactions], rtl_candidates: [pwm_gen_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: compare, kind: datapath, source_refs: [function_model.transactions], rtl_candidates: [pwm_gen_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: csr_decode, kind: control, source_refs: [registers.register_list], rtl_candidates: [pwm_gen_cx1], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: pwm_gen_cx1
    file: rtl/pwm_gen_cx1.sv
    ownership: manifest
    ssot_gen: true
    wiring_only: false
    source_sections: [io_list, registers, function_model]
    implements: [io_list.interfaces, registers.register_list, function_model.transactions]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM_WRITE, function_model.transactions.FM_TICK]
    description: "8-bit free-running counter compared against DUTY register to generate PWM output."

parameters:
  - { name: WIDTH, default: 8, type: int, description: "Counter and DUTY register width" }

io_list:
  clock_domains:
    - name: clk
      frequency_mhz: 50
      description: "System clock"
      ports:
        - { name: clk, width: 1, direction: input, description: "System clock" }
  resets:
    - name: rst_n
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "Active-low reset"
      ports:
        - { name: rst_n, width: 1, direction: input, description: "Active-low asynchronous reset" }
  interfaces:
    - name: duty_in
      type: custom
      clock_domain: clk
      reset_domain: rst_n
      description: "Duty cycle register write interface"
      protocol:
        write_rule: "duty_reg latches duty_in when wr_en is asserted on rising clock edge."
        timing_rule: "duty_in must be stable when wr_en is high."
      ports:
        - { name: duty_in,  width: 8, direction: input,  description: "Duty cycle value (0-255)" }
        - { name: wr_en,    width: 1, direction: input,  description: "Write enable for duty register" }
        - { name: pwm_out,  width: 1, direction: output, description: "PWM output (1 when counter < duty_reg)" }

features:
  - name: PWM generation
    trigger: Free-running 8-bit counter wraps 0-255 every 256 clock cycles.
    datapath: "counter_q counts 0..255; pwm_out = (counter_q < duty_reg)."
    control: wr_en captures duty_in into duty_reg.
    output: pwm_out duty cycle equals duty_reg/256.
  - name: Duty cycle register write
    trigger: wr_en asserted high.
    datapath: duty_reg latches duty_in value.
    control: Registered on rising clock edge.
    output: duty_reg updated; next PWM period reflects new duty.

registers:
  config:
    register_width: 8
    addr_width: 1
    byte_addressable: false
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved bits read zero, writes ignored.
  register_list:
    - name: DUTY
      offset: 0x0
      width: 8
      access: rw
      reset: 0x00
      category: data
      description: "PWM duty cycle register. pwm_out=1 when counter < DUTY."
      fields:
        - { name: duty, bits: [7, 0], access: rw, reset: 0, write_effect: "Sets PWM high time as duty/256 of period", description: "Duty cycle value 0-255" }

memory:
  instances: []
  note: No internal SRAM.

interrupts:
  sources: []
  output: null
  note: No interrupts.

fsm:
  note: "No explicit FSM; free-running counter increments every cycle."

rtl_contract:
  top_module_file: "rtl/pwm_gen_cx1.sv"
  top_module: pwm_gen_cx1
  clock: clk
  reset: rst_n
  reset_active: low
  reset_polarity: active_low
  reset_type: async_assert_sync_deassert
  clock_gating: false
  sample_condition: "rst_n == 1"
  observable_outputs:
    - pwm_out
  behavioral_contract_refs: [BC_PWM_COUNT, BC_PWM_DUTY, BC_PWM_RESET, BC_PWM_LINT]
  structural_contract_refs: [SC_PWM_PORTS]
  input_map:
    duty_in: duty_in
    wr_en: wr_en
  output_map:
    pwm_out: pwm_out
  rules:
    - { id: ASYNC_RESET, description: "rst_n=0 async-clears counter_q and duty_reg to 0" }
    - { id: COUNTER_INC, description: "counter_q increments by 1 each cycle, wraps 0..255" }
    - { id: DUTY_LATCH, description: "duty_reg latches duty_in on rising clk when wr_en=1" }
    - { id: PWM_COMPARE, description: "pwm_out = (counter_q < duty_reg) combinationally" }

function_model:
  purpose: "Executable behavioral contract for FL/CL co-sim"
  state_variables:
    - { name: fl_duty, source: registers.DUTY.duty, reset: 0, description: "FL internal: stored duty cycle value" }
    - { name: fl_ctr,  source: "internal counter", reset: 0, description: "FL internal: 8-bit free-running counter 0-255" }
  transactions:
    - id: FM_WRITE
      name: duty_write
      preconditions: ["wr_en == 1"]
      inputs: [duty_in]
      outputs: ["duty_reg latches duty_in next clock; pwm_out = (counter < duty_reg) using old duty_reg this cycle"]
      output_rules:
        - { name: pwm_out_rule, port: pwm_out, expr: "1 if fl_ctr < fl_duty else 0", width: 1, description: "pwm_out uses old fl_duty this cycle (duty_reg latches next clock)" }
      state_updates:
        - { name: fl_duty, expr: "duty_in & 0xff", width: 8 }
        - { name: fl_ctr,  expr: "(fl_ctr + 1) & 0xff", width: 8 }
      side_effects: ["fl_duty updated on next clock"]
      error_cases: []
    - id: FM_TICK
      name: counter_tick
      preconditions: ["wr_en == 0"]
      inputs: []
      outputs: ["fl_ctr increments; pwm_out = (fl_ctr < fl_duty)"]
      output_rules:
        - { name: pwm_out_rule, port: pwm_out, expr: "1 if fl_ctr < fl_duty else 0", width: 1, description: "PWM compare output" }
      state_updates:
        - { name: fl_ctr, expr: "(fl_ctr + 1) & 0xff", width: 8 }
      side_effects: []
      error_cases: []
  invariants:
    - "counter wraps from 255 to 0."
    - "pwm_out = (counter_q < duty_reg) combinationally."
    - "duty_reg resets to 0 on rst_n low."

cycle_model:
  purpose: "Cycle contract for PWM generator."
  executable: python
  cosim: true
  clock: clk
  reset:
    assertion: "rst_n low clears counter_q and duty_reg to 0; pwm_out=0."
    deassertion: "First rising clk after deassertion enables counter and compare."
  latency:
    duty_update: { min_cycles: 1, max_cycles: 1, description: "DUTY register updates one clock after wr_en" }
    pwm_compare: { min_cycles: 0, max_cycles: 0, description: "pwm_out is combinational from counter_q and duty_reg" }
  handshake_rules:
    - { signal: pwm_out, rule: "Combinational compare of counter_q < duty_reg." }
  pipeline:
    - { stage: S0_COMPARE, cycle: 0, action: "counter_q compared to duty_reg; pwm_out drives." }
    - { stage: S1_COUNT,   cycle: 1, action: "counter_q increments; duty_reg updates if wr_en." }
  ordering:
    - "counter_q increments every rising clock edge."
    - "duty_reg latches duty_in on rising edge when wr_en=1."
    - "pwm_out tracks counter_q < duty_reg combinationally."
  backpressure:
    - "No backpressure."
  performance:
    frequency_mhz: 50
    throughput: { writes_per_cycle: 1, condition: "wr_en asserted" }
  observability:
    - "Every period transition is observable via counter_q and pwm_out."

clock_reset_domains:
  domains:
    - { name: clk, frequency_mhz: 50, description: "System clock" }
  reset_scheme:
    signal: rst_n
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: duty_in, sink: pwm_out, path: "duty_in -> duty_reg (registered) -> compare with counter_q -> pwm_out (combinational)" }
    - { id: sequence_1, source: clk, sink: pwm_out, path: "clk -> counter_q (registered) -> compare with duty_reg -> pwm_out (combinational)" }

power:
  domains:
    - { name: PD_MAIN, voltage: nominal, clock_domains: [clk], isolation: not_required_single_domain }
  modes: ["ON"]
  power_states:
    - { name: ON, entry: "rst_n deasserted", exit: "rst_n asserted", guarantees: ["counter and PWM active"] }
  clock_gating:
    required: false
    rationale: "Simple free-running counter; no low-power mode."
  reset_retention:
    retention_required: false
    reset_value_source: "registers.DUTY.reset"
  upf_required: false
  note: Single domain, always on.

security:
  classification: non_secure_peripheral
  classifications: []
  assets:
    - { name: DUTY_register, protection: "External control; IP has no internal privilege." }
  threat_model:
    - { threat: "Unprivileged write", mitigation: "Handled by external fabric." }
  privilege_model: "External bus fabric enforces privilege."
  safety_goals:
    - "No hidden state; reset clears counter and DUTY."
  note: No protected registers.

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources in this minimal IP", architectural_effect: "N/A" }
  propagation:
    - "No errors are generated."
  recovery:
    - { action: reset, clears: [DUTY, counter], preserves: [], description: "rst_n clears counter_q and duty_reg." }

debug_observability:
  waveform_must_probe:
    - clk
    - rst_n
    - duty_in
    - wr_en
    - pwm_out
    - counter_q
    - duty_reg
  status_outputs:
    - pwm_out
  trace_events:
    - { name: duty_write, trigger: "wr_en == 1" }
    - { name: counter_wrap, trigger: "counter_q == 255" }
  debug_registers:
    - DUTY
  signals:
    - { name: DUTY, source: registers.DUTY, description: "Duty cycle register" }

dft:
  scan: { enabled: false, note: "Simple IP — DFT not applied." }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }
  dialect: systemverilog_2012
  top_module: pwm_gen_cx1
  technology:
    pdk: generic
    standard_cell_library: generic
  constraints:
    - "No inferred latches."
    - "All architectural flops reset by rst_n."
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - syn/out/pwm_gen_cx1.v
    - syn/out/area.rpt
    - syn/out/timing_summary.rpt

integration:
  top_ports: [clk, rst_n, duty_in, wr_en, pwm_out]
  bus_attachment:
    control: "Custom register write interface"
    data: "pwm_out custom output"
  connections: []
  address_map_requirements:
    alignment_bytes: 1
    decode_owner: "SoC controller"
    illegal_access_response: "No-op for out-of-range wr_en."
  dependencies:
    external_modules: []
    external_clocks: [clk]
    external_resets: [rst_n]
  integration_notes:
    - "Connect clk/rst_n to system clock/reset domain."
    - "Assert wr_en for one cycle to update DUTY register."

quality_gates:
  ssot:
    pass: "All required engineering SSOT sections present and free of TBD."
    evidence: ["verify_ssot engineering PASS"]
  rtl:
    pass: "RTL implements DUTY register, 8-bit counter, and combinational pwm_out compare."
    evidence: ["rtl/pwm_gen_cx1.sv", "rtl/rtl_compile.json"]
  dv:
    pass: "DV scenarios cover reset, DUTY write, and PWM output verification."
    evidence: ["verify/equivalence_goals.json", "sim/scoreboard_events.jsonl"]
  sim:
    pass: "Simulation completes with TESTS>=1 PASS>=1 FAIL=0."
    evidence: ["sim/results.xml", "sim/scoreboard_events.jsonl"]

test_requirements:
  scenarios:
    - id: SC1
      name: Reset defaults
      stimulus: "Assert rst_n low; observe pwm_out=0."
      stimulus_machine_spec:
        timeline:
          - { reset: true }
      expected: "counter_q=0, duty_reg=0, pwm_out=0"
      checker: "Scoreboard verifies reset values."
      coverage: [reset]
    - id: SC2
      name: DUTY=0 gives pwm_out=0
      stimulus: "Set duty_in=0, wr_en=1 for one cycle; observe pwm_out=0 for all counter values."
      stimulus_machine_spec:
        timeline:
          - { wr_en: 1, duty_in: 0 }
          - { wr_en: 0 }
      expected: "pwm_out=0 always"
      checker: "Scoreboard checks pwm_out=0."
      coverage: [FM_WRITE, FM_TICK]
    - id: SC3
      name: DUTY=128 gives ~50% duty cycle
      stimulus: "Set duty_in=128, wr_en=1; run 256 cycles; verify pwm_out=1 for counter<128."
      stimulus_machine_spec:
        timeline:
          - { wr_en: 1, duty_in: 128 }
          - { wr_en: 0, cycles: 256 }
      expected: "pwm_out=1 for 128 cycles, pwm_out=0 for 128 cycles per period"
      checker: "Scoreboard counts high/low cycles."
      coverage: [FM_WRITE, FM_TICK]
    - id: SC4
      name: DUTY=255 gives pwm_out=1 almost always
      stimulus: "Set duty_in=255, wr_en=1; run 256 cycles."
      stimulus_machine_spec:
        timeline:
          - { wr_en: 1, duty_in: 255 }
          - { wr_en: 0, cycles: 256 }
      expected: "pwm_out=1 for counter=0..254, pwm_out=0 for counter=255"
      checker: "Scoreboard verifies 255 high cycles out of 256."
      coverage: [FM_WRITE, FM_TICK]
  scoreboard_checks:
    - "pwm_out = (counter_q < duty_reg) each cycle"
    - "duty_reg latches duty_in when wr_en=1"
    - "counter_q wraps 0-255"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      bins:
        - { id: FCOV_FM_WRITE, source_ref: function_model.transactions.FM_WRITE, class: transaction, description: "Duty register write observed" }
        - { id: FCOV_FM_TICK,  source_ref: function_model.transactions.FM_TICK,  class: transaction, description: "Counter tick observed" }
    cycle:
      target_pct: 100
      model: cycle_model
      bins:
        - { id: CCOV_RESET,      source_ref: cycle_model.reset,                         class: reset,   description: "Reset observed" }
        - { id: CCOV_DUTY_UPDATE, source_ref: cycle_model.latency.duty_update,           class: latency, description: "Duty update latency observed" }
        - { id: CCOV_PWM_HIGH,   source_ref: cycle_model.handshake_rules,                 class: handshake, description: "pwm_out=1 observed" }

workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: RTL_IMPLEMENT_PWM
      content: "Implement 8-bit PWM generator with DUTY register and free-running counter"
      detail: "Implement pwm_gen_cx1.sv: 8-bit counter, DUTY register with wr_en, pwm_out = (counter_q < duty_reg) combinational."
      criteria:
        - "RTL top ports match io_list."
        - "counter_q wraps 0-255 on every clock."
        - "duty_reg latches duty_in when wr_en=1."
        - "pwm_out = (counter_q < duty_reg) combinationally."
        - "Reset clears counter_q and duty_reg to 0."
      source_refs: [io_list, registers.DUTY, function_model.transactions.FM_WRITE, function_model.transactions.FM_TICK]
      owner_module: pwm_gen_cx1
      owner_file: rtl/pwm_gen_cx1.sv
      priority: high
      required: true
  tb-gen:
    - id: TB_COVER_PWM_SCENARIOS
      content: "Generate cocotb scoreboard for reset, DUTY write, and PWM output scenarios"
      detail: "Drive SC1-SC4 and verify pwm_out against FunctionalModel each cycle."
      criteria:
        - "All declared scenarios exercised."
        - "Scoreboard reports zero mismatches."
      source_refs: [test_requirements.scenarios, function_model]

cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required."

rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single active-low rst_n reset domain — no RDC required."

timing:
  target_clocks:
    - { name: clk, frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.1 }
  latency_budget:
    duty_update_cycles: { min: 1, max: 1, measured_from: "wr_en assert", measured_to: "duty_reg update" }
    pwm_compare_cycles: { min: 0, max: 0, measured_from: "counter_q update", measured_to: "pwm_out" }
  throughput:
    period_cycles: 256
    conditions: "8-bit counter free-running."
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "duty_in wr_en", clock: clk, delay_ns: 0.2, source: "demo timing budget" }
    outputs:
      - { ports: "pwm_out", clock: clk, delay_ns: 0.2, source: "demo timing budget" }
  false_paths:
    - { from: rst_n, to: all_registers, reason: "async reset assertion" }
  multicycle_paths: []

coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  conventions:
    - "Use ANSI SystemVerilog ports."
    - "Use nonblocking assignments in sequential logic."
    - "No inferred latches."
    - "Reset architectural state from rst_n."
  lint_waivers: []

reuse_modules: []

custom:
  assumptions:
    - "Free-running 8-bit counter; no period control beyond DUTY compare."
  notes:
    - "Cursor agent simulation exercise IP."

dir_structure:
  output_dirs:
    req: req/
    yaml: yaml/
    rtl: rtl/
    list: list/
    model: model/
    verify: verify/
    tb: tb/
    sim: sim/
  yaml_dir: yaml/

filelist:
  headers: []
  rtl:
    - rtl/pwm_gen_cx1.sv
  sim:
    - tb/cocotb/test_pwm_gen_cx1.py
  docs:
    - req/pwm_gen_cx1_requirements.md

traceability:
  yaml_to_output:
    - { yaml: top_module.name, output: rtl/pwm_gen_cx1.sv }
    - { yaml: function_model.transactions.FM_TICK, output: model/functional_model.py }
    - { yaml: test_requirements.scenarios, output: tb/cocotb/test_pwm_gen_cx1.py }
  requirement_to_yaml:
    - { requirement: REQ1_COUNTER, yaml: function_model.state_variables.counter }
    - { requirement: REQ2_DUTY_REG, yaml: registers.register_list.DUTY }
    - { requirement: REQ3_PWM_OUT, yaml: function_model.transactions.FM_TICK }

generation_flow:
  steps:
    - { name: emit_fl_model, command: "python3 workflow/fl-model-gen/scripts/emit_fl_model.py pwm_gen_cx1 --root .", description: "Generate FunctionalModel." }
    - { name: emit_equivalence_goals, command: "python3 workflow/fl-model-gen/scripts/emit_equivalence_goals.py pwm_gen_cx1 --root .", description: "Generate equivalence goals." }
    - { name: emit_tb, command: "python3 workflow/tb-gen/scripts/emit_goal_scoreboard_cocotb.py pwm_gen_cx1 --root .", description: "Generate goal-driven TB scoreboard." }
    - { name: sim, command: "cd pwm_gen_cx1/tb/cocotb && python3 test_runner.py", description: "Run simulation." }
