# clkdiv SSOT — Phase 1: Skeleton
# Written in incremental mode; sections populated via replace_in_file

ip: clkdiv
version: "1.0"
purpose: "Programmable clock divider APB IP. Divides pclk by (DIVVAL+1) to produce a configurable clkout. Supports enable/disable control, divide-by-zero prevention, and optional interrupt on divider rollover."
type: peripheral
top_module:
  name: "clkdiv"
  file: "rtl/clkdiv.sv"
  version: "1.0"
  type: "peripheral"
  description: "Programmable clock divider with APB register interface"
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "clkdiv_regs", file: "rtl/clkdiv_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "interrupts"], source_sections: ["registers", "interrupts"], register_refs: ["registers.register_list"], description: "APB register decode and storage" }
  - { name: "clkdiv_core", file: "rtl/clkdiv_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "features"], source_sections: ["function_model", "cycle_model", "features"], function_model_refs: ["function_model.state_variables", "function_model.transactions"], cycle_model_refs: ["cycle_model.pipeline"], feature_refs: ["features"], description: "Divider counter, comparator, and clkout generation" }
decomposition:
  units:
    - { id: "register_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["clkdiv_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "divider_logic", kind: "datapath/control", source_refs: ["function_model.transactions", "cycle_model.pipeline"], rtl_candidates: ["clkdiv_core"], verification_impact: ["coverage_plan.functional", "coverage_plan.cycle"] }
parameters:
  - name: "DIV_WIDTH"
    default: 8
    type: int
    description: "Divider value register width in bits (max divide = 2^DIV_WIDTH - 1)"
    drives: ["clkdiv_regs.sv", "clkdiv_core.sv"]
  - name: "APB_ADDR_WIDTH"
    default: 12
    type: int
    description: "APB address bus width"
    drives: ["clkdiv_regs.sv"]
  - name: "APB_DATA_WIDTH"
    default: 32
    type: int
    description: "APB data bus width"
    drives: ["clkdiv_regs.sv"]
  - name: "DIV_MIN"
    default: 1
    type: int
    description: "Minimum divider value (0 is clamped to DIV_MIN to prevent runt pulses)"
    drives: ["clkdiv_core.sv"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "Main peripheral clock"
      ports:
        - { name: "pclk", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Main reset"
      ports:
        - { name: "presetn", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Register access interface"
      protocol:
        setup_phase: "psel=1, penable=0 captures address/control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata/pstrb are sampled in the completing access phase for writes."
        error_rule: "pslverr is asserted only with pready=1 for illegal or unsupported access."
      ports:
        - { name: "paddr",   width: 12, direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }
    - name: "clkout"
      type: "custom"
      role: "output"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Divided clock output"
      protocol:
        toggle_rule: "clkout toggles when counter reaches active_div and CTRL.enable==1."
        enable_rule: "When CTRL.enable==0, clkout is held low."
        reset_rule: "On presetn assertion, clkout is driven low asynchronously."
      ports:
        - { name: "clkout", width: 1, direction: "output", description: "Divided clock output" }
    - name: "interrupt"
      type: "custom"
      role: "output"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "Rollover interrupt output"
      protocol:
        assertion: "clkdiv_irq is asserted for one cycle when counter rolls over and CTRL.irq_en==1."
        deassertion: "Single-cycle pulse; no W1C required."
        reset_value: 0
      ports:
        - { name: "clkdiv_irq", width: 1, direction: "output", description: "Rollover interrupt" }
features:
  - name: "programmable_divider"
    trigger: "APB write to DIVVAL register"
    datapath: "DIVVAL -> shadow_div -> active_div after next rollover"
    control: "counter counts from 0 to active_div; on match, toggle clkout and reset counter"
    output: "clkout with frequency = pclk / (2 * (active_div + 1))"
  - name: "enable_disable"
    trigger: "APB write to CTRL.enable"
    datapath: "CTRL.enable gates clkout and counter"
    control: "When disabled, counter resets and clkout held low"
    output: "clkout low when disabled"
  - name: "divide_by_zero_prevention"
    trigger: "APB write DIVVAL < DIV_MIN"
    datapath: "DIVVAL clamped to DIV_MIN before use"
    control: "Silent clamp in clkdiv_core; no error flag"
    output: "Guaranteed minimum division ratio"
  - name: "rollover_interrupt"
    trigger: "Counter reaches active_div and CTRL.irq_en==1"
    datapath: "Single-cycle pulse on clkdiv_irq"
    control: "Pulse generated synchronously on pclk"
    output: "clkdiv_irq pulse"
dataflow:
  control_path:
    source: "APB write to CTRL"
    destination: "clkdiv_core.ctrl_enable"
    sequence: "pwdata -> register decode -> ctrl_enable"
  divider_path:
    source: "APB write to DIVVAL"
    buffer: "shadow_div register (updated immediately)"
    destination: "active_div (loaded at next rollover)"
    sequence: "pwdata -> DIVVAL -> shadow_div -> active_div @ rollover"
  clock_path:
    source: "pclk"
    control: "active_div, ctrl_enable"
    destination: "clkout"
    sequence: "pclk -> counter -> comparator -> clkout toggle"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the IP computes independent of cycle timing."
  state_variables:
    - { name: "divval", source: "registers.DIVVAL", reset: 0, description: "Divider value from APB (clamped to DIV_MIN if below)" }
    - { name: "ctrl_enable", source: "registers.CTRL.enable", reset: 0, description: "Enable control bit" }
    - { name: "ctrl_irq_en", source: "registers.CTRL.irq_en", reset: 0, description: "Interrupt enable bit" }
    - { name: "status_div_updated", source: "registers.STATUS.div_updated", reset: 0, description: "Divider updated flag (cleared on read)" }
    - { name: "counter", source: "clkdiv_core", reset: 0, description: "Current counter value" }
    - { name: "active_div", source: "clkdiv_core", reset: 0, description: "Currently active divider value (loaded from shadow at rollover)" }
    - { name: "shadow_div", source: "clkdiv_core", reset: 0, description: "Shadow divider value (updated immediately on DIVVAL write)" }
    - { name: "clkout_state", source: "clkdiv_core", reset: 0, description: "Current clkout output state" }
  transactions:
    - id: "FM1"
      name: "divider_update"
      preconditions:
        - "APB write to DIVVAL register with valid address and pwrite==1"
      inputs:
        - "pwdata[DIV_WIDTH-1:0] as new divider value"
      outputs:
        - "shadow_div updated immediately"
        - "active_div updates at next rollover"
        - "STATUS.div_updated set to 1"
      side_effects:
        - "If DIVVAL < DIV_MIN, clamp to DIV_MIN silently"
      error_cases:
        - { condition: "APB access to unmapped address", result: "pslverr asserted, no register change" }
    - id: "FM2"
      name: "enable_toggle"
      preconditions:
        - "APB write to CTRL register"
      inputs:
        - "pwdata enable and irq_en bits"
      outputs:
        - "ctrl_enable and ctrl_irq_en updated immediately"
      side_effects:
        - "When ctrl_enable transitions 0->1, counter and active_div reset, clkout starts toggling on next cycles"
        - "When ctrl_enable transitions 1->0, counter resets to 0, clkout held low"
    - id: "FM3"
      name: "rollover_event"
      preconditions:
        - "ctrl_enable == 1"
        - "counter == active_div"
      inputs:
        - "counter value"
      outputs:
        - "clkout_state toggles"
        - "counter resets to 0"
        - "active_div loads from shadow_div"
        - "If ctrl_irq_en==1, clkdiv_irq pulses for one cycle"
      side_effects:
        - "STATUS.div_updated cleared if it was set (optional: keep until read)"
  invariants:
    - "clkout is low when ctrl_enable == 0"
    - "active_div is never less than DIV_MIN"
    - "counter is never greater than active_div"
    - "No glitch on clkout: transitions only on pclk edges when counter == active_div"
  reference_model_hint: "tb-gen should implement a Python scoreboard model from this section and compare expected/got for every scenario."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, valid/ready, outputs, and interrupts may change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for the clocked cycle model shell; keep FunctionalModel as the behavioral oracle and run direct Python smoke checks instead of relying on pytest-pymtl3."
  clock: "pclk"
  reset:
    assertion: "presetn low asynchronously clears all architectural state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    register_read: { min_cycles: 0, max_cycles: 1, description: "APB read data and pready timing" }
    register_write: { min_cycles: 0, max_cycles: 1, description: "APB write acceptance timing" }
    divider_update: { min_cycles: 1, max_cycles: null, description: "active_div takes effect after next rollover; max bounded by active_div+1 pclk cycles" }
  handshake_rules:
    - { signal: "psel/penable", rule: "Standard APB setup/access phase; pready asserted in access phase." }
  pipeline:
    - { stage: "S0_IDLE", cycle: 0, action: "Counter increments or resets based on ctrl_enable and comparator result" }
    - { stage: "S1_COUNT", cycle: "1..N", action: "Counter increments each pclk cycle while ctrl_enable==1 and counter < active_div" }
    - { stage: "S2_ROLLOVER", cycle: "N+1", action: "On counter == active_div: toggle clkout, reset counter, load active_div from shadow_div, optionally assert clkdiv_irq" }
    - { stage: "S3_DISABLED", cycle: "0", action: "When ctrl_enable==0: counter held at 0, clkout held low" }
  ordering:
    - "APB register updates take effect on the cycle after write completion (pready high)."
    - "active_div loads from shadow_div only at rollover, not immediately."
    - "clkdiv_irq pulse occurs on the same rising edge as the rollover event."
  backpressure:
    - "APB slave is always ready (pready tied high); no backpressure on register interface."
  performance:
    frequency_mhz: 50
    throughput: { sustained_beats_per_cycle: 0.5, condition: "divval=1 produces pclk/2 toggle rate" }
    outstanding: { read_max: 0, write_max: 0, description: "No outstanding transactions in this IP" }
    depth: { pipeline_stages: 2, queue_depth: 0, description: "Simple counter-comparator pipeline" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "Main peripheral clock" }
  reset_scheme:
    signal: "presetn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain (pclk) — no CDC required within this IP. Downstream consumers of clkout must handle any CDC externally."
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "No reset domain crossings. Single presetn domain with async_assert_sync_deassert."
registers: TBD
memory:
  instances: []
  note: "No SRAM/FIFO in this IP. Storage is flip-flop based (DIVVAL, CTRL, STATUS, counter, shadow_div, active_div, clkout_state)."
