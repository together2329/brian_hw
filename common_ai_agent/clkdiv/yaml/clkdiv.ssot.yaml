workflow_todos:
  rtl-gen:
  - content: "Implement APB register decode and read mux for DIVISOR, CTRL, STATUS"
    detail: "RTL must decode three supported offsets (0x00, 0x04, 0x08), update divisor_q/enable_q on writes, mux PRDATA on reads, and assert PSLVERR for unsupported offsets. PREADY is always 1."
    criteria:
    - "DIVISOR, CTRL, STATUS read/write behavior matches function_model"
    - "Unsupported offsets assert PSLVERR and return PRDATA=0"
    - "PREADY is permanently high"
    source_refs:
    - registers.register_list
    - io_list.interfaces.apb_slave
    - function_model.transactions.FM_APB_WRITE_DIVISOR
    - function_model.transactions.FM_APB_WRITE_CTRL
    - function_model.transactions.FM_APB_READ_REGISTER
    - function_model.transactions.FM_APB_ERROR
    owner_module: clkdiv_structure
    owner_file: rtl/clkdiv_structure.sv
    priority: high
    required: true
  - content: "Implement counter-based clock divider with output toggle"
    detail: "RTL must implement a COUNTER_WIDTH-bit counter that increments each PCLK cycle when enabled. Compute effective_divisor = divisor_q + 1, half_period = (effective_divisor + 1) >> 1. Toggle clkdiv_o based on counter < half_period. Wrap counter at effective_divisor - 1. Relatch effective_divisor/half_period on wrap."
    criteria:
    - "counter increments each PCLK cycle when enable_q=1"
    - "counter wraps at effective_divisor_q - 1"
    - "clkdiv_o = enable_q ? (counter_q < half_period_q) : 0"
    - "effective_divisor_q and half_period_q relatch on counter wrap"
    - "enable_q=0 forces counter_q=0 and clkdiv_o=0"
    source_refs:
    - function_model.transactions.FM_CLOCK_DIVIDE
    - function_model.state_variables
    - cycle_model.pipeline.S2_COUNTER_UPDATE
    - cycle_model.pipeline.S3_OUTPUT_TOGGLE
    - fsm.control
    owner_module: clkdiv_structure
    owner_file: rtl/clkdiv_structure.sv
    priority: high
    required: true
  - content: "Implement top wrapper with named port connections"
    detail: "Top module clkdiv must expose all SSOT top_ports, instantiate clkdiv_structure with named port connections per integration.connections, and list both RTL files in compile order."
    criteria:
    - "clkdiv module exists with all SSOT-declared ports"
    - "clkdiv_structure instantiated with named connections"
    - "list/clkdiv.f lists both RTL files in correct order"
    source_refs:
    - top_module
    - io_list.top_ports
    - integration.connections
    - filelist.rtl
    owner_module: clkdiv
    owner_file: rtl/clkdiv.sv
    priority: high
    required: true

