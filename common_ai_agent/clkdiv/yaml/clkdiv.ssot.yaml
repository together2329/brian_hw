# =============================================================================
# clkdiv.ssot.yaml — Configurable Clock Divider — Single Source of Truth
# =============================================================================
top_module:
  name: "clkdiv"
  file: "rtl/clkdiv.sv"
  version: "1.0"
  type: "peripheral"
  description: "Configurable clock divider that divides input clock PCLK by a programmable ratio and produces a gated output clock CLKOUT."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "clkdiv_regs", file: "rtl/clkdiv_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "io_list.interfaces.apb_slave"], source_sections: ["registers", "io_list"], register_refs: ["registers.register_list"], description: "APB-lite register decode and storage" }
  - { name: "clkdiv_core", file: "rtl/clkdiv_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "fsm", "features"], source_sections: ["function_model", "cycle_model", "fsm", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables", "function_model.output_rules"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], fsm_refs: ["fsm.counter_toggle"], description: "Counter/toggle clock divider core logic" }
decomposition:
  units:
    - { id: "csr_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["clkdiv_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "counter_toggle", kind: "datapath", source_refs: ["function_model.transactions", "cycle_model.pipeline"], rtl_candidates: ["clkdiv_core"], verification_impact: ["coverage_goals.function", "coverage_goals.cycle"] }
parameters:
  - { name: "DIV_WIDTH", default: 16, type: int, description: "Counter width in bits; sets maximum division ratio to 2^DIV_WIDTH-1", drives: ["clkdiv_core.sv", "clkdiv_regs.sv"] }
  - { name: "PCLK_FREQ_MHZ", default: 50, type: int, description: "Input clock frequency in MHz for documentation/timing", drives: ["tb_top.sv", "docs/README.md"] }
  - { name: "DEFAULT_DIV_RATIO", default: 2, type: int, description: "Power-on division ratio value loaded into DIV_RATIO register", drives: ["clkdiv_regs.sv", "clkdiv_core.sv"] }
  - { name: "RESET_POLARITY", default: "active_low", type: enum, values: ["active_low", "active_high"], drives: ["ALL .sv files"] }
  - { name: "APB_ADDR_WIDTH", default: 12, type: int, description: "APB address bus width", drives: ["clkdiv_regs.sv"] }
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Main input clock — the clock being divided"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "Input clock to be divided" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Main reset — asynchronously asserts, synchronously deasserts"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low asynchronous reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      description: "APB-lite CSR interface for runtime configuration"
      protocol:
        setup_phase: "psel=1, penable=0 captures address and control."
        access_phase: "psel=1, penable=1 completes when pready=1."
        read_rule: "prdata is valid in the completing access phase for reads."
        write_rule: "pwdata is sampled in the completing access phase for writes."
        error_rule: "pslverr is never asserted (APB-lite — no error response)."
      ports:
        - { name: "PADDR",   width: 12, direction: "input",  description: "APB address bus" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write (1=write, 0=read)" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready (always 1 — zero wait-state)" }
    - name: "clkout"
      type: "custom"
      description: "Divided output clock"
      ports:
        - { name: "CLKOUT", width: 1, direction: "output", description: "Divided output clock (gated by output_enable)" }
features:
  - name: "Clock Division"
    trigger: "CTRL.enable asserted and DIV_RATIO >= 2"
    datapath: "Counter increments each PCLK rising edge; on terminal count (counter == DIV_RATIO-1) the output toggle register flips and counter resets to 0"
    control: "IDLE when disabled; COUNTING when enabled"
    output: "CLKOUT = toggle_register when output_enable=1, else 0"
  - name: "Runtime Configuration"
    trigger: "APB write to CTRL or DIV_RATIO register"
    datapath: "Software writes CTRL.enable, CTRL.output_enable, and DIV_RATIO via APB; changes take effect on the next PCLK rising edge after register write completes"
    control: "No FSM change required — register values are combinational inputs to the counter/toggle logic"
    output: "Updated configuration reflected in CLKOUT behavior within 1..DIV_RATIO cycles"
  - name: "Output Gating"
    trigger: "CTRL.output_enable = 0"
    datapath: "CLKOUT is driven low regardless of toggle_register state"
    control: "Counter and toggle continue operating internally so the divided phase resumes correctly when re-enabled"
    output: "CLKOUT = 0 when gated; CLKOUT = toggle_register when ungated"
  - name: "Counter Reset"
    trigger: "APB write of 1 to CTRL.counter_reset (auto-clear bit)"
    datapath: "Counter and toggle_register are synchronously cleared to 0"
    control: "Counter reset pulse is 1 cycle wide; auto-clears"
    output: "CLKOUT goes low for at least DIV_RATIO cycles after reset if output_enable=1"
dataflow:
  divide_path:
    source: "PCLK rising edge"
    counter: "Free-running counter (0 to DIV_RATIO-1) in clkdiv_core"
    toggle: "Toggle register flips when counter reaches DIV_RATIO-1"
    sequence: "PCLK ↑ → counter++ → counter == DIV_RATIO-1 → toggle_reg ^= 1 → counter = 0"
  output_path:
    source: "toggle_register"
    gate: "CTRL.output_enable AND-gate"
    sequence: "toggle_register → AND with output_enable → CLKOUT port"
  configuration_path:
    source: "APB write to CTRL or DIV_RATIO"
    sequence: "APB access_phase (PSEL=1, PENABLE=1) → register update on next PCLK ↑ → counter/toggle logic sees new values"
function_model:
  purpose: "Cycle-independent behavioral contract for clkdiv; describes what the IP computes — counter/toggle division, output gating, and register configuration effects."
  state_variables:
    - { name: "counter", source: "clkdiv_core internal", reset: 0, description: "Free-running counter that increments each PCLK cycle and wraps at DIV_RATIO" }
    - { name: "toggle_reg", source: "clkdiv_core internal", reset: 0, description: "Output toggle register; flips on terminal count to produce 50% duty cycle" }
    - { name: "ctrl_enable", source: "registers.CTRL.enable", reset: 0, description: "Counter enable from CTRL register" }
    - { name: "ctrl_output_enable", source: "registers.CTRL.output_enable", reset: 0, description: "Output clock gate from CTRL register" }
    - { name: "div_ratio", source: "registers.DIV_RATIO.div_ratio", reset: "DEFAULT_DIV_RATIO", description: "Active division ratio" }
  transactions:
    - id: "FM1"
      name: "clock_divide"
      preconditions:
        - "ctrl_enable == 1"
        - "div_ratio >= 2"
      inputs:
        - "PCLK rising edge (implicit clock tick)"
      output_rules:
        - { name: "clkout", expr: "ctrl_output_enable ? toggle_reg : 1'b0", width: 1, port: "CLKOUT", description: "Divided output clock, gated by output_enable" }
      state_updates:
        - { name: "counter", reset: 0, expr: "counter == div_ratio - 1 ? 0 : counter + 1" }
        - { name: "toggle_reg", reset: 0, expr: "counter == div_ratio - 1 ? ~toggle_reg : toggle_reg" }
      side_effects: []
      error_cases:
        - { condition: "div_ratio == 0 or div_ratio == 1 written via APB", result: "counter never reaches terminal count; CLKOUT stays in current state (stuck). No error interrupt — see custom.assumptions." }
    - id: "FM2"
      name: "counter_reset"
      preconditions:
        - "APB write of 1 to CTRL.counter_reset"
      inputs:
        - "CTRL.counter_reset = 1 (write pulse)"
      output_rules:
        - { name: "clkout", expr: "1'b0 for at least div_ratio cycles after reset (if output_enable=1)", width: 1, port: "CLKOUT", description: "CLKOUT forced low during and after counter reset" }
      state_updates:
        - { name: "counter", reset: 0, expr: "0" }
        - { name: "toggle_reg", reset: 0, expr: "0" }
      side_effects:
        - "CTRL.counter_reset auto-clears to 0 on the next PCLK cycle"
      error_cases: []
  invariants:
    - "When ctrl_enable == 0, counter and toggle_reg hold their values (no increment/toggle)."
    - "CLKOUT is always 0 when ctrl_output_enable == 0 regardless of toggle_reg."
    - "toggle_reg toggles at frequency PCLK / (2 * div_ratio), producing 50% duty cycle on CLKOUT."
    - "Register writes complete in 0 wait states (PREADY always 1)."
  reference_model_hint: "tb-gen should implement a Python model tracking counter/toggle_reg and comparing CLKOUT phase/frequency against expected PCLK/(2*div_ratio)."
cycle_model:
  purpose: "Cycle/handshake contract for clkdiv; describes when counter, toggle, and CLKOUT may change relative to PCLK edges."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for cycle-accurate shell; FunctionalModel is the behavioral oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears counter, toggle_reg, and all register storage"
    deassertion: "All state is usable on the first PCLK rising edge after synchronized deassertion"
  latency:
    register_write: { min_cycles: 0, max_cycles: 1, description: "APB write takes effect on the next PCLK rising edge (PREADY=1 means accepted)" }
    register_read: { min_cycles: 0, max_cycles: 1, description: "APB read returns register value in the same access phase (PREADY=1)" }
    output_toggle: { min_cycles: 1, max_cycles: "div_ratio", description: "CLKOUT toggles after exactly div_ratio PCLK cycles when enabled" }
  handshake_rules:
    - { signal: "PREADY", rule: "Always driven 1 — zero wait-state APB-lite slave." }
    - { signal: "CLKOUT", rule: "Changes only on PCLK rising edge when counter reaches terminal count and toggle_reg updates." }
  pipeline:
    - { stage: "S0_IDLE", cycle: 0, action: "ctrl_enable=0: counter and toggle_reg hold stable" }
    - { stage: "S1_COUNT", cycle: "1..div_ratio", action: "Counter increments each PCLK rising edge" }
    - { stage: "S2_TOGGLE", cycle: "div_ratio", action: "Counter == div_ratio-1: toggle_reg flips, counter resets to 0" }
  ordering:
    - "Counter update and toggle_reg update occur on the same PCLK rising edge when terminal count is reached."
    - "CLKOUT reflects toggle_reg (gated) combinationally after the clock edge."
  backpressure:
    - "No backpressure model — the divider is always ready to count when enabled."
  performance:
    frequency_mhz: 50
    throughput: { output_toggle_per_pclk: "1/div_ratio", condition: "ctrl_enable=1, ctrl_output_enable=1" }
    outstanding: { description: "Not applicable — no request/response protocol" }
    depth: { pipeline_stages: 1, description: "Single-cycle counter increment pipeline" }
  observability:
    - "FM1 clock_divide maps to cycle_model S1_COUNT → S2_TOGGLE."
    - "FM2 counter_reset maps to an immediate S0_IDLE with cleared state."
    - "STATUS.counter provides runtime observability of counter value."
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Single clock domain — input clock to be divided" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain (PCLK only) — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain (PRESETn only) — no RDC required"
registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x000
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control register — enable, output gate, and counter reset"
      write_side_effects:
        - "Writing counter_reset=1 synchronously clears counter and toggle_reg to 0 on the next PCLK edge; the bit auto-clears."
      fields:
        - { name: "enable", bits: [0, 0], access: "rw", reset: 0x0, write_effect: "Enable counter/toggle operation", description: "0=disabled (counter holds), 1=enabled (counter runs)" }
        - { name: "output_enable", bits: [1, 1], access: "rw", reset: 0x0, write_effect: "Gate CLKOUT output", description: "0=CLKOUT forced low, 1=CLKOUT reflects toggle_reg" }
        - { name: "counter_reset", bits: [2, 2], access: "rw", reset: 0x0, write_effect: "Pulse: clears counter and toggle_reg; auto-clears to 0 next cycle", description: "Write 1 to reset counter/toggle (auto-clear)" }
        - { name: "reserved_31_3", bits: [31, 3], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "DIV_RATIO"
      offset: 0x004
      width: 32
      access: "rw"
      reset: 0x00000002
      category: "control"
      description: "Division ratio — output toggles every DIV_RATIO PCLK cycles"
      write_side_effects:
        - "New DIV_RATIO takes effect on the next counter cycle; mid-cycle changes are sampled at the next terminal-count comparison."
      fields:
        - { name: "div_ratio", bits: [15, 0], access: "rw", reset: 0x0002, write_effect: "Set division ratio (min 2)", description: "Division ratio value; output freq = PCLK/(2×div_ratio)" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x008
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status register — read-only observability of internal counter and flags"
      fields:
        - { name: "running", bits: [0, 0], access: "ro", reset: 0x0, description: "1=counter is enabled and running, 0=counter is idle" }
        - { name: "output_active", bits: [1, 1], access: "ro", reset: 0x0, description: "1=CLKOUT output is ungated (output_enable=1)" }
        - { name: "reserved_15_2", bits: [15, 2], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
        - { name: "counter", bits: [31, 16], access: "ro", reset: 0x0, description: "Current counter value (live snapshot)" }
memory:
  instances: []
  note: "No SRAM/FIFO/register-file — counter and toggle_reg are simple flip-flop registers in clkdiv_core."
interrupts:
  sources: []
  output:
    signal: null
    note: "No interrupts — clkdiv is a simple clock divider with no error/event signaling."
  description: "No interrupt outputs. Status is observable only via APB register reads (STATUS register)."
fsm:
  counter_toggle:
    states:
      - "IDLE"
      - "COUNTING"
    transitions:
      - { from: "IDLE", to: "COUNTING", condition: "CTRL.enable transitions 0→1" }
      - { from: "COUNTING", to: "IDLE", condition: "CTRL.enable transitions 1→0" }
    note: "Simple enable-gated counter; IDLE means counter and toggle hold their values. COUNTING means counter increments each PCLK and toggle_reg flips on terminal count. No complex FSM — rtl-gen should implement with an enable-gated counter and a toggle flop."
rtl_contract:
  transaction: "FM1"
  sample_condition: "CLKOUT changes on PCLK rising edge when toggle_reg updates"
  input_map:
    enable: "registers.CTRL.enable"
    output_enable: "registers.CTRL.output_enable"
    div_ratio: "registers.DIV_RATIO.div_ratio"
    counter_reset: "registers.CTRL.counter_reset (pulse, auto-clear)"
  output_map:
    clkout: "CLKOUT port"
    running: "STATUS.running"
    output_active: "STATUS.output_active"
    counter_status: "STATUS.counter[15:0]"
  state_updates:
    - { name: "counter", reset: 0, expr: "counter_reset ? 0 : (enable && counter == div_ratio - 1 ? 0 : enable ? counter + 1 : counter)" }
    - { name: "toggle_reg", reset: 0, expr: "counter_reset ? 0 : (enable && counter == div_ratio - 1 ? ~toggle_reg : toggle_reg)" }
    - { name: "clkout", reset: 0, expr: "output_enable && toggle_reg" }
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.2 }
  latency_budget:
    register_access_cycles: { min: 1, max: 2, measured_from: "PSEL && PENABLE", measured_to: "PREADY", note: "Zero wait-state APB-lite" }
    output_toggle_cycles: { min: 1, max: 65536, measured_from: "toggle_reg update", measured_to: "next toggle_reg update", note: "Exact latency = DIV_RATIO PCLK cycles" }
  throughput:
    sustained_toggles_per_sec: "PCLK_freq / (2 * DIV_RATIO)"
    conditions: "ctrl_enable=1, ctrl_output_enable=1, DIV_RATIO >= 2"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "APB inputs", clock: "PCLK", delay_ns: 2.0, source: "system-level budget" }
    outputs:
      - { ports: "CLKOUT", clock: "PCLK", delay_ns: 1.0, source: "toggle_reg to output path" }
      - { ports: "PRDATA", clock: "PCLK", delay_ns: 2.0, source: "register read mux" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode; counter stops when CTRL.enable=0 which naturally reduces toggling"
  reset_retention:
    retention_required: false
  power_states:
    - { name: "ON", entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["All registers and counter logic active"] }
  upf_required: false
security:
  classification: "non_secure_clock_ip"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "CLKOUT_output", protection: "Output gating via CTRL.output_enable; no authentication" }
  threat_model:
    - { threat: "illegal register write while divider running", mitigation: "Writes take effect on next cycle; no corruption of in-flight counter" }
  privilege_model: "External bus fabric enforces privilege; this IP has no internal privilege levels"
  safety_goals:
    - "CLKOUT frequency is deterministic given PCLK and DIV_RATIO"
    - "No metastability risk in single-clock design"
error_handling:
  error_sources:
    - { id: "ERR_DIV_RATIO_ZERO", condition: "DIV_RATIO.div_ratio == 0 written via APB", architectural_effect: "Counter never reaches terminal count (counter == -1 never true for unsigned); CLKOUT stays stuck at current level" }
    - { id: "ERR_DIV_RATIO_ONE", condition: "DIV_RATIO.div_ratio == 1 written via APB", architectural_effect: "CLKOUT toggles every PCLK cycle — output equals input clock (no division); functionally valid but likely unintended" }
  propagation:
    - "No error interrupt — see custom.assumptions. Invalid DIV_RATIO values result in silent stuck/fast behavior observable via STATUS.counter."
  recovery:
    - { action: "Write valid DIV_RATIO >= 2 via APB; optionally pulse CTRL.counter_reset to restart from known state", clears: ["stuck counter/toggle"], preserves: ["CTRL.enable", "CTRL.output_enable"] }
debug_observability:
  waveform_must_probe:
    - "counter"
    - "toggle_reg"
    - "CLKOUT"
    - "CTRL.enable"
    - "CTRL.output_enable"
    - "div_ratio"
  status_outputs:
    - "STATUS.running"
    - "STATUS.output_active"
    - "STATUS.counter[15:0]"
  trace_events:
    - { name: "counter_terminal_count", trigger: "counter == div_ratio - 1" }
    - { name: "toggle_flip", trigger: "toggle_reg changes value" }
    - { name: "output_gate_change", trigger: "CTRL.output_enable transitions" }
  debug_registers:
    - "STATUS (live counter and status flags)"
integration:
  bus_attachment:
    control: "APB-lite slave (PCLK/PRESETn domain)"
    data: "None — CLKOUT is a direct output clock signal"
  connections:
    - { module: "clkdiv_core", port: "clk_i", signal: "PCLK" }
    - { module: "clkdiv_core", port: "rst_ni", signal: "PRESETn" }
    - { module: "clkdiv_core", port: "enable_i", signal: "regs.CTRL.enable" }
    - { module: "clkdiv_core", port: "output_enable_i", signal: "regs.CTRL.output_enable" }
    - { module: "clkdiv_core", port: "div_ratio_i", signal: "regs.DIV_RATIO.div_ratio" }
    - { module: "clkdiv_core", port: "counter_reset_i", signal: "regs.CTRL.counter_reset" }
    - { module: "clkdiv_core", port: "clkout_o", signal: "CLKOUT" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "PREADY=1 with PRDATA=0 (APB-lite — no pslverr)"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC interconnect decodes APB address to generate PSEL for this IP."
    - "CLKOUT drives downstream clocked logic directly — ensure timing closure."
    - "No interrupt connection needed — status polling only."
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn controllable in test"
    clocks: ["PCLK"]
  observability:
    required_internal_points: ["counter", "toggle_reg", "CLKOUT"]
  mbist_required: false
  notes: "Simple IP — no SRAM, no scan chain needed for initial revision."
synthesis:
  dialect: "systemverilog_2012"
  top_module: "clkdiv"
  technology:
    pdk: "generic"
    standard_cell_library: "generic"
  constraints:
    - "No inferred latches"
    - "All flops reset via PRESETn async assert, sync deassert"
    - "No package/interface/modport/function/task/for/while constructs"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/clkdiv.v or clkdiv.json"
    - "syn/out/area.rpt"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/clkdiv_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk …)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn)"
    - "Parameterize widths via DIV_WIDTH parameter"
    - "Use rtl/clkdiv_param.vh for shared parameter declarations"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
  lint_waivers:
    - "UNUSEDSIGNAL: tie-offs only"
    - "WIDTHEXPAND: counter comparison width"
reuse_modules: TBD
custom: TBD
dir_structure: TBD
filelist: TBD
test_requirements: TBD
quality_gates: TBD
traceability: TBD
workflow_todos: TBD
generation_flow: TBD
