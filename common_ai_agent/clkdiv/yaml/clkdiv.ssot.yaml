test_requirements:
  scenarios:
  - id: SC1
    name: "Reset defaults"
    stimulus: "Assert PRESETn low, then release."
    expected: "DIVISOR=0, CTRL=0, STATUS=0, clkdiv_o=0, PREADY=1."
    checker: "APB readback after reset deassertion."
    coverage: ["reset_defaults"]
  - id: SC2
    name: "Register access — read/write DIVISOR and CTRL"
    stimulus: "Write and read DIVISOR (offset 0x00) and CTRL (offset 0x04) with various values."
    expected: "Written values read back correctly; PREADY=1; PSLVERR=0."
    checker: "APB scoreboard — write then read, verify data match."
    coverage: ["register_access", "FM_APB_WRITE_DIVISOR", "FM_APB_WRITE_CTRL", "FM_APB_READ_REGISTER"]
  - id: SC3
    name: "STATUS register read"
    stimulus: "Enable divider, let it run, read STATUS (offset 0x08)."
    expected: "STATUS.counter reflects internal counter value at read time. Non-zero when running."
    checker: "Scoreboard compares STATUS readback with expected counter from function_model."
    coverage: ["FM_APB_READ_REGISTER", "FM_CLOCK_DIVIDE"]
  - id: SC4
    name: "Unsupported address error"
    stimulus: "APB read and write to unsupported offsets (e.g., 0x0C, 0x10)."
    expected: "PSLVERR=1, PRDATA=0 for reads, writable state unchanged."
    checker: "Error response assertion."
    coverage: ["FM_APB_ERROR", "invalid_address"]
  - id: SC5
    name: "Clock division — even divisor"
    stimulus: "Set CTRL.enable=1, DIVISOR=3 (effective divisor=4). Measure clkdiv_o."
    expected: "clkdiv_o toggles at PCLK/4 with 50% duty cycle (2 cycles high, 2 cycles low)."
    checker: "Scoreboard counts PCLK cycles between clkdiv_o edges."
    coverage: ["FM_CLOCK_DIVIDE", "even_divisor", "S2_COUNTER_UPDATE", "S3_OUTPUT_TOGGLE"]
  - id: SC6
    name: "Clock division — odd divisor"
    stimulus: "Set CTRL.enable=1, DIVISOR=4 (effective divisor=5). Measure clkdiv_o."
    expected: "clkdiv_o toggles at PCLK/5: 3 cycles high, 2 cycles low (high phase one longer)."
    checker: "Scoreboard measures high/low phase durations."
    coverage: ["FM_CLOCK_DIVIDE", "odd_divisor", "duty_cycle"]
  - id: SC7
    name: "Clock division — passthrough"
    stimulus: "Set CTRL.enable=1, DIVISOR=0 (effective divisor=1). Measure clkdiv_o."
    expected: "clkdiv_o = PCLK (passthrough, toggles every PCLK cycle)."
    checker: "Scoreboard verifies clkdiv_o mirrors PCLK."
    coverage: ["FM_CLOCK_DIVIDE", "passthrough"]
  - id: SC8
    name: "Enable/disable gating"
    stimulus: "Start with DIVISOR=7 (div 8), run, then set CTRL.enable=0, then re-enable."
    expected: "After disable: clkdiv_o holds low after current phase completes. After re-enable: divider restarts from counter=0 with clean phase."
    checker: "Scoreboard checks clkdiv_o = 0 after disable, clean restart after re-enable."
    coverage: ["enable_gating", "FM_APB_WRITE_CTRL"]
  - id: SC9
    name: "Divisor change while running"
    stimulus: "Run with DIVISOR=7 (div 8), then write DIVISOR=3 (div 4), observe transition."
    expected: "New divisor takes effect on counter wrap; no glitch on clkdiv_o at the change boundary."
    checker: "Scoreboard verifies clean divisor transition with no runt pulses."
    coverage: ["divisor_update", "FM_APB_WRITE_DIVISOR"]
  scoreboard_checks:
  - "APB read/write mirror for all three registers"
  - "clkdiv_o frequency and duty cycle vs DIVISOR"
  - "Even divisor 50% duty cycle verification"
  - "Odd divisor high-phase-one-longer verification"
  - "Passthrough mode (DIVISOR=0) verification"
  - "Enable/disable gating behavior"
  - "Divisor change glitch-free transition"
  - "Unsupported address PSLVERR assertion"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: "Cycle-independent behavioral intent coverage; proves what the clock divider computes."
      bins:
      - id: FCOV_FM_APB_WRITE_DIVISOR
        source_ref: function_model.transactions.FM_APB_WRITE_DIVISOR
        class: transaction
        description: "APB write DIVISOR transaction observed"
      - id: FCOV_FM_APB_WRITE_CTRL
        source_ref: function_model.transactions.FM_APB_WRITE_CTRL
        class: transaction
        description: "APB write CTRL transaction observed"
      - id: FCOV_FM_APB_READ_REGISTER
        source_ref: function_model.transactions.FM_APB_READ_REGISTER
        class: transaction
        description: "APB read register transaction observed"
      - id: FCOV_FM_APB_ERROR
        source_ref: function_model.transactions.FM_APB_ERROR
        class: transaction
        description: "APB error transaction observed"
      - id: FCOV_FM_CLOCK_DIVIDE
        source_ref: function_model.transactions.FM_CLOCK_DIVIDE
        class: transaction
        description: "Clock division cycle observed"
      - id: FCOV_FM_EVEN_DIVISOR
        source_ref: function_model.invariants
        class: invariant
        description: "Even divisor 50% duty cycle invariant verified"
      - id: FCOV_FM_ODD_DIVISOR
        source_ref: function_model.invariants
        class: invariant
        description: "Odd divisor high-phase-one-longer invariant verified"
    cycle:
      target_pct: 100
      model: cycle_model
      description: "Cycle/handshake/FSM coverage; proves when behavior occurs."
      bins:
      - id: CCOV_APB_ACCESS
        source_ref: cycle_model.handshake_rules.apb_access
        class: handshake
        description: "APB access phase handshake observed"
      - id: CCOV_APB_READY
        source_ref: cycle_model.handshake_rules.apb_ready
        class: handshake
        description: "PREADY always-1 rule verified"
      - id: CCOV_S3_OUTPUT_TOGGLE
        source_ref: cycle_model.pipeline.S3_OUTPUT_TOGGLE
        class: pipeline_stage
        description: "Output toggle stage observed"
      - id: CCOV_S2_COUNTER_UPDATE
        source_ref: cycle_model.pipeline.S2_COUNTER_UPDATE
        class: pipeline_stage
        description: "Counter update stage observed"
      - id: CCOV_RESET
        source_ref: cycle_model.pipeline.S0_RESET
        class: pipeline_stage
        description: "Reset stage state clear observed"
      - id: CCOV_PERF_FREQ
        source_ref: cycle_model.performance.frequency_mhz
        class: frequency
        description: "PCLK 50MHz assumption recorded"
      - id: CCOV_PERF_DEPTH
        source_ref: cycle_model.performance.depth
        class: depth
        description: "Single-cycle pipeline depth verified"
    line: ">= 90% instrumented line coverage"
    branch: ">= 85% instrumented branch coverage"
    fsm: "100% FSM states and transitions covered (IDLE, RUNNING)"

