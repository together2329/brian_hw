# ============================================================================
# SSOT YAML — cmux_orch_ux_20260519 (Clock Multiplexer)
# Generated by ssot-gen worker | run_mode: engineering
# ============================================================================
ip_name: cmux_orch_ux_20260519
ip_version: "0.1.0"
description: >
  Parameterizable glitch-free clock multiplexer (CMUX). Selects one of N
  clock sources under synchronous control, guarantees no glitch on the
  output during dynamic switching, and optionally gates the output clock.

# ---------------------------------------------------------------------------
top_module:
  name: cmux_orch_ux_20260519
  file: rtl/cmux_orch_ux_20260519.sv
  version: "0.1.0"
  type: clock_ip
  description: >
    Glitch-free N-input clock multiplexer with synchronous select and
    optional output gating.
  target:
    technology: asic
    process_nodes: [generic]
    frequency_range: "DC to target Fmax"
    library: ~  # TBD: target technology library if any

# ---------------------------------------------------------------------------
parameters:
  - name: NUM_INPUTS
    type: integer
    default: 4
    min: 2
    max: 16
    description: "Number of clock input sources"
  - name: SEL_WIDTH
    type: integer
    default: 2
    description: "Width of select port, derived as $clog2(NUM_INPUTS)"
    derived: true
    expr: "$clog2(NUM_INPUTS)"
  - name: ENABLE_CLK_GATE
    type: integer
    default: 0
    enum: [0, 1]
    description: "When 1, add output clock-gating via clk_enable pin"

# ---------------------------------------------------------------------------
io_list:
  - name: clk_in
    direction: input
    width: NUM_INPUTS
    type: clock
    description: "Array of N clock input sources"
    protocol: clock
    role: source
  - name: rst_n
    direction: input
    width: 1
    type: reset
    description: "Active-low asynchronous reset"
    protocol: async_active_low
    role: sink
    active_level: low
  - name: sel
    direction: input
    width: SEL_WIDTH
    type: control
    description: "Select which clock input drives clk_out"
    protocol: static_select
    role: sink
    handshake: none
  - name: clk_enable
    direction: input
    width: 1
    type: control
    description: "Active-high clock gate enable (valid only when ENABLE_CLK_GATE=1)"
    protocol: level
    role: sink
    active_level: high
    conditional: "ENABLE_CLK_GATE == 1"
  - name: clk_out
    direction: output
    width: 1
    type: clock
    description: "Selected (and optionally gated) output clock"
    protocol: clock
    role: source
  - name: sel_valid
    direction: output
    width: 1
    type: status
    description: "High when sel index is within valid range"
    protocol: level
    role: source
    active_level: high

# ---------------------------------------------------------------------------
sub_modules:
  - name: glitch_free_switch
    implements: function_model.transactions[0]  # glitch_free_switch
    ownership: manifest
    function_model_refs: [function_model.transactions[0]]
    description: >
      Core glitch-free switching element. Uses mutual exclusion on
      complementary enables derived from sel to prevent both paths
      being active simultaneously during transition.
  - name: clk_gate_cell
    implements: function_model.transactions[2]  # gated_output
    ownership: manifest
    function_model_refs: [function_model.transactions[2]]
    conditional: "ENABLE_CLK_GATE == 1"
    description: "Integrated clock-gating cell triggered by clk_enable"

# ---------------------------------------------------------------------------
features:
  - id: F001
    name: glitch_free_switching
    description: >
      Output clock never exhibits a glitch during dynamic sel changes.
      Achieved by qualifying each input path with a synchronized enable
      that transitions only when the other path is idle.
  - id: F002
    name: parametric_inputs
    description: "NUM_INPUTS is a compile-time parameter (2–16)."
  - id: F003
    name: optional_clock_gating
    description: "ENABLE_CLK_GATE=1 inserts an ICG cell on clk_out."
  - id: F004
    name: sel_range_check
    description: "sel_valid deasserts if sel >= NUM_INPUTS."

# ---------------------------------------------------------------------------
dataflow:
  description: >
    Selected clock input passes through a glitch-free mux crossbar
    and optional ICG to the output.
  paths:
    - from: clk_in[sel]
      to: clk_out
      stages:
        - stage: 1
          block: glitch_free_switch
          latency: 0
          description: "Combinational glitch-free selection"
        - stage: 2
          block: clk_gate_cell
          latency: 0
          description: "Optional clock gating"

# ---------------------------------------------------------------------------
function_model:
  description: >
    The CMUX continuously routes the selected clock input to the output
    with no combinational glitches.
  transactions:
    - id: glitch_free_switch
      name: glitch_free_switch
      description: "Continuously propagate selected clock input to output"
      trigger:
        event: any_edge
        port: clk_in
        condition: "sel < NUM_INPUTS"
      output_rules:
        - expr: "clk_out = clk_in[sel]"
          width: 1
          port: clk_out
          latency: 0
      state_updates:
        - expr: "sel_valid = (sel < NUM_INPUTS)"
          width: 1
          state: sel_valid

    - id: dynamic_sel_change
      name: dynamic_sel_change
      description: >
        When sel changes, glitch_free_switch transitions the enable
        mask so that the old clock path is disabled after the new path
        is confirmed active, preventing half-cycle glitches.
      trigger:
        event: value_change
        port: sel
      output_rules:
        - expr: "clk_out = clk_in[new_sel]"
          width: 1
          port: clk_out
          latency: "2–3 cycles of old clock"
      state_updates: []

    - id: gated_output
      name: gated_output
      description: "When ENABLE_CLK_GATE=1, clk_enable=0 gates clk_out low"
      trigger:
        event: level
        port: clk_enable
        condition: "ENABLE_CLK_GATE == 1"
      output_rules:
        - expr: "clk_out = clk_enable ? clk_in[sel] : 1'b0"
          width: 1
          port: clk_out
          latency: 0
      state_updates: []

# ---------------------------------------------------------------------------
cycle_model:
  description: >
    The CMUX is combinational with optional multi-cycle glitch-free
    transition latency when sel changes dynamically.
  phases:
    - phase: idle
      cycles: "continuous"
      description: "clk_out mirrors clk_in[sel]"
    - phase: switching
      cycles: "2–3 cycles of old clock"
      description: "Glitch-free transition window when sel changes"

# ---------------------------------------------------------------------------
registers: []

# ---------------------------------------------------------------------------
interrupts: []

# ---------------------------------------------------------------------------
fsm:
  description: "No FSM — continuous combinational/clock-domain-crossing logic."
  states: []

# ---------------------------------------------------------------------------
timing:
  description: >
    No static timing constraints beyond clock input definition.
    Glitch-free switching imposes max transition latency of 2–3
    old-clock cycles.
  constraints: []

# ---------------------------------------------------------------------------
power:
  domains:
    - name: VDD
      description: "Single power domain for all logic"
  gating: "Optional via ENABLE_CLK_GATE parameter"

# ---------------------------------------------------------------------------
security:
  description: "No security requirements for clock mux infrastructure."
  features: []

# ---------------------------------------------------------------------------
error_handling:
  - error: invalid_sel
    description: "sel >= NUM_INPUTS"
    detection: "sel_valid == 0"
    action: "clk_out held low; sel_valid deasserted"

# ---------------------------------------------------------------------------
debug_observability:
  signals:
    - name: sel
      description: "Current select value"
    - name: sel_valid
      description: "Range check status"
    - name: clk_out
      description: "Output clock"

# ---------------------------------------------------------------------------
integration:
  bus_interfaces: []
  clock_domains:
    - name: clk_in[*]
      description: "Any input clock domain"
    - name: clk_out
      description: "Output clock domain (selected input)"
  reset_domains:
    - name: rst_n
      type: async_active_low

# ---------------------------------------------------------------------------
dft:
  scan_support: false
  description: "No DFT scan chain — pure clock routing block."

# ---------------------------------------------------------------------------
synthesis:
  target: asic
  constraints_file: ~
  description: >
    Should target ICG cells from technology library when
    ENABLE_CLK_GATE=1. Otherwise purely combinational mux.

# ---------------------------------------------------------------------------
custom:
  assumptions:
    - "IP is a clock multiplexer (CMUX) — name prefix 'cmux' interpreted accordingly"
    - "Glitch-free output is the primary functional requirement"
    - "No architect handoff or imported spec; bootstrapped from IP name"
    - "Default NUM_INPUTS=4, SEL_WIDTH=$clog2(NUM_INPUTS)"
    - "ENABLE_CLK_GATE defaults to 0 (no gating)"
  tbd_items:
    - path: top_module.target.library
      reason: "Target technology library not specified"
    - path: synthesis.constraints_file
      reason: "SDC constraints file path TBD"
  design_notes: []

# ---------------------------------------------------------------------------
test_requirements:
  - id: TR001
    name: basic_selection
    description: "Each clock input can be selected and observed on clk_out"
    stimulus: "Drive unique frequencies on each clk_in; sweep sel across all values"
    expected: "clk_out frequency matches clk_in[sel] for each sel value"
    checkers: ["clk_out freq == clk_in[sel] freq"]
    coverage: ["Toggle all sel values"]

  - id: TR002
    name: glitch_free_switching
    description: "No glitch on clk_out during sel change"
    stimulus: "Change sel dynamically while clocks are running"
    expected: "clk_out period never shorter than min(clk_in[old], clk_in[new]) half-period"
    checkers: ["no_glitch_detector on clk_out"]
    coverage: ["All adjacent sel transitions covered"]

  - id: TR003
    name: invalid_sel
    description: "sel >= NUM_INPUTS drives sel_valid=0 and clk_out low"
    stimulus: "Drive sel to NUM_INPUTS and beyond"
    expected: "sel_valid == 0, clk_out == 0"
    checkers: ["sel_valid == 0", "clk_out == 0"]
    coverage: ["sel >= NUM_INPUTS toggled"]

  - id: TR004
    name: clock_gating
    description: "When ENABLE_CLK_GATE=1, clk_enable=0 gates output"
    stimulus: "Assert clk_enable=0 while clock is selected"
    expected: "clk_out held low"
    checkers: ["clk_out == 0 when clk_enable == 0"]
    coverage: ["clk_enable toggle with ENABLE_CLK_GATE=1"]
    conditional: "ENABLE_CLK_GATE == 1"

  - id: TR005
    name: reset_behavior
    description: "After rst_n deassertion, defaults to sel=0"
    stimulus: "Assert and deassert rst_n"
    expected: "clk_out follows clk_in[0]"
    checkers: ["clk_out matches clk_in[0] after reset release"]
    coverage: ["Reset deassertion observed"]

