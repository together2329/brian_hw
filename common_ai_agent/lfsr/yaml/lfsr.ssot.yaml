# =============================================================================
# LFSR PRBS Generator — Single Source of Truth (SSOT)
# =============================================================================
ip: lfsr
version: "1.0"
top_module:
  name: "lfsr"
  file: "rtl/lfsr.sv"
  version: "1.0"
  type: "peripheral"
  description: "Parameterized LFSR PRBS generator with APB-lite CSR interface, configurable polynomial/seed/width, and 1-cycle output latency."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "lfsr_regs", file: "rtl/lfsr_regs.sv", ownership: "manifest", ssot_gen: true, implements: ["registers.register_list", "io_list.interfaces.apb_slave"], source_sections: ["registers", "io_list"], register_refs: ["registers.register_list"], ssot_refs: ["io_list.interfaces.apb_slave"], description: "APB-lite register decode and read/write logic" }
  - { name: "lfsr_core", file: "rtl/lfsr_core.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "fsm", "features"], source_sections: ["function_model", "cycle_model", "fsm", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], fsm_refs: ["fsm.lfsr_control"], description: "LFSR shift register, feedback XOR, and output datapath" }
decomposition:
  units:
    - { id: "config", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["lfsr_regs"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "generate", kind: "datapath", source_refs: ["function_model.transactions", "cycle_model.pipeline"], rtl_candidates: ["lfsr_core"], verification_impact: ["test_requirements.coverage_goals"] }
parameters:
  - { name: "LFSR_WIDTH", default: 32, type: int, description: "LFSR register width in bits; determines PRBS period and polynomial range", drives: ["lfsr_core.sv", "lfsr_regs.sv"] }
  - { name: "OUTPUT_WIDTH", default: 1, type: int, description: "Output data width: 1 for serial PRBS, LFSR_WIDTH for parallel", drives: ["lfsr_core.sv"] }
  - { name: "APB_ADDR_WIDTH", default: 8, type: int, description: "APB address bus width in bits", drives: ["lfsr_regs.sv"] }
  - { name: "APB_DATA_WIDTH", default: 32, type: int, description: "APB data bus width in bits", drives: ["lfsr_regs.sv"] }
  - { name: "NUM_PRESETS", default: 8, type: int, description: "Number of predefined polynomial presets", drives: ["lfsr_core.sv", "lfsr_regs.sv"] }
  - { name: "HAS_COUNT_REG", default: 1, type: int, description: "Include shift-count register when 1", drives: ["lfsr_regs.sv", "lfsr_core.sv"] }
  - { name: "RESET_POLARITY", default: "active_low", type: enum, values: ["active_low", "active_high"], drives: ["ALL .sv files"] }
io_list:
  clock_domains:
    - name: "pclk"
      frequency_mhz: 50
      description: "Single system clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "presetn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "System reset, async assert, sync deassert"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB-lite"
      role: "slave"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "APB-lite CSR interface for runtime configuration and status readback"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0 captures address and control."
        access_phase: "PSEL=1, PENABLE=1 completes when PREADY=1."
        read_rule: "PRDATA is valid in the completing access phase for reads."
        write_rule: "PWDATA is sampled in the completing access phase for writes."
        error_rule: "No PSLVERR pin on APB-lite; illegal offsets return OKAY with no side effect."
      ports:
        - { name: "PADDR",   width: 8,  direction: "input",  description: "APB address bus" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write/read" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready; always 1 for zero-wait-state" }
    - name: "prbs_output"
      type: "custom"
      clock_domain: "pclk"
      reset_domain: "presetn"
      description: "PRBS output data and valid flag"
      protocol:
        valid_rule: "prbs_valid is asserted for one PCLK cycle each time a new output sample is produced."
        data_rule: "prbs_out holds the current LFSR output bits; width is OUTPUT_WIDTH parameter."
        reset_value: "prbs_valid=0, prbs_out=0 after reset"
      ports:
        - { name: "prbs_out",   width: "OUTPUT_WIDTH", direction: "output", description: "PRBS output data" }
        - { name: "prbs_valid", width: 1,               direction: "output", description: "PRBS output valid pulse" }
features:
  - name: "Free-run PRBS generation"
    trigger: "CTRL.enable set to 1 and CTRL.mode = 0 (free-run)"
    datapath: "LFSR state shifts left, feedback XOR computed from POLY taps, result feeds bit 0"
    control: "IDLE → RUNNING on enable; RUNNING → IDLE on disable"
    output: "prbs_out[OUTPUT_WIDTH-1:0] updated every PCLK cycle; prbs_valid pulsed"
  - name: "Single-step PRBS generation"
    trigger: "CTRL.enable=1, CTRL.mode=1 (step), and CTRL.step_req written as 1 (auto-clear)"
    datapath: "Exactly one LFSR shift-and-feedback step per step_req write"
    control: "IDLE → STEPPING on step_req; STEPPING → IDLE after one shift"
    output: "prbs_out updated once; prbs_valid pulsed for one cycle"
  - name: "Seed load"
    trigger: "CTRL.load_seed written as 1 (auto-clear)"
    datapath: "SEED register value is copied directly into the LFSR state register"
    control: "Can occur in any FSM state; takes precedence over shift"
    output: "LFSR state updated; no prbs_valid pulse unless also running"
  - name: "Polynomial preset select"
    trigger: "CTRL.preset_select written with a valid index (0..NUM_PRESETS-1)"
    datapath: "POLY register is overwritten with the corresponding predefined tap bitmask"
    control: "Can occur in any FSM state"
    output: "POLY register updated; next shift uses new taps"
  - name: "Zero-lockup detection"
    trigger: "LFSR state transitions to all zeros after a shift"
    datapath: "STATUS.zero_lockup is set to 1; LFSR stops shifting to prevent infinite zeros"
    control: "Remains in zero_lockup until new seed is loaded"
    output: "STATUS.zero_lockup=1; prbs_valid deasserted"
dataflow:
  feedback_path:
    source: "lfsr_state[LFSR_WIDTH-1:0] (current shift register)"
    tap_mask: "POLY[LFSR_WIDTH-1:0] (bitmask selecting feedback tap positions)"
    feedback: "XOR-reduce(lfsr_state & POLY) → single feedback bit"
    sequence: "lfsr_state → AND with POLY → XOR-reduce → feedback_bit → shift into lfsr_state[0]"
  output_path:
    source: "lfsr_state[OUTPUT_WIDTH-1:0]"
    sequence: "lfsr_state bits → prbs_out port → prbs_valid pulse"
  seed_load_path:
    source: "SEED register (APB-writable)"
    sequence: "APB write to SEED → CTRL.load_seed trigger → copy SEED into lfsr_state"
function_model:
  purpose: "Cycle-independent behavioral contract for the LFSR PRBS generator; describes what the IP computes."
  state_variables:
    - { name: "lfsr_state",  source: "registers.STATE",  reset: 0, description: "Current LFSR shift register value (LFSR_WIDTH bits)" }
    - { name: "seed_val",    source: "registers.SEED",   reset: 0, description: "Seed value loaded on load_seed trigger" }
    - { name: "poly_mask",   source: "registers.POLY",   reset: 0, description: "Feedback polynomial tap bitmask" }
    - { name: "ctrl_enable", source: "registers.CTRL.enable", reset: 0, description: "1 = LFSR enabled" }
    - { name: "ctrl_mode",   source: "registers.CTRL.mode",   reset: 0, description: "0 = free-run, 1 = single-step" }
    - { name: "status",      source: "registers.STATUS",      reset: 0, description: "Status flags (running, zero_lockup)" }
  transactions:
    - id: "FM1"
      name: "prbs_free_run"
      preconditions:
        - "ctrl_enable == 1"
        - "ctrl_mode == 0 (free-run)"
        - "lfsr_state != 0 (not in zero-lockup)"
      inputs:
        - "lfsr_state (current)"
        - "poly_mask (current POLY register)"
      output_rules:
        - { name: "feedback_bit", expr: "^{lfsr_state & poly_mask}", width: 1, port: "internal", description: "XOR-reduce of masked state bits produces 1-bit feedback" }
        - { name: "next_state",   expr: "{lfsr_state[LFSR_WIDTH-2:0], feedback_bit}", width: "LFSR_WIDTH", port: "internal", description: "Shift left by 1, insert feedback at bit 0" }
        - { name: "prbs_serial",  expr: "lfsr_state[LFSR_WIDTH-1]", width: 1, port: "prbs_out", description: "MSB of current state for serial output mode" }
        - { name: "prbs_parallel", expr: "lfsr_state[OUTPUT_WIDTH-1:0]", width: "OUTPUT_WIDTH", port: "prbs_out", description: "Low OUTPUT_WIDTH bits of state for parallel output mode" }
      state_updates:
        - { name: "lfsr_state", reset: 0, expr: "{lfsr_state[LFSR_WIDTH-2:0], ^{lfsr_state & poly_mask}}", description: "Shift left 1, XOR-reduce feedback feeds bit 0" }
        - { name: "shift_count", reset: 0, expr: "shift_count + 1", description: "Increment shift counter when HAS_COUNT_REG=1" }
        - { name: "status.zero_lockup", reset: 0, expr: "(next_state == 0) ? 1 : status.zero_lockup", description: "Set if next state is all zeros" }
      side_effects:
        - "prbs_valid pulsed for one cycle on each shift"
        - "If next_state == 0, STATUS.zero_lockup is set and shifting halts until new seed"
      error_cases:
        - { condition: "lfsr_state == 0 and ctrl_enable == 1", result: "STATUS.zero_lockup=1; no further shifts; prbs_valid stays 0" }
    - id: "FM2"
      name: "prbs_single_step"
      preconditions:
        - "ctrl_enable == 1"
        - "ctrl_mode == 1 (step)"
        - "step_req pulse received (auto-clear)"
        - "lfsr_state != 0"
      inputs:
        - "lfsr_state (current)"
        - "poly_mask (current)"
      output_rules:
        - { name: "feedback_bit", expr: "^{lfsr_state & poly_mask}", width: 1, port: "internal", description: "Same XOR-reduce feedback as FM1" }
        - { name: "next_state",   expr: "{lfsr_state[LFSR_WIDTH-2:0], feedback_bit}", width: "LFSR_WIDTH", port: "internal", description: "One shift" }
        - { name: "prbs_out",     expr: "next_state[OUTPUT_WIDTH-1:0]", width: "OUTPUT_WIDTH", port: "prbs_out", description: "Output after single step" }
      state_updates:
        - { name: "lfsr_state", reset: 0, expr: "{lfsr_state[LFSR_WIDTH-2:0], ^{lfsr_state & poly_mask}}", description: "Exactly one shift" }
        - { name: "shift_count", reset: 0, expr: "shift_count + 1", description: "Increment counter" }
      side_effects:
        - "prbs_valid pulsed for one cycle"
        - "step_req auto-clears to 0"
      error_cases: []
    - id: "FM3"
      name: "seed_load"
      preconditions:
        - "CTRL.load_seed written as 1 (auto-clear trigger)"
      inputs:
        - "seed_val from registers.SEED"
      output_rules:
        - { name: "lfsr_state_next", expr: "seed_val", width: "LFSR_WIDTH", port: "internal", description: "State is directly overwritten with seed" }
      state_updates:
        - { name: "lfsr_state",         reset: 0, expr: "seed_val", description: "Overwritten with SEED register value" }
        - { name: "status.zero_lockup",  reset: 0, expr: "(seed_val == 0) ? 1 : 0", description: "Cleared unless new seed is zero" }
      side_effects:
        - "STATUS.zero_lockup cleared if seed_val != 0"
        - "If LFSR was in zero-lockup, it resumes"
        - "No prbs_valid pulse (seed load is not a shift)"
      error_cases:
        - { condition: "seed_val == 0", result: "STATUS.zero_lockup remains 1; no shifting" }
    - id: "FM4"
      name: "preset_polynomial"
      preconditions:
        - "CTRL.preset_select written with valid index (0..NUM_PRESETS-1)"
      inputs:
        - "preset_select index"
      output_rules:
        - { name: "poly_next", expr: "PRESET_TABLE[preset_select]", width: "LFSR_WIDTH", port: "internal", description: "POLY register loaded from preset table" }
      state_updates:
        - { name: "poly_mask", reset: 0, expr: "PRESET_TABLE[preset_select]", description: "POLY register updated" }
      side_effects:
        - "Next shift uses the new polynomial taps"
      error_cases:
        - { condition: "preset_select >= NUM_PRESETS", result: "No change to POLY; write ignored" }
  invariants:
    - "Feedback is always XOR-reduce(lfsr_state & poly_mask); the LFSR does not use any other feedback topology."
    - "A zero state (lfsr_state == 0) never produces a non-zero next state; the IP detects and halts."
    - "Seed load takes precedence over shift in the same cycle."
    - "prbs_valid is asserted only when an actual shift occurs, not on seed load."
  reference_model_hint: "tb-gen should implement a Python reference LFSR model that XOR-reduces state & poly and shifts left per transaction, comparing expected state and output against RTL for every scenario."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, outputs, and valid change."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for cycle-accurate model; functional model serves as oracle."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all registers and state to reset values"
    deassertion: "State is usable on the first rising PCLK edge after synchronized deassertion"
  latency:
    apb_read: { min_cycles: 0, max_cycles: 0, description: "Zero-wait-state APB: PREADY=1 in same access phase" }
    apb_write: { min_cycles: 0, max_cycles: 0, description: "Zero-wait-state APB: PREADY=1 in same access phase" }
    seed_load: { min_cycles: 1, max_cycles: 1, description: "State updated one PCLK after load_seed write completes" }
    prbs_output: { min_cycles: 1, max_cycles: 1, description: "New output available 1 PCLK after enable/step triggers" }
  handshake_rules:
    - { signal: "PREADY", rule: "Always driven 1; APB-lite slave has zero wait states for all valid addresses." }
    - { signal: "prbs_valid", rule: "Pulsed high for exactly one PCLK cycle when a new shift completes; low otherwise." }
  pipeline:
    - { stage: "S0_CONFIG", cycle: 0, action: "APB write latches configuration (CTRL/SEED/POLY) into internal registers" }
    - { stage: "S1_SEED_LOAD", cycle: 0, action: "If load_seed=1, SEED value is gated into lfsr_state register on next rising edge" }
    - { stage: "S2_FEEDBACK", cycle: 0, action: "XOR-reduce of (lfsr_state & poly_mask) computed combinationally" }
    - { stage: "S3_SHIFT", cycle: 1, action: "On next rising edge: lfsr_state shifts left, feedback_bit inserted at bit 0, prbs_valid pulsed" }
    - { stage: "S4_OUTPUT", cycle: 1, action: "prbs_out driven from new lfsr_state[OUTPUT_WIDTH-1:0]; prbs_valid=1 for this cycle" }
  ordering:
    - "Seed load (S1) and feedback/shift (S2/S3) are mutually exclusive in the same cycle; seed load wins."
    - "Output (S4) is combinational from the new state registered in S3."
    - "APB writes to CTRL/SEED/POLY take effect on the next rising PCLK edge after the APB access completes."
  backpressure:
    - "No backpressure mechanism; PRBS output is always ready and valid pulses are one cycle."
  performance:
    frequency_mhz: 50
    throughput: { samples_per_cycle: 1, condition: "Free-run mode with non-zero state" }
    outstanding: { description: "Not applicable; no request/response protocol on output" }
    depth: { pipeline_stages: 1, description: "Single registered stage: combinational feedback + registered state update" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "pclk", frequency_mhz: 50, description: "Single system clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain — no RDC required"
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Control register — enable, mode, seed load, step request, polynomial preset"
      write_side_effects:
        - "Writing load_seed=1 triggers an immediate seed load from SEED register; bit auto-clears."
        - "Writing step_req=1 triggers one LFSR shift in step mode; bit auto-clears."
        - "Writing preset_select with valid index loads POLY from preset table."
      fields:
        - { name: "enable",       bits: [0, 0],   access: "rw", reset: 0x0, description: "LFSR enable: 0=stopped, 1=running" }
        - { name: "mode",         bits: [1, 1],   access: "rw", reset: 0x0, description: "0=free-run, 1=single-step" }
        - { name: "load_seed",    bits: [2, 2],   access: "rw", reset: 0x0, write_effect: "Auto-clear: writing 1 loads SEED into LFSR state, then clears to 0", description: "Trigger seed load (auto-clear)" }
        - { name: "step_req",     bits: [3, 3],   access: "rw", reset: 0x0, write_effect: "Auto-clear: writing 1 triggers one shift in step mode, then clears to 0", description: "Step request (auto-clear)" }
        - { name: "preset_select", bits: [7, 4],  access: "rw", reset: 0x0, write_effect: "Loads POLY from preset table when written with valid index 0..NUM_PRESETS-1", description: "Polynomial preset index" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "SEED"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x00000001
      category: "control"
      description: "Seed value for LFSR initialization; loaded into state on CTRL.load_seed trigger"
      fields:
        - { name: "seed_val", bits: [31, 0], access: "rw", reset: 0x00000001, description: "Seed value; default 1 to avoid zero-lockup" }

    - name: "POLY"
      offset: 0x08
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Feedback polynomial tap bitmask; bit[i]=1 means tap at position i"
      fields:
        - { name: "poly_mask", bits: [31, 0], access: "rw", reset: 0x00000000, description: "Feedback tap bitmask; override via preset_select or direct write" }

    - name: "STATE"
      offset: 0x0C
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Current LFSR state (read-only); reflects internal shift register"
      fields:
        - { name: "lfsr_state", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Current LFSR shift register value" }

    - name: "STATUS"
      offset: 0x10
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Status flags"
      fields:
        - { name: "running",      bits: [0, 0], access: "ro", reset: 0x0, description: "1 when LFSR is actively shifting" }
        - { name: "zero_lockup",  bits: [1, 1], access: "ro", reset: 0x0, description: "1 when LFSR state is all zeros; shifting halted" }
        - { name: "reserved_31_2", bits: [31, 2], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }

    - name: "COUNT"
      offset: 0x14
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Shift counter — number of LFSR shifts since last seed load or counter reset (if HAS_COUNT_REG=1)"
      fields:
        - { name: "shift_count", bits: [31, 0], access: "ro", reset: 0x00000000, description: "Monotonically increasing shift counter" }
      conditional: "HAS_COUNT_REG == 1"
memory:
  instances:
    - { name: "lfsr_state_reg", type: "register", depth: 1, width: "LFSR_WIDTH", read_ports: 1, write_ports: 1, latency: 0, description: "LFSR shift register" }
    - { name: "seed_reg", type: "register", depth: 1, width: "LFSR_WIDTH", read_ports: 1, write_ports: 1, latency: 0, description: "Seed value register" }
    - { name: "poly_reg", type: "register", depth: 1, width: "LFSR_WIDTH", read_ports: 1, write_ports: 1, latency: 0, description: "Polynomial tap bitmask register" }
  note: "No SRAM/FIFO; all storage is simple registers."
interrupts:
  sources: []
  output:
    signal: "none"
    polarity: "none"
    type: "none"
  note: "No interrupt output in this LFSR revision; status is polled via APB read of STATUS register."
fsm:
  lfsr_control:
    states:
      - "IDLE"
      - "RUNNING"
      - "STEPPING"
      - "ZERO_LOCKUP"
    transitions:
      - { from: "IDLE",        to: "RUNNING",      condition: "ctrl_enable=1 and ctrl_mode=0" }
      - { from: "IDLE",        to: "STEPPING",      condition: "ctrl_enable=1 and ctrl_mode=1 and step_req=1" }
      - { from: "RUNNING",     to: "IDLE",           condition: "ctrl_enable=0" }
      - { from: "RUNNING",     to: "ZERO_LOCKUP",    condition: "next_state == 0 after shift" }
      - { from: "STEPPING",    to: "IDLE",           condition: "single shift completes" }
      - { from: "STEPPING",    to: "ZERO_LOCKUP",    condition: "next_state == 0 after shift" }
      - { from: "ZERO_LOCKUP", to: "IDLE",           condition: "load_seed=1 and seed_val != 0" }
    note: "Seed load is a side-effect that can occur in any state; it transitions ZERO_LOCKUP to IDLE (if seed != 0) or stays in ZERO_LOCKUP (if seed == 0)."
rtl_contract:
  transaction: "FM1"
  sample_condition: "prbs_valid pulse rising edge"
  input_map:
    seed_value: "registers.SEED.seed_val"
    poly_taps: "registers.POLY.poly_mask"
    ctrl_enable: "registers.CTRL.enable"
    ctrl_mode: "registers.CTRL.mode"
  output_map:
    prbs_output: "prbs_out"
    prbs_valid: "prbs_valid"
    current_state: "registers.STATE.lfsr_state"
    status: "registers.STATUS"
  state_updates:
    - { name: "lfsr_state",  reset: 0,                          expr: "{lfsr_state[LFSR_WIDTH-2:0], ^{lfsr_state & poly_mask}}", description: "Shift left with XOR-reduce feedback" }
    - { name: "shift_count", reset: 0,                          expr: "shift_count + 1",                                       description: "Increment per shift when HAS_COUNT_REG=1" }
    - { name: "zero_lockup", reset: 0,                          expr: "(lfsr_state == 0) ? 1 : 0",                              description: "Set when state transitions to all zeros" }
    - { name: "running",     reset: 0,                          expr: "ctrl_enable & ~zero_lockup",                              description: "Active when enabled and not locked" }
  output_rules:
    - { name: "prbs_serial",   expr: "lfsr_state[LFSR_WIDTH-1]",              width: 1,             port: "prbs_out", description: "MSB for serial mode (OUTPUT_WIDTH=1)" }
    - { name: "prbs_parallel", expr: "lfsr_state[OUTPUT_WIDTH-1:0]",          width: "OUTPUT_WIDTH", port: "prbs_out", description: "Low bits for parallel mode" }
    - { name: "prbs_valid",    expr: "running | step_pulse",                  width: 1,             port: "prbs_valid", description: "Valid pulse for one cycle per shift" }
timing:
  target_clocks:
    - { name: "pclk", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.2 }
  latency_budget:
    apb_access_cycles: { min: 1, max: 2, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
    prbs_output_latency: { min: 1, max: 1, measured_from: "enable/step trigger", measured_to: "prbs_valid pulse" }
  throughput:
    samples_per_cycle: 1
    conditions: "Free-run mode, non-zero state, no zero-lockup"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "all_inputs_except_PCLK_PRESETn", clock: "pclk", delay_ns: 2.0, source: "system-level timing budget" }
    outputs:
      - { ports: "all_outputs", clock: "pclk", delay_ns: 2.0, source: "system-level timing budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["pclk"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode in this IP revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "reset deasserted", exit: "reset asserted", guarantees: ["All behavior active"] }
  upf_required: false
security:
  classification: "non_secure_peripheral"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
    - { name: "prbs_sequence", protection: "No cryptographic guarantee; LFSR output is deterministic from seed+poly" }
  threat_model:
    - { threat: "illegal register write while running", mitigation: "Register writes are accepted in any state; software is responsible for proper sequencing" }
  privilege_model: "No internal privilege; APB bus fabric enforces access policy"
  safety_goals:
    - "Zero-lockup detection prevents silent stall"
error_handling:
  error_sources:
    - { id: "ERR_ZERO_LOCKUP", condition: "LFSR state is all zeros after shift", architectural_effect: "STATUS.zero_lockup=1; shifting halted" }
    - { id: "ERR_INVALID_PRESET", condition: "CTRL.preset_select >= NUM_PRESETS", architectural_effect: "No change to POLY; write ignored" }
  propagation:
    - "Zero-lockup is visible in STATUS register; no interrupt in this revision."
    - "Invalid preset is silently ignored."
  recovery:
    - { action: "software writes non-zero seed via CTRL.load_seed", clears: ["STATUS.zero_lockup"], preserves: ["POLY", "COUNT", "CTRL.enable"] }
debug_observability:
  waveform_must_probe:
    - "lfsr_state"
    - "feedback_bit"
    - "prbs_out"
    - "prbs_valid"
    - "fsm_state (IDLE/RUNNING/STEPPING/ZERO_LOCKUP)"
    - "ctrl_enable, ctrl_mode"
  status_outputs:
    - "STATUS.running"
    - "STATUS.zero_lockup"
  trace_events:
    - { name: "seed_loaded", trigger: "CTRL.load_seed write" }
    - { name: "shift_complete", trigger: "prbs_valid pulse" }
    - { name: "zero_lockup", trigger: "STATUS.zero_lockup transition to 1" }
  debug_registers:
    - "STATE (read LFSR state directly)"
    - "STATUS (running + zero_lockup flags)"
    - "COUNT (shift counter)"
integration:
  bus_attachment:
    control: "APB-lite slave"
  connections:
    - { module: "lfsr_core", port: "clk_i", signal: "PCLK" }
    - { module: "lfsr_core", port: "rst_ni", signal: "PRESETn" }
    - { module: "lfsr_regs", port: "clk_i", signal: "PCLK" }
    - { module: "lfsr_regs", port: "rst_ni", signal: "PRESETn" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "Read returns 0 with PREADY=1; write ignored with PREADY=1 (APB-lite no PSLVERR)"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC APB bus fabric connects PADDR/PSEL/PENABLE/PWRITE/PWDATA to this IP."
    - "prbs_out and prbs_valid connect directly to downstream consumer logic."
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
  observability:
    required_internal_points: ["lfsr_state", "STATUS"]
  mbist_required: false
  notes: "No SRAM macro; DFT relies on scan insertion during SoC integration."
synthesis:
  dialect: "systemverilog_2012"
  top_module: "lfsr"
  technology:
    pdk: "generic"
    standard_cell_library: "generic"
  constraints:
    - "No inferred latches"
    - "All flops reset via PRESETn (active-low async)"
    - "No package/interface/modport/function/task/for/while constructs"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/lfsr.json or syn/out/lfsr.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers: { horizontal: "met3", vertical: "met2" }
  cts: { buf_list: ["sky130_fd_sc_hd__clkbuf_4"] }
  routing: { signal_layers: { min: "met1", max: "met5" }, drc_waivers: [] }
  required_outputs:
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/pnr.report.md"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/lfsr_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge clk …)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs (use a default)"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)"
    - "Parameterize widths (no hardcoded numbers)"
    - "Use rtl/lfsr_param.vh for shared parameter declarations"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam state encoding with logic state/next_state signals"
  lint_waivers:
    - "UNUSEDSIGNAL: explicit tie-offs only"
    - "WIDTHEXPAND: XOR-reduce of wide vectors"
reuse_modules: []
custom:
  assumptions:
    - "Galois LFSR topology: shift left, XOR-reduce feedback feeds bit 0. No Fibonacci mode in this revision."
    - "POLY register default is 0 (no taps); software must configure via direct write or preset_select before enabling."
    - "SEED register default is 1 to avoid immediate zero-lockup on load_seed."
    - "OUTPUT_WIDTH must be <= LFSR_WIDTH; the SSOT does not enforce this at elaboration time — it is an integration constraint."
    - "APB-lite interface: no PSLVERR pin; all addresses return OKAY with no side effect for unsupported offsets."
    - "No interrupt output in this revision; status polled via APB."
    - "preset_select >= NUM_PRESETS is silently ignored; POLY unchanged."
    - "PRBS sequence is deterministic from (seed, poly_mask); not cryptographically secure."
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"
filelist:
  headers:
    - "rtl/lfsr_param.vh"
  rtl:
    - "rtl/lfsr_regs.sv"
    - "rtl/lfsr_core.sv"
    - "rtl/lfsr.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/lfsr_model.sv"
  firmware:
    - "firmware/lfsr_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"
test_requirements:
  scenarios:
    - id: "SC1"
      name: "Free-run PRBS generation"
      stimulus: "Configure SEED=0xACE1, POLY=0xA3000001 (PRBS-31), set CTRL.enable=1 CTRL.mode=0, run 1000 cycles"
      expected: "prbs_out changes every cycle, prbs_valid pulses every cycle, STATE register matches reference model, COUNT increments by 1000"
      checker: "Python reference model compares expected lfsr_state and prbs_out per cycle"
      coverage: ["FM1", "S3_SHIFT", "S4_OUTPUT"]
    - id: "SC2"
      name: "Single-step PRBS generation"
      stimulus: "Configure SEED=0x1, POLY=0x3 (4-bit LFSR), set CTRL.mode=1, pulse CTRL.step_req three times"
      expected: "Exactly 3 shifts occur, prbs_valid pulses 3 times, COUNT=3"
      checker: "Reference model verifies each step state"
      coverage: ["FM2", "STEPPING"]
    - id: "SC3"
      name: "Seed load and resume from zero-lockup"
      stimulus: "Run until zero-lockup occurs (seed=0), then write SEED=0xDEAD, CTRL.load_seed=1"
      expected: "STATUS.zero_lockup=1 after zero state, cleared after seed load, LFSR resumes generating"
      checker: "Check STATUS.zero_lockup transitions and output resumes"
      coverage: ["FM3", "ZERO_LOCKUP", "ERR_ZERO_LOCKUP"]
    - id: "SC4"
      name: "Polynomial preset selection"
      stimulus: "Write CTRL.preset_select=0 (PRBS-7), verify POLY loaded; write preset_select=99 (invalid), verify POLY unchanged"
      expected: "Valid preset loads correct POLY mask; invalid preset ignored"
      checker: "Read back POLY after each write"
      coverage: ["FM4", "ERR_INVALID_PRESET"]
    - id: "SC5"
      name: "Reset clears all state"
      stimulus: "Run LFSR for 100 cycles, assert PRESETn, deassert"
      expected: "STATE=0, STATUS=0, COUNT=0, prbs_valid=0, prbs_out=0 after reset"
      checker: "Read all registers post-reset"
      coverage: ["reset"]
    - id: "SC6"
      name: "APB register readback"
      stimulus: "Write all writable registers, read them back"
      expected: "Read data matches written data for CTRL, SEED, POLY; STATE and STATUS reflect current operation"
      checker: "APB readback comparison"
      coverage: ["APB_access"]
    - id: "SC7"
      name: "Seed load while running"
      stimulus: "Run in free-run mode, trigger CTRL.load_seed mid-stream"
      expected: "LFSR state overwritten with SEED value, generation continues from new state"
      checker: "State changes immediately, output sequence restarts from new seed"
      coverage: ["FM3", "seed_load_precedence"]
  scoreboard_checks: 12
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage: what the LFSR computes per transaction."
      bins:
        - { id: "FCOV_FREE_RUN_SHIFT", source_ref: "function_model.transactions.FM1", class: "transaction", description: "Free-run shift observed by scoreboard" }
        - { id: "FCOV_SINGLE_STEP", source_ref: "function_model.transactions.FM2", class: "transaction", description: "Single-step shift observed" }
        - { id: "FCOV_SEED_LOAD", source_ref: "function_model.transactions.FM3", class: "transaction", description: "Seed load observed" }
        - { id: "FCOV_PRESET_SELECT", source_ref: "function_model.transactions.FM4", class: "transaction", description: "Preset polynomial load observed" }
        - { id: "FCOV_ZERO_LOCKUP", source_ref: "function_model.transactions.FM1.error_cases", class: "error_case", description: "Zero-lockup detection observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/FSM coverage: when behavior occurs."
      bins:
        - { id: "CCOV_SHIFT_COMPLETE", source_ref: "cycle_model.pipeline.S3_SHIFT", class: "pipeline_stage", description: "Shift+output stage observed" }
        - { id: "CCOV_PRBS_VALID_PULSE", source_ref: "cycle_model.handshake_rules.prbs_valid", class: "handshake", description: "prbs_valid one-cycle pulse observed" }
        - { id: "CCOV_FSM_IDLE_RUNNING", source_ref: "fsm.lfsr_control.transitions", class: "state_transition", description: "IDLE→RUNNING transition observed" }
        - { id: "CCOV_FSM_RUNNING_ZERO_LOCKUP", source_ref: "fsm.lfsr_control.transitions", class: "state_transition", description: "RUNNING→ZERO_LOCKUP transition observed" }
        - { id: "CCOV_FSM_ZERO_LOCKUP_IDLE", source_ref: "fsm.lfsr_control.transitions", class: "state_transition", description: "ZERO_LOCKUP→IDLE via seed load observed" }
    functional: "Function + cycle coverage must both close."
    code: "line >= 90%, branch >= 85%"
quality_gates:
  ssot:
    pass: "All canonical sections present, substantive, no TBD placeholders."
    evidence: ["check_ssot_disk.sh PASS"]
  rtl_gen:
    profile: "production"
    target_scale:
      basis: "LFSR is a small peripheral; depth target not enforced"
      source_files_min: 0
      modules_min: 0
    target_scale_waiver:
      approved: true
      reason: "Small peripheral IP; structural depth not a meaningful gate"
      owner: "ssot-gen"
    pass: "SSOT-derived RTL compiles, lints, and matches function_model/cycle_model."
    evidence: ["rtl/rtl_todo_plan.json", "rtl/rtl_authoring_provenance.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, lints."
    evidence: ["rtl compile report", "dut lint report"]
  coverage:
    pass: "SSOT-declared function/cycle/code coverage goals pass."
    evidence: ["cov/coverage.json"]
  eda:
    pass: "Synthesis and STA meet timing targets."
    evidence: ["syn report", "sta reports"]
traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "lfsr_param.vh (shared parameter include)" }
    - { yaml: "io_list.interfaces", output: "lfsr.sv (port list)" }
    - { yaml: "registers.register_list", output: "lfsr_regs.sv + firmware + docs" }
    - { yaml: "function_model", output: "lfsr_core.sv + reference model" }
    - { yaml: "cycle_model", output: "lfsr_core.sv shift/feedback logic + waveform checks" }
    - { yaml: "fsm", output: "lfsr_core.sv FSM + docs" }
    - { yaml: "timing", output: "STA constraints" }
    - { yaml: "test_requirements", output: "sim/tb_top.sv and test scenarios" }
workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_LFSR_CORE"
      content: "Implement LFSR shift register with XOR-reduce feedback in lfsr_core.sv"
      detail: "Translate function_model FM1/FM2 transactions and cycle_model pipeline into RTL state/datapath/control logic in lfsr_core.sv. Implement Galois LFSR: shift left, feedback = XOR-reduce(lfsr_state & poly_mask), insert at bit 0."
      criteria:
        - "lfsr_core.sv contains lfsr_state register with parameterized LFSR_WIDTH"
        - "Feedback XOR-reduce logic matches function_model expression"
        - "FSM states IDLE/RUNNING/STEPPING/ZERO_LOCKUP match fsm.lfsr_control"
        - "prbs_out and prbs_valid ports match io_list"
      source_refs: ["function_model.transactions", "cycle_model.pipeline", "fsm.lfsr_control"]
      owner_module: "lfsr_core"
      owner_file: "rtl/lfsr_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_LFSR_REGS"
      content: "Implement APB-lite register decode in lfsr_regs.sv"
      detail: "Decode PADDR for CTRL/SEED/POLY/STATE/STATUS/COUNT registers per registers.register_list. Zero-wait-state PREADY. Auto-clear load_seed and step_req."
      criteria:
        - "APB-lite protocol timing matches cycle_model.latency"
        - "All register fields match bit ranges and access policies"
        - "load_seed and step_req auto-clear"
      source_refs: ["registers.register_list", "cycle_model.latency"]
      owner_module: "lfsr_regs"
      owner_file: "rtl/lfsr_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_LFSR_TOP"
      content: "Implement top-level wiring in lfsr.sv"
      detail: "Instantiate lfsr_regs and lfsr_core, wire APB ports, clock/reset, and output ports per io_list."
      criteria:
        - "Top module port list matches io_list exactly"
        - "All sub-module instances wired per integration.connections"
      source_refs: ["io_list", "integration.connections"]
      owner_module: "lfsr"
      owner_file: "rtl/lfsr.sv"
      priority: "high"
      required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh lfsr", description: "Validate production SSOT structure and quality gates" }
    - { name: "handoff_fl_model", command: "/ssot-fl-model lfsr", description: "FunctionalModel from validated SSOT" }
    - { name: "handoff_rtl", command: "/ssot-rtl lfsr", description: "RTL generation from validated SSOT" }
    - { name: "handoff_tb", command: "/ssot-tb lfsr", description: "Testbench from validated SSOT" }
    - { name: "handoff_sim_debug", command: "/wf sim_debug", description: "Simulation and debug" }
    - { name: "handoff_coverage", command: "/coverage lfsr", description: "Coverage measurement" }
    - { name: "handoff_eda", command: "/syn lfsr && /sta lfsr", description: "Synthesis and STA" }
