memory:
  internal:
  - name: ch_fifo
    kind: fifo
    width: DATA_WIDTH
    depth: FIFO_DEPTH
    per_instance: true
    instances:
    - ch0_fifo
    - ch1_fifo
    - ch2_fifo
    - ch3_fifo
    description: Per-channel FIFO buffering read data before write phase
interrupts:
  outputs:
  - name: irq
    width: N_CHANNELS
    active_level: high
    trigger: level
    description: Per-channel interrupt for done or error
  - name: irq_combined
    width: 1
    active_level: high
    trigger: level
    description: Combined interrupt OR of all enabled channel IRQs
  mask_registers:
  - INT_ENABLE
  clear_registers:
  - INT_CLEAR
  status_registers:
  - INT_STATUS
fsm:
  per_channel:
    states:
    - IDLE
    - CFG
    - REQUEST
    - READ
    - WRITE
    - UPDATE
    - DONE
    - ERROR
    initial: IDLE
    transitions:
    - from: IDLE
      to: CFG
      condition: ch_start && ch_en && dma_en && valid_cfg
    - from: IDLE
      to: ERROR
      condition: ch_start && ch_en && !valid_cfg
    - from: CFG
      to: REQUEST
      condition: next_cycle
    - from: REQUEST
      to: READ
      condition: arb_grant
    - from: READ
      to: WRITE
      condition: read_burst_complete
    - from: WRITE
      to: UPDATE
      condition: write_burst_complete
    - from: UPDATE
      to: READ
      condition: remaining_gt_0
    - from: UPDATE
      to: DONE
      condition: remaining_eq_0
    - from: DONE
      to: IDLE
      condition: status_sampled
    - from: ERROR
      to: IDLE
      condition: status_sampled
timing:
  target_clocks:
  - clock: pclk
    target_freq_mhz: 100
    description: Target operating frequency for single clock domain
  latency_budget:
    apb_access: 2
    channel_start_to_first_read: 4
    burst_read_latency: BURST_MAX
    burst_write_latency: BURST_MAX
    completion_to_irq: 2
power:
  domains:
  - name: pd_core
    clocks:
    - pclk
    description: Single power domain for all logic
  power_states:
  - state: active
    description: All logic powered and clocked
  - state: idle
    description: No active transfers, clock gating possible
security:
  classification: internal
  assets:
  - name: channel_config
    type: configuration
    description: DMA channel source/destination/length registers
  - name: transfer_data
    type: data
    description: Data words in transit through FIFO
  threat_model:
  - threat: unauthorized_channel_access
    mitigation: APB bus access restricted by system bus matrix
    severity: medium
  - threat: dma_transfer_corruption
    mitigation: Error detection and reporting per channel
    severity: high
error_handling:
  error_sources:
  - id: ERR_ALIGN
    source: channel_start
    condition: src_addr[1:0] != 0 or dst_addr[1:0] != 0
    code: 1
    description: Misaligned source or destination address
  - id: ERR_ZERO_LEN
    source: channel_start
    condition: CHx_LEN == 0
    code: 2
    description: Zero-length transfer requested
  - id: ERR_BUS
    source: ahb_transfer
    condition: hresp == ERROR
    code: 3
    description: AHB bus error during transfer
  propagation:
  - error latched in CHx_STATUS.error
  - error code latched in CHx_STATUS.err_code
  - irq[ch] asserted if int_enable[ch] is set
  - irq_combined reflects OR of all enabled irq outputs
  recovery:
  - Software reads CHx_STATUS to identify error code
  - Software writes INT_CLEAR to clear error and done latches
  - Channel returns to IDLE after status is cleared
  - No automatic retry
debug_observability:
  waveform_must_probe:
  - pclk
  - presetn
  - psel, penable, pwrite, paddr, pwdata, prdata, pready, pslverr
  - haddr, htrans, hsize, hburst, hwrite, hwdata, hrdata, hready, hresp, hbusreq,
    hgrant
  - irq, irq_combined
  - per_channel state FSM
  - per_channel remaining counter
  - per_channel src_addr and dst_addr counters
  trace_events:
  - channel_start
  - burst_read_start
  - burst_read_complete
  - burst_write_start
  - burst_write_complete
  - transfer_done
  - transfer_error
  - arbiter_grant
integration:
  bus_attachment:
    apb_slave: connects to APB bus matrix for configuration
    ahb_master: connects to AHB-Lite bus matrix for data transfer
  dependencies:
  - APB bus matrix provides psel, penable, pwrite, paddr, pwdata
  - AHB-Lite bus matrix provides hready, hrdata, hresp, hgrant
  - System interrupt controller receives irq_combined
synthesis:
  dialect: systemverilog-2012
  constraints:
  - clock: pclk
    period_ns: 10.0
    uncertainty_ns: 0.5
  required_outputs:
  - prdata
  - pready
  - pslverr
  - haddr
  - hwrite
  - htrans
  - hsize
  - hburst
  - hwdata
  - hbusreq
  - irq
  - irq_combined
coding_rules:
  - use input logic / output logic port style
  - no always_ff / always_comb / for / while / typedef / enum
  - no package / import / interface / modport / function / task
  - use always @(posedge) / always @(*) style
  - all state registers have async reset
reuse_modules: []
custom:
  assumptions:
  - single_clock_domain: pclk is the only clock
  - word_aligned_addresses: all addresses are 32-bit word aligned
  - max_burst_16: burst length does not exceed 16
  - no_scatter_gather: contiguous address transfers only
dir_structure:
  rtl: rtl/
  tb: tb/cocotb/
  sim: sim/
  lint: lint/
  cov: cov/
  model: model/
  verify: verify/
  list: list/
filelist:
  rtl:
  - rtl/dma_real_top.sv
  - rtl/dma_real_apb_cfg.sv
  - rtl/dma_real_arbiter.sv
  - rtl/dma_real_channel.sv
  - rtl/dma_real_ahb_master.sv
  - rtl/dma_real_irq.sv
test_requirements:
  scenarios:
  - id: SC_001
    name: single_channel_transfer
    stimulus: configure CH0 with aligned src=0x1000, dst=0x2000, len=4, start transfer
    expected: CH0_STATUS.done=1, 4 words transferred, irq[0] asserted
    checker: scoreboard compares FL vs RTL per-busy/done/error
    coverage:
    - function_dma_step
  - id: SC_002
    name: alignment_error
    stimulus: configure CH0 with src=0x1001 (misaligned), len=4, start
    expected: CH0_STATUS.error=1, err_code=1, no transfer occurs
    checker: scoreboard verifies error output matches FL
    coverage:
    - function_dma_error_align
  - id: SC_003
    name: zero_length_error
    stimulus: configure CH0 with aligned addresses, len=0, start
    expected: CH0_STATUS.error=1, err_code=2, no transfer occurs
    checker: scoreboard verifies error output matches FL
    coverage:
    - function_dma_error_zero_len
  - id: SC_004
    name: busy_reject
    stimulus: start CH0 transfer, then start again while busy
    expected: second start ignored, transfer continues
    checker: scoreboard verifies busy remains high and no duplicate transfer
    coverage:
    - function_dma_busy_reject
  - id: SC_005
    name: multi_channel_round_robin
    stimulus: start CH0 and CH1 simultaneously with len=8 each
    expected: both complete, arbiter alternates grants, both irq asserted
    checker: scoreboard verifies both channels complete with correct data
    coverage:
    - function_dma_multi_ch
    - cycle_arb_round_robin
  - id: SC_006
    name: bus_error_during_transfer
    stimulus: configure CH0, start transfer, inject hresp=ERROR on first read
    expected: CH0_STATUS.error=1, err_code=3, transfer aborted
    checker: scoreboard verifies error after bus error response
    coverage:
    - function_dma_error_bus
  - id: SC_007
    name: global_enable_disable
    stimulus: start CH0 transfer, then clear dma_en mid-transfer
    expected: current burst completes, then pauses. Resume when dma_en re-asserted
    checker: scoreboard verifies pause and resume behavior
    coverage:
    - function_dma_global_enable
  - id: SC_008
    name: interrupt_clear
    stimulus: complete CH0 transfer, verify irq[0] asserted, write INT_CLEAR
    expected: irq[0] deasserted, CH0_STATUS.done cleared
    checker: scoreboard verifies IRQ deassertion
    coverage:
    - function_dma_irq_clear
  - id: SC_009
    name: apb_unmapped_address
    stimulus: APB read from unmapped address (e.g. 0xFFC)
    expected: pslverr=1, prdata=0
    checker: scoreboard verifies pslverr response
    coverage:
    - function_dma_apb_err
  scoreboard_checks:
  - per-channel busy/done/error output matches FunctionalModel
  - per-channel remaining counter matches FL state
  - per-channel src/dst address counters match FL state
  - arbiter grant matches round-robin policy
  - IRQ outputs match mask and status
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      bins:
      - id: function_dma_step
        source_ref: function_model.transactions.FM_DMA_STEP
        class: transaction
        description: Valid DMA step with burst transfer
      - id: function_dma_error_align
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Alignment error path
      - id: function_dma_error_zero_len
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Zero-length error path
      - id: function_dma_error_bus
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Bus error during AHB transfer
      - id: function_dma_busy_reject
        source_ref: function_model.transactions.FM_DMA_START
        class: error_case
        description: Start while busy rejected
      - id: function_dma_multi_ch
        source_ref: function_model.transactions.FM_ARB_GRANT
        class: arbitration
        description: Multiple channels active simultaneously
      - id: function_dma_global_enable
        source_ref: function_model.state_variables.dma_en_q
        class: control
        description: Global enable disable with in-progress transfer
      - id: function_dma_irq_clear
        source_ref: function_model.state_variables.int_enable_q
        class: interrupt
        description: Interrupt clear via INT_CLEAR register
      - id: function_dma_apb_err
        source_ref: function_model.transactions.FM_DMA_START
        class: protocol
        description: APB error on unmapped address access
    cycle:
      target_pct: 100
      model: cycle_model
      bins:
      - id: cycle_pipeline_idle
        source_ref: cycle_model.pipeline[0]
        class: state
        description: Channel FSM IDLE state visited
      - id: cycle_pipeline_cfg
        source_ref: cycle_model.pipeline[1]
        class: state
        description: Channel FSM CFG state visited
      - id: cycle_pipeline_request
        source_ref: cycle_model.pipeline[2]
        class: state
        description: Channel FSM REQUEST state visited
      - id: cycle_pipeline_read
        source_ref: cycle_model.pipeline[3]
        class: state
        description: Channel FSM READ state visited
      - id: cycle_pipeline_write
        source_ref: cycle_model.pipeline[4]
        class: state
        description: Channel FSM WRITE state visited
      - id: cycle_pipeline_update
        source_ref: cycle_model.pipeline[5]
        class: state
        description: Channel FSM UPDATE state visited
      - id: cycle_pipeline_done
        source_ref: cycle_model.pipeline[6]
        class: state
        description: Channel FSM DONE state visited
      - id: cycle_pipeline_error
        source_ref: cycle_model.pipeline[7]
        class: state
        description: Channel FSM ERROR state visited
      - id: cycle_arb_round_robin
        source_ref: cycle_model.performance
        class: arbitration
        description: Round-robin arbitration switching between channels
      - id: cycle_burst_latency
        source_ref: cycle_model.handshake_rules.ahb_address_phase
        class: timing
        description: Burst completion latency measured
quality_gates:
  ssot:
    pass: SSOT YAML passes check_ssot_disk.sh validator with no missing sections
    evidence: yaml/dma_real.ssot.yaml
  rtl:
    pass: RTL compile and lint clean with 0 errors
    evidence: rtl/rtl_compile.json, lint/dut_lint.json
  dv:
    pass: All equivalence goals pass with 0 FL-vs-RTL mismatches
    evidence: sim/results.xml, sim/scoreboard_events.jsonl
  coverage:
    pass: 100% of planned functional and cycle coverage bins hit
    evidence: cov/coverage_functional.json, cov/fcov_plan.json
traceability:
  yaml_to_output:
  - ssot_section: top_module
    output: rtl/dma_real_top.sv
  - ssot_section: sub_modules
    output: rtl/dma_real_*.sv
  - ssot_section: io_list
    output: port declarations in all RTL modules
  - ssot_section: registers
    output: register decode in rtl/dma_real_apb_cfg.sv
  - ssot_section: function_model
    output: model/functional_model.py
  - ssot_section: cycle_model
    output: model/cycle_model.py
  - ssot_section: fsm
    output: FSM logic in rtl/dma_real_channel.sv
  - ssot_section: error_handling
    output: error detection in rtl/dma_real_channel.sv
  - ssot_section: interrupts
    output: IRQ logic in rtl/dma_real_irq.sv
  - ssot_section: test_requirements
    output: tb/cocotb/test_dma_real.py
workflow_todos:
  rtl-gen:
  - content: Implement top-level DMA wiring module connecting APB, AHB, arbiter, channels,
      and IRQ
    detail: dma_real_top.sv instantiates apb_cfg, arbiter, 4x channel, ahb_master,
      and irq. Wire APB slave ports, AHB master ports, and IRQ outputs per io_list.
    criteria:
    - top module ports match SSOT io_list exactly
    - all sub-modules instantiated and connected
    - compile clean with iverilog -g2012
    source_refs:
    - io_list
    - sub_modules
    - integration
  - content: Implement APB slave configuration decode with register read/write
    detail: dma_real_apb_cfg decodes paddr to global and per-channel registers. Write
      data latched, read data muxed. pslverr on unmapped addresses.
    criteria:
    - all register offsets decoded correctly per SSOT register map
    - write_effect implemented for each field
    - read returns correct field values
    - pslverr asserted for unmapped addresses
    source_refs:
    - registers.register_list
    - io_list.interfaces.apb_slave
  - content: Implement round-robin arbiter for AHB bus access
    detail: dma_real_arbiter accepts request from each active channel and grants bus
      to next channel in round-robin order. One grant per burst.
    criteria:
    - round-robin pointer advances after each grant
    - only one channel granted at a time
    - idle channels not considered
    source_refs:
    - function_model.transactions.FM_ARB_GRANT
    - cycle_model.performance
  - content: Implement per-channel FSM with address counters and burst control
    detail: dma_real_channel implements IDLE/CFG/REQUEST/READ/WRITE/UPDATE/DONE/ERROR
      FSM. Latches src_addr, dst_addr, remaining from config. Increments addresses
      after each burst. Detects alignment and zero-length errors.
    criteria:
    - all FSM states and transitions match SSOT
    - address counters increment by burst_len * 4
    - remaining counter decrements correctly
    - error detection for alignment, zero-length
    - busy/done/error status outputs match FL
    source_refs:
    - fsm.per_channel
    - function_model.transactions.FM_DMA_START
    - function_model.transactions.FM_DMA_STEP
    - function_model.transactions.FM_DMA_COMPLETE
    - function_model.transactions.FM_DMA_ERROR
    - error_handling
  - content: Implement AHB-Lite master protocol engine
    detail: dma_real_ahb_master drives haddr, htrans, hsize, hburst, hwrite, hwdata
      per AHB-Lite protocol. Supports INCR4/8/16 bursts. Monitors hready and hresp.
    criteria:
    - address phase and data phase timing correct
    - NONSEQ for first beat, SEQ for subsequent
    - hburst encoded based on remaining count
    - hresp=ERROR triggers error reporting
    source_refs:
    - io_list.interfaces.ahb_master
    - cycle_model.pipeline
    - cycle_model.handshake_rules
  - content: Implement interrupt aggregation with mask and combined output
    detail: dma_real_irq aggregates per-channel done/error status with INT_ENABLE mask.
      Generates per-channel irq and combined irq_combined outputs.
    criteria:
    - irq[ch] reflects (done_q[ch] OR error_q[ch]) AND int_enable_q[ch]
    - irq_combined is OR of all per-channel irq
    - INT_CLEAR clears done_q and error_q for selected channels
    source_refs:
    - interrupts
    - io_list.interfaces.irq_outputs
    - registers.register_list
  tb-gen:
  - content: Generate SSOT-driven cocotb testbench for DMA scenarios
    detail: cocotb TB with APB driver, AHB-Lite slave model, scoreboard, and coverage
      collector. Stimulus covers all 9 scenarios from test_requirements.
    criteria:
    - APB driver exercises register read/write
    - AHB slave model responds to read/write with configurable hready and hresp
    - scoreboard checks FL-vs-RTL equivalence per goal
    - coverage bins sampled from passing scoreboard rows
    source_refs:
    - test_requirements.scenarios
    - test_requirements.coverage_goals
    - io_list.interfaces.apb_slave
    - io_list.interfaces.ahb_master
generation_flow:
  stages:
  - name: ssot-gen
    tool: manual_or_llm
    evidence: yaml/dma_real.ssot.yaml passes check_ssot_disk.sh
  - name: fl-model-gen
    tool: deterministic
    evidence: model/functional_model.py and model/fl_model_check.json
  - name: cl-model-gen
    tool: deterministic
    evidence: model/cycle_model.py and CL self-check
  - name: equiv-goals
    tool: deterministic
    evidence: verify/equivalence_goals.json with blocked=0
  - name: rtl-gen
    tool: llm
    evidence: rtl/*.sv files, rtl/rtl_compile.json, lint/dut_lint.json
  - name: lint
    tool: deterministic
    evidence: lint/dut_lint.json
  - name: tb-gen
    tool: llm
    evidence: tb/cocotb/*.py, tb/cocotb/tb_manifest.json
  - name: sim
    tool: deterministic
    evidence: sim/results.xml, sim/scoreboard_events.jsonl
  - name: sim-debug
    tool: deterministic
    evidence: sim/mismatch_classification.json
  - name: coverage
    tool: deterministic
    evidence: cov/coverage_functional.json
  - name: goal-audit
    tool: deterministic
    evidence: sim/fl_rtl_goal_audit.json
rtl_contract:
  clock: pclk
  reset: presetn
  reset_active: low
  transaction: FM_DMA_STEP
  sample_condition: ch_start or ch_busy or ch_done or ch_error or irq
  input_map:
    ch_id: ch_id
    src_addr: CHx_SRC_ADDR
    dst_addr: CHx_DST_ADDR
    length: CHx_LEN
    ch_en: CHx_CTRL.ch_en
    ch_start: CHx_CTRL.ch_start
    dma_en: GLOBAL_CTRL.dma_en
  output_map:
    ch_busy_next: ch_busy
    done_pulse: ch_done
    error_flag: ch_error
    error_code_val: ch_err_code
    irq_assert: irq
    grant_next: arb_grant
