# =============================================================================
# apb_compare.ssot.yaml — Two-register equality comparator
# Demonstrates: APB CSR + combinational output of two state variables.
# =============================================================================
top_module:
  name: apb_compare
  file: rtl/apb_compare.sv
  version: "1.0"
  type: peripheral
  description: "Two 32-bit registers (VALUE, REFERENCE) accessed via APB. match_o output is high when VALUE equals REFERENCE."
  reference_spec: "ATLAS framework demo"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: csr_decode, kind: control, source_refs: [registers.register_list], rtl_candidates: [apb_compare], verification_impact: [test_requirements.scenarios] }
    - { id: compare,    kind: datapath, source_refs: [function_model.transactions], rtl_candidates: [apb_compare], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: apb_compare
    file: rtl/apb_compare.sv
    ownership: manifest
    ssot_gen: true
    source_sections: [io_list, registers, function_model]
    implements: [io_list.interfaces.apb_slave, registers.register_list, function_model.transactions]
    register_refs: [registers.register_list]
    function_model_refs: [function_model.transactions.FM_WRITE, function_model.transactions.FM_IDLE]
    description: "APB decode + two registers + equality compare."

parameters:
  - { name: APB_ADDR_WIDTH, default: 4, type: int, description: "APB address width" }
  - { name: APB_DATA_WIDTH, default: 32, type: int, description: "APB data width" }

io_list:
  clock_domains:
    - name: pclk
      frequency_mhz: 50
      description: "APB clock"
      ports:
        - { name: PCLK, width: 1, direction: input }
  resets:
    - name: presetn
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "APB reset"
      ports:
        - { name: PRESETn, width: 1, direction: input }
  interfaces:
    - name: apb_slave
      type: APB-Lite
      role: slave
      clock_domain: pclk
      reset_domain: presetn
      description: "APB-Lite CSR"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0"
        access_phase: "PSEL=1, PENABLE=1, PREADY=1"
      ports:
        - { name: PADDR,   width: 4,  direction: input  }
        - { name: PSEL,    width: 1,  direction: input  }
        - { name: PENABLE, width: 1,  direction: input  }
        - { name: PWRITE,  width: 1,  direction: input  }
        - { name: PWDATA,  width: 32, direction: input  }
        - { name: PRDATA,  width: 32, direction: output }
        - { name: PREADY,  width: 1,  direction: output }
        - { name: PSLVERR, width: 1,  direction: output }
    - name: compare_output
      type: custom
      clock_domain: pclk
      reset_domain: presetn
      description: "Equality match output"
      ports:
        - { name: match_o, width: 1, direction: output, description: "High when VALUE equals REFERENCE" }

features:
  - name: APB CSR access
    trigger: "APB master read/write to VALUE or REFERENCE"
    datapath: "Address decode selects register"
    control: "0-wait-state PREADY"
    output: "Register update / read-back"
  - name: Equality compare
    trigger: "Continuous combinational compare"
    datapath: "match_o = (value_q == reference_q)"
    control: "Combinational"
    output: "match_o"

registers:
  config:
    register_width: 32
    addr_width: 4
    byte_addressable: true
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "Reserved bits read zero"
  register_list:
    - name: VALUE
      offset: 0x0
      width: 32
      access: rw
      reset: 0x00000000
      category: data
      description: "Value register"
      write_side_effects:
        - "PWDATA latched into value_q on write access phase."
      fields:
        - { name: data, bits: [31, 0], access: rw, reset: 0, write_effect: "Update value_q", description: "Value" }
    - name: REFERENCE
      offset: 0x4
      width: 32
      access: rw
      reset: 0x00000000
      category: data
      description: "Reference register"
      write_side_effects:
        - "PWDATA latched into reference_q on write access phase."
      fields:
        - { name: data, bits: [31, 0], access: rw, reset: 0, write_effect: "Update reference_q", description: "Reference" }

memory:
  instances: []
  note: "No FIFO/SRAM."

interrupts:
  sources: []
  output: null
  note: "No interrupts."

fsm:
  apb_phase:
    states: [IDLE, ACCESS]
    transitions:
      - { from: IDLE,   to: ACCESS, condition: "psel == 1 and penable == 1" }
      - { from: ACCESS, to: IDLE,   condition: "psel == 0" }

rtl_contract:
  transaction: FM_WRITE
  clock: PCLK
  reset: PRESETn
  reset_active: low
  sample_condition: "PRESETn == 1"
  input_map:
    psel: PSEL
    penable: PENABLE
    pwrite: PWRITE
    paddr: PADDR
    pwdata: PWDATA
  output_map:
    prdata: PRDATA
    pready: PREADY
    pslverr: PSLVERR
    match_o: match_o

function_model:
  purpose: "Executable FL contract"
  state_variables:
    - { name: value_q,     source: registers.VALUE.data,     reset: 0, description: "VALUE register state" }
    - { name: reference_q, source: registers.REFERENCE.data, reset: 0, description: "REFERENCE register state" }
  transactions:
    - id: FM_WRITE
      name: apb_write
      preconditions: ["psel == 1", "penable == 1", "pwrite == 1"]
      inputs: [pwdata, paddr]
      outputs: ["VALUE/REFERENCE register updates; match_o reflects new compare result"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1 }
        - { name: match_rule,   port: match_o, width: 1, description: "1 if updated state has VALUE == REFERENCE",
            expr: "1 if ((pwdata if paddr == 0 else value_q) == (pwdata if paddr == 4 else reference_q)) else 0" }
      state_updates:
        - { name: value_q,     expr: "pwdata if paddr == 0 else value_q",     width: 32 }
        - { name: reference_q, expr: "pwdata if paddr == 4 else reference_q", width: 32 }
      side_effects: ["Selected register updated"]
      error_cases: []
    - id: FM_IDLE
      name: idle_or_read
      preconditions: ["pwrite == 0 or psel == 0 or penable == 0"]
      inputs: [paddr]
      outputs: ["match_o reflects existing compare; PRDATA on read"]
      output_rules:
        - { name: pready_rule,  port: PREADY,  expr: 1, width: 1 }
        - { name: pslverr_rule, port: PSLVERR, expr: 0, width: 1 }
        - { name: match_rule,   port: match_o, expr: "1 if value_q == reference_q else 0", width: 1 }
        - { name: prdata_rule,  port: PRDATA, width: 32,
            expr: "value_q if (psel == 1 and penable == 1 and pwrite == 0 and paddr == 0) else (reference_q if (psel == 1 and penable == 1 and pwrite == 0 and paddr == 4) else 0)" }
      state_updates:
        - { name: value_q,     expr: value_q,     width: 32 }
        - { name: reference_q, expr: reference_q, width: 32 }
      side_effects: []
      error_cases: []
  invariants:
    - "match_o is combinational: match_o = (value_q == reference_q)."
    - "PREADY=1 always, PSLVERR=0 always."

cycle_model:
  purpose: "Cycle contract"
  executable: python
  cosim: true
  clock: PCLK
  reset:
    assertion: "PRESETn low clears value_q=0, reference_q=0 -> match_o=1 (both zero)."
    deassertion: "First rising PCLK enables register updates."
  latency:
    apb_write: { min_cycles: 1, max_cycles: 1 }
    apb_read:  { min_cycles: 0, max_cycles: 0 }
  handshake_rules:
    - { signal: PREADY, rule: "Always 1 (0-wait-state)" }
    - { signal: match_o, rule: "Combinational equality of value_q and reference_q" }
  pipeline:
    - { stage: S0_DECODE, cycle: 0, action: "APB phase capture and address decode" }
    - { stage: S1_UPDATE, cycle: 1, action: "Register write; match_o updates combinationally" }
  ordering:
    - "VALUE/REFERENCE write happens on access-phase rising edge; match_o updates the same cycle."
  backpressure: ["No backpressure."]
  performance:
    frequency_mhz: 50
    throughput: { writes_per_cycle: 1 }
  observability:
    - "APB phase + match_o output observable each cycle."

clock_reset_domains:
  domains:
    - { name: PCLK, frequency_mhz: 50 }
  reset_scheme:
    signal: PRESETn
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: pwdata, sink: value_q,     path: "PWDATA -> value_q on offset 0 write" }
    - { id: sequence_1, source: pwdata, sink: reference_q, path: "PWDATA -> reference_q on offset 4 write" }
    - { id: sequence_2, source: value_q, sink: match_o,    path: "value_q == reference_q -> match_o" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]

security:
  classifications: []

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources", architectural_effect: "PSLVERR always 0" }

debug_observability:
  signals:
    - { name: value_q,     source: function_model.state_variables.value_q,     description: "VALUE register" }
    - { name: reference_q, source: function_model.state_variables.reference_q, description: "REFERENCE register" }

dft:
  scan: { enabled: false }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [PCLK, PRESETn, PADDR, PSEL, PENABLE, PWRITE, PWDATA, PRDATA, PREADY, PSLVERR, match_o]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file."

test_requirements:
  scenarios:
    - id: SC1
      name: "Both registers zero — match=1 initially"
      stimulus: "After reset, VALUE=REFERENCE=0, match_o=1"
      expected: "match_o=1"
      checker: "Scoreboard checks match_o asserted after reset."
      coverage: [reset, compare]
    - id: SC2
      name: "Write VALUE=0x55, REFERENCE stays 0 — no match"
      stimulus: "Write 0x55 to VALUE"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x55 } }
      expected: "value_q=0x55, reference_q=0, match_o=0"
      checker: "Scoreboard verifies value_q update and match_o=0."
      coverage: [FM_WRITE, compare]
    - id: SC3
      name: "Write REFERENCE=0x55 — match"
      stimulus: "Write 0x55 to VALUE then 0x55 to REFERENCE"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0x55 } }
          - { csr_write: { offset: 0x4, data: 0x55 } }
      expected: "Both 0x55, match_o=1"
      checker: "Scoreboard verifies match_o=1 after second write."
      coverage: [FM_WRITE, compare]
    - id: SC4
      name: "Write both different — no match"
      stimulus: "Write 0xAA to VALUE then 0xBB to REFERENCE"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xAA } }
          - { csr_write: { offset: 0x4, data: 0xBB } }
      expected: "match_o=0"
      checker: "Scoreboard verifies match_o stays 0."
      coverage: [FM_WRITE, compare]
    - id: SC5
      name: "Write both 0xFFFFFFFF — match all-ones"
      stimulus: "Write 0xFFFFFFFF to both registers"
      stimulus_machine_spec:
        timeline:
          - { csr_write: { offset: 0x0, data: 0xFFFFFFFF } }
          - { csr_write: { offset: 0x4, data: 0xFFFFFFFF } }
      expected: "match_o=1 with max value"
      checker: "Verifies match across full 32-bit range."
      coverage: [FM_WRITE, compare]
  scoreboard_checks:
    - "match_o tracks value_q == reference_q"
    - "PREADY=1 always"
    - "Register write captures PWDATA"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: DEMO_DONE, description: "ATLAS framework demo - apb_compare", status: planned }
