    - id: CCOV_MASTER_READ_WRITE
      source_ref: cycle_model.pipeline[1]
      class: pipeline
      description: read/write pipeline states observed
    - id: CCOV_WAIT_STATE
      source_ref: cycle_model.handshake_rules[1]
      class: backpressure
