    - rtl/rtl_todo_plan.json
    - rtl/rtl_authoring_provenance.json
  dv:
    pass: TB generation and simulation evidence pass
    evidence:
    - tb/cocotb/tb_manifest.json
    - sim/results.xml
    - sim/scoreboard_events.jsonl
  coverage:
    pass: functional and cycle bins mapped to RTL-observed evidence
    evidence:
    - cov/coverage.json
    - cov/coverage_functional.json
  eda:
    pass: synthesis, STA, PnR, and post-route STA artifacts are present or blockers captured
    evidence:
    - syn/out/area.json
    - sta/out/wns.json
    - pnr/out/drc.json
    - sta-post/out/wns.json
