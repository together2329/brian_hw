  - name: hresp_reset
    port: hresp
    expr: '0'
    width: 2
    description: FunctionalModel output observable mapped to DUT output port.
  - name: dma_int_reset
    port: dma_int
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: htrans_mst_reset
    port: htrans_mst
    expr: '0'
    width: 2
    description: FunctionalModel output observable mapped to DUT output port.
  - name: hrdata_id_cfg_status
    port: hrdata
    expr: 0x01021012 if haddr == 0 else ((CHAIN_TRANSFER_SUPPORT << 31) | (REQ_ACK_NUM << 10) | (FIFO_DEPTH << 4) | DMA_CH_NUM) if haddr == 16 else ((int_tc << 16) | (int_abort << 8) | int_error) if haddr == 48 else ch_enable if haddr == 52 else 0
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: hbusreq_on_start
    port: hbusreq_mst
    expr: '1'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: hwrite_read
    port: hwrite_mst
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: haddr_read
    port: haddr_mst
    expr: src_addr_cur
    width: ADDR_WIDTH
    description: FunctionalModel output observable mapped to DUT output port.
  - name: hsize_word
    port: hsize_mst
    expr: '2'
    width: 3
    description: FunctionalModel output observable mapped to DUT output port.
  - name: hburst_incr
    port: hburst_mst
    expr: '1'
    width: 3
    description: FunctionalModel output observable mapped to DUT output port.
  - name: hwdata_write
    port: hwdata_mst
    expr: read_data_hold
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: dma_ack_error
    port: dma_ack
    expr: '0'
    width: REQ_ACK_NUM
    description: FunctionalModel output observable mapped to DUT output port.
  unresolved_expression_refs:
  - CHAIN_TRANSFER_SUPPORT
  - DMA_CH_NUM
  - FIFO_DEPTH
  - REQ_ACK_NUM
