    - id: FCOV_ERROR_ABORT
      source_ref: function_model.transactions.FM_ERROR_ABORT
      class: error
      description: Error or abort handling is observed
    - id: FCOV_REQ_ACK
      source_ref: function_model.transactions.FM_HANDSHAKE_ACK
      class: handshake
      description: dma_req/dma_ack service is observed
    - id: FCOV_PRIORITY
      source_ref: function_model.transactions.FM_ARBITRATE
