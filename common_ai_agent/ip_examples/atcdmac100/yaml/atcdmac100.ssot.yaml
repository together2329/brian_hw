  lint_waivers: []
reuse_modules: []
custom:
  assumptions:
  - The imported DS079 V1.2 document content was not visible to this headless worker; this is an engineering draft for downstream reconciliation.
  - Draft architecture uses APB control and AHB-Lite memory master interfaces; exact DS079 bus variant, signal names, channel count, and optional peripheral handshakes must be audited.
  - NUM_CHANNELS defaults to 1 and memory-to-memory copy is the baseline behavior until DS079 evidence is attached.
  - Reset is modeled active-low synchronous on hclk; revise SSOT if DS079 requires asynchronous behavior.
  open_items:
  - Confirm exact DS079 register map, reset values, access policies, interrupt semantics, burst behavior, channel count, and alignment rules.
  - Confirm whether scatter-gather descriptors, peripheral DMA, endian conversion, low-power, or security features are mandatory.
  optional_behavior_policy:
    resolution: Optional features are disabled unless this SSOT marks them required or parameterized.
