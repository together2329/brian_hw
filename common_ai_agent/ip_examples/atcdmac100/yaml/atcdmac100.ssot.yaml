synthesis:
  dialect: systemverilog_2012
  constraints:
  - single hclk clock
  - active-low hresetn reset
  - no inferred latches
  - AHB outputs registered or stable during wait states
  required_outputs:
  - syn/out/synth.v
  - syn/out/area.json
  - syn/sdc/atcdmac100.sdc
