  - yaml: function_model
    output: functional_model.py, equivalence_goals.json, RTL behavior, scoreboard rows
  - yaml: cycle_model
    output: protocol assertions, waveform probes, simulation checks
  - yaml: test_requirements
    output: cocotb scenarios and coverage bins
  - yaml: function_model/cycle_model/test_requirements
    output: verify/equivalence_goals.json and FL-vs-RTL scoreboard contracts
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: security
    output: Threat mitigations and negative tests
  - yaml: error_handling
    output: Fault RTL paths and DV error scenarios
  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
  source_evidence:
  - source: ATCDMAC100 DS079 V1.2 pages 9-18
    facts:
    - features
    - AHB slave/master interfaces
    - dma_req/dma_ack
  - source: ATCDMAC100 DS079 V1.2 pages 19-28
    facts:
    - register map
    - interrupt status
    - channel controls
  - source: ATCDMAC100 DS079 V1.2 pages 29-34
    facts:
    - configuration options
    - programming sequences
workflow_todos:
  ssot-gen:
  - content: Promote ATCDMAC100 DS079 V1.2 PDF facts into SSOT
    detail: Use extracted pages for features, interfaces, register map, function model, coverage, and signoff requirements.
    criteria:
    - check_ssot_disk signoff passes and traceability lists source page ranges.
    source_refs:
    - source_requirement
    - traceability.source_evidence
  fl-model-gen:
  - content: Generate function and cycle models from ATCDMAC100 SSOT
    detail: Models must cover AHB slave register access, arbitration, DMA read/write, handshake, terminal count, abort/error, and chain hooks.
    criteria:
    - fl_model_check and cl_model_check pass.
    source_refs:
    - function_model
    - cycle_model
  rtl-gen:
  - content: Implement DS079 AHB slave/master DMA RTL
    detail: Implement ATCDMAC100 top and core using SSOT ports, register map, function_model, cycle_model, and dynamic TODO ledger.
    criteria:
    - rtl_compile.json, dut_lint.json, rtl_todo_plan audit, and rtl_authoring_provenance all pass.
    source_refs:
    - io_list
    - registers
    - function_model
    - cycle_model
    - dataflow
    - fsm
    id: RTL_TODO_1
  - content: Preserve document traceability in RTL evidence
    detail: RTL traceability must map source refs to atcdmac100_core.sv and atcdmac100.sv.
    criteria:
    - rtl_traceability.json covers io_list, registers, function_model, cycle_model, dataflow, fsm, interrupts, and errors.
    source_refs:
    - traceability
    - quality_gates.rtl_gen
    id: RTL_TODO_2
  tb-gen:
  - content: Generate goal-driven ATCDMAC100 cocotb checks
    detail: Exercise AHB register programming, memory copy, arbitration, handshake, abort/error, and chain-observable behavior.
    criteria:
    - tb manifest and scoreboard self-check pass, sim evidence rows map to coverage refs.
    source_refs:
    - test_requirements
    - verify/equivalence_goals.json
  sim-debug:
  - content: Compare FL/RTL evidence and classify failures
    detail: Use waveform/source/scoreboard evidence for owner routing.
    criteria:
    - fl_rtl_compare and mismatch_classification are generated.
    source_refs:
    - sim/scoreboard_events.jsonl
    - verify/equivalence_goals.json
  coverage:
  - content: Close functional and cycle coverage from RTL-observed simulation
    detail: Coverage must separate function and cycle bins and record unsupported limits.
    criteria:
    - coverage.json status pass or explicit limitation with human review.
    source_refs:
    - test_requirements.coverage_goals
    - sim/scoreboard_events.jsonl
  syn:
  - content: Run Yosys synthesis for ATCDMAC100
    detail: Use generated SDC and SKY130 liberty if present.
    criteria:
    - syn/out/synth.v and syn/out/area.json exist.
    source_refs:
    - synthesis
    - timing
  sta:
  - content: Run pre-route STA
    detail: Use synthesized netlist and generated SDC.
    criteria:
    - sta/out/wns.json reports setup/hold summary.
    source_refs:
    - timing
  pnr:
  - content: Run OpenROAD PnR handoff
    detail: Produce routed netlist/DEF/SPEF/DRC evidence if PDK/OpenROAD flow is available.
    criteria:
    - pnr/out/drc.json and routed handoff files exist or blocker is captured.
    source_refs:
    - pnr
    - synthesis
  sta-post:
  - content: Run post-route STA
    detail: Use routed netlist plus parasitic SPEF.
    criteria:
    - sta-post/out/wns.json exists or blocker is captured.
    source_refs:
    - timing
    - pnr
  goal-audit:
  - content: Audit full ATCDMAC100 flow evidence
    detail: Check SSOT, model, RTL, TB, sim, coverage, and EDA handoff artifacts against the document-derived goal.
    criteria:
    - sim/fl_rtl_goal_audit.json summarizes pass/blockers.
    source_refs:
    - quality_gates
    - traceability
  sim_debug: []
