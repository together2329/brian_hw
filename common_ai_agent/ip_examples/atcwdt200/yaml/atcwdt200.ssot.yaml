# SSOT DRAFT - atcwdt200
# Source: /Users/brian/Desktop/andes/atcwdt200 reference RTL evidence + ssot-gen Q&A
# Status: approved first-pass SSOT; .session/default/atcwdt200/ssot-gen/qa.json records 9/9 approved decisions.
