rtl_contract:
  owner: ssot-gen
  type: ssot_derived_rule_contract
  clock: clk
  reset: rstn
  reset_active: low
  sample_condition: psel && penable
  input_map:
    paddr: paddr
    pwdata: pwdata
    mem_rd_ready: mem_rd_ready
    mem_wr_ready: mem_wr_ready
    mem_rd_data: mem_rd_data
    psel: psel
    penable: penable
    pwrite: pwrite
  output_map:
    prdata: prdata
    pready: pready
    pslverr: pslverr
    mem_rd_valid: mem_rd_valid
    mem_rd_addr: mem_rd_addr
    mem_wr_valid: mem_wr_valid
    mem_wr_addr: mem_wr_addr
    mem_wr_data: mem_wr_data
    mem_wr_strb: mem_wr_strb
    irq: irq
  ready_output: pready
  output_valid: mem_wr_valid
  contract_invariants:
  - RTL-visible behavior implements all function_model transactions.
  - Handshake stability follows cycle_model rules.
  transaction: FM_RESET
  output_rules:
  - name: reset_pready
    port: pready
    expr: '1'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: reset_pslverr
    port: pslverr
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: reset_mem_rd_valid
    port: mem_rd_valid
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: reset_mem_wr_valid
    port: mem_wr_valid
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: reset_irq
    port: irq
    expr: '0'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: apb_read_data
    port: prdata
    expr: case(paddr) 4:{0,irq_enable}; 12:src_addr_reg; 16:dst_addr_reg; 20:length_reg; 24:{0,irq_status,error,done,busy}; default:0; endcase
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: start_rd_addr
    port: mem_rd_addr
    expr: src_addr_reg
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_data_after_read
    port: mem_wr_data
    expr: mem_rd_data
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_addr_after_read
    port: mem_wr_addr
    expr: current_dst_addr
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_strb_after_read
    port: mem_wr_strb
    expr: '15'
    width: 4
    description: FunctionalModel output observable mapped to DUT output port.
  unresolved_expression_refs:
  - aligned
