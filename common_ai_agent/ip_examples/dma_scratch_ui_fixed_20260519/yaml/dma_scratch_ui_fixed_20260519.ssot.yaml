    expected: Outputs and side effects match `FM_APB_READ` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_READ
  - id: SC09
    name: function_model transaction FM_START_TRANSFER
    stimulus: Drive preconditions for function_model transaction `FM_START_TRANSFER`.
    expected: Outputs and side effects match `FM_START_TRANSFER` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_START_TRANSFER
  - id: SC10
    name: function_model transaction FM_READ_ACCEPT
    stimulus: Drive preconditions for function_model transaction `FM_READ_ACCEPT`.
    expected: Outputs and side effects match `FM_READ_ACCEPT` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_READ_ACCEPT
  - id: SC11
    name: function_model transaction FM_WRITE_ACCEPT
    stimulus: Drive preconditions for function_model transaction `FM_WRITE_ACCEPT`.
    expected: Outputs and side effects match `FM_WRITE_ACCEPT` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_WRITE_ACCEPT
  - id: SC12
    name: function_model transaction FM_COMPLETE
    stimulus: Drive preconditions for function_model transaction `FM_COMPLETE`.
    expected: Outputs and side effects match `FM_COMPLETE` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_COMPLETE
  scoreboard_checks: 12
  coverage_goals:
