  eda:
    pass: Synthesis/STA/DFT expectations have reports or approved waivers
    evidence:
    - syn/sta/dft reports
  signoff:
    pass: SSOT, FL/equivalence, RTL, lint, TB, sim, coverage/debug, and signoff gates have fresh evidence.
    evidence:
    - ATLAS signoff progress PASS
