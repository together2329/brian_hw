parameters:
- name: ADDR_WIDTH
  type: int
  default: 32
  description: Address width for APB paddr and memory read/write addresses.
- name: DATA_WIDTH
  type: int
  default: 32
  description: Data width for APB and memory data paths.
- name: LEN_WIDTH
  type: int
  default: 32
  description: Programmed transfer length width in bytes.
io_list:
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock.
    ports:
    - name: clk
      direction: input
      width: 1
      description: Rising-edge system clock
  resets:
  - name: rstn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset named exactly rstn at the top-level port.
    ports:
    - name: rstn
      direction: input
      width: 1
      description: Active-low reset
  interfaces:
  - name: apb
    type: apb3_subset
    role: slave
    clock_domain: clk
    reset_domain: rstn
    description: Zero-wait APB control/status interface with 32-bit address and data.
    protocol:
      acceptance: psel && penable accepts the access; pwrite selects write versus read.
      response: pready is tied high for all accesses; prdata is valid during read access; pslverr marks unsupported addresses.
      stability: paddr, pwrite, pwdata remain stable while psel is high until access completes.
    ports:
    - name: psel
      direction: input
      width: 1
      description: APB select
    - name: penable
      direction: input
      width: 1
      description: APB enable phase
    - name: pwrite
      direction: input
      width: 1
      description: APB write control
    - name: paddr
      direction: input
      width: ADDR_WIDTH
      description: APB byte address
    - name: pwdata
      direction: input
      width: DATA_WIDTH
      description: APB write data
    - name: prdata
      direction: output
      width: DATA_WIDTH
      description: APB read data
    - name: pready
      direction: output
      width: 1
      description: APB ready
      always 1: null
    - name: pslverr
      direction: output
      width: 1
      description: Unsupported APB address error
  - name: mem_read
    type: simple_valid_ready
    role: initiator
    clock_domain: clk
    reset_domain: rstn
    description: Single-beat memory read request with same-cycle read data return on accepted request.
    protocol:
      acceptance: mem_rd_valid && mem_rd_ready accepts one read address and returns mem_rd_data for that address.
      response: mem_rd_data is sampled on the accepted read request cycle.
      stability: mem_rd_addr remains stable while mem_rd_valid is high and mem_rd_ready is low.
    ports:
    - name: mem_rd_valid
      direction: output
      width: 1
      description: Read request valid
    - name: mem_rd_ready
      direction: input
      width: 1
      description: Read request ready
    - name: mem_rd_addr
      direction: output
      width: ADDR_WIDTH
      description: Read address
    - name: mem_rd_data
      direction: input
      width: DATA_WIDTH
      description: Read data returned when request is accepted
  - name: mem_write
    type: simple_valid_ready
    role: initiator
    clock_domain: clk
    reset_domain: rstn
    description: Single-beat memory write channel for copied read data.
    protocol:
      acceptance: mem_wr_valid && mem_wr_ready accepts one write beat.
      response: no separate write response exists.
      stability: mem_wr_addr, mem_wr_data, and mem_wr_strb remain stable while mem_wr_valid is high and mem_wr_ready is low.
    ports:
    - name: mem_wr_valid
      direction: output
      width: 1
      description: Write beat valid
    - name: mem_wr_ready
      direction: input
      width: 1
      description: Write beat ready
    - name: mem_wr_addr
      direction: output
      width: ADDR_WIDTH
      description: Write address
    - name: mem_wr_data
      direction: output
      width: DATA_WIDTH
      description: Write data
    - name: mem_wr_strb
      direction: output
      width: 4
      description: Byte strobes
      all ones for word copies: null
  - name: interrupt
    type: level_interrupt
    role: source
    clock_domain: clk
    reset_domain: rstn
    description: Level irq driven from irq_status.
    protocol:
      acceptance: irq remains asserted until software writes irq_clear=1.
      response: irq is combinationally equivalent to irq_status.
      stability: irq changes only after reset, completion, error, or irq_clear architectural events.
    ports:
    - name: irq
      direction: output
      width: 1
      description: Level interrupt output
features:
- APB registers: start, irq_enable, irq_clear, src_addr, dst_addr, length, and status.
- Status exposes busy, done, error, and irq_status bits.
- Single outstanding copy engine: one accepted read is followed by its corresponding write before the next read.
- 32-bit word copy with mem_wr_strb fixed to 4'hF for all issued writes.
- irq_status is set on completion or error only when irq_enable is set, and cleared by irq_clear.
dataflow:
  source: APB-programmed src_addr register and memory read channel.
  sequence:
  - APB writes configure src_addr, dst_addr, length, and irq_enable while not busy.
  - CTRL_START write with start bit set initializes current_src_addr, current_dst_addr, and remaining_bytes.
  - DMA issues mem_rd_valid with current_src_addr and latches mem_rd_data when mem_rd_ready accepts.
  - DMA issues mem_wr_valid with current_dst_addr and latched_read_data until mem_wr_ready accepts.
  - After each accepted write, source and destination addresses increment by 4 and remaining_bytes decrements by 4.
  sinks:
  - mem_wr_addr
  - mem_wr_data
  - mem_wr_strb
  - STATUS
  - irq
  ordering: Strict in-order single outstanding read then write; no reordering or overlap across beats.
  paths:
  - id: CSR_TO_ENGINE
    source: APB registers
    sink: DMA control FSM
    beat_bytes: 4
    rules:
    - name: start_snapshot
      expr: current_src_addr=src_addr_reg; current_dst_addr=dst_addr_reg; remaining_bytes=length_reg
  - id: COPY_PATH
    source: mem_rd_data
    sink: mem_wr_data
    beat_bytes: 4
    rules:
    - name: write_data_rule
      expr: mem_wr_data == latched_read_data
    - name: write_strobe_rule
      expr: mem_wr_strb == 4'hF
function_model:
  purpose: Cycle-independent behavioral contract for DMA APB control and copy operation.
  state_variables:
  - name: irq_enable
    width: 1
    reset: 0
    description: Interrupt enable register bit
  - name: src_addr_reg
    width: 32
    reset: 0
    description: Programmed source byte address
  - name: dst_addr_reg
    width: 32
    reset: 0
    description: Programmed destination byte address
  - name: length_reg
    width: 32
    reset: 0
    description: Programmed byte length
  - name: current_src_addr
    width: 32
    reset: 0
    description: Active source address cursor
  - name: current_dst_addr
    width: 32
    reset: 0
    description: Active destination address cursor
  - name: remaining_bytes
    width: 32
    reset: 0
    description: Active byte count remaining
  - name: latched_read_data
    width: 32
    reset: 0
    description: Data captured from accepted read
  - name: pending_write
    width: 1
    reset: 0
    description: One read data word awaits write acceptance
  - name: busy
    width: 1
    reset: 0
    description: Transfer in progress
  - name: done
    width: 1
    reset: 0
    description: Transfer completed
  - name: error
    width: 1
    reset: 0
    description: Illegal alignment or command error
  - name: irq_status
    width: 1
    reset: 0
    description: Latched interrupt status
  transactions:
  - id: FM_RESET
    name: reset
    preconditions:
    - rstn == 0
    inputs:
    - rstn
    outputs:
    - all outputs deasserted except pready
    - name: reset_pready
      port: pready
      expr: '1'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: reset_pslverr
      port: pslverr
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: reset_mem_rd_valid
      port: mem_rd_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: reset_mem_wr_valid
      port: mem_wr_valid
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: reset_irq
      port: irq
      expr: '0'
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: busy
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: error
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: irq_status
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: remaining_bytes
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: pending_write
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - all architectural state reset
    error_cases: []
    output_rules:
    - name: reset_pready
      port: pready
      expr: '1'
      width: 1
    - name: reset_pslverr
      port: pslverr
      expr: '0'
      width: 1
    - name: reset_mem_rd_valid
      port: mem_rd_valid
      expr: '0'
      width: 1
    - name: reset_mem_wr_valid
      port: mem_wr_valid
      expr: '0'
      width: 1
    - name: reset_irq
      port: irq
      expr: '0'
      width: 1
    state_updates:
    - name: busy
      expr: '0'
      width: 1
    - name: done
      expr: '0'
      width: 1
    - name: error
      expr: '0'
      width: 1
    - name: irq_status
      expr: '0'
      width: 1
    - name: remaining_bytes
      expr: '0'
      width: 32
    - name: pending_write
      expr: '0'
      width: 1
  - id: FM_APB_WRITE
    name: apb_write_register
    preconditions:
    - rstn == 1
    - psel && penable && pwrite
    inputs:
    - paddr
    - pwdata
    - busy
    outputs:
    - pready
    - pslverr
    - state: irq_enable
      expr: (pwdata[0] if paddr==4 else irq_enable)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: src_addr_reg
      expr: (pwdata if (paddr==12) && !busy else src_addr_reg)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: dst_addr_reg
      expr: (pwdata if (paddr==16) && !busy else dst_addr_reg)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: length_reg
      expr: (pwdata if (paddr==20) && !busy else length_reg)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - updates selected writable register when legal
    error_cases:
    - condition: unsupported paddr
      result: pslverr asserted for access cycle
    output_rules:
    - name: apb_write_ready
      port: pready
      expr: '1'
      width: 1
    - name: apb_write_error
      port: pslverr
      expr: '!(paddr inside {0,4,8,12,16,20,24})'
      width: 1
    state_updates:
    - name: irq_enable
      expr: (pwdata[0] if paddr==4 else irq_enable)
      width: 1
    - name: src_addr_reg
      expr: (pwdata if (paddr==12) && !busy else src_addr_reg)
      width: 32
    - name: dst_addr_reg
      expr: (pwdata if (paddr==16) && !busy else dst_addr_reg)
      width: 32
    - name: length_reg
      expr: (pwdata if (paddr==20) && !busy else length_reg)
      width: 32
  - id: FM_APB_READ
    name: apb_read_register
    preconditions:
    - rstn == 1
    - psel && penable && !pwrite
    inputs:
    - paddr
    - registers
    - status
    outputs:
    - prdata
    - pready
    - pslverr
    side_effects: []
    error_cases:
    - condition: unsupported paddr
      result: pslverr asserted and prdata zero
    output_rules:
    - name: apb_read_ready
      port: pready
      expr: '1'
      width: 1
    - name: apb_read_error
      port: pslverr
      expr: '!(paddr inside {0,4,8,12,16,20,24})'
      width: 1
    - name: apb_read_data
      port: prdata
      expr: case(paddr) 4:{0,irq_enable}; 12:src_addr_reg; 16:dst_addr_reg; 20:length_reg; 24:{0,irq_status,error,done,busy}; default:0; endcase
      width: 32
  - id: FM_START_TRANSFER
    name: start_transfer
    preconditions:
    - rstn == 1
    - psel && penable && pwrite
    - paddr == 32'h00
    - pwdata[0] == 1
    - busy == 0
    inputs:
    - src_addr_reg
    - dst_addr_reg
    - length_reg
    - irq_enable
    outputs:
    - mem_rd_valid
    - mem_rd_addr
    - irq
    - state: busy
      expr: aligned && (length_reg != 0)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: error
      expr: '!aligned || (length_reg == 0)'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: irq_status
      expr: irq_enable && (!aligned || (length_reg == 0))
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: current_src_addr
      expr: src_addr_reg
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: current_dst_addr
      expr: dst_addr_reg
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: remaining_bytes
      expr: length_reg
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - initializes DMA cursors and status
    error_cases:
    - condition: src_addr_reg[1:0] != 0 || dst_addr_reg[1:0] != 0 || length_reg[1:0] != 0 || length_reg == 0
      result: set error and optionally irq_status without memory traffic
    output_rules:
    - name: start_rd_valid
      port: mem_rd_valid
      expr: aligned && (length_reg != 0)
      width: 1
    - name: start_rd_addr
      port: mem_rd_addr
      expr: src_addr_reg
      width: 32
    - name: start_irq
      port: irq
      expr: irq_status
      width: 1
    state_updates:
    - name: busy
      expr: aligned && (length_reg != 0)
      width: 1
    - name: done
      expr: '0'
      width: 1
    - name: error
      expr: '!aligned || (length_reg == 0)'
      width: 1
    - name: irq_status
      expr: irq_enable && (!aligned || (length_reg == 0))
      width: 1
    - name: current_src_addr
      expr: src_addr_reg
      width: 32
    - name: current_dst_addr
      expr: dst_addr_reg
      width: 32
    - name: remaining_bytes
      expr: length_reg
      width: 32
  - id: FM_READ_ACCEPT
    name: read_accept
    preconditions:
    - busy == 1
    - pending_write == 0
    - mem_rd_valid && mem_rd_ready
    inputs:
    - mem_rd_data
    outputs:
    - mem_wr_valid
    - mem_wr_data
    - mem_wr_addr
    - mem_wr_strb
    - state: latched_read_data
      expr: mem_rd_data
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: pending_write
      expr: '1'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - latch read data and create pending write
    error_cases: []
    output_rules:
    - name: write_valid_after_read
      port: mem_wr_valid
      expr: '1'
      width: 1
    - name: write_data_after_read
      port: mem_wr_data
      expr: mem_rd_data
      width: 32
    - name: write_addr_after_read
      port: mem_wr_addr
      expr: current_dst_addr
      width: 32
    - name: write_strb_after_read
      port: mem_wr_strb
      expr: '15'
      width: 4
    state_updates:
    - name: latched_read_data
      expr: mem_rd_data
      width: 32
    - name: pending_write
      expr: '1'
      width: 1
  - id: FM_WRITE_ACCEPT
    name: write_accept
    preconditions:
    - busy == 1
    - pending_write == 1
    - mem_wr_valid && mem_wr_ready
    inputs:
    - remaining_bytes
    - current_src_addr
    - current_dst_addr
    outputs:
    - mem_rd_valid
    - mem_rd_addr
    - state: current_src_addr
      expr: current_src_addr + 4
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: current_dst_addr
      expr: current_dst_addr + 4
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: remaining_bytes
      expr: remaining_bytes - 4
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: pending_write
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - advance cursors and remaining count
    error_cases: []
    output_rules:
    - name: next_read_valid
      port: mem_rd_valid
      expr: remaining_bytes > 4
      width: 1
    - name: next_read_addr
      port: mem_rd_addr
      expr: current_src_addr + 4
      width: 32
    state_updates:
    - name: current_src_addr
      expr: current_src_addr + 4
      width: 32
    - name: current_dst_addr
      expr: current_dst_addr + 4
      width: 32
    - name: remaining_bytes
      expr: remaining_bytes - 4
      width: 32
    - name: pending_write
      expr: '0'
      width: 1
  - id: FM_COMPLETE
    name: complete_transfer
    preconditions:
    - busy == 1
    - pending_write == 1
    - remaining_bytes == 32'd4
    - mem_wr_valid && mem_wr_ready
    inputs:
    - irq_enable
    outputs:
    - irq
    - mem_rd_valid
    - mem_wr_valid
    - state: busy
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: '1'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: irq_status
      expr: irq_enable
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: remaining_bytes
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: pending_write
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - set done
    - clear busy
    - set irq_status when enabled
    error_cases: []
    output_rules:
    - name: complete_irq
      port: irq
      expr: irq_enable
      width: 1
    - name: complete_rd_valid
      port: mem_rd_valid
      expr: '0'
      width: 1
    - name: complete_wr_valid
      port: mem_wr_valid
      expr: '0'
      width: 1
    state_updates:
    - name: busy
      expr: '0'
      width: 1
    - name: done
      expr: '1'
      width: 1
    - name: irq_status
      expr: irq_enable
      width: 1
    - name: remaining_bytes
      expr: '0'
      width: 32
    - name: pending_write
      expr: '0'
      width: 1
  - id: FM_IRQ_CLEAR
    name: irq_clear
    preconditions:
    - rstn == 1
    - psel && penable && pwrite
    - paddr == 32'h08
    - pwdata[0] == 1
    inputs:
    - pwdata
    outputs:
    - irq
    - state: irq_status
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: done
      expr: '0'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - clear irq_status and done
    error_cases: []
    output_rules:
    - name: irq_clear_output
      port: irq
      expr: '0'
      width: 1
    state_updates:
    - name: irq_status
      expr: '0'
      width: 1
    - name: done
      expr: '0'
      width: 1
  invariants:
  - mem_rd_valid and mem_wr_valid are never asserted simultaneously for different beats.
  - mem_wr_strb is 4'hF whenever mem_wr_valid is asserted.
  - A new start command is ignored or treated as no-op while busy is 1.
  derived_signals:
  - name: apb_access
    expr: psel and penable
    width: 1
    description: APB access phase helper derived from psel and penable.
    source: repair_ssot_schema.apb_helper
  - name: apb_valid_write
    expr: psel and penable and pwrite
    width: 1
    description: APB write access helper derived from psel, penable, and pwrite.
    source: repair_ssot_schema.apb_helper
  - name: apb_valid_read
    expr: psel and penable and not pwrite
    width: 1
    description: APB read access helper derived from psel, penable, and pwrite.
    source: repair_ssot_schema.apb_helper
  - name: addr
    expr: paddr
    width: ADDR_WIDTH
    description: Register address helper derived from the APB paddr input.
    source: repair_ssot_schema.apb_helper
  - name: legal_addr
    expr: (addr == 0) or (addr == 4) or (addr == 8) or (addr == 12) or (addr == 16) or (addr == 20) or (addr == 24)
    width: 1
    description: APB legal address decode derived from registers.register_list offsets.
    source: repair_ssot_schema.apb_helper
  - name: wr_ctrl_start
    expr: apb_valid_write and (addr == 0)
    width: 1
    description: APB write decode helper for register CTRL_START.
    source: repair_ssot_schema.apb_helper
  - name: rd_ctrl_start
    expr: apb_valid_read and (addr == 0)
    width: 1
    description: APB read decode helper for register CTRL_START.
    source: repair_ssot_schema.apb_helper
  - name: wr_ctrl_irq_enable
    expr: apb_valid_write and (addr == 4)
    width: 1
    description: APB write decode helper for register CTRL_IRQ_ENABLE.
    source: repair_ssot_schema.apb_helper
  - name: rd_ctrl_irq_enable
    expr: apb_valid_read and (addr == 4)
    width: 1
    description: APB read decode helper for register CTRL_IRQ_ENABLE.
    source: repair_ssot_schema.apb_helper
  - name: wr_irq_clear
    expr: apb_valid_write and (addr == 8)
    width: 1
    description: APB write decode helper for register IRQ_CLEAR.
    source: repair_ssot_schema.apb_helper
  - name: rd_irq_clear
    expr: apb_valid_read and (addr == 8)
    width: 1
    description: APB read decode helper for register IRQ_CLEAR.
    source: repair_ssot_schema.apb_helper
  - name: irq_clear_w1c
    expr: ((pwdata & gpio_mask) if wr_irq_clear else 0)
    width: 32
    description: W1C write mask helper for register IRQ_CLEAR.
    source: repair_ssot_schema.apb_helper
  - name: wr_src_addr
    expr: apb_valid_write and (addr == 12)
    width: 1
    description: APB write decode helper for register SRC_ADDR.
    source: repair_ssot_schema.apb_helper
  - name: rd_src_addr
    expr: apb_valid_read and (addr == 12)
    width: 1
    description: APB read decode helper for register SRC_ADDR.
    source: repair_ssot_schema.apb_helper
  - name: wr_dst_addr
    expr: apb_valid_write and (addr == 16)
    width: 1
    description: APB write decode helper for register DST_ADDR.
    source: repair_ssot_schema.apb_helper
  - name: rd_dst_addr
    expr: apb_valid_read and (addr == 16)
    width: 1
    description: APB read decode helper for register DST_ADDR.
    source: repair_ssot_schema.apb_helper
  - name: wr_length
    expr: apb_valid_write and (addr == 20)
    width: 1
    description: APB write decode helper for register LENGTH.
    source: repair_ssot_schema.apb_helper
  - name: rd_length
    expr: apb_valid_read and (addr == 20)
    width: 1
    description: APB read decode helper for register LENGTH.
    source: repair_ssot_schema.apb_helper
  - name: wr_status
    expr: apb_valid_write and (addr == 24)
    width: 1
    description: APB write decode helper for register STATUS.
    source: repair_ssot_schema.apb_helper
  - name: rd_status
    expr: apb_valid_read and (addr == 24)
    width: 1
    description: APB read decode helper for register STATUS.
    source: repair_ssot_schema.apb_helper
  - name: read_mux
    expr: (0 if addr == 0 else (0 if addr == 4 else (0 if addr == 8 else (src_addr_reg if addr == 12 else (dst_addr_reg if addr == 16 else (length_reg if addr == 20 else (0 if addr == 24 else 0)))))))
    width: DATA_WIDTH
    description: APB read data mux derived from registers.register_list offsets and function_model state variables.
    source: repair_ssot_schema.apb_helper
cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  executable: pymtl3
  backend_policy: Use PyMTL3 for the clocked cycle model shell; FunctionalModel remains the behavioral oracle.
  clock: clk
  reset:
    signal: rstn
    polarity: active_low
    assertion: rstn assertion returns architectural state to declared reset values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on clk at nominal 100 MHz; max depends on declared backpressure and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - signal: mem_rd_valid/mem_rd_ready
    rule: mem_rd_valid payload remains stable until mem_rd_ready is sampled asserted on mem_read.
  - signal: mem_wr_valid/mem_wr_ready
    rule: mem_wr_valid payload remains stable until mem_wr_ready is sampled asserted on mem_write.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0..N
    action: Accept legal request/command/packet/control work under declared handshake rules.
  - stage: S1_EVALUATE
    cycle: N..M
    action: Evaluate function_model transaction and update only declared state.
  - stage: S2_OBSERVE
    cycle: M..K
    action: Publish response/status/output/debug event and hold it stable until accepted.
  ordering:
  - Accepted requests update architectural state only on clock edges.
  - Completion/status/interrupt updates occur after the operation reaches its terminal FSM state.
  - Backpressure stalls the active handshake stage without corrupting stored state.
  - Read/dataflow stages must precede dependent write/output stages where declared in dataflow.
  backpressure:
  - Ready/valid deassertion stalls only the affected interface stage; payload and route/control state remain stable.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: No backpressure on the active interface
    outstanding:
      max: 1
      description: Default one accepted operation until the SSOT declares deeper buffering
    depth:
      pipeline_stages: 3
      queue_depth: 1
      description: Default accept/evaluate/observe cycle model depth
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - clock: clk
    reset: rstn
    frequency_mhz: 100
    reset_scheme: async_assert_sync_deassert
  reset_behavior:
  - APB read data, error, DMA valid outputs, status, and irq reset to zero except pready remains one.
cdc_requirements:
  required: false
  rationale: Single clk domain.
  checks:
  - No CDC crossings expected.
rdc_requirements:
  required: false
  rationale: Single rstn domain.
  checks:
  - No RDC crossings expected.
registers:
  policy: Explicit firmware-visible APB register list.
  register_list:
  - name: CTRL_START
    address: 0
    width: 32
    access: wo
    reset: 0
    fields:
    - name: start
      lsb: 0
      width: 1
      access: w1p
      description: Write one to start when not busy
      write_effect: APB write data updates this field value according to its bit mask.
      reset: 0
    offset: 0
  - name: CTRL_IRQ_ENABLE
    address: 4
    width: 32
    access: rw
    reset: 0
    fields:
    - name: irq_enable
      lsb: 0
      width: 1
      access: rw
      description: Enable irq_status setting on done/error
      write_effect: APB write data updates this field value according to its bit mask.
      reset: 0
    offset: 4
  - name: IRQ_CLEAR
    address: 8
    width: 32
    access: wo
    reset: 0
    fields:
    - name: irq_clear
      lsb: 0
      width: 1
      access: w1c
      description: Clear irq_status and done
      write_effect: Writing 1 clears the corresponding status bit; writing 0 leaves it unchanged.
      reset: 0
    offset: 8
  - name: SRC_ADDR
    address: 12
    width: 32
    access: rw
    reset: 0
    fields:
    - name: src_addr
      lsb: 0
      width: 32
      access: rw
      description: Source byte address
      write_effect: APB write data updates this field value according to its bit mask.
      reset: 0
    offset: 12
  - name: DST_ADDR
    address: 16
    width: 32
    access: rw
    reset: 0
    fields:
    - name: dst_addr
      lsb: 0
      width: 32
      access: rw
      description: Destination byte address
      write_effect: APB write data updates this field value according to its bit mask.
      reset: 0
    offset: 16
  - name: LENGTH
    address: 20
    width: 32
    access: rw
    reset: 0
    fields:
    - name: length_bytes
      lsb: 0
      width: 32
      access: rw
      description: Transfer length in bytes
      must be nonzero word multiple: null
      write_effect: APB write data updates this field value according to its bit mask.
      reset: 0
    offset: 20
  - name: STATUS
    address: 24
    width: 32
    access: ro
    reset: 0
    fields:
    - name: busy
      lsb: 0
      width: 1
      access: ro
      description: DMA transfer active
      reset: 0
    - name: done
      lsb: 1
      width: 1
      access: ro
      description: DMA transfer complete
      reset: 0
    - name: error
      lsb: 2
      width: 1
      access: ro
      description: Alignment/length/start error
      reset: 0
    - name: irq_status
      lsb: 3
      width: 1
      access: ro
      description: Latched interrupt status
      reset: 0
    offset: 24
memory:
  instances: []
  addressing:
    policy: External memory accessed only through declared mem_read and mem_write ports; no internal memory is instantiated.
  storage_policy: No internal storage beyond registers and one read-data latch.
interrupts:
  present: true
  sources:
  - name: irq
    type: level
    output: irq
    source: irq_status
    enable: irq_enable
    clear: IRQ_CLEAR.irq_clear
    set_conditions:
    - FM_COMPLETE with irq_enable
    - FM_ERROR with irq_enable
  rationale: Required by APB irq_enable/irq_clear/status goal.
fsm:
  control:
    id: DMA_FSM
    reset_state: IDLE
    states:
    - IDLE
    - READ_REQ
    - WRITE_REQ
    - DONE
    - ERROR
    transitions:
    - from: IDLE
      to: READ_REQ
      when: start && aligned && length_reg != 0
    - from: IDLE
      to: ERROR
      when: start && (!aligned || length_reg == 0)
    - from: READ_REQ
      to: WRITE_REQ
      when: mem_rd_valid && mem_rd_ready
    - from: WRITE_REQ
      to: READ_REQ
      when: mem_wr_valid && mem_wr_ready && remaining_bytes > 32'd4
    - from: WRITE_REQ
      to: DONE
      when: mem_wr_valid && mem_wr_ready && remaining_bytes == 32'd4
    - from: DONE
      to: IDLE
      when: irq_clear || start
    - from: ERROR
      to: IDLE
      when: irq_clear || reset
timing:
  target_clocks:
  - name: clk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    register_access:
      min: 0
      max: 0
      measured_from: psel && penable
      measured_to: pready/prdata/pslverr
    primary_operation:
      min: 2
      max: null
      measured_from: start accepted
      measured_to: done/irq_status
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - clk
    isolation: not_required_single_domain
  power_states:
  - name: true
    entry: rstn deasserted
    exit: rstn asserted
    guarantees:
    - All declared functionality active
  clock_gating:
    required: false
    rationale: No explicit clock gating requirement.
  upf_required: false
security:
  classification: non_secure_leaf_ip
  assets:
  - name: data_integrity
    protection: Write data and address sequence must match source read sequence and programmed registers.
  - name: csr_configuration
    protection: Busy transfers do not allow configuration mutation except irq clear/enable policy.
  threat_model:
  - threat: invalid alignment or length
    mitigation: error status without memory traffic.
  privilege_model: SoC APB fabric owns access control.
error_handling:
  error_sources:
  - id: ERR_UNALIGNED_SRC
    condition: src_addr_reg[1:0] != 2'b00 on start
    architectural_effect: Set error, clear busy, do not issue memory traffic, set irq_status if irq_enable.
  - id: ERR_UNALIGNED_DST
    condition: dst_addr_reg[1:0] != 2'b00 on start
    architectural_effect: Set error, clear busy, do not issue memory traffic, set irq_status if irq_enable.
  - id: ERR_BAD_LENGTH
    condition: length_reg == 0 || length_reg[1:0] != 2'b00 on start
    architectural_effect: Set error, clear busy, do not issue memory traffic, set irq_status if irq_enable.
  propagation:
  - STATUS.error reflects error state, irq may assert through irq_status when enabled.
  recovery:
  - action: irq_clear or reset
    clears:
    - error
    - done
    - irq_status
    preserves:
    - configuration registers unless reset
debug_observability:
  waveform_must_probe:
  - clk
  - rstn
  - psel
  - penable
  - pwrite
  - paddr
  - pwdata
  - prdata
  - busy
  - done
  - error
  - irq_status
  - mem_rd_valid
  - mem_rd_ready
  - mem_rd_addr
  - mem_rd_data
  - mem_wr_valid
  - mem_wr_ready
  - mem_wr_addr
  - mem_wr_data
  - mem_wr_strb
  - irq
  trace_events:
  - name: operation_start
    trigger: CTRL_START.start accepted while idle
  - name: beat_read
    trigger: mem_rd_valid && mem_rd_ready
  - name: beat_write
    trigger: mem_wr_valid && mem_wr_ready
  - name: operation_complete
    trigger: final write accepted
  - name: error_detected
    trigger: any error_handling error source on start
  status_outputs:
  - STATUS.busy
  - STATUS.done
  - STATUS.error
  - STATUS.irq_status
  - irq
integration:
  bus_attachment:
    interfaces:
    - apb
    - mem_read
    - mem_write
    - interrupt
    address_ownership: APB base address assigned by SoC; local offsets are listed in registers.register_list.
  dependencies:
    external_modules: []
    external_clocks:
    - clk
    external_resets:
    - rstn
  connections: []
  integration_notes:
  - rtl-gen should implement as single top file rtl/dma_scratch_ui_fixed_20260519.sv unless it elects local helper modules in the same file.
  connection_contract_status: missing machine-readable module wiring; child RTL drafts may proceed from owner packets, but top integration/signoff must stay blocked until SSOT authors integration.connections or sub_modules[].connections with module/port/signal records
dft:
  scan_required: false
  controllability:
    reset: rstn
    clocks:
    - clk
    primary_inputs: all declared inputs controllable in testbench
  observability:
    required_internal_points:
    - DMA_FSM state
    - status bits
    - address cursors
    outputs: all declared outputs observable
  mbist_required: false
synthesis:
  dialect: systemverilog_2012
  top_module: dma_scratch_ui_fixed_20260519
  constraints:
  - No inferred latches
  - No unresolved black boxes
  - All sequential architectural state reset
  required_outputs:
  - syn/out/area.rpt
  - syn/out/timing_summary.rpt
  - sta/out/wns.json
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  cts_buf_list:
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
  routing:
    signal_layers:
      min: met1
      max: met5
    drc_waivers: []
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/dma_scratch_ui_fixed_20260519_param.vh
  conventions:
  - Use input logic/output logic ANSI ports and internal single-driver logic.
  - Keep synthesizable top file rtl/dma_scratch_ui_fixed_20260519.sv.
  - No inferred latches; assign all combinational outputs in all branches.
  - Avoid packages/interfaces unless downstream flow explicitly enables them.
  lint_waivers: []
reuse_modules: []
custom:
  assumptions:
  - No external architect handoff was available; this engineering draft is bootstrapped from the orchestrator goal.
  - Memory read data is returned in the same cycle that mem_rd_valid && mem_rd_ready accepts the address.
  - Transfers are 32-bit word granular; unaligned address, zero length, or non-word-multiple length sets error and issues no memory traffic.
  - APB is a zero-wait APB3-like subset with pslverr for unsupported local offsets.
  - New start while busy is ignored/no-op; software must poll busy before reprogramming transfer registers.
  tbd:
  - Confirm whether a separate memory read response valid channel is required in a future revision.
  - Confirm exact behavior desired for writes to src/dst/length while busy beyond current no-op assumption.
  optional_behavior_policy:
    resolution: non_required_optional_items_disabled_unless_ssot_marks_required_or_parameterized
    owner: ssot-gen deterministic repair
    rule: Rows marked required:false or prose-only optional verification aids do not add RTL behavior. Any optional functional behavior must be converted by ssot-gen into required behavior or an explicit parameter/register policy before rtl-gen signoff.
dir_structure:
  yaml_dir: yaml/
  output_dirs:
    rtl: rtl/
