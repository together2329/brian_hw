    content: Implement rtl/dma_scratch_ui_fixed_20260519.sv from this SSOT, preserving exact top-module name and ports.
    detail: Implement APB registers, DMA FSM, memory valid/ready stability, status/irq behavior, and error policy from declared function_model and cycle_model.
    criteria:
    - Top module name is dma_scratch_ui_fixed_20260519 and file is rtl/dma_scratch_ui_fixed_20260519.sv.
    - All APB, memory, reset, clock, and irq ports match io_list.
    - All function_model output_rules/state_updates have RTL-visible implementation or justified traceability.
    - No fixed-template fallback, placeholder heartbeat, or tie-off-only implementation is used.
    source_refs:
    - top_module
    - io_list
    - function_model
    - cycle_model
    - registers
    - interrupts
    - fsm
  tb-gen:
  - id: TB_IMPLEMENT_DMA_SCENARIOS
    content: Implement cocotb/pyuvm tests and scoreboard for all SSOT scenarios.
    detail: Drive APB programming, memory ready backpressure, read data responses, alignment errors, and interrupt clear behavior.
    criteria:
    - SC01 through SC06 have executable tests and pass/fail checkers.
