        source_ref: function_model.transactions
        class: transaction
        description: Primary function_model transaction observed with RTL scoreboard evidence
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cover APB zero-wait
      memory stalls: null
      and single outstanding ordering.: null
