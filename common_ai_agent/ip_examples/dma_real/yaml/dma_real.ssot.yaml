workflow_todos:
  rtl-gen:
  - content: Implement top-level DMA wiring with dual-clock CDC bridge
    detail: dma_real_top.sv instantiates apb_cfg (pclk), engine (hclk), irq (pclk),
      and CDC async FIFO bridges. Wire APB slave ports, AHB master ports, and IRQ
      outputs. CDC FIFO connects pclk domain config writes to hclk domain channel
      FSM.
    criteria:
    - top module ports match SSOT io_list exactly including hprot, hmaster, hmastlock,
      hresp[1:0]
    - dual-clock domains properly separated
    - CDC async FIFO instantiated for config crossing
    - compile clean with iverilog -g2012
    source_refs:
    - io_list
    - sub_modules
    - integration
    - cdc_requirements
  - content: Implement APB slave configuration decode with dual-clock awareness
    detail: dma_real_apb_cfg decodes paddr to global and per-channel registers including
      STRIDE, GLOBAL_TIMEOUT, PERF counters. Writes pushed into CDC FIFO for hclk
      domain. Readback synchronized from hclk domain.
    criteria:
    - all register offsets decoded correctly per SSOT register map
    - new registers (STRIDE, GLOBAL_TIMEOUT, PERF_WORDS, PERF_CYCLES) implemented
    - write_effect implemented for each field
    - CDC FIFO push on config write
    source_refs:
    - registers.register_list
    - io_list.interfaces.apb_slave
    - cdc_requirements
  - content: Implement round-robin arbiter in hclk domain
    detail: dma_real_arbiter accepts request from each active channel and grants bus
      to next channel in round-robin order. Starvation-free.
    criteria:
    - round-robin pointer advances after each grant
    - only one channel granted at a time
    - idle channels not considered
    source_refs:
    - function_model.transactions.FM_ARB_GRANT
    - cycle_model.performance
  - content: Implement per-channel FSM with stride, timeout, and performance counters
    detail: dma_real_channel implements IDLE/CFG/REQUEST/READ/WRITE/UPDATE/DONE/ERROR
      FSM. Latches src_addr, dst_addr, remaining, stride from CDC config. Addresses
      increment by stride (not hardcoded 4). Timeout counter monitors hready. Performance
      counters increment. Generate-based instantiation for N_CHANNELS.
    criteria:
    - all FSM states and transitions match SSOT including timeout and FIFO overflow
    - address counters increment by stride per beat
    - timeout counter triggers error code 4
    - perf_words increments per word, perf_cycles per active cycle
    - generate block for N_CHANNELS
    source_refs:
    - fsm.per_channel
    - function_model.transactions
    - error_handling
    - registers.register_list
  - content: Implement full AHB-Lite master protocol engine
    detail: "dma_real_ahb_master drives full AHB-Lite protocol: haddr, htrans, hsize, hburst (INCR4/8/16 + WRAP4/8/16), hprot, hmaster, hmastlock, hwdata. 2-bit hresp handles OKAY/ERROR/RETRY/SPLIT. 1KB boundary detection splits burst."
    criteria:
    - address phase and data phase timing correct
    - NONSEQ for first beat, SEQ for subsequent
    - hburst INCR and WRAP modes encoded correctly
    - hprot default 0011, hmaster set to channel ID
    - hresp=ERROR aborts, hresp=RETRY re-requests
    - 1KB boundary detection triggers new NONSEQ
    source_refs:
    - io_list.interfaces.ahb_master
    - cycle_model.pipeline
    - cycle_model.handshake_rules
  - content: Implement interrupt aggregation with sticky latch
    detail: dma_real_irq aggregates per-channel done/error status with INT_ENABLE mask
      in pclk domain. Done/error pulses from hclk domain cross via pulse synchronizer.
    criteria:
    - irq[ch] reflects (done_q[ch] OR error_q[ch]) AND int_enable_q[ch]
    - INT_CLEAR clears done_q and error_q with priority over new pulse
    - pulse synchronizer for hclk-to-pclk crossing
    source_refs:
    - interrupts
    - io_list.interfaces.irq_outputs
    - cdc_requirements
  - content: Implement dual-clock async FIFO with gray-code pointer sync
    detail: dma_real_async_fifo parameterized dual-clock FIFO. Write port in pclk
      domain, read port in hclk domain. Gray-code rd_ptr and wr_ptr with 2-stage
      synchronization. almost_full and almost_empty flags. Power-of-2 depth.
    criteria:
    - gray-code pointer conversion correct
    - 2-stage synchronizer on crossed pointers
    - almost_full/almost_empty thresholds configurable
    - full/empty flags never simultaneously true
    source_refs:
    - memory.internal
    - cdc_requirements
  - content: Implement 2-stage CDC synchronizer and clock gating cell
    detail: dma_real_cdc_sync is parameterized 2-stage flip-flop synchronizer. dma_real_cg_cell
      wraps library ICG primitive with enable input.
    criteria:
    - 2-stage sync with async reset
    - ICG enable/disable glitch-free
    - parameterized width for multi-bit gray-code sync
    source_refs:
    - cdc_requirements
    - power.domains
  - content: Implement hclk-domain engine connecting arbiter, channels, AHB master,
      and clock gating
    detail: dma_real_engine instantiates arbiter, N_CHANNELS channel instances (via
      generate), shared AHB master, and per-channel clock gating cells. Mux channel
      requests to AHB master based on arbiter grant.
    criteria:
    - generate block instantiates N_CHANNELS channel and FIFO instances
    - per-channel CG cell enable tied to ch_busy or ch_start_pending
    - AHB master mux selects granted channel
    - compile clean
    source_refs:
    - sub_modules
    - power.domains
    - cycle_model.pipeline
  tb-gen:
  - content: Generate SSOT-driven cocotb testbench for DMA scenarios including dual-clock
      and CDC
    detail: cocotb TB with APB driver (pclk), AHB-Lite slave model (hclk), dual-clock
      timing, CDC awareness, scoreboard, and coverage collector. Stimulus covers all
      14 scenarios including stride, timeout, burst boundary, performance counters,
      and clock gating.
    criteria:
    - APB driver exercises register read/write in pclk domain
    - AHB slave model responds with configurable hready, hresp[1:0], in hclk domain
    - dual-clock testbench with separate pclk and hclk
    - scoreboard checks FL-vs-RTL equivalence per goal
    - coverage bins sampled from passing scoreboard rows
    source_refs:
    - test_requirements.scenarios
    - test_requirements.coverage_goals
    - io_list.interfaces
    - cdc_requirements
generation_flow:
  stages:
  - name: ssot-gen
    tool: manual_or_llm
    evidence: yaml/dma_real.ssot.yaml passes check_ssot_disk.sh
  - name: fl-model-gen
    tool: deterministic
    evidence: model/functional_model.py and model/fl_model_check.json
  - name: cl-model-gen
    tool: deterministic
    evidence: model/cycle_model.py and CL self-check
  - name: equiv-goals
    tool: deterministic
    evidence: verify/equivalence_goals.json with blocked=0
  - name: rtl-gen
    tool: llm
    evidence: rtl/*.sv files, rtl/rtl_compile.json, lint/dut_lint.json
  - name: lint
    tool: deterministic
    evidence: lint/dut_lint.json
  - name: tb-gen
    tool: llm
    evidence: tb/cocotb/*.py, tb/cocotb/tb_manifest.json
  - name: sim
    tool: deterministic
    evidence: sim/results.xml, sim/scoreboard_events.jsonl
  - name: sim-debug
    tool: deterministic
    evidence: sim/mismatch_classification.json
  - name: coverage
    tool: deterministic
    evidence: cov/coverage_functional.json
  - name: goal-audit
    tool: deterministic
    evidence: sim/fl_rtl_goal_audit.json
rtl_contract:
  clock: hclk
  reset: hresetn
  reset_active: low
  transaction: FM_DMA_STEP
  sample_condition: ch_start or ch_busy or ch_done or ch_error or irq
  input_map:
    ch_id: ch_id
    src_addr: CHx_SRC_ADDR
    dst_addr: CHx_DST_ADDR
    length: CHx_LEN
    stride: CHx_STRIDE
    ch_en: CHx_CTRL.ch_en
    ch_start: CHx_CTRL.ch_start
    dma_en: GLOBAL_CTRL.dma_en
    timeout_val: GLOBAL_TIMEOUT.timeout_val
  output_map:
    ch_busy_next: ch_busy
    done_pulse: ch_done
    error_flag: ch_error
    error_code_val: ch_err_code
    irq_assert: irq
    grant_next: arb_grant
