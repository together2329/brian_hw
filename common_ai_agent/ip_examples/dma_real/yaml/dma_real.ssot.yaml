    - name: reserved_31_6
      lsb: 6
      width: 26
      access: ro
      reset: 0
      description: Reserved
      write_effect: read-only
  - name: CH3_STRIDE
    offset: 468
    width: 32
    access: rw
    reset: 0x00000004
    description: Channel 3 address stride
    fields:
    - name: stride
      lsb: 0
      width: 32
      access: rw
      reset: 4
      description: Address increment per beat
      write_effect: sets address stride
  - name: CH3_PERF_WORDS
    offset: 476
    width: 32
    access: ro
    reset: 0x00000000
    description: Channel 3 words transferred
    fields:
    - name: word_count
      lsb: 0
      width: 32
      access: ro
      reset: 0
      description: Cumulative words transferred
      write_effect: read-only
  - name: CH3_PERF_CYCLES
    offset: 480
    width: 32
    access: ro
    reset: 0x00000000
    description: Channel 3 active cycles
    fields:
    - name: cycle_count
      lsb: 0
      width: 32
      access: ro
      reset: 0
      description: Cumulative active hclk cycles
      write_effect: read-only
memory:
  internal:
  - name: ch_async_fifo
    kind: async_fifo
    width: DATA_WIDTH
    depth: FIFO_DEPTH
    per_instance: true
    instances:
    - ch0_fifo
    - ch1_fifo
    - ch2_fifo
    - ch3_fifo
    description: Per-channel dual-clock async FIFO with gray-code pointer sync. Read
      port in hclk domain, write port in pclk domain (via CDC config bridge). Pointer-based
      circular buffer with almost_full and almost_empty thresholds.
    implementation:
      ptr_type: gray_code_binary
      almost_full_threshold: FIFO_DEPTH - 2
      almost_empty_threshold: 2
      sync_stages: 2
interrupts:
  outputs:
  - name: irq
    width: N_CHANNELS
    active_level: high
    trigger: level
    description: Per-channel interrupt for done or error
  - name: irq_combined
    width: 1
    active_level: high
    trigger: level
    description: Combined interrupt OR of all enabled channel IRQs
  mask_registers:
  - INT_ENABLE
  clear_registers:
  - INT_CLEAR
  status_registers:
  - INT_STATUS
fsm:
  per_channel:
    states:
    - IDLE
    - CFG
    - REQUEST
    - READ
    - WRITE
    - UPDATE
    - DONE
    - ERROR
    initial: IDLE
    transitions:
    - from: IDLE
      to: CFG
      condition: ch_start && ch_en && dma_en && valid_cfg && cdc_config_valid
    - from: IDLE
      to: ERROR
      condition: ch_start && ch_en && !valid_cfg
    - from: CFG
      to: REQUEST
      condition: next_cycle
    - from: REQUEST
      to: READ
      condition: arb_grant
    - from: READ
      to: WRITE
      condition: read_burst_complete && !fifo_full
    - from: READ
      to: ERROR
      condition: ahb_error || timeout_expired || fifo_overflow
    - from: WRITE
      to: UPDATE
      condition: write_burst_complete
    - from: WRITE
      to: ERROR
      condition: ahb_error || timeout_expired
    - from: UPDATE
      to: REQUEST
      condition: remaining_gt_0
    - from: UPDATE
      to: DONE
      condition: remaining_eq_0
    - from: DONE
      to: IDLE
      condition: status_sampled
    - from: ERROR
      to: IDLE
      condition: status_sampled
timing:
  target_clocks:
  - clock: pclk
    target_freq_mhz: 100
    description: APB configuration clock
  - clock: hclk
    target_freq_mhz: 200
    description: AHB data transfer clock
  latency_budget:
    apb_access: 2
    cdc_config_crossing: 3
    channel_start_to_first_read: 5
    burst_read_latency: BURST_MAX
    burst_write_latency: BURST_MAX
    completion_to_irq: 3
    timeout_default: TIMEOUT_DEFAULT
power:
  domains:
  - name: pd_pclk
    clocks:
    - pclk
    description: APB configuration domain, always-on
  - name: pd_hclk
    clocks:
    - hclk
    description: AHB data transfer domain with per-channel clock gating
  power_states:
  - state: active
    description: All logic powered and clocked, DMA transfers in progress
  - state: idle
    description: No active transfers, per-channel hclk gated off
  - state: config_only
    description: Only pclk domain active, hclk domain fully gated
  clock_gating:
    description: Per-channel integrated clock-gating cell (ICG) in hclk domain. When
      channel FSM is IDLE and no pending request, gated_hclk is disabled. ICG enable
      controlled by (ch_en && (ch_start_pending || ch_busy)).
security:
  classification: internal
  assets:
  - name: channel_config
    type: configuration
    description: DMA channel source/destination/length/stride registers
  - name: transfer_data
    type: data
    description: Data words in transit through async FIFO
  - name: perf_counters
    type: telemetry
    description: Performance counter registers revealing transfer activity
  threat_model:
  - threat: unauthorized_channel_access
    mitigation: APB bus access restricted by system bus matrix
    severity: medium
  - threat: dma_transfer_corruption
    mitigation: Error detection per channel, bus timeout, FIFO overflow detection
    severity: high
  - threat: cdc_metastability
    mitigation: Gray-code pointer synchronization with 2-stage sync, timing constraints
      on CDC paths
    severity: high
error_handling:
  error_sources:
  - id: ERR_ALIGN
    source: channel_start
    condition: src_addr[1:0] != 0 or dst_addr[1:0] != 0
    code: 1
    description: Misaligned source or destination address
  - id: ERR_ZERO_LEN
    source: channel_start
    condition: CHx_LEN == 0
    code: 2
    description: Zero-length transfer requested
  - id: ERR_BUS
    source: ahb_transfer
    condition: hresp == 2'b01 (ERROR)
    code: 3
    description: AHB bus error during transfer
  - id: ERR_TIMEOUT
    source: bus_timeout
    condition: hready==0 for GLOBAL_TIMEOUT consecutive hclk cycles
    code: 4
    description: Bus timeout waiting for slave response
  - id: ERR_FIFO_OVERFLOW
    source: fifo_write
    condition: fifo_write when fifo_full (CDC config path)
    code: 5
    description: FIFO overflow on config data path
  propagation:
  - error latched in CHx_STATUS.error
  - error code latched in CHx_STATUS.err_code
  - irq[ch] asserted if int_enable[ch] is set
  - irq_combined reflects OR of all enabled irq outputs
  recovery:
  - Software reads CHx_STATUS to identify error code
  - Software writes INT_CLEAR to clear error and done latches
  - Channel returns to IDLE after status is cleared
  - No automatic retry (software must reconfigure and restart)
  - For hresp=RETRY, hardware re-requests same transfer automatically
debug_observability:
  waveform_must_probe:
  - pclk, hclk, presetn, hresetn
  - psel, penable, pwrite, paddr, pwdata, prdata, pready, pslverr
  - haddr, htrans, hsize, hburst, hprot, hmaster, hmastlock, hwrite, hwdata, hrdata,
    hready, hresp, hbusreq, hgrant
  - irq, irq_combined
  - per_channel FSM state
  - per_channel remaining counter
  - per_channel src_addr and dst_addr counters
  - per_channel stride register
  - per_channel FIFO wr_ptr and rd_ptr (gray and binary)
  - per_channel timeout counter
  - per_channel perf_words and perf_cycles
  - CDC sync pointers
  trace_events:
  - channel_start
  - burst_read_start
  - burst_read_complete
  - burst_write_start
  - burst_write_complete
  - transfer_done
  - transfer_error
  - arbiter_grant
  - timeout_expired
  - cdc_config_push
  - cdc_config_pop
  - fifo_almost_full
  - fifo_almost_empty
  - clock_gate_enable
  - clock_gate_disable
integration:
  bus_attachment:
    apb_slave: connects to APB bus matrix for configuration (pclk domain)
    ahb_master: connects to AHB-Lite bus matrix for data transfer (hclk domain)
  dependencies:
  - APB bus matrix provides psel, penable, pwrite, paddr, pwdata in pclk domain
  - AHB-Lite bus matrix provides hready, hrdata, hresp[1:0], hgrant in hclk domain
  - System interrupt controller receives irq_combined in pclk domain
  - System reset controller provides presetn and hresetn (may be async)
dft:
  scan_required: true
  controllability: All state registers accessible via scan chain
  observability: All state register outputs observed through scan
  scan:
    mode: muxed_d
    description: Standard muxed-D scan insertion via external ATPG tool
  test_modes:
  - name: functional
    description: Normal functional operation mode
  - name: scan_shift
    description: Scan shift mode for ATPG pattern load/unload
  - name: scan_capture
    description: Scan capture mode for ATPG pattern application
  mbist: none
  notes: Single clock domain, no embedded SRAM (FIFOs are register-based). Standard scan insertion suffices.
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  cts:
    buf_list:
    - sky130_fd_sc_hd__clkbuf_4
    - sky130_fd_sc_hd__clkbuf_8
  routing:
    signal_layers:
      min: met1
      max: met5
    drc_waivers: []
synthesis:
  dialect: systemverilog-2012
  constraints:
  - clock: pclk
    period_ns: 10.0
    uncertainty_ns: 0.5
    description: APB configuration clock constraint
  - clock: hclk
    period_ns: 5.0
    uncertainty_ns: 0.3
    description: AHB data transfer clock constraint (200 MHz target)
  - type: false_path
    from: pclk_domain
    to: hclk_domain
    description: CDC paths covered by gray-code sync, no timing constraint
  - type: max_delay
    from: pclk_domain
    to: hclk_domain
    delay_ns: 20.0
    description: CDC max delay for async FIFO pointer sync
  required_outputs:
  - prdata
  - pready
  - pslverr
  - haddr
  - hwrite
  - htrans
  - hsize
  - hburst
  - hprot
  - hmaster
  - hmastlock
  - hwdata
  - hbusreq
  - irq
  - irq_combined
coding_rules:
- use input logic / output logic port style
- no always_ff / always_comb / for / while / typedef / enum
- no package / import / interface / modport / function / task
- use always @(posedge) / always @(*) style
- all state registers have async reset (posedge clk or negedge rst_n)
- CDC modules use 2-stage synchronizer with async reset
- gray-code counter for async FIFO pointers
- generate blocks for N_CHANNELS instantiation
- pointer-based circular buffer for FIFO (not shift register)
- clock gating via library ICG cell
reuse_modules:
- name: dma_real_async_fifo
  file: rtl/dma_real_async_fifo.sv
  ownership: manifest
  rtl_emit: true
  description: Parameterized dual-clock async FIFO with gray-code pointer sync,
    almost_full/almost_empty flags, and configurable depth (power of 2)
- name: dma_real_cdc_sync
  file: rtl/dma_real_cdc_sync.sv
  ownership: manifest
  rtl_emit: true
  description: Parameterized 2-stage flip-flop synchronizer for single-bit or multi-bit
    (gray-code) CDC
- name: dma_real_cg_cell
  file: rtl/dma_real_cg_cell.sv
  ownership: manifest
  rtl_emit: true
  description: Integrated clock-gating cell wrapping library ICG primitive. Enable
    input controls gated clock output.
custom:
  assumptions:
  - dual_clock_domain: pclk and hclk may be asynchronous. Design must handle arbitrary
      phase relationship.
  - word_aligned_addresses: all addresses are word-aligned for word-size transfers
  - max_burst_16: burst length does not exceed 16 beats
  - no_scatter_gather: contiguous or fixed-stride address transfers only (no linked-list
      descriptor in this revision)
  - fifo_depth_power_of_2: FIFO_DEPTH must be power of 2 for gray-code pointer efficiency
  - hresp_split_optional: SPLIT response support included but may not be exercised
      by all AHB slaves
dir_structure:
  rtl: rtl/
  tb: tb/cocotb/
  sim: sim/
  lint: lint/
  cov: cov/
  model: model/
  verify: verify/
  list: list/
filelist:
  rtl:
  - rtl/dma_real_top.sv
  - rtl/dma_real_apb_cfg.sv
  - rtl/dma_real_arbiter.sv
  - rtl/dma_real_channel.sv
  - rtl/dma_real_ahb_master.sv
  - rtl/dma_real_irq.sv
  - rtl/dma_real_engine.sv
  - rtl/dma_real_async_fifo.sv
  - rtl/dma_real_cdc_sync.sv
  - rtl/dma_real_cg_cell.sv
test_requirements:
  scenarios:
  - id: SC_001
    name: single_channel_transfer
    stimulus: configure CH0 with aligned src=0x1000, dst=0x2000, len=4, stride=4,
      start transfer
    expected: CH0_STATUS.done=1, 4 words transferred, PERF_WORDS=4, irq[0] asserted
    checker: scoreboard compares FL vs RTL per-busy/done/error
    coverage:
    - function_dma_step
  - id: SC_002
    name: alignment_error
    stimulus: configure CH0 with src=0x1001 (misaligned), len=4, start
    expected: CH0_STATUS.error=1, err_code=1, no transfer occurs
    checker: scoreboard verifies error output matches FL
    coverage:
    - function_dma_error_align
  - id: SC_003
    name: zero_length_error
    stimulus: configure CH0 with aligned addresses, len=0, start
    expected: CH0_STATUS.error=1, err_code=2, no transfer occurs
    checker: scoreboard verifies error output matches FL
    coverage:
    - function_dma_error_zero_len
  - id: SC_004
    name: busy_reject
    stimulus: start CH0 transfer, then start again while busy
    expected: second start ignored, transfer continues
    checker: scoreboard verifies busy remains high and no duplicate transfer
    coverage:
    - function_dma_busy_reject
  - id: SC_005
    name: multi_channel_interleaved
    stimulus: start CH0 and CH1 simultaneously with len=8 each
    expected: both complete, arbiter alternates grants, both irq asserted
    checker: scoreboard verifies both channels complete with interleaved grants
    coverage:
    - function_dma_multi_ch
    - cycle_arb_round_robin
  - id: SC_006
    name: bus_error_during_transfer
    stimulus: configure CH0, start transfer, inject hresp=ERROR on first read beat
    expected: CH0_STATUS.error=1, err_code=3, transfer aborted
    checker: scoreboard verifies error after bus error response
    coverage:
    - function_dma_error_bus
  - id: SC_007
    name: global_enable_disable
    stimulus: start CH0 transfer, then clear dma_en mid-transfer
    expected: current burst completes, then pauses. Resume when dma_en re-asserted
    checker: scoreboard verifies pause and resume behavior
    coverage:
    - function_dma_global_enable
  - id: SC_008
    name: interrupt_clear
    stimulus: complete CH0 transfer, verify irq[0] asserted, write INT_CLEAR
    expected: irq[0] deasserted, CH0_STATUS.done cleared
    checker: scoreboard verifies IRQ deassertion
    coverage:
    - function_dma_irq_clear
  - id: SC_009
    name: apb_unmapped_address
    stimulus: APB read from unmapped address (e.g. 0xFFC)
    expected: pslverr=1, prdata=0
    checker: scoreboard verifies pslverr response
    coverage:
    - function_dma_apb_err
  - id: SC_010
    name: stride_transfer
    stimulus: configure CH0 with stride=8, src=0x1000, dst=0x2000, len=4
    expected: addresses increment by 8 per beat, 4 words transferred, PERF_WORDS=4
    checker: scoreboard verifies address increments match stride
    coverage:
    - function_dma_stride
  - id: SC_011
    name: bus_timeout
    stimulus: configure CH0 with GLOBAL_TIMEOUT=100, start transfer, inject hready=0
      for 101 cycles
    expected: CH0_STATUS.error=1, err_code=4, transfer aborted
    checker: scoreboard verifies timeout error detection
    coverage:
    - function_dma_timeout
  - id: SC_012
    name: performance_counters
    stimulus: configure and complete CH0 transfer with len=16, read PERF_WORDS and
      PERF_CYCLES
    expected: PERF_WORDS=16, PERF_CYCLES > 0, PERF_CYCLES saturates at 32'hFFFFFFFF
    checker: scoreboard verifies counter values
    coverage:
    - function_dma_perf_counters
  - id: SC_013
    name: burst_wrap_boundary
    stimulus: configure CH0 with burst_mode=INCR4, start address near 1KB boundary
    expected: burst splits at 1KB boundary, new NONSEQ beat starts after boundary
    checker: scoreboard verifies burst splitting at boundary
    coverage:
    - function_dma_burst_boundary
  - id: SC_014
    name: clock_gating
    stimulus: start CH0 transfer, observe gated_hclk active. After completion, observe
      gated_hclk disabled
    expected: clock gating enable follows ch_busy, no spurious transitions
    checker: scoreboard verifies clock gate enable timing
    coverage:
    - function_dma_clock_gating
  scoreboard_checks:
  - per-channel busy/done/error output matches FunctionalModel
  - per-channel remaining counter matches FL state
  - per-channel src/dst address counters match FL state (with stride)
  - arbiter grant matches round-robin policy
  - IRQ outputs match mask and status
  - performance counter values match expected increments
  - timeout detection triggers within GLOBAL_TIMEOUT cycles
  - AHB htrans/hburst/hsize encoding matches protocol
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      bins:
      - id: function_dma_step
        source_ref: function_model.transactions.FM_DMA_STEP
        class: transaction
        description: Valid DMA step with burst transfer
      - id: function_dma_error_align
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Alignment error path
      - id: function_dma_error_zero_len
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Zero-length error path
      - id: function_dma_error_bus
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Bus error during AHB transfer
      - id: function_dma_error_timeout
        source_ref: function_model.transactions.FM_DMA_ERROR
        class: error
        description: Bus timeout error
      - id: function_dma_busy_reject
        source_ref: function_model.transactions.FM_DMA_START
        class: error_case
        description: Start while busy rejected
      - id: function_dma_multi_ch
        source_ref: function_model.transactions.FM_ARB_GRANT
        class: arbitration
        description: Multiple channels active simultaneously
      - id: function_dma_global_enable
        source_ref: function_model.state_variables.dma_en_q
        class: control
        description: Global enable disable with in-progress transfer
      - id: function_dma_irq_clear
        source_ref: function_model.state_variables.int_enable_q
        class: interrupt
        description: Interrupt clear via INT_CLEAR register
      - id: function_dma_apb_err
        source_ref: function_model.transactions.FM_DMA_START
        class: protocol
        description: APB error on unmapped address access
      - id: function_dma_stride
        source_ref: function_model.state_variables.ch_stride_q
        class: transaction
        description: Non-default stride address increment
      - id: function_dma_timeout
        source_ref: function_model.state_variables.timeout_q
        class: error
        description: Bus timeout detection
      - id: function_dma_perf_counters
        source_ref: function_model.state_variables.perf_words_q
        class: status
        description: Performance counter increment
      - id: function_dma_burst_boundary
        source_ref: function_model.transactions.FM_DMA_STEP
        class: protocol
        description: Burst split at 1KB boundary
      - id: function_dma_clock_gating
        source_ref: function_model.state_variables.ch_busy_q
        class: power
        description: Clock gating enable/disable per channel
    cycle:
      target_pct: 100
      model: cycle_model
      bins:
      - id: cycle_pipeline_idle
        source_ref: cycle_model.pipeline[0]
        class: state
        description: Channel FSM IDLE state visited
      - id: cycle_pipeline_cfg
        source_ref: cycle_model.pipeline[1]
        class: state
        description: Channel FSM CFG state visited
      - id: cycle_pipeline_request
        source_ref: cycle_model.pipeline[2]
        class: state
        description: Channel FSM REQUEST state visited
      - id: cycle_pipeline_read
        source_ref: cycle_model.pipeline[3]
        class: state
        description: Channel FSM READ state visited
      - id: cycle_pipeline_write
        source_ref: cycle_model.pipeline[4]
        class: state
        description: Channel FSM WRITE state visited
      - id: cycle_pipeline_update
        source_ref: cycle_model.pipeline[5]
        class: state
        description: Channel FSM UPDATE state visited
      - id: cycle_pipeline_done
        source_ref: cycle_model.pipeline[6]
        class: state
        description: Channel FSM DONE state visited
      - id: cycle_pipeline_error
        source_ref: cycle_model.pipeline[7]
        class: state
        description: Channel FSM ERROR state visited
      - id: cycle_arb_round_robin
        source_ref: cycle_model.performance
        class: arbitration
        description: Round-robin arbitration switching between channels
      - id: cycle_burst_latency
        source_ref: cycle_model.handshake_rules.ahb_address_phase
        class: timing
        description: Burst completion latency measured
      - id: cycle_cdc_crossing
        source_ref: cycle_model.handshake_rules.cdc_config
        class: timing
        description: CDC config crossing latency measured
      - id: cycle_timeout_path
        source_ref: cycle_model.handshake_rules.timeout_rule
        class: timing
        description: Timeout counter activation and expiry
quality_gates:
  ssot:
    pass: SSOT YAML passes check_ssot_disk.sh validator with no missing sections
    evidence: yaml/dma_real.ssot.yaml
  rtl:
    pass: RTL compile and lint clean with 0 errors
    evidence: rtl/rtl_compile.json, lint/dut_lint.json
  dv:
    pass: All equivalence goals pass with 0 FL-vs-RTL mismatches
    evidence: sim/results.xml, sim/scoreboard_events.jsonl
  coverage:
    pass: 100% of planned functional and cycle coverage bins hit
    evidence: cov/coverage_functional.json, cov/fcov_plan.json
  eda:
    pass: Synthesis, STA, PnR, and post-route STA meet SSOT timing/area/power/physical targets or have approved SSOT waivers.
    evidence: syn report, sta reports, pnr report, routed.spef, sta-post reports
  signoff:
    pass: All quality gates pass with fresh evidence. Human gates resolved.
    evidence: sim/fl_rtl_goal_audit.json, cov/coverage_functional.json, req/approval_manifest.json
traceability:
  yaml_to_output:
  - ssot_section: top_module
    output: rtl/dma_real_top.sv
  - ssot_section: sub_modules
    output: rtl/dma_real_*.sv
