# ── interrupts ──────────────────────────────────────────────────────────────
interrupts:
  - name: rx_ready_irq
    pin: irq
    trigger: level_high
    enable: "CTRL.irq_enable"
    clear: "read of RXDATA register"
    description: "Asserted when RXDATA holds unread data and CTRL.irq_enable=1"

# ── fsm ─────────────────────────────────────────────────────────────────────
fsm:
  - name: apb_fsm
    description: "Simple APB transfer state machine (IDLE→SETUP→ACCESS→IDLE)"
    states:
      - name: IDLE
        encoding: "2'b00"
        description: "Waiting for hsel assertion"
        transitions:
          - { next: SETUP, condition: "hsel & hready" }
      - name: SETUP
        encoding: "2'b01"
        description: "Address phase — sample haddr, hwrite"
        transitions:
          - { next: ACCESS, condition: "1'b1" }
      - name: ACCESS
        encoding: "2'b10"
        description: "Data phase — capture or drive data"
        transitions:
          - { next: IDLE, condition: "hready" }
      - name: RESERVED
        encoding: "2'b11"
        description: "Unused state, returns to IDLE"
        transitions:
