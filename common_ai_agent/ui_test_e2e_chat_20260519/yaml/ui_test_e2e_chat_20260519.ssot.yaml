# ── test_requirements ───────────────────────────────────────────────────────
test_requirements:
  - id: TR001
    name: reset_values
    description: "Verify all registers read as reset value after rst_n deassertion"
    stimulus: "Deassert rst_n, read all 4 registers"
    expected: "TXDATA=0, RXDATA=0, STATUS=0, CTRL=0"
    checkers: ["assert_hrdata_eq_0_for_each_offset"]
    coverage:
      - "Cover all 4 register offsets read after reset"

  - id: TR002
    name: write_read_echo
    description: "Write a pattern to TXDATA, read back RXDATA and verify echo"
    stimulus: "Write 0xDEADBEEF to TXDATA (0x00), wait 1 cycle, read RXDATA (0x04)"
    expected: "RXDATA == 0xDEADBEEF, STATUS.rx_valid == 1"
    checkers: ["assert_rxdata_eq_written", "assert_status_rx_valid_set"]
    coverage:
      - "Cover at least 4 different data patterns"
      - "Cover back-to-back write-then-read"

  - id: TR003
    name: status_register
    description: "Verify STATUS.rx_valid reflects RXDATA availability"
    stimulus: "Write to TXDATA, read STATUS before and after RXDATA read"
    expected: "STATUS[1]=1 before RXDATA read, STATUS[1]=0 after"
    checkers: ["assert_status_rx_valid_clears"]
    coverage:
      - "Cover rx_valid transition 0→1 and 1→0"

  - id: TR004
    name: irq_behavior
    description: "Verify IRQ assertion and deassertion"
    stimulus: "Enable IRQ (CTRL[0]=1), write TXDATA, verify irq=1, read RXDATA, verify irq=0"
    expected: "irq==1 when rx_valid & irq_enable, irq==0 after RXDATA read"
    checkers: ["assert_irq_assertion", "assert_irq_clearing"]
    coverage:
      - "Cover irq_enable=0 blocking IRQ"
      - "Cover irq_enable=1 enabling IRQ"

  - id: TR005
    name: random_rw_stress
    description: "Randomized read/write stress with self-checking"
    stimulus: "100 random APB write/read pairs with random data and addresses"
    expected: "All reads return expected register values"
    checkers: ["assert_no_unexpected_x", "assert_register_consistency"]
    coverage:
      - "Cover all register offsets with both read and write"
      - "Cover max toggle on DATA_WIDTH bits"

