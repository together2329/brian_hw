    function_model_refs: ["FM004"]
    register_refs: ["REG_CTRL"]
    description: "Level IRQ asserted when rx_valid=1, cleared when RXDATA is read"

# ── function_model ──────────────────────────────────────────────────────────
function_model:
  transactions:
    - id: FM001
      name: apb_write
      description: "Host writes a DATA_WIDTH value to a CSR"
      inputs:
        - { port: hsel, width: 1, expr: "hsel == 1'b1" }
        - { port: hwrite, width: 1, expr: "hwrite == 1'b1" }
        - { port: haddr, width: "{{ADDR_WIDTH}}", expr: "haddr" }
        - { port: hwdata, width: "{{DATA_WIDTH}}", expr: "hwdata" }
      output_rules:
        - { port: txdata_q, width: "{{DATA_WIDTH}}", expr: "haddr == ADDR_TXDATA ? hwdata : txdata_q", condition: "hsel & hwrite & (haddr == ADDR_TXDATA)" }
        - { port: ctrl_q, width: "{{DATA_WIDTH}}", expr: "haddr == ADDR_CTRL ? hwdata : ctrl_q", condition: "hsel & hwrite & (haddr == ADDR_CTRL)" }
      state_updates:
        - { state: txdata_q, expr: "hsel & hwrite & (haddr == ADDR_TXDATA) ? hwdata : txdata_q", width: "{{DATA_WIDTH}}" }
        - { state: ctrl_q, expr: "hsel & hwrite & (haddr == ADDR_CTRL) ? hwdata : ctrl_q", width: "{{DATA_WIDTH}}" }

    - id: FM002
      name: apb_read
      description: "Host reads a CSR value"
      inputs:
        - { port: hsel, width: 1, expr: "hsel == 1'b1" }
        - { port: hwrite, width: 1, expr: "hwrite == 1'b0" }
        - { port: haddr, width: "{{ADDR_WIDTH}}", expr: "haddr" }
      output_rules:
        - { port: hrdata, width: "{{DATA_WIDTH}}", expr: "haddr == ADDR_TXDATA ? txdata_q : (haddr == ADDR_RXDATA ? rxdata_q : (haddr == ADDR_STATUS ? status_val : ctrl_q))" }
      state_updates:
        - { state: rx_valid, expr: "0", width: 1, condition: "hsel & ~hwrite & (haddr == ADDR_RXDATA)" }

    - id: FM003
      name: echo_forward
      description: "TXDATA is echoed to RXDATA on next clock edge"
      inputs:
        - { port: txdata_q, width: "{{DATA_WIDTH}}", expr: "txdata_q" }
      output_rules:
        - { port: rxdata_q, width: "{{DATA_WIDTH}}", expr: "txdata_q" }
      state_updates:
        - { state: rxdata_q, expr: "txdata_q", width: "{{DATA_WIDTH}}" }
        - { state: rx_valid, expr: "1'b1", width: 1 }

    - id: FM004
      name: irq_generate
      description: "IRQ driven high when rx_valid=1 and irq_enable=1"
      inputs:
        - { port: rx_valid, width: 1, expr: "rx_valid" }
      output_rules:
        - { port: irq, width: 1, expr: "rx_valid & ctrl_q[0]" }
      state_updates: []

    - id: FM_RESET
      name: reset
      description: "Synchronous reset initialization"
      inputs:
        - { port: rst_n, width: 1, expr: "rst_n == 1'b0" }
      output_rules:
        - { port: txdata_q, width: "{{DATA_WIDTH}}", expr: "'0" }
        - { port: rxdata_q, width: "{{DATA_WIDTH}}", expr: "'0" }
        - { port: rx_valid, width: 1, expr: "1'b0" }
        - { port: ctrl_q, width: "{{DATA_WIDTH}}", expr: "'0" }
        - { port: irq, width: 1, expr: "1'b0" }
      state_updates:
        - { state: txdata_q, expr: "'0", width: "{{DATA_WIDTH}}" }
        - { state: rxdata_q, expr: "'0", width: "{{DATA_WIDTH}}" }
        - { state: rx_valid, expr: "1'b0", width: 1 }
        - { state: ctrl_q, expr: "'0", width: "{{DATA_WIDTH}}" }

# ── cycle_model ─────────────────────────────────────────────────────────────
cycle_model:
  - id: CYC001
    name: apb_write_cycle
    description: "Single-cycle APB write — data captured on rising clock when hsel & hwrite & hready"
    latency_cycles: 1
