top_module:
  name: atciic100_real
  version: '1.0'
  type: peripheral
  description: I2C Master/Slave Controller with APB interface, DMA, and glitch suppression.
  reference_spec: Andes ATCIIC100 Data Sheet DS091_V1.3
  target:
    technology: generic
    clock_freq_mhz: 40
    area_um2: null
    power_mw: null
sub_modules:
- name: atciic100_apbslv
  file: rtl/atciic100_apbslv.v
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.apb_slave
  - registers
  source_sections:
  - io_list
  - registers
  register_refs:
  - registers.register_list
  connections:
  - module: atciic100_ctrl
    port: cmd
    signal: cmd_reg
  - module: atciic100_ctrl
    port: setup
    signal: setup_reg
  - module: atciic100_fifo
    port: data_in
    signal: pwdata
  description: APB Slave Interface and Register File
- name: atciic100_ctrl
  file: rtl/atciic100_ctrl.v
  ownership: manifest
  ssot_gen: false
  implements:
  - function_model
  - cycle_model
  - fsm
  source_sections:
  - function_model
  - cycle_model
  - fsm
  function_model_refs:
  - function_model.transactions
  cycle_model_refs:
  - cycle_model.handshake_rules
  - cycle_model.pipeline
  fsm_refs:
  - fsm.iic_phase
  connections:
  - module: atciic100_apbslv
    port: cmd_reg
    signal: cmd
  - module: atciic100_fifo
    port: data_out
    signal: tx_data
  - module: atciic100_gsf
    port: scl_in
    signal: scl_filtered
  description: I2C Protocol FSM and Datapath
- name: atciic100_fifo
  file: rtl/atciic100_fifo.v
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.instances
  source_sections:
  - memory
  connections:
  - module: atciic100_apbslv
    port: data_in
    signal: pwdata
  - module: atciic100_ctrl
    port: data_out
    signal: rx_data
  description: Bidirectional Data FIFO
- name: atciic100_gsf
  file: rtl/atciic100_gsf.v
  ownership: manifest
  ssot_gen: true
  implements:
  - features.glitch_suppression
  source_sections:
  - features
  connections:
  - module: atciic100_ctrl
    port: scl_i
    signal: scl_filtered
  description: Glitch Suppression Filter
decomposition:
  units:
  - id: apb_reg
    kind: control
    source_refs:
    - registers
    rtl_candidates:
    - atciic100_apbslv
  - id: fsm
    kind: control
    source_refs:
    - fsm
    - function_model
    rtl_candidates:
    - atciic100_ctrl
  - id: buffer
    kind: datapath
    source_refs:
    - memory
    rtl_candidates:
    - atciic100_fifo
  - id: filter
    kind: datapath
    source_refs:
    - features
    rtl_candidates:
    - atciic100_gsf
parameters:
- name: DATA_WIDTH
  default: 8
  type: int
  description: Data width (fixed 8-bit)
  drives:
  - atciic100_fifo.v
- name: FIFO_DEPTH
  default: 8
  type: int
  description: FIFO depth (2, 4, 8, 16)
  drives:
  - atciic100_fifo.v
- name: INDEX_WIDTH
  default: 3
  type: int
  description: FIFO index width log2(FIFO_DEPTH)
  drives:
  - atciic100_fifo.v
- name: TP_AUTOACK
  default: 1
  type: int
  description: Auto-ACK support threshold parameter
  drives:
  - atciic100_ctrl.v
- name: CLOCK_FREQ_MHZ
  default: 40
  type: int
  description: Target APB clock frequency in MHz
  drives:
  - tb_top.v
- name: RESET_POLARITY
  default: active_low
  type: enum
  values:
  - active_low
  - active_high
  drives:
  - ALL .v files
io_list:
  clock_domains:
  - name: pclk
    frequency_mhz: 40
    description: APB Clock
    ports:
    - name: pclk
      width: 1
      direction: input
      description: APB Clock
  resets:
  - name: presetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: APB Reset
    ports:
    - name: presetn
      width: 1
      direction: input
      description: APB Reset Active-Low
  interfaces:
  - name: apb_slave
    type: AMBA_APB
    role: slave
    description: APB Register Interface
    ports:
    - name: psel
      width: 1
      direction: input
      description: APB Select
    - name: penable
      width: 1
      direction: input
      description: APB Enable
    - name: pwrite
      width: 1
      direction: input
      description: APB Write
    - name: paddr
      width: 4
      direction: input
      description: APB Address (paddr[5:2])
    - name: pwdata
      width: 32
      direction: input
      description: APB Write Data
    - name: prdata
      width: 32
      direction: output
      description: APB Read Data
  - name: i2c_bus
    type: I2C
    role: master_slave
    description: I2C Serial Interface
    ports:
    - name: scl_i
      width: 1
      direction: input
      description: I2C Clock Input
    - name: sda_i
      width: 1
      direction: input
      description: I2C Data Input
    - name: scl_o
      width: 1
      direction: output
      description: I2C Clock Output (Open Drain)
    - name: sda_o
      width: 1
      direction: output
      description: I2C Data Output (Open Drain)
  - name: dma_if
    type: DMA_REQ_ACK
    role: master
    description: DMA Interface
    ports:
    - name: i2c_req
      width: 1
      direction: output
      description: DMA Request
    - name: i2c_ack
      width: 1
      direction: input
      description: DMA Acknowledge
  - name: interrupt
    type: IRQ
    role: master
    description: Interrupt Output
    ports:
    - name: i2c_int
      width: 1
      direction: output
      description: Interrupt
features:
- name: Master Transmit/Receive
  trigger: CMD=0x1 with Master=1 in SETUP
  datapath: APB->FIFO->Shift->SDA (TX) or SDA->Shift->FIFO->APB (RX)
  control: Phase_start, Phase_addr, Phase_data, Phase_stop in CTRL reg
  output: I2C Bus Transaction
- name: Slave Transmit/Receive
  trigger: Address match on bus
  datapath: SDA->Shift->FIFO (RX) or FIFO->Shift->SDA (TX)
  control: AddrHit interrupt triggers software response
  output: Ack/Nack response
- name: Multi-Master Arbitration
  trigger: SDA low when master drives high
  datapath: Compare SDA_O vs SDA_I on SCL rising edge
  control: ArbLose status bit set, FSM resets to IDLE
  output: Arbitration Lost Status
- name: General Call
  trigger: Address byte = 0x00 in slave mode
  datapath: Standard receive path
  control: GenCall status bit set
  output: Ack response to address 0x00
- name: Glitch Suppression
  trigger: SCL_i or SDA_i pulse width < T_SP * t_pclk
  datapath: Digital filter on inputs
  control: Continuous
  output: Filtered SCL/SDA to internal logic
- name: Auto Clock Stretching
  trigger: FIFO Full (RX) or Empty (TX)
  datapath: Hold SCL low
  control: Hardware automatic
  output: Stalled bus clock
- name: Auto-ACK
  trigger: ByteRecv interrupt disabled and Auto-ACK enabled
  datapath: ACK generated for all received bytes except last
  control: Hardware automatic based on DataCnt
  output: Proper ACK/NACK on bus
dataflow:
  master_tx:
    source: APB Master (CPU)
    burst: Single Byte (APB writes) or DMA
    buffer: FIFO
    sequence: APB -> DATA Reg -> FIFO -> Shift Reg -> SDA_O
  master_rx:
    source: I2C Bus (SDA_I)
    burst: Single Byte
    buffer: FIFO
    sequence: SDA_I -> Shift Reg -> FIFO -> DATA Reg -> APB
  slave_tx:
    source: APB Master (CPU)
    burst: Single Byte
    buffer: FIFO
    sequence: APB -> DATA Reg -> FIFO -> Shift Reg -> SDA_O
  slave_rx:
    source: I2C Bus (SDA_I)
    burst: Single Byte
    buffer: FIFO
    sequence: SDA_I -> Shift Reg -> FIFO -> DATA Reg -> APB
function_model:
  purpose: Executable behavioral contract for atciic100_real.
  state_variables:
  - name: cmd
    source: registers.CMD
    reset: 0
    description: Current command
  - name: cfg
    source: registers.CFG
    reset: 0
    description: Global config
  - name: int_en
    source: registers.INT_EN
    reset: 0
    description: Interrupt enables
  - name: int_st
    source: registers.INT_ST
    reset: 1
    description: Interrupt status (FIFOEmpty=1)
  - name: setup
    source: registers.SETUP
    reset: 0
    description: Timing/Setup config
  - name: addr
    source: registers.ADDR
    reset: 0
    description: Target/Own address
  - name: ctrl
    source: registers.CTRL
    reset: 7936
    description: Phase/Direction/Count
  - name: phase
    source: fsm.iic_phase
    reset: IDLE
    description: Current FSM phase
  - name: fifo_count
    source: memory.instances[0].count
    reset: 0
    description: Current FIFO depth
  - name: master
    source: setup.Master
    reset: 0
    description: Master/Slave mode flag
  - name: trans
    source: ctrl.Dir
    reset: 0
    description: Transmitter/Receiver flag
  - name: arb_lost
    source: int_st.ArbLose
    reset: 0
    description: Arbitration lost flag
  - name: datacnt
    source: ctrl.DataCnt
    reset: 0
    description: Remaining byte count
  transactions:
  - id: FM1
    name: reset
    preconditions:
    - presetn == 0
    inputs: []
    outputs:
    - All registers reset to default
    - FIFO cleared
    - FSM=IDLE
    side_effects:
    - i2c_int goes low
    - Bus lines released (open drain)
    error_cases: []
  - id: FM2
    name: csr_read
    preconditions:
    - psel==1 && penable==1 && pwrite==0
    inputs:
    - paddr
    outputs:
    - prdata = RegisterFile[paddr]
    side_effects:
    - APB read completes in 2 cycles (setup then access phase)
    - INT_ST read does not clear W1C bits (only write-1 clears)
    error_cases: []
  - id: FM3
    name: csr_write
    preconditions:
    - psel==1 && penable==1 && pwrite==1
    inputs:
    - paddr
    - pwdata
    outputs:
    - RegisterFile[paddr] updated
    side_effects:
    - CMD triggers action if valid
    - SETUP updates timing
    error_cases: []
  - id: FM4
    name: master_send
    preconditions:
    - master==1
    - trans==0
    - cmd==1
    - fifo_count > 0
    inputs:
    - addr
    - data
    outputs:
    - SCL/SDA signals driven for Start->Addr->Data->Stop
    - Target slave ACK/NACK
    side_effects:
    - datacnt decrements
    - ByteTrans interrupt
    - Cmpl interrupt
    error_cases:
    - condition: No ACK from slave
      result: int_st.ACK = 0, check NACK
    - condition: Arbitration Lost
      result: arb_lost=1, STOP driving bus
  - id: FM5
    name: master_recv
    preconditions:
    - master==1
    - trans==1
    - cmd==1
    inputs:
    - addr
    outputs:
    - SCL/SDA signals driven for Start->Addr->Data->Stop
    - Data pushed to FIFO
    side_effects:
    - datacnt decrements
    - ByteRecv interrupt
    - FIFO status updates
    error_cases:
    - condition: Slave NACK on address
      result: Transaction aborted, Stop sent, ACK status updated
  - id: FM6
    name: slave_send
    preconditions:
    - master==0
    - trans==1
    - addr matched
    inputs:
    - bus_clk
    - bus_data
    outputs:
    - Data from FIFO shifted out
    side_effects:
    - ByteTrans interrupt
    error_cases:
    - condition: FIFO Empty
      result: Clock Stretching
  - id: FM7
    name: slave_recv
    preconditions:
    - master==0
    - trans==0
    - addr matched
    inputs:
    - bus_clk
    - bus_data
    outputs:
    - Data pushed to FIFO
    side_effects:
    - ByteRecv interrupt
    error_cases:
    - condition: FIFO Full
      result: Clock Stretching or Overrun
  - id: FM8
    name: general_call
    preconditions:
    - master==0
    - Address byte == 0x00
    inputs:
    - bus_clk
    - bus_data
    outputs:
    - ACK response
    - int_st.GenCall = 1
    side_effects:
    - AddrHit interrupt
    error_cases:
    - condition: Controller disabled (IICEn=0)
      result: No ACK, general call ignored
  - id: FM9
    name: dma_request
    preconditions:
    - setup.DMAEn == 1
    - (trans==1 && fifo_count > 0) || (trans==0 && fifo_count < FIFO_DEPTH)
    inputs:
    - DMA Enable
    outputs:
    - i2c_req = 1
    side_effects:
    - DMA transfers data between FIFO and memory via external DMA controller
    error_cases:
    - condition: DMA acknowledge timeout
      result: FIFO overrun or underrun may occur; DMA disabled until re-enabled
  invariants:
  - FIFO count never exceeds FIFO_DEPTH parameter.
  - Phase transitions follow IDLE->START->ADDR->DAT->STOP strictly, unless ArbLose occurs.
  - Arbitration Lost (ArbLose) terminates transmission immediately and releases bus.
  - i2c_int is asserted if and only if (int_st & int_en) != 0.
  - No destination write occurs before the corresponding source read completes in any transaction.
  - 'SCL/SDA outputs are open-drain: driven low or released high, never actively driven high.'
cycle_model:
  purpose: Cycle/handshake contract for atciic100_real.
  clock: pclk
  reset:
    assertion: presetn low clears state
    deassertion: State usable on next edge
  latency:
    register_access:
      min_cycles: 2
      max_cycles: 2
      description: Setup/Access phases
    i2c_byte:
      min_cycles: 9
      max_cycles: null
      description: 8 data bits + 1 ACK, scaled by T_SCLHi
  handshake_rules:
  - signal: psel/penable
    rule: APB protocol requires setup then access phase.
  - signal: scl_o/sda_o
    rule: Open drain; drive low or float high.
  - signal: i2c_req
    rule: Hold high until i2c_ack received.
  - signal: scl_i filtering
    rule: Ignore pulses < T_SP * t_pclk.
  - signal: scl_i/sda_i
    rule: Sample filtered SCL/SDA on rising pclk edge after glitch filter latency.
  pipeline:
  - stage: IDLE
    cycle: 0
    action: Wait for CMD or Address Match
  - stage: START
    cycle: 1
    action: Generate Start Condition (SDA H->L while SCL High)
  - stage: ADDR
    cycle: 2..9
    action: Shift out/in Address + R/W bit
  - stage: DAT
    cycle: 10..N
    action: Shift Data Bytes
  - stage: STOP
    cycle: N+1
    action: Generate Stop Condition (SDA L->H while SCL High)
  ordering:
  - Start must precede Addr.
  - Addr must precede Data.
  - Stop must follow Data or ArbLose.
  - A write response for beat i must complete before architectural completion of beat i.
  - Interrupt status updates occur on the same rising edge as the terminal status transition.
  arbitration:
  - Sample SDA_I on SCL rising edge. If SDA_I=0 but SDA_O=1, ArbLose.
  backpressure:
  - FIFO Full holds SCL Low (Clock Stretching).
  - FIFO Empty in slave TX holds SCL Low until data available.
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - name: pclk
    frequency_mhz: 40
    description: APB Clock
  reset_scheme:
    signal: presetn
    polarity: active_low
    type: async_assert_sync_deassert
cdc_requirements:
  crossings: []
  synchronizers: []
  note: Single clock domain.
rdc_requirements:
  crossings: []
  synchronizers: []
  note: No reset domain crossings.
registers:
  config:
    register_width: 32
    addr_width: 6
    byte_addressable: true
  register_list:
  - name: ID
    offset: 0
    width: 32
    access: ro
    reset: 514
    category: info
    description: Device ID
  - name: REV
    offset: 4
    width: 32
    access: ro
    reset: 4098
    category: info
    description: Revision ID
  - name: CFG
    offset: 8
    width: 32
    access: ro
    reset: 0
    category: info
    description: Hardware Config
  - name: INT_EN
    offset: 12
    width: 32
    access: rw
    reset: 0
    category: interrupt
    description: Interrupt Enable
  - name: INT_ST
    offset: 16
    width: 32
    access: rw1c
    reset: 1
    category: status
    description: Interrupt Status
  - name: ADDR
    offset: 20
    width: 32
    access: rw
    reset: 0
    category: control
    description: I2C Address
  - name: DATA
    offset: 24
    width: 32
    access: rw
    reset: 0
    category: data
    description: Data FIFO Port
  - name: CMD
    offset: 28
    width: 32
    access: rw
    reset: 0
    category: control
    description: Command Register
  - name: CTRL
    offset: 32
    width: 32
    access: rw
    reset: 7936
    category: control
    description: Control Register
  - name: SETUP
    offset: 36
    width: 32
    access: rw
    reset: 0
    category: control
    description: Setup Register
memory:
  instances:
  - name: tx_rx_fifo
    type: fifo
    depth: FIFO_DEPTH
    width: 8
    read_ports: 1
    write_ports: 1
    latency: 0
    description: Bidirectional Data FIFO
interrupts:
  sources:
  - name: IRQ_COMB
    bit: 0
    type: level
    enable_reg: INT_EN
    status_reg: INT_ST
    clear: W1C
    description: Combined Interrupt
  output:
    signal: i2c_int
    polarity: active_high
    type: level
fsm:
  iic_phase:
    states:
    - IDLE
    - START
    - ADDR
    - DAT
    - STOP
    - ARBLOST
    transitions:
    - from: IDLE
      to: START
      condition: cmd==1 && master==1 && Phase_start
    - from: IDLE
      to: ADDR
      condition: cmd==1 && master==1 && !Phase_start && Phase_addr
    - from: IDLE
      to: DAT
      condition: cmd==1 && master==1 && !Phase_start && !Phase_addr && Phase_data
    - from: START
      to: ADDR
      condition: Start sent
    - from: ADDR
      to: DAT
      condition: Addr sent and ACK received
    - from: ADDR
      to: STOP
      condition: Addr sent and NACK received
    - from: ADDR
      to: ARBLOST
      condition: Arbitration Lost
    - from: DAT
      to: STOP
      condition: DataCnt==0
    - from: DAT
      to: DAT
      condition: DataCnt>0
    - from: DAT
      to: ARBLOST
      condition: Arbitration Lost
    - from: STOP
      to: IDLE
      condition: Stop sent
    - from: ARBLOST
      to: IDLE
      condition: Immediate
timing:
  target_clocks:
  - name: pclk
    freq_mhz: 40
  latency_budget:
  - path: APB_Write_to_FIFO
    max_ns: 50
  - path: FIFO_to_SDA
    max_ns: T_SCLHi * 25
power:
  domains:
  - name: VDD
    voltage: 1.8V
    rails:
    - Logic
    - IO
  power_states:
  - name: 'ON'
    description: Active
  - name: 'OFF'
    description: Power Gated
security:
  classification: Internal
  assets:
  - name: I2C_Data
    type: Data
    confidentiality: Low
  threat_model:
  - threat: Bus Interference
    mitigation: Glitch Filter
error_handling:
  error_sources:
  - id: ERR_ACK
    source: Slave NACK
    effect: Transaction stops
  - id: ERR_ARB
    source: Multi-Master Collision
    effect: ArbLost Status
  - id: ERR_FIFO
    source: Overrun/Underrun
    effect: Data Loss/Clocking Stretching
  - id: ERR_DMA_TIMEOUT
    source: DMA acknowledge not received
    effect: FIFO overrun or underrun
  - id: ERR_GLITCH_INJECT
    source: Injected glitch on SCL/SDA
    effect: Filtered by GSF if within T_SP
  propagation:
  - Set Status Bits in INT_ST
  - Assert i2c_int if enabled
  recovery:
  - Software clears status bits
  - Issue CMD Reset (0x5)
debug_observability:
  waveform_must_probe:
  - scl_i
  - sda_i
  - scl_o
  - sda_o
  - i2c_int
  - phase
  - datacnt
  - fifo_count
  trace_events:
  - name: I2C_START
    description: Start condition detected
  - name: I2C_STOP
    description: Stop condition detected
integration:
  bus_attachment:
  - bus: APB
    role: slave
  dependencies:
  - name: APB Bus
    version: AMBA 2.0
dft:
  scan_required: false
  controllability: Full via APB registers
  observability: Full via status registers and interrupt
synthesis:
  dialect: verilog_2001
  constraints:
  - name: pclk
    type: clock
    period_ns: 25
  required_outputs:
  - netlist
  - sdc
  ppa_targets:
    frequency_mhz_min: 100
    area_um2: null
    power_mw: null
coding_rules:
  verilog_style: verilog_2001
  conventions:
  - Nonblocking assignments for sequential logic.
  - Blocking for combinational.
  - 'No latches: every combinational branch assigns all outputs.'
  - Active-low async reset.
  - Parameterize widths (no hardcoded numbers).
  - 'BANNED in both dialects: package / interface / modport.'
  lint_waivers: []
reuse_modules: []
custom:
  note: None
dir_structure:
  template_dirs:
    rtl: templates/rtl/
    sim: templates/sim/
  output_dirs:
    rtl: rtl/
    sim: sim/
  yaml_dir: yaml/
  generators_dir: generators/
filelist:
  rtl:
  - rtl/atciic100_apbslv.v
  - rtl/atciic100_ctrl.v
  - rtl/atciic100_fifo.v
  - rtl/atciic100_gsf.v
  - rtl/atciic100_real.v
  sim:
  - sim/tb_top.v
rtl_contract:
  fl_vs_rtl_equivalence: Required
  coverage_model: Required
test_requirements:
  scenarios:
  - id: SC1
    name: Reset
    stimulus: Assert presetn
    expected: Registers default, FIFO empty
    checker: Register readback
    coverage:
    - Reset
  - id: SC2
    name: APB Read
    stimulus: APB Read ID
    expected: '0x0202'
    checker: Data check
    coverage:
    - APB_R
  - id: SC3
    name: APB Write
    stimulus: APB Write SETUP
    expected: Setup updated
    checker: Readback
    coverage:
    - APB_W
  - id: SC4
    name: Master TX
    stimulus: Full TX sequence
    expected: Data on bus
    checker: Slave model response
    coverage:
    - Master_TX
  - id: SC5
    name: Master RX
    stimulus: Full RX sequence
    expected: Data in FIFO
    checker: FIFO read
    coverage:
    - Master_RX
  - id: SC6
    name: Slave TX
    stimulus: Addressed as slave
    expected: Data driven
    checker: Master model check
    coverage:
    - Slave_TX
  - id: SC7
    name: Slave RX
    stimulus: Addressed as slave
    expected: Data in FIFO
    checker: FIFO read
    coverage:
    - Slave_RX
  - id: SC8
    name: Gen Call
    stimulus: Addr 0x00
    expected: GenCall status
    checker: Status bit
    coverage:
    - Gen_Call
  - id: SC9
    name: Arb Lose
    stimulus: Multi-master collision
    expected: ArbLost status
    checker: Status bit
    coverage:
    - Arb_Lose
  - id: SC10
    name: FIFO Full
    stimulus: Write beyond depth
    expected: Full status
    checker: Status bit
    coverage:
