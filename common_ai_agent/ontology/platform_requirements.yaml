        owned_by: agent.memory
        granularity: behavior
        status: refuted
        refuted_by: >-
          auto_extract_and_update 가 LLM 불가 시 {"extracted": 0} 을 반환 —
          호출자가 'LLM 미상담'과 '추출할 것 없음'을 구분할 수 없음
      - id: OBL_COMPRESS_LLM_FAIL_SURFACED
        owned_by: agent.compression
        granularity: behavior
        status: refuted
        refuted_by: >-
          compressor 가 LLM 실패를 조용히 truncation dump 로 대체 (silent swallow)
        repro: scripts/verify_compression_llm.py

