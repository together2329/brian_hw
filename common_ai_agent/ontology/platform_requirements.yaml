      - id: OBL_SESS_AUTHORIZE_NO_FAIL_OPEN
        owned_by: api.sessions
        granularity: concurrent
        status: refuted
        refuted_by: >-
          신규 세션이 DB row 없이 namespace-owner 매치만으로 allow —
          create↔authorize 사이 race 가능 (_authorize_session_request fail-open 분기)
      - id: OBL_ACTIVATE_ENV_NO_CROSS_LEAK
        owned_by: api.sessions
        granularity: behavior
        status: refuted
        refuted_by: >-
          비프로세스 모드 activate 가 os.environ.update(context.export_env()) 로
          전역 env 를 오염 — 멀티테넌트에서 사용자 간 누수 가능

