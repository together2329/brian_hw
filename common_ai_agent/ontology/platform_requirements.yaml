# Platform Requirements — ROCEV 척추 선언부 (source of truth)
#
#   Requirement → Obligation → (Contract=reflection) → Evidence → Validation
#
# RTL의 VCM(doc/wiki/verification-contract-model.md)과 같은 메타패턴을
# common_ai_agent 플랫폼 개발에 인스턴스화한 것. 규칙 (스캐너가 기계 강제):
#   - requirement: design_anchor(위키 문서) 실재 필수 + obligation ≥1
#   - obligation:  owned_by 는 platform_ontology.yaml 의 DevUnit id
#                  granularity ∈ {structural, behavior, content, concurrent}
#                  status ∈ {closed, open, refuted}
#   - closed  → evidence ≥1, 각 test 노드(ast 검증)와 observed_at 커밋 실재 필수
#   - refuted → refuted_by 필수 (이게 '결함'의 정식 표기 — known_gaps 의 승격)
#   - freshness: observed_at 이후 owner 단위의 owns/테스트 파일이 바뀌면
#                effective_status=stale 로 강등 (정확성 && 신선도 = VCM 의 PASS 정의)
# silent-PASS 금지: 유령 노드/유령 anchor 선언은 check 실패.
