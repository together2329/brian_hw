  - id: REQ_PLAT_LLM_FAILURE_VISIBILITY_001
    claim: "LLM 호출 실패는 절대 정상 결과로 둔갑하지 않는다 (green-while-broken 금지)"
    design_anchor: doc/wiki/testing-methodology.md
    obligations:
