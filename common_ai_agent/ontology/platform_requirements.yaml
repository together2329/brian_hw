#   - requirement: design_anchor(мң„нӮӨ л¬ём„ң) мӢӨмһ¬ н•„мҲҳ + obligation вүҘ1
#   - obligation:  owned_by лҠ” platform_ontology.yaml мқҳ DevUnit id
#                  granularity вҲҲ {structural, behavior, content, concurrent}
#                  status вҲҲ {closed, open, refuted}
#   - closed  вҶ’ evidence вүҘ1, к°Ғ test л…ёл“ң(ast кІҖмҰқ)мҷҖ observed_at м»Өл°Ӣ мӢӨмһ¬ н•„мҲҳ
#   - refuted вҶ’ refuted_by н•„мҲҳ (мқҙкІҢ 'кІ°н•Ё'мқҳ м •мӢқ н‘ңкё° вҖ” known_gaps мқҳ мҠ№кІ©)
#   - freshness: observed_at мқҙнӣ„ owner лӢЁмң„мқҳ owns/н…ҢмҠӨнҠё нҢҢмқјмқҙ л°”лҖҢл©ҙ
#                effective_status=stale лЎң к°•л“ұ (м •нҷ•м„ұ && мӢ м„ лҸ„ = VCM мқҳ PASS м •мқҳ)
# silent-PASS кёҲм§Җ: мң л № л…ёл“ң/мң л № anchor м„ м–ёмқҖ check мӢӨнҢЁ.
