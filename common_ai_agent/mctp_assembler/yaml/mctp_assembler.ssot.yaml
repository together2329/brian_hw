top_module:
  name: mctp_assembler
  file: rtl/mctp_assembler.sv
  version: 0.1.0
  type: peripheral
  description: AXI write-slave ingress block that receives raw PCIe VDM TLP packets
    carrying MCTP, assembles fragmented MCTP message payload bytes (never PCIe TLP
    headers) into external SRAM, exposes a separate AXI read-slave path for burst
    SRAM payload readback, and exposes control/debug through APB.
  reference_spec: req/mctp_assembler_requirements.md; DMTF DSP0238 MCTP PCIe VDM Transport
    Binding; DMTF DSP0236 MCTP Base Specification
  target:
    technology: generic
    clock_freq_mhz: null
    area_um2: null
    power_mw: null
sub_modules:
- name: mctp_assembler_axi_write_ingress
  file: rtl/mctp_assembler_axi_write_ingress.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.axi_write_slave
  - dataflow.ingress
  - cycle_model.handshake_rules.axi_write
  source_sections:
  - io_list
  - dataflow
  - cycle_model
  - test_requirements
  description: Accepts one raw PCIe VDM TLP per AXI write burst and emits ordered
    valid bytes.
  function_model_refs:
  - function_model.transactions.FM_ACCEPT_AXI_TLP
  - function_model.transactions.FM_FILTER_VDM
  - function_model.transactions.FM_WRITE_SRAM_AND_DESCRIPTOR
  cycle_model_refs:
  - cycle_model
  dataflow_refs:
  - dataflow
  test_refs:
  - test_requirements
- name: mctp_assembler_pcie_vdm_parser
  file: rtl/mctp_assembler_pcie_vdm_parser.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - custom.standards_decode.pcie_vdm
  - function_model.transactions.FM_FILTER_VDM
  - error_handling
  source_sections: &id001
  - custom
  - function_model
  - error_handling
  description: Parses PCIe VDM header fields and filters for MCTP-over-PCIe-VDM packets.
- name: mctp_assembler_mctp_parser
  file: rtl/mctp_assembler_mctp_parser.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - custom.standards_decode.mctp_transport
  - function_model.transactions.FM_PARSE_MCTP
  source_sections: &id002
  - custom
  - function_model
  description: Parses MCTP transport header and extracts EIDs, SOM/EOM, sequence,
    tag owner, message tag, and message type.
  function_model_refs:
  - function_model.transactions.FM_PARSE_MCTP
- name: mctp_assembler_context_table
  file: rtl/mctp_assembler_context_table.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - memory.internal_context_table
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
  - fsm.assembly_fsm
  source_sections:
  - memory
  - function_model
  - fsm
  description: Tracks active fragmented messages keyed by source EID, tag owner, and
    message tag.
  function_model_refs:
  - function_model.transactions.FM_ASSEMBLE_FRAGMENT
  fsm_refs:
  - fsm
- name: mctp_assembler_payload_writer
  file: rtl/mctp_assembler_payload_writer.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.sram_write_port
  - memory.external_sram_write_port
  - dataflow.output
  source_sections: &id003
  - io_list
  - memory
  - dataflow
  description: Packs assembled payload bytes into SRAM write beats while stripping
    headers and final packet padding.
- name: mctp_assembler_axi_read_egress
  file: rtl/mctp_assembler_axi_read_egress.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.axi_read_slave
  - io_list.interfaces.sram_read_port
  - dataflow.sram_read
  source_sections:
  - io_list
  - dataflow
  - cycle_model
  - test_requirements
  description: Separate AXI read-slave path that translates host burst reads into
    external SRAM read transactions. Independent from TLP ingress and assembly.
  function_model_refs:
  - function_model.transactions.FM_READ_SRAM_BURST
  cycle_model_refs:
  - cycle_model
  test_refs:
  - test_requirements
- name: mctp_assembler_apb_regfile
  file: rtl/mctp_assembler_apb_regfile.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.apb_slave
  - registers.register_list
  - interrupts
  - debug_observability
  source_sections:
  - io_list
  - registers
  - interrupts
  - debug_observability
  - features
  - decomposition
  description: APB control, descriptor, status, interrupt, counter, and debug register
    block.
  function_model_refs:
  - function_model.state_variables
  - function_model.transactions.FM_WRITE_SRAM_AND_DESCRIPTOR
  feature_refs:
  - features
  decomposition_refs:
  - decomposition
  register_refs:
  - registers.register_list
- name: mctp_assembler_cdc
  file: rtl/mctp_assembler_cdc.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - cdc_requirements
  - clock_reset_domains
  - interrupts
  source_sections: &id004
  - cdc_requirements
  - clock_reset_domains
  - interrupts
  description: Synchronizes APB configuration into AXI domain and AXI events/descriptors
    into APB domain.
- name: mctp_assembler
  file: rtl/mctp_assembler.sv
  ownership: manifest
  ssot_gen: true
  wiring_only: true
  description: Top-level integration module matching SSOT top_module
  implements:
  - top_module
  - integration
  source_sections:
  - top_module
  - io_list
  - decomposition
  - integration
  decomposition_refs:
  - decomposition
  dataflow_refs:
  - dataflow
decomposition:
  units:
  - id: axi_ingress
    kind: protocol_adapter
    source_refs:
    - io_list.interfaces.axi_write_slave
    - dataflow.ingress
    rtl_candidates:
    - mctp_assembler_axi_write_ingress
    verification_impact:
    - test_requirements.scenarios.SC_AXI_ONE_BURST_ONE_TLP
    - test_requirements.scenarios.SC_AXI_WSTRB_FINAL
  - id: vdm_filter
    kind: parser_filter
    source_refs:
    - custom.standards_decode.pcie_vdm
    - function_model.transactions.FM_FILTER_VDM
    rtl_candidates:
    - mctp_assembler_pcie_vdm_parser
    verification_impact:
    - test_requirements.scenarios.SC_DROP_WRONG_VENDOR
    - test_requirements.scenarios.SC_DROP_WRONG_MESSAGE_CODE
  - id: mctp_assembly
    kind: stateful_datapath
    source_refs:
    - function_model.transactions.FM_ASSEMBLE_FRAGMENT
    - memory.internal_context_table
    - fsm.assembly_fsm
    rtl_candidates:
    - mctp_assembler_mctp_parser
    - mctp_assembler_context_table
    verification_impact:
    - test_requirements.scenarios.SC_MULTI_PACKET
    - test_requirements.scenarios.SC_SEQ_ERROR
  - id: axi_read_egress
    kind: protocol_adapter
    source_refs:
    - io_list.interfaces.axi_read_slave
    - io_list.interfaces.sram_read_port
    - dataflow.sram_read
    rtl_candidates:
    - mctp_assembler_axi_read_egress
    verification_impact:
    - test_requirements.scenarios.SC_AXI_READ_SINGLE
    - test_requirements.scenarios.SC_AXI_READ_BURST
  - id: register_debug
    kind: control_status
    source_refs:
    - registers.register_list
    - interrupts
    - debug_observability
    rtl_candidates:
    - mctp_assembler_apb_regfile
    verification_impact:
    - test_requirements.scenarios.SC_APB_REGS
    - test_requirements.scenarios.SC_INTR_W1C
  strategy: manifest_owned_leaf_decomposition
  owners:
  - module: mctp_assembler_axi_write_ingress
    file: rtl/mctp_assembler_axi_write_ingress.sv
    responsibility: Accepts one raw PCIe VDM TLP per AXI write burst and emits ordered
      valid bytes.
    source_sections:
    - io_list
    - dataflow
    - cycle_model
  - module: mctp_assembler_pcie_vdm_parser
    file: rtl/mctp_assembler_pcie_vdm_parser.sv
    responsibility: Parses PCIe VDM header fields and filters for MCTP-over-PCIe-VDM
      packets.
    source_sections: *id001
  - module: mctp_assembler_mctp_parser
    file: rtl/mctp_assembler_mctp_parser.sv
    responsibility: Parses MCTP transport header and extracts EIDs, SOM/EOM, sequence,
      tag owner, message tag, and message type.
    source_sections: *id002
  - module: mctp_assembler_context_table
    file: rtl/mctp_assembler_context_table.sv
    responsibility: Tracks active fragmented messages keyed by source EID, tag owner,
      and message tag.
    source_sections:
    - memory
    - function_model
    - fsm
  - module: mctp_assembler_payload_writer
    file: rtl/mctp_assembler_payload_writer.sv
    responsibility: Packs assembled payload bytes into SRAM write beats while stripping
      headers and final packet padding.
    source_sections: *id003
  - module: mctp_assembler_axi_read_egress
    file: rtl/mctp_assembler_axi_read_egress.sv
    responsibility: Accept AXI read bursts and issue matching burst reads on the external
      SRAM read port for payload readback.
    source_sections:
    - io_list
    - dataflow
    - cycle_model
  - module: mctp_assembler_apb_regfile
    file: rtl/mctp_assembler_apb_regfile.sv
    responsibility: APB control, descriptor, status, interrupt, counter, and debug
      register block.
    source_sections:
    - io_list
    - registers
    - interrupts
    - debug_observability
  - module: mctp_assembler_cdc
    file: rtl/mctp_assembler_cdc.sv
    responsibility: Synchronizes APB configuration into AXI domain and AXI events/descriptors
      into APB domain.
    source_sections: *id004
  - module: mctp_assembler
    file: rtl/mctp_assembler.sv
    responsibility: Top-level integration module matching SSOT top_module
    source_sections:
    - top_module
    - io_list
    - decomposition
    - integration
  integration_policy: Top-level wiring must be backed by integration.connections or
    sub_modules[].connections before signoff.
  source_refs:
  - sub_modules
  - function_model
  - cycle_model
  - integration
rtl_contract:
  transaction: FM_ACCEPT_AXI_TLP
  sample_condition: '1'
  input_map:
    axi_tlp_bytes: s_axi_wlast
    apb_config: CONTROL, CFG_LOCAL_EID, CFG_MTU, CFG_MAX_MESSAGE_BYTES, CFG_SRAM_BASE,
      CFG_SRAM_LIMIT, CFG_TIMEOUT, INTR_ENABLE.
    sram_ready: sram_wr_ready
    s_axi_awaddr: s_axi_awaddr
    s_axi_awlen: s_axi_awlen
    s_axi_awsize: s_axi_awsize
    s_axi_awburst: s_axi_awburst
    s_axi_awvalid: s_axi_awvalid
    s_axi_wdata: s_axi_wdata
    s_axi_wstrb: s_axi_wstrb
    s_axi_wlast: s_axi_wlast
    s_axi_wvalid: s_axi_wvalid
    s_axi_bready: s_axi_bready
    paddr: paddr
    psel: psel
    penable: penable
    pwrite: pwrite
    pwdata: pwdata
    pstrb: pstrb
    sram_wr_ready: sram_wr_ready
    s_axi_araddr: s_axi_araddr
    s_axi_arlen: s_axi_arlen
    s_axi_arsize: s_axi_arsize
    s_axi_arburst: s_axi_arburst
    s_axi_arvalid: s_axi_arvalid
    s_axi_rready: s_axi_rready
    sram_rd_valid: sram_rd_valid
    sram_rd_ready: sram_rd_ready
  output_map:
    sram_write: sram_wr_strb
    descriptor: DESC_WORD0..DESC_WORD3 expose metadata for the oldest completed message
      through APB.
    interrupt: intr
    status: STATUS, ERROR_STATUS, counters, and DEBUG_STATE reflect parser, assembly,
      descriptor, and error state.
    s_axi_awready: s_axi_awready
    s_axi_wready: s_axi_wready
    s_axi_bresp: s_axi_bresp
    s_axi_bvalid: s_axi_bvalid
    prdata: prdata
    pready: pready
    pslverr: pslverr
    sram_wr_valid: sram_wr_valid
    sram_wr_addr: sram_wr_addr
    sram_wr_data: sram_wr_data
    sram_wr_strb: sram_wr_strb
    s_axi_arready: s_axi_arready
    s_axi_rdata: s_axi_rdata
    s_axi_rresp: s_axi_rresp
    s_axi_rlast: s_axi_rlast
    s_axi_rvalid: s_axi_rvalid
    sram_rd_addr: sram_rd_addr
    intr: intr
  state_updates:
  - name: active_contexts
    reset: empty
    expr: Allocate on valid SOM without EOM, append on matching sequence, release
  - name: sram_write_pointer
    reset: CFG_SRAM_BASE shadow after reset/config update
    expr: Advance by assembled payload bytes written; overflow if next write exceeds
  - name: descriptor_fifo
    reset: empty
    expr: Push descriptor on message completion; pop only by DESC_POP APB command.
  - name: interrupt_status
    reset: 0
    expr: Set on synchronized AXI event, clear by APB W1C.
  owner: ssot-gen
  type: ssot_derived_rule_contract
  clock: axi_aclk
  reset: axi_aresetn
  reset_active: low
  output_valid: sram_wr_valid
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transaction.
  - Input sampling and output observation follow cycle_model handshake and latency
    rules.
  output_rules:
  - name: pslverr
    port: pslverr
    expr: '0'
    width: 1
    description: Auto-injected benign observable rule so the function_model has at
      least one scoreboard-visible output equation; replace with IP-specific output
      behavior before signoff.
parameters:
- name: AXI_ADDR_WIDTH
  default: 16
  type: int
  description: AXI address width. Write AWADDR selects the ingress window only; read
    ARADDR is the external SRAM byte address within configured SRAM_BASE/SRAM_LIMIT.
  drives:
  - mctp_assembler.sv
  - mctp_assembler_axi_write_ingress.sv
  - mctp_assembler_axi_read_egress.sv
- name: AXI_DATA_WIDTH
  default: 256
  type: int
  values:
  - 32
  - 64
  - 128
  - 256
  description: AXI WDATA/RDATA width in bits.
  drives:
  - mctp_assembler.sv
  - mctp_assembler_axi_write_ingress.sv
  - mctp_assembler_axi_read_egress.sv
  - mctp_assembler_payload_writer.sv
- name: APB_ADDR_WIDTH
  default: 12
  type: int
  description: APB byte address width for control/debug register access.
  drives:
  - mctp_assembler.sv
  - mctp_assembler_apb_regfile.sv
- name: APB_DATA_WIDTH
  default: 32
  type: int
  values:
  - 32
  description: APB data width.
  drives:
  - mctp_assembler.sv
  - mctp_assembler_apb_regfile.sv
- name: SRAM_ADDR_WIDTH
  default: 16
  type: int
  description: SRAM byte address width.
  drives:
  - mctp_assembler.sv
  - mctp_assembler_payload_writer.sv
  - mctp_assembler_context_table.sv
  - mctp_assembler_axi_read_egress.sv
- name: SRAM_DATA_WIDTH
  default: 256
  type: int
  description: SRAM write data width in bits; defaults to AXI data width.
  drives:
  - mctp_assembler.sv
  - mctp_assembler_payload_writer.sv
- name: CONTEXT_COUNT
  default: 15
  type: int
  description: Number of simultaneous MCTP message assembly contexts; the assembly
    queue supports up to 15 interleaved messages.
  drives:
  - mctp_assembler_context_table.sv
  - mctp_assembler_apb_regfile.sv
- name: MAX_MESSAGE_BYTES
  default: 4096
  type: int
  description: Maximum assembled message payload bytes before overflow.
  drives:
  - mctp_assembler_context_table.sv
  - mctp_assembler_payload_writer.sv
- name: BASELINE_MTU_BYTES
  default: 64
  type: int
  description: Default MCTP baseline transmission unit in bytes.
  drives:
  - mctp_assembler_pcie_vdm_parser.sv
  - mctp_assembler_apb_regfile.sv
- name: DESCRIPTOR_FIFO_DEPTH
  default: 8
  type: int
  description: Internal APB-readable completed-message descriptor FIFO depth.
  drives:
  - mctp_assembler_apb_regfile.sv
  - mctp_assembler_cdc.sv
- name: TIMEOUT_COUNTER_WIDTH
  default: 24
  type: int
  description: Width of per-context assembly timeout counters.
  drives:
  - mctp_assembler_context_table.sv
io_list:
  clock_domains:
  - name: axi
    frequency_mhz: null
    description: AXI ingress, SRAM write, and separate AXI read egress clock domain.
    ports:
    - name: axi_aclk
      width: 1
      direction: input
      description: AXI domain clock
  - name: apb
    frequency_mhz: null
    description: APB control/debug and interrupt clock domain.
    ports:
    - name: pclk
      width: 1
      direction: input
      description: APB domain clock
  resets:
  - name: axi_aresetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    clock_domain: axi
    ports:
    - name: axi_aresetn
      width: 1
      direction: input
      description: AXI domain active-low reset
  - name: presetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    clock_domain: apb
    ports:
    - name: presetn
      width: 1
      direction: input
      description: APB domain active-low reset
  interfaces:
  - name: axi_write_slave
    type: AXI4
    role: slave_write_only
    clock_domain: axi
    reset_domain: axi_aresetn
    description: AXI write-only slave ingress. Each accepted write burst carries exactly
      one raw PCIe VDM TLP in WDATA.
    protocol:
      outstanding_rule: Only one outstanding ingress burst is supported; no AXI ID
        ports are exposed in the initial SSOT.
      aw_rule: AWADDR selects ingress window only and is not interpreted as payload
        address.
      w_rule: WDATA byte lane 0 of the first accepted beat is TLP byte 0; WSTRB marks
        valid bytes; WLAST terminates the TLP.
      burst_rule: AWBURST must be INCR or FIXED according to system integration policy;
        unsupported bursts return SLVERR.
      response_rule: BRESP is OKAY for accepted packets or SLVERR for malformed AXI
        burst protocol or disabled ingress rejection.
    ports:
    - name: s_axi_awaddr
      width: AXI_ADDR_WIDTH
      direction: input
      description: AXI write address selecting ingress window
    - name: s_axi_awlen
      width: 8
      direction: input
      description: AXI burst length, beats minus one
    - name: s_axi_awsize
      width: 3
      direction: input
      description: AXI beat size
    - name: s_axi_awburst
      width: 2
      direction: input
      description: AXI burst type
    - name: s_axi_awvalid
      width: 1
      direction: input
      description: Write address valid
    - name: s_axi_awready
      width: 1
      direction: output
      description: Write address ready
    - name: s_axi_wdata
      width: AXI_DATA_WIDTH
      direction: input
      description: Raw PCIe VDM TLP bytes
    - name: s_axi_wstrb
      width: AXI_DATA_WIDTH/8
      direction: input
      description: Byte-valid mask for WDATA
    - name: s_axi_wlast
      width: 1
      direction: input
      description: Final beat of one TLP
    - name: s_axi_wvalid
      width: 1
      direction: input
      description: Write data valid
    - name: s_axi_wready
      width: 1
      direction: output
      description: Write data ready
    - name: s_axi_bresp
      width: 2
      direction: output
      description: AXI write response
    - name: s_axi_bvalid
      width: 1
      direction: output
      description: AXI write response valid
    - name: s_axi_bready
      width: 1
      direction: input
      description: AXI write response ready
  - name: axi_read_slave
    type: AXI4
    role: slave_read_only
    clock_domain: axi
    reset_domain: axi_aresetn
    description: Separate AXI read-only slave for burst readback of assembled payload
      bytes from external SRAM. Independent from TLP ingress; ARADDR is the SRAM byte
      address.
    protocol:
      outstanding_rule: Only one outstanding read burst is supported; no AXI ID ports
        are exposed.
      ar_rule: ARADDR selects external SRAM byte address and must fall within configured
        SRAM_BASE and SRAM_LIMIT inclusive.
      r_rule: RDATA returns payload bytes in little-endian lane order within each beat;
        RLAST marks the final beat of ARlen+1 beats.
      burst_rule: ARBURST INCR and FIXED are supported; WRAP is unsupported and returns
        SLVERR.
      size_rule: ARSIZE must not exceed the beat width implied by AXI_DATA_WIDTH;
        unsupported size returns SLVERR.
      response_rule: RRESP is OKAY for in-range successful reads or SLVERR for illegal
        address, unsupported burst type, or protocol violation.
      independence_rule: Read acceptance and completion do not require or modify assembly
        contexts, descriptors, or TLP ingress state.
    ports:
    - name: s_axi_araddr
      width: AXI_ADDR_WIDTH
      direction: input
      description: AXI read address selecting external SRAM byte address
    - name: s_axi_arlen
      width: 8
      direction: input
      description: AXI burst length, beats minus one
    - name: s_axi_arsize
      width: 3
      direction: input
      description: AXI read beat size
    - name: s_axi_arburst
      width: 2
      direction: input
      description: AXI read burst type
    - name: s_axi_arvalid
      width: 1
      direction: input
      description: Read address valid
    - name: s_axi_arready
      width: 1
      direction: output
      description: Read address ready
    - name: s_axi_rdata
      width: AXI_DATA_WIDTH
      direction: output
      description: Read data beat
    - name: s_axi_rresp
      width: 2
      direction: output
      description: Read response
    - name: s_axi_rlast
      width: 1
      direction: output
      description: Final beat of read burst
    - name: s_axi_rvalid
      width: 1
      direction: output
      description: Read data valid
    - name: s_axi_rready
      width: 1
      direction: input
      description: Read data ready
  - name: apb_slave
    type: APB4
    role: slave
    clock_domain: apb
    reset_domain: presetn
    description: APB control, descriptor, status, counter, interrupt, and debug register
      interface.
    protocol:
      setup_phase: psel=1 and penable=0 captures address/control.
      access_phase: psel=1 and penable=1 completes when pready=1.
      read_rule: prdata is valid during completing read access.
      write_rule: pwdata and pstrb are sampled during completing write access.
      error_rule: pslverr is asserted with pready for illegal address, illegal byte
        strobe, or unsupported access.
    ports:
    - name: paddr
      width: APB_ADDR_WIDTH
      direction: input
      description: APB byte address
    - name: psel
      width: 1
      direction: input
      description: APB select
    - name: penable
      width: 1
      direction: input
      description: APB enable
    - name: pwrite
      width: 1
      direction: input
      description: APB write control
    - name: pwdata
      width: APB_DATA_WIDTH
      direction: input
      description: APB write data
    - name: pstrb
      width: APB_DATA_WIDTH/8
      direction: input
      description: APB byte strobes
    - name: prdata
      width: APB_DATA_WIDTH
      direction: output
      description: APB read data
    - name: pready
      width: 1
      direction: output
      description: APB ready
    - name: pslverr
      width: 1
      direction: output
      description: APB error
  - name: sram_write_port
    type: SRAM_WRITE
    role: master
    clock_domain: axi
    reset_domain: axi_aresetn
    description: Write-only SRAM payload port for completed MCTP message payload bytes.
    protocol:
      valid_ready: A write occurs when sram_wr_valid && sram_wr_ready.
      strb_rule: sram_wr_strb marks valid payload bytes in sram_wr_data.
      address_rule: sram_wr_addr is byte address within configured SRAM base/limit.
    ports:
    - name: sram_wr_valid
      width: 1
      direction: output
      description: SRAM write valid
    - name: sram_wr_ready
      width: 1
      direction: input
      description: SRAM write ready
    - name: sram_wr_addr
      width: SRAM_ADDR_WIDTH
      direction: output
      description: SRAM byte write address
    - name: sram_wr_data
      width: SRAM_DATA_WIDTH
      direction: output
      description: SRAM write data
    - name: sram_wr_strb
      width: SRAM_DATA_WIDTH/8
      direction: output
      description: SRAM write byte strobes
  - name: sram_read_port
    type: SRAM_READ
    role: master
    clock_domain: axi
    reset_domain: axi_aresetn
    description: Read-only SRAM payload port used by the separate AXI read path to
      fetch assembled bytes from external SRAM.
    protocol:
      valid_ready: A read request is presented on sram_rd_valid && sram_rd_ready.
      address_rule: sram_rd_addr is byte address within configured SRAM base/limit.
      data_rule: sram_rd_data returns the requested beat on the cycle sram_rd_valid
        is accepted; the read path may pipeline or stretch bursts according to implementation.
      burst_rule: The AXI read path may issue back-to-back read beats for one AXI burst;
        each beat uses sram_rd_addr advanced by the effective byte width of the transfer.
      arbitration_rule: Read and write ports may be active concurrently; the external
        SRAM or system interconnect resolves port conflicts. The read path never writes
        SRAM.
    ports:
    - name: sram_rd_valid
      width: 1
      direction: output
      description: SRAM read request valid
    - name: sram_rd_ready
      width: 1
      direction: input
      description: SRAM read request ready
    - name: sram_rd_addr
      width: SRAM_ADDR_WIDTH
      direction: output
      description: SRAM byte read address
    - name: sram_rd_data
      width: SRAM_DATA_WIDTH
      direction: input
      description: SRAM read data returned for the accepted address beat
  - name: interrupt
    type: custom
    role: source
    clock_domain: apb
    reset_domain: presetn
    description: Single APB-domain level interrupt.
    ports:
    - name: intr
      width: 1
      direction: output
      polarity: active_high
      description: Level interrupt from enabled INTR_STATUS bits
    protocol:
      acceptance: Transfer acceptance follows the declared valid/ready or protocol
        phase rule.
      stability: Payload/control fields remain stable until accepted.
      response: Observable response timing follows cycle_model latency and ordering.
features:
- id: AXI_TLP_INGRESS
  description: Accept one PCIe VDM TLP per AXI write burst.
  source_refs:
  - req/mctp_assembler_requirements.md:17
- id: PCIE_VDM_MCTP_FILTER
  description: Accept only MCTP-over-PCIe-VDM packets matching Type 1 VDM with data,
    message code 0x7F, DMTF vendor ID 0x1AB4, and MCTP VDM code 0.
  source_refs:
  - req/mctp_assembler_requirements.md:26
- id: MCTP_MESSAGE_ASSEMBLY
  description: Assemble fragmented MCTP messages keyed by source EID, tag owner, and
    message tag using SOM/EOM and 2-bit sequence modulo 4. Ingress is a raw PCIe VDM
    TLP byte stream; SRAM stores only MCTP message payload bytes (TLP index 16+, minus
    pad). PCIe TLP header bytes never enter SRAM.
  source_refs:
  - req/mctp_assembler_requirements.md:31
- id: APB_CONTROL_DEBUG
  description: Expose configuration, descriptor metadata, status, counters, error
    status, and debug state through APB.
  source_refs:
  - req/mctp_assembler_requirements.md:37
- id: ASYNC_AXI_APB
  description: AXI ingress/SRAM domain and APB control/debug domain are asynchronous
    and require CDC-safe transfer.
  source_refs:
  - req/mctp_assembler_requirements.md:9
- id: INTERNAL_DESCRIPTOR
  description: Completed message descriptor is internal and APB-readable; no descriptor
    valid/data top-level pins are exposed.
  source_refs:
  - req/mctp_assembler_requirements.md:35
- id: AXI_SRAM_READ
  description: Separate AXI read-slave path performs burst readback of assembled payload
    bytes from external SRAM using ARADDR as SRAM byte address. Independent from TLP
    ingress and assembly datapath.
  source_refs:
  - req/mctp_assembler_requirements.md
dataflow:
  sequence:
  - step: AXI_AW_ACCEPT
    description: Accept AW only when ingress is enabled, no burst is active, and internal
      buffers can accept one TLP.
  - step: AXI_W_COLLECT
    description: Collect WDATA bytes in order using WSTRB. WLAST marks packet end.
  - step: PCIE_VDM_PARSE
    description: Parse PCIe/VDM header, length, routing, message code, vendor ID,
      MCTP VDM code, and pad/digest policy.
  - step: MCTP_HEADER_PARSE
    description: Parse MCTP transport header and first payload message type byte.
  - step: FILTER_OR_REJECT
    description: Apply VDM, header version, destination EID, MTU, and length checks.
  - step: ASSEMBLE_PAYLOAD
    description: Allocate, append, complete, abort, or timeout a message context using
      only MCTP message payload bytes (TLP bytes from index 16 upward, excluding final
      pad).
  - step: SRAM_WRITE
    description: Write only assembled MCTP message payload bytes to SRAM. PCIe TLP
      header, PCIe VDM header, MCTP transport header, and final packet pad bytes are
      never written.
  - step: DESCRIPTOR_EVENT
    description: Transfer completed descriptor metadata and error/status events into
      APB domain.
  sram_read:
  - step: AXI_AR_ACCEPT
    description: Accept AR when no read burst is active, ARADDR is within SRAM base/limit,
      and burst attributes are supported.
  - step: SRAM_READ_BURST
    description: Issue ARLEN+1 read beats on sram_read_port and return ordered RDATA
      beats with RLAST on the final beat.
  ordering:
  - AXI bursts are processed in acceptance order.
  - AXI read bursts are processed independently from TLP write bursts and assembly
    state except for shared external SRAM bandwidth.
  - Descriptor order matches message completion order after CDC transfer.
  - Interleaving is allowed only across distinct source_eid/tag_owner/message_tag
    keys.
function_model:
  state_variables:
  - name: enabled
    type: bool
    reset: false
  - name: cfg_local_eid
    type: uint8
    reset: 0
  - name: cfg_dest_filter_enable
    type: bool
    reset: true
  - name: cfg_mtu_bytes
    type: uint16
    reset: 64
  - name: cfg_max_message_bytes
    type: uint16
    reset: 4096
  - name: cfg_sram_base
    type: uint32
    reset: 0
  - name: cfg_sram_limit
    type: uint32
    reset: 0
  - name: active_contexts
    type: table
    entries: 15
    key:
    - source_eid
    - tag_owner
    - message_tag
    description: Tracks up to 15 simultaneous interleaved MCTP message assemblies.
  - name: descriptor_fifo
    type: fifo
    reset: empty
  - name: interrupt_status
    type: bitfield
    reset: 0
  - name: error_status
    type: bitfield
    reset: 0
  - name: fm_accept_axi_tlp_observed
    source: function_model.transactions.FM_ACCEPT_AXI_TLP
    width: 1
    reset: 0
    description: Auto-injected transaction coverage/state marker because the transaction
      had prose outputs or side effects but no executable output_rules/state_updates.
  - name: fm_filter_vdm_observed
    source: function_model.transactions.FM_FILTER_VDM
    width: 1
    reset: 0
    description: Auto-injected transaction coverage/state marker because the transaction
      had prose outputs or side effects but no executable output_rules/state_updates.
  - name: fm_parse_mctp_observed
    source: function_model.transactions.FM_PARSE_MCTP
    width: 1
    reset: 0
    description: Auto-injected transaction coverage/state marker because the transaction
      had prose outputs or side effects but no executable output_rules/state_updates.
  - name: fm_assemble_fragment_observed
    source: function_model.transactions.FM_ASSEMBLE_FRAGMENT
    width: 1
    reset: 0
    description: Auto-injected transaction coverage/state marker because the transaction
      had prose outputs or side effects but no executable output_rules/state_updates.
  - name: fm_write_sram_and_descriptor_observed
    source: function_model.transactions.FM_WRITE_SRAM_AND_DESCRIPTOR
    width: 1
    reset: 0
    description: Auto-injected transaction coverage/state marker because the transaction
      had prose outputs or side effects but no executable output_rules/state_updates.
  - name: packet_drop_count
    type: uint32
    reset: 0
    description: Counts packets discarded before allocating, appending, completing,
      or terminating an assembly context.
  - name: assembly_drop_count
    type: uint32
    reset: 0
    description: Counts active message assemblies aborted after context allocation
      or update.
  - name: last_drop_class
    type: enum
    reset: none
    values:
    - none
    - packet_drop
    - assembly_drop
    description: Classification of the most recent drop event.
  - name: last_drop_reason
    type: uint8
    reset: 0
    description: Encoded reason for the most recent packet or assembly drop.
  transactions:
  - id: FM_ACCEPT_AXI_TLP
    description: Convert one accepted AXI write burst into an ordered byte vector
      representing one PCIe VDM TLP.
    inputs:
    - s_axi_awaddr
    - s_axi_awlen
    - s_axi_awsize
    - s_axi_awburst
    - s_axi_wdata
    - s_axi_wstrb
    - s_axi_wlast
    outputs:
    - tlp_bytes
    - tlp_byte_count
    - name: pslverr
      port: pslverr
      expr: '0'
      description: Auto-injected benign observable rule so the function_model has
        at least one scoreboard-visible output equation; replace with IP-specific
        output behavior before signoff.
    - state: fm_accept_axi_tlp_observed
      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
    preconditions:
    - enabled is true
    - one outstanding burst is not already active
    postconditions:
    - tlp byte 0 equals byte lane 0 of first accepted WDATA beat
    - invalid WSTRB bytes are excluded
    name: fm_accept_axi_tlp
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff
      state
    output_rules:
    - name: pslverr
      port: pslverr
      expr: '0'
      width: 1
      description: Auto-injected benign observable rule so the function_model has
        at least one scoreboard-visible output equation; replace with IP-specific
        output behavior before signoff.
    state_updates:
    - name: fm_accept_axi_tlp_observed
      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
  - id: FM_FILTER_VDM
    description: Accept or reject the TLP based on PCIe VDM and MCTP binding fields.
    inputs:
    - tlp_bytes
    outputs:
    - accepted_packet
    - reject_reason
    - state: fm_filter_vdm_observed
      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
    checks:
    - message_code == 0x7F
    - vendor_id == 0x1AB4
    - mctp_vdm_code == 0
    - packet length is sufficient for PCIe/VDM and MCTP transport headers
    name: fm_filter_vdm
    preconditions:
    - transaction is accepted under cycle_model rules
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff
      state
    output_rules: []
    state_updates:
    - name: fm_filter_vdm_observed
      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
  - id: FM_PARSE_MCTP
    description: Extract destination EID, source EID, SOM, EOM, packet sequence, tag
      owner, message tag, and message type.
    inputs:
    - accepted_packet
    outputs:
    - mctp_fields
    - packet_payload_bytes
    - state: fm_parse_mctp_observed
      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
    checks:
    - MCTP header version is supported
    - destination EID passes configured local/broadcast/null policy
    name: fm_parse_mctp
    preconditions:
    - transaction is accepted under cycle_model rules
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff
      state
    output_rules: []
    state_updates:
    - name: fm_parse_mctp_observed
      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
  - id: FM_ASSEMBLE_FRAGMENT
    description: Apply SOM/EOM/sequence rules and update a keyed assembly context.
    inputs:
    - mctp_fields
    - packet_payload_bytes
    outputs:
    - context_update
    - optional_completed_message
    - optional_error
    - state: fm_assemble_fragment_observed
      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
    rules:
    - SOM=1,EOM=1 completes a single-packet message.
    - SOM=1,EOM=0 allocates a context and sets expected sequence to packet_seq+1 modulo
      4.
    - SOM=0 requires an active context for the source_eid/tag_owner/message_tag key.
    - Continuation packet_seq must equal expected sequence; expected sequence increments
      modulo 4.
    - EOM=1 completes the context and releases it.
    name: fm_assemble_fragment
    preconditions:
    - transaction is accepted under cycle_model rules
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff
      state
    output_rules: []
    state_updates:
    - name: fm_assemble_fragment_observed
      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
  - id: FM_WRITE_SRAM_AND_DESCRIPTOR
    description: Write completed message payload bytes to SRAM and publish APB-readable
      descriptor metadata.
    inputs:
    - completed_message
    outputs:
    - sram_writes
    - descriptor_fifo_push
    - interrupt_event
    - state: fm_write_sram_and_descriptor_observed
      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
    checks:
    - payload byte count does not exceed cfg_max_message_bytes
    - SRAM writes remain within cfg_sram_base and cfg_sram_limit
    - descriptor FIFO has space or reports descriptor_full
    name: fm_write_sram_and_descriptor
    preconditions:
    - transaction is accepted under cycle_model rules
    side_effects:
    - updates only SSOT-declared architectural state, status, events, or output handoff
      state
    output_rules: []
    state_updates:
    - name: fm_write_sram_and_descriptor_observed
      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
  - id: FM_READ_SRAM_BURST
    description: Read assembled payload bytes from external SRAM through the separate
      AXI read-slave path and return burst RDATA to the host.
    inputs:
    - araddr
    - arlen
    - arsize
    - arburst
    outputs:
    - rdata_beats
    - read_error
    - state: fm_read_sram_burst_observed
      expr: '1'
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
    rules:
    - ARADDR is a byte address within cfg_sram_base and cfg_sram_limit inclusive.
    - Burst length is arlen+1 beats; each beat returns up to AXI_DATA_WIDTH/8 bytes
      in little-endian lane order according to arsize.
    - INCR and FIXED bursts are supported; WRAP is rejected.
    - Reads do not allocate, modify, or complete assembly contexts and do not push
      descriptors.
    - Out-of-range address or unsupported burst attributes produce read_error without
      modifying assembly state.
    name: fm_read_sram_burst
    preconditions:
    - read request is accepted under cycle_model rules
    side_effects:
    - none on assembly contexts, descriptor fifo, or ingress state
    output_rules: []
    state_updates:
    - name: fm_read_sram_burst_observed
      expr: '1'
      width: 1
      description: Repair marker making this transaction machine-checkable; ssot-gen
        should replace with IP-specific architectural state/output equations before
        signoff.
  - id: FM_CLASSIFY_DROP
    name: fm_classify_drop
    description: Classify discard events as packet_drop when no assembly context is
      affected, or assembly_drop when an active context must be aborted.
    inputs:
    - drop_condition
    - context_match
    - context_active
    - packet_stage
    outputs:
    - drop_class
    - drop_reason
    - name: intr
      port: intr
      expr: (|(INTR_STATUS & INTR_ENABLE))
    preconditions:
    - A packet or active context hits a declared drop condition.
    side_effects:
    - updates packet_drop_count or assembly_drop_count
    - sets last_drop_class and last_drop_reason
    - sets packet_drop or assembly_drop interrupt/status source when enabled
    output_rules:
    - name: intr
      port: intr
      expr: (|(INTR_STATUS & INTR_ENABLE))
      width: 1
      description: Drop events can contribute to APB-domain interrupt status when
        enabled.
    state_updates:
    - name: packet_drop_count
      expr: packet_drop_count + 1 when drop_class == packet_drop else packet_drop_count
      width: 32
    - name: assembly_drop_count
      expr: assembly_drop_count + 1 when drop_class == assembly_drop else assembly_drop_count
      width: 32
    - name: last_drop_class
      expr: drop_class
      width: 2
    - name: last_drop_reason
      expr: drop_reason
      width: 8
    error_cases:
    - unknown_drop_reason is encoded as DROP_RESERVED_UNKNOWN and sets error_status
  invariants:
  - No PCIe TLP header, PCIe VDM header, MCTP transport header, or final packet pad
    byte is written as assembled payload to SRAM.
  - At most one active context exists for any source_eid/tag_owner/message_tag key.
  - No APB-domain configuration bit is consumed in AXI domain without CDC synchronization.
  - intr is asserted only from APB-domain interrupt status bits that are enabled.
  - Packet drop never allocates, updates, completes, or terminates an assembly context.
  - Assembly drop aborts exactly the affected active context and suppresses a successful
    descriptor for that message.
  - Packet drop and assembly drop counters are independently observable through APB.
  - AXI read path observes SRAM bytes only; it never writes payload or updates assembly
    contexts.
  scenarios:
  - id: FM_READ_BACK
    description: A completed message payload can be read back through FM_READ_SRAM_BURST
      at the descriptor sram_start_addr for payload_byte_count bytes.
  - id: FM_SINGLE_PACKET
    description: A valid SOM=1,EOM=1 MCTP packet produces one SRAM payload and one
      descriptor.
  - id: FM_MULTI_PACKET
    description: A valid SOM/middle/EOM sequence with modulo-4 sequence numbers produces
      one assembled payload.
  - id: FM_BAD_SEQUENCE
    description: A continuation fragment with wrong sequence aborts its context and
      sets sequence_error.
  - id: FM_WRONG_VENDOR
    description: A VDM packet with non-DMTF vendor ID is dropped and counted.
  derived_signals:
  - name: apb_access
    expr: psel and penable
    width: 1
    description: APB access phase helper derived from psel and penable.
    source: repair_ssot_schema.apb_helper
  - name: apb_valid_write
    expr: psel and penable and pwrite
    width: 1
    description: APB write access helper derived from psel, penable, and pwrite.
    source: repair_ssot_schema.apb_helper
  - name: apb_valid_read
    expr: psel and penable and not pwrite
    width: 1
    description: APB read access helper derived from psel, penable, and pwrite.
    source: repair_ssot_schema.apb_helper
  - name: addr
    expr: paddr
    width: APB_ADDR_WIDTH
    description: Register address helper derived from the APB paddr input.
    source: repair_ssot_schema.apb_helper
  - name: wmask
    expr: ((0x000000FF if (pstrb & 0x1) != 0 else 0) | (0x0000FF00 if (pstrb & 0x2)
      != 0 else 0) | (0x00FF0000 if (pstrb & 0x4) != 0 else 0) | (0xFF000000 if (pstrb
      & 0x8) != 0 else 0))
    width: APB_DATA_WIDTH
    description: APB byte-lane write mask expanded from pstrb.
    source: repair_ssot_schema.apb_helper
  - name: legal_addr
    expr: (addr == 0) or (addr == 4) or (addr == 8) or (addr == 12) or (addr == 16)
      or (addr == 20) or (addr == 24) or (addr == 28) or (addr == 32) or (addr ==
      36) or (addr == 40) or (addr == 48) or (addr == 52) or (addr == 56) or (addr
      == 60) or (addr == 64) or (addr == 68) or (addr == 128) or (addr == 132) or
      (addr == 136) or (addr == 140) or (addr == 256) or (addr == 260) or (addr ==
      264) or (addr == 268) or (addr == 272) or (addr == 276)
    width: 1
    description: APB legal address decode derived from registers.register_list offsets.
    source: repair_ssot_schema.apb_helper
  - name: wr_control
    expr: apb_valid_write and (addr == 0)
    width: 1
    description: APB write decode helper for register CONTROL.
    source: repair_ssot_schema.apb_helper
  - name: rd_control
    expr: apb_valid_read and (addr == 0)
    width: 1
    description: APB read decode helper for register CONTROL.
    source: repair_ssot_schema.apb_helper
  - name: wr_status
    expr: apb_valid_write and (addr == 4)
    width: 1
    description: APB write decode helper for register STATUS.
    source: repair_ssot_schema.apb_helper
  - name: rd_status
    expr: apb_valid_read and (addr == 4)
    width: 1
    description: APB read decode helper for register STATUS.
    source: repair_ssot_schema.apb_helper
  - name: wr_local_eid
    expr: apb_valid_write and (addr == 8)
    width: 1
    description: APB write decode helper for register LOCAL_EID.
    source: repair_ssot_schema.apb_helper
  - name: rd_local_eid
    expr: apb_valid_read and (addr == 8)
    width: 1
    description: APB read decode helper for register LOCAL_EID.
    source: repair_ssot_schema.apb_helper
  - name: wr_mtu_timeout
    expr: apb_valid_write and (addr == 12)
    width: 1
    description: APB write decode helper for register MTU_TIMEOUT.
    source: repair_ssot_schema.apb_helper
  - name: rd_mtu_timeout
    expr: apb_valid_read and (addr == 12)
    width: 1
    description: APB read decode helper for register MTU_TIMEOUT.
    source: repair_ssot_schema.apb_helper
  - name: wr_max_msg_bytes
    expr: apb_valid_write and (addr == 16)
    width: 1
    description: APB write decode helper for register MAX_MSG_BYTES.
    source: repair_ssot_schema.apb_helper
  - name: rd_max_msg_bytes
    expr: apb_valid_read and (addr == 16)
    width: 1
    description: APB read decode helper for register MAX_MSG_BYTES.
    source: repair_ssot_schema.apb_helper
  - name: wr_sram_base
    expr: apb_valid_write and (addr == 20)
    width: 1
    description: APB write decode helper for register SRAM_BASE.
    source: repair_ssot_schema.apb_helper
  - name: rd_sram_base
    expr: apb_valid_read and (addr == 20)
    width: 1
    description: APB read decode helper for register SRAM_BASE.
    source: repair_ssot_schema.apb_helper
  - name: wr_sram_limit
    expr: apb_valid_write and (addr == 24)
    width: 1
    description: APB write decode helper for register SRAM_LIMIT.
    source: repair_ssot_schema.apb_helper
  - name: rd_sram_limit
    expr: apb_valid_read and (addr == 24)
    width: 1
    description: APB read decode helper for register SRAM_LIMIT.
    source: repair_ssot_schema.apb_helper
  - name: wr_sram_wr_ptr
    expr: apb_valid_write and (addr == 28)
    width: 1
    description: APB write decode helper for register SRAM_WR_PTR.
    source: repair_ssot_schema.apb_helper
  - name: rd_sram_wr_ptr
    expr: apb_valid_read and (addr == 28)
    width: 1
    description: APB read decode helper for register SRAM_WR_PTR.
