cycle_model:
  purpose: Cycle/handshake contract for rtl-gen and waveform-based verification.
  executable: python
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel
    remains the behavioral oracle.
  clock: axi_aclk
  reset:
    signal: axi_aresetn
    polarity: active_low
    assertion: axi_aresetn assertion returns architectural state to declared reset
      values
    deassertion: Logic may accept transactions after async_assert_sync_deassert deassertion
      completes
  latency:
    control_or_request_accept:
      min_cycles: 0
      max_cycles: null
      description: Bounded by declared valid/ready or protocol acceptance rules
    primary_operation:
      min_cycles: 1
      max_cycles: null
      description: Runs on axi_aclk at nominal 100 MHz; max depends on declared backpressure
        and implementation state
    response_or_observable_result:
      min_cycles: 0
      max_cycles: null
      description: Held stable until the declared response/output acceptance condition
  handshake_rules:
  - signal: s_axi_awvalid/s_axi_awready
    rule: s_axi_awvalid payload remains stable until s_axi_awready is sampled asserted
      on axi_write_slave.
  - signal: s_axi_bvalid/s_axi_bready
    rule: s_axi_bvalid payload remains stable until s_axi_bready is sampled asserted
      on axi_write_slave.
  - signal: s_axi_wvalid/s_axi_wready
    rule: s_axi_wvalid payload remains stable until s_axi_wready is sampled asserted
      on axi_write_slave.
  - signal: sram_wr_valid/sram_wr_ready
    rule: sram_wr_valid payload remains stable until sram_wr_ready is sampled asserted
      on sram_write_port.
  - signal: s_axi_arvalid/s_axi_arready
    rule: s_axi_arvalid payload remains stable until s_axi_arready is sampled asserted
      on axi_read_slave.
  - signal: s_axi_rvalid/s_axi_rready
    rule: s_axi_rvalid payload remains stable until s_axi_rready is sampled asserted
      on axi_read_slave.
  - signal: sram_rd_valid/sram_rd_ready
    rule: sram_rd_addr remains stable until sram_rd_ready is sampled asserted on sram_read_port;
      returned sram_rd_data is valid on the accepted read beat.
  pipeline:
  - stage: S0_ACCEPT
    cycle: 0..N
    action: Accept legal request/command/packet/control work under declared handshake
      rules.
  - stage: S1_EVALUATE
    cycle: N..M
    action: Evaluate function_model transaction and update only declared state.
  - stage: S2_OBSERVE
    cycle: M..K
    action: Publish response/status/output/debug event and hold it stable until accepted.
  ordering:
  - Accepted requests update architectural state only on clock edges.
  - Completion/status/interrupt updates occur after the operation reaches its terminal
    FSM state.
  - Backpressure stalls the active handshake stage without corrupting stored state.
  - Read/dataflow stages must precede dependent write/output stages where declared
    in dataflow.
  backpressure:
  - Ready/valid deassertion stalls only the affected interface stage; payload and
    route/control state remain stable.
  performance:
    frequency_mhz: 100
    throughput:
      sustained_beats_per_cycle: 1
      condition: No backpressure on the active interface
    outstanding:
      max: 1
      description: Default one accepted operation until the SSOT declares deeper buffering
    depth:
      pipeline_stages: 3
      queue_depth: 1
      description: Default accept/evaluate/observe cycle model depth
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one
    test_requirements scenario.
clock_reset_domains:
  domains:
  - name: axi
    clock: axi_aclk
    reset: axi_aresetn
    contents:
    - AXI write ingress
    - PCIe VDM parser
    - MCTP transport parser
    - assembly context table
    - payload writer
    - SRAM write interface
    - AXI read egress
    - SRAM read interface
  - name: apb
    clock: pclk
    reset: presetn
    contents:
    - APB register file
    - synchronized descriptor/status/error/counter shadows
    - interrupt controller
  reset_behavior:
    hardware_reset: Both domains clear contexts, descriptors, sticky errors, counters,
      and interrupt status.
    soft_reset: APB soft_reset requests AXI-domain reset of parser/context/payload
      state through request/ack CDC; APB registers retain configuration except sticky
      status cleared by policy.
cdc_requirements:
  required: true
  rationale: AXI ingress/SRAM write logic runs on axi_aclk while APB control, descriptor
    readout, status, and interrupt logic run on pclk; axi_aclk and pclk are asynchronous.
  checks:
  - APB-written configuration used in the AXI domain crosses through stable shadow
    registers with update toggle and acknowledge.
  - AXI descriptor, error, counter, and interrupt events cross to APB using pulse-toggle
    synchronizers or async FIFO.
  - Completed descriptors cross using a CDC-safe FIFO or two-phase mailbox with stable
    payload.
  - APB soft reset request and AXI acknowledge use synchronized request/ack handshake.
  - APB counter reads use synchronized shadow or snapshot semantics for multi-bit
    counters.
  - No combinational path crosses between axi_aclk and pclk.
rdc_requirements:
  required: true
  rationale: axi_aresetn and presetn reset independent asynchronous clock domains,
    and APB soft reset controls AXI-domain state through CDC.
  checks:
  - axi_aresetn is asynchronous assert and synchronized deassert within axi_aclk domain.
  - presetn is asynchronous assert and synchronized deassert within pclk domain.
  - Soft reset crossing is synchronized and does not asynchronously reset destination-domain
    flops without a local synchronizer.
registers:
  config:
    register_width: 32
    byte_addressable: true
    reserved_bit_behavior: Reserved bits read as 0 and ignore writes unless the access
      is an illegal byte strobe.
    descriptor_pop_policy: explicit_apb_pop
  register_list:
  - name: CONTROL
    offset: 0
    access: rw_wo_mixed
    reset: 4
    fields:
    - name: enable
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      description: Enable AXI ingress and assembly.
      write_effect: APB write data updates this field value according to its bit mask.
    - name: soft_reset
      bits:
      - 1
      - 1
      access: wo_pulse
      reset: 0
      description: Request soft reset of AXI-domain parser/context/payload state.
      write_effect: APB write data updates this field value according to its bit mask.
    - name: dest_filter_enable
      bits:
      - 2
      - 2
      access: rw
      reset: 1
      description: Filter destination EID against LOCAL_EID when set.
      write_effect: APB write data updates this field value according to its bit mask.
    - name: drop_when_disabled
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      description: When set, accept and drop packets while disabled; otherwise backpressure.
      write_effect: APB write data updates this field value according to its bit mask.
    - name: accept_broadcast_eid
      bits:
      - 4
      - 4
      access: rw
      reset: 0
      description: Allow destination EID 0xFF when destination filter is enabled.
      write_effect: APB write data updates this field value according to its bit mask.
    - name: accept_null_eid
      bits:
      - 5
      - 5
      access: rw
      reset: 0
      description: Allow destination EID 0x00 when configured.
      write_effect: APB write data updates this field value according to its bit mask.
    width: 32
  - name: STATUS
    offset: 4
    access: ro
    reset: 0
    fields:
    - name: busy
      bits:
      - 0
      - 0
      access: ro
      reset: 0
      description: Ingress/parser or writer is active.
    - name: context_active_any
      bits:
      - 1
      - 1
      access: ro
      reset: 0
      description: At least one assembly context is active.
    - name: descriptor_available
      bits:
      - 2
      - 2
      access: ro
      reset: 0
      description: Descriptor FIFO is not empty.
    - name: error_pending
      bits:
      - 3
      - 3
      access: ro
      reset: 0
      description: Any sticky error or enabled interrupt source is pending.
    - name: context_full
