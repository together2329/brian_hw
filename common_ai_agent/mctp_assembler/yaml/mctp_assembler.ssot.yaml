test_requirements:
  scenarios:
  - id: SC_APB_REGS
    description: APB reset, read/write, W1C interrupt/error clear, and descriptor
      pop behavior.
    expected: Register reads/writes match reset/access policy and intr follows enabled
      pending bits.
    name: Scenario 1
    stimulus: Drive the sequence for Scenario 1 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 1 result against function_model
      expected result.
    coverage:
    - SC_APB_REGS
    - function_model
    - cycle_model
  - id: SC_AXI_ONE_BURST_ONE_TLP
    description: One AXI write burst is accepted as exactly one raw PCIe VDM TLP.
    expected: Parser starts at byte 0 of first WDATA beat and terminates on WLAST.
    name: Scenario 2
    stimulus: Drive the sequence for Scenario 2 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 2 result against function_model
      expected result.
    coverage:
    - SC_AXI_ONE_BURST_ONE_TLP
    - function_model
    - cycle_model
  - id: SC_AXI_WSTRB_FINAL
    description: Final beat WSTRB masks invalid bytes.
    expected: Invalid final bytes are excluded from TLP byte count.
    name: Scenario 3
    stimulus: Drive the sequence for Scenario 3 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 3 result against function_model
      expected result.
    coverage:
    - SC_AXI_WSTRB_FINAL
    - function_model
    - cycle_model
  - id: SC_VALID_SINGLE_PACKET
    description: Valid MCTP-over-PCIe-VDM single packet with SOM=1,EOM=1.
    expected: Payload is written to SRAM and descriptor is published.
    name: Scenario 4
    stimulus: Drive the sequence for Scenario 4 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 4 result against function_model
      expected result.
    coverage:
    - SC_VALID_SINGLE_PACKET
    - function_model
    - cycle_model
  - id: SC_AXI_READ_SINGLE
    description: After message completion, read back assembled payload through the
      separate AXI read-slave at descriptor sram_start_addr.
    expected: One accepted AXI read transfer returns RDATA bytes matching the assembled
      SRAM payload written by the assembly datapath.
    name: Scenario 4b
    stimulus: 'Complete SC_VALID_SINGLE_PACKET assembly. Read DESC_WORD2/1 for sram_start_addr
      and payload_byte_count. Issue AXI read at sram_start_addr covering the payload
      length.'
    checker: Scoreboard compares AXI RDATA bytes against functional_model SRAM contents;
      read path must not modify descriptors or assembly state.
    coverage:
    - SC_AXI_READ_SINGLE
    - AXI_SRAM_READ
    - function_model
    - cycle_model
  - id: SC_AXI_READ_BURST
    description: Multi-beat AXI read burst retrieves payload spanning multiple RDATA
      beats.
    expected: ARLEN+1 read beats return contiguous payload bytes in order with RLAST
      on the final beat.
    name: Scenario 4c
    stimulus: 'Complete a message whose payload spans at least two AXI read beats
      (for example 36 bytes at 256-bit data width). Issue INCR read burst from descriptor
      sram_start_addr with ARLEN set for the required beat count.'
    checker: Scoreboard compares all returned read bytes against expected assembled
      payload and verifies RLAST timing.
    coverage:
    - SC_AXI_READ_BURST
    - AXI_SRAM_READ
    - function_model
    - cycle_model
  - id: SC_MULTI_PACKET
    description: Valid fragmented message across SOM, middle, and EOM packets.
    expected: Payload fragments assemble in order and descriptor byte_count equals
      total payload bytes.
    name: Scenario 5
    stimulus: Drive the sequence for Scenario 5 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 5 result against function_model
      expected result.
    coverage:
    - SC_MULTI_PACKET
    - function_model
    - cycle_model
  - id: SC_INTERLEAVE_TWO
    description: Two fragmented messages interleave at TLP boundaries (A0, B0, A1,
      B1) using distinct assembly keys.
    expected: Both messages complete with independent descriptors and SRAM payloads;
      no cross-contamination between contexts.
    name: Scenario 5b
    stimulus: 'Configure enable/local_eid/SRAM limits. Send message A fragment0 (SOM,
      source=6, tag=3), message B fragment0 (SOM, source=7, tag=4), message A fragment1
      (EOM, seq=2), message B fragment1 (EOM, seq=2) as four sequential AXI bursts.'
    checker: Scoreboard expects two descriptors with FM-matching payload_byte_count
      and SRAM bytes for each message.
    coverage:
    - SC_INTERLEAVE_TWO
    - SC_INTERLEAVED_TAGS
    - fcov_interleaving_15_contexts
    - function_model
    - cycle_model
  - id: SC_INTERLEAVED_TAGS
    description: Fifteen distinct source/tag flows interleave fragments concurrently.
    expected: All 15 independent assembly contexts complete without cross-contamination;
      STATUS.active_context_count reaches 15 before EOM phase and returns to 0 after
      all descriptors publish.
    name: Scenario 6
    stimulus: 'Configure enable/local_eid/SRAM limits. Phase-1: send fifteen SOM fragments
      (unique source_eid/tag_owner/message_tag, eom=0) in slot order 0..14. Verify
      active_context_count=15. Phase-2: send fifteen matching EOM fragments (seq=1)
      in the same slot order. Expect fifteen descriptors.'
    checker: Scoreboard/checker compares all fifteen descriptors and SRAM payloads
      against function_model without cross-contamination.
    coverage:
    - SC_INTERLEAVED_TAGS
    - fcov_interleaving_15_contexts
    - function_model
    - cycle_model
  - id: SC_SEQ_ERROR
    description: Continuation packet has wrong 2-bit sequence.
    expected: Context aborts, ASSEMBLY_DROP_COUNT increments, sequence_error is set,
      and no successful descriptor is produced.
    name: Scenario 7
    stimulus: Drive the sequence for Scenario 7 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 7 result against function_model
      expected result.
    coverage:
    - SC_SEQ_ERROR
    - function_model
    - cycle_model
  - id: SC_DUPLICATE_SOM
    description: SOM arrives for an active key.
    expected: Duplicate SOM is classified as assembly_drop/context_error according
      to default reject-new policy.
    name: Scenario 8
    stimulus: Drive the sequence for Scenario 8 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 8 result against function_model
      expected result.
    coverage:
    - SC_DUPLICATE_SOM
    - function_model
    - cycle_model
  - id: SC_DROP_WRONG_VENDOR
    description: VDM vendor ID is not 0x1AB4.
    expected: Packet is dropped and unsupported_vdm/bad_vendor status is set.
    name: Scenario 9
    stimulus: Drive the sequence for Scenario 9 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 9 result against function_model
      expected result.
    coverage:
    - SC_DROP_WRONG_VENDOR
    - function_model
    - cycle_model
  - id: SC_DROP_WRONG_MESSAGE_CODE
    description: VDM message code is not 0x7F.
    expected: Packet is dropped and unsupported_vdm/bad_message_code status is set.
    name: Scenario 10
    stimulus: Drive the sequence for Scenario 10 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 10 result against function_model
      expected result.
    coverage:
    - SC_DROP_WRONG_MESSAGE_CODE
    - function_model
    - cycle_model
  - id: SC_DEST_EID_REJECT
    description: Destination EID does not match local EID while filtering is enabled.
    expected: Packet is rejected and dest_eid_reject is set.
    name: Scenario 11
    stimulus: Drive the sequence for Scenario 11 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 11 result against function_model
      expected result.
    coverage:
    - SC_DEST_EID_REJECT
    - function_model
    - cycle_model
  - id: SC_PAD_STRIP
    description: Final packet has pad bytes.
    expected: Pad bytes are not written to SRAM and byte_count excludes them.
    name: Scenario 12
    stimulus: Drive the sequence for Scenario 12 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 12 result against function_model
      expected result.
    coverage:
    - SC_PAD_STRIP
    - function_model
    - cycle_model
  - id: SC_CONTEXT_FULL
    description: Sixteen concurrent fragmented messages are attempted when CONTEXT_COUNT
      is 15.
    expected: The first 15 contexts are accepted; the 16th allocation is rejected
      as packet_drop/context_full without modifying existing contexts.
    name: Scenario 13
    stimulus: 'Configure enable/local_eid/SRAM limits. Send fifteen unique SOM fragments
      (eom=0) to occupy all context slots; verify active_context_count=15. Send a
      sixteenth unique SOM fragment; expect packet_drop with contexts unchanged (still
      15 active).'
    checker: Scoreboard/checker confirms active_context_count remains 15, packet_drop_count
      increments, and no sixteenth context is allocated.
    coverage:
    - SC_CONTEXT_FULL
    - fcov_interleaving_15_contexts
    - function_model
    - cycle_model
  - id: SC_SRAM_OVERFLOW
    description: Assembled payload would exceed SRAM limit.
    expected: Message aborts and sram_overflow is reported.
    name: Scenario 14
    stimulus: Drive the sequence for Scenario 14 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 14 result against function_model
      expected result.
    coverage:
    - SC_SRAM_OVERFLOW
    - function_model
    - cycle_model
  - id: SC_DESCRIPTOR_FULL
    description: Completed message occurs while descriptor FIFO is full.
    expected: descriptor_full is reported and interrupt/error policy is followed.
    name: Scenario 15
    stimulus: Drive the sequence for Scenario 15 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 15 result against function_model
      expected result.
    coverage:
    - SC_DESCRIPTOR_FULL
    - function_model
    - cycle_model
  - id: SC_TIMEOUT
    description: Fragmented context does not receive continuation before timeout.
    expected: Context aborts and timeout is reported.
    name: Scenario 16
    stimulus: Drive the sequence for Scenario 16 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 16 result against function_model
      expected result.
    coverage:
    - SC_TIMEOUT
    - function_model
    - cycle_model
  - id: SC_ASYNC_AXI_APB
    description: AXI and APB run at unrelated clocks.
    expected: Configuration, descriptor, status, and interrupt CDC behavior remains
      stable.
    name: Scenario 17
    stimulus: Drive the sequence for Scenario 17 using declared interfaces and configuration
      registers.
    checker: Scoreboard/checker compares observed Scenario 17 result against function_model
      expected result.
    coverage:
    - SC_ASYNC_AXI_APB
    - function_model
    - cycle_model
  - id: SC_PACKET_DROP_CLASSIFICATION
    description: Exercise malformed TLP, unsupported VDM, destination EID reject,
      unexpected middle/end without active context, and bad pad/alignment packet drops.
    expected: Each case increments PACKET_DROP_COUNT, updates DROP_STATUS.last_drop_class
      to packet_drop, does not allocate/release/abort any context, writes no SRAM
      payload, and emits no successful descriptor.
    name: Packet Drop Classification
    stimulus: Drive each packet_drop_conditions case using AXI ingress and APB configuration.
    checker: Scoreboard confirms no context table change, no SRAM write, no descriptor,
      packet_drop status/counter update.
    coverage:
    - packet_drop_conditions
    - error_handling.packet_drop_conditions
    - function_model.FM_CLASSIFY_DROP
  - id: SC_ASSEMBLY_DROP_CLASSIFICATION
    description: Exercise duplicate SOM, sequence mismatch, message overflow, SRAM
      overflow, descriptor full, and timeout while a matching context is active.
    expected: Each case increments ASSEMBLY_DROP_COUNT, updates DROP_STATUS.last_drop_class
      to assembly_drop, releases the affected context, suppresses successful descriptor
      publication, and reports the reason.
    name: Assembly Drop Classification
    stimulus: Create active assembly contexts then drive each assembly_drop_conditions
      case.
    checker: Scoreboard confirms affected context release, no successful descriptor
      for dropped message, independent contexts remain intact, assembly_drop status/counter
      update.
    coverage:
    - assembly_drop_conditions
    - error_handling.assembly_drop_conditions
    - function_model.FM_CLASSIFY_DROP
  coverage_goals:
    function:
      target: 95
      model: functional_model
      bins:
      - description: All parser accept and reject branches.
        id: FUNCTION_COV_01
        source_ref: function_model.transactions
        class: transaction
      - description: All error_handling errors.
        id: FUNCTION_COV_02
        source_ref: function_model.transactions
        class: transaction
      - description: All interrupt sources asserted and cleared.
        id: FUNCTION_COV_03
        source_ref: function_model.transactions
        class: transaction
      - description: 'All MCTP assembly paths: single, start, middle, end, timeout,
          abort.'
        id: FUNCTION_COV_04
        source_ref: function_model.transactions
        class: transaction
      - description: Sequence wrap 3 to 0.
        id: FUNCTION_COV_05
        source_ref: function_model.transactions
        class: transaction
      - description: All descriptor pop/status cases.
        id: FUNCTION_COV_06
        source_ref: function_model.transactions
        class: transaction
      - description: AXI read single and burst payload readback paths.
        id: FUNCTION_COV_07
        source_ref: function_model.transactions.FM_READ_SRAM_BURST
        class: transaction
      - description: All packet_drop_conditions are classified without context side
          effects.
        id: FUNCTION_COV_PACKET_DROP_CLASS
        source_ref: function_model.transactions.FM_CLASSIFY_DROP
        class: drop_classification
      - description: All assembly_drop_conditions abort exactly the affected context.
        id: FUNCTION_COV_ASSEMBLY_DROP_CLASS
        source_ref: function_model.transactions.FM_CLASSIFY_DROP
        class: drop_classification
      source_refs:
      - function_model.transactions
      - error_handling
      - interrupts
      target_pct: 100
      description: Behavioral coverage from function_model.
    cycle:
      target: 90
      model: cycle_model
      bins:
      - description: AXI backpressure on AW and W.
        id: CYCLE_COV_01
        source_ref: cycle_model.performance
        class: cycle_rule
      - description: SRAM backpressure during payload drain.
        id: CYCLE_COV_02
        source_ref: cycle_model.performance
        class: cycle_rule
      - description: APB access during active AXI assembly.
        id: CYCLE_COV_03
        source_ref: cycle_model.performance
        class: cycle_rule
      - description: CDC event propagation for descriptor and error.
        id: CYCLE_COV_04
        source_ref: cycle_model.performance
        class: cycle_rule
      - description: Soft reset request/ack while context active.
        id: CYCLE_COV_05
        source_ref: cycle_model.performance
        class: cycle_rule
      source_refs:
      - cycle_model.pipeline
      - cdc_requirements
      target_pct: 100
      description: Cycle/performance coverage from cycle_model.
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL
      scoreboard evidence
  scoreboards:
  - name: payload_scoreboard
    checks: Expected payload bytes after header/pad stripping equal SRAM writes.
  - name: descriptor_scoreboard
    checks: Expected metadata equals DESC_WORD registers for completed messages.
  - name: error_scoreboard
    checks: Expected protocol errors set matching ERROR_STATUS/INTR_STATUS/counters.
  - name: drop_classification_scoreboard
    checks: Packet-drop cases leave contexts unchanged; assembly-drop cases release
      only the affected context; counters/status/interrupts match expected drop class
      and reason.
  scoreboard_checks: 17
quality_gates:
  ssot:
    pass: check_ssot_disk.sh exits 0 and ATLAS SSOT progress is fully approved
    evidence:
    - check_ssot_disk.sh PASS
    - ATLAS /api/progress ssot all sections approved
  rtl:
    pass: All expected RTL files exist, are production-ready, compile, and lint within
      warning budget
    evidence:
    - list/<ip>.f
    - compile log
    - lint log
  rtl_gen:
    profile: standard
    pass: rtl-gen execution_policy.pass_allowed is true, every required SSOT-derived
      RTL TODO is closed, and provenance proves common_ai_agent rtl-gen authored the
      RTL without fixed-template fallback behavior
    evidence:
    - rtl/rtl_authoring_plan.json
    - logs/rtl-gen/rtl_todo_plan.json
    - rtl/provenance.json
    - rtl_compile.json
    - lint/dut_lint.json
  dv:
    pass: Every SSOT test_requirements scenario has an executable checker and FL-vs-RTL
      equivalence goal
    evidence:
    - verify/equivalence_goals.json
    - sim/scoreboard_events.jsonl
    - tb/cocotb tests
    - scenario implementation map
  coverage:
    pass: Functional coverage passes and any explicitly requested structural metrics
      have matching evidence or approved waivers
    evidence:
    - coverage report
    - coverage waiver list if any
  eda:
    pass: Synthesis/STA/DFT expectations have reports or approved waivers
    evidence:
    - syn/sta/dft reports
  signoff:
    pass: SSOT, FL/equivalence, RTL, lint, DV, sim, coverage, and EDA gates pass with
      fresh artifacts
    evidence:
    - ATLAS progress signoff PASS
  lint:
  - DUT lint has zero unwaived errors.
  - No ad-hoc lint suppressions without human-approved waiver.
  sim:
  - All directed scenarios pass.
  - Payload, descriptor, and error scoreboards report zero mismatches.
traceability:
  requirements_sources:
  - req/mctp_assembler_requirements.md
  - DMTF DSP0238 MCTP PCIe VDM Transport Binding
  - DMTF DSP0236 MCTP Base Specification
  - DMTF DSP0236 sections on dropped packets/messages
  - DMTF DSP0238 PCIe VDM packet format and MCTP VDM code
  mapping:
    AXI_WRITE_INGRESS:
    - features.AXI_TLP_INGRESS
    - io_list.interfaces.axi_write_slave
    - dataflow.sequence
    APB_CONTROL_DEBUG:
    - features.APB_CONTROL_DEBUG
    - io_list.interfaces.apb_slave
    - registers.register_list
    - debug_observability
    ASYNC_CLOCKS:
    - features.ASYNC_AXI_APB
    - clock_reset_domains
    - cdc_requirements
    - rdc_requirements
    SRAM_PAYLOAD_WRITE:
    - memory.external_sram_write_port
    - io_list.interfaces.sram_write_port
    - function_model.transactions.FM_WRITE_SRAM_AND_DESCRIPTOR
    INTERRUPT:
    - interrupts
    - registers.INTR_ENABLE
    - registers.INTR_STATUS
    VDM_FILTER:
    - custom.standards_decode.pcie_vdm
    - function_model.transactions.FM_FILTER_VDM
    - error_handling.errors
    MCTP_ASSEMBLY:
    - custom.standards_decode.mctp_transport
    - function_model.transactions.FM_ASSEMBLE_FRAGMENT
    - memory.internal_context_table
    INTERNAL_DESCRIPTORS_ONLY:
    - features.INTERNAL_DESCRIPTOR
    - registers.register_list
    - rtl_contract.output_map
    ERROR_HANDLING:
    - error_handling.errors
    - registers.ERROR_STATUS
    - test_requirements.scenarios
    DROP_CLASSIFICATION:
    - error_handling.drop_policy
    - error_handling.packet_drop_conditions
    - error_handling.assembly_drop_conditions
    - custom.drop_conditions
    - test_requirements.scenarios.SC_PACKET_DROP_CLASSIFICATION
    - test_requirements.scenarios.SC_ASSEMBLY_DROP_CLASSIFICATION
  yaml_to_output:
  - yaml: function_model
    output: RTL behavior and TB reference model
  - yaml: cycle_model
    output: RTL handshake/pipeline timing and waveform checks
  - yaml: function_model/cycle_model/test_requirements
    output: verify/equivalence_goals.json and FL-vs-RTL scoreboard contracts
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: security
    output: Threat mitigations and negative tests
  - yaml: error_handling
    output: Fault RTL paths and DV error scenarios
  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
workflow_todos:
  ssot-gen:
  - id: SSOT-REVIEW-001
    content: Resolve open human review decisions for AXI ID, ECRC, descriptor pop,
      SRAM wrap, timeout units, and clock frequencies.
    detail: These fields affect RTL behavior and signoff constraints. Keep the conservative
      assumptions visible until the user approves final values.
    command: /grill-me mctp_assembler
    script: workflow/ssot-gen/scripts/check_ssot_disk.sh
    instructions: Ask only the unresolved questions listed in custom.human_review_items
      and update the exact SSOT fields.
    criteria:
    - custom.human_review_items is either resolved into approved assumptions or preserved
      as non-signoff blockers.
    source_refs:
    - custom.human_review_items
    - req/mctp_assembler_requirements.md:69
    priority: high
    required: true
  - id: SSOT-VALIDATE-001
    content: Validate mctp_assembler SSOT in engineering mode.
    detail: Run repair/verify validators and preserve req/ssot_validation.json evidence.
    command: /verify-ssot mctp_assembler
    script: workflow/ssot-gen/scripts/verify_ssot.py
    instructions: Fix structural YAML issues only; do not run RTL/TB generation from
      ssot-gen.
    criteria:
    - verify_ssot.py exits 0 in engineering mode.
    source_refs:
    - yaml/mctp_assembler.ssot.yaml
    priority: high
    required: true
  rtl-gen:
  - id: RTL-GEN-001
    content: Implement SSOT-derived RTL modules for AXI ingress, VDM parser, MCTP
      parser, context table, payload writer, APB regfile, and CDC.
    detail: RTL must be generated from this SSOT and must not expose descriptor/config/status
      top-level pins.
    command: /ssot-rtl mctp_assembler
    script: workflow/rtl-gen/scripts/ssot_to_rtl.py
    instructions: Use rtl_contract, io_list, registers, cdc_requirements, error_handling,
      and test_requirements as source sections.
    criteria:
    - rtl_compile.json and lint/dut_lint.json pass; top-level ports match io_list.
    source_refs:
    - rtl_contract
    - io_list
    - registers
    - cdc_requirements
    priority: high
    required: true
  tb-gen:
  - id: TB-GEN-001
    content: Generate SSOT-driven cocotb/pyuvm tests and scoreboards for MCTP assembly.
    detail: Tests must compare accepted TLP bytes to SRAM writes and descriptor metadata.
    command: /ssot-tb-cocotb mctp_assembler
    script: workflow/tb-gen/scripts/emit_goal_scoreboard_cocotb.py
    instructions: Cover directed valid/error/CDC/backpressure scenarios from test_requirements.scenarios.
    criteria:
    - tb_manifest.json is present and scoreboard self-check passes.
    source_refs:
    - test_requirements.scenarios
    - test_requirements.scoreboards
    priority: high
    required: true
  sim:
  - id: SIM-001
    content: Run simulation and collect scoreboard, results.xml, and coverage-ready
      evidence.
    detail: Simulation must prove payload stripping, descriptor metadata, error reporting,
      and CDC interrupt/status behavior.
    command: /ssot-sim mctp_assembler
    script: workflow/sim/scripts/sim.sh
    instructions: Do not edit sim artifacts by hand; rerun the sim workflow after
      RTL/TB changes.
    criteria:
    - results.xml passes and scoreboard reports zero mismatches.
    source_refs:
    - test_requirements.scoreboards
    - quality_gates.sim
    priority: high
    required: true
  coverage:
  - id: COV-001
    content: Close SSOT functional and cycle coverage goals.
    detail: Coverage must include parser branches, error paths, interrupts, sequence
      wrap, backpressure, and CDC events.
    command: /ssot-coverage mctp_assembler
    script: workflow/coverage/scripts/ssot_coverage_summary.py
    instructions: Add stimulus or record explicit limitations; do not lower goals
      to pass.
    criteria:
    - coverage.json status is pass/ok or limitations are explicitly routed to human
      review.
    source_refs:
    - test_requirements.coverage_goals
    priority: medium
    required: true
  sim_debug: []
generation_flow:
  steps:
  - name: verify_ssot
    command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" mctp_assembler
      --root "$ATLAS_PROJECT_ROOT" --mode ${ATLAS_RUN_MODE:-signoff}
    description: Validate SSOT structure, Preview fields, and quality gates at the
      selected Run Mode
  - name: handoff_fl_model
    command: /ssot-fl-model mctp_assembler
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals mctp_assembler
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl mctp_assembler
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb mctp_assembler
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
