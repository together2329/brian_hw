memory:
  instances:
  - name: external_sram_write_port
    type: external_sram
    width: SRAM_DATA_WIDTH
    address_width: SRAM_ADDR_WIDTH
    clock_domain: axi
    description: External SRAM write target for assembled MCTP payload bytes.
  - name: external_sram_read_port
    type: external_sram
    width: SRAM_DATA_WIDTH
    address_width: SRAM_ADDR_WIDTH
    clock_domain: axi
    description: External SRAM read source for burst payload readback through the
      separate AXI read path.
  - name: internal_context_table
    type: register_array
    depth: CONTEXT_COUNT
    clock_domain: axi
    description: Fifteen-entry active message assembly queue keyed by source_eid/tag_owner/message_tag,
      enabling up to 15 simultaneous interleaved assemblies.
  - name: internal_descriptor_fifo
    type: cdc_fifo_or_mailbox
    depth: DESCRIPTOR_FIFO_DEPTH
    write_domain: axi
    read_domain: apb
    description: Completed message descriptor storage readable through APB registers.
  policies:
    assembly_content: Concatenated MCTP message payload bytes only (first byte is typically
      the message type, for example 0x7E). Binding/transport metadata is reflected in
      the APB descriptor, not duplicated in SRAM.
    payload_excludes:
    - PCIe TLP header
    - PCIe VDM header
    - MCTP transport header
    - final packet pad bytes
    default_allocation: Monotonic write pointer between SRAM_BASE and SRAM_LIMIT.
    wrap_policy: pending_human_review
    overflow_behavior: Abort current message, set sram_overflow, and do not publish
      a successful descriptor.
interrupts:
  present: false
  sources: []
  rationale: No interrupt output is implied by repair; add interrupt sources explicitly
    before rtl-gen implements IRQ behavior
fsm:
  axi_ingress_fsm:
    states:
    - IDLE
    - AW_ACCEPTED
    - W_COLLECT
    - BRESP
    - DROP
    reset_state: IDLE
    transitions:
    - from: IDLE
      to: AW_ACCEPTED
      condition: s_axi_awvalid && s_axi_awready
    - from: AW_ACCEPTED
      to: W_COLLECT
      condition: first accepted W beat
    - from: W_COLLECT
      to: BRESP
      condition: accepted W beat with s_axi_wlast
    - from: BRESP
      to: IDLE
      condition: s_axi_bvalid && s_axi_bready
    - from: W_COLLECT
      to: DROP
      condition: fatal AXI/TLP collection error
  axi_read_fsm:
    states:
    - IDLE
    - AR_ACCEPTED
    - RD_ISSUE
    - RDATA
    - ERROR
    reset_state: IDLE
    transitions:
    - from: IDLE
      to: AR_ACCEPTED
      condition: s_axi_arvalid && s_axi_arready
    - from: AR_ACCEPTED
      to: RD_ISSUE
      condition: first sram read beat accepted or direct RDATA path entered
    - from: RD_ISSUE
      to: RDATA
      condition: read beat returned to host on s_axi_rvalid && s_axi_rready
    - from: RDATA
      to: IDLE
      condition: final beat accepted with s_axi_rlast
    - from: AR_ACCEPTED
      to: ERROR
      condition: illegal address or unsupported burst attributes
    - from: ERROR
      to: IDLE
      condition: error response beat accepted
  parser_fsm:
    states:
    - WAIT_PACKET
    - PARSE_PCIE
    - PARSE_VDM
    - PARSE_MCTP
    - FILTER
    - PAYLOAD
    - REJECT
    reset_state: WAIT_PACKET
  assembly_fsm:
    states:
    - IDLE
    - ALLOC_CONTEXT
    - APPEND_PAYLOAD
    - COMPLETE_MESSAGE
    - ABORT_CONTEXT
    reset_state: IDLE
  sram_writer_fsm:
    states:
    - IDLE
    - PACK_WORD
    - WRITE_WORD
    - WAIT_READY
    - FLUSH_FINAL
    reset_state: IDLE
  apb_fsm:
    states:
    - APB_IDLE
    - APB_SETUP
    - APB_ACCESS
    reset_state: APB_IDLE
timing:
  clocks:
    axi_aclk:
      target_mhz: null
      review_required: true
    pclk:
      target_mhz: null
      review_required: true
  constraints:
  - Declare axi_aclk and pclk asynchronous.
  - CDC synchronizer paths must be constrained according to the selected CDC primitive.
  - SRAM write outputs are timed to axi_aclk.
  - APB interface is timed to pclk.
  latency:
    final_fragment_to_descriptor: Bounded by payload drain, descriptor CDC, and APB-domain
      status update.
    interrupt_latency: Bounded by AXI event to APB CDC synchronization.
  target_clocks:
  - name: axi_aclk
    frequency_mhz: 100
    period_ns: 10.0
    uncertainty_ns: 0.2
  latency_budget:
    register_access:
      min: 0
      max: null
      measured_from: valid && ready
      measured_to: response valid && ready
    primary_operation:
      min: 1
      max: null
      measured_from: start/request accepted
      measured_to: done/response accepted
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/timing.rpt
    - sta/out/wns.json
power:
  clock_gating:
    allowed: true
    requirements:
    - Do not gate synchronizer destination clocks inside this IP.
    - Parser/context logic may be idle-gated when enable=0 and no soft reset is pending.
  low_power_behavior:
    disabled_ingress: Default backpressure while disabled unless CONTROL.drop_when_disabled
      is set.
  domains:
  - name: PD_MAIN
    voltage: nominal
    clock_domains:
    - axi_aclk
    isolation: not_required_single_domain
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
    - All declared IP functionality active
  upf_required: false
security:
  assets:
  - assembled payload in SRAM
  - descriptor metadata
  - local EID configuration
  - debug context metadata
  requirements:
  - Reject packets that do not match MCTP-over-PCIe-VDM binding constants.
  - Reject or abort messages that would write outside configured SRAM bounds.
  - Do not expose arbitrary payload bytes through APB debug registers.
  - Malformed packets must not corrupt unrelated active contexts.
  - Context key isolation prevents one source/tag flow from completing another flow.
  abuse_cases:
  - Fragment flood causing context exhaustion.
  - Sequence mismatch injection.
  - Oversized message overflow.
  - Descriptor FIFO full denial of service.
  - Unsupported destination EID spam.
  mitigations:
  - Bounded context count with sticky error/counter.
  - Configurable assembly timeout.
  - Bounds check before SRAM write.
  - Interrupt and APB-visible error reporting.
  classification: non_secure_leaf_ip
  threat_model:
  - threat: invalid configuration or address
    mitigation: error_handling declares detection, architectural effect, and recovery
  - threat: silent data/control corruption
    mitigation: test_requirements scoreboard checks every declared functional transaction
  privilege_model: System-level access control is owned by the integrating bus/firewall
    unless explicitly declared here.
error_handling:
  errors:
  - id: ERR_MALFORMED_TLP
    condition: Packet shorter than required headers or inconsistent AXI length/WSTRB/WLAST
    action: reject_packet
    status: malformed_tlp
    drop_class: packet_drop
  - id: ERR_UNSUPPORTED_VDM
    condition: Wrong VDM type/routing/message code/vendor/MCTP VDM code
    action: reject_packet
    status: unsupported_vdm
    drop_class: packet_drop
  - id: ERR_BAD_MCTP_HDR
    condition: Unsupported MCTP header version or malformed transport header
    action: reject_packet
    status: bad_mctp_hdr
    drop_class: packet_drop
  - id: ERR_DEST_EID_REJECT
    condition: Destination EID fails configured policy
    action: reject_packet
    status: dest_eid_reject
    drop_class: packet_drop
  - id: ERR_UNEXPECTED_FRAGMENT
    condition: SOM=0 fragment without active context
    action: packet_drop_no_context_effect
    status: sequence_error
    drop_class: packet_drop
  - id: ERR_DUPLICATE_SOM
    condition: SOM for active context key
    action: reject_new_packet
    status: context_error
    drop_class: assembly_drop
  - id: ERR_SEQ_MISMATCH
    condition: Packet sequence differs from expected modulo-4 value
    action: abort_context
    status: sequence_error
    drop_class: assembly_drop
  - id: ERR_CONTEXT_FULL
    condition: No free assembly context
    action: reject_packet
    status: context_error
    drop_class: packet_drop
  - id: ERR_MESSAGE_OVERFLOW
    condition: Payload would exceed MAX_MESSAGE_BYTES
    action: abort_context
    status: overflow_error
    drop_class: assembly_drop
  - id: ERR_SRAM_OVERFLOW
    condition: Payload write would exceed configured SRAM range
    action: abort_context
    status: overflow_error
    drop_class: assembly_drop
  - id: ERR_DESCRIPTOR_FULL
    condition: Descriptor FIFO/mailbox cannot accept completed descriptor
    action: set_error_and_preserve_payload_status
    status: overflow_error
    drop_class: assembly_drop
  - id: ERR_TIMEOUT
    condition: Context active longer than CFG_TIMEOUT policy
    action: abort_context
    status: timeout
    drop_class: assembly_drop
  error_sources:
  - id: ERR_PROTOCOL
    condition: Downstream protocol response is non-OKAY or invalid
    architectural_effect: Set error status and block signoff until handled
  propagation:
  - Errors update status/debug observability and propagate through declared response/interrupt
    mechanisms.
  recovery:
  - action: reset or software clear
    clears:
    - error/status indicators
    preserves:
    - configuration unless reset policy states otherwise
  drop_policy:
    packet_drop: Discard only the current packet before context allocation/update/completion/termination;
      do not write SRAM and do not emit a successful descriptor.
    assembly_drop: Abort the affected active context, release the context slot, suppress
      successful descriptor publication, record reason, and report through APB status/counters/interrupts.
  packet_drop_conditions:
  - id: PD_DISABLED_DROP_MODE
    condition: CONTROL.enable=0 and CONTROL.drop_when_disabled=1
    action: drop_packet_no_context_effect
    status: packet_drop
  - id: PD_MALFORMED_TLP
    condition: Malformed/short TLP, inconsistent AXI length/WLAST/WSTRB, or unsupported
      AXI burst policy
    action: drop_packet_no_context_effect
    status: malformed_tlp
  - id: PD_UNSUPPORTED_VDM
    condition: Unsupported PCIe VDM format/routing/message code, vendor ID, or MCTP
      VDM code
    action: drop_packet_no_context_effect
    status: unsupported_vdm
  - id: PD_BAD_MCTP_HEADER
    condition: Unsupported MCTP header version or insufficient transport header bytes
    action: drop_packet_no_context_effect
    status: bad_mctp_hdr
  - id: PD_DEST_EID_REJECT
    condition: Destination EID fails configured local/broadcast/null policy
    action: drop_packet_no_context_effect
    status: dest_eid_reject
  - id: PD_UNEXPECTED_MIDDLE_END
    condition: SOM=0 middle/end packet is received without an active matching context
    action: drop_packet_no_context_effect
    status: sequence_error
  - id: PD_BAD_OR_EXPIRED_TAG
    condition: Tag owner/message tag policy says this packet is unexpected or expired
      and it is not allowed to affect assembly state
    action: drop_packet_no_context_effect
    status: context_error
  - id: PD_BAD_PAD_OR_ALIGNMENT
    condition: Unsupported pad length, non-EOM pad, or PCIe dword alignment violation
    action: drop_packet_no_context_effect
    status: malformed_tlp
  assembly_drop_conditions:
  - id: AD_DUPLICATE_SOM
    condition: SOM=1 packet arrives for an active source_eid/tag_owner/message_tag
      key
    action: abort_or_preserve_existing_context_per_policy_default_reject_new
    status: context_error
  - id: AD_SEQUENCE_MISMATCH
    condition: Continuation packet sequence differs from expected modulo-4 value for
      an active context
    action: abort_context
    status: sequence_error
  - id: AD_MESSAGE_OVERFLOW
    condition: Appending payload would exceed MAX_MESSAGE_BYTES
    action: abort_context
    status: overflow_error
  - id: AD_SRAM_OVERFLOW
    condition: Payload write allocation would exceed configured SRAM range
    action: abort_context
    status: overflow_error
  - id: AD_DESCRIPTOR_FULL
    condition: Completed payload cannot publish descriptor metadata because descriptor
      FIFO/mailbox is full
    action: drop_completed_assembly_metadata_and_report
    status: overflow_error
  - id: AD_TIMEOUT
    condition: Active context exceeds configured assembly timeout
    action: abort_context
    status: timeout
debug_observability:
  apb_visible:
  - parser_state
  - ingress_state
  - assembly_state
  - selected_context_key
  - selected_context_expected_seq
  - selected_context_byte_count
  - descriptor_fifo_count
  - front_descriptor_words
  - sticky_error_status
  - interrupt_status
  - protocol counters
  - packet_drop_count
  - assembly_drop_count
  - last_drop_class
  - last_drop_reason
  controls:
  - DEBUG_CONTEXT_INDEX selects context debug readout.
  - DESC_POP removes the front completed descriptor.
  - INTR_STATUS and ERROR_STATUS are W1C.
  excluded:
  - No top-level descriptor stream.
  - No top-level configuration pins.
  - No top-level status counter pins.
  - No arbitrary SRAM payload readback through APB.
  - Payload readback is supported only through axi_read_slave and sram_read_port, not
    through APB or the TLP write ingress path.
  waveform_must_probe:
  - axi_aclk
  - axi_aresetn
  - fsm_state
  - start_or_request
  - done_or_response
  - error_status
  - irq_or_status_outputs
  trace_events:
  - name: operation_start
    trigger: start/request accepted
  - name: operation_complete
    trigger: done/response accepted
  - name: error_detected
    trigger: any error_handling.error_sources condition
  status_outputs:
  - status/debug signals declared in io_list or registers
integration:
  upstream:
    block: PCIe VDM TLP source
    interface: AXI write slave
    assumptions:
    - One AXI write burst equals one PCIe VDM TLP.
    - Byte lane 0 of first WDATA beat is TLP byte 0.
    - Upstream provides raw TLP bytes.
    - ECRC/TD handling follows custom.approved_assumptions.ecrc_policy.
  downstream:
    block: SRAM
    interface: write and read payload ports
    assumptions:
    - SRAM write port is synchronous to axi_aclk and carries assembled payload bytes.
    - SRAM read port is synchronous to axi_aclk and serves burst payload readback for
      the separate AXI read path.
    - System software reads assembled payload through axi_read_slave using descriptor
      sram_start_addr and payload_byte_count after message completion.
  software:
    responsibilities:
    - Program CONTROL, LOCAL_EID, MTU_TIMEOUT, MAX_MSG_BYTES, SRAM_BASE, SRAM_LIMIT,
      and INTR_ENABLE.
    - Read descriptors through DESC_WORD registers.
    - Issue DESC_POP after consuming descriptor metadata.
    - Read assembled payload bytes through axi_read_slave burst reads at the descriptor
      sram_start_addr for payload_byte_count bytes.
    - Clear INTR_STATUS and ERROR_STATUS with W1C writes.
  bus_attachment:
    interfaces:
    - axi_write_slave
    - axi_read_slave
    - apb_slave
    - sram_write_port
    - sram_read_port
    - interrupt
    address_ownership: SoC assigns base addresses and external routing not owned by
      this leaf IP
  dependencies:
    external_modules: []
    external_clocks:
    - axi_aclk
    external_resets:
    - axi_aresetn
  connections: []
  connection_contract_status: missing machine-readable module wiring; child RTL drafts
    may proceed from owner packets, but top integration/signoff must stay blocked
    until SSOT authors integration.connections or sub_modules[].connections with module/port/signal
    records
  integration_notes:
  - Integrator must connect every declared io_list port and honor timing/reset assumptions.
dft:
  scan:
    required: true
    notes: CDC synchronizers require scan-safe implementation or test-mode constraints.
  mbist:
    required: false
    notes: Initial context table and descriptor storage are register/FIFO based; enable
      MBIST only if mapped to SRAM macros.
  test_mode:
    review_required: true
  assertions:
  - No combinational CDC crossing.
  - Context allocation count never exceeds CONTEXT_COUNT.
  - SRAM write address remains in configured range for non-error writes.
  scan_required: false
  controllability:
    reset: axi_aresetn
    clocks:
    - axi_aclk
    primary_inputs: all io_list inputs controllable in testbench
  observability:
    required_internal_points:
    - fsm_state
    - status
    - error_status
    outputs: all io_list outputs observable
  mbist_required: true
synthesis:
  rtl_dialect: systemverilog_synthesizable
  reset_style: Async assert, synchronized deassert per domain.
  constraints:
  - Use explicit module ports; no SystemVerilog interface or package dependency.
  - Use parameterized widths for AXI, APB, SRAM, context, and FIFO depths.
  - Keep byte ordering deterministic for each AXI_DATA_WIDTH.
  - Use localparams for register offsets and error bit positions.
  dialect: systemverilog_2012
  top_module: mctp_assembler
  tool_flow: yosys
  target_technology: sky130_fd_sc_hd
  target_library: sky130_fd_sc_hd
  liberty_env_var: SKY130_LIB
  corner:
    name: sky130_fd_sc_hd__ss_100C_1v40
    process: ss
    temperature_c: 100
    voltage_v: 1.4
  library_policy: Use the SKY130_LIB environment variable to locate the SS corner
    Liberty file for the declared sky130_fd_sc_hd target library; synthesis and STA
    must stop if the file is unreadable or does not match the declared corner.
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 100
  required_outputs:
  - syn/out/synth.v
  - syn/out/area.json
  - syn/out/syn.report.md
  - sta/out/wns.json
pnr:
  constraints:
  - Async clock group between axi_aclk and pclk.
  - Preserve synchronizer flops and CDC FIFO pointer synchronizers.
  - Constrain SRAM write interface timing to axi_aclk.
  floorplan_notes:
  - Place parser/context/payload writer near SRAM interface.
  - Place APB register file near APB fabric.
  - Physically group CDC synchronizer chains.
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  cts_buf_list:
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
  routing:
    signal_layers:
      min: met1
      max: met5
    drc_waivers: []
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/mctp_assembler_param.vh
  conventions:
  - Use .sv filenames with the project SystemVerilog subset
  - Use input logic/output logic ANSI ports and internal single-driver logic
  - Put shared parameter declarations in rtl/<ip>_param.vh when needed; include it
    inside consuming modules
  - Do not create *_pkg.sv or use typedef/enum/always_ff/always_comb/package/import/interface/modport/function/task/for/while
    constructs
  - No inferred latches; every combinational branch assigns all outputs
  - No parameterized part-selects inside procedural blocks; use helper wires/continuous
    assigns
  - No ad-hoc lint suppressions without SSOT waiver and DUT-only lint evidence
  lint_waivers: []
reuse_modules: []
custom:
  standards_decode:
    pcie_vdm:
      required_transport: MCTP over PCIe VDM
      type: Type 1 VDM with data
      message_code: 127
      vendor_id: 6836
      mctp_vdm_code: 0
      supported_routing_initial:
      - route_by_id
      - route_to_root_complex
      - broadcast_from_root_complex
      byte_layout:
        ingress_unit: One AXI write burst equals one raw PCIe VDM TLP byte stream.
        dsp0238_note: Per the MCTP PCIe VDM binding, the PCIe TLP payload field carries
          the MCTP packet. This IP parses that full TLP on ingress but stores only
          the assembled MCTP message body in external SRAM.
        regions:
        - name: pcie_tlp_and_vdm_header
          byte_range: 0..11
          role: parse_and_filter_only
          sram: excluded
          description: PCIe TLP header and PCIe VDM header bytes. Used for length,
            routing, vendor, and message-code checks only.
        - name: mctp_transport_header
          byte_range: 12..15
          role: assembly_control_and_descriptor_metadata
          sram: excluded
          description: MCTP transport header within the PCIe TLP payload (header version,
            destination/source EID, SOM/EOM/sequence/tag fields). Drives assembly
            keying; first message payload byte is not part of this region.
        - name: mctp_message_payload
          byte_range: 16..(tlp_length-1-pad_len)
          role: assemble_to_sram
          sram: included
          description: MCTP message body bytes concatenated across accepted fragments
            and written to external SRAM.
        - name: packet_pad
          byte_range: trailing_pad_len_bytes
          role: alignment_only
          sram: excluded
        assembly_rule: Assembly and SRAM writes include only mctp_message_payload bytes.
          Bytes in pcie_tlp_and_vdm_header, mctp_transport_header, and packet_pad must
          never appear in SRAM.
    mctp_transport:
      assembly_key:
      - source_eid
      - tag_owner
      - message_tag
      control_fields:
      - destination_eid
      - source_eid
      - som
      - eom
      - packet_sequence
      - tag_owner
      - message_tag
      sequence_rule: After SOM, packet_sequence increments modulo 4 until EOM.
  approved_assumptions:
  - AXI_DATA_WIDTH default is 256 bits; AXI and SRAM data widths match.
  - APB_DATA_WIDTH is 32 bits.
  - CONTEXT_COUNT default is 15, matching the 15-entry assembly queue and allowing
    up to 15 simultaneous interleaved message assemblies.
  - MAX_MESSAGE_BYTES default is 4096.
  - BASELINE_MTU_BYTES default is 64.
  - Destination EID filtering is enabled by default against LOCAL_EID.
  - Payload types are opaque; only first message type byte is recorded in the descriptor
    while the full message body is stored in SRAM.
  - No top-level AXI ID pins; only one outstanding ingress burst is supported.
  human_review_items:
  - id: HR_AXI_ID
    question: Confirm whether AXI ID pins and multiple outstanding write bursts are
      required.
    current_assumption: No AXI ID pins; one outstanding ingress burst.
  - id: HR_ECRC
    question: Confirm whether upstream strips/checks ECRC or this IP must account
      for TLP digest bytes.
    current_assumption: ECRC/TD policy is configurable and initially upstream_checked_or_stripped.
  - id: HR_DESC_POP
    question: Confirm descriptor pop policy.
    current_assumption: Explicit APB DESC_POP command.
  - id: HR_SRAM_WRAP
    question: Confirm SRAM address allocation and wrap policy.
    current_assumption: Monotonic pointer, overflow on limit crossing, no wrap.
  - id: HR_TIMEOUT
    question: Confirm timeout cycle units and default value.
    current_assumption: Programmable AXI-domain cycle counter, default disabled or
      zero until software config.
  - id: HR_FREQ
    question: Confirm axi_aclk and pclk target frequencies.
    current_assumption: No fixed frequency in starter SSOT.
  optional_behavior_policy:
    resolution: non_required_optional_items_disabled_unless_ssot_marks_required_or_parameterized
    owner: ssot-gen deterministic repair
    rule: Rows marked required:false or prose-only optional verification aids do not
      add RTL behavior. Any optional functional behavior must be converted by ssot-gen
      into required behavior or an explicit parameter/register policy before rtl-gen
      signoff.
  drop_conditions:
    classification_rule: Packet Drop occurs before assembly state is affected; Assembly
      Drop aborts or invalidates an active assembly context.
    packet_drop:
    - PD_DISABLED_DROP_MODE
    - PD_MALFORMED_TLP
    - PD_UNSUPPORTED_VDM
    - PD_BAD_MCTP_HEADER
    - PD_DEST_EID_REJECT
    - PD_UNEXPECTED_MIDDLE_END
    - PD_BAD_OR_EXPIRED_TAG
    - PD_BAD_PAD_OR_ALIGNMENT
    assembly_drop:
    - AD_DUPLICATE_SOM
    - AD_SEQUENCE_MISMATCH
    - AD_MESSAGE_OVERFLOW
    - AD_SRAM_OVERFLOW
    - AD_DESCRIPTOR_FULL
    - AD_TIMEOUT
    reason_codes:
      '0x00': DROP_NONE
      '0x01': PD_DISABLED_DROP_MODE
      '0x02': PD_MALFORMED_TLP
      '0x03': PD_UNSUPPORTED_VDM
      '0x04': PD_BAD_MCTP_HEADER
      '0x05': PD_DEST_EID_REJECT
      '0x06': PD_UNEXPECTED_MIDDLE_END
      '0x07': PD_BAD_OR_EXPIRED_TAG
      '0x08': PD_BAD_PAD_OR_ALIGNMENT
      '0x40': AD_DUPLICATE_SOM
      '0x41': AD_SEQUENCE_MISMATCH
      '0x42': AD_MESSAGE_OVERFLOW
      '0x43': AD_SRAM_OVERFLOW
      '0x44': AD_DESCRIPTOR_FULL
      '0x45': AD_TIMEOUT
