# =============================================================================
# edge_det_cx1.ssot.yaml — Rising/falling edge detector with 2-flop synchronizer
# =============================================================================
top_module:
  name: edge_det_cx1
  file: rtl/edge_det_cx1.sv
  version: "1.0"
  type: peripheral
  description: "2-flop synchronizer followed by rising/falling edge detector. Outputs rise_out (1 cycle pulse on 0->1) and fall_out (1 cycle pulse on 1->0)."
  reference_spec: "user-defined"
  target:
    technology: generic
    clock_freq_mhz: 50

decomposition:
  units:
    - { id: sync2ff, kind: control, source_refs: [function_model.transactions], rtl_candidates: [edge_det_cx1], verification_impact: [test_requirements.scenarios] }
    - { id: edge_detect, kind: datapath, source_refs: [function_model.transactions], rtl_candidates: [edge_det_cx1], verification_impact: [test_requirements.scenarios] }

sub_modules:
  - name: edge_det_cx1
    file: rtl/edge_det_cx1.sv
    ownership: manifest
    ssot_gen: true
    source_sections: [io_list, function_model, cycle_model, decomposition, dataflow, fsm]
    implements: [io_list.interfaces.signal_input, function_model.transactions, function_model.state_variables]
    register_refs: []
    function_model_refs: [function_model.transactions.FM_RISE, function_model.transactions.FM_FALL, function_model.transactions.FM_STABLE, function_model.state_variables.sync1, function_model.state_variables.sync2, function_model.state_variables.prev_sync]
    decomposition_refs: [decomposition.units.sync2ff, decomposition.units.edge_detect]
    behavioral_contract_refs: [BC_EDGE_SYNC]
    structural_contract_refs: [SC_EDGE_PORTS]
    description: "2-flop synchronizer + edge detector. rise_out pulses 1 cycle on rising edge; fall_out pulses 1 cycle on falling edge."

parameters: []

io_list:
  clock_domains:
    - name: clk_domain
      frequency_mhz: 50
      description: "System clock"
      ports:
        - { name: clk, width: 1, direction: input }
  resets:
    - name: rst_n
      polarity: active_low
      sync_async: async_assert_sync_deassert
      description: "Active-low async assert / sync deassert reset"
      ports:
        - { name: rst_n, width: 1, direction: input }
  interfaces:
    - name: signal_input
      type: custom
      clock_domain: clk_domain
      reset_domain: rst_n
      description: "Async input signal and edge-detect outputs"
      ports:
        - { name: sig_in,   width: 1, direction: input,  description: "Asynchronous input signal to synchronize and detect edges" }
        - { name: rise_out, width: 1, direction: output, description: "1-cycle pulse on rising edge of sig_in (after sync)" }
        - { name: fall_out, width: 1, direction: output, description: "1-cycle pulse on falling edge of sig_in (after sync)" }

features:
  - name: 2-flop synchronizer
    trigger: "sig_in changes"
    datapath: "sync1 -> sync2 pipeline"
    control: "Two-stage FF chain clocked by clk"
    output: "sync2 is CDC-safe version of sig_in"
  - name: Rising edge detect
    trigger: "sync2 high and prev_sync low"
    datapath: "rise_out = sync2 & ~prev_sync"
    control: "Combinational"
    output: "rise_out"
  - name: Falling edge detect
    trigger: "sync2 low and prev_sync high"
    datapath: "fall_out = ~sync2 & prev_sync"
    control: "Combinational"
    output: "fall_out"

registers:
  config:
    register_width: 1
    addr_width: 0
    byte_addressable: false
  bit_order: lsb0
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: "No CSR registers"
  register_list: []

memory:
  instances: []
  note: "No FIFO/SRAM."

interrupts:
  sources: []
  output: null
  note: "No interrupts."

fsm:
  sync_ff:
    states: [IDLE]
    transitions: []

rtl_contract:
  transaction: FM_RISE
  clock: clk
  reset: rst_n
  reset_active: low
  sample_condition: "rst_n == 1"
  input_map:
    sig_in: sig_in
  output_map:
    rise_out: rise_out
    fall_out: fall_out

function_model:
  purpose: "Executable FL contract"
  state_variables:
    - { name: sync1, source: io_list.interfaces.signal_input, reset: 0, description: "First synchronizer FF" }
    - { name: sync2, source: io_list.interfaces.signal_input, reset: 0, description: "Second synchronizer FF" }
    - { name: prev_sync, source: io_list.interfaces.signal_input, reset: 0, description: "Previous value of sync2 for edge detection" }
  transactions:
    - id: FM_RISE
      name: rising_edge
      preconditions: ["prev_sync == 0", "sync2 == 1"]
      inputs: [sig_in]
      outputs: ["rise_out=1, fall_out=0"]
      output_rules:
        - { name: rise_rule, port: rise_out, expr: "1", width: 1 }
        - { name: fall_rule, port: fall_out, expr: "0", width: 1 }
      state_updates:
        - { name: sync1, expr: "sig_in", width: 1 }
        - { name: sync2, expr: "sync1", width: 1 }
        - { name: prev_sync, expr: "sync2", width: 1 }
      side_effects: ["rise_out pulses for 1 cycle"]
      error_cases: []
    - id: FM_FALL
      name: falling_edge
      preconditions: ["prev_sync == 1", "sync2 == 0"]
      inputs: [sig_in]
      outputs: ["rise_out=0, fall_out=1"]
      output_rules:
        - { name: rise_rule, port: rise_out, expr: "0", width: 1 }
        - { name: fall_rule, port: fall_out, expr: "1", width: 1 }
      state_updates:
        - { name: sync1, expr: "sig_in", width: 1 }
        - { name: sync2, expr: "sync1", width: 1 }
        - { name: prev_sync, expr: "sync2", width: 1 }
      side_effects: ["fall_out pulses for 1 cycle"]
      error_cases: []
    - id: FM_STABLE
      name: stable
      preconditions: ["prev_sync == sync2"]
      inputs: [sig_in]
      outputs: ["rise_out=0, fall_out=0"]
      output_rules:
        - { name: rise_rule, port: rise_out, expr: "0", width: 1 }
        - { name: fall_rule, port: fall_out, expr: "0", width: 1 }
      state_updates:
        - { name: sync1, expr: "sig_in", width: 1 }
        - { name: sync2, expr: "sync1", width: 1 }
        - { name: prev_sync, expr: "sync2", width: 1 }
      side_effects: []
      error_cases: []
  invariants:
    - "rise_out = sync2 & ~prev_sync (combinational)"
    - "fall_out = ~sync2 & prev_sync (combinational)"
    - "sync2 is always 2-cycle delayed version of sig_in"

cycle_model:
  purpose: "Cycle contract"
  executable: python
  cosim: true
  clock: clk
  reset:
    assertion: "rst_n low clears sync1=0, sync2=0, prev_sync=0 -> rise_out=0, fall_out=0."
    deassertion: "First rising clk enables synchronizer updates."
  latency:
    edge_detect: { min_cycles: 3, max_cycles: 3 }
  handshake_rules:
    - { signal: rise_out, rule: "Pulses 1 cycle 3 clocks after input rising edge" }
    - { signal: fall_out, rule: "Pulses 1 cycle 3 clocks after input falling edge" }
  pipeline:
    - { stage: S0_SYNC1, cycle: 1, action: "sig_in sampled into sync1" }
    - { stage: S1_SYNC2, cycle: 2, action: "sync1 sampled into sync2" }
    - { stage: S2_EDGE,  cycle: 3, action: "Edge detect: rise_out/fall_out combinational from sync2/prev_sync" }
  ordering:
    - "prev_sync updated same cycle as sync2 output; edge outputs are combinational."
  backpressure: ["No backpressure."]
  performance:
    frequency_mhz: 50
    throughput: { detections_per_cycle: 1 }
  observability:
    - "rise_out/fall_out observable each cycle."

clock_reset_domains:
  domains:
    - { name: clk, frequency_mhz: 50 }
  reset_scheme:
    signal: rst_n
    polarity: active_low
    type: async_assert_sync_deassert

dataflow:
  sequence:
    - { id: sequence_0, source: sig_in,    sink: sync1,    path: "sig_in -> sync1 on clock" }
    - { id: sequence_1, source: sync1,     sink: sync2,    path: "sync1 -> sync2 on clock" }
    - { id: sequence_2, source: sync2,     sink: rise_out, path: "sync2 & ~prev_sync -> rise_out" }
    - { id: sequence_3, source: prev_sync, sink: fall_out, path: "~sync2 & prev_sync -> fall_out" }

power:
  domains: [PD_MAIN]
  modes: ["ON"]

security:
  classifications: []

error_handling:
  error_sources:
    - { id: ERR_NONE, condition: "No error sources", architectural_effect: "No error outputs" }

debug_observability:
  signals:
    - { name: sync1,    source: function_model.state_variables.sync1,    description: "First sync FF" }
    - { name: sync2,    source: function_model.state_variables.sync2,    description: "Second sync FF" }
    - { name: prev_sync, source: function_model.state_variables.prev_sync, description: "Prev cycle sync2 for edge detect" }

dft:
  scan: { enabled: false }

synthesis:
  target: { technology: generic, frequency_mhz: 50 }

integration:
  top_ports: [clk, rst_n, sig_in, rise_out, fall_out]

quality_gates:
  rtl_gen:
    manifest_hygiene: "tb_manifest.rtl_sources must list every .sv file."

test_requirements:
  scenarios:
    - id: SC1
      name: "Reset — all outputs 0"
      stimulus: "Assert rst_n=0 for 3 cycles"
      expected: "rise_out=0, fall_out=0"
      checker: "Scoreboard checks outputs=0 after reset."
      coverage: [reset]
      stimulus_machine_spec:
        assign: { sig_in: 0 }
    - id: SC2
      name: "Rising edge — rise_out pulses"
      stimulus: "sig_in 0->1"
      expected: "rise_out=1 for 1 cycle (3 clocks later), fall_out=0"
      checker: "Scoreboard verifies rise_out=1."
      coverage: [FM_RISE]
      stimulus_machine_spec:
        timeline:
          - { assign: { sig_in: 1 } }
    - id: SC3
      name: "Falling edge — fall_out pulses"
      stimulus: "sig_in 1->0 (after prior rising edge settled)"
      expected: "fall_out=1 for 1 cycle (3 clocks later), rise_out=0"
      checker: "Scoreboard verifies fall_out=1."
      coverage: [FM_FALL]
      stimulus_machine_spec:
        timeline:
          - { assign: { sig_in: 0 } }
    - id: SC4
      name: "Stable signal — no pulse"
      stimulus: "sig_in held constant"
      expected: "rise_out=0, fall_out=0"
      checker: "Scoreboard verifies no pulses."
      coverage: [FM_STABLE]
      stimulus_machine_spec:
        assign: { sig_in: 1 }
  scoreboard_checks:
    - "rise_out = sync2 & ~prev_sync (after 2 FF delay)"
    - "fall_out = ~sync2 & prev_sync (after 2 FF delay)"
    - "rise_out and fall_out never simultaneously 1"
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
    cycle:
      target_pct: 100
      model: cycle_model

workflow_todos:
  - { id: EDGE_DET_CX1_BRINGUP, description: "Full ROCEV flow for edge_det_cx1 (ssot/fl/rtl/tb/sim)", status: planned }
