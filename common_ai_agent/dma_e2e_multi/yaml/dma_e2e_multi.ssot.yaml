# =====================================================================
# SSOT YAML — dma_e2e_multi
# Multi-channel end-to-end DMA Engine
# Generated by: ssot-gen (engineering draft)
# =====================================================================
ip: dma_e2e_multi
version: "0.1.0"
description: >
  Multi-channel end-to-end DMA controller supporting up to 8 independent
  transfer channels with programmable descriptors, AXI4 master interfaces
  for memory-mapped reads/writes, and interrupt-driven completion signalling.

# =====================================================================
# top_module
# =====================================================================
top_module:
  name: dma_e2e_multi
  file: rtl/dma_e2e_multi.sv
  version: "0.1.0"
  type: peripheral           # DMA peripheral IP
  description: >
    Top-level multi-channel DMA engine. Exposes a register-programmable
    control interface (APB or subordinate AXI4-Lite), one or more AXI4
  # TBD: confirm bus type for register access — Suggest: AXI4-Lite subordinate
  target:
    technology: "TBD"        # TBD: target ASIC node or FPGA family
    frequency_hz: 100000000  # 100 MHz default
    reset: synchronous_active_low

# =====================================================================
# parameters
# =====================================================================
parameters:
  NUM_CHANNELS:
    type: integer
    default: 8
    min: 1
    max: 16
    description: "Number of independent DMA channels"
  ADDR_WIDTH:
    type: integer
    default: 32
    description: "Address bus width in bits"
  DATA_WIDTH:
    type: integer
    default: 32
    description: "Data bus width in bits"
  BURST_LEN:
    type: integer
    default: 16
    description: "Maximum AXI burst length (beats)"
  DESC_FIFO_DEPTH:
    type: integer
    default: 4
    description: "Descriptor FIFO depth per channel"
  MAX_TRANSFER_SIZE:
    type: integer
    default: 4096
    description: "Maximum single transfer size in bytes"

# =====================================================================
# io_list
# =====================================================================
io_list:
  # Clock / Reset
  - name: clk
    direction: input
    width: 1
    description: "System clock"
  - name: rst_n
    direction: input
    width: 1
    description: "Active-low synchronous reset"

  # Register access — AXI4-Lite subordinate
  - name: s_axi_awaddr
    direction: input
    width: "ADDR_WIDTH"
    protocol: axi4-lite
    role: subordinate
    description: "Write address"
  - name: s_axi_awprot
    direction: input
    width: 3
    description: "Write protection type"
  - name: s_axi_awvalid
    direction: input
    width: 1
    handshake: valid-ready
    description: "Write address valid"
  - name: s_axi_awready
    direction: output
    width: 1
    handshake: valid-ready
    description: "Write address ready"
  - name: s_axi_wdata
    direction: input
    width: "DATA_WIDTH"
    description: "Write data"
  - name: s_axi_wstrb
    direction: input
    width: "(DATA_WIDTH/8)"
    description: "Write byte strobes"
  - name: s_axi_wvalid
    direction: input
    width: 1
    handshake: valid-ready
    description: "Write data valid"
  - name: s_axi_wready
    direction: output
    width: 1
    handshake: valid-ready
    description: "Write data ready"
  - name: s_axi_bresp
    direction: output
    width: 2
    description: "Write response"
  - name: s_axi_bvalid
    direction: output
    width: 1
    handshake: valid-ready
    description: "Write response valid"
  - name: s_axi_bready
    direction: input
    width: 1
    handshake: valid-ready
    description: "Write response ready"
  - name: s_axi_araddr
    direction: input
    width: "ADDR_WIDTH"
    protocol: axi4-lite
    role: subordinate
    description: "Read address"
  - name: s_axi_arprot
    direction: input
    width: 3
    description: "Read protection type"
  - name: s_axi_arvalid
    direction: input
    width: 1
    handshake: valid-ready
    description: "Read address valid"
  - name: s_axi_arready
    direction: output
    width: 1
    handshake: valid-ready
    description: "Read address ready"
  - name: s_axi_rdata
    direction: output
    width: "DATA_WIDTH"
    description: "Read data"
  - name: s_axi_rresp
    direction: output
    width: 2
    description: "Read response"
  - name: s_axi_rvalid
    direction: output
    width: 1
    handshake: valid-ready
    description: "Read data valid"
  - name: s_axi_rready
    direction: input
    width: 1
    handshake: valid-ready
    description: "Read data ready"

  # AXI4 Master — read
  - name: m_axi_araddr
    direction: output
    width: "ADDR_WIDTH"
    protocol: axi4
    role: manager
    description: "Master read address"
  - name: m_axi_arlen
    direction: output
    width: 8
    description: "Master read burst length"
  - name: m_axi_arsize
    direction: output
    width: 3
    description: "Master read transfer size"
  - name: m_axi_arburst
    direction: output
    width: 2
    description: "Master read burst type"
  - name: m_axi_arvalid
    direction: output
    width: 1
    handshake: valid-ready
    description: "Master read address valid"
  - name: m_axi_arready
    direction: input
    width: 1
    handshake: valid-ready
    description: "Master read address ready"
  - name: m_axi_rdata
    direction: input
    width: "DATA_WIDTH"
    description: "Master read data"
  - name: m_axi_rlast
    direction: input
    width: 1
    description: "Master read last beat"
  - name: m_axi_rvalid
    direction: input
    width: 1
    handshake: valid-ready
    description: "Master read data valid"
  - name: m_axi_rready
    direction: output
    width: 1
    handshake: valid-ready
    description: "Master read data ready"

  # AXI4 Master — write
  - name: m_axi_awaddr
    direction: output
    width: "ADDR_WIDTH"
    protocol: axi4
    role: manager
    description: "Master write address"
  - name: m_axi_awlen
    direction: output
    width: 8
    description: "Master write burst length"
  - name: m_axi_awsize
    direction: output
    width: 3
    description: "Master write transfer size"
  - name: m_axi_awburst
    direction: output
    width: 2
    description: "Master write burst type"
  - name: m_axi_awvalid
    direction: output
    width: 1
    handshake: valid-ready
    description: "Master write address valid"
  - name: m_axi_awready
    direction: input
    width: 1
    handshake: valid-ready
    description: "Master write address ready"
  - name: m_axi_wdata
    direction: output
    width: "DATA_WIDTH"
    description: "Master write data"
  - name: m_axi_wstrb
    direction: output
    width: "(DATA_WIDTH/8)"
    description: "Master write byte strobes"
  - name: m_axi_wlast
    direction: output
    width: 1
    description: "Master write last beat"
  - name: m_axi_wvalid
    direction: output
    width: 1
    handshake: valid-ready
    description: "Master write data valid"
  - name: m_axi_wready
    direction: input
    width: 1
    handshake: valid-ready
    description: "Master write data ready"
  - name: m_axi_bresp
    direction: input
    width: 2
    description: "Master write response"
  - name: m_axi_bvalid
    direction: input
    width: 1
    handshake: valid-ready
    description: "Master write response valid"
  - name: m_axi_bready
    direction: output
    width: 1
    handshake: valid-ready
    description: "Master write response ready"

  # Interrupts
  - name: irq
    direction: output
    width: "NUM_CHANNELS"
    description: "Per-channel completion interrupt"
  - name: irq_err
    direction: output
    width: "NUM_CHANNELS"
    description: "Per-channel error interrupt"

# =====================================================================
# features
# =====================================================================
features:
  - id: multi_channel
    description: "Up to NUM_CHANNELS independent DMA transfer channels"
  - id: descriptor_fifo
    description: "Per-channel descriptor FIFO for queued transfers"
  - id: axi4_master_rd
    description: "AXI4 manager read port for source fetch"
  - id: axi4_master_wr
    description: "AXI4 manager write port for destination store"
  - id: axi4lite_slave
    description: "AXI4-Lite subordinate for register programming"
  - id: per_channel_irq
    description: "Independent completion and error interrupts per channel"
  - id: fixed_increment
    description: "Source/destination address can be fixed or incrementing"
  - id: error_response
    description: "AXI error response detection and reporting per channel"

# =====================================================================
# sub_modules
# =====================================================================
sub_modules:
  - name: dma_channel
    file: rtl/dma_channel.sv
    instances: "NUM_CHANNELS"
    ownership: manifest
    implements: function_model.channel_transaction
    function_model_refs: [function_model.transactions]
    cycle_model_refs: [cycle_model.channel_cycle]
    fsm_refs: [fsm.channel_fsm]
    register_refs: [registers.per_channel_regs]
    description: "Single DMA channel with descriptor FIFO and state machine"

  - name: dma_arbiter
    file: rtl/dma_arbiter.sv
    instances: 1
    ownership: manifest
    implements: function_model.arbitration
    function_model_refs: [function_model.transactions]
    description: "Round-robin arbiter selecting active channel for AXI access"

  - name: dma_reg_block
    file: rtl/dma_reg_block.sv
    instances: 1
    ownership: manifest
    implements: function_model.register_access
    register_refs: [registers]
    description: "AXI4-Lite register block with per-channel control/status"

  - name: axi_master_rd
    file: rtl/axi_master_rd.sv
    instances: 1
    ownership: manifest
    implements: function_model.axi_read
    description: "AXI4 manager read interface FSM"

  - name: axi_master_wr
    file: rtl/axi_master_wr.sv
    instances: 1
    ownership: manifest
    implements: function_model.axi_write
    description: "AXI4 manager write interface FSM"

# =====================================================================
# dataflow
# =====================================================================
dataflow:
  description: >
    Software programs per-channel registers (src_addr, dst_addr, length,
    control) via AXI4-Lite. Each channel independently arbitrates for
    the shared AXI4 master bus, reads source data, and writes to the
    destination. Completion triggers per-channel IRQ.
  path:
    - stage: reg_program
      from: s_axi
      to: dma_reg_block
      data: "register write (addr, length, control)"
    - stage: descriptor_load
      from: dma_reg_block
      to: dma_channel
      data: "channel descriptor"
    - stage: arbitrate
      from: dma_channel
      to: dma_arbiter
      data: "channel request grant"
    - stage: axi_read
      from: dma_arbiter
      to: axi_master_rd
      data: "read burst command"
    - stage: data_transfer
      from: axi_master_rd
      to: axi_master_wr
      data: "fetched data beats"
    - stage: axi_write
      from: axi_master_wr
      to: m_axi
      data: "write burst data"
    - stage: completion
      from: dma_channel
      to: irq
      data: "done / error flag"

# =====================================================================
# function_model
# =====================================================================
function_model:
  transactions:
    - name: reset
      description: "Synchronous reset clears all channels and FIFOs"
      output_rules:
        - expr: "irq == 0"
          width: "NUM_CHANNELS"
          port: irq
        - expr: "irq_err == 0"
          width: "NUM_CHANNELS"
          port: irq_err
        - expr: "channel[ch].state == IDLE"
          width: 1
          port: "channel_state"
          for: "ch in 0..NUM_CHANNELS-1"
      state_updates:
        - state: channel[ch].busy
          expr: "0"
          width: 1
        - state: channel[ch].transfer_count
          expr: "0"
          width: 32

    - name: channel_start
      description: >
        Software writes src_addr, dst_addr, length, control to a channel's
        registers and asserts the start bit for that channel.
      output_rules:
        - expr: "channel[ch].busy == 1"
          width: 1
          port: "channel_state"
      state_updates:
        - state: channel[ch].src_addr
          expr: "reg_src_addr[ch]"
          width: ADDR_WIDTH
        - state: channel[ch].dst_addr
          expr: "reg_dst_addr[ch]"
          width: ADDR_WIDTH
        - state: channel[ch].remaining
          expr: "reg_length[ch]"
          width: 32
        - state: channel[ch].state
          expr: "ACTIVE"
          width: 1

    - name: axi_read_burst
      description: "Channel issues AXI read burst from src_addr"
      output_rules:
        - expr: "m_axi_arvalid == 1"
          width: 1
          port: m_axi_arvalid
        - expr: "m_axi_araddr == channel[ch].src_addr"
          width: ADDR_WIDTH
          port: m_axi_araddr
        - expr: "m_axi_arlen == min(BURST_LEN-1, remaining_beats-1)"
          width: 8
          port: m_axi_arlen
      state_updates:
        - state: channel[ch].src_addr
          expr: "src_addr + (burst_beats * (DATA_WIDTH/8))"
          width: ADDR_WIDTH

    - name: axi_write_burst
      description: "Channel writes fetched data to dst_addr"
      output_rules:
        - expr: "m_axi_awvalid == 1"
          width: 1
          port: m_axi_awvalid
        - expr: "m_axi_awaddr == channel[ch].dst_addr"
          width: ADDR_WIDTH
          port: m_axi_awaddr
      state_updates:
        - state: channel[ch].dst_addr
          expr: "dst_addr + (burst_beats * (DATA_WIDTH/8))"
          width: ADDR_WIDTH
        - state: channel[ch].remaining
          expr: "remaining - (burst_beats * (DATA_WIDTH/8))"
          width: 32

    - name: channel_complete
      description: "Transfer finishes (remaining == 0) and IRQ is asserted"
      output_rules:
        - expr: "irq[ch] == 1"
          width: 1
          port: irq
        - expr: "channel[ch].busy == 0"
          width: 1
          port: "channel_state"
      state_updates:
        - state: channel[ch].state
          expr: "IDLE"
          width: 1
        - state: channel[ch].busy
          expr: "0"
          width: 1

    - name: channel_error
      description: "AXI SLVERR or DECERR response on a channel"
      output_rules:
        - expr: "irq_err[ch] == 1"
          width: 1
          port: irq_err
      state_updates:
        - state: channel[ch].state
          expr: "ERROR"
          width: 1
        - state: channel[ch].error_code
          expr: "axi_resp"
          width: 2

# =====================================================================
# cycle_model
# =====================================================================
cycle_model:
  channel_cycle:
    description: "Per-channel transfer cycle budget"
    register_write: 2    # cycles: AXI-Lite write to register
    arbitration: 1       # cycles: round-robin grant
    read_latency: 3      # cycles: first read data after ar request
    write_latency: 3     # cycles: first write response after aw request
    per_beat: 1          # cycles per data beat (full throughput)
    completion: 1        # cycles: IRQ assertion after last write response
  total_latency:
    description: "End-to-end latency for N-byte transfer"
    expr: "2 + 1 + 3 + ceil(N/(DATA_WIDTH/8)) * 1 + 3 + 1"
    unit: clock_cycles

# =====================================================================
# registers
# =====================================================================
registers:
  global_regs:
    - name: DMA_CTRL
      offset: "0x000"
      width: 32
      access: rw
      description: "Global DMA control (bit0: global_enable)"
    - name: DMA_STATUS
      offset: "0x004"
      width: 32
      access: ro
      description: "Global status (busy flags per channel)"
    - name: DMA_INTR_STATUS
      offset: "0x008"
      width: "NUM_CHANNELS"
      access: ro
      description: "Interrupt status per channel"
    - name: DMA_INTR_ENABLE
      offset: "0x00C"
      width: "NUM_CHANNELS"
      access: rw
      description: "Interrupt enable mask per channel"
    - name: DMA_INTR_CLEAR
      offset: "0x010"
      width: "NUM_CHANNELS"
      access: wo
      description: "Write-1-to-clear interrupt per channel"
  per_channel_regs:
    - name: CH_SRC_ADDR
      offset: "0x100 + ch*0x20"
      width: ADDR_WIDTH
      access: rw
      description: "Source address for channel ch"
      repeat: "NUM_CHANNELS"
    - name: CH_DST_ADDR
      offset: "0x104 + ch*0x20"
      width: ADDR_WIDTH
      access: rw
      description: "Destination address for channel ch"
      repeat: "NUM_CHANNELS"
    - name: CH_LENGTH
      offset: "0x108 + ch*0x20"
      width: 32
      access: rw
      description: "Transfer length in bytes for channel ch"
      repeat: "NUM_CHANNELS"
    - name: CH_CTRL
      offset: "0x10C + ch*0x20"
      width: 32
      access: rw
      description: "Channel control (bit0: start, bit1: src_inc, bit2: dst_inc, bit4: interrupt_en)"
      repeat: "NUM_CHANNELS"
    - name: CH_STATUS
      offset: "0x110 + ch*0x20"
      width: 32
      access: ro
      description: "Channel status (bit0: busy, bit1: done, bit2: error, bits[5:4]: error_code)"
      repeat: "NUM_CHANNELS"

# =====================================================================
# interrupts
# =====================================================================
interrupts:
  - name: irq
    width: "NUM_CHANNELS"
    trigger: level_high
    description: "Per-channel transfer completion interrupt"
    clear: "Write 1 to DMA_INTR_CLEAR[ch]"
  - name: irq_err
    width: "NUM_CHANNELS"
    trigger: level_high
    description: "Per-channel error interrupt (AXI SLVERR/DECERR)"
    clear: "Write 1 to DMA_INTR_CLEAR[ch] after clearing error"

# =====================================================================
# fsm
# =====================================================================
fsm:
  channel_fsm:
    module: dma_channel
    states:
      - name: IDLE
        description: "Channel idle, waiting for start command"
        transitions:
          - to: ACTIVE
            condition: "ch_ctrl.start == 1"
      - name: ACTIVE
        description: "Channel performing transfer"
        transitions:
          - to: IDLE
            condition: "remaining == 0"
          - to: ERROR
            condition: "axi_resp != OKAY"
      - name: ERROR
        description: "Channel halted due to AXI error"
        transitions:
          - to: IDLE
            condition: "ch_ctrl.start == 1 (re-arm after error clear)"
    default_state: IDLE

# =====================================================================
# custom
# =====================================================================
custom:
  assumptions:
    - "Single shared AXI4 read and write master bus; channels arbitrated round-robin"
    - "AXI4-Lite subordinate register interface at base address configured externally"
    - "Each channel supports only simple memory-to-memory copy (no scatter-gather)"
    - "Address increment/decrement is per-channel configurable via CH_CTRL"
    - "Transfer size must be a multiple of (DATA_WIDTH/8) bytes"
    - "Backpressure is handled via standard AXI valid/ready handshaking"
    - "No out-of-order completion between channels; each channel is sequential"
  tbd_items:
    - field: top_module.target.technology
      reason: "Target ASIC/FPGA node not specified"
    - field: top_module.target.frequency_hz
      reason: "Operating frequency assumed 100 MHz; confirm system requirement"
    - field: parameters.BURST_LEN
      reason: "Default 16; may need tuning for specific SoC interconnect"

# =====================================================================
# test_requirements
# =====================================================================
test_requirements:
  - id: tr_single_channel
    description: "Single channel memory-to-memory transfer, verify data integrity"
    stimulus: "Program channel 0 with src=0x1000, dst=0x2000, length=64, start=1"
    expected: "Data at 0x2000 matches data at 0x1000; irq[0] asserted"
    checkers:
      - "m_axi read data == m_axi written data per beat"
      - "irq[0] == 1 within timeout"
    coverage:
      - "Channel 0 IDLE->ACTIVE->IDLE FSM traversal"
      - "Full transfer with no backpressure"

  - id: tr_multi_channel
    description: "All channels transferring concurrently"
    stimulus: "Program NUM_CHANNELS channels with distinct src/dst, start all"
    expected: "All channels complete; all irq bits asserted; data integrity per channel"
    checkers:
      - "irq == {NUM_CHANNELS{1'b1}} within timeout"
      - "Data integrity verified per channel"
    coverage:
      - "Round-robin arbitration observed"
      - "Concurrent channel interleaving on AXI bus"

  - id: tr_backpressure
    description: "AXI backpressure during transfer"
    stimulus: "Random ready deassert on read and write paths during transfer"
    expected: "Transfer completes correctly; no data loss"
    checkers:
      - "Final destination data matches source data"
    coverage:
      - "arready/awready/wready/rready deasserted at least once"

  - id: tr_error_response
    description: "AXI SLVERR/DECERR handling"
    stimulus: "Inject SLVERR on read response for channel 0"
    expected: "irq_err[0] asserted; channel 0 enters ERROR state; other channels unaffected"
    checkers:
      - "irq_err[0] == 1"
      - "channel 0 status shows error code"
    coverage:
      - "ERROR state reached"

  - id: tr_reset_during_transfer
    description: "Assert reset mid-transfer"
    stimulus: "Start channel 0, assert rst_n during AXI read burst"
    expected: "All channels return to IDLE; all IRQs cleared; AXI bus quiesces"
    checkers:
      - "channel state == IDLE after reset"
      - "irq == 0, irq_err == 0 after reset"

# =====================================================================
# quality_gates
# =====================================================================
quality_gates:
  - gate: yaml_valid
    condition: "YAML parses without error"
    status: pending
  - gate: schema_repair_pass
    condition: "repair_ssot_schema.py exits 0"
    status: pending
  - gate: disk_check_pass
    condition: "check_ssot_disk.sh reports pass"
    status: pending

# =====================================================================
# workflow_todos
# =====================================================================
workflow_todos:
  - task: "Confirm target technology and frequency"
    owner: ssot-gen
    blocked_by: "human decision"
  - task: "Generate RTL for dma_e2e_multi"
    owner: rtl-gen
    blocked_by: "ssot handoff complete"
  - task: "Generate testbench"
    owner: tb-gen
    blocked_by: "rtl-gen complete"
