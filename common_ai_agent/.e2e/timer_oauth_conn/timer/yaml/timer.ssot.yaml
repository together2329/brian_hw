test_requirements:
  scenarios:
  - id: SC01
    name: reset contract
    stimulus: Assert and release the declared reset while all external interfaces remain idle.
    expected: Architectural state, status, outputs, and debug observability match function_model reset outputs.
    checker: Reset checker compares all declared reset-visible state against function_model and cycle_model reset rules.
    coverage:
    - function_model.reset
    - cycle_model.reset
  - id: SC02
    name: primary approved behavior
    stimulus: Drive a legal request, transaction, command, packet, or CSR operation from function_model primary preconditions.
    expected: Externally observable result/status/side effects match the function_model primary transaction.
    checker: FL-vs-RTL scoreboard compares observable outputs and state updates from the locked function_model.
    coverage:
    - function_model.primary
    - features
    - dataflow
  - id: SC03
    name: cycle handshake and backpressure
    stimulus: Apply legal stalls or delayed handshakes on every declared cycle_model interface phase.
    expected: Payloads remain stable, ordering is preserved, and completion timing respects cycle_model latency/backpressure rules.
    checker: Protocol monitor and scoreboard check cycle_model.handshake_rules, ordering, and latency budget.
    coverage:
    - cycle_model.handshake_rules
    - cycle_model.ordering
    - backpressure
  - id: SC04
    name: error and recovery policy
    stimulus: Inject each declared error_handling.error_sources condition where the interface can represent it.
    expected: Error/status/response/recovery behavior follows error_handling without corrupting unrelated architectural state.
    checker: Negative checker compares error result and recovery state against function_model error_cases.
    coverage:
    - error_handling.error_sources
    - function_model.error_cases
  - id: SC05
    name: debug and trace observability
    stimulus: Run nominal and error flows while sampling every debug_observability waveform/status/trace point.
    expected: Debug/status/trace events reflect committed SSOT-visible state without exposing unsupported behavior.
    checker: Waveform/trace checker validates debug_observability entries and traceability.yaml_to_output rows.
    coverage:
    - debug_observability
    - traceability
  - id: SC06
    name: function_model transaction FM_APB_WRITE_LOAD
    stimulus: Drive preconditions for function_model transaction `FM_APB_WRITE_LOAD`.
    expected: Outputs and side effects match `FM_APB_WRITE_LOAD` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_WRITE_LOAD
  - id: SC07
    name: function_model transaction FM_APB_WRITE_CTRL
    stimulus: Drive preconditions for function_model transaction `FM_APB_WRITE_CTRL`.
    expected: Outputs and side effects match `FM_APB_WRITE_CTRL` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_WRITE_CTRL
  - id: SC08
    name: function_model transaction FM_APB_READ_STATUS
    stimulus: Drive preconditions for function_model transaction `FM_APB_READ_STATUS`.
    expected: Outputs and side effects match `FM_APB_READ_STATUS` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_READ_STATUS
  - id: SC09
    name: function_model transaction FM_APB_INVALID
    stimulus: Drive preconditions for function_model transaction `FM_APB_INVALID`.
    expected: Outputs and side effects match `FM_APB_INVALID` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_INVALID
  - id: SC10
    name: function_model transaction FM_TICK_DISABLED
    stimulus: Drive preconditions for function_model transaction `FM_TICK_DISABLED`.
    expected: Outputs and side effects match `FM_TICK_DISABLED` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_TICK_DISABLED
  - id: SC11
    name: function_model transaction FM_TICK_DECREMENT
    stimulus: Drive preconditions for function_model transaction `FM_TICK_DECREMENT`.
    expected: Outputs and side effects match `FM_TICK_DECREMENT` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_TICK_DECREMENT
  - id: SC12
    name: function_model transaction FM_TICK_EXPIRE_RELOAD
    stimulus: Drive preconditions for function_model transaction `FM_TICK_EXPIRE_RELOAD`.
    expected: Outputs and side effects match `FM_TICK_EXPIRE_RELOAD` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_TICK_EXPIRE_RELOAD
  scoreboard_checks: 12
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Functional coverage for APB programming, countdown, reload, disable hold, status read, and invalid access.
      bins:
      - id: FCOV_APB_WRITE_LOAD
        source_ref: function_model.transactions.FM_APB_WRITE_LOAD
        class: transaction
        description: LOAD write accepted.
      - id: FCOV_APB_WRITE_CTRL
        source_ref: function_model.transactions.FM_APB_WRITE_CTRL
        class: transaction
        description: CTRL enable write accepted.
      - id: FCOV_APB_READ_STATUS
        source_ref: function_model.transactions.FM_APB_READ_STATUS
        class: transaction
        description: STATUS read returns count.
      - id: FCOV_APB_INVALID
        source_ref: function_model.transactions.FM_APB_INVALID
        class: error_transaction
        description: Invalid access produces pslverr.
      - id: FCOV_TICK_DISABLED
        source_ref: function_model.transactions.FM_TICK_DISABLED
        class: state_hold
        description: Disabled timer holds count.
      - id: FCOV_TICK_DECREMENT
        source_ref: function_model.transactions.FM_TICK_DECREMENT
        class: state_update
        description: Enabled non-zero timer decrements.
      - id: FCOV_TICK_EXPIRE_RELOAD
        source_ref: function_model.transactions.FM_TICK_EXPIRE_RELOAD
        class: state_update
        description: Expiry reloads and pulses irq.
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle and handshake coverage for APB response and timer tick behavior.
      bins:
      - id: CCOV_APB_ACCESS
        source_ref: cycle_model.pipeline.APB_ACCESS
        class: pipeline_stage
        description: APB access phase observed.
      - id: CCOV_IRQ_SINGLE_CYCLE
        source_ref: cycle_model.handshake_rules.IRQ_SINGLE_CYCLE
        class: pulse
        description: irq one-cycle pulse observed.
      - id: CCOV_APB_ERROR
        source_ref: cycle_model.handshake_rules.APB_INVALID_ERROR
        class: error_handshake
        description: pslverr behavior observed.
      - id: CCOV_DISABLE_HOLD
        source_ref: cycle_model.ordering
        class: ordering
        description: Disable hold ordering observed.
    functional: Function and cycle coverage must close for starter downstream generation.
    code: DUT-only compile and DUT-only lint required; line/branch metrics may be defaulted by repair flow in starter mode.
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
quality_gates:
  ssot:
    pass: Starter SSOT parses, includes top_module/io_list/function_model, and passes check_ssot_disk starter mode after deterministic repair fills boilerplate defaults.
    evidence:
    - timer/yaml/timer.ssot.yaml
    - req/timer_requirements.md
  rtl:
    pass: DUT-only compile and DUT-only lint pass for timer.sv, timer_regs.sv, and timer_core.sv.
    evidence:
    - lint/dut_lint_report.txt
    - sim/dut_compile.log
  rtl_gen:
    profile: standard
    pass: RTL implements timer_regs and timer_core behavior from function_model/cycle_model without fixed-template substitution.
    evidence:
    - rtl/rtl_authoring_provenance.json
    - rtl/rtl_todo_plan.json
    - sim/fl_rtl_goal_audit.json
  dv:
    pass: Structured scoreboard events and FL-vs-RTL comparison pass for reset, programming, countdown, reload irq, disable hold, status read, and invalid access scenarios.
    evidence:
    - sim/scoreboard_events.jsonl
    - sim/fl_rtl_results.json
    - sim/pytest_results.xml
  coverage:
    pass: Declared function and cycle coverage bins are hit or waived with SSOT-approved rationale.
    evidence:
    - cov/coverage.json
    - sim/coverage_report.md
  eda:
    pass: Starter EDA requirements are limited to preserving synthesizable RTL and producing required synthesis reports when downstream EDA is run.
    evidence:
    - syn/timing_report.rpt
    - syn/area_report.rpt
    - syn/power_report.rpt
  signoff:
    pass: No signoff claim in starter mode; downstream signoff requires engineering/signoff SSOT enrichment and fresh evidence.
    evidence:
    - req/signoff_waivers_or_upgrade_plan.md
traceability:
  yaml_to_output:
  - yaml: top_module.name
    output: RTL top module name timer
  - yaml: io_list.interfaces.apb_slave
    output: timer.sv APB port list and timer_regs decode
  - yaml: registers.register_list.LOAD
    output: timer_regs.sv LOAD storage and firmware register definition
  - yaml: registers.register_list.CTRL
    output: timer_regs.sv enable storage and firmware register definition
  - yaml: registers.register_list.STATUS
    output: timer_regs.sv STATUS read mux and scoreboard status checks
  - yaml: function_model.transactions.FM_TICK_DECREMENT
    output: timer_core.sv decrement logic and FL-vs-RTL goal
  - yaml: function_model.transactions.FM_TICK_EXPIRE_RELOAD
    output: timer_core.sv zero-detect reload/irq logic and FL-vs-RTL goal
  - yaml: cycle_model.pipeline
    output: cycle scoreboard sample stages and RTL timing implementation
  - yaml: test_requirements.scenarios
    output: cocotb/pyuvm tests and structured scoreboard events
  - yaml: quality_gates
    output: downstream pass/fail criteria for RTL
    DV: null
    coverage: null
    and EDA: null
  - yaml: function_model
    output: RTL behavior and TB reference model
  - yaml: cycle_model
    output: RTL handshake/pipeline timing and waveform checks
  - yaml: function_model/cycle_model/test_requirements
    output: verify/equivalence_goals.json and FL-vs-RTL scoreboard contracts
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: security
    output: Threat mitigations and negative tests
  - yaml: error_handling
    output: Fault RTL paths and DV error scenarios
  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
workflow_todos:
  ssot-gen:
  - id: SSOT_STARTER_VALIDATE_TIMER
    content: Validate starter SSOT for timer and allow deterministic repair defaults where starter mode permits.
    detail: Run repair_ssot_schema.py and check_ssot_disk.sh in starter mode against timer/yaml/timer.ssot.yaml.
    command: /to-ssot timer
    script: $ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/check_ssot_disk.sh
    instructions:
    - Use timer/req/timer_requirements.md as the semantic source.
    - Do not add behavior that contradicts the reset, enable, decrement, reload, irq pulse, or STATUS read requirements.
    criteria:
    - function_model has non-empty state_variables, transactions, and invariants.
    - check_ssot_disk.sh timer --mode starter reports pass after repair.
    source_refs:
    - timer/req/timer_requirements.md
    priority: high
    required: true
  fl-model-gen:
  - id: FL_TIMER_EXECUTABLE_MODEL
    content: Generate executable FunctionalModel for timer countdown and APB register semantics.
    detail: Implement state updates for load_q, enable_q, timer_count_q, and irq_q exactly from function_model transactions.
    command: /ssot-fl-model timer
    script: $ATLAS_WORKFLOW_ROOT/fl-model-gen/scripts/generate_fl_model.py
    instructions:
    - Preserve transaction ordering with specific APB/tick transactions before FM_IDLE.
    - Expose expected outputs prdata, pready, pslverr, and irq for scoreboard use.
    criteria:
    - FunctionalModel can execute reset, LOAD write, CTRL write, tick decrement, expiry reload, disable hold, STATUS read, and invalid access.
    source_refs:
    - function_model
    priority: high
    required: true
  rtl-gen:
  - id: RTL_TIMER_TOP_INTEGRATION
    content: Author timer.sv top-level integration from SSOT ports and submodule connections.
    detail: Instantiate timer_regs and timer_core, wire APB ports to timer_regs, wire load_q/enable_q/count_q between regs and core, and expose irq from timer_core.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Use io_list as the top port authority.
    - Use integration.connections and sub_modules[].connections for module wiring.
    - Do not create extra wrapper-only top files; top file is rtl/timer.sv.
    criteria:
    - timer.sv contains top module timer with all declared io_list ports.
    - Internal wiring matches module/port/signal records.
    source_refs:
    - top_module
    - io_list
    - integration.connections
    - sub_modules
    owner_module: timer
    owner_file: rtl/timer.sv
    priority: high
    required: true
  - id: RTL_TIMER_APB_REGISTERS
    content: Implement APB-style register decode for LOAD, CTRL, and STATUS.
    detail: LOAD offset 0x00 captures pwdata[31:0], CTRL offset 0x04 captures enable bit, STATUS offset 0x08 returns current count, pready is asserted in access phase, and invalid accesses assert pslverr without corrupting state.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Implement register resets to zero on presetn low.
    - Reserved CTRL bits read as zero and ignore writes.
    - Writes to STATUS must assert pslverr and not change timer_count_q.
    criteria:
    - APB read/write behavior matches function_model transactions FM_APB_WRITE_LOAD, FM_APB_WRITE_CTRL, FM_APB_READ_STATUS, and FM_APB_INVALID.
    - DUT-only compile and lint include timer_regs.sv.
    source_refs:
    - registers.register_list
    - function_model.transactions.FM_APB_WRITE_LOAD
    - function_model.transactions.FM_APB_WRITE_CTRL
    - function_model.transactions.FM_APB_READ_STATUS
    - function_model.transactions.FM_APB_INVALID
    - cycle_model.handshake_rules.APB_SINGLE_CYCLE_READY
    owner_module: timer_regs
    owner_file: rtl/timer_regs.sv
    priority: high
    required: true
  - id: RTL_TIMER_COUNTDOWN_CORE
    content: Implement enable-controlled countdown, hold, expiry reload, and single-cycle irq pulse.
    detail: While enable_q is zero hold count and keep irq low; while enable_q is one and count is non-zero decrement by one each pclk; when enable_q is one and count is zero pulse irq for one cycle and reload count from load_q.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Reset count and irq to zero on presetn low.
    - Ensure irq is a pulse, not a sticky level.
    - Ensure reload uses the current load_q value.
    criteria:
    - RTL observed timer_count_q and irq match FM_TICK_DISABLED, FM_TICK_DECREMENT, and FM_TICK_EXPIRE_RELOAD under FL-vs-RTL comparison.
    - Countdown behavior is covered by SC_COUNTDOWN_IRQ_RELOAD and SC_DISABLE_HOLDS.
    source_refs:
    - function_model.transactions.FM_TICK_DISABLED
    - function_model.transactions.FM_TICK_DECREMENT
    - function_model.transactions.FM_TICK_EXPIRE_RELOAD
    - cycle_model.pipeline.TICK_COMMIT
    - interrupts.sources.IRQ_PULSE
    owner_module: timer_core
    owner_file: rtl/timer_core.sv
    priority: high
    required: true
  - id: RTL_TIMER_RESET_AND_IRQ_ASSERTIONS
    content: Add implementation-visible reset and irq pulse behavior suitable for downstream checks.
    detail: RTL must make reset state and one-cycle irq pulse observable through ports and internal probes named in debug_observability.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Preserve signal names or trace aliases for load_q, enable_q, timer_count_q, and irq.
    - Avoid optimizations that obscure required simulation debug probes in starter flow.
    criteria:
    - SC_RESET_DEFAULTS and SC_COUNTDOWN_IRQ_RELOAD can produce structured scoreboard events with matching FL and RTL values.
    source_refs:
    - debug_observability.waveform_must_probe
    - function_model.invariants
    - cycle_model.handshake_rules.IRQ_SINGLE_CYCLE
    owner_module: timer_core
    owner_file: rtl/timer_core.sv
    priority: medium
    required: true
  tb-gen:
  - id: TB_TIMER_SCOREBOARD_SCENARIOS
    content: Generate cocotb/pyuvm tests and structured scoreboard events for timer scenarios.
    detail: Drive APB-style register writes/reads and per-cycle waits according to test_requirements.scenarios[].stimulus_machine_spec.
    command: /ssot-tb timer
    script: $ATLAS_WORKFLOW_ROOT/tb-gen/scripts/generate_tb.py
    instructions:
    - Compare prdata, pready, pslverr, irq, and exposed count/debug state against FunctionalModel.
    - Emit structured scoreboard events for each scenario.
    criteria:
    - All declared scenarios run and produce FL-vs-RTL comparison evidence.
    source_refs:
    - test_requirements.scenarios
    - function_model
    - cycle_model
    priority: high
    required: true
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
  - name: verify_ssot
    command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" timer --root "$ATLAS_PROJECT_ROOT" --mode ${ATLAS_RUN_MODE:-signoff}
    description: Validate SSOT structure, Preview fields, and quality gates at the selected Run Mode
  - name: handoff_fl_model
    command: /ssot-fl-model timer
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals timer
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl timer
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb timer
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
