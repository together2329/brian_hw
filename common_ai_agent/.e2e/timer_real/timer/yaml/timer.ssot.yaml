    output: APB error RTL and negative tests.
  - yaml: quality_gates
    output: ATLAS pass/fail criteria and evidence ledger.
  - yaml: function_model
    output: RTL behavior and TB reference model
  - yaml: cycle_model
    output: RTL handshake/pipeline timing and waveform checks
  - yaml: function_model/cycle_model/test_requirements
    output: verify/equivalence_goals.json and FL-vs-RTL scoreboard contracts
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: security
    output: Threat mitigations and negative tests
  - yaml: error_handling
    output: Fault RTL paths and DV error scenarios
  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
workflow_todos:
  ssot-gen:
  - id: SSOT_TIMER_VALIDATE_STARTER
    content: Validate starter SSOT and allow deterministic repair defaults where needed.
    detail: Run starter SSOT validation for timer and keep semantic timer behavior from requirements intact.
    command: /to-ssot timer
    script: $ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/check_ssot_disk.sh
    run_command: bash "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/check_ssot_disk.sh" timer --root "$ATLAS_PROJECT_ROOT" --mode starter
    instructions:
    - Validate YAML parse and required starter sections.
    - Do not replace timer semantics with fixed template behavior.
    criteria:
    - timer/yaml/timer.ssot.yaml exists and parses.
    - function_model has non-empty state_variables, transactions, and invariants.
    source_refs:
    - timer/req/timer_requirements.md
    priority: high
    required: true
  rtl-gen:
  - id: RTL_TIMER_TOP_AND_PORTS
    content: Implement timer top module ports and reset behavior.
    detail: Create rtl/timer.sv with pclk, presetn, APB-style slave ports, irq output, active-low reset, and integration wiring to timer_regs and timer_core as declared by io_list and integration.connections.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Use io_list port names and widths exactly.
    - Reset load_q, enable_q, count_q, irq, prdata, pready, and pslverr to zero.
    - Wire timer_regs and timer_core according to integration.connections.
    criteria:
    - rtl/timer.sv module name is timer and compiles standalone.
    - Active-low reset implements rtl_contract.reset_behavior.
    - Top ports match io_list.
    source_refs:
    - top_module
    - io_list
    - rtl_contract.reset_behavior
    - integration.connections
    owner_module: timer
    owner_file: rtl/timer.sv
    priority: high
    required: true
  - id: RTL_TIMER_REG_DECODE
    content: Implement APB-style LOAD, CTRL, STATUS, and unmapped access behavior.
    detail: In timer_regs, accept transfers when psel && penable, update LOAD at 0x0, update CTRL.ENABLE at 0x4, return STATUS/count_q at 0x8, ignore STATUS writes, ignore CTRL reserved bits, and assert pslverr for unmapped addresses.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - pready must be asserted during accepted APB access phase.
    - STATUS reads must return current count_q with no side effects.
    - Unmapped accesses must not change architectural state.
    criteria:
    - LOAD write changes load_q only.
    - CTRL write changes enable_q bit 0 only.
    - STATUS read prdata equals count_q.
    - Unmapped APB transfer asserts pslverr and preserves state.
    source_refs:
    - registers.register_list
    - function_model.transactions.FM_APB_WRITE_LOAD
    - function_model.transactions.FM_APB_WRITE_CTRL
    - function_model.transactions.FM_APB_READ_STATUS
    - function_model.transactions.FM_APB_UNMAPPED_ACCESS
    - error_handling.error_sources
    owner_module: timer_regs
    owner_file: rtl/timer_regs.sv
    priority: high
    required: true
  - id: RTL_TIMER_COUNTER_CORE
    content: Implement enable-controlled decrement, reload, hold, and irq pulse logic.
    detail: In timer_core, while enable_q is 1 decrement count_q each pclk cycle when count_q>0; when enable_q is 1 and count_q==0 assert irq for one cycle and reload count_q from load_q; when enable_q is 0 hold count_q and keep irq low.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Match function_model state_updates for FM_TICK_DECREMENT, FM_TICK_RELOAD_IRQ, and FM_DISABLED_HOLD.
    - irq must be exactly one pclk cycle per zero reload event.
    - Counter must remain disabled and zero after reset until software enables it.
    criteria:
    - Enabled nonzero count decrements by one per cycle.
    - Enabled zero count reloads from LOAD and pulses irq high for one cycle.
    - Disabled state holds count_q and keeps irq low.
    - FL-vs-RTL scoreboard comparisons pass for counter and irq scenarios.
    source_refs:
    - function_model.transactions.FM_TICK_DECREMENT
    - function_model.transactions.FM_TICK_RELOAD_IRQ
    - function_model.transactions.FM_DISABLED_HOLD
    - cycle_model.pipeline.TICK_DECREMENT
    - cycle_model.pipeline.TICK_RELOAD_IRQ
    - interrupts.sources.TIMER_ZERO
    owner_module: timer_core
    owner_file: rtl/timer_core.sv
    priority: high
    required: true
  - id: RTL_TIMER_SCOREBOARD_EVENTS
    content: Preserve signals needed for structured scoreboard events and debug observability.
    detail: Ensure implementation exposes or makes observable pclk, presetn, APB controls, prdata, pready, pslverr, irq, load_q, enable_q, and count_q for cocotb/pyuvm checks.
    command: /gen-rtl timer
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    instructions:
    - Do not optimize away required observation points in simulation builds.
    - Align event timing with debug_observability.trace_events.
    criteria:
    - Structured scoreboard events can be emitted for reset, LOAD write, ENABLE write, STATUS read, and irq pulse.
    - Waveform probes listed in debug_observability are available.
    source_refs:
    - debug_observability.waveform_must_probe
    - debug_observability.trace_events
    - test_requirements.scenarios
    owner_module: timer
    owner_file: rtl/timer.sv
    priority: medium
    required: true
  tb-gen:
  - id: TB_TIMER_COCOTB_PYUVW_SCOREBOARD
    content: Generate cocotb/pyuvm tests with FL-vs-RTL scoreboard for timer scenarios.
    detail: Use function_model and cycle_model to predict STATUS, irq, pslverr, and register state for all declared scenarios.
    command: /ssot-tb timer
    script: $ATLAS_WORKFLOW_ROOT/tb-gen/scripts/derive_tb_todos.py
    instructions:
    - Generate tests for reset, load/enable/decrement, irq reload pulse, disable hold, and unmapped APB error.
    - Emit structured scoreboard events for trace_events.
    criteria:
    - All test_requirements.scenarios execute.
    - FL-vs-RTL comparison reports no mismatches.
    source_refs:
    - function_model
    - cycle_model
    - test_requirements.scenarios
    priority: high
    required: true
  sim_debug: []
generation_flow:
  steps:
  - name: verify_ssot
    command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" timer --root "$ATLAS_PROJECT_ROOT" --mode ${ATLAS_RUN_MODE:-signoff}
    description: Validate SSOT structure, Preview fields, and quality gates at the selected Run Mode
  - name: handoff_fl_model
    command: /ssot-fl-model timer
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals timer
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl timer
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb timer
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
rtl_contract_additional:
  mismatch_ownership:
    prdata_or_pready_mismatch: timer_regs
    register_write_mismatch: timer_regs
    count_or_irq_mismatch: timer_core
    reset_mismatch: timer_core and timer_regs
