test_requirements:
  scenarios:
  - id: SC01
    name: reset contract
    stimulus: Assert and release the declared reset while all external interfaces remain idle.
    expected: Architectural state, status, outputs, and debug observability match function_model reset outputs.
    checker: Reset checker compares all declared reset-visible state against function_model and cycle_model reset rules.
    coverage:
    - function_model.reset
    - cycle_model.reset
  - id: SC02
    name: primary approved behavior
    stimulus: Drive a legal request, transaction, command, packet, or CSR operation from function_model primary preconditions.
    expected: Externally observable result/status/side effects match the function_model primary transaction.
    checker: FL-vs-RTL scoreboard compares observable outputs and state updates from the locked function_model.
    coverage:
    - function_model.primary
    - features
    - dataflow
  - id: SC03
    name: cycle handshake and backpressure
    stimulus: Apply legal stalls or delayed handshakes on every declared cycle_model interface phase.
    expected: Payloads remain stable, ordering is preserved, and completion timing respects cycle_model latency/backpressure rules.
    checker: Protocol monitor and scoreboard check cycle_model.handshake_rules, ordering, and latency budget.
    coverage:
    - cycle_model.handshake_rules
    - cycle_model.ordering
    - backpressure
  - id: SC04
    name: error and recovery policy
    stimulus: Inject each declared error_handling.error_sources condition where the interface can represent it.
    expected: Error/status/response/recovery behavior follows error_handling without corrupting unrelated architectural state.
    checker: Negative checker compares error result and recovery state against function_model error_cases.
    coverage:
    - error_handling.error_sources
    - function_model.error_cases
  - id: SC05
    name: debug and trace observability
    stimulus: Run nominal and error flows while sampling every debug_observability waveform/status/trace point.
    expected: Debug/status/trace events reflect committed SSOT-visible state without exposing unsupported behavior.
    checker: Waveform/trace checker validates debug_observability entries and traceability.yaml_to_output rows.
    coverage:
    - debug_observability
    - traceability
  - id: SC06
    name: function_model transaction FM_APB_WRITE_LOAD
    stimulus: Drive preconditions for function_model transaction `FM_APB_WRITE_LOAD`.
    expected: Outputs and side effects match `FM_APB_WRITE_LOAD` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_WRITE_LOAD
  - id: SC07
    name: function_model transaction FM_APB_WRITE_CTRL
    stimulus: Drive preconditions for function_model transaction `FM_APB_WRITE_CTRL`.
    expected: Outputs and side effects match `FM_APB_WRITE_CTRL` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_WRITE_CTRL
  - id: SC08
    name: function_model transaction FM_APB_READ_STATUS
    stimulus: Drive preconditions for function_model transaction `FM_APB_READ_STATUS`.
    expected: Outputs and side effects match `FM_APB_READ_STATUS` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_READ_STATUS
  - id: SC09
    name: function_model transaction FM_TICK_DECREMENT
    stimulus: Drive preconditions for function_model transaction `FM_TICK_DECREMENT`.
    expected: Outputs and side effects match `FM_TICK_DECREMENT` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_TICK_DECREMENT
  - id: SC10
    name: function_model transaction FM_TICK_RELOAD_IRQ
    stimulus: Drive preconditions for function_model transaction `FM_TICK_RELOAD_IRQ`.
    expected: Outputs and side effects match `FM_TICK_RELOAD_IRQ` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_TICK_RELOAD_IRQ
  - id: SC11
    name: function_model transaction FM_DISABLED_HOLD
    stimulus: Drive preconditions for function_model transaction `FM_DISABLED_HOLD`.
    expected: Outputs and side effects match `FM_DISABLED_HOLD` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_DISABLED_HOLD
  - id: SC12
    name: function_model transaction FM_APB_UNMAPPED_ACCESS
    stimulus: Drive preconditions for function_model transaction `FM_APB_UNMAPPED_ACCESS`.
    expected: Outputs and side effects match `FM_APB_UNMAPPED_ACCESS` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_UNMAPPED_ACCESS
  scoreboard_checks: 12
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Cover APB register writes/reads, enabled decrement, zero reload irq, disabled hold, and unmapped error.
      bins:
      - id: FCOV_WRITE_LOAD
        source_ref: function_model.transactions.FM_APB_WRITE_LOAD
        class: transaction
        description: LOAD register write accepted.
      - id: FCOV_WRITE_CTRL
        source_ref: function_model.transactions.FM_APB_WRITE_CTRL
        class: transaction
        description: CTRL.ENABLE write accepted for both 0 and 1 values.
      - id: FCOV_STATUS_READ
        source_ref: function_model.transactions.FM_APB_READ_STATUS
        class: transaction
        description: STATUS read compared against count_q.
      - id: FCOV_DECREMENT
        source_ref: function_model.transactions.FM_TICK_DECREMENT
        class: transaction
        description: Enabled nonzero decrement observed.
      - id: FCOV_RELOAD_IRQ
        source_ref: function_model.transactions.FM_TICK_RELOAD_IRQ
        class: transaction
        description: Zero reload and irq pulse observed.
      - id: FCOV_DISABLED_HOLD
        source_ref: function_model.transactions.FM_DISABLED_HOLD
        class: transaction
        description: Disabled hold observed.
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cover APB access timing and timer tick/reload cycle behavior.
      bins:
      - id: CCOV_APB_ACCESS
        source_ref: cycle_model.pipeline.APB_ACCESS
        class: pipeline_stage
        description: APB access phase ready/error/read behavior observed.
      - id: CCOV_TICK_DECREMENT
        source_ref: cycle_model.pipeline.TICK_DECREMENT
        class: pipeline_stage
        description: Decrement cycle observed.
      - id: CCOV_TICK_RELOAD_IRQ
        source_ref: cycle_model.pipeline.TICK_RELOAD_IRQ
        class: pipeline_stage
        description: Reload irq pulse cycle observed.
      - id: CCOV_IRQ_ONE_CYCLE
        source_ref: cycle_model.latency.irq_pulse
        class: latency
        description: irq pulse width is exactly one cycle.
    code: line >= 85%, branch >= 80% for starter flow when implementation exists.
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
quality_gates:
  ssot:
    pass: Starter SSOT parses, includes top_module/io_list/function_model and required validation sections, and can be repaired for deterministic defaults.
    evidence:
    - timer/yaml/timer.ssot.yaml
    - ssot validation report
  rtl:
    pass: DUT-only compile and DUT-only lint pass, and RTL implements function_model/cycle_model behavior.
    evidence:
    - DUT compile report
    - DUT lint report
    - RTL provenance report
  rtl_gen:
    profile: standard
    pass: rtl-gen derives timer-specific TODOs and emits RTL implementing register decode, counter, reload, irq pulse, and reset behavior from this SSOT.
    evidence:
    - timer/rtl/rtl_todo_plan.json
    - timer/rtl/rtl_authoring_provenance.json
  dv:
    pass: cocotb/pyuvm tests produce structured scoreboard events and FL-vs-RTL comparisons for reset, load/enable/decrement, irq reload, disable hold, and unmapped error.
    evidence:
    - sim scoreboard log
    - structured scoreboard events
    - FL-vs-RTL comparison report
  coverage:
    pass: Functional and cycle coverage bins declared in test_requirements.coverage_goals are hit or waived.
    evidence:
    - coverage report
    - function coverage bins
    - cycle coverage bins
  eda:
    pass: Starter EDA constraints are present and synthesis/timing reports can be generated when downstream EDA flow is run.
    evidence:
    - timer/sdc/timer.sdc
    - synthesis report
    - timing report
  signoff:
    pass: Signoff requires no open SSOT semantic blockers, no unwaived failing quality gates, and validated traceability from requirements to RTL/DV evidence.
    evidence:
    - ssot validation report
    - quality gate summary
    - traceability matrix
