memory:
  instances:
  - name: context_table
    type: register_file
    depth: 15
    width: 512
    read_ports: 2
    write_ports: 1
    latency: 0
    description: Per-context assembly state incl. 16B first/last header snapshots and partial 256-bit pack buffer
  - name: descriptor_fifo
    type: fifo
    depth: 8
    width: 512
    read_ports: 1
    write_ports: 1
    latency: 0
    description: Completed-message descriptor + first/last header snapshots until pop
  note: Payload bytes live in EXTERNAL 256-bit SRAM via sram_write/sram_read; not stored inside this IP.
interrupts:
  sources:
  - name: descriptor_ready
    bit: 0
    type: level
    enable_reg: INTR_ENABLE[0]
    status_reg: INTR_STATUS
    clear: W1C
    description: A completed descriptor is available
  - name: packet_drop
    bit: 1
    type: level
    enable_reg: INTR_ENABLE[1]
    status_reg: INTR_STATUS
    clear: W1C
    description: A packet drop occurred
  - name: assembly_drop
    bit: 2
    type: level
    enable_reg: INTR_ENABLE[2]
    status_reg: INTR_STATUS
    clear: W1C
    description: An assembly drop occurred
  - name: context_timeout
    bit: 3
    type: level
    enable_reg: INTR_ENABLE[3]
    status_reg: INTR_STATUS
    clear: W1C
    description: A context timed out
  - name: sram_overflow
    bit: 4
    type: level
    enable_reg: INTR_ENABLE[4]
    status_reg: INTR_STATUS
    clear: W1C
    description: SRAM allocation/write overflow
  - name: descriptor_queue_full
    bit: 5
    type: level
    enable_reg: INTR_ENABLE[5]
    status_reg: INTR_STATUS
    clear: W1C
    description: Descriptor queue full at EOM
  - name: axi_write_malformed
    bit: 6
    type: level
    enable_reg: INTR_ENABLE[6]
    status_reg: INTR_STATUS
    clear: W1C
    description: Malformed AXI write/TLP
  - name: axi_read_error
    bit: 7
    type: level
    enable_reg: INTR_ENABLE[7]
    status_reg: INTR_STATUS
    clear: W1C
    description: AXI read error (SLVERR)
  - name: fatal_internal_error
    bit: 8
    type: level
    enable_reg: INTR_ENABLE[8]
    status_reg: INTR_STATUS
    clear: W1C
    description: Internal consistency failure
  output:
    signal: irq
    polarity: active_high
    type: level
fsm:
  ingress_fsm:
    states:
    - IDLE
    - ACCEPT_AW
    - COLLECT_W
    - CHECK_LEGAL
    - EMIT_TLP
    - RESP_B
    transitions:
    - from: IDLE
      to: ACCEPT_AW
      condition: awvalid && awready
    - from: ACCEPT_AW
      to: COLLECT_W
      condition: AWSIZE==5 && AWBURST==INCR
    - from: ACCEPT_AW
      to: RESP_B
      condition: illegal AWSIZE/AWBURST (PD_MALFORMED_TLP)
    - from: COLLECT_W
      to: CHECK_LEGAL
      condition: wlast && wvalid && wready
    - from: CHECK_LEGAL
      to: EMIT_TLP
      condition: beat-count/WSTRB/length legal
    - from: CHECK_LEGAL
      to: RESP_B
      condition: malformed (PD_MALFORMED_TLP)
    - from: EMIT_TLP
      to: RESP_B
      condition: TLP bytes emitted to parser
    - from: RESP_B
      to: IDLE
      condition: bvalid && bready (OKAY)
  context_fsm:
    states:
    - IDLE
    - ASSEMBLING
    - ERROR
    - DONE_WAIT_DESCRIPTOR_POP
    transitions:
    - from: IDLE
      to: ASSEMBLING
      condition: accepted SOM=1,EOM=0 allocates slot
    - from: IDLE
      to: DONE_WAIT_DESCRIPTOR_POP
      condition: accepted SOM=1,EOM=1 single-packet completes
    - from: ASSEMBLING
      to: ASSEMBLING
      condition: accepted SOM=0,EOM=0 append, seq ok
    - from: ASSEMBLING
      to: DONE_WAIT_DESCRIPTOR_POP
      condition: accepted SOM=0,EOM=1 completes; descriptor pushed
    - from: ASSEMBLING
      to: ERROR
      condition: AD_* assembly drop (dup SOM/seq/overflow/sram/timeout)
    - from: DONE_WAIT_DESCRIPTOR_POP
      to: IDLE
      condition: descriptor copied/popped
    - from: ERROR
      to: IDLE
      condition: clear policy releases the slot
  axi_read_fsm:
    states:
    - IDLE
    - ACCEPT_AR
    - ISSUE_SRAM_RD
    - WAIT_SRAM_RSP
    - DRIVE_R
    - DONE
    transitions:
    - from: IDLE
      to: ACCEPT_AR
      condition: arvalid && arready
    - from: ACCEPT_AR
      to: ISSUE_SRAM_RD
      condition: ARSIZE==5 && in window && (descriptor present or raw_sram_debug_read_enable)
    - from: ACCEPT_AR
      to: DRIVE_R
      condition: out-of-window/no-descriptor -> SLVERR
    - from: ISSUE_SRAM_RD
      to: WAIT_SRAM_RSP
      condition: sram_rd_req accepted
    - from: WAIT_SRAM_RSP
      to: DRIVE_R
      condition: sram_rd_rsp_valid
    - from: DRIVE_R
      to: ISSUE_SRAM_RD
      condition: rvalid && rready && !rlast
    - from: DRIVE_R
      to: DONE
      condition: rvalid && rready && rlast
    - from: DONE
      to: IDLE
      condition: next
timing:
  target_clocks:
  - name: axi_aclk
    frequency_mhz: 400
    duty_cycle: 0.5
    uncertainty_ns: 0.1
  - name: pclk
    frequency_mhz: 100
    duty_cycle: 0.5
    uncertainty_ns: 0.1
  latency_budget:
    register_access_cycles:
      min: 1
      max: 2
      measured_from: psel && penable
      measured_to: pready
    interrupt_latency_cycles:
      min: 2
      max: 5
      measured_from: terminal event in axi_aclk
      measured_to: irq assertion after CDC
    transfer_latency_cycles:
      min: 1
      max: null
      note: Unbounded under SRAM/AXI backpressure
  throughput:
    sustained_beats_per_cycle: 1
    conditions: No backpressure, full 256-bit payload words
  timing_exceptions: []
  io_delays:
    inputs:
    - ports: all_inputs_except_clocks_resets
      clock: axi_aclk
      delay_ns: 0.25
      source: system-level timing budget
    outputs:
    - ports: all_outputs
      clock: axi_aclk
      delay_ns: 0.25
      source: system-level timing budget
  false_paths:
  - from: axi_aresetn
    to: all_registers
    reason: async reset assertion
  - from: presetn
    to: all_registers
    reason: async reset assertion
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports:
    - sta/out/setup.rpt
    - sta/out/hold.rpt
    - sta/out/wns.json
power:
  domains:
  - name: PD_CORE
    voltage: nominal
    clock_domains:
    - axi_aclk
    - pclk
    isolation: not_required_single_supply
  clock_gating:
    required: false
    rationale: No explicit low-power mode in this revision
  reset_retention:
    retention_required: false
    reset_value_source: registers and function_model state_variables
  power_states:
  - name: 'ON'
    entry: reset deasserted
    exit: reset asserted
    guarantees:
    - All architectural behavior active
  upf_required: false
security:
  classification: non_secure_datapath_ip
  assets:
  - name: payload_sram
    protection: Only assembled MCTP payload bytes written; never header/pad/digest
  - name: register_map
    protection: APB access control is external to this IP
  threat_model:
  - threat: malformed TLP corrupts assembly
    mitigation: drop classification + drop-priority ordering, no side effects on packet drop
  - threat: context cross-contamination under interleaving
    mitigation: per-context isolated SRAM range + partial-word state + key match
  - threat: out-of-range firmware read leaks SRAM
    mitigation: SLVERR for out-of-window / no-descriptor reads unless raw_sram_debug_read_enable
  privilege_model: External bus fabric enforces privilege; no internal privilege levels
  safety_goals:
  - No header/pad/digest byte is ever published as payload
  - An earlier packet-format failure is never hidden by a later assembly failure
error_handling:
  error_sources:
  - id: PD_DISABLED_DROP_MODE
    condition: enable=0 and drop_when_disabled=1
    architectural_effect: packet drop; pd_disabled_drop_mode_count++; last_drop_class=packet
  - id: PD_MALFORMED_TLP
    condition: empty/bad AWSIZE/AWBURST/interleave/beat-count/WLAST/WSTRB/<16B/>MAX_TLP_BYTES/length-inconsistent/unstripped-digest
    architectural_effect: packet drop; pd_malformed_tlp_count++; axi_write_malformed interrupt
  - id: PD_UNSUPPORTED_VDM
    condition: not supported Non-Flit VDM / msg_code!=0x7F / vendor!=0x1AB4 / vdm_code!=0x0 / unsupported routing/TC/attr
    architectural_effect: packet drop; pd_unsupported_vdm_count++
  - id: PD_BAD_MCTP_HEADER
    condition: header absent / version!=1 / SOM without body byte / IC policy reject
    architectural_effect: packet drop; pd_bad_mctp_header_count++
  - id: PD_BAD_PAD_OR_ALIGNMENT
    condition: pad>3 / pad!=0 on non-EOM / TU/payload alignment or size violations
    architectural_effect: packet drop; pd_bad_pad_or_alignment_count++
  - id: PD_DEST_EID_REJECT
    condition: dest EID fails filter
    architectural_effect: packet drop; pd_dest_eid_reject_count++
  - id: PD_UNEXPECTED_MIDDLE_END
    condition: middle/end with no active context / EOM without SOM
    architectural_effect: packet drop; pd_unexpected_middle_end_count++
  - id: PD_BAD_OR_EXPIRED_TAG
    condition: tag policy reject / context-table-full for new SOM
    architectural_effect: packet drop; pd_bad_or_expired_tag_count++
  - id: AD_DUPLICATE_SOM
    condition: SOM for an already-active key
    architectural_effect: assembly drop; abort context; ad_duplicate_som_count++; assembly_drop interrupt
  - id: AD_SEQUENCE_MISMATCH
    condition: seq != expected modulo-4
    architectural_effect: assembly drop; abort context; ad_sequence_mismatch_count++
  - id: AD_MESSAGE_OVERFLOW
    condition: append exceeds MAX_MESSAGE_BYTES
    architectural_effect: assembly drop; ad_message_overflow_count++
  - id: AD_SRAM_OVERFLOW
    condition: alloc/write exceeds sram_base/limit or SRAM_ADDR_WIDTH
    architectural_effect: assembly drop; ad_sram_overflow_count++; sram_overflow interrupt
  - id: AD_DESCRIPTOR_FULL
    condition: descriptor queue full at EOM
    architectural_effect: assembly drop; ad_descriptor_full_count++; descriptor_queue_full interrupt
  - id: AD_TIMEOUT
    condition: context age exceeds assembly_timeout_cycles
    architectural_effect: assembly drop; ad_timeout_count++; context_timeout interrupt
  propagation:
  - 'Drop priority order (first matching class wins): PD_DISABLED_DROP_MODE, PD_MALFORMED_TLP, PD_UNSUPPORTED_VDM, PD_BAD_MCTP_HEADER, PD_BAD_PAD_OR_ALIGNMENT, PD_DEST_EID_REJECT, PD_UNEXPECTED_MIDDLE_END, PD_BAD_OR_EXPIRED_TAG, AD_DUPLICATE_SOM, AD_SEQUENCE_MISMATCH, AD_MESSAGE_OVERFLOW, AD_SRAM_OVERFLOW, AD_DESCRIPTOR_FULL, AD_TIMEOUT.'
  - Packet drops never mutate context/header/SRAM/descriptor; assembly drops abort exactly the affected context.
  recovery:
  - action: software W1C interrupt clear + counter_clear + per-context clear policy
    clears:
    - INTR_STATUS bits
    - counters (non-sticky)
    preserves:
    - CONTROL/CFG config registers
debug_observability:
  waveform_must_probe:
  - ctx_state per context
  - sram_wr_valid/ready/addr/strb
  - descriptor push + first/last header
  - last_drop_class/last_drop_reason
  - irq
  status_outputs:
  - STATUS
  - INTR_STATUS
  trace_events:
  - name: tlp_accepted
    trigger: legal TLP accepted
  - name: message_completed
    trigger: successful EOM descriptor push
  - name: packet_drop
    trigger: any PD_* classification
  - name: assembly_drop
    trigger: any AD_* classification
  debug_registers:
  - DEBUG_CTX
  - CTX_STATE
integration:
  bus_attachment:
    control: APB4 slave (pclk)
    ingress: AXI4 write slave (axi_aclk)
    payload_read: AXI4 read slave (axi_aclk)
    payload_store: 256-bit SRAM write/read master (axi_aclk)
  connections:
  - module: mctp_assembler_v3_axi_wr_ingress
    port: axi_aclk
    signal: axi_aclk
  - module: mctp_assembler_v3_axi_wr_ingress
    port: axi_aresetn
    signal: axi_aresetn
  - module: mctp_assembler_v3_apb_regfile
    port: pclk
    signal: pclk
  - module: mctp_assembler_v3_apb_regfile
    port: presetn
    signal: presetn
  - module: mctp_assembler_v3_apb_regfile
    port: irq_o
    signal: irq
  - module: mctp_assembler_v3_sram_packer
    port: sram_wr_valid_o
    signal: sram_wr_valid
  - module: mctp_assembler_v3_context_table
    port: drop_class_o
    signal: last_drop_class
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: SoC interconnect
    illegal_access_response: pslverr for unsupported APB access; SLVERR for out-of-window AXI read
  dependencies:
    external_modules:
    - payload_sram (256-bit, byte-strobed)
    external_clocks:
    - axi_aclk
    - pclk
    external_resets:
    - axi_aresetn
    - presetn
  integration_notes:
  - SoC must provide AXI4-compliant ready/valid; one outstanding write and one outstanding read.
  - External SRAM honors byte strobes and the write-priority QoS on a shared port.
  - Interrupt controller samples irq as active-high level on pclk.
  connection_contract_status: missing machine-readable module wiring; child RTL drafts may proceed from owner packets, but top integration/signoff must stay blocked until SSOT authors integration.connections or sub_modules[].connections with module/port/signal records
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: axi_aresetn/presetn controllable in test mode
    clocks:
    - axi_aclk
    - pclk
  observability:
    required_internal_points:
    - ctx_state
    - parser_state
    - last_drop_reason
  mbist_required: false
  notes: Payload SRAM is external; context_table/descriptor_fifo are flop/regfile-based in this baseline.
synthesis:
  dialect: systemverilog_2012
  top_module: mctp_assembler_v3
  technology:
    pdk: sky130
    standard_cell_library: sky130_fd_sc_hd
    liberty_corner: ss_100C_1v40
    liberty_env: SKY130_LIB
    lef_env: SKY130_LEF
    tech_lef_env: SKY130_TLEF
    rcx_rules_env: SKY130_RCX_RULES
  constraints:
  - No inferred latches
  - All flops reset per clock_reset_domains.reset_scheme
  - No package/interface/modport/function/task/for/while constructs in generated RTL
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 400
  required_outputs:
  - syn/out/mctp_assembler_v3.json or syn/out/mctp_assembler_v3.v
  - syn/out/area.rpt
  - syn/out/timing_summary.rpt
  tool_flow: yosys
  target_technology: sky130_fd_sc_hd
  target_library: sky130_fd_sc_hd
  liberty_env_var: SKY130_LIB
  corner:
    name: sky130_fd_sc_hd__ss_100C_1v40
    process: ss
    temperature_c: 100
    voltage_v: 1.4
  library_policy: Use the SKY130_LIB environment variable to locate the SS corner Liberty file for the declared sky130_fd_sc_hd target library; synthesis and STA must stop if the file is unreadable or does not match the declared corner.
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers:
    horizontal: met3
    vertical: met2
  placement:
    density_target: 0.65
    max_displacement_um: null
  cts:
    buf_list:
    - sky130_fd_sc_hd__clkbuf_4
    - sky130_fd_sc_hd__clkbuf_8
    functional_mode_case_analysis: []
  routing:
    signal_layers:
      min: met1
      max: met5
    clock_layers:
      min: met3
      max: met5
    drc_waivers: []
  required_outputs:
  - pnr/out/routed.def
  - pnr/out/routed.v
  - pnr/out/routed.spef
  - pnr/out/pnr.report.md
  cts_buf_list:
  - sky130_fd_sc_hd__clkbuf_4
  - sky130_fd_sc_hd__clkbuf_8
coding_rules:
  verilog_style: systemverilog_2012
  file_extension: .sv
  parameter_header: rtl/mctp_assembler_v3_param.vh
  conventions:
  - nonblocking (<=) in sequential always @(posedge clk ...)
  - blocking (=) in combinational always @(*)
  - 'No latches: every combinational branch assigns all outputs (use a default)'
  - 'Active-low async reset: always @(posedge clk or negedge rst_n) with if (!rst_n)'
  - Parameterize widths (no hardcoded magic numbers)
  - Use rtl/mctp_assembler_v3_param.vh for shared parameters; include inside consuming modules
  - 'ALLOW: input logic / output logic ANSI ports and internal single-driver logic'
  - 'BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv'
  - Use localparam state encoding with logic state/next_state signals
  lint_waivers:
  - 'UNUSEDSIGNAL: explicit approved tie-offs only'
  - 'WIDTHEXPAND: byte-lane indexing in the SRAM packer'
reuse_modules: []
custom:
  note: No custom extensions; all behavior traces to req sections 2-14.
dir_structure:
  output_dirs:
    rtl: rtl/
    sim: sim/
    docs: docs/
  yaml_dir: yaml/
filelist:
  headers:
  - rtl/mctp_assembler_v3_param.vh
  rtl:
  - rtl/mctp_assembler_v3_axi_wr_ingress.sv
  - rtl/mctp_assembler_v3_pcie_vdm_parser.sv
  - rtl/mctp_assembler_v3_mctp_decoder.sv
  - rtl/mctp_assembler_v3_context_table.sv
  - rtl/mctp_assembler_v3_sram_packer.sv
  - rtl/mctp_assembler_v3_descriptor_queue.sv
  - rtl/mctp_assembler_v3_axi_rd_payload.sv
  - rtl/mctp_assembler_v3_apb_regfile.sv
  - rtl/mctp_assembler_v3_cdc_sync.sv
  - rtl/mctp_assembler_v3.sv
  sim:
  - tb/cocotb/test_mctp_assembler_v3.py
  docs:
  - docs/register_map.md
  - docs/README.md
  tb:
  - tb/cocotb/test_mctp_assembler_v3.py
  - tb/cocotb/test_runner.py
  - tb/cocotb/scoreboard.py
  coverage:
  - cov/coverage.json
test_requirements:
  scenarios:
  - id: SC_SINGLE
    name: Valid single-packet message
    stimulus: SOM=1,EOM=1 in one AXI transaction
    expected: payload assembled, descriptor published, first==last header
    checker: scoreboard vs FunctionalModel
    coverage:
    - FM_PUBLISH_DESCRIPTOR
    - S5_DESCRIPTOR
  - id: SC_FRAG
    name: Fragmented message across TLPs
    stimulus: SOM, middle(s), EOM with valid modulo-4 seq
    expected: concatenated payload, no SRAM holes, descriptor payload_len correct
    checker: SRAM write monitor byte-accurate
    coverage:
    - FM_APPEND
    - FM_PACK_SRAM
  - id: SC_INTERLEAVE
    name: Interleaved messages distinct keys
    stimulus: A:SOM B:SOM A:mid B:EOM A:EOM
    expected: independent contexts, B completes before A, partial words preserved
    checker: per-context monitor
    coverage:
    - interleaved_assembly
  - id: SC_UNALIGNED_TU
    name: TU=68B unaligned 32B continuation
    stimulus: fragment ends at offset 68
    expected: next fragment continues lane 4 of word@64, no gap
    checker: SRAM packing monitor
    coverage:
    - FM_PACK_SRAM
  - id: SC_MAX_TU
    name: Max TU 4096B over 129 beats
    stimulus: 4096B payload + 16B header
    expected: 129 W beats accepted, payload_len=4096
    checker: AXI write monitor
    coverage:
    - FM_INGEST_TLP
  - id: SC_PD_MALFORMED
    name: Malformed AXI/TLP drops
    stimulus: early WLAST / bad AWSIZE / non-contiguous WSTRB / <16B
    expected: PD_MALFORMED_TLP, no context/SRAM/descriptor side effect
    checker: drop + counter monitor
    coverage:
    - PD_MALFORMED_TLP
  - id: SC_PD_VDM
    name: Unsupported VDM constants
    stimulus: wrong msg_code/vendor/vdm_code
    expected: PD_UNSUPPORTED_VDM
    checker: drop monitor
    coverage:
    - PD_UNSUPPORTED_VDM
  - id: SC_PD_MCTP
    name: Bad MCTP header version
    stimulus: header version != 1
    expected: PD_BAD_MCTP_HEADER
    checker: drop monitor
    coverage:
    - PD_BAD_MCTP_HEADER
  - id: SC_PD_EID
    name: Dest EID reject
    stimulus: dest EID not local/broadcast/null with filter on
    expected: PD_DEST_EID_REJECT
    checker: drop monitor
    coverage:
    - PD_DEST_EID_REJECT
  - id: SC_PD_MIDDLE
    name: Middle/EOM without SOM
    stimulus: SOM=0 with no active context
    expected: PD_UNEXPECTED_MIDDLE_END
    checker: drop monitor
    coverage:
    - PD_UNEXPECTED_MIDDLE_END
  - id: SC_AD_DUP
    name: Duplicate SOM
    stimulus: SOM for active key
    expected: AD_DUPLICATE_SOM aborts exactly that context
    checker: context monitor
    coverage:
    - AD_DUPLICATE_SOM
  - id: SC_AD_SEQ
    name: Sequence mismatch
    stimulus: continuation seq != expected
    expected: AD_SEQUENCE_MISMATCH abort
    checker: context monitor
    coverage:
    - AD_SEQUENCE_MISMATCH
  - id: SC_AD_CTXFULL
    name: Context table full
    stimulus: 16th distinct fragmented SOM
    expected: PD_BAD_OR_EXPIRED_TAG (table full), no alloc
    checker: context monitor
    coverage:
    - PD_BAD_OR_EXPIRED_TAG
  - id: SC_AD_SRAM
    name: SRAM overflow
    stimulus: payload exceeds sram_limit
    expected: AD_SRAM_OVERFLOW abort
    checker: sram monitor
    coverage:
    - AD_SRAM_OVERFLOW
  - id: SC_AD_DESCFULL
    name: Descriptor queue full
    stimulus: EOM with full descriptor FIFO
    expected: AD_DESCRIPTOR_FULL, no descriptor
    checker: descriptor monitor
    coverage:
    - AD_DESCRIPTOR_FULL
  - id: SC_AD_TIMEOUT
    name: Assembly timeout
    stimulus: context age > assembly_timeout_cycles
    expected: AD_TIMEOUT abort
    checker: context monitor
    coverage:
    - AD_TIMEOUT
  - id: SC_PRIORITY
    name: Drop priority
    stimulus: packet-format failure + later assembly failure both present
    expected: earlier packet-drop reason wins
    checker: drop priority monitor
    coverage:
    - error_handling.propagation
  - id: SC_FW_READ
    name: Firmware payload read
    stimulus: AXI read using descriptor base/len
    expected: payload bytes returned, RLAST on final beat
    checker: AXI read monitor vs SRAM
    coverage:
    - FM_AXI_READ
  - id: SC_FW_READ_SLVERR
    name: Read outside window
    stimulus: AR outside SRAM read window
    expected: RRESP=SLVERR
    checker: AXI read monitor
    coverage:
    - FM_AXI_READ
  - id: SC_REG
    name: APB register access
    stimulus: write/read CONTROL/CFG/STATUS/INTR/per-Q banks
    expected: register behavior + per-Q visibility
    checker: APB register monitor
    coverage:
    - registers.register_list
  scoreboard_checks: 20
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Cycle-independent behavioral intent coverage.
      bins:
      - id: FCOV_SINGLE
        source_ref: function_model.transactions.FM_PUBLISH_DESCRIPTOR
        class: transaction
        description: Single-packet message completes and publishes a descriptor
      - id: FCOV_FRAG
        source_ref: function_model.transactions.FM_APPEND
        class: transaction
        description: Fragmented append observed
      - id: FCOV_PACK
        source_ref: function_model.transactions.FM_PACK_SRAM
        class: transaction
        description: Payload-only SRAM pack observed (byte i at base+i)
      - id: FCOV_PD_ALL
        source_ref: function_model.transactions.FM_DECODE_VDM
        class: error_case
        description: Every PD_* packet-drop reason (error_cases of FM_DECODE_VDM/FM_DECODE_MCTP) observed with no side effect
      - id: FCOV_AD_ALL
        source_ref: function_model.transactions.FM_APPEND
        class: error_case
        description: Every AD_* assembly-drop reason (error_cases of FM_ALLOC_CONTEXT/FM_APPEND) observed aborting exactly its context
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cycle/handshake/ordering/FSM coverage.
      bins:
      - id: CCOV_INGEST
        source_ref: cycle_model.pipeline.S0_INGEST
        class: pipeline_stage
        description: Ingest stage observed
      - id: CCOV_SRAM_HOLD
        source_ref: cycle_model.handshake_rules
        class: handshake
        description: sram_wr hold-until-ready observed
      - id: CCOV_DESC_ORDER
        source_ref: cycle_model.ordering
        class: ordering
        description: descriptor after final SRAM flush observed
      - id: CCOV_CTX_FSM
        source_ref: fsm.context_fsm
        class: state_transition
        description: context FSM legal transitions observed
      - id: CCOV_OUTSTANDING
        source_ref: cycle_model.performance.outstanding
        class: outstanding
        description: single outstanding read/write exercised
    functional: 'Legacy alias: function + cycle coverage must both close.'
    line: '>= 90% instrumented line coverage or explicit waiver'
    branch: '>= 85% instrumented branch coverage or explicit waiver'
    fsm: 100% declared FSM states and legal transitions covered
    assertions: All protocol/order/error assertions pass
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
quality_gates:
  ssot:
    pass: All canonical sections present, substantive, internally consistent, with no live placeholder markers.
    evidence:
    - check_ssot_disk.sh PASS
    - traceability covers function_model/cycle_model/test_requirements
  rtl:
    pass: RTL implements function_model and cycle_model, compiles, no unwaived lint.
    evidence:
    - rtl filelist
    - compile log
    - lint report
  rtl_gen:
    profile: production
    pass: SSOT-derived rtl_todo_plan has no blockers/orphans; owner-file logic present; FL-vs-RTL goal coverage and RTL-observed coverage close with fresh evidence.
    evidence:
    - rtl/rtl_todo_plan.json
    - rtl/rtl_compile.json
    - lint/dut_lint.json
    - sim/fl_rtl_goal_audit.json
    - cov/coverage.json
  dv:
    pass: Every test_requirements scenario has an executable test, expected/got checker, and coverage bin.
    evidence:
    - results.xml
    - coverage.json
    - VCD
  coverage:
    pass: Functional coverage goals pass and code/FSM/assertion meet thresholds or have approved waiver.
    evidence:
    - coverage_report.md
  eda:
    pass: Synthesis, STA, PnR, post-route STA meet SSOT targets or have signed waivers.
    evidence:
    - syn report
    - sta reports
    - pnr report
  signoff:
    pass: SSOT, RTL, lint, DV, sim, coverage, EDA gates pass with fresh evidence.
    evidence:
    - ATLAS progress signoff pass
traceability:
  yaml_to_output:
  - yaml: top_module.name
    output: ALL files (module name)
  - yaml: parameters
    output: rtl/mctp_assembler_v3_param.vh
  - yaml: io_list.interfaces
    output: rtl/mctp_assembler_v3.sv port list + adapter modules
  - yaml: registers.register_list
    output: rtl/mctp_assembler_v3_apb_regfile.sv + docs/register_map.md
  - yaml: function_model
    output: context_table/sram_packer/decoder RTL + tb/cocotb scoreboard
  - yaml: cycle_model
    output: handshake/ordering logic + waveform checks
  - yaml: error_handling
    output: drop classifier RTL + DV drop scenarios
  - yaml: fsm
    output: ingress/context/axi_read FSM logic
  - yaml: test_requirements.scenarios
    output: tb/cocotb/test_mctp_assembler_v3.py
  - yaml: function_model/cycle_model/test_requirements
    output: verify/equivalence_goals.json and FL-vs-RTL scoreboard contracts
  - yaml: timing
    output: STA constraints and latency pass/fail criteria
  - yaml: security
    output: Threat mitigations and negative tests
  - yaml: debug_observability
    output: VCD probes and sim_debug inspection
  - yaml: quality_gates
    output: ATLAS progress/signoff criteria
  change_impact_example:
    change: parameters.CONTEXT_COUNT from 15 to 31
    affected_files:
    - rtl/mctp_assembler_v3_param.vh (CONTEXT_COUNT=31)
    - rtl/mctp_assembler_v3_context_table.sv
    - rtl/mctp_assembler_v3_apb_regfile.sv (per-Q banks)
workflow_todos:
  ssot-gen:
  - id: SSOT_WRITE_VALIDATE_FROM_REQ
    content: Write and validate the canonical SSOT from the MCTP req
    detail: Behavior sources are req sections 2-14 only; the template provides schema/order.
    command: /to-ssot mctp_assembler_v3
    script: $ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py
    run_command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" mctp_assembler_v3 --root "$ATLAS_PROJECT_ROOT" --mode engineering
    instructions:
    - Trace every numeric/register/interface fact to req/mctp_assembler_v3_requirements.md.
    - Keep blockers open until verify_ssot.py --mode engineering returns zero blockers.
    criteria:
    - SSOT exists at yaml/mctp_assembler_v3.ssot.yaml with canonical top-level keys.
    - verify_ssot.py --mode engineering returns zero blockers.
    source_refs:
    - req/mctp_assembler_v3_requirements.md
    priority: high
    required: true
  fl-model-gen: []
  rtl-gen:
  - id: RTL_ASSEMBLER_PIPELINE
    content: Implement ingress->VDM->MCTP->context->pack->descriptor pipeline
    detail: Translate function_model transactions + cycle_model ordering + fsm into RTL across the manifest sub_modules.
    command: /ssot-rtl mctp_assembler_v3
    script: $ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py
    run_command: python3 "$ATLAS_WORKFLOW_ROOT/rtl-gen/scripts/derive_rtl_todos.py" mctp_assembler_v3 --root "$ATLAS_PROJECT_ROOT" --audit-rtl
    instructions:
    - Derive the dynamic RTL TODO ledger before editing RTL.
    - Implement only owner_file/owner_module behavior traced by source_refs; rerun derive --audit-rtl after edits.
    criteria:
    - Owner logic present; FunctionalModel expected vs RTL observed comparable; fresh compile/lint evidence.
    source_refs:
    - function_model.transactions
    - cycle_model.pipeline
    - fsm
    owner_module: mctp_assembler_v3
    owner_file: rtl/mctp_assembler_v3.sv
    priority: high
    required: true
  - id: RTL_TARGET_SCALE_POLICY
    content: Lock or waive RTL target-scale policy before production signoff
    detail: The SSOT is production-profile, but quality_gates.rtl_gen.target_scale has no positive structural minima and no approved target_scale_waiver is present. Reference-derived target-scale candidates are review inputs only; a human must lock the chosen minima in SSOT or explicitly approve a waiver before rtl-gen can claim PL330-level or production top signoff.
    criteria:
    - quality_gates.rtl_gen.target_scale contains at least one positive structural minimum such as source_files_min, modules_min, or depth_score_min
    - or quality_gates.rtl_gen.target_scale_waiver.approved is true with owner and reason
    - rtl_todo_plan.json target_scale_policy gate passes after rerunning rtl-gen TODO derivation
    source_refs:
    - quality_gates.rtl_gen.target_scale
    - quality_gates.rtl_gen.target_scale_waiver
    - reports/rtl_reference_profile.json
    owner_module: mctp_assembler_v3
    owner_file: rtl/mctp_assembler_v3.sv
    priority: high
    required: true
    answer_schema:
      format: YAML or JSON
      root_key: target_scale or target_scale_waiver
      target_scale_fields:
      - source_files_min
      - modules_min
      - lines_min
      - depth_score_min
      - nonconstant_assigns_min
      - procedural_blocks_min
      - instances_min
      - basis
      target_scale_waiver_required_fields:
      - approved
      - reason
      - owner
      rule: Only human-approved SSOT minima or waiver can close this gate; do not infer target scale from generated RTL.
    example_answer:
      target_scale:
        source_files_min: 4
        modules_min: 8
        lines_min: 1200
        depth_score_min: 120
        basis: Human-approved architecture review calibrated from rtl_reference_profile.json.
      target_scale_waiver:
        approved: true
        reason: Smaller variant intentionally does not enforce reference-scale minima.
        owner: human-review
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
  - name: verify_ssot
    command: python3 "$ATLAS_WORKFLOW_ROOT/ssot-gen/scripts/verify_ssot.py" mctp_assembler_v3 --root "$ATLAS_PROJECT_ROOT" --mode ${ATLAS_RUN_MODE:-signoff}
    description: Validate SSOT structure, Preview fields, and quality gates at the selected Run Mode
  - name: handoff_fl_model
    command: /ssot-fl-model mctp_assembler_v3
    description: Generate FunctionalModel, decomposition, and FCOV plan from SSOT
  - name: handoff_equivalence_goals
    command: /ssot-equiv-goals mctp_assembler_v3
    description: Derive FL-vs-RTL equivalence goals before TB generation
  - name: handoff_rtl
    command: /ssot-rtl mctp_assembler_v3
    description: Generate RTL from validated SSOT
  - name: handoff_tb
    command: /ssot-tb-cocotb mctp_assembler_v3
    description: Generate cocotb/pyuvm verification from validated SSOT
  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
