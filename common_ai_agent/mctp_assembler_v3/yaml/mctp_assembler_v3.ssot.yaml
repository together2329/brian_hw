cycle_model:
  purpose: 'Cycle/handshake contract: when valid/ready, payload writes, descriptor, and interrupts may change.'
  executable: python
  backend_policy: Use the repo-owned pure-Python deterministic stepper; FunctionalModel is the behavioral oracle.
  clock: axi_aclk
  reset:
    assertion: axi_aresetn/presetn low asynchronously clears all architectural state (contexts, queue, parser, packer, counters).
    deassertion: state usable on the first rising edge after synchronized deassertion.
  latency:
    register_read:
      min_cycles: 0
      max_cycles: 1
      description: APB read data/pready timing in pclk
    register_write:
      min_cycles: 0
      max_cycles: 1
      description: APB write acceptance timing in pclk
    single_beat_transfer:
      min_cycles: 1
      max_cycles: null
      description: AXI/SRAM handshakes; max depends on backpressure
  handshake_rules:
  - signal: s_axi_awready/s_axi_wready
    rule: Assert only when the ingress can accept the AW/W beat; deassert to backpressure when not in drop_when_disabled mode.
  - signal: s_axi_bvalid
    rule: Assert after the full TLP transaction is consumed; hold until bready.
  - signal: sram_wr_valid
    rule: Hold sram_wr_addr/data/strb stable while sram_wr_valid && !sram_wr_ready.
  - signal: sram_rd_req_valid
    rule: Issue one SRAM read request per AXI read beat; hold until sram_rd_req_ready.
  - signal: s_axi_rvalid/s_axi_rlast
    rule: Drive rdata after the SRAM read response; assert rlast on the final ARLEN beat only.
  - signal: apb pready
    rule: Complete the access phase; pslverr only with pready=1.
  pipeline:
  - stage: S0_INGEST
    cycle: 0..B
    action: Reconstruct TLP bytes from AXI W beats; legality check
  - stage: S1_VDM_DECODE
    cycle: B+1
    action: Decode/validate 16B PCIe VDM header; strip header/pad/digest
  - stage: S2_MCTP_DECODE
    cycle: B+2
    action: Decode MCTP transport header + IC/msg_type on SOM
  - stage: S3_CONTEXT
    cycle: B+3
    action: Allocate/append context by key; sequence/timeout checks
  - stage: S4_PACK
    cycle: B+4..P
    action: Pack payload bytes into 256-bit SRAM words; per-context partial word
  - stage: S5_DESCRIPTOR
    cycle: P+1
    action: On EOM push descriptor + first/last headers; raise descriptor_ready
  ordering:
  - descriptor_publish must occur only after the final SRAM payload write/flush for the message is accepted.
  - AXI read response is not issued before the corresponding SRAM read response.
  - Interrupt status updates occur on the rising edge the terminal event is recorded (after CDC into pclk for status bits).
  backpressure:
  - sram_wr_ready deassertion stalls payload writes without dropping accepted bytes unless timeout/overflow occurs.
  - SRAM write traffic for assembly has priority over firmware AXI read traffic on a shared port.
  - AXI read backpressure must not corrupt ongoing assembly writes; each context owns its own partial-word state.
  performance:
    frequency_mhz: 400
    throughput:
      sustained_beats_per_cycle: 1
      condition: No SRAM/AXI backpressure; full 256-bit payload words
    outstanding:
      read_max: 1
      write_max: 1
      description: Single outstanding AXI write and read transaction
    depth:
      pipeline_stages: 6
      queue_depth: 8
      description: Pipeline depth + descriptor FIFO depth visible to cycle coverage
  observability:
  - Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario.
clock_reset_domains:
  domains:
  - name: axi_aclk
    frequency_mhz: 400
    description: AXI/parser/assembly/SRAM domain
  - name: pclk
    frequency_mhz: 100
    description: APB control/status domain (async to axi_aclk)
  reset_scheme:
    signal: axi_aresetn,presetn
    polarity: active_low
    type: async_assert_sync_deassert
cdc_requirements:
  crossings:
  - from: axi_aclk
    to: pclk
    signals:
    - status flags
    - interrupt raw status
    - counter snapshots
    - descriptor metadata
    scheme: 2-FF synchronizer for single-bit flags; gray/handshake for multi-bit counter/descriptor reads
  - from: pclk
    to: axi_aclk
    signals:
    - CONTROL config
    - soft_reset
    - descriptor_pop
    - counter_clear
    scheme: 2-FF synchronizer + pulse stretch for command strobes
  synchronizers:
  - name: flag_sync_2ff
    stages: 2
    type: level
  - name: cmd_pulse_sync
    stages: 2
    type: pulse
  - name: bus_handshake_sync
    stages: 2
    type: req_ack
rdc_requirements:
  crossings: []
  synchronizers: []
  note: axi_aresetn and presetn each reset their own domain; no signal is reset by one domain and sampled live in the other without the cdc_requirements synchronizers.
registers:
  config:
    register_width: 32
    addr_width: 16
    byte_addressable: true
    channel_stride: 64
    channel_base: 1024
    num_channels: 15
  bit_order: lsb0
  bits_format: '[msb, lsb]'
  reserved_field_policy:
    read_value: 0
    write_effect: ignore
    rtl_requirement: Reserved fields read as zero and do not allocate storage.
  register_list:
  - name: CONTROL
    offset: 0
    width: 32
    access: rw
    reset: 0
    category: control
    description: Global control/policy
    write_side_effects:
    - soft_reset clears contexts/queue/parser/packer/read state; does not rewrite persistent config
    - descriptor_pop retires the oldest descriptor
    - counter_clear clears non-sticky counters
    fields:
    - name: enable
      bits:
      - 0
      - 0
      access: rw
      reset: 0
      write_effect: Enable AXI write ingress
      description: Ingress enable
    - name: drop_when_disabled
      bits:
      - 1
      - 1
      access: rw
      reset: 0
      write_effect: Accept+packet-drop while disabled instead of backpressure
      description: Disabled drop mode
    - name: soft_reset
      bits:
      - 2
      - 2
      access: rw
      reset: 0
      write_effect: Self-clearing soft reset pulse
      description: Soft reset
    - name: dest_filter_enable
      bits:
      - 3
      - 3
      access: rw
      reset: 0
      write_effect: Enable destination EID filtering
      description: Dest EID filter
    - name: accept_broadcast_eid
      bits:
      - 4
      - 4
      access: rw
      reset: 0
      write_effect: Accept broadcast EID
      description: Broadcast accept
    - name: accept_null_eid
      bits:
      - 5
      - 5
      access: rw
      reset: 0
      write_effect: Accept null EID
      description: Null EID accept
    - name: raw_sram_debug_read_enable
      bits:
      - 6
      - 6
      access: rw
      reset: 0
      write_effect: Allow AXI reads outside completed descriptor ranges
      description: Raw SRAM debug read
    - name: descriptor_pop
      bits:
      - 7
      - 7
      access: rw
      reset: 0
      write_effect: 1=pop oldest descriptor (self-clearing)
      description: Descriptor pop command
    - name: counter_clear
      bits:
      - 8
      - 8
      access: rw
      reset: 0
      write_effect: 1=clear counters (self-clearing)
      description: Counter clear command
    - name: local_eid
      bits:
      - 23
      - 16
      access: rw
      reset: 0
      write_effect: Configured local endpoint ID
      description: Local EID
    - name: debug_context_select
      bits:
      - 31
      - 24
      access: rw
      reset: 0
      write_effect: Select context for DEBUG_CTX mirror
      description: Debug context select
  - name: CFG_TU
    offset: 4
    width: 32
    access: rw
    reset: 268435520
    category: control
    description: Transmission unit / message size config
    fields:
    - name: transmission_unit_bytes
      bits:
      - 12
      - 0
      access: rw
      reset: 64
      write_effect: Configured TU 64..4096, 4-byte aligned
      description: TU bytes
    - name: reserved_15_13
      bits:
      - 15
      - 13
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved
    - name: max_message_bytes
      bits:
      - 28
      - 16
      access: rw
      reset: 4096
      write_effect: Max assembled message bytes
      description: Max message bytes
    - name: reserved_31_29
      bits:
      - 31
      - 29
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved
  - name: CFG_TIMEOUT
    offset: 8
    width: 32
    access: rw
    reset: 0
    category: control
    description: Assembly timeout cycles
    fields:
    - name: assembly_timeout_cycles
      bits:
      - 23
      - 0
      access: rw
      reset: 0
      write_effect: Context age limit in axi_aclk cycles (0=disabled)
      description: Timeout cycles
    - name: reserved_31_24
      bits:
      - 31
      - 24
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved
  - name: SRAM_BASE
    offset: 12
    width: 32
    access: rw
    reset: 0
    category: control
    description: Payload SRAM base byte address (bump allocator start)
    fields:
    - name: sram_base
      bits:
      - 15
      - 0
      access: rw
      reset: 0
      write_effect: Allocator start
      description: SRAM base
    - name: reserved_31_16
      bits:
      - 31
      - 16
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved
  - name: SRAM_LIMIT
    offset: 16
    width: 32
    access: rw
    reset: 65535
    category: control
    description: Payload SRAM limit byte address (exclusive)
    fields:
    - name: sram_limit
      bits:
      - 15
      - 0
      access: rw
      reset: 65535
      write_effect: Allocator limit
      description: SRAM limit
    - name: reserved_31_16
      bits:
      - 31
      - 16
      access: reserved
      reset: 0
      read_value: 0
      write_effect: ignore
      description: Reserved
  - name: STATUS
    offset: 32
    width: 32
