rtl_contract:
  transaction: FM_INGEST_TLP
  sample_condition: '1'
  input_map:
    tlp_bytes: 'axi_wr_slave.wdata/wstrb across beats, byte lane N -> wdata[8*N +: 8]'
    config: registers.CONTROL
    fw_read: axi_rd_slave.araddr/arlen
    s_axi_awaddr: s_axi_awaddr
    s_axi_awlen: s_axi_awlen
    s_axi_awsize: s_axi_awsize
    s_axi_awburst: s_axi_awburst
    s_axi_awvalid: s_axi_awvalid
    s_axi_wdata: s_axi_wdata
    s_axi_wstrb: s_axi_wstrb
    s_axi_wlast: s_axi_wlast
    s_axi_wvalid: s_axi_wvalid
    s_axi_bready: s_axi_bready
    s_axi_araddr: s_axi_araddr
    s_axi_arlen: s_axi_arlen
    s_axi_arsize: s_axi_arsize
    s_axi_arburst: s_axi_arburst
    s_axi_arvalid: s_axi_arvalid
    s_axi_rready: s_axi_rready
    paddr: paddr
    psel: psel
    penable: penable
    pwrite: pwrite
    pwdata: pwdata
    pstrb: pstrb
    sram_wr_ready: sram_wr_ready
    sram_rd_req_ready: sram_rd_req_ready
    sram_rd_rsp_data: sram_rd_rsp_data
    sram_rd_rsp_error: sram_rd_rsp_error
  output_map:
    payload_write: sram_wr_addr
    descriptor: registers.descriptor + descriptor_queue
    fw_read_data: axi_rd_slave.rdata
    interrupt: irq
    s_axi_awready: s_axi_awready
    s_axi_wready: s_axi_wready
    s_axi_bresp: s_axi_bresp
    s_axi_bvalid: s_axi_bvalid
    s_axi_arready: s_axi_arready
    s_axi_rdata: s_axi_rdata
    s_axi_rresp: s_axi_rresp
    s_axi_rlast: s_axi_rlast
    s_axi_rvalid: s_axi_rvalid
    prdata: prdata
    pready: pready
    pslverr: pslverr
    sram_wr_valid: sram_wr_valid
    sram_wr_addr: sram_wr_addr
    sram_wr_data: sram_wr_data
    sram_wr_strb: sram_wr_strb
    sram_rd_req_valid: sram_rd_req_valid
    sram_rd_req_addr: sram_rd_req_addr
    sram_rd_rsp_ready: sram_rd_rsp_ready
    irq: irq
  state_updates:
  - name: ctx_payload_byte_count
    reset: 0
    expr: increment by accepted payload bytes; clear on reset/context release
  - name: ctx_expected_seq
    reset: 0
    expr: increment modulo 4 after SOM per continuation packet
  - name: ctx_state
    reset: IDLE
    expr: IDLE/ASSEMBLING/ERROR/DONE_WAIT_DESCRIPTOR_POP per fsm.context_fsm
  owner: ssot-gen
  type: ssot_derived_rule_contract
  clock: axi_aclk
  reset: axi_aresetn
  reset_active: low
  ready_output: sram_rd_rsp_ready
  output_valid: sram_wr_valid
  contract_invariants:
  - RTL-visible behavior implements the referenced function_model transaction.
  - Input sampling and output observation follow cycle_model handshake and latency rules.
  output_rules:
  - name: bresp_next
    port: s_axi_bresp
    expr: BRESP_OKAY
    width: 2
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_wr_valid
    port: sram_wr_valid
    expr: payload_bytes > 0
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_wr_addr
    port: sram_wr_addr
    expr: ctx_payload_next_addr & ~31
    width: 16
    description: FunctionalModel output observable mapped to DUT output port.
  - name: sram_wr_strb
    port: sram_wr_strb
    expr: lane_mask(ctx_payload_next_addr & 31, payload_bytes)
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: rresp_next
    port: s_axi_rresp
    expr: RRESP_SLVERR if (out_of_window or (no_descriptor and not raw_sram_debug_read_enable)) else RRESP_OKAY
    width: 2
    description: FunctionalModel output observable mapped to DUT output port.
  - name: rlast_next
    port: s_axi_rlast
    expr: beat_index == arlen
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  unresolved_expression_refs:
  - ASSEMBLING
  - BRESP_OKAY
  - DONE_WAIT_DESCRIPTOR_POP
  - INCR
  - MAX_TLP_BYTES
  - RRESP_OKAY
  - RRESP_SLVERR
  - accept_broadcast_eid
  - accept_null_eid
  - allocated_len
  - arlen
  - awburst
  - awsize
  - beat_index
  - descriptor_queue_full
  - dest_eid
  - dest_filter_enable
  - free_slot_available
  - header_version
  - local_eid
  - mctp_byte0
  - message_code
  - no_descriptor
  - out_of_window
  - pad_len
  - payload_bytes
  - raw_sram_debug_read_enable
  - read_error
  - routing_supported
  - source_eid
  - tlp
  - tlp_byte_count
  - traffic_class
  - vdm_code
  - vendor_id
  - wlast_seen
  - wstrb_contiguous
parameters:
- name: AXI_ADDR_WIDTH
  default: 16
  type: int
  description: AXI write/read address width for ingress aperture/debug routing
  drives:
  - mctp_assembler_v3_axi_wr_ingress.sv
  - mctp_assembler_v3_axi_rd_payload.sv
- name: AXI_DATA_WIDTH
  default: 256
  type: int
  description: AXI WDATA/RDATA width; fixed at 256 for this target
  drives:
  - mctp_assembler_v3_axi_wr_ingress.sv
  - mctp_assembler_v3_axi_rd_payload.sv
- name: AXI_STRB_WIDTH
  default: 32
  type: int
  description: AXI WSTRB width derived from data width (256/8)
  drives:
  - mctp_assembler_v3_axi_wr_ingress.sv
- name: SRAM_ADDR_WIDTH
  default: 16
  type: int
  description: Byte-addressed SRAM address width
  drives:
  - mctp_assembler_v3_sram_packer.sv
  - mctp_assembler_v3_axi_rd_payload.sv
- name: SRAM_DATA_WIDTH
  default: 256
  type: int
  description: SRAM write/read data width; fixed at 256 for this target
  drives:
  - mctp_assembler_v3_sram_packer.sv
- name: CONTEXT_COUNT
  default: 15
  type: int
  description: Maximum active fragmented MCTP assemblies / context table entries
  drives:
  - mctp_assembler_v3_context_table.sv
  - mctp_assembler_v3_apb_regfile.sv
- name: TLP_HEADER_SNAPSHOT_BYTES
  default: 16
  type: int
  description: Raw Non-Flit TLP/VDM/MCTP-transport header bytes saved as first/last snapshot
  drives:
  - mctp_assembler_v3_context_table.sv
  - mctp_assembler_v3_descriptor_queue.sv
- name: MIN_TRANSMISSION_UNIT_BYTES
  default: 64
  type: int
  description: Minimum configurable MCTP transmission unit
  drives:
  - mctp_assembler_v3_pcie_vdm_parser.sv
- name: MAX_TRANSMISSION_UNIT_BYTES
  default: 4096
  type: int
  description: Maximum configurable MCTP transmission unit
  drives:
  - mctp_assembler_v3_pcie_vdm_parser.sv
- name: TRANSMISSION_UNIT_ALIGN_BYTES
  default: 4
  type: int
  description: Required alignment for configured TU and non-final packet payload
  drives:
  - mctp_assembler_v3_pcie_vdm_parser.sv
- name: MAX_TLP_BYTES
  default: 4112
  type: int
  description: 'Max stored bytes per TLP: 16B header + 4096B TU (digest stripped upstream)'
  drives:
  - mctp_assembler_v3_axi_wr_ingress.sv
- name: MAX_TLP_BEATS
  default: 129
  type: int
  description: Max 256-bit AXI W beats for MAX_TLP_BYTES
  drives:
  - mctp_assembler_v3_axi_wr_ingress.sv
- name: MAX_MESSAGE_BYTES
  default: 4096
  type: int
  description: Maximum assembled message body bytes
  drives:
  - mctp_assembler_v3_context_table.sv
- name: BASELINE_MTU_BYTES
  default: 64
  type: int
  description: Baseline MCTP transmission unit size
  drives:
  - mctp_assembler_v3_apb_regfile.sv
- name: DESCRIPTOR_FIFO_DEPTH
  default: 8
  type: int
  description: Completed-message descriptor/header queue depth
  drives:
  - mctp_assembler_v3_descriptor_queue.sv
- name: TIMEOUT_COUNTER_WIDTH
  default: 24
  type: int
  description: Assembly timeout counter width
  drives:
  - mctp_assembler_v3_context_table.sv
- name: RESET_POLARITY
  default: active_low
  type: enum
  values:
  - active_low
  - active_high
  description: Reset polarity for all .sv files
  drives:
  - ALL .sv files
io_list:
  clock_domains:
  - name: axi_aclk
    frequency_mhz: 400
    description: AXI ingress/parser/assembly/SRAM clock
    ports:
    - name: axi_aclk
      width: 1
      direction: input
      description: AXI domain clock
  - name: pclk
    frequency_mhz: 100
    description: APB control/status clock (may be async to axi_aclk)
    ports:
    - name: pclk
      width: 1
      direction: input
      description: APB domain clock
  resets:
  - name: axi_aresetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: AXI domain reset
    ports:
    - name: axi_aresetn
      width: 1
      direction: input
      description: Active-low AXI reset
  - name: presetn
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: APB domain reset
    ports:
    - name: presetn
      width: 1
      direction: input
      description: Active-low APB reset
  interfaces:
  - name: axi_wr_slave
    type: AXI4
    role: slave
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: PCIe VDM TLP ingress; one write transaction == one TLP; no IDs, single outstanding
    protocol:
      aw_rule: Accept AW when awvalid && awready; AWSIZE must be 5 (32B/beat), AWBURST must be INCR; expected W beats = AWLEN+1.
      w_rule: 'Sample wdata/wstrb on wvalid && wready; byte lane N maps to wdata[8*N +: 8]; full beats use all 32 strobes; final beat contiguous from lane 0; WLAST asserts exactly on the final expected beat.'
      b_rule: After transaction is consumed, return BRESP=OKAY on bvalid && bready; packet/protocol failures are reported via drop/error status, not AXI retry.
      outstanding_rule: Single outstanding write transaction; no write interleaving.
    ports:
    - name: s_axi_awaddr
      width: 16
      direction: input
      description: Ingress aperture address (debug capture only)
    - name: s_axi_awlen
      width: 8
      direction: input
      description: Burst length minus 1
    - name: s_axi_awsize
      width: 3
      direction: input
      description: Burst size; must be 5 (32B)
    - name: s_axi_awburst
      width: 2
      direction: input
      description: Burst type; must be INCR
    - name: s_axi_awvalid
      width: 1
      direction: input
      description: AW valid
    - name: s_axi_awready
      width: 1
      direction: output
      description: AW ready
    - name: s_axi_wdata
      width: 256
      direction: input
      description: Write data beat (TLP bytes)
    - name: s_axi_wstrb
      width: 32
      direction: input
      description: Write byte strobes
    - name: s_axi_wlast
      width: 1
      direction: input
      description: Final beat of the TLP
    - name: s_axi_wvalid
      width: 1
      direction: input
      description: W valid
    - name: s_axi_wready
      width: 1
      direction: output
      description: W ready
    - name: s_axi_bresp
      width: 2
      direction: output
      description: Write response (OKAY when consumed)
    - name: s_axi_bvalid
      width: 1
      direction: output
      description: B valid
    - name: s_axi_bready
      width: 1
      direction: input
      description: B ready
  - name: axi_rd_slave
    type: AXI4
    role: slave
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: Firmware payload read path from payload SRAM; no IDs, single outstanding
    protocol:
      ar_rule: Accept AR when arvalid && arready; ARSIZE must be 5 (32B/beat), ARBURST must be INCR.
      r_rule: Drive rdata on rvalid && rready; one SRAM read per R beat; RLAST asserts on the final beat (ARLEN).
      response_rule: RRESP=SLVERR for reads outside the SRAM read window, or to a payload range with no completed descriptor unless raw_sram_debug_read_enable=1.
      outstanding_rule: Single outstanding read transaction; reads may stall behind SRAM writes (write priority).
    ports:
    - name: s_axi_araddr
      width: 16
      direction: input
      description: Read address (32B aligned)
    - name: s_axi_arlen
      width: 8
      direction: input
      description: Burst length minus 1
    - name: s_axi_arsize
      width: 3
      direction: input
      description: Burst size; must be 5 (32B)
    - name: s_axi_arburst
      width: 2
      direction: input
      description: Burst type; must be INCR
    - name: s_axi_arvalid
      width: 1
      direction: input
      description: AR valid
    - name: s_axi_arready
      width: 1
      direction: output
      description: AR ready
    - name: s_axi_rdata
      width: 256
      direction: output
      description: Read data beat
    - name: s_axi_rresp
      width: 2
      direction: output
      description: Read response
    - name: s_axi_rlast
      width: 1
      direction: output
      description: Final read beat
    - name: s_axi_rvalid
      width: 1
      direction: output
      description: R valid
    - name: s_axi_rready
      width: 1
      direction: input
      description: R ready
  - name: apb_slave
    type: APB4
    role: slave
    clock_domain: pclk
    reset_domain: presetn
    description: Control/status/interrupt/counter/descriptor/debug register access
    protocol:
      setup_phase: psel=1, penable=0 captures address/control.
      access_phase: psel=1, penable=1 completes when pready=1.
      read_rule: prdata valid in the completing access phase for reads.
      write_rule: pwdata/pstrb sampled in the completing access phase for writes.
      error_rule: pslverr asserted only with pready=1 for illegal/unsupported access.
    ports:
    - name: paddr
      width: 16
      direction: input
      description: APB address
    - name: psel
      width: 1
      direction: input
      description: APB select
    - name: penable
      width: 1
      direction: input
      description: APB enable
    - name: pwrite
      width: 1
      direction: input
      description: APB write
    - name: pwdata
      width: 32
      direction: input
      description: APB write data
    - name: pstrb
      width: 4
      direction: input
      description: APB strobes
    - name: prdata
      width: 32
      direction: output
      description: APB read data
    - name: pready
      width: 1
      direction: output
      description: APB ready
    - name: pslverr
      width: 1
      direction: output
      description: APB error
  - name: sram_write
    type: custom
    role: master
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: 256-bit payload SRAM write interface (assembler side)
    protocol:
      handshake: Transfer on sram_wr_valid && sram_wr_ready; addr/data/strb held stable while valid && !ready.
      packing: sram_wr_addr is the 32B-aligned word containing the target byte; sram_wr_strb marks exactly the valid payload lanes.
    ports:
    - name: sram_wr_valid
      width: 1
      direction: output
      description: Write valid
    - name: sram_wr_ready
      width: 1
      direction: input
      description: Write ready (backpressure)
    - name: sram_wr_addr
      width: 16
      direction: output
      description: Byte-addressed 32B-aligned write word address
    - name: sram_wr_data
      width: 256
      direction: output
      description: Write data word
    - name: sram_wr_strb
      width: 32
      direction: output
      description: Per-lane write strobes (valid payload lanes only)
  - name: sram_read
    type: custom
    role: master
    clock_domain: axi_aclk
    reset_domain: axi_aresetn
    description: 256-bit payload SRAM read interface (firmware read side)
    protocol:
      req_rule: Request on sram_rd_req_valid && sram_rd_req_ready; addr is 32B-aligned physical word.
      rsp_rule: Response on sram_rd_rsp_valid && sram_rd_rsp_ready; sram_rd_rsp_error marks an out-of-range read.
    ports:
    - name: sram_rd_req_valid
      width: 1
      direction: output
      description: Read request valid
    - name: sram_rd_req_ready
      width: 1
      direction: input
      description: Read request ready
    - name: sram_rd_req_addr
      width: 16
      direction: output
      description: 32B-aligned read word address
    - name: sram_rd_rsp_valid
      width: 1
      direction: input
      description: Read response valid
    - name: sram_rd_rsp_ready
      width: 1
      direction: output
      description: Read response ready
    - name: sram_rd_rsp_data
      width: 256
      direction: input
      description: Read response data word
    - name: sram_rd_rsp_error
      width: 1
      direction: input
      description: Read response error
  - name: interrupt
    type: custom
    clock_domain: pclk
    reset_domain: presetn
    description: Combined interrupt output (active-high, level)
    protocol:
      assertion: irq reflects (intr_raw_status & intr_enable) != 0 after CDC into pclk.
      deassertion: irq deasserts after the corresponding intr_clear W1C.
      reset_value: 0
    ports:
    - name: irq
      width: 1
      direction: output
      description: Combined level interrupt
    role: target
features:
- name: axi_ingress
  trigger: AXI write transaction (AW..WLAST..B)
  datapath: AW/W beats -> raw TLP byte stream (lane N -> wdata[8N+:8])
  control: ingress FSM checks AWSIZE/AWBURST/beat-count/WSTRB/WLAST legality
  output: ordered TLP bytes + accept event, or PD_MALFORMED_TLP
- name: vdm_decode
  trigger: accepted TLP byte stream
  datapath: decode 16B Non-Flit PCIe VDM header; verify msg code 0x7F, vendor 0x1AB4, VDM code 0x0, routing/TC; strip header/pad/digest
  control: parser FSM
  output: validated VDM fields + payload offset, or PD_UNSUPPORTED_VDM / PD_BAD_PAD_OR_ALIGNMENT
- name: mctp_decode
  trigger: validated VDM payload
  datapath: decode MCTP transport header (ver/dest_eid/src_eid/SOM/EOM/seq/tag_owner/msg_tag) + IC/msg_type from SOM body byte
  control: decoder
  output: MCTP fields + assembly key, or PD_BAD_MCTP_HEADER / PD_DEST_EID_REJECT
- name: interleaved_assembly
  trigger: decoded MCTP packet
  datapath: allocate/append context by {source_eid,tag_owner,message_tag}; interleave across keys; track expected seq, first/last header, timeout
  control: per-context FSM
  output: appended payload bytes + descriptor on EOM, or AD_* assembly drop
- name: payload_pack
  trigger: accepted payload bytes for a context
  datapath: pack payload-only bytes into 256-bit SRAM words; byte i at base+i; per-context partial-word state; no holes across fragments
  control: sram packer
  output: sram_write beats with strb marking valid payload lanes
- name: descriptor_publish
  trigger: successful EOM
  datapath: push completed descriptor + first/last header snapshots into the descriptor/header queue
  control: descriptor queue
  output: descriptor_ready interrupt + APB descriptor readout, or AD_DESCRIPTOR_FULL
- name: firmware_read
  trigger: AXI read after descriptor visible
  datapath: one SRAM read per AXI R beat; trim handled in firmware
  control: axi read FSM
  output: rdata beats; SLVERR for out-of-window/no-descriptor reads
- name: drop_classification
  trigger: any reject condition
  datapath: evaluate packet-drop and assembly-drop reasons in priority order
  control: classifier
  output: last_drop_class/last_drop_reason + per-reason counters + interrupt
dataflow:
  write_path:
    source: axi_wr_slave (256-bit W beats, one TLP per transaction)
    burst: AWLEN+1 beats, AWSIZE=5 (32B), AWBURST=INCR, WLAST on final beat
    buffer: per-context partial 256-bit SRAM pack buffer + 16B header snapshot store
    sequence: AXI W -> TLP bytes -> VDM decode -> MCTP decode -> context alloc/append -> SRAM payload write -> descriptor on EOM
  read_path:
    source: payload SRAM via descriptor payload_base_addr/payload_len
    burst: ARLEN+1 beats, ARSIZE=5 (32B), ARBURST=INCR, RLAST on final beat
    destination: axi_rd_slave.rdata
    sequence: descriptor visible -> firmware AXI AR -> SRAM read req/rsp -> AXI R -> RLAST
  loop_control:
    counter: ctx_payload_byte_count per context; ctx_expected_seq modulo 4
    decrement: n/a (accumulating assembler, not a counted loop)
    auto_increment: ctx_payload_next_addr += accepted payload bytes; expected_seq increments modulo 4 after SOM
function_model:
  purpose: Golden executable behavioral contract for rtl-gen and tb-gen; cycle-independent meaning of decode/assembly/pack/descriptor/drop.
  state_variables:
  - name: context_table
    source: registers.CTX_STATE bank
    reset: IDLE
    description: 'Per-context assembly state: key{source_eid,tag_owner,message_tag}, dest_eid, expected_seq, payload_base_addr, payload_next_addr, payload_byte_count, tu_bytes, partial_word{addr,data,strb,next_lane}, first/last_tlp_header[0:15], msg_type, ic, timeout_age, state, error'
  - name: descriptor_queue
    source: memory.instances.descriptor_fifo
    reset: empty
    description: FIFO of completed descriptors + first/last header snapshots, depth DESCRIPTOR_FIFO_DEPTH
  - name: sram_alloc_ptr
    source: registers.SRAM_BASE.sram_base
    reset: sram_base
    description: Linear bump allocator pointer in [sram_base, sram_limit)
  - name: counters
    source: registers counter block
    reset: 0
    description: Aggregate + per-reason packet/assembly drop and traffic counters (saturating)
  - name: last_drop_class
    source: registers.STATUS.last_drop_class
    reset: 0
    description: Most recent drop class (none/packet/assembly)
  transactions:
  - id: FM_INGEST_TLP
    name: axi_write_to_tlp_bytes
    output_rules:
    - name: bresp_next
      expr: BRESP_OKAY
      width: 2
      port: s_axi_bresp
    state_updates:
    - name: tlp_accept
      expr: wlast_seen and (awsize == 5) and (awburst == INCR) and wstrb_contiguous and (tlp_byte_count >= 16) and (tlp_byte_count <= MAX_TLP_BYTES)
      width: 1
    - name: tlp_seen_count
      expr: tlp_seen_count + 1
      width: 32
    - name: tlp_accepted_count
      expr: tlp_accepted_count + (1 if tlp_accept else 0)
      width: 32
    preconditions:
    - CONTROL.enable==1 or (enable==0 and drop_when_disabled==1)
    - AWSIZE==5
    - AWBURST==INCR
    - W beat count == AWLEN+1
    - WLAST on final beat only
    inputs:
    - axi_wr_slave AW/W/B
    outputs:
    - ordered raw TLP byte vector with valid byte count from WSTRB
    - BRESP=OKAY when transaction consumed
    - name: bresp_next
      port: s_axi_bresp
      expr: BRESP_OKAY
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: tlp_accept
      expr: wlast_seen and (awsize == 5) and (awburst == INCR) and wstrb_contiguous and (tlp_byte_count >= 16) and (tlp_byte_count <= MAX_TLP_BYTES)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: tlp_seen_count
      expr: tlp_seen_count + 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: tlp_accepted_count
      expr: tlp_accepted_count + (1 if tlp_accept else 0)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - tlp_seen_count increment
    - tlp_accepted_count increment on legal TLP
    error_cases:
    - condition: empty txn / bad AWSIZE/AWBURST / interleave / beat-count mismatch / early/late WLAST / non-contiguous WSTRB / <16B / >MAX_TLP_BYTES / PCIe-length inconsistent / unstripped digest when stripped-mode
      result: PD_MALFORMED_TLP packet drop; no context/SRAM/descriptor side effect
  - id: FM_DECODE_VDM
    name: pcie_vdm_decode
    state_updates:
    - name: vdm_valid
      expr: (message_code == 0x7F) and (vendor_id == 0x1AB4) and (vdm_code == 0x0) and routing_supported and (traffic_class == 0)
      width: 1
    - name: payload_offset
      expr: '16'
      width: 5
    - name: requester_id
      expr: concat(tlp[1], tlp[2])
      width: 16
    - name: pad_ok
      expr: (pad_len <= 3) and ((pad_len == 0) if not eom else True)
      width: 1
    - name: last_decoded_vdm
      expr: concat(message_code, vendor_id, vdm_code)
      width: 32
    preconditions:
    - legal TLP bytes available
    inputs:
    - raw TLP bytes 0..15
    outputs:
    - requester_id, pcie_routing_type, message_code, vendor_id, vdm_code, payload_offset(16), pad_len
    - first 16B header snapshot candidate
    - state: vdm_valid
      expr: (message_code == 0x7F) and (vendor_id == 0x1AB4) and (vdm_code == 0x0) and routing_supported and (traffic_class == 0)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: payload_offset
      expr: '16'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: requester_id
      expr: concat(tlp[1], tlp[2])
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: pad_ok
      expr: (pad_len <= 3) and ((pad_len == 0) if not eom else True)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: last_decoded_vdm
      expr: concat(message_code, vendor_id, vdm_code)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects: []
    error_cases:
    - condition: not Non-Flit VDM-with-data / msg_code!=0x7F / vendor!=0x1AB4 / vdm_code!=0x0 / unsupported routing/TC/attr
      result: PD_UNSUPPORTED_VDM packet drop
    - condition: pad_len>3 / pad_len!=0 on non-EOM / TU not in [64,4096] or not 4B-aligned / non-EOM payload != TU or not 4B-aligned / EOM payload > TU
      result: PD_BAD_PAD_OR_ALIGNMENT packet drop
    output_rules: []
  - id: FM_DECODE_MCTP
    name: mctp_transport_decode
    state_updates:
    - name: header_version_ok
      expr: header_version == 1
      width: 1
    - name: som
      expr: mctp_byte0[7]
      width: 1
    - name: eom
      expr: mctp_byte0[6]
      width: 1
    - name: packet_seq
      expr: mctp_byte0[5:4]
      width: 2
    - name: tag_owner
      expr: mctp_byte0[3]
      width: 1
    - name: message_tag
      expr: mctp_byte0[2:0]
      width: 3
    - name: dest_accept
      expr: (not dest_filter_enable) or (dest_eid == local_eid) or (accept_broadcast_eid and (dest_eid == 0xFF)) or (accept_null_eid and (dest_eid == 0x00))
      width: 1
    - name: assembly_key
      expr: concat(source_eid, tag_owner, message_tag)
      width: 12
    preconditions:
    - validated VDM payload present
    inputs:
    - MCTP transport header (last 4B of 16B header)
    - SOM body byte (IC+message_type) when SOM=1
    outputs:
    - header_version, dest_eid, source_eid, SOM, EOM, packet_seq, tag_owner, message_tag
    - ic, message_type on SOM
    - assembly_key={source_eid,tag_owner,message_tag}
    - state: header_version_ok
      expr: header_version == 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: som
      expr: mctp_byte0[7]
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: eom
      expr: mctp_byte0[6]
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: packet_seq
      expr: mctp_byte0[5:4]
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: tag_owner
      expr: mctp_byte0[3]
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: message_tag
      expr: mctp_byte0[2:0]
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: dest_accept
      expr: (not dest_filter_enable) or (dest_eid == local_eid) or (accept_broadcast_eid and (dest_eid == 0xFF)) or (accept_null_eid and (dest_eid == 0x00))
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: assembly_key
      expr: concat(source_eid, tag_owner, message_tag)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects: []
    error_cases:
    - condition: header not present / version!=1 / SOM packet without body byte
      result: PD_BAD_MCTP_HEADER packet drop
    - condition: dest_eid not local and not accepted broadcast/null while dest_filter_enable
      result: PD_DEST_EID_REJECT packet drop
    output_rules: []
  - id: FM_ALLOC_CONTEXT
    name: context_allocate
    state_updates:
    - name: alloc_ok
      expr: free_slot_available
      width: 1
    - name: single_packet
      expr: som and eom
      width: 1
    - name: ctx_state
      expr: DONE_WAIT_DESCRIPTOR_POP if (som and eom) else ASSEMBLING
      width: 2
    - name: ctx_payload_base_addr
      expr: sram_alloc_ptr
      width: 16
    - name: ctx_expected_seq
      expr: (packet_seq + 1) % 4
      width: 2
    - name: active_context_count
      expr: active_context_count + 1
      width: 5
    - name: sram_alloc_ptr
      expr: sram_alloc_ptr + allocated_len
      width: 16
    preconditions:
    - decoded MCTP packet with SOM=1
    inputs:
    - assembly_key
    - first_tlp_header[0:15]
    outputs:
    - new ASSEMBLING context (SOM,EOM=0) or single-packet path (SOM,EOM=1)
    - first_tlp_header stored
    - payload_base_addr allocated from sram_alloc_ptr
    - state: alloc_ok
      expr: free_slot_available
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: single_packet
      expr: som and eom
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_state
      expr: DONE_WAIT_DESCRIPTOR_POP if (som and eom) else ASSEMBLING
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_payload_base_addr
      expr: sram_alloc_ptr
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_expected_seq
      expr: (packet_seq + 1) % 4
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: active_context_count
      expr: active_context_count + 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: sram_alloc_ptr
      expr: sram_alloc_ptr + allocated_len
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - expected_seq initialized; ctx_state=ASSEMBLING; sram_alloc_ptr advanced
    error_cases:
    - condition: no free context for a new fragmented SOM
      result: PD_BAD_OR_EXPIRED_TAG packet drop (context-table-full); no allocation
    - condition: SOM for an already-active key
      result: 'AD_DUPLICATE_SOM assembly drop: abort old context, suppress descriptor'
    output_rules: []
  - id: FM_APPEND
    name: context_append
    state_updates:
    - name: seq_ok
      expr: packet_seq == ctx_expected_seq
      width: 1
    - name: message_complete
      expr: eom
      width: 1
    - name: ctx_payload_byte_count
      expr: ctx_payload_byte_count + payload_bytes
      width: 13
    - name: ctx_expected_seq
      expr: (ctx_expected_seq + 1) % 4
      width: 2
    - name: ctx_last_seq
      expr: packet_seq
      width: 2
    preconditions:
    - SOM=0 packet matches an active key
    - packet_seq == ctx_expected_seq
    inputs:
    - payload bytes
    - last_tlp_header[0:15]
    outputs:
    - payload appended; last_tlp_header updated; expected_seq incremented modulo 4
    - EOM=1 marks message complete -> FM_PUBLISH_DESCRIPTOR
    - state: seq_ok
      expr: packet_seq == ctx_expected_seq
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: message_complete
      expr: eom
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_payload_byte_count
      expr: ctx_payload_byte_count + payload_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_expected_seq
      expr: (ctx_expected_seq + 1) % 4
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_last_seq
      expr: packet_seq
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - ctx_payload_byte_count += payload_bytes
    error_cases:
    - condition: middle/end with no active matching context / EOM without prior SOM
      result: PD_UNEXPECTED_MIDDLE_END packet drop
    - condition: packet_seq != expected modulo-4 seq
      result: AD_SEQUENCE_MISMATCH assembly drop
    - condition: append would exceed MAX_MESSAGE_BYTES
      result: AD_MESSAGE_OVERFLOW assembly drop
    - condition: context age exceeds assembly_timeout_cycles
      result: AD_TIMEOUT assembly drop
    output_rules: []
  - id: FM_PACK_SRAM
    name: payload_pack_write
    output_rules:
    - name: sram_wr_valid
      expr: payload_bytes > 0
      width: 1
      port: sram_wr_valid
    - name: sram_wr_addr
      expr: ctx_payload_next_addr & ~31
      width: 16
      port: sram_wr_addr
    - name: sram_wr_strb
      expr: lane_mask(ctx_payload_next_addr & 31, payload_bytes)
      width: 32
      port: sram_wr_strb
    state_updates:
    - name: ctx_payload_next_addr
      expr: ctx_payload_next_addr + payload_bytes
      width: 16
    - name: ctx_partial_next_lane
      expr: (ctx_partial_next_lane + payload_bytes) % 32
      width: 5
    - name: payload_bytes_written_count
      expr: payload_bytes_written_count + payload_bytes
      width: 32
    preconditions:
    - accepted payload bytes for a context
    inputs:
    - payload bytes
    - ctx partial_word state
    outputs:
    - 256-bit sram_write beats; payload byte i at byte address base_addr+i; sram_wr_strb marks only payload lanes; full words flushed, partial words retained per-context until full or EOM
    - name: sram_wr_valid
      port: sram_wr_valid
      expr: payload_bytes > 0
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: sram_wr_addr
      port: sram_wr_addr
      expr: ctx_payload_next_addr & ~31
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: sram_wr_strb
      port: sram_wr_strb
      expr: lane_mask(ctx_payload_next_addr & 31, payload_bytes)
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: ctx_payload_next_addr
      expr: ctx_payload_next_addr + payload_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_partial_next_lane
      expr: (ctx_partial_next_lane + payload_bytes) % 32
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: payload_bytes_written_count
      expr: payload_bytes_written_count + payload_bytes
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - ctx_payload_next_addr advanced; payload_bytes_written_count += bytes
    error_cases:
    - condition: allocation/write would exceed sram_base/limit or SRAM_ADDR_WIDTH
      result: AD_SRAM_OVERFLOW assembly drop
  - id: FM_PUBLISH_DESCRIPTOR
    name: descriptor_publish
    state_updates:
    - name: descriptor_ready
      expr: not descriptor_queue_full
      width: 1
    - name: descriptor_payload_len
      expr: ctx_payload_byte_count
      width: 13
    - name: descriptor_base_addr
      expr: ctx_payload_base_addr
      width: 16
    - name: message_completed_count
      expr: message_completed_count + 1
      width: 32
    - name: descriptor_valid
      expr: '1'
      width: 1
    - name: ctx_state
      expr: DONE_WAIT_DESCRIPTOR_POP
      width: 2
    preconditions:
    - successful EOM for a context
    inputs:
    - context metadata
    - first/last_tlp_header
    outputs:
    - descriptor{source_eid,dest_eid,tag_owner,message_tag,message_type,requester_id,pcie_routing_type,payload_base_addr,payload_len,final_packet_seq,context_id,completion_status,first/last_tlp_header} pushed
    - descriptor_ready interrupt; message_completed_count increment
    - state: descriptor_ready
      expr: not descriptor_queue_full
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: descriptor_payload_len
      expr: ctx_payload_byte_count
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: descriptor_base_addr
      expr: ctx_payload_base_addr
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: message_completed_count
      expr: message_completed_count + 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: descriptor_valid
      expr: '1'
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: ctx_state
      expr: DONE_WAIT_DESCRIPTOR_POP
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - context released (or DONE_WAIT_DESCRIPTOR_POP)
    error_cases:
    - condition: descriptor/header queue full at EOM
      result: AD_DESCRIPTOR_FULL assembly drop; no descriptor published
    output_rules: []
  - id: FM_AXI_READ
    name: firmware_payload_read
    output_rules:
    - name: rresp_next
      expr: RRESP_SLVERR if (out_of_window or (no_descriptor and not raw_sram_debug_read_enable)) else RRESP_OKAY
      width: 2
      port: s_axi_rresp
    - name: rlast_next
      expr: beat_index == arlen
      width: 1
      port: s_axi_rlast
    state_updates:
    - name: fw_axi_read_beat_count
      expr: fw_axi_read_beat_count + 1
      width: 32
    - name: fw_axi_read_error_count
      expr: fw_axi_read_error_count + (1 if read_error else 0)
      width: 32
    preconditions:
    - ARSIZE==5
    - ARBURST==INCR
    - descriptor visible for the range or raw_sram_debug_read_enable
    inputs:
    - AR address/len
    outputs:
    - one SRAM read per R beat; rdata returned unmodified; RLAST on final beat
    - name: rresp_next
      port: s_axi_rresp
      expr: RRESP_SLVERR if (out_of_window or (no_descriptor and not raw_sram_debug_read_enable)) else RRESP_OKAY
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - name: rlast_next
      port: s_axi_rlast
      expr: beat_index == arlen
      description: Mirrored from executable output_rules for SSOT validator completeness.
    - state: fw_axi_read_beat_count
      expr: fw_axi_read_beat_count + 1
      description: Mirrored from executable state_updates for SSOT validator completeness.
    - state: fw_axi_read_error_count
      expr: fw_axi_read_error_count + (1 if read_error else 0)
      description: Mirrored from executable state_updates for SSOT validator completeness.
    side_effects:
    - fw_axi_read_beat_count increment
    error_cases:
    - condition: read outside SRAM read window, or no completed descriptor and not raw_sram_debug_read_enable
      result: RRESP=SLVERR; fw_axi_read_error_count increment
  invariants:
  - No SRAM payload write occurs before a packet is accepted for assembly.
  - The SRAM writer never writes PCIe/VDM headers, MCTP transport headers, pad bytes, or digest bytes as payload.
  - For every published descriptor, byte address base_addr..base_addr+payload_len-1 is written exactly as the corresponding assembled payload byte with no alignment gap.
  - Active context count never exceeds CONTEXT_COUNT.
  - first_tlp_header for a context is written only by the accepted SOM packet; last_tlp_header equals the most recent accepted packet for that context.
  - Non-final accepted packets contribute exactly the configured transmission unit byte count; EOM may contribute fewer.
  - No descriptor is published before EOM; sequence mismatch aborts the active context and suppresses the success descriptor.
  - An earlier packet-drop reason wins over a later assembly-drop reason for the same accepted transaction (drop priority order).
  - 'ctx_state encoding is mutually exclusive: a context cannot be IDLE and ASSEMBLING or ERROR in the same cycle.'
  reference_model_hint: 'tb-gen must implement a Python scoreboard from this section: reconstruct expected payload bytes, headers, descriptor, and drop class per scenario and compare against RTL-observed SRAM writes / descriptor / counters.'
  derived_signals:
