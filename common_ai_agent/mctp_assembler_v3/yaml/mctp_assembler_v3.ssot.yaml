  - id: csr
    kind: control
    source_refs:
    - registers.register_list
    - interrupts
    rtl_candidates:
    - mctp_assembler_v3_apb_regfile
    verification_impact:
    - test_requirements.scenarios
  strategy: manifest_owned_leaf_decomposition
  owners:
  - module: mctp_assembler_v3_axi_wr_ingress
    file: rtl/mctp_assembler_v3_axi_wr_ingress.sv
    responsibility: 'AXI4 write-slave ingress: reconstructs one raw TLP byte stream from AW/W/B, checks AWSIZE/AWBURST/WLAST/WSTRB legality, emits TLP-byte events or PD_MALFORMED_TLP.'
    source_sections:
    - io_list
    - cycle_model
    - function_model
  - module: mctp_assembler_v3_pcie_vdm_parser
    file: rtl/mctp_assembler_v3_pcie_vdm_parser.sv
    responsibility: Decodes the 16-byte Non-Flit PCIe VDM header (message code 0x7F, vendor 0x1AB4, routing/TC), validates VDM binding, strips header/pad/digest, emits PD_UNSUPPORTED_VDM / PD_BAD_PAD_OR_ALIGNMENT on violation.
    source_sections:
