top_module:
  name: mctp_assembler_v3
  file: rtl/mctp_assembler_v3.sv
  version: '1.0'
  type: peripheral
  description: Bounded HW receiver that validates PCIe VDM MCTP TLPs from a 256-bit AXI4 write slave, assembles interleaved fragmented MCTP messages by {source_eid,tag_owner,message_tag}, packs payload-only bytes into a 256-bit SRAM, publishes completed-message descriptors with first/last TLP header snapshots, and exposes APB control/status plus an AXI4 read path for firmware payload access.
  reference_spec: DMTF DSP0236 v1.3.3 + DSP0238 v1.4.0
  target:
    technology: generic
    clock_freq_mhz: 400
    area_um2: null
    power_mw: null
sub_modules:
- name: mctp_assembler_v3_axi_wr_ingress
  file: rtl/mctp_assembler_v3_axi_wr_ingress.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.axi_wr_slave
  - cycle_model.handshake_rules
  - function_model.transactions.FM_INGEST_TLP
  source_sections:
  - io_list
  - cycle_model
  - function_model
  - test_requirements
  cycle_model_refs:
  - cycle_model.handshake_rules
  - cycle_model
  function_model_refs:
  - function_model.transactions.FM_INGEST_TLP
  description: 'AXI4 write-slave ingress: reconstructs one raw TLP byte stream from AW/W/B, checks AWSIZE/AWBURST/WLAST/WSTRB legality, emits TLP-byte events or PD_MALFORMED_TLP.'
  test_refs:
  - test_requirements
- name: mctp_assembler_v3_pcie_vdm_parser
  file: rtl/mctp_assembler_v3_pcie_vdm_parser.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.transactions.FM_DECODE_VDM
  - features.vdm_decode
  source_sections:
  - function_model
  - features
  - dataflow
  function_model_refs:
  - function_model.transactions.FM_DECODE_VDM
  feature_refs:
  - features.vdm_decode
  description: Decodes the 16-byte Non-Flit PCIe VDM header (message code 0x7F, vendor 0x1AB4, routing/TC), validates VDM binding, strips header/pad/digest, emits PD_UNSUPPORTED_VDM / PD_BAD_PAD_OR_ALIGNMENT on violation.
  dataflow_refs:
  - dataflow
- name: mctp_assembler_v3_mctp_decoder
  file: rtl/mctp_assembler_v3_mctp_decoder.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.transactions.FM_DECODE_MCTP
  - features.mctp_decode
  source_sections: &id001
  - function_model
  - features
  function_model_refs:
  - function_model.transactions.FM_DECODE_MCTP
  description: Decodes the MCTP transport header (version/dest_eid/src_eid/SOM/EOM/seq/tag_owner/msg_tag) plus IC/message-type from the SOM body byte; emits PD_BAD_MCTP_HEADER / PD_DEST_EID_REJECT.
- name: mctp_assembler_v3_context_table
  file: rtl/mctp_assembler_v3_context_table.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.transactions.FM_ALLOC_CONTEXT
  - function_model.transactions.FM_APPEND
  - fsm.context_fsm
  source_sections:
  - function_model
  - fsm
  function_model_refs:
  - function_model.transactions.FM_ALLOC_CONTEXT
  - function_model.transactions.FM_APPEND
  fsm_refs:
  - fsm.context_fsm
  - fsm
  description: CONTEXT_COUNT independent assembly contexts keyed by {source_eid,tag_owner,message_tag}; per-context FSM, expected seq, first/last header snapshot, timeout age; emits assembly drops AD_*.
- name: mctp_assembler_v3_sram_packer
  file: rtl/mctp_assembler_v3_sram_packer.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.transactions.FM_PACK_SRAM
  - features.payload_pack
  source_sections: &id002
  - function_model
  - features
  - memory
  function_model_refs:
  - function_model.transactions.FM_PACK_SRAM
  description: Packs payload-only bytes into 256-bit SRAM words with per-context partial-word state (addr/data/strb/next_lane); byte i at base_addr+i, no alignment holes across fragments; linear bump allocator sram_base..sram_limit.
- name: mctp_assembler_v3_descriptor_queue
  file: rtl/mctp_assembler_v3_descriptor_queue.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - function_model.transactions.FM_PUBLISH_DESCRIPTOR
  - memory.instances.descriptor_fifo
  source_sections: &id003
  - function_model
  - memory
  function_model_refs:
  - function_model.transactions.FM_PUBLISH_DESCRIPTOR
  description: DESCRIPTOR_FIFO_DEPTH completed-message descriptor/header queue holding metadata + first/last TLP header snapshots until descriptor_pop; AD_DESCRIPTOR_FULL on overflow at EOM.
- name: mctp_assembler_v3_axi_rd_payload
  file: rtl/mctp_assembler_v3_axi_rd_payload.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - io_list.interfaces.axi_rd_slave
  - function_model.transactions.FM_AXI_READ
  - fsm.axi_read_fsm
  source_sections: &id004
  - io_list
  - function_model
  - fsm
  function_model_refs:
  - function_model.transactions.FM_AXI_READ
  fsm_refs:
  - fsm.axi_read_fsm
  description: 'AXI4 read slave for firmware payload access: one SRAM read per AXI R beat, RLAST on final ARLEN beat, SLVERR for out-of-window or no-descriptor reads unless raw_sram_debug_read_enable.'
- name: mctp_assembler_v3_apb_regfile
  file: rtl/mctp_assembler_v3_apb_regfile.sv
  ownership: manifest
  ssot_gen: true
  implements:
  - registers.register_list
  - interrupts
  - error_handling
  source_sections:
  - registers
  - interrupts
  - error_handling
  - features
  - decomposition
  register_refs:
  - registers.register_list
  description: APB4 control/status/interrupt/counter/descriptor/debug register file; per-Q register banks; W1C interrupts; counter_clear; descriptor_pop; CDC of status/interrupt from axi_aclk to pclk.
  function_model_refs:
  - function_model.state_variables
  feature_refs:
  - features
  decomposition_refs:
  - decomposition
- name: mctp_assembler_v3_cdc_sync
  file: rtl/mctp_assembler_v3_cdc_sync.sv
  ownership: manifest
  ssot_gen: true
  wiring_only: false
  implements:
  - cdc_requirements.crossings
  - cdc_requirements.synchronizers
  source_sections: &id005
  - cdc_requirements
  cycle_model_refs:
  - cycle_model.handshake_rules
  description: Explicit CDC synchronizers for status/interrupt/counter crossings between axi_aclk and pclk.
- name: mctp_assembler_v3
  file: rtl/mctp_assembler_v3.sv
  wiring_only: true
  ownership: manifest
  ssot_gen: false
  implements:
  - integration.connections
  - io_list.interfaces
  - function_model
  - top_module
  - integration
  source_sections: &id006
  - integration
  - io_list
  - function_model
  - cycle_model
  - top_module
  - decomposition
  function_model_refs:
  - function_model.transactions
  cycle_model_refs:
  - cycle_model.pipeline
  ssot_refs:
  - io_list.interfaces
  description: 'Top integration: instantiates ingress, parser, decoder, context table, packer, descriptor queue, AXI read, APB regfile, CDC; wires datapath ingress->parse->decode->assemble->pack->descriptor and the read path.'
  decomposition_refs:
  - decomposition
  dataflow_refs:
  - dataflow
decomposition:
