ip: counter8_cx1
version: "1.0"
status: draft

top_module:
  name: counter8_cx1
  file: rtl/counter8_cx1.sv
  version: "1.0"
  type: peripheral
  description: "8-bit up-counter with synchronous reset and enable"
  reference_spec: "user-defined"
  target:
    technology: generic
    clock_freq_mhz: 100
    area_um2: null
    power_mw: null

sub_modules: []

decomposition:
  units:
    - id: counter_datapath
      kind: datapath
      source_refs: ["function_model.transactions.TR_COUNT", "function_model.transactions.TR_RESET"]
      rtl_candidates: ["counter8_cx1"]
      verification_impact: ["test_requirements.scenarios"]

parameters:
  - name: WIDTH
    default: 8
    type: int
    description: "Counter width in bits"
    drives: ["rtl/counter8_cx1.sv"]

io_list:
  clock_domains:
    - name: clk
      frequency_mhz: 100
      description: "Main clock"
      ports:
        - { name: clk, width: 1, direction: input, description: "Clock" }
  resets:
    - name: rst_n
      polarity: active_low
      sync_async: synchronous
      description: "Synchronous active-low reset"
      ports:
        - { name: rst_n, width: 1, direction: input, description: "Synchronous active-low reset" }
  interfaces:
    - name: control
      type: custom
      description: "Counter control and output"
      ports:
        - { name: en,    width: 1, direction: input,  description: "Enable: count when high" }
        - { name: count, width: 8, direction: output, description: "Current 8-bit count value" }

features:
  - name: count_up
    trigger: "en==1 on rising clk edge"
    datapath: "count_reg increments by 1, wraps at 255"
    control: "gated by en"
    output: "count == count_reg"
  - name: sync_reset
    trigger: "rst_n==0 on rising clk edge"
    datapath: "count_reg cleared to 0"
    control: "synchronous, higher priority than enable"
    output: "count == 0"
  - name: hold
    trigger: "en==0 and rst_n==1"
    datapath: "count_reg unchanged"
    control: "no increment"
    output: "count unchanged"

dataflow:
  sources:
    - clk
    - rst_n
    - en
  sinks:
    - count
  sequence:
    - id: DF_COUNT
      from: "en and clk"
      through: "counter register"
      to: "count"

function_model:
  purpose: "Behavioral oracle for the 8-bit up-counter."
  state_variables:
    - { name: count_reg, source: "io_list.count", reset: 0, width: 8, description: "8-bit counter register" }
  transactions:
    - id: TR_RESET
      name: synchronous_reset
      preconditions:
        - "rst_n == 0"
      inputs: [rst_n]
      output_rules:
        - { name: count_out, expr: 0, width: 8, port: count }
      state_updates:
        - { name: count_next, expr: 0, width: 8 }
      side_effects: []
      error_cases: []
    - id: TR_COUNT
      name: count_up_when_enabled
      preconditions:
        - "rst_n == 1"
        - "en == 1"
      inputs: [en, count_reg]
      output_rules:
        - { name: count_out, expr: "(count_reg + 1) & 0xFF", width: 8, port: count }
      state_updates:
        - { name: count_next, expr: "(count_reg + 1) & 0xFF", width: 8 }
      side_effects: []
      error_cases: []
    - id: TR_HOLD
      name: hold_when_disabled
      preconditions:
        - "rst_n == 1"
        - "en == 0"
      inputs: [en, count_reg]
      output_rules:
        - { name: count_out, expr: "count_reg", width: 8, port: count }
      state_updates:
        - { name: count_next, expr: "count_reg", width: 8 }
      side_effects: []
      error_cases: []
  output_rules:
    - { name: count, expr: "count_reg", width: 8, port: count }
  state_updates:
    - { name: count_reg, reset: 0, expr: "0 if rst_n==0 else ((count_reg+1)&0xFF if en==1 else count_reg)" }
  invariants:
    - "count == count_reg"
    - "0 <= count_reg <= 255"
    - "rst_n==0 implies count==0 on next clock"
  derived_signals:
    - { name: count_out, expr: "count_reg", width: 8, description: "Output count" }

cycle_model:
  purpose: "Cycle-accurate timing contract for the counter."
  clock: clk
  reset: "rst_n low synchronously clears count_reg to 0"
  latency:
    reset_latency: { min_cycles: 1, max_cycles: 1, description: "count=0 one cycle after rst_n asserts" }
    count_latency: { min_cycles: 1, max_cycles: 1, description: "count increments one cycle after en asserts" }
  handshake_rules:
    - { signal: en, rule: "en sampled on rising clk edge; count updates one cycle later" }
    - { signal: rst_n, rule: "rst_n sampled synchronously; overrides en" }
  pipeline:
    - { stage: S0_SAMPLE, cycle: 0, action: "Sample rst_n and en on rising clk" }
    - { stage: S1_UPDATE, cycle: 1, action: "Update count_reg: reset if rst_n==0, increment if en==1, hold otherwise" }
  ordering:
    - "reset has higher priority than enable"
  backpressure:
    - "None — combinational output of count_reg"
  observability:
    - "count is directly driven from count_reg"

clock_reset_domains:
  domains:
    - { name: clk, frequency_mhz: 100, description: "Single clock domain" }
  reset_scheme:
    signal: rst_n
    polarity: active_low
    type: synchronous

cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain — no CDC"

rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain — no RDC"

registers:
  config:
    register_width: 8
    addr_width: 0
    byte_addressable: false
  register_list: []
  note: "No memory-mapped registers; count is a direct output"

memory:
  instances: []
  note: "No SRAM or FIFO"

interrupts:
  sources: []
  output: {}
  note: "No interrupt"

fsm:
  note: "No explicit FSM; single-state counter with enable gating"

rtl_contract:
  top_module_file: "rtl/counter8_cx1.sv"
  reset_polarity: "active_low"
  reset_type: "synchronous"
  clock_gating: false
  top_module: counter8_cx1
  clock: clk
  reset: rst_n
  observable_outputs:
    - count
  rules:
    - id: SYNC_RESET
      description: "rst_n==0 synchronously clears count to 0"
    - id: COUNT_EN
      description: "count increments by 1 each cycle when en==1 and rst_n==1"
    - id: WRAP
      description: "count wraps from 255 to 0"

timing:
  target_clocks:
    - { name: clk, frequency_mhz: 100, description: "Single clock" }
  latency_budget:
    count_update_cycles: 1
  false_paths: []

power:
  domains:
    - { name: clk, description: "Single power domain" }
  clock_gating: false
  retention: false

security:
  classification: non_secure_peripheral
  assets: []
  threat_model: []

error_handling:
  error_sources: []

debug_observability:
  waveform_must_probe:
    - clk
    - rst_n
    - en
    - count

integration:
  dependencies: []
  connections: []

dft:
  scan_required: false

synthesis:
  dialect: "systemverilog_2012"
  constraints: ""
  required_outputs:
    - rtl/counter8_cx1.sv

coding_rules:
  style: "Synthesizable SystemVerilog with explicit widths"
  default_nettype: none
  lint_rules:
    - "No latches"
    - "No undriven outputs"

reuse_modules: []

custom:
  assumptions:
    - "Reset is synchronous, active-low"
    - "Count wraps from 255 to 0"
    - "Enable gates increment; reset is higher priority"

dir_structure:
  rtl: counter8_cx1/rtl
  list: counter8_cx1/list
  tb: counter8_cx1/tb/cocotb
  sim: counter8_cx1/sim
  lint: counter8_cx1/lint
  req: counter8_cx1/req

filelist:
  rtl:
    - rtl/counter8_cx1.sv
  list:
    - list/counter8_cx1.f
  tb:
    - tb/cocotb/test_counter8_cx1.py
    - tb/cocotb/test_runner.py
  sim:
    - sim/results.xml

test_requirements:
  scenarios:
    - id: SC_RESET
      name: Synchronous reset clears count
      stimulus: "Assert rst_n=0 for 2 cycles"
      expected: "count==0 one cycle after rst_n low"
      checker: "scoreboard reset assertion"
      coverage: "reset_behavior"
    - id: SC_COUNT
      name: Count increments with enable
      stimulus: "rst_n=1, en=1 for 10 cycles"
      expected: "count increments 0,1,2,...,9 each cycle"
      checker: "scoreboard count assertion"
      coverage: "count_up"
    - id: SC_HOLD
      name: Count holds when disabled
      stimulus: "rst_n=1, en=0"
      expected: "count unchanged"
      checker: "scoreboard hold assertion"
      coverage: "hold"
    - id: SC_WRAP
      name: Count wraps at 255
      stimulus: "count=255, en=1"
      expected: "count==0 next cycle"
      checker: "scoreboard wrap assertion"
      coverage: "wrap"
  scoreboard_checks: 4
  coverage_goals:
    function:
      target_pct: 100
      bins:
        - { id: FCOV_RESET, source_ref: "function_model.transactions.TR_RESET", class: transaction, description: "Reset observed" }
        - { id: FCOV_COUNT, source_ref: "function_model.transactions.TR_COUNT", class: transaction, description: "Count up observed" }
        - { id: FCOV_HOLD,  source_ref: "function_model.transactions.TR_HOLD",  class: transaction, description: "Hold observed" }

quality_gates:
  rtl:
    pass: "RTL compiles with iverilog, no latch warnings"
    evidence: ["rtl/rtl_compile.json"]
  dv:
    pass: "cocotb sim PASS with real results.xml"
    evidence: ["sim/results.xml"]

traceability:
  yaml_to_output:
    - source: io_list
      outputs:
        - rtl/counter8_cx1.sv
    - source: function_model
      outputs:
        - rtl/counter8_cx1.sv
        - tb/cocotb/test_counter8_cx1.py
    - source: test_requirements.scenarios
      outputs:
        - tb/cocotb/test_counter8_cx1.py

workflow_todos:
  rtl-gen:
    - id: RTL_COUNTER
      content: "Implement 8-bit up-counter with sync reset and enable"
      detail: "RTL must implement TR_RESET (sync clear), TR_COUNT (increment), TR_HOLD (hold), and wrap at 255."
      criteria:
        - "count increments every cycle when en==1 and rst_n==1"
        - "count clears to 0 when rst_n==0"
        - "count wraps from 255 to 0"
      source_refs: ["function_model.transactions", "cycle_model.pipeline"]
      owner_module: counter8_cx1
      owner_file: rtl/counter8_cx1.sv
      priority: high
      required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []

generation_flow:
  steps:
    - { name: req,  command: "python3 workflow/req-gen/scripts/emit_requirements_from_ssot.py counter8_cx1 --root ." }
    - { name: rtl,  command: "python3 .cursor/skills/rtl-to-signoff/scripts/rtl_to_signoff.py counter8_cx1 --root . --profile dv --execute --from-stage ssot-rtl --until lint" }
    - { name: tb,   command: "python3 .cursor/skills/rtl-to-signoff/scripts/rtl_to_signoff.py counter8_cx1 --root . --profile dv --execute --from-stage ssot-tb-cocotb --until ssot-tb-cocotb" }
    - { name: sim,  command: "python3 .cursor/skills/rtl-to-signoff/scripts/rtl_to_signoff.py counter8_cx1 --root . --profile dv --execute --from-stage sim --until goal-audit" }
