# =============================================================================
# edge_detector SSOT — Skeleton Phase 1
# =============================================================================
ip: edge_detector
version: "1.0"
top_module:
  name: "edge_detector"
  file: "rtl/edge_detector.sv"
  version: "1.0"
  type: "peripheral"
  description: "Parameterized edge detector with synchronization, APB-lite CSR interface, single PCLK domain."
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "edge_detector", file: "rtl/edge_detector.sv", ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "features", "dataflow"], source_sections: ["function_model", "cycle_model", "features", "dataflow"], function_model_refs: ["function_model.transactions", "function_model.state_variables", "function_model.output_rules"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.latency"], feature_refs: ["features"], dataflow_refs: ["dataflow"], description: "Top-level edge detector core behavior" }

decomposition:
  units:
    - { id: "sync", kind: "datapath", source_refs: ["function_model.state_variables.sync_chain"], rtl_candidates: ["edge_detector"], verification_impact: ["test_requirements.scenarios.SC1", "coverage_goals.cycle.CCOV_SYNC_LATENCY"] }
    - { id: "edge_detect", kind: "datapath/control", source_refs: ["function_model.transactions.DETECT", "function_model.output_rules"], rtl_candidates: ["edge_detector"], verification_impact: ["test_requirements.scenarios.SC2", "coverage_goals.function.FCOV_EDGE_DETECT"] }
    - { id: "csr_decode", kind: "control", source_refs: ["registers.register_list", "io_list.interfaces.apb_csr"], rtl_candidates: ["edge_detector"], verification_impact: ["test_requirements.scenarios.SC5"] }

parameters:
  - name: "SYNC_STAGES"
    default: 2
    type: int
    description: "Number of synchronizer flip-flop stages for input metastability protection"
    drives: ["edge_detector.sv"]
  - name: "EDGE_MODE"
    default: "both"
    type: enum
    values: ["rising", "falling", "both"]
    description: "Detectable edge polarity"
    drives: ["edge_detector.sv"]
  - name: "WIDTH"
    default: 1
    type: int
    description: "Input signal vector width"
    drives: ["edge_detector.sv"]
  - name: "CLOCK_FREQ_MHZ"
    default: 50
    type: int
    description: "Target clock frequency in MHz"
    drives: ["tb_top.sv", "docs/README.md"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "Single system clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "System clock" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "Active-low asynchronous reset with synchronous deassertion"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low reset" }
  interfaces:
    - name: "signal_in"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Input signal to be edge-detected"
      ports:
        - { name: "signal_i", width: "WIDTH", direction: "input", description: "Input signal vector" }
    - name: "edge_out"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Edge detection output pulses"
      ports:
        - { name: "edge_o", width: "WIDTH", direction: "output", description: "One-cycle pulse per detected edge" }
    - name: "apb_csr"
      type: "APB4"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "APB-lite CSR interface for configuration and status"
      protocol:
        setup_phase: "PSEL=1, PENABLE=0 captures address/control."
        access_phase: "PSEL=1, PENABLE=1 completes when PREADY=1."
        read_rule: "PRDATA is valid in the completing access phase for reads."
        write_rule: "PWDATA/PSTRB are sampled in the completing access phase for writes."
        error_rule: "PSLVERR is asserted only with PREADY=1 for illegal or unsupported access."
      ports:
        - { name: "PADDR",   width: 12, direction: "input",  description: "APB address" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PSTRB",   width: 4,  direction: "input",  description: "APB byte strobes" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB error" }
features:
  - name: "Input Synchronization"
    trigger: "signal_i arrives from an asynchronous or multi-clock source"
    datapath: "signal_i passes through SYNC_STAGES flip-flops clocked by PCLK"
    control: "No FSM; purely sequential sampling"
    output: "synced signal stable on PCLK domain after SYNC_STAGES cycles"
  - name: "Edge Detection"
    trigger: "synced signal changes between consecutive PCLK cycles"
    datapath: "Compare current synced sample with previous sample; decode per EDGE_MODE"
    control: "Combinational decode into rising/falling/both edge flags"
    output: "One-cycle pulse on edge_o[WIDTH-1:0] per detected edge"
  - name: "APB-lite CSR"
    trigger: "APB access to valid register address"
    datapath: "PADDR decode -> register read/write; PRDATA mux or register update"
    control: "APB slave stateless decode (PSEL && PENABLE)"
    output: "PRDATA, PREADY, PSLVERR; side effects on CONTROL/STATUS registers"
dataflow:
  input_path:
    source: "signal_i (external, potentially asynchronous)"
    buffer: "sync_chain[SYNC_STAGES-1:0]"
    sequence: "signal_i -> sync_ff[0] -> ... -> sync_ff[SYNC_STAGES-1]"
  detect_path:
    source: "sync_ff[SYNC_STAGES-1]"
    operation: "Compare with sync_ff_prev (latched previous cycle value)"
    sequence: "prev_sample ^ curr_sample -> edge_decode -> edge_o pulse"
  config_path:
    source: "APB write to CONTROL register"
    effect: "Updates EDGE_MODE enable/mask bits; may gate edge_o generation"
    sequence: "PWDATA -> PADDR decode -> CONTROL.write -> edge_decode mask"
function_model:
  purpose: "Executable behavioral contract for rtl-gen and tb-gen; describes what the IP computes independent of cycle timing."
  state_variables:
    - { name: "sync_chain", source: "rtl_contract.state_updates.sync_chain", reset: 0, description: "Synchronizer shift register of width WIDTH*SYNC_STAGES" }
    - { name: "prev_sync", source: "rtl_contract.state_updates.prev_sync", reset: 0, description: "Previous-cycle synced sample for edge comparison" }
    - { name: "control_reg", source: "registers.CONTROL", reset: 0x00000002, description: "Edge mode, enable, irq_enable configuration" }
    - { name: "status_sticky", source: "registers.STATUS.edge_sticky", reset: 0, description: "Sticky edge-detected flags (W1C clear)" }
    - { name: "status_overflow", source: "registers.STATUS.overflow", reset: 0, description: "Overflow flag set when edge occurs before sticky cleared" }
  transactions:
    - id: "DETECT"
      name: "edge_detect"
      preconditions:
        - "enable == 1"
        - "sync_chain has propagated at least SYNC_STAGES cycles since reset deassertion"
      inputs:
        - "signal_i at PCLK domain (after sync)"
      outputs:
        - "edge_o[width-1:0] = 1 for one cycle per detected edge matching EDGE_MODE"
        - "status_sticky |= edge_o"
        - "status_overflow |= edge_o & status_sticky"
        - "irq_o = |edge_o && irq_enable"
      side_effects:
        - "sync_chain shifts every PCLK cycle"
        - "prev_sync updates to last stage of sync_chain"
      error_cases: []
      output_rules:
        - { name: "edge_o", expr: "(curr_sync ^ prev_sync) & mode_mask & {WIDTH{enable}}", width: "WIDTH", port: "edge_o", description: "One-cycle pulse per detected edge, masked by mode and enable" }
        - { name: "irq_o", expr: "|edge_o && irq_enable", width: 1, port: "irq_o", description: "Interrupt asserted when any edge detected and irq_enable set" }
  output_rules:
    - { name: "edge_o", expr: "(curr_sync ^ prev_sync) & mode_mask & {WIDTH{enable}}", width: "WIDTH", port: "edge_o", description: "One-cycle pulse per detected edge, masked by mode and enable" }
    - { name: "irq_o", expr: "|edge_o && irq_enable", width: 1, port: "irq_o", description: "Interrupt asserted when any edge detected and irq_enable set" }
  invariants:
    - "edge_o is asserted for exactly one PCLK cycle per qualifying edge transition."
    - "No edge_o pulse occurs when enable == 0."
    - "status_sticky persists until software W1C clear."
  reference_model_hint: "tb-gen should implement a Python scoreboard model from this section and compare expected/got for every scenario."
cycle_model:
  purpose: "Cycle/handshake contract for rtl-gen; describes when state, outputs, and interrupts may change."
  executable: "python"
  backend_policy: "Use direct Python cycle model with BehavioralModel as oracle; run smoke checks without pytest-pymtl3 dependency."
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears all architectural state"
    deassertion: "state is usable on the first rising edge after synchronized deassertion"
  latency:
    sync_latency: { min_cycles: "SYNC_STAGES", max_cycles: "SYNC_STAGES", description: "Input synchronizer delay" }
    edge_detect_latency: { min_cycles: 1, max_cycles: 1, description: "One-cycle combinational decode after sync" }
    register_read: { min_cycles: 0, max_cycles: 1, description: "APB read data and PREADY timing" }
    register_write: { min_cycles: 0, max_cycles: 1, description: "APB write acceptance timing" }
    interrupt_latency: { min_cycles: 0, max_cycles: 1, description: "irq_o asserts same cycle as edge_o when irq_enable set" }
  handshake_rules: []
  pipeline:
    - { stage: "S0_SYNC", cycle: "0..SYNC_STAGES-1", action: "Propagate signal_i through sync_chain flops" }
    - { stage: "S1_EDGE_DECODE", cycle: "SYNC_STAGES", action: "Compare prev_sync vs curr_sync; decode per EDGE_MODE" }
    - { stage: "S2_OUTPUT", cycle: "SYNC_STAGES+1", action: "Assert edge_o pulse; update sticky/overflow/irq" }
  ordering:
    - "edge_o for cycle N reflects signal_i transition captured at cycle N-SYNC_STAGES-1."
    - "Interrupt updates occur on the same rising edge as edge_o assertion."
  backpressure:
    - "No backpressure on edge_o; downstream must accept or drop the one-cycle pulse."
  performance:
    frequency_mhz: 50
    throughput: { sustained_edges_per_cycle: 1, condition: "No missed edges when input changes slower than PCLK period" }
    outstanding: { read_max: 0, write_max: 0, description: "No outstanding transactions; purely register/pipeline IP" }
    depth: { pipeline_stages: "SYNC_STAGES + 1", queue_depth: 0, description: "Sync chain plus decode stage" }
  observability:
    - "Every function_model transaction maps to at least one cycle_model stage and one test_requirements scenario."
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "Single system clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single clock domain (PCLK) — input sync chain handles external signal timing; no CDC between internal clock domains"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain (PRESETn) — no RDC required"
registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true
    num_channels: 1
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read as zero and do not allocate storage."
  register_list:
    - name: "CONTROL"
      offset: 0x000
      width: 32
      access: "rw"
      reset: 0x00000002
      category: "control"
      description: "Edge detection control register"
      write_side_effects:
        - "Writing edge_mode updates detection polarity immediately."
        - "Writing enable gates edge_o generation when 0."
      fields:
        - { name: "edge_mode", bits: [1, 0], access: "rw", reset: 0x2, write_effect: "0=rising, 1=falling, 2=both, 3=reserved", description: "Edge polarity mode" }
        - { name: "enable", bits: [2, 2], access: "rw", reset: 0x0, write_effect: "1=enable edge detection, 0=disable", description: "Global edge detection enable" }
        - { name: "irq_enable", bits: [3, 3], access: "rw", reset: 0x0, write_effect: "1=enable interrupt on edge detection", description: "Interrupt enable" }
        - { name: "reserved_31_4", bits: [31, 4], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "STATUS"
      offset: 0x004
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "status"
      description: "Edge detection status register"
      write_side_effects:
        - "Writing 1 to a sticky bit clears it (W1C)."
      fields:
        - { name: "edge_sticky", bits: [7, 0], access: "w1c", reset: 0x0, write_effect: "Write-1 clears sticky bit per WIDTH lane", description: "Sticky edge detected flags (up to 8 bits)" }
        - { name: "overflow", bits: [8, 8], access: "w1c", reset: 0x0, write_effect: "Write-1 clears overflow flag", description: "Edge detected while previous sticky not cleared" }
        - { name: "reserved_31_9", bits: [31, 9], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "RAW_STATUS"
      offset: 0x008
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Raw edge detection status (non-sticky, current cycle)"
      fields:
        - { name: "edge_raw", bits: [7, 0], access: "ro", reset: 0x0, description: "Current-cycle edge detection flags" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances: []
  note: "No SRAM/FIFO in edge detector. All state is in registers (sync_chain, prev_sync, CONTROL, STATUS, RAW_STATUS)."
interrupts:
  sources:
    - { name: "EDGE_DETECTED", bit: 0, type: "level", enable_reg: "CONTROL.irq_enable", status_reg: "STATUS.edge_sticky", clear: "W1C", description: "Edge detected on any enabled input lane" }
  output:
    signal: "irq_o"
    polarity: "active_high"
    type: "level"
    width: 1
    port: { name: "irq_o", width: 1, direction: "output", description: "Edge detection interrupt" }
fsm:
  note: "No explicit control FSM; edge_detector operates as a continuous combinational/sequential pipeline. State is entirely in sync_chain and sticky/status registers."
  pipeline_states:
    - "SYNC_SAMPLE"
    - "EDGE_DECODE"
    - "OUTPUT_PULSE"
  transitions:
    - { from: "SYNC_SAMPLE", to: "EDGE_DECODE", condition: "every PCLK rising edge", action: "advance sync_chain, latch prev_sample" }
    - { from: "EDGE_DECODE", to: "OUTPUT_PULSE", condition: "edge_decode matches EDGE_MODE and enable==1", action: "assert edge_o, set sticky/status" }
rtl_contract:
  transaction: "DETECT"
  sample_condition: "PCLK rising edge after PRESETn deassertion"
  input_map:
    signal_in: "signal_i"
    control: "registers.CONTROL"
  output_map:
    edge_pulse: "edge_o"
    status: "registers.STATUS"
    interrupt: "irq_o"
  output_rules:
    - { name: "edge_o", expr: "(curr_sync ^ prev_sync) & mode_mask & {WIDTH{enable}}", width: "WIDTH", port: "edge_o", description: "One-cycle pulse per detected edge, masked by mode and enable" }
    - { name: "irq_o", expr: "|edge_o && irq_enable", width: 1, port: "irq_o", description: "Interrupt asserted when any edge detected and irq_enable set" }
  state_updates:
    - { name: "sync_chain", reset: 0, expr: "{sync_chain[SYNC_STAGES-2:0], signal_i}" }
    - { name: "prev_sync", reset: 0, expr: "sync_chain[SYNC_STAGES-1]" }
    - { name: "status_edge_sticky", reset: 0, expr: "status_edge_sticky | edge_o; cleared by W1C" }
    - { name: "status_overflow", reset: 0, expr: "status_overflow | (edge_o & status_edge_sticky); cleared by W1C" }
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.5 }
  latency_budget:
    sync_latency_cycles: { min: "SYNC_STAGES", max: "SYNC_STAGES", measured_from: "signal_i transition", measured_to: "edge_o assertion" }
    interrupt_latency_cycles: { min: 0, max: 1, measured_from: "edge_o assertion", measured_to: "irq_o assertion" }
    register_access_cycles: { min: 1, max: 2, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
  throughput:
    sustained_edges_per_cycle: 1
    conditions: "Input signal transitions no faster than PCLK period after sync settling"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "signal_i", clock: "PCLK", delay_ns: null, source: "asynchronous; sync chain handles timing" }
      - { ports: "APB inputs", clock: "PCLK", delay_ns: 2.0, source: "system-level APB timing budget" }
    outputs:
      - { ports: "edge_o, irq_o, APB outputs", clock: "PCLK", delay_ns: 2.0, source: "system-level timing budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "No explicit low-power mode in this IP revision; simple peripheral"
  reset_retention:
    retention_required: false
    reset_value_source: "registers and function_model state_variables"
  power_states:
    - { name: "ON", entry: "reset deasserted", exit: "reset asserted", guarantees: ["All architectural behavior active"] }
  upf_required: false
security:
  classification: "non_secure_peripheral"
  assets:
    - { name: "register_map", protection: "APB access control is external to this IP" }
  threat_model:
    - { threat: "illegal register write", mitigation: "RO/W1C access policy in registers.register_list" }
  privilege_model: "External bus fabric enforces privilege; this IP implements no internal privilege levels"
  safety_goals:
    - "No missed edge when enable is set and input meets minimum pulse width"
error_handling:
  error_sources:
    - { id: "ERR_ILLEGAL_ACCESS", condition: "APB access to unmapped address", architectural_effect: "PSLVERR=1, no register state change" }
    - { id: "ERR_RESERVED_MODE", condition: "EDGE_MODE=3 (reserved)", architectural_effect: "No edge detection; edge_o remains zero regardless of input" }
  propagation:
    - "First error wins per access; no cascading error states."
    - "Reserved EDGE_MODE value is silently ignored (edge_o forced to 0)."
  recovery:
    - { action: "software writes valid EDGE_MODE", clears: ["ERR_RESERVED_MODE"], preserves: ["register state except CONTROL.edge_mode"] }
debug_observability:
  waveform_must_probe:
    - "sync_chain"
    - "prev_sync"
    - "edge_o"
    - "irq_o"
    - "function_model.state_variables"
  status_outputs:
    - { name: "RAW_STATUS.edge_raw", description: "Current-cycle non-sticky edge flags" }
    - { name: "STATUS.edge_sticky", description: "Sticky edge-detected flags" }
    - { name: "STATUS.overflow", description: "Overflow indicator" }
  trace_events:
    - { name: "edge_detected", trigger: "edge_o assertion" }
    - { name: "irq_asserted", trigger: "irq_o assertion" }
    - { name: "sticky_cleared", trigger: "W1C write to STATUS" }
  debug_registers:
    - "CONTROL"
    - "STATUS"
    - "RAW_STATUS"
integration:
  bus_attachment:
    control: "APB4 slave"
  connections:
    - { module: "edge_detector", port: "PCLK", signal: "PCLK" }
    - { module: "edge_detector", port: "PRESETn", signal: "PRESETn" }
    - { module: "edge_detector", port: "signal_i", signal: "signal_i" }
    - { module: "edge_detector", port: "edge_o", signal: "edge_o" }
    - { module: "edge_detector", port: "irq_o", signal: "irq_o" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "SoC interconnect"
    illegal_access_response: "pslverr for unsupported APB access"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "SoC must provide APB-compliant PREADY behavior."
    - "signal_i may be asynchronous to PCLK; IP handles synchronization internally."
    - "Interrupt controller samples irq_o as active-high level."
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/edge_detector_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low async reset"
    - "Parameterize widths (no hardcoded numbers)"
    - "Use rtl/edge_detector_param.vh for shared parameter declarations when needed; include it inside consuming modules"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
  lint_waivers:
    - "UNUSEDSIGNAL: reserved bits in registers"
    - "WIDTHEXPAND: signal_i indexing when WIDTH < 8"
reuse_modules: []
custom:
  assumptions:
    - "signal_i may be asynchronous to PCLK; synchronizer handles metastability but does not guarantee detection of pulses shorter than SYNC_STAGES+1 PCLK cycles."
    - "APB PREADY is assumed tied high (zero wait states) unless SoC fabric introduces wait states."
    - "No explicit low-power mode; clock gating is external to this IP."
    - "Reserved EDGE_MODE=3 is treated as 'no detection' (edge_o forced to 0); software must use 0, 1, or 2."
    - "Overflow flag only indicates that a new edge occurred while sticky was still set; it does not count multiple missed edges."
  note: "Simple peripheral IP; no custom protocol extensions"
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"
filelist:
  headers:
    - "rtl/edge_detector_param.vh"
  rtl:
    - "rtl/edge_detector.sv"
    - "rtl/edge_detector_regs.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
    - "sim/edge_detector_model.sv"
  firmware:
    - "firmware/edge_detector_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"
test_requirements:
  scenarios:
    - { id: "SC1", name: "Basic rising edge detection", stimulus: "Set EDGE_MODE=1, enable=1, toggle signal_i[0] low->high", expected: "edge_o[0]=1 for one cycle; STATUS.edge_sticky[0]=1", checker: "Scoreboard expected/got assertion", coverage: ["function_model transaction DETECT", "cycle_model stage S2_OUTPUT"] }
    - { id: "SC2", name: "Basic falling edge detection", stimulus: "Set EDGE_MODE=2, enable=1, toggle signal_i[0] high->low", expected: "edge_o[0]=1 for one cycle; STATUS.edge_sticky[0]=1", checker: "Scoreboard expected/got assertion", coverage: ["function_model transaction DETECT", "cycle_model stage S2_OUTPUT"] }
    - { id: "SC3", name: "Both-edge detection", stimulus: "Set EDGE_MODE=0, enable=1, toggle signal_i[0] both directions", expected: "edge_o[0]=1 on each transition", checker: "Scoreboard counts transitions", coverage: ["both_edge_mode"] }
    - { id: "SC4", name: "Synchronizer latency", stimulus: "Toggle signal_i after reset; observe first edge_o", expected: "First edge_o appears after SYNC_STAGES+1 cycles", checker: "Cycle checker verifies latency", coverage: ["sync_latency"] }
    - { id: "SC5", name: "Sticky and overflow behavior", stimulus: "Generate edge, do not clear sticky, generate another edge", expected: "STATUS.overflow=1; edge_o still pulses", checker: "Status register assertion", coverage: ["overflow_flag"] }
    - { id: "SC6", name: "W1C clear", stimulus: "Write 1s to STATUS after edge detection", expected: "STATUS.edge_sticky and STATUS.overflow cleared to 0", checker: "Register readback assertion", coverage: ["w1c_clear"] }
    - { id: "SC7", name: "Enable gating", stimulus: "Set enable=0, toggle signal_i", expected: "edge_o remains 0; STATUS unchanged", checker: "Scoreboard expected/got assertion", coverage: ["enable_gating"] }
    - { id: "SC8", name: "Reserved mode safety", stimulus: "Set EDGE_MODE=3, toggle signal_i", expected: "edge_o remains 0 regardless of input", checker: "Scoreboard expected/got assertion", coverage: ["reserved_mode"] }
    - { id: "SC9", name: "Interrupt generation", stimulus: "Set irq_enable=1, generate edge", expected: "irq_o=1 same cycle as edge_o", checker: "Interrupt assertion checker", coverage: ["interrupt_latency"] }
    - { id: "SC10", name: "APB register read/write", stimulus: "Write CONTROL, read back; write STATUS W1C, read back", expected: "Read data matches expected register state", checker: "Register readback assertion", coverage: ["apb_access"] }
    - { id: "SC11", name: "Illegal APB address", stimulus: "Access unmapped address offset", expected: "PSLVERR=1, no state change", checker: "APB error response checker", coverage: ["error_handling.ERR_ILLEGAL_ACCESS"] }
    - { id: "SC12", name: "Multi-bit WIDTH operation", stimulus: "WIDTH=8, toggle multiple signal_i bits simultaneously", expected: "edge_o reflects all transitions; each bit independent", checker: "Scoreboard per-bit assertion", coverage: ["multi_bit"] }
  scoreboard_checks: 24
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage for edge detection, sticky, overflow, and interrupt behavior."
      bins:
        - { id: "FCOV_RISING_EDGE", source_ref: "function_model.transactions.DETECT", class: "transaction", description: "Rising edge detected" }
        - { id: "FCOV_FALLING_EDGE", source_ref: "function_model.transactions.DETECT", class: "transaction", description: "Falling edge detected" }
        - { id: "FCOV_BOTH_EDGE", source_ref: "function_model.transactions.DETECT", class: "transaction", description: "Both-edge detection" }
        - { id: "FCOV_STICKY_SET", source_ref: "function_model.state_variables.status_sticky", class: "state", description: "Sticky flag set" }
        - { id: "FCOV_OVERFLOW_SET", source_ref: "function_model.state_variables.status_overflow", class: "state", description: "Overflow flag set" }
        - { id: "FCOV_W1C_CLEAR", source_ref: "registers.STATUS", class: "register", description: "W1C clear of sticky/overflow" }
        - { id: "FCOV_ENABLE_GATE", source_ref: "function_model.output_rules.edge_o", class: "output", description: "Enable gating verified" }
        - { id: "FCOV_RESERVED_MODE", source_ref: "error_handling.error_sources.ERR_RESERVED_MODE", class: "error", description: "Reserved mode safely ignored" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/latency/FSM coverage for synchronizer delay, edge decode timing, and APB protocol."
      bins:
        - { id: "CCOV_SYNC_LATENCY", source_ref: "cycle_model.latency.sync_latency", class: "latency", description: "Synchronizer delay observed" }
        - { id: "CCOV_EDGE_DECODE", source_ref: "cycle_model.pipeline.S1_EDGE_DECODE", class: "pipeline_stage", description: "Edge decode stage observed" }
        - { id: "CCOV_IRQ_SAME_CYCLE", source_ref: "cycle_model.latency.interrupt_latency", class: "latency", description: "Interrupt same-cycle assertion" }
        - { id: "CCOV_APB_READ", source_ref: "io_list.interfaces.apb_slave", class: "protocol", description: "APB read transaction observed" }
        - { id: "CCOV_APB_WRITE", source_ref: "io_list.interfaces.apb_slave", class: "protocol", description: "APB write transaction observed" }
    functional: "Legacy alias: function + cycle coverage must both close; new flows read coverage_goals.function and coverage_goals.cycle separately."
    code: "line >= 90%, branch >= 85%"
quality_gates:
  rtl_gen:
    profile: "production"
    target_scale:
      basis: "Simple peripheral IP with combinational/sequential logic only"
      source_files_min: 2
      modules_min: 2
      procedural_blocks_min: 4
      state_updates_min: 4
      depth_score_min: 0
      logic_modules_min: 2
      behavior_owner_logic_modules_min: 2
    target_scale_waiver:
      approved: false
      reason: ""
      owner: ""
    pass: "Every SSOT-derived RTL TODO and rtl_gate.rtl_gen gate closes with fresh evidence."
    evidence: ["rtl/rtl_todo_plan.json", "rtl/rtl_authoring_provenance.json", "sim/fl_rtl_goal_audit.json", "cov/coverage.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, lints, and matches locked FL/CL authority."
    evidence: ["rtl compile report", "dut lint report", "FL-vs-RTL scoreboard/audit"]
  coverage:
    pass: "SSOT-declared functional/code/toggle/FSM/assertion coverage goals pass or have approved SSOT waivers."
    evidence: ["cov/coverage.json", "sim/coverage_report.md"]
  eda:
    pass: "Synthesis, STA, PnR, and post-route STA meet SSOT timing/area/power/physical targets or have approved SSOT waivers."
    evidence: ["syn report", "sta reports", "pnr report", "routed.spef", "sta-post reports"]
traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "edge_detector_param.vh (shared parameter include, no package)" }
    - { yaml: "io_list.interfaces", output: "edge_detector.sv (port list)" }
    - { yaml: "registers.register_list", output: "edge_detector_regs.sv + firmware + docs" }
    - { yaml: "function_model", output: "edge_detector.sv + tb/cocotb scoreboard/reference model" }
    - { yaml: "cycle_model", output: "edge_detector.sv pipeline/handshake logic + waveform checks" }
    - { yaml: "timing", output: "STA constraints and latency pass/fail criteria" }
    - { yaml: "pnr", output: "floorplan/place/CTS/route TCL and routed DEF/Verilog/SPEF" }
    - { yaml: "security", output: "security/safety mitigations and negative tests" }
    - { yaml: "error_handling", output: "RTL fault paths and DV fault scenarios" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff criteria" }
workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_CORE"
      content: "Implement edge detector core logic"
      detail: "Translate function_model state variables (sync_chain, prev_sync, status), cycle_model pipeline, and ownership refs into RTL state/datapath/control logic."
      criteria:
        - "RTL owner logic is present in edge_detector.sv"
        - "FunctionalModel expected result and RTL observed result can be compared for DETECT transaction"
      source_refs: ["function_model.transactions", "cycle_model.pipeline", "rtl_contract.state_updates"]
      owner_module: "edge_detector"
      owner_file: "rtl/edge_detector.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS"
      content: "Implement APB CSR register block"
      detail: "Translate registers.register_list into APB decode, register read/write, W1C behavior, and PSLVERR generation."
      criteria:
        - "Register block is present in edge_detector_regs.sv"
        - "All APB accesses to valid/invalid addresses produce correct PREADY/PSLVERR"
      source_refs: ["registers.register_list", "io_list.interfaces.apb_csr"]
      owner_module: "edge_detector_regs"
      owner_file: "rtl/edge_detector_regs.sv"
      priority: "high"
      required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh edge_detector", description: "Validate production SSOT structure and quality gates" }
    - { name: "handoff_fl_model", command: "/ssot-fl-model edge_detector", description: "FunctionalModel, decomposition, coverage plan, and equivalence goals from validated SSOT" }
    - { name: "handoff_rtl", command: "/ssot-rtl edge_detector", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb", command: "/ssot-tb edge_detector", description: "Downstream pyuvm/cocotb verification from validated SSOT" }
    - { name: "handoff_sim_debug", command: "/wf sim_debug", description: "Downstream waveform, failure, and coverage inspection after sim exists" }
    - { name: "handoff_coverage", command: "/coverage edge_detector", description: "Measure SSOT-declared coverage goals" }
    - { name: "handoff_eda", command: "/syn edge_detector && /sta edge_detector && /pnr edge_detector && /sta-post edge_detector", description: "Produce SSOT-declared synthesis, STA, PnR, and post-route STA evidence" }
pnr:
  utilization_pct: 60
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.65
  io_layers: { horizontal: "met3", vertical: "met2" }
  cts: { buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"] }
  routing: { signal_layers: { min: "met1", max: "met5" }, drc_waivers: [] }
synthesis:
  dialect: "systemverilog_2012"
  constraints_source: "sdc/edge_detector.sdc"
  target_utilization: 0.70
  ppa_targets:
    area_um2: null
    power_mw: null
    timing_wns_ns: 0.0
  required_reports:
    - "syn/report/area.rpt"
    - "syn/report/timing.rpt"
    - "syn/report/power.rpt"
dft:
  scan_required: false
  scan_chains: 0
  test_mode_port: null
  mbist_required: false
  jtag_required: false
  testability_notes:
    - "Simple peripheral; no dedicated test mode. ATPG relies on standard scan insertion at SoC level."
    - "All registers are observable via APB read path for software-based test."
