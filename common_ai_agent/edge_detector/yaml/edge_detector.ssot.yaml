top_module:
  name: "edge_detector"
  file: "rtl/edge_detector.sv"
  version: "1.0"
  type: "peripheral"
  description: "Parameterized edge detector — detects rising/falling/both edges on input signals with 1-cycle latency and APB-lite CSR interface"
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 50
    area_um2: null
    power_mw: null
sub_modules:
  - { name: "edge_detector_regs",  file: "rtl/edge_detector_regs.sv",  ownership: "manifest", ssot_gen: true,  implements: ["registers.register_list", "interrupts"], source_sections: ["registers", "interrupts"], register_refs: ["registers.register_list"], description: "APB-lite register decode and interrupt aggregation" }
  - { name: "edge_detector_core",  file: "rtl/edge_detector_core.sv",  ownership: "manifest", ssot_gen: false, implements: ["function_model", "cycle_model", "dataflow", "features"], source_sections: ["function_model", "cycle_model", "dataflow", "features"], function_model_refs: ["function_model.transactions", "function_model.state_variables"], cycle_model_refs: ["cycle_model.pipeline", "cycle_model.handshake_rules"], dataflow_refs: ["dataflow"], feature_refs: ["features"], description: "Core edge-detect datapath — input synchronization, edge detection logic, output pulse generation" }

decomposition:
  units:
    - { id: "sync", kind: "datapath", source_refs: ["cycle_model.pipeline.S0_SYNC"], rtl_candidates: ["edge_detector_core"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "edge_detect", kind: "datapath", source_refs: ["function_model.transactions.EDGE_DETECT", "cycle_model.pipeline.S1_EDGE_LOGIC"], rtl_candidates: ["edge_detector_core"], verification_impact: ["test_requirements.scenarios"] }
    - { id: "apb_decode", kind: "control", source_refs: ["registers.register_list"], rtl_candidates: ["edge_detector_regs"], verification_impact: ["test_requirements.scenarios"] }
parameters:
  - name: "NUM_INPUTS"
    default: 8
    type: int
    description: "Number of edge-detect input signals"
    drives: ["edge_detector_core.sv", "edge_detector_regs.sv", "edge_detector.sv"]
  - name: "PCLK_FREQ_MHZ"
    default: 50
    type: int
    description: "PCLK frequency in MHz"
    drives: ["tb_top.sv", "docs/README.md"]
  - name: "RESET_POLARITY"
    default: "active_low"
    type: enum
    values: ["active_low", "active_high"]
    description: "Reset polarity"
    drives: ["ALL .sv files"]
io_list:
  clock_domains:
    - name: "PCLK"
      frequency_mhz: 50
      description: "APB peripheral clock"
      ports:
        - { name: "PCLK", width: 1, direction: "input", description: "Peripheral clock" }
  resets:
    - name: "PRESETn"
      polarity: "active_low"
      sync_async: "async_assert_sync_deassert"
      description: "APB peripheral reset"
      ports:
        - { name: "PRESETn", width: 1, direction: "input", description: "Active-low async reset" }
  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "APB-lite register access interface"
      protocol:
        setup_phase: "psel=1, penable=0 captures address and control"
        access_phase: "psel=1, penable=1 completes when pready=1"
        read_rule: "prdata valid in completing access phase for reads"
        write_rule: "pwdata/pstrb sampled in completing access phase for writes"
        error_rule: "pslverr asserted with pready=1 for unsupported access"
      ports:
        - { name: "PADDR",   width: 8,  direction: "input",  description: "APB address" }
        - { name: "PSEL",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "PENABLE", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "PWRITE",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "PWDATA",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "PSTRB",   width: 4,  direction: "input",  description: "APB strobes" }
        - { name: "PRDATA",  width: 32, direction: "output", description: "APB read data" }
        - { name: "PREADY",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "PSLVERR", width: 1,  direction: "output", description: "APB error" }
    - name: "edge_inputs"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Signal inputs monitored for edges"
      protocol:
        sampling: "Sampled on every PCLK rising edge"
        stability: "Inputs must meet setup/hold relative to PCLK; synchronizers provided internally"
      ports:
        - { name: "signal_inputs", width: "NUM_INPUTS", direction: "input", description: "Input signals to monitor for edges" }
    - name: "edge_outputs"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Edge-detect pulse outputs"
      protocol:
        assertion: "1-cycle pulse on PCLK when configured edge detected"
        deassertion: "Automatically deasserts next cycle"
        reset_value: 0
      ports:
        - { name: "edge_outputs", width: "NUM_INPUTS", direction: "output", description: "Edge detection pulse outputs (1-cycle wide)" }
    - name: "interrupt"
      type: "custom"
      clock_domain: "PCLK"
      reset_domain: "PRESETn"
      description: "Combined interrupt output"
      protocol:
        assertion: "Asserted when any enabled edge event occurs"
        deassertion: "Deasserted after corresponding W1C status clear"
        reset_value: 0
      ports:
        - { name: "edge_irq", width: 1, direction: "output", description: "Combined edge interrupt" }
features:
  - name: "Rising edge detection"
    trigger: "signal_inputs[i] transitions from 0 to 1 between consecutive PCLK cycles"
    datapath: "prev_inputs[i] sampled low, current signal_inputs[i] high → edge_outputs[i]=1 for one cycle"
    control: "edge_mode[i] == 01 (rising)"
    output: "edge_outputs[i] pulses high for 1 PCLK cycle"
  - name: "Falling edge detection"
    trigger: "signal_inputs[i] transitions from 1 to 0 between consecutive PCLK cycles"
    datapath: "prev_inputs[i] sampled high, current signal_inputs[i] low → edge_outputs[i]=1 for one cycle"
    control: "edge_mode[i] == 10 (falling)"
    output: "edge_outputs[i] pulses high for 1 PCLK cycle"
  - name: "Both edges detection"
    trigger: "signal_inputs[i] changes value (0→1 or 1→0) between consecutive PCLK cycles"
    datapath: "prev_inputs[i] XOR current signal_inputs[i] → edge_outputs[i]=1 for one cycle"
    control: "edge_mode[i] == 11 (both)"
    output: "edge_outputs[i] pulses high for 1 PCLK cycle"
  - name: "Per-input disable"
    trigger: "N/A"
    datapath: "edge_outputs[i] held at 0 regardless of input transitions"
    control: "edge_mode[i] == 00 (disabled)"
    output: "edge_outputs[i] = 0"
  - name: "Interrupt generation"
    trigger: "Any edge_outputs[i] pulse where INT_EN[i] is set"
    datapath: "edge_outputs[i] & INT_EN[i] → set INT_STATUS[i] sticky bit, assert edge_irq"
    control: "INT_EN register fields"
    output: "edge_irq asserted; INT_STATUS updated"
dataflow:
  input_path:
    source: "signal_inputs (NUM_INPUTS-wide external signals)"
    synchronization: "Registered on PCLK rising edge → prev_inputs (internal register)"
    sequence: "signal_inputs → PCLK sample → prev_inputs"
  edge_detect_path:
    source: "prev_inputs + signal_inputs + edge_mode (from EDGE_CTRL register)"
    logic: "Combinational: edge[i] = (mode==rising  && ~prev[i] &&  curr[i]) | (mode==falling && prev[i] && ~curr[i]) | (mode==both && prev[i] ^ curr[i])"
    destination: "edge_outputs (1-cycle pulse)"
    sequence: "prev_inputs + signal_inputs → comb edge detect → edge_outputs"
  interrupt_path:
    source: "edge_outputs + INT_EN register"
    logic: "int_status[i] = int_status[i] | (edge_outputs[i] & INT_EN[i]); edge_irq = |(int_status & INT_EN)"
    sequence: "edge_outputs & INT_EN → set INT_STATUS sticky → OR reduce → edge_irq"
function_model:
  purpose: "Executable behavioral contract — defines what edge_detector computes independent of cycle timing."
  state_variables:
    - { name: "prev_inputs", source: "internal register", reset: 0, width: "NUM_INPUTS", description: "Registered previous value of signal_inputs" }
  state_updates:
    - { name: "prev_inputs", reset: 0, expr: "prev_inputs = signal_inputs (sampled every PCLK cycle)" }
    - { name: "int_status",  reset: 0, expr: "int_status = int_status | (edge_detect & INT_EN); cleared by W1C write" }
  transactions:
    - id: "EDGE_DETECT"
      name: "edge_detect"
      preconditions:
        - "PRESETn deasserted"
        - "EDGE_CTRL programmed with valid edge modes"
      inputs:
        - "signal_inputs (width NUM_INPUTS)"
        - "EDGE_CTRL.edge_mode fields"
      outputs:
        - "edge_outputs (width NUM_INPUTS)"
      output_rules:
        - { name: "edge_detect_rising",  expr: "~prev_inputs[i] &  signal_inputs[i]", width: "NUM_INPUTS", port: "edge_outputs", condition: "edge_mode[i] == 01" }
        - { name: "edge_detect_falling", expr: " prev_inputs[i] & ~signal_inputs[i]", width: "NUM_INPUTS", port: "edge_outputs", condition: "edge_mode[i] == 10" }
        - { name: "edge_detect_both",    expr: " prev_inputs[i] ^  signal_inputs[i]", width: "NUM_INPUTS", port: "edge_outputs", condition: "edge_mode[i] == 11" }
        - { name: "edge_disabled",       expr: "0",                                  width: "NUM_INPUTS", port: "edge_outputs", condition: "edge_mode[i] == 00" }
      side_effects:
        - "INT_STATUS[i] set if edge_outputs[i] & INT_EN[i]"
        - "edge_irq asserted if any INT_STATUS[i] & INT_EN[i]"
        - "prev_inputs updated to current signal_inputs"
      error_cases: []
  invariants:
    - "edge_outputs[i] is asserted for exactly one PCLK cycle per detected edge event"
    - "No edge is detected while PRESETn is asserted (low)"
    - "Register read side effects are exactly those listed in registers.register_list"
  reference_model_hint: "tb-gen should implement a Python scoreboard from output_rules and compare expected edge_outputs/INT_STATUS/edge_irq against RTL observed values"
cycle_model:
  purpose: "Cycle/handshake contract — describes when state, outputs, and interrupts change relative to PCLK."
  executable: "pymtl3"
  backend_policy: "Use PyMTL3 for clocked cycle model; keep FunctionalModel as behavioral oracle"
  clock: "PCLK"
  reset:
    assertion: "PRESETn low asynchronously clears prev_inputs, INT_STATUS, edge_outputs, edge_irq"
    deassertion: "State is usable on first rising edge after synchronized deassertion"
  latency:
    edge_detect: { min_cycles: 1, max_cycles: 1, description: "Latency from signal_inputs transition to edge_outputs assertion; fixed 1 PCLK cycle" }
    register_read: { min_cycles: 0, max_cycles: 1, description: "APB read data and PREADY timing per APB4 protocol" }
    register_write: { min_cycles: 0, max_cycles: 1, description: "APB write acceptance timing per APB4 protocol" }
    interrupt_assertion: { min_cycles: 0, max_cycles: 0, description: "edge_irq asserted same cycle as edge_outputs pulse when INT_EN set" }
  handshake_rules:
    - { signal: "PSEL/PENABLE/PREADY", rule: "APB4-lite: PSEL=1,PENABLE=0 setup phase; PSEL=1,PENABLE=1 access phase completes when PREADY=1" }
    - { signal: "PWRITE/PWDATA/PSTRB", rule: "Sampled in completing access phase when PREADY=1 and PWRITE=1" }
    - { signal: "PRDATA", rule: "Driven valid in completing access phase when PREADY=1 and PWRITE=0" }
    - { signal: "PSLVERR", rule: "Asserted with PREADY=1 for unsupported address decode" }
  pipeline:
    - { stage: "S0_SYNC", cycle: 0, action: "Register signal_inputs into prev_inputs on PCLK rising edge" }
    - { stage: "S1_EDGE_LOGIC", cycle: 0, action: "Combinational edge detection: compute edge_outputs from prev_inputs, signal_inputs, and EDGE_CTRL.mode fields" }
    - { stage: "S2_STATUS_IRQ", cycle: 0, action: "Update INT_STATUS sticky bits and drive edge_irq from edge_outputs & INT_EN" }
  ordering:
    - "edge_outputs[i] is driven in the same cycle as the edge detect logic result (S1_EDGE_LOGIC), which is one cycle after the input transition"
    - "INT_STATUS and edge_irq update combinationally from edge_outputs in the same cycle"
  backpressure: []
  performance:
    frequency_mhz: 50
    throughput: { edges_per_cycle: "NUM_INPUTS", description: "All inputs can detect edges simultaneously every cycle" }
    outstanding: { description: "Not applicable — no queued transactions" }
    depth: { pipeline_stages: 2, description: "S0_SYNC register + S1/S2 combinational logic" }
  observability:
    - "Every function_model transaction maps to one cycle_model stage and one test_requirements scenario"
clock_reset_domains:
  domains:
    - { name: "PCLK", frequency_mhz: 50, description: "APB peripheral clock" }
  reset_scheme:
    signal: "PRESETn"
    polarity: "active_low"
    type: "async_assert_sync_deassert"
cdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single PCLK clock domain — no CDC required"
rdc_requirements:
  crossings: []
  synchronizers: []
  note: "Single reset domain — no RDC required"
registers:
  config:
    register_width: 32
    addr_width: 8
    byte_addressable: true
  bit_order: "lsb0"
  bits_format: "[msb, lsb]"
  reserved_field_policy:
    read_value: 0
    write_effect: "ignore"
    rtl_requirement: "Reserved fields read zero, do not allocate storage"
  register_list:
    - name: "EDGE_CTRL"
      offset: 0x00
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "control"
      description: "Edge detection mode per input — 2 bits per input: 00=disabled, 01=rising, 10=falling, 11=both"
      fields:
        - { name: "edge_mode_0", bits: [1, 0], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 0", description: "Input 0 edge mode" }
        - { name: "edge_mode_1", bits: [3, 2], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 1", description: "Input 1 edge mode" }
        - { name: "edge_mode_2", bits: [5, 4], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 2", description: "Input 2 edge mode" }
        - { name: "edge_mode_3", bits: [7, 6], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 3", description: "Input 3 edge mode" }
        - { name: "edge_mode_4", bits: [9, 8], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 4", description: "Input 4 edge mode" }
        - { name: "edge_mode_5", bits: [11, 10], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 5", description: "Input 5 edge mode" }
        - { name: "edge_mode_6", bits: [13, 12], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 6", description: "Input 6 edge mode" }
        - { name: "edge_mode_7", bits: [15, 14], access: "rw", reset: 0x0, write_effect: "Sets detection mode for input 7", description: "Input 7 edge mode" }
        - { name: "reserved_31_16", bits: [31, 16], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "INT_EN"
      offset: 0x04
      width: 32
      access: "rw"
      reset: 0x00000000
      category: "interrupt"
      description: "Per-input interrupt enable — 1 bit per input"
      fields:
        - { name: "int_en", bits: [7, 0], access: "rw", reset: 0x00, write_effect: "Enables interrupt for corresponding input", description: "Interrupt enable bits [7:0]" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "INT_STATUS"
      offset: 0x08
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "interrupt"
      description: "Per-input interrupt status — sticky until W1C clear"
      write_side_effects:
        - "Writing 1 to a bit clears that status bit; writing 0 has no effect"
      fields:
        - { name: "int_status", bits: [7, 0], access: "rw", reset: 0x00, write_effect: "W1C: write 1 to clear, 0 leaves unchanged", description: "Interrupt status bits [7:0]" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
    - name: "EDGE_RAW"
      offset: 0x0C
      width: 32
      access: "ro"
      reset: 0x00000000
      category: "status"
      description: "Raw live edge status — reflects current edge_outputs state (non-sticky)"
      fields:
        - { name: "edge_raw", bits: [7, 0], access: "ro", reset: 0x00, description: "Live edge detect status bits [7:0]" }
        - { name: "reserved_31_8", bits: [31, 8], access: "reserved", reset: 0x0, read_value: 0, write_effect: "ignore", description: "Reserved; reads zero" }
memory:
  instances:
    - { name: "prev_inputs_reg", type: "register", depth: 1, width: "NUM_INPUTS", read_ports: 1, write_ports: 1, latency: 0, description: "Previous-cycle input sample register" }
  note: "Single register for input synchronization; no SRAM/FIFO needed"
interrupts:
  sources:
    - { name: "EDGE_EVENT_0", bit: 0, type: "level", enable_reg: "INT_EN[0]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 0" }
    - { name: "EDGE_EVENT_1", bit: 1, type: "level", enable_reg: "INT_EN[1]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 1" }
    - { name: "EDGE_EVENT_2", bit: 2, type: "level", enable_reg: "INT_EN[2]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 2" }
    - { name: "EDGE_EVENT_3", bit: 3, type: "level", enable_reg: "INT_EN[3]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 3" }
    - { name: "EDGE_EVENT_4", bit: 4, type: "level", enable_reg: "INT_EN[4]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 4" }
    - { name: "EDGE_EVENT_5", bit: 5, type: "level", enable_reg: "INT_EN[5]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 5" }
    - { name: "EDGE_EVENT_6", bit: 6, type: "level", enable_reg: "INT_EN[6]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 6" }
    - { name: "EDGE_EVENT_7", bit: 7, type: "level", enable_reg: "INT_EN[7]", status_reg: "INT_STATUS", clear: "W1C", description: "Edge event on input 7" }
  output:
    signal: "edge_irq"
    polarity: "active_high"
    type: "level"
fsm:
  note: "No complex control FSM — edge_detector is a pipelined datapath with single-cycle latency. All state is held in the input synchronization register (prev_inputs)."
rtl_contract:
  transaction: "EDGE_DETECT"
  sample_condition: "Every PCLK rising edge after PRESETn deasserted"
  input_map:
    signal_inputs: "io_list.interfaces.edge_inputs.signal_inputs"
    edge_mode: "registers.EDGE_CTRL.edge_mode fields"
    int_en: "registers.INT_EN.int_en fields"
  output_map:
    edge_outputs: "io_list.interfaces.edge_outputs.edge_outputs"
    edge_irq: "io_list.interfaces.interrupt.edge_irq"
    int_status: "registers.INT_STATUS.int_status fields"
  state_updates:
    - { name: "prev_inputs", reset: 0, expr: "prev_inputs <= signal_inputs" }
    - { name: "int_status", reset: 0, expr: "int_status <= (int_status & ~w1c_clear) | (edge_outputs & INT_EN)" }
timing:
  target_clocks:
    - { name: "PCLK", frequency_mhz: 50, duty_cycle: 0.5, uncertainty_ns: 0.2 }
  latency_budget:
    register_access_cycles: { min: 1, max: 2, measured_from: "PSEL && PENABLE", measured_to: "PREADY" }
    edge_detect_cycles: { min: 1, max: 1, measured_from: "signal_inputs transition", measured_to: "edge_outputs assertion" }
    interrupt_latency_cycles: { min: 0, max: 0, measured_from: "edge_outputs assertion", measured_to: "edge_irq assertion" }
  throughput:
    edges_per_cycle: "NUM_INPUTS"
    conditions: "All inputs can detect edges simultaneously every PCLK cycle"
  timing_exceptions: []
  io_delays:
    inputs:
      - { ports: "signal_inputs", clock: "PCLK", delay_ns: 0.5, source: "external pin budget" }
      - { ports: "PADDR,PSEL,PENABLE,PWRITE,PWDATA,PSTRB", clock: "PCLK", delay_ns: 0.3, source: "APB fabric budget" }
    outputs:
      - { ports: "edge_outputs", clock: "PCLK", delay_ns: 0.5, source: "external pin budget" }
      - { ports: "PRDATA,PREADY,PSLVERR,edge_irq", clock: "PCLK", delay_ns: 0.3, source: "APB fabric budget" }
  false_paths:
    - { from: "PRESETn", to: "all_registers", reason: "async reset assertion" }
  multicycle_paths: []
  sta_expectations:
    setup_wns_ns_min: 0.0
    hold_wns_ns_min: 0.0
    required_reports: ["sta/out/setup.rpt", "sta/out/hold.rpt", "sta/out/wns.json"]
power:
  domains:
    - { name: "PD_CORE", voltage: "nominal", clock_domains: ["PCLK"], isolation: "not_required_single_domain" }
  clock_gating:
    required: false
    rationale: "Edge detector runs continuously; no low-power gating in this revision"
  reset_retention:
    retention_required: false
    reset_value_source: "registers.register_list and function_model.state_updates reset values"
  power_states:
    - { name: "ON", entry: "PRESETn deasserted", exit: "PRESETn asserted", guarantees: ["All edge detection active"] }
  upf_required: false
security:
  classification: "non_secure_peripheral"
  assets:
    - { name: "register_map", protection: "APB access control external to this IP" }
    - { name: "edge_config", protection: "EDGE_CTRL and INT_EN writable only via APB; no internal bypass" }
  threat_model:
    - { threat: "illegal register write via APB", mitigation: "APB fabric enforces access control; IP exposes no backdoor" }
    - { threat: "glitch on signal_inputs causing spurious edge detect", mitigation: "signal_inputs are registered (S0_SYNC) providing one level of synchronization" }
  privilege_model: "No internal privilege levels; APB fabric enforces access policy"
  safety_goals:
    - "No spurious edge_outputs assertion while PRESETn asserted"
    - "INT_STATUS is W1C — no lost interrupt on concurrent set+clear"
error_handling:
  error_sources:
    - { id: "ERR_APB_DECODE", condition: "Unsupported APB address accessed", architectural_effect: "PSLVERR asserted with PREADY during access phase; no register update" }
    - { id: "ERR_UNALIGNED", condition: "Byte-level access to non-word-aligned address", architectural_effect: "PSLVERR asserted; no data transferred" }
  propagation:
    - "PSLVERR asserted immediately during the access phase; no persistent error state"
    - "No error interrupts — PSLVERR is the only error indicator"
  recovery:
    - { action: "Master retries or aborts access", clears: ["PSLVERR deasserts next cycle"], preserves: ["All register state unchanged"] }
debug_observability:
  waveform_must_probe:
    - "signal_inputs"
    - "prev_inputs"
    - "edge_outputs"
    - "EDGE_CTRL register fields"
    - "INT_EN register fields"
    - "INT_STATUS register fields"
    - "edge_irq"
  status_outputs:
    - "EDGE_RAW register — live edge status"
  trace_events:
    - { name: "edge_detected", trigger: "edge_outputs[i] == 1" }
    - { name: "interrupt_set", trigger: "INT_STATUS[i] transitions 0→1" }
    - { name: "interrupt_clear", trigger: "INT_STATUS[i] W1C cleared" }
  debug_registers:
    - "EDGE_RAW"
integration:
  bus_attachment:
    control: "APB4 slave (PADDR[7:0], PSEL, PENABLE, PWRITE, PWDATA, PSTRB, PRDATA, PREADY, PSLVERR)"
    data: "N/A — no AXI; edge_outputs driven as GPIO-style parallel outputs"
  connections:
    - { module: "edge_detector_core", port: "clk_i", signal: "PCLK" }
    - { module: "edge_detector_core", port: "rst_ni", signal: "PRESETn" }
    - { module: "edge_detector_core", port: "signal_inputs_i", signal: "signal_inputs" }
    - { module: "edge_detector_core", port: "edge_mode_i", signal: "edge_mode (from EDGE_CTRL)" }
    - { module: "edge_detector_core", port: "int_en_i", signal: "int_en (from INT_EN)" }
    - { module: "edge_detector_core", port: "w1c_clear_i", signal: "w1c_clear (from INT_STATUS write)" }
    - { module: "edge_detector_core", port: "edge_outputs_o", signal: "edge_outputs" }
    - { module: "edge_detector_core", port: "edge_raw_o", signal: "EDGE_RAW.edge_raw" }
    - { module: "edge_detector_core", port: "int_status_o", signal: "INT_STATUS.int_status" }
    - { module: "edge_detector_core", port: "edge_irq_o", signal: "edge_irq" }
    - { module: "edge_detector_regs", port: "clk_i", signal: "PCLK" }
    - { module: "edge_detector_regs", port: "rst_ni", signal: "PRESETn" }
    - { module: "edge_detector_regs", port: "apb_*", signal: "PADDR,PSEL,PENABLE,PWRITE,PWDATA,PSTRB,PRDATA,PREADY,PSLVERR" }
    - { module: "edge_detector_regs", port: "int_status_i", signal: "INT_STATUS.int_status" }
    - { module: "edge_detector_regs", port: "edge_irq_i", signal: "edge_irq" }
    - { module: "edge_detector_regs", port: "edge_mode_o", signal: "edge_mode (to core)" }
    - { module: "edge_detector_regs", port: "int_en_o", signal: "int_en (to core)" }
    - { module: "edge_detector_regs", port: "w1c_clear_o", signal: "w1c_clear (to core)" }
    - { module: "edge_detector_regs", port: "edge_raw_i", signal: "EDGE_RAW.edge_raw (from core)" }
  address_map_requirements:
    alignment_bytes: 4
    decode_owner: "edge_detector_regs (internal APB decode)"
    illegal_access_response: "PSLVERR=1, PREADY=1 for unsupported address"
  dependencies:
    external_modules: []
    external_clocks: ["PCLK"]
    external_resets: ["PRESETn"]
  integration_notes:
    - "APB master (SoC interconnect) provides PCLK and PRESETn"
    - "signal_inputs are GPIO-style external pins; must meet setup/hold relative to PCLK"
    - "edge_outputs are 1-cycle pulses; downstream logic must capture on same PCLK edge"
    - "SoC interrupt controller samples edge_irq as active-high level"
dft:
  scan_required: false
  scan_ports: []
  test_mode_ports: []
  controllability:
    reset: "PRESETn must be controllable in test mode"
    clocks: ["PCLK"]
  observability:
    required_internal_points: ["prev_inputs", "edge_mode", "int_en", "int_status"]
  mbist_required: false
  notes: "No SRAM macro; standard flop-based design"
synthesis:
  dialect: "systemverilog_2012"
  top_module: "edge_detector"
  technology:
    pdk: "sky130"
    standard_cell_library: "sky130_fd_sc_hd"
    liberty_corner: "ss_100C_1v40"
    liberty_env: "SKY130_LIB"
    lef_env: "SKY130_LEF"
    tech_lef_env: "SKY130_TLEF"
    rcx_rules_env: "SKY130_RCX_RULES"
  constraints:
    - "No inferred latches"
    - "All flops reset per clock_reset_domains.reset_scheme"
    - "No package/interface/modport/function/task/for/while constructs"
  ppa_targets:
    area_um2_max: null
    power_mw_max: null
    frequency_mhz_min: 50
  required_outputs:
    - "syn/out/edge_detector.v"
    - "syn/out/area.rpt"
    - "syn/out/timing_summary.rpt"
pnr:
  utilization_pct: 40
  aspect_ratio: 1.0
  core_space_um: 2.0
  global_density: 0.60
  io_layers:
    horizontal: "met3"
    vertical: "met2"
  placement:
    density_target: 0.60
    max_displacement_um: null
  cts:
    buf_list: ["sky130_fd_sc_hd__clkbuf_4", "sky130_fd_sc_hd__clkbuf_8"]
    functional_mode_case_analysis:
      - { port: "scan_en", value: 0, when_present: false }
  routing:
    signal_layers: { min: "met1", max: "met5" }
    clock_layers: { min: "met3", max: "met5" }
    drc_waivers: []
  required_outputs:
    - "pnr/out/floorplan.def"
    - "pnr/out/placed.def"
    - "pnr/out/cts.def"
    - "pnr/out/routed.def"
    - "pnr/out/routed.v"
    - "pnr/out/routed.spef"
    - "pnr/out/pnr.report.md"
coding_rules:
  verilog_style: "systemverilog_2012"
  file_extension: ".sv"
  parameter_header: "rtl/edge_detector_param.vh"
  conventions:
    - "nonblocking (<=) in sequential always @(posedge PCLK or negedge PRESETn)"
    - "blocking (=) in combinational always @(*)"
    - "No latches: every combinational branch assigns all outputs"
    - "Active-low async reset: always @(posedge PCLK or negedge PRESETn) with if (!PRESETn)"
    - "Parameterize widths via NUM_INPUTS (no hardcoded numbers)"
    - "Use rtl/edge_detector_param.vh for shared parameter declarations"
    - "ALLOW: input logic / output logic ANSI ports and internal single-driver logic"
    - "BANNED: typedef / enum / always_ff / always_comb / always_latch / package / endpackage / import / interface / modport / function / endfunction / task / endtask / for / while / *_pkg.sv"
    - "Use localparam for state encoding when FSM present"
  lint_waivers:
    - "UNUSEDSIGNAL: reserved register fields tied to zero"
    - "WIDTHEXPAND: signal_inputs/edge_outputs parameterized width indexing"
reuse_modules: []
custom:
  assumptions:
    - id: "ASM_NUM_INPUTS_DEFAULT"
      description: "Default NUM_INPUTS=8 assumed; parameterizable but not auto-detected"
      section: "parameters"
      rationale: "User did not specify exact input count; 8 is a reasonable default for a peripheral edge detector"
    - id: "ASM_APB_LITE"
      description: "APB-lite (no PPROT/PSTRB enforcement) assumed; full APB4 with PPROT not needed"
      section: "io_list"
      rationale: "User specified APB-lite for CSR interface"
    - id: "ASM_1CYCLE_LATENCY"
      description: "Fixed 1-cycle latency assumed with no configurable latency"
      section: "cycle_model"
      rationale: "User specified 1-cycle latency unless noted; no exceptions noted"
    - id: "ASM_SINGLE_CLOCK"
      description: "Single PCLK domain with no CDC synchronizers beyond input register"
      section: "clock_reset_domains"
      rationale: "User specified single PCLK clock domain"
    - id: "ASM_NO_STICKY_OVERRIDE"
      description: "INT_STATUS uses W1C scheme; concurrent set+clear resolves as: new edge set takes priority (or-last semantics)"
      section: "registers"
      rationale: "Standard interrupt sticky-bit behavior; need explicit user confirmation for exact priority"
  note: "Assumptions recorded per pipeline mode — no ask_user blocking. Review custom.assumptions before downstream handoff."
dir_structure:
  template_dirs:
    rtl: "templates/rtl/"
    sim: "templates/sim/"
  output_dirs:
    rtl: "rtl/"
    sim: "sim/"
    firmware: "firmware/"
    docs: "docs/"
  yaml_dir: "yaml/"
  generators_dir: "generators/"
filelist:
  headers:
    - "rtl/edge_detector_param.vh"
  rtl:
    - "rtl/edge_detector_regs.sv"
    - "rtl/edge_detector_core.sv"
    - "rtl/edge_detector.sv"
  sim:
    - "sim/tb_top.sv"
    - "sim/tb_program.sv"
    - "sim/edge_detector_model.py"
  firmware:
    - "firmware/edge_detector_regs.h"
  docs:
    - "docs/register_map.md"
    - "docs/README.md"
test_requirements:
  scenarios:
    - { id: "SC1", name: "Rising edge detection", stimulus: "Program EDGE_CTRL=edge_mode[i]=01, drive signal_inputs[i] 0→1 transition", expected: "edge_outputs[i]=1 for exactly one PCLK cycle after transition; EDGE_RAW[i]=1 that cycle", checker: "Scoreboard compares edge_outputs vs output_rules.edge_detect_rising", coverage: ["EDGE_DETECT", "S0_SYNC", "S1_EDGE_LOGIC"] }
    - { id: "SC2", name: "Falling edge detection", stimulus: "Program EDGE_CTRL=edge_mode[i]=10, drive signal_inputs[i] 1→0 transition", expected: "edge_outputs[i]=1 for exactly one PCLK cycle", checker: "Scoreboard compares vs output_rules.edge_detect_falling", coverage: ["EDGE_DETECT", "S0_SYNC", "S1_EDGE_LOGIC"] }
    - { id: "SC3", name: "Both edges detection", stimulus: "Program EDGE_CTRL=edge_mode[i]=11, drive two consecutive transitions 0→1 then 1→0", expected: "edge_outputs[i]=1 for one cycle after each transition", checker: "Scoreboard compares vs output_rules.edge_detect_both", coverage: ["EDGE_DETECT", "S0_SYNC", "S1_EDGE_LOGIC"] }
    - { id: "SC4", name: "Disabled input", stimulus: "Program EDGE_CTRL=edge_mode[i]=00, drive transitions on signal_inputs[i]", expected: "edge_outputs[i]=0 at all times", checker: "Scoreboard verifies no spurious pulses", coverage: ["edge_disabled"] }
    - { id: "SC5", name: "Interrupt generation", stimulus: "Set INT_EN[i]=1, drive edge on input i", expected: "INT_STATUS[i] set sticky; edge_irq asserted", checker: "Scoreboard checks INT_STATUS sticky and edge_irq", coverage: ["INT_STATUS", "edge_irq"] }
    - { id: "SC6", name: "Interrupt masking", stimulus: "Set INT_EN[i]=0, drive edge on input i", expected: "INT_STATUS[i] unchanged; edge_irq unchanged", checker: "Scoreboard verifies no interrupt activity", coverage: ["INT_EN masking"] }
    - { id: "SC7", name: "W1C clear", stimulus: "Set INT_STATUS[i]=1 via edge event, then write 1 to INT_STATUS[i]", expected: "INT_STATUS[i] cleared to 0; edge_irq deasserts if no other pending", checker: "Scoreboard checks W1C timing", coverage: ["W1C clear"] }
    - { id: "SC8", name: "Concurrent set+clear", stimulus: "Edge event sets INT_STATUS[i] same cycle as APB write clears it", expected: "Per custom.assumptions: new edge takes priority (or-last); INT_STATUS[i]=1 after cycle", checker: "Scoreboard checks or-last behavior", coverage: ["concurrent set+clear"] }
    - { id: "SC9", name: "APB register readback", stimulus: "Write EDGE_CTRL, INT_EN; read back all registers", expected: "Read data matches written values; reserved fields read zero", checker: "APB readback checker", coverage: ["register access"] }
    - { id: "SC10", name: "APB error response", stimulus: "Access unsupported APB address", expected: "PSLVERR=1, PREADY=1 for access phase; no register update", checker: "APB protocol checker", coverage: ["ERR_APB_DECODE"] }
    - { id: "SC11", name: "Reset behavior", stimulus: "Assert PRESETn low during operation, then deassert", expected: "All registers reset to defaults; edge_outputs=0; edge_irq=0; prev_inputs=0", checker: "Reset value checker", coverage: ["reset"] }
    - { id: "SC12", name: "Multi-input simultaneous edges", stimulus: "Program all 8 inputs for both-edges, drive simultaneous transitions on all", expected: "Each edge_outputs[i] independently pulses as appropriate", checker: "Per-bit scoreboard comparison", coverage: ["multi-input", "throughput"] }
  scoreboard_checks: 24
  coverage_goals:
    function:
      target_pct: 100
      model: "function_model"
      description: "Behavioral coverage for edge detection correctness"
      bins:
        - { id: "FCOV_EDGE_DETECT_RISING", source_ref: "function_model.transactions.EDGE_DETECT.output_rules.edge_detect_rising", class: "output_rule", description: "Rising edge output rule observed" }
        - { id: "FCOV_EDGE_DETECT_FALLING", source_ref: "function_model.transactions.EDGE_DETECT.output_rules.edge_detect_falling", class: "output_rule", description: "Falling edge output rule observed" }
        - { id: "FCOV_EDGE_DETECT_BOTH", source_ref: "function_model.transactions.EDGE_DETECT.output_rules.edge_detect_both", class: "output_rule", description: "Both-edges output rule observed" }
        - { id: "FCOV_EDGE_DISABLED", source_ref: "function_model.transactions.EDGE_DETECT.output_rules.edge_disabled", class: "output_rule", description: "Disabled output rule observed" }
        - { id: "FCOV_STATE_UPDATE_PREV", source_ref: "function_model.state_updates.prev_inputs", class: "state_update", description: "prev_inputs state update observed" }
        - { id: "FCOV_STATE_UPDATE_INT_STATUS", source_ref: "function_model.state_updates.int_status", class: "state_update", description: "int_status state update observed" }
    cycle:
      target_pct: 100
      model: "cycle_model"
      description: "Cycle/handshake/pipeline coverage"
      bins:
        - { id: "CCOV_STAGE_SYNC", source_ref: "cycle_model.pipeline.S0_SYNC", class: "pipeline_stage", description: "Input synchronization stage observed" }
        - { id: "CCOV_STAGE_EDGE_LOGIC", source_ref: "cycle_model.pipeline.S1_EDGE_LOGIC", class: "pipeline_stage", description: "Edge detection logic stage observed" }
        - { id: "CCOV_STAGE_STATUS_IRQ", source_ref: "cycle_model.pipeline.S2_STATUS_IRQ", class: "pipeline_stage", description: "Status/IRQ update stage observed" }
        - { id: "CCOV_LATENCY_EDGE", source_ref: "cycle_model.latency.edge_detect", class: "latency", description: "1-cycle edge detect latency observed" }
        - { id: "CCOV_LATENCY_IRQ", source_ref: "cycle_model.latency.interrupt_assertion", class: "latency", description: "0-cycle interrupt latency observed" }
        - { id: "CCOV_PERF_THROUGHPUT", source_ref: "cycle_model.performance.throughput", class: "throughput", description: "All-inputs simultaneous edge throughput exercised" }
        - { id: "CCOV_PERF_FREQUENCY", source_ref: "cycle_model.performance.frequency_mhz", class: "frequency", description: "50 MHz frequency assumption recorded" }
    functional: "Legacy alias: function + cycle coverage must both close"
    line: ">= 90% instrumented line coverage"
    branch: ">= 85% instrumented branch coverage"
    fsm: "N/A — no complex FSM; pipeline coverage via cycle_model bins suffices"
    assertions: "APB protocol assertions (PSEL/PENABLE/PREADY handshake) must pass"
quality_gates:
  ssot:
    pass: "All canonical sections present, substantive, internally consistent, no live TBD placeholders"
    evidence: ["check_ssot_disk.sh PASS", "traceability covers function_model/cycle_model/test_requirements"]
  rtl_gen:
    profile: "standard"
    target_scale:
      basis: "lightweight peripheral — small structural depth expected"
      source_files_min: 3
      modules_min: 2
      procedural_blocks_min: 2
      state_updates_min: 2
      depth_score_min: 2
      logic_modules_min: 1
      behavior_owner_logic_modules_min: 1
    target_scale_waiver:
      approved: false
      reason: ""
      owner: ""
    pass: "SSOT-derived rtl_todo_plan has no blockers/orphans; compile/lint pass; FL-vs-RTL goals close"
    evidence: ["rtl/rtl_todo_plan.json", "rtl/rtl_authoring_provenance.json", "rtl/rtl_compile.json", "lint/dut_lint.json", "sim/fl_rtl_goal_audit.json", "sim/fl_rtl_compare.json", "cov/coverage.json"]
  rtl:
    pass: "RTL implements function_model and cycle_model, compiles, lints clean"
    evidence: ["rtl compile report", "dut lint report"]
  coverage:
    pass: "SSOT-declared function/cycle/line/branch coverage goals met or waived"
    evidence: ["cov/coverage.json", "sim/coverage_report.md"]
  eda:
    pass: "Synthesis and STA meet SSOT timing/area targets"
    evidence: ["syn report", "sta reports"]
traceability:
  yaml_to_output:
    - { yaml: "top_module.name", output: "ALL files (module name)" }
    - { yaml: "parameters", output: "edge_detector_param.vh" }
    - { yaml: "io_list.interfaces", output: "edge_detector.sv (port list)" }
    - { yaml: "registers.register_list", output: "edge_detector_regs.sv + firmware + docs" }
    - { yaml: "function_model", output: "edge_detector_core.sv + tb/edge_detector_model.py" }
    - { yaml: "cycle_model", output: "edge_detector_core.sv pipeline + waveform checks" }
    - { yaml: "timing", output: "STA constraints and latency criteria" }
    - { yaml: "interrupts", output: "edge_detector_regs.sv interrupt aggregation" }
    - { yaml: "error_handling", output: "edge_detector_regs.sv PSLVERR decode" }
    - { yaml: "test_requirements.scenarios", output: "sim/tb_program.sv + tb/edge_detector_model.py" }
    - { yaml: "quality_gates", output: "ATLAS progress and signoff criteria" }
    - { yaml: "features", output: "edge_detector_core.sv edge detect logic" }
    - { yaml: "dataflow", output: "edge_detector_core.sv datapath" }
workflow_todos:
  fl-model-gen: []
  rtl-gen:
    - id: "RTL_TODO_CORE_EDGE_LOGIC"
      content: "Implement edge detection combinational logic per output_rules"
      detail: "Translate function_model.transactions.EDGE_DETECT.output_rules into RTL: per-input edge detection using prev_inputs, signal_inputs, and edge_mode fields"
      criteria:
        - "edge_outputs[i] follows rising/falling/both/disabled rules for all NUM_INPUTS inputs"
        - "edge_outputs[i] is exactly 1 cycle wide"
        - "All output_rules conditions are covered in RTL"
      source_refs: ["function_model.transactions.EDGE_DETECT.output_rules", "cycle_model.pipeline.S1_EDGE_LOGIC"]
      owner_module: "edge_detector_core"
      owner_file: "rtl/edge_detector_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_CORE_SYNC"
      content: "Implement input synchronization register"
      detail: "Register signal_inputs into prev_inputs on PCLK rising edge per cycle_model.pipeline.S0_SYNC"
      criteria:
        - "prev_inputs updated every PCLK cycle from signal_inputs"
        - "prev_inputs reset to 0 when PRESETn asserted"
      source_refs: ["function_model.state_updates.prev_inputs", "cycle_model.pipeline.S0_SYNC"]
      owner_module: "edge_detector_core"
      owner_file: "rtl/edge_detector_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_CORE_INT_STATUS"
      content: "Implement interrupt status sticky bits with W1C clear"
      detail: "INT_STATUS[i] set on edge_outputs[i] & INT_EN[i]; cleared on W1C write; concurrent set+clear uses or-last per custom.assumptions"
      criteria:
        - "INT_STATUS sticky behavior matches function_model.state_updates.int_status"
        - "W1C clear works per bit"
        - "Concurrent set+clear resolves per custom.assumptions.ASM_NO_STICKY_OVERRIDE"
      source_refs: ["function_model.state_updates.int_status", "registers.INT_STATUS", "custom.assumptions.ASM_NO_STICKY_OVERRIDE"]
      owner_module: "edge_detector_core"
      owner_file: "rtl/edge_detector_core.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_REGS_APB_DECODE"
      content: "Implement APB-lite register decode and readback"
      detail: "Decode PADDR[7:0] to select EDGE_CTRL/INT_EN/INT_STATUS/EDGE_RAW; drive PRDATA/PREADY/PSLVERR per APB4-lite protocol"
      criteria:
        - "All 4 registers accessible at correct offsets"
        - "PREADY=1 on all accesses; PSLVERR=1 for unsupported addresses"
        - "Reserved fields read zero per registers.reserved_field_policy"
      source_refs: ["registers.register_list", "error_handling.ERR_APB_DECODE"]
      owner_module: "edge_detector_regs"
      owner_file: "rtl/edge_detector_regs.sv"
      priority: "high"
      required: true
    - id: "RTL_TODO_TOP_WIRING"
      content: "Wire top-level edge_detector port connections between sub-modules and IO"
      detail: "Instantiate edge_detector_core and edge_detector_regs; connect per integration.connections"
      criteria:
        - "All integration.connections entries realized as named port maps"
        - "Top-level ports match io_list exactly"
      source_refs: ["integration.connections", "io_list"]
      owner_module: "edge_detector"
      owner_file: "rtl/edge_detector.sv"
      priority: "high"
      required: true
  tb-gen: []
  sim_debug: []
  coverage: []
  syn: []
  pnr: []
  sta: []
  sta-post: []
generation_flow:
  steps:
    - { name: "validate_ssot", command: "bash workflow/ssot-gen/scripts/check_ssot_disk.sh edge_detector", description: "Validate production SSOT structure and quality gates" }
    - { name: "handoff_fl_model", command: "/ssot-fl-model edge_detector", description: "FunctionalModel, decomposition, coverage plan, and equivalence goals from validated SSOT" }
    - { name: "handoff_rtl", command: "/ssot-rtl edge_detector", description: "Downstream RTL generation from validated SSOT" }
    - { name: "handoff_tb", command: "/ssot-tb edge_detector", description: "Downstream pyuvm/cocotb verification from validated SSOT" }
    - { name: "handoff_sim_debug", command: "/wf sim_debug", description: "Downstream waveform, failure, and coverage inspection" }
    - { name: "handoff_coverage", command: "/coverage edge_detector", description: "Measure SSOT-declared coverage goals" }
    - { name: "handoff_eda", command: "/syn edge_detector && /sta edge_detector", description: "Synthesis and STA evidence from SSOT constraints" }
