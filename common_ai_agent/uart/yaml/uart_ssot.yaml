# =============================================================================
# UART SSOT — APB UART Peripheral (16550-class)
# =============================================================================
top_module:
  name: "uart"
  version: "1.0"
  type: "peripheral"
  description: "APB4 slave UART with configurable baud, parity, FIFOs, and interrupt support"
  reference_spec: "user-defined"
  target:
    technology: "generic"
    clock_freq_mhz: 100

sub_modules:
  - { name: "uart_defines",  file: "uart_defines.vh", ssot_gen: true,  description: "Cross-module localparam constants" }
  - { name: "uart_regs",     file: "uart_regs.v",     ssot_gen: true,  description: "APB4 register block with read mux" }
  - { name: "uart_baud",     file: "uart_baud.v",     ssot_gen: true,  description: "16x baud rate clock divider" }
  - { name: "uart_tx",       file: "uart_tx.v",       ssot_gen: true,  description: "TX FSM with FIFO and shift register" }
  - { name: "uart_rx",       file: "uart_rx.v",       ssot_gen: true,  description: "RX FSM with FIFO, majority sampler" }
  - { name: "uart_core",     file: "uart_core.v",     ssot_gen: false, description: "Core datapath, interrupt OR, loopback" }
  - { name: "uart_wrapper",  file: "uart_wrapper.v",  ssot_gen: true,  description: "Top integration wrapper" }

parameters:
  - { name: "CLOCK_FREQ_HZ", default: 100000000, type: int, description: "System clock frequency in Hz" }
  - { name: "BAUD_RATE",     default: 115200,     type: int, description: "Default baud rate" }
  - { name: "FIFO_DEPTH",    default: 16,         type: int, description: "TX and RX FIFO depth" }
  - { name: "DATA_BITS",     default: 8,          type: int, description: "Data bits per frame (5-8)" }
  - { name: "STOP_BITS",     default: 1,          type: int, description: "Stop bits (1 or 2)" }
  - { name: "PARITY_EN",     default: 0,          type: int, description: "Enable parity generation/checking" }
  - { name: "PARITY_ODD",    default: 0,          type: int, description: "0=even parity, 1=odd parity" }

io_list:
  clock_domains:
    - name: "uartclk"
      ports:
        - { name: "uartclk", width: 1, direction: "input", description: "UART clock" }

  resets:
    - name: "uartresetn"
      polarity: "active_low"
      ports:
        - { name: "uartresetn", width: 1, direction: "input", description: "Active-low reset" }

  interfaces:
    - name: "apb_slave"
      type: "APB4"
      role: "slave"
      ports:
        - { name: "paddr",   width: 12, direction: "input",  description: "APB address" }
        - { name: "psel",    width: 1,  direction: "input",  description: "APB select" }
        - { name: "penable", width: 1,  direction: "input",  description: "APB enable" }
        - { name: "pwrite",  width: 1,  direction: "input",  description: "APB write" }
        - { name: "pwdata",  width: 32, direction: "input",  description: "APB write data" }
        - { name: "pstrb",   width: 4,  direction: "input",  description: "APB strobes" }
        - { name: "prdata",  width: 32, direction: "output", description: "APB read data" }
        - { name: "pready",  width: 1,  direction: "output", description: "APB ready" }
        - { name: "pslverr", width: 1,  direction: "output", description: "APB error" }

    - name: "serial"
      type: "UART"
      ports:
        - { name: "tx",  width: 1, direction: "output", description: "UART transmit" }
        - { name: "rx",  width: 1, direction: "input",  description: "UART receive" }

    - name: "flow_control"
      type: "custom"
      ports:
        - { name: "rts_n", width: 1, direction: "output", description: "Request to send (active low)" }
        - { name: "cts_n", width: 1, direction: "input",  description: "Clear to send (active low)" }

    - name: "interrupt"
      type: "custom"
      ports:
        - { name: "uart_irq", width: 1, direction: "output", description: "Combined interrupt" }

registers:
  config:
    register_width: 32
    addr_width: 12
    byte_addressable: true

  register_list:
    - name: "CTRL"
      offset: 0x000
      width: 32
      access: "rw"
      reset: 0x00000000
      fields:
        - { name: "data_bits",  bits: [2, 0], access: "rw", reset: 0x3, description: "Data bits minus 1 (0=5bit, 3=8bit)" }
        - { name: "stop_bits",  bits: [3, 3], access: "rw", reset: 0x0, description: "Stop bits (0=1, 1=2)" }
        - { name: "parity_en",  bits: [4, 4], access: "rw", reset: 0x0, description: "Parity enable" }
        - { name: "parity_odd", bits: [5, 5], access: "rw", reset: 0x0, description: "Odd parity" }
        - { name: "loopback",   bits: [6, 6], access: "rw", reset: 0x0, description: "Loopback enable" }
        - { name: "tx_en",      bits: [7, 7], access: "rw", reset: 0x0, description: "TX enable" }
        - { name: "rx_en",      bits: [8, 8], access: "rw", reset: 0x0, description: "RX enable" }

    - name: "STATUS"
      offset: 0x004
      width: 32
      access: "ro"
      reset: 0x00000060
      fields:
        - { name: "txe",    bits: [0, 0], access: "ro", reset: 0x0, description: "TX FIFO empty (sticky, W1C in INT_STATUS)" }
        - { name: "txnf",   bits: [1, 1], access: "ro", reset: 0x0, description: "TX FIFO not full" }
        - { name: "rxdv",   bits: [2, 2], access: "ro", reset: 0x0, description: "RX data valid" }
        - { name: "rxfe",   bits: [3, 3], access: "ro", reset: 0x1, description: "RX FIFO empty" }
        - { name: "busy",   bits: [4, 4], access: "ro", reset: 0x0, description: "UART busy" }

    - name: "BRD"
      offset: 0x008
      width: 32
      access: "rw"
      reset: 0x00000000
      fields:
        - { name: "divisor", bits: [15, 0], access: "rw", reset: 0x0, description: "Baud rate divisor (clock / (16 * baud))" }

    - name: "TX_DATA"
      offset: 0x00C
      width: 32
      access: "wo"
      reset: 0x00000000
      fields:
        - { name: "data", bits: [7, 0], access: "wo", reset: 0x0, description: "TX data byte" }

    - name: "RX_DATA"
      offset: 0x010
      width: 32
      access: "ro"
      reset: 0x00000000
      fields:
        - { name: "data", bits: [7, 0], access: "ro", reset: 0x0, description: "RX data byte" }

    - name: "INT_EN"
      offset: 0x014
      width: 32
      access: "rw"
      reset: 0x00000000
      fields:
        - { name: "tx_empty_ie", bits: [0, 0], access: "rw", reset: 0x0, description: "TX empty interrupt enable" }
        - { name: "tx_done_ie",  bits: [1, 1], access: "rw", reset: 0x0, description: "TX complete interrupt enable" }
        - { name: "rx_ready_ie", bits: [2, 2], access: "rw", reset: 0x0, description: "RX ready interrupt enable" }
        - { name: "rx_overrun",  bits: [3, 3], access: "rw", reset: 0x0, description: "RX overrun interrupt enable" }
        - { name: "parity_err",  bits: [4, 4], access: "rw", reset: 0x0, description: "Parity error interrupt enable" }
        - { name: "frame_err",   bits: [5, 5], access: "rw", reset: 0x0, description: "Framing error interrupt enable" }

    - name: "INT_STATUS"
      offset: 0x018
      width: 32
      access: "mixed"
      reset: 0x00000000
      fields:
        - { name: "tx_empty_st",  bits: [0, 0], access: "w1c", reset: 0x0, description: "TX empty sticky (W1C)" }
        - { name: "tx_done_st",   bits: [1, 1], access: "w1c", reset: 0x0, description: "TX complete sticky (W1C)" }
        - { name: "rx_ready_st",  bits: [2, 2], access: "w1c", reset: 0x0, description: "RX ready sticky (W1C)" }
        - { name: "rx_overrun_st",bits: [3, 3], access: "w1c", reset: 0x0, description: "RX overrun sticky (W1C)" }
        - { name: "parity_err_st",bits: [4, 4], access: "w1c", reset: 0x0, description: "Parity error sticky (W1C)" }
        - { name: "frame_err_st", bits: [5, 5], access: "w1c", reset: 0x0, description: "Framing error sticky (W1C)" }

fsm:
  tx_fsm:
    states: ["TX_IDLE", "TX_START", "TX_DATA", "TX_PARITY", "TX_STOP"]
    transitions:
      - { from: "TX_IDLE",   to: "TX_START",  condition: "tx_en & tx_fifo_not_empty" }
      - { from: "TX_START",  to: "TX_DATA",   condition: "baud_tick & bit_cnt==0" }
      - { from: "TX_DATA",   to: "TX_PARITY", condition: "baud_tick & bit_cnt==data_bits-1 & parity_en" }
      - { from: "TX_DATA",   to: "TX_STOP",   condition: "baud_tick & bit_cnt==data_bits-1 & ~parity_en" }
      - { from: "TX_PARITY", to: "TX_STOP",   condition: "baud_tick" }
      - { from: "TX_STOP",   to: "TX_IDLE",   condition: "baud_tick" }
      - { from: "TX_STOP",   to: "TX_START",  condition: "baud_tick & tx_fifo_not_empty" }

  rx_fsm:
    states: ["RX_IDLE", "RX_START_SYNC", "RX_START_CHK", "RX_DATA", "RX_PARITY", "RX_STOP_CHK", "RX_DONE"]
    transitions:
      - { from: "RX_IDLE",      to: "RX_START_SYNC", condition: "rx_falling_edge" }
      - { from: "RX_START_SYNC",to: "RX_START_CHK",  condition: "sample_tick_mid" }
      - { from: "RX_START_CHK", to: "RX_DATA",       condition: "start_bit_valid" }
      - { from: "RX_START_CHK", to: "RX_IDLE",       condition: "~start_bit_valid" }
      - { from: "RX_DATA",      to: "RX_PARITY",     condition: "bit_cnt==data_bits-1 & parity_en" }
      - { from: "RX_DATA",      to: "RX_STOP_CHK",   condition: "bit_cnt==data_bits-1 & ~parity_en" }
      - { from: "RX_PARITY",    to: "RX_STOP_CHK",   condition: "sample_tick" }
      - { from: "RX_STOP_CHK",  to: "RX_DONE",       condition: "stop_bit_valid" }
      - { from: "RX_STOP_CHK",  to: "RX_DONE",       condition: "~stop_bit_valid (FE)" }

features:
  - { name: "Configurable baud rate",    description: "16x oversampling via programmable divisor" }
  - { name: "TX/RX FIFOs",              description: "Configurable depth (default 16), width 8" }
  - { name: "Parity support",            description: "Even/odd parity generation and checking" }
  - { name: "Loopback mode",             description: "Internal TX→RX loopback for test" }
  - { name: "Interrupt generation",      description: "6 interrupt sources with enable/mask" }

memory:
  instances:
    - { name: "tx_fifo", type: "fifo", depth: 16, width: 8, description: "TX data FIFO" }
    - { name: "rx_fifo", type: "fifo", depth: 16, width: 8, description: "RX data FIFO" }

interrupts:
  sources:
    - { name: "TX_EMPTY",   bit: 0, enable_reg: "INT_EN[0]", status_reg: "INT_STATUS[0]", clear: "W1C" }
    - { name: "TX_DONE",    bit: 1, enable_reg: "INT_EN[1]", status_reg: "INT_STATUS[1]", clear: "W1C" }
    - { name: "RX_READY",   bit: 2, enable_reg: "INT_EN[2]", status_reg: "INT_STATUS[2]", clear: "W1C" }
    - { name: "RX_OVERRUN", bit: 3, enable_reg: "INT_EN[3]", status_reg: "INT_STATUS[3]", clear: "W1C" }
    - { name: "PARITY_ERR", bit: 4, enable_reg: "INT_EN[4]", status_reg: "INT_STATUS[4]", clear: "W1C" }
    - { name: "FRAME_ERR",  bit: 5, enable_reg: "INT_EN[5]", status_reg: "INT_STATUS[5]", clear: "W1C" }
  output:
    signal: "uart_irq"
    polarity: "active_high"
    type: "level"

coding_rules:
  verilog_style: "verilog_2001"
  conventions:
    - "Active-low async reset: always @(posedge clk or negedge rst_n)"
    - "Nonblocking in sequential, blocking in combinational"
    - "localparam for state encoding, no enum"
    - "No package, no interface, no initial"
  lint_waivers:
    - "UNUSEDSIGNAL: cts_n (flow control not fully implemented)"
    - "PINCONNECTEMPTY: sample_count, tx_fifo_not_empty, rx_data, rx_fifo_empty, rx_active"

filelist:
  rtl:
    - "uart/rtl/uart_defines.vh"
    - "uart/rtl/uart_baud.v"
    - "uart/rtl/uart_tx.v"
    - "uart/rtl/uart_rx.v"
    - "uart/rtl/uart_regs.v"
    - "uart/rtl/uart_core.v"
    - "uart/rtl/uart_wrapper.v"
