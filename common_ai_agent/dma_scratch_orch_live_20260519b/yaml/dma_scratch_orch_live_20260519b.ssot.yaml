parameters:
- name: ADDR_WIDTH
  type: int
  default: 32
  description: Address width for CSR and memory interfaces.
- name: DATA_WIDTH
  type: int
  default: 32
  description: Data width for CSR and DMA memory beats.
- name: LEN_WIDTH
  type: int
  default: 16
  description: Transfer length field width in data beats.
io_list:
  interfaces:
  - name: clock_reset
    protocol: clock_reset
    role: sink
    handshake:
      clock: clk
      reset: rst_n
      reset_polarity: active_low
    ports:
    - name: clk
      direction: input
      width: 1
      description: Rising-edge clock
    - name: rst_n
      direction: input
      width: 1
      description: Asynchronous active-low reset
    type: custom
    clock_domain: clk
    reset_domain: rst_n
  - name: csr_slave
    protocol: simple_valid_ready_csr
    role: slave
    handshake:
      request: csr_valid
      backpressure: csr_ready low stalls requests
      response: csr_rvalid indicates read data/response valid
      ordering: one request accepted per cycle when csr_valid && csr_ready
    ports:
    - name: csr_valid
      direction: input
      width: 1
      description: CSR request valid
    - name: csr_ready
      direction: output
      width: 1
      description: CSR request ready
    - name: csr_write
      direction: input
      width: 1
      description: CSR write enable; low means read
    - name: csr_addr
      direction: input
      width: ADDR_WIDTH
      description: Byte address for CSR access
    - name: csr_wdata
      direction: input
      width: DATA_WIDTH
      description: CSR write data
    - name: csr_wstrb
      direction: input
      width: DATA_WIDTH/8
      description: Byte write strobes
    - name: csr_rvalid
      direction: output
      width: 1
      description: CSR read/response valid
    - name: csr_rdata
      direction: output
      width: DATA_WIDTH
      description: CSR read data
    - name: csr_error
      direction: output
      width: 1
      description: CSR decode or access error
    type: native_valid_ready
    clock_domain: clk
    reset_domain: rst_n
  - name: mem_master
    protocol: simple_valid_ready_memory
    role: master
    handshake:
      request: mem_req_valid
      backpressure: mem_req_ready low stalls address/control issue
      response: mem_rsp_valid returns read data or write acknowledgement
      ordering: controller issues one outstanding operation in this draft
    ports:
    - name: mem_req_valid
      direction: output
      width: 1
      description: Memory request valid
    - name: mem_req_ready
      direction: input
      width: 1
      description: Memory request ready
    - name: mem_req_write
      direction: output
      width: 1
      description: Memory write request when high, read when low
    - name: mem_req_addr
      direction: output
      width: ADDR_WIDTH
      description: Memory byte address
    - name: mem_req_wdata
      direction: output
      width: DATA_WIDTH
      description: Memory write data
    - name: mem_req_wstrb
      direction: output
      width: DATA_WIDTH/8
      description: Memory write byte enables
    - name: mem_rsp_valid
      direction: input
      width: 1
      description: Memory response valid
    - name: mem_rsp_rdata
      direction: input
      width: DATA_WIDTH
      description: Memory read response data
    - name: mem_rsp_error
      direction: input
      width: 1
      description: Memory response error
    type: native_valid_ready
    clock_domain: clk
    reset_domain: rst_n
  - name: interrupt
    protocol: level_interrupt
    role: source
    handshake:
      assertion: irq high while status.done or status.error is set and irq_en is set
      clearing: software clears status bits via CSR write-one-to-clear
    ports:
    - name: irq
      direction: output
      width: 1
      description: Level interrupt output
    type: custom
    clock_domain: clk
    reset_domain: rst_n
  clock_domains:
  - name: clk
    frequency_mhz: 100
    description: Primary synchronous clock
    ports:
    - name: clk
      width: 1
      direction: input
      description: Primary clock
  resets:
  - name: rst_n
    polarity: active_low
    sync_async: async_assert_sync_deassert
    description: Active-low reset, asynchronous assert and synchronous release
    ports:
    - name: rst_n
      width: 1
      direction: input
      description: Primary reset
features:
- id: csr_programming
  description: Software programs source, destination, length, control, and clears status through CSR slave.
- id: dma_copy
  description: Copies LEN beats from SRC_ADDR to DST_ADDR using one-read-then-one-write sequencing.
- id: completion_irq
  description: Sets done status and optional level interrupt after final write acknowledgement.
- id: error_latch
  description: Latches memory or CSR errors until software clears status.
