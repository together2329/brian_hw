  rtl:
    pass: Synthesizable rtl/dma_scratch_ui_20260519b.sv compiles and implements all required SSOT-visible behavior.
    evidence:
    - list/dma_scratch_ui_20260519b.f
    - compile log
    - lint log
  rtl_gen:
    profile: standard
    pass: rtl-gen closes all required SSOT-derived TODOs with fresh compile/lint evidence.
    evidence:
