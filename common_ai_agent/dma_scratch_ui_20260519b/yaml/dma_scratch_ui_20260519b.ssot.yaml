  - name: handoff_sim_debug
    command: /wf sim_debug
    description: Run simulation, waveform, and coverage inspection
rtl_contract:
  owner: ssot-gen
  type: ssot_derived_rule_contract
  transaction: FM_WRITE_ACCEPT
  clock: clk
  reset: rstn
  reset_active: low
  sample_condition: (mem_wr_valid && mem_wr_ready) and pready
  input_map:
    paddr: paddr
    pwdata: pwdata
    mem_rdata: mem_rdata
    mem_rd_ready: mem_rd_ready
    mem_rdata_valid: mem_rdata_valid
    mem_wr_ready: mem_wr_ready
    psel: psel
    penable: penable
    pwrite: pwrite
  output_map:
    prdata: prdata
    pready: pready
    pslverr: pslverr
    mem_rd_valid: mem_rd_valid
    mem_rd_addr: mem_rd_addr
    mem_wr_valid: mem_wr_valid
    mem_wr_addr: mem_wr_addr
    mem_wr_data: mem_wr_data
    mem_wr_strb: mem_wr_strb
    irq: irq
  ready_output: pready
  output_valid: mem_wr_valid
  contract_invariants:
  - RTL-visible behavior implements all referenced function_model transactions.
  - Input sampling and output observation follow cycle_model handshake and latency rules.
  output_rules:
  - name: irq_level
    port: irq
    expr: irq_enable && irq_status
    width: 1
    description: IRQ is level asserted only when enabled and pending.
  - name: next_read_valid
    port: mem_rd_valid
    expr: '((byte_index + (((length_bytes - byte_index) >= 4) ? 4 : (length_bytes - byte_index))) < length_bytes)'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: next_read_addr
    port: mem_rd_addr
    expr: 'current_src + (((length_bytes - byte_index) >= 4) ? 4 : (length_bytes - byte_index))'
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: pready_reset
    port: pready
    expr: '1'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: apb_pslverr
    port: pslverr
    expr: '!(paddr==0 || paddr==4 || paddr==8 || paddr==12 || paddr==16 || paddr==20)'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: apb_read_data
    port: prdata
    expr: ({0,irq_enable,0} if paddr==0 else (src_addr if paddr==4 else (dst_addr if paddr==8 else (length_bytes if paddr==12 else ({0,error,done,busy} if paddr==16 else ({0,irq_status} if paddr==20 else 0))))))
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_valid_after_read
    port: mem_wr_valid
    expr: '1'
    width: 1
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_data_after_read
    port: mem_wr_data
    expr: mem_rdata
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_addr_after_read
    port: mem_wr_addr
    expr: current_dst
    width: 32
    description: FunctionalModel output observable mapped to DUT output port.
  - name: write_strb_after_read
    port: mem_wr_strb
    expr: (15 if (length_bytes - byte_index) >= 4 else ((1 << (length_bytes - byte_index)) - 1))
    width: 4
    description: FunctionalModel output observable mapped to DUT output port.
