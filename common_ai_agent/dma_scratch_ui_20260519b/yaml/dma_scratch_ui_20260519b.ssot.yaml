workflow_todos:
  rtl-gen:
  - id: RTL_IMPLEMENT_DMA_TOP
    content: Implement synthesizable top at rtl/dma_scratch_ui_20260519b.sv from SSOT ports, registers, FSM, and memory handshakes.
    detail: Implement zero-wait APB-like CSR interface, one-outstanding DMA copy engine, status/IRQ behavior, and byte strobe handling.
    criteria:
    - Top module ports exactly match io_list.
    - CSR offsets and fields match registers.register_list.
    - Memory valid/ready signals hold stable under backpressure.
    - Done/error/irq behavior matches function_model.
    source_refs:
    - top_module
    - io_list
    - registers
    - function_model
    - cycle_model
    - fsm
    owner_module: dma_scratch_ui_20260519b
    owner_file: rtl/dma_scratch_ui_20260519b.sv
    priority: high
    required: true
  tb-gen:
  - id: TB_IMPLEMENT_DMA_SCENARIOS
    content: Build APB-like and memory-handshake testbench implementing all SSOT scenarios.
    detail: Include register mirror, memory copy scoreboard, ready/valid stability monitors, IRQ/status checks, partial length tests, and error tests.
    criteria:
    - All SC01-SC06 scenarios are executable.
