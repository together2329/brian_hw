test_requirements:
  scenarios:
  - id: SC01
    name: reset contract
    stimulus: Assert and release the declared reset while all external interfaces remain idle.
    expected: Architectural state, status, outputs, and debug observability match function_model reset outputs.
    checker: Reset checker compares all declared reset-visible state against function_model and cycle_model reset rules.
    coverage:
    - function_model.reset
    - cycle_model.reset
  - id: SC02
    name: primary approved behavior
    stimulus: Drive a legal request, transaction, command, packet, or CSR operation from function_model primary preconditions.
    expected: Externally observable result/status/side effects match the function_model primary transaction.
    checker: FL-vs-RTL scoreboard compares observable outputs and state updates from the locked function_model.
    coverage:
    - function_model.primary
    - features
    - dataflow
  - id: SC03
    name: cycle handshake and backpressure
    stimulus: Apply legal stalls or delayed handshakes on every declared cycle_model interface phase.
    expected: Payloads remain stable, ordering is preserved, and completion timing respects cycle_model latency/backpressure rules.
    checker: Protocol monitor and scoreboard check cycle_model.handshake_rules, ordering, and latency budget.
    coverage:
    - cycle_model.handshake_rules
    - cycle_model.ordering
    - backpressure
  - id: SC04
    name: error and recovery policy
    stimulus: Inject each declared error_handling.error_sources condition where the interface can represent it.
    expected: Error/status/response/recovery behavior follows error_handling without corrupting unrelated architectural state.
    checker: Negative checker compares error result and recovery state against function_model error_cases.
    coverage:
    - error_handling.error_sources
    - function_model.error_cases
  - id: SC05
    name: debug and trace observability
    stimulus: Run nominal and error flows while sampling every debug_observability waveform/status/trace point.
    expected: Debug/status/trace events reflect committed SSOT-visible state without exposing unsupported behavior.
    checker: Waveform/trace checker validates debug_observability entries and traceability.yaml_to_output rows.
    coverage:
    - debug_observability
    - traceability
  - id: SC06
    name: function_model transaction FM_RESET
    stimulus: Drive preconditions for function_model transaction `FM_RESET`.
    expected: Outputs and side effects match `FM_RESET` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_RESET
  - id: SC07
    name: function_model transaction FM_APB_WRITE
    stimulus: Drive preconditions for function_model transaction `FM_APB_WRITE`.
    expected: Outputs and side effects match `FM_APB_WRITE` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_WRITE
  - id: SC08
    name: function_model transaction FM_APB_READ
    stimulus: Drive preconditions for function_model transaction `FM_APB_READ`.
    expected: Outputs and side effects match `FM_APB_READ` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_APB_READ
  - id: SC09
    name: function_model transaction FM_START
    stimulus: Drive preconditions for function_model transaction `FM_START`.
    expected: Outputs and side effects match `FM_START` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_START
  - id: SC10
    name: function_model transaction FM_READ_ACCEPT
    stimulus: Drive preconditions for function_model transaction `FM_READ_ACCEPT`.
    expected: Outputs and side effects match `FM_READ_ACCEPT` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_READ_ACCEPT
  - id: SC11
    name: function_model transaction FM_READ_DATA
    stimulus: Drive preconditions for function_model transaction `FM_READ_DATA`.
    expected: Outputs and side effects match `FM_READ_DATA` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_READ_DATA
  - id: SC12
    name: function_model transaction FM_WRITE_ACCEPT
    stimulus: Drive preconditions for function_model transaction `FM_WRITE_ACCEPT`.
    expected: Outputs and side effects match `FM_WRITE_ACCEPT` exactly.
    checker: Transaction scoreboard compares RTL observations against the locked function_model transaction.
    coverage:
    - function_model.transactions.FM_WRITE_ACCEPT
  scoreboard_checks: 12
  coverage_goals:
    function:
      target_pct: 100
      model: function_model
      description: Cover reset, CSR programming, reads, starts, copy beats, completion, IRQ, and error transactions.
      bins:
      - id: FCOV_RESET
        source_ref: function_model.transactions
        class: transaction
        description: Reset observed.
      - id: FCOV_APB_WRITE_READ
        source_ref: function_model.transactions
        class: transaction
        description: CSR write/readback observed.
      - id: FCOV_DMA_COPY
        source_ref: function_model.transactions
        class: transaction
        description: DMA copy beat and completion observed.
    cycle:
      target_pct: 100
      model: cycle_model
      description: Cover APB access, read request, read data, write request, status update, and backpressure.
      bins:
      - id: CCOV_APB
        source_ref: cycle_model.pipeline.S0_CSR
        class: cycle_rule
        description: APB access cycle covered.
      - id: CCOV_MEM_BP
        source_ref: cycle_model.backpressure
        class: cycle_rule
        description: Memory backpressure covered.
    scenario: All SSOT scenarios pass with executable cocotb/pyuvm checkers and FL-vs-RTL scoreboard evidence
